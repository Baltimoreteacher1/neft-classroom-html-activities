<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Noam School v10</title>
<style>
:root{--navy:#16324a;--teal:#147c78;--amber:#d99028;--red:#b84234;--green:#248a55;--bg:#eef3f1;--paper:#fffdf8;--line:#dbe5df;--ink:#142033;--muted:#667085;--shadow:0 18px 45px rgba(21,35,52,.12)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif;background:linear-gradient(180deg,#f8fbf8,var(--bg));color:var(--ink)}button,input,select,textarea{font:inherit}.wrap{max-width:1180px;margin:auto;padding:20px}.row,.top{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.top{justify-content:space-between;margin-bottom:14px}.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--teal),var(--navy));color:white;display:grid;place-items:center;font-weight:950}.brand{display:flex;gap:12px;align-items:center}.brand h1{margin:0;color:var(--navy);font-size:1.2rem}.brand p{margin:2px 0 0;color:var(--muted);font-size:.86rem}.btn{border:1px solid var(--line);background:var(--paper);border-radius:13px;padding:10px 13px;font-weight:850;color:var(--ink);text-decoration:none;display:inline-flex;gap:7px;align-items:center;cursor:pointer}.primary{background:var(--teal);border-color:var(--teal);color:white}.navy{background:var(--navy);border-color:var(--navy);color:white}.danger{background:#fde8e4;border-color:#efc4be;color:var(--red)}.hero{border-radius:28px;background:linear-gradient(135deg,var(--navy),#214866 60%,#0e4b59);color:white;padding:26px;box-shadow:var(--shadow)}.heroGrid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}.hero h2{font-size:clamp(2rem,4vw,3.5rem);line-height:.98;margin:10px 0}.hero p{color:rgba(255,255,255,.78);line-height:1.55}.gold{color:#ffd17a}.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.stat{background:rgba(255,255,255,.11);border-radius:18px;padding:14px}.stat b{font-size:1.8rem}.stat small{display:block;color:rgba(255,255,255,.72)}.tabs{display:flex;gap:8px;overflow:auto;padding:14px 0}.tab{border:1px solid var(--line);border-radius:999px;background:var(--paper);padding:9px 13px;font-weight:900;color:var(--muted);white-space:nowrap;cursor:pointer}.tab.active{background:var(--navy);border-color:var(--navy);color:white}.grid{display:grid;gap:14px}.g2{grid-template-columns:1fr 1fr}.homeGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 8px 24px rgba(21,35,52,.07)}.card.dragging{opacity:.5;outline:2px dashed var(--teal)}.head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.card h3,.head h3{margin:0 0 4px;color:var(--navy)}.sub{margin:0 0 12px;color:var(--muted);font-size:.86rem;line-height:1.45}.item{border:1px solid var(--line);background:#f7faf7;border-radius:15px;padding:12px;margin:9px 0}.item h4{margin:0;color:var(--navy)}.item p{margin:5px 0 0;color:var(--muted);font-size:.84rem}.pill{display:inline-flex;border-radius:999px;padding:4px 8px;background:#e2f4f2;color:#0d6863;font-weight:900;font-size:.73rem;margin:2px}.red{background:#fde8e4;color:var(--red)}.amber{background:#fff0d5;color:#935f0d}.blue{background:#e9efff;color:#2f65d5}.field{display:grid;gap:5px;margin-bottom:10px}.field label{font-size:.74rem;font-weight:950;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}input,select,textarea{width:100%;border:1.5px solid var(--line);background:white;border-radius:12px;padding:10px;color:var(--ink)}textarea{min-height:120px;resize:vertical}.note{background:#fff8e0;border:1px solid #f2d186;border-radius:14px;padding:12px;color:#704c0a;line-height:1.45;font-size:.86rem}.preview{white-space:pre-wrap;background:#f7faf7;border:1px solid var(--line);border-radius:14px;padding:12px;min-height:130px}.modalBack{position:fixed;inset:0;background:rgba(15,25,40,.5);display:none;place-items:center;padding:18px;z-index:99}.modalBack.open{display:grid}.modal{width:min(720px,100%);max-height:88vh;overflow:auto;background:white;border-radius:24px;padding:20px;box-shadow:0 25px 80px rgba(0,0,0,.22)}.toast{position:fixed;right:18px;bottom:18px;background:var(--navy);color:white;border-radius:14px;padding:12px 15px;font-weight:900;opacity:0;transform:translateY(70px);transition:.2s}.toast.show{opacity:1;transform:translateY(0)}@media(max-width:850px){.heroGrid,.homeGrid,.g2{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
</style></head><body><div class="wrap">
<header class="top"><div class="brand"><div class="logo">N</div><div><h1>Noam School</h1><p>Daily Dugout v10 · paste Classroom, move homepage cards, Gmail browser links, optional AI</p></div></div><div class="row"><a class="btn" href="/">← Hub</a><a class="btn navy" id="gmailTop" target="_blank">✉️ Open Gmail</a><button class="btn primary" data-open="assignment">＋ Assignment</button></div></header>
<section class="hero"><div class="heroGrid"><div><span class="pill">Today</span><h2>One calm place for <span class="gold">school work.</span></h2><p id="coachText">Loading...</p><div class="row"><button class="btn primary" data-view="import">📋 Paste Classroom</button><button class="btn" data-view="customize">🎛 Customize</button><button class="btn" id="aiDailyBtn">✨ AI daily update</button></div></div><div class="stats"><div class="stat"><b id="statOpen">0</b><small>Open assignments</small></div><div class="stat"><b id="statToday">0</b><small>Due today</small></div><div class="stat"><b id="statClasses">0</b><small>Classes</small></div><div class="stat"><b id="statCards">0</b><small>Visible cards</small></div></div></div></section>
<nav class="tabs"><button class="tab active" data-view="home">Home</button><button class="tab" data-view="import">Paste Classroom</button><button class="tab" data-view="assignments">Assignments</button><button class="tab" data-view="classes">Classes</button><button class="tab" data-view="email">Gmail Helper</button><button class="tab" data-view="ai">AI Updates</button><button class="tab" data-view="customize">Customize</button></nav><main id="app"></main></div>
<div class="modalBack" id="modalBack"><div class="modal"><div class="head"><h2 id="modalTitle">Edit</h2><button class="btn danger" id="closeModal">✕</button></div><div id="modalBody"></div></div></div><div class="toast" id="toast">Saved</div>
<script>
(()=>{const KEY='noam-school-v10',CARDS=[['launch','Daily Launch'],['import','Paste Classroom'],['today','Today Work'],['soon','Coming Up'],['classes','Classes'],['email','Gmail Helper'],['ai','AI Coach'],['wins','Wins']],$=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],uid=p=>p+'_'+Math.random().toString(36).slice(2,8),esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));function iso(o=0){let d=new Date();d.setHours(12,0,0,0);d.setDate(d.getDate()+o);return d.toISOString().slice(0,10)}function days(v){let d=new Date((v||iso())+'T12:00:00'),t=new Date(iso()+'T12:00:00');return Math.round((d-t)/86400000)}function due(v){if(!v)return'No due date';let n=days(v);return n<0?Math.abs(n)+'d late':n===0?'Today':n===1?'Tomorrow':n<7?'In '+n+' days':new Date(v+'T12:00').toLocaleDateString(undefined,{month:'short',day:'numeric'})}function seed(){let m=uid('c'),e=uid('c'),s=uid('c');return{settings:{studentName:'Noam',gmail:'',homeOrder:CARDS.map(x=>x[0]),hiddenCards:[],aiEnabled:false,aiTone:'calm',aiFocus:'short checklist'},daily:{goal:'',lastAi:''},classes:[{id:m,name:'Math',teacher:'',email:'',color:'#147c78'},{id:e,name:'English / ELA',teacher:'',email:'',color:'#b84234'},{id:s,name:'Science',teacher:'',email:'',color:'#248a55'}],assignments:[],wins:[]}}function norm(x){let b=seed();x=x||b;let order=x.settings?.homeOrder||b.settings.homeOrder;order=[...order.filter(k=>CARDS.some(c=>c[0]===k)),...CARDS.map(c=>c[0]).filter(k=>!order.includes(k))];return{...b,...x,settings:{...b.settings,...(x.settings||{}),homeOrder:order,hiddenCards:x.settings?.hiddenCards||[]}}}let state=norm(JSON.parse(localStorage.getItem(KEY)||'null')),view='home',parsed=[];function save(){localStorage.setItem(KEY,JSON.stringify(state))}function cls(id){return state.classes.find(c=>c.id===id)||state.classes[0]||{name:'Class',color:'#147c78'}}function openTasks(){return state.assignments.filter(a=>a.status!=='Turned In').sort((a,b)=>days(a.due)-days(b.due))}function gmailInbox(){return'https://mail.google.com/mail/u/0/#inbox'}function gmailCompose(to='',su='',body=''){let q=new URLSearchParams({view:'cm',fs:'1',to,su,body});return'https://mail.google.com/mail/?'+q.toString()}function toast(t){let el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(el.t);el.t=setTimeout(()=>el.classList.remove('show'),1800)}function shell(){let o=openTasks(),td=o.filter(a=>days(a.due)===0);$('#statOpen').textContent=o.length;$('#statToday').textContent=td.length;$('#statClasses').textContent=state.classes.length;$('#statCards').textContent=state.settings.homeOrder.filter(k=>!state.settings.hiddenCards.includes(k)).length;$('#gmailTop').href=gmailInbox();$('#coachText').innerHTML=td[0]?`Start with <b>${esc(td[0].title)}</b> for ${esc(cls(td[0].classId).name)}. It is due ${esc(due(td[0].due))}.`:o[0]?`Nothing due today. Next up: <b>${esc(o[0].title)}</b> for ${esc(cls(o[0].classId).name)}.`:'No open assignments. Paste Classroom or add the next task.'}function setView(v){view=v;render()}function render(){shell();$$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===view));let pages={home,import:importPage,assignments,classes,email,ai,customize};$('#app').innerHTML=(pages[view]||home)();bind()}function card(k,t,s,b){let i=state.settings.homeOrder.indexOf(k);return`<section class="card" draggable="true" data-card="${k}"><div class="head"><div><h3>${t}</h3><p class="sub">${s}</p></div><div class="row"><button class="btn" data-move="${k}|up" ${i===0?'disabled':''}>↑</button><button class="btn" data-move="${k}|down" ${i===state.settings.homeOrder.length-1?'disabled':''}>↓</button><button class="btn danger" data-hide="${k}">Hide</button></div></div>${b}</section>`}function task(a){let c=cls(a.classId),late=days(a.due)<0;return`<div class="item"><div class="head"><div><h4>${esc(a.title)}</h4><p>${esc(a.notes||'')}</p></div><span class="pill ${late?'red':days(a.due)===0?'amber':''}">${esc(due(a.due))}</span></div><div class="row"><span class="pill" style="background:${c.color}22;color:${c.color}">${esc(c.name)}</span><span class="pill">${esc(a.priority||'Medium')}</span><span class="pill">${esc(a.status||'Not Started')}</span>${a.source?`<span class="pill blue">${esc(a.source)}</span>`:''}<button class="btn" data-edit-a="${a.id}">Edit</button><button class="btn danger" data-del-a="${a.id}">Delete</button></div></div>`}function home(){let o=openTasks(),td=o.filter(a=>days(a.due)===0),soon=o.filter(a=>days(a.due)>0&&days(a.due)<=7),map={launch:card('launch','Daily Launch','A fast start-of-day check.',`<div class="field"><label>Top goal today</label><input id="goal" value="${esc(state.daily.goal)}"></div><button class="btn primary" id="saveGoal">Save goal</button>`),import:card('import','Paste Classroom','Works when school blocks Google sync.',`<div class="note">Open Google Classroom → To-do/Assigned → copy visible work → paste here.</div><button class="btn primary" data-view="import">Open importer</button>`),today:card('today','Today Work','Assignments due today.',td.length?td.map(task).join(''):'<div class="note">No assignments due today.</div>'),soon:card('soon','Coming Up','Work due soon.',soon.length?soon.map(task).join(''):'<div class="note">Nothing due in the next week.</div>'),classes:card('classes','Classes','Teacher emails and class colors.',state.classes.map(c=>`<div class="item"><h4>${esc(c.name)}</h4><p>${esc(c.teacher||'No teacher saved')} ${c.email?'· '+esc(c.email):''}</p></div>`).join('')),email:card('email','Gmail Helper','Opens Gmail in the browser, not Apple Mail.',`<a class="btn navy" target="_blank" href="${gmailInbox()}">Open Gmail inbox</a><button class="btn" data-view="email">Write teacher email</button>`),ai:card('ai','AI Coach','Optional ChatGPT API daily update.',`<p class="sub">${state.settings.aiEnabled?'AI buttons are enabled. Configure OPENAI_API_KEY in Cloudflare.':'AI is off until enabled.'}</p><button class="btn primary" id="aiCard">Generate update</button><div class="note">${esc(state.daily.lastAi||'No AI update yet.')}</div>`),wins:card('wins','Wins','Small wins build the habit.',`<div class="field"><label>Add win</label><input id="win" placeholder="I turned in math."></div><button class="btn primary" id="addWin">Add win</button>${state.wins.slice(-4).reverse().map(w=>`<div class="item"><h4>${esc(w.text)}</h4><p>${esc(w.date)}</p></div>`).join('')}`)};return`<div class="homeGrid">${state.settings.homeOrder.filter(k=>!state.settings.hiddenCards.includes(k)).map(k=>map[k]||'').join('')}</div>`}function importPage(){return`<div class="grid g2"><section class="card"><h3>Paste from Google Classroom</h3><p class="sub">No OAuth. No school admin approval. Paste what Noam can already see.</p><textarea id="paste" placeholder="Math\nRatios worksheet\nDue May 27\nEnglish\nReading response\nDue Tomorrow"></textarea><div class="row"><button class="btn primary" id="parse">Preview import</button><button class="btn" id="clearPaste">Clear</button></div><div class="note">If the list is messy, copy one class at a time.</div></section><section class="card"><h3>Import Preview</h3><div id="preview" class="note">Nothing parsed yet.</div></section></div>`}function parseDue(line){let t=line.replace(/^due[:\s]*/i,'').toLowerCase();if(t.includes('tomorrow'))return iso(1);if(t.includes('today'))return iso(0);let m=t.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s+(\d{1,2})/i);if(m){let y=new Date().getFullYear(),d=new Date(`${m[1]} ${m[2]}, ${y} 12:00:00`);return d.toISOString().slice(0,10)}return''}function parseText(text){let lines=text.split(/\n+/).map(x=>x.trim()).filter(Boolean),cur=state.classes[0]?.id||'',out=[];for(let i=0;i<lines.length;i++){let l=lines[i],low=l.toLowerCase(),hit=state.classes.find(c=>low===c.name.toLowerCase()||low.includes(c.name.toLowerCase()));if(hit&&l.length<55){cur=hit.id;continue}if(/^due\b/i.test(l)&&out.length){out[out.length-1].due=parseDue(l);continue}if(/^(assigned|missing|done|to-do|to do)$/i.test(l))continue;out.push({id:uid('a'),title:l.replace(/^[-•]\s*/,''),classId:cur,due:/^due\b/i.test(lines[i+1]||'')?parseDue(lines[i+1]):'',priority:/missing/i.test(text)?'High':'Medium',status:'Not Started',notes:'Imported from pasted Google Classroom text.',source:'Classroom Paste',created:iso()})}return out.filter(a=>a.title.length>2&&!/^due\b/i.test(a.title)).slice(0,40)}function assignments(){return`<section class="card"><div class="head"><div><h3>Assignments</h3><p class="sub">Manual assignments and Classroom Paste imports.</p></div><button class="btn primary" data-open="assignment">＋ Assignment</button></div>${openTasks().map(task).join('')||'<div class="note">No open assignments.</div>'}</section>`}function classes(){return`<div class="grid g2"><section class="card"><h3>Classes</h3>${state.classes.map(c=>`<div class="item"><h4>${esc(c.name)}</h4><p>${esc(c.teacher||'')} ${c.email?'· '+esc(c.email):''}</p><div class="row"><button class="btn" data-edit-c="${c.id}">Edit</button>${c.email?`<a class="btn navy" target="_blank" href="${gmailCompose(c.email,'Question about class','Hi,\n\nI had a question about...\n\nThank you,\nNoam')}">Email in Gmail</a>`:''}</div></div>`).join('')}</section><section class="card"><h3>Add class</h3>${classForm()}</section></div>`}function classForm(c={}){return`<div class="field"><label>Class</label><input id="cName" value="${esc(c.name||'')}"></div><div class="field"><label>Teacher</label><input id="cTeacher" value="${esc(c.teacher||'')}"></div><div class="field"><label>Email</label><input id="cEmail" value="${esc(c.email||'')}"></div><button class="btn primary" id="saveClass" data-id="${esc(c.id||'')}">Save class</button>`}function email(){return`<div class="grid g2"><section class="card"><h3>Gmail Helper</h3><p class="sub">Uses Gmail compose URLs, so it opens Gmail in the browser.</p><div class="field"><label>Teacher</label><select id="eClass">${state.classes.map(c=>`<option value="${c.id}">${esc(c.name)} ${c.teacher?'— '+esc(c.teacher):''}</option>`).join('')}</select></div><div class="field"><label>Subject</label><input id="eSub" value="Question about class"></div><div class="field"><label>Message</label><textarea id="eBody">Hi,\n\nI had a question about the assignment. Can you please help me understand what I should do next?\n\nThank you,\nNoam</textarea></div><button class="btn navy" id="compose">Open in Gmail</button> <a class="btn" target="_blank" href="${gmailInbox()}">Open Gmail inbox</a></section><section class="card"><h3>Email checklist</h3><div class="note">Say the class, assignment, what is confusing, and what help you need.</div></section></div>`}function ai(){return`<div class="grid g2"><section class="card"><h3>AI Daily Updates</h3><p class="sub">Optional ChatGPT API support for daily planning.</p><div class="note">Store the API key as a Cloudflare secret named <b>OPENAI_API_KEY</b>. Never put it in this HTML.</div><label class="row"><input type="checkbox" id="aiOn" ${state.settings.aiEnabled?'checked':''} style="width:auto"> Enable AI buttons</label><div class="field"><label>Tone</label><input id="aiTone" value="${esc(state.settings.aiTone)}"></div><div class="field"><label>Focus</label><input id="aiFocus" value="${esc(state.settings.aiFocus)}"></div><button class="btn primary" id="saveAi">Save AI settings</button> <button class="btn" id="genAi">Generate update</button></section><section class="card"><h3>Latest update</h3><div class="preview">${esc(state.daily.lastAi||'No AI update generated yet.')}</div></section></div>`}function customize(){return`<div class="grid g2"><section class="card"><h3>Customize Homepage</h3><p class="sub">Move, hide, or show homepage cards.</p>${state.settings.homeOrder.map(k=>{let label=CARDS.find(c=>c[0]===k)?.[1]||k,h=state.settings.hiddenCards.includes(k);return`<div class="item"><div class="head"><div><h4>${esc(label)}</h4><p>${h?'Hidden':'Visible'}</p></div><div class="row"><button class="btn" data-move="${k}|up">↑</button><button class="btn" data-move="${k}|down">↓</button><button class="btn ${h?'primary':'danger'}" data-toggle="${k}">${h?'Show':'Hide'}</button></div></div></div>`}).join('')}<button class="btn" id="resetCards">Reset cards</button></section><section class="card"><h3>Basic Settings</h3><div class="field"><label>Student name</label><input id="sName" value="${esc(state.settings.studentName)}"></div><div class="field"><label>Gmail address optional</label><input id="sGmail" value="${esc(state.settings.gmail)}"></div><button class="btn primary" id="saveSettings">Save settings</button></section></div>`}function move(k,dir){let a=state.settings.homeOrder,i=a.indexOf(k),j=dir==='up'?i-1:i+1;if(i<0||j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];save();render()}function openA(a={}){$('#modalTitle').textContent=a.id?'Edit assignment':'Add assignment';$('#modalBody').innerHTML=`<div class="field"><label>Title</label><input id="aTitle" value="${esc(a.title||'')}"></div><div class="field"><label>Class</label><select id="aClass">${state.classes.map(c=>`<option value="${c.id}" ${a.classId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div><div class="field"><label>Due</label><input type="date" id="aDue" value="${esc(a.due||'')}"></div><div class="field"><label>Priority</label><select id="aPri"><option>Low</option><option selected>Medium</option><option>High</option></select></div><div class="field"><label>Status</label><select id="aStatus"><option>Not Started</option><option>Started</option><option>Almost Done</option><option>Turned In</option></select></div><div class="field"><label>Notes</label><textarea id="aNotes">${esc(a.notes||'')}</textarea></div><button class="btn primary" id="saveA">Save assignment</button>`;$('#modalBack').classList.add('open');$('#saveA').onclick=()=>{let obj=a.id?state.assignments.find(x=>x.id===a.id):{id:uid('a'),created:iso(),source:'Manual'};Object.assign(obj,{title:$('#aTitle').value||'Assignment',classId:$('#aClass').value,due:$('#aDue').value,priority:$('#aPri').value,status:$('#aStatus').value,notes:$('#aNotes').value});if(!a.id)state.assignments.push(obj);save();$('#modalBack').classList.remove('open');render()}}async function genAi(){if(!state.settings.aiEnabled){setView('ai');toast('Turn on AI first');return}try{toast('Generating...');let res=await fetch('/api/ai/daily-update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({settings:state.settings,classes:state.classes,assignments:openTasks().slice(0,12),goal:state.daily.goal})}),data=await res.json();if(!res.ok)throw Error(data.error||'AI unavailable');state.daily.lastAi=data.update;save();render();toast('AI update ready')}catch(e){toast(e.message)}}function bind(){$$('[data-view]').forEach(b=>b.onclick=()=>setView(b.dataset.view));$$('[data-open="assignment"]').forEach(b=>b.onclick=()=>openA());$$('[data-move]').forEach(b=>b.onclick=()=>move(...b.dataset.move.split('|')));$$('[data-hide]').forEach(b=>b.onclick=()=>{state.settings.hiddenCards.push(b.dataset.hide);save();render()});$$('[data-toggle]').forEach(b=>b.onclick=()=>{let k=b.dataset.toggle;state.settings.hiddenCards=state.settings.hiddenCards.includes(k)?state.settings.hiddenCards.filter(x=>x!==k):[...state.settings.hiddenCards,k];save();render()});$$('[data-del-a]').forEach(b=>b.onclick=()=>{state.assignments=state.assignments.filter(a=>a.id!==b.dataset.delA);save();render()});$$('[data-edit-a]').forEach(b=>b.onclick=()=>openA(state.assignments.find(a=>a.id===b.dataset.editA)));$$('[data-edit-c]').forEach(b=>b.onclick=()=>{$('#modalTitle').textContent='Edit class';$('#modalBody').innerHTML=classForm(state.classes.find(c=>c.id===b.dataset.editC));$('#modalBack').classList.add('open');bind()});$('#closeModal')?.addEventListener('click',()=>$('#modalBack').classList.remove('open'));$('#saveGoal')?.addEventListener('click',()=>{state.daily.goal=$('#goal').value;save();render()});$('#addWin')?.addEventListener('click',()=>{let v=$('#win').value.trim();if(v){state.wins.push({text:v,date:new Date().toLocaleString()});save();render()}});$('#parse')?.addEventListener('click',()=>{parsed=parseText($('#paste').value);$('#preview').innerHTML=parsed.length?parsed.map(a=>`<div class="item"><h4>${esc(a.title)}</h4><p>${esc(cls(a.classId).name)} · ${esc(due(a.due))}</p></div>`).join('')+`<button class="btn primary" id="addParsed">Add ${parsed.length} assignments</button>`:'No assignments found.';$('#addParsed')?.addEventListener('click',()=>{state.assignments=[...state.assignments,...parsed];save();setView('assignments')})});$('#clearPaste')?.addEventListener('click',()=>{$('#paste').value='';$('#preview').textContent='Nothing parsed yet.'});$('#saveClass')?.addEventListener('click',()=>{let id=$('#saveClass').dataset.id,c=id?state.classes.find(x=>x.id===id):{id:uid('c'),color:'#147c78'};c.name=$('#cName').value||'Class';c.teacher=$('#cTeacher').value;c.email=$('#cEmail').value;if(!id)state.classes.push(c);save();$('#modalBack').classList.remove('open');render()});$('#compose')?.addEventListener('click',()=>{let c=cls($('#eClass').value);window.open(gmailCompose(c.email,$('#eSub').value,$('#eBody').value),'_blank')});$('#saveAi')?.addEventListener('click',()=>{state.settings.aiEnabled=$('#aiOn').checked;state.settings.aiTone=$('#aiTone').value;state.settings.aiFocus=$('#aiFocus').value;save();render()});$('#genAi')?.addEventListener('click',genAi);$('#aiDailyBtn')?.addEventListener('click',genAi);$('#aiCard')?.addEventListener('click',genAi);$('#saveSettings')?.addEventListener('click',()=>{state.settings.studentName=$('#sName').value;state.settings.gmail=$('#sGmail').value;save();render()});$('#resetCards')?.addEventListener('click',()=>{state.settings.homeOrder=CARDS.map(x=>x[0]);state.settings.hiddenCards=[];save();render()})}render()})();
</script></body></html>
