{ ch:"Unit 8 · Episode 3", html:"\n  <div style=\"text-align:center;margin-top:8px\"><div class=\"kicker\">EduWonderLab Presents</div>\n  <h2 class=\"splashtitle\" style=\"margin:8px 0\">THE FOG <em>GALLERY</em></h2>\n  <div class=\"caption\" style=\"display:inline-block\">Lessons 8-4, 8-5 &amp; 8-6 &mdash; part of the <b>The Balance Vault</b> arc. write &amp; graph inequalities &middot; solution sets &middot; 6.EE.B.8. Read straight through: each reader gate coaches you with hints and a worked example, but never blocks the page.</div></div>\n  <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 400 120\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"400\" height=\"120\" fill=\"#141031\"/><g transform=\"translate(330,2) scale(.6)\"><use href=\"#sym-vex\"/></g><g transform=\"translate(20,6) scale(.74)\"><use href=\"#sym-maya\"/></g><g transform=\"translate(112,6) scale(.74)\"><use href=\"#sym-theo\"/></g><g transform=\"translate(204,6) scale(.74)\"><use href=\"#sym-zara\"/></g><g transform=\"translate(296,6) scale(.74)\"><use href=\"#sym-dev\"/></g></svg>\n    <div class=\"balloon vex\" style=\"top:6px;left:10px;max-width:64%\"><span class=\"who\">VEX</span>Episode 3. Same crew, same city — one focused stretch of the case. Turn the page when you're ready.</div>\n  </div>" },
{ ch:"Chapter 4 · The Freight Lift", html:"\n  <div class=\"kicker\">Chapter Four</div><h2 class=\"splashtitle\">THE FREIGHT <em>LIFT</em></h2>\n  <div class=\"caption loc\">A freight lift waits at the shaft. A brass plate states the rule. The fog states its disagreement.</div>\n  <div class=\"panel panel3d tall\"><svg class=\"scene\" viewBox=\"0 0 400 200\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\">\n    <rect width=\"400\" height=\"200\" fill=\"#152736\"/><rect width=\"400\" height=\"200\" fill=\"url(#halftone)\" opacity=\".4\"/>\n    <g data-depth=\"8\" stroke=\"#b78a2e\" stroke-width=\"4\" fill=\"none\"><rect x=\"240\" y=\"14\" width=\"140\" height=\"160\"/><line x1=\"240\" y1=\"54\" x2=\"380\" y2=\"54\"/><line x1=\"275\" y1=\"14\" x2=\"275\" y2=\"174\"/><line x1=\"310\" y1=\"14\" x2=\"310\" y2=\"174\"/><line x1=\"345\" y1=\"14\" x2=\"345\" y2=\"174\"/></g>\n    <rect data-depth=\"12\" x=\"20\" y=\"20\" width=\"190\" height=\"52\" rx=\"6\" fill=\"#0d1f33\" stroke=\"#b78a2e\" stroke-width=\"3\"/>\n    <text data-depth=\"12\" x=\"115\" y=\"41\" text-anchor=\"middle\" font-family=\"Arial\" font-weight=\"800\" font-size=\"11\" fill=\"#F2C15B\">LIFT OPERATES WITH</text>\n    <text data-depth=\"12\" x=\"115\" y=\"60\" text-anchor=\"middle\" font-family=\"Arial\" font-weight=\"800\" font-size=\"11\" fill=\"#F2C15B\">AT LEAST 12 CRATES OF BALLAST</text>\n    <g data-depth=\"12\" fill=\"#a2683a\" stroke=\"#17324D\" stroke-width=\"2.5\"><rect x=\"250\" y=\"140\" width=\"30\" height=\"26\"/><rect x=\"284\" y=\"140\" width=\"30\" height=\"26\"/><rect x=\"318\" y=\"140\" width=\"30\" height=\"26\"/><rect x=\"284\" y=\"112\" width=\"30\" height=\"26\"/></g>\n    <g data-depth=\"18\" transform=\"translate(30,82) scale(.9)\"><use href=\"#sym-zara\"/></g>\n    <g data-depth=\"16\" transform=\"translate(130,88) scale(.84)\"><use href=\"#sym-maya\"/></g>\n    <g fill=\"#9fb7c6\" opacity=\".5\"><ellipse cx=\"60\" cy=\"192\" rx=\"92\" ry=\"15\"/><ellipse cx=\"210\" cy=\"200\" rx=\"115\" ry=\"13\"/><ellipse cx=\"352\" cy=\"194\" rx=\"78\" ry=\"14\"/></g></svg>\n    <div class=\"sfx\" style=\"top:74px;right:10px\">CLUNK</div>\n    <div class=\"balloon\" style=\"bottom:14px;left:8px;max-width:52%\"><span class=\"who\">MAYA</span>\"At least 12\" isn't one number. Twelve works. Thirteen works. Fifty works. How do we even write that?</div>\n  </div>\n  <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 400 96\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"400\" height=\"96\" fill=\"#10243a\"/><g transform=\"translate(316,4) scale(.66)\"><use href=\"#sym-vex\"/></g><g transform=\"translate(12,-4) scale(.68)\"><use href=\"#sym-theo\"/></g></svg>\n    <div class=\"balloon vex\" style=\"top:4px;left:84px;max-width:42%\"><span class=\"who\">VEX</span>With an <b>inequality</b> — a statement comparing values. It can be true for MANY values at once.</div>\n    <div class=\"balloon tail-r\" style=\"bottom:4px;right:4px;max-width:44%\"><span class=\"who\">THEO</span>Ada's manual graphs one: \"at most 20 degrees\" is t ≤ 20 — a FILLED circle on 20, ray toward the smaller numbers. Filled means 20 itself counts.</div>\n  </div>\n  <div class=\"caption\">Symbols: <b>&gt;</b> greater than · <b>&lt;</b> less than · <b>≥</b> at least (the number is included) · <b>≤</b> at most (included).</div>" },
{ ch:"Chapter 4 · Reader Gate", gate:"g4", html:"\n  <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 400 84\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"400\" height=\"84\" fill=\"#152736\"/><g transform=\"translate(8,0) scale(.66)\"><use href=\"#sym-maya\"/></g><g fill=\"#9fb7c6\" opacity=\".5\"><ellipse cx=\"60\" cy=\"78\" rx=\"92\" ry=\"15\"/><ellipse cx=\"210\" cy=\"86\" rx=\"115\" ry=\"13\"/><ellipse cx=\"352\" cy=\"80\" rx=\"78\" ry=\"14\"/></g></svg>\n    <div class=\"balloon\" style=\"top:6px;left:80px;max-width:70%\"><span class=\"who\">MAYA</span>Write the lift's rule, then pick its picture. The fog reads symbols, reader.</div>\n  </div>" },
{ ch:"Chapter 5 · The Fog Gallery", html:"\n  <div class=\"kicker\">Chapter Five</div><h2 class=\"splashtitle\">THE FOG <em>GALLERY</em></h2>\n  <div class=\"panel panel3d tall\"><svg class=\"scene\" viewBox=\"0 0 400 220\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\">\n    <rect width=\"400\" height=\"220\" fill=\"#0d1f33\"/>\n    <g data-depth=\"8\" opacity=\".9\"><g transform=\"translate(24,16) scale(.62)\"><use href=\"#sig-vent\"/></g><g transform=\"translate(100,16) scale(.62)\"><use href=\"#sig-vent\"/></g><g transform=\"translate(176,16) scale(.62)\"><use href=\"#sig-vent\"/></g><g transform=\"translate(252,16) scale(.62)\"><use href=\"#sig-vent\"/></g><g transform=\"translate(328,16) scale(.62)\"><use href=\"#sig-vent\"/></g></g>\n    <rect data-depth=\"12\" x=\"120\" y=\"92\" width=\"160\" height=\"34\" rx=\"6\" fill=\"#06222b\" stroke=\"#1FA6A2\" stroke-width=\"3\"/>\n    <text data-depth=\"12\" x=\"200\" y=\"114\" text-anchor=\"middle\" font-family=\"Consolas,monospace\" font-weight=\"700\" font-size=\"15\" fill=\"#7CF2EC\">VENT RULE: v &lt; 9</text>\n    <g data-depth=\"16\" fill=\"#F2C15B\" stroke=\"#17324D\" stroke-width=\"2.5\"><rect x=\"40\" y=\"140\" width=\"44\" height=\"30\" rx=\"5\"/><rect x=\"108\" y=\"140\" width=\"44\" height=\"30\" rx=\"5\"/><rect x=\"184\" y=\"140\" width=\"44\" height=\"30\" rx=\"5\"/><rect x=\"252\" y=\"140\" width=\"44\" height=\"30\" rx=\"5\"/><rect x=\"320\" y=\"140\" width=\"44\" height=\"30\" rx=\"5\"/></g>\n    <text data-depth=\"16\" x=\"62\" y=\"160\" text-anchor=\"middle\" font-family=\"Arial Black,Arial\" font-weight=\"900\" font-size=\"13\" fill=\"#17324D\">3</text><text data-depth=\"16\" x=\"130\" y=\"160\" text-anchor=\"middle\" font-family=\"Arial Black,Arial\" font-weight=\"900\" font-size=\"13\" fill=\"#17324D\">8.9</text><text data-depth=\"16\" x=\"206\" y=\"160\" text-anchor=\"middle\" font-family=\"Arial Black,Arial\" font-weight=\"900\" font-size=\"13\" fill=\"#17324D\">9</text><text data-depth=\"16\" x=\"274\" y=\"160\" text-anchor=\"middle\" font-family=\"Arial Black,Arial\" font-weight=\"900\" font-size=\"13\" fill=\"#17324D\">12</text><text data-depth=\"16\" x=\"342\" y=\"160\" text-anchor=\"middle\" font-family=\"Arial Black,Arial\" font-weight=\"900\" font-size=\"13\" fill=\"#17324D\">5.5</text>\n    <g data-depth=\"20\" transform=\"translate(8,96) scale(.8)\"><use href=\"#sym-theo\"/></g>\n    <g fill=\"#9fb7c6\" opacity=\".5\"><ellipse cx=\"60\" cy=\"208\" rx=\"92\" ry=\"15\"/><ellipse cx=\"210\" cy=\"216\" rx=\"115\" ry=\"13\"/><ellipse cx=\"352\" cy=\"210\" rx=\"78\" ry=\"14\"/></g></svg>\n    <div class=\"balloon\" style=\"top:4px;left:8px;max-width:50%\"><span class=\"who\">THEO</span>Value cards. Every card that makes the rule TRUE opens a vent. Every false one… feeds the fog.</div>\n  </div>\n  <div class=\"panelrow\">\n    <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 200 110\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"200\" height=\"110\" fill=\"#10243a\"/><g transform=\"translate(62,8) scale(.78)\"><use href=\"#sym-vex\"/></g></svg>\n      <div class=\"balloon vex\" style=\"top:4px;left:4px;max-width:78%\"><span class=\"who\">VEX</span>All the true values together form the <b>solution set</b>. Strictly less than. The boundary is not invited.</div></div>\n    <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 200 110\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"200\" height=\"110\" fill=\"#10243a\"/><g transform=\"translate(58,4) scale(.78)\"><use href=\"#sym-dev\"/></g></svg>\n      <div class=\"balloon\" style=\"top:4px;left:4px;max-width:74%\"><span class=\"who\">DEV</span>Like loot filters. t &lt; 4 keeps 2 and 3.5, rejects 4 — because 4 &lt; 4 is false.</div></div>\n  </div>\n  <div class=\"caption\">A <b>solution set</b> is every value that makes a statement true — an inequality can have many solutions.</div>" },
{ ch:"Chapter 5 · Reader Gate", gate:"g5", html:"\n  <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 400 84\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"400\" height=\"84\" fill=\"#0d1f33\"/><g transform=\"translate(8,0) scale(.66)\"><use href=\"#sym-theo\"/></g><g fill=\"#9fb7c6\" opacity=\".5\"><ellipse cx=\"60\" cy=\"78\" rx=\"92\" ry=\"15\"/><ellipse cx=\"210\" cy=\"86\" rx=\"115\" ry=\"13\"/><ellipse cx=\"352\" cy=\"80\" rx=\"78\" ry=\"14\"/></g></svg>\n    <div class=\"balloon\" style=\"top:6px;left:80px;max-width:70%\"><span class=\"who\">THEO</span>Tap every TRUE card, reader. Miss one and we keep breathing fog.</div>\n  </div>" },
{ ch:"Chapter 5 · The Vault Door", html:"\n  <div class=\"caption loc\">The last chamber. Ada Vex's vault door — three locks, one pressure gauge, fog to the knees.</div>\n  <div class=\"panel panel3d tall\"><svg class=\"scene\" viewBox=\"0 0 400 210\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\">\n    <rect width=\"400\" height=\"210\" fill=\"#0d1f33\"/>\n    <g data-depth=\"10\" transform=\"translate(120,24) scale(1.6)\"><use href=\"#sym-vaultdoor\"/></g>\n    <rect data-depth=\"14\" x=\"12\" y=\"22\" width=\"96\" height=\"64\" rx=\"8\" fill=\"#06222b\" stroke=\"#1FA6A2\" stroke-width=\"2.5\"/>\n    <text data-depth=\"14\" x=\"60\" y=\"44\" text-anchor=\"middle\" font-family=\"Consolas,monospace\" font-size=\"11\" fill=\"#7CF2EC\">PRESSURE:</text>\n    <text data-depth=\"14\" x=\"60\" y=\"68\" text-anchor=\"middle\" font-family=\"Consolas,monospace\" font-weight=\"700\" font-size=\"16\" fill=\"#F2C15B\">p ≤ 15</text>\n    <text data-depth=\"14\" x=\"60\" y=\"118\" text-anchor=\"middle\" font-family=\"Consolas,monospace\" font-weight=\"700\" font-size=\"13\" fill=\"#7CF2EC\">m − 6 = 9</text>\n    <text data-depth=\"14\" x=\"60\" y=\"140\" text-anchor=\"middle\" font-family=\"Consolas,monospace\" font-weight=\"700\" font-size=\"13\" fill=\"#7CF2EC\">4t = 36</text>\n    <g data-depth=\"20\" transform=\"translate(310,86) scale(.92)\"><use href=\"#sym-theo\"/></g>\n    <g data-depth=\"18\" transform=\"translate(232,110) scale(.74)\"><use href=\"#sym-maya\"/></g>\n    <g fill=\"#9fb7c6\" opacity=\".5\"><ellipse cx=\"60\" cy=\"200\" rx=\"92\" ry=\"15\"/><ellipse cx=\"210\" cy=\"208\" rx=\"115\" ry=\"13\"/><ellipse cx=\"352\" cy=\"202\" rx=\"78\" ry=\"14\"/></g></svg>\n    <div class=\"balloon ada\" style=\"top:6px;right:8px;max-width:46%\"><span class=\"who\">ADA VEX · RECORDED</span>Balance is not stillness. It is truth, held steady. Prove three truths and breathe easy.</div>\n    <div class=\"balloon\" style=\"bottom:14px;left:8px;max-width:50%\"><span class=\"who\">THEO</span>Locks 1 and 2 are one-step equations. Lock 3 is the gauge — the door stays open only while p ≤ 15 stays true.</div>\n  </div>\n  <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 400 84\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"400\" height=\"84\" fill=\"#10243a\"/><g transform=\"translate(10,-4) scale(.64)\"><use href=\"#sym-maya\"/></g></svg>\n    <div class=\"balloon\" style=\"top:6px;left:78px;max-width:72%\"><span class=\"who\">MAYA</span>Reader — you've leveled beams and read symbols all night. Call the truths!</div>\n  </div>\n  <div class=\"caption\">Boss Gate: inverse operations on both sides, then test the pressure set — remember what ≤ includes.</div>" },
{ ch:"Boss Gate · The Balance Vault", gate:"boss", html:"\n  <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 400 76\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"400\" height=\"76\" fill=\"#0d1f33\"/><g transform=\"translate(330,4) scale(.56)\"><use href=\"#sym-vex\"/></g><g fill=\"#9fb7c6\" opacity=\".5\"><ellipse cx=\"60\" cy=\"70\" rx=\"92\" ry=\"15\"/><ellipse cx=\"210\" cy=\"78\" rx=\"115\" ry=\"13\"/><ellipse cx=\"352\" cy=\"72\" rx=\"78\" ry=\"14\"/></g></svg>\n    <div class=\"balloon vex\" style=\"top:6px;left:10px;max-width:72%\"><span class=\"who\">VEX</span>BOSS GATE. Three locks. The fog is listening. No pressure. (Measurable pressure.)</div>\n  </div>" },
{ ch:"Chapter 5 · Open Air", html:"\n  <div class=\"panel panel3d tall\"><svg class=\"scene\" viewBox=\"0 0 400 220\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\">\n    <rect width=\"400\" height=\"220\" fill=\"#152736\"/>\n    <g data-depth=\"10\" transform=\"translate(130,16) scale(1.5)\"><use href=\"#sym-vaultdoor\"/></g>\n    <g data-depth=\"8\" stroke=\"#9fb7c6\" stroke-width=\"6\" opacity=\".7\" stroke-linecap=\"round\"><path d=\"M60 200 q10 -40 -6 -80\" fill=\"none\"/><path d=\"M200 206 q14 -50 -4 -96\" fill=\"none\"/><path d=\"M340 200 q10 -40 -8 -84\" fill=\"none\"/></g>\n    <g data-depth=\"18\" transform=\"translate(20,96) scale(.9)\"><use href=\"#sym-zara\"/></g>\n    <g data-depth=\"18\" transform=\"translate(96,100) scale(.86)\"><use href=\"#sym-theo\"/></g>\n    <g data-depth=\"16\" transform=\"translate(298,104) scale(.84)\"><use href=\"#sym-maya\"/></g>\n    <g data-depth=\"16\" transform=\"translate(228,116) scale(.78)\"><use href=\"#sym-dev\"/></g>\n    <g data-depth=\"26\" transform=\"translate(330,18) scale(.55)\"><use href=\"#sym-vex\"/></g></svg>\n    <div class=\"sfx\" style=\"top:8px;left:16px\">FWOOSH!</div>\n    <div class=\"balloon\" style=\"bottom:12px;left:10px;max-width:44%\"><span class=\"who\">ZARA</span>The fog's venting — every grate at once! TRUE statements, five for five!</div>\n    <div class=\"balloon tail-r\" style=\"top:60px;right:6px;max-width:42%\"><span class=\"who\">THEO</span>And inside: Ada's eighth journal… plus the city ledger she balanced by hand.</div>\n  </div>\n  <div class=\"panelrow\">\n    <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 200 110\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"200\" height=\"110\" fill=\"#fdf2ee\"/><g transform=\"translate(58,4) scale(.78)\"><use href=\"#sym-dev\"/></g></svg>\n      <div class=\"balloon\" style=\"top:4px;left:4px;max-width:72%\"><span class=\"who\">DEV</span>Achievement: VAULT BREAKER. Sunrise in twenty minutes. Pancakes in thirty.</div></div>\n    <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 200 110\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"200\" height=\"110\" fill=\"#1a1030\"/><path d=\"M40 92 Q100 18 160 92 Z\" fill=\"#3a7d44\" stroke=\"#F2C15B\" stroke-width=\"3\"/><path d=\"M58 92 Q100 40 142 92\" fill=\"none\" stroke=\"#9fe89f\" stroke-width=\"2\" opacity=\".8\"/><circle cx=\"100\" cy=\"58\" r=\"16\" fill=\"#c9f25b\" opacity=\".85\"/><circle cx=\"100\" cy=\"58\" r=\"26\" fill=\"#c9f25b\" opacity=\".3\"/><g fill=\"#F2C15B\"><circle cx=\"30\" cy=\"24\" r=\"2\"/><circle cx=\"170\" cy=\"18\" r=\"2\"/><circle cx=\"150\" cy=\"36\" r=\"1.6\"/></g></svg>\n      <div class=\"balloon vex\" style=\"top:2px;left:4px;max-width:64%\"><span class=\"who\">VEX</span>New distortion. The harvest dome is glowing wrong at night. Something in there depends on something else… To be continued.</div></div>\n  </div>\n  <div class=\"caption\" style=\"text-align:center\"><b>NEXT: VOL. 9 — CAUSE & EFFECT</b></div>" },
{ ch:"End Matter · Ada Vex's Journal", html:"\n  <h2 class=\"splashtitle\" style=\"font-size:1.4rem\">ADA VEX'S <em>JOURNAL</em></h2>\n  <div class=\"journal\"><h4>Lessons 8-4, 8-5 &amp; 8-6 &mdash; what this stretch of the case taught us</h4>\n    <div class=\"jrow\"><b>6.EE.B.5</b><span>Understand solving an equation or inequality as finding the values that make it true; use substitution</span></div><div class=\"jrow\"><b>6.EE.B.7</b><span>Solve real-world one-step equations of the form x + p = q and px = q</span></div><div class=\"jrow\"><b>6.EE.B.8</b><span>Write an inequality for a condition; recognize infinitely many solutions; graph on a number line</span></div><div class=\"jrow\"><b>MP3 / MP7</b><span>Construct viable arguments; look for and use structure (balance as equality)</span></div>\n  </div>\n  <div class=\"caption\">The full story — <b>The Balance Vault</b> — is glowing at the city gate. — A.V.</div>" },
{ ch:"End Matter · Certificate", html:"\n  <div id=\"certificate\">\n    <div class=\"kicker\">Axiom City · EduWonderLab</div>\n    <h3>READER CERTIFICATE</h3>\n    <p style=\"font:600 .9rem Georgia,serif\">This certifies that</p>\n    <input id=\"certName\" maxlength=\"40\" placeholder=\"write your name\" aria-label=\"Your name for the certificate\">\n    <p style=\"font:600 .9rem Georgia,serif\">completed <b>Unit 8 · Episode 3: The Fog Gallery</b> in the The Balance Vault arc, and proved mastery over write &amp; graph inequalities · solution sets · 6.EE.B.8.</p>\n    <div class=\"certbadges\" id=\"certBadges\"></div>\n    <button class=\"gatecheck\" id=\"printCert\" style=\"align-self:center\">PRINT CERTIFICATE</button>\n  </div>\n  <div class=\"caption\" style=\"text-align:center\">Next up: the full anchor volume — The Balance Vault.</div>" }
];

const GATES = {
"g4":{title:"Gate 4 · Write the Lift's Rule", icon:"#sig-ray", prompt:"The brass plate says the lift runs with <b>at least 12 crates</b> of ballast. First write the rule as an inequality (x = crates loaded). Then choose its number-line graph.",hints:["Conceptual: 'at least 12' means exactly 12 is allowed AND anything bigger is allowed. Does the symbol you picked include 12 itself?","Procedural: an included boundary gets a FILLED (closed) circle; the ray points toward all the other values that keep the rule true — for 'at least', the bigger numbers."],worked:{"steps":["A thermostat rule says: keep the room at MOST 20 degrees.","'At most' includes 20 itself, so write t ≤ 20.","Graph: a FILLED circle at 20 (20 counts), with the ray pointing LEFT toward the smaller numbers."],"q":"For 'at most 20' (t ≤ 20): is t = 20 allowed? (yes/no)","a":"yes"},render(body,api){
    const NL=(closed,dir,dot)=>`<svg viewBox="0 0 170 44" style="width:100%;max-width:190px;display:block" aria-hidden="true">
      <line x1="8" y1="28" x2="162" y2="28" stroke="#17324D" stroke-width="3"/><path d="M162 28 l-9 -5 v10 z" fill="#17324D"/><path d="M8 28 l9 -5 v10 z" fill="#17324D"/>
      ${[[40,"11"],[85,"12"],[130,"13"]].map(([x,t])=>`<line x1="${x}" y1="22" x2="${x}" y2="34" stroke="#17324D" stroke-width="2.5"/><text x="${x}" y="14" text-anchor="middle" font-size="10" font-family="Arial" fill="#17324D">${t}</text>`).join("")}
      ${dot?"":`<line x1="85" y1="28" x2="${dir>0?153:17}" y2="28" stroke="#1FA6A2" stroke-width="6" stroke-linecap="round"/>`}
      <circle cx="85" cy="28" r="7" fill="${closed?"#1FA6A2":"#fff"}" stroke="#17324D" stroke-width="3"/></svg>`;
    body.innerHTML=`<div style="font:700 .82rem 'Segoe UI'">1 · The rule as an inequality:</div>
      <div class="choicebtns" role="group" aria-label="Choose the inequality for at least 12 crates">
        <button class="choicebtn" data-a="gt" aria-pressed="false">x &gt; 12</button>
        <button class="choicebtn" data-a="ge" aria-pressed="false">x ≥ 12</button>
        <button class="choicebtn" data-a="eq" aria-pressed="false">x = 12</button>
        <button class="choicebtn" data-a="le" aria-pressed="false">x ≤ 12</button></div>
      <div style="font:700 .82rem 'Segoe UI'">2 · Its number-line graph:</div>
      <div class="choicebtns" role="group" aria-label="Choose the number line graph">
        <button class="choicebtn" data-b="or" aria-pressed="false" aria-label="Open, unfilled circle at 12 with a ray pointing right toward larger numbers">${NL(false,1)}<small>open circle at 12, ray right</small></button>
        <button class="choicebtn" data-b="cl" aria-pressed="false" aria-label="Closed, filled circle at 12 with a ray pointing left toward smaller numbers">${NL(true,-1)}<small>closed circle at 12, ray left</small></button>
        <button class="choicebtn" data-b="cr" aria-pressed="false" aria-label="Closed, filled circle at 12 with a ray pointing right toward larger numbers">${NL(true,1)}<small>closed circle at 12, ray right</small></button>
        <button class="choicebtn" data-b="dot" aria-pressed="false" aria-label="A single filled point at 12 with no ray">${NL(true,1,true)}<small>just the point 12</small></button></div>`;
    let pa=null,pb=null;
    body.querySelectorAll("[data-a]").forEach(b=>b.addEventListener("click",()=>{body.querySelectorAll("[data-a]").forEach(x=>x.setAttribute("aria-pressed","false"));b.setAttribute("aria-pressed","true");pa=b.dataset.a;api.sound("blip");}));
    body.querySelectorAll("[data-b]").forEach(b=>b.addEventListener("click",()=>{body.querySelectorAll("[data-b]").forEach(x=>x.setAttribute("aria-pressed","false"));b.setAttribute("aria-pressed","true");pb=b.dataset.b;api.sound("blip");}));
    api.onCheck(()=>{
      if(pa===null)return api.fail("Choose the inequality first — read the plate again.");
      if(pa==="gt")return api.fail("x > 12 leaves 12 itself OUT — but the plate says exactly 12 crates is enough to run.");
      if(pa==="le")return api.fail("x ≤ 12 points the wrong way: 'at least' allows MORE ballast, not less.");
      if(pa==="eq")return api.fail("x = 12 allows only exactly 12 — but 13 crates or 50 crates also satisfy 'at least 12.'");
      if(pb===null)return api.fail("The symbol is right! Now pick the graph that shows the same truth.");
      if(pb==="or")return api.fail("An OPEN circle means 12 is NOT included — but the lift runs with exactly 12. Look for a filled boundary.");
      if(pb==="cl")return api.fail("That ray slides toward values SMALLER than 12 — the lift needs 12 or MORE.");
      if(pb==="dot")return api.fail("A single point shows only x = 12. The rule is true for many values — where's the ray?");
      api.pass("x ≥ 12: closed circle at 12, ray to the right. The lift hums awake and lowers the crew deeper.");});
  }},
"g5":{title:"Gate 5 · Vent the Fog", icon:"#sig-vent", prompt:"Vent rule: <b>v &lt; 9</b>. Tap EVERY card whose value makes the rule true — those vents open. Tap a false one and the fog thickens.",hints:["Conceptual: v < 9 is STRICT — a value joins the solution set only if it is genuinely smaller than 9. The boundary fails its own rule: 9 < 9 is false.","Procedural: test the cards one at a time, decimals included. Practice with t < 4: 2 vents because 2 < 4 is true; 4.2 stays sealed because 4.2 < 4 is false."],worked:{"steps":["Find the solution set of n < 6 from the cards {2, 5.9, 6, 10}.","Test each: 2 < 6 true ✓ · 5.9 < 6 true ✓ · 6 < 6 FALSE ✗ · 10 < 6 false ✗.","Solution set: {2, 5.9}. A strict < never includes its own boundary."],"q":"Is 7.9 in the solution set of n < 8? (yes/no)","a":"yes"},render(body,api){

function tone(f,t,dur,type="square",vol=.04){const c=ac();if(!c||!prefs.sound)return;const o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,c.currentTime+t);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+t+dur);o.connect(g).connect(c.destination);o.start(c.currentTime+t);o.stop(c.currentTime+t+dur+.02)}
const SND={blip(){tone(660,0,.07)},flip(){tone(220,0,.09,"triangle",.05);tone(330,.05,.08,"triangle",.04)},win(){[523,659,784,1046].forEach((f,i)=>tone(f,i*.09,.14,"triangle",.05))},thud(){tone(110,0,.18,"sawtooth",.05)}};

/* ---------- helpers ---------- */

/* ---------- gate framework ---------- */
function mountGates(scope){

    const box=m.querySelector(".gatebox"),body=m.querySelector(".gwidget"),fb=m.querySelector(".gatefeedback"),hint=m.querySelector(".gatehint"),btn=m.querySelector(".gatecheck");

addEventListener("touchend",e=>{if(tx===null)return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>60&&!$(".modal.open"))step(dx<0?1:-1);tx=null},{passive:true});
mobileMQ.addEventListener("change",()=>renderSpread());

/* ---------- boot ---------- */
function openBook(){
  $("#cover").hidden=true;$("#hud").hidden=false;$("#stage").hidden=false;
  $("#prevBtn").hidden=false;$("#nextBtn").hidden=false;
  renderSpread();
}
$("#startBtn").addEventListener("click",()=>{ac();page=0;openBook()});
$("#resumeBtn").addEventListener("click",()=>{ac();openBook()});
if((storage.get(K("page"))||0)>0||solved.size>0){$("#resumeBtn").hidden=false}
if(reducedMQ.matches){prefs.motion=false}
document.body.classList.toggle("reduced",reducedMQ.matches);
buildBadges();syncToggles();buildProgress();
