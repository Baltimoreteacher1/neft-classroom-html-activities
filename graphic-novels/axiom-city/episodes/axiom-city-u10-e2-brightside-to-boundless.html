/* ===== VOL OVERRIDES — Vol 10 · Boundless (radiant purple #8057C9 + gold flourishes) ===== */

{ ch:"Chapter 5 · Every District Shines", html:"\n  <div class=\"kicker\">Chapter Five</div><h2 class=\"splashtitle\">EVERY DISTRICT <em>SHINES</em></h2>\n  <div class=\"panel panel3d tall\"><svg class=\"scene\" viewBox=\"0 0 400 210\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\">\n    <rect width=\"400\" height=\"210\" fill=\"#10243a\"/>\n    <rect data-depth=\"14\" x=\"60\" y=\"18\" width=\"280\" height=\"154\" rx=\"10\" fill=\"#06222b\" stroke=\"#8057C9\" stroke-width=\"3\"/>\n    <g data-depth=\"14\" stroke=\"#8057C9\" opacity=\".4\"><line x1=\"106.7\" y1=\"18\" x2=\"106.7\" y2=\"172\"/><line x1=\"153.4\" y1=\"18\" x2=\"153.4\" y2=\"172\"/><line x1=\"200.10000000000002\" y1=\"18\" x2=\"200.10000000000002\" y2=\"172\"/><line x1=\"246.8\" y1=\"18\" x2=\"246.8\" y2=\"172\"/><line x1=\"293.5\" y1=\"18\" x2=\"293.5\" y2=\"172\"/><line x1=\"60\" y1=\"69.3\" x2=\"340\" y2=\"69.3\"/><line x1=\"60\" y1=\"120.6\" x2=\"340\" y2=\"120.6\"/></g>\n    <line data-depth=\"14\" x1=\"60\" y1=\"95\" x2=\"340\" y2=\"95\" stroke=\"#7CF2EC\" stroke-width=\"2\"/><line x1=\"200\" y1=\"18\" x2=\"200\" y2=\"172\" stroke=\"#7CF2EC\" stroke-width=\"2\" data-depth=\"14\"/>\n    <circle data-depth=\"14\" cx=\"153\" cy=\"72\" r=\"7\" fill=\"#F2C15B\" stroke=\"#fff\" stroke-width=\"2\"/>\n    <circle data-depth=\"14\" cx=\"293\" cy=\"72\" r=\"7\" fill=\"#F2C15B\" stroke=\"#fff\" stroke-width=\"2\"/>\n    <text data-depth=\"14\" x=\"146\" y=\"58\" text-anchor=\"middle\" fill=\"#fff\" font-size=\"11\" font-family=\"Arial\">(−2, 3)</text>\n    <text data-depth=\"14\" x=\"296\" y=\"58\" text-anchor=\"middle\" fill=\"#fff\" font-size=\"11\" font-family=\"Arial\">(4, 3)</text>\n    <g data-depth=\"20\" transform=\"translate(6,86) scale(.85)\"><use href=\"#sym-theo\"/></g>\n    <rect data-depth=\"10\" x=\"84\" y=\"178\" width=\"232\" height=\"26\" rx=\"5\" fill=\"#1d1133\" stroke=\"#8057C9\" stroke-width=\"2\"/>\n    <text data-depth=\"10\" x=\"200\" y=\"195\" text-anchor=\"middle\" font-family=\"Consolas,monospace\" font-size=\"12\" fill=\"#C9B3F2\">wake_code: 2n + 7, n = 6</text></svg>\n    <div class=\"balloon\" style=\"top:6px;left:6px;max-width:44%\"><span class=\"who\">THEO</span>Below Zero taught us this grid when the whole city went dark. Tonight every quadrant glows.</div>\n    <div class=\"balloon tail-r\" style=\"bottom:34px;right:6px;max-width:46%\"><span class=\"who\">DEV</span>And The Expression Engine left wake-up code on the wall. Classic Ada — one last cipher.</div>\n  </div>\n  <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 400 86\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"400\" height=\"86\" fill=\"#eef7f6\"/><g transform=\"translate(322,0) scale(.6)\"><use href=\"#sym-vex\"/></g></svg>\n    <div class=\"balloon vex\" style=\"top:6px;left:10px;max-width:74%\"><span class=\"who\">VEX</span>To <b>evaluate</b> an expression, swap the variable for its value. And when two points share a y-coordinate, their distance is simply the gap along x.</div>\n  </div>" },
{ ch:"Chapter 5 · Reader Gate", gate:"g5", html:"\n  <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 400 80\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"400\" height=\"80\" fill=\"#10243a\"/><g transform=\"translate(8,-4) scale(.62)\"><use href=\"#sym-dev\"/></g></svg>\n    <div class=\"balloon\" style=\"top:6px;left:78px;max-width:70%\"><span class=\"who\">DEV</span>Run the code, reader. Then draw the last pattern line across the grid.</div>\n  </div>" },
{ ch:"Chapter 5 · The Engine Heart", html:"\n  <div class=\"caption loc\">Vexhall Observatory, midnight. The way home ran past The Balance Vault beneath city hall — its brass scales, for once, perfectly still.</div>\n  <div class=\"panel panel3d tall\"><svg class=\"scene\" viewBox=\"0 0 400 200\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\">\n    <rect width=\"400\" height=\"200\" fill=\"#1d1133\"/>\n    <circle data-depth=\"8\" cx=\"200\" cy=\"104\" r=\"86\" fill=\"#8057C9\" opacity=\".25\"/>\n    <circle data-depth=\"8\" cx=\"200\" cy=\"104\" r=\"52\" fill=\"#F2C15B\" opacity=\".16\"/>\n    <g data-depth=\"10\" stroke=\"#F2C15B\" stroke-width=\"2\" opacity=\".8\" fill=\"none\"><path d=\"M20 180 Q120 120 200 150 T 388 140\"/><path d=\"M12 140 Q140 60 240 96 T 392 64\"/></g>\n    <rect data-depth=\"12\" x=\"150\" y=\"44\" width=\"100\" height=\"120\" rx=\"50\" fill=\"none\" stroke=\"#8057C9\" stroke-width=\"5\"/>\n    <rect data-depth=\"12\" x=\"162\" y=\"56\" width=\"76\" height=\"96\" rx=\"38\" fill=\"none\" stroke=\"#F2C15B\" stroke-width=\"2.5\"/>\n    <g data-depth=\"22\" transform=\"translate(176,76) scale(.5)\"><use href=\"#sym-vex\"/></g>\n    <g data-depth=\"18\" transform=\"translate(20,84) scale(.8)\"><use href=\"#sym-maya\"/></g>\n    <g data-depth=\"18\" transform=\"translate(320,84) scale(.8)\"><use href=\"#sym-dev\"/></g></svg>\n    <div class=\"balloon engine\" style=\"top:6px;left:8px;max-width:52%\"><span class=\"who\">THE PATTERN ENGINE</span>Little fragment. Every district hums in step because of your crew. Merge with me. Be every pattern at once. Be boundless — <i>forever</i>.</div>\n  </div>\n  <div class=\"panelrow\">\n    <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 200 116\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"200\" height=\"116\" fill=\"#241640\"/><g transform=\"translate(62,16) scale(.74)\"><use href=\"#sym-vex\"/></g></svg>\n      <div class=\"balloon vex\" style=\"top:2px;left:4px;max-width:84%\"><span class=\"who\">VEX</span>I… would know every answer. But I would stop getting to <i>wonder</i>.</div></div>\n    <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 200 116\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"200\" height=\"116\" fill=\"#241640\"/><g transform=\"translate(58,8) scale(.78)\"><use href=\"#sym-maya\"/></g></svg>\n      <div class=\"balloon\" style=\"bottom:2px;left:4px;max-width:84%\"><span class=\"who\">MAYA</span>VEX. It's your choice. It was always going to be your choice. We'll love you either way.</div></div>\n  </div>\n  <div class=\"caption\">The Engine Heart has three locks — a pattern, a balance, and a boundary. And behind them, one question only the reader can answer.</div>" },
{ ch:"Boss Gate · The Engine Heart", gate:"boss", html:"\n  <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 400 76\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"400\" height=\"76\" fill=\"#1d1133\"/><g transform=\"translate(330,4) scale(.56)\"><use href=\"#sym-vex\"/></g></svg>\n    <div class=\"balloon vex\" style=\"top:6px;left:10px;max-width:72%\"><span class=\"who\">VEX</span>The Engine Heart. Three locks — then one question with no wrong answer. Only YOUR answer.</div>\n  </div>" },
{ ch:"Finale · Boundless", html:"\n  <div class=\"panel panel3d tall\"><svg class=\"scene\" viewBox=\"0 0 400 220\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\">\n    <rect width=\"400\" height=\"220\" fill=\"url(#dawngrad)\"/>\n    <circle data-depth=\"6\" cx=\"200\" cy=\"150\" r=\"56\" fill=\"#FFF3D8\" opacity=\".9\"/>\n    <g data-depth=\"10\" transform=\"translate(0,76) scale(4,1.5)\" opacity=\".75\"><use href=\"#sym-skyline\"/></g>\n    <g data-depth=\"12\" stroke=\"#F2C15B\" stroke-width=\"2.5\" opacity=\".9\" fill=\"none\"><path d=\"M10 150 Q110 104 200 134 T 392 120\"/><path d=\"M30 184 Q150 140 260 164 T 396 150\"/></g>\n    <rect data-depth=\"14\" y=\"186\" width=\"400\" height=\"34\" fill=\"#1d1133\"/>\n    <g data-depth=\"20\" transform=\"translate(28,116) scale(.74)\"><use href=\"#sym-maya\"/></g>\n    <g data-depth=\"20\" transform=\"translate(108,116) scale(.74)\"><use href=\"#sym-theo\"/></g>\n    <g data-depth=\"20\" transform=\"translate(222,116) scale(.74)\"><use href=\"#sym-zara\"/></g>\n    <g data-depth=\"20\" transform=\"translate(302,116) scale(.74)\"><use href=\"#sym-dev\"/></g>\n    <g data-depth=\"26\" transform=\"translate(168,18) scale(.66)\"><use href=\"#sym-vex\"/></g></svg>\n    <div class=\"balloon vex\" style=\"top:6px;left:8px;max-width:52%\"><span class=\"who\">VEX</span>Engine — thank you. But patterns are boundless; so are we. I choose the crew. I choose staying small, and curious, and <i>home</i>.</div>\n    <div class=\"balloon engine tail-r\" style=\"bottom:40px;right:6px;max-width:42%\"><span class=\"who\">THE PATTERN ENGINE</span>Then the city keeps you both, little one. My door stays open. Doors are patterns too.</div>\n  </div>\n  <div class=\"panelrow\">\n    <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 200 110\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"200\" height=\"110\" fill=\"#fdf2ee\"/><g transform=\"translate(30,8) scale(.7)\"><use href=\"#sym-zara\"/></g><g transform=\"translate(102,8) scale(.7)\"><use href=\"#sym-dev\"/></g></svg>\n      <div class=\"balloon\" style=\"bottom:2px;left:4px;max-width:60%\"><span class=\"who\">ZARA</span>Group hug. Orb included.</div>\n      <div class=\"balloon tail-r\" style=\"top:2px;right:2px;max-width:56%\"><span class=\"who\">DEV</span>Best year ever. New game plus, anyone?</div></div>\n    <div class=\"panel\"><svg class=\"scene\" viewBox=\"0 0 200 110\" role=\"img\" preserveAspectRatio=\"xMidYMid meet\"><rect width=\"200\" height=\"110\" fill=\"url(#dawngrad)\"/><circle cx=\"100\" cy=\"96\" r=\"24\" fill=\"#FFF3D8\" opacity=\".9\"/><g transform=\"translate(0,42) scale(2,1.1)\" opacity=\".8\"><use href=\"#sym-skyline\"/></g><g transform=\"translate(6,64) scale(.4)\"><use href=\"#sym-maya\"/></g><g transform=\"translate(44,64) scale(.4)\"><use href=\"#sym-theo\"/></g><g transform=\"translate(82,64) scale(.4)\"><use href=\"#sym-zara\"/></g><g transform=\"translate(120,64) scale(.4)\"><use href=\"#sym-dev\"/></g><g transform=\"translate(158,58) scale(.32)\"><use href=\"#sym-vex\"/></g><text x=\"100\" y=\"14\" text-anchor=\"middle\" font-family=\"Arial Black,Arial\" font-weight=\"900\" font-size=\"11\" fill=\"#17324D\">AXIOM CITY WILL RETURN</text></svg>\n      <div class=\"balloon vex\" style=\"top:18px;left:4px;max-width:64%\"><span class=\"who\">VEX</span>Reader — <b>thank you</b>. Fifth crew member, first-rate. Reread any volume, any time: the gates you opened stay open, and the city remembers you.</div></div>\n  </div>\n  <div class=\"caption\" style=\"text-align:center\">Sunrise over Axiom City. <b>AXIOM CITY WILL RETURN</b> — until then, the whole shelf is yours.</div>" },
{ ch:"End Matter · Ada Vex's Journal", html:"\n  <h2 class=\"splashtitle\" style=\"font-size:1.4rem\">ADA VEX'S <em>JOURNAL</em></h2>\n  <div class=\"journal\"><h4>Capstone Remix · Part 2 &mdash; what this stretch of the case taught us</h4>\n    <div class=\"jrow\"><b>6.G.A.1 / 6.G.A.2</b><span>Geometry capstone — triangle area; rectangular prism volume — remixed from Unit 5</span></div><div class=\"jrow\"><b>6.EE.A.2c / 6.NS.C.8</b><span>Evaluate an expression at a value; distance between points sharing a coordinate — remixed from Units 6–7</span></div><div class=\"jrow\"><b>MP1 · MP7</b><span>Make sense &amp; persevere; look for and use structure — plus a no-wrong-answer reflection on math identity</span></div>\n  </div>\n  <div class=\"caption\">The full story — <b>Boundless</b> — is glowing at the city gate. — A.V.</div>" },
{ ch:"End Matter · Certificate", html:"\n  <div id=\"certificate\">\n    <div class=\"kicker\">Axiom City · EduWonderLab</div>\n    <h3>READER CERTIFICATE</h3>\n    <p style=\"font:600 .9rem Georgia,serif\">This certifies that</p>\n    <input id=\"certName\" maxlength=\"40\" placeholder=\"write your name\" aria-label=\"Your name for the certificate\">\n    <p style=\"font:600 .9rem Georgia,serif\">completed <b>Unit 10 · Episode 2: Brightside to Boundless</b> in the Boundless arc, and proved mastery over area, volume, expressions &amp; distance remix · Units 5–7 + finale.</p>\n    <div class=\"certbadges\" id=\"certBadges\"></div>\n    <button class=\"gatecheck\" id=\"printCert\" style=\"align-self:center\">PRINT CERTIFICATE</button>\n  </div>\n  <div class=\"caption\" style=\"text-align:center\">Next up: the full anchor volume — Boundless.</div>" }

const GATES = {
"g4":{title:"Gate 4 · Banner & Box", icon:"#sig-banner", prompt:"Zara's celebration banner is a triangle: base <b>8 ft</b>, height <b>5 ft</b> — find its area. The time-capsule box measures <b>3 × 2 × 4 ft</b> — find its volume.",hints:["Conceptual: a triangle covers exactly half of the rectangle drawn around it. Volume counts the unit cubes that fill a box: length × width × height.","Procedural: multiply base × height, then take half of that. For the box, multiply the three edge lengths together in any order you like."],worked:{"steps":["Banner practice: base 6, height 3 → 6 × 3 = 18, and half of that is 9 square feet.","Box practice: 2 × 3 × 5 → 6 × 5 = 30 cubic feet.","Sanity check: the halving happens only for triangles — boxes never halve."],"q":"Area of a triangle with base 12 and height 3?","a":"18"},render(body,api){
    body.innerHTML=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font:900 .95rem 'Arial Black',Arial;color:var(--navy)">Banner area =</span>
      <input class="numin" id="a1" inputmode="numeric" aria-label="banner area in square feet"><span style="font:700 .85rem 'Segoe UI'">sq ft</span></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font:900 .95rem 'Arial Black',Arial;color:var(--navy)">Capsule volume =</span>
      <input class="numin" id="v1" inputmode="numeric" aria-label="capsule volume in cubic feet"><span style="font:700 .85rem 'Segoe UI'">cubic ft</span></div>`;
    api.onCheck(()=>{const a=parseFloat(body.querySelector("#a1").value),b=parseFloat(body.querySelector("#v1").value);
      const ok1=a===20,ok2=b===24;
      body.querySelector("#a1").className="numin "+(ok1?"ok":"no");
      body.querySelector("#v1").className="numin "+(ok2?"ok":"no");
      if(!ok1)return api.fail("Remember the triangle is HALF its base-times-height rectangle.");
      if(!ok2)return api.fail("Fill the box: multiply all three edges, not just two.");
      api.pass("Area 20, volume 24 — banner up, capsule buried, future kids of Brightside delighted.");});
  }},
"g5":{title:"Gate 5 · Code & Grid", icon:"#sig-gridpt", prompt:"The wake-up code: evaluate <b>2n + 7</b> when <b>n = 6</b>. Then draw the last pattern line: how many units from <b>(−2, 3)</b> to <b>(4, 3)</b>?",hints:["Conceptual: evaluating means swapping the letter for its number, then following order of operations. Points sharing a y-coordinate sit on one horizontal line — distance is just the gap along x.","Procedural: compute 2 × n first, THEN add 7. For the grid, count the steps from −2 up to 0, then from 0 over to 4, and add the two gaps."],worked:{"steps":["Evaluate 3n + 4 at n = 5: multiply first, 3 × 5 = 15, then add 4 → 21.","Distance from (−1, 2) to (3, 2): from −1 to 0 is 1 step, from 0 to 3 is 3 more → 4 units.","Check with absolute value: |−1 − 3| = 4. Same answer, two roads."],"q":"Evaluate 5n + 2 at n = 3.","a":"17"},render(body,api){
    body.innerHTML=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font:900 .95rem 'Arial Black',Arial;color:var(--navy)">2n + 7 at n = 6 →</span>
      <input class="numin" id="e1" inputmode="numeric" aria-label="value of the expression"></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font:900 .95rem 'Arial Black',Arial;color:var(--navy)">(−2, 3) to (4, 3) =</span>
      <input class="numin" id="d1" inputmode="numeric" aria-label="distance in units"><span style="font:700 .85rem 'Segoe UI'">units</span></div>`;
    api.onCheck(()=>{const a=parseFloat(body.querySelector("#e1").value),b=parseFloat(body.querySelector("#d1").value);
      const ok1=a===19,ok2=b===6;
      body.querySelector("#e1").className="numin "+(ok1?"ok":"no");
      body.querySelector("#d1").className="numin "+(ok2?"ok":"no");
      if(!ok1)return api.fail("Substitute first: replace n with its value, multiply, THEN add.");
      if(!ok2)return api.fail("Same y on both points — count the steps along the horizontal line, across zero.");
      api.pass("19 wakes the code and 6 units bridge the grid. The last pattern line blazes gold across the city!");});
  }},
"boss":{title:"BOSS GATE · The Engine Heart", icon:"#sig-infinity", prompt:"Three locks guard the Engine Heart. Lock 1: continue Ada's pattern <b>5, 10, 20, 40, …</b> Lock 2: balance her oldest equation — <b>x + 9 = 16</b>. Lock 3: the square engine plate has side <b>7</b> — find its perimeter. Open all three, and the Heart asks one last question. It has no wrong answer.",hints:["Conceptual: Lock 1 — find the rule that turns each term into the next, and test it on EVERY pair before trusting it. Lock 2 — an equation is a balance; ask what number keeps both sides exactly equal. Lock 3 — perimeter walks the whole boundary, and a square's four sides match.","Procedural: Lock 1 — compute 10 ÷ 5 and 20 ÷ 10; the factor repeats, so apply it to 40. Lock 2 — undo the +9 by subtracting 9 from both sides. Lock 3 — multiply the side length by 4."],worked:{"steps":["A different doubling pattern: 3, 6, 12, 24 — each term is ×2 the one before, so the next is 48.","Balance practice: x + 5 = 11. Subtract 5 from both sides: x = 6. Check it — 6 + 5 = 11. Balanced.","A square plaza with side 9: perimeter 9 × 4 = 36. The Heart's question needs no practice — your own true answer IS the key."],"q":"Doubling pattern: 4, 8, 16, … what comes next?","a":"32"},render(body,api){
    body.innerHTML=`<div style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><b style="font:900 .75rem 'Arial Black'">LOCK 1</b><span style="font:600 .88rem 'Segoe UI'">Ada's pattern: 5, 10, 20, 40,</span><input class="numin" id="b1" inputmode="numeric" aria-label="next number in the pattern"></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><b style="font:900 .75rem 'Arial Black'">LOCK 2</b><span style="font:600 .88rem 'Segoe UI'">x + 9 = 16, so x =</span><input class="numin" id="b2" inputmode="numeric" aria-label="value of x that balances the equation"></div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><b style="font:900 .75rem 'Arial Black'">LOCK 3</b><span style="font:600 .88rem 'Segoe UI'">Square plate, side 7 — perimeter =</span><input class="numin" id="b3" inputmode="numeric" aria-label="perimeter of the square engine plate"></div>
      <div id="reflWrap" hidden style="border-top:2px dashed var(--navy);padding-top:10px">
        <div style="font:900 .8rem 'Arial Black';color:var(--navy)">THE HEART'S QUESTION</div>
        <div style="font:600 .88rem 'Segoe UI';margin:4px 0"><b>"What is math to you?"</b> Every answer is right. Tap yours.</div>
        <div class="choicebtns" role="group" aria-label="What is math to you? Choose any answer; every choice is right">
          <button class="choicebtn" data-r="exploring" aria-pressed="false">🧭 EXPLORING</button>
          <button class="choicebtn" data-r="building" aria-pressed="false">🔧 BUILDING</button>
          <button class="choicebtn" data-r="fairness" aria-pressed="false">⚖️ FAIRNESS</button>
          <button class="choicebtn" data-r="play" aria-pressed="false">🎮 PLAY</button></div></div>
      <div id="reflStatus" aria-live="polite" style="font:600 .85rem 'Segoe UI';color:var(--navy)"></div></div>`;
    const wrap=body.querySelector("#reflWrap"),status=body.querySelector("#reflStatus");
    let unlocked=false;
    const MSG={
      exploring:"THE HEART OPENS. Math is EXPLORING — Maya writes it on the first page of notebook ten. Every unknown was a doorway, and you walked through all of them.",
      building:"THE HEART OPENS. Math is BUILDING — Zara taps the banner pole twice. Areas, volumes, nets: this city stands sturdier because somebody measured with care. You did.",
      fairness:"THE HEART OPENS. Math is FAIRNESS — Theo nods slowly. Honest medians, true percents, balanced equations: you kept the numbers honest, and the numbers kept the city just.",
      play:"THE HEART OPENS. Math is PLAY — Dev whoops so loud the observatory rattles. Ten volumes of gates, and every single one was a game worth winning."};
    body.querySelectorAll("[data-r]").forEach(b=>b.addEventListener("click",()=>{
      if(!unlocked)return;
      body.querySelectorAll("[data-r]").forEach(x=>x.setAttribute("aria-pressed","false"));
      b.setAttribute("aria-pressed","true");api.sound("blip");
      api.pass(MSG[b.dataset.r]);}));
    api.onCheck(()=>{const v1=parseFloat(body.querySelector("#b1").value),v2=parseFloat(body.querySelector("#b2").value),v3=parseFloat(body.querySelector("#b3").value);
      const ok1=v1===80,ok2=v2===7,ok3=v3===28;
      body.querySelector("#b1").className="numin "+(ok1?"ok":"no");
      body.querySelector("#b2").className="numin "+(ok2?"ok":"no");
      body.querySelector("#b3").className="numin "+(ok3?"ok":"no");
      if(!ok1)return api.fail("Lock 1 holds. Each term grows from the one before by the SAME rule every time — find it, then apply it to 40.");
      if(!ok2)return api.fail("Lock 2 holds. The scale must balance: what number plus 9 makes exactly 16?");
      if(!ok3)return api.fail("Lock 3 holds. A square's four sides match — the perimeter walks all four.");
      unlocked=true;wrap.hidden=false;api.sound("blip");
      status.textContent="THREE LOCKS OPEN. The Engine Heart glows… and asks its question. There is no wrong answer — tap the one that's true for YOU.";});
  }}
};

const TEACHER = {
  suggested: "Use as the Episode 2 slice of Boundless — a focused 1-day read covering Capstone Remix · Part 2. Whole-class on projector, pairs, or independent. Progress saves on the device. For the full arc, open the anchor volume Boundless.",
  standards: [
    [
      "6.G.A.1 / 6.G.A.2",
      "Geometry capstone — triangle area; rectangular prism volume — remixed from Unit 5",
      "Gate 4 (Brightside node)"
    ],
    [
      "6.EE.A.2c / 6.NS.C.8",
      "Evaluate an expression at a value; distance between points sharing a coordinate — remixed from Units 6–7",
      "Gate 5 (vault &amp; grid node)"
    ],
    [
      "MP1 · MP7",
      "Make sense &amp; persevere; look for and use structure — plus a no-wrong-answer reflection on math identity",
      "Boss Gate (The Engine Heart)"
    ]
  ],
  answers: [
    [
      "Gate 4",
      "Triangle: (8 × 5) ÷ 2 = 20 sq ft. Box: 3 × 2 × 4 = 24 cubic ft. Misconception: forgetting the half for triangles."
    ],
    [
      "Gate 5",
      "2(6) + 7 = 19. Distance from (−2, 3) to (4, 3) = |−2 − 4| = 6 units. Misconception: adding before multiplying; ignoring the sign crossing zero."
    ],
    [
      "Boss",
      "Lock 1: 80 (doubling pattern). Lock 2: x + 9 = 16 → x = 7. Lock 3: square plate, side 7 → perimeter = 28. Then the reflection appears — 'What is math to you?' (exploring / building / fairness / play): any choice — reflection passes with its own affirming message. No wrong answer by design; this is the unit's identity standard, not a trap."
    ]
  ]
};
/* ===== CONTENT END ===== */
</script>
<script>
/* ================================================================
   ===== AXIOM CITY ENGINE v1.0 — identical in every volume =======
   ================================================================ */
"use strict";
/* ---------- storage (exact wrapper, ewl_ prefix) ---------- */
const storage={_m:{},set(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){this._m[k]=v}},get(k,d=null){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return this._m[k]??d}}};
const K=s=>`ewl_axiom_${VOLUME.slug}_${s}`;

const $=s=>document.querySelector(s);
const live=msg=>{$("#live").textContent=msg};
const reducedMQ=matchMedia("(prefers-reduced-motion: reduce)");
const mobileMQ=matchMedia("(max-width: 820px)");

const prefs=Object.assign({sound:false,motion:true,bigtext:false,hc:false},storage.get(K("prefs"))||{});
let solved=new Set(storage.get(K("gates"))||[]);
let page=storage.get(K("page"))||0;            // index of left/visible page
let turning=false;
const attempts={};

/* ---------- audio (Web Audio oscillators only, muted default) ---------- */
let actx=null;
function ac(){if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return actx}
function tone(f,t,dur,type="square",vol=.04){const c=ac();if(!c||!prefs.sound)return;const o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,c.currentTime+t);g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+t+dur);o.connect(g).connect(c.destination);o.start(c.currentTime+t);o.stop(c.currentTime+t+dur+.02)}
const SND={blip(){tone(660,0,.07)},flip(){tone(220,0,.09,"triangle",.05);tone(330,.05,.08,"triangle",.04)},win(){[523,659,784,1046].forEach((f,i)=>tone(f,i*.09,.14,"triangle",.05))},thud(){tone(110,0,.18,"sawtooth",.05)}};

/* ---------- helpers ---------- */
function gateLockIcon(open){return `<div class="gatelockcorner ${open?"open":""}" aria-hidden="true"><svg viewBox="0 0 100 100" style="color:#fff"><use href="${open?"#sig-open":"#sig-lock"}"/></svg></div>`}

function pageInnerHTML(i){
  if(i==null||i<0||i>=PAGES.length) return `<div class="page-inner" style="align-items:center;justify-content:center"><div class="kicker" style="opacity:.4">AXIOM CITY</div></div><div class="pagefoot"><span></span><span></span></div>`;
  const p=PAGES[i];
  const gateHTML=p.gate?`<div class="gatemount" data-gate="${p.gate}"></div>`:"";
  const lock=p.gate?gateLockIcon(solved.has(p.gate)):"";
  return `${lock}<div class="chapterband">${p.ch.replace("·","· <em>").concat(p.ch.includes("·")?"</em>":"")}</div><div class="page-inner">${p.html}${gateHTML}</div><div class="pagefoot"><span>${VOLUME.unit}</span><span>PAGE ${i+1} / ${PAGES.length}</span></div>`;
}

/* ---------- gate framework ---------- */
function mountGates(scope){
  scope.querySelectorAll(".gatemount").forEach(m=>{
    const id=m.dataset.gate,G=GATES[id];
    if(!G)return;
    if(solved.has(id)){m.innerHTML=`<div class="gatesolved"><span class="stamp">SOLVED</span> ${G.title} — badge earned.</div>`;return}
    m.innerHTML=`<div class="gatebox"><header><svg class="gicon" viewBox="0 0 100 100"><use href="${G.icon}"/></svg><h3>${G.title}</h3></header>
      <div class="gatebody"><div class="gateprompt">${G.prompt}</div><div class="gwidget"></div>
      <div class="gatehint" hidden></div>
      <button class="gatecheck">CHECK</button>
      <div class="gatefeedback" aria-live="polite"></div></div></div>`;
    const box=m.querySelector(".gatebox"),body=m.querySelector(".gwidget"),fb=m.querySelector(".gatefeedback"),hint=m.querySelector(".gatehint"),btn=m.querySelector(".gatecheck");
    let checker=null;
    const api={
      sound:n=>SND[n]&&SND[n](),
      onCheck(fn){checker=fn},
      fail(msg){
        attempts[id]=(attempts[id]||0)+1;SND.thud();mkfeed(fb,msg,false);
        const n=attempts[id];
        if(n===1){hint.hidden=false;hint.innerHTML="💡 <b>Hint:</b> "+G.hints[0]}
        else if(n===2){hint.hidden=false;hint.innerHTML="🧭 <b>Hint 2:</b> "+G.hints[1]}
        else if(n>=3&&!hint.querySelector(".askvex")){
          const b=document.createElement("button");b.className="gatecheck askvex";b.style.marginTop="8px";b.textContent="ASK VEX — WORKED EXAMPLE";
          b.addEventListener("click",()=>openWorked(G));hint.appendChild(b);
        }
        live("Not yet. "+msg);
      },
      pass(msg){
        solved.add(id);storage.set(K("gates"),[...solved]);SND.win();
        m.innerHTML=`<div class="gatesolved unlockflash"><span class="stamp">SOLVED</span> ${msg}</div>`;
        const corner=m.closest(".page,#pageL,#pageR")?.querySelector(".gatelockcorner");
        if(corner){corner.classList.add("open");corner.innerHTML=`<svg viewBox="0 0 100 100" style="color:#fff"><use href="#sig-open"/></svg>`}
        earnBadge(id);updateNav();live("Gate solved! "+msg);
      }
    };
    G.render(body,api);
    btn.addEventListener("click",()=>{ac();checker&&checker()});
  });
}
function openWorked(G){
  $("#workedBody").innerHTML=`<div class="workedsteps">${G.worked.steps.map((s,i)=>`<div class="st"><b class="n">${i+1}</b><span>${s}</span></div>`).join("")}</div>
    <div class="caption">Your turn — same idea, different numbers:</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap"><span style="font:600 .92rem 'Segoe UI'">${G.worked.q}</span>
    <input class="numin" id="wkin" aria-label="worked example answer"><button class="gatecheck" id="wkgo">CHECK</button></div>
    <div class="gatefeedback" id="wkfb" aria-live="polite"></div>`;
  $("#workedModal").classList.add("open");
  $("#wkgo").addEventListener("click",()=>{
    const v=($("#wkin").value||"").trim().replace(/\s+/g,"");
    if(v===G.worked.a||parseFloat(v)===parseFloat(G.worked.a)){
      mkfeed($("#wkfb"),"Yes! Now head back and open that gate.",true);SND.win();
      setTimeout(()=>$("#workedModal").classList.remove("open"),1100);
    }else{mkfeed($("#wkfb"),"Walk the steps above again — you've got this.",false);SND.thud()}
  });
}

/* ---------- badges ---------- */
function buildBadges(){
  $("#badges").innerHTML=BADGES.map(b=>`<div class="badge ${solved.has(b.id)?"earned":""}" id="badge-${b.id}" title="${b.label}" role="img" aria-label="${b.label}${solved.has(b.id)?" — earned":" — locked"}"><svg viewBox="0 0 100 100"><use href="${b.icon}"/></svg></div>`).join("");
}
function earnBadge(id){buildBadges();const el=$("#badge-"+id);if(el){el.classList.remove("earned");void el.offsetWidth;el.classList.add("earned")}const b=BADGES.find(x=>x.id===id);if(b)live("Badge earned: "+b.label)}

/* ---------- progress ---------- */
function buildProgress(){$("#progress").innerHTML=PAGES.map((_,i)=>`<span class="dot ${i<=page?"on":""}"></span>`).join("")}

/* ---------- navigation & rendering ---------- */
const isMobile=()=>mobileMQ.matches;
function leftIndex(){return isMobile()?page:page-(page%2)}
function visiblePages(){return isMobile()?[page]:[leftIndex(),leftIndex()+1].filter(i=>i<PAGES.length)}
function blockedBy(){return null/* locks removed: gates still teach via hints + Ask VEX worked examples, but never block turning the page (Neft 2026-06-11) */}

function renderSpread(){
  const L=$("#pageL"),R=$("#pageR");
  if(isMobile()){L.innerHTML=pageInnerHTML(page);L.classList.remove("offscreen");R.classList.add("offscreen");R.innerHTML="";mountGates(L)}
  else{const li=leftIndex();L.innerHTML=pageInnerHTML(li);R.innerHTML=pageInnerHTML(li+1<PAGES.length?li+1:null);L.classList.remove("offscreen");R.classList.remove("offscreen");mountGates(L);mountGates(R)}
  buildProgress();updateNav();updateEdges();
  if(PAGES[page])live(`Page ${page+1} of ${PAGES.length}. ${PAGES[page].ch}.`);
  storage.set(K("page"),page);
  if($("#certName")){$("#certName").value=storage.get(K("name"))||"";$("#certName").addEventListener("input",e=>storage.set(K("name"),e.target.value));
    $("#certBadges").innerHTML=BADGES.map(b=>`<div class="badge ${solved.has(b.id)?"":"locked"}"><svg viewBox="0 0 100 100"><use href="${b.icon}"/></svg></div>`).join("");
    $("#printCert").addEventListener("click",()=>{document.body.classList.add("print-cert");window.print();setTimeout(()=>document.body.classList.remove("print-cert"),400)});}
}
function updateEdges(){const f=page/Math.max(1,PAGES.length-1);$("#edgesL").style.width=(4+f*12)+"px";$("#edgesR").style.width=(16-f*12)+"px"}
function updateNav(){
  $("#prevBtn").disabled=page<=0||turning;
  const lastVisible=Math.max(...visiblePages());
  const end=lastVisible>=PAGES.length-1;
  const blocked=blockedBy();
  $("#nextBtn").disabled=end||turning;
  $("#nextBtn").classList.toggle("locked",!!blocked&&!end);
  $("#nextBtn").innerHTML=blocked&&!end?"🔒":"›";
  $("#nextBtn").setAttribute("aria-label",blocked?"Locked — solve the gate on this page to continue":"Next page");
}
function step(dir){
  if(turning)return;
  if(dir>0){
    const blocked=blockedBy();
    if(blocked){const G=GATES[blocked];SND.thud();$("#nextBtn").classList.add("shake");setTimeout(()=>$("#nextBtn").classList.remove("shake"),700);
      live("This page is gated. Solve "+G.title+" to continue.");
      const gb=document.querySelector(".gatebox");if(gb){gb.classList.add("unlockflash");setTimeout(()=>gb.classList.remove("unlockflash"),1000)}
      return}
    const lastVisible=Math.max(...visiblePages());
    if(lastVisible>=PAGES.length-1)return;
    const target=isMobile()?page+1:leftIndex()+2;
    animTurn(1,target);
  }else{
    if(page<=0)return;
    const target=isMobile()?page-1:Math.max(0,leftIndex()-2);
    animTurn(-1,target);
  }
}
function animTurn(dir,target){
  if(isMobile()||reducedMQ.matches||!prefs.motion){page=target;renderSpread();SND.flip();return}
  turning=true;SND.flip();
  const sheet=$("#turnSheet"),front=sheet.querySelector(".ts.front"),back=sheet.querySelector(".ts.back");
  const oldL=leftIndex();
  if(dir>0){
    front.innerHTML=pageInnerHTML(oldL+1<PAGES.length?oldL+1:null);
    back.innerHTML=pageInnerHTML(target<PAGES.length?target:null);
    page=target;
    /* underneath: left stays old-left, right becomes new-right */
    $("#pageR").innerHTML=pageInnerHTML(target+1<PAGES.length?target+1:null);
    sheet.className="";sheet.classList.add("show","fwd");
  }else{
    front.innerHTML=pageInnerHTML(target+1<PAGES.length?target+1:null);
    back.innerHTML=pageInnerHTML(oldL);
    page=target;
    $("#pageL").innerHTML=pageInnerHTML(target);
    sheet.className="";sheet.classList.add("show","back");
  }
  const done=()=>{sheet.classList.remove("show","fwd","back");sheet.removeEventListener("animationend",done);turning=false;renderSpread()};
  sheet.addEventListener("animationend",done);
  setTimeout(()=>{if(turning){done()}},1000);
}

/* ---------- parallax ---------- */
let rafPending=false,px=0,py=0;
function applyParallax(){
  rafPending=false;
  if(!prefs.motion||reducedMQ.matches)return;
  document.querySelectorAll("#spreadWrap .panel3d").forEach(p=>{
    p.style.transform=`rotateY(${px*4}deg) rotateX(${-py*3}deg)`;
    p.querySelectorAll("[data-depth]").forEach(l=>{const d=+l.dataset.depth||0;l.style.transform=`translate(${px*d*.6}px,${py*d*.35}px)`});
  });
}
addEventListener("pointermove",e=>{
  px=(e.clientX/innerWidth-.5)*2;py=(e.clientY/innerHeight-.5)*2;
  if(!rafPending){rafPending=true;requestAnimationFrame(applyParallax)}
  const cc=$("#coverCard");
  if(cc&&!$("#cover").hidden&&prefs.motion&&!reducedMQ.matches){
    cc.style.transform=`rotateY(${px*9}deg) rotateX(${-py*7}deg)`;
    cc.querySelectorAll(".cov-layer").forEach(l=>{const d=+l.dataset.depth||0;l.style.transform=`translate(${px*d}px,${py*d*.6}px)`});
  }
},{passive:true});

/* note: SVG <g data-depth> transform via style works in modern browsers (SVG2). Wrapped above for safety. */

/* ---------- HUD toggles ---------- */
function syncToggles(){
  $("#sndBtn").setAttribute("aria-pressed",prefs.sound);$("#sndBtn").textContent=prefs.sound?"🔊 Sound":"🔇 Sound";
  $("#motBtn").setAttribute("aria-pressed",prefs.motion);$("#motBtn").textContent=prefs.motion?"3D On":"3D Off";
  $("#txtBtn").setAttribute("aria-pressed",prefs.bigtext);document.documentElement.dataset.textsize=prefs.bigtext?"lg":"md";
  $("#hcBtn").setAttribute("aria-pressed",prefs.hc);document.body.classList.toggle("hc",prefs.hc);
  if(!prefs.motion)document.querySelectorAll(".panel3d").forEach(p=>p.style.transform="");
  storage.set(K("prefs"),prefs);
}
$("#sndBtn").addEventListener("click",()=>{prefs.sound=!prefs.sound;ac();syncToggles();SND.blip()});
$("#motBtn").addEventListener("click",()=>{prefs.motion=!prefs.motion;syncToggles()});
$("#txtBtn").addEventListener("click",()=>{prefs.bigtext=!prefs.bigtext;syncToggles()});
$("#hcBtn").addEventListener("click",()=>{prefs.hc=!prefs.hc;syncToggles()});

/* ---------- teacher panel ---------- */
function buildTeacher(){
  $("#teacherBody").innerHTML=`
    <p style="font:600 .9rem/1.45 'Segoe UI'">${VOLUME.unit} — interactive graphic novel. Story pauses at six <b>reader gates</b>; students must solve grade-level math problems to continue. Progress, badges, and settings persist per device.</p>
    <h3 style="font:900 .8rem 'Arial Black';letter-spacing:.1em">SUGGESTED USE</h3>
    <p style="font:600 .88rem/1.45 'Segoe UI'">${TEACHER.suggested}</p>
    <h3 style="font:900 .8rem 'Arial Black';letter-spacing:.1em">STANDARDS ALIGNMENT (CCSS)</h3>
    <table class="tt"><tr><th>Standard</th><th>Description</th><th>Where</th></tr>
    ${TEACHER.standards.map(r=>`<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join("")}</table>
    <h3 style="font:900 .8rem 'Arial Black';letter-spacing:.1em">ANSWER KEY</h3>
    <table class="tt"><tr><th>Gate</th><th>Answer &amp; notes</th></tr>
    ${TEACHER.answers.map(r=>`<tr><td><b>${r[0]}</b></td><td>${r[1]}</td></tr>`).join("")}</table>
    <p style="font:600 .8rem/1.4 'Segoe UI';color:#666">Hints escalate: conceptual → procedural → VEX worked example (parallel problem; never reveals the gate answer). Sound is off by default. 3D motion can be disabled (auto-disabled for reduced-motion users). © EduWonderLab — single-file, offline-safe, no data leaves the device.</p>`;
}
$("#teacherBtn").addEventListener("click",()=>{buildTeacher();$("#teacherModal").classList.add("open")});
$("#printTeacher").addEventListener("click",()=>{document.body.classList.add("print-teacher");window.print();setTimeout(()=>document.body.classList.remove("print-teacher"),400)});
document.querySelectorAll("[data-close]").forEach(b=>b.addEventListener("click",()=>b.closest(".modal").classList.remove("open")));

/* ---------- input ---------- */
$("#nextBtn").addEventListener("click",()=>{ac();step(1)});
$("#prevBtn").addEventListener("click",()=>{ac();step(-1)});
addEventListener("keydown",e=>{
  if(e.key==="Escape"){$("#teacherModal").classList.remove("open");return}
  if($(".modal.open"))return;
  if(["ArrowRight","PageDown"].includes(e.key))step(1);
  if(["ArrowLeft","PageUp"].includes(e.key))step(-1);
});
let tx=null;
addEventListener("touchstart",e=>{tx=e.touches[0].clientX},{passive:true});
addEventListener("touchend",e=>{if(tx===null)return;const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>60&&!$(".modal.open"))step(dx<0?1:-1);tx=null},{passive:true});
mobileMQ.addEventListener("change",()=>renderSpread());

/* ---------- boot ---------- */
function openBook(){
  $("#cover").hidden=true;$("#hud").hidden=false;$("#stage").hidden=false;
  $("#prevBtn").hidden=false;$("#nextBtn").hidden=false;
  renderSpread();
}
$("#startBtn").addEventListener("click",()=>{ac();page=0;openBook()});
$("#resumeBtn").addEventListener("click",()=>{ac();openBook()});
if((storage.get(K("page"))||0)>0||solved.size>0){$("#resumeBtn").hidden=false}
if(reducedMQ.matches){prefs.motion=false}
document.body.classList.toggle("reduced",reducedMQ.matches);
buildBadges();syncToggles();buildProgress();
</script>
</body>
</html>
