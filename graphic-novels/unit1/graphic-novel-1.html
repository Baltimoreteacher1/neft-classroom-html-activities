<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graphic Novel #1 · Prime Station: The Factor Code</title>
    <style>
/* ===========================================================================
   Neft Teacher · Graphic-Novel Engine  ·  gn-engine.css
   Panel-based, dialogue-driven comic renderer. Shared by all 20 novels.
   Per-novel look is tuned only through CSS custom properties in STORY.meta.theme.
   Accessibility: WCAG-AA bubbles, resizable text (rem/clamp), 48px targets,
   keyboard focus rings, functional at 320px.
   =========================================================================== */
:root {
  --bg: #0a1228;
  --ink: #f4f7ff;
  --muted: #aebbdd;
  --accent: #ff8a3d;
  --accent2: #3da5ff;
  --panel: #13234d;
  --line: #2a4378;
  --ok: #39d98a;
  --bad: #ff6b6b;
  --bubble: #fffdf7;
  --bubble-ink: #16213d;
  --font: "Trebuchet MS", "Segoe UI", system-ui, -apple-system, sans-serif;
  --reply: #13234d;
}
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html,
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font);
  line-height: 1.5;
}
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
img {
  max-width: 100%;
  display: block;
}
a {
  color: var(--accent2);
}

/* ---- Top bar ---- */
.topbar {
  position: sticky;
  top: 0;
  z-index: 40;
  background: rgba(10, 18, 40, 0.96);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(6px);
}
.topbar-inner {
  max-width: 1000px;
  margin: 0 auto;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.home {
  min-height: 44px;
  display: flex;
  align-items: center;
  text-decoration: none;
  color: var(--muted);
  font-size: 0.85rem;
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 0 12px;
}
.home:hover {
  color: var(--ink);
}
.title {
  font-size: 1rem;
  font-weight: 700;
}
.title .v {
  color: var(--accent);
}
.progress-wrap {
  flex: 1;
  min-width: 160px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.progress {
  flex: 1;
  height: 10px;
  background: #0b1530;
  border: 1px solid var(--line);
  border-radius: 999px;
  overflow: hidden;
}
.progress > i {
  display: block;
  height: 100%;
  width: 0;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  transition: width 0.4s ease;
}
.progress-label {
  font-size: 0.75rem;
  color: var(--muted);
  white-space: nowrap;
}

/* text-size control */
.txtsize {
  min-height: 44px;
  min-width: 44px;
  border: 1px solid var(--line);
  background: #0e1c40;
  color: var(--muted);
  border-radius: 10px;
  font-weight: 800;
  cursor: pointer;
  padding: 0 10px;
}
.txtsize:hover {
  color: var(--ink);
}
.txtsize:focus-visible {
  outline: 3px solid #fff;
  outline-offset: 2px;
}
body[data-text="lg"] {
  font-size: 1.12rem;
}
body[data-text="xl"] {
  font-size: 1.26rem;
}

/* ---- Tabs ---- */
.tabs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 8px 14px;
  max-width: 1000px;
  margin: 0 auto;
  width: 100%;
  scrollbar-width: thin;
}
.tab {
  flex: 0 0 auto;
  min-height: 44px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: #0e1c40;
  border: 1px solid var(--line);
  color: var(--muted);
  border-radius: 12px;
  padding: 8px 14px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--font);
}
.tab[aria-selected="true"] {
  background: linear-gradient(135deg, var(--accent), #ff6a3d);
  color: #1a0d02;
  border-color: transparent;
}
.tab:focus-visible {
  outline: 3px solid #fff;
  outline-offset: 2px;
}
.tab.locked {
  opacity: 0.5;
  cursor: not-allowed;
}
.tab .lk {
  font-size: 0.8rem;
}

/* ---- Stage ---- */
main {
  flex: 1;
  width: 100%;
  max-width: 1000px;
  margin: 0 auto;
  padding: 14px;
}
.scene {
  display: none;
}
.scene.active {
  display: block;
  animation: fade 0.35s ease;
}
@keyframes fade {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}
@media (prefers-reduced-motion: reduce) {
  *,
  .scene.active {
    animation: none !important;
    transition: none !important;
  }
}

.scene-head {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.scene-head h2 {
  font-size: clamp(1.2rem, 3.5vw, 1.7rem);
}
.scene-head .act {
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
}

/* ===========================================================================
   PANEL  — a framed scene (background image) with characters speaking over it
   =========================================================================== */
.panel {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  border: 2px solid var(--line);
  background: #0b1530;
  aspect-ratio: 16 / 9;
}
.panel > img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
/* contrast scrim so overlaid bubbles always meet AA over any art */
.panel::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(
    180deg,
    rgba(6, 12, 28, 0.1) 0%,
    rgba(6, 12, 28, 0.05) 45%,
    rgba(6, 12, 28, 0.62) 100%
  );
}
/* speech layer holds the current beat's bubble(s) over the panel */
.speech {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 8px;
  padding: 12px;
}
.speech > * {
  pointer-events: auto;
}

/* ---- Speech bubble (with tail + speaker tag + optional avatar) ---- */
.bubble {
  background: var(--bubble);
  color: var(--bubble-ink);
  border-radius: 16px;
  padding: 12px 14px 12px;
  position: relative;
  max-width: min(560px, 86%);
  box-shadow: 0 10px 26px -10px rgba(0, 0, 0, 0.75);
  animation: pop 0.22s ease;
}
@keyframes pop {
  from {
    opacity: 0;
    transform: translateY(6px) scale(0.98);
  }
  to {
    opacity: 1;
    transform: none;
  }
}
.bubble.left {
  align-self: flex-start;
}
.bubble.right {
  align-self: flex-end;
}
.bubble.center {
  align-self: center;
}
/* tail */
.bubble::before {
  content: "";
  position: absolute;
  bottom: -10px;
  width: 0;
  height: 0;
  border-left: 11px solid transparent;
  border-right: 11px solid transparent;
  border-top: 12px solid var(--bubble);
  filter: drop-shadow(0 4px 3px rgba(0, 0, 0, 0.35));
}
.bubble.left::before {
  left: 26px;
}
.bubble.right::before {
  right: 26px;
}
.bubble.center::before {
  left: 50%;
  transform: translateX(-50%);
}
/* speaker tag (doubles as avatar holder) */
.bubble .who {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-weight: 800;
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 5px;
  color: var(--spk, #c2461d);
}
.bubble .who .av {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
  font-weight: 800;
  color: #fff;
  overflow: hidden;
  background: var(--spk, #c2461d);
  border: 2px solid #fff3;
}
.bubble .who .av img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.bubble .who .me {
  font-size: 0.62rem;
  color: #8a6a55;
  letter-spacing: 0.08em;
}
.bubble .en {
  font-size: 1.05rem;
}
.bubble .es {
  font-size: 0.92rem;
  color: #566677;
  margin-top: 6px;
  font-style: italic;
}
/* narrator / caption styling */
.bubble.caption {
  background: #0e1c40;
  color: var(--ink);
  border: 1px solid var(--line);
  max-width: min(620px, 92%);
}
.bubble.caption::before {
  border-top-color: #0e1c40;
}
.bubble.caption .es {
  color: var(--muted);
}
.bubble.caption .who {
  color: var(--accent2);
}
/* the companion's misconception line gets a subtle "uh-oh" mark */
.bubble.misc {
  box-shadow:
    0 0 0 2px #ffd16688,
    0 10px 26px -10px rgba(0, 0, 0, 0.75);
}

/* ---- Inline vocab tag (tap for definition popover) ---- */
.vocab-tag {
  font: inherit;
  color: #0b4a82;
  font-weight: 800;
  cursor: pointer;
  background: #bfe3ff;
  border: none;
  border-bottom: 2px dotted #0b4a82;
  border-radius: 5px;
  padding: 0 3px;
  -webkit-tap-highlight-color: transparent;
}
.vocab-tag:focus-visible {
  outline: 3px solid var(--accent);
  outline-offset: 1px;
}

/* ---- Popover (vocab + callout) ---- */
.gn-pop {
  position: fixed;
  z-index: 60;
  max-width: 280px;
  background: #fffef9;
  color: #16213d;
  border: 2px solid var(--accent);
  border-radius: 14px;
  padding: 12px 14px;
  box-shadow: 0 16px 40px -12px rgba(0, 0, 0, 0.7);
}
.gn-pop h4 {
  font-size: 1rem;
  margin-bottom: 4px;
  color: #c2461d;
}
.gn-pop .es {
  font-style: italic;
  color: #566677;
  font-size: 0.88rem;
  margin-top: 6px;
}
.gn-pop .x {
  position: absolute;
  top: 6px;
  right: 8px;
  border: none;
  background: none;
  font-size: 1.2rem;
  line-height: 1;
  cursor: pointer;
  color: #99a;
  min-width: 32px;
  min-height: 32px;
}
.gn-pop-back {
  position: fixed;
  inset: 0;
  z-index: 55;
  background: transparent;
}

/* ---- Callout dot pinned to a spot on the panel ---- */
.callout {
  position: absolute;
  z-index: 4;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--accent);
  color: #1a0d02;
  border: 2px solid #fff;
  font-weight: 900;
  cursor: pointer;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 0 0 rgba(255, 138, 61, 0.6);
  animation: ping 1.8s infinite;
}
@keyframes ping {
  0% {
    box-shadow: 0 0 0 0 rgba(255, 138, 61, 0.55);
  }
  70% {
    box-shadow: 0 0 0 14px rgba(255, 138, 61, 0);
  }
  100% {
    box-shadow: 0 0 0 0 rgba(255, 138, 61, 0);
  }
}
.callout:focus-visible {
  outline: 3px solid #fff;
  outline-offset: 2px;
}

/* ---- Beat controls (dots + Next) ---- */
.dlg-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 12px;
  gap: 10px;
  flex-wrap: wrap;
}
.dots {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
}
.dots i {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #2a4378;
}
.dots i.on {
  background: var(--accent);
}
.next {
  min-height: 48px;
  background: linear-gradient(135deg, var(--accent2), #5d7bff);
  color: #02112a;
  border: none;
  border-radius: 12px;
  padding: 10px 18px;
  font-weight: 800;
  font-size: 1rem;
  cursor: pointer;
  font-family: var(--font);
}
.next:focus-visible {
  outline: 3px solid #fff;
  outline-offset: 2px;
}
.next[disabled] {
  opacity: 0.4;
  cursor: default;
}

/* ===========================================================================
   CHALLENGE  — math voiced by a character; choices = protagonist's replies
   =========================================================================== */
.challenge {
  margin-top: 16px;
}
.challenge .ask-tray {
  margin-bottom: 10px;
} /* the question bubble lives in a tray under panel on small screens */
.chal-tools {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin: 4px 0 10px;
}
.toolbtn {
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #0e1c40;
  border: 1px solid var(--line);
  color: #ffd9b3;
  border-radius: 12px;
  padding: 8px 14px;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font);
}
.toolbtn[aria-expanded="true"] {
  background: #3a2410;
  border-color: #7a4d1f;
  color: #ffd9b3;
}
.toolbtn:focus-visible {
  outline: 3px solid #fff;
  outline-offset: 2px;
}
.foldout {
  font-size: 0.95rem;
  color: #ffe9d3;
  background: #3a2410;
  border: 1px solid #7a4d1f;
  border-radius: 12px;
  padding: 10px 14px;
  margin: 0 0 12px;
  display: none;
}
.foldout.show {
  display: block;
  animation: fade 0.2s ease;
}
.foldout.coach {
  color: #cfe3ff;
  background: #0e2140;
  border-color: #244a86;
}
.foldout b {
  color: var(--accent);
}
.foldout.coach b {
  color: var(--accent2);
}

.reply-label {
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 8px;
}
.choices {
  display: grid;
  gap: 10px;
}
/* each choice is the protagonist's possible reply, drawn as a mini bubble */
.choice {
  position: relative;
  min-height: 48px;
  text-align: left;
  background: var(--reply);
  border: 2px solid var(--line);
  color: var(--ink);
  border-radius: 14px;
  padding: 12px 14px 12px 16px;
  font-size: 1rem;
  cursor: pointer;
  font-family: var(--font);
}
.choice::before {
  content: "\201C";
  position: absolute;
  left: 6px;
  top: 4px;
  color: var(--accent2);
  font-size: 1.1rem;
  font-weight: 800;
  opacity: 0.6;
}
.choice:hover {
  border-color: var(--accent2);
}
.choice:focus-visible {
  outline: 3px solid #fff;
  outline-offset: 2px;
}
.choice.correct {
  border-color: var(--ok);
  background: #10351f;
}
.choice.wrong {
  border-color: var(--bad);
  background: #3a1414;
}
.choice .tree {
  font-family: "Courier New", monospace;
  white-space: pre-wrap;
  font-size: 0.95rem;
  line-height: 1.35;
  display: block;
  margin-top: 4px;
  color: #bfe;
}
.choice .es {
  display: block;
  font-size: 0.85rem;
  color: var(--muted);
  font-style: italic;
  margin-top: 4px;
}
.feedback {
  margin-top: 12px;
  border-radius: 12px;
  padding: 12px 14px;
  font-size: 1rem;
  display: none;
}
.feedback.show {
  display: block;
  animation: fade 0.25s ease;
}
.feedback.good {
  background: #10351f;
  border: 1px solid var(--ok);
  color: #c8ffe0;
}
.feedback.bad {
  background: #3a1414;
  border: 1px solid var(--bad);
  color: #ffd5d5;
}
.feedback .es {
  display: block;
  font-style: italic;
  color: #9fd;
  opacity: 0.85;
  margin-top: 4px;
  font-size: 0.9rem;
}

.scene-foot {
  margin-top: 18px;
  display: flex;
  justify-content: flex-end;
}
.advance {
  min-height: 48px;
  background: linear-gradient(135deg, var(--accent), #ff6a3d);
  color: #1a0d02;
  border: none;
  border-radius: 12px;
  padding: 12px 22px;
  font-weight: 800;
  font-size: 1.05rem;
  cursor: pointer;
  display: none;
  font-family: var(--font);
}
.advance.show {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  animation: fade 0.3s ease;
}
.advance:focus-visible {
  outline: 3px solid #fff;
  outline-offset: 2px;
}

/* ---- Cover ---- */
.cover-card {
  text-align: center;
}
.cover-card .panel {
  aspect-ratio: 16 / 9;
  margin-bottom: 16px;
}
.cover-card h2 {
  font-size: clamp(1.6rem, 5vw, 2.4rem);
}
.cover-card p {
  color: var(--muted);
  max-width: 620px;
  margin: 10px auto;
}
.start {
  min-height: 52px;
  margin-top: 8px;
  background: linear-gradient(135deg, var(--accent), #ff6a3d);
  color: #1a0d02;
  border: none;
  border-radius: 14px;
  padding: 14px 28px;
  font-weight: 800;
  font-size: 1.15rem;
  cursor: pointer;
  font-family: var(--font);
}
.start:focus-visible {
  outline: 3px solid #fff;
  outline-offset: 2px;
}
.level-pill {
  display: inline-block;
  margin-bottom: 10px;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #02112a;
  background: var(--accent2);
  border-radius: 999px;
  padding: 5px 14px;
  font-weight: 700;
}
.cast-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 14px 0 4px;
}
.cast-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #0e1c40;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 14px 6px 6px;
  font-size: 0.85rem;
}
.cast-chip .av {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  color: #fff;
  overflow: hidden;
}
.cast-chip .av img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.cast-chip b {
  color: var(--ink);
}
.cast-chip span {
  color: var(--muted);
}

/* ---- Glossary ---- */
.gloss {
  display: grid;
  gap: 12px;
}
.term {
  background: #0e1c40;
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.term .ico {
  font-size: 1.6rem;
  flex: 0 0 auto;
}
.term h3 {
  font-size: 1.1rem;
}
.term .es-term {
  color: var(--accent2);
  font-size: 0.9rem;
  font-style: italic;
}
.term p {
  color: var(--muted);
  margin-top: 4px;
}

/* ---- Mission complete ---- */
.complete {
  text-align: center;
  display: none;
}
.complete.show {
  display: block;
}
.complete .panel {
  margin-bottom: 16px;
}
.complete h2 {
  font-size: clamp(1.6rem, 5vw, 2.4rem);
  color: var(--accent);
}
.badge-done {
  display: inline-block;
  font-size: 3rem;
  margin: 8px;
}
.restart {
  min-height: 48px;
  margin-top: 14px;
  background: #0e1c40;
  border: 1px solid var(--line);
  color: var(--ink);
  border-radius: 12px;
  padding: 12px 20px;
  font-weight: 700;
  cursor: pointer;
  font-family: var(--font);
}
.locked-note {
  display: none;
  text-align: center;
  color: var(--muted);
  padding: 30px 10px;
}
.locked-note.show {
  display: block;
}
.bonus {
  margin-top: 24px;
  text-align: left;
  background: #1c1606;
  border: 2px solid #ffd166;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 0 0 1px rgba(255, 209, 102, 0.2) inset;
}
.bonus-tag {
  background: #ffd166;
  color: #1a1200;
  font-weight: 800;
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  padding: 3px 8px;
  border-radius: 6px;
  display: inline-block;
}
.bonus h3 {
  color: #ffd166;
  font-size: 1.1rem;
  margin: 8px 0 6px;
  font-weight: 700;
}
.bonus .prompt {
  font-size: 1.05rem;
  margin-bottom: 12px;
  line-height: 1.55;
}
.bonus .prompt .es {
  display: block;
  font-size: 0.9rem;
  color: var(--muted);
  font-style: italic;
  margin-top: 4px;
}

/* ---- Small screens (down to 320px) ---- */
@media (max-width: 560px) {
  .panel {
    aspect-ratio: 4 / 3;
  }
  .bubble {
    max-width: 94%;
  }
  .bubble .en {
    font-size: 1rem;
  }
}

    <script>
/* ===========================================================================
   Neft Teacher · Graphic-Novel Engine  ·  gn-engine.js
   Renders a STORY object (window.GN_STORY) into a panel-based, dialogue-driven
   comic. One engine, 20 novels. No build step needed at runtime; fully offline.

   STORY shape is documented in story.schema.md. Key contracts preserved for the
   existing Neft results pipeline (do NOT rename):
     • each math choice group is a .choices container holding .choice buttons
     • a solved choice's correct button gets class "correct"
     • the master-rank group has id="choicesComplete" (excluded from scoring)
     • the finish scene is #scene-complete and gets classes show/active when done
   The nt-results.js tracker at the bottom of each file reads exactly those.
   =========================================================================== */
(function () {
  "use strict";
  var S = window.GN_STORY;
  if (!S) {
    console.error("GN: window.GN_STORY missing");
    return;
  }

  /* ---------- tiny helpers ---------- */
  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }
  function $(id) {
    return document.getElementById(id);
  }
  function art(file) {
    return (S.meta.artBase || "") + file;
  }
  function txt(v) {
    return v == null ? "" : v;
  }

  /* ---------- theme + document chrome ---------- */
  function applyTheme() {
    document.documentElement.lang = "en";
    document.title =
      "Graphic Novel #" + S.meta.version + " · " + stripTags(S.meta.title);
    if (S.meta.theme) {
      var r = document.documentElement;
      Object.keys(S.meta.theme).forEach(function (k) {
        r.style.setProperty(k, S.meta.theme[k]);
      });
    }
  }
  function stripTags(s) {
    return String(s).replace(/<[^>]+>/g, "");
  }

  /* ---------- speaker rendering (optional avatar slot) ---------- */
  function speaker(id) {
    return (
      (S.cast && S.cast[id]) || { name: id, color: "#c2461d", avatar: null }
    );
  }
  function whoTag(spkId, isMe) {
    var c = speaker(spkId);
    var inner;
    if (c.avatar) {
      inner =
        '<span class="av"><img src="' + art(c.avatar) + '" alt="" /></span>';
    } else {
      var initial = (c.tagIcon || c.name.charAt(0)).toString();
      inner = '<span class="av" aria-hidden="true">' + initial + "</span>";
    }
    return (
      '<span class="who" style="--spk:' +
      (c.color || "#c2461d") +
      '">' +
      inner +
      "<span>" +
      c.name +
      "</span>" +
      (isMe || c.role === "protagonist"
        ? '<span class="me">· YOU</span>'
        : "") +
      "</span>"
    );
  }

  /* ---------- vocab markup: wrap term occurrences with a tappable tag ----------
     A beat/challenge may carry vocab:[{term,en,es}]. We wrap the FIRST literal
     occurrence of term in the English text. Definitions open in a popover. */
  var VOCAB_STORE = [];
  function injectVocab(htmlEn, vocab) {
    if (!vocab || !vocab.length) return htmlEn;
    vocab.forEach(function (v) {
      var i = VOCAB_STORE.push(v) - 1;
      var re = new RegExp("(" + escapeRe(v.term) + ")", "i");
      htmlEn = htmlEn.replace(
        re,
        '<button type="button" class="vocab-tag" data-vocab="' +
          i +
          '" aria-label="Definition of ' +
          stripTags(v.term) +
          '">$1</button>',
      );
    });
    return htmlEn;
  }
  function escapeRe(s) {
    return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  /* ---------- popover (vocab + callout) ---------- */
  function openPop(anchor, title, en, es) {
    closePop();
    var back = el("div", "gn-pop-back");
    back.id = "gn-pop-back";
    back.addEventListener("click", closePop);
    var p = el("div", "gn-pop");
    p.id = "gn-pop";
    p.setAttribute("role", "dialog");
    p.setAttribute("aria-label", stripTags(title || "Definition"));
    p.innerHTML =
      '<button class="x" aria-label="Close">&times;</button>' +
      (title ? "<h4>" + title + "</h4>" : "") +
      '<div class="en">' +
      en +
      "</div>" +
      (es ? '<div class="es">' + es + "</div>" : "");
    document.body.appendChild(back);
    document.body.appendChild(p);
    p.querySelector(".x").addEventListener("click", closePop);
    // position near anchor, clamped to viewport
    var r = anchor.getBoundingClientRect();
    var pw = Math.min(280, window.innerWidth - 20);
    p.style.width = pw + "px";
    var left = Math.min(Math.max(10, r.left), window.innerWidth - pw - 10);
    var top = r.bottom + 8;
    if (top + p.offsetHeight > window.innerHeight - 10) {
      top = Math.max(10, r.top - p.offsetHeight - 8);
    }
    p.style.left = left + "px";
    p.style.top = top + "px";
    p.querySelector(".x").focus();
  }
  function closePop() {
    var a = $("gn-pop"),
      b = $("gn-pop-back");
    if (a) a.remove();
    if (b) b.remove();
  }
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closePop();
  });
  document.addEventListener("click", function (e) {
    var t = e.target.closest && e.target.closest(".vocab-tag");
    if (t) {
      var v = VOCAB_STORE[+t.dataset.vocab];
      if (v) openPop(t, v.term, v.en, v.es);
    }
  });

  /* ---------- bubble builder ---------- */
  function bubble(beat) {
    var c = speaker(beat.who);
    var isCap = c.role === "narrator" || beat.caption;
    var pos = beat.pos || (c.role === "protagonist" ? "right" : "left");
    var b = el(
      "div",
      "bubble " +
        pos +
        (isCap ? " caption" : "") +
        (beat.misconception ? " misc" : ""),
    );
    var en = injectVocab(txt(beat.en), beat.vocab);
    b.innerHTML =
      whoTag(beat.who) +
      '<div class="en">' +
      en +
      "</div>" +
      (beat.es ? '<div class="es">' + beat.es + "</div>" : "");
    return b;
  }

  /* =========================================================================
     BUILD DOM
     ========================================================================= */
  var SCENE_IDS = []; // cover, act ids..., gloss

  function build() {
    applyTheme();
    document.body.appendChild(buildTopbar());
    var main = el("main");
    main.appendChild(buildCover());
    S.acts.forEach(function (act, i) {
      main.appendChild(buildAct(act, i));
    });
    main.appendChild(buildComplete());
    main.appendChild(buildGloss());
    document.body.appendChild(main);
    wireTabs();
    buildGlossList();
    refreshLocks();
    updateProgress();
    showScene("cover");
  }

  function buildTopbar() {
    var bar = el("div", "topbar");
    var inner = el("div", "topbar-inner");
    inner.innerHTML =
      '<a class="home" href="' +
      (S.meta.home || "../index.html") +
      '">&#8592; Home</a>' +
      '<span class="title"><span class="v">#' +
      S.meta.version +
      "</span> " +
      S.meta.title +
      "</span>" +
      '<div class="progress-wrap"><div class="progress" role="progressbar" ' +
      'aria-label="Mission progress" aria-valuemin="0" aria-valuemax="100" ' +
      'aria-valuenow="0"><i id="bar"></i></div>' +
      '<span class="progress-label" id="plabel">0%</span></div>' +
      '<button class="txtsize" id="txtsize" aria-label="Change text size" ' +
      'title="Text size">A+</button>';
    bar.appendChild(inner);

    var tabs = el("div", "tabs");
    tabs.setAttribute("role", "tablist");
    tabs.setAttribute("aria-label", "Chapters");
    tabs.appendChild(tabBtn("cover", "Cover", false));
    S.acts.forEach(function (a, i) {
      tabs.appendChild(tabBtn(a.id, a.tab, i > 0));
    });
    tabs.appendChild(tabBtn("gloss", "Glossary", false));
    bar.appendChild(tabs);
    return bar;
  }
  function tabBtn(scene, label, locked) {
    var b = el("button", "tab" + (locked ? " locked" : ""));
    b.id = "tab-" + scene;
    b.setAttribute("role", "tab");
    b.setAttribute("aria-selected", scene === "cover" ? "true" : "false");
    b.dataset.scene = scene;
    b.dataset.label = label;
    b.innerHTML = (locked ? '<span class="lk">&#128274;</span> ' : "") + label;
    return b;
  }

  function buildCover() {
    var s = el("section", "scene active cover-card");
    s.id = "scene-cover";
    s.setAttribute("role", "tabpanel");
    s.setAttribute("aria-labelledby", "tab-cover");
    SCENE_IDS.push("cover");
    var cv = S.cover;
    var castChips = "";
    Object.keys(S.cast || {}).forEach(function (k) {
      var c = S.cast[k];
      if (c.role === "narrator") return;
      var av = c.avatar
        ? '<span class="av" style="background:' +
          c.color +
          '"><img src="' +
          art(c.avatar) +
          '" alt=""></span>'
        : '<span class="av" style="background:' +
          c.color +
          '">' +
          (c.tagIcon || c.name.charAt(0)) +
          "</span>";
      castChips +=
        '<span class="cast-chip">' +
        av +
        "<b>" +
        c.name +
        "</b> <span>" +
        (c.blurb || c.role) +
        "</span></span>";
    });
    s.innerHTML =
      '<div class="panel"><img src="' +
      art(cv.art) +
      '" alt="' +
      txt(cv.alt) +
      '"></div>' +
      '<span class="level-pill">Graphic Novel #' +
      S.meta.version +
      " &middot; " +
      S.meta.level +
      "</span>" +
      "<h2>" +
      S.meta.title +
      "</h2>" +
      "<p>" +
      cv.blurbEn +
      "</p>" +
      '<p style="font-size:0.92rem"><i>' +
      cv.blurbEs +
      "</i></p>" +
      '<div class="cast-row">' +
      castChips +
      "</div>" +
      '<button class="start" id="start-btn">' +
      (cv.startLabel || "Start &#128640;") +
      "</button>";
    s.querySelector("#start-btn").addEventListener("click", function () {
      showScene(S.acts[0].id);
    });

  function buildAct(act, idx) {
    var s = el("section", "scene");
    s.id = "scene-" + act.id;
    s.setAttribute("role", "tabpanel");
    s.setAttribute("aria-labelledby", "tab-" + act.id);
    SCENE_IDS.push(act.id);

    var lock = el("div", "locked-note");
    lock.id = "lock-" + act.id;
    lock.innerHTML =
      "&#128274; Finish the previous chapter to unlock " +
      stripTags(act.title) +
      ".";
    s.appendChild(lock);

    var body = el("div");
    body.id = "body-" + act.id;
    body.innerHTML =
      '<div class="scene-head"><span class="act">' +
      act.kicker +
      "</span><h2>" +
      act.title +
      "</h2></div>" +
      '<div class="panel" id="panel-' +
      act.id +
      '">' +
      '<img id="art-' +
      act.id +
      '" src="" alt="">' +
      '<div class="speech" id="speech-' +
      act.id +
      '" aria-live="polite"></div></div>' +
      '<div class="dlg-row"><div class="dots" id="dots-' +
      act.id +
      '"></div>' +
      '<button class="next" id="next-' +
      act.id +
      '">Next &#9654;</button></div>' +
      '<div id="chal-' +
      act.id +
      '"></div>' +
      '<div class="scene-foot"><button class="advance" id="adv-' +
      act.id +
      '">' +

  function buildComplete() {
    var s = el("section", "scene complete");
    s.id = "scene-complete";
    s.setAttribute("role", "tabpanel");
    s.setAttribute("aria-label", "Mission complete");
    var cp = S.complete;
    var html =
      '<div class="panel"><img src="' +
      art(cp.art) +
      '" alt="' +
      txt(cp.alt) +
      '"></div>' +
      '<span class="badge-done">' +
      (cp.badge || "&#127881;") +
      "</span>" +
      "<h2>" +
      (cp.titleEn || "Mission Complete!") +
      "</h2>" +
      "<p>" +
      cp.en +
      "</p>" +
      '<p style="color:var(--muted);font-size:0.92rem"><i>' +
      cp.es +
      "</i></p>";
    if (cp.master) {
      var m = cp.master,
        ch = "";
      m.choices.forEach(function (c) {
        ch +=
          '<button class="choice" data-correct="' +
          !!c.correct +
          '">' +
          c.en +
          (c.es ? '<span class="es">' + c.es + "</span>" : "") +
          "</button>";
      });
      html +=
        '<div class="challenge bonus" id="chalComplete">' +
        '<span class="bonus-tag">&#127942; MASTER RANK CHALLENGE</span>' +
        "<h3>" +
        (m.headingEn || "Prove your rank!") +
        "</h3>" +
        '<p class="prompt">' +
        m.promptEn +
        '<span class="es">' +
        m.promptEs +
        "</span></p>" +
        '<div class="choices" id="choicesComplete">' +
        ch +
        "</div>" +
        '<div class="feedback" id="fbComplete"></div></div>';
    }
    html +=
      '<button class="restart" id="restart-btn">Play again &#8635;</button>';

  function buildGloss() {
    var s = el("section", "scene");
    s.id = "scene-gloss";
    s.setAttribute("role", "tabpanel");
    s.setAttribute("aria-labelledby", "tab-gloss");
    SCENE_IDS.push("gloss");
    s.innerHTML =
      '<div class="scene-head"><span class="act">Reference</span>' +
      "<h2>Glossary &middot; Word Bank</h2></div>" +
      '<div class="gloss" id="gloss-list"></div>';
    return s;
  }
  function buildGlossList() {
    var list = $("gloss-list");
    (S.glossary || []).forEach(function (g) {
      var d = el("div", "term");
      d.innerHTML =
        '<div class="ico">' +
        g.ico +
        "</div><div><h3>" +
        g.en +
        ' <span class="es-term">(' +
        g.es +
        ")</span></h3><p>" +
        g.def +
        "</p></div>";
      list.appendChild(d);
    });
  }

  /* =========================================================================
     STATE + NAVIGATION
     ========================================================================= */
  var state = {};
  S.acts.forEach(function (a) {
    state[a.id] = false;
  });

  function updateProgress() {
    var done = 0;
    S.acts.forEach(function (a) {
      if (state[a.id]) done++;
    });
    var pct = Math.round((done / S.acts.length) * 100);
    $("bar").style.width = pct + "%";
    $("plabel").textContent = pct + "%";
    document.querySelector(".progress").setAttribute("aria-valuenow", pct);
  }

  function refreshLocks() {
    S.acts.forEach(function (a, i) {
      if (i === 0) return;
      var prevDone = state[S.acts[i - 1].id];
      setLock("tab-" + a.id, !prevDone, a.tab);
      $("lock-" + a.id).classList.toggle("show", !prevDone);
      $("body-" + a.id).style.display = prevDone ? "" : "none";
    });
  }
  function setLock(tabId, locked, label) {
    var t = $(tabId);
    if (!t) return;
    t.classList.toggle("locked", locked);
    t.innerHTML = (locked ? '<span class="lk">&#128274;</span> ' : "") + label;
  }

  function showScene(name) {
    SCENE_IDS.forEach(function (s) {
      var sc = $("scene-" + s);
      if (sc) sc.classList.toggle("active", s === name);
      var tab = $("tab-" + s);
      if (tab) tab.setAttribute("aria-selected", s === name ? "true" : "false");
    });
    var cmp = $("scene-complete");
    cmp.classList.remove("active", "show");
    // (re)start the act's flow when entered
    var act = findAct(name);
    if (act && state.__started !== name) {
      state.__started = name;
      runAct(act);
    }
    closePop();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
  function findAct(id) {
    for (var i = 0; i < S.acts.length; i++)
      if (S.acts[i].id === id) return S.acts[i];
    return null;
  }
  function showComplete() {
    SCENE_IDS.forEach(function (s) {
      var sc = $("scene-" + s);
      if (sc) sc.classList.remove("active");
    });
    document.querySelectorAll(".tab").forEach(function (t) {
      t.setAttribute("aria-selected", "false");
    });
    var c = $("scene-complete");
    c.classList.add("active", "show");
    wireMaster();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function wireTabs() {
    var tabs = Array.prototype.slice.call(document.querySelectorAll(".tab"));
    tabs.forEach(function (tab) {
      tab.addEventListener("click", function () {
        if (tab.classList.contains("locked")) return;
        showScene(tab.dataset.scene);
      });
      tab.addEventListener("keydown", function (e) {
        var i = tabs.indexOf(tab);
        if (e.key === "ArrowRight") {
          e.preventDefault();
          (tabs[i + 1] || tabs[0]).focus();
        }
        if (e.key === "ArrowLeft") {
          e.preventDefault();
          (tabs[i - 1] || tabs[tabs.length - 1]).focus();
        }
      });
    });
    $("txtsize").addEventListener("click", cycleTextSize);
    $("restart-btn") &&
      $("restart-btn").addEventListener("click", function () {
        location.reload();
      });
  }
  function cycleTextSize() {
    var order = ["", "lg", "xl"],
      cur = document.body.dataset.text || "";
    var nxt = order[(order.indexOf(cur) + 1) % order.length];
    if (nxt) document.body.dataset.text = nxt;
    else delete document.body.dataset.text;
    $("txtsize").textContent = nxt === "lg" ? "A++" : nxt === "xl" ? "A" : "A+";
  }

  /* =========================================================================
     ACT RUNNER — plays an act's ordered steps:
       { type:"beats", art, alt, beats:[...] }   → panel + sequential bubbles
       { type:"challenge", ... }                 → voiced math, reply choices
     ========================================================================= */
  function runAct(act) {
    var stepIdx = 0;
    var imgEl = $("art-" + act.id);
    var speechEl = $("speech-" + act.id);
    var dotsEl = $("dots-" + act.id);
    var nextBtn = $("next-" + act.id);
    var chalHost = $("chal-" + act.id);
    var advBtn = $("adv-" + act.id);
    chalHost.innerHTML = "";

    function clearCallouts() {
      Array.prototype.slice
        .call($("panel-" + act.id).querySelectorAll(".callout"))
        .forEach(function (c) {
          c.remove();
        });
    }
    function setArt(file, alt) {
      if (file) {
        imgEl.src = art(file);
        imgEl.alt = txt(alt);
      }
    }

    function playStep() {
      var step = act.steps[stepIdx];
      if (!step) {
        advBtn.classList.add("show");
        return;
      }
      if (step.type === "beats") playBeats(step);
      else playChallenge(step);
    }

    /* ---- beats ---- */
    function playBeats(step) {
      setArt(step.art, step.alt);
      clearCallouts();
      nextBtn.style.display = "";
      var bi = 0;
      dotsEl.innerHTML = "";
      step.beats.forEach(function () {
        dotsEl.appendChild(el("i"));
      });
      function renderBeat() {
        var beat = step.beats[bi];
        speechEl.innerHTML = "";
        speechEl.appendChild(bubble(beat));
        if (beat.callout) addCallout(beat.callout);
        Array.prototype.slice.call(dotsEl.children).forEach(function (d, k) {
          d.classList.toggle("on", k <= bi);
        });
        var last = bi === step.beats.length - 1;
        nextBtn.innerHTML = last
          ? step.lastLabel || "Continue &#9654;"
          : "Next &#9654;";
      }
      nextBtn.onclick = function () {
        if (bi < step.beats.length - 1) {
          bi++;
          renderBeat();
        } else {
          stepIdx++;
          playStep();
        }
      };
      renderBeat();
    }
    function addCallout(co) {
      var c = el("button", "callout", co.icon || "!");
      c.style.left = (co.x || 50) + "%";
      c.style.top = (co.y || 50) + "%";
      c.setAttribute("aria-label", "Callout: " + stripTags(co.en));
      c.addEventListener("click", function () {
        openPop(c, co.title || "", co.en, co.es);
      });
      $("panel-" + act.id).appendChild(c);
    }

    /* ---- challenge ---- */
    function playChallenge(step) {
      if (step.art) setArt(step.art, step.alt);
      clearCallouts();
      nextBtn.style.display = "none";
      dotsEl.innerHTML = "";
      // the question is VOICED by a character, over the panel
      if (step.ask) {
        speechEl.innerHTML = "";
        speechEl.appendChild(
          bubble({
            who: step.ask.who,
            en: step.ask.en,
            es: step.ask.es,
            vocab: step.ask.vocab,
            misconception: step.ask.misconception,
            pos: step.ask.pos,
          }),
        );
        if (step.ask.callout) addCallout(step.ask.callout);
      }
      var wrap = el("div", "challenge");
      wrap.id = "chal-" + act.id + "-" + step.id;
      var tools = '<div class="chal-tools">';
      if (step.hint) {
        tools +=
          '<button type="button" class="toolbtn" data-fold="hint-' +
          step.id +
          '" aria-expanded="false">&#128161; Need a hint?</button>';
      }
      if (step.frame) {
        tools +=
          '<button type="button" class="toolbtn" data-fold="coach-' +
          step.id +
          '" aria-expanded="false">&#9997;&#65039; Writing coach</button>';
      }
      tools += "</div>";
      var folds = "";
      if (step.hint) {
        folds +=
          '<div class="foldout" id="hint-' +
          step.id +
          '"><b>Hint:</b> ' +
          step.hint.en +
          (step.hint.es
            ? '<div class="es" style="margin-top:6px;' +
              'font-style:italic;color:#cdb89a">' +
              step.hint.es +
              "</div>"
            : "") +
          "</div>";
      }
      if (step.frame) {
        folds +=
          '<div class="foldout coach" id="coach-' +
          step.id +
          '"><b>Sentence frame:</b> ' +
          step.frame.en +
          (step.frame.es
            ? '<div class="es" style="margin-top:6px;font-style:' +
              'italic;color:#9fc0ef">' +
              step.frame.es +
              "</div>"
            : "") +
          "</div>";
      }
      var choices =
        '<div class="reply-label">Choose your reply</div>' +
        '<div class="choices" id="choices-' +
        act.id +
        "-" +
        step.id +
        '">';
      step.choices.forEach(function (c) {
        choices +=
          '<button class="choice" data-correct="' +
          !!c.correct +
          '">' +
          c.en +
          (c.tree ? '<span class="tree">' + c.tree + "</span>" : "") +
          (c.es ? '<span class="es">' + c.es + "</span>" : "") +
          "</button>";
      });
      choices += "</div>";
      wrap.innerHTML =
        tools +
        folds +
        choices +
        '<div class="feedback" id="fb-' +
        act.id +
        "-" +
        step.id +
        '"></div>';
      chalHost.appendChild(wrap);
      wrap.scrollIntoView({ behavior: "smooth", block: "center" });
      wireFolds(wrap);
      wireChoices(step, act, function () {
        if (step.solveArt) setArt(step.solveArt, step.solveAlt);
        if (step.solveBeat) {
          speechEl.innerHTML = "";
          speechEl.appendChild(bubble(step.solveBeat));
        }
        stepIdx++;
        // small beat so the success feedback is read before the next panel
        setTimeout(playStep, 400);
      });
    }

    playStep();

    /* advance button → unlock next chapter / finish */
    advBtn.onclick = function () {
      state[act.id] = true;
      updateProgress();
      refreshLocks();
      var i = S.acts.indexOf(act);
      if (i < S.acts.length - 1) showScene(S.acts[i + 1].id);
      else showComplete();
    };
  }

  function wireFolds(root) {
    Array.prototype.slice
      .call(root.querySelectorAll(".toolbtn"))
      .forEach(function (b) {
        b.addEventListener("click", function () {
          var f = $(b.dataset.fold);
          var open = f.classList.toggle("show");
          b.setAttribute("aria-expanded", open ? "true" : "false");
        });
      });
  }

  function wireChoices(step, act, onSolve) {
    var groupId = "choices-" + act.id + "-" + step.id;
    var fbId = "fb-" + act.id + "-" + step.id;
    var solved = false;
    Array.prototype.slice
      .call($(groupId).querySelectorAll(".choice"))
      .forEach(function (btn) {
        btn.addEventListener("click", function () {
          if (solved) return;
          var correct = btn.dataset.correct === "true";
          var fb = $(fbId);
          if (correct) {
            solved = true;
            btn.classList.add("correct");
            fb.className = "feedback show good";
            fb.innerHTML =
              step.goodEn +
              (step.goodEs
                ? '<span class="es">' + step.goodEs + "</span>"
                : "");
            Array.prototype.slice
              .call($(groupId).querySelectorAll(".choice"))
              .forEach(function (b) {
                b.disabled = true;
              });
            if (onSolve) onSolve();
          } else {
            btn.classList.add("wrong");
            btn.disabled = true;
            fb.className = "feedback show bad";
            fb.innerHTML =
              step.badEn +
              (step.badEs ? '<span class="es">' + step.badEs + "</span>" : "");
          }
        });
      });
  }

  /* ---- master-rank challenge on the complete scene ---- */
  function wireMaster() {
    var group = $("choicesComplete");
    if (!group || group.dataset.wired) return;
    group.dataset.wired = "1";
    var fb = $("fbComplete");
    var solved = false;
    var m = S.complete.master || {};
    Array.prototype.slice
      .call(group.querySelectorAll(".choice"))
      .forEach(function (btn) {
        btn.addEventListener("click", function () {
          if (solved) return;
          var correct = btn.dataset.correct === "true";
          if (correct) {
            solved = true;
            btn.classList.add("correct");
            fb.className = "feedback show good";
            fb.style.display = "block";
            fb.innerHTML =
              m.goodEn ||
              "&#127942; <b>Master Rank Certified!</b> Perfect work! &#127775;";
            Array.prototype.slice
              .call(group.querySelectorAll(".choice"))
              .forEach(function (b) {
                b.disabled = true;
              });
            var h2 = document.querySelector("#scene-complete h2");
            if (h2 && m.certifyTitle) h2.innerHTML = m.certifyTitle;
          } else {
            btn.classList.add("wrong");
            btn.disabled = true;
            fb.className = "feedback show bad";
            fb.style.display = "block";
            fb.innerHTML =
              m.badEn || "&#10060; Not quite. Review and try another option!";
          }
        });
      });
  }

  /* ---------- go ---------- */
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", build);
  } else {
    build();
  }
})();

    </script>

  <script src="/teacher-tools/nt-results.js"></script>
  <script>
  /* Graphic-novel completion tracking -> NTResults (Neft Teacher). Unchanged. */
  (function () {
    "use strict";
    var FIRED = false;
    var complete = document.getElementById("scene-complete");
    if (!complete || typeof NTResults === "undefined") return;
    function studentName() {
      try {
        var k = "nt_gn_student";
        var n = localStorage.getItem(k);
        if (n && n.trim()) return n.trim();
        n = window.prompt("Type your name so your teacher can see you finished:", "");
        n = (n || "").trim();
        if (n) { try { localStorage.setItem(k, n); } catch (e) {} }
        return n || "Student";
      } catch (e) { return "Student"; }
    }
    function score() {
      var groups = Array.prototype.slice.call(document.querySelectorAll(".choices"))
        .filter(function (g) { return g.id !== "choicesComplete"; });
      var total = groups.length || 0;
      var correct = groups.filter(function (g) {
        return g.querySelector(".choice.correct");
      }).length;
      return { correct: correct, total: total };
    }
    function savedNote() {
      if (document.getElementById("nt-saved-note")) return;
      var p = document.createElement("p");
      p.id = "nt-saved-note";
      p.setAttribute("role", "status");
      p.style.cssText = "margin-top:14px;font-size:0.9rem;color:#7bdcb5;font-weight:600;";
      p.textContent = "✓ Results saved for your teacher.";
      complete.insertBefore(p, complete.querySelector(".restart") || null);
    }
    function record() {
      if (FIRED) return; FIRED = true;
      var s = score();
      try {
        NTResults.finish({
          student: studentName(),
          assessment: window.GN_STORY.meta.assessment,
          standard: window.GN_STORY.meta.standard,
          level: String(window.GN_STORY.meta.version),
          sections: [{ name: "Story Challenges", correct: s.correct, total: s.total }],
          correct: s.correct, total: s.total, download: false,
        });
      } catch (e) {}
      savedNote();
    }
    function visible() {
      return complete.classList.contains("show") || complete.classList.contains("active");
    }
    if (visible()) record();
    var mo = new MutationObserver(function () { if (visible()) record(); });
    mo.observe(complete, { attributes: true, attributeFilter: ["class"] });
  })();
  </script>
  <script src="/assets/nt-page-enhance.js" defer></script>
