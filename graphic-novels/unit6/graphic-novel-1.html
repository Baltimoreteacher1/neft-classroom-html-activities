<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graphic Novel #1 · Festival Producer: Power Up the Show 🎤</title>
    <style>
/* ===========================================================================
   Neft Teacher · Graphic-Novel Engine  ·  gn-engine.css
   COMIC-BOOK theme: bright cream "paper", thick near-black borders, hard offset
   shadows, gold uppercase tags, white name-tag speech bubbles, bold sans.
   Matches the Data Detectives / Prism City curriculum comics. One restyle here
   re-skins every engine novel (units 1-10 + lessons) at once.
   Accessibility: WCAG-AA, resizable text, 48px targets, gold focus rings,
   reduced-motion, functional at 320px.
   =========================================================================== */
:root {
  --ink: #121826;
  --paper: #fff9ef;
  --panel: #fffdf8;
  --line: #0f172a; /* comic outline (near-black) */
  --gold: #f2b705;
  --blue: #1d4ed8;
  --red: #b42318;
  --green: #047857;
  --muted: #475569;
  --bubble: #ffffff;
  --bubble-ink: #121826;
  --accent: #1d4ed8; /* per-unit signature (stories may override) */
  --accent2: #b42318;
  --ok: #047857;
  --bad: #b42318;
  --sh: 4px 4px 0 rgba(15, 23, 42, 0.18); /* hard comic shadow */
  --sh-sm: 3px 3px 0 var(--line);
  --font: Arial, Helvetica, "Segoe UI", system-ui, sans-serif;
}
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html {
  scroll-behavior: smooth;
}
html,
body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font);
  line-height: 1.5;
}
/* cream comic "paper" grid */
body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background:
    linear-gradient(90deg, rgba(17, 24, 39, 0.045) 1px, transparent 1px),
    linear-gradient(rgba(17, 24, 39, 0.045) 1px, transparent 1px), var(--paper);
  background-size: 28px 28px;
}
img {
  max-width: 100%;
  display: block;
}
a {
  color: inherit;
}
:focus-visible {
  outline: 4px solid var(--gold);
  outline-offset: 3px;
}

/* ---- Top bar ---- */
.topbar {
  position: sticky;
  top: 0;
  z-index: 40;
  background: var(--paper);
  border-bottom: 4px solid var(--line);
}
.topbar-inner {
  max-width: 1080px;
  margin: 0 auto;
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.home {
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  text-decoration: none;
  color: var(--ink);
  font-size: 0.85rem;
  font-weight: 800;
  border: 3px solid var(--line);
  border-radius: 6px;
  padding: 0 12px;
  background: #fff;
  box-shadow: var(--sh-sm);
}
.home:hover {
  background: var(--gold);
}
.title {
  font-size: 1.05rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.01em;
}
.title .v {
  color: var(--red);
}
.progress-wrap {
  flex: 1;
  min-width: 160px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.progress {
  flex: 1;
  height: 14px;
  background: #fff;
  border: 3px solid var(--line);
  border-radius: 999px;
  overflow: hidden;
}
.progress > i {
  display: block;
  height: 100%;
  width: 0;
  background: var(--gold);
  border-right: 3px solid var(--line);
  transition: width 0.4s ease;
}
.progress-label {
  font-size: 0.8rem;
  color: var(--ink);
  font-weight: 900;
  white-space: nowrap;
}
.txtsize {
  min-height: 44px;
  min-width: 44px;
  border: 3px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 6px;
  box-shadow: var(--sh-sm);
  font-weight: 900;
  cursor: pointer;
  padding: 0 10px;
}
.txtsize:hover {
  background: var(--gold);
}
body[data-text="lg"] {
  font-size: 1.12rem;
}
body[data-text="xl"] {
  font-size: 1.26rem;
}

/* ---- Tabs (chapter chips) ---- */
.tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 10px 14px;
  max-width: 1080px;
  margin: 0 auto;
  width: 100%;
  scrollbar-width: thin;
}
.tab {
  flex: 0 0 auto;
  min-height: 44px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: #fff;
  border: 3px solid var(--line);
  color: var(--ink);
  border-radius: 6px;
  padding: 8px 14px;
  font-size: 0.9rem;
  font-weight: 800;
  cursor: pointer;
  white-space: nowrap;
  font-family: var(--font);
  box-shadow: var(--sh-sm);
}
.tab[aria-selected="true"] {
  background: var(--accent);
  color: #fff;
}
.tab.locked {
  opacity: 0.55;
  cursor: not-allowed;
  box-shadow: none;
}
.tab .lk {
  font-size: 0.8rem;
}

/* ---- Stage ---- */
main {
  flex: 1;
  width: 100%;
  max-width: 1080px;
  margin: 0 auto;
  padding: 16px 14px;
}
.scene {
  display: none;
}
.scene.active {
  display: block;
  animation: fade 0.3s ease;
}
@keyframes fade {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: none;
  }
}
@media (prefers-reduced-motion: reduce) {
  *,
  .scene.active {
    animation: none !important;
    transition: none !important;
  }
  html {
    scroll-behavior: auto;
  }
}

.scene-head {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.scene-head h2 {
  font-size: clamp(1.4rem, 4vw, 2rem);
  text-transform: uppercase;
  line-height: 1;
}
.scene-head .act {
  display: inline-block;
  font-size: 0.78rem;
  font-weight: 900;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink);
  background: var(--gold);
  border: 3px solid var(--line);
  border-radius: 6px;
  padding: 5px 9px;
}

/* ===========================================================================
   PANEL — framed comic panel (photo art inside a thick black border)
   =========================================================================== */
.panel {
  position: relative;
  border: 4px solid var(--line);
  background: #fff;
  border-radius: 4px;
  overflow: hidden;
  aspect-ratio: 16 / 9;
  box-shadow: 8px 8px 0 var(--line);
}
.panel > img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.panel::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: linear-gradient(
    180deg,
    rgba(8, 12, 28, 0) 40%,
    rgba(8, 12, 28, 0.45) 100%
  );
}
.speech {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 8px;
  padding: 14px;
}
.speech > * {
  pointer-events: auto;
}

/* ---- Speech bubble (white, name tag, hard shadow) ---- */
.bubble {
  background: var(--bubble);
  color: var(--bubble-ink);
  border: 3px solid var(--line);
  border-radius: 10px;
  padding: 11px 13px;
  position: relative;
  max-width: min(560px, 88%);
  font-weight: 700;
  box-shadow: var(--sh);
}
.bubble.left {
  align-self: flex-start;
}
.bubble.right {
  align-self: flex-end;
}
.bubble.center {
  align-self: center;
}
.bubble::before {
  content: "";
  position: absolute;
  bottom: -13px;
  width: 0;
  height: 0;
  border-left: 12px solid transparent;
  border-right: 12px solid transparent;
  border-top: 13px solid var(--line);
}
.bubble::after {
  content: "";
  position: absolute;
  bottom: -8px;
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 9px solid var(--bubble);
}
.bubble.left::before {
  left: 24px;
}
.bubble.left::after {
  left: 28px;
}
.bubble.right::before {
  right: 24px;
}
.bubble.right::after {
  right: 28px;
}
.bubble.center::before {
  left: 50%;
  transform: translateX(-50%);
}
.bubble.center::after {
  left: 50%;
  transform: translateX(-50%);
}
.bubble .who {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-weight: 900;
  font-size: 0.74rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 5px;
  color: var(--muted);
}
.bubble .who .av {
  width: 26px;
  height: 26px;
  border-radius: 6px;
  flex: 0 0 auto;
  border: 2px solid var(--line);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.95rem;
  font-weight: 900;
  color: #fff;
  overflow: hidden;
  background: var(--spk, var(--blue));
}
.bubble .who .av img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.bubble .who .me {
  font-size: 0.62rem;
  color: var(--red);
  letter-spacing: 0.06em;
}
.bubble .en {
  font-size: 1.04rem;
}
.bubble .es {
  font-size: 0.9rem;
  color: var(--muted);
  margin-top: 6px;
  font-style: italic;
  font-weight: 700;
}
.bubble.caption {
  background: var(--ink);
  color: #fff;
  border-color: var(--line);
  max-width: min(640px, 94%);
}
.bubble.caption::after {
  border-top-color: var(--ink);
}
.bubble.caption .who {
  color: var(--gold);
}
.bubble.caption .es {
  color: #cbd5e1;
}
.bubble.misc {
  box-shadow:
    0 0 0 3px var(--gold),
    var(--sh);
}

/* ---- Inline vocab tag (pill) ---- */
.vocab-tag {
  font: inherit;
  font-weight: 900;
  color: var(--blue);
  cursor: pointer;
  background: #eff6ff;
  border: 2px solid var(--line);
  border-radius: 999px;
  padding: 0 8px;
  -webkit-tap-highlight-color: transparent;
}
.vocab-tag:focus-visible {
  outline: 3px solid var(--gold);
  outline-offset: 1px;
}

/* ---- Popover ---- */
.gn-pop {
  position: fixed;
  z-index: 60;
  max-width: 300px;
  background: #fff;
  color: var(--ink);
  border: 3px solid var(--line);
  border-radius: 8px;
  padding: 14px 16px;
  box-shadow: 8px 8px 0 var(--line);
}
.gn-pop h4 {
  font-size: 1.05rem;
  margin-bottom: 4px;
  color: var(--red);
  text-transform: uppercase;
}
.gn-pop .es {
  font-style: italic;
  color: var(--muted);
  font-size: 0.9rem;
  margin-top: 6px;
  font-weight: 700;
}
.gn-pop .x {
  position: absolute;
  top: 4px;
  right: 6px;
  border: none;
  background: none;
  font-size: 1.3rem;
  line-height: 1;
  cursor: pointer;
  color: var(--ink);
  min-width: 36px;
  min-height: 36px;
}
.gn-pop-back {
  position: fixed;
  inset: 0;
  z-index: 55;
  background: rgba(15, 23, 42, 0.25);
}

/* ---- Callout dot ---- */
.callout {
  position: absolute;
  z-index: 4;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--gold);
  color: var(--ink);
  border: 3px solid var(--line);
  font-weight: 900;
  cursor: pointer;
  transform: translate(-50%, -50%);
  box-shadow: var(--sh-sm);
}
.callout:focus-visible {
  outline: 3px solid var(--line);
  outline-offset: 2px;
}

/* ---- Beat controls ---- */
.dlg-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 14px;
  gap: 10px;
  flex-wrap: wrap;
}
.dots {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.dots i {
  width: 12px;
  height: 12px;
  border: 2px solid var(--line);
  border-radius: 50%;
  background: #fff;
}
.dots i.on {
  background: var(--gold);
}
.next {
  min-height: 48px;
  background: var(--accent);
  color: #fff;
  border: 3px solid var(--line);
  border-radius: 6px;
  padding: 10px 18px;
  font-weight: 900;
  font-size: 1rem;
  cursor: pointer;
  font-family: var(--font);
  text-transform: uppercase;
  box-shadow: var(--sh-sm);
}
.next:hover {
  transform: translate(-1px, -1px);
  box-shadow: 4px 4px 0 var(--line);
}
.next[disabled] {
  opacity: 0.4;
  cursor: default;
  box-shadow: none;
}

/* ===========================================================================
   CHALLENGE — math voiced by a character; choices = protagonist replies
   =========================================================================== */
.challenge {
  margin-top: 16px;
  background: #fff7ed;
  border: 3px solid var(--line);
  border-radius: 8px;
  padding: 14px;
  box-shadow: var(--sh);
}
.chal-tools {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin: 0 0 12px;
}
.toolbtn {
  min-height: 44px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #fff;
  border: 3px solid var(--line);
  color: var(--ink);
  border-radius: 6px;
  padding: 8px 14px;
  font-size: 0.9rem;
  font-weight: 800;
  cursor: pointer;
  font-family: var(--font);
  box-shadow: var(--sh-sm);
}
.toolbtn[aria-expanded="true"] {
  background: var(--gold);
}
.foldout {
  font-size: 0.95rem;
  color: var(--ink);
  background: #fffdf8;
  border: 3px solid var(--line);
  border-radius: 6px;
  padding: 11px 14px;
  margin: 0 0 12px;
  display: none;
  font-weight: 700;
}
.foldout.show {
  display: block;
  animation: fade 0.2s ease;
}
.foldout.coach {
  background: #eff6ff;
}
.foldout b {
  color: var(--red);
}
.foldout.coach b {
  color: var(--blue);
}

.reply-label {
  display: inline-block;
  font-size: 0.74rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink);
  background: var(--gold);
  border: 3px solid var(--line);
  border-radius: 6px;
  padding: 4px 9px;
  margin-bottom: 10px;
}
.choices {
  display: grid;
  gap: 10px;
}
.choice {
  position: relative;
  min-height: 48px;
  text-align: left;
  background: #fff;
  border: 3px solid var(--line);
  color: var(--ink);
  border-radius: 8px;
  padding: 12px 14px 12px 30px;
  font-size: 1rem;
  cursor: pointer;
  font-family: var(--font);
  font-weight: 700;
  box-shadow: var(--sh-sm);
}
.choice::before {
  content: "\201C";
  position: absolute;
  left: 9px;
  top: 6px;
  color: var(--blue);
  font-size: 1.2rem;
  font-weight: 900;
}
.choice:hover {
  transform: translate(-1px, -1px);
  box-shadow: 4px 4px 0 var(--line);
  background: #fffdf8;
}
.choice:focus-visible {
  outline: 4px solid var(--gold);
  outline-offset: 2px;
}
.choice.correct {
  border-color: var(--green);
  background: #ecfdf5;
}
.choice.wrong {
  border-color: var(--red);
  background: #fef2f2;
}
.choice .tree {
  font-family: "Courier New", monospace;
  white-space: pre-wrap;
  font-size: 0.92rem;
  line-height: 1.35;
  display: block;
  margin-top: 5px;
  color: var(--muted);
  font-weight: 700;
}
.choice .es {
  display: block;
  font-size: 0.85rem;
  color: var(--muted);
  font-style: italic;
  margin-top: 4px;
}
.feedback {
  margin-top: 12px;
  border: 3px solid var(--line);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 1rem;
  display: none;
  font-weight: 700;
}
.feedback.show {
  display: block;
  animation: fade 0.2s ease;
}
.feedback.good {
  background: #ecfdf5;
  border-color: var(--green);
  color: #064e3b;
}
.feedback.bad {
  background: #fef2f2;
  border-color: var(--red);
  color: #7f1d1d;
}
.feedback .es {
  display: block;
  font-style: italic;
  margin-top: 4px;
  font-size: 0.9rem;
  opacity: 0.85;
}

.scene-foot {
  margin-top: 18px;
  display: flex;
  justify-content: flex-end;
}
.advance {
  min-height: 50px;
  background: var(--gold);
  color: var(--ink);
  border: 3px solid var(--line);
  border-radius: 6px;
  padding: 12px 22px;
  font-weight: 900;
  font-size: 1.05rem;
  cursor: pointer;
  display: none;
  font-family: var(--font);
  text-transform: uppercase;
  box-shadow: var(--sh);
}
.advance.show {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  animation: fade 0.3s ease;
}
.advance:hover {
  transform: translate(-1px, -1px);
  box-shadow: 5px 5px 0 var(--line);
}

/* ---- Cover ---- */
.cover-card {
  text-align: center;
}
.cover-card .panel {
  aspect-ratio: 16 / 9;
  margin-bottom: 18px;
}
.cover-card h2 {
  font-size: clamp(1.8rem, 6vw, 3rem);
  text-transform: uppercase;
  line-height: 0.98;
}
.cover-card p {
  color: var(--ink);
  max-width: 640px;
  margin: 12px auto;
  font-weight: 700;
}
.start {
  min-height: 54px;
  margin-top: 10px;
  background: var(--accent);
  color: #fff;
  border: 3px solid var(--line);
  border-radius: 8px;
  padding: 14px 30px;
  font-weight: 900;
  font-size: 1.2rem;
  cursor: pointer;
  font-family: var(--font);
  text-transform: uppercase;
  box-shadow: var(--sh);
}
.start:hover {
  transform: translate(-1px, -1px);
  box-shadow: 5px 5px 0 var(--line);
}
.level-pill {
  display: inline-block;
  margin-bottom: 12px;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink);
  background: var(--gold);
  border: 3px solid var(--line);
  border-radius: 6px;
  padding: 5px 14px;
  font-weight: 900;
}
.cast-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
  margin: 16px 0 4px;
}
.cast-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: #fff;
  border: 3px solid var(--line);
  border-radius: 999px;
  padding: 6px 14px 6px 6px;
  font-size: 0.85rem;
  font-weight: 800;
  box-shadow: var(--sh-sm);
}
.cast-chip .av {
  width: 30px;
  height: 30px;
  border-radius: 6px;
  border: 2px solid var(--line);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  color: #fff;
  overflow: hidden;
}
.cast-chip .av img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.cast-chip span {
  color: var(--muted);
}

/* ---- Glossary ---- */
.gloss {
  display: grid;
  gap: 12px;
}
.term {
  background: #fff;
  border: 3px solid var(--line);
  border-radius: 8px;
  padding: 14px 16px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  box-shadow: var(--sh-sm);
}
.term .ico {
  font-size: 1.7rem;
  flex: 0 0 auto;
}
.term h3 {
  font-size: 1.1rem;
  text-transform: uppercase;
}
.term .es-term {
  color: var(--blue);
  font-size: 0.9rem;
  font-style: italic;
}
.term p {
  color: var(--ink);
  margin-top: 4px;
  font-weight: 600;
}

/* ---- Mission complete ---- */
.complete {
  text-align: center;
  display: none;
}
.complete.show {
  display: block;
}
.complete .panel {
  margin-bottom: 18px;
}
.complete h2 {
  font-size: clamp(1.8rem, 6vw, 3rem);
  color: var(--ink);
  text-transform: uppercase;
}
.badge-done {
  display: inline-block;
  font-size: 3rem;
  margin: 8px;
}
.restart {
  min-height: 48px;
  margin-top: 14px;
  background: #fff;
  border: 3px solid var(--line);
  color: var(--ink);
  border-radius: 6px;
  padding: 12px 20px;
  font-weight: 800;
  cursor: pointer;
  font-family: var(--font);
  box-shadow: var(--sh-sm);
}
.restart:hover {
  background: var(--gold);
}
.locked-note {
  display: none;
  text-align: center;
  color: var(--muted);
  padding: 30px 10px;
  font-weight: 800;
}
.locked-note.show {
  display: block;
}
.bonus {
  margin-top: 24px;
  text-align: left;
  background: #fffbeb;
  border: 3px solid var(--line);
  border-radius: 8px;
  padding: 16px;
  box-shadow: var(--sh);
}
.bonus-tag {
  background: var(--gold);

/* ---- topbar HUD cluster (stars + sound + scratch pad) ---- */

}

  display: inline-flex;

  gap: 4px;
  min-height: 36px;
  padding: 0 10px;
  border: 3px solid var(--line);
  border-radius: 999px;
  background: #fff;
  font-weight: 900;
  font-size: 0.82rem;
  white-space: nowrap;
  box-shadow: var(--sh-sm);
}
.hud-stars.bump {
  animation: starBump 0.45s ease;
}
@keyframes starBump {
  0% { transform: scale(1); }
  40% { transform: scale(1.25); background: var(--gold); }
  100% { transform: scale(1); }
}
.iconbtn {
  min-height: 36px;
  min-width: 36px;
  border: 3px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 6px;
  box-shadow: var(--sh-sm);
  font-weight: 900;
  font-size: 0.95rem;
  cursor: pointer;
  padding: 0 8px;
  font-family: var(--font);
}
.iconbtn:hover {
  background: var(--gold);
}
.iconbtn[aria-pressed="true"],
.iconbtn[aria-expanded="true"] {
  background: var(--gold);
}

/* ---- cinematic panel: slow Ken-Burns drift + comic halftone texture ---- */
.panel > img {
  animation: kenburns 26s ease-in-out infinite alternate;
  transform-origin: 60% 40%;
}
@keyframes kenburns {
  from { transform: scale(1.02); }
  to { transform: scale(1.09) translate(-1.5%, -1%); }
}
.panel::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  opacity: 0.16;
  mix-blend-mode: multiply;
  background-image: radial-gradient(
    rgba(15, 23, 42, 0.55) 21%,
    transparent 22%
  );
  background-size: 5px 5px;
}

/* ---- speech bubble pop-in ---- */
.bubble {
  animation: bubblePop 0.28s cubic-bezier(0.2, 1.3, 0.5, 1) both;
}
@keyframes bubblePop {
  from { opacity: 0; transform: translateY(8px) scale(0.94); }
  to { opacity: 1; transform: none; }
}

/* ---- POW! comic burst stamped on the panel for a correct answer ---- */
.pow {
  position: absolute;
  z-index: 6;
  left: 50%;
  top: 46%;
  transform: translate(-50%, -50%) rotate(-9deg);
  background: var(--gold);
  color: var(--line);
  border: 4px solid var(--line);
  border-radius: 12px;
  padding: 8px 18px;
  font-weight: 900;
  font-size: clamp(1.3rem, 5vw, 2.2rem);
  text-transform: uppercase;
  letter-spacing: 0.02em;
  box-shadow: 6px 6px 0 var(--line);
  animation: powIn 0.9s ease forwards;
  pointer-events: none;
  white-space: nowrap;
}
@keyframes powIn {
  0% { transform: translate(-50%, -50%) rotate(-9deg) scale(0.2); opacity: 0; }
  35% { transform: translate(-50%, -50%) rotate(-9deg) scale(1.15); opacity: 1; }
  60% { transform: translate(-50%, -50%) rotate(-9deg) scale(1); }
  100% { transform: translate(-50%, -54%) rotate(-9deg) scale(1.02); opacity: 0; }
}

    <script>
/* ===========================================================================
   Neft Teacher · Graphic-Novel Engine  ·  gn-engine.js
   Renders a STORY object (window.GN_STORY) into a panel-based, dialogue-driven
   comic. One engine, 20 novels. No build step needed at runtime; fully offline.

   STORY shape is documented in story.schema.md. Key contracts preserved for the
   existing Neft results pipeline (do NOT rename):
     • each math choice group is a .choices container holding .choice buttons
     • a solved choice's correct button gets class "correct"
     • the master-rank group has id="choicesComplete" (excluded from scoring)
     • the finish scene is #scene-complete and gets classes show/active when done
   The nt-results.js tracker at the bottom of each file reads exactly those.
   =========================================================================== */
(function () {
  "use strict";
  var S = window.GN_STORY;
  if (!S) {
    console.error("GN: window.GN_STORY missing");
    return;
  }

  /* ---------- tiny helpers ---------- */
  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html != null) e.innerHTML = html;
    return e;
  }
  function $(id) {
    return document.getElementById(id);
  }
  function art(file) {
    return (S.meta.artBase || "") + file;
  }
  function txt(v) {
    return v == null ? "" : v;
  }

  /* ===========================================================================
     ENGAGEMENT LAYER (v2): sound, score stars, confetti, POW bursts, scratch
     pad, resume. Additive only — never touches the results-tracking contract
     (.choices / .choice.correct / #choicesComplete / #scene-complete).
     =========================================================================== */
  var RM =
    window.matchMedia &&
    window.matchMedia("(prefers-reduced-motion: reduce)").matches;
  var PKEY =
    "ntgn:" + String(location.pathname || "").replace(/\/+$/, "").toLowerCase();

  function lsGet(k) {
    try {
      return localStorage.getItem(k);
    } catch (e) {
      return null;
    }
  }
  function lsSet(k, v) {
    try {
      localStorage.setItem(k, v);
    } catch (e) {}
  }

  /* ---- score model: a "star" = a challenge solved on the FIRST try ---- */
  var SCORE = { total: 0, stars: 0, solved: {} };
  (S.acts || []).forEach(function (a) {
    (a.steps || []).forEach(function (st) {
      if (st.choices) SCORE.total++;
    });
  });
  var RESUMED = false;

  function updateHUD(bump) {
    var pill = $("gn-stars");
    if (!pill) return;
    pill.innerHTML = "⭐ " + SCORE.stars + "/" + SCORE.total;
    if (bump && !RM) {
      pill.classList.remove("bump");
      void pill.offsetWidth;
      pill.classList.add("bump");
    }
  }

  /* ---- synthesized sound (off by default, persisted, zero assets) ---- */
  var SND = { on: lsGet("ntgn:sound") === "on", ctx: null };
  function actx() {
    if (!SND.ctx) {
      try {
        SND.ctx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {}
    }
    return SND.ctx;
  }
  function tone(freq, dur, type, when, gain) {
    var c = actx();
    if (!c) return;
    var t = c.currentTime + (when || 0);
    var o = c.createOscillator(),
      g = c.createGain();
    o.type = type || "sine";
    o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain || 0.16, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g);
    g.connect(c.destination);
    o.start(t);
    o.stop(t + dur + 0.03);
  }
  function sfx(kind) {
    if (!SND.on) return;
    if (kind === "click") tone(420, 0.05, "square", 0, 0.05);
    else if (kind === "correct") {
      tone(660, 0.12, "sine", 0, 0.16);
      tone(990, 0.16, "sine", 0.1, 0.13);
    } else if (kind === "wrong") tone(150, 0.22, "sawtooth", 0, 0.09);
    else if (kind === "unlock") {
      tone(523, 0.1, "triangle", 0, 0.14);
      tone(784, 0.16, "triangle", 0.1, 0.14);
    } else if (kind === "win") {
      [523, 659, 784, 1047].forEach(function (f, i) {
        tone(f, 0.24, "triangle", i * 0.12, 0.16);
      });
    }
  }

  /* ---- confetti burst (canvas; skipped under reduced-motion) ---- */
  function confetti(power) {
    if (RM) return;
    var cv = $("gn-confetti");
    if (!cv) {
      cv = el("canvas");
      cv.id = "gn-confetti";
      cv.setAttribute("aria-hidden", "true");
      document.body.appendChild(cv);
    }
    var ctx = cv.getContext("2d");
    var W = (cv.width = window.innerWidth),
      H = (cv.height = window.innerHeight);
    var colors = [
      "#f2b705",
      "#1d4ed8",
      "#b42318",
      "#047857",
      "#ff8a3d",
      "#3da5ff",
    ];
    var parts = [];
    for (var i = 0; i < (power || 120); i++) {
      parts.push({
        x: W / 2 + (Math.random() - 0.5) * W * 0.5,
        y: H * 0.32 + (Math.random() - 0.5) * 60,
        vx: (Math.random() - 0.5) * 9,
        vy: Math.random() * -11 - 4,
        g: 0.3 + Math.random() * 0.2,
        s: 6 + Math.random() * 7,
        r: Math.random() * 6,
        vr: (Math.random() - 0.5) * 0.4,
        c: colors[i % colors.length],
      });
    }
    var frames = 0;
    (function tick() {
      frames++;
      ctx.clearRect(0, 0, W, H);
      var alive = false;
      parts.forEach(function (p) {
        p.vy += p.g;
        p.x += p.vx;
        p.y += p.vy;
        p.r += p.vr;
        if (p.y < H + 20) alive = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.r);
        ctx.fillStyle = p.c;
        ctx.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * 0.6);
        ctx.restore();
      });
      if (alive && frames < 240) requestAnimationFrame(tick);
      else ctx.clearRect(0, 0, W, H);
    })();
  }

  /* ---- POW! stamp on a panel for a correct answer ---- */
  function pow(panelEl, label) {
    if (!panelEl || RM) return;
    var p = el("div", "pow", label || "NICE!");
    panelEl.appendChild(p);
    setTimeout(function () {
      if (p.parentNode) p.parentNode.removeChild(p);
    }, 900);
  }

  /* ---- progress persistence (per page path; survives reloads) ---- */
  function saveProgress(extra) {
    var done = (S.acts || [])
      .filter(function (a) {
        return state[a.id];
      })
      .map(function (a) {
        return a.id;
      });
    var rec = {
      done: done,
      stars: SCORE.stars,
      total: SCORE.total,
      ts: Date.now(),
    };
    if (extra)
      Object.keys(extra).forEach(function (k) {
        rec[k] = extra[k];
      });
    lsSet(PKEY, JSON.stringify(rec));
  }
  function loadProgress() {
    try {
      return JSON.parse(lsGet(PKEY) || "null");
    } catch (e) {
      return null;
    }
  }
  function nextActId() {
    for (var i = 0; i < S.acts.length; i++) {
      if (!state[S.acts[i].id]) return S.acts[i].id;
    }
    return null;
  }

  /* ---- scratch pad (canvas for showing math work) ---- */
  function openScratch() {
    var w = $("gn-scratch") || buildScratch();
    w.classList.add("show");
    var b = $("gn-scratch-btn");
    if (b) b.setAttribute("aria-expanded", "true");
    var cv = $("scratch-canvas");
    cv.width = cv.clientWidth;
    cv.height = cv.clientHeight;
    var ctx = cv.getContext("2d");
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.lineWidth = 3;
    ctx.strokeStyle = "#1d4ed8";
  }
  function buildScratch() {
    var w = el("div", "scratch-wrap");
    w.id = "gn-scratch";
    w.innerHTML =
      '<div class="scratch-bar">' +
      '<span class="scratch-title">✏️ Scratch Pad — show your work</span>' +
      '<button class="iconbtn" id="scratch-clear">Clear</button>' +
      '<button class="iconbtn" id="scratch-close" aria-label="Close scratch pad">×</button>' +
      "</div>" +
      '<canvas id="scratch-canvas"></canvas>';
    document.body.appendChild(w);
    var cv = w.querySelector("#scratch-canvas");
    var ctx = cv.getContext("2d");
    var drawing = false;
    function pt(e) {
      var r = cv.getBoundingClientRect();
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }
    cv.addEventListener("pointerdown", function (e) {
      drawing = true;
      var p = pt(e);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      cv.setPointerCapture && cv.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    cv.addEventListener("pointermove", function (e) {
      if (!drawing) return;
      var p = pt(e);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      e.preventDefault();
    });
    window.addEventListener("pointerup", function () {
      drawing = false;
    });
    w.querySelector("#scratch-clear").onclick = function () {
      ctx.clearRect(0, 0, cv.width, cv.height);
    };
    w.querySelector("#scratch-close").onclick = function () {
      w.classList.remove("show");
      var b = $("gn-scratch-btn");
      if (b) b.setAttribute("aria-expanded", "false");
    };
    return w;
  }

  /* ---------- theme + document chrome ---------- */
  function applyTheme() {
    document.documentElement.lang = "en";
    document.title =
      "Graphic Novel #" + S.meta.version + " · " + stripTags(S.meta.title);
    if (S.meta.theme) {
      var r = document.documentElement;
      Object.keys(S.meta.theme).forEach(function (k) {
        r.style.setProperty(k, S.meta.theme[k]);
      });
    }
  }
  function stripTags(s) {
    return String(s).replace(/<[^>]+>/g, "");
  }

  /* ---------- speaker rendering (optional avatar slot) ---------- */
  function speaker(id) {
    return (
      (S.cast && S.cast[id]) || { name: id, color: "#c2461d", avatar: null }
    );
  }
  function whoTag(spkId, isMe) {
    var c = speaker(spkId);
    var inner;
    if (c.avatar) {
      inner =
        '<span class="av"><img src="' + art(c.avatar) + '" alt="" /></span>';
    } else {
      var initial = (c.tagIcon || c.name.charAt(0)).toString();
      inner = '<span class="av" aria-hidden="true">' + initial + "</span>";
    }
    return (
      '<span class="who" style="--spk:' +
      (c.color || "#c2461d") +
      '">' +
      inner +
      "<span>" +
      c.name +
      "</span>" +
      (isMe || c.role === "protagonist"
        ? '<span class="me">· YOU</span>'
        : "") +
      "</span>"
    );
  }

  /* ---------- vocab markup: wrap term occurrences with a tappable tag ----------
     A beat/challenge may carry vocab:[{term,en,es}]. We wrap the FIRST literal
     occurrence of term in the English text. Definitions open in a popover. */
  var VOCAB_STORE = [];
  function injectVocab(htmlEn, vocab) {
    if (!vocab || !vocab.length) return htmlEn;
    vocab.forEach(function (v) {
      var i = VOCAB_STORE.push(v) - 1;
      var re = new RegExp("(" + escapeRe(v.term) + ")", "i");
      htmlEn = htmlEn.replace(
        re,
        '<button type="button" class="vocab-tag" data-vocab="' +
          i +
          '" aria-label="Definition of ' +
          stripTags(v.term) +
          '">$1</button>',
      );
    });
    return htmlEn;
  }
  function escapeRe(s) {
    return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  /* ---------- popover (vocab + callout) ---------- */
  function openPop(anchor, title, en, es) {
    closePop();
    var back = el("div", "gn-pop-back");
    back.id = "gn-pop-back";
    back.addEventListener("click", closePop);
    var p = el("div", "gn-pop");
    p.id = "gn-pop";
    p.setAttribute("role", "dialog");
    p.setAttribute("aria-label", stripTags(title || "Definition"));
    p.innerHTML =
      '<button class="x" aria-label="Close">&times;</button>' +
      (title ? "<h4>" + title + "</h4>" : "") +
      '<div class="en">' +
      en +
      "</div>" +
      (es ? '<div class="es">' + es + "</div>" : "");
    document.body.appendChild(back);
    document.body.appendChild(p);
    p.querySelector(".x").addEventListener("click", closePop);
    // position near anchor, clamped to viewport
    var r = anchor.getBoundingClientRect();
    var pw = Math.min(280, window.innerWidth - 20);
    p.style.width = pw + "px";
    var left = Math.min(Math.max(10, r.left), window.innerWidth - pw - 10);
    var top = r.bottom + 8;
    if (top + p.offsetHeight > window.innerHeight - 10) {
      top = Math.max(10, r.top - p.offsetHeight - 8);
    }
    p.style.left = left + "px";
    p.style.top = top + "px";
    p.querySelector(".x").focus();
  }
  function closePop() {
    var a = $("gn-pop"),
      b = $("gn-pop-back");
    if (a) a.remove();
    if (b) b.remove();
  }
  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") closePop();
  });
  document.addEventListener("click", function (e) {
    var t = e.target.closest && e.target.closest(".vocab-tag");
    if (t) {
      var v = VOCAB_STORE[+t.dataset.vocab];
      if (v) openPop(t, v.term, v.en, v.es);
    }
  });

  /* ---------- bubble builder ---------- */
  function bubble(beat) {
    var c = speaker(beat.who);
    var isCap = c.role === "narrator" || beat.caption;
    var pos = beat.pos || (c.role === "protagonist" ? "right" : "left");
    var b = el(
      "div",
      "bubble " +
        pos +
        (isCap ? " caption" : "") +
        (beat.misconception ? " misc" : ""),
    );
    var en = injectVocab(txt(beat.en), beat.vocab);
    b.innerHTML =
      whoTag(beat.who) +
      '<div class="en">' +
      en +
      "</div>" +
      (beat.es ? '<div class="es">' + beat.es + "</div>" : "");
    return b;
  }

  /* =========================================================================
     BUILD DOM
     ========================================================================= */
  var SCENE_IDS = []; // cover, act ids..., gloss

  function build() {
    applyTheme();
    document.body.appendChild(buildTopbar());
    var main = el("main");
    main.appendChild(buildCover());
    S.acts.forEach(function (act, i) {
      main.appendChild(buildAct(act, i));
    });
    main.appendChild(buildComplete());
    main.appendChild(buildGloss());
    document.body.appendChild(main);
    wireTabs();
    wireHUD();
    buildGlossList();
    restoreProgress();
    refreshLocks();
    updateProgress();
    updateHUD();
    showScene("cover");
  }

  /* restore previously-completed chapters so a returning student keeps unlocks */
  function restoreProgress() {
    var saved = loadProgress();
    if (!saved || !saved.done || !saved.done.length) return;
    saved.done.forEach(function (id) {
      if (Object.prototype.hasOwnProperty.call(state, id)) state[id] = true;
    });
    RESUMED = true;
    var note = $("resume-note");
    if (note) note.style.display = "";
    var cont = $("continue-btn");
    if (cont) {
      cont.style.display = "";
      cont.addEventListener("click", function () {
        sfx("click");
        var nid = nextActId();
        if (nid) showScene(nid);
        else showComplete();
      });
    }
  }

  function wireHUD() {
    var snd = $("gn-sound");
    if (snd)
      snd.addEventListener("click", function () {
        SND.on = !SND.on;
        lsSet("ntgn:sound", SND.on ? "on" : "off");
        this.setAttribute("aria-pressed", SND.on ? "true" : "false");
        this.innerHTML = SND.on ? "🔊" : "🔇";
        if (SND.on) {
          var c = actx();
          if (c && c.state === "suspended") c.resume();
          sfx("click");
        }
      });
    var scr = $("gn-scratch-btn");
    if (scr)
      scr.addEventListener("click", function () {
        var w = $("gn-scratch");
        if (w && w.classList.contains("show")) {
          w.classList.remove("show");
          this.setAttribute("aria-expanded", "false");
        } else {
          openScratch();
        }
      });
  }

  function buildTopbar() {
    var bar = el("div", "topbar");
    var inner = el("div", "topbar-inner");
    inner.innerHTML =
      '<a class="home" href="' +
      (S.meta.home || "../index.html") +
      '">&#8592; Home</a>' +
      '<span class="title"><span class="v">#' +
      S.meta.version +
      "</span> " +
      S.meta.title +
      "</span>" +
      '<div class="progress-wrap"><div class="progress" role="progressbar" ' +
      'aria-label="Mission progress" aria-valuemin="0" aria-valuemax="100" ' +
      'aria-valuenow="0"><i id="bar"></i></div>' +
      '<span class="progress-label" id="plabel">0%</span></div>' +
      '<div class="hud">' +
      '<span class="hud-stars" id="gn-stars" title="Stars earned by solving on the first try" aria-label="Stars earned">⭐ 0/' +
      SCORE.total +
      "</span>" +
      '<button class="iconbtn" id="gn-sound" aria-pressed="' +
      (SND.on ? "true" : "false") +
      '" aria-label="Toggle sound" title="Sound effects">' +
      (SND.on ? "🔊" : "🔇") +
      "</button>" +
      '<button class="iconbtn" id="gn-scratch-btn" aria-expanded="false" ' +

  }
  function tabBtn(scene, label, locked) {

        .map(function (g) {

  /* ---- render the first-try star rating on the complete screen ---- */
  function fillResult() {
    var r = $("gn-result");
    if (!r) return;
    var t = SCORE.total || 1;
    var e = SCORE.stars;
    var ratio = e / t;
    var rating = ratio >= 1 ? 3 : ratio >= 0.6 ? 2 : 1;
    var stars = "";
    for (var i = 0; i < 3; i++)
      stars += '<span class="rs ' + (i < rating ? "on" : "") + '">★</span>';
    r.innerHTML =
      '<div class="rs-row">' +
      stars +
      "</div>" +
      '<div class="rs-line">First-try mastery: <b>' +
      e +
      "/" +
      t +
      "</b> (" +
      Math.round(ratio * 100) +
      "%)</div>";
    saveProgress({ pct: Math.round(ratio * 100), rating: rating });
    return rating;
  }

  function buildGloss() {
    var s = el("section", "scene");
    s.id = "scene-gloss";
    s.setAttribute("role", "tabpanel");
    s.setAttribute("aria-labelledby", "tab-gloss");

      '<div class="scene-head"><span class="act">Reference</span>' +
      "<h2>Glossary &middot; Word Bank</h2></div>" +

      var d = el("div", "term");
      d.innerHTML =
        '<div class="ico">' +

  /* =========================================================================
     STATE + NAVIGATION
     ========================================================================= */
  var state = {};
  S.acts.forEach(function (a) {
    state[a.id] = false;
  });

  function updateProgress() {
    var done = 0;
    S.acts.forEach(function (a) {
      if (state[a.id]) done++;
    });
    var pct = Math.round((done / S.acts.length) * 100);
    $("bar").style.width = pct + "%";
    $("plabel").textContent = pct + "%";
    document.querySelector(".progress").setAttribute("aria-valuenow", pct);
  }

  function refreshLocks() {
    S.acts.forEach(function (a, i) {
      if (i === 0) return;
      var prevDone = state[S.acts[i - 1].id];
      setLock("tab-" + a.id, !prevDone, a.tab);
      $("lock-" + a.id).classList.toggle("show", !prevDone);
      $("body-" + a.id).style.display = prevDone ? "" : "none";
    });
  }
  function setLock(tabId, locked, label) {
    var t = $(tabId);
    if (!t) return;
    t.classList.toggle("locked", locked);
    t.innerHTML = (locked ? '<span class="lk">&#128274;</span> ' : "") + label;
  }

  function showScene(name) {
    SCENE_IDS.forEach(function (s) {
      var sc = $("scene-" + s);
      if (sc) sc.classList.toggle("active", s === name);
      var tab = $("tab-" + s);
      if (tab) tab.setAttribute("aria-selected", s === name ? "true" : "false");
    });
    var cmp = $("scene-complete");
    cmp.classList.remove("active", "show");
    // (re)start the act's flow when entered
    var act = findAct(name);
    if (act && state.__started !== name) {
      state.__started = name;
      runAct(act);
    }
    closePop();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }
  function findAct(id) {
    for (var i = 0; i < S.acts.length; i++)
      if (S.acts[i].id === id) return S.acts[i];
    return null;
  }
  function showComplete() {
    SCENE_IDS.forEach(function (s) {
      var sc = $("scene-" + s);
      if (sc) sc.classList.remove("active");
    });
    document.querySelectorAll(".tab").forEach(function (t) {
      t.setAttribute("aria-selected", "false");
    });
    var c = $("scene-complete");
    c.classList.add("active", "show");
    fillResult();
    wireMaster();
    sfx("win");
    confetti(180);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function wireTabs() {
    var tabs = Array.prototype.slice.call(document.querySelectorAll(".tab"));
    tabs.forEach(function (tab) {
      tab.addEventListener("click", function () {
        if (tab.classList.contains("locked")) return;
        showScene(tab.dataset.scene);
      });
      tab.addEventListener("keydown", function (e) {
        var i = tabs.indexOf(tab);
        if (e.key === "ArrowRight") {
          e.preventDefault();
          (tabs[i + 1] || tabs[0]).focus();
        }
        if (e.key === "ArrowLeft") {
          e.preventDefault();
          (tabs[i - 1] || tabs[tabs.length - 1]).focus();
        }
      });
    });
    $("txtsize").addEventListener("click", cycleTextSize);
    $("restart-btn") &&
      $("restart-btn").addEventListener("click", function () {
        location.reload();
      });
  }
  function cycleTextSize() {
    var order = ["", "lg", "xl"],
      cur = document.body.dataset.text || "";
    var nxt = order[(order.indexOf(cur) + 1) % order.length];
    if (nxt) document.body.dataset.text = nxt;
    else delete document.body.dataset.text;
    $("txtsize").textContent = nxt === "lg" ? "A++" : nxt === "xl" ? "A" : "A+";
  }

  /* =========================================================================
     ACT RUNNER — plays an act's ordered steps:
       { type:"beats", art, alt, beats:[...] }   → panel + sequential bubbles
       { type:"challenge", ... }                 → voiced math, reply choices
     ========================================================================= */
  function runAct(act) {
    var stepIdx = 0;
    var imgEl = $("art-" + act.id);
    var speechEl = $("speech-" + act.id);
    var dotsEl = $("dots-" + act.id);
    var nextBtn = $("next-" + act.id);
    var chalHost = $("chal-" + act.id);
    var advBtn = $("adv-" + act.id);
    chalHost.innerHTML = "";

    function clearCallouts() {
      Array.prototype.slice
        .call($("panel-" + act.id).querySelectorAll(".callout"))
        .forEach(function (c) {
          c.remove();
        });
    }
    function setArt(file, alt) {
      if (file) {
        imgEl.src = art(file);
        imgEl.alt = txt(alt);
      }
    }

    function playStep() {
      var step = act.steps[stepIdx];
      if (!step) {
        advBtn.classList.add("show");
        return;
      }
      if (step.type === "beats") playBeats(step);
      else if (step.optional) playOptional(step);
      else playChallenge(step);
    }

    /* ---- beats ---- */
    function playBeats(step) {
      setArt(step.art, step.alt);
      clearCallouts();
      nextBtn.style.display = "";
      var bi = 0;
      dotsEl.innerHTML = "";
      step.beats.forEach(function () {
        dotsEl.appendChild(el("i"));
      });
      function renderBeat() {
        var beat = step.beats[bi];
        speechEl.innerHTML = "";
        speechEl.appendChild(bubble(beat));
        if (beat.callout) addCallout(beat.callout);
        Array.prototype.slice.call(dotsEl.children).forEach(function (d, k) {
          d.classList.toggle("on", k <= bi);
        });
        var last = bi === step.beats.length - 1;
        nextBtn.innerHTML = last
          ? step.lastLabel || "Continue &#9654;"
          : "Next &#9654;";
      }
      nextBtn.onclick = function () {
        sfx("click");
        if (bi < step.beats.length - 1) {
          bi++;
          renderBeat();
        } else {
          stepIdx++;
          playStep();
        }
      };
      renderBeat();
    }
    function addCallout(co) {
      var c = el("button", "callout", co.icon || "!");
      c.style.left = (co.x || 50) + "%";
      c.style.top = (co.y || 50) + "%";
      c.setAttribute("aria-label", "Callout: " + stripTags(co.en));
      c.addEventListener("click", function () {
        openPop(c, co.title || "", co.en, co.es);
      });
      $("panel-" + act.id).appendChild(c);
    }

    /* ---- challenge: gating (must solve to advance) ---- */
    function playChallenge(step) {
      renderCard(step, false);
      wireChoices(step, act, function () {
        if (step.solveArt) setArt(step.solveArt, step.solveAlt);
        if (step.solveBeat) {
          speechEl.innerHTML = "";
          speechEl.appendChild(bubble(step.solveBeat));
        }
        stepIdx++;
        // small beat so the success feedback is read before the next panel
        setTimeout(playStep, 400);
      });
    }

    /* ---- challenge: optional bonus (does NOT gate; still scored) ----
       Renders this and any consecutive optional steps, then reveals advance. */
    function playOptional(step) {
      renderCard(step, true);
      wireChoices(step, act, function () {
        if (step.solveBeat) {
          speechEl.innerHTML = "";
          speechEl.appendChild(bubble(step.solveBeat));
        }
      });
      stepIdx++;
      var nxt = act.steps[stepIdx];
      if (nxt && nxt.optional) playOptional(nxt);
      else advBtn.classList.add("show");
    }

    /* ---- shared challenge-card renderer ---- */
    function renderCard(step, optional) {
      if (step.art) setArt(step.art, step.alt);
      clearCallouts();
      nextBtn.style.display = "none";
      dotsEl.innerHTML = "";
      // the question is VOICED by a character, over the panel
      if (step.ask) {
        speechEl.innerHTML = "";
        speechEl.appendChild(
          bubble({
            who: step.ask.who,
            en: step.ask.en,
            es: step.ask.es,
            vocab: step.ask.vocab,
            misconception: step.ask.misconception,
            pos: step.ask.pos,
          }),
        );
        if (step.ask.callout) addCallout(step.ask.callout);
      }
      var wrap = el("div", "challenge" + (optional ? " bonus" : ""));
      wrap.id = "chal-" + act.id + "-" + step.id;
      if (optional) {
        wrap.innerHTML =
          '<span class="bonus-tag">' +
          (step.bonusTag || "&#11088; Bonus Challenge") +
          "</span>" +
          '<p class="prompt" style="font-size:0.82rem;color:var(--muted);' +
          'margin:6px 0">Optional — try it or press the button to move on.</p>';
      }
      var tools = '<div class="chal-tools">';
      if (step.hint) {
        tools +=
          '<button type="button" class="toolbtn" data-fold="hint-' +
          step.id +
          '" aria-expanded="false">&#128161; Need a hint?</button>';
      }
      if (step.frame) {
        tools +=
          '<button type="button" class="toolbtn" data-fold="coach-' +
          step.id +
          '" aria-expanded="false">&#9997;&#65039; Writing coach</button>';
      }
      tools += "</div>";
      var folds = "";
      if (step.hint) {
        folds +=
          '<div class="foldout" id="hint-' +
          step.id +
          '"><b>Hint:</b> ' +
          step.hint.en +
          (step.hint.es
            ? '<div class="es" style="margin-top:6px;' +
              'font-style:italic;color:#cdb89a">' +
              step.hint.es +
              "</div>"
            : "") +
          "</div>";
      }
      if (step.frame) {
        folds +=
          '<div class="foldout coach" id="coach-' +
          step.id +
          '"><b>Sentence frame:</b> ' +
          step.frame.en +
          (step.frame.es
            ? '<div class="es" style="margin-top:6px;font-style:' +
              'italic;color:#9fc0ef">' +
              step.frame.es +
              "</div>"
            : "") +
          "</div>";
      }
      var choices =
        '<div class="reply-label">Choose your reply</div>' +
        '<div class="choices" id="choices-' +
        act.id +
        "-" +
        step.id +
        '">';
      step.choices.forEach(function (c) {
        choices +=
          '<button class="choice" data-correct="' +
          !!c.correct +
          '">' +
          c.en +
          (c.tree ? '<span class="tree">' + c.tree + "</span>" : "") +
          (c.es ? '<span class="es">' + c.es + "</span>" : "") +
          "</button>";
      });
      choices += "</div>";
      wrap.innerHTML +=
        tools +
        folds +
        choices +
        '<div class="feedback" id="fb-' +
        act.id +
        "-" +
        step.id +
        '"></div>';
      chalHost.appendChild(wrap);
      wrap.scrollIntoView({ behavior: "smooth", block: "center" });
      wireFolds(wrap);
    }

    playStep();

    /* advance button → unlock next chapter / finish */
    advBtn.onclick = function () {
      state[act.id] = true;
      updateProgress();
      refreshLocks();
      saveProgress();
      sfx("unlock");
      var i = S.acts.indexOf(act);
      if (i < S.acts.length - 1) showScene(S.acts[i + 1].id);
      else showComplete();
    };
  }

  function wireFolds(root) {
    Array.prototype.slice
      .call(root.querySelectorAll(".toolbtn"))
      .forEach(function (b) {
        b.addEventListener("click", function () {
          var f = $(b.dataset.fold);
          var open = f.classList.toggle("show");
          b.setAttribute("aria-expanded", open ? "true" : "false");
        });
      });
  }

  function wireChoices(step, act, onSolve) {
    var groupId = "choices-" + act.id + "-" + step.id;
    var fbId = "fb-" + act.id + "-" + step.id;
    var key = act.id + "-" + step.id;
    var panelEl = $("panel-" + act.id);
    var solved = false,
      missed = false;
    Array.prototype.slice
      .call($(groupId).querySelectorAll(".choice"))
      .forEach(function (btn) {
        btn.addEventListener("click", function () {
          if (solved) return;
          var correct = btn.dataset.correct === "true";
          var fb = $(fbId);
          if (correct) {
            solved = true;
            btn.classList.add("correct");
            fb.className = "feedback show good";
            fb.innerHTML =
              step.goodEn +
              (step.goodEs
                ? '<span class="es">' + step.goodEs + "</span>"
                : "");
            Array.prototype.slice
              .call($(groupId).querySelectorAll(".choice"))
              .forEach(function (b) {
                b.disabled = true;
              });
            // award a star only when solved on the first try
            if (!missed && !SCORE.solved[key]) {
              SCORE.solved[key] = true;
              SCORE.stars++;
              updateHUD(true);
            }
            sfx("correct");
            pow(panelEl, missed ? "GOT IT!" : "NICE!");
            confetti(40);
            if (onSolve) onSolve();
          } else {
            missed = true;
            btn.classList.add("wrong");
            btn.disabled = true;
            fb.className = "feedback show bad";
            fb.innerHTML =
              step.badEn +
              (step.badEs ? '<span class="es">' + step.badEs + "</span>" : "");
            sfx("wrong");
          }
        });
      });
  }

  /* ---- master-rank challenge on the complete scene ---- */
  function wireMaster() {
    var group = $("choicesComplete");
    if (!group || group.dataset.wired) return;
    group.dataset.wired = "1";
    var fb = $("fbComplete");
    var solved = false;
    var m = S.complete.master || {};
    Array.prototype.slice
      .call(group.querySelectorAll(".choice"))
      .forEach(function (btn) {
        btn.addEventListener("click", function () {
          if (solved) return;
          var correct = btn.dataset.correct === "true";
          if (correct) {
            solved = true;
            btn.classList.add("correct");
            fb.className = "feedback show good";
            fb.style.display = "block";
            fb.innerHTML =
              m.goodEn ||
              "&#127942; <b>Master Rank Certified!</b> Perfect work! &#127775;";
            Array.prototype.slice
              .call(group.querySelectorAll(".choice"))
              .forEach(function (b) {
                b.disabled = true;
              });
            var h2 = document.querySelector("#scene-complete h2");
            if (h2 && m.certifyTitle) h2.innerHTML = m.certifyTitle;
            sfx("win");
            confetti(160);
          } else {
            btn.classList.add("wrong");
            btn.disabled = true;
            fb.className = "feedback show bad";
            fb.style.display = "block";
            fb.innerHTML =
              m.badEn || "&#10060; Not quite. Review and try another option!";
            sfx("wrong");
          }
        });
      });
  }

  /* ---------- go ---------- */
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", build);
  } else {
    build();
  }
})();

    </script>

  <script src="/teacher-tools/nt-results.js"></script>
  <script>
  /* Graphic-novel completion tracking -> NTResults (Neft Teacher). Unchanged. */
  (function () {
    "use strict";
    var FIRED = false;
    var complete = document.getElementById("scene-complete");
    if (!complete || typeof NTResults === "undefined") return;
    function studentName() {
      try {
        var k = "nt_gn_student";
        var n = localStorage.getItem(k);
        if (n && n.trim()) return n.trim();
        n = window.prompt("Type your name so your teacher can see you finished:", "");
        n = (n || "").trim();
        if (n) { try { localStorage.setItem(k, n); } catch (e) {} }
        return n || "Student";
      } catch (e) { return "Student"; }
    }
    function score() {
      var groups = Array.prototype.slice.call(document.querySelectorAll(".choices"))
        .filter(function (g) { return g.id !== "choicesComplete"; });
      var total = groups.length || 0;
      var correct = groups.filter(function (g) {
        return g.querySelector(".choice.correct");
      }).length;
      return { correct: correct, total: total };
    }
    function savedNote() {
      if (document.getElementById("nt-saved-note")) return;
      var p = document.createElement("p");
      p.id = "nt-saved-note";
      p.setAttribute("role", "status");
      p.style.cssText = "margin-top:14px;font-size:0.9rem;color:#7bdcb5;font-weight:600;";
      p.textContent = "✓ Results saved for your teacher.";
      complete.insertBefore(p, complete.querySelector(".restart") || null);
    }
    function record() {
      if (FIRED) return; FIRED = true;
      var s = score();
      try {
        NTResults.finish({
          student: studentName(),
          assessment: window.GN_STORY.meta.assessment,
          standard: window.GN_STORY.meta.standard,
          level: String(window.GN_STORY.meta.version),
          sections: [{ name: "Story Challenges", correct: s.correct, total: s.total }],
          correct: s.correct, total: s.total, download: false,
        });
      } catch (e) {}
      savedNote();
    }
    function visible() {
      return complete.classList.contains("show") || complete.classList.contains("active");
    }
    if (visible()) record();
    var mo = new MutationObserver(function () { if (visible()) record(); });
    mo.observe(complete, { attributes: true, attributeFilter: ["class"] });
  })();
  </script>
  <script src="/assets/nt-page-enhance.js" defer></script>
