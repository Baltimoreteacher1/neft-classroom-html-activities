<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Data Studio Master — Neft Teacher Professional Analytics</title>
    <meta
      name="description"
      content="A professional local-first classroom data analysis studio with advanced statistical modeling, dynamic visualization, and plain-language pedagogical recommendations. By Neft Teacher."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d3b66'/><text x='50' y='68' font-size='52' font-weight='900' text-anchor='middle' fill='%2314b8a6' font-family='system-ui'>DS</text></svg>"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
      rel="stylesheet"
    />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- Dependencies (Sandboxed & Local-ready) -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"
      integrity="sha384-vtjasyidUo0kW94K5MXDXntzOJpQgBKXmE7e2Ga4LG0skTTLeBi97eFAXsqewJjw"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"
      integrity="sha384-bs/nf9FbdNouRbMiFcrcZfLXYPKiPaGVGplVbv7dLGECccEXDW+S3zjqSKR5ZEaD"
      crossorigin="anonymous"
    ></script>

    <style>
      :root {
        /* Premium Ocean Slate Palette */
        --bg-main: hsl(218, 40%, 97%);
        --bg-panel: hsl(220, 30%, 96%);
        --bg-card: hsl(0, 0%, 100%);
        --text-primary: hsl(220, 45%, 15%);
        --text-secondary: hsl(220, 20%, 42%);
        --text-muted: hsl(220, 15%, 60%);

        --brand-primary: hsl(210, 80%, 25%);
        --brand-secondary: hsl(175, 75%, 33%);
        --brand-soft: hsl(175, 70%, 94%);
        --brand-glow: hsla(175, 75%, 33%, 0.15);

        /* Zone Colors */
        --color-urgent: hsl(0, 75%, 55%);
        --color-urgent-soft: hsl(0, 85%, 96%);
        --color-reteach: hsl(38, 90%, 45%);
        --color-reteach-soft: hsl(38, 95%, 96%);
        --color-ontrack: hsl(210, 80%, 45%);
        --color-ontrack-soft: hsl(210, 85%, 96%);
        --color-extension: hsl(140, 70%, 40%);
        --color-extension-soft: hsl(140, 75%, 95%);
        --color-missing: hsl(210, 15%, 85%);
        --color-missing-soft: hsl(210, 20%, 96%);

        /* Layout & Borders */
        --border-primary: hsl(215, 25%, 88%);
        --border-light: hsl(215, 30%, 94%);
        --shadow-subtle:
          0 1px 3px rgba(15, 23, 42, 0.04), 0 4px 18px rgba(15, 23, 42, 0.05);
        --shadow-md:
          0 4px 6px -1px rgba(15, 23, 42, 0.05),
          0 10px 15px -3px rgba(15, 23, 42, 0.08);
        --radius-lg: 20px;
        --radius-md: 14px;
        --radius-sm: 8px;

        /* Fonts */
        --font-sans:
          "DM Sans", ui-sans-serif, system-ui, -apple-system, sans-serif;
        --font-serif: "DM Serif Display", Georgia, serif;

        --transition-base: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        --focus-ring: 0 0 0 3px hsla(210, 80%, 45%, 0.25);
      }

      body.dark-theme {
        --bg-main: hsl(220, 40%, 8%);
        --bg-panel: hsl(220, 35%, 12%);
        --bg-card: hsl(220, 30%, 16%);
        --text-primary: hsl(220, 20%, 96%);
        --text-secondary: hsl(220, 15%, 78%);
        --text-muted: hsl(220, 10%, 55%);

        --brand-primary: hsl(210, 90%, 75%);
        --brand-secondary: hsl(175, 80%, 45%);
        --brand-soft: hsl(220, 40%, 20%);
        --brand-glow: hsla(175, 80%, 45%, 0.25);

        --border-primary: hsl(220, 30%, 22%);
        --border-light: hsl(220, 30%, 26%);

        --color-urgent-soft: hsl(0, 85%, 20%);
        --color-reteach-soft: hsl(38, 95%, 18%);
        --color-ontrack-soft: hsl(210, 85%, 20%);
        --color-extension-soft: hsl(140, 75%, 16%);
        --color-missing-soft: hsl(210, 20%, 22%);
        --shadow-subtle:
          0 1px 3px rgba(0, 0, 0, 0.3), 0 4px 18px rgba(0, 0, 0, 0.4);
        --shadow-md:
          0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 10px 15px -3px rgba(0, 0, 0, 0.5);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
        height: 100%;
      }

      body {
        background: radial-gradient(
          at top right,
          hsl(214, 40%, 98%),
          var(--bg-main)
        );
        color: var(--text-primary);
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        height: 100%;
        overflow: hidden;
      }

      button,
      input,
      select,
      textarea {
        font-family: inherit;
        font-size: inherit;
        color: inherit;
      }

      button {
        cursor: pointer;
        border: none;
        background: none;
      }

      /* Global Layout */
      .app {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100vw;
        animation: pageSlideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes pageSlideIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .topbar {
        height: 70px;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border-primary);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        z-index: 50;
        flex-shrink: 0;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        user-select: none;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: linear-gradient(
          135deg,
          var(--brand-primary),
          var(--brand-secondary)
        );
        color: white;
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 1.15rem;
        box-shadow: 0 4px 10px rgba(15, 118, 110, 0.25);
        transition: var(--transition-base);
      }

      .brand:hover .brand-mark {
        transform: scale(1.05);
      }

      .brand-copy {
        display: flex;
        flex-direction: column;
        line-height: 1.2;
      }

      .brand-title {
        font-weight: 800;
        font-size: 1.15rem;
        letter-spacing: -0.02em;
        color: var(--brand-primary);
      }

      .brand-subtitle {
        font-size: 0.76rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-secondary);
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      /* Shell & Sidebar Layout */
      .shell {
        display: flex;
        flex: 1;
        overflow: hidden;
        height: calc(100vh - 70px);
      }

      .sidebar {
        width: 280px;
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(20px);
        border-right: 1px solid var(--border-primary);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow-y: auto;
        padding: 24px 16px;
        gap: 20px;
      }

      .sidebar-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .sidebar-section-title {
        font-size: 0.72rem;
        text-transform: uppercase;
        font-weight: 800;
        letter-spacing: 0.12em;
        color: var(--text-muted);
        padding-left: 8px;
        margin-bottom: 4px;
      }

      .nav-menu {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-radius: var(--radius-md);
        font-weight: 600;
        font-size: 0.94rem;
        color: var(--text-secondary);
        transition: var(--transition-base);
      }

      .nav-item:hover {
        background: var(--bg-panel);
        color: var(--text-primary);
      }

      .nav-item.active {
        background: var(--brand-soft);
        color: var(--brand-secondary);
        box-shadow: inset 0 0 0 1px hsla(175, 75%, 33%, 0.15);
      }

      .nav-icon {
        font-size: 1.15rem;
        width: 20px;
        text-align: center;
      }

      /* Main Scroll Area */
      .main {
        flex: 1;
        overflow-y: auto;
        padding: 32px;
        position: relative;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 28px;
      }

      /* Landing Page Design */
      .landing-hero {
        text-align: center;
        padding: 60px 24px;
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-subtle);
        border: 1px solid var(--border-primary);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .landing-eyebrow {
        font-size: 0.8rem;
        font-weight: 800;
        color: var(--brand-secondary);
        text-transform: uppercase;
        letter-spacing: 0.15em;
      }

      .landing-title {
        font-family: var(--font-serif);
        font-size: 3.5rem;
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -0.03em;
        color: var(--brand-primary);
        max-width: 18ch;
      }

      .landing-lead {
        font-size: 1.15rem;
        color: var(--text-secondary);
        max-width: 52ch;
      }

      .landing-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        width: 100%;
        max-width: 900px;
        margin-top: 20px;
      }

      .drop-zone {
        background: var(--bg-panel);
        border: 2px dashed var(--border-primary);
        border-radius: var(--radius-lg);
        padding: 40px;
        text-align: center;
        transition: var(--transition-base);
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }

      .drop-zone:hover {
        border-color: var(--brand-secondary);
        background: var(--bg-card);
      }

      .drop-icon {
        font-size: 3.2rem;
        background: white;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        box-shadow: var(--shadow-subtle);
        margin-bottom: 8px;
      }

      .drop-title {
        font-weight: 700;
        font-size: 1.2rem;
        color: var(--brand-primary);
      }

      .demo-card {
        background: var(--bg-card);
        border: 1px solid var(--border-primary);
        border-radius: var(--radius-lg);
        padding: 40px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 16px;
        text-align: center;
      }

      /* Premium Card & Layout Widgets */
      .card {
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-subtle);
        border: 1px solid var(--border-primary);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow: hidden;
        transition: var(--transition-base);
      }

      .card:hover {
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid var(--border-light);
        padding-bottom: 16px;
      }

      .card-title {
        font-size: 1.25rem;
        font-weight: 800;
        color: var(--brand-primary);
        letter-spacing: -0.02em;
      }

      .card-subtitle {
        font-size: 0.88rem;
        color: var(--text-secondary);
        margin-top: 2px;
      }

      /* Grid System */
      .grid {
        display: grid;
        gap: 24px;
      }

      .grid-4 {
        grid-template-columns: repeat(4, 1fr);
      }
      .grid-3 {
        grid-template-columns: repeat(3, 1fr);
      }
      .grid-2 {
        grid-template-columns: repeat(2, 1fr);
      }
      .grid-1-3 {
        grid-template-columns: 280px 1fr;
      }
      .grid-3-1 {
        grid-template-columns: 1fr 340px;
      }

      @media (max-width: 900px) {
        .grid-4,
        .grid-3,
        .grid-2,
        .grid-1-3,
        .grid-3-1 {
          grid-template-columns: 1fr;
        }
      }

      /* Buttons & Input Controls */
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 10px 18px;
        font-weight: 700;
        border-radius: var(--radius-md);
        transition: var(--transition-base);
        text-decoration: none;
        white-space: nowrap;
        font-size: 0.94rem;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow-subtle);
      }

      .btn-primary {
        background: var(--brand-primary);
        color: white;
      }

      .btn-primary:hover {
        background: hsl(210, 80%, 20%);
      }

      .btn-teal {
        background: var(--brand-secondary);
        color: white;
      }

      .btn-teal:hover {
        background: hsl(175, 75%, 26%);
      }

      .btn-light {
        background: white;
        border: 1px solid var(--border-primary);
        color: var(--text-primary);
      }

      .btn-light:hover {
        background: var(--bg-panel);
      }

      .btn-danger {
        background: var(--color-urgent-soft);
        color: var(--color-urgent);
        border: 1px solid hsl(0, 75%, 90%);
      }

      .btn-danger:hover {
        background: hsl(0, 75%, 92%);
      }

      .btn-small {
        padding: 6px 12px;
        font-size: 0.85rem;
        border-radius: var(--radius-sm);
      }

      .control-panel {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        background: var(--bg-panel);
        padding: 16px;
        border-radius: var(--radius-md);
        border: 1px solid var(--border-light);
        align-items: center;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 140px;
        flex: 1;
      }

      .control-group label {
        font-size: 0.74rem;
        font-weight: 800;
        text-transform: uppercase;
        color: var(--text-secondary);
        letter-spacing: 0.05em;
      }

      .control-group select,
      .control-group input {
        width: 100%;
        background: white;
        border: 1px solid var(--border-primary);
        border-radius: var(--radius-sm);
        padding: 8px 12px;
        font-size: 0.9rem;
        font-weight: 500;
        transition: var(--transition-base);
      }

      .control-group select:focus,
      .control-group input:focus {
        outline: none;
        border-color: var(--brand-secondary);
        box-shadow: var(--focus-ring);
      }

      /* KPI Cards */
      .kpi-card {
        background: white;
        border: 1px solid var(--border-primary);
        border-radius: var(--radius-md);
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        box-shadow: var(--shadow-subtle);
        position: relative;
        overflow: hidden;
      }

      .kpi-card::after {
        content: "";
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--brand-primary),
          var(--brand-secondary)
        );
      }

      .kpi-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: grid;
        place-items: center;
        font-size: 1.5rem;
      }

      .kpi-data {
        display: flex;
        flex-direction: column;
        line-height: 1.35;
      }

      .kpi-value {
        font-size: 1.75rem;
        font-weight: 800;
        color: var(--brand-primary);
        letter-spacing: -0.03em;
      }

      .kpi-label {
        font-size: 0.8rem;
        color: var(--text-secondary);
        font-weight: 700;
      }

      /* Premium Tables */
      .table-wrap {
        border-radius: var(--radius-md);
        border: 1px solid var(--border-primary);
        overflow: hidden;
        box-shadow: var(--shadow-subtle);
        background: white;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        text-align: left;
      }

      th {
        background: var(--bg-panel);
        color: var(--brand-primary);
        font-weight: 800;
        font-size: 0.82rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border-primary);
      }

      td {
        padding: 12px 18px;
        border-bottom: 1px solid var(--border-light);
        font-size: 0.94rem;
        color: var(--text-primary);
        font-weight: 500;
      }

      tr:last-child td {
        border-bottom: none;
      }

      tr:hover td {
        background: var(--bg-panel);
      }

      /* Stat Bands */
      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        font-weight: 800;
        font-size: 0.76rem;
        border-radius: 999px;
        text-transform: uppercase;
        letter-spacing: 0.02em;
      }

      .badge-urgent {
        background: var(--color-urgent-soft);
        color: var(--color-urgent);
      }
      .badge-reteach {
        background: var(--color-reteach-soft);
        color: var(--color-reteach);
      }
      .badge-ontrack {
        background: var(--color-ontrack-soft);
        color: var(--color-ontrack);
      }
      .badge-extension {
        background: var(--color-extension-soft);
        color: var(--color-extension);
      }

      /* Modals & Dialogs */
      .modal-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(8px);
        z-index: 100;
        display: none;
      }

      .modal {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border-primary);
        width: 100%;
        max-width: 580px;
        z-index: 110;
        display: none;
        flex-direction: column;
      }

      .modal-header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border-light);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .modal-title {
        font-size: 1.3rem;
        font-weight: 800;
        color: var(--brand-primary);
      }

      .modal-body {
        padding: 24px;
        max-height: 70vh;
        overflow-y: auto;
      }

      .modal-footer {
        padding: 16px 24px;
        border-top: 1px solid var(--border-light);
        display: flex;
        justify-content: flex-end;
        gap: 12px;
      }

      /* Toast Notifications */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--brand-primary);
        color: white;
        font-weight: 700;
        padding: 12px 20px;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-md);
        display: none;
        z-index: 200;
        animation: slideInUp 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      }

      @keyframes slideInUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      /* Developer Diagnostics Console (Ctrl + D) */
      .diagnostics-panel {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(12px);
        color: hsl(120, 80%, 40%);
        font-family:
          Menlo,
          Monaco,
          Consolas,
          Courier New,
          monospace;
        font-size: 0.88rem;
        padding: 40px;
        z-index: 1000;
        display: none;
        flex-direction: column;
        gap: 20px;
        overflow: hidden;
      }

      .diag-header {
        display: flex;
        justify-content: space-between;
        border-bottom: 2px solid hsl(120, 80%, 30%);
        padding-bottom: 12px;
      }

      .diag-title {
        font-size: 1.2rem;
        font-weight: 800;
      }

      .diag-log-container {
        flex: 1;
        background: black;
        border-radius: var(--radius-sm);
        padding: 16px;
        overflow-y: auto;
        border: 1px solid hsl(120, 80%, 20%);
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .diag-log {
        line-height: 1.45;
        white-space: pre-wrap;
      }

      .diag-log.info {
        color: hsl(120, 80%, 40%);
      }
      .diag-log.warn {
        color: hsl(45, 90%, 55%);
      }
      .diag-log.error {
        color: hsl(0, 90%, 65%);
      }

      /* Whiteboard Mathematics Cards inside Planning Studio */
      .whiteboard-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-top: 16px;
      }

      .whiteboard-card {
        background: white;
        border: 1px solid var(--border-primary);
        border-radius: var(--radius-md);
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        box-shadow: var(--shadow-subtle);
        text-align: center;
      }

      .whiteboard-card-title {
        font-weight: 800;
        color: var(--brand-primary);
        font-size: 0.95rem;
      }

      .whiteboard-formula {
        font-family: var(--font-serif);
        font-size: 1.05rem;
        color: var(--brand-secondary);
        background: var(--bg-panel);
        padding: 4px 8px;
        border-radius: var(--radius-sm);
        width: 100%;
      }

      /* Hover Tooltips on Stacked Student Scale */
      .scatter-tooltip {
        position: absolute;
        background: rgba(15, 23, 42, 0.95);
        color: white;
        padding: 8px 12px;
        border-radius: var(--radius-sm);
        font-size: 0.82rem;
        z-index: 100;
        pointer-events: none;
        display: none;
        box-shadow: var(--shadow-md);
        border: 1px solid var(--brand-secondary);
        line-height: 1.4;
      }

      /* Interactive Drag Target Slider Styles */
      .target-slider-track {
        cursor: ew-resize;
      }
      .target-slider-handle {
        cursor: grab;
        transition: transform 0.1s ease;
      }
      .target-slider-handle:active {
        cursor: grabbing;
        transform: scale(1.15);
      }

      /* Statistical Info Buttons Styling */
      .info-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--brand-soft);
        color: var(--brand-secondary);
        font-size: 0.8rem;
        font-weight: 800;
        cursor: pointer;
        transition: var(--transition-base);
        border: 1px solid hsla(175, 75%, 33%, 0.15);
        user-select: none;
        margin-left: 6px;
        vertical-align: middle;
      }

      .info-btn:hover {
        background: var(--brand-secondary);
        color: white;
        transform: scale(1.1);
      }

      .kpi-info-btn {
        position: absolute;
        top: 10px;
        right: 12px;
        font-size: 0.85rem;
        color: var(--text-muted);
        cursor: pointer;
        transition: var(--transition-base);
        font-weight: bold;
        user-select: none;
        z-index: 10;
      }

      .kpi-info-btn:hover {
        color: var(--brand-secondary);
        transform: scale(1.15);
      }

      .modal-body p {
        margin-bottom: 12px;
      }

      .modal-body ul,
      .modal-body ol {
        margin-left: 20px;
        margin-bottom: 12px;
      }

      .modal-body li {
        margin-bottom: 6px;
      }

      .modal-body h4 {
        margin-top: 16px;
        margin-bottom: 6px;
        color: var(--brand-primary);
        font-weight: 800;
      }

      .modal-body .simple-math-box {
        background: var(--bg-panel);
        border-left: 4px solid var(--brand-secondary);
        padding: 10px 14px;
        border-radius: var(--radius-sm);
        margin: 12px 0;
        font-weight: 500;
      }

      /* Premium Printable CSS Stylesheets */
      @media print {
        body {
          background: white;
          color: black;
          font-size: 12pt;
        }

        .topbar,
        .sidebar,
        .control-panel,
        .btn,
        .modal-backdrop,
        .modal,
        .toast {
          display: none !important;
        }

        .shell {
          height: auto;
          overflow: visible;
        }

        .main {
          padding: 0;
          overflow: visible;
        }

        .card {
          border: none;
          box-shadow: none;
          padding: 0;
          margin-bottom: 24pt;
          break-inside: avoid;
        }

        table {
          break-inside: auto;
        }

        tr {
          break-inside: avoid;
          page-break-inside: avoid;
        }
      }
      /* ======================================================
         Gold-Standard Enhancement Layer — 2025-05-22
         Adds product-grade onboarding, accessibility, executive
         synthesis, quality diagnostics, export packaging, and
         clearer teacher-facing interaction patterns.
         ====================================================== */

      :root {
        --gold-accent: hsl(42, 88%, 54%);
        --gold-soft: hsl(42, 95%, 94%);
        --ok: hsl(150, 72%, 34%);
        --ok-soft: hsl(150, 76%, 94%);
        --warn: hsl(36, 92%, 48%);
        --warn-soft: hsl(36, 95%, 94%);
        --danger: hsl(0, 74%, 54%);
        --danger-soft: hsl(0, 85%, 96%);
        --ink-shadow: 0 16px 50px rgba(15, 23, 42, 0.12);
      }

      body.dark-theme .topbar,
      body.dark-theme .sidebar {
        background: rgba(15, 23, 42, 0.78);
      }

      body.dark-theme .drop-icon,
      body.dark-theme .kpi-card,
      body.dark-theme .demo-card,
      body.dark-theme .table-wrap,
      body.dark-theme .control-group select,
      body.dark-theme .control-group input,
      body.dark-theme .modal {
        background: var(--bg-card);
      }

      body.dark-theme input,
      body.dark-theme select,
      body.dark-theme textarea {
        background: var(--bg-card) !important;
        border-color: var(--border-primary) !important;
      }

      body.dark-theme svg[style*="background:white"] {
        background: var(--bg-card) !important;
      }

      .skip-link {
        position: fixed;
        left: 16px;
        top: -48px;
        z-index: 9999;
        background: var(--brand-primary);
        color: white;
        padding: 10px 14px;
        border-radius: 10px;
        font-weight: 800;
        transition: top 0.16s ease;
      }

      .skip-link:focus {
        top: 14px;
        outline: 3px solid var(--gold-accent);
      }

      :focus-visible {
        outline: 3px solid hsla(175, 75%, 33%, 0.35);
        outline-offset: 2px;
      }

      .gold-hero {
        position: relative;
        overflow: hidden;
        isolation: isolate;
        background:
          radial-gradient(
            circle at top left,
            hsla(175, 75%, 33%, 0.18),
            transparent 34%
          ),
          linear-gradient(135deg, var(--bg-card), var(--bg-panel));
      }

      .gold-hero::after {
        content: "";
        position: absolute;
        inset: auto -10% -38% 35%;
        height: 260px;
        background: radial-gradient(
          circle,
          hsla(210, 80%, 25%, 0.12),
          transparent 62%
        );
        z-index: -1;
      }

      .gold-chip-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .gold-chip,
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border: 1px solid var(--border-primary);
        background: var(--bg-card);
        color: var(--text-secondary);
        border-radius: 999px;
        padding: 7px 11px;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.01em;
      }

      .status-pill.good {
        background: var(--ok-soft);
        color: var(--ok);
        border-color: hsla(150, 72%, 34%, 0.22);
      }

      .status-pill.warn {
        background: var(--warn-soft);
        color: var(--warn);
        border-color: hsla(36, 92%, 48%, 0.24);
      }

      .status-pill.danger {
        background: var(--danger-soft);
        color: var(--danger);
        border-color: hsla(0, 74%, 54%, 0.24);
      }

      .release-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: linear-gradient(
          135deg,
          var(--brand-primary),
          var(--brand-secondary)
        );
        color: white;
        border-radius: 999px;
        padding: 8px 13px;
        font-size: 0.78rem;
        font-weight: 900;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        box-shadow: var(--shadow-subtle);
      }

      .launch-card {
        min-height: 248px;
        justify-content: center;
      }

      /* Data Setup Panel */
      .setup-panel {
        max-width: 860px;
        margin: 0 auto;
        padding: 48px 24px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
      }
      .setup-header {
        text-align: center;
        margin-bottom: 8px;
      }
      .setup-header h1 {
        font-family: var(--font-serif);
        font-size: 2.2rem;
        font-weight: 800;
        color: var(--brand-primary);
        margin: 0 0 8px;
      }
      .setup-header p {
        color: var(--text-secondary);
        font-size: 1.05rem;
        max-width: 52ch;
        margin: 0 auto;
      }
      .setup-card {
        background: var(--bg-card);
        border: 1px solid var(--border-primary);
        border-radius: var(--radius-lg);
        padding: 28px;
        width: 100%;
        box-shadow: var(--shadow-subtle);
      }
      .setup-card h3 {
        font-size: 1rem;
        font-weight: 800;
        color: var(--brand-primary);
        margin: 0 0 6px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .setup-card h3 .setup-badge {
        font-size: 0.68rem;
        font-weight: 700;
        background: var(--ok-soft);
        color: var(--ok);
        border-radius: 999px;
        padding: 2px 8px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .setup-card h3 .setup-badge.optional {
        background: var(--bg-panel);
        color: var(--text-muted);
      }
      .setup-card-hint {
        font-size: 0.84rem;
        color: var(--text-muted);
        margin: 0 0 18px;
      }
      .setup-mapping-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 14px;
      }
      .setup-mapping-item {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .setup-mapping-item label {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .setup-mapping-item select,
      .setup-mapping-item input {
        padding: 8px 12px;
        border: 1px solid var(--border-primary);
        border-radius: var(--radius-md);
        background: var(--bg-panel);
        color: var(--text-primary);
        font-size: 0.88rem;
        font-weight: 600;
      }
      .setup-mapping-item select:focus,
      .setup-mapping-item input:focus {
        outline: none;
        border-color: var(--brand-secondary);
        box-shadow: 0 0 0 3px hsla(175, 72%, 40%, 0.12);
      }
      .setup-mapping-item .match-ok {
        color: var(--ok);
        font-size: 0.76rem;
        font-weight: 600;
      }
      .setup-mapping-item .match-miss {
        color: var(--text-muted);
        font-size: 0.76rem;
        font-style: italic;
      }
      .setup-preview-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.82rem;
        margin-top: 12px;
        border-radius: var(--radius-md);
        overflow: hidden;
      }
      .setup-preview-table th {
        background: var(--brand-primary);
        color: white;
        padding: 8px 12px;
        text-align: left;
        font-weight: 700;
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .setup-preview-table td {
        padding: 7px 12px;
        border-bottom: 1px solid var(--border-primary);
        color: var(--text-primary);
      }
      .setup-preview-table tr:nth-child(even) td {
        background: var(--bg-panel);
      }
      .setup-meta-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 14px;
      }
      .setup-actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        padding-top: 8px;
      }
      .setup-actions .btn {
        min-width: 160px;
        font-size: 1rem;
        padding: 12px 28px;
      }
      .setup-record-count {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--ok-soft);
        color: var(--ok);
        border-radius: 999px;
        padding: 4px 14px;
        font-size: 0.82rem;
        font-weight: 800;
      }
      @media (max-width: 640px) {
        .setup-mapping-grid,
        .setup-meta-grid {
          grid-template-columns: 1fr;
        }
        .setup-panel {
          padding: 24px 14px;
        }
      }

      /* Template Builder Card */
      .tmpl-builder {
        background: var(--bg-card);
        border: 1px solid var(--border-primary);
        border-radius: var(--radius-lg);
        padding: 28px 24px;
        width: 100%;
        max-width: 900px;
        margin-top: 8px;
        box-shadow: var(--shadow-subtle);
      }
      .tmpl-builder h3 {
        font-size: 1.05rem;
        font-weight: 800;
        color: var(--brand-primary);
        margin: 0 0 4px;
      }
      .tmpl-builder .tmpl-sub {
        font-size: 0.84rem;
        color: var(--text-muted);
        margin: 0 0 18px;
      }
      .tmpl-form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 12px;
      }
      .tmpl-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .tmpl-field label {
        font-size: 0.74rem;
        font-weight: 700;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .tmpl-field select,
      .tmpl-field input {
        padding: 7px 10px;
        border: 1px solid var(--border-primary);
        border-radius: var(--radius-md);
        background: var(--bg-panel);
        color: var(--text-primary);
        font-size: 0.86rem;
        font-weight: 600;
      }
      .tmpl-field select:focus,
      .tmpl-field input:focus {
        outline: none;
        border-color: var(--brand-secondary);
        box-shadow: 0 0 0 3px hsla(175, 72%, 40%, 0.12);
      }
      .tmpl-actions {
        display: flex;
        gap: 10px;
        margin-top: 18px;
        align-items: center;
        flex-wrap: wrap;
      }
      .tmpl-actions .tmpl-or {
        font-size: 0.82rem;
        color: var(--text-muted);
        font-weight: 600;
      }
      @media (max-width: 640px) {
        .tmpl-form-grid {
          grid-template-columns: 1fr 1fr;
        }
      }

      .schema-list {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .schema-item,
      .insight-item,
      .coach-move,
      .quality-row,
      .export-tile {
        border: 1px solid var(--border-primary);
        background: var(--bg-card);
        border-radius: var(--radius-md);
        padding: 14px;
        box-shadow: var(--shadow-subtle);
      }

      .schema-item strong,
      .insight-item strong,
      .coach-move strong {
        color: var(--brand-primary);
      }

      .workflow-rail {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }

      .workflow-step {
        border: 1px solid var(--border-primary);
        background: var(--bg-card);
        border-radius: 14px;
        padding: 12px;
        min-height: 86px;
        position: relative;
      }

      .workflow-step span {
        width: 28px;
        height: 28px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        font-weight: 900;
        background: var(--brand-soft);
        color: var(--brand-secondary);
        margin-bottom: 8px;
      }

      .workflow-step h4 {
        font-size: 0.88rem;
        color: var(--brand-primary);
        margin-bottom: 2px;
      }

      .workflow-step p {
        font-size: 0.78rem;
        color: var(--text-secondary);
        line-height: 1.35;
      }

      .topbar-search {
        min-width: 220px;
        width: min(28vw, 320px);
        border: 1px solid var(--border-primary);
        background: var(--bg-card);
        border-radius: 999px;
        padding: 8px 13px;
        font-size: 0.88rem;
        font-weight: 600;
        color: var(--text-primary);
      }

      .topbar-search::placeholder {
        color: var(--text-muted);
      }

      .toolbar-split {
        width: 1px;
        height: 28px;
        background: var(--border-primary);
        margin: 0 2px;
      }

      .gold-summary-grid {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 24px;
      }

      .executive-narrative {
        background: linear-gradient(135deg, var(--brand-soft), var(--bg-card));
        border: 1px solid hsla(175, 75%, 33%, 0.2);
        border-radius: var(--radius-lg);
        padding: 22px;
      }

      .executive-narrative h2 {
        color: var(--brand-primary);
        font-size: 1.45rem;
        margin-bottom: 8px;
      }

      .executive-narrative p {
        color: var(--text-secondary);
        font-size: 1rem;
      }

      .priority-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .priority-item {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 12px;
        align-items: center;
        border: 1px solid var(--border-primary);
        border-radius: var(--radius-md);
        padding: 12px;
        background: var(--bg-card);
      }

      .priority-rank {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        background: var(--brand-primary);
        color: white;
        display: grid;
        place-items: center;
        font-weight: 900;
      }

      .priority-title {
        font-weight: 900;
        color: var(--brand-primary);
      }

      .priority-sub {
        color: var(--text-secondary);
        font-size: 0.84rem;
      }

      .heat-legend {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 12px;
        border: 1px solid var(--border-light);
        background: var(--bg-panel);
        border-radius: var(--radius-md);
        align-items: center;
      }

      .legend-swatch {
        width: 16px;
        height: 16px;
        border-radius: 6px;
        border: 1px solid rgba(0, 0, 0, 0.1);
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 0.78rem;
        color: var(--text-secondary);
        font-weight: 800;
      }

      .quality-meter {
        height: 12px;
        background: var(--border-light);
        border-radius: 999px;
        overflow: hidden;
        border: 1px solid var(--border-primary);
      }

      .quality-meter > span {
        display: block;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          var(--danger),
          var(--warn),
          var(--brand-secondary)
        );
      }

      .quality-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }

      .quality-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .quality-row .value {
        font-size: 1.8rem;
        font-weight: 900;
        color: var(--brand-primary);
      }

      .quality-row .label {
        color: var(--text-secondary);
        font-weight: 800;
        font-size: 0.82rem;
      }

      .coach-grid {
        display: grid;
        grid-template-columns: 0.9fr 1.1fr;
        gap: 24px;
      }

      .coach-move {
        display: flex;
        flex-direction: column;
        gap: 7px;
        border-left: 5px solid var(--brand-secondary);
      }

      .coach-move h3 {
        color: var(--brand-primary);
        font-size: 1.05rem;
      }

      .coach-move p,
      .coach-move li {
        color: var(--text-secondary);
        font-size: 0.9rem;
      }

      .student-chip-cloud {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .student-chip {
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border-primary);
        background: var(--bg-panel);
        border-radius: 999px;
        padding: 5px 9px;
        font-size: 0.8rem;
        font-weight: 800;
        color: var(--text-secondary);
      }

      .export-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .export-tile {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .export-tile h3 {
        color: var(--brand-primary);
        font-size: 1.02rem;
      }

      .export-tile p {
        color: var(--text-secondary);
        font-size: 0.86rem;
      }

      .empty-state-actions {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .hint {
        color: var(--text-secondary);
      }

      @media (max-width: 1100px) {
        body {
          overflow: auto;
        }

        .app,
        .shell {
          min-height: 100vh;
          height: auto;
        }

        .shell {
          flex-direction: column;
        }

        .sidebar {
          width: 100%;
          flex-direction: row;
          overflow-x: auto;
          border-right: 0;
          border-bottom: 1px solid var(--border-primary);
          padding: 12px;
          gap: 12px;
        }

        .sidebar-section {
          min-width: 220px;
        }

        .topbar {
          height: auto;
          min-height: 70px;
          flex-wrap: wrap;
          gap: 12px;
          padding: 14px 16px;
        }

        .topbar-actions {
          flex-wrap: wrap;
          justify-content: flex-start;
        }

        .topbar-search {
          width: 100%;
          min-width: min(92vw, 360px);
        }

        .main {
          padding: 20px;
        }

        .gold-summary-grid,
        .coach-grid,
        .landing-grid,
        .export-grid,
        .quality-grid {
          grid-template-columns: 1fr;
        }

        .workflow-rail {
          grid-template-columns: 1fr;
        }

        .landing-title {
          font-size: 2.55rem;
        }
      }

      @media (max-width: 680px) {
        .grid-4,
        .grid-3,
        .grid-2,
        .gold-summary-grid,
        .coach-grid,
        .quality-grid,
        .export-grid,
        .schema-list {
          grid-template-columns: 1fr !important;
        }

        .landing-hero {
          padding: 34px 18px;
        }

        .drop-zone,
        .demo-card {
          padding: 26px 18px;
        }

        .priority-item {
          grid-template-columns: 1fr;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.001ms !important;
          transition-duration: 0.001ms !important;
        }
      }

      @media print {

      /* Command Palette Overlay */

        align-items: flex-start;
        justify-content: center;
        padding-top: min(18vh, 160px);

        pointer-events: none;
        transition: opacity 0.18s ease;

        pointer-events: all;

      .cmd-palette {
        width: min(560px, 92vw);
        background: var(--bg-card);
        border-radius: var(--radius-lg);
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.25),
          0 0 0 1px var(--border-primary);
        overflow: hidden;
        transform: translateY(-12px) scale(0.97);
        transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);

      ></div>

    <div id="toast" class="toast"></div>

    <!-- Application Script Block -->
    <script>
      /**
       * ==========================================
       * SYSTEM CONFIGURATION & CONSTANTS
       * ==========================================
       */
      const CONFIG = {
        STORAGE_KEY: "dataStudioMasterState.v3",
        DEFAULT_TARGET: 70,
        RANGES: {
          URGENT_CUT: 50,
          ONTRACK_ADD: 15,
        },
        THEME: {
          SLATE: {
            URGENT: "hsl(0, 75%, 55%)",
            RETEACH: "hsl(38, 90%, 45%)",
            ONTRACK: "hsl(210, 80%, 45%)",
            EXTENSION: "hsl(140, 70%, 40%)",
          },
        },
        TEST_DATA: {
          SCORES: [10, 20, 30, 40, 50],
          POINTS_X: [1, 2, 3, 4, 5],
          POINTS_Y: [2, 4, 5, 4, 5],
        },
      };

      function validateConfig() {
        if (!CONFIG.STORAGE_KEY) throw new Error("CONFIG: Missing STORAGE_KEY");
        if (CONFIG.DEFAULT_TARGET <= 0 || CONFIG.DEFAULT_TARGET > 100)
          throw new Error("CONFIG: Invalid DEFAULT_TARGET value");
        if (!CONFIG.THEME.SLATE.URGENT || !CONFIG.THEME.SLATE.EXTENSION)
          throw new Error("CONFIG: Undefined color tokens");
        return true;
      }

      /**
       * ==========================================
       * HIGH-FIDELITY CS SCHEMA GUARD
       * ==========================================
       */
      const SchemaGuard = {
        validateRow(row, fields) {
          const errors = [];
          if (!row)
            return { valid: false, errors: ["Empty row context detected"] };

          // Student identification validation
          const student = row[fields.student];
          if (!student || String(student).trim() === "") {
            errors.push("Missing student name identifier");
          }

          // Numeric Score boundaries verification
          const scoreRaw = row[fields.score];
          const score = AnalyticsService.toNumber(scoreRaw);
          if (Number.isNaN(score)) {
            errors.push(`Non-numeric score entry: "${scoreRaw}"`);
          } else if (score < 0 || score > 100) {
            errors.push(
              `Score "${score}" falls outside standard percentage limits (0-100)`,
            );
          }

          return {
            valid: errors.length === 0,
            errors,
          };
        },

        auditDataset(rows, fields) {
          let validCount = 0;
          const auditLog = [];

          rows.forEach((r, idx) => {
            const res = this.validateRow(r, fields);
            if (res.valid) {
              validCount++;
            } else {
              auditLog.push(`Row #${idx + 1} Error: ${res.errors.join(", ")}`);
            }
          });

          const qualityIndex = rows.length
            ? (validCount / rows.length) * 100
            : 0;
          Logger.info(
            `Schema Audit Complete. Dataset quality index: ${qualityIndex.toFixed(1)}%`,
            {
              total: rows.length,
              valid: validCount,
              anomalies: auditLog.slice(0, 10),
            },
          );

          return { qualityIndex, auditLog };
        },
      };

      /**
       * ==========================================
       * STRUCTURED SYSTEM LOGGER
       * ==========================================
       */
      class Logger {
        static logs = [];

        static log(level, message, detail = "") {
          const timestamp = new Date().toISOString();
          const logEntry = { timestamp, level, message, detail };
          Logger.logs.push(logEntry);

          // Render dynamic diagnostic item if console open
          const container = document.getElementById("diagLogs");
          if (container) {
            const el = document.createElement("div");
            el.className = `diag-log ${level.toLowerCase()}`;
            el.innerHTML = `[${timestamp.split("T")[1].slice(0, 8)}] [${level}] ${message} ${detail ? " -> " + JSON.stringify(detail) : ""}`;
            container.appendChild(el);
            container.scrollTop = container.scrollHeight;
          }

          if (level === "ERROR") {
            console.error(`[${level}] ${message}`, detail);
          } else if (level === "WARN") {
            console.warn(`[${level}] ${message}`, detail);
          } else {
            console.log(`[${level}] ${message}`, detail);
          }
        }

        static info(msg, detail = "") {
          Logger.log("INFO", msg, detail);
        }
        static warn(msg, detail = "") {
          Logger.log("WARN", msg, detail);
        }
        static error(msg, detail = "") {
          Logger.log("ERROR", msg, detail);
        }
      }

      /**
       * ==========================================
       * AUTOMATED CORE STATISTICAL SELF-TESTS
       * ==========================================
       */
      function selfTest() {
        Logger.info("Starting statistical self-test suite...");
        const results = [];
        let success = true;

        try {
          // Mean check
          const valMean = AnalyticsService.mean(CONFIG.TEST_DATA.SCORES);
          const passMean = Math.abs(valMean - 30) < 1e-9;
          results.push({
            name: "Mean Calculator",
            status: passMean ? "PASS" : "FAIL",
            val: valMean,
          });
          if (!passMean) success = false;

          // Median check
          const valMedian = AnalyticsService.median(CONFIG.TEST_DATA.SCORES);
          const passMedian = Math.abs(valMedian - 30) < 1e-9;
          results.push({
            name: "Median Calculator",
            status: passMedian ? "PASS" : "FAIL",
            val: valMedian,
          });
          if (!passMedian) success = false;

          // SD check
          const valSD = AnalyticsService.sd(CONFIG.TEST_DATA.SCORES);
          const passSD = Math.abs(valSD - 15.8113883) < 1e-5;
          results.push({
            name: "SD Calculator",
            status: passSD ? "PASS" : "FAIL",
            val: valSD,
          });
          if (!passSD) success = false;

          // Pearson check
          const corr = AnalyticsService.pearson(
            CONFIG.TEST_DATA.POINTS_X,
            CONFIG.TEST_DATA.POINTS_Y,
          );
          const passCorr = Math.abs(corr.r - 0.774596) < 1e-5;
          results.push({
            name: "Pearson Coefficient",
            status: passCorr ? "PASS" : "FAIL",
            val: corr.r,
          });
          if (!passCorr) success = false;

          // Regression check
          const reg = AnalyticsService.linearRegression(
            CONFIG.TEST_DATA.POINTS_X.map((x, i) => ({
              x,
              y: CONFIG.TEST_DATA.POINTS_Y[i],
            })),
          );
          const passReg =
            Math.abs(reg.slope - 0.6) < 1e-9 &&
            Math.abs(reg.intercept - 2.2) < 1e-9;
          results.push({
            name: "Linear Regression Engine",
            status: passReg ? "PASS" : "FAIL",
            val: `slope: ${reg.slope}, int: ${reg.intercept}`,
          });
          if (!passReg) success = false;

          // IQR Calculation check
          const iqrVal = AnalyticsService.iqr(CONFIG.TEST_DATA.SCORES);
          const passIQR = Math.abs(iqrVal - 20) < 1e-9;
          results.push({
            name: "IQR Outliers Metric",
            status: passIQR ? "PASS" : "FAIL",
            val: iqrVal,
          });
          if (!passIQR) success = false;

          // Cohen's d Effect Size check
          const cohVal = AnalyticsService.cohensD([80, 85, 90], [70, 75, 80]);
          const passCoh = Math.abs(cohVal - 2) < 1e-9;
          results.push({
            name: "Cohen's d Effect Size",
            status: passCoh ? "PASS" : "FAIL",
            val: cohVal,
          });
          if (!passCoh) success = false;

          // Variance check
          const valVar = AnalyticsService.variance(CONFIG.TEST_DATA.SCORES);
          const passVar = Math.abs(valVar - 250) < 1e-9;
          results.push({
            name: "Variance Calculator",
            status: passVar ? "PASS" : "FAIL",
            val: valVar,
          });
          if (!passVar) success = false;

          // SEM check
          const valSEM = AnalyticsService.sem(CONFIG.TEST_DATA.SCORES, 0.8);
          const passSEM = Math.abs(valSEM - 7.0710678) < 1e-5;
          results.push({
            name: "SEM Calculator",
            status: passSEM ? "PASS" : "FAIL",
            val: valSEM,
          });
          if (!passSEM) success = false;

          // Cronbach's Alpha check
          const alphaTestRecords = [
            { student: "S1", standard: "Std1", score: 80 },
            { student: "S1", standard: "Std2", score: 85 },
            { student: "S2", standard: "Std1", score: 70 },
            { student: "S2", standard: "Std2", score: 75 },
            { student: "S3", standard: "Std1", score: 60 },
            { student: "S3", standard: "Std2", score: 65 },
          ];
          const valAlpha = AnalyticsService.cronbachAlpha(alphaTestRecords);
          const passAlpha = Number.isFinite(valAlpha) && valAlpha > 0.8;
          results.push({
            name: "Cronbach's Alpha Reliability",
            status: passAlpha ? "PASS" : "FAIL",
            val: valAlpha,
          });
          if (!passAlpha) success = false;
        } catch (err) {
          success = false;
          Logger.error("Self-test crash encountered", err.message);
        }

        const suiteStatusEl = document.getElementById("diagSuiteStatus");
        if (suiteStatusEl) {
          suiteStatusEl.innerHTML = success
            ? `<span style="color: hsl(120, 80%, 45%)">✓ ALL CORE STATISTICAL TEST SUITES PASSED ENTIRELY</span>`
            : `<span style="color: hsl(0, 90%, 65%)">✗ SOME STATISTICAL ENGINE SELF-TEST MODULES FAILED</span>`;
        }

        results.forEach((r) => {
          Logger.info(
            `Module [${r.name}] Completed with status: ${r.status}`,
            r.val,
          );
        });

        return success;
      }

      /**
       * ==========================================
       * STATISTICAL ANALYTICS SERVICE LAYER
       * ==========================================
       */
      const AnalyticsService = {
        toNumber(value) {
          if (value === null || value === undefined || value === "") return NaN;
          if (typeof value === "number") return value;
          const cleaned = String(value)
            .replace(/[%,$\s]/g, "")
            .replace(/[^\d.-]/g, "");
          if (
            cleaned === "" ||
            cleaned === "." ||
            cleaned === "-" ||
            cleaned === "-."
          )
            return NaN;
          return Number(cleaned);
        },

        mean(arr) {
          const vals = arr.filter(Number.isFinite);
          return vals.length
            ? vals.reduce((a, b) => a + b, 0) / vals.length
            : NaN;
        },

        median(arr) {
          const vals = arr.filter(Number.isFinite).sort((a, b) => a - b);
          if (!vals.length) return NaN;
          const mid = Math.floor(vals.length / 2);
          return vals.length % 2 ? vals[mid] : (vals[mid - 1] + vals[mid]) / 2;
        },

        sd(arr) {
          const vals = arr.filter(Number.isFinite);
          if (vals.length < 2) return 0;
          const m = this.mean(vals);
          return Math.sqrt(
            vals.reduce((acc, v) => acc + Math.pow(v - m, 2), 0) /
              (vals.length - 1),
          );
        },

        quantile(arr, q) {
          const vals = arr.filter(Number.isFinite).sort((a, b) => a - b);
          if (!vals.length) return NaN;
          const pos = (vals.length - 1) * q;
          const base = Math.floor(pos);
          const rest = pos - base;
          return vals[base + 1] !== undefined
            ? vals[base] + rest * (vals[base + 1] - vals[base])
            : vals[base];
        },

        iqr(arr) {
          const q1 = this.quantile(arr, 0.25);
          const q3 = this.quantile(arr, 0.75);
          return Number.isFinite(q1) && Number.isFinite(q3) ? q3 - q1 : NaN;
        },

        sem(arr, r = 0.8) {
          const deviation = this.sd(arr);
          return deviation * Math.sqrt(1 - r);
        },

        variance(arr) {
          const vals = arr.filter(Number.isFinite);
          if (vals.length < 2) return 0;
          const m = this.mean(vals);
          return (
            vals.reduce((acc, v) => acc + Math.pow(v - m, 2), 0) /
            (vals.length - 1)
          );
        },

        zScore(score, mean, sd) {
          if (!sd || sd === 0) return 0;
          return (score - mean) / sd;
        },

        cronbachAlpha(records) {
          const standards = this.unique(records.map((r) => r.standard));
          const students = this.unique(records.map((r) => r.student));
          const k = standards.length;
          if (k < 2 || students.length < 3) return NaN;

          const studentScores = {};
          students.forEach((st) => {
            studentScores[st] = {};
          });

          records.forEach((r) => {
            if (studentScores[r.student]) {
              if (!studentScores[r.student][r.standard]) {
                studentScores[r.student][r.standard] = [];
              }
              studentScores[r.student][r.standard].push(r.score);
            }
          });

          const stdAverages = {};
          standards.forEach((std) => {
            const scores = records
              .filter((r) => r.standard === std)
              .map((r) => r.score)
              .filter(Number.isFinite);
            stdAverages[std] = this.mean(scores) || 50;
          });

          const studentTotals = [];
          const itemMatrix = Array.from({ length: k }, () => []);

          students.forEach((st) => {
            let total = 0;
            standards.forEach((std, stdIdx) => {
              const list = studentScores[st][std] || [];
              const avg = this.mean(list);
              const score = Number.isFinite(avg) ? avg : stdAverages[std];
              total += score;
              itemMatrix[stdIdx].push(score);
            });
            studentTotals.push(total);
          });

          const varTotal = this.variance(studentTotals);
          if (varTotal === 0 || Number.isNaN(varTotal)) return 0;

          let sumItemVar = 0;
          for (let i = 0; i < k; i++) {
            sumItemVar += this.variance(itemMatrix[i]);
          }

          const alpha = (k / (k - 1)) * (1 - sumItemVar / varTotal);
          return this.clamp(alpha, 0, 0.99);
        },

        generateDynamicLessonBrief(data) {
          const standards = this.standardSummaries(data);
          const topPriority = standards[0];
          if (!topPriority) return null;

          const summaries = this.studentSummaries(data);
          const groups = this.buildGroups(summaries);

          const urgentNames = groups.urgent
            .map((s) => s.student)
            .slice(0, 3)
            .join(", ");
          const strategicNames = groups.strategic
            .map((s) => s.student)
            .slice(0, 3)
            .join(", ");
          const extensionNames = groups.extension
            .map((s) => s.student)
            .slice(0, 3)
            .join(", ");

          const hasSupp = AppRepository.state.extraRows.length > 0;
          let emergingStudents = [];
          let expandingStudents = [];
          if (hasSupp) {
            AppRepository.state.extraRows.forEach((r) => {
              const name = r["Student Name"];
              const lang = r["Language Level Band"] || "";
              if (lang.includes("Entering") || lang.includes("Emerging")) {
                emergingStudents.push(name);
              } else if (
                lang.includes("Expanding") ||
                lang.includes("Bridging")
              ) {
                expandingStudents.push(name);
              }
            });
          }

          const emergingList =
            emergingStudents.slice(0, 3).join(", ") || "ESOL students";
          const expandingList =
            expandingStudents.slice(0, 3).join(", ") ||
            "advanced language students";

          return {
            standard: topPriority.standard,
            belowPct: topPriority.belowPct.toFixed(1),
            average: topPriority.avg.toFixed(1),
            urgentStudents: urgentNames || "targeted students",
            strategicStudents: strategicNames || "reteach students",
            extensionStudents: extensionNames || "advanced students",
            emergingList,
            expandingList,
          };
        },

        cohensD(group1, group2) {
          const m1 = this.mean(group1);
          const m2 = this.mean(group2);
          const s1 = this.sd(group1);
          const s2 = this.sd(group2);

          if (Number.isNaN(m1) || Number.isNaN(m2)) return NaN;

          const n1 = group1.length;
          const n2 = group2.length;

          if (n1 < 2 || n2 < 2) return NaN;

          const pooledSD = Math.sqrt(
            ((n1 - 1) * Math.pow(s1, 2) + (n2 - 1) * Math.pow(s2, 2)) /
              (n1 + n2 - 2),
          );
          return pooledSD > 0 ? (m1 - m2) / pooledSD : NaN;
        },

        linearRegression(points) {
          const pts = points.filter(
            (p) => Number.isFinite(p.x) && Number.isFinite(p.y),
          );
          if (pts.length < 2) return null;
          const xbar = this.mean(pts.map((p) => p.x));
          const ybar = this.mean(pts.map((p) => p.y));
          const denom = pts.reduce(
            (acc, p) => acc + Math.pow(p.x - xbar, 2),
            0,
          );
          if (denom === 0) return null;

          const slope =
            pts.reduce((acc, p) => acc + (p.x - xbar) * (p.y - ybar), 0) /
            denom;
          const intercept = ybar - slope * xbar;
          const ssTot = pts.reduce(
            (acc, p) => acc + Math.pow(p.y - ybar, 2),
            0,
          );
          const ssRes = pts.reduce(
            (acc, p) => acc + Math.pow(p.y - (intercept + slope * p.x), 2),
            0,
          );
          const r2 = ssTot === 0 ? 1 : 1 - ssRes / ssTot;

          return {
            slope,
            intercept,
            r2,
            predict: (x) => intercept + slope * x,
            n: pts.length,
          };
        },

        pearson(xs, ys) {
          const pairs = xs
            .map((x, i) => ({ x, y: ys[i] }))
            .filter((p) => Number.isFinite(p.x) && Number.isFinite(p.y));
          if (pairs.length < 3) return { r: NaN, n: pairs.length };
          const xbar = this.mean(pairs.map((p) => p.x));
          const ybar = this.mean(pairs.map((p) => p.y));
          const num = pairs.reduce(
            (acc, p) => acc + (p.x - xbar) * (p.y - ybar),
            0,
          );
          const denX = Math.sqrt(
            pairs.reduce((acc, p) => acc + Math.pow(p.x - xbar, 2), 0),
          );
          const denY = Math.sqrt(
            pairs.reduce((acc, p) => acc + Math.pow(p.y - ybar, 2), 0),
          );
          return {
            r: denX && denY ? num / (denX * denY) : NaN,
            n: pairs.length,
            pairs,
          };
        },

        unique(arr) {
          return [
            ...new Set(
              arr
                .filter(
                  (v) =>
                    v !== null && v !== undefined && String(v).trim() !== "",
                )
                .map((v) => String(v).trim()),
            ),
          ];
        },

        clamp(n, min, max) {
          return Math.max(min, Math.min(max, n));
        },

        scoreBand(score, target = CONFIG.DEFAULT_TARGET) {
          if (!Number.isFinite(score))
            return {
              label: "Missing",
              cls: "missing",
              color: CONFIG.THEME.SLATE.MUTED,
            };
          if (score < CONFIG.RANGES.URGENT_CUT)
            return {
              label: "Urgent Support",
              cls: "urgent",
              color: CONFIG.THEME.SLATE.URGENT,
            };
          if (score < target)
            return {
              label: "Guided Practice",
              cls: "reteach",
              color: CONFIG.THEME.SLATE.RETEACH,
            };
          if (score < target + CONFIG.RANGES.ONTRACK_ADD)
            return {
              label: "On Track",
              cls: "ontrack",
              color: CONFIG.THEME.SLATE.ONTRACK,
            };
          return {
            label: "Extension",
            cls: "extension",
            color: CONFIG.THEME.SLATE.EXTENSION,
          };
        },

        grouped(arr, keyFn) {
          const map = new Map();
          arr.forEach((item) => {
            const key = keyFn(item);
            if (!map.has(key)) map.set(key, []);
            map.get(key).push(item);
          });
          return map;
        },

        sortAssessments(arr) {
          return [...arr].sort((a, b) =>
            String(a).localeCompare(String(b), undefined, {
              numeric: true,
              sensitivity: "base",
            }),
          );
        },

        studentSummaries(data = AppRepository.getFilteredRecords()) {
          const byStudent = this.grouped(data, (d) => d.student);
          return [...byStudent.entries()]
            .map(([student, rows]) => {
              const scores = rows.map((r) => r.score).filter(Number.isFinite);
              const assessments = this.sortAssessments(
                this.unique(rows.map((r) => r.assessment)),
              );
              const ordered = assessments.map((a) =>
                this.mean(
                  rows.filter((r) => r.assessment === a).map((r) => r.score),
                ),
              );
              const first = ordered.find(Number.isFinite);
              const latest = [...ordered].reverse().find(Number.isFinite);

              return {
                student,
                count: rows.length,
                avg: this.mean(scores),
                med: this.median(scores),
                min: rows.length ? Math.min(...scores) : NaN,
                max: rows.length ? Math.max(...scores) : NaN,
                spread: rows.length
                  ? Math.max(...scores) - Math.min(...scores)
                  : NaN,
                sd: this.sd(scores),
                first,
                latest,
                growth:
                  Number.isFinite(first) && Number.isFinite(latest)
                    ? latest - first
                    : NaN,
                rows,
              };
            })
            .sort((a, b) => a.avg - b.avg);
        },

        standardSummaries(data = AppRepository.getFilteredRecords()) {
          const target = Number(AppRepository.state.filters.target);
          const byStandard = this.grouped(data, (d) => d.standard);
          return [...byStandard.entries()]
            .map(([standard, rows]) => {
              const scores = rows.map((r) => r.score).filter(Number.isFinite);
              return {
                standard,
                n: scores.length,
                avg: this.mean(scores),
                median: this.median(scores),
                sd: this.sd(scores),
                below: scores.filter((s) => s < target).length,
                belowPct: scores.length
                  ? (scores.filter((s) => s < target).length / scores.length) *
                    100
                  : NaN,
                min: scores.length ? Math.min(...scores) : NaN,
                max: scores.length ? Math.max(...scores) : NaN,
              };
            })
            .sort((a, b) => b.belowPct - a.belowPct || a.avg - b.avg);
        },

        assessmentSummaries(data = AppRepository.getFilteredRecords()) {
          const byAssessment = this.grouped(data, (d) => d.assessment);
          return this.sortAssessments([...byAssessment.keys()]).map(
            (assessment, i) => {
              const rows = byAssessment.get(assessment) || [];
              const scores = rows.map((r) => r.score).filter(Number.isFinite);
              return {
                assessment,
                index: i + 1,
                n: scores.length,
                avg: this.mean(scores),
                median: this.median(scores),
                sd: this.sd(scores),
                target: Number(AppRepository.state.filters.target),
              };
            },
          );
        },

        buildGroups(
          summaries = this.studentSummaries(),
          target = Number(AppRepository.state.filters.target),
        ) {
          const urgent = [];
          const strategic = [];
          const monitor = [];
          const extension = [];

          summaries.forEach((s) => {
            const band = this.scoreBand(s.avg, target);
            if (band.cls === "urgent") urgent.push(s);
            else if (band.cls === "reteach") strategic.push(s);
            else if (band.cls === "ontrack") monitor.push(s);
            else if (band.cls === "extension") extension.push(s);
          });

          return { urgent, strategic, monitor, extension };
        },

        predictionAnalysis(data = AppRepository.getFilteredRecords()) {
          const points = data
            .map((d) => {
              const list = this.sortAssessments(
                this.unique(data.map((x) => x.assessment)),
              );
              const x = list.indexOf(d.assessment);
              return { x, y: d.score };
            })
            .filter((p) => p.x !== -1 && Number.isFinite(p.y));

          const reg = this.linearRegression(points);
          if (!reg)
            return {
              reg: null,
              projected: NaN,
              confidence: "Low (No Slope Data)",
            };

          const list = this.sortAssessments(
            this.unique(data.map((x) => x.assessment)),
          );
          const nextX = list.length;
          const projected = this.clamp(reg.predict(nextX), 0, 100);

          let confidence = "Moderate";
          if (reg.r2 >= 0.7) confidence = "High";
          if (reg.r2 < 0.35) confidence = "Low";
          if (points.length < 6) confidence = "Low (Small Data Size)";

          return { reg, projected, confidence };
        },
      };

            "Gabriel",
            "Hana",
            "Isaac",
            "Janelle",
            "Khalil",
            "Lucia",
            "Mateo",
            "Noor",
            "Omar",
            "Priya",
          ];
          const standards = [
            "6.EE.C.9 Variables",
            "6.G.A.1 Area of Triangles",
            "6.G.A.2 Volume of Prisms",
            "6.SP.A.1 Statistical Questions",
          ];

            "Unit 1 Check",
            "Unit 2 Check",

          ];

                  99,
                );

                  "Class/Period": si < 8 ? "Period 1" : "Period 2",

                  Standard: standard,
                  "Score (%)": score,
                });
              });
            });
          });

          this.ingestData(rows);

          // Add extra categorical data
          AppRepository.state.extraRows = students.map((student, i) => ({
            "Student Name": student,
            "Attendance (%)": AnalyticsService.clamp(
              78 + ((i * 9) % 23),
              70,
              100,
            ),
            "Missing Assignments": (i * 3) % 7,
            "Language Level Band":
              i % 3 === 0
                ? "Entering/Emerging"
                : i % 3 === 1
                  ? "Developing"
                  : "Expanding/Bridging",
            "Intervention Group":
              i % 4 === 0
                ? "Small Group"
                : i % 4 === 1
                  ? "Check-ins"

        ingestData(rows) {
          const cleaned = rows.filter(
            (r) =>
              r && Object.values(r).some((v) => String(v ?? "").trim() !== ""),
          );
          if (!cleaned.length) return;

          AppRepository.state.rawRows = cleaned;
          AppRepository.state.rawHeaders = Object.keys(cleaned[0]);

          // Auto field detection — exact matches first, short keywords skip fuzzy
          AppRepository.state.fields = {
            student: this.detectField(AppRepository.state.rawHeaders, [
              "student name",
              "student",
              "learner",
            ]),
            score: this.detectField(AppRepository.state.rawHeaders, [
              "score (%)",
              "score",
              "percent",
              "percentage",
            ]),
            standard: this.detectField(AppRepository.state.rawHeaders, [
              "standard",
              "skill",
              "objective",
              "domain",
            ]),
            assessment: this.detectField(AppRepository.state.rawHeaders, [
              "assessment",
              "quiz",
              "window",
            ]),
            className: this.detectField(AppRepository.state.rawHeaders, [
              "class/period",
              "class",
              "period",
              "section",
              "course",
            ]),
            date: this.detectField(AppRepository.state.rawHeaders, [
              "date",
              "timestamp",
            ]),
          };

          this.rebuildRecords();
        },

        detectField(headers, candidates) {
          const lower = headers.map((h) => String(h).trim().toLowerCase());
          for (const cand of candidates) {
            const idx = lower.indexOf(cand.toLowerCase());
            if (idx !== -1) return headers[idx];
          }
          for (const cand of candidates) {
            const c = cand.toLowerCase();
            if (c.length < 4) continue;
            const idx = lower.findIndex((h) => h.includes(c));
            if (idx !== -1) return headers[idx];
          }
          return "";
        },

        rebuildRecords() {
          const fields = AppRepository.state.fields;
          const val = (row, key, fallback) => {
            const col = fields[key];
            if (!col) return fallback;
            const v = row[col];
            return v != null && String(v).trim() !== ""
              ? String(v).trim()
              : fallback;
          };
          AppRepository.state.records = AppRepository.state.rawRows.map(
            (row, index) => {
              const scoreVal = AnalyticsService.toNumber(row[fields.score]);
              return {
                id: index,
                student: val(row, "student", `Student #${index + 1}`),
                score: Number.isFinite(scoreVal) ? scoreVal : NaN,
                standard: val(row, "standard", "General Std"),
                assessment: val(row, "assessment", "Unassigned Window"),
                className: val(row, "className", "Core Section"),
                date: val(row, "date", ""),
              };
            },
          );

          // Run high-fidelity schema guards audit
          SchemaGuard.auditDataset(AppRepository.state.rawRows, fields);

          // Reset Filters
          const allStudents = AnalyticsService.unique(
            AppRepository.state.records.map((r) => r.student),
          );
          const allStandards = AnalyticsService.unique(
            AppRepository.state.records.map((r) => r.standard),
          );

          AppRepository.state.filters.selectedStudents = allStudents;
          AppRepository.state.filters.selectedStandards = allStandards;
          AppRepository.state.filters.focusStudent = "All";
          AppRepository.state.filters.className = "All";
          AppRepository.state.filters.assessment = "All";

          AppRepository.save();
        },

        initCharts() {
          const data = AppRepository.getFilteredRecords();
          if (!data.length || AppRepository.state.tab !== "overview") return;

          const ctx = document.getElementById("classDistributionChart");
          if (!ctx) return;

          // Cleanup old chart if exists
          if (AppRepository.state.charts.overview) {
            AppRepository.state.charts.overview.destroy();

          const scores = data.map((d) => d.score).filter(Number.isFinite);
          const ranges = [
            0,
            50,
            Number(AppRepository.state.filters.target),
            Number(AppRepository.state.filters.target) + 15,
            100,
          ];
          const counts = [0, 0, 0, 0];

          scores.forEach((s) => {
            if (s < 50) counts[0]++;
            else if (s < ranges[2]) counts[1]++;
            else if (s < ranges[3]) counts[2]++;
            else counts[3]++;
          });

          AppRepository.state.charts.overview = new Chart(ctx, {

                "Guided Practice",
                "On Track",
                "Extension",

            return `
                    <div class="container">

            case "action":
              return this.renderActionTab(data);
            case "trends":
              return this.renderTrendsTab(data);
            case "patterns":
              return this.renderPatternsTab(data);
            case "groups":
              return this.renderGroupsTab(data);
            case "advanced":
              return this.renderAdvancedTab(data);
            case "whatif":
              return this.renderWhatIfTab(data);
            case "predictions":
              return this.renderPredictionsTab(data);

                      <label>Individual Student</label>
