        generatePredictionScatterSVG(
          predictions,
          testConfig,
          modifier,
          z,
          semVal,
        ) {
          const width = 520;
          const height = 280;
          const padding = 45;
          const xOffset = padding + 10;
          const rightMargin = 20;
          const topMargin = 20;
          const bottomMargin = 40;

          const chartWidth = width - xOffset - rightMargin;
          const chartHeight = height - topMargin - bottomMargin;

          const target = Number(AppRepository.state.filters.target);

          // Helper to map percent to X coordinate
          const getX = (pct) => xOffset + (pct / 100) * chartWidth;

          // Helper to map score to Y coordinate
          const getY = (score) => {
            const ratio =
              (score - testConfig.minScale) /
              (testConfig.maxScale - testConfig.minScale);
            return topMargin + chartHeight - ratio * chartHeight;
          };

          // Generate horizontal grid lines and ticks
          const yTicks = [];
          const stepScale = (testConfig.maxScale - testConfig.minScale) / 4;
          for (let i = 0; i <= 4; i++) {
            const scoreVal = testConfig.minScale + i * stepScale;
            yTicks.push(`
                    <line x1="${xOffset}" y1="${getY(scoreVal)}" x2="${xOffset + chartWidth}" y2="${getY(scoreVal)}" stroke="#f1f5f9" stroke-width="1" />
                    <text x="${xOffset - 8}" y="${getY(scoreVal) + 4}" text-anchor="end" fill="var(--text-secondary)" font-size="9" font-weight="700">${scoreVal.toFixed(0)}</text>
                  `);
          }

          // Generate vertical grid lines and ticks (every 20%)
          const xTicks = [];
          for (let i = 0; i <= 5; i++) {
            const pctVal = i * 20;
            xTicks.push(`
                    <line x1="${getX(pctVal)}" y1="${topMargin}" x2="${getX(pctVal)}" y2="${topMargin + chartHeight}" stroke="#f1f5f9" stroke-width="1" />
                    <text x="${getX(pctVal)}" y="${topMargin + chartHeight + 14}" text-anchor="middle" fill="var(--text-secondary)" font-size="9" font-weight="700">${pctVal}%</text>
                  `);
          }

          // Regression endpoints
          const rawPct0 = 0;
          const rawPct100 = 100;
          const adjustedPct0 = Math.max(0, Math.min(100, rawPct0 + modifier));
          const adjustedPct100 = Math.max(
            0,
            Math.min(100, rawPct100 + modifier),
          );

          const pred0 =
            testConfig.minScale +
            (adjustedPct0 / 100) * (testConfig.maxScale - testConfig.minScale);
          const pred100 =
            testConfig.minScale +
            (adjustedPct100 / 100) *
              (testConfig.maxScale - testConfig.minScale);

          const regressionLine = `
                  <line x1="${getX(rawPct0)}" y1="${getY(pred0)}" x2="${getX(rawPct100)}" y2="${getY(pred100)}" stroke="var(--brand-secondary)" stroke-width="2" stroke-opacity="0.8" stroke-dasharray="1" />
                `;

          // Benchmark Cutoffs
          const targetX = getX(target);
          const benchmarkY = getY(testConfig.benchmark);

          const cutoffs = `
                  <!-- Vertical Class Target Line -->
                  <line x1="${targetX}" y1="${topMargin}" x2="${targetX}" y2="${topMargin + chartHeight}" stroke="var(--color-reteach)" stroke-width="1.5" stroke-dasharray="4,4" />
                  <text x="${targetX + 6}" y="${topMargin + 10}" fill="var(--color-reteach)" font-size="8" font-weight="800">Class Target (${target}%)</text>

                  <!-- Horizontal Test Benchmark Line -->
                  <line x1="${xOffset}" y1="${benchmarkY}" x2="${xOffset + chartWidth}" y2="${benchmarkY}" stroke="var(--color-urgent)" stroke-width="1.5" stroke-dasharray="4,4" />
                  <text x="${xOffset + chartWidth - 10}" y="${benchmarkY - 6}" text-anchor="end" fill="var(--color-urgent)" font-size="8" font-weight="800">Proficiency Benchmark (${testConfig.benchmark})</text>
                `;

          // Plot Student Nodes
          const nodes = predictions
            .map((p) => {
              const x = getX(p.score);
              const y = getY(p.predScale);
              return `
                    <circle cx="${x}" cy="${y}" r="6" fill="${p.bandColor}" stroke="#ffffff" stroke-width="1.5" style="cursor:pointer; transition: r 0.1s ease;"
                      onmouseover="showPredictionTooltip(event, '${p.student.replace(/'/g, "\\'")}', ${p.score}, ${p.predScale}, ${p.lowerScale}, ${p.upperScale}, '${p.bandName}', '${p.bandColor}')"
                      onmouseout="hideScatterTooltip()" />
                  `;
            })
            .join("");

          return `
                  <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="background:white; border:1px solid var(--border-light); border-radius:var(--radius-md);">
                    <!-- Grid lines -->
                    ${yTicks.join("")}
                    ${xTicks.join("")}

                    <!-- Axes lines -->
                    <line x1="${xOffset}" y1="${topMargin}" x2="${xOffset}" y2="${topMargin + chartHeight}" stroke="#cbd5e1" stroke-width="2" />
                    <line x1="${xOffset}" y1="${topMargin + chartHeight}" x2="${xOffset + chartWidth}" y2="${topMargin + chartHeight}" stroke="#cbd5e1" stroke-width="2" />

                    <!-- Regression slope -->
                    ${regressionLine}

                    <!-- Cutoff lines -->
                    ${cutoffs}

                    <!-- Data nodes -->
                    ${nodes}

                    <!-- Labels -->
                    <text x="${xOffset + chartWidth / 2}" y="${height - 6}" text-anchor="middle" fill="var(--text-secondary)" font-size="9" font-weight="800">X = Observed Grade (%)</text>
                    <text x="12" y="${topMargin + chartHeight / 2}" text-anchor="middle" transform="rotate(-90 12 ${topMargin + chartHeight / 2})" fill="var(--text-secondary)" font-size="9" font-weight="800">Y = Predicted Scale Score</text>
                  </svg>
                `;
        },

        renderClassCompareTab(data) {
          const target = Number(AppRepository.state.filters.target);
          const allClasses = AnalyticsService.unique(
            AppRepository.state.records.map(function (r) {
              return r.className;
            }),
          ).sort();
          const allAssessments = AnalyticsService.sortAssessments(
            AnalyticsService.unique(
              AppRepository.state.records.map(function (r) {
                return r.assessment;
              }),
            ),
          );

          if (!AppRepository.state.filters.ccCompareClasses) {
            AppRepository.state.filters.ccCompareClasses = allClasses.slice();
          }
          if (!AppRepository.state.filters.ccMetric) {
            AppRepository.state.filters.ccMetric = "avg";
          }
          const selectedClasses = AppRepository.state.filters.ccCompareClasses;
          const ccMetric = AppRepository.state.filters.ccMetric;

          // Per-class stats per assessment
          const classStats = allClasses.map(function (cls) {
            const rec = AppRepository.state.records.filter(function (r) {
              return r.className === cls;
            });
            const perWindow = allAssessments.map(function (a) {
              const windowRec = rec.filter(function (r) {
                return r.assessment === a;
              });
              const scores = windowRec
                .map(function (r) {
                  return r.score;
                })
                .filter(Number.isFinite);
              const avg = scores.length ? AnalyticsService.mean(scores) : null;
              const profRate = scores.length
                ? (scores.filter(function (s) {
                    return s >= target;
                  }).length /
                    scores.length) *
                  100
                : null;
              const studentCount = AnalyticsService.unique(
                windowRec.map(function (r) {
                  return r.student;
                }),
              ).length;
              return {
                assessment: a,
                avg: avg,
                profRate: profRate,
                studentCount: studentCount,
                scores: scores,
              };
            });
            const allScores = rec
              .map(function (r) {
                return r.score;
              })
              .filter(Number.isFinite);
            const overallAvg = allScores.length
              ? AnalyticsService.mean(allScores)
              : null;
            const overallProf = allScores.length
              ? (allScores.filter(function (s) {
                  return s >= target;
                }).length /
                  allScores.length) *
                100
              : null;
            const stdCount = AnalyticsService.unique(
              rec.map(function (r) {
                return r.student;
              }),
            ).length;
            const summaries = AnalyticsService.studentSummaries(rec);
            const groups = AnalyticsService.buildGroups(summaries, target);
            return {
              cls: cls,
              perWindow: perWindow,
              overallAvg: overallAvg,
              overallProf: overallProf,
              stdCount: stdCount,
              urgent: groups.urgent.length,
              reteach: groups.strategic.length,
              ontrack: groups.monitor.length,
              extension: groups.extension.length,
            };
          });

          const visibleStats = classStats.filter(function (s) {
            return selectedClasses.includes(s.cls);
          });
          const COLORS = [
            "#0ea5e9",
            "#14b8a6",
            "#f59e0b",
            "#8b5cf6",
            "#ef4444",
            "#10b981",
            "#f97316",
            "#06b6d4",
          ];

          // Build comparison SVG chart (avg or profRate over time, per class)
          const buildCCChart = function () {
            if (!visibleStats.length || allAssessments.length < 1) return "";
            const W = 680,
              H = 300,
              PL = 56,
              PB = 45,
              PT = 30,
              PR = 22;
            const cW = W - PL - PR,
              cH = H - PT - PB;
            const nTests = allAssessments.length;
            const xS = function (i) {
              return PL + (nTests > 1 ? i * (cW / (nTests - 1)) : cW / 2);
            };
            const allVals = [];
            visibleStats.forEach(function (s) {
              s.perWindow.forEach(function (w) {
                const v = ccMetric === "profrateclass" ? w.profRate : w.avg;
                if (v !== null) allVals.push(v);
              });
            });
            const rawMin = allVals.length ? Math.min.apply(null, allVals) : 0;
            const rawMax = allVals.length ? Math.max.apply(null, allVals) : 100;
            const minV = Math.max(0, rawMin - 8);
            const maxV = Math.min(100, rawMax + 8);
            const yS = function (v) {
              return PT + cH - ((v - minV) / (maxV - minV || 1)) * cH;
            };
            let svg =
              '<svg viewBox="0 0 ' +
              W +
              " " +
              H +
              '" style="width:100%;max-height:300px;display:block">';
            [0, 20, 40, 60, 80, 100].forEach(function (pct) {
              if (pct < minV - 1 || pct > maxV + 1) return;
              const y = yS(pct);
              svg +=
                '<line x1="' +
                PL +
                '" y1="' +
                y +
                '" x2="' +
                (W - PR) +
                '" y2="' +
                y +
                '" stroke="#e2e8f0" stroke-width="1"/>';
              svg +=
                '<text x="' +
                (PL - 5) +
                '" y="' +
                (y + 4) +
                '" text-anchor="end" font-size="9" fill="#94a3b8" font-weight="700">' +
                pct +
                "%</text>";
            });
            allAssessments.forEach(function (t, i) {
              const lbl = t.length > 13 ? t.slice(0, 12) + "\u2026" : t;
              svg +=
                '<line x1="' +
                xS(i) +
                '" y1="' +
                PT +
                '" x2="' +
                xS(i) +
                '" y2="' +
                (PT + cH) +
                '" stroke="#f1f5f9" stroke-width="1"/>';
              svg +=
                '<text x="' +
                xS(i) +
                '" y="' +
                (H - 6) +
                '" text-anchor="middle" font-size="9" fill="#64748b" font-weight="700">' +
                lbl +
                "</text>";
            });
            // target line
            if (target >= minV && target <= maxV) {
              const ty = yS(target);
              svg +=
                '<line x1="' +
                PL +
                '" y1="' +
                ty +
                '" x2="' +
                (W - PR) +
                '" y2="' +
                ty +
                '" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,4"/>';
              svg +=
                '<text x="' +
                (W - PR - 2) +
                '" y="' +
                (ty - 4) +
                '" text-anchor="end" font-size="8" fill="#f59e0b" font-weight="800">Target ' +
                target +
                "%</text>";
            }
            visibleStats.forEach(function (s, ci) {
              const color = COLORS[ci % COLORS.length];
              const pts = s.perWindow
                .map(function (w, i) {
                  const v = ccMetric === "profrateclass" ? w.profRate : w.avg;
                  return v !== null ? { x: xS(i), y: yS(v), v: v } : null;
                })
                .filter(function (p) {
                  return p !== null;
                });
              if (pts.length < 1) return;
              if (pts.length >= 2) {
                let d = "M " + pts[0].x + " " + pts[0].y;
                for (let k = 1; k < pts.length; k++)
                  d += " L " + pts[k].x + " " + pts[k].y;
                svg +=
                  '<path d="' +
                  d +
                  '" fill="none" stroke="' +
                  color +
                  '" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';

        /**

        generateNormalCurveSVG(scores) {
          if (!scores.length) return "";

          const mean = AnalyticsService.mean(scores);
          let sd = AnalyticsService.sd(scores);
          if (sd <= 0) sd = 5; // Fallback to avoid division by zero

          const width = 480;
          const height = 180;
          const padding = 20;

          // Normal PDF function
          function normalPDF(x, u, s) {
            return (
              (1 / (s * Math.sqrt(2 * Math.PI))) *
              Math.exp(-0.5 * Math.pow((x - u) / s, 2))
            );
          }

          // Generate path points
          const points = [];
          const minX = Math.max(0, mean - 3 * sd);
          const maxX = Math.min(100, mean + 3 * sd);
          const step = (maxX - minX) / 60;

          // Find max height for scaling
          let maxPDF = 0;
          for (let x = minX; x <= maxX; x += step) {
            const val = normalPDF(x, mean, sd);
            if (val > maxPDF) maxPDF = val;
          }
          if (maxPDF === 0) maxPDF = 1;

          for (let x = minX; x <= maxX; x += step) {
            const pdf = normalPDF(x, mean, sd);
            const svgX =
              padding + ((x - minX) / (maxX - minX)) * (width - 2 * padding);
            const svgY =
              height - padding - (pdf / maxPDF) * (height - 2 * padding);
            points.push({ x: svgX, y: svgY, val: x });
          }

          // Construct path string
          let pathD = `M ${points[0].x} ${height - padding} `;
          points.forEach((p) => {
            pathD += `L ${p.x} ${p.y} `;
          });
          pathD += `L ${points[points.length - 1].x} ${height - padding} Z`;

          const target = Number(AppRepository.state.filters.target);
          let targetLineSVG = "";
          if (target >= minX && target <= maxX) {
            const targetX =
              padding +
              ((target - minX) / (maxX - minX)) * (width - 2 * padding);
            targetLineSVG = `
                    <line x1="${targetX}" y1="${padding}" x2="${targetX}" y2="${height - padding}" stroke="var(--color-urgent)" stroke-width="2" stroke-dasharray="2" />
                    <text x="${targetX + 6}" y="${height - padding - 8}" fill="var(--color-urgent)" font-size="9" font-weight="800">Target: ${target}%</text>
                  `;
          }

          return `
                  <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="background:white; border-radius:12px; border:1px solid #cbd5e1;">
                    <!-- Shading Areas -->
                    <path d="${pathD}" fill="var(--brand-soft)" stroke="var(--brand-secondary)" stroke-width="2.5" />

                    <!-- Mean Anchor Line -->
                    <line x1="${padding + ((mean - minX) / (maxX - minX)) * (width - 2 * padding)}" y1="${padding}" x2="${padding + ((mean - minX) / (maxX - minX)) * (width - 2 * padding)}" y2="${height - padding}" stroke="var(--brand-primary)" stroke-width="2" stroke-dasharray="4" />
                    <text x="${padding + ((mean - minX) / (maxX - minX)) * (width - 2 * padding) + 6}" y="${padding + 12}" fill="var(--brand-primary)" font-size="10" font-weight="800">Mean: ${mean.toFixed(1)}%</text>

                    <!-- Target line overlay -->
                    ${targetLineSVG}

                    <!-- Axis Lines -->
                    <line x1="${padding}" y1="${height - padding}" x2="${width - padding}" y2="${height - padding}" stroke="#94a3b8" stroke-width="2" />
                    <text x="${padding}" y="${height - 4}" fill="#64748b" font-size="10" font-weight="700">${minX.toFixed(0)}%</text>
                    <text x="${width - padding - 24}" y="${height - 4}" fill="#64748b" font-size="10" font-weight="700">${maxX.toFixed(0)}%</text>
                  </svg>
                `;
        },

        generateStackedNumberLineSVG(data) {
          const width = 760;
          const height = 110;
          const padding = 30;

          const scores = data
            .map((d) => ({
              student: d.student,
              score: d.score,
              class: d.className,
            }))
            .filter((d) => Number.isFinite(d.score));
          if (!scores.length) return "";

          // Sort students by score
          scores.sort((a, b) => a.score - b.score);

          const meanVal = AnalyticsService.mean(scores.map((s) => s.score));
          const sdVal = AnalyticsService.sd(scores.map((s) => s.score));
          const semVal = AnalyticsService.sem(
            scores.map((s) => s.score),
            0.8,
          );

          // Overlap compiler (stack students within 2.5% distance threshold)
          const threshold = 2.5;
          const stackedPoints = [];

          scores.forEach((s) => {
            let matchedStack = null;
            for (const stack of stackedPoints) {
              if (Math.abs(stack.score - s.score) <= threshold) {
                matchedStack = stack;
                break;
              }
            }

            if (matchedStack) {
              matchedStack.students.push(s);
            } else {
              stackedPoints.push({
                score: s.score,
                students: [s],
              });
            }
          });

          const getX = (val) => padding + (val / 100) * (width - 2 * padding);
          const yStart = 10;
          const rectHeight = 70; // 80 - 10

          const target = Number(AppRepository.state.filters.target);
          const r0 = getX(0);
          const r50 = getX(50);
          const rTarget = getX(target);
          const rOntrackEnd = getX(Math.min(100, target + 15));
          const r100 = getX(100);

          return `
                  <svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="background:white; border-radius:12px; border:1px solid #cbd5e1; padding:10px;">
                    <!-- Zone Backgrounds -->

                Observed Mastery: <strong>${score.toFixed(0)}%</strong><br/>
                Z-Score: <strong>${zScore >= 0 ? "+" + zScore : zScore}</strong> (${Math.abs(zScore) >= 1.5 ? "Significant Shift" : "Typical Band"})<br/>
                SEM Margin: &plusmn;${semVal}%<br/>
                True Score (68% CI): ${lowerCI.toFixed(0)}% - ${upperCI.toFixed(0)}%<br/>
                <span style="font-size:0.72rem; color:var(--text-muted);">Classroom Section: ${className}</span>
              `;
        tooltip.style.left = `${e.pageX + 12}px`;
        tooltip.style.top = `${e.pageY - 16}px`;

      // Drag target calculations
      let isDraggingSlider = false;
      function startSliderDrag(e) {
        e.preventDefault();
        isDraggingSlider = true;

        const sliderSvg = document.getElementById("targetSliderSvg");
        if (!sliderSvg) return;
        const rect = sliderSvg.getBoundingClientRect();
        const padding = 15;
        const trackWidth = rect.width - 2 * padding;

        const data = AppRepository.getFilteredRecords();
        const scores = data.map((d) => d.score).filter(Number.isFinite);

        const moveHandler = (moveEvent) => {
          if (!isDraggingSlider) return;
          const touch = moveEvent.touches ? moveEvent.touches[0] : moveEvent;
          const offsetX = touch.clientX - rect.left - padding;

          const newTarget = AnalyticsService.clamp(
            Math.round((offsetX / trackWidth) * 100),
            10,
            99,
          );

          // 1. Update slider handle locally
          const handle = document.getElementById("targetSliderHandle");
          const fill = document.getElementById("targetSliderFill");
          const text = document.getElementById("targetSliderText");
          const handleX = padding + (newTarget / 100) * trackWidth;
          if (handle) handle.setAttribute("cx", handleX);
          if (fill) fill.setAttribute("x2", handleX);
          if (text) text.textContent = `${newTarget}%`;

          // 2. Set memory state
          AppRepository.state.filters.target = newTarget;

          // 3. Update Stacked Number Line in real-time
          const numLineWrapper = document.getElementById(
            "stackedNumberLineWrapper",
          );
          if (numLineWrapper) {
            numLineWrapper.innerHTML =
              UIComponents.generateStackedNumberLineSVG(data);
          }

          // 4. Update Normal Curve in real-time
          const normWrapper = document.getElementById("normalCurveWrapper");
          if (normWrapper) {
            normWrapper.innerHTML = UIComponents.generateNormalCurveSVG(scores);
          }

          // 5. Update KPI card (Proficiency Rate) in real-time
          const kpis = document.querySelectorAll(".kpi-value");
          if (kpis && kpis.length >= 4) {
            const metRate = scores.length
              ? (scores.filter((s) => s >= newTarget).length / scores.length) *
                100
              : 0;
            kpis[3].textContent = `${metRate.toFixed(1)}%`;
          }
        };

        const stopHandler = () => {
          isDraggingSlider = false;
          window.removeEventListener("mousemove", moveHandler);
          window.removeEventListener("mouseup", stopHandler);
          window.removeEventListener("touchmove", moveHandler);
          window.removeEventListener("touchend", stopHandler);

          // Final full update to write out analytical models
          UIController.updateFilter(
            "target",
            AppRepository.state.filters.target,
          );
        };

        window.addEventListener("mousemove", moveHandler);
        window.addEventListener("mouseup", stopHandler);
        window.addEventListener("touchmove", moveHandler, { passive: false });
        window.addEventListener("touchend", stopHandler);
      }

      // File parser mappings
      function handleFileSelected(input) {
        const file = input.files[0];
        if (!file) return;
        parseFile(file, "main");
      }

      function handleSupplementFileSelected(input) {
        const file = input.files[0];
        if (!file) return;
        parseFile(file, "supplement");
      }

      function parseFile(file, mode) {
        const reader = new FileReader();
        const name = file.name.toLowerCase();

        reader.onload = function (e) {
          try {
            let jsonRows = [];
            if (name.endsWith(".csv")) {
              jsonRows = csvToJSON(e.target.result);
            } else {
              const data = new Uint8Array(e.target.result);
              const workbook = XLSX.read(data, { type: "array" });
              const sheet = workbook.Sheets[workbook.SheetNames[0]];
              jsonRows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
            }

            if (mode === "main") {
              UIController.ingestData(jsonRows);
              UIController.transitionTo("setup");
              toast(
                `Loaded ${AppRepository.state.records.length} records. Review your data setup below.`,
              );
            } else {
              AppRepository.state.extraRows = jsonRows;
              AppRepository.state.extraHeaders = Object.keys(jsonRows[0] || {});
              AppRepository.state.advanced.corrField =
                AppRepository.state.extraHeaders.find(
                  (h) => h.toLowerCase() !== "student name",
                ) || "";
              AppRepository.save();
              UIController.render();
              toast(`Loaded ${jsonRows.length} supplemental student profiles.`);
            }
          } catch (err) {
            Logger.error("Excel File Ingestion Failure", err.message);
            alert(`Spreadsheet parse failure: ${err.message}`);
          }
        };

        if (name.endsWith(".csv")) {
          reader.readAsText(file);
        } else {
          reader.readAsArrayBuffer(file);
        }
      }

      function csvToJSON(csv) {
        const lines = csv.split(/\r\n|\n/);
        const result = [];
        const headers = lines[0].split(",");

        for (let i = 1; i < lines.length; i++) {
          if (!lines[i]) continue;
          const obj = {};
          const currentline = lines[i].split(",");
          for (let j = 0; j < headers.length; j++) {
            obj[headers[j].trim()] = currentline[j]
              ? currentline[j].trim()
              : "";
          }
          result.push(obj);
        }
        return result;
      }

          const met = scores.filter((s) => s >= target).length;
          const mean = AnalyticsService.mean(scores);
          const median = AnalyticsService.median(scores);
          const sd = AnalyticsService.sd(scores);
          const groups = AnalyticsService.buildGroups(
            AnalyticsService.studentSummaries(data),
            target,
          );
          const standardSummaries = AnalyticsService.standardSummaries(data);
          const topStandard = standardSummaries[0] || null;
          const prediction = AnalyticsService.predictionAnalysis(data);
          const rawTotal = AppRepository.state.rawRows.length;
          const recordTotal = AppRepository.state.records.length;
          const invalidScores = AppRepository.state.records.filter(
            (r) => !Number.isFinite(r.score),
          ).length;
          const outOfRange = AppRepository.state.records.filter(
            (r) => Number.isFinite(r.score) && (r.score < 0 || r.score > 100),
          ).length;
          const missingStudent = AppRepository.state.records.filter(
            (r) => !r.student || /^Student #/.test(r.student),
          ).length;
          const missingStandard = AppRepository.state.records.filter(
            (r) => !r.standard || r.standard === "General Std",
          ).length;
          const missingAssessment = AppRepository.state.records.filter(
            (r) => !r.assessment || r.assessment === "Unassigned Window",
          ).length;
          const duplicateMap = new Map();
          AppRepository.state.records.forEach((r) => {
            const key = `${r.student}|||${r.standard}|||${r.assessment}|||${r.className}`;
            duplicateMap.set(key, (duplicateMap.get(key) || 0) + 1);
          });
          const duplicateRows = [...duplicateMap.values()].reduce(
            (acc, n) => acc + Math.max(0, n - 1),
            0,
          );
          const issueCount =
            invalidScores +
            outOfRange +
            missingStudent +
            missingStandard +
            missingAssessment +
            duplicateRows;
          const completeness = recordTotal
            ? Math.max(0, 100 - (issueCount / Math.max(recordTotal, 1)) * 100)
            : 0;
          const qualityScore = Math.round(
            Math.max(0, Math.min(100, completeness)),
          );

          let status = "good";
          let statusText = "Ready to use";
          if (qualityScore < 88) {
            status = "warn";
            statusText = "Review recommended";

          if (qualityScore < 72 || invalidScores > 0 || outOfRange > 0) {

            statusText = "Fix data first";

            students,
            standards,
            assessments,
            classNames,

            median,

            prediction,

            recordTotal,
            invalidScores,
            outOfRange,
            missingStudent,
            missingStandard,
            missingAssessment,
            duplicateRows,
            issueCount,
            qualityScore,
            status,
            statusText,

        UIComponents.renderCurrentTab = function () {
          const data = AppRepository.getFilteredRecords();
          const tab = AppRepository.state.tab || "executive";

          if (!data.length && !["manager", "guide"].includes(tab)) {
            return emptyState();
          }

          switch (tab) {
            case "executive":
              return this.renderExecutiveTab(data);
            case "quality":
              return this.renderQualityTab(data);
            case "coach":
              return this.renderCoachTab(data);
            case "overview":
              return this.renderOverviewTab(data);
            case "planning":
              return this.renderPlanningTab(data);
            case "action":
              return this.renderActionTab(data);
            case "trends":
              return this.renderTrendsTab(data);
            case "patterns":
              return this.renderPatternsTab(data);
            case "groups":
              return this.renderGroupsTab(data);
            case "advanced":
              return this.renderAdvancedTab(data);
            case "whatif":
              return this.renderWhatIfTab(data);
            case "predictions":
              return this.renderPredictionsTab(data);
            case "guide":
              return this.renderGuideTab();
            case "manager":
              return this.renderManagerTab();
            case "classcompare":
              return this.renderClassCompareTab(data);
            default:
              return this.renderExecutiveTab(data);
          }
        };

            base.replace('<div class="container">', prefix) +
            timelineCard +

      // More robust CSV parsing with quoted field support.
      csvToJSON = function (csv) {
        const rows = [];
        let current = "";
        let row = [];
        let inQuotes = false;
        for (let i = 0; i < csv.length; i++) {
          const ch = csv[i];
          const next = csv[i + 1];
          if (ch === '"' && inQuotes && next === '"') {
            current += '"';
            i++;
          } else if (ch === '"') {
            inQuotes = !inQuotes;
          } else if (ch === "," && !inQuotes) {
            row.push(current);
            current = "";
          } else if ((ch === "\n" || ch === "\r") && !inQuotes) {
            if (ch === "\r" && next === "\n") i++;
            row.push(current);
            if (row.some((cell) => String(cell).trim() !== "")) rows.push(row);
            row = [];
            current = "";
          } else {
            current += ch;
          }
        }
        row.push(current);
        if (row.some((cell) => String(cell).trim() !== "")) rows.push(row);

        if (!rows.length) return [];
        const headers = rows[0].map((h) => String(h).trim());
        return rows.slice(1).map((values) => {
          const obj = {};
          headers.forEach((h, idx) => {
            obj[h || `Column ${idx + 1}`] =
              values[idx] !== undefined ? String(values[idx]).trim() : "";
          });
          return obj;
        });
      };

      function setFocusStudentFromSearch(value) {
        const student = String(value || "").trim();
        if (!student) return;
        const students = AnalyticsService.unique(
          AppRepository.state.records.map((r) => r.student),
        );
        const match =
          students.find((s) => s.toLowerCase() === student.toLowerCase()) ||
          students.find((s) => s.toLowerCase().includes(student.toLowerCase()));
        if (match) {
          UIController.updateFilter("focusStudent", match);
          toast(`Focused on ${match}.`);
        } else {
          toast("No matching student found.");
        }
      }

        const reader = new FileReader();
        reader.onload = function (e) {
          try {
            const parsed = JSON.parse(e.target.result);
            const nextState = parsed.state || parsed;
            Object.assign(AppRepository.state, nextState);
            AppRepository.save();
            UIController.transitionTo("app");
            toast("Workspace backup restored.");

            alert(`Could not restore backup: ${err.message}`);

        reader.readAsText(file);

        function generateSparklineSVG(values, w, h) {
          w = w || 72;
          h = h || 22;
          const filtered = values.filter(Number.isFinite);
          if (filtered.length < 2) return "";
          const min = Math.min(...filtered);
          const max = Math.max(...filtered);
          const range = max - min || 1;
          const step = w / (filtered.length - 1);
          const points = filtered
            .map(
              (v, i) =>
                `${(i * step).toFixed(1)},${(h - 2 - ((v - min) / range) * (h - 4)).toFixed(1)}`,
            )
            .join(" ");
          const last = filtered[filtered.length - 1];
          const first = filtered[0];
          const color =
            last >= first ? "var(--color-extension)" : "var(--color-urgent)";
          const lastX = ((filtered.length - 1) * step).toFixed(1);
          const lastY = (h - 2 - ((last - min) / range) * (h - 4)).toFixed(1);
          return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="vertical-align:middle;"><polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="${lastX}" cy="${lastY}" r="2" fill="${color}"/></svg>`;
        }

        function generateTimelineSVG(data) {
          const assessments = AnalyticsService.sortAssessments(
            AnalyticsService.unique(data.map((d) => d.assessment)),
          );
          if (assessments.length < 2)
            return `<p class="hint" style="text-align:center;padding:20px;">Requires 2+ assessment windows for timeline.</p>`;
          const target = Number(AppRepository.state.filters.target);
          const classNames = AnalyticsService.unique(
            data.map((d) => d.className),
          );
          const w = Math.max(480, assessments.length * 100);
          const h = 200;
          const pad = { t: 20, r: 20, b: 40, l: 50 };
          const chartW = w - pad.l - pad.r;
          const chartH = h - pad.t - pad.b;

          const seriesData = {};
          seriesData["All Classes"] = assessments.map((a) => {
            const scores = data
              .filter((d) => d.assessment === a)
              .map((d) => d.score)
              .filter(Number.isFinite);
            return AnalyticsService.mean(scores);
          });
          classNames.forEach((cn) => {
            seriesData[cn] = assessments.map((a) => {
              const scores = data
                .filter((d) => d.assessment === a && d.className === cn)
                .map((d) => d.score)
                .filter(Number.isFinite);
              return AnalyticsService.mean(scores);
            });
          });

          const allVals = Object.values(seriesData)
            .flat()
            .filter(Number.isFinite);
          const minY = Math.max(0, Math.min(...allVals, target) - 10);
          const maxY = Math.min(100, Math.max(...allVals, target) + 10);
          const rangeY = maxY - minY || 1;

          const getX = (i) => pad.l + (i / (assessments.length - 1)) * chartW;
          const getY = (v) => pad.t + chartH - ((v - minY) / rangeY) * chartH;

          const colors = [
            "var(--brand-secondary)",
            "var(--color-ontrack)",
            "var(--color-reteach)",
            "var(--color-extension)",
            "var(--color-urgent)",
          ];

          let gridLines = "";
          for (let i = 0; i <= 4; i++) {
            const v = minY + (rangeY / 4) * i;
            const y = getY(v);
            gridLines += `<line x1="${pad.l}" y1="${y}" x2="${pad.l + chartW}" y2="${y}" stroke="var(--border-light)" stroke-width="1"/>`;
            gridLines += `<text x="${pad.l - 8}" y="${y + 3}" text-anchor="end" fill="var(--text-muted)" font-size="9" font-weight="700">${v.toFixed(0)}%</text>`;
          }

          let xLabels = assessments
            .map((a, i) => {
              const x = getX(i);
              const shortLabel = a.length > 14 ? a.slice(0, 12) + "..." : a;
              return `<text x="${x}" y="${h - 8}" text-anchor="middle" fill="var(--text-secondary)" font-size="8" font-weight="700">${shortLabel}</text>`;
            })
            .join("");

          const targetY = getY(target);
          const targetLine = `<line x1="${pad.l}" y1="${targetY}" x2="${pad.l + chartW}" y2="${targetY}" stroke="var(--color-urgent)" stroke-width="1.5" stroke-dasharray="4,3"/><text x="${pad.l + chartW + 4}" y="${targetY + 3}" fill="var(--color-urgent)" font-size="8" font-weight="800">${target}%</text>`;

          let seriesLines = "";
          let idx = 0;
          for (const [name, vals] of Object.entries(seriesData)) {
            const points = vals
              .map((v, i) =>
                Number.isFinite(v)
                  ? `${getX(i).toFixed(1)},${getY(v).toFixed(1)}`
                  : null,
              )
              .filter(Boolean);
            if (points.length < 2) {
              idx++;
              continue;
            }
            const color = colors[idx % colors.length];
            const sw = name === "All Classes" ? 2.5 : 1.5;
            seriesLines += `<polyline points="${points.join(" ")}" fill="none" stroke="${color}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round"/>`;
            vals.forEach((v, i) => {
              if (Number.isFinite(v)) {
                seriesLines += `<circle cx="${getX(i)}" cy="${getY(v)}" r="3.5" fill="${color}" stroke="white" stroke-width="1"/>`;
              }
            });
            idx++;
          }

          let legendItems = "";
          idx = 0;
          for (const name of Object.keys(seriesData)) {
            const color = colors[idx % colors.length];
            legendItems += `<span class="legend-item"><span class="legend-swatch" style="background:${color};"></span>${name}</span>`;
            idx++;
          }

          return `
                  <div class="timeline-chart-wrap">
                    <svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="background:var(--bg-card); border:1px solid var(--border-light); border-radius:var(--radius-md);">
                      ${gridLines}
                      <line x1="${pad.l}" y1="${pad.t}" x2="${pad.l}" y2="${pad.t + chartH}" stroke="var(--border-primary)" stroke-width="2"/>
                      <line x1="${pad.l}" y1="${pad.t + chartH}" x2="${pad.l + chartW}" y2="${pad.t + chartH}" stroke="var(--border-primary)" stroke-width="2"/>
                      ${targetLine}
                      ${seriesLines}
                      ${xLabels}
                    </svg>
                  </div>
                  <div class="heat-legend" style="margin-top:8px;">${legendItems}</div>
                `;
        }

        function showStudentProfile(studentName) {
          const records = AppRepository.state.records.filter(
            (d) => d.student === studentName,
          );
          if (!records.length) return;
          const scores = records.map((r) => r.score).filter(Number.isFinite);
          const target = Number(AppRepository.state.filters.target);
          const avg = AnalyticsService.mean(scores);
          const med = AnalyticsService.median(scores);
          const sd = AnalyticsService.sd(scores);
          const band = AnalyticsService.scoreBand(avg, target);
          const assessments = AnalyticsService.sortAssessments(
            AnalyticsService.unique(records.map((r) => r.assessment)),
          );
          const assessmentAvgs = assessments.map((a) =>
            AnalyticsService.mean(
              records.filter((r) => r.assessment === a).map((r) => r.score),
            ),
          );
          const sparkline = generateSparklineSVG(assessmentAvgs, 180, 36);
          const standards = AnalyticsService.unique(
            records.map((r) => r.standard),
          );
          const stdScores = standards
            .map((s) => {
              const sc = AnalyticsService.mean(
                records.filter((r) => r.standard === s).map((r) => r.score),
              );
              const b = AnalyticsService.scoreBand(sc, target);
              return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 8px;background:${b.color}12;border-radius:6px;border:1px solid ${b.color}25;"><span style="font-weight:700;font-size:0.88rem;">${s}</span><span style="font-weight:800;color:${b.color};">${Number.isFinite(sc) ? sc.toFixed(0) + "%" : "—"}</span></div>`;
            })
            .join("");
          const first = assessmentAvgs.find(Number.isFinite);
          const latest = [...assessmentAvgs].reverse().find(Number.isFinite);
          const growth =
            Number.isFinite(first) && Number.isFinite(latest)
              ? latest - first
              : NaN;

          const html = `
                  <div class="student-profile-grid">
                    <div class="profile-stat"><span class="label">Average</span><span class="value" style="color:${band.color};">${Number.isFinite(avg) ? avg.toFixed(1) + "%" : "—"}</span></div>
                    <div class="profile-stat"><span class="label">Median</span><span class="value">${Number.isFinite(med) ? med.toFixed(1) + "%" : "—"}</span></div>
                    <div class="profile-stat"><span class="label">Std Dev</span><span class="value">${Number.isFinite(sd) ? sd.toFixed(1) : "—"}</span></div>
                    <div class="profile-stat"><span class="label">Growth</span><span class="value" style="color:${growth >= 0 ? "var(--color-extension)" : "var(--color-urgent)"};">${Number.isFinite(growth) ? (growth >= 0 ? "+" : "") + growth.toFixed(1) + "%" : "—"}</span></div>
                  </div>
                  <div style="margin-top:16px;">
                    <strong style="color:var(--brand-primary);font-size:0.88rem;">Performance Band</strong>
                    <div style="margin-top:6px;"><span class="badge" style="background:${band.color}15;color:${band.color};border:1px solid ${band.color}30;font-weight:800;">${band.label}</span></div>
                  </div>
                  <div style="margin-top:16px;">
                    <strong style="color:var(--brand-primary);font-size:0.88rem;">Assessment Trend</strong>
                    <div style="margin-top:8px;">${sparkline || '<span class="hint">Need 2+ assessments</span>'}</div>
                  </div>
                  <div style="margin-top:16px;">
                    <strong style="color:var(--brand-primary);font-size:0.88rem;">Standard Breakdown</strong>
                    <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px;">${stdScores}</div>
                  </div>
                `;
          showGoldModal(`Student Profile: ${studentName}`, html);
        }

        function installFocusTrap() {
          document.addEventListener("keydown", function (e) {
            const modal = document.getElementById("explainModal");
            if (!modal || modal.style.display !== "flex") return;
            if (e.key !== "Tab") {
              if (e.key === "Escape") {
                closeModal();
                return;
              }
              return;
            }
            const focusable = modal.querySelectorAll(
              'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])',
            );
            if (!focusable.length) return;
            const first = focusable[0];
            const last = focusable[focusable.length - 1];
            if (e.shiftKey) {
              if (document.activeElement === first) {
                e.preventDefault();
                last.focus();
              }
            } else {
              if (document.activeElement === last) {
                e.preventDefault();
                first.focus();
              }
            }
          });
        }

        function installSortableTables() {
          document.addEventListener("click", function (e) {
            const th = e.target.closest("th.sortable");
            if (!th) return;
            const table = th.closest("table");
            if (!table) return;
            const tbody = table.querySelector("tbody");
            if (!tbody) return;
            const colIdx = Array.from(th.parentNode.children).indexOf(th);
            const rows = Array.from(tbody.querySelectorAll("tr"));
            const isAsc = th.classList.contains("sort-asc");
            table
              .querySelectorAll("th.sortable")
              .forEach((h) => h.classList.remove("sort-asc", "sort-desc"));
            th.classList.add(isAsc ? "sort-desc" : "sort-asc");
            const dir = isAsc ? -1 : 1;
            rows.sort((a, b) => {
              const aText = a.children[colIdx]?.textContent?.trim() || "";
              const bText = b.children[colIdx]?.textContent?.trim() || "";
              const aNum = parseFloat(aText.replace(/[^0-9.\-]/g, ""));
              const bNum = parseFloat(bText.replace(/[^0-9.\-]/g, ""));
              if (!isNaN(aNum) && !isNaN(bNum)) return (aNum - bNum) * dir;
              return aText.localeCompare(bText) * dir;
            });
            rows.forEach((r) => tbody.appendChild(r));
          });
        }

        function exportTabAsCSV(tabName) {
          const main =
            document.getElementById("mainContent") ||
            document.querySelector(".main");
          if (!main) return;
          const tables = main.querySelectorAll("table");
          if (!tables.length) {
            toast("No table data on this tab to export.");
            return;
          }
          const table = tables[0];
          const lines = [];
          const headerRow = Array.from(table.querySelectorAll("thead th")).map(
            (th) => DSM_GOLD.csvEscape(th.textContent.trim()),
          );
          lines.push(headerRow.join(","));
          table.querySelectorAll("tbody tr").forEach((tr) => {
            const cells = Array.from(tr.querySelectorAll("td")).map((td) =>
              DSM_GOLD.csvEscape(td.textContent.trim()),
            );
            lines.push(cells.join(","));
          });
          const csv = lines.join("\n");
          DSM_GOLD.downloadFile(
            `Data-Studio-${tabName}-2025-05-22.csv`,
            "text/csv;charset=utf-8",
            csv,
          );
          toast(`Exported ${tabName} tab as CSV.`);
        }

        function renderCoordSVGLive() {
          const c = document.getElementById("coord-svg-live");
          if (!c) return;
          const k = planningState.coordSlope;
          const ox = 30,
            oy = 120,
            axW = 160,
            axH = 100;
          let lines =
            '<line x1="' +
            ox +
            '" y1="20" x2="' +
            ox +
            '" y2="' +
            oy +
            '" stroke="#cbd5e1" stroke-width="2"/>' +
            '<line x1="' +
            ox +
            '" y1="' +
            oy +
            '" x2="' +
            (ox + axW) +
            '" y2="' +
            oy +
            '" stroke="#cbd5e1" stroke-width="2"/>';
          for (let gx = 40; gx <= axW; gx += 40)
            lines +=
              '<line x1="' +
              (ox + gx) +
              '" y1="20" x2="' +
              (ox + gx) +
              '" y2="' +
              oy +
              '" stroke="#f1f5f9" stroke-width="1"/>';
          for (let gy = 25; gy <= axH; gy += 25)
            lines +=
              '<line x1="' +
              ox +
              '" y1="' +
              (oy - gy) +
              '" x2="' +
              (ox + axW) +
              '" y2="' +
              (oy - gy) +
              '" stroke="#f1f5f9" stroke-width="1"/>';
          const maxX = 5;
          const endY = Math.min(k * maxX, axH / (axH / maxX));
          const plotEndX = ox + Math.min(maxX * (axW / maxX), axW);
          const plotEndY =
            oy - Math.min(k * maxX * (axH / (k * maxX || 1)), axH);
          const safeEndY = Math.max(20, plotEndY);
          lines +=
            '<line x1="' +
            ox +
            '" y1="' +
            oy +
            '" x2="' +
            plotEndX +
            '" y2="' +
            safeEndY +
            '" stroke="var(--brand-secondary)" stroke-width="2.5"/>';
          const pts = [
            [1, k],
            [2, 2 * k],
            [3, 3 * k],
          ];
          pts.forEach(function (p) {
            const px = ox + p[0] * (axW / maxX);
            const py = oy - Math.min(p[1] * (axH / (k * maxX || 1)), axH);
            if (py >= 20)
              lines +=
                '<circle cx="' +
                px +
                '" cy="' +
                py +
                '" r="4.5" fill="var(--brand-primary)"/>';
          });
          lines +=
            '<text x="' +
            (ox + axW - 20) +
            '" y="' +
            (oy + 14) +
            '" fill="var(--text-secondary)" font-size="9" font-weight="800">x</text>' +
            '<text x="' +
            (ox - 12) +
            '" y="28" fill="var(--text-secondary)" font-size="9" font-weight="800">y</text>';
          c.innerHTML = lines;
        }

                <span class="cmd-palette-kbd">ESC</span>
              </div>
              <div class="cmd-palette-results" id="cmdPaletteResults" role="listbox"></div>
            </div>
          `;
          overlay.addEventListener("mousedown", (e) => {
            if (e.target === overlay) closePalette();
          });
          document.body.appendChild(overlay);
        }

        function openPalette() {
          createPaletteDOM();
          paletteOpen = true;
          focusIdx = 0;
          const overlay = document.getElementById("cmdPaletteOverlay");
          const input = document.getElementById("cmdPaletteInput");
          overlay.classList.add("open");
          input.value = "";
          filterResults("");
          setTimeout(() => input.focus(), 50);
        }

        function closePalette() {
          paletteOpen = false;
          const overlay = document.getElementById("cmdPaletteOverlay");
          if (overlay) overlay.classList.remove("open");
        }

        function togglePalette() {
          paletteOpen ? closePalette() : openPalette();
        }

        function filterResults(query) {
          const q = query.toLowerCase().trim();
          const container = document.getElementById("cmdPaletteResults");
          if (!container) return;

          // Include student names as searchable items
          let studentItems = [];
          if (q.length >= 2 && AppRepository.state.records.length) {
            const students = AnalyticsService.unique(
              AppRepository.state.records.map((r) => r.student),
            ).sort();
            studentItems = students
              .filter((s) => s.toLowerCase().includes(q))
              .slice(0, 8)
              .map((s) => ({
                section: "Students",
                icon: "👤",
                label: s,
                action: () => {
                  UIController.updateFilter("focusStudent", s);
                  closePalette();
                },
              }));
          }

          const allItems = [...CMD_ITEMS, ...studentItems];
          filteredItems = q
            ? allItems.filter((it) => it.label.toLowerCase().includes(q))
            : CMD_ITEMS;
          focusIdx = Math.min(focusIdx, Math.max(0, filteredItems.length - 1));

          const grouped = {};
          filteredItems.forEach((it) => {
            if (!grouped[it.section]) grouped[it.section] = [];
            grouped[it.section].push(it);
          });

          let html = "";
          let idx = 0;
          for (const [section, items] of Object.entries(grouped)) {
            html += `<div class="cmd-palette-group-label">${section}</div>`;
            for (const item of items) {
              html += `<div class="cmd-result ${idx === focusIdx ? "focused" : ""}" data-idx="${idx}" role="option"
                onclick="UXEngine.executeItem(${idx})"
                onmouseenter="UXEngine.setFocus(${idx})">
                <span class="cmd-icon">${item.icon}</span>
                <span>${item.label}</span>
                ${item.shortcut ? `<span class="cmd-shortcut">${item.shortcut}</span>` : ""}
              </div>`;
              idx++;
            }
          }

          if (!filteredItems.length) {
            html = `<div style="padding:24px; text-align:center; color:var(--text-muted); font-size:0.88rem;">No results for "<strong>${q}</strong>"</div>`;
          }

          container.innerHTML = html;
        }

        function setFocus(idx) {
          focusIdx = idx;
          const results = document.querySelectorAll(
            "#cmdPaletteResults .cmd-result",
          );
          results.forEach((el, i) => el.classList.toggle("focused", i === idx));
        }

        function executeItem(idx) {
          const item = filteredItems[idx];
          if (!item) return;
          if (item.tab) {
            UIController.switchTab(item.tab);
            closePalette();
          } else if (item.action) {
            item.action();
          }
        }

        // ── Keyboard Handler ──
        function handleKeyDown(e) {
          // Cmd/Ctrl+K → toggle palette
          if ((e.metaKey || e.ctrlKey) && e.key === "k") {
            e.preventDefault();
            togglePalette();
            return;
          }

          if (paletteOpen) {
            if (e.key === "Escape") {
              closePalette();
              e.preventDefault();
              return;
            }
            if (e.key === "ArrowDown") {
              e.preventDefault();
              setFocus(Math.min(focusIdx + 1, filteredItems.length - 1));
              scrollFocusedIntoView();
              return;
            }
            if (e.key === "ArrowUp") {
              e.preventDefault();
              setFocus(Math.max(focusIdx - 1, 0));
              scrollFocusedIntoView();
              return;
            }
            if (e.key === "Enter") {
              e.preventDefault();
              executeItem(focusIdx);
              return;
            }
          }

          // Number shortcuts (only when not typing)
          if (!paletteOpen && !e.metaKey && !e.ctrlKey && !e.altKey) {
            const active = document.activeElement;
            const isTyping =
              active &&
              (active.tagName === "INPUT" ||
                active.tagName === "TEXTAREA" ||
                active.tagName === "SELECT" ||
                active.isContentEditable);
            if (!isTyping) {
              const shortcutMap = {
                1: "executive",
                2: "overview",
                3: "coach",
                4: "planning",
                5: "action",
                6: "predictions",
              };
              if (shortcutMap[e.key]) {
                UIController.switchTab(shortcutMap[e.key]);
                e.preventDefault();
              }
            }
          }
        }

        function scrollFocusedIntoView() {
          const el = document.querySelector(
            "#cmdPaletteResults .cmd-result.focused",
          );
          if (el) el.scrollIntoView({ block: "nearest" });
        }

        // ── Sidebar Collapsibility ──
        function installSidebarCollapse() {
          document.addEventListener("click", (e) => {
            const title = e.target.closest(".sidebar-section-title");
            if (!title) return;
            const section = title.closest(".sidebar-section");
            if (section) section.classList.toggle("collapsed");
          });
        }

        // ── Contextual Nav Helpers ──
        const CTX_NAV_MAP = {
          executive: [
            { icon: "📊", label: "Drill into Overview", tab: "overview" },
            { icon: "📝", label: "Build Action Plan", tab: "action" },
            { icon: "🔭", label: "Predict Test Scores", tab: "predictions" },
          ],
          overview: [
            { icon: "📈", label: "See Growth Trends", tab: "trends" },
            { icon: "👥", label: "Create Groups", tab: "groups" },
            { icon: "🧩", label: "Find Patterns", tab: "patterns" },
          ],
          action: [
            { icon: "👥", label: "Adjust Groups", tab: "groups" },
            { icon: "🎯", label: "Open Planning Studio", tab: "planning" },
            { icon: "⚖️", label: "Run What-If", tab: "whatif" },
          ],
          trends: [
            { icon: "🔮", label: "Advanced Analysis", tab: "advanced" },
            { icon: "🔭", label: "Predict Scores", tab: "predictions" },
          ],
          patterns: [
            { icon: "📝", label: "Create Action Plan", tab: "action" },
            { icon: "🎯", label: "Planning Studio", tab: "planning" },
          ],
          groups: [
            { icon: "📝", label: "Action Plan", tab: "action" },
            { icon: "⚖️", label: "What-If Scenarios", tab: "whatif" },
          ],
          predictions: [
            {
              icon: "📝",
              label: "Build Action Plan from Predictions",
              tab: "action",
            },
            { icon: "⚖️", label: "What-If Planner", tab: "whatif" },
            { icon: "📈", label: "Growth Trajectory", tab: "trends" },
          ],
          whatif: [
            { icon: "🔭", label: "Score Predictor", tab: "predictions" },
            { icon: "📝", label: "Action Plan", tab: "action" },
          ],
          advanced: [
            { icon: "🔭", label: "Score Predictor", tab: "predictions" },
            { icon: "📈", label: "Growth Trajectory", tab: "trends" },
          ],
          planning: [
            { icon: "📝", label: "Action Plan", tab: "action" },
            { icon: "👥", label: "Flexible Groups", tab: "groups" },
          ],
          coach: [
            { icon: "🏛️", label: "Executive Summary", tab: "executive" },
            { icon: "📝", label: "Action Plan", tab: "action" },
          ],
          quality: [
            { icon: "⚙️", label: "Data Manager", tab: "manager" },
            { icon: "🏛️", label: "Executive Summary", tab: "executive" },
          ],
        };

        function renderContextualNav(tabName) {
          const links = CTX_NAV_MAP[tabName];
          if (!links || !links.length) return "";
          return `<div class="ctx-nav" aria-label="Related views">
            <span style="font-size:0.72rem; font-weight:800; text-transform:uppercase; color:var(--text-muted); align-self:center;">Next steps →</span>
            ${links.map((l) => `<button class="ctx-nav-link" onclick="UIController.switchTab('${l.tab}')">${l.icon} ${l.label}</button>`).join("")}
          </div>`;
        }

        // ── Topbar Shortcut Hint ──
        function renderShortcutHint() {
          const isMac = navigator.platform.toUpperCase().indexOf("MAC") >= 0;
          const mod = isMac ? "⌘" : "Ctrl";
          return `<button class="topbar-shortcut-hint" onclick="UXEngine.openPalette()" title="Quick navigation (${mod}+K)">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            ${mod}+K
          </button>`;
        }

        // ── Init ──
        function install() {
          document.addEventListener("keydown", handleKeyDown);
          installSidebarCollapse();

          // Bind palette input filtering
          document.addEventListener("input", (e) => {
            if (e.target.id === "cmdPaletteInput") {
              focusIdx = 0;
              filterResults(e.target.value);
            }
          });
        }

        return {
          openPalette,
          closePalette,
          togglePalette,
          executeItem,
          setFocus,
          renderContextualNav,
          renderShortcutHint,
          install,
        };
      })();

      UXEngine.install();

      // Global Bootstrap entry
      window.onload = function () {
        validateConfig();
        Logger.info("System configuration successfully validated.");

        const restored = AppRepository.restore();

        // Restore theme
        if (AppRepository.state && AppRepository.state.themeMode === "dark") {
          document.body.classList.add("dark-theme");
        }
        updateThemeBtn();

        if (restored && AppRepository.state.records.length) {
          UIController.transitionTo("app");
        } else {
          UIController.transitionTo("landing");
        }
      };
    </script>
  </body>
</html>
