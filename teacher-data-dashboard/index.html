                    <div class="control-group" style="min-width: 220px;">
                      <label>Target Threshold (%)</label>
                      ${this.generateInteractiveSliderSVG(Number(AppRepository.state.filters.target))}
                    </div>
                  </div>
                `;
        },

        renderOverviewTab(data) {
          const scores = data.map((d) => d.score).filter(Number.isFinite);
          const studentCount = AnalyticsService.unique(
            data.map((d) => d.student),
          ).length;
          const target = Number(AppRepository.state.filters.target);
          const metRate = scores.length
            ? (scores.filter((s) => s >= target).length / scores.length) * 100
            : 0;

          // Effect Size (First vs Last assessment)
          const summaries = AnalyticsService.studentSummaries(data);
          const groupFirst = summaries
            .map((s) => s.first)
            .filter(Number.isFinite);
          const groupLatest = summaries
            .map((s) => s.latest)
            .filter(Number.isFinite);
          const cohD = AnalyticsService.cohensD(groupLatest, groupFirst);

          return `
                  <div class="container">
                    ${this.renderFilters()}

                    <div class="grid grid-4">
                      <div class="kpi-card">
                        <div class="kpi-icon" style="background:var(--brand-soft); color:var(--brand-secondary)">📊</div>

                          <span class="kpi-label">Analyzed Items</span>

                      </div>
                      <div class="kpi-card">
                        <div class="kpi-icon" style="background:hsl(210, 80%, 95%); color:hsl(210, 80%, 45%)">👤</div>

                          <span class="kpi-label">Active Students</span>

                        <div class="kpi-icon" style="background:var(--color-extension-soft); color:var(--color-extension)">🎯</div>
                        <div class="kpi-data">
                          <span class="kpi-value">${metRate.toFixed(1)}%</span>
                          <span class="kpi-label">Proficiency Rate</span>
                        </div>
                      </div>
                    </div>

                    <div class="grid grid-2">
                      <div class="card">
                        <div class="card-header">
                          <div>
                            <h2 class="card-title">Classroom Normal Distribution <span class="info-btn" onclick="showStatsExplanation('distribution')" title="Learn more about the Bell Curve">ⓘ</span></h2>
                            <p class="card-subtitle">Normal probability density curve based on current mean and standard deviation</p>
                          </div>
                        </div>
                        <div id="normalCurveWrapper" style="display:flex; justify-content:center; align-items:center; width:100%;">
                          ${this.generateNormalCurveSVG(scores)}
                        </div>
                      </div>

                      <div class="card">
                        <div class="card-header">
                          <div>
                            <h2 class="card-title">Performance Range Breakdown <span class="info-btn" onclick="showStatsExplanation('performanceBreakdown')" title="Learn more about Performance Bands">ⓘ</span></h2>
                            <p class="card-subtitle">Relative distribution of students categorized into target outcome zones</p>
                          </div>
                        </div>
                        <div style="height:220px; position:relative;">
                          <canvas id="classDistributionChart"></canvas>
                        </div>
                      </div>
                    </div>

                    <!-- Student Scatter/Master Scale -->
                    <div class="card" style="position:relative;">
                      <div class="card-header">
                        <div>
                          <h2 class="card-title">Student Distribution Master Scale (Stacked Number Line) <span class="info-btn" onclick="showStatsExplanation('stackedScale')" title="Learn more about the Master Scale">ⓘ</span></h2>
                          <p class="card-subtitle">Every circle represents an individual student score. Nodes stack vertically within a 2.5% threshold to prevent overlap. Hover nodes for detailed metadata.</p>

                      <div id="stackedNumberLineWrapper" style="display:flex; width:100%; justify-content:center; overflow-x:auto; padding-bottom:12px;">

                    </div>

                    <!-- Extra Statistician Metrics Panel -->
                    <div class="grid grid-3">
                      ${this.renderOutlierCard(scores, summaries)}
                      ${this.renderPsychometricCard(scores, data)}
                      ${this.renderLongitudinalCard(cohD)}
                    </div>

                    <!-- Priority Standards Table -->
                    <div class="card">
                      <div class="card-header">
                        <div>
                          <h2 class="card-title">Reteach Priority Standards Rankings <span class="info-btn" onclick="showStatsExplanation('standardsRankings')" title="Learn more about Priority Standards">ⓘ</span></h2>
                          <p class="card-subtitle">Standards sorted by high failure rate to isolate immediate focus objectives</p>
                        </div>
                      </div>
                      <div class="table-wrap">

                              <th class="sortable">Min Score</th>
                              <th class="sortable">Max Score</th>
                            </tr>
                          </thead>
                          <tbody>
                            ${AnalyticsService.standardSummaries(data)
                              .slice(0, 5)
                              .map(
                                (s) => `
                              <tr>
                                <td style="font-weight:700; color:var(--brand-primary);">${s.standard}</td>
                                <td>${s.n}</td>
                                <td>${s.avg.toFixed(1)}%</td>
                                <td>
                                  <span class="badge ${s.belowPct > 50 ? "badge-urgent" : "badge-reteach"}">
                                    ${s.belowPct.toFixed(1)}% Below
                                  </span>
                                </td>
                                <td>${s.min.toFixed(0)}%</td>
                                <td>${s.max.toFixed(0)}%</td>

                            `,
                              )
                              .join("")}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                `;
        },

        renderOutlierCard(scores, summaries) {
          const iqrVal = AnalyticsService.iqr(scores);
          let body = "";

          if (Number.isNaN(iqrVal) || iqrVal === 0) {
            body = `<p class="hint">Standard deviation spread is too narrow to isolate anomalies.</p>`;
          } else {
            const q1 = AnalyticsService.quantile(scores, 0.25);
            const q3 = AnalyticsService.quantile(scores, 0.75);
            const lowerBound = q1 - 1.5 * iqrVal;
            const upperBound = q3 + 1.5 * iqrVal;
            const outliers = summaries.filter(
              (s) => s.avg < lowerBound || s.avg > upperBound,
            );

            if (!outliers.length) {
              body = `<div style="padding:16px; text-align:center; background:var(--color-extension-soft); color:var(--color-extension); font-weight:700; border-radius:8px; font-size:0.88rem;">✓ No statistical performance outliers detected.</div>`;
            } else {
              body = `
                      <div style="display:flex; flex-direction:column; gap:8px;">
                        ${outliers
                          .map(
                            (o) => `
                          <div style="display:flex; justify-content:space-between; align-items:center; background:var(--color-urgent-soft); padding:8px 10px; border-radius:6px; border:1px solid #fca5a5;">
                            <strong style="color:var(--color-urgent); font-size:0.86rem;">${o.student}</strong>
                            <span style="font-size:0.8rem; font-weight:700; color:var(--text-secondary);">Avg: ${o.avg.toFixed(1)}%</span>
                          </div>
                        `,
                          )
                          .join("")}
                      </div>
                    `;
            }
          }

          return `
                  <div class="card">
                    <div class="card-header">
                      <div>
                        <h2 class="card-title">Outlier & Anomaly Scan <span class="info-btn" onclick="showStatsExplanation('outliers')" title="Learn more about Outlier Scans">ⓘ</span></h2>
                        <p class="card-subtitle">Identifies students drifting abnormally far from average (1.5 IQR bounds)</p>
                      </div>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:12px;">
                      ${body}
                    </div>
                  </div>
                `;
        },

        renderPsychometricCard(scores, data) {
          const alpha = AnalyticsService.cronbachAlpha(data);
          const semVal = AnalyticsService.sem(scores, 0.8);

          let statusText = "Noisy Data (High Error)";
          let statusClass = "badge-urgent";
          let advice =
            "The data has high measurement noise. Consider adding more objective check-in tasks.";

          if (alpha >= 0.8) {
            statusText = "Gold Standard Reliability";
            statusClass = "badge-extension";
            advice =
              "Highly consistent data. Excellent for targeted learning plans.";
          } else if (alpha >= 0.7) {
            statusText = "Good Reliability";
            statusClass = "badge-ontrack";
            advice =
              "Consistent and solid records. Suitable for grouping decisions.";
          } else if (alpha >= 0.6) {
            statusText = "Acceptable Consistency";
            statusClass = "badge-reteach";
            advice =
              "Moderate variance. Combine with qualitative observations.";
          } else if (Number.isNaN(alpha)) {
            return `
                    <div class="card">
                      <div class="card-header">
                        <div>
                          <h2 class="card-title">Psychometric Test Health <span class="info-btn" onclick="showStatsExplanation('psychometrics')" title="Learn more about Cronbach's Alpha and SEM">ⓘ</span></h2>
                          <p class="card-subtitle">Measures assessment internal consistency and test noise</p>
                        </div>
                      </div>
                      <div style="display:flex; flex-direction:column; gap:12px;">
                        <p class="hint">Requires at least 2 distinct standards / skills checked to compute reliability indices.</p>
                      </div>
                    </div>
                  `;
          }

          return `
                  <div class="card">
                    <div class="card-header">
                      <div>
                        <h2 class="card-title">Psychometric Test Health <span class="info-btn" onclick="showStatsExplanation('psychometrics')" title="Learn more about Cronbach's Alpha and SEM">ⓘ</span></h2>
                        <p class="card-subtitle">Measures internal reliability (Cronbach's &alpha;) and standard error (SEM)</p>
                      </div>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:12px;">
                      <div style="background:var(--bg-panel); border-left:4px solid var(--brand-secondary); padding:12px; border-radius:var(--radius-sm);">
                        <div style="display:flex; justify-content:space-between; align-items:baseline;">
                          <span style="font-size:1.6rem; font-weight:800; color:var(--brand-primary);">&alpha; = ${alpha.toFixed(2)}</span>
                          <span class="badge ${statusClass}">${statusText}</span>
                        </div>
                        <div style="font-size:0.85rem; font-weight:700; color:var(--text-secondary); margin-top:4px;">
                          Standard Error (SEM): &plusmn;${semVal.toFixed(1)}%
                        </div>
                      </div>
                      <p style="font-size:0.86rem; color:var(--text-secondary);">
                        ${advice}
                      </p>
                    </div>
                  </div>
                `;
        },

        renderLongitudinalCard(cohD) {
          let body = "";
          if (Number.isFinite(cohD)) {
            body = `
                    <div style="background:var(--brand-soft); border-left:4px solid var(--brand-secondary); padding:16px; border-radius:var(--radius-sm);">
                      <h3 style="font-size:1.6rem; font-weight:800; color:var(--brand-primary);">${cohD.toFixed(2)}</h3>
                      <span class="badge ${Math.abs(cohD) >= 0.8 ? "badge-extension" : "badge-reteach"}" style="margin-top:4px;">
                        ${Math.abs(cohD) >= 0.8 ? "Excellent Growth Effect" : "Modest Growth Effect"}
                      </span>
                      <p style="font-size:0.85rem; color:var(--text-secondary); margin-top:8px; line-height:1.45;">
                        Comparing first assessment averages to latest yields a statistical growth effect magnitude of <strong>${cohD.toFixed(2)}</strong> standard deviations.
                      </p>
                    </div>
                  `;
          } else {
            body = `
                    <p class="hint">Chronological effect sizes require at least 2 distinct assessment periods in the sheet.</p>
                  `;
          }

          return `
                  <div class="card">
                    <div class="card-header">
                      <div>
                        <h2 class="card-title">Longitudinal Impact <span class="info-btn" onclick="showStatsExplanation('longitudinal')" title="Learn more about Cohen's d effect size">ⓘ</span></h2>
                        <p class="card-subtitle">Quantifying absolute cohort growth magnitude over time (Cohen's d)</p>
                      </div>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:12px;">
                      ${body}
                    </div>
                  </div>
                `;
        },

        renderPlanningTab(data) {
          if (
            typeof DSM_PLATINUM !== "undefined" &&
            DSM_PLATINUM.renderPlanningStudio
          ) {
            const standards = AnalyticsService.standardSummaries(data);

            const target = Number(AppRepository.state.filters.target);
            const brief = AnalyticsService.generateDynamicLessonBrief(data);
            setTimeout(function () {
              DSM_PLATINUM.initPlanningLiveSVGs();
            }, 60);
            return DSM_PLATINUM.renderPlanningStudio(
              data,
              standards,
              topPriority,
              brief,
              target,
            );
          }
          const standards = AnalyticsService.standardSummaries(data);
          const topPriority = standards[0];
          const target = Number(AppRepository.state.filters.target);
          const brief = AnalyticsService.generateDynamicLessonBrief(data);

          return `
                  <div class="container">
                    ${this.renderFilters()}

                    <div class="grid grid-3-1">
                      <div class="card">
                        <div class="card-header">
                          <div>
                            <h2 class="card-title">Interactive Whiteboard Anchors & Geometric Helpers</h2>
                            <p class="card-subtitle">Programmatic visual aids to explain concepts and geometry elements during standard reviews</p>
                          </div>
                        </div>

                          <div class="whiteboard-card">
                            <span class="whiteboard-card-title">Prism Volume Standard Aid</span>
                            ${this.generatePrismSVG()}

                          </div>

                            <span class="whiteboard-card-title">Triangle Area Standard Aid</span>
                            ${this.generateTriangleSVG()}

                          <div class="whiteboard-card">
                            <span class="whiteboard-card-title">Coordinate Anchor Plot</span>
                            ${this.generateCoordinateSVG()}

                          </div>
                        </div>
                      </div>

                      <div class="card">
                        <div class="card-header">
                          <div>
                            <h2 class="card-title">Current Planning Priority</h2>
                            <p class="card-subtitle">Statistically determined focus area</p>
                          </div>
                        </div>
                        ${
                          topPriority
                            ? `
                          <div style="display:flex; flex-direction:column; gap:12px;">
                            <span style="font-size:1.15rem; font-weight:800; color:var(--brand-secondary);">${topPriority.standard}</span>
                            <div class="badge badge-urgent" style="align-self:flex-start;">
                              ${topPriority.belowPct.toFixed(1)}% students need reteaching
                            </div>
                            <p style="font-size:0.9rem; color:var(--text-secondary);">
                              With a cohort average of <strong>${topPriority.avg.toFixed(1)}%</strong>, this is the most critical learning gap in the active database.
                            </p>
                          </div>
                        `
                            : `<p class="hint">No priority standard calculated yet.</p>`
                        }
                      </div>
                    </div>

                    <!-- Multi-Disciplinary Veteran Teacher Daily Brief -->
                    <div class="card">
                      <div class="card-header">
                        <div>
                          <h2 class="card-title">Daily mini-Lesson Planner & Scaffolds</h2>
                          <p class="card-subtitle">Classroom guides, accommodations briefs, and parent bulletins generated in real time</p>
                        </div>
                      </div>

                      <div class="grid grid-3">
                        <div class="card" style="background:var(--bg-panel); border:1px solid var(--border-light);">
                          <h3 style="font-size:1rem; font-weight:800; color:var(--brand-primary); margin-bottom:6px;">📝 Daily Lesson Outline</h3>
                          <p style="font-size:0.88rem; color:var(--text-secondary); margin-bottom:8px;">Focus standard: <strong>${brief ? brief.standard : "Active Standard"}</strong>.</p>
                          <ol style="font-size:0.84rem; padding-left:14px; display:flex; flex-direction:column; gap:6px; color:var(--text-primary);">
                            <li><strong>Direct Instruction (10m)</strong>: Model priority standard visually using whiteboard helpers.</li>
                            <li><strong>Guided Practice (15m)</strong>: Work with <strong>${brief ? brief.strategicStudents : "reteach students"}</strong> to reinforce foundational skills.</li>

                            <li><strong>Exit Ticket (5m)</strong>: Assess mastery against the <strong>${target}%</strong> target threshold.</li>
                          </ol>
                        </div>

                        <div class="card" style="background:var(--bg-panel); border:1px solid var(--border-light);">
                          <h3 style="font-size:1rem; font-weight:800; color:var(--brand-primary); margin-bottom:6px;">💡 Student Accommodations</h3>
                          <p style="font-size:0.88rem; color:var(--text-secondary); margin-bottom:8px;">Accommodations brief for lesson planning:</p>
                          <ul style="font-size:0.84rem; padding-left:14px; display:flex; flex-direction:column; gap:6px; color:var(--text-primary); list-style-type:square;">
                            <li>Provide visual anchor vocabulary sheets to <strong>${brief ? brief.emergingList : "ESOL students"}</strong>.</li>
                            <li>Allow tactile tools (3D prism wireframes) for geometric calculations during practice.</li>
                            <li>Offer tiered challenge packets to <strong>${brief ? brief.expandingList : "high-ability language learners"}</strong>.</li>

                        <div class="card" style="background:var(--bg-panel); border:1px solid var(--border-light);">
                          <h3 style="font-size:1rem; font-weight:800; color:var(--brand-primary); margin-bottom:6px;">👪 Plain-Language Family Bulletin</h3>
                          <p style="font-size:0.84rem; color:var(--text-secondary); line-height:1.45;">
                            "Hello families! In school this week, we are strengthening our understanding of <strong>${brief ? brief.standard : "key classroom metrics"}</strong>. The class currently has an average of <strong>${brief ? brief.average : "75"}%</strong> on this concept.
                          </p>
                          <p style="font-size:0.84rem; color:var(--text-secondary); line-height:1.45; margin-top:8px;">
                            At home, you can review basic definitions, sketch shapes together, or ask your child to teach you their daily warm-up! For students working on extension challenges, let them try modeling complex volume structures."
                          </p>
                        </div>
                      </div>
                    </div>
                  </div>
                `;
        },

        renderActionTab(data) {
          if (!AppRepository.state.filters.actionScope) {
            AppRepository.state.filters.actionScope = "cohort";
          }
          if (!AppRepository.state.filters.customGroupStudents) {
            AppRepository.state.filters.customGroupStudents = [];
          }

          const actionScope = AppRepository.state.filters.actionScope;
          const customGroupStudents =
            AppRepository.state.filters.customGroupStudents;
          const focusStudent = AppRepository.state.filters.focusStudent;
          const className = AppRepository.state.filters.className;
          const target = Number(AppRepository.state.filters.target);

          const summaries = AnalyticsService.studentSummaries(data);
          const groups = AnalyticsService.buildGroups(summaries, target);
          const standards = AnalyticsService.standardSummaries(data);
          const topStd = standards[0]
            ? standards[0].standard
            : "Primary Focus Standard";

          const allStudents = AnalyticsService.unique(
            AppRepository.state.records.map((d) => d.student),
          ).sort();
          const allClasses = AnalyticsService.unique(
            AppRepository.state.records.map((d) => d.className),
          ).sort();

          // Horizontal Pill/Tab Selector
          const segmentedSelectorHTML = `
                  <div class="card" style="margin-bottom: 24px; padding: 12px 16px; background: var(--bg-panel); border: 1px solid var(--border-light);">
                    <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: center;">
                      <span style="font-size: 0.88rem; font-weight: 700; color: var(--text-secondary); margin-right: 12px;">Plan Scope:</span>
                      <button class="btn ${actionScope === "cohort" ? "btn-primary" : "btn-light"}" style="padding: 6px 14px; font-size: 0.84rem; display: flex; align-items: center; gap: 6px; border-radius: var(--radius-sm);" onclick="UIController.updateFilter('actionScope', 'cohort')">
                        <span>👥</span> Cohort-wide View
                      </button>
                      <button class="btn ${actionScope === "class" ? "btn-primary" : "btn-light"}" style="padding: 6px 14px; font-size: 0.84rem; display: flex; align-items: center; gap: 6px; border-radius: var(--radius-sm);" onclick="UIController.updateFilter('actionScope', 'class')">
                        <span>🏫</span> Class Period View
                      </button>
                      <button class="btn ${actionScope === "custom" ? "btn-primary" : "btn-light"}" style="padding: 6px 14px; font-size: 0.84rem; display: flex; align-items: center; gap: 6px; border-radius: var(--radius-sm);" onclick="UIController.updateFilter('actionScope', 'custom')">
                        <span>🧩</span> Custom Group Builder
                      </button>
                      <button class="btn ${actionScope === "individual" ? "btn-primary" : "btn-light"}" style="padding: 6px 14px; font-size: 0.84rem; display: flex; align-items: center; gap: 6px; border-radius: var(--radius-sm);" onclick="UIController.updateFilter('actionScope', 'individual')">
                        <span>👤</span> Individual Student View
                      </button>
                    </div>
                  </div>
                `;

          if (actionScope === "individual") {
            // ==========================================
            // INDIVIDUAL STUDENT ACTION PLAN
            // ==========================================
            let activeStudent = focusStudent;
            if (activeStudent === "All" && allStudents.length > 0) {
              activeStudent = allStudents[0];
            }

            const studentData = AppRepository.state.records.filter(
              (d) => d.student === activeStudent,
            );
            const studentAvg =
              AnalyticsService.mean(studentData.map((d) => d.score)) || 0;
            const studentStandards =
              AnalyticsService.standardSummaries(studentData);
            const weakStd = studentStandards.length
              ? studentStandards[0]
              : null;
            const strongStd = studentStandards.length
              ? studentStandards[studentStandards.length - 1]
              : null;
            const band = AnalyticsService.scoreBand(studentAvg, target);

            return `
                    <div class="container">
                      ${this.renderFilters()}
                      ${segmentedSelectorHTML}

                      <div class="card" style="border-left: 6px solid ${band.color}; background: linear-gradient(135deg, ${band.color}15, transparent); margin-bottom: 24px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;">
                          <div>
                            <span style="font-size:0.75rem; text-transform:uppercase; font-weight:800; color:var(--text-secondary);">Student-Specific Action Plan</span>
                            <h2 class="card-title" style="font-size:1.8rem; margin-top:4px; display:flex; align-items:center; gap:8px;">
                              Action Plan for ${activeStudent}
                              <span class="info-btn" onclick="showStatsExplanation('flexibleGroups')" title="Learn more about bands">ⓘ</span>
                            </h2>
                            <p class="card-subtitle">Personalized diagnostic mapping and direct pedagogical pathway instructions</p>
                          </div>
                          <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
                            <div style="display:flex; flex-direction:column; gap:4px;">
                              <label style="font-size:0.72rem; font-weight:800; text-transform:uppercase; color:var(--text-secondary);">Active Student</label>
                              <select onchange="UIController.updateFilter('focusStudent', this.value)" style="padding:6px 12px; border:1px solid var(--border-primary); border-radius:6px; background:var(--bg-panel); color:var(--text-primary); font-size:0.88rem; font-weight:600;">
                                ${allStudents.map((s) => `<option value="${s}" ${activeStudent === s ? "selected" : ""}>${s}</option>`).join("")}
                              </select>
                            </div>
                            <div style="background:${band.color}25; color:${band.color}; padding:10px 20px; border-radius:var(--radius-md); font-weight:800; font-size:1.15rem; border: 1px solid ${band.color}40; margin-top:14px;">
                              ${band.label} (${studentAvg.toFixed(1)}%)
                            </div>
                          </div>
                        </div>
                      </div>

                      <div class="grid grid-2" style="gap:24px;">
                        <!-- Skill Diagnostic Matrix -->
                        <div class="card">
                          <h3 style="font-size:1.15rem; font-weight:800; color:var(--brand-primary); margin-bottom:16px; display:flex; align-items:center; gap:8px;">🎯 Skill Diagnostic Matrix</h3>

                          <div style="display:flex; flex-direction:column; gap:16px;">
                            <div style="background:var(--color-urgent-soft); border-left:4px solid var(--color-urgent); padding:16px; border-radius:var(--radius-sm);">
                              <strong style="color:var(--color-urgent); font-size:0.9rem; text-transform:uppercase; letter-spacing:0.05em;">Primary Conceptual Gap (Weakest Skill)</strong>
                              <p style="font-weight:800; margin-top:6px; font-size:1.1rem; color:var(--text-primary);">${weakStd ? weakStd.standard : "None calculated"}</p>
                              <p style="font-size:0.88rem; color:var(--text-secondary); margin-top:4px;">Performing at an average of <strong>${weakStd ? weakStd.avg.toFixed(1) : 0}%</strong> on items testing this skill.</p>
                            </div>

                            <div style="background:var(--color-extension-soft); border-left:4px solid var(--color-extension); padding:16px; border-radius:var(--radius-sm);">
                              <strong style="color:var(--color-extension); font-size:0.9rem; text-transform:uppercase; letter-spacing:0.05em;">Primary Conceptual Strength (Strongest Skill)</strong>
                              <p style="font-weight:800; margin-top:6px; font-size:1.1rem; color:var(--text-primary);">${strongStd ? strongStd.standard : "None calculated"}</p>
                              <p style="font-size:0.88rem; color:var(--text-secondary); margin-top:4px;">Performing at an average of <strong>${strongStd ? strongStd.avg.toFixed(1) : 0}%</strong> on items testing this skill.</p>
                            </div>
                          </div>
                        </div>

                        <!-- Targeted Intervention Playbook -->
                        <div class="card">
                          <h3 style="font-size:1.15rem; font-weight:800; color:var(--brand-primary); margin-bottom:16px;">💡 Teacher Intervention Playbook</h3>
                          <p style="font-size:0.94rem; color:var(--text-secondary); margin-bottom:16px;">Based on ${activeStudent}'s performance profile, execute the following direct accommodations during reviews:</p>

                          <ul style="font-size:0.9rem; padding-left:18px; display:flex; flex-direction:column; gap:12px; color:var(--text-primary); line-height:1.5;">
                            ${
                              band.label === "Urgent Support"
                                ? `
                                <li><strong>Prerequisite Scaffold</strong>: Provide a visual vocabulary anchor sheet and arithmetic guides before coordinate graphing reviews.</li>
                                <li><strong>Strategic Tutoring</strong>: Prioritize direct one-on-one review of <strong>${weakStd ? weakStd.standard : "priority standards"}</strong> during station rotation blocks.</li>
                                <li><strong>Tactile Helpers</strong>: Offer geometric wireframes and colored coordinate overlays during problem-solving practice.</li>
                              `
                                : band.label === "Guided Reteach"
                                  ? `
                                <li><strong>Peer-Led Coaching</strong>: Pair ${activeStudent} with a master peer to collaborate on multi-step volume worksheets.</li>
                                <li><strong>Error Diagnostics</strong>: Review incorrect responses with the student to isolate calculation slips from conceptual misunderstandings.</li>
                                <li><strong>Rigor Sprint Goal</strong>: Challenge the student to push their score by 8 percentage points on the next assessment to cross the target line of ${target}%.</li>
                              `
                                  : band.label === "On Track"
                                    ? `
                                <li><strong>Standard Reinforcement</strong>: Encourage them to verbally present their mathematical logic on the classroom whiteboard.</li>
                                <li><strong>Unassisted Assessments</strong>: Assign standard curricular tasks without scaffolding to build durable testing resilience.</li>
                                <li><strong>Pacing Optimization</strong>: Guide them to improve problem-solving speed and double-check calculation details.</li>
                              `
                                    : `
                                <li><strong>Curriculum Compacting</strong>: Excuse ${activeStudent} from repetitive standard drills. Substitute accelerated peer challenge cards.</li>
                                <li><strong>Instructional Helper</strong>: Invite them to lead a mini-review or demonstrate advanced volume calculations to peers.</li>
                                <li><strong>Extension Challenges</strong>: Challenge them to design attendance-to-mastery projection spreadsheets using advanced regressions.</li>
                              `
                            }
                          </ul>
                        </div>
                      </div>
                    </div>
                  `;
          }

          if (actionScope === "class") {
            // ==========================================
            // CLASS PERIOD / SECTION ACTION PLAN
            // ==========================================
            let activeClass = className;
            if (activeClass === "All" && allClasses.length > 0) {
              activeClass = allClasses[0];
            }

            const sectionRecords = AppRepository.state.records.filter(
              (d) => d.className === activeClass,
            );
            const sectionSummaries =
              AnalyticsService.studentSummaries(sectionRecords);
            const sectionGroups = AnalyticsService.buildGroups(
              sectionSummaries,
              target,
            );
            const sectionStandards =
              AnalyticsService.standardSummaries(sectionRecords);
            const topSectionStd = sectionStandards[0]
              ? sectionStandards[0].standard
              : "Primary Focus Standard";
            const sectionAverage =
              AnalyticsService.mean(sectionRecords.map((d) => d.score)) || 0;

            return `
                    <div class="container">
                      ${this.renderFilters()}
                      ${segmentedSelectorHTML}

                      <div class="card" style="border-left: 6px solid var(--brand-secondary); background: linear-gradient(135deg, var(--brand-glow), transparent); margin-bottom: 24px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px;">
                          <div>
                            <span style="font-size:0.75rem; text-transform:uppercase; font-weight:800; color:var(--text-secondary);">Class Section-Specific Action Plan</span>
                            <h2 class="card-title" style="font-size:1.8rem; margin-top:4px;">Action Plan for Class Section ${activeClass}</h2>
                            <p class="card-subtitle">Classroom pacing adjustments and targeted subgroup coaching directives</p>
                          </div>
                          <div style="display:flex; align-items:center; gap:16px; flex-wrap:wrap;">
                            <div style="display:flex; flex-direction:column; gap:4px;">
                              <label style="font-size:0.72rem; font-weight:800; text-transform:uppercase; color:var(--text-secondary);">Active Class Section</label>
                              <select onchange="UIController.updateFilter('className', this.value)" style="padding:6px 12px; border:1px solid var(--border-primary); border-radius:6px; background:var(--bg-panel); color:var(--text-primary); font-size:0.88rem; font-weight:600;">
                                ${allClasses.map((c) => `<option value="${c}" ${activeClass === c ? "selected" : ""}>${c}</option>`).join("")}
                              </select>
                            </div>
                            <div style="background:var(--brand-soft); color:var(--brand-secondary); padding:10px 20px; border-radius:var(--radius-md); font-weight:800; font-size:1.15rem; border: 1px solid var(--border-primary); margin-top:14px;">
                              Section Mean: ${sectionAverage.toFixed(1)}%
                            </div>
                          </div>
                        </div>
                      </div>

                      <div class="grid grid-2" style="gap:24px;">
                        <div style="display:flex; flex-direction:column; gap:16px;">
                          <div style="background:var(--brand-soft); border-left:4px solid var(--brand-secondary); padding:16px; border-radius:var(--radius-sm);">
                            <h3 style="font-size:1rem; font-weight:800; color:var(--brand-primary); margin-bottom:4px;">🎯 Targeted Standard Focus</h3>
                            <p style="font-size:0.94rem; color:var(--text-secondary);">
                              Reteach <strong>${topSectionStd}</strong> as the primary whole-class action items. Focus specifically on scaffolding prerequisite skills.
                            </p>
                          </div>

                          <div style="background:var(--color-urgent-soft); border-left:4px solid var(--color-urgent); padding:16px; border-radius:var(--radius-sm);">
                            <h3 style="font-size:1rem; font-weight:800; color:var(--color-urgent); margin-bottom:4px;">⚠️ Section Intervention Required</h3>
                            <p style="font-size:0.94rem; color:var(--text-secondary);">
                              A cohort of <strong>${sectionGroups.urgent.length} students</strong> are currently categorized under Urgent Support status in this section, with mastery averages falling below 50%.
                            </p>
                          </div>
                        </div>

                        <div style="display:flex; flex-direction:column; gap:16px;">
                          <div style="background:var(--color-reteach-soft); border-left:4px solid var(--color-reteach); padding:16px; border-radius:var(--radius-sm);">
                            <h3 style="font-size:1rem; font-weight:800; color:var(--color-reteach); margin-bottom:4px;">👥 Flexible Small Group Structure</h3>
                            <p style="font-size:0.94rem; color:var(--text-secondary);">
                              Organize guided practice sessions with the <strong>${sectionGroups.strategic.length} students</strong> in the Reteach band to push them across the target threshold of ${target}%.
                            </p>
                          </div>

                          <div style="background:var(--color-extension-soft); border-left:4px solid var(--color-extension); padding:16px; border-radius:var(--radius-sm);">
                            <h3 style="font-size:1rem; font-weight:800; color:var(--color-extension); margin-bottom:4px;">🚀 Section Enrichment</h3>
                            <p style="font-size:0.94rem; color:var(--text-secondary);">
                              Provide enrichment/extension exercises to <strong>${sectionGroups.extension.length} advanced students</strong> to maintain engagement and scale complexity.
                            </p>
                          </div>
                        </div>
                      </div>
                    </div>
                  `;
          }

          if (actionScope === "custom") {
            // ==========================================
            // CUSTOM STUDENT GROUP BUILDER
            // ==========================================
            const activeGroupRecords = AppRepository.state.records.filter((d) =>
              customGroupStudents.includes(d.student),
            );
            const groupScores = activeGroupRecords
              .map((d) => d.score)
              .filter(Number.isFinite);
            const groupCount = customGroupStudents.length;
            const groupAverage = AnalyticsService.mean(groupScores) || 0;

            const summariesGroup =
              AnalyticsService.studentSummaries(activeGroupRecords);
            const groupBands = AnalyticsService.buildGroups(
              summariesGroup,
              target,
            );
            const groupStandards =
              AnalyticsService.standardSummaries(activeGroupRecords);
            const groupWeakestStd = groupStandards[0]
              ? groupStandards[0].standard
              : "Prerequisite Skills";

            // Determine Group Performance Profile & Dynamic Playbook
            let groupProfileTitle = "";
            let groupProfileDesc = "";
            let groupAccommodations = [];
            let profileColor = "var(--text-secondary)";

            const urgentCount = groupBands.urgent.length;
            const strategicCount = groupBands.strategic.length;
            const monitorCount = groupBands.monitor.length;
            const extensionCount = groupBands.extension.length;

            if (groupCount === 0) {
              groupProfileTitle = "No Group Assembled";
              groupProfileDesc =
                "Check student boxes in the roster panel to construct an active planning group. Mathematical benchmarks and lesson review strategies will compile instantly.";
              groupAccommodations = [
                "Select one or more students to generate targeted tactical accommodations.",
              ];
              profileColor = "var(--text-secondary)";
            } else if (
              urgentCount + strategicCount > 0 &&
              monitorCount + extensionCount === 0
            ) {
              groupProfileTitle = "Homogeneous Remediation Group";
              groupProfileDesc =
                "This cohort consists entirely of students working below proficiency targets (Urgent Support or Guided Reteach). Focused, high-scaffold remediation is highly recommended.";
              groupAccommodations = [
                `<strong>Tier-2 Intensive review</strong>: Isolate key vocabulary and prerequisite skills for standard <strong>${groupWeakestStd}</strong> before presenting the main curriculum exercises.`,
                "<strong>Tactile Scaffolds</strong>: Provide volume visualizers (prism structures) or coordinate plane trace sheets during guided practice.",
                "<strong>Guided Practice Slips</strong>: Use structured multi-step templates where the first few steps are partially completed to prevent overwhelm.",
              ];
              profileColor = "var(--color-urgent)";
            } else if (
              monitorCount + extensionCount > 0 &&
              urgentCount + strategicCount === 0
            ) {
              groupProfileTitle = "Homogeneous Enrichment Cluster";
              groupProfileDesc =
                "This cohort consists entirely of proficient or advanced learners (On Track or Extension). Pacing should be accelerated, compacting drills in favor of deeper challenges.";
              groupAccommodations = [
                "<strong>Curriculum Compacting</strong>: Bypass standard repetitive homework tasks. Transition immediately to self-directed mathematical research projects.",
                "<strong>Peer Leadership Warmups</strong>: Assign students to compose coordinate graphing 'whiteboard challenge' tasks for the rest of the class.",
                "<strong>Rigor extension</strong>: Substitute standard questions with multi-variable volume prisms requiring algebraic derivations.",
              ];
              profileColor = "var(--color-extension)";
            } else {
              groupProfileTitle =
                "Heterogeneous Flexible Assembly (Mixed Group)";
              groupProfileDesc =
                "This cohort is highly diverse, combining advanced enrichment learners with students requiring urgent remedial support. Co-operative peer coaching is the most effective approach.";
              groupAccommodations = [
                `<strong>Reciprocal Peer Tutoring</strong>: Pair advanced students (${groupBands.extension.map((s) => s.student).join(", ") || "Extension"}) directly with peer partners needing help (${groupBands.urgent.map((s) => s.student).join(", ") || "Urgent"}) to solve math problems.`,
                "<strong>Tiered Co-Operative Tasks</strong>: Implement structured worksheets with clear task splits (e.g. Equation Writer, Diagram Sketcher, Calculation Verifier) matching student mastery.",
                "<strong>Metacognitive Share-outs</strong>: Direct student pairs to present their coordinate equations to each other, justifying every calculation step verbally.",
              ];
              profileColor = "var(--brand-secondary)";
            }

            const groupBandInfo = AnalyticsService.scoreBand(
              groupAverage,
              target,
            );

            return `
                    <div class="container">
                      ${this.renderFilters()}
                      ${segmentedSelectorHTML}

                      <div class="grid grid-2" style="gap:24px;">
                        <!-- Step 1: Build the Group -->
                        <div class="card" style="display:flex; flex-direction:column; gap:16px;">
                          <div>
                            <h3 style="font-size:1.2rem; font-weight:800; color:var(--brand-primary); display:flex; align-items:center; gap:8px;">👥 Step 1: Roster Group Builder</h3>
                            <p class="hint" style="margin-top:2px;">Check student names to build your custom group and watch the action plan adapt:</p>
                          </div>

                          <div style="display:flex; gap:8px; align-items:center;">
                            <input type="text" id="rosterSearch" placeholder="Search student name..." onkeyup="filterRosterCheckboxes()" style="flex:1; padding:8px 12px; border:1px solid var(--border-primary); border-radius:6px; background:var(--bg-panel); color:var(--text-primary); font-size:0.88rem;">
                            <button class="btn btn-light" style="padding:6px 12px; font-size:0.8rem; border-radius:var(--radius-sm);" onclick="UIController.setCustomGroupStudents(${JSON.stringify(allStudents)})">Select All</button>
                            <button class="btn btn-light" style="padding:6px 12px; font-size:0.8rem; border-radius:var(--radius-sm);" onclick="UIController.setCustomGroupStudents([])">Clear All</button>
                          </div>

                          <div style="max-height: 280px; overflow-y: auto; border: 1px solid var(--border-light); border-radius: 6px; padding: 10px; display: flex; flex-direction: column; gap: 8px; background: var(--bg-body);">
                            ${allStudents
                              .map((s) => {
                                const isChecked =
                                  customGroupStudents.includes(s);
                                const stData =
                                  AppRepository.state.records.filter(
                                    (d) => d.student === s,
                                  );
                                const stAvg =
                                  AnalyticsService.mean(
                                    stData.map((d) => d.score),
                                  ) || 0;
                                const stBand = AnalyticsService.scoreBand(
                                  stAvg,
                                  target,
                                );
                                return `
                                <label class="roster-item" style="display:flex; align-items:center; justify-content:space-between; padding:6px 10px; background:var(--bg-panel); border-radius:6px; cursor:pointer; font-size:0.88rem; border:1px solid ${isChecked ? "var(--brand-primary)" : "transparent"}; transition: border 0.15s ease-in-out;">
                                  <span style="display:flex; align-items:center; gap:8px;">
                                    <input type="checkbox" value="${s}" ${isChecked ? "checked" : ""} onchange="UIController.toggleCustomGroupStudent('${s}')">
                                    <strong>${s}</strong>
                                  </span>
                                  <span style="font-size:0.8rem; font-weight:700; color:${stBand.color};">${stAvg.toFixed(0)}%</span>
                                </label>
                              `;
                              })
                              .join("")}
                          </div>
                        </div>

                        <!-- Step 2: Dynamic Aggregated Plan -->
                        <div style="display:flex; flex-direction:column; gap:24px;">
                          <!-- Group KPI Summary -->
                          <div class="card" style="border-left: 6px solid ${profileColor}; background: linear-gradient(135deg, ${profileColor}10, transparent);">
                            <span style="font-size:0.75rem; text-transform:uppercase; font-weight:800; color:var(--text-secondary); display:block;">Custom Group Performance Profile</span>
                            <h3 style="font-size:1.3rem; font-weight:800; color:var(--text-primary); margin-top:4px;">${groupProfileTitle}</h3>
                            <p style="font-size:0.84rem; color:var(--text-secondary); margin-top:6px; line-height:1.45;">${groupProfileDesc}</p>

                            ${
                              groupCount > 0
                                ? `
                              <div style="display:flex; gap:16px; margin-top:16px; flex-wrap:wrap;">
                                <div style="background:var(--bg-body); padding:8px 16px; border-radius:6px; border:1px solid var(--border-light);">
                                  <span style="font-size:0.72rem; color:var(--text-secondary); font-weight:700; text-transform:uppercase;">Group Size</span>
                                  <div style="font-size:1.2rem; font-weight:800; color:var(--text-primary);">${groupCount} Students</div>
                                </div>
                                <div style="background:var(--bg-body); padding:8px 16px; border-radius:6px; border:1px solid var(--border-light);">
                                  <span style="font-size:0.72rem; color:var(--text-secondary); font-weight:700; text-transform:uppercase;">Group Average</span>
                                  <div style="font-size:1.2rem; font-weight:800; color:${groupBandInfo.color};">${groupAverage.toFixed(1)}%</div>
                                </div>
                                <div style="background:var(--bg-body); padding:8px 16px; border-radius:6px; border:1px solid var(--border-light);">
                                  <span style="font-size:0.72rem; color:var(--text-secondary); font-weight:700; text-transform:uppercase;">Focus Standard</span>
                                  <div style="font-size:0.84rem; font-weight:800; color:var(--brand-primary); margin-top:4px; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${groupWeakestStd}">${groupWeakestStd}</div>
                                </div>
                              </div>
                            `
                                : ""
                            }

        renderTrendsTab(data) {
          const summaries = AnalyticsService.studentSummaries(data);

            .sort((a, b) => b.growth - a.growth)

          const assessments = AnalyticsService.sortAssessments(

          );

          // Multi-test comparison state
          if (!AppRepository.state.filters.trendCompareTests) {
            AppRepository.state.filters.trendCompareTests = [];

          const trendCompareTests =
            AppRepository.state.filters.trendCompareTests;
          const allAssessments = AnalyticsService.sortAssessments(
            AnalyticsService.unique(
              AppRepository.state.records.map((d) => d.assessment),
            ),

          const buildComparisonChart = (selectedTests) => {
            if (!selectedTests || selectedTests.length < 2) return "";
            const W = 620,
              H = 280,
              PL = 56,
              PB = 42,
              PT = 28,
              PR = 22;
            const cW = W - PL - PR,
              cH = H - PT - PB;
            const allClasses = AnalyticsService.unique(
              data.map(function (d) {
                return d.className;
              }),
            );
            const COLORS = [
              "#0ea5e9",
              "#14b8a6",
              "#f59e0b",
              "#8b5cf6",
              "#ef4444",
              "#10b981",
              "#f97316",
            ];
            const series = allClasses.map(function (cls, ci) {
              const pts = selectedTests.map(function (test) {
                const subset = data.filter(function (d) {
                  return d.className === cls && d.assessment === test;
                });
                const scores = subset
                  .map(function (d) {
                    return d.score;
                  })
                  .filter(Number.isFinite);
                return scores.length ? AnalyticsService.mean(scores) : null;
              });
              return { cls: cls, pts: pts, color: COLORS[ci % COLORS.length] };
            });
            const allVals = [];
            series.forEach(function (s) {
              s.pts.forEach(function (v) {
                if (v !== null) allVals.push(v);
              });
            });
            const rawMin = allVals.length ? Math.min.apply(null, allVals) : 0;
            const rawMax = allVals.length ? Math.max.apply(null, allVals) : 100;
            const minV = Math.max(0, rawMin - 8);
            const maxV = Math.min(100, rawMax + 8);
            const nTests = selectedTests.length;
            const xS = function (i) {
              return PL + (nTests > 1 ? i * (cW / (nTests - 1)) : cW / 2);
            };
            const yS = function (v) {
              return PT + cH - ((v - minV) / (maxV - minV || 1)) * cH;
            };
            let svg =
              '<svg viewBox="0 0 ' +
              W +
              " " +
              H +
              '" style="width:100%;max-height:280px;display:block">';
            // grid lines
            [0, 20, 40, 60, 80, 100].forEach(function (pct) {
              if (pct < minV - 1 || pct > maxV + 1) return;
              const y = yS(pct);
              svg +=
                '<line x1="' +
                PL +
                '" y1="' +
                y +
                '" x2="' +
                (W - PR) +
                '" y2="' +
                y +
                '" stroke="#e2e8f0" stroke-width="1"/>';
              svg +=
                '<text x="' +
                (PL - 5) +
                '" y="' +
                (y + 4) +
                '" text-anchor="end" font-size="9" fill="#94a3b8" font-weight="700">' +
                pct +
                "%</text>";
            });
            // x labels + verticals
            selectedTests.forEach(function (t, i) {
              const lbl = t.length > 12 ? t.slice(0, 11) + "\u2026" : t;
              svg +=
                '<line x1="' +
                xS(i) +
                '" y1="' +
                PT +
                '" x2="' +
                xS(i) +
                '" y2="' +
                (PT + cH) +
                '" stroke="#f1f5f9" stroke-width="1"/>';
              svg +=
                '<text x="' +
                xS(i) +
                '" y="' +
                (H - 6) +
                '" text-anchor="middle" font-size="9" fill="#64748b" font-weight="700">' +
                lbl +
                "</text>";
            });
            // series
            series.forEach(function (s) {
              const vi = [];
              s.pts.forEach(function (v, i) {
                if (v !== null) vi.push(i);
              });
              if (!vi.length) return;
              if (vi.length >= 2) {
                let d = "M " + xS(vi[0]) + " " + yS(s.pts[vi[0]]);
                for (let k = 1; k < vi.length; k++)
                  d += " L " + xS(vi[k]) + " " + yS(s.pts[vi[k]]);
                svg +=
                  '<path d="' +
                  d +
                  '" fill="none" stroke="' +
                  s.color +
                  '" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
                // area fill
                let area = "M " + xS(vi[0]) + " " + (PT + cH);
                vi.forEach(function (i) {
                  area += " L " + xS(i) + " " + yS(s.pts[i]);
                });
                area += " L " + xS(vi[vi.length - 1]) + " " + (PT + cH) + " Z";
                svg +=
                  '<path d="' +
                  area +
                  '" fill="' +
                  s.color +
                  '" fill-opacity="0.07"/>';
              }
              vi.forEach(function (i) {
                const cx = xS(i),
                  cy = yS(s.pts[i]);
                svg +=
                  '<circle cx="' +
                  cx +
                  '" cy="' +
                  cy +
                  '" r="5" fill="' +
                  s.color +
                  '" stroke="white" stroke-width="2"/>';
                svg +=
                  '<text x="' +
                  cx +
                  '" y="' +
                  (cy - 9) +
                  '" text-anchor="middle" font-size="9" fill="' +
                  s.color +
                  '" font-weight="800">' +
                  s.pts[i].toFixed(0) +
                  "%</text>";
              });
            });
            // legend
            let lx = PL;
            series.forEach(function (s) {
              svg +=
                '<rect x="' +
                lx +
                '" y="4" width="10" height="10" rx="3" fill="' +
                s.color +
                '"/>';
              svg +=
                '<text x="' +
                (lx + 13) +
                '" y="13" font-size="9" fill="#64748b" font-weight="700">' +
                s.cls +
                "</text>";
              lx += Math.max(s.cls.length * 6.5 + 22, 50);
            });
            svg += "</svg>";
            return (
              '<div class="card" style="margin-bottom:24px;">' +
              '<div class="card-header" style="margin-bottom:12px;"><div>' +
              '<h3 class="card-title" style="font-size:1.1rem;">&#128202; Multi-Test Comparison Chart</h3>' +

              '<p style="font-size:0.82rem;color:var(--text-secondary);line-height:1.5;"><strong>How to read:</strong> Each line is a class section. Rising = growth. ' +
              "Crossing lines = classes changing in relative performance. Use to identify which periods are accelerating vs. needing support.</p>" +
              "</div></div>"
            );
          };

          return `
                  <div class="container">

                          .map((a, i) => {

                            const safeA = a
                              .replace(/\\/g, "\\\\")
                              .replace(/"/g, "&quot;");
                            return `<label style="display:inline-flex; align-items:center; gap:7px; cursor:pointer; background:${checked ? "var(--brand-soft)" : "var(--bg-card)"}; border:1.5px solid ${checked ? "var(--brand-secondary)" : "var(--border-primary)"}; padding:6px 12px; border-radius:999px; font-size:0.82rem; font-weight:700; color:${checked ? "var(--brand-secondary)" : "var(--text-secondary)"}; transition:all 0.18s; user-select:none;">
                            <input type="checkbox" ${checked ? "checked" : ""} data-aval="${safeA}" onchange="(function(el){const arr=AppRepository.state.filters.trendCompareTests||[];const v=el.getAttribute('data-aval');if(el.checked){if(!arr.includes(v))arr.push(v);}else{const ix=arr.indexOf(v);if(ix>-1)arr.splice(ix,1);}AppRepository.state.filters.trendCompareTests=arr;UIController.render();})(this)" style="accent-color:var(--brand-secondary);width:14px;height:14px;">
                            ${i + 1}. ${a}

                      ${trendCompareTests.length === 1 ? '<p style="margin-top:10px;font-size:0.8rem;color:var(--text-muted);font-style:italic;">Select at least one more window to render the comparison chart.</p>' : ""}

                          <p class="card-subtitle">Tracking longitudinal performance shift from first registered window to most recent</p>

                      <div class="table-wrap">

                              <th class="sortable">Latest Assessment</th>
                              <th class="sortable">Absolute Shift</th>
                              <th>Trend</th>
                              <th>Direction</th>
                            </tr>
                          </thead>
                          <tbody>
                            ${growthList
                              .map((s) => {
                                const isPos = s.growth > 0;
                                const sparkVals = assessments.map((a) =>
                                  AnalyticsService.mean(
                                    s.rows
                                      .filter((r) => r.assessment === a)
                                      .map((r) => r.score),

                                const sparkSvg =
                                  typeof DSM_PLATINUM !== "undefined"

                                const safeName = String(s.student)

                                return `

                                  <td style="font-weight:700;cursor:pointer;color:var(--brand-primary);" onclick="showStudentProfile('${safeName}')" title="Click for student profile">${s.student}</td>

        renderLiveCorrelation() {
          const field = AppRepository.state.advanced.corrField;
          if (!field) return "";

          const targetData = AppRepository.state.extraRows;
          const scores = AppRepository.getFilteredRecords();

          const studentScoreMap = {};
          scores.forEach((s) => {
            if (!studentScoreMap[s.student]) studentScoreMap[s.student] = [];
            studentScoreMap[s.student].push(s.score);
          });

          const pairedX = [];
          const pairedY = [];

          targetData.forEach((r) => {
            const name = r["Student Name"];
            if (studentScoreMap[name]) {
              const avgScore = AnalyticsService.mean(studentScoreMap[name]);
              const suppValue = AnalyticsService.toNumber(r[field]);
              if (Number.isFinite(avgScore) && Number.isFinite(suppValue)) {
                pairedX.push(suppValue);
                pairedY.push(avgScore);
              }
            }
          });

          if (pairedX.length < 3) {
            return `<p class="hint" style="margin-top:10px;">Insufficient matching records to correlate. Double check student name columns map correctly.</p>`;
          }

          const res = AnalyticsService.pearson(pairedX, pairedY);
          const strength =
            Math.abs(res.r) >= 0.6
              ? "Strong"
              : Math.abs(res.r) >= 0.3
                ? "Moderate"
                : "Weak";
          const direction = res.r > 0 ? "positive" : "negative";

          return `
                  <div style="margin-top:12px; background:var(--bg-panel); padding:16px; border-radius:8px; border:1px solid var(--border-light);">
                    <span style="font-size:1.5rem; font-weight:800; color:var(--brand-primary);">${res.r.toFixed(3)}</span>
                    <span class="badge ${Math.abs(res.r) >= 0.5 ? "badge-extension" : "badge-reteach"}" style="margin-left:8px;">${strength} Alignment</span>
                    <p style="font-size:0.88rem; color:var(--text-secondary); margin-top:8px;">
                      A pearson value of ${res.r.toFixed(3)} signals a <strong>${strength.toLowerCase()} ${direction} correlation</strong> between student average scores and their recorded "${field}".
                    </p>
                  </div>
                `;
        },
