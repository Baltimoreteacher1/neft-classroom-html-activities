name: Validate
# Lightweight quality gate: runs the repo's static + Reveal Math validation on
# every pull request and on pushes to main. This does NOT deploy — deploys stay
# manual via `wrangler pages deploy dist`.
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run validate
