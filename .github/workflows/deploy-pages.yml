name: Deploy to Cloudflare Pages
# Manual/CI deploy: builds dist and deploys to Cloudflare Pages via wrangler.
# Run on demand from the Actions tab ("Run workflow") or: gh workflow run deploy-pages.yml
# Needs two repo secrets: CLOUDFLARE_API_TOKEN (Pages:Edit) and CLOUDFLARE_ACCOUNT_ID.
# (Day to day, deploys are done locally with `wrangler pages deploy dist` using the
#  maintainer's wrangler login, so this stays manual to avoid failing on every push.)
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=neft-classroom-html-activities --branch=main
