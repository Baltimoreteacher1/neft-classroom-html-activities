# Neft results backend — Worker config.
# The D1 below is the PRODUCTION database (neft-results), already created,
# migrated, and seeded with the 'neft' teacher + 'P3-MATH' class. The only
# remaining deploy step is uploading this Worker:  npx wrangler deploy
# (requires an authenticated wrangler — could not run headless in-session).
name = "neft-results"
main = "src/worker.js"
compatibility_date = "2026-05-25"

[[d1_databases]]
binding = "DB"
database_name = "neft-results"
database_id = "a78b09a5-900f-482f-906b-65b69417a63f"
migrations_dir = "migrations"
