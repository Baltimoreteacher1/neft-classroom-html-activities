<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neft Teacher — Activity Kit Demo</title>
    <!-- 1) include the kit -->
    <link rel="stylesheet" href="nt-activity-kit.css" />
    <style>
      body {
        font-family: system-ui, Arial, sans-serif;
        max-width: 760px;
        margin: 24px auto;
        padding: 0 16px;
        color: #16243a;
      }
      h1 {
        font-size: 22px;
      }
      .q {
        margin: 14px 0;
      }
      .q label {
        font-weight: 600;
        display: block;
        margin-bottom: 4px;
      }
      .q input {
        font: inherit;
        padding: 7px 9px;
        border: 1px solid #d8e0ec;
        border-radius: 7px;
        width: 220px;
      }
      #check {
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        margin-top: 8px;
        padding: 9px 16px;
        border: 0;
        border-radius: 8px;
        background: #1f9d55;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <h1>Unit 8 · Statistics — Quick Check (3 questions)</h1>
    <p>Enter your name above, answer the questions, then grade and export.</p>

    <!-- 2) NTKit mounts its identity bar + Save buttons + results panel here -->
    <div id="ntkit"></div>

    <!-- Premium design-system components (rendered by NTKit.ui below) -->
    <div class="ntkit-root" id="ds-demo"></div>

    <form id="activity">
      <div class="q">
        <label for="a1">1. What is the mean of 4, 8, 6?</label>
        <input type="text" id="a1" autocomplete="off" />
      </div>
      <div class="q">
        <label for="a2">2. What is the median of 3, 9, 5, 1, 7?</label>
        <input type="text" id="a2" autocomplete="off" />
      </div>
      <div class="q">
        <label for="a3">3. What is the range of 2, 10, 5?</label>
        <input type="text" id="a3" autocomplete="off" />
      </div>
      <button type="button" id="check">Grade my answers</button>
    </form>

    <!-- 3) include the kit script -->
    <script src="nt-activity-kit.js"></script>
    <script>
      // 4) mount + grade
      NTKit.mount("#ntkit");

      // Premium design-system component showcase (Section 7)
      var ui = NTKit.ui;
      document.getElementById("ds-demo").innerHTML =
        ui.vocab({
          word: "mean",
          def: "the average — add the numbers, then divide by how many there are",
        }) +
        ui.steps([
          "Add all the numbers: 4 + 8 + 6 = 18",
          "Count how many numbers there are: 3",
          "Divide: 18 ÷ 3 = 6",
        ]) +
        ui.callout(
          "mistake",
          "Common Mistake",
          "Forgetting to divide by how many numbers — that gives the sum, not the mean.",
        ) +
        ui.frames({
          l0: "The mean is the ______. I add ___ + ___ + ___ = ___, then divide by ___.",
          l1: "To find the mean, I add the numbers and divide by ___.",
          l2: "Explain why the mean can be a number that is not in the data set.",
        }) +
        ui.hints(
          ["Add the three numbers first.", "Then divide your total by 3."],
          "6",
        ) +
        ui.callout(
          "teacher",
          "Teacher Note",
          "Pause after the worked example; ask a student to restate step 3 in their own words.",
        );

      document.getElementById("check").addEventListener("click", function () {
        NTKit.grade({
          activityId: "unit-8-stats",
          activityTitle: "Unit 8 · Statistics — Quick Check",
          standard: "6.SP.B.5",
          items: [
            {
              prompt: "Mean of 4, 8, 6",
              studentAnswer: document.getElementById("a1").value,
              correctAnswer: "6",
              points: 1,
              skill: "Mean",
            },
            {
              prompt: "Median of 3, 9, 5, 1, 7",
              studentAnswer: document.getElementById("a2").value,
              correctAnswer: "5",
              points: 1,
              skill: "Median",
            },
            {
              prompt: "Range of 2, 10, 5",
              studentAnswer: document.getElementById("a3").value,
              correctAnswer: "8",
              points: 1,
              skill: "Range",
            },
          ],
        });
      });
    </script>
  </body>
</html>
