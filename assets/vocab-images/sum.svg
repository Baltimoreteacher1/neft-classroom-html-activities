<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Sum: the result of adding numbers</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<text x="36" y="60" font-family="Outfit, system-ui, sans-serif" font-size="22" font-weight="800" fill="#12355b" text-anchor="middle">5</text>
<text x="56" y="60" font-family="Outfit, system-ui, sans-serif" font-size="20" font-weight="800" fill="#1fa6a2" text-anchor="middle">+</text>
<text x="76" y="60" font-family="Outfit, system-ui, sans-serif" font-size="22" font-weight="800" fill="#12355b" text-anchor="middle">3</text>
<text x="96" y="60" font-family="Outfit, system-ui, sans-serif" font-size="20" font-weight="800" fill="#12355b" text-anchor="middle">=</text>
<text x="120" y="60" font-family="Outfit, system-ui, sans-serif" font-size="24" font-weight="800" fill="#d9795d" text-anchor="middle">8</text>
<text x="80" y="92" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#d9795d" text-anchor="middle">sum = answer to addition</text>
