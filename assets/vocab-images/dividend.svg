<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Dividend: the whole amount being divided</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<rect x="30" y="30" width="100" height="34" rx="8" fill="#f2c15b" stroke="#12355b" stroke-width="2"/>
<text x="80" y="53" font-family="Outfit, system-ui, sans-serif" font-size="16" font-weight="800" fill="#12355b" text-anchor="middle">12 dots</text>
<text x="80" y="92" font-family="Outfit, system-ui, sans-serif" font-size="13" font-weight="800" fill="#d9795d" text-anchor="middle">12</text>
<text x="80" y="108" font-family="Outfit, system-ui, sans-serif" font-size="11" font-weight="700" fill="#12355b" text-anchor="middle">÷ 3 = 4</text>
</svg>
