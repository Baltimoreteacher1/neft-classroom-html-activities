<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Least common multiple: smallest multiple shared by two numbers</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<text x="20" y="34" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#1fa6a2" text-anchor="start">4: 4 8 12</text>
<text x="20" y="52" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#d9795d" text-anchor="start">6: 6 12 18</text>
<circle cx="80" cy="76" r="20" fill="#f2c15b"/>
<text x="80" y="81" font-family="Outfit, system-ui, sans-serif" font-size="16" font-weight="800" fill="#21313f" text-anchor="middle">12</text>
<text x="80" y="110" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#12355b" text-anchor="middle">LCM = smallest shared multiple</text>
</svg>
