<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Interquartile range: the spread of the middle half of the data</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<line x1="16" y1="58" x2="144" y2="58" stroke="#12355b" stroke-width="2"/>
<rect x="48" y="44" width="56" height="28" fill="#d9795d" opacity="0.35" stroke="#d9795d" stroke-width="2"/>
<line x1="48" y1="40" x2="48" y2="76" stroke="#12355b" stroke-width="3"/>
<line x1="104" y1="40" x2="104" y2="76" stroke="#12355b" stroke-width="3"/>
<text x="48" y="90" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#12355b" text-anchor="middle">Q1</text>
<text x="104" y="90" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#12355b" text-anchor="middle">Q3</text>
<text x="76" y="108" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#d9795d" text-anchor="middle">IQR = Q3 − Q1</text>
</svg>
