<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Factor: numbers multiplied together</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<text x="40" y="58" font-family="Outfit, system-ui, sans-serif" font-size="22" font-weight="800" fill="#1fa6a2" text-anchor="middle">3</text><text x="60" y="58" font-family="Outfit, system-ui, sans-serif" font-size="18" font-weight="800" fill="#12355b" text-anchor="middle">×</text><text x="80" y="58" font-family="Outfit, system-ui, sans-serif" font-size="22" font-weight="800" fill="#1fa6a2" text-anchor="middle">4</text><text x="100" y="58" font-family="Outfit, system-ui, sans-serif" font-size="18" font-weight="800" fill="#12355b" text-anchor="middle">=</text><text x="122" y="58" font-family="Outfit, system-ui, sans-serif" font-size="22" font-weight="800" fill="#d9795d" text-anchor="middle">12</text>
<text x="80" y="92" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#12355b" text-anchor="middle">3 and 4 are factors</text>
</svg>
