<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Improper fraction: numerator larger than the denominator</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<text x="80" y="50" font-family="Outfit, system-ui, sans-serif" font-size="30" font-weight="800" fill="#d9795d" text-anchor="middle">11</text>
<line x1="58" y1="58" x2="102" y2="58" stroke="#12355b" stroke-width="3"/>
<text x="80" y="82" font-family="Outfit, system-ui, sans-serif" font-size="22" font-weight="800" fill="#12355b" text-anchor="middle">4</text>
<text x="124" y="56" font-family="Outfit, system-ui, sans-serif" font-size="16" font-weight="800" fill="#1fa6a2" text-anchor="middle">top bigger</text>
<text x="80" y="106" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#d9795d" text-anchor="middle">improper fraction</text>
</svg>
