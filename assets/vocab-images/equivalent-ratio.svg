<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Equivalent ratios: different ratios that show the same comparison</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<text x="44" y="60" font-family="Outfit, system-ui, sans-serif" font-size="20" font-weight="800" fill="#1fa6a2" text-anchor="middle">2 : 3</text>
<text x="80" y="60" font-family="Outfit, system-ui, sans-serif" font-size="20" font-weight="800" fill="#12355b" text-anchor="middle">=</text>
<text x="118" y="60" font-family="Outfit, system-ui, sans-serif" font-size="20" font-weight="800" fill="#d9795d" text-anchor="middle">4 : 6</text>
<path d="M40 70 q40 16 78 0" stroke="#12355b" stroke-width="2" fill="none"/>
<text x="80" y="100" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#12355b" text-anchor="middle">×2 → same comparison</text>
</svg>
