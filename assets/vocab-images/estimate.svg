<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Estimate: a close, rounded approximation of an answer</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<text x="80" y="48" font-family="Outfit, system-ui, sans-serif" font-size="13" font-weight="800" fill="#9aa6b2" text-anchor="middle">38 × 21</text>
<text x="80" y="66" font-family="Outfit, system-ui, sans-serif" font-size="18" font-weight="800" fill="#12355b" text-anchor="middle">≈</text>
<text x="80" y="86" font-family="Outfit, system-ui, sans-serif" font-size="20" font-weight="800" fill="#d9795d" text-anchor="middle">40 × 20 = 800</text>
<text x="80" y="108" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#12355b" text-anchor="middle">about (rounded)</text>
</svg>
