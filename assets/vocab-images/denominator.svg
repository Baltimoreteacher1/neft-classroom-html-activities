<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Denominator: bottom number of a fraction</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<rect x="40" y="28" width="80" height="58" rx="8" fill="#ffffff" stroke="#d7e2ed" stroke-width="2"/>
<text x="80" y="52" font-family="Outfit, system-ui, sans-serif" font-size="22" font-weight="800" fill="#12355b" text-anchor="middle">3</text>
<line x1="54" y1="58" x2="106" y2="58" stroke="#12355b" stroke-width="3"/>
<text x="80" y="80" font-family="Outfit, system-ui, sans-serif" font-size="26" font-weight="800" fill="#d9795d" text-anchor="middle">4</text>
<text x="80" y="104" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#d9795d" text-anchor="middle">bottom = denominator</text>
</svg>
