<circle cx="34" cy="52" r="6" fill="#1fa6a2"/><circle cx="50" cy="52" r="6" fill="#1fa6a2"/><circle cx="66" cy="52" r="6" fill="#1fa6a2"/>
<circle cx="82" cy="52" r="6" fill="none" stroke="#d9795d" stroke-width="2" stroke-dasharray="3 2"/>
<circle cx="98" cy="52" r="6" fill="none" stroke="#d9795d" stroke-width="2" stroke-dasharray="3 2"/>
<line x1="74" y1="36" x2="106" y2="68" stroke="#d9795d" stroke-width="2"/>
<text x="80" y="96" font-family="Outfit, system-ui, sans-serif" font-size="13" font-weight="800" fill="#12355b" text-anchor="middle">5 − 2 = 3</text>
