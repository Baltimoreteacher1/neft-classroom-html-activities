<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Mean absolute deviation: average distance of values from the mean</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<line x1="80" y1="20" x2="80" y2="92" stroke="#12355b" stroke-width="2" stroke-dasharray="4 3"/>
<text x="80" y="14" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#12355b" text-anchor="middle">mean</text>
<circle cx="40" cy="50" r="6" fill="#1fa6a2"/>
<line x1="46" y1="50" x2="80" y2="50" stroke="#d9795d" stroke-width="2"/>
<circle cx="118" cy="64" r="6" fill="#1fa6a2"/>
<line x1="80" y1="64" x2="112" y2="64" stroke="#d9795d" stroke-width="2"/>
<circle cx="58" cy="78" r="6" fill="#1fa6a2"/>
<line x1="64" y1="78" x2="80" y2="78" stroke="#d9795d" stroke-width="2"/>
<text x="80" y="110" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#d9795d" text-anchor="middle">MAD = average distance</text>
</svg>
