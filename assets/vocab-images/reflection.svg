<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Reflection: a mirror image across an axis</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<line x1="80" y1="16" x2="80" y2="104" stroke="#12355b" stroke-width="2" stroke-dasharray="5 3"/>
<polygon points="34,40 64,56 34,80" fill="#1fa6a2"/>
<polygon points="126,40 96,56 126,80" fill="#d9795d"/>
<text x="48" y="100" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#1fa6a2" text-anchor="middle">(−3, 2)</text>
<text x="112" y="100" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#d9795d" text-anchor="middle">(3, 2)</text>
<text x="80" y="114" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#12355b" text-anchor="middle">mirror image</text>
</svg>
