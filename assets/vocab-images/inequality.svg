<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Inequality: values compared with < or ></title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<line x1="20" y1="64" x2="140" y2="64" stroke="#12355b" stroke-width="2"/>
<line x1="40" y1="58" x2="40" y2="70" stroke="#12355b" stroke-width="1.5"/><line x1="70" y1="58" x2="70" y2="70" stroke="#12355b" stroke-width="1.5"/><line x1="100" y1="58" x2="100" y2="70" stroke="#12355b" stroke-width="1.5"/>
<circle cx="70" cy="64" r="6" fill="#ffffff" stroke="#d9795d" stroke-width="3"/>
<line x1="70" y1="64" x2="140" y2="64" stroke="#d9795d" stroke-width="4"/>
<text x="80" y="96" font-family="Outfit, system-ui, sans-serif" font-size="12" font-weight="800" fill="#12355b" text-anchor="middle">x > 2</text>
