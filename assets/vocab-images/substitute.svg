<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Substitute: replace a variable with a number</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<text x="50" y="56" font-family="Outfit, system-ui, sans-serif" font-size="26" font-weight="800" fill="#12355b" text-anchor="middle">x</text>
<circle cx="50" cy="48" r="16" fill="none" stroke="#d9795d" stroke-width="2"/>
<text x="80" y="54" font-family="Outfit, system-ui, sans-serif" font-size="18" font-weight="800" fill="#12355b" text-anchor="middle">→</text>
<text x="110" y="56" font-family="Outfit, system-ui, sans-serif" font-size="26" font-weight="800" fill="#d9795d" text-anchor="middle">5</text>
<text x="80" y="92" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#12355b" text-anchor="middle">put a number in for x</text>
</svg>
