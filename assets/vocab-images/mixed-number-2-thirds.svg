<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Mixed number: two and one third (2 1/3), a whole number combined with a fraction</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<text x="54" y="72" font-family="Outfit, system-ui, sans-serif" font-size="44" font-weight="800" fill="#1fa6a2" text-anchor="middle">2</text>
<text x="92" y="50" font-family="Outfit, system-ui, sans-serif" font-size="20" font-weight="800" fill="#d9795d" text-anchor="middle">1</text>
<line x1="80" y1="56" x2="104" y2="56" stroke="#12355b" stroke-width="3"/>
<text x="92" y="78" font-family="Outfit, system-ui, sans-serif" font-size="20" font-weight="800" fill="#d9795d" text-anchor="middle">3</text>
<text x="80" y="106" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#12355b" text-anchor="middle">whole + fraction</text>
</svg>
