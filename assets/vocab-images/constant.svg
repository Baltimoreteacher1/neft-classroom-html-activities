<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Constant: a fixed number that does not change</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<text x="44" y="58" font-family="Outfit, system-ui, sans-serif" font-size="28" font-weight="800" fill="#9aa6b2" text-anchor="middle">2x</text>
<text x="72" y="58" font-family="Outfit, system-ui, sans-serif" font-size="28" font-weight="800" fill="#12355b" text-anchor="middle">+</text>
<text x="98" y="58" font-family="Outfit, system-ui, sans-serif" font-size="30" font-weight="800" fill="#d9795d" text-anchor="middle">5</text>
<circle cx="98" cy="52" r="20" fill="none" stroke="#d9795d" stroke-width="2.5"/>
<text x="80" y="100" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#d9795d" text-anchor="middle">constant = 5 (fixed)</text>
</svg>
