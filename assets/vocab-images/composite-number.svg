<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Composite number: a number with more than two factors</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<rect x="36" y="38" width="16" height="16" rx="2" fill="#1fa6a2"/><rect x="54" y="38" width="16" height="16" rx="2" fill="#1fa6a2"/><rect x="72" y="38" width="16" height="16" rx="2" fill="#1fa6a2"/>
<rect x="36" y="56" width="16" height="16" rx="2" fill="#1fa6a2"/><rect x="54" y="56" width="16" height="16" rx="2" fill="#1fa6a2"/><rect x="72" y="56" width="16" height="16" rx="2" fill="#1fa6a2"/>
<text x="108" y="60" font-family="Outfit, system-ui, sans-serif" font-size="22" font-weight="800" fill="#d9795d" text-anchor="middle">6</text>
<text x="80" y="92" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#12355b" text-anchor="middle">6 = 1, 2, 3, 6</text>
<text x="80" y="106" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#d9795d" text-anchor="middle">many factors → composite</text>
</svg>
