<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Absolute value: distance from zero</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<line x1="14" y1="64" x2="146" y2="64" stroke="#12355b" stroke-width="2.5"/>
<line x1="20" y1="58" x2="20" y2="70" stroke="#12355b" stroke-width="1.5"/><text x="20" y="86" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#21313f" text-anchor="middle">-3</text><line x1="80" y1="58" x2="80" y2="70" stroke="#12355b" stroke-width="1.5"/><text x="80" y="86" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#21313f" text-anchor="middle">0</text><line x1="140" y1="58" x2="140" y2="70" stroke="#12355b" stroke-width="1.5"/><text x="140" y="86" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#21313f" text-anchor="middle">3</text>
<circle cx="20" cy="64" r="6" fill="#d9795d"/>
<path d="M20 44 H80" stroke="#d9795d" stroke-width="2" fill="none" stroke-dasharray="3 3"/>
<text x="50" y="38" font-family="Outfit, system-ui, sans-serif" font-size="11" font-weight="800" fill="#d9795d" text-anchor="middle">3 units</text>
<text x="80" y="110" font-family="Outfit, system-ui, sans-serif" font-size="12" font-weight="800" fill="#12355b" text-anchor="middle">|-3| = 3</text>
</svg>
