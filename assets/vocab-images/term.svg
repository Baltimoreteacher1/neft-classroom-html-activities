<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Term: a single part of an expression separated by plus or minus</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<rect x="18" y="40" width="34" height="30" rx="6" fill="#1fa6a2"/>
<text x="35" y="61" font-family="Outfit, system-ui, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">3x</text>
<text x="62" y="62" font-family="Outfit, system-ui, sans-serif" font-size="20" font-weight="800" fill="#12355b" text-anchor="middle">+</text>
<rect x="76" y="40" width="30" height="30" rx="6" fill="#f2c15b"/>
<text x="91" y="61" font-family="Outfit, system-ui, sans-serif" font-size="18" font-weight="800" fill="#21313f" text-anchor="middle">7</text>
<text x="116" y="62" font-family="Outfit, system-ui, sans-serif" font-size="20" font-weight="800" fill="#12355b" text-anchor="middle">+</text>
<rect x="128" y="40" width="26" height="30" rx="6" fill="#d9795d"/>
<text x="141" y="61" font-family="Outfit, system-ui, sans-serif" font-size="18" font-weight="800" fill="#ffffff" text-anchor="middle">y</text>
<text x="80" y="98" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#12355b" text-anchor="middle">3 separate terms</text>
</svg>
