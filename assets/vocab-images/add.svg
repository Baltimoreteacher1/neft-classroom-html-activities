<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Add: combining groups to make a larger total</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<circle cx="34" cy="52" r="6" fill="#1fa6a2"/><circle cx="50" cy="52" r="6" fill="#1fa6a2"/>
<text x="68" y="58" font-family="Outfit, system-ui, sans-serif" font-size="22" font-weight="800" fill="#12355b" text-anchor="middle">+</text>
<circle cx="86" cy="52" r="6" fill="#f2c15b"/><circle cx="102" cy="52" r="6" fill="#f2c15b"/><circle cx="118" cy="52" r="6" fill="#f2c15b"/>
<text x="80" y="96" font-family="Outfit, system-ui, sans-serif" font-size="13" font-weight="800" fill="#12355b" text-anchor="middle">2 + 3 = 5</text>
