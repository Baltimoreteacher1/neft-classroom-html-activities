<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Greatest common factor: largest factor shared by two numbers</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<circle cx="56" cy="56" r="36" fill="#1fa6a2" opacity="0.25"/>
<circle cx="104" cy="56" r="36" fill="#d9795d" opacity="0.25"/>
<text x="40" y="60" font-family="Outfit, system-ui, sans-serif" font-size="11" font-weight="800" fill="#12355b" text-anchor="middle">12</text>
<text x="120" y="60" font-family="Outfit, system-ui, sans-serif" font-size="11" font-weight="800" fill="#12355b" text-anchor="middle">18</text>
<text x="80" y="52" font-family="Outfit, system-ui, sans-serif" font-size="20" font-weight="800" fill="#12355b" text-anchor="middle">6</text>
<text x="80" y="66" font-family="Outfit, system-ui, sans-serif" font-size="8" font-weight="800" fill="#12355b" text-anchor="middle">shared</text>
<text x="80" y="106" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#d9795d" text-anchor="middle">GCF = biggest shared factor</text>
</svg>
