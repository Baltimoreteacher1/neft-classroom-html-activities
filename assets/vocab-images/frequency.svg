<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Frequency: how many times a value happens (tally count)</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<g stroke="#12355b" stroke-width="3">
<line x1="34" y1="40" x2="34" y2="64"/><line x1="44" y1="40" x2="44" y2="64"/><line x1="54" y1="40" x2="54" y2="64"/><line x1="64" y1="40" x2="64" y2="64"/>
<line x1="30" y1="62" x2="68" y2="42" stroke="#d9795d"/>
</g>
<text x="100" y="58" font-family="Outfit, system-ui, sans-serif" font-size="20" font-weight="800" fill="#1fa6a2" text-anchor="middle">= 5</text>
<text x="80" y="96" font-family="Outfit, system-ui, sans-serif" font-size="12" font-weight="700" fill="#12355b" text-anchor="middle">count of one value</text>
</svg>
