<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Distance: how far apart two points are</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<line x1="24" y1="60" x2="136" y2="60" stroke="#12355b" stroke-width="2"/>
<circle cx="40" cy="60" r="7" fill="#1fa6a2"/>
<circle cx="120" cy="60" r="7" fill="#d9795d"/>
<path d="M48 78 h64" stroke="#d9795d" stroke-width="2"/>
<path d="M48 74 l-6 4 l6 4" fill="none" stroke="#d9795d" stroke-width="2"/>
