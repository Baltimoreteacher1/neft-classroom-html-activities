<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Divisor: the number of equal groups you split into</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<rect x="22" y="38" width="34" height="38" rx="6" fill="none" stroke="#1fa6a2" stroke-width="3"/>
<rect x="63" y="38" width="34" height="38" rx="6" fill="none" stroke="#1fa6a2" stroke-width="3"/>
<rect x="104" y="38" width="34" height="38" rx="6" fill="none" stroke="#1fa6a2" stroke-width="3"/>
<text x="80" y="100" font-family="Outfit, system-ui, sans-serif" font-size="13" font-weight="800" fill="#12355b" text-anchor="middle">12 ÷ <tspan fill="#d9795d">3</tspan> = 4</text>
</svg>
