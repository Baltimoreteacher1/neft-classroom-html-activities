<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Quartile: value splitting data into four equal parts</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<line x1="16" y1="64" x2="144" y2="64" stroke="#12355b" stroke-width="2"/>
<rect x="48" y="50" width="48" height="28" fill="#1fa6a2" opacity="0.3" stroke="#1fa6a2" stroke-width="2"/>
<line x1="16" y1="58" x2="16" y2="70" stroke="#12355b" stroke-width="3"/>
<line x1="48" y1="46" x2="48" y2="82" stroke="#d9795d" stroke-width="3"/>
<line x1="72" y1="46" x2="72" y2="82" stroke="#12355b" stroke-width="3"/>
<line x1="96" y1="46" x2="96" y2="82" stroke="#d9795d" stroke-width="3"/>
<line x1="144" y1="58" x2="144" y2="70" stroke="#12355b" stroke-width="3"/>
<text x="48" y="96" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#d9795d" text-anchor="middle">Q1</text>
<text x="72" y="96" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#12355b" text-anchor="middle">Q2</text>
<text x="96" y="96" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#d9795d" text-anchor="middle">Q3</text>
<text x="80" y="112" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#12355b" text-anchor="middle">four equal parts</text>
</svg>
