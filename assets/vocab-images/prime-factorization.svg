<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Prime factorization: a number written as a product of prime numbers</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<text x="80" y="26" font-family="Outfit, system-ui, sans-serif" font-size="14" font-weight="800" fill="#12355b" text-anchor="middle">12</text>
<line x1="76" y1="30" x2="56" y2="50" stroke="#12355b" stroke-width="2"/>
<line x1="84" y1="30" x2="104" y2="50" stroke="#12355b" stroke-width="2"/>
<text x="52" y="62" font-family="Outfit, system-ui, sans-serif" font-size="14" font-weight="800" fill="#d9795d" text-anchor="middle">2</text>
<text x="108" y="62" font-family="Outfit, system-ui, sans-serif" font-size="14" font-weight="800" fill="#12355b" text-anchor="middle">6</text>
<line x1="104" y1="66" x2="88" y2="84" stroke="#12355b" stroke-width="2"/>
<line x1="110" y1="66" x2="126" y2="84" stroke="#12355b" stroke-width="2"/>
<text x="84" y="96" font-family="Outfit, system-ui, sans-serif" font-size="14" font-weight="800" fill="#d9795d" text-anchor="middle">2</text>
<text x="128" y="96" font-family="Outfit, system-ui, sans-serif" font-size="14" font-weight="800" fill="#d9795d" text-anchor="middle">3</text>
<text x="80" y="114" font-family="Outfit, system-ui, sans-serif" font-size="9" font-weight="800" fill="#d9795d" text-anchor="middle">12 = 2 × 2 × 3</text>
</svg>
