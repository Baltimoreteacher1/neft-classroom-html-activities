<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Proportion: two equal ratios</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<rect x="16" y="40" width="44" height="40" rx="6" fill="#ffffff" stroke="#1fa6a2" stroke-width="2"/>
<text x="38" y="65" font-family="Outfit, system-ui, sans-serif" font-size="16" font-weight="800" fill="#12355b" text-anchor="middle">1/2</text>
<text x="80" y="67" font-family="Outfit, system-ui, sans-serif" font-size="20" font-weight="800" fill="#d9795d" text-anchor="middle">=</text>
<rect x="100" y="40" width="44" height="40" rx="6" fill="#ffffff" stroke="#1fa6a2" stroke-width="2"/>
<text x="122" y="65" font-family="Outfit, system-ui, sans-serif" font-size="16" font-weight="800" fill="#12355b" text-anchor="middle">2/4</text>
</svg>
