<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<text x="48" y="56" font-family="Outfit, system-ui, sans-serif" font-size="18" font-weight="800" fill="#12355b" text-anchor="middle">3/4</text>
<text x="80" y="58" font-family="Outfit, system-ui, sans-serif" font-size="18" font-weight="800" fill="#d9795d" text-anchor="middle">→</text>
<text x="112" y="56" font-family="Outfit, system-ui, sans-serif" font-size="18" font-weight="800" fill="#1fa6a2" text-anchor="middle">4/3</text>
<text x="80" y="92" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#12355b" text-anchor="middle">flip top and bottom</text>
