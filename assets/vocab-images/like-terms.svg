<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Like terms: terms with the same variable that can be combined</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<rect x="20" y="42" width="32" height="28" rx="6" fill="#1fa6a2"/>
<text x="36" y="62" font-family="Outfit, system-ui, sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">3x</text>
<text x="62" y="62" font-family="Outfit, system-ui, sans-serif" font-size="16" font-weight="800" fill="#12355b" text-anchor="middle">+</text>
<rect x="74" y="42" width="32" height="28" rx="6" fill="#1fa6a2"/>
<text x="90" y="62" font-family="Outfit, system-ui, sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">2x</text>
<text x="116" y="62" font-family="Outfit, system-ui, sans-serif" font-size="16" font-weight="800" fill="#12355b" text-anchor="middle">=</text>
<rect x="126" y="42" width="30" height="28" rx="6" fill="#d9795d"/>
<text x="141" y="62" font-family="Outfit, system-ui, sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="middle">5x</text>
<text x="80" y="92" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#12355b" text-anchor="middle">same variable → combine</text>
</svg>
