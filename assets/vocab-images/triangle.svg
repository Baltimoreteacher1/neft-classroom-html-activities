<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" role="img" aria-labelledby="t">
<title id="t">Triangle: three-sided polygon</title>
<rect x="0" y="0" width="160" height="120" rx="10" fill="#f7f4ec"/>
<polygon points="80,30 122,86 38,86" fill="#1fa6a2"/>
<line x1="80" y1="30" x2="80" y2="86" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="3 3"/>
<text x="80" y="104" font-family="Outfit, system-ui, sans-serif" font-size="10" font-weight="800" fill="#12355b" text-anchor="middle">base × height ÷ 2</text>
</svg>
