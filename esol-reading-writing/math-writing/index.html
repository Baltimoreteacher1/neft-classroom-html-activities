<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="/assets/shared.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Tutor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 350px;
            background: white;
            padding: 2rem;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            padding: 2rem;
        }

        h1 {
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        h2 {
            color: #555;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            margin-top: 1.5rem;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }

        input[type="password"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.95rem;
            transition: background 0.3s;
            margin-bottom: 0.5rem;
        }

        button:hover {
            background: #5568d3;
        }

        button.secondary {
            background: #f0f0f0;
            color: #333;
            margin: 0.25rem;
            flex: 1;
        }

        button.secondary:hover {
            background: #e0e0e0;
        }

        button.secondary.active {
            background: #667eea;
            color: white;
        }

        .mode-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .problem-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .problem-box h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            opacity: 0.9;
        }

        .problem-box p {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            padding: 1rem;
            border-radius: 10px;
            word-wrap: break-word;
            max-width: 80%;
            line-height: 1.5;
        }

        .student-message {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .tutor-message {
            background: #f0f0f0;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .input-area {
            display: flex;
            gap: 0.5rem;
        }

        .input-area input {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
            margin-bottom: 0;
        }

        .input-area button {
            flex: 0 0 80px;
            margin: 0;
        }

        .problems-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .problem-item {
            display: flex;
            gap: 0.5rem;
        }

        .problem-item button:first-child {
            flex: 1;
        }

        .problem-item button:last-child {
            flex: 0 0 50px;
        }

        .info {
            color: #666;
            padding: 1rem;
            background: #f9f9f9;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        hr {
            border: none;
            height: 1px;
            background: #ddd;
            margin: 1.5rem 0;
        }

        .hidden {
            display: none;
        }

        .loading {
            color: #999;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h1>📚 Math Tutor</h1>

            <div class="info">
                Local coaching mode is ready. No API key or login is needed.
            </div>

            <div class="mode-buttons">
                <button class="secondary active" onclick="setMode('teacher')">👨‍🏫 Teacher</button>
                <button class="secondary" onclick="setMode('student')">👨‍🎓 Student</button>
            </div>

            <hr>

            <div id="teacherPanel">
                <h2>Add Problems</h2>
                <textarea id="problemInput" placeholder="Paste a word problem..."></textarea>
                <button onclick="addProblem()">➕ Add Problem</button>

                <h2>Problems</h2>
                <div class="problems-list" id="problemsList"></div>
            </div>
        </div>

        <!-- Main Area -->
        <div class="main">
            <div id="studentPanel">
                <div id="problemDisplay"></div>
                <h3>Let's solve this together!</h3>
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <input type="text" id="studentInput" placeholder="Type your response..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">Send</button>
                </div>
            </div>

            <div id="teacherView" class="hidden">
                <h1>Teacher Control Panel</h1>
                <div class="info" id="teacherInfo">Add word problems using the sidebar to get started!</div>
            </div>
        </div>
    </div>

    <script>
        let mode = 'teacher';
        let problems = [];
        let currentProblemIndex = null;
        let messages = [];

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.mode-buttons button').forEach((btn, i) => {
                btn.classList.toggle('active', (i === 0 && newMode === 'teacher') || (i === 1 && newMode === 'student'));
            });
            document.getElementById('teacherPanel').classList.toggle('hidden', newMode !== 'teacher');
            document.getElementById('studentPanel').classList.toggle('hidden', newMode !== 'student');
            document.getElementById('teacherView').classList.toggle('hidden', newMode !== 'teacher');
        }

        function addProblem() {
            const input = document.getElementById('problemInput');
            if (!input.value.trim()) {
                alert('Please enter a problem');
                return;
            }

            problems.push(input.value.trim());
            input.value = '';
            currentProblemIndex = problems.length - 1;
            messages = [];
            renderProblems();
            renderProblemDisplay();
            updateTeacherInfo();
        }

        function renderProblems() {
            const list = document.getElementById('problemsList');
            list.innerHTML = problems.map((p, i) => `
                <div class="problem-item">
                    <button class="secondary ${i === currentProblemIndex ? 'active' : ''}" onclick="selectProblem(${i})">
                        P${i + 1}
                    </button>
                    <button class="secondary" onclick="deleteProblem(${i})">❌</button>
                </div>
            `).join('');
        }

        function selectProblem(index) {
            currentProblemIndex = index;
            messages = [];
            renderProblems();
            renderProblemDisplay();
            document.getElementById('messages').innerHTML = '';
        }

        function deleteProblem(index) {
            problems.splice(index, 1);
            if (currentProblemIndex === index) {
                currentProblemIndex = problems.length > 0 ? 0 : null;
                messages = [];
            }
            renderProblems();
            renderProblemDisplay();
            updateTeacherInfo();
        }

        function renderProblemDisplay() {
            const display = document.getElementById('problemDisplay');
            if (currentProblemIndex === null) {
                display.innerHTML = '<div class="info">No problem selected yet</div>';
            } else {
                const problem = problems[currentProblemIndex];
                display.innerHTML = `
                    <div class="problem-box">
                        <h3>Problem ${currentProblemIndex + 1}</h3>
                        <p>${problem}</p>
                    </div>
                `;
            }
        }

        function updateTeacherInfo() {
            const info = document.getElementById('teacherInfo');
            if (problems.length === 0) {
                info.textContent = 'Add word problems using the sidebar to get started!';
            } else {
                info.textContent = `✅ You have ${problems.length} problem(s) ready`;
            }
        }

        function createTutorResponse(text) {
            const response = text.toLowerCase();
            if (response.includes('answer') || response.includes('solve')) {
                return 'Good start. Before the final answer, tell me what the problem is asking and which numbers matter.';
            }
            if (response.includes('add') || response.includes('subtract') || response.includes('multiply') || response.includes('divide')) {
                return 'Nice planning. Write one sentence that explains why that operation matches the story problem.';
            }
            if (/\d/.test(response)) {
                return 'I see a number in your thinking. What does that number represent in the story?';
            }
            return 'Thanks for explaining. Try this sentence frame: "The problem is asking for ___, and I know ___."';
        }

        function sendMessage() {
            const input = document.getElementById('studentInput');
            const text = input.value.trim();
            if (!text || currentProblemIndex === null) return;

            messages.push({role: 'student', content: text});
            input.value = '';
            messages.push({role: 'tutor', content: 'Thinking...'});
            renderMessages();

            window.setTimeout(() => {
                messages[messages.length - 1].content = createTutorResponse(text);
                renderMessages();
            }, 250);
        }

        function renderMessages() {
            const container = document.getElementById('messages');
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.role === 'student' ? 'student-message' : 'tutor-message'} ${msg.content.includes('Thinking') ? 'loading' : ''}">
                    ${msg.content}
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        renderProblemDisplay();
        updateTeacherInfo();
    </script>
</body>
</html>
