<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1d3a8a" />
    <title>Vocabulary Study Hub · Neft Teacher</title>
    <meta
      name="description"
      content="Bilingual Grade 6 math vocabulary practice: word wall, flashcards, matching, and quizzes. English and Spanish with read-aloud."
    />
    <link rel="stylesheet" href="/vocab-hub/styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">📚</span>
        <div class="brand-text">
          <h1 class="brand-title">Vocabulary Study Hub</h1>
          <span class="brand-sub">Neft Teacher · Grade 6 Math</span>
        </div>
      </div>
      <div class="header-controls">
        <div class="lang-toggle" role="group" aria-label="Language / Idioma">
          <button
            type="button"
            data-lang="en"
            class="lang-btn is-active"
            aria-pressed="true"
          >
            EN
          </button>
          <button
            type="button"
            data-lang="both"
            class="lang-btn"
            aria-pressed="false"
          >
            EN+ES
          </button>
          <button
            type="button"
            data-lang="es"
            class="lang-btn"
            aria-pressed="false"
          >
            ES
          </button>
        </div>
        <button
          type="button"
          id="theme-btn"
          class="icon-btn"
          aria-label="Toggle dark mode"
          title="Toggle dark mode"
        >
          <span aria-hidden="true">🌗</span>
        </button>
      </div>
    </header>

    <nav class="tabs" aria-label="Study modes">
      <button
        type="button"
        class="tab is-active"
        data-mode="browse"
        aria-pressed="true"
      >
        <span class="tab-emoji" aria-hidden="true">🧱</span
        ><span class="tab-label">Word Wall</span>
      </button>
      <button
        type="button"
        class="tab"
        data-mode="flashcards"
        aria-pressed="false"
      >
        <span class="tab-emoji" aria-hidden="true">🔁</span
        ><span class="tab-label">Flashcards</span>
      </button>
      <button type="button" class="tab" data-mode="match" aria-pressed="false">
        <span class="tab-emoji" aria-hidden="true">🧩</span
        ><span class="tab-label">Matching</span>
      </button>
      <button type="button" class="tab" data-mode="quiz" aria-pressed="false">
        <span class="tab-emoji" aria-hidden="true">⭐</span
        ><span class="tab-label">Quiz</span>
      </button>
      <button type="button" class="tab" data-mode="quest" aria-pressed="false">
        <span class="tab-emoji" aria-hidden="true">🗺️</span
        ><span class="tab-label">Quest</span>
      </button>
    </nav>

    <main id="main" tabindex="-1">
      <p id="loading" class="loading">
        Loading vocabulary… / Cargando vocabulario…
      </p>
      <section id="view" class="view" hidden></section>
    </main>

    <!-- Live region for screen-reader feedback -->
    <div id="sr-live" class="sr-only" aria-live="polite" role="status"></div>

    <!-- Celebration overlay -->
    <div id="celebrate" class="celebrate" hidden aria-hidden="true">
      <div
        class="celebrate-card"
        role="dialog"
        aria-modal="true"
        aria-labelledby="celebrate-title"
      >
        <div class="celebrate-emoji" aria-hidden="true">🎉</div>
        <h2 id="celebrate-title">Great work! · ¡Buen trabajo!</h2>
        <p id="celebrate-msg"></p>
        <button type="button" id="celebrate-close" class="btn btn-primary">
          Keep going · Seguir
        </button>
      </div>
    </div>

    <footer class="app-footer">
      <span>Neft Teacher · Vocabulary Study Hub</span>
    </footer>

    <script src="/vocab-hub/app.js" defer></script>
      <script src="/assets/nt-page-enhance.js" defer></script>
  </body>
</html>
