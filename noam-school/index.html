solid var(--line);border-radius:999px;background:var(--paper);padding:9px 13px;font-weight:900;color:var(--muted);white-space:nowrap;cursor:pointer}.tab.active{background:var(--navy);border-color:var(--navy);color:white}.grid{display:grid;gap:14px}.g2{grid-template-columns:1fr 1fr}.homeGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 8px 24px rgba(21,35,52,.07)}.card.dragging{opacity:.5;outline:2px dashed var(--teal)}.head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.card h3,.head h3{margin:0 0 4px;color:var(--navy)}.sub{margin:0 0 12px;color:var(--muted);font-size:.86rem;line-height:1.45}.item{border:1px solid var(--line);background:#f7faf7;border-radius:15px;padding:12px;margin:9px 0}.item.done{opacity:.65}.item.done h4{text-decoration:line-through}.item h4{margin:0;color:var(--navy)}.item p{margin:5px 0 0;color:var(--muted);font-size:.84rem}.pill{display:inline-flex;border-radius:999px;padding:4px 8px;background:#e2f4f2;color:#0d6863;font-weight:900;font-size:.73rem;margin:2px}.red{background:#fde8e4;color:var(--red)}.amber{background:#fff0d5;color:#935f0d}.blue{background:#e9efff;color:#2f65d5}.green{background:#e7f6ed;color:#17703e}.field{display:grid;gap:5px;margin-bottom:10px}.field label{font-size:.74rem;font-weight:950;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}input,select,textarea{width:100%;border:1.5px solid var(--line);background:white;border-radius:12px;padding:10px;color:var(--ink)}input[type=checkbox]{width:auto;accent-color:var(--teal)}textarea{min-height:120px;resize:vertical}.note{background:#fff8e0;border:1px solid #f2d186;border-radius:14px;padding:12px;color:#704c0a;line-height:1.45;font-size:.86rem}.preview{white-space:pre-wrap;background:#f7faf7;border:1px solid var(--line);border-radius:14px;padding:12px;min-height:130px}.calBox{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#f7faf7;min-height:280px}.calBox iframe{width:100%;height:430px;border:0;background:white}.modalBack{position:fixed;inset:0;background:rgba(15,25,40,.5);display:none;place-items:center;padding:18px;z-index:99}.modalBack.open{display:grid}.modal{width:min(720px,100%);max-height:88vh;overflow:auto;background:white;border-radius:24px;padding:20px;box-shadow:0 25px 80px rgba(0,0,0,.22)}.toast{position:fixed;right:18px;bottom:18px;background:var(--navy);color:white;border-radius:14px;padding:12px 15px;font-weight:900;opacity:0;transform:translateY(70px);transition:.2s}.toast.show{opacity:1;transform:translateY(0)}@media(max-width:850px){.heroGrid,.homeGrid,.g2{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.head{display:block}.head .row{margin-top:8px}}
</style></head><body><div class="wrap">
<header class="top"><div class="brand"><div class="logo">N</div><div><h1>Noam School</h1><p>Daily Dugout v12 · checklist, calendar, custom cards, Classroom paste, Gmail, optional AI</p></div></div><div class="row"><a class="btn" href="/">← Hub</a><a class="btn navy" id="gmailTop" target="_blank">✉️ Open Gmail</a><button class="btn primary" data-open="assignment">＋ Assignment</button></div></header>
<section class="hero"><div class="heroGrid"><div><span class="pill">Today</span><h2>One calm place for <span class="gold">school work.</span></h2><p id="coachText">Loading...</p><div class="row"><button class="btn primary" data-view="checklist">✓ Daily Checklist</button><button class="btn" data-view="calendar">🗓 Calendar</button><button class="btn" data-view="customize">🎛 Customize</button><button class="btn" id="aiDailyBtn">✨ AI daily update</button></div></div><div class="stats"><div class="stat"><b id="statOpen">0</b><small>Open assignments</small></div><div class="stat"><b id="statToday">0</b><small>Due today</small></div><div class="stat"><b id="statChecklist">0</b><small>Checklist left</small></div><div class="stat"><b id="statClasses">0</b><small>Classes</small></div></div></div></section>

<script>
(()=>{const KEY='noam-school-v12',OLD=['noam-school-v11','noam-school-v10'],DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],BUILTINS=[['launch','Daily Launch'],['checklist','Daily Checklist'],['calendar','Calendar'],['import','Paste Classroom'],['today','Today Work'],['soon','Coming Up'],['classes','Classes'],['email','Gmail Helper'],['ai','AI Coach'],['wins','Wins']],$=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],uid=p=>p+'_'+Math.random().toString(36).slice(2,8),esc=v=>String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));function iso(o=0){let d=new Date();d.setHours(12,0,0,0);d.setDate(d.getDate()+o);return d.toISOString().slice(0,10)}function todayName(){return new Date().toLocaleDateString(undefined,{weekday:'long'})}function days(v){let d=new Date((v||iso())+'T12:00:00'),t=new Date(iso()+'T12:00:00');return Math.round((d-t)/86400000)}function due(v){if(!v)return'No due date';let n=days(v);return n<0?Math.abs(n)+'d late':n===0?'Today':n===1?'Tomorrow':n<7?'In '+n+' days':new Date(v+'T12:00').toLocaleDateString(undefined,{month:'short',day:'numeric'})}function builtKeys(){return BUILTINS.map(x=>x[0])}function customKey(id){return'custom:'+id}function seed(){let m=uid('c'),e=uid('c'),s=uid('c');return{settings:{studentName:'Noam',gmail:'',calendarEmbed:'',calendarLink:'',homeOrder:[...builtKeys()],hiddenCards:[],aiEnabled:false,aiTone:'calm',aiFocus:'short checklist'},daily:{goal:'',lastAi:''},classes:[{id:m,name:'Math',teacher:'',email:'',color:'#147c78'},{id:e,name:'English / ELA',teacher:'',email:'',color:'#b84234'},{id:s,name:'Science',teacher:'',email:'',color:'#248a55'}],assignments:[],checklist:[{id:uid('r'),text:'Check Google Classroom / planner',frequency:'Daily',day:'',time:'',lastDone:''},{id:uid('r'),text:'Charge Chromebook',frequency:'Daily',day:'',time:'20:30',lastDone:''},{id:uid('r'),text:'Pack bag for tomorrow',frequency:'Weekdays',day:'',time:'20:45',lastDone:''},{id:uid('r'),text:'Clean out backpack',frequency:'Weekly',day:'Sunday',time:'',lastDone:''}],customCards:[],wins:[]}}function loadRaw(){let raw=localStorage.getItem(KEY);if(raw)return raw;for(let k of OLD){raw=localStorage.getItem(k);if(raw)return raw}return null}function norm(x){let b=seed();x=x||b;let customCards=Array.isArray(x.customCards)?x.customCards:[];let allowed=[...builtKeys(),...customCards.map(c=>customKey(c.id))];let oldOrder=x.settings?.homeOrder||b.settings.homeOrder;let order=[...oldOrder.filter(k=>allowed.includes(k)),...builtKeys().filter(k=>!oldOrder.includes(k)),...customCards.map(c=>customKey(c.id)).filter(k=>!oldOrder.includes(k))];let checklist=Array.isArray(x.checklist)?x.checklist:(Array.isArray(x.reminders)?x.reminders.map(r=>({id:r.id||uid('r'),text:r.text||r.title||'Reminder',frequency:r.repeat==='Weekly'?'Weekly':r.repeat==='Weekdays'?'Weekdays':'Daily',day:r.day||'',time:r.time||'',lastDone:r.done?iso():''})):b.checklist);return{...b,...x,settings:{...b.settings,...(x.settings||{}),calendarEmbed:x.settings?.calendarEmbed||'',calendarLink:x.settings?.calendarLink||'',homeOrder:order,hiddenCards:(x.settings?.hiddenCards||[]).filter(k=>allowed.includes(k))},checklist:checklist.map(r=>({id:r.id||uid('r'),text:r.text||'Reminder',frequency:r.frequency||'Daily',day:r.day||'',time:r.time||'',lastDone:r.lastDone||'',done:!!r.done})),customCards:customCards.map(c=>({id:c.id||uid('card'),title:c.title||'Custom Card',body:c.body||'',link:c.link||'',linkLabel:c.linkLabel||'Open'}))}}let state=norm(JSON.parse(loadRaw()||'null')),view='home',parsed=[];function save(){localStorage.setItem(KEY,JSON.stringify(state))}function cls(id){return state.classes.find(c=>c.id===id)||state.classes[0]||{name:'Class',color:'#147c78'}}function openTasks(){return state.assignments.filter(a=>a.status!=='Turned In').sort((a,b)=>days(a.due)-days(b.due))}function gmailInbox(){return'https://mail.google.com/mail/u/0/#inbox'}function gmailCompose(to='',su='',body=''){let q=new URLSearchParams({view:'cm',fs:'1',to,su,body});return'https://mail.google.com/mail/?'+q.toString()}function toast(t){let el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(el.t);el.t=setTimeout(()=>el.classList.remove('show'),1800)}function isActiveReminder(r){let day=todayName();if(r.frequency==='Sometimes')return true;if(r.frequency==='Weekly')return (r.day||day)===day;if(r.frequency==='Weekdays')return !['Saturday','Sunday'].includes(day);return true}function isDone(r){return r.frequency==='Sometimes'?!!r.done:r.lastDone===iso()}function activeChecklist(){return state.checklist.filter(isActiveReminder).sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'))}function remainingChecklist(){return activeChecklist().filter(r=>!isDone(r))}function timeLabel(t){if(!t)return'Anytime';let [h,m]=t.split(':').map(Number),d=new Date();d.setHours(h||0,m||0,0,0);return d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})}function cleanCalendarUrl(v){v=(v||'').trim();let m=v.match(/src=["']([^"']+)/i);if(m)v=m[1].replace(/&amp;/g,'&');return v}function shell(){let o=openTasks(),td=o.filter(a=>days(a.due)===0),rem=remainingChecklist();$('#statOpen').textContent=o.length;$('#statToday').textContent=td.length;$('#statChecklist').textContent=rem.length;$('#statClasses').textContent=state.classes.length;$('#gmailTop').href=gmailInbox();$('#coachText').innerHTML=rem[0]?`Checklist first: <b>${esc(rem[0].text)}</b>${rem[0].time?' at '+esc(timeLabel(rem[0].time)):''}.`:td[0]?`Start with <b>${esc(td[0].title)}</b> for ${esc(cls(td[0].classId).name)}. It is due ${esc(due(td[0].due))}.`:o[0]?`Nothing due today. Next up: <b>${esc(o[0].title)}</b> for ${esc(cls(o[0].classId).name)}.`:'No open assignments. Paste Classroom or add the next task.'}function setView(v){view=v;render()}function render(){shell();$$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===view));let pages={home,checklist,calendar,import:importPage,assignments,classes,email,ai,customize};$('#app').innerHTML=(pages[view]||home)();bind()}function card(k,t,s,b){let i=state.settings.homeOrder.indexOf(k);return`<section class="card" draggable="true" data-card="${k}"><div class="head"><div><h3>${t}</h3><p class="sub">${s}</p></div><div class="row"><button class="btn" data-move="${k}|up" ${i===0?'disabled':''}>↑</button><button class="btn" data-move="${k}|down" ${i===state.settings.homeOrder.length-1?'disabled':''}>↓</button><button class="btn danger" data-hide="${k}">Hide</button></div></div>${b}</section>`}function task(a){let c=cls(a.classId),late=days(a.due)<0;return`<div class="item"><div class="head"><div><h4>${esc(a.title)}</h4><p>${esc(a.notes||'')}</p></div><span class="pill ${late?'red':days(a.due)===0?'amber':''}">${esc(due(a.due))}</span></div><div class="row"><span class="pill" style="background:${c.color}22;color:${c.color}">${esc(c.name)}</span><span class="pill">${esc(a.priority||'Medium')}</span><span class="pill">${esc(a.status||'Not Started')}</span>${a.source?`<span class="pill blue">${esc(a.source)}</span>`:''}<button class="btn" data-edit-a="${a.id}">Edit</button><button class="btn danger" data-del-a="${a.id}">Delete</button></div></div>`}function reminderRow(r,compact=false){let done=isDone(r);return`<div class="item ${done?'done':''}"><div class="head"><div><h4>${esc(r.text)}</h4><p>${esc(r.frequency)}${r.frequency==='Weekly'&&r.day?' · '+esc(r.day):''}${r.time?' · '+esc(timeLabel(r.time)):''}</p></div><div class="row"><label class="btn"><input type="checkbox" data-check="${r.id}" ${done?'checked':''}> Done</label>${compact?'':`<button class="btn" data-edit-r="${r.id}">Edit</button><button class="btn danger" data-del-r="${r.id}">Delete</button>`}</div></div></div>`}function calendarMini(){let src=cleanCalendarUrl(state.settings.calendarEmbed);return src?`<div class="calBox"><iframe src="${esc(src)}" loading="lazy"></iframe></div><div class="row" style="margin-top:10px"><button class="btn primary" data-view="calendar">Open calendar</button>${state.settings.calendarLink?`<a class="btn" target="_blank" href="${esc(state.settings.calendarLink)}">Open full calendar</a>`:''}</div>`:`<div class="note">Calendar is ready. Add a Google Calendar embed link in the Calendar tab or Customize tab.</div><button class="btn primary" data-view="calendar">Set up calendar</button>`}function customCardHtml(c){let k=customKey(c.id);return card(k,c.title||'Custom Card','Custom homepage card.',`<p style="white-space:pre-wrap">${esc(c.body||'')}</p>${c.link?`<a class="btn navy" target="_blank" href="${esc(c.link)}">${esc(c.linkLabel||'Open')}</a>`:''}<div class="row" style="margin-top:10px"><button class="btn" data-edit-card="${c.id}">Edit card</button><button class="btn danger" data-del-card="${c.id}">Delete card</button></div>`)}function home(){let o=openTasks(),td=o.filter(a=>days(a.due)===0),soon=o.filter(a=>days(a.due)>0&&days(a.due)<=7),rem=activeChecklist(),left=remainingChecklist();let map={launch:card('launch','Daily Launch','A fast start-of-day check.',`<div class="field"><label>Top goal today</label><input id="goal" value="${esc(state.daily.goal)}"></div><button class="btn primary" id="saveGoal">Save goal</button>`),checklist:card('checklist','Daily Checklist','Daily, weekly, and sometimes reminders.',(rem.length?rem.slice(0,6).map(r=>reminderRow(r,true)).join(''):'<div class="note">No checklist items active today.</div>')+`<div class="row"><button class="btn primary" data-view="checklist">Open checklist</button><button class="btn" data-open="reminder">＋ Add reminder</button><span class="pill ${left.length?'amber':'green'}">${left.length} left</span></div>`),calendar:card('calendar','Calendar','School events, due dates, and schedule links.',calendarMini()),import:card('import','Paste Classroom','Works when school blocks Google sync.',`<div class="note">Open Google Classroom → To-do/Assigned → copy visible work → paste here.</div><button class="btn primary" data-view="import">Open importer</button>`),today:card('today','Today Work','Assignments due today.',td.length?td.map(task).join(''):'<div class="note">No assignments due today.</div>'),soon:card('soon','Coming Up','Work due soon.',soon.length?soon.map(task).join(''):'<div class="note">Nothing due in the next week.</div>'),classes:card('classes','Classes','Teacher emails and class colors.',state.classes.map(c=>`<div class="item"><h4>${esc(c.name)}</h4><p>${esc(c.teacher||'No teacher saved')} ${c.email?'· '+esc(c.email):''}</p></div>`).join('')),email:card('email','Gmail Helper','Opens Gmail in the browser, not Apple Mail.',`<a class="btn navy" target="_blank" href="${gmailInbox()}">Open Gmail inbox</a><button class="btn" data-view="email">Write teacher email</button>`),ai:card('ai','AI Coach','Optional ChatGPT API daily update.',`<p class="sub">${state.settings.aiEnabled?'AI buttons are enabled. Configure OPENAI_API_KEY in Cloudflare.':'AI is off until enabled.'}</p><button class="btn primary" id="aiCard">Generate update</button><div class="note">${esc(state.daily.lastAi||'No AI update yet.')}</div>`),wins:card('wins','Wins','Small wins build the habit.',`<div class="field"><label>Add win</label><input id="win" placeholder="I turned in math."></div><button class="btn primary" id="addWin">Add win</button>${state.wins.slice(-4).reverse().map(w=>`<div class="item"><h4>${esc(w.text)}</h4><p>${esc(w.date)}</p></div>`).join('')}`)};state.customCards.forEach(c=>map[customKey(c.id)]=customCardHtml(c));return`<div class="homeGrid">${state.settings.homeOrder.filter(k=>!state.settings.hiddenCards.includes(k)).map(k=>map[k]||'').join('')}</div>`}function checklist(){let active=activeChecklist(),all=state.checklist;return`<div class="grid g2"><section class="card"><div class="head"><div><h3>Today’s Checklist</h3><p class="sub">Things to remember today. Daily/weekday items reset automatically each day. Weekly items show on their chosen day.</p></div><button class="btn primary" data-open="reminder">＋ Add reminder</button></div>${active.length?active.map(r=>reminderRow(r)).join(''):'<div class="note">No checklist items active today.</div>'}</section><section class="card"><h3>Add Checklist Reminder</h3>${reminderForm()}<div class="note"><b>Daily</b> shows every day. <b>Weekdays</b> shows Monday–Friday. <b>Weekly</b> shows on one chosen day. <b>Sometimes</b> stays available until he checks or unchecks it manually.</div></section><section class="card"><h3>All Checklist Items</h3>${all.map(r=>reminderRow(r)).join('')||'<div class="note">No reminders yet.</div>'}</section><section class="card"><h3>Quick reset</h3><p class="sub">Use this if he wants a fresh checklist today.</p><button class="btn" id="resetToday">Uncheck today’s recurring items</button> <button class="btn danger" id="clearChecklist">Clear all checklist items</button></section></div>`}function reminderForm(r={}){return`<div class="field"><label>Reminder / checklist item</label><input id="rText" value="${esc(r.text||'')}"></div><div class="field"><label>How often?</label><select id="rFreq"><option ${r.frequency==='Daily'?'selected':''}>Daily</option><option ${r.frequency==='Weekdays'?'selected':''}>Weekdays</option><option ${r.frequency==='Weekly'?'selected':''}>Weekly</option><option ${r.frequency==='Sometimes'?'selected':''}>Sometimes</option></select></div><div class="field"><label>Weekly day</label><select id="rDay">${DAYS.map(d=>`<option ${r.day===d?'selected':''}>${d}</option>`).join('')}</select></div><div class="field"><label>Optional time</label><input type="time" id="rTime" value="${esc(r.time||'')}"></div><button class="btn primary" id="saveReminder" data-id="${esc(r.id||'')}">Save reminder</button>`}function calendar(){let src=cleanCalendarUrl(state.settings.calendarEmbed);return`<div class="grid g2"><section class="card"><div class="head"><div><h3>Calendar</h3><p class="sub">Add a Google Calendar embed URL or iframe src. This does not need Classroom API access.</p></div>${state.settings.calendarLink?`<a class="btn navy" target="_blank" href="${esc(state.settings.calendarLink)}">Open full calendar</a>`:''}</div>${src?`<div class="calBox"><iframe src="${esc(src)}" loading="lazy"></iframe></div>`:'<div class="note">No calendar is saved yet. Paste a Google Calendar embed link below.</div>'}</section><section class="card"><h3>Calendar Settings</h3><div class="field"><label>Google Calendar embed URL or iframe code</label><textarea id="calEmbed" placeholder="Paste iframe code or the src URL from Google Calendar embed settings">${esc(state.settings.calendarEmbed)}</textarea></div><div class="field"><label>Optional full calendar link</label><input id="calLink" value="${esc(state.settings.calendarLink)}" placeholder="https://calendar.google.com/... or school calendar link"></div><button class="btn primary" id="saveCalendar">Save calendar</button><div class="note">For a school-blocked account, this works best with a public school calendar, shared family calendar, or manually shared Google Calendar embed.</div></section></div>`}function importPage(){return`<div class="grid g2"><section class="card"><h3>Paste from Google Classroom</h3><p class="sub">No OAuth. No school admin approval. Paste what Noam can already see.</p><textarea id="paste" placeholder="Math\nRatios worksheet\nDue May 27\nEnglish\nReading response\nDue Tomorrow"></textarea><div class="row"><button class="btn primary" id="parse">Preview import</button><button class="btn" id="clearPaste">Clear</button></div><div class="note">If the list is messy, copy one class at a time.</div></section><section class="card"><h3>Import Preview</h3><div id="preview" class="note">Nothing parsed yet.</div></section></div>`}function parseDue(line){let t=line.replace(/^due[:\s]*/i,'').toLowerCase();if(t.includes('tomorrow'))return iso(1);if(t.includes('today'))return iso(0);let m=t.match(/(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s+(\d{1,2})/i);if(m){let y=new Date().getFullYear(),d=new Date(`${m[1]} ${m[2]}, ${y} 12:00:00`);return d.toISOString().slice(0,10)}return''}function parseText(text){let lines=text.split(/\n+/).map(x=>x.trim()).filter(Boolean),cur=state.classes[0]?.id||'',out=[];for(let i=0;i<lines.length;i++){let l=lines[i],low=l.toLowerCase(),hit=state.classes.find(c=>low===c.name.toLowerCase()||low.includes(c.name.toLowerCase()));if(hit&&l.length<55){cur=hit.id;continue}if(/^due\b/i.test(l)&&out.length){out[out.length-1].due=parseDue(l);continue}if(/^(assigned|missing|done|to-do|to do)$/i.test(l))continue;out.push({id:uid('a'),title:l.replace(/^[-•]\s*/,''),classId:cur,due:/^due\b/i.test(lines[i+1]||'')?parseDue(lines[i+1]):'',priority:/missing/i.test(text)?'High':'Medium',status:'Not Started',notes:'Imported from pasted Google Classroom text.',source:'Classroom Paste',created:iso()})}return out.filter(a=>a.title.length>2&&!/^due\b/i.test(a.title)).slice(0,40)}function assignments(){return`<section class="card"><div class="head"><div><h3>Assignments</h3><p class="sub">Manual assignments and Classroom Paste imports.</p></div><button class="btn primary" data-open="assignment">＋ Assignment</button></div>${openTasks().map(task).join('')||'<div class="note">No open assignments.</div>'}</section>`}function classes(){return`<div class="grid g2"><section class="card"><h3>Classes</h3>${state.classes.map(c=>`<div class="item"><h4>${esc(c.name)}</h4><p>${esc(c.teacher||'')} ${c.email?'· '+esc(c.email):''}</p><div class="row"><button class="btn" data-edit-c="${c.id}">Edit</button>${c.email?`<a class="btn navy" target="_blank" href="${gmailCompose(c.email,'Question about class','Hi,\n\nI had a question about...\n\nThank you,\nNoam')}">Email in Gmail</a>`:''}</div></div>`).join('')}</section><section class="card"><h3>Add class</h3>${classForm()}</section></div>`}function classForm(c={}){return`<div class="field"><label>Class</label><input id="cName" value="${esc(c.name||'')}"></div><div class="field"><label>Teacher</label><input id="cTeacher" value="${esc(c.teacher||'')}"></div><div class="field"><label>Email</label><input id="cEmail" value="${esc(c.email||'')}"></div><button class="btn primary" id="saveClass" data-id="${esc(c.id||'')}">Save class</button>`}function email(){return`<div class="grid g2"><section class="card"><h3>Gmail Helper</h3><p class="sub">Uses Gmail compose URLs, so it opens Gmail in the browser.</p><div class="field"><label>Teacher</label><select id="eClass">${state.classes.map(c=>`<option value="${c.id}">${esc(c.name)} ${c.teacher?'— '+esc(c.teacher):''}</option>`).join('')}</select></div><div class="field"><label>Subject</label><input id="eSub" value="Question about class"></div><div class="field"><label>Message</label><textarea id="eBody">Hi,\n\nI had a question about the assignment. Can you please help me understand what I should do next?\n\nThank you,\nNoam</textarea></div><button class="btn navy" id="compose">Open in Gmail</button> <a class="btn" target="_blank" href="${gmailInbox()}">Open Gmail inbox</a></section><section class="card"><h3>Email checklist</h3><div class="note">Say the class, assignment, what is confusing, and what help you need.</div></section></div>`}function ai(){return`<div class="grid g2"><section class="card"><h3>AI Daily Updates</h3><p class="sub">Optional ChatGPT API support for daily planning.</p><div class="note">Store the API key as a Cloudflare secret named <b>OPENAI_API_KEY</b>. Never put it in this HTML.</div><label class="row"><input type="checkbox" id="aiOn" ${state.settings.aiEnabled?'checked':''}> Enable AI buttons</label><div class="field"><label>Tone</label><input id="aiTone" value="${esc(state.settings.aiTone)}"></div><div class="field"><label>Focus</label><input id="aiFocus" value="${esc(state.settings.aiFocus)}"></div><button class="btn primary" id="saveAi">Save AI settings</button> <button class="btn" id="genAi">Generate update</button></section><section class="card"><h3>Latest update</h3><div class="preview">${esc(state.daily.lastAi||'No AI update generated yet.')}</div></section></div>`}function cardForm(c={}){return`<div class="field"><label>Card title</label><input id="cardTitle" value="${esc(c.title||'')}"></div><div class="field"><label>Card text</label><textarea id="cardBody">${esc(c.body||'')}</textarea></div><div class="field"><label>Optional link</label><input id="cardLink" value="${esc(c.link||'')}"></div><div class="field"><label>Link button label</label><input id="cardLinkLabel" value="${esc(c.linkLabel||'Open')}"></div><button class="btn primary" id="saveCard" data-id="${esc(c.id||'')}">Save custom card</button>`}function customize(){let built=BUILTINS.map(([k,label])=>{let h=state.settings.hiddenCards.includes(k);return`<div class="item"><div class="head"><div><h4>${esc(label)}</h4><p>${h?'Hidden from homepage':'Visible on homepage'}</p></div><div class="row"><button class="btn" data-move="${k}|up">↑</button><button class="btn" data-move="${k}|down">↓</button><button class="btn ${h?'primary':'danger'}" data-toggle="${k}">${h?'Show':'Remove from homepage'}</button></div></div></div>`}).join('');let customs=state.customCards.map(c=>{let k=customKey(c.id),h=state.settings.hiddenCards.includes(k);return`<div class="item"><div class="head"><div><h4>${esc(c.title)}</h4><p>${h?'Hidden custom card':'Visible custom card'}</p></div><div class="row"><button class="btn" data-move="${k}|up">↑</button><button class="btn" data-move="${k}|down">↓</button><button class="btn" data-edit-card="${c.id}">Edit</button><button class="btn ${h?'primary':'danger'}" data-toggle="${k}">${h?'Show':'Hide'}</button><button class="btn danger" data-del-card="${c.id}">Delete</button></div></div></div>`}).join('')||'<div class="note">No custom cards yet. Add one below.</div>';return`<div class="grid g2"><section class="card"><h3>Customize Homepage</h3><p class="sub">Remove built-in cards from the homepage, or add custom cards for links, routines, notes, or reminders.</p><h3>Built-in Cards</h3>${built}<button class="btn" id="resetCards">Reset homepage cards</button></section><section class="card"><h3>Add Custom Card</h3>${cardForm()}<div class="note">Examples: “Baseball schedule,” “Hebrew practice,” “Pack list,” “Teacher links,” or “Homework routine.”</div></section><section class="card"><h3>Custom Cards</h3>${customs}</section><section class="card"><h3>Basic + Calendar Settings</h3><div class="field"><label>Student name</label><input id="sName" value="${esc(state.settings.studentName)}"></div><div class="field"><label>Gmail address optional</label><input id="sGmail" value="${esc(state.settings.gmail)}"></div><div class="field"><label>Calendar embed URL or iframe code</label><textarea id="sCalEmbed">${esc(state.settings.calendarEmbed)}</textarea></div><div class="field"><label>Optional full calendar link</label><input id="sCalLink" value="${esc(state.settings.calendarLink)}"></div><button class="btn primary" id="saveSettings">Save settings</button></section></div>`}function move(k,dir){let allowed=[...builtKeys(),...state.customCards.map(c=>customKey(c.id))];state.settings.homeOrder=state.settings.homeOrder.filter(x=>allowed.includes(x));let a=state.settings.homeOrder,i=a.indexOf(k),j=dir==='up'?i-1:i+1;if(i<0||j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];save();render()}function openA(a={}){$('#modalTitle').textContent=a.id?'Edit assignment':'Add assignment';$('#modalBody').innerHTML=`<div class="field"><label>Title</label><input id="aTitle" value="${esc(a.title||'')}"></div><div class="field"><label>Class</label><select id="aClass">${state.classes.map(c=>`<option value="${c.id}" ${a.classId===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}</select></div><div class="field"><label>Due</label><input type="date" id="aDue" value="${esc(a.due||'')}"></div><div class="field"><label>Priority</label><select id="aPri"><option>Low</option><option selected>Medium</option><option>High</option></select></div><div class="field"><label>Status</label><select id="aStatus"><option>Not Started</option><option>Started</option><option>Almost Done</option><option>Turned In</option></select></div><div class="field"><label>Notes</label><textarea id="aNotes">${esc(a.notes||'')}</textarea></div><button class="btn primary" id="saveA">Save assignment</button>`;$('#modalBack').classList.add('open');$('#saveA').onclick=()=>{let obj=a.id?state.assignments.find(x=>x.id===a.id):{id:uid('a'),created:iso(),source:'Manual'};Object.assign(obj,{title:$('#aTitle').value||'Assignment',classId:$('#aClass').value,due:$('#aDue').value,priority:$('#aPri').value,status:$('#aStatus').value,notes:$('#aNotes').value});if(!a.id)state.assignments.push(obj);save();$('#modalBack').classList.remove('open');render()}}function openReminder(r={}){$('#modalTitle').textContent=r.id?'Edit checklist reminder':'Add checklist reminder';$('#modalBody').innerHTML=reminderForm(r);$('#modalBack').classList.add('open');bind()}function openCustomCard(c={}){$('#modalTitle').textContent=c.id?'Edit custom card':'Add custom card';$('#modalBody').innerHTML=cardForm(c);$('#modalBack').classList.add('open');bind()}async function genAi(){if(!state.settings.aiEnabled){setView('ai');toast('Turn on AI first');return}try{toast('Generating...');let res=await fetch('/api/ai/daily-update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({settings:state.settings,classes:state.classes,assignments:openTasks().slice(0,12),checklist:remainingChecklist().slice(0,10),goal:state.daily.goal})}),data=await res.json();if(!res.ok)throw Error(data.error||'AI unavailable');state.daily.lastAi=data.update;save();render();toast('AI update ready')}catch(e){toast(e.message)}}function saveReminder(){let id=$('#saveReminder').dataset.id,r=id?state.checklist.find(x=>x.id===id):{id:uid('r'),lastDone:'',done:false};Object.assign(r,{text:$('#rText').value||'Reminder',frequency:$('#rFreq').value,day:$('#rDay').value,time:$('#rTime').value});if(!id)state.checklist.push(r);save();$('#modalBack').classList.remove('open');render()}function saveCard(){let id=$('#saveCard').dataset.id,c=id?state.customCards.find(x=>x.id===id):{id:uid('card')};Object.assign(c,{title:$('#cardTitle').value||'Custom Card',body:$('#cardBody').value||'',link:$('#cardLink').value||'',linkLabel:$('#cardLinkLabel').value||'Open'});if(!id){state.customCards.push(c);state.settings.homeOrder.push(customKey(c.id));}save();$('#modalBack').classList.remove('open');render()}function saveCalendarFrom(prefix){state.settings.calendarEmbed=$(prefix+'CalEmbed').value;state.settings.calendarLink=$(prefix+'CalLink').value;save();render();toast('Calendar saved')}function bind(){$$('[data-view]').forEach(b=>b.onclick=()=>setView(b.dataset.view));$$('[data-open="assignment"]').forEach(b=>b.onclick=()=>openA());$$('[data-open="reminder"]').forEach(b=>b.onclick=()=>openReminder());$$('[data-move]').forEach(b=>b.onclick=()=>move(...b.dataset.move.split('|')));$$('[data-hide]').forEach(b=>b.onclick=()=>{state.settings.hiddenCards=[...new Set([...state.settings.hiddenCards,b.dataset.hide])];save();render()});$$('[data-toggle]').forEach(b=>b.onclick=()=>{let k=b.dataset.toggle;state.settings.hiddenCards=state.settings.hiddenCards.includes(k)?state.settings.hiddenCards.filter(x=>x!==k):[...state.settings.hiddenCards,k];save();render()});$$('[data-del-a]').forEach(b=>b.onclick=()=>{state.assignments=state.assignments.filter(a=>a.id!==b.dataset.delA);save();render()});$$('[data-edit-a]').forEach(b=>b.onclick=()=>openA(state.assignments.find(a=>a.id===b.dataset.editA)));$$('[data-del-r]').forEach(b=>b.onclick=()=>{state.checklist=state.checklist.filter(r=>r.id!==b.dataset.delR);save();render()});$$('[data-edit-r]').forEach(b=>b.onclick=()=>openReminder(state.checklist.find(r=>r.id===b.dataset.editR)));$$('[data-edit-card]').forEach(b=>b.onclick=()=>openCustomCard(state.customCards.find(c=>c.id===b.dataset.editCard)));$$('[data-del-card]').forEach(b=>b.onclick=()=>{let k=customKey(b.dataset.delCard);state.customCards=state.customCards.filter(c=>c.id!==b.dataset.delCard);state.settings.homeOrder=state.settings.homeOrder.filter(x=>x!==k);state.settings.hiddenCards=state.settings.hiddenCards.filter(x=>x!==k);save();render()});$$('[data-check]').forEach(ch=>ch.onchange=()=>{let r=state.checklist.find(x=>x.id===ch.dataset.check);if(!r)return;if(r.frequency==='Sometimes')r.done=ch.checked;else r.lastDone=ch.checked?iso():'';save();render()});$$('[data-edit-c]').forEach(b=>b.onclick=()=>{$('#modalTitle').textContent='Edit class';$('#modalBody').innerHTML=classForm(state.classes.find(c=>c.id===b.dataset.editC));$('#modalBack').classList.add('open');bind()});$('#closeModal')?.addEventListener('click',()=>$('#modalBack').classList.remove('open'));$('#saveGoal')?.addEventListener('click',()=>{state.daily.goal=$('#goal').value;save();render()});$('#addWin')?.addEventListener('click',()=>{let v=$('#win').value.trim();if(v){state.wins.push({text:v,date:new Date().toLocaleString()});save();render()}});$('#parse')?.addEventListener('click',()=>{parsed=parseText($('#paste').value);$('#preview').innerHTML=parsed.length?parsed.map(a=>`<div class="item"><h4>${esc(a.title)}</h4><p>${esc(cls(a.classId).name)} · ${esc(due(a.due))}</p></div>`).join('')+`<button class="btn primary" id="addParsed">Add ${parsed.length} assignments</button>`:'No assignments found.';$('#addParsed')?.addEventListener('click',()=>{state.assignments=[...state.assignments,...parsed];save();setView('assignments')})});$('#clearPaste')?.addEventListener('click',()=>{$('#paste').value='';$('#preview').textContent='Nothing parsed yet.'});$('#saveClass')?.addEventListener('click',()=>{let id=$('#saveClass').dataset.id,c=id?state.classes.find(x=>x.id===id):{id:uid('c'),color:'#147c78'};c.name=$('#cName').value||'Class';c.teacher=$('#cTeacher').value;c.email=$('#cEmail').value;if(!id)state.classes.push(c);save();$('#modalBack').classList.remove('open');render()});$('#saveReminder')?.addEventListener('click',saveReminder);$('#saveCard')?.addEventListener('click',saveCard);$('#saveCalendar')?.addEventListener('click',()=>saveCalendarFrom('#'));$('#resetToday')?.addEventListener('click',()=>{state.checklist.forEach(r=>{if(r.frequency!=='Sometimes')r.lastDone=''});save();render()});$('#clearChecklist')?.addEventListener('click',()=>{state.checklist=[];save();render()});$('#compose')?.addEventListener('click',()=>{let c=cls($('#eClass').value);window.open(gmailCompose(c.email,$('#eSub').value,$('#eBody').value),'_blank')});$('#saveAi')?.addEventListener('click',()=>{state.settings.aiEnabled=$('#aiOn').checked;state.settings.aiTone=$('#aiTone').value;state.settings.aiFocus=$('#aiFocus').value;save();render()});$('#genAi')?.addEventListener('click',genAi);$('#aiDailyBtn')?.addEventListener('click',genAi);$('#aiCard')?.addEventListener('click',genAi);$('#saveSettings')?.addEventListener('click',()=>{state.settings.studentName=$('#sName').value;state.settings.gmail=$('#sGmail').value;state.settings.calendarEmbed=$('#sCalEmbed').value;state.settings.calendarLink=$('#sCalLink').value;save();render();toast('Settings saved')});$('#resetCards')?.addEventListener('click',()=>{state.settings.homeOrder=[...builtKeys(),...state.customCards.map(c=>customKey(c.id))];state.settings.hiddenCards=[];save();render()})}save();render()})();
</script></body></html>
