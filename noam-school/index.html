<script>
(function(){
const KEY="noam-school-v6",OLD=["noam-school-v5","noam-school-v4","student-dugout-v3-state"],DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],ORDER=["today","calendar","reminders","week","google","onDeck"];
const $=(s,c=document)=>c.querySelector(s),$$=(s,c=document)=>Array.from(c.querySelectorAll(s));
const uid=p=>p+"_"+Math.random().toString(36).slice(2,8)+"_"+Date.now().toString(36);
const esc=v=>String(v??"").replace(/[&<>\"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
function iso(off=0){const d=new Date();d.setHours(12,0,0,0);d.setDate(d.getDate()+off);return d.toISOString().slice(0,10)}
function dObj(v){const d=new Date((v||iso())+"T12:00:00");return isNaN(d)?new Date():d}function days(v){return Math.round((dObj(v)-dObj(iso()))/86400000)}
function due(v){if(!v)return"No due date";const n=days(v);if(n<0)return Math.abs(n)+"d late";if(n===0)return"Today";if(n===1)return"Tomorrow";if(n<7)return"In "+n+" days";return dObj(v).toLocaleDateString(undefined,{month:"short",day:"numeric"})}
function timeLabel(t){if(!t)return"Any time";const [h,m]=t.split(":").map(Number);const d=new Date();d.setHours(h||0,m||0,0,0);return d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"})}
function timeSort(t){return t?Number(t.replace(":","")):9999}function minutesUntil(t){if(!t)return 99999;const [h,m]=t.split(":").map(Number),now=new Date(),d=new Date();d.setHours(h||0,m||0,0,0);return Math.round((d-now)/60000)}
function weekKey(){const d=dObj(iso()),day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d.toISOString().slice(0,10)}
function seed(){const m=uid("class"),s=uid("class"),e=uid("class"),h=uid("class");return{settings:{studentName:"Noam",schoolName:"Krieger Schechter Day School",gmail:"",calendarEmbed:"",calendarLink:"",lastDailyReset:"",lastWeeklyReset:"",homeOrder:[...ORDER],focusMinutes:10,breakMinutes:3},google:{configured:false,connected:false,profile:null,events:[],classroomAssignments:[],lastSync:""},classes:[{id:m,name:"Math",teacher:"Math Teacher",email:"",room:"",color:"#16837d"},{id:s,name:"Science",teacher:"Science Teacher",email:"",room:"",color:"#248a55"},{id:e,name:"English / ELA",teacher:"ELA Teacher",email:"",room:"",color:"#bf3d2f"},{id:h,name:"Hebrew / Judaics",teacher:"Hebrew Teacher",email:"",room:"",color:"#2f65d5"}],assignments:[{id:uid("a"),title:"Ratios practice set",classId:m,due:iso(),priority:"High",status:"Started",notes:"Finish selected problems and check answers."},{id:uid("a"),title:"Reading response paragraph",classId:e,due:iso(1),priority:"Medium",status:"Not Started",notes:"Use one quote from the chapter."}],reminders:[{id:uid("r"),text:"Check Google Classroom / planner",time:"16:00",repeat:"Daily",day:"",done:false},{id:uid("r"),text:"Charge Chromebook",time:"20:30",repeat:"Daily",day:"",done:false},{id:uid("r"),text:"Pack bag for tomorrow",time:"20:45",repeat:"Weekdays",day:"",done:false}],weekly:{Monday:[{id:uid("w"),text:"Check every class page",done:false},{id:uid("w"),text:"Write this week due dates",done:false}],Tuesday:[{id:uid("w"),text:"Update assignment statuses",done:false}],Wednesday:[{id:uid("w"),text:"Midweek backpack cleanout",done:false}],Thursday:[{id:uid("w"),text:"Ask for help before Friday",done:false}],Friday:[{id:uid("w"),text:"Turn in missing work",done:false}],Saturday:[{id:uid("w"),text:"10-minute school reset",done:false}],Sunday:[{id:uid("w"),text:"Pack Chromebook and materials",done:false},{id:uid("w"),text:"Preview Monday schedule",done:false}]},sessions:[]}}
function norm(x){const b=seed();x=x||b;let order=x.settings?.homeOrder||ORDER;order=[...order.filter(k=>ORDER.includes(k)),...ORDER.filter(k=>!order.includes(k))];return{settings:{...b.settings,...(x.settings||{}),...(x.profile?{studentName:x.profile.studentName,schoolName:x.profile.schoolName}:{}),homeOrder:order,focusMinutes:Number(x.settings?.focusMinutes||10),breakMinutes:Number(x.settings?.breakMinutes||3)},google:{...b.google,...(x.google||{})},classes:Array.isArray(x.classes)?x.classes:b.classes,assignments:Array.isArray(x.assignments)?x.assignments.map(a=>({id:a.id||uid("a"),title:a.title||"Assignment",classId:a.classId||"",due:a.due||a.dueDate||"",priority:a.priority||"Medium",status:a.status||"Not Started",notes:a.notes||a.description||""})):b.assignments,reminders:Array.isArray(x.reminders)?x.reminders.map(r=>({id:r.id||uid("r"),text:r.text||r.title||"Reminder",time:r.time||"",repeat:r.repeat||"Daily",day:r.day||"",done:!!r.done||!!r.completed})):b.reminders,weekly:x.weekly||b.weekly,sessions:Array.isArray(x.sessions)?x.sessions:[]}}
function load(){try{let raw=localStorage.getItem(KEY);if(!raw)for(const k of OLD){raw=localStorage.getItem(k);if(raw)break}return norm(JSON.parse(raw))}catch{return seed()}}let state=load(),view="home",timer={sec:(state.settings.focusMinutes||10)*60,run:false,id:null,mode:"Work"};function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function maint(){let ch=false;if(state.settings.lastDailyReset!==iso()){state.reminders.forEach(r=>{if(r.repeat==="Daily"||r.repeat==="Weekdays")r.done=false});state.settings.lastDailyReset=iso();ch=true}const wk=weekKey();if(state.settings.lastWeeklyReset!==wk){DAYS.forEach(d=>(state.weekly[d]||[]).forEach(i=>i.done=false));state.settings.lastWeeklyReset=wk;ch=true}if(ch)save()}
function cls(id){return state.classes.find(c=>c.id===id)||{name:"Class",color:"#16837d",teacher:"",email:""}}function openTasks(){return state.assignments.filter(a=>a.status!=="Turned In").sort((a,b)=>days(a.due)-days(b.due))}function activeRem(){return state.reminders.filter(r=>!r.done).sort((a,b)=>timeSort(a.time)-timeSort(b.time))}
function toast(t){const el=$("#toast");el.textContent=t;el.classList.add("show");clearTimeout(el.t);el.t=setTimeout(()=>el.classList.remove("show"),2200)}function setView(v){view=v;$$(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===v));render()}
function shell(){const d=new Date();$("#todayLabel").textContent=d.toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"});$("#brandTitle").textContent=(state.settings.studentName||"Noam")+" School";$("#brandSub").textContent=(state.settings.schoolName||"Student Dugout")+" · timed command center";const open=openTasks(),today=open.filter(a=>days(a.due)===0),rem=activeRem(),weekDone=DAYS.flatMap(d=>state.weekly[d]||[]).filter(i=>i.done).length;$("#statOpen").textContent=open.length;$("#statToday").textContent=today.length;$("#statRem").textContent=rem.length;$("#statWeek").textContent=weekDone;const next=open[0],nextRem=rem[0];$("#coachText").innerHTML=next?`Best first task: <strong>${esc(next.title)}</strong> for ${esc(cls(next.classId).name)} is ${esc(due(next.due))}. Timer default: ${state.settings.focusMinutes} minutes.`:nextRem?`Next reminder: <strong>${esc(nextRem.text)}</strong> at ${esc(timeLabel(nextRem.time))}.`:"You are caught up. Check the calendar, reminders, or add the next assignment.";const g=state.settings.gmail;$("#gmailHero").href=g?`mailto:${encodeURIComponent(g)}`:"https://mail.google.com/";$("#gmailHero").textContent=g?"✉️ Email "+g:"✉️ Open Gmail"}
function render(){maint();shell();const pages={home,reminders,assignments,classes,focus,email,sync,settings};$("#app").innerHTML=(pages[view]||home)();bind()}function card(k,t,s,b){const order=state.settings.homeOrder,i=order.indexOf(k);return`<section class="card homeCard" draggable="true" data-card="${k}"><div class="head"><div><h3>${t}</h3><p class="sub">${s}</p></div><div class="homeControls"><button class="btn moveBtn" data-move="${k}|up" ${i===0?"disabled":""}>↑</button><button class="btn moveBtn" data-move="${k}|down" ${i===order.length-1?"disabled":""}>↓</button></div></div>${b}</section>`}
function task(a){const c=cls(a.classId),late=days(a.due)<0;return`<div class="item"><div class="itemTop"><div><h4>${esc(a.title)}</h4><p>${esc(a.notes||"No notes")}</p></div><span class="pill ${late?"red":days(a.due)===0?"amber":""}">${esc(due(a.due))}</span></div><div class="row" style="margin-top:9px"><span class="pill" style="background:${c.color}22;color:${c.color}">${esc(c.name)}</span><span class="pill">${esc(a.priority)}</span><span class="pill">${esc(a.status)}</span><button class="btn" data-edit="assignment" data-id="${a.id}">Edit</button><button class="btn amber" data-start="${a.id}">Focus</button><button class="btn danger" data-del="assignment" data-id="${a.id}">Delete</button></div></div>`}
function home(){const open=openTasks(),today=open.filter(a=>days(a.due)===0),soon=open.filter(a=>days(a.due)>0&&days(a.due)<=7),rem=activeRem(),todayName=new Date().toLocaleDateString(undefined,{weekday:"long"});const map={today:card("today","Today homepage","Due-today work and the fastest next step.",today.length?today.map(task).join(""):`<div class="note">No assignments due today.</div><div class="row" style="margin-top:10px"><button class="btn primary" data-open="assignment">＋ Add assignment</button></div>`),calendar:card("calendar","School Google Calendar","Embed a public calendar or use Google Sync.",calendarHtml()),reminders:card("reminders","Timed reminders","Reminders now include optional times and sort by time.",(rem.slice(0,6).map(remRow).join("")||`<div class="note">All reminders checked off.</div>`)+`<div class="row" style="margin-top:10px"><button class="btn primary" data-open="reminder">＋ Timed reminder</button><button class="btn" data-view="reminders">Full reminders</button></div>`),week:card("week",todayName+" checklist","Part of the Monday–Sunday weekly checklist.",((state.weekly[todayName]||[]).map(w=>weekRow(w,todayName)).join("")||`<div class="note">No checklist items for ${todayName}.</div>`)+`<div class="row" style="margin-top:10px"><button class="btn" data-view="reminders">Open full week</button></div>`),google:card("google","Google Classroom + Calendar Sync","Sync Classroom courses into the Classes tab and import coursework.",googleMini()),onDeck:card("onDeck","On deck","Assignments coming up this week.",soon.length?soon.map(task).join(""):`<div class="note">Nothing due in the next week.</div>`)};return`<div class="note" style="margin-top:14px"><strong>Customize homepage:</strong> use ↑ ↓ or drag cards to rearrange. Layout saves on this device.</div><div class="homeGrid">${state.settings.homeOrder.map(k=>`<div>${map[k]||""}</div>`).join("")}</div>`}
function calendarHtml(){const src=extractCal(state.settings.calendarEmbed);if(src)return`<div class="calendarBox" style="padding:0"><iframe src="${esc(src)}" loading="lazy"></iframe></div>`;if(state.google.events?.length)return state.google.events.slice(0,6).map(e=>`<div class="item"><h4>${esc(e.title)}</h4><p>${esc(fmtDate(e.start))}</p>${e.link?`<a class="btn" target="_blank" rel="noopener" href="${esc(e.link)}">Open</a>`:""}</div>`).join("");return`<div class="calendarBox"><div><h3>No calendar connected yet</h3><p class="sub">Paste an embed in Settings or connect Google Sync.</p><button class="btn primary" data-view="settings">Add calendar</button></div></div>`}function extractCal(v){v=(v||"").trim();const m=v.match(/src=['\"]([^'\"]+)['\"]/i);return m?m[1]:v}function fmtDate(v){if(!v)return"No date";const d=new Date(v);return isNaN(d)?v:d.toLocaleString(undefined,{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}
function googleMini(){return state.google.connected?`<div class="syncBox connected"><strong>Connected${state.google.profile?.email?" as "+esc(state.google.profile.email):""}.</strong><p class="sub">Use Google Sync to refresh Calendar and Classroom.</p><button class="btn primary" data-view="sync">Open sync</button></div>`:`<div class="syncBox"><strong>Not connected yet.</strong><p class="sub">After Cloudflare secrets/KV are configured, connect Google and sync Classroom courses.</p><button class="btn primary" data-view="sync">Open sync</button></div>`}
function reminders(){return`<section class="card"><div class="head"><div><h3>Timed Reminders</h3><p class="sub">Add, edit, delete, and set times. Items sort by time.</p></div><button class="btn primary" data-open="reminder">＋ Timed reminder</button></div>${state.reminders.slice().sort((a,b)=>timeSort(a.time)-timeSort(b.time)).map(remRow).join("")||`<div class="note">No reminders yet.</div>`}</section><section class="card" style="margin-top:14px"><div class="head"><div><h3>Monday–Sunday checklist</h3><p class="sub">Weekly routines reset each Monday.</p></div><span class="pill">Week of ${weekKey()}</span></div><div class="week">${DAYS.map(d=>`<div class="day"><h4>${d}</h4>${(state.weekly[d]||[]).map(w=>weekRow(w,d)).join("")||`<p class="small">No items.</p>`}<div class="miniInput"><input placeholder="Add item" data-week-input="${d}"><button class="btn primary" data-week-add="${d}">＋</button></div></div>`).join("")}</div></section>`}
function remRow(r){const min=minutesUntil(r.time),urgent=!r.done&&r.time&&min<=30&&min>=0,late=!r.done&&r.time&&min<0;return`<label class="check ${r.done?"done":""}"><input type="checkbox" data-rem-check="${r.id}" ${r.done?"checked":""}><span class="mainText" style="flex:1"><strong>${esc(timeLabel(r.time))}</strong> — ${esc(r.text)} <span class="pill ${urgent?"amber":late?"red":"blue"}">${late?"Past time":urgent?"Soon":esc(r.repeat)}</span></span><button type="button" class="btn" data-edit="reminder" data-id="${r.id}">Edit</button><button type="button" class="btn danger" data-del="reminder" data-id="${r.id}">Delete</button></label>`}
function weekRow(w,d){return`<label class="check ${w.done?"done":""}"><input type="checkbox" data-week-check="${d}|${w.id}" ${w.done?"checked":""}><span class="mainText" style="flex:1">${esc(w.text)}</span><button type="button" class="btn danger" data-week-del="${d}|${w.id}">×</button></label>`}
function assignments(){return`<section class="card"><div class="head"><div><h3>Assignments</h3><p class="sub">Add, edit, delete, update status, and start a custom focus sprint.</p></div><button class="btn primary" data-open="assignment">＋ Add assignment</button></div>${openTasks().map(task).join("")||`<div class="note">No open assignments.</div>`}<hr style="border:0;border-top:1px solid var(--line);margin:16px 0"><h3>Turned in</h3>${state.assignments.filter(a=>a.status==="Turned In").map(task).join("")||`<p class="sub">Nothing marked turned in yet.</p>`}</section>`}
function classes(){return`<section class="card"><div class="head"><div><h3>Classes</h3><p class="sub">Manual classes and synced Google Classroom courses appear here.</p></div><button class="btn primary" data-open="class">＋ Add class</button></div><div class="row" style="margin-bottom:12px"><button class="btn primary" id="syncClassroomClasses">🔄 Sync Classroom classes</button><button class="btn" data-view="sync">Open full Google Sync</button></div><div class="grid g3">${state.classes.map(c=>`<div class="item"><h4>${esc(c.name)}</h4><p>${esc(c.teacher||c.source||"Teacher")} · ${esc(c.email||c.room||"No details saved")}</p><div class="row" style="margin-top:10px"><span class="pill" style="background:${c.color}22;color:${c.color}">${esc(c.source||"Manual")}</span>${c.link?`<a class="btn" target="_blank" rel="noopener" href="${esc(c.link)}">Open</a>`:""}<button class="btn" data-edit="class" data-id="${c.id}">Edit</button><button class="btn danger" data-del="class" data-id="${c.id}">Delete</button></div></div>`).join("")}</div></section>`}
function focus(){const open=openTasks(),sel=timer.id?state.assignments.find(a=>a.id===timer.id):open[0];if(sel&&!timer.id)timer.id=sel.id;return`<section class="card"><div class="head"><div><h3>Fully customizable focus timer</h3><p class="sub">Set any work length, break length, or use quick presets. Defaults save in Settings.</p></div></div><div class="timerMode">${esc(timer.mode)}</div><div class="timerDisplay" id="timerDisplay">${fmt(timer.sec)}</div><div class="grid g2"><div class="field"><label>Work minutes</label><input type="number" id="focusMinutes" min="1" max="180" value="${Math.max(1,Math.round(timer.sec/60)||state.settings.focusMinutes||10)}"></div><div class="field"><label>Break minutes</label><input type="number" id="breakMinutes" min="1" max="90" value="${state.settings.breakMinutes||3}"></div></div><div class="field"><label>Focus assignment</label><select id="timerTask">${open.map(a=>`<option value="${a.id}" ${timer.id===a.id?"selected":""}>${esc(a.title)} — ${esc(cls(a.classId).name)}</option>`).join("")}${!open.length?`<option>No open tasks</option>`:""}</select></div><div class="row"><button class="btn primary" id="applyTimer">Set timer</button><button class="btn amber" id="timerStart">${timer.run?"Pause":"Start"}</button><button class="btn" id="timerReset">Reset</button><button class="btn" data-preset="5">5</button><button class="btn" data-preset="10">10</button><button class="btn" data-preset="15">15</button><button class="btn" data-preset="25">25</button><button class="btn" data-preset="45">45</button></div></section>`}
function email(){const opts=state.classes.map(c=>`<option value="${c.id}">${esc(c.name)} — ${esc(c.teacher||"Teacher")}</option>`).join("");return`<section class="card"><div class="head"><div><h3>Email Coach</h3><p class="sub">Creates a clear teacher email. You can edit before sending.</p></div></div><div class="grid g2"><div><div class="field"><label>Class / teacher</label><select id="mailClass">${opts}</select></div><div class="field"><label>What do you need?</label><textarea id="mailNeed" placeholder="I am stuck on..."></textarea></div><button class="btn primary" id="makeMail">Create email</button> <button class="btn" id="openMail">Open mail app</button></div><div><div class="mailPreview" id="mailPreview">Your draft will appear here.</div></div></div></section>`}
function sync(){return`<section class="card"><div class="head"><div><h3>Google Sync</h3><p class="sub">Optional live Calendar/Classroom sync through Cloudflare Pages Functions.</p></div><button class="btn" id="checkGoogle">Check status</button></div><div id="syncStatus" class="syncBox ${state.google.connected?"connected":""}">${state.google.connected?"Connected"+(state.google.profile?.email?" as "+esc(state.google.profile.email):""):"Not connected or not configured yet."}</div><div class="row" style="margin-top:12px"><a class="btn primary" href="/api/google/login">Connect Google</a><button class="btn" id="syncCalendar">Sync Calendar</button><button class="btn primary" id="syncClassroom">Sync Classroom classes + coursework</button><a class="btn danger" href="/api/google/logout">Disconnect</a></div><div class="grid g2" style="margin-top:14px"><div class="card"><h3>Calendar events</h3>${(state.google.events||[]).map(e=>`<div class="item"><h4>${esc(e.title)}</h4><p>${esc(fmtDate(e.start))}</p></div>`).join("")||`<p class="sub">No synced events yet.</p>`}</div><div class="card"><h3>Classroom coursework</h3>${(state.google.classroomAssignments||[]).slice(0,12).map(a=>`<div class="item"><h4>${esc(a.title)}</h4><p>${esc(a.courseName||"Class")} · ${esc(fmtDate(a.due))}</p><button class="btn" data-import-work="${esc(a.id)}">Import assignment</button></div>`).join("")||`<p class="sub">No synced Classroom items yet.</p>`}</div></div></section>`}
function settings(){return`<section class="card"><div class="head"><div><h3>Settings</h3><p class="sub">Update student info, Gmail, calendar links, timer defaults, homepage layout, and backup data.</p></div></div><div class="grid g2"><div><div class="field"><label>Student name</label><input id="setName" value="${esc(state.settings.studentName)}"></div><div class="field"><label>School</label><input id="setSchool" value="${esc(state.settings.schoolName)}"></div><div class="field"><label>School Gmail address</label><input id="setGmail" value="${esc(state.settings.gmail)}" placeholder="student@gmail.com"></div><div class="grid g2"><div class="field"><label>Default focus minutes</label><input type="number" id="setFocus" min="1" max="180" value="${esc(state.settings.focusMinutes)}"></div><div class="field"><label>Default break minutes</label><input type="number" id="setBreak" min="1" max="90" value="${esc(state.settings.breakMinutes)}"></div></div><div class="field"><label>Google Calendar embed URL or iframe</label><textarea id="setCalEmbed">${esc(state.settings.calendarEmbed)}</textarea></div><div class="field"><label>Calendar normal link optional</label><input id="setCalLink" value="${esc(state.settings.calendarLink)}"></div><button class="btn primary" id="saveSettings">Save settings</button></div><div><div class="note"><strong>Daily behavior:</strong> timed reminders reset once per day, weekly checklist resets each Monday, and homepage layout saves locally. Browser notifications can be added later, but this version keeps it simple and reliable.</div><div class="row" style="margin-top:12px"><button class="btn" id="resetHome">Reset homepage layout</button><button class="btn" id="exportData">Export backup</button><label class="btn">Import backup<input type="file" id="importData" accept="application/json" style="display:none"></label><button class="btn danger" id="resetAll">Reset demo</button></div></div></div></section>`}
function openModal(t,b){$("#modalTitle").textContent=t;$("#modalBody").innerHTML=b;$("#modalBack").classList.add("open")}function closeModal(){$("#modalBack").classList.remove("open");$("#modalBody").innerHTML=""}
function assignmentForm(a={}){return`<div class="field"><label>Title</label><input id="fTitle" value="${esc(a.title||"")}"></div><div class="grid g2"><div class="field"><label>Class</label><select id="fClass">${state.classes.map(c=>`<option value="${c.id}" ${a.classId===c.id?"selected":""}>${esc(c.name)}</option>`).join("")}</select></div><div class="field"><label>Due date</label><input type="date" id="fDue" value="${esc(a.due||iso())}"></div><div class="field"><label>Priority</label><select id="fPri">${["High","Medium","Low"].map(p=>`<option ${a.priority===p?"selected":""}>${p}</option>`).join("")}</select></div><div class="field"><label>Status</label><select id="fStatus">${["Not Started","Started","Need Help","Almost Done","Turned In"].map(s=>`<option ${a.status===s?"selected":""}>${s}</option>`).join("")}</select></div></div><div class="field"><label>Notes</label><textarea id="fNotes">${esc(a.notes||"")}</textarea></div><button class="btn primary" id="saveAssignment" data-id="${a.id||""}">Save assignment</button>`}
function reminderForm(r={}){return`<div class="field"><label>Reminder</label><input id="rText" value="${esc(r.text||"")}"></div><div class="grid g2"><div class="field"><label>Time optional</label><input type="time" id="rTime" value="${esc(r.time||"")}"></div><div class="field"><label>Repeat</label><select id="rRepeat">${["Daily","Weekdays","Weekly","One-time"].map(x=>`<option ${r.repeat===x?"selected":""}>${x}</option>`).join("")}</select></div><div class="field"><label>Day for weekly</label><select id="rDay"><option value="">Any</option>${DAYS.map(d=>`<option ${r.day===d?"selected":""}>${d}</option>`).join("")}</select></div></div><button class="btn primary" id="saveReminder" data-id="${r.id||""}">Save timed reminder</button>`}
function classForm(c={}){return`<div class="field"><label>Class name</label><input id="cName" value="${esc(c.name||"")}"></div><div class="grid g2"><div class="field"><label>Teacher</label><input id="cTeacher" value="${esc(c.teacher||"")}"></div><div class="field"><label>Email</label><input id="cEmail" value="${esc(c.email||"")}"></div><div class="field"><label>Room</label><input id="cRoom" value="${esc(c.room||"")}"></div><div class="field"><label>Color</label><input type="color" id="cColor" value="${esc(c.color||"#16837d")}"></div></div><button class="btn primary" id="saveClass" data-id="${c.id||""}">Save class</button>`}
function bind(){$$("[data-view]").forEach(b=>b.onclick=()=>setView(b.dataset.view));$$("[data-open]").forEach(b=>b.onclick=()=>{const t=b.dataset.open;if(t==="assignment")openModal("Assignment",assignmentForm());if(t==="reminder")openModal("Timed reminder",reminderForm());if(t==="class")openModal("Class",classForm())});$$("[data-edit]").forEach(b=>b.onclick=()=>{const t=b.dataset.edit,id=b.dataset.id;if(t==="assignment")openModal("Edit assignment",assignmentForm(state.assignments.find(x=>x.id===id)));if(t==="reminder")openModal("Edit timed reminder",reminderForm(state.reminders.find(x=>x.id===id)));if(t==="class")openModal("Edit class",classForm(state.classes.find(x=>x.id===id)))});$$("[data-del]").forEach(b=>b.onclick=()=>{const t=b.dataset.del,id=b.dataset.id;if(!confirm("Delete this?"))return;state[t+"s"]=state[t+"s"].filter(x=>x.id!==id);save();toast("Deleted");render()});$$("[data-rem-check]").forEach(x=>x.onchange=()=>{const r=state.reminders.find(r=>r.id===x.dataset.remCheck);if(r){r.done=x.checked;save();render()}});$$("[data-week-check]").forEach(x=>x.onchange=()=>{const [d,id]=x.dataset.weekCheck.split("|");const w=state.weekly[d].find(i=>i.id===id);if(w){w.done=x.checked;save();render()}});$$("[data-week-add]").forEach(b=>b.onclick=()=>{const d=b.dataset.weekAdd,inp=$(`[data-week-input="${d}"]`),text=inp.value.trim();if(!text)return;state.weekly[d].push({id:uid("w"),text,done:false});save();render()});$$("[data-week-del]").forEach(b=>b.onclick=()=>{const [d,id]=b.dataset.weekDel.split("|");state.weekly[d]=state.weekly[d].filter(i=>i.id!==id);save();render()});$$("[data-start]").forEach(b=>b.onclick=()=>{timer.id=b.dataset.start;setView("focus")});$$("[data-move]").forEach(b=>b.onclick=()=>moveCard(...b.dataset.move.split("|")));const tt=$("#timerTask");if(tt)tt.onchange=()=>timer.id=tt.value;const ap=$("#applyTimer");if(ap)ap.onclick=applyTimer;const st=$("#timerStart");if(st)st.onclick=startTimer;const tr=$("#timerReset");if(tr)tr.onclick=()=>{stopTimer();timer.mode="Work";timer.sec=(state.settings.focusMinutes||10)*60;render()};$$("[data-preset]").forEach(b=>b.onclick=()=>{timer.mode="Work";timer.sec=Number(b.dataset.preset)*60;state.settings.focusMinutes=Number(b.dataset.preset);save();render()});const sm=$("#saveSettings");if(sm)sm.onclick=saveSettings;const mm=$("#makeMail");if(mm)mm.onclick=makeMail;const om=$("#openMail");if(om)om.onclick=openMail;const ex=$("#exportData");if(ex)ex.onclick=exportData;const im=$("#importData");if(im)im.onchange=e=>importData(e.target.files[0]);const rs=$("#resetAll");if(rs)rs.onclick=()=>{if(confirm("Reset demo data?")){state=seed();save();render();toast("Reset")}};const rh=$("#resetHome");if(rh)rh.onclick=()=>{state.settings.homeOrder=[...ORDER];save();render();toast("Homepage reset")};const cg=$("#checkGoogle");if(cg)cg.onclick=checkGoogle;const sc=$("#syncCalendar");if(sc)sc.onclick=syncCalendar;const scc=$("#syncClassroom");if(scc)scc.onclick=syncClassroom;const scc2=$("#syncClassroomClasses");if(scc2)scc2.onclick=syncClassroom;$$("[data-import-work]").forEach(b=>b.onclick=()=>importWork(b.dataset.importWork));dragCards()}
function moveCard(k,dir){const a=state.settings.homeOrder,i=a.indexOf(k),j=dir==="up"?i-1:i+1;if(i<0||j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];save();render();toast("Homepage moved")}function dragCards(){let d=null;$$('.homeCard').forEach(c=>{c.ondragstart=()=>{d=c.dataset.card;c.classList.add('dragging')};c.ondragend=()=>c.classList.remove('dragging');c.ondragover=e=>e.preventDefault();c.ondrop=e=>{e.preventDefault();if(!d||d===c.dataset.card)return;const arr=state.settings.homeOrder.filter(x=>x!==d);arr.splice(arr.indexOf(c.dataset.card),0,d);state.settings.homeOrder=arr;save();render()}})}
document.addEventListener("click",e=>{if(e.target.matches("[data-close]"))closeModal();if(e.target.id==="saveAssignment"){const id=e.target.dataset.id,obj={id:id||uid("a"),title:$("#fTitle").value.trim()||"Assignment",classId:$("#fClass").value,due:$("#fDue").value,priority:$("#fPri").value,status:$("#fStatus").value,notes:$("#fNotes").value.trim()};if(id)state.assignments=state.assignments.map(a=>a.id===id?obj:a);else state.assignments.push(obj);save();closeModal();render();toast("Assignment saved")}if(e.target.id==="saveReminder"){const id=e.target.dataset.id,obj={id:id||uid("r"),text:$("#rText").value.trim()||"Reminder",time:$("#rTime").value,repeat:$("#rRepeat").value,day:$("#rDay").value,done:false};if(id)state.reminders=state.reminders.map(r=>r.id===id?{...r,...obj,done:r.done}:r);else state.reminders.push(obj);save();closeModal();render();toast("Timed reminder saved")}if(e.target.id==="saveClass"){const id=e.target.dataset.id,obj={id:id||uid("class"),name:$("#cName").value.trim()||"Class",teacher:$("#cTeacher").value.trim(),email:$("#cEmail").value.trim(),room:$("#cRoom").value.trim(),color:$("#cColor").value,source:id?(state.classes.find(c=>c.id===id)?.source||"Manual"):"Manual"};if(id)state.classes=state.classes.map(c=>c.id===id?{...c,...obj}:c);else state.classes.push(obj);save();closeModal();render();toast("Class saved")}});
function applyTimer(){const mins=Math.max(1,Math.min(180,Number($("#focusMinutes").value)||10)),br=Math.max(1,Math.min(90,Number($("#breakMinutes").value)||3));state.settings.focusMinutes=mins;state.settings.breakMinutes=br;timer.mode="Work";timer.sec=mins*60;save();render();toast("Timer set")}
function saveSettings(){state.settings.studentName=$("#setName").value.trim()||"Noam";state.settings.schoolName=$("#setSchool").value.trim();state.settings.gmail=$("#setGmail").value.trim();state.settings.focusMinutes=Math.max(1,Math.min(180,Number($("#setFocus").value)||10));state.settings.breakMinutes=Math.max(1,Math.min(90,Number($("#setBreak").value)||3));state.settings.calendarEmbed=$("#setCalEmbed").value.trim();state.settings.calendarLink=$("#setCalLink").value.trim();timer.mode="Work";timer.sec=state.settings.focusMinutes*60;save();render();toast("Settings saved")}
function startTimer(){if(timer.run){stopTimer();render();return}timer.run=true;timer._int=setInterval(()=>{timer.sec=Math.max(0,timer.sec-1);const d=$("#timerDisplay");if(d)d.textContent=fmt(timer.sec);if(timer.sec<=0){if(timer.mode==="Work"){state.sessions.push({id:uid("s"),assignmentId:timer.id,minutes:state.settings.focusMinutes,date:iso()});timer.mode="Break";timer.sec=(state.settings.breakMinutes||3)*60;save();toast("Work sprint done — break started")}else{stopTimer();timer.mode="Work";timer.sec=(state.settings.focusMinutes||10)*60;toast("Break complete")}}},1000);render()}function stopTimer(){timer.run=false;clearInterval(timer._int)}function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")}
function makeMail(){const c=cls($("#mailClass").value),need=$("#mailNeed").value.trim()||"the assignment";const text=`Subject: Quick question about class\n\nHi ${c.teacher||"Teacher"},\n\nI am working on my schoolwork and I need help with ${need}. I already tried checking my notes and getting started, but I am still confused.\n\nCould you please help me understand what I should do next?\n\nThank you,\n${state.settings.studentName||"Noam"}`;$("#mailPreview").textContent=text;window.lastMail={to:c.email||"",body:text}}function openMail(){if(!window.lastMail)makeMail();const m=window.lastMail||{};location.href=`mailto:${encodeURIComponent(m.to||state.settings.gmail||"")}?subject=${encodeURIComponent("Quick question about class")}&body=${encodeURIComponent(m.body||"")}`}
async function checkGoogle(){try{const r=await fetch("/api/google/status"),data=await r.json();state.google={...state.google,...data};save();render();toast(data.connected?"Google connected":"Google not connected")}catch{toast("Could not check Google status")}}async function syncCalendar(){try{const r=await fetch("/api/google/calendar"),data=await r.json();if(!r.ok)throw new Error(data.error||"Calendar sync failed");state.google.events=data.events||[];state.google.lastSync=new Date().toISOString();save();render();toast("Calendar synced")}catch(e){toast(e.message||"Calendar sync failed")}}async function syncClassroom(){try{const r=await fetch("/api/google/classroom"),data=await r.json();if(!r.ok)throw new Error(data.error||"Classroom sync failed");state.google.classroomAssignments=data.assignments||[];state.google.lastSync=new Date().toISOString();mergeCourses(data.courses||[]);save();render();toast("Classroom classes synced")}catch(e){toast(e.message||"Classroom sync failed")}}
function mergeCourses(courses){courses.forEach((course,i)=>{let c=state.classes.find(x=>x.googleId===course.id||x.name===course.name);if(c){Object.assign(c,{googleId:course.id,name:course.name,room:course.room||c.room,link:course.link||c.link,source:"Google Classroom"})}else{state.classes.push({id:uid("class"),googleId:course.id,name:course.name,teacher:"",email:"",room:course.room||course.section||"",link:course.link||"",color:["#16837d","#248a55","#bf3d2f","#2f65d5","#df9824"][i%5],source:"Google Classroom"})}})}
function importWork(id){const w=(state.google.classroomAssignments||[]).find(x=>x.id===id);if(!w)return;let c=state.classes.find(x=>x.googleId===w.courseId||x.name===w.courseName);if(!c){c={id:uid("class"),googleId:w.courseId,name:w.courseName||"Google Classroom",teacher:"",email:"",room:"",color:"#2f65d5",source:"Google Classroom"};state.classes.push(c)}state.assignments.push({id:uid("a"),title:w.title,classId:c.id,due:w.due?String(w.due).slice(0,10):"",priority:"Medium",status:"Not Started",notes:w.description||w.link||""});save();render();toast("Imported assignment")}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="noam-school-backup-"+iso()+".json";a.click();URL.revokeObjectURL(a.href)}function importData(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{state=norm(JSON.parse(r.result));save();render();toast("Backup imported")}catch{toast("Could not import file")}};r.readAsText(file)}
setInterval(shell,60000);maint();save();render();checkGoogle();
})();
</script>
</body>
