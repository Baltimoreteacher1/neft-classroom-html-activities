<script>
(function(){
const KEY='noam-school-v9',OLD=['noam-school-v8','noam-school-v7','noam-school-v6','noam-school-v5','noam-school-v4'],DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'],ORDER=['syncStatus','launch','schedule','today','calendar','reminders','week','google','onDeck','wins'];
const $=(s,c=document)=>c.querySelector(s),$$=(s,c=document)=>Array.from(c.querySelectorAll(s));
const uid=p=>p+'_'+Math.random().toString(36).slice(2,8)+'_'+Date.now().toString(36);const esc=v=>String(v??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]));
function iso(off=0){const d=new Date();d.setHours(12,0,0,0);d.setDate(d.getDate()+off);return d.toISOString().slice(0,10)}function todayName(){return new Date().toLocaleDateString(undefined,{weekday:'long'})}function dObj(v){const d=new Date((v||iso())+'T12:00:00');return isNaN(d)?new Date():d}function days(v){return Math.round((dObj(v)-dObj(iso()))/86400000)}
function due(v){if(!v)return'No due date';const n=days(v);if(n<0)return Math.abs(n)+'d late';if(n===0)return'Today';if(n===1)return'Tomorrow';if(n<7)return'In '+n+' days';return dObj(v).toLocaleDateString(undefined,{month:'short',day:'numeric'})}
function timeLabel(t){if(!t)return'Any time';const [h,m]=t.split(':').map(Number);const d=new Date();d.setHours(h||0,m||0,0,0);return d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})}function timeSort(t){return t?Number(t.replace(':','')):9999}function minNow(t){if(!t)return 99999;const [h,m]=t.split(':').map(Number),now=new Date(),d=new Date();d.setHours(h||0,m||0,0,0);return Math.round((d-now)/60000)}function weekKey(){const d=dObj(iso()),day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d.toISOString().slice(0,10)}
function seed(){const m=uid('class'),s=uid('class'),e=uid('class'),h=uid('class');return{settings:{studentName:'Noam',schoolName:'Krieger Schechter Day School',gmail:'',calendarEmbed:'',calendarLink:'',lastDailyReset:'',lastWeeklyReset:'',lastOpened:'',lastAutoSyncDate:'',homeOrder:[...ORDER],focusMinutes:10,breakMinutes:3},daily:{date:iso(),launchDone:false,topGoal:'',packed:false,checkedClassroom:false,selectedTask:''},google:{configured:false,connected:false,profile:null,events:[],classroomAssignments:[],lastSync:'',lastSyncStatus:'Not synced yet',lastSyncErrors:[]},classes:[{id:m,name:'Math',teacher:'Math Teacher',email:'',room:'',color:'#147c78',source:'Manual'},{id:s,name:'Science',teacher:'Science Teacher',email:'',room:'',color:'#248a55',source:'Manual'},{id:e,name:'English / ELA',teacher:'ELA Teacher',email:'',room:'',color:'#b84234',source:'Manual'},{id:h,name:'Hebrew / Judaics',teacher:'Hebrew Teacher',email:'',room:'',color:'#2f65d5',source:'Manual'}],schedule:{Monday:[{id:uid('sch'),start:'08:15',end:'09:00',title:'Homeroom / Advisory',location:'School',classId:'',notes:'Get ready for the day'},{id:uid('sch'),start:'09:00',end:'09:45',title:'Math',location:'',classId:m,notes:''},{id:uid('sch'),start:'09:50',end:'10:35',title:'Science',location:'',classId:s,notes:''}],Tuesday:[],Wednesday:[],Thursday:[],Friday:[],Saturday:[],Sunday:[]},assignments:[{id:uid('a'),title:'Ratios practice set',classId:m,due:iso(),priority:'High',status:'Started',notes:'Finish selected problems and check answers.',created:iso()},{id:uid('a'),title:'Reading response paragraph',classId:e,due:iso(1),priority:'Medium',status:'Not Started',notes:'Use one quote from the chapter.',created:iso()}],reminders:[{id:uid('r'),text:'Check Google Classroom / planner',time:'16:00',repeat:'Daily',day:'',done:false},{id:uid('r'),text:'Charge Chromebook',time:'20:30',repeat:'Daily',day:'',done:false},{id:uid('r'),text:'Pack bag for tomorrow',time:'20:45',repeat:'Weekdays',day:'',done:false}],weekly:{Monday:[{id:uid('w'),text:'Check every class page',done:false},{id:uid('w'),text:'Write this week due dates',done:false}],Tuesday:[{id:uid('w'),text:'Update assignment statuses',done:false}],Wednesday:[{id:uid('w'),text:'Midweek backpack cleanout',done:false}],Thursday:[{id:uid('w'),text:'Ask for help before Friday',done:false}],Friday:[{id:uid('w'),text:'Turn in missing work',done:false}],Saturday:[{id:uid('w'),text:'10-minute school reset',done:false}],Sunday:[{id:uid('w'),text:'Pack Chromebook and materials',done:false},{id:uid('w'),text:'Preview Monday schedule',done:false}]},sessions:[],wins:[]}}
function norm(x){const b=seed();x=x||b;let order=x.settings?.homeOrder||ORDER;order=[...order.filter(k=>ORDER.includes(k)),...ORDER.filter(k=>!order.includes(k))];const sched=x.schedule||b.schedule;DAYS.forEach(d=>{if(!Array.isArray(sched[d]))sched[d]=[]});return{settings:{...b.settings,...(x.settings||{}),...(x.profile?{studentName:x.profile.studentName,schoolName:x.profile.schoolName}:{}),homeOrder:order,focusMinutes:Number(x.settings?.focusMinutes||10),breakMinutes:Number(x.settings?.breakMinutes||3)},daily:{...b.daily,...(x.daily||{})},google:{...b.google,...(x.google||{})},classes:Array.isArray(x.classes)?x.classes:b.classes,schedule:sched,assignments:Array.isArray(x.assignments)?x.assignments.map(a=>({id:a.id||uid('a'),googleId:a.googleId||'',title:a.title||'Assignment',classId:a.classId||'',due:a.due||a.dueDate||'',priority:a.priority||'Medium',status:a.status||'Not Started',notes:a.notes||a.description||'',created:a.created||iso(),source:a.source||'Manual'})):b.assignments,reminders:Array.isArray(x.reminders)?x.reminders.map(r=>({id:r.id||uid('r'),text:r.text||r.title||'Reminder',time:r.time||'',repeat:r.repeat||'Daily',day:r.day||'',done:!!r.done||!!r.completed})):b.reminders,weekly:x.weekly||b.weekly,sessions:Array.isArray(x.sessions)?x.sessions:[],wins:Array.isArray(x.wins)?x.wins:[]}}
function load(){try{let raw=localStorage.getItem(KEY);if(!raw)for(const k of OLD){raw=localStorage.getItem(k);if(raw)break}return norm(JSON.parse(raw))}catch{return seed()}}let state=load(),view='home',timer={sec:(state.settings.focusMinutes||10)*60,run:false,id:null,mode:'Work'};function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function maint(){let ch=false;if(state.settings.lastDailyReset!==iso()){state.reminders.forEach(r=>{if(r.repeat==='Daily'||r.repeat==='Weekdays')r.done=false});state.daily={...state.daily,date:iso(),launchDone:false,packed:false,checkedClassroom:false,selectedTask:''};state.settings.lastDailyReset=iso();ch=true}const wk=weekKey();if(state.settings.lastWeeklyReset!==wk){DAYS.forEach(d=>(state.weekly[d]||[]).forEach(i=>i.done=false));state.settings.lastWeeklyReset=wk;ch=true}if(state.settings.lastOpened!==iso()){state.settings.lastOpened=iso();ch=true}if(ch)save()}
function cls(id){return state.classes.find(c=>c.id===id)||{name:'Class',color:'#147c78',teacher:'',email:''}}function openTasks(){return state.assignments.filter(a=>a.status!=='Turned In').sort((a,b)=>days(a.due)-days(b.due))}function activeRem(){return state.reminders.filter(r=>!r.done&&isReminderActiveToday(r)).sort((a,b)=>timeSort(a.time)-timeSort(b.time))}function isReminderActiveToday(r){const d=todayName();if(r.repeat==='Weekly')return !r.day||r.day===d;if(r.repeat==='Weekdays')return !['Saturday','Sunday'].includes(d);return true}function todaySchedule(){return (state.schedule[todayName()]||[]).slice().sort((a,b)=>timeSort(a.start)-timeSort(b.start))}
function currentSchedule(){const list=todaySchedule(),now=new Date(),nowNum=now.getHours()*60+now.getMinutes();let cur=null,next=null;for(const s of list){const [sh,sm]=(s.start||'00:00').split(':').map(Number),[eh,em]=(s.end||s.start||'00:00').split(':').map(Number),st=sh*60+sm,en=eh*60+em;if(nowNum>=st&&nowNum<en)cur=s;if(nowNum<st&&!next)next=s}return{cur,next}}
function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(el.t);el.t=setTimeout(()=>el.classList.remove('show'),2200)}function setView(v){view=v;$$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.view===v));render()}
function shell(){const d=new Date();$('#todayLabel').textContent=d.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});$('#brandTitle').textContent=(state.settings.studentName||'Noam')+' School';$('#brandSub').textContent=(state.settings.schoolName||'Daily Dugout')+' · auto-updating daily command center';const open=openTasks(),today=open.filter(a=>days(a.due)===0),rem=activeRem(),sch=todaySchedule().length;$('#statOpen').textContent=open.length;$('#statToday').textContent=today.length;$('#statRem').textContent=rem.length;$('#statSched').textContent=sch;const {cur,next}=currentSchedule(),task=open[0],nextRem=rem[0];$('#coachText').innerHTML=cur?`Right now: <strong>${esc(cur.title)}</strong>${cur.location?' in '+esc(cur.location):''}. Next: ${next?esc(next.title)+' at '+esc(timeLabel(next.start)):'no more schedule blocks today'}.`:state.daily.topGoal?`Today's goal: <strong>${esc(state.daily.topGoal)}</strong>. Last sync: ${esc(syncLabel())}.`:task?`Best first task: <strong>${esc(task.title)}</strong> for ${esc(cls(task.classId).name)} is ${esc(due(task.due))}.`:nextRem?`Next reminder: <strong>${esc(nextRem.text)}</strong> at ${esc(timeLabel(nextRem.time))}.`:'You are caught up. Check the schedule, calendar, or add the next assignment.';const g=state.settings.gmail;$('#gmailHero').href=g?`mailto:${encodeURIComponent(g)}`:'https://mail.google.com/';$('#gmailHero').textContent=g?'✉️ Email '+g:'✉️ Open Gmail'}
function render(){maint();shell();const pages={home,today,schedule,reminders,assignments,classes,focus,email,sync,settings};$('#app').innerHTML=(pages[view]||home)();bind()}
function card(k,t,s,b){const order=state.settings.homeOrder,i=order.indexOf(k);return`<section class='card homeCard' draggable='true' data-card='${k}'><div class='head'><div><h3>${t}</h3><p class='sub'>${s}</p></div><div class='homeControls'><button class='btn moveBtn' data-move='${k}|up' ${i===0?'disabled':''}>↑</button><button class='btn moveBtn' data-move='${k}|down' ${i===order.length-1?'disabled':''}>↓</button></div></div>${b}</section>`}
function syncLabel(){if(!state.google.lastSync)return state.google.lastSyncStatus||'Not synced yet';const d=new Date(state.google.lastSync);return isNaN(d)?state.google.lastSync:d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}
function syncCard(){return`<div class='syncBox ${state.google.connected?'connected':''}'><strong>${state.google.lastSyncStatus||'Auto-sync ready'}</strong><p class='sub'>Last updated: ${esc(syncLabel())}. The page runs one daily Google refresh when opened and can be refreshed manually.</p>${(state.google.lastSyncErrors||[]).length?`<p class='sub'>Warnings: ${state.google.lastSyncErrors.map(e=>esc(e.source+': '+e.message)).join('; ')}</p>`:''}<div class='row'><button class='btn primary' id='refreshNowCard'>↻ Refresh now</button><button class='btn' data-view='sync'>Google Sync</button></div></div>`}
function task(a){const c=cls(a.classId),late=days(a.due)<0;return`<div class='item'><div class='itemTop'><div><h4>${esc(a.title)}</h4><p>${esc(a.notes||'No notes')}</p></div><span class='pill ${late?'red':days(a.due)===0?'amber':''}'>${esc(due(a.due))}</span></div><div class='row' style='margin-top:9px'><span class='pill' style='background:${c.color}22;color:${c.color}'>${esc(c.name)}</span><span class='pill'>${esc(a.priority)}</span><span class='pill'>${esc(a.status)}</span>${a.source==='Google Classroom'?`<span class='pill blue'>Google</span>`:''}<button class='btn' data-edit='assignment' data-id='${a.id}'>Edit</button><button class='btn amber' data-start='${a.id}'>Focus</button><button class='btn danger' data-del='assignment' data-id='${a.id}'>Delete</button></div></div>`}
function schedItem(s,showDay=false){const {cur,next}=currentSchedule(),isCur=cur&&cur.id===s.id,isNext=next&&next.id===s.id,c=cls(s.classId);return`<div class='item ${isCur?'current':isNext?'next':''}'><div class='itemTop'><div><h4>${esc(s.title)}</h4><p><strong>${esc(timeLabel(s.start))}</strong>${s.end?'–'+esc(timeLabel(s.end)):''}${s.location?' · '+esc(s.location):''}${showDay?' · '+esc(s.day||''):''}</p>${s.notes?`<p>${esc(s.notes)}</p>`:''}</div><span class='pill ${isCur?'green':isNext?'amber':''}'>${isCur?'Now':isNext?'Next':esc(c.name)}</span></div><div class='row' style='margin-top:9px'><button class='btn' data-edit='schedule' data-id='${s.id}' data-day='${s.day||todayName()}'>Edit</button><button class='btn danger' data-del='schedule' data-id='${s.id}' data-day='${s.day||todayName()}'>Delete</button></div></div>`}
function home(){const open=openTasks(),dueToday=open.filter(a=>days(a.due)===0),soon=open.filter(a=>days(a.due)>0&&days(a.due)<=7),rem=activeRem(),tn=todayName(),sch=todaySchedule().map(s=>({...s,day:tn}));const map={syncStatus:card('syncStatus','Daily update status','Automatic sync runs once per day when opened.',syncCard()),launch:card('launch','Daily Launch','Set the day in under one minute.',dailyLaunchMini()),schedule:card('schedule','Today schedule','See current and upcoming schedule blocks.',(sch.length?sch.slice(0,5).map(schedItem).join(''):`<div class='note'>No schedule set for ${tn} yet.</div>`)+`<div class='row' style='margin-top:10px'><button class='btn primary' data-open='schedule'>＋ Schedule block</button><button class='btn' data-view='schedule'>Full schedule</button></div>`),today:card('today','Today work','Due-today work and the fastest next step.',dueToday.length?dueToday.map(task).join(''):`<div class='note'>No assignments due today.</div><div class='row' style='margin-top:10px'><button class='btn primary' data-open='assignment'>＋ Add assignment</button></div>`),calendar:card('calendar','Calendar','Embed a public calendar or use Google Sync.',calendarHtml()),reminders:card('reminders','Timed reminders','Reminders include optional times and sort by time.',(rem.slice(0,6).map(remRow).join('')||`<div class='note'>All reminders checked off.</div>`)+`<div class='row' style='margin-top:10px'><button class='btn primary' data-open='reminder'>＋ Timed reminder</button><button class='btn' data-view='reminders'>Full reminders</button></div>`),week:card('week',tn+' checklist','Part of the Monday–Sunday weekly checklist.',((state.weekly[tn]||[]).map(w=>weekRow(w,tn)).join('')||`<div class='note'>No checklist items for ${tn}.</div>`)+`<div class='row' style='margin-top:10px'><button class='btn' data-view='reminders'>Open full week</button></div>`),google:card('google','Google Classroom + Calendar','Sync Classroom courses into Classes and import coursework.',googleMini()),onDeck:card('onDeck','On deck','Assignments coming up this week.',soon.length?soon.map(task).join(''):`<div class='note'>Nothing due in the next week.</div>`),wins:card('wins','Wins + streak','Make it feel good to use daily.',winsMini())};return`<div class='note' style='margin-top:14px'><strong>Daily flow:</strong> the page resets daily, auto-syncs once per day when opened, checks schedule/reminders, and keeps the dashboard fresh. Use Refresh now whenever needed.</div><div class='homeGrid'>${state.settings.homeOrder.map(k=>`<div>${map[k]||''}</div>`).join('')}</div>`}
function dailyLaunchMini(){const pct=[state.daily.launchDone,state.daily.checkedClassroom,state.daily.packed,Boolean(state.daily.topGoal)].filter(Boolean).length/4*100;return`<div class='progress'><span style='width:${pct}%'></span></div><div class='row' style='margin-top:12px'><span class='pill ${state.daily.launchDone?'green':'amber'}'>${state.daily.launchDone?'Launched':'Not launched'}</span><span class='pill ${state.daily.checkedClassroom?'green':''}'>Classroom</span><span class='pill ${state.daily.packed?'green':''}'>Packed</span></div><p class='sub' style='margin-top:10px'>${state.daily.topGoal?'Goal: '+esc(state.daily.topGoal):'No top goal set yet.'}</p><div class='row'><button class='btn primary' data-view='today'>Open Today Plan</button><button class='btn' data-open='quickPlan'>Quick launch</button></div>`}
function winsMini(){const todayWins=state.wins.filter(w=>w.date===iso()).length;return`<div class='grid g2'><div class='item'><h4>${todayWins}</h4><p>wins logged today</p></div><div class='item'><h4>${state.sessions.filter(s=>s.date===iso()).length}</h4><p>focus sprints today</p></div></div><div class='row'><button class='btn primary' data-open='win'>＋ Log win</button></div>`}
function today(){const open=openTasks(),rem=activeRem(),sch=todaySchedule().map(s=>({...s,day:todayName()}));return`<section class='card'><div class='head'><div><h3>Today Plan</h3><p class='sub'>A simple daily routine so the page stays useful every day.</p></div><button class='btn primary' data-open='quickPlan'>☀️ Quick Launch</button></div><div class='grid g2'><div><div class='field'><label>Top goal today</label><input id='goalInput' value='${esc(state.daily.topGoal)}' placeholder='Example: finish math and pack bag'></div><label class='check'><input type='checkbox' id='launchDone' ${state.daily.launchDone?'checked':''}><span class='mainText'>Daily launch done</span></label><label class='check'><input type='checkbox' id='checkedClassroom' ${state.daily.checkedClassroom?'checked':''}><span class='mainText'>Checked Classroom</span></label><label class='check'><input type='checkbox' id='packed' ${state.daily.packed?'checked':''}><span class='mainText'>Bag / Chromebook ready</span></label><button class='btn primary' id='saveToday'>Save Today Plan</button></div><div><h3>Today's schedule</h3>${sch.slice(0,4).map(schedItem).join('')||`<div class='note'>No schedule set for today.</div>`}<h3>Suggested work</h3>${open.slice(0,2).map(task).join('')||`<div class='note'>No open tasks.</div>`}${rem.slice(0,2).map(remRow).join('')}</div></div></section>`}
function schedule(){return`<section class='card'><div class='head'><div><h3>Daily Schedule</h3><p class='sub'>Add his school schedule so he can quickly see where he should be and what comes next.</p></div><button class='btn primary' data-open='schedule'>＋ Add schedule block</button></div><div class='note'>Today is <strong>${todayName()}</strong>. Current class is highlighted green; next class is highlighted yellow.</div><div class='grid g2' style='margin-top:14px'>${DAYS.map(day=>`<div class='card'><div class='head'><div><h3>${day}</h3><p class='sub'>${(state.schedule[day]||[]).length} blocks</p></div><button class='btn' data-open='schedule' data-day='${day}'>＋</button></div>${(state.schedule[day]||[]).slice().sort((a,b)=>timeSort(a.start)-timeSort(b.start)).map(s=>schedItem({...s,day},true)).join('')||`<div class='note'>No schedule set.</div>`}</div>`).join('')}</div></section>`}
function calendarHtml(){const src=extractCal(state.settings.calendarEmbed);if(src)return`<div class='calendarBox' style='padding:0'><iframe src='${esc(src)}' loading='lazy'></iframe></div>`;if(state.google.events?.length)return state.google.events.slice(0,6).map(e=>`<div class='item'><h4>${esc(e.title)}</h4><p>${esc(fmtDate(e.start))}</p>${e.link?`<a class='btn' target='_blank' rel='noopener' href='${esc(e.link)}'>Open</a>`:''}</div>`).join('');return`<div class='calendarBox'><div><h3>No calendar connected yet</h3><p class='sub'>Paste an embed in Settings or connect Google Sync.</p><button class='btn primary' data-view='settings'>Add calendar</button></div></div>`}function extractCal(v){v=(v||'').trim();const m=v.match(/src=['\"]([^'\"]+)['\"]/i);return m?m[1]:v}function fmtDate(v){if(!v)return'No date';const d=new Date(v);return isNaN(d)?v:d.toLocaleString(undefined,{weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'})}

function reminders(){return`<section class='card'><div class='head'><div><h3>Timed Reminders</h3><p class='sub'>Set times, recurrence, and check them off. Items reset daily when appropriate.</p></div><button class='btn primary' data-open='reminder'>＋ Timed reminder</button></div>${state.reminders.slice().sort((a,b)=>timeSort(a.time)-timeSort(b.time)).map(remRow).join('')||`<div class='note'>No reminders yet.</div>`}</section><section class='card' style='margin-top:14px'><div class='head'><div><h3>Monday–Sunday checklist</h3><p class='sub'>Weekly routines reset each Monday.</p></div><span class='pill'>Week of ${weekKey()}</span></div><div class='week'>${DAYS.map(d=>`<div class='day'><h4>${d}</h4>${(state.weekly[d]||[]).map(w=>weekRow(w,d)).join('')||`<p class='sub'>No items.</p>`}<div class='miniInput'><input placeholder='Add item' data-week-input='${d}'><button class='btn primary' data-week-add='${d}'>＋</button></div></div>`).join('')}</div></section>`}
function remRow(r){const min=minNow(r.time),urgent=!r.done&&r.time&&min<=30&&min>=0,late=!r.done&&r.time&&min<0;return`<label class='check ${r.done?'done':''}'><input type='checkbox' data-rem-check='${r.id}' ${r.done?'checked':''}><span class='mainText' style='flex:1'><strong>${esc(timeLabel(r.time))}</strong> — ${esc(r.text)} <span class='pill ${urgent?'amber':late?'red':'blue'}'>${late?'Past time':urgent?'Soon':esc(r.repeat)}</span></span><button type='button' class='btn' data-edit='reminder' data-id='${r.id}'>Edit</button><button type='button' class='btn danger' data-del='reminder' data-id='${r.id}'>Delete</button></label>`}

function quickPlanForm(){return`<div class='field'><label>Top goal today</label><input id='qpGoal' value='${esc(state.daily.topGoal)}' placeholder='Example: finish math and pack bag'></div><div class='field'><label>Choose first task</label><select id='qpTask'><option value=''>None</option>${openTasks().map(a=>`<option value='${a.id}' ${state.daily.selectedTask===a.id?'selected':''}>${esc(a.title)}</option>`).join('')}</select></div><label class='check'><input type='checkbox' id='qpClassroom' ${state.daily.checkedClassroom?'checked':''}><span class='mainText'>Checked Google Classroom / planner</span></label><label class='check'><input type='checkbox' id='qpPacked' ${state.daily.packed?'checked':''}><span class='mainText'>Bag / Chromebook ready</span></label><button class='btn primary' id='saveQuickPlan'>Save Daily Launch</button>`}
function winForm(){return`<div class='field'><label>What went well?</label><input id='winText' placeholder='Example: finished math sprint'></div><button class='btn primary' id='saveWin'>Save win</button>`}
function bind(){$$('[data-view]').forEach(b=>b.onclick=()=>setView(b.dataset.view));$$('[data-open]').forEach(b=>b.onclick=()=>{const t=b.dataset.open;if(t==='assignment')openModal('Assignment',assignmentForm());if(t==='reminder')openModal('Timed reminder',reminderForm());if(t==='class')openModal('Class',classForm());if(t==='schedule')openModal('Schedule block',scheduleForm({},b.dataset.day||todayName()));if(t==='quickPlan')openModal('Daily Launch',quickPlanForm());if(t==='win')openModal('Log a win',winForm())});$$('[data-edit]').forEach(b=>b.onclick=()=>{const t=b.dataset.edit,id=b.dataset.id;if(t==='assignment')openModal('Edit assignment',assignmentForm(state.assignments.find(x=>x.id===id)));if(t==='reminder')openModal('Edit timed reminder',reminderForm(state.reminders.find(x=>x.id===id)));if(t==='class')openModal('Edit class',classForm(state.classes.find(x=>x.id===id)));if(t==='schedule'){const day=b.dataset.day,s=(state.schedule[day]||[]).find(x=>x.id===id);openModal('Edit schedule block',scheduleForm(s,day))}});$$('[data-del]').forEach(b=>b.onclick=()=>{if(!confirm('Delete this?'))return;const t=b.dataset.del,id=b.dataset.id;if(t==='schedule'){const d=b.dataset.day;state.schedule[d]=state.schedule[d].filter(x=>x.id!==id)}else state[t+'s']=state[t+'s'].filter(x=>x.id!==id);save();toast('Deleted');render()});$$('[data-rem-check]').forEach(x=>x.onchange=()=>{const r=state.reminders.find(r=>r.id===x.dataset.remCheck);if(r){r.done=x.checked;save();render()}});$$('[data-week-check]').forEach(x=>x.onchange=()=>{const [d,id]=x.dataset.weekCheck.split('|');const w=state.weekly[d].find(i=>i.id===id);if(w){w.done=x.checked;save();render()}});$$('[data-week-add]').forEach(b=>b.onclick=()=>{const d=b.dataset.weekAdd,inp=$(`[data-week-input='${d}']`),text=inp.value.trim();if(!text)return;state.weekly[d].push({id:uid('w'),text,done:false});save();render()});$$('[data-week-del]').forEach(b=>b.onclick=()=>{const [d,id]=b.dataset.weekDel.split('|');state.weekly[d]=state.weekly[d].filter(i=>i.id!==id);save();render()});$$('[data-start]').forEach(b=>b.onclick=()=>{timer.id=b.dataset.start;setView('focus')});$$('[data-move]').forEach(b=>b.onclick=()=>moveCard(...b.dataset.move.split('|')));const tt=$('#timerTask');if(tt)tt.onchange=()=>timer.id=tt.value;const ap=$('#applyTimer');if(ap)ap.onclick=applyTimer;const st=$('#timerStart');if(st)st.onclick=startTimer;const tr=$('#timerReset');if(tr)tr.onclick=()=>{stopTimer();timer.mode='Work';timer.sec=(state.settings.focusMinutes||10)*60;render()};$$('[data-preset]').forEach(b=>b.onclick=()=>{timer.mode='Work';timer.sec=Number(b.dataset.preset)*60;state.settings.focusMinutes=Number(b.dataset.preset);save();render()});const saveToday=$('#saveToday');if(saveToday)saveToday.onclick=saveTodayPlan;const sm=$('#saveSettings');if(sm)sm.onclick=saveSettings;const mm=$('#makeMail');if(mm)mm.onclick=makeMail;const om=$('#openMail');if(om)om.onclick=openMail;const ex=$('#exportData');if(ex)ex.onclick=exportData;const im=$('#importData');if(im)im.onchange=e=>importData(e.target.files[0]);const rs=$('#resetAll');if(rs)rs.onclick=()=>{if(confirm('Reset demo data?')){state=seed();save();render();toast('Reset')}};const rh=$('#resetHome');if(rh)rh.onclick=()=>{state.settings.homeOrder=[...ORDER];save();render();toast('Homepage reset')};const cg=$('#checkGoogle');if(cg)cg.onclick=checkGoogle;const sc=$('#syncCalendar');if(sc)sc.onclick=syncCalendar;const scc=$('#syncClassroom');if(scc)scc.onclick=syncClassroom;const ds=$('#dailySync');if(ds)ds.onclick=()=>dailySync(true);const rf=$('#refreshNow');if(rf)rf.onclick=()=>dailySync(true);const rfc=$('#refreshNowCard');if(rfc)rfc.onclick=()=>dailySync(true);const scc2=$('#syncClassroomClasses');if(scc2)scc2.onclick=syncClassroom;$$('[data-import-work]').forEach(b=>b.onclick=()=>importWork(b.dataset.importWork));dragCards()}
function moveCard(k,dir){const a=state.settings.homeOrder,i=a.indexOf(k),j=dir==='up'?i-1:i+1;if(i<0||j<0||j>=a.length)return;[a[i],a[j]]=[a[j],a[i]];save();render();toast('Homepage moved')}function dragCards(){let d=null;$$('.homeCard').forEach(c=>{c.ondragstart=()=>{d=c.dataset.card;c.classList.add('dragging')};c.ondragend=()=>c.classList.remove('dragging');c.ondragover=e=>e.preventDefault();c.ondrop=e=>{e.preventDefault();if(!d||d===c.dataset.card)return;const arr=state.settings.homeOrder.filter(x=>x!==d);arr.splice(arr.indexOf(c.dataset.card),0,d);state.settings.homeOrder=arr;save();render()}})}
document.addEventListener('click',e=>{if(e.target.matches('[data-close]'))closeModal();if(e.target.id==='saveAssignment'){const id=e.target.dataset.id,obj={id:id||uid('a'),title:$('#fTitle').value.trim()||'Assignment',classId:$('#fClass').value,due:$('#fDue').value,priority:$('#fPri').value,status:$('#fStatus').value,notes:$('#fNotes').value.trim(),created:iso()};if(id)state.assignments=state.assignments.map(a=>a.id===id?{...a,...obj}:a);else state.assignments.push(obj);save();closeModal();render();toast('Assignment saved')}if(e.target.id==='saveReminder'){const id=e.target.dataset.id,obj={id:id||uid('r'),text:$('#rText').value.trim()||'Reminder',time:$('#rTime').value,repeat:$('#rRepeat').value,day:$('#rDay').value,done:false};if(id)state.reminders=state.reminders.map(r=>r.id===id?{...r,...obj,done:r.done}:r);else state.reminders.push(obj);save();closeModal();render();toast('Timed reminder saved')}if(e.target.id==='saveClass'){const id=e.target.dataset.id,obj={id:id||uid('class'),name:$('#cName').value.trim()||'Class',teacher:$('#cTeacher').value.trim(),email:$('#cEmail').value.trim(),room:$('#cRoom').value.trim(),color:$('#cColor').value,source:id?(state.classes.find(c=>c.id===id)?.source||'Manual'):'Manual'};if(id)state.classes=state.classes.map(c=>c.id===id?{...c,...obj}:c);else state.classes.push(obj);save();closeModal();render();toast('Class saved')}if(e.target.id==='saveSchedule'){const orig=e.target.dataset.originalDay,day=$('#sDay').value,id=e.target.dataset.id,obj={id:id||uid('sch'),start:$('#sStart').value,end:$('#sEnd').value,title:$('#sTitle').value.trim()||'Schedule block',location:$('#sLocation').value.trim(),classId:$('#sClass').value,notes:$('#sNotes').value.trim()};if(id){state.schedule[orig]=state.schedule[orig].filter(s=>s.id!==id);state.schedule[day].push(obj)}else state.schedule[day].push(obj);save();closeModal();render();toast('Schedule saved')}if(e.target.id==='saveQuickPlan'){state.daily.topGoal=$('#qpGoal').value.trim();state.daily.selectedTask=$('#qpTask').value;state.daily.checkedClassroom=$('#qpClassroom').checked;state.daily.packed=$('#qpPacked').checked;state.daily.launchDone=true;save();closeModal();render();toast('Daily Launch saved')}if(e.target.id==='saveWin'){const text=$('#winText').value.trim();if(text)state.wins.push({id:uid('win'),date:iso(),text});save();closeModal();render();toast('Win saved')}});
function saveTodayPlan(){state.daily.topGoal=$('#goalInput').value.trim();state.daily.launchDone=$('#launchDone').checked;state.daily.checkedClassroom=$('#checkedClassroom').checked;state.daily.packed=$('#packed').checked;save();render();toast('Today Plan saved')}
function applyTimer(){const mins=Math.max(1,Math.min(180,Number($('#focusMinutes').value)||10)),br=Math.max(1,Math.min(90,Number($('#breakMinutes').value)||3));state.settings.focusMinutes=mins;state.settings.breakMinutes=br;timer.mode='Work';timer.sec=mins*60;save();render();toast('Timer set')}
function saveSettings(){state.settings.studentName=$('#setName').value.trim()||'Noam';state.settings.schoolName=$('#setSchool').value.trim();state.settings.gmail=$('#setGmail').value.trim();state.settings.focusMinutes=Math.max(1,Math.min(180,Number($('#setFocus').value)||10));state.settings.breakMinutes=Math.max(1,Math.min(90,Number($('#setBreak').value)||3));state.settings.calendarEmbed=$('#setCalEmbed').value.trim();state.settings.calendarLink=$('#setCalLink').value.trim();timer.mode='Work';timer.sec=state.settings.focusMinutes*60;save();render();toast('Settings saved')}
function startTimer(){if(timer.run){stopTimer();render();return}timer.run=true;timer._int=setInterval(()=>{timer.sec=Math.max(0,timer.sec-1);const d=$('#timerDisplay');if(d)d.textContent=fmt(timer.sec);if(timer.sec<=0){if(timer.mode==='Work'){state.sessions.push({id:uid('s'),assignmentId:timer.id,minutes:state.settings.focusMinutes,date:iso()});timer.mode='Break';timer.sec=(state.settings.breakMinutes||3)*60;save();toast('Work sprint done — break started')}else{stopTimer();timer.mode='Work';timer.sec=(state.settings.focusMinutes||10)*60;toast('Break complete')}}},1000);render()}function stopTimer(){timer.run=false;clearInterval(timer._int)}function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function makeMail(){const c=cls($('#mailClass').value),need=$('#mailNeed').value.trim()||'the assignment';const text=`Subject: Quick question about class\n\nHi ${c.teacher||'Teacher'},\n\nI am working on my schoolwork and I need help with ${need}. I already tried checking my notes and getting started, but I am still confused.\n\nCould you please help me understand what I should do next?\n\nThank you,\n${state.settings.studentName||'Noam'}`;$('#mailPreview').textContent=text;window.lastMail={to:c.email||'',body:text}}function openMail(){if(!window.lastMail)makeMail();const m=window.lastMail||{};location.href=`mailto:${encodeURIComponent(m.to||state.settings.gmail||'')}?subject=${encodeURIComponent('Quick question about class')}&body=${encodeURIComponent(m.body||'')}`}
async function checkGoogle(){try{const r=await fetch('/api/google/status'),data=await r.json();state.google={...state.google,...data,lastSyncStatus:data.connected?'Google connected':'Google not connected'};save();render();toast(data.connected?'Google connected':'Google not connected')}catch{toast('Could not check Google status')}}
async function dailySync(force=false){if(!force&&state.settings.lastAutoSyncDate===iso())return;state.google.lastSyncStatus='Syncing...';save();render();try{const r=await fetch('/api/google/daily-sync');const data=await r.json();if(!r.ok)throw new Error(data.error||'Daily sync failed');state.google.events=data.events||[];state.google.classroomAssignments=data.assignments||[];state.google.lastSync=data.synced_at||new Date().toISOString();state.google.lastSyncErrors=data.errors||[];state.google.lastSyncStatus=(data.errors&&data.errors.length)?'Updated with warnings':'Updated today';mergeCourses(data.courses||[]);autoSuggestClassroomAssignments(data.assignments||[]);state.settings.lastAutoSyncDate=iso();save();render();toast('Daily sync complete')}catch(e){state.google.lastSyncStatus=e.message||'Daily sync failed';save();render();if(force)toast(state.google.lastSyncStatus)}}
async function syncCalendar(){try{const r=await fetch('/api/google/calendar'),data=await r.json();if(!r.ok)throw new Error(data.error||'Calendar sync failed');state.google.events=data.events||[];state.google.lastSync=new Date().toISOString();state.google.lastSyncStatus='Calendar updated';save();render();toast('Calendar synced')}catch(e){toast(e.message||'Calendar sync failed')}}async function syncClassroom(){try{const r=await fetch('/api/google/classroom'),data=await r.json();if(!r.ok)throw new Error(data.error||'Classroom sync failed');state.google.classroomAssignments=data.assignments||[];state.google.lastSync=new Date().toISOString();state.google.lastSyncStatus='Classroom updated';mergeCourses(data.courses||[]);autoSuggestClassroomAssignments(data.assignments||[]);save();render();toast('Classroom synced')}catch(e){toast(e.message||'Classroom sync failed')}}
function mergeCourses(courses){courses.forEach((course,i)=>{let c=state.classes.find(x=>x.googleId===course.id||x.name===course.name);if(c){Object.assign(c,{googleId:course.id,name:course.name,room:course.room||c.room,link:course.link||c.link,source:'Google Classroom'})}else{state.classes.push({id:uid('class'),googleId:course.id,name:course.name,teacher:'',email:'',room:course.room||course.section||'',link:course.link||'',color:['#147c78','#248a55','#b84234','#2f65d5','#d99028'][i%5],source:'Google Classroom'})}})}function autoSuggestClassroomAssignments(items){items.filter(x=>x.type!=='ERROR').slice(0,30).forEach(w=>{if(state.assignments.some(a=>a.googleId===w.id))return;let c=state.classes.find(x=>x.googleId===w.courseId||x.name===w.courseName);if(!c){c={id:uid('class'),googleId:w.courseId,name:w.courseName||'Google Classroom',teacher:'',email:'',room:'',color:'#2f65d5',source:'Google Classroom'};state.classes.push(c)}if(w.due&&days(String(w.due).slice(0,10))<=21){state.assignments.push({id:uid('a'),googleId:w.id,title:w.title,classId:c.id,due:String(w.due).slice(0,10),priority:'Medium',status:'Not Started',notes:w.description||w.link||'',created:iso(),source:'Google Classroom'})}})}function importWork(id){const w=(state.google.classroomAssignments||[]).find(x=>x.id===id);if(!w)return;autoSuggestClassroomAssignments([w]);save();render();toast('Imported assignment')}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='noam-school-backup-'+iso()+'.json';a.click();URL.revokeObjectURL(a.href)}function importData(file){if(!file)return;const r=new FileReader();r.onload=()=>{try{state=norm(JSON.parse(r.result));save();render();toast('Backup imported')}catch{toast('Could not import file')}};r.readAsText(file)}
setInterval(shell,60000);maint();save();render();checkGoogle().then(()=>dailySync(false));
})();
</script>
