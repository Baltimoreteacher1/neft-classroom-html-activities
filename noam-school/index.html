<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Noam School | Daily Dugout v9</title>
    <meta
      name="description"
      content="Noam School Daily Dugout v9: enterprise-grade student command center with Google Classroom sync, smart scheduling, focus timer, keyboard shortcuts, dark mode, notifications, and analytics."
    />
    <meta name="theme-color" content="#16324a" />
    <link
      rel="manifest"
      href='data:application/json,{"name":"Noam School","short_name":"Noam","start_url":".","display":"standalone","theme_color":"#16324a","background_color":"#eef3f1"}'
    />
    <style>
      :root {
        --bg: #eef3f1;
        --bg2: #f7f2e8;
        --paper: #fffdf8;
        --paper2: #f8faf7;
        --ink: #142033;
        --muted: #667085;
        --line: #dce5df;
        --navy: #16324a;
        --navy2: #214866;
        --teal: #147c78;
        --amber: #d99028;
        --red: #b84234;
        --green: #248a55;
        --blue: #2f65d5;
        --softT: #e2f4f2;
        --softA: #fff0d5;
        --softR: #fde8e4;
        --softG: #e7f6ed;
        --softB: #e9efff;
        --shadow: 0 18px 45px rgba(21, 35, 52, 0.12);
        --shadow2: 0 7px 20px rgba(21, 35, 52, 0.07);
        --r: 18px;
        --r2: 30px;
        --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        --focus-ring: 0 0 0 3px rgba(20, 124, 120, 0.35);
      }
      [data-theme="dark"] {
        --bg: #0f1419;
        --bg2: #1a2332;
        --paper: #1e2a3a;
        --paper2: #243447;
        --ink: #e8edf2;
        --muted: #8899aa;
        --line: #2d3f52;
        --navy: #e8edf2;
        --navy2: #b8c8d8;
        --softT: #0d2a28;
        --softA: #2a2010;
        --softR: #2a1410;
        --softG: #0d2a18;
        --softB: #101a2a;
        --shadow: 0 18px 45px rgba(0, 0, 0, 0.4);
        --shadow2: 0 7px 20px rgba(0, 0, 0, 0.25);
      }

      /* ─── Color schemes (independent of light/dark base) ───
         "Default" applies no [data-scheme] attribute, preserving the
         original light/dark theming above. Each named scheme below fully
         reassigns the palette variables so contrast stays consistent. */
      [data-scheme="ocean"] {
        --bg: #eaf3fb;
        --bg2: #dceaf7;
        --paper: #ffffff;
        --paper2: #eef5fc;
        --ink: #0d2438;
        --muted: #4d6478;
        --line: #c4dcf0;
        --navy: #0b3a5c;
        --navy2: #14507e;
        --teal: #0d7a8f;
        --amber: #c47a12;
        --red: #b03a3a;
        --green: #137a55;
        --blue: #1f5fc4;
        --softT: #d6eef3;
        --softA: #fdeccb;
        --softR: #fbe0dd;
        --softG: #d8f0e6;
        --softB: #dde9fb;
        --shadow: 0 18px 45px rgba(11, 58, 92, 0.16);
        --shadow2: 0 7px 20px rgba(11, 58, 92, 0.1);
      }
      [data-scheme="sunset"] {
        --bg: #fdeee3;
        --bg2: #fae0d2;
        --paper: #fffaf5;
        --paper2: #fdeee2;
        --ink: #3a1f12;
        --muted: #7a5946;
        --line: #f0d4c0;
        --navy: #8a3b1e;
        --navy2: #b04e26;
        --teal: #b3621b;
        --amber: #d97706;
        --red: #c23b3b;
        --green: #6b8e23;
        --blue: #b85c2e;
        --softT: #fde6cf;
        --softA: #ffe3b8;
        --softR: #fcdcd2;
        --softG: #ecedcf;
        --softB: #fae0cf;
        --shadow: 0 18px 45px rgba(138, 59, 30, 0.16);
        --shadow2: 0 7px 20px rgba(138, 59, 30, 0.1);
      }
      [data-scheme="forest"] {
        --bg: #eaf3ea;
        --bg2: #dcebdc;
        --paper: #fbfdf9;
        --paper2: #edf5ec;
        --ink: #12281a;
        --muted: #4e6552;
        --line: #c8ddc8;
        --navy: #1d4d2e;
        --navy2: #2a6b41;
        --teal: #15806b;
        --amber: #b07d12;
        --red: #a83c33;
        --green: #2a7a45;
        --blue: #2f6d8f;
        --softT: #d6ede4;
        --softA: #f5ead0;
        --softR: #f6ddd9;
        --softG: #d8eddc;
        --softB: #dce9ed;
        --shadow: 0 18px 45px rgba(29, 77, 46, 0.16);
        --shadow2: 0 7px 20px rgba(29, 77, 46, 0.1);
      }
      [data-scheme="dark"] {
        --bg: #0f1419;
        --bg2: #1a2332;
        --paper: #1e2a3a;
        --paper2: #243447;
        --ink: #e8edf2;
        --muted: #8899aa;
        --line: #2d3f52;
        --navy: #e8edf2;
        --navy2: #b8c8d8;
        --teal: #2bb3ad;
        --amber: #e8a33d;
        --red: #e06b5c;
        --green: #3fb574;
        --blue: #5a8fe8;
        --softT: #0d2a28;
        --softA: #2a2010;
        --softR: #2a1410;
        --softG: #0d2a18;
        --softB: #101a2a;
        --shadow: 0 18px 45px rgba(0, 0, 0, 0.4);
        --shadow2: 0 7px 20px rgba(0, 0, 0, 0.25);
      }
      [data-scheme="contrast"] {
        --bg: #ffffff;
        --bg2: #ffffff;
        --paper: #ffffff;
        --paper2: #f2f2f2;
        --ink: #000000;
        --muted: #2b2b2b;
        --line: #000000;
        --navy: #000000;
        --navy2: #1a1a1a;
        --teal: #006b66;
        --amber: #8a5200;
        --red: #b00000;
        --green: #006400;
        --blue: #0000cc;
        --softT: #d6f0ee;
        --softA: #ffe9c2;
        --softR: #ffd9d4;
        --softG: #d6f0df;
        --softB: #d9e2ff;
        --shadow: 0 0 0 1px #000000;
        --shadow2: 0 0 0 1px #000000;
        --focus-ring: 0 0 0 3px #0000cc;
      }
      /* Named schemes override the light-base body gradient with a flat
         background to keep their palettes clean and readable. */
      [data-scheme] body {
        background: var(--bg) !important;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        min-height: 100vh;
        color: var(--ink);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: var(--bg);
        transition:
          background var(--transition),
          color var(--transition);
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      [data-theme="light"] body {
        background:
          radial-gradient(
            circle at 8% 10%,
            rgba(20, 124, 120, 0.12),
            transparent 26rem
          ),
          radial-gradient(
            circle at 95% 5%,
            rgba(217, 144, 40, 0.12),
            transparent 30rem
          ),
          linear-gradient(180deg, #f7fbf8 0%, var(--bg) 48%, var(--bg2) 100%);
      }
      button,
      input,
      select,
      textarea {
        font: inherit;
        color: inherit;
      }
      button {
        cursor: pointer;
        border: none;
        background: none;
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      ::selection {
        background: rgba(20, 124, 120, 0.2);
      }
      :focus-visible {
        outline: none;
        box-shadow: var(--focus-ring);
      }

      .wrap {
        max-width: 1300px;
        margin: 0 auto;
        padding: 20px;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        border: 0;
      }

      /* Header */
      .top {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo {
        width: 48px;
        height: 48px;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--teal), var(--navy));
        display: grid;
        place-items: center;
        color: white;
        font-weight: 950;
        font-size: 1.2rem;
        box-shadow: 0 8px 24px rgba(20, 124, 120, 0.2);
        transition: transform var(--transition);
      }
      .logo:hover {
        transform: scale(1.05);
      }
      .brand h1 {
        font-size: 1.1rem;
        color: var(--navy);
        letter-spacing: -0.02em;
      }
      .brand p {
        color: var(--muted);
        font-size: 0.78rem;
        margin-top: 1px;
      }
      .topActions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      /* Color scheme picker */
      .scheme-picker {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--line);
        background: var(--paper);
        border-radius: 12px;
        padding: 4px 8px 4px 10px;
        font-weight: 800;
        font-size: 0.82rem;
        color: var(--ink);
        transition: all var(--transition);
        white-space: nowrap;
      }
      .scheme-picker:hover {
        box-shadow: var(--shadow2);
      }
      .scheme-picker:focus-within {
        box-shadow: var(--focus-ring);
      }
      .scheme-picker__label {
        opacity: 0.85;
      }
      .scheme-picker select {
        border: none;
        background: transparent;
        font-weight: 800;
        font-size: 0.82rem;
        color: var(--ink);
        cursor: pointer;
        padding: 4px 2px;
        border-radius: 8px;
        outline: none;
      }
      .scheme-picker select:focus-visible {
        box-shadow: var(--focus-ring);
      }
      .scheme-picker select option {
        background: var(--paper);
        color: var(--ink);
      }

      /* Buttons */
      .btn {
        border: 1px solid var(--line);
        background: var(--paper);
        border-radius: 12px;
        padding: 8px 12px;
        font-weight: 800;
        font-size: 0.82rem;
        color: var(--ink);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: all var(--transition);
        white-space: nowrap;
      }
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: var(--shadow2);
      }
      .btn:active {
        transform: translateY(0);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }
      .primary {
        background: var(--teal);
        border-color: var(--teal);
        color: white;
      }
      .primary:hover {
        background: #119490;
      }
      .amber {
        background: var(--amber);
        border-color: var(--amber);
        color: white;
      }
      .danger {
        background: var(--softR);
        border-color: #efc4be;
        color: var(--red);
      }
      .navy-btn {
        background: var(--navy);
        border-color: var(--navy);
        color: white;
      }
      .ghost {
        background: transparent;
        border-color: transparent;
      }
      .ghost:hover {
        background: var(--paper2);
      }
      .icon-btn {
        width: 34px;
        height: 34px;
        padding: 0;
        justify-content: center;
        border-radius: 10px;
      }

      /* Hero */
      .hero {
        background: linear-gradient(135deg, #16324a, #214866 58%, #0e4b59);
        color: white;
        border-radius: var(--r2);
        padding: 28px;
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: "";
        position: absolute;
        right: -80px;
        top: -100px;
        width: 300px;
        height: 300px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(20, 124, 120, 0.45),
          transparent 64%
        );
      }
      .hero::after {
        content: "";
        position: absolute;
        left: -80px;
        bottom: -110px;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(217, 144, 40, 0.2),
          transparent 70%
        );
      }
      .hero > * {
        position: relative;
      }
      .heroGrid {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 20px;
        align-items: center;
      }
      .eyebrow {
        display: inline-flex;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        padding: 5px 10px;
        color: #dff7f5;
        font-weight: 900;
        font-size: 0.72rem;
        letter-spacing: 0.03em;
      }
      .hero h2 {
        font-size: clamp(1.9rem, 4vw, 3.6rem);
        line-height: 0.94;
        margin: 12px 0 8px;
        letter-spacing: -0.05em;
        font-weight: 950;
      }
      .hero h2 span {
        color: #ffd17a;
      }
      .hero p {
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.5;
        max-width: 60ch;
        font-size: 0.9rem;
      }
      .quickStats {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }
      .stat {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 12px;
        transition: background var(--transition);
      }
      .stat:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      .stat b {
        font-size: 1.8rem;
        display: block;
      }
      .stat span {
        color: rgba(255, 255, 255, 0.65);
        font-size: 0.72rem;
        font-weight: 700;
      }

      /* Command palette */
      .cmd-trigger {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--paper2);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 8px 14px;
        color: var(--muted);
        font-size: 0.82rem;
        cursor: pointer;
        transition: all var(--transition);
        min-width: 200px;
      }
      .cmd-trigger:hover {
        border-color: var(--teal);
        box-shadow: var(--focus-ring);
      }
      .cmd-trigger kbd {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 5px;
        padding: 2px 5px;
        font-size: 0.7rem;
        font-weight: 700;
        margin-left: auto;
      }
      .cmd-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 25, 40, 0.55);
        backdrop-filter: blur(4px);
        display: none;
        place-items: start center;
        padding: clamp(60px, 12vh, 140px) 20px 20px;
        z-index: 100;
      }
      .cmd-overlay.open {
        display: grid;
      }
      .cmd-box {
        width: min(600px, 100%);
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 20px;
        box-shadow: 0 25px 80px rgba(0, 0, 0, 0.25);
        overflow: hidden;
      }
      .cmd-input {
        width: 100%;
        padding: 16px 20px;
        border: none;
        background: transparent;
        font-size: 1rem;
        font-weight: 600;
      }
      .cmd-results {
        max-height: 320px;
        overflow: auto;
        border-top: 1px solid var(--line);
      }
      .cmd-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        cursor: pointer;
        transition: background 0.1s;
      }
      .cmd-item:hover,
      .cmd-item.active {
        background: var(--softT);
      }
      .cmd-item span {
        font-size: 0.85rem;
        font-weight: 600;
      }
      .cmd-item small {
        color: var(--muted);
        font-size: 0.75rem;
        margin-left: auto;
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        padding: 12px 0 6px;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .tabs::-webkit-scrollbar {
        display: none;
      }
      .tab {
        white-space: nowrap;
        border: 1px solid var(--line);
        background: var(--paper);
        border-radius: 999px;
        padding: 8px 12px;
        font-weight: 800;
        font-size: 0.8rem;
        color: var(--muted);
        transition: all var(--transition);
      }
      .tab:hover {
        color: var(--ink);
        border-color: var(--teal);
      }
      .tab.active {
        background: var(--navy);
        border-color: var(--navy);
        color: white;
      }

      /* Cards */
      .card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--r);
        padding: 16px;
        box-shadow: var(--shadow2);
        transition: all var(--transition);
      }
      .card:hover {
        box-shadow: var(--shadow);
      }
      .card h3 {
        color: var(--navy);
        font-size: 1rem;
        margin-bottom: 2px;
      }
      .sub {
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.4;
      }
      .head {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        align-items: flex-start;
        margin-bottom: 10px;
      }

      /* Pills */
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 0.7rem;
        font-weight: 900;
        background: var(--softT);
        color: #0d6863;
      }
      .pill.red {
        background: var(--softR);
        color: var(--red);
      }
      .pill.amber {
        background: var(--softA);
        color: #935f0d;
      }
      .pill.green {
        background: var(--softG);
        color: #17703e;
      }
      .pill.blue {
        background: var(--softB);
        color: var(--blue);
      }

      /* Items */
      .item {
        border: 1px solid var(--line);
        background: var(--paper2);
        border-radius: 14px;
        padding: 11px;
        margin-bottom: 8px;
        transition: all var(--transition);
      }
      .item:hover {
        border-color: var(--teal);
        transform: translateY(-1px);
      }
      .item.current {
        border-color: #9fd6cd;
        background: var(--softT);
      }
      .item.next {
        border-color: #f1d49c;
        background: var(--softA);
      }
      .item h4 {
        color: var(--navy);
        font-size: 0.92rem;
      }
      .item p {
        color: var(--muted);
        font-size: 0.8rem;
        margin-top: 3px;
        line-height: 1.4;
      }
      .itemTop {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        align-items: flex-start;
      }

      /* Forms */
      .field {
        display: grid;
        gap: 4px;
        margin-bottom: 10px;
      }
      .field label {
        font-size: 0.72rem;
        font-weight: 900;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      input,
      select,
      textarea {
        width: 100%;
        border: 1.5px solid var(--line);
        background: var(--paper);
        border-radius: 11px;
        padding: 9px 12px;
        color: var(--ink);
        transition: border-color var(--transition);
      }
      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--teal);
        outline: none;
        box-shadow: var(--focus-ring);
      }
      textarea {
        min-height: 80px;
        resize: vertical;
      }

      /* Grid layouts */
      .grid {
        display: grid;
        gap: 12px;
      }
      .g2 {
        grid-template-columns: 1fr 1fr;
      }
      .g3 {
        grid-template-columns: repeat(3, 1fr);
      }
      .homeGrid {
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(300px, 0.9fr);
        gap: 12px;
        margin-top: 12px;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      /* Calendar */
      .calendarBox {
        min-height: 300px;
        border: 1px dashed var(--line);
        border-radius: 14px;
        overflow: hidden;
        background: var(--paper2);
        display: grid;
        place-items: center;
        text-align: center;
        padding: 14px;
      }
      .calendarBox iframe {
        width: 100%;
        height: 400px;
        border: 0;
        border-radius: 10px;
      }

      /* Week grid */
      .week {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 8px;
      }
      .day {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 10px;
        min-height: 140px;
      }
      .day h4 {
        color: var(--navy);
        font-size: 0.78rem;
        margin-bottom: 6px;
      }
      .check {
        display: flex;
        gap: 7px;
        align-items: flex-start;
        border-bottom: 1px solid var(--line);
        padding: 6px 0;
        font-size: 0.8rem;
      }
      .check:last-child {
        border-bottom: 0;
      }
      .check input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--teal);
        margin-top: 2px;
        flex-shrink: 0;
      }
      .check.done .mainText {
        text-decoration: line-through;
        color: var(--muted);
      }

      /* Timer */
      .timerDisplay {
        font-size: 4.4rem;

      .timerMode {
        text-align: center;

      .timerRing {
        width: 200px;

        width: 100%;
        height: 100%;
        transform: rotate(-90deg);

        fill: none;
        stroke-width: 8;
        stroke-linecap: round;
      }
      .timerRing .track {
        stroke: var(--line);
      }
      .timerRing .progress {
        stroke: var(--teal);
        transition: stroke-dashoffset 0.5s linear;
      }

      /* Email */
      .mailPreview {
        white-space: pre-wrap;
        background: var(--paper2);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;

      /* Notes */
      .note {
        background: #fff8e0;
        border: 1px solid #f2d186;

      /* Progress bar */
      .progress {
        height: 7px;
        background: var(--line);
        border-radius: 999px;
        overflow: hidden;
      }
      .progress > span {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--teal), var(--green));

      /* Modal */
      .modalBack {
        position: fixed;

        position: fixed;

      /* Notifications badge */

      /* Animations */

    <script>
      (function () {
        "use strict";

        // ═══════════════════════════════════════════════════════════════
        // SERVICE LAYER — Enterprise Architecture
        // ═══════════════════════════════════════════════════════════════

        const VERSION = 9;
        const STORAGE_KEY = "noam-school-v9";
        const LEGACY_KEYS = [
          "noam-school-v8",
          "noam-school-v7",
          "noam-school-v6",
          "noam-school-v5",
        ];
        const DAYS = [
          "Monday",
          "Tuesday",
          "Wednesday",
          "Thursday",
          "Friday",
          "Saturday",
          "Sunday",
        ];
        const HOME_ORDER = [
          "launch",
          "schedule",
          "today",
          "calendar",
          "reminders",
          "week",
          "google",
          "onDeck",
          "wins",
          "analytics",
        ];
        const UNDO_LIMIT = 30;

        // ── Event Bus ──
        const EventBus = {
          _listeners: {},
          on(event, fn) {
            (this._listeners[event] ||= []).push(fn);
          },
          off(event, fn) {
            const a = this._listeners[event];
            if (a) this._listeners[event] = a.filter((f) => f !== fn);
          },
          emit(event, data) {
            (this._listeners[event] || []).forEach((fn) => {
              try {
                fn(data);
              } catch (e) {
                console.error("[EventBus]", event, e);
              }
            });
          },
        };

        // ── Utilities ──
        const $ = (s, c = document) => c.querySelector(s);
        const $$ = (s, c = document) => Array.from(c.querySelectorAll(s));
        const uid = (p) => p + "_" + crypto.randomUUID().slice(0, 8);
        const esc = (v) =>
          String(v ?? "").replace(
            /[&<>"]/g,
            (c) =>
              ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c],
          );
        const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
        const debounce = (fn, ms) => {
          let t;
          return (...a) => {
            clearTimeout(t);
            t = setTimeout(() => fn(...a), ms);
          };
        };

        function iso(off = 0) {
          const d = new Date();
          d.setHours(12, 0, 0, 0);
          d.setDate(d.getDate() + off);
          return d.toISOString().slice(0, 10);
        }
        function todayName() {
          return new Date().toLocaleDateString(undefined, { weekday: "long" });
        }
        function dObj(v) {
          const d = new Date((v || iso()) + "T12:00:00");
          return isNaN(d) ? new Date() : d;
        }
        function daysDiff(v) {
          return Math.round((dObj(v) - dObj(iso())) / 86400000);
        }
        function dueLabel(v) {
          if (!v) return "No date";
          const n = daysDiff(v);
          if (n < 0) return Math.abs(n) + "d late";
          if (n === 0) return "Today";
          if (n === 1) return "Tomorrow";
          if (n < 7) return "In " + n + " days";
          return dObj(v).toLocaleDateString(undefined, {
            month: "short",
            day: "numeric",
          });
        }
        function timeLabel(t) {
          if (!t) return "Any time";
          const [h, m] = t.split(":").map(Number);
          const d = new Date();
          d.setHours(h || 0, m || 0, 0, 0);
          return d.toLocaleTimeString(undefined, {
            hour: "numeric",
            minute: "2-digit",
          });
        }
        function timeSort(t) {
          return t ? Number(t.replace(":", "")) : 9999;
        }
        function minNow(t) {
          if (!t) return 99999;
          const [h, m] = t.split(":").map(Number);
          const now = new Date(),
            d = new Date();
          d.setHours(h || 0, m || 0, 0, 0);
          return Math.round((d - now) / 60000);
        }
        function weekKey() {
          const d = dObj(iso()),
            day = (d.getDay() + 6) % 7;
          d.setDate(d.getDate() - day);
          return d.toISOString().slice(0, 10);
        }
        function fmtDate(v) {
          if (!v) return "No date";
          const d = new Date(v);
          return isNaN(d)
            ? v
            : d.toLocaleString(undefined, {
                weekday: "short",
                month: "short",
                day: "numeric",
                hour: "numeric",
                minute: "2-digit",
              });
        }
        function extractCal(v) {
          v = (v || "").trim();
          const m = v.match(/src=['"]([^'"]+)['"]/i);
          return m ? m[1] : v;
        }

        // ── Validation Service ──
        const Validator = {
          assignment(obj) {
            return {
              ...obj,
              title: (obj.title || "").trim().slice(0, 200) || "Assignment",
              due: obj.due || "",
              priority: ["High", "Medium", "Low"].includes(obj.priority)
                ? obj.priority
                : "Medium",
              status: [
                "Not Started",
                "Started",
                "Need Help",
                "Almost Done",
                "Turned In",
              ].includes(obj.status)
                ? obj.status
                : "Not Started",
              notes: (obj.notes || "").slice(0, 2000),
            };
          },
          reminder(obj) {
            return {
              ...obj,
              text: (obj.text || "").trim().slice(0, 200) || "Reminder",
              time: /^\d{2}:\d{2}$/.test(obj.time) ? obj.time : "",
              repeat: ["Daily", "Weekdays", "Weekly", "One-time"].includes(
                obj.repeat,
              )
                ? obj.repeat
                : "Daily",
            };
          },
          classItem(obj) {
            return {
              ...obj,
              name: (obj.name || "").trim().slice(0, 100) || "Class",
              teacher: (obj.teacher || "").slice(0, 100),
              email: (obj.email || "").slice(0, 200),
            };
          },
        };

        // ── State Manager with Undo/Redo ──
        const StateManager = {
          _undoStack: [],
          _redoStack: [],

          snapshot() {
            this._undoStack.push(JSON.stringify(state));
            if (this._undoStack.length > UNDO_LIMIT) this._undoStack.shift();
            this._redoStack = [];
          },
          undo() {
            if (!this._undoStack.length) return false;
            this._redoStack.push(JSON.stringify(state));
            state = normalize(JSON.parse(this._undoStack.pop()));
            save();
            EventBus.emit("stateChange");
            return true;
          },
          redo() {
            if (!this._redoStack.length) return false;
            this._undoStack.push(JSON.stringify(state));
            state = normalize(JSON.parse(this._redoStack.pop()));
            save();
            EventBus.emit("stateChange");
            return true;
          },
          canUndo() {
            return this._undoStack.length > 0;
          },
          canRedo() {
            return this._redoStack.length > 0;
          },
        };

        // ── Notification Service ──
        const NotifService = {
          _permitted: false,
          _timers: [],

          async requestPermission() {
            if (!("Notification" in window)) return false;
            if (Notification.permission === "granted") {
              this._permitted = true;
              return true;
            }
            const r = await Notification.requestPermission();
            this._permitted = r === "granted";
            return this._permitted;
          },

          schedule(reminders) {
            this._timers.forEach(clearTimeout);
            this._timers = [];
            if (!this._permitted) return;
            reminders
              .filter((r) => !r.done && r.time && this._isActiveToday(r))
              .forEach((r) => {
                const min = minNow(r.time);
                if (min > 0 && min <= 60) {
                  this._timers.push(
                    setTimeout(() => {
                      new Notification("Noam School Reminder", {
                        body: r.text,
                        icon: "📋",
                        tag: r.id,
                      });
                    }, min * 60000),
                  );
                }
              });
          },

          _isActiveToday(r) {
            const d = todayName();
            if (r.repeat === "Weekly") return !r.day || r.day === d;
            if (r.repeat === "Weekdays")
              return !["Saturday", "Sunday"].includes(d);
            return true;
          },
        };

        // ── Google Sync Service ──
        const GoogleSync = {
          _syncing: false,

          get isSyncing() {
            return this._syncing;
          },

          async checkStatus() {
            try {
              const r = await fetch("/api/google/status");
              if (!r.ok) throw new Error("Status check failed");
              const data = await r.json();
              StateManager.snapshot();
              state.google = { ...state.google, ...data };
              save();
              EventBus.emit("stateChange");
              EventBus.emit("syncComplete", { type: "status", success: true });
              return data;
            } catch (e) {
              EventBus.emit("syncComplete", {
                type: "status",
                success: false,
                error: e.message,
              });
              return null;
            }
          },

          async syncCalendar() {
            if (this._syncing) return;
            this._syncing = true;
            EventBus.emit("syncStart", { type: "calendar" });
            try {
              const r = await fetch("/api/google/calendar");
              if (!r.ok) {
                const d = await r.json().catch(() => ({}));
                throw new Error(d.error || "Calendar sync failed");
              }
              const data = await r.json();
              StateManager.snapshot();
              state.google.events = data.events || [];
              state.google.lastSync = new Date().toISOString();
              save();
              EventBus.emit("stateChange");
              EventBus.emit("syncComplete", {
                type: "calendar",
                success: true,
                count: (data.events || []).length,
              });
            } catch (e) {
              EventBus.emit("syncComplete", {
                type: "calendar",
                success: false,
                error: e.message,
              });
            } finally {
              this._syncing = false;
            }
          },

          async syncClassroom() {
            if (this._syncing) return;
            this._syncing = true;
            EventBus.emit("syncStart", { type: "classroom" });
            try {
              const r = await fetch("/api/google/classroom");
              if (!r.ok) {
                const d = await r.json().catch(() => ({}));
                throw new Error(d.error || "Classroom sync failed");
              }
              const data = await r.json();
              StateManager.snapshot();
              state.google.classroomAssignments = data.assignments || [];
              state.google.lastSync = new Date().toISOString();
              this._mergeCourses(data.courses || []);
              save();
              EventBus.emit("stateChange");
              EventBus.emit("syncComplete", {
                type: "classroom",
                success: true,
                courses: (data.courses || []).length,
                assignments: (data.assignments || []).length,
              });
            } catch (e) {
              EventBus.emit("syncComplete", {
                type: "classroom",
                success: false,
                error: e.message,
              });
            } finally {
              this._syncing = false;
            }
          },

          async autoSync() {
            if (!state.google.connected) return;
            const last = state.google.lastSync
              ? new Date(state.google.lastSync)
              : null;
            const stale = !last || Date.now() - last.getTime() > 15 * 60000;
            if (stale) {
              await this.syncCalendar();
              await this.syncClassroom();
            }
          },

            const w = (state.google.classroomAssignments || []).find(
              (x) => x.id === id,

            const existing = state.assignments.find((a) => a.googleId === id);

        // ── Analytics Service ──
        const Analytics = {
          getWeekSummary() {
            const now = new Date(),
              weekStart = new Date(now);
            weekStart.setDate(now.getDate() - now.getDay());
            const ws = weekStart.toISOString().slice(0, 10);
            const sessions = state.sessions.filter((s) => s.date >= ws);
            const completedThisWeek = state.assignments.filter(
              (a) => a.status === "Turned In" && a.completed >= ws,
            );
            const totalMinutes = sessions.reduce(
              (sum, s) => sum + (s.minutes || 0),
              0,
            );
            return {
              sessions: sessions.length,
              totalMinutes,
              completed: completedThisWeek.length,
              streak: this._calcStreak(),
            };
          },

          _calcStreak() {
            let streak = 0,
              d = new Date();
            for (let i = 0; i < 60; i++) {
              const dateStr = d.toISOString().slice(0, 10);
              const hasActivity =
                state.sessions.some((s) => s.date === dateStr) ||
                state.wins.some((w) => w.date === dateStr);
              if (hasActivity) streak++;
              else if (i > 0) break;
              d.setDate(d.getDate() - 1);
            }
            return streak;
          },

          getSubjectBreakdown() {
            const map = {};
            state.sessions.forEach((s) => {
              const a = state.assignments.find((x) => x.id === s.assignmentId);
              const cls = a ? getClass(a.classId) : { name: "General" };
              map[cls.name] = (map[cls.name] || 0) + (s.minutes || 0);
            });
            return Object.entries(map).sort((a, b) => b[1] - a[1]);
          },
        };

            version: VERSION,
            settings: {

              ...(x.settings || {}),

                Number(x.settings?.focusMinutes || 10),

            state.reminders.forEach((r) => {
              if (r.repeat === "Daily" || r.repeat === "Weekdays")
                r.done = false;

            state.settings.lastDailyReset = iso();

              (state.weekly[d] || []).forEach((i) => (i.done = false)),
            );

            changed = true;

        function openTasks() {

            .filter((a) => a.status !== "Turned In")
            .sort((a, b) => daysDiff(a.due) - daysDiff(b.due));

        function activeReminders() {
          return state.reminders
            .filter((r) => !r.done && isReminderActiveToday(r))
            .sort((a, b) => timeSort(a.time) - timeSort(b.time));
        }
        function isReminderActiveToday(r) {
          const d = todayName();
          if (r.repeat === "Weekly") return !r.day || r.day === d;
          if (r.repeat === "Weekdays")
            return !["Saturday", "Sunday"].includes(d);
          return true;
        }
        function todaySchedule() {
          return (state.schedule[todayName()] || [])
            .slice()
            .sort((a, b) => timeSort(a.start) - timeSort(b.start));
        }
        function currentSchedule() {
          const list = todaySchedule(),
            now = new Date(),
            nowMin = now.getHours() * 60 + now.getMinutes();
          let cur = null,
            next = null;
          for (const s of list) {
            const [sh, sm] = (s.start || "00:00").split(":").map(Number);
            const [eh, em] = (s.end || s.start || "00:00")
              .split(":")
              .map(Number);
            const st = sh * 60 + sm,
              en = eh * 60 + em;
            if (nowMin >= st && nowMin < en) cur = s;
            if (nowMin < st && !next) next = s;
          }
          return { cur, next };
        }

          "sunset",
          "forest",
          "contrast",
          "dark",
        ];

        function applyScheme(scheme) {
          if (!VALID_SCHEMES.includes(scheme)) scheme = "default";
          if (scheme === "default") {
            document.documentElement.removeAttribute("data-scheme");
          } else {
            document.documentElement.setAttribute("data-scheme", scheme);
          }
          try {
            localStorage.setItem(SCHEME_KEY, scheme);
          } catch (e) {}
          const sel = $("#schemePicker");
          if (sel) sel.value = scheme;
        }

          applyScheme(saved);

          if (sel) {

        // ═══════════════════════════════════════════════════════════════
        // PAGE RENDERERS
        // ═══════════════════════════════════════════════════════════════

        function card(key, title, sub, body) {
          const order = state.settings.homeOrder,
            i = order.indexOf(key);
          return `<section class='card homeCard' draggable='true' data-card='${key}'><div class='head'><div><h3>${title}</h3><p class='sub'>${sub}</p></div><div class='row'><button class='btn icon-btn' data-move='${key}|up' ${i === 0 ? "disabled" : ""} aria-label='Move up'>↑</button><button class='btn icon-btn' data-move='${key}|down' ${i === order.length - 1 ? "disabled" : ""} aria-label='Move down'>↓</button></div></div>${body}</section>`;
        }

        function taskCard(a) {
          const c = getClass(a.classId),
            late = daysDiff(a.due) < 0;
          return `<div class='item'><div class='itemTop'><div><h4>${esc(a.title)}</h4><p>${esc(a.notes || "No notes")}</p>${a.link ? `<a href='${esc(a.link)}' target='_blank' rel='noopener' class='btn' style='margin-top:4px'>Open in Classroom ↗</a>` : ""}</div><span class='pill ${late ? "red" : daysDiff(a.due) === 0 ? "amber" : ""}'>${esc(dueLabel(a.due))}</span></div><div class='row' style='margin-top:8px'><span class='pill' style='background:${c.color}22;color:${c.color}'>${esc(c.name)}</span><span class='pill'>${esc(a.priority)}</span><span class='pill'>${esc(a.status)}</span><button class='btn' data-edit='assignment' data-id='${a.id}'>Edit</button><button class='btn amber' data-start='${a.id}'>Focus</button>${a.status !== "Turned In" ? `<button class='btn primary' data-turnin='${a.id}'>✓ Done</button>` : ""}<button class='btn danger' data-del='assignment' data-id='${a.id}'>Del</button></div></div>`;
        }

        function schedItem(s, showDay = false) {
          const { cur, next } = currentSchedule(),
            isCur = cur && cur.id === s.id,
            isNext = next && next.id === s.id,
            c = getClass(s.classId);
          return `<div class='item ${isCur ? "current" : isNext ? "next" : ""}'><div class='itemTop'><div><h4>${esc(s.title)}</h4><p><strong>${esc(timeLabel(s.start))}</strong>${s.end ? "–" + esc(timeLabel(s.end)) : ""}${s.location ? " · " + esc(s.location) : ""}${showDay ? " · " + esc(s.day || "") : ""}</p>${s.notes ? `<p>${esc(s.notes)}</p>` : ""}</div><span class='pill ${isCur ? "green" : isNext ? "amber" : ""}'>${isCur ? "▶ Now" : isNext ? "→ Next" : esc(c.name)}</span></div><div class='row' style='margin-top:6px'><button class='btn' data-edit='schedule' data-id='${s.id}' data-day='${s.day || todayName()}'>Edit</button><button class='btn danger' data-del='schedule' data-id='${s.id}' data-day='${s.day || todayName()}'>Del</button></div></div>`;
        }

        function remRow(r) {
          const min = minNow(r.time),
            urgent = !r.done && r.time && min <= 30 && min >= 0,
            late = !r.done && r.time && min < 0;
          return `<label class='check ${r.done ? "done" : ""}'><input type='checkbox' data-rem-check='${r.id}' ${r.done ? "checked" : ""}><span class='mainText' style='flex:1'><strong>${esc(timeLabel(r.time))}</strong> — ${esc(r.text)} <span class='pill ${urgent ? "amber" : late ? "red" : "blue"}'>${late ? "Past" : urgent ? "Soon" : esc(r.repeat)}</span></span><button type='button' class='btn' data-edit='reminder' data-id='${r.id}'>Edit</button><button type='button' class='btn danger' data-del='reminder' data-id='${r.id}'>Del</button></label>`;
        }

        function weekRow(w, d) {
          return `<label class='check ${w.done ? "done" : ""}'><input type='checkbox' data-week-check='${d}|${w.id}' ${w.done ? "checked" : ""}><span class='mainText' style='flex:1'>${esc(w.text)}</span><button type='button' class='btn danger' data-week-del='${d}|${w.id}'>×</button></label>`;
        }

        // ── Home ──
        function home() {
          const open = openTasks(),
            dueToday = open.filter((a) => daysDiff(a.due) === 0),
            soon = open.filter(
              (a) => daysDiff(a.due) > 0 && daysDiff(a.due) <= 7,
            ),
            rem = activeReminders(),
            tn = todayName(),
            sch = todaySchedule().map((s) => ({ ...s, day: tn }));
          const map = {
            launch: card(
              "launch",
              "Daily Launch",
              "Set the day in under one minute.",
              dailyLaunchMini(),
            ),
            schedule: card(
              "schedule",
              "Today Schedule",
              "Current and upcoming blocks.",
              (sch.length
                ? sch.slice(0, 4).map(schedItem).join("")
                : `<div class='note'>No schedule for ${tn}.</div>`) +
                `<div class='row' style='margin-top:8px'><button class='btn primary' data-open='schedule'>＋ Block</button><button class='btn' data-view='schedule'>Full view</button></div>`,
            ),
            today: card(
              "today",
              "Today Work",
              "Due today — knock these out first.",
              dueToday.length
                ? dueToday.map(taskCard).join("")
                : `<div class='note'>Nothing due today!</div><div class='row' style='margin-top:8px'><button class='btn primary' data-open='assignment'>＋ Assignment</button></div>`,
            ),
            calendar: card(
              "calendar",
              "Calendar",
              "Embedded or from Google Sync.",
              calendarHtml(),
            ),
            reminders: card(
              "reminders",
              "Reminders",
              "Sorted by time, reset daily.",
              (rem.slice(0, 5).map(remRow).join("") ||
                `<div class='note'>All done!</div>`) +
                `<div class='row' style='margin-top:8px'><button class='btn primary' data-open='reminder'>＋ Reminder</button><button class='btn' data-view='reminders'>All</button></div>`,
            ),
            week: card(
              "week",
              tn + " Checklist",
              "Weekly routine items.",
              ((state.weekly[tn] || []).map((w) => weekRow(w, tn)).join("") ||
                `<div class='note'>No items for ${tn}.</div>`) +
                `<div class='row' style='margin-top:8px'><button class='btn' data-view='reminders'>Full week</button></div>`,
            ),
            google: card(
              "google",
              "Google Classroom",
              "Sync courses and coursework.",
              googleMini(),
            ),
            onDeck: card(
              "onDeck",
              "On Deck",
              "Coming up this week.",
              soon.length
                ? soon.slice(0, 4).map(taskCard).join("")
                : `<div class='note'>Nothing due in the next 7 days.</div>`,
            ),
            wins: card("wins", "Wins + Streak", "Track momentum.", winsMini()),
            analytics: card(
              "analytics",
              "Quick Stats",
              "Focus time and completion rate.",
              analyticsMini(),
            ),
          };
          const hidden = state.settings.hiddenCards || [];
          const visibleOrder = state.settings.homeOrder.filter(
            (k) => !hidden.includes(k),
          );
          return `<div class='row' style='margin-top:12px;margin-bottom:4px'><button class='btn' data-view='customize'>🎨 Customize cards</button></div><div class='homeGrid'>${visibleOrder.map((k) => `<div>${map[k] || ""}</div>`).join("")}</div>`;
        }

        function dailyLaunchMini() {
          const pct =
            ([
              state.daily.launchDone,
              state.daily.checkedClassroom,
              state.daily.packed,
              Boolean(state.daily.topGoal),
            ].filter(Boolean).length /
              4) *
            100;
          return `<div class='progress'><span style='width:${pct}%'></span></div><div class='row' style='margin-top:10px'><span class='pill ${state.daily.launchDone ? "green" : "amber"}'>${state.daily.launchDone ? "✓ Launched" : "Not launched"}</span><span class='pill ${state.daily.checkedClassroom ? "green" : ""}'>${state.daily.checkedClassroom ? "✓" : "○"} Classroom</span><span class='pill ${state.daily.packed ? "green" : ""}'>${state.daily.packed ? "✓" : "○"} Packed</span></div><p class='sub' style='margin-top:8px'>${state.daily.topGoal ? "Goal: " + esc(state.daily.topGoal) : "No goal set."}</p><div class='row' style='margin-top:6px'><button class='btn primary' data-open='quickPlan'>☀️ Launch</button><button class='btn' data-view='today'>Full plan</button></div>`;
        }

        function winsMini() {
          const todayWins = state.wins.filter((w) => w.date === iso()).length;
          const streak = Analytics._calcStreak();
          return `<div class='grid g2'><div class='item'><h4>${todayWins}</h4><p>wins today</p></div><div class='item'><h4>${streak}</h4><p>day streak 🔥</p></div></div><div class='row' style='margin-top:6px'><button class='btn primary' data-open='win'>＋ Log win</button></div>`;
        }

        function analyticsMini() {
          const s = Analytics.getWeekSummary();
          return `<div class='grid g2'><div class='item'><h4>${s.sessions}</h4><p>focus sprints</p></div><div class='item'><h4>${s.totalMinutes}m</h4><p>total focus</p></div></div><button class='btn' data-view='analytics' style='margin-top:6px'>Full analytics</button>`;
        }

        function googleMini() {
          const syncing = GoogleSync.isSyncing;
          return state.google.connected
            ? `<div class='syncBox connected'><strong>✓ Connected${state.google.profile?.email ? " as " + esc(state.google.profile.email) : ""}</strong><p class='sub'>Last sync: ${state.google.lastSync ? fmtDate(state.google.lastSync) : "never"}</p><div class='row' style='margin-top:6px'><button class='btn primary ${syncing ? "syncing" : ""}' id='homeSync'>${syncing ? "⟳ Syncing…" : "🔄 Sync now"}</button><button class='btn' data-view='sync'>Open sync</button></div></div>`
            : `<div class='syncBox'><strong>Not connected</strong><p class='sub'>Connect Google to sync Classroom courses and Calendar events.</p><button class='btn primary' data-view='sync'>Set up sync</button></div>`;
        }

        function calendarHtml() {
          const src = extractCal(state.settings.calendarEmbed);
          if (src)
            return `<div class='calendarBox' style='padding:0'><iframe src='${esc(src)}' loading='lazy' title='Calendar'></iframe></div>`;
          if (state.google.events?.length)
            return state.google.events
              .slice(0, 5)
              .map(
                (e) =>
                  `<div class='item'><h4>${esc(e.title)}</h4><p>${esc(fmtDate(e.start))}</p>${e.link ? `<a class='btn' target='_blank' rel='noopener' href='${esc(e.link)}'>Open</a>` : ""}</div>`,
              )
              .join("");
          return `<div class='calendarBox'><div><h3>No calendar yet</h3><p class='sub'>Paste an embed URL in Settings or connect Google Sync.</p><button class='btn primary' data-view='settings'>Settings</button></div></div>`;
        }

        // ── Today ──
        function today() {
          const open = openTasks(),
            rem = activeReminders(),
            sch = todaySchedule().map((s) => ({ ...s, day: todayName() }));
          return `<section class='card'><div class='head'><div><h3>Today Plan</h3><p class='sub'>Daily routine: launch, check schedule, complete tasks.</p></div><button class='btn primary' data-open='quickPlan'>☀️ Quick Launch</button></div><div class='grid g2'><div><div class='field'><label>Top goal today</label><input id='goalInput' value='${esc(state.daily.topGoal)}' placeholder='e.g., finish math and pack bag'></div><label class='check'><input type='checkbox' id='launchDone' ${state.daily.launchDone ? "checked" : ""}><span class='mainText'>Daily launch done</span></label><label class='check'><input type='checkbox' id='checkedClassroom' ${state.daily.checkedClassroom ? "checked" : ""}><span class='mainText'>Checked Classroom</span></label><label class='check'><input type='checkbox' id='packed' ${state.daily.packed ? "checked" : ""}><span class='mainText'>Bag / Chromebook ready</span></label><button class='btn primary' id='saveToday'>Save Plan</button></div><div><h3 style='margin-bottom:8px'>Today's schedule</h3>${sch.slice(0, 4).map(schedItem).join("") || `<div class='note'>No schedule today.</div>`}<h3 style='margin:12px 0 8px'>Next up</h3>${open.slice(0, 2).map(taskCard).join("") || `<div class='note'>No open tasks.</div>`}</div></div></section>`;
        }

        // ── Schedule ──
        function schedule() {
          return `<section class='card'><div class='head'><div><h3>Daily Schedule</h3><p class='sub'>Weekly recurring schedule. Today (${todayName()}) highlighted.</p></div><button class='btn primary' data-open='schedule'>＋ Block</button></div><div class='grid g2' style='margin-top:10px'>${DAYS.map(
            (day) =>
              `<div class='card' style='${day === todayName() ? "border-color:var(--teal);box-shadow:inset 0 0 0 1px var(--teal)" : ""}'><div class='head'><div><h3>${day}${day === todayName() ? " ←" : ""}</h3><p class='sub'>${(state.schedule[day] || []).length} blocks</p></div><button class='btn icon-btn' data-open='schedule' data-day='${day}'>＋</button></div>${
                (state.schedule[day] || [])
                  .slice()
                  .sort((a, b) => timeSort(a.start) - timeSort(b.start))
                  .map((s) => schedItem({ ...s, day }, true))
                  .join("") || `<p class='sub'>Empty</p>`
              }</div>`,
          ).join("")}</div></section>`;
        }

        // ── Reminders ──
        function reminders() {
          return `<section class='card'><div class='head'><div><h3>Timed Reminders</h3><p class='sub'>Sorted by time. Repeating items reset daily.</p></div><button class='btn primary' data-open='reminder'>＋ Reminder</button></div>${
            state.reminders
              .slice()
              .sort((a, b) => timeSort(a.time) - timeSort(b.time))
              .map(remRow)
              .join("") || `<div class='note'>No reminders.</div>`
          }</section><section class='card' style='margin-top:12px'><div class='head'><div><h3>Weekly Checklist</h3><p class='sub'>Resets each Monday. Week of ${weekKey()}.</p></div></div><div class='week'>${DAYS.map((d) => `<div class='day'><h4>${d}</h4>${(state.weekly[d] || []).map((w) => weekRow(w, d)).join("") || `<p class='sub'>—</p>`}<div class='row' style='margin-top:6px'><input placeholder='Add…' data-week-input='${d}' style='padding:6px;font-size:.78rem'><button class='btn primary icon-btn' data-week-add='${d}'>＋</button></div></div>`).join("")}</div></section>`;
        }

        // ── Assignments ──
        function assignments() {
          const open = openTasks(),
            done = state.assignments.filter((a) => a.status === "Turned In");
          return `<section class='card'><div class='head'><div><h3>Assignments</h3><p class='sub'>${open.length} open · ${done.length} completed</p></div><div class='row'><input id='assignSearch' placeholder='Filter…' style='width:160px;padding:7px;font-size:.8rem' value='${esc(searchQuery)}'><button class='btn primary' data-open='assignment'>＋ Add</button></div></div>${filterAssignments(open).map(taskCard).join("") || `<div class='note'>No matching assignments.</div>`}${done.length ? `<details style='margin-top:14px'><summary style='cursor:pointer;font-weight:800;color:var(--muted);font-size:.85rem'>Turned in (${done.length})</summary><div style='margin-top:8px'>${done.map(taskCard).join("")}</div></details>` : ""}</section>`;
        }

        function filterAssignments(list) {
          if (!searchQuery) return list;
          const q = searchQuery.toLowerCase();
          return list.filter(
            (a) =>
              a.title.toLowerCase().includes(q) ||
              getClass(a.classId).name.toLowerCase().includes(q),
          );
        }

        // ── Classes ──
        function classes() {
          return `<section class='card'><div class='head'><div><h3>Classes</h3><p class='sub'>Manual and Google Classroom synced courses.</p></div><div class='row'><button class='btn primary' id='syncClassroomClasses'>🔄 Sync Classroom</button><button class='btn' data-open='class'>＋ Add</button></div></div><div class='grid g3' style='margin-top:10px'>${state.classes.map((c) => `<div class='item'><h4>${esc(c.name)}</h4><p>${esc(c.teacher || "No teacher")} · ${esc(c.room || c.email || "No details")}</p><div class='row' style='margin-top:8px'><span class='pill' style='background:${c.color}22;color:${c.color}'>${esc(c.source || "Manual")}</span>${c.link ? `<a class='btn' target='_blank' rel='noopener' href='${esc(c.link)}'>Open ↗</a>` : ""}<button class='btn' data-edit='class' data-id='${c.id}'>Edit</button><button class='btn danger' data-del='class' data-id='${c.id}'>Del</button></div></div>`).join("")}</div></section>`;
        }

        // ── Focus ──
        function focus() {
          const open = openTasks();
          const circumference = 2 * Math.PI * 88;
          const totalSec =
            timer.mode === "Work"
              ? (state.settings.focusMinutes || 10) * 60
              : (state.settings.breakMinutes || 3) * 60;
          const pct = totalSec > 0 ? timer.sec / totalSec : 0;
          const offset = circumference * (1 - pct);
          return `<section class='card'><div class='head'><div><h3>Focus Timer</h3><p class='sub'>Custom work/break sprints with visual progress.</p></div></div><div class='timerMode'>${esc(timer.mode)} ${timer.run ? "· Running" : "· Paused"}</div><div class='timerRing'><svg viewBox='0 0 200 200'><circle class='track' cx='100' cy='100' r='88'/><circle class='progress' cx='100' cy='100' r='88' stroke-dasharray='${circumference}' stroke-dashoffset='${offset}'/></svg><div style='position:absolute;inset:0;display:grid;place-items:center'><div class='timerDisplay' id='timerDisplay'>${fmt(timer.sec)}</div></div></div><div class='grid g2'><div class='field'><label>Work (min)</label><input type='number' id='focusMinutes' min='1' max='180' value='${timer.mode === "Work" ? Math.max(1, Math.round(timer.sec / 60)) : state.settings.focusMinutes}'></div><div class='field'><label>Break (min)</label><input type='number' id='breakMinutes' min='1' max='90' value='${state.settings.breakMinutes}'></div></div><div class='field'><label>Task</label><select id='timerTask'>${open.map((a) => `<option value='${a.id}' ${timer.taskId === a.id ? "selected" : ""}>${esc(a.title)} — ${esc(getClass(a.classId).name)}</option>`).join("")}${!open.length ? "<option>No open tasks</option>" : ""}</select></div><div class='row'><button class='btn primary' id='applyTimer'>Set</button><button class='btn amber' id='timerStart'>${timer.run ? "⏸ Pause" : "▶ Start"}</button><button class='btn' id='timerReset'>Reset</button><button class='btn' data-preset='5'>5m</button><button class='btn' data-preset='10'>10m</button><button class='btn' data-preset='15'>15m</button><button class='btn' data-preset='25'>25m</button><button class='btn' data-preset='45'>45m</button></div></section>`;
        }

        // ── Email Coach ──
        function email() {
          const opts = state.classes
            .map(
              (c) =>
                `<option value='${c.id}'>${esc(c.name)} — ${esc(c.teacher || "Teacher")}</option>`,
            )
            .join("");
          return `<section class='card'><div class='head'><div><h3>Email Coach</h3><p class='sub'>Helps write clear teacher emails. Edit before sending.</p></div></div><div class='grid g2'><div><div class='field'><label>Class / Teacher</label><select id='mailClass'>${opts}</select></div><div class='field'><label>What do you need help with?</label><textarea id='mailNeed' placeholder='I am stuck on…'></textarea></div><div class='row'><button class='btn primary' id='makeMail'>Create draft</button><button class='btn' id='openMail'>Open mail app</button></div></div><div><div class='mailPreview' id='mailPreview'>Your draft will appear here.</div></div></div></section>`;
        }

        // ── Google Sync ──
        function sync() {
          const syncing = GoogleSync.isSyncing;
          const bookmarklet = `javascript:void(function(){try{var items=[];document.querySelectorAll('[data-course-id],.JwPp0e,.asQXV').forEach(function(el){var title=el.querySelector('.YVvGBb,.onkcGd,.EhRlC');var due=el.querySelector('.CJk6Gc,.lTLBPd');var course=el.querySelector('.YVvGBb,.asQXV')?.closest('[data-course-id]')?.querySelector('.YVvGBb');if(title){items.push({t:title.textContent.trim(),d:due?due.textContent.trim():'',c:course?course.textContent.trim():''})}});if(!items.length){document.querySelectorAll('.asQXV,.JwPp0e').forEach(function(el){items.push({t:el.textContent.trim().slice(0,80),d:'',c:''})});}var data=encodeURIComponent(JSON.stringify(items));window.open('${location.origin}/noam-school/?import='+data,'_blank')}catch(e){alert('Bookmarklet error: '+e.message)}})()`;

          return `<section class='card'><div class='head'><div><h3>Google Sync</h3><p class='sub'>Multiple ways to sync — works even without school admin permission.</p></div><button class='btn' id='checkGoogle'>Check status</button></div>

          <div class='note' style='margin-bottom:14px'><strong>How syncing works:</strong> Choose any method below. The bookmarklet works without any school permission — just drag it to your bookmarks bar and click it while on Google Classroom.</div>

          <div class='grid g2' style='margin-bottom:14px'>
            <div class='card'>
              <h3>Method 1: Bookmarklet (No Permission Needed)</h3>
              <p class='sub' style='margin-bottom:10px'>Works on any school Chromebook. Drag this button to your bookmarks bar, then click it while viewing Google Classroom:</p>
              <a class='btn primary' href='${esc(bookmarklet)}' onclick='event.preventDefault();alert("Drag this to your bookmarks bar, don\\'t click it!")' style='font-size:.9rem;padding:12px 16px'>📚 Grab Classroom</a>
              <p class='sub' style='margin-top:8px'>After clicking the bookmarklet on classroom.google.com, it will open this page with your assignments ready to import.</p>
            </div>
            <div class='card'>
              <h3>Method 2: Paste Import</h3>
              <p class='sub' style='margin-bottom:10px'>Copy assignment info from Google Classroom and paste it here:</p>
              <textarea id='pasteImport' placeholder='Paste assignments here — one per line, or paste a list from Classroom. Format: Title | Class | Due date' style='min-height:100px'></textarea>
              <button class='btn primary' id='parsePaste' style='margin-top:8px'>Import from paste</button>
            </div>
          </div>

          <div class='card' style='margin-bottom:14px'>
            <h3>Method 3: Google Calendar Embed (Shows Classroom Assignments)</h3>
            <p class='sub' style='margin-bottom:8px'>Google Classroom automatically adds assignments to your Google Calendar. Embedding your calendar here shows all assignments without needing API access.</p>
            <div class='field'><label>Your Google Calendar embed URL</label><input id='quickCalEmbed' value='${esc(state.settings.calendarEmbed)}' placeholder='Paste iframe src or full embed code from Google Calendar → Settings → Integrate'></div>
            <button class='btn primary' id='saveQuickCal'>Save Calendar Embed</button>
            <p class='sub' style='margin-top:6px'>How to get it: Google Calendar → Settings ⚙️ → your calendar → "Integrate calendar" → copy the embed URL.</p>
          </div>

          <div class='card' style='margin-bottom:14px'>
            <h3>Method 4: API Sync (Requires Setup)</h3>
            <p class='sub' style='margin-bottom:8px'>Full automated sync via Cloudflare Pages Functions. Requires OAuth configuration.</p>
            <div class='syncBox ${state.google.connected ? "connected" : ""}' style='margin-bottom:10px'>${state.google.connected ? `<strong>✓ Connected${state.google.profile?.email ? " as " + esc(state.google.profile.email) : ""}</strong><p class='sub'>Last sync: ${state.google.lastSync ? fmtDate(state.google.lastSync) : "never"}</p>` : '<strong>Not connected</strong><p class="sub">Requires Cloudflare OAuth/KV setup.</p>'}</div>
            <div class='row'><a class='btn primary' href='/api/google/login'>Connect Google</a><button class='btn ${syncing ? "syncing" : ""}' id='syncCalendar'>${syncing ? "⟳" : "📅"} Sync Calendar</button><button class='btn primary ${syncing ? "syncing" : ""}' id='syncClassroom'>${syncing ? "⟳" : "📚"} Sync Classroom</button><a class='btn danger' href='/api/google/logout'>Disconnect</a></div>
          </div>

          <div class='grid g2'><div class='card'><h3>Calendar Events (${(state.google.events || []).length})</h3>${
            (state.google.events || [])
              .slice(0, 8)
              .map(
                (e) =>
                  `<div class='item'><h4>${esc(e.title)}</h4><p>${esc(fmtDate(e.start))}</p></div>`,
              )
              .join("") || `<p class='sub'>No synced events.</p>`
          }</div><div class='card'><h3>Classroom Coursework (${(state.google.classroomAssignments || []).length})</h3>${
            (state.google.classroomAssignments || [])
              .slice(0, 10)
              .map(
                (a) =>
                  `<div class='item'><div class='itemTop'><div><h4>${esc(a.title)}</h4><p>${esc(a.courseName || "Class")} · ${esc(fmtDate(a.due))}</p></div>${state.assignments.some((x) => x.googleId === a.id) ? `<span class='pill green'>Imported</span>` : `<button class='btn primary' data-import-work='${esc(a.id)}'>Import</button>`}</div></div>`,
              )
              .join("") || `<p class='sub'>No synced items.</p>`

        // ── Analytics ──
        function analytics() {
          const summary = Analytics.getWeekSummary();
          const breakdown = Analytics.getSubjectBreakdown();
          const maxMin = breakdown.length ? breakdown[0][1] : 1;
          return `<section class='card'><div class='head'><div><h3>Analytics</h3><p class='sub'>Focus time, completions, and streaks.</p></div></div><div class='grid g2' style='margin-bottom:14px'><div class='item'><h4>${summary.sessions}</h4><p>Focus sprints this week</p></div><div class='item'><h4>${summary.totalMinutes}m</h4><p>Total focus time</p></div><div class='item'><h4>${summary.completed}</h4><p>Assignments completed</p></div><div class='item'><h4>${summary.streak} 🔥</h4><p>Day streak</p></div></div><h3 style='margin-bottom:8px'>Time by Subject</h3>${breakdown.length ? breakdown.map(([name, mins]) => `<div style='margin-bottom:8px'><div class='row' style='justify-content:space-between'><span style='font-weight:700;font-size:.85rem'>${esc(name)}</span><span style='font-size:.8rem;color:var(--muted)'>${mins}m</span></div><div class='progress'><span style='width:${(mins / maxMin) * 100}%'></span></div></div>`).join("") : `<div class='note'>Complete focus sprints to see data here.</div>`}<h3 style='margin:16px 0 8px'>Recent Wins</h3>${
            state.wins
              .slice(-10)
              .reverse()
              .map(
                (w) =>
                  `<div class='item'><div class='itemTop'><span>${esc(w.text)}</span><span class='pill'>${esc(w.date)}</span></div></div>`,
              )
              .join("") ||
            `<div class='note'>Log wins from the home page.</div>`
          }</section>`;
        }

        // ── Calendar Tab ──
        function calendarTab() {
          const src = extractCal(state.settings.calendarEmbed);
          const events = state.google.events || [];
          const assignmentsDue = state.assignments.filter(
            (a) => a.status !== "Turned In" && a.due,
          );

          // Build mini month calendar
          const now = new Date();
          const year = now.getFullYear(),
            month = now.getMonth();
          const firstDay = new Date(year, month, 1).getDay();
          const daysInMonth = new Date(year, month + 1, 0).getDate();
          const monthName = now.toLocaleDateString(undefined, {
            month: "long",
            year: "numeric",
          });

          let calGrid = `<div style='display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;font-size:.78rem'>`;
          ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"].forEach(
            (d) =>
              (calGrid += `<div style='font-weight:900;color:var(--muted);padding:4px'>${d}</div>`),
          );
          for (let i = 0; i < firstDay; i++) calGrid += `<div></div>`;
          for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
            const isToday = dateStr === iso();
            const hasDue = assignmentsDue.some((a) => a.due === dateStr);
            const hasEvent = events.some(
              (e) => (e.start || "").slice(0, 10) === dateStr,
            );
            let style = "padding:6px;border-radius:8px;cursor:default;";
            if (isToday)
              style += "background:var(--teal);color:white;font-weight:900;";
            else if (hasDue)
              style +=
                "background:var(--softR);color:var(--red);font-weight:800;";
            else if (hasEvent)
              style +=
                "background:var(--softB);color:var(--blue);font-weight:700;";
            calGrid += `<div style='${style}' title='${hasDue ? "Assignment due" : hasEvent ? "Event" : ""}'>${d}${hasDue ? '<div style="width:5px;height:5px;background:var(--red);border-radius:50%;margin:2px auto 0"></div>' : ""}</div>`;
          }
          calGrid += `</div>`;

          // Upcoming items list
          const upcoming = [
            ...assignmentsDue.map((a) => ({
              title: a.title,
              date: a.due,
              type: "assignment",
              classId: a.classId,
            })),
            ...events.map((e) => ({
              title: e.title,
              date: (e.start || "").slice(0, 10),
              type: "event",
              link: e.link,
            })),
          ]
            .filter((x) => x.date >= iso())
            .sort((a, b) => a.date.localeCompare(b.date))
            .slice(0, 15);

          return `<section class='card'><div class='head'><div><h3>Calendar</h3><p class='sub'>${monthName} — assignments and events at a glance.</p></div><div class='row'><button class='btn' id='syncCalTab'>🔄 Sync</button><button class='btn' data-view='settings'>⚙️ Embed</button></div></div>
          <div class='grid g2' style='margin-top:12px'>
            <div>
              <div class='card' style='padding:14px'>${calGrid}</div>
              <div style='margin-top:10px;display:flex;gap:12px;font-size:.75rem;color:var(--muted)'><span><span style='display:inline-block;width:10px;height:10px;background:var(--teal);border-radius:50%;vertical-align:middle'></span> Today</span><span><span style='display:inline-block;width:10px;height:10px;background:var(--softR);border-radius:50%;vertical-align:middle'></span> Due</span><span><span style='display:inline-block;width:10px;height:10px;background:var(--softB);border-radius:50%;vertical-align:middle'></span> Event</span></div>
            </div>
            <div>
              <h3 style='margin-bottom:8px'>Upcoming</h3>
              ${upcoming.length ? upcoming.map((x) => `<div class='item'><div class='itemTop'><div><h4>${esc(x.title)}</h4><p>${esc(dueLabel(x.date))} · <span class='pill ${x.type === "assignment" ? "red" : "blue"}'>${x.type === "assignment" ? "Due" : "Event"}</span>${x.classId ? ` · ${esc(getClass(x.classId).name)}` : ""}</p></div></div></div>`).join("") : `<div class='note'>No upcoming items. Add assignments or sync Google Calendar.</div>`}
            </div>
          </div>
          ${src ? `<div style='margin-top:14px'><h3 style='margin-bottom:8px'>Embedded Calendar</h3><div class='calendarBox' style='padding:0'><iframe src='${esc(src)}' loading='lazy' title='Google Calendar' style='height:450px'></iframe></div></div>` : `<div class='note' style='margin-top:14px'>Paste a Google Calendar embed URL in Settings to see the full calendar here, or use the Classroom Sync bookmarklet below.</div>`}
          </section>`;
        }

        // ── Home Customization ──
        function homeCustomizePanel() {
          const allCards = {
            launch: "Daily Launch",
            schedule: "Today Schedule",
            today: "Today Work",
            calendar: "Calendar",
            reminders: "Reminders",
            week: "Weekly Checklist",
            google: "Google Classroom",
            onDeck: "On Deck",

            analytics: "Quick Stats",

          <div class='grid g2'>
            <div><h4 style='margin-bottom:8px;color:var(--navy)'>Visible Cards</h4>${visible

          </div></section>`;
