        // ── Settings ──
        function settings() {
          return `<section class='card'><div class='head'><div><h3>Settings</h3><p class='sub'>Student info, preferences, backup, and configuration.</p></div></div><div class='grid g2'><div><div class='field'><label>Student name</label><input id='setName' value='${esc(state.settings.studentName)}'></div><div class='field'><label>School</label><input id='setSchool' value='${esc(state.settings.schoolName)}'></div><div class='field'><label>School Gmail</label><input id='setGmail' value='${esc(state.settings.gmail)}' type='email'></div><div class='grid g2'><div class='field'><label>Focus (min)</label><input type='number' id='setFocus' min='1' max='180' value='${state.settings.focusMinutes}'></div><div class='field'><label>Break (min)</label><input type='number' id='setBreak' min='1' max='90' value='${state.settings.breakMinutes}'></div></div><div class='field'><label>Calendar embed URL or iframe</label><textarea id='setCalEmbed'>${esc(state.settings.calendarEmbed)}</textarea></div><div class='field'><label>Calendar link (optional)</label><input id='setCalLink' value='${esc(state.settings.calendarLink)}'></div><button class='btn primary' id='saveSettings'>Save settings</button></div><div><div class='note' style='margin-bottom:12px'><strong>Keyboard shortcuts:</strong><br>⌘K / Ctrl+K — Command palette<br>Alt+D — Toggle dark mode<br>⌘Z / Ctrl+Z — Undo<br>⌘⇧Z / Ctrl+Y — Redo<br>1–9 — Switch tabs</div><div class='note' style='margin-bottom:12px'><strong>Auto behaviors:</strong> Reminders reset daily. Weekly checklist resets Monday. Google Classroom auto-syncs every 15 min when connected. Notifications fire 30 min before timed reminders (if enabled).</div><div class='row' style='gap:6px'><button class='btn' id='resetHome'>Reset layout</button><button class='btn' id='exportData'>Export</button><label class='btn'>Import<input type='file' id='importData' accept='application/json' style='display:none'></label><button class='btn danger' id='resetAll'>Reset all</button></div></div></div></section>`;
        }

        // ═══════════════════════════════════════════════════════════════
        // FORMS
        // ═══════════════════════════════════════════════════════════════

        function assignmentForm(a = {}) {
          return `<div class='field'><label>Title</label><input id='fTitle' value='${esc(a.title || "")}' required></div><div class='grid g2'><div class='field'><label>Class</label><select id='fClass'>${state.classes.map((c) => `<option value='${c.id}' ${a.classId === c.id ? "selected" : ""}>${esc(c.name)}</option>`).join("")}</select></div><div class='field'><label>Due date</label><input type='date' id='fDue' value='${esc(a.due || iso())}'></div><div class='field'><label>Priority</label><select id='fPri'>${["High", "Medium", "Low"].map((p) => `<option ${a.priority === p ? "selected" : ""}>${p}</option>`).join("")}</select></div><div class='field'><label>Status</label><select id='fStatus'>${["Not Started", "Started", "Need Help", "Almost Done", "Turned In"].map((s) => `<option ${a.status === s ? "selected" : ""}>${s}</option>`).join("")}</select></div></div><div class='field'><label>Notes</label><textarea id='fNotes'>${esc(a.notes || "")}</textarea></div><button class='btn primary' id='saveAssignment' data-id='${a.id || ""}'>Save</button>`;
        }

        function reminderForm(r = {}) {
          return `<div class='field'><label>Reminder text</label><input id='rText' value='${esc(r.text || "")}' required></div><div class='grid g2'><div class='field'><label>Time</label><input type='time' id='rTime' value='${esc(r.time || "")}'></div><div class='field'><label>Repeat</label><select id='rRepeat'>${["Daily", "Weekdays", "Weekly", "One-time"].map((x) => `<option ${r.repeat === x ? "selected" : ""}>${x}</option>`).join("")}</select></div><div class='field'><label>Day (for weekly)</label><select id='rDay'><option value=''>Any</option>${DAYS.map((d) => `<option ${r.day === d ? "selected" : ""}>${d}</option>`).join("")}</select></div></div><button class='btn primary' id='saveReminder' data-id='${r.id || ""}'>Save</button>`;
        }

        function classForm(c = {}) {
          return `<div class='field'><label>Class name</label><input id='cName' value='${esc(c.name || "")}' required></div><div class='grid g2'><div class='field'><label>Teacher</label><input id='cTeacher' value='${esc(c.teacher || "")}'></div><div class='field'><label>Email</label><input id='cEmail' value='${esc(c.email || "")}' type='email'></div><div class='field'><label>Room</label><input id='cRoom' value='${esc(c.room || "")}'></div><div class='field'><label>Color</label><input type='color' id='cColor' value='${esc(c.color || "#147c78")}'></div></div><button class='btn primary' id='saveClass' data-id='${c.id || ""}'>Save</button>`;
        }

        function scheduleForm(s = {}, day = todayName()) {
          return `<div class='grid g2'><div class='field'><label>Day</label><select id='sDay'>${DAYS.map((d) => `<option ${day === d ? "selected" : ""}>${d}</option>`).join("")}</select></div><div class='field'><label>Class (optional)</label><select id='sClass'><option value=''>None</option>${state.classes.map((c) => `<option value='${c.id}' ${s.classId === c.id ? "selected" : ""}>${esc(c.name)}</option>`).join("")}</select></div><div class='field'><label>Start</label><input type='time' id='sStart' value='${esc(s.start || "08:00")}'></div><div class='field'><label>End</label><input type='time' id='sEnd' value='${esc(s.end || "08:45")}'></div></div><div class='field'><label>Title</label><input id='sTitle' value='${esc(s.title || "")}' placeholder='Math, Lunch, Advisory…' required></div><div class='grid g2'><div class='field'><label>Location</label><input id='sLocation' value='${esc(s.location || "")}'></div><div class='field'><label>Notes</label><input id='sNotes' value='${esc(s.notes || "")}'></div></div><button class='btn primary' id='saveSchedule' data-id='${s.id || ""}' data-original-day='${day}'>Save</button>`;
        }

        function quickPlanForm() {
          return `<div class='field'><label>Top goal today</label><input id='qpGoal' value='${esc(state.daily.topGoal)}' placeholder='e.g., finish math and pack bag'></div><div class='field'><label>First task</label><select id='qpTask'><option value=''>None</option>${openTasks()
            .map(
              (a) =>
                `<option value='${a.id}' ${state.daily.selectedTask === a.id ? "selected" : ""}>${esc(a.title)}</option>`,
            )
            .join(
              "",
            )}</select></div><label class='check'><input type='checkbox' id='qpClassroom' ${state.daily.checkedClassroom ? "checked" : ""}><span class='mainText'>Checked Google Classroom</span></label><label class='check'><input type='checkbox' id='qpPacked' ${state.daily.packed ? "checked" : ""}><span class='mainText'>Bag / Chromebook ready</span></label><button class='btn primary' id='saveQuickPlan'>Save Launch ☀️</button>`;
        }

        function winForm() {
          return `<div class='field'><label>What went well?</label><input id='winText' placeholder='e.g., finished math sprint' required></div><button class='btn primary' id='saveWin'>Log Win 🎉</button>`;
        }

        // ═══════════════════════════════════════════════════════════════
        // EVENT BINDING
        // ═══════════════════════════════════════════════════════════════

        function bindEvents() {
          // Tab navigation
          $$("[data-view]").forEach(
            (b) => (b.onclick = () => setView(b.dataset.view)),
          );

          // Open modals
          $$("[data-open]").forEach(
            (b) =>
              (b.onclick = () => {
                const t = b.dataset.open;
                if (t === "assignment")
                  openModal("Assignment", assignmentForm());
                if (t === "reminder")
                  openModal("Timed reminder", reminderForm());
                if (t === "class") openModal("Class", classForm());
                if (t === "schedule")
                  openModal(
                    "Schedule block",
                    scheduleForm({}, b.dataset.day || todayName()),
                  );
                if (t === "quickPlan")
                  openModal("Daily Launch", quickPlanForm());
                if (t === "win") openModal("Log a Win", winForm());
              }),
          );

          // Edit modals
          $$("[data-edit]").forEach(
            (b) =>
              (b.onclick = () => {
                const t = b.dataset.edit,
                  id = b.dataset.id;
                if (t === "assignment")
                  openModal(
                    "Edit Assignment",
                    assignmentForm(state.assignments.find((x) => x.id === id)),
                  );
                if (t === "reminder")
                  openModal(
                    "Edit Reminder",
                    reminderForm(state.reminders.find((x) => x.id === id)),
                  );
                if (t === "class")
                  openModal(
                    "Edit Class",
                    classForm(state.classes.find((x) => x.id === id)),
                  );
                if (t === "schedule") {
                  const day = b.dataset.day;
                  const s = (state.schedule[day] || []).find(
                    (x) => x.id === id,
                  );
                  openModal("Edit Schedule", scheduleForm(s, day));
                }
              }),
          );

          // Delete
          $$("[data-del]").forEach(
            (b) =>
              (b.onclick = () => {
                if (!confirm("Delete this?")) return;
                StateManager.snapshot();
                const t = b.dataset.del,
                  id = b.dataset.id;
                if (t === "schedule") {
                  const d = b.dataset.day;
                  state.schedule[d] = state.schedule[d].filter(
                    (x) => x.id !== id,
                  );
                } else
                  state[t + "s"] = state[t + "s"].filter((x) => x.id !== id);
                save();
                toast("Deleted");
                render();
              }),
          );

          // Turn in assignment quickly
          $$("[data-turnin]").forEach(
            (b) =>
              (b.onclick = () => {
                StateManager.snapshot();
                const a = state.assignments.find(
                  (x) => x.id === b.dataset.turnin,
                );
                if (a) {
                  a.status = "Turned In";
                  a.completed = iso();
                  save();
                  toast("Marked done!", "success");
                  render();
                }
              }),
          );

          // Reminder checkboxes
          $$("[data-rem-check]").forEach(
            (x) =>
              (x.onchange = () => {
                const r = state.reminders.find(
                  (r) => r.id === x.dataset.remCheck,
                );
                if (r) {
                  r.done = x.checked;
                  save();
                  render();
                }
              }),
          );

          // Weekly checklist
          $$("[data-week-check]").forEach(
            (x) =>
              (x.onchange = () => {
                const [d, id] = x.dataset.weekCheck.split("|");
                const w = (state.weekly[d] || []).find((i) => i.id === id);
                if (w) {
                  w.done = x.checked;
                  save();
                  render();
                }
              }),
          );

          $$("[data-week-add]").forEach(
            (b) =>
              (b.onclick = () => {
                const d = b.dataset.weekAdd,
                  inp = $(`[data-week-input='${d}']`),
                  text = (inp.value || "").trim();
                if (!text) return;
                state.weekly[d].push({ id: uid("w"), text, done: false });
                save();
                render();
              }),
          );

          $$("[data-week-del]").forEach(
            (b) =>
              (b.onclick = () => {
                const [d, id] = b.dataset.weekDel.split("|");
                state.weekly[d] = state.weekly[d].filter((i) => i.id !== id);
                save();
                render();
              }),
          );

          // Focus start from assignment
          $$("[data-start]").forEach(
            (b) =>
              (b.onclick = () => {
                timer.taskId = b.dataset.start;
                setView("focus");
              }),
          );

          // Move cards
          $$("[data-move]").forEach(
            (b) =>
              (b.onclick = () => {
                const [k, dir] = b.dataset.move.split("|");
                const a = state.settings.homeOrder,
                  i = a.indexOf(k),
                  j = dir === "up" ? i - 1 : i + 1;
                if (i < 0 || j < 0 || j >= a.length) return;
                [a[i], a[j]] = [a[j], a[i]];
                save();
                render();
              }),
          );

          // Import Google work
          $$("[data-import-work]").forEach(
            (b) =>
              (b.onclick = () => {
                GoogleSync.importWork(b.dataset.importWork);
                render();
              }),
          );

          // Timer presets
          $$("[data-preset]").forEach(
            (b) =>
              (b.onclick = () => {
                const mins = Number(b.dataset.preset);
                timer.mode = "Work";
                timer.sec = mins * 60;
                state.settings.focusMinutes = mins;
                save();
                render();
              }),
          );

          // Timer controls
          const tt = $("#timerTask");
          if (tt) tt.onchange = () => (timer.taskId = tt.value);
          const ap = $("#applyTimer");
          if (ap)
            ap.onclick = () => {
              const mins = clamp(
                Number($("#focusMinutes").value) || 10,
                1,
                180,
              );
              const br = clamp(Number($("#breakMinutes").value) || 3, 1, 90);
              state.settings.focusMinutes = mins;
              state.settings.breakMinutes = br;
              timer.mode = "Work";
              timer.sec = mins * 60;
              save();
              render();
              toast("Timer set");
            };
          const st = $("#timerStart");
          if (st) st.onclick = startTimer;
          const tr = $("#timerReset");
          if (tr)
            tr.onclick = () => {
              stopTimer();
              timer.mode = "Work";
              timer.sec = (state.settings.focusMinutes || 10) * 60;
              render();
            };

          // Today plan save
          const saveT = $("#saveToday");
          if (saveT)
            saveT.onclick = () => {
              StateManager.snapshot();
              state.daily.topGoal = ($("#goalInput").value || "").trim();
              state.daily.launchDone = $("#launchDone").checked;
              state.daily.checkedClassroom = $("#checkedClassroom").checked;
              state.daily.packed = $("#packed").checked;
              save();
              render();
              toast("Saved");
            };

          // Settings save
          const sm = $("#saveSettings");
          if (sm)
            sm.onclick = () => {
              StateManager.snapshot();
              state.settings.studentName =
                ($("#setName").value || "").trim() || "Noam";
              state.settings.schoolName = ($("#setSchool").value || "").trim();
              state.settings.gmail = ($("#setGmail").value || "").trim();
              state.settings.focusMinutes = clamp(
                Number($("#setFocus").value) || 10,
                1,
                180,
              );
              state.settings.breakMinutes = clamp(
                Number($("#setBreak").value) || 3,
                1,
                90,
              );
              state.settings.calendarEmbed = (
                $("#setCalEmbed").value || ""
              ).trim();
              state.settings.calendarLink = (
                $("#setCalLink").value || ""
              ).trim();
              timer.mode = "Work";
              timer.sec = state.settings.focusMinutes * 60;
              save();
              render();
              toast("Settings saved", "success");
            };

          // Email coach
          const mm = $("#makeMail");
          if (mm) mm.onclick = makeMail;
          const om = $("#openMail");
          if (om) om.onclick = openMail;

          // Export/import/reset
          const ex = $("#exportData");

        // ═══════════════════════════════════════════════════════════════

        function setupDragDrop() {
          let dragged = null;
          $$(".homeCard").forEach((c) => {
            c.ondragstart = (e) => {
              dragged = c.dataset.card;
              c.classList.add("dragging");
              e.dataTransfer.effectAllowed = "move";
            };
            c.ondragend = () => {
              c.classList.remove("dragging");
              dragged = null;
            };
            c.ondragover = (e) => e.preventDefault();
            c.ondrop = (e) => {
              e.preventDefault();
              if (!dragged || dragged === c.dataset.card) return;
              const arr = state.settings.homeOrder.filter((x) => x !== dragged);
              const idx = arr.indexOf(c.dataset.card);
              arr.splice(idx, 0, dragged);
              state.settings.homeOrder = arr;
              save();
              render();
            };
          });
        }

        // ═══════════════════════════════════════════════════════════════
        // TIMER ENGINE
        // ═══════════════════════════════════════════════════════════════

        function startTimer() {
          if (timer.run) {
            stopTimer();
            render();
            return;
          }
          timer.run = true;
          timer._int = setInterval(() => {
            timer.sec = Math.max(0, timer.sec - 1);
            const d = $("#timerDisplay");
            if (d) d.textContent = fmt(timer.sec);
            // Update ring
            const circumference = 2 * Math.PI * 88;
            const totalSec =
              timer.mode === "Work"
                ? (state.settings.focusMinutes || 10) * 60
                : (state.settings.breakMinutes || 3) * 60;
            const pct = totalSec > 0 ? timer.sec / totalSec : 0;
            const ring = $(".timerRing .progress");
            if (ring) ring.style.strokeDashoffset = circumference * (1 - pct);

            if (timer.sec <= 0) {
              if (timer.mode === "Work") {
                state.sessions.push({
                  id: uid("s"),
                  assignmentId: timer.taskId,
                  minutes: state.settings.focusMinutes,
                  date: iso(),
                });
                timer.mode = "Break";
                timer.sec = (state.settings.breakMinutes || 3) * 60;
                save();
                toast("Sprint done! Take a break.", "success");
                if (NotifService._permitted)
                  new Notification("Focus Sprint Complete!", {
                    body: "Time for a break.",
                  });
              } else {
                stopTimer();
                timer.mode = "Work";
                timer.sec = (state.settings.focusMinutes || 10) * 60;
                toast("Break over — ready for another sprint?");
              }
              render();
            }
          }, 1000);
          render();
        }

        function stopTimer() {
          timer.run = false;
          clearInterval(timer._int);
        }
        function fmt(s) {
          return (
            String(Math.floor(s / 60)).padStart(2, "0") +
            ":" +
            String(s % 60).padStart(2, "0")
          );
        }

              render();
              toast("Imported!", "success");

        // KEYBOARD SHORTCUTS
        // ═══════════════════════════════════════════════════════════════

        document.addEventListener("keydown", (e) => {
          // Command palette
          if ((e.metaKey || e.ctrlKey) && e.key === "k") {
            e.preventDefault();
            openCmd();
          }
          if (e.key === "Escape") {
            if ($("#cmdOverlay").classList.contains("open")) {
              closeCmd();
              return;
            }
            if ($("#modalBack").classList.contains("open")) {
              closeModal();
              return;
            }
          }

          // Undo/Redo
          if ((e.metaKey || e.ctrlKey) && e.key === "z" && !e.shiftKey) {
            e.preventDefault();
            if (StateManager.undo()) {
              toast("Undone");
              render();
            }
          }
          if (
            (e.metaKey || e.ctrlKey) &&
            (e.key === "y" || (e.key === "z" && e.shiftKey))
          ) {
            e.preventDefault();
            if (StateManager.redo()) {
              toast("Redone");
              render();
            }
          }

          // Dark mode
          if (e.altKey && e.key === "d") {
            e.preventDefault();
            toggleTheme();
          }

          // Number keys for tabs (when not in input)
          if (
            !e.metaKey &&
            !e.ctrlKey &&
            !e.altKey &&
            e.target.tagName !== "INPUT" &&
            e.target.tagName !== "TEXTAREA" &&
            e.target.tagName !== "SELECT"
          ) {
            const views = [
              "home",
              "today",
              "schedule",
              "reminders",
              "assignments",
              "classes",
              "calendar",
              "focus",
              "email",
              "sync",
              "analytics",
              "settings",
            ];
            const n = parseInt(e.key);
            if (n >= 1 && n <= views.length) {
              setView(views[n - 1]);
              e.preventDefault();
            }
          }

          // Command palette navigation
          if ($("#cmdOverlay").classList.contains("open")) {
            const results = $("#cmdResults");
            if (!results._items) return;
            let active = results._active || 0;
            if (e.key === "ArrowDown") {
              e.preventDefault();
              active = Math.min(active + 1, results._items.length - 1);
            }
            if (e.key === "ArrowUp") {
              e.preventDefault();
              active = Math.max(active - 1, 0);
            }
            if (e.key === "Enter" && results._items[active]) {
              e.preventDefault();
              results._items[active].action();
              closeCmd();
              return;
            }
            results._active = active;
            $$(".cmd-item", results).forEach((el, i) =>
              el.classList.toggle("active", i === active),
            );
          }
        });

        function showOnboarding() {

          const overlay = $("#onboardOverlay");

          const steps = [
            {
              title: "Welcome to Noam School! 👋",

              title: "How it works",

            },
            {
              title: "Keyboard shortcuts ⌨️",
              body: `<div style='text-align:left;font-size:.9rem'><p><kbd style='background:var(--paper2);border:1px solid var(--line);padding:2px 6px;border-radius:4px'>⌘K</kbd> — Search anything</p><p><kbd style='background:var(--paper2);border:1px solid var(--line);padding:2px 6px;border-radius:4px'>Alt+D</kbd> — Dark mode</p><p><kbd style='background:var(--paper2);border:1px solid var(--line);padding:2px 6px;border-radius:4px'>⌘Z</kbd> — Undo</p><p><kbd style='background:var(--paper2);border:1px solid var(--line);padding:2px 6px;border-radius:4px'>1-9</kbd> — Switch tabs</p></div>`,
            },
          ];

          let step = 0;
          function renderStep() {
            $("#onboardSteps").innerHTML = steps
              .map(
                (_, i) =>
                  `<div class='onboard-step ${i === step ? "active" : ""}'></div>`,
              )
              .join("");
            $("#onboardContent").innerHTML =
              `<h2>${steps[step].title}</h2>${steps[step].body}<div class='row' style='justify-content:center;margin-top:20px'>${step > 0 ? `<button class='btn' id='obPrev'>← Back</button>` : ""}<button class='btn primary' id='obNext'>${step === steps.length - 1 ? "Get started →" : "Next →"}</button></div>`;
            const prev = $("#obPrev");
            if (prev)
              prev.onclick = () => {
                step--;
                renderStep();
              };
            const next = $("#obNext");
            next.onclick = () => {
              if (step === 0) {
                const name = $("#obName");
                if (name)
                  state.settings.studentName = name.value.trim() || "Noam";
                const school = $("#obSchool");
                if (school) state.settings.schoolName = school.value.trim();
              }
              if (step >= steps.length - 1) {
                state.settings.onboardingDone = true;
                saveNow();
                overlay.style.display = "none";
                render();
              } else {
                step++;
                renderStep();
              }
            };
          }
          renderStep();
        }

        // Handle bookmarklet import via URL parameter
        (function handleBookmarkletImport() {
          const params = new URLSearchParams(location.search);
          const importData = params.get("import");
          if (!importData) return;
          try {
            const items = JSON.parse(decodeURIComponent(importData));
            if (!Array.isArray(items) || !items.length) return;
            StateManager.snapshot();
            let count = 0;
            items.forEach((item) => {
              const title = (item.t || "").trim();
              if (!title || title.length < 2) return;
              const className = (item.c || "").trim();
              const dueText = (item.d || "").trim();
              let classId = "";
              if (className) {
                const match = state.classes.find((c) =>
                  c.name.toLowerCase().includes(className.toLowerCase()),
                );
                if (match) classId = match.id;
                else {
                  const newClass = {
                    id: uid("class"),
                    name: className,
                    teacher: "",
                    email: "",
                    room: "",
                    color: [
                      "#147c78",
                      "#248a55",
                      "#b84234",
                      "#2f65d5",
                      "#d99028",
                    ][state.classes.length % 5],
                    source: "Bookmarklet",
                  };
                  state.classes.push(newClass);
                  classId = newClass.id;
                }
              }
              let due = "";
              if (dueText) {
                const parsed = new Date(dueText);
                if (!isNaN(parsed)) due = parsed.toISOString().slice(0, 10);
              }
              state.assignments.push({
                id: uid("a"),
                title,
                classId,
                due,
                priority: "Medium",
                status: "Not Started",
                notes: "Imported from Google Classroom bookmarklet",
                link: "",
                googleId: "",
                created: iso(),
                completed: "",
              });
              count++;
            });
            if (count) {
              saveNow();
              render();
              toast(count + " assignments imported from Classroom!", "success");
            }
            // Clean URL
            history.replaceState(null, "", location.pathname);
          } catch (e) {
            console.error("Bookmarklet import error:", e);
          }
        })();

        // Auto-sync on load
        setTimeout(() => GoogleSync.checkStatus(), 1000);
        setTimeout(() => GoogleSync.autoSync(), 3000);

        // Periodic refresh
        setInterval(shell, 60000);
        setInterval(() => {
          if (state.google.connected) GoogleSync.autoSync();
        }, 15 * 60000);

        // Notification scheduling
        if (
          state.settings.notificationsEnabled &&
          Notification.permission === "granted"
        ) {
          NotifService._permitted = true;
          NotifService.schedule(state.reminders);
        }
      })();
    </script>
  </body>
</html>
