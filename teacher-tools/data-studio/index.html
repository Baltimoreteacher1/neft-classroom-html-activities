<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Teacher Data Dashboard</title>
  <meta name="description" content="A teacher-friendly classroom data dashboard with optional advanced analysis, prediction, correlation, grouping, and plain-language explanations."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <link rel="stylesheet" href="./data-studio.css"/>
</head>
<body>
  <div id="app" class="app"></div>
  <div id="modalBackdrop" class="modal-backdrop" onclick="closeModal()"></div>
  <section id="explainModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-head">
      <div>
        <p class="eyebrow" style="margin-bottom:4px">Simple Explanation</p>
        <h2 id="modalTitle" class="card-title">Analysis Help</h2>
      </div>
      <button class="btn btn-light btn-small" onclick="closeModal()">Close</button>
    </div>
    <div id="modalBody" class="modal-body"></div>
  </section>
  <aside id="coachDrawer" class="drawer"></aside>
  <div id="toast" class="toast"></div>

  <script src="./data-studio.js"></script>
</body>
</html>
