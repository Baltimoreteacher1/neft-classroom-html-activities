    <script>
      (() => {

        /* =========================================================
   DETECTIVE INVESTIGATION — 6.SP.A.1
   Recognize statistical vs non-statistical questions.
   Investigate crime scenes, classify clues to crack cases.
   Phaser 3 single-file game.
   ========================================================= */

        // ── Sound synthesizer ──
        const SFX = {
          ctx: null,
          init() {
            if (!this.ctx) {
              const A = window.AudioContext || window.webkitAudioContext;
              if (A) this.ctx = new A();
            }
          },
          play(type) {
            this.init();
            if (!this.ctx) return;
            if (this.ctx.state === "suspended") this.ctx.resume();
            const o = this.ctx.createOscillator(),
              g = this.ctx.createGain(),
              t = this.ctx.currentTime;
            const presets = {
              correct: { wave: "sine", f: [520, 780], dur: 0.18, vol: 0.06 },
              wrong: { wave: "sawtooth", f: [300, 180], dur: 0.22, vol: 0.05 },
              click: { wave: "sine", f: [440, 480], dur: 0.08, vol: 0.04 },
              combo: { wave: "sine", f: [600, 900], dur: 0.25, vol: 0.06 },
              badge: { wave: "triangle", f: [660, 990], dur: 0.3, vol: 0.06 },
              whoosh: { wave: "sine", f: [200, 600], dur: 0.15, vol: 0.03 },
              alarm: { wave: "square", f: [380, 420], dur: 0.12, vol: 0.03 },
              levelup: {
                wave: "sine",
                f: [440, 660, 880],
                dur: 0.35,
                vol: 0.06,
              },
            };
            const p = presets[type] || presets.click;
            o.type = p.wave;
            o.frequency.setValueAtTime(p.f[0], t);
            if (p.f.length === 3) {
              o.frequency.linearRampToValueAtTime(p.f[1], t + p.dur * 0.5);
              o.frequency.linearRampToValueAtTime(p.f[2], t + p.dur);
            } else {
              o.frequency.linearRampToValueAtTime(p.f[1], t + p.dur);
            }
            g.gain.setValueAtTime(0.001, t);
            g.gain.linearRampToValueAtTime(p.vol, t + 0.02);
            g.gain.exponentialRampToValueAtTime(0.001, t + p.dur);
            o.connect(g).connect(this.ctx.destination);
            o.start(t);
            o.stop(t + p.dur + 0.01);
          },
        };

        // ── Questions bank: 6.SP.A.1 ──

        const CASE_THEMES = [
          { name: "Cafeteria Mystery", icon: "🍕", color: 0xf77f00 },
          { name: "Sports Arena Case", icon: "🏀", color: 0x2d6cdf },
          { name: "Weather Bureau File", icon: "🌧️", color: 0x1b998b },
          { name: "Tech Lab Incident", icon: "📱", color: 0x7b4cc2 },
          { name: "Wildlife Case", icon: "🐾", color: 0xe63946 },
        ];

        const W = 960,
          H = 640;

        function shuffle(a) {
          const b = [...a];
          for (let i = b.length - 1; i > 0; i--) {
            const j = (Math.random() * i + 1) | 0;
            [b[i], b[j]] = [b[j], b[i]];
          }
          return b;
        }

        // ═══════════════════════════════════════════════════
        class BootScene extends Phaser.Scene {
          constructor() {
            super("Boot");
          }
          create() {
            const g = this.make.graphics({ x: 0, y: 0, add: false });
            g.fillStyle(0xffffff, 1);
            g.fillCircle(4, 4, 4);
            g.generateTexture("dot", 8, 8);
            g.clear();
            g.fillStyle(0xf77f00, 1);
            g.fillRoundedRect(0, 0, 260, 56, 16);
            g.generateTexture("btn_orange", 260, 56);
            g.clear();
            g.fillStyle(0x1b998b, 1);
            g.fillRoundedRect(0, 0, 260, 56, 16);
            g.generateTexture("btn_teal", 260, 56);
            g.clear();
            g.fillStyle(0x14213d, 1);
            g.fillRoundedRect(0, 0, 260, 56, 16);
            g.generateTexture("btn_dark", 260, 56);
            g.clear();
            g.destroy();
            this.scene.start("Title");
          }
        }

        // ═══════════════════════════════════════════════════
        class TitleScene extends Phaser.Scene {
          constructor() {
            super("Title");
          }
          create() {
            const cx = W / 2;
            this.cameras.main.setBackgroundColor(0x0c1529);
            const bg = this.add.graphics();
            bg.fillGradientStyle(0x14213d, 0x14213d, 0x0c1529, 0x0c1529, 1);
            bg.fillRect(0, 0, W, H);
            this.add.particles(0, 0, "dot", {
              x: { min: 0, max: W },
              y: { min: 0, max: H },
              scale: { start: 0.3, end: 0 },
              alpha: { start: 0.4, end: 0 },
              speed: { min: 10, max: 30 },
              lifespan: 3000,
              frequency: 200,
              blendMode: "ADD",
            });
            const mag = this.add
              .text(cx, 130, "🔍", { fontSize: "72px" })
              .setOrigin(0.5);
            this.tweens.add({
              targets: mag,
              y: 120,
              duration: 1500,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut",
            });
            this.add
              .text(cx, 220, "DETECTIVE\nINVESTIGATION", {
                fontSize: "46px",
                fontFamily: "Trebuchet MS, sans-serif",
                fontStyle: "bold",
                color: "#fbbf24",
                align: "center",
                lineSpacing: 4,
                stroke: "#14213d",
                strokeThickness: 4,
              })
              .setOrigin(0.5);
            this.add
              .text(
                cx,
                310,
                "Can you tell statistical questions\nfrom non-statistical questions?",
                {
                  fontSize: "18px",
                  fontFamily: "Trebuchet MS, sans-serif",
                  color: "#f9d98a",
                  align: "center",
                  lineSpacing: 4,
                },
              )
              .setOrigin(0.5);
            this.add
              .text(cx, 360, "6.SP.A.1 — Recognize Statistical Questions", {
                fontSize: "13px",
                fontFamily: "Trebuchet MS, sans-serif",
                fontStyle: "bold",
                color: "#14213d",
                backgroundColor: "#fbbf24",
                padding: { x: 12, y: 6 },
              })
              .setOrigin(0.5);
            this.add
              .text(cx, 410, "Choose Your Difficulty", {
                fontSize: "16px",
                fontFamily: "sans-serif",
                fontStyle: "bold",
                color: "#ffffff",
              })
              .setOrigin(0.5);
            const modes = [
              {
                label: "🧭 Rookie (15 clues)",
                clues: 15,
                y: 455,
                key: "btn_teal",
              },
              {
                label: "🔍 Detective (20 clues)",
                clues: 20,
                y: 515,
                key: "btn_orange",
              },
              {
                label: "🏆 Master (25 clues)",
                clues: 25,
                y: 575,
                key: "btn_dark",
              },
            ];
            modes.forEach((m) => {
              const btn = this.add
                .image(cx, m.y, m.key)
                .setInteractive({ useHandCursor: true })
                .setScale(1, 0.9);
              this.add
                .text(cx, m.y, m.label, {
                  fontSize: "18px",
                  fontFamily: "Trebuchet MS, sans-serif",
                  fontStyle: "bold",
                  color: "#ffffff",
                })
                .setOrigin(0.5);
              btn.on("pointerover", () => {
                btn.setScale(1.05, 0.95);
                SFX.play("click");

              btn.on("pointerout", () => btn.setScale(1, 0.9));
              btn.on("pointerdown", () => {
                SFX.play("whoosh");
                this.cameras.main.fade(400, 0, 0, 0);
                this.time.delayedCall(400, () =>

        // ═══════════════════════════════════════════════════
        class GameScene extends Phaser.Scene {
          constructor() {
            super("Game");
          }
          init(data) {
            this.totalClues = data.totalClues || 20;
            this.score = 0;
            this.combo = 0;
            this.maxCombo = 0;
            this.lives = 3;
            this.clueIndex = 0;
            this.caseIndex = 0;
            this.answering = false;
            this.correct = 0;
            this.wrong = 0;
            this.casesCleared = 0;
            this.clues = shuffle(CLUE_BANK).slice(0, this.totalClues);
            this.cluesPerCase = Math.ceil(this.totalClues / CASE_THEMES.length);
          }
          create() {
            this.cameras.main.setBackgroundColor(0x0c1529);
            const bg = this.add.graphics();
            bg.fillGradientStyle(0x14213d, 0x14213d, 0x1a2744, 0x1a2744, 1);
            bg.fillRect(0, 0, W, H);
            for (let i = 0; i < 50; i++) {
              const s = this.add.circle(
                Math.random() * W,
                Math.random() * H,
                Math.random() * 1.5 + 0.5,
                0xffffff,
                Math.random() * 0.5 + 0.1,
              );
              this.tweens.add({
                targets: s,
                alpha: 0.1,
                duration: 1000 + Math.random() * 2000,
                yoyo: true,
                repeat: -1,
              });
            }
            this.createHUD();
            this.caseText = this.add
              .text(W / 2, 90, "", {
                fontSize: "22px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#fbbf24",
                stroke: "#14213d",
                strokeThickness: 3,
              })
              .setOrigin(0.5);
            this.caseIcon = this.add
              .text(W / 2 - 170, 85, "", { fontSize: "28px" })
              .setOrigin(0.5);
            this.questionBg = this.add.graphics();
            this.questionBg.fillStyle(0xffffff, 0.06);
            this.questionBg.fillRoundedRect(80, 120, W - 160, 130, 20);
            this.questionBg.lineStyle(2, 0xfbbf24, 0.5);
            this.questionBg.strokeRoundedRect(80, 120, W - 160, 130, 20);
            this.clueLabel = this.add
              .text(W / 2, 148, "CLUE", {
                fontSize: "12px",
                fontFamily: "sans-serif",
                fontStyle: "bold",
                color: "#fbbf24",
                letterSpacing: 3,
              })
              .setOrigin(0.5);
            this.questionText = this.add
              .text(W / 2, 200, "", {
                fontSize: "20px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#ffffff",
                align: "center",
                wordWrap: { width: W - 200 },
                lineSpacing: 6,
              })
              .setOrigin(0.5);
            this.statBtn = this.createChoiceButton(
              W / 2 - 175,
              320,
              "✅ STATISTICAL\nAnswers can vary",
              true,
              0x2a9d5c,
            );
            this.nonstatBtn = this.createChoiceButton(
              W / 2 + 175,
              320,
              "❌ NOT STATISTICAL\nOne exact answer",
              false,
              0xe63946,
            );
            this.feedbackBg = this.add.graphics().setAlpha(0);
            this.feedbackTitle = this.add
              .text(W / 2, 415, "", {
                fontSize: "22px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#ffffff",
                align: "center",
              })
              .setOrigin(0.5)
              .setAlpha(0);
            this.feedbackBody = this.add
              .text(W / 2, 452, "", {
                fontSize: "15px",
                fontFamily: "sans-serif",
                color: "#f9d98a",
                align: "center",
                wordWrap: { width: 600 },
                lineSpacing: 4,
              })
              .setOrigin(0.5)
              .setAlpha(0);
            this.add
              .graphics()
              .fillStyle(0xffffff, 0.08)
              .fillRoundedRect(80, 510, W - 160, 16, 8);
            this.progressFill = this.add.graphics();
            this.progressLabel = this.add
              .text(W / 2, 545, "", {
                fontSize: "13px",
                fontFamily: "sans-serif",
                fontStyle: "bold",
                color: "#f9d98a",
              })
              .setOrigin(0.5);
            this.nextBtn = this.add
              .image(W / 2, 585, "btn_teal")
              .setScale(0.75, 0.8)
              .setInteractive({ useHandCursor: true })
              .setAlpha(0);
            this.nextBtnTxt = this.add
              .text(W / 2, 585, "Next Clue →", {
                fontSize: "16px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5)
              .setAlpha(0);
            this.nextBtn.on("pointerdown", () => this.advanceClue());
            this.correctEmitter = this.add.particles(W / 2, 320, "dot", {
              speed: { min: 80, max: 250 },
              scale: { start: 0.8, end: 0 },
              alpha: { start: 1, end: 0 },
              lifespan: 600,
              tint: [0xfbbf24, 0x2a9d5c, 0x1b998b],
              blendMode: "ADD",
              emitting: false,
              quantity: 20,
            });
            this.wrongEmitter = this.add.particles(W / 2, 320, "dot", {
              speed: { min: 60, max: 180 },
              scale: { start: 0.6, end: 0 },
              alpha: { start: 0.8, end: 0 },
              lifespan: 500,
              tint: [0xe63946, 0xfb7185],
              blendMode: "ADD",
              emitting: false,
              quantity: 12,
            });
            this.cameras.main.fadeIn(500);
            this.showClue();
          }
          createHUD() {
            this.add.text(30, 18, "🏆 SCORE", {
              fontSize: "10px",
              fontFamily: "sans-serif",
              fontStyle: "bold",
              color: "#fbbf24",
              letterSpacing: 2,
            });
            this.scoreText = this.add.text(30, 35, "0", {
              fontSize: "26px",
              fontFamily: "Trebuchet MS",
              fontStyle: "bold",
              color: "#ffffff",
            });
            this.add.text(170, 18, "🔥 COMBO", {
              fontSize: "10px",
              fontFamily: "sans-serif",
              fontStyle: "bold",
              color: "#f77f00",
              letterSpacing: 2,
            });
            this.comboText = this.add.text(170, 35, "0x", {
              fontSize: "26px",
              fontFamily: "Trebuchet MS",
              fontStyle: "bold",
              color: "#f77f00",
            });
            this.add.text(W - 200, 18, "❤️ LIVES", {
              fontSize: "10px",
              fontFamily: "sans-serif",
              fontStyle: "bold",
              color: "#fb7185",
              letterSpacing: 2,
            });
            this.livesText = this.add.text(W - 200, 35, "❤️❤️❤️", {
              fontSize: "22px",
            });
            this.add.text(W - 80, 18, "CASE", {
              fontSize: "10px",
              fontFamily: "sans-serif",
              fontStyle: "bold",
              color: "#1b998b",
              letterSpacing: 2,
            });
            this.caseNumText = this.add
              .text(W - 60, 35, "1", {
                fontSize: "26px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#1b998b",
              })
              .setOrigin(0.5, 0);
          }
          updateHUD() {
            this.scoreText.setText(this.score.toString());
            this.comboText
              .setText(this.combo + "x")
              .setColor(this.combo >= 3 ? "#fbbf24" : "#f77f00");
            let h = "";
            for (let i = 0; i < 3; i++) h += i < this.lives ? "❤️" : "🖤";
            this.livesText.setText(h);
            this.caseNumText.setText((this.caseIndex + 1).toString());
            const pct = this.clueIndex / this.totalClues;
            this.progressFill.clear();
            this.progressFill.fillStyle(0xfbbf24, 1);
            if (pct > 0)
              this.progressFill.fillRoundedRect(
                80,
                510,
                (W - 160) * pct,
                16,
                8,
              );
            this.progressLabel.setText(
              "Clue " + this.clueIndex + " / " + this.totalClues,
            );
          }
          createChoiceButton(x, y, label, isStat, tint) {
            const c = this.add.container(x, y);
            const bg = this.add.graphics();
            bg.fillStyle(tint, 0.15);
            bg.fillRoundedRect(-155, -42, 310, 84, 18);
            bg.lineStyle(3, tint, 0.8);
            bg.strokeRoundedRect(-155, -42, 310, 84, 18);
            const txt = this.add
              .text(0, 0, label, {
                fontSize: "16px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#ffffff",
                align: "center",
                lineSpacing: 4,
              })
              .setOrigin(0.5);
            c.add([bg, txt]);
            c.setSize(310, 84).setInteractive({ useHandCursor: true });
            c.on("pointerover", () =>
              this.tweens.add({
                targets: c,
                scaleX: 1.04,
                scaleY: 1.04,
                duration: 100,
              }),
            );
            c.on("pointerout", () =>
              this.tweens.add({
                targets: c,
                scaleX: 1,
                scaleY: 1,
                duration: 100,
              }),
            );
            c.on("pointerdown", () => {
              if (!this.answering) this.checkAnswer(isStat);
            });
            return c;
          }
          showClue() {
            if (this.clueIndex >= this.totalClues) {
              this.endGame();
              return;
            }
            this.answering = false;
            const clue = this.clues[this.clueIndex];
            this.caseIndex = Math.min(
              Math.floor(this.clueIndex / this.cluesPerCase),
              CASE_THEMES.length - 1,
            );
            const theme = CASE_THEMES[this.caseIndex];
            this.caseText.setText(theme.name);
            this.caseIcon.setText(theme.icon);
            this.questionText.setText('"' + clue.q + '"');
            this.clueLabel.setText("CLUE " + (this.clueIndex + 1));
            this.feedbackBg.setAlpha(0);
            this.feedbackTitle.setAlpha(0);
            this.feedbackBody.setAlpha(0);
            this.nextBtn.setAlpha(0).disableInteractive();
            this.nextBtnTxt.setAlpha(0);
            this.statBtn.setAlpha(1).setInteractive();
            this.nonstatBtn.setAlpha(1).setInteractive();
            this.questionText.setAlpha(0);
            this.tweens.add({
              targets: this.questionText,
              alpha: 1,
              y: 200,
              duration: 300,
              ease: "Back.easeOut",
            });
            this.updateHUD();
          }
          checkAnswer(playerSaidStat) {
            if (this.answering) return;
            this.answering = true;
            const clue = this.clues[this.clueIndex];
            const isCorrect = playerSaidStat === clue.stat;
            this.statBtn.disableInteractive().setAlpha(0.4);
            this.nonstatBtn.disableInteractive().setAlpha(0.4);
            (playerSaidStat ? this.statBtn : this.nonstatBtn).setAlpha(1);
            if (isCorrect) {
              SFX.play("correct");
              this.combo++;
              this.maxCombo = Math.max(this.maxCombo, this.combo);
              const bonus = this.combo >= 5 ? 50 : this.combo >= 3 ? 25 : 0;
              const pts = 100 + bonus;
              this.score += pts;
              this.correct++;
              this.correctEmitter.explode(20, W / 2, 320);
              if (this.combo >= 3) {
                SFX.play("combo");
                this.cameras.main.shake(100, 0.005);
              }
              const msg =
                this.combo >= 5
                  ? "🔥 ON FIRE! +" + pts
                  : this.combo >= 3
                    ? "💥 COMBO! +" + pts
                    : "✅ Correct! +" + pts;
              this.showFeedback(true, msg, clue.explain);
              const pop = this.add
                .text(W / 2, 350, "+" + pts, {
                  fontSize: "28px",
                  fontFamily: "Trebuchet MS",
                  fontStyle: "bold",
                  color: "#fbbf24",
                })
                .setOrigin(0.5);
              this.tweens.add({
                targets: pop,
                y: 290,
                alpha: 0,
                duration: 800,
                onComplete: () => pop.destroy(),
              });
            } else {
              SFX.play("wrong");
              this.combo = 0;
              this.lives--;
              this.wrong++;
              this.wrongEmitter.explode(12, W / 2, 320);
              this.cameras.main.shake(200, 0.012);
              const extra = clue.stat
                ? "\n\n👉 This IS statistical — answers vary."
                : "\n\n👉 This is NOT statistical — one exact answer.";
              this.showFeedback(false, "❌ Not quite!", clue.explain + extra);
              if (this.lives <= 0) {
                this.time.delayedCall(1800, () => this.endGame());
                return;
              }
            }
            this.clueIndex++;
            this.updateHUD();
            if (
              this.clueIndex > 0 &&
              this.clueIndex % this.cluesPerCase === 0 &&
              this.clueIndex < this.totalClues
            ) {
              this.casesCleared++;
              SFX.play("levelup");
              const banner = this.add
                .text(W / 2, H / 2, "📁 CASE SOLVED!", {
                  fontSize: "36px",
                  fontFamily: "Trebuchet MS",
                  fontStyle: "bold",
                  color: "#fbbf24",
                  stroke: "#14213d",
                  strokeThickness: 5,
                })
                .setOrigin(0.5)
                .setAlpha(0);
              this.tweens.add({
                targets: banner,
                alpha: 1,
                scaleX: 1.2,
                scaleY: 1.2,
                duration: 400,
                yoyo: true,
                hold: 600,
                onComplete: () => banner.destroy(),
              });
            }
            this.time.delayedCall(600, () => {
              this.nextBtn.setAlpha(1).setInteractive();
              this.nextBtnTxt.setAlpha(1);
            });
          }
          showFeedback(good, title, body) {
            this.feedbackBg.clear();
            this.feedbackBg.fillStyle(good ? 0x2a9d5c : 0xe63946, 0.12);
            this.feedbackBg.fillRoundedRect(80, 385, W - 160, 110, 16);
            this.feedbackBg.lineStyle(2, good ? 0x2a9d5c : 0xe63946, 0.5);
            this.feedbackBg.strokeRoundedRect(80, 385, W - 160, 110, 16);
            this.feedbackBg.setAlpha(1);
            this.feedbackTitle
              .setText(title)
              .setAlpha(1)
              .setColor(good ? "#2a9d5c" : "#fb7185");
            this.feedbackBody.setText(body).setAlpha(1);
          }
          advanceClue() {
            SFX.play("click");
            if (this.lives <= 0 || this.clueIndex >= this.totalClues)
              this.endGame();
            else this.showClue();
          }
          endGame() {
            this.cameras.main.fade(500);
            this.time.delayedCall(500, () =>
              this.scene.start("Results", {
                score: this.score,
                correct: this.correct,
                wrong: this.wrong,
                total: this.totalClues,
                combo: this.maxCombo,
                lives: this.lives,
                casesCleared: this.casesCleared,
              }),
            );
          }
        }

        // ═══════════════════════════════════════════════════
        class ResultsScene extends Phaser.Scene {
          constructor() {
            super("Results");
          }
          init(data) {
            this.d = data;
          }
          create() {
            const d = this.d,
              cx = W / 2;
            this.cameras.main.setBackgroundColor(0x0c1529);
            const bg = this.add.graphics();
            bg.fillGradientStyle(0x14213d, 0x14213d, 0x0c1529, 0x0c1529, 1);
            bg.fillRect(0, 0, W, H);
            const pct = Math.round((d.correct / d.total) * 100);
            if (pct >= 70)
              this.add.particles(W / 2, -10, "dot", {
                x: { min: -W / 2, max: W / 2 },
                speed: { min: 50, max: 200 },
                angle: { min: 80, max: 100 },
                scale: { start: 0.6, end: 0 },
                lifespan: 3000,
                tint: [0xfbbf24, 0xf77f00, 0x2a9d5c, 0x1b998b, 0x7b4cc2],
                frequency: 100,
                quantity: 3,
                blendMode: "ADD",
              });
            let rank = "Rookie",
              emoji = "🧭";
            if (pct >= 90) {
              rank = "Master Detective";
              emoji = "🏆";
            } else if (pct >= 75) {
              rank = "Senior Detective";
              emoji = "🔍";
            } else if (pct >= 60) {
              rank = "Junior Detective";
              emoji = "🧩";
            }
            this.add.text(cx, 50, emoji, { fontSize: "60px" }).setOrigin(0.5);
            this.add
              .text(cx, 110, "CASE FILE CLOSED", {
                fontSize: "36px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#fbbf24",
                stroke: "#14213d",
                strokeThickness: 4,
              })
              .setOrigin(0.5);
            this.add
              .text(cx, 155, rank, {
                fontSize: "20px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#f9d98a",
              })
              .setOrigin(0.5);
            this.add
              .text(cx, 200, d.score.toString(), {
                fontSize: "54px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.add
              .text(cx, 240, "POINTS", {
                fontSize: "12px",
                fontFamily: "sans-serif",
                fontStyle: "bold",
                color: "#f9d98a",
                letterSpacing: 3,
              })
              .setOrigin(0.5);
            [
              { label: "Correct", val: d.correct + "/" + d.total, x: cx - 200 },
              { label: "Accuracy", val: pct + "%", x: cx },
              { label: "Best Combo", val: d.combo + "x", x: cx + 200 },
            ].forEach((s) => {
              const g = this.add.graphics();
              g.fillStyle(0xffffff, 0.06);
              g.fillRoundedRect(s.x - 80, 270, 160, 80, 16);
              this.add
                .text(s.x, 295, s.val, {
                  fontSize: "28px",
                  fontFamily: "Trebuchet MS",
                  fontStyle: "bold",
                  color: "#fff",
                })
                .setOrigin(0.5);
              this.add
                .text(s.x, 328, s.label, {
                  fontSize: "11px",
                  fontFamily: "sans-serif",
                  fontStyle: "bold",
                  color: "#f9d98a",
                  letterSpacing: 2,
                })
                .setOrigin(0.5);
            });
            const sc =
              pct >= 90 ? 5 : pct >= 75 ? 4 : pct >= 60 ? 3 : pct >= 40 ? 2 : 1;
            let ss = "";
            for (let i = 0; i < 5; i++) ss += i < sc ? "⭐" : "☆";
            this.add.text(cx, 380, ss, { fontSize: "32px" }).setOrigin(0.5);
            const g2 = this.add.graphics();
            g2.fillStyle(0xfbbf24, 0.1);
            g2.fillRoundedRect(80, 420, W - 160, 100, 18);
            g2.lineStyle(2, 0xfbbf24, 0.4);
            g2.strokeRoundedRect(80, 420, W - 160, 100, 18);
            this.add
              .text(cx, 440, "💡 REMEMBER", {
                fontSize: "13px",
                fontFamily: "sans-serif",
                fontStyle: "bold",
                color: "#fbbf24",
                letterSpacing: 2,
              })
              .setOrigin(0.5);
            this.add
              .text(
                cx,
                475,
                "A statistical question expects DIFFERENT answers from different people.\nA non-statistical question has ONE exact answer.",
                {
                  fontSize: "15px",
                  fontFamily: "Trebuchet MS",
                  color: "#f9d98a",
                  align: "center",
                  lineSpacing: 4,
                },
              )
              .setOrigin(0.5);
            const btn = this.add
              .image(cx, 570, "btn_orange")
              .setScale(0.85)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(cx, 570, "🔄 Play Again", {
                fontSize: "18px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            btn.on("pointerdown", () => {
              SFX.play("whoosh");
              this.cameras.main.fade(400);
              this.time.delayedCall(400, () => this.scene.start("Title"));
            });
            this.cameras.main.fadeIn(600);
            if (pct >= 70) SFX.play("levelup");
          }
        }

        // ═══════════════════════════════════════════════════
        new Phaser.Game({
          type: Phaser.AUTO,
          width: W,
          height: H,
          parent: document.body,
          backgroundColor: "#0c1529",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          scene: [BootScene, TitleScene, GameScene, ResultsScene],
          input: { touch: true },
        });
      })();
    </script>
  </body>
</html>
