<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Data Studio Master</title>
    <meta
      name="description"
      content="A teacher-friendly classroom data analysis studio with optional advanced analysis, prediction, correlation, grouping, and plain-language explanations."
    />
    <script src="./vendor/xlsx.full.min.js"></script>
    <script src="./vendor/chart.umd.min.js"></script>
    <link rel="stylesheet" href="./data-studio.css" />
  </head>
  <body>
    <div id="app" class="app"></div>
    <div id="modalBackdrop" class="modal-backdrop" onclick="closeModal()"></div>
    <section
      id="explainModal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
    >
      <div class="modal-head">
        <div>
          <p class="eyebrow" style="margin-bottom: 4px">Simple Explanation</p>
          <h2 id="modalTitle" class="card-title">Analysis Help</h2>
        </div>
        <button class="btn btn-light btn-small" onclick="closeModal()">
          Close
        </button>
      </div>
      <div id="modalBody" class="modal-body"></div>
    </section>
    <aside id="coachDrawer" class="drawer"></aside>
    <div id="toast" class="toast"></div>

    <script src="./data-studio.js"></script>
    <script src="/assets/nt-page-enhance.js" defer></script>
  </body>
</html>
