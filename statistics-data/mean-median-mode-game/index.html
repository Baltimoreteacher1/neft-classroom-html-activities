  <body>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
      (() => {
        "use strict";

        /* =========================================================
   SPORTS ANALYTICS MANAGER
   Mean / Median / Mode — manage a sports team, use statistics
   to make lineup decisions and predict outcomes.
   Phaser 3 single-file game.
   ========================================================= */

        const SFX = {
          ctx: null,
          init() {
            if (!this.ctx) {
              const A = window.AudioContext || window.webkitAudioContext;
              if (A) this.ctx = new A();
            }
          },
          play(type) {
            this.init();
            if (!this.ctx) return;
            if (this.ctx.state === "suspended") this.ctx.resume();
            const o = this.ctx.createOscillator(),
              g = this.ctx.createGain(),
              t = this.ctx.currentTime;
            const P = {
              correct: { w: "sine", f: [520, 780], d: 0.18, v: 0.06 },
              wrong: { w: "sawtooth", f: [300, 180], d: 0.22, v: 0.05 },
              click: { w: "sine", f: [440, 480], d: 0.08, v: 0.04 },
              combo: { w: "sine", f: [600, 900], d: 0.25, v: 0.06 },
              whoosh: { w: "sine", f: [200, 600], d: 0.15, v: 0.03 },
              levelup: { w: "sine", f: [440, 660, 880], d: 0.35, v: 0.06 },
              whistle: { w: "sine", f: [800, 1200], d: 0.15, v: 0.04 },
              buzzer: { w: "square", f: [200, 100], d: 0.2, v: 0.04 },
              crowd: { w: "triangle", f: [300, 500], d: 0.3, v: 0.03 },
            };
            const p = P[type] || P.click;
            o.type = p.w;
            o.frequency.setValueAtTime(p.f[0], t);
            if (p.f.length === 3) {
              o.frequency.linearRampToValueAtTime(p.f[1], t + p.d * 0.5);
              o.frequency.linearRampToValueAtTime(p.f[2], t + p.d);
            } else o.frequency.linearRampToValueAtTime(p.f[1], t + p.d);
            g.gain.setValueAtTime(0.001, t);
            g.gain.linearRampToValueAtTime(p.v, t + 0.02);
            g.gain.exponentialRampToValueAtTime(0.001, t + p.d);
            o.connect(g).connect(this.ctx.destination);
            o.start(t);
            o.stop(t + p.d + 0.01);
          },
        };

        const W = 960,
          H = 640;
        function shuffle(a) {
          const b = [...a];
          for (let i = b.length - 1; i > 0; i--) {
            const j = (Math.random() * i + 1) | 0;
            [b[i], b[j]] = [b[j], b[i]];
          }
          return b;
        }
        function mean(arr) {
          return arr.reduce((a, b) => a + b, 0) / arr.length;
        }
        function median(arr) {
          const s = [...arr].sort((a, b) => a - b);
          const m = Math.floor(s.length / 2);
          return s.length % 2 ? s[m] : (s[m - 1] + s[m]) / 2;
        }
        function mode(arr) {
          const f = {};
          arr.forEach((v) => (f[v] = (f[v] || 0) + 1));
          const mx = Math.max(...Object.values(f));
          const modes = Object.keys(f)
            .filter((k) => f[k] === mx)
            .map(Number);
          return modes.length === arr.length ? null : modes;
        }

        const SPORTS = [
          "Basketball",
          "Soccer",
          "Baseball",
          "Track",
          "Swimming",
          "Volleyball",
        ];
        const SPORT_ICONS = ["🏀", "⚽", "⚾", "🏃", "🏊", "🏐"];
        const PLAYERS = [
          "Jordan",
          "Garcia",
          "Kim",
          "Davis",
          "Patel",
          "Wilson",
          "Chen",
          "Brown",
          "Martinez",
          "Anderson",
          "Thomas",
          "Lee",
          "Jackson",
          "White",
          "Harris",
        ];

        // Hard-coded question bank (20 questions) + procedural generation
        const QUESTION_BANK = [
          // Level 1: Basic mean/median/mode with sports context
          {
            level: 1,
            type: "MEAN",
            sport: 0,
            setup: () => {
              const d = [14, 18, 22, 26, 30];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 5),
                stat: "points per game",
              };
            },
            q: "Your starting five scored these points last game. What is the mean score?",
            solve: (d) => {
              const m = mean(d.data);
              return {
                answer: m.toString(),
                explain:
                  "Add: " +
                  d.data.join(" + ") +
                  " = " +
                  d.data.reduce((a, b) => a + b, 0) +
                  ". Divide by " +
                  d.data.length +
                  ": " +
                  m +
                  ".",
                choices: shuffle([
                  m.toString(),
                  (m + 2).toString(),
                  (m - 3).toString(),
                  median(d.data).toString(),
                ]),
              };
            },
            hint: "Mean = total divided by count.",
          },
          {
            level: 1,
            type: "MEDIAN",
            sport: 0,
            setup: () => {
              const d = [8, 12, 15, 20, 25];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 5),
                stat: "assists this season",
              };
            },
            q: "These are the assist totals for your guards. What is the median?",
            solve: (d) => {
              const m = median(d.data);
              return {
                answer: m.toString(),
                explain:
                  "Already sorted: " +
                  [...d.data].sort((a, b) => a - b).join(", ") +
                  ". Middle value = " +
                  m +
                  ".",
                choices: shuffle([
                  m.toString(),
                  (m + 1).toString(),
                  mean(d.data).toString(),
                  (m - 2).toString(),
                ]),
              };
            },
            hint: "Median = middle value after sorting.",
          },
          {
            level: 1,
            type: "MODE",
            sport: 1,
            setup: () => {
              const d = [2, 3, 3, 4, 5];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 5),
                stat: "goals scored",
              };
            },
            q: "Your forwards scored these goals. What is the mode?",
            solve: (d) => {
              return {
                answer: "3",
                explain:
                  "3 appears twice, more than any other value. Mode = 3.",
                choices: shuffle(["3", "2", "4", "5"]),
              };
            },
            hint: "Mode = value that appears most often.",
          },
          {
            level: 1,
            type: "MEAN",
            sport: 2,
            setup: () => {
              const d = [1, 3, 2, 4, 0];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 5),
                stat: "hits per game",
              };
            },
            q: "Your batters got these hits over 5 games. What is the mean hits per game?",
            solve: (d) => {
              const m = mean(d.data);
              return {
                answer: m.toString(),
                explain:
                  d.data.join(" + ") +
                  " = " +
                  d.data.reduce((a, b) => a + b, 0) +
                  ". Divide by 5 = " +
                  m +
                  ".",
                choices: shuffle([m.toString(), "3", "1", "4"]),
              };
            },
            hint: "Add all values, divide by number of games.",
          },
          {
            level: 1,
            type: "MEDIAN",
            sport: 3,
            setup: () => {
              const d = [58, 62, 55, 70, 65];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 5),
                stat: "100m time (seconds x10)",
              };
            },
            q: "Runners posted these times. What is the median time?",
            solve: (d) => {
              const s = [...d.data].sort((a, b) => a - b);
              const m = median(d.data);
              return {
                answer: m.toString(),
                explain: "Sort: " + s.join(", ") + ". Middle = " + m + ".",
                choices: shuffle([
                  m.toString(),
                  mean(d.data).toFixed(0),
                  (m + 3).toString(),
                  (m - 2).toString(),
                ]),
              };
            },
            hint: "Sort first, then find the middle.",
          },

          // Level 2: Larger data, even counts, ties
          {
            level: 2,
            type: "MEDIAN",
            sport: 0,
            setup: () => {
              const d = [6, 9, 12, 14, 18, 22];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 6),
                stat: "rebounds",
              };
            },
            q: "Six players had these rebound totals. What is the median?",
            solve: (d) => {
              const m = median(d.data);
              return {
                answer: m.toString(),
                explain:
                  "Sorted: " +
                  [...d.data].sort((a, b) => a - b).join(", ") +
                  ". Two middle values: 12 and 14. Average = " +
                  m +
                  ".",
                choices: shuffle([
                  m.toString(),
                  "12",
                  "14",
                  mean(d.data).toFixed(0),
                ]),
              };
            },
            hint: "With even count, average the two middle values.",
          },
          {
            level: 2,
            type: "MODE",
            sport: 1,
            setup: () => {
              const d = [1, 2, 2, 3, 3, 4];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 6),
                stat: "yellow cards",
              };
            },
            q: "These are yellow card counts. What is the mode?",
            solve: () => {
              return {
                answer: "2 and 3",
                explain: "Both 2 and 3 appear twice. Two modes (bimodal).",
                choices: shuffle(["2 and 3", "2", "3", "No mode"]),
              };
            },
            hint: "If two values tie for most, both are modes.",
          },
          {
            level: 2,
            type: "BEST",
            sport: 2,
            setup: () => {
              const d = [3, 4, 3, 4, 3, 25];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 6),
                stat: "home runs",
              };
            },
            q: "One player hit 25 home runs while others hit 3-4. Which measure best represents the typical player?",
            solve: () => {
              return {
                answer: "Median",
                explain:
                  "25 is an outlier that pulls the mean up. The median better shows the typical value.",
                choices: shuffle(["Median", "Mean", "Mode", "Range"]),
              };
            },
            hint: "Outliers affect the mean more than the median.",
          },
          {
            level: 2,
            type: "MEAN",
            sport: 4,
            setup: () => {
              const d = [28, 32, 30, 35, 25, 30];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 6),
                stat: "lap times (sec)",
              };
            },
            q: "Your swimmers posted these times. What is the mean lap time?",
            solve: (d) => {
              const m = mean(d.data);
              return {
                answer: m.toString(),
                explain:
                  d.data.join(" + ") +
                  " = " +
                  d.data.reduce((a, b) => a + b, 0) +
                  ". Divide by 6 = " +
                  m +
                  ".",
                choices: shuffle([m.toString(), "31", "29", "32"]),
              };
            },
            hint: "Total divided by count.",
          },
          {
            level: 2,
            type: "ALL",
            sport: 5,
            setup: () => {
              const d = [4, 6, 6, 8, 10];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 5),
                stat: "aces per match",
              };
            },
            q: "For the data set 4, 6, 6, 8, 10 — which statement is true?",
            solve: () => {
              return {
                answer: "Mean = 6.8, Median = 6, Mode = 6",
                explain:
                  "Mean = 34/5 = 6.8. Median = 6 (middle). Mode = 6 (appears twice).",
                choices: shuffle([
                  "Mean = 6.8, Median = 6, Mode = 6",
                  "Mean = 6, Median = 6.8, Mode = 10",
                  "Mean = 7, Median = 8, Mode = 6",
                  "Mean = 6.8, Median = 8, Mode = 4",
                ]),
              };
            },
            hint: "Calculate all three: add/divide, sort/middle, count repeats.",
          },

          // Level 3: Word problems, real decisions
          {
            level: 3,
            type: "MEAN",
            sport: 0,
            setup: () => {
              const d = [14, 18, 22, 26, 30, 34];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 6),
                stat: "points",
              };
            },
            q: "A basketball player scored 14, 18, 22, 26, 30, and 34 points in 6 games. What is the mean?",
            solve: (d) => {
              return {
                answer: "24",
                explain: "14+18+22+26+30+34 = 144. 144/6 = 24.",
                choices: shuffle(["24", "22", "26", "28"]),
              };
            },
            hint: "Add all 6 scores, divide by 6.",
          },
          {
            level: 3,
            type: "MEDIAN",
            sport: 0,
            setup: () => {
              const d = [19, 4, 12, 16, 8, 20, 10, 14];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 8),
                stat: "points",
              };
            },
            q: "Player scores: 19, 4, 12, 16, 8, 20, 10, 14. What is the median?",
            solve: () => {
              return {
                answer: "13",
                explain:
                  "Sorted: 4, 8, 10, 12, 14, 16, 19, 20. Middle: 12 and 14. Average = 13.",
                choices: shuffle(["13", "12", "14", "11"]),
              };
            },
            hint: "Sort the 8 values, average the 4th and 5th.",
          },
          {
            level: 3,
            type: "MODE",
            sport: 1,
            setup: () => {
              return {
                data: [],
                players: shuffle(PLAYERS).slice(0, 8),
                stat: "goals",
              };
            },
            q: "Survey: favorite fruits — apple, mango, grape, mango, apple, mango, pear, apple. What is the mode?",
            solve: () => {
              return {
                answer: "Apple and Mango",
                explain: "Apple = 3 times, Mango = 3 times. Both tie for most.",
                choices: shuffle([
                  "Apple and Mango",
                  "Mango only",
                  "Apple only",
                  "No mode",
                ]),
              };
            },
            hint: "Count each. Two can tie for mode.",
          },
          {
            level: 3,
            type: "BEST",
            sport: 0,
            setup: () => {
              const d = [180, 190, 200, 210, 720];
              return {
                data: d,
                players: [
                  "House A",
                  "House B",
                  "House C",
                  "House D",
                  "Mansion",
                ],
                stat: "price ($K)",
              };
            },
            q: "Home prices (in thousands): 180, 190, 200, 210, 720. Which measure best represents the typical price?",
            solve: () => {
              return {
                answer: "Median, because 720 is an outlier",
                explain:
                  "720 pulls the mean way up. Median = 200 better shows the typical price.",
                choices: shuffle([
                  "Median, because 720 is an outlier",
                  "Mean, because it uses all values",
                  "Mode, because one price repeats",
                  "Range, because it gives the middle",
                ]),
              };
            },
            hint: "The mansion price is extreme — think about what that does to the mean.",
          },
          {
            level: 3,
            type: "MEDIAN",
            sport: 2,
            setup: () => {
              const d = [6, 9, 12, 12, 15, 18];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 6),
                stat: "RBIs",
              };
            },
            q: "Data: 6, 9, 12, 12, 15, 18. A student says the median is 12. Is that correct?",
            solve: () => {
              return {
                answer: "Yes, both middle values are 12",
                explain:
                  "6 values. Middle: 12 and 12. Average = 12. Student is correct.",
                choices: shuffle([
                  "Yes, both middle values are 12",
                  "No, the median is 10.5",
                  "No, the mean is 12 not the median",
                  "No, the median is 13.5",
                ]),
              };
            },
            hint: "With 6 values, average the 3rd and 4th.",
          },

          // Level 4: Multi-step
          {
            level: 4,
            type: "MEAN",
            sport: 3,
            setup: () => {
              const d = [8.5, 9.0, 8.0, 9.5];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 4),
                stat: "mile time (min)",
              };
            },
            q: "Mile times: 8.5, 9.0, 8.0, 9.5 minutes. What is the mean?",
            solve: () => {
              return {
                answer: "8.75",
                explain: "8.5+9.0+8.0+9.5 = 35. 35/4 = 8.75.",
                choices: shuffle(["8.75", "8.5", "9", "9.25"]),
              };
            },
            hint: "Add the four times, divide by 4.",
          },
          {
            level: 4,
            type: "ALL",
            sport: 0,
            setup: () => {
              const d = [3, 5, 4, 2, 6];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 5),
                stat: "fouls",
              };
            },
            q: "Fouls per game: 3, 5, 4, 2, 6. What is the mean?",
            solve: () => {
              return {
                answer: "4",
                explain: "3+5+4+2+6 = 20. 20/5 = 4.",
                choices: shuffle(["4", "3", "5", "6"]),
              };
            },
            hint: "Add all, divide by count.",
          },
          {
            level: 4,
            type: "BEST",
            sport: 5,
            setup: () => {
              return { data: [], players: [], stat: "" };
            },
            q: "A coach wants the shoe size bought most often. Which measure should she use?",
            solve: () => {
              return {
                answer: "Mode",
                explain:
                  '"Most often" = mode. The mode is the most frequent value.',
                choices: shuffle(["Mode", "Mean", "Median", "Sum"]),
              };
            },
            hint: '"Most often" is the key phrase.',
          },
          {
            level: 4,
            type: "MEDIAN",
            sport: 0,
            setup: () => {
              const d = [88, 73, 91, 84, 76, 95, 82];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 7),
                stat: "game scores",
              };
            },
            q: "Game scores: 88, 73, 91, 84, 76, 95, 82. What is the median?",
            solve: () => {
              return {
                answer: "84",
                explain:
                  "Sorted: 73, 76, 82, 84, 88, 91, 95. Middle (4th) = 84.",
                choices: shuffle(["84", "82", "86", "88"]),
              };
            },
            hint: "Sort the 7 scores. The 4th value is the median.",
          },
          {
            level: 4,
            type: "ALL",
            sport: 0,
            setup: () => {
              const d = [5, 8, 6, 9, 7, 10];
              return {
                data: d,
                players: shuffle(PLAYERS).slice(0, 6),
                stat: "minutes played",
              };
            },
            q: "Data: 5, 8, 6, 9, 7, 10. Which is true about the mode?",
            solve: () => {
              return {
                answer: "There is no mode",
                explain:
                  "Each number appears once. No value appears more than others.",
                choices: shuffle([
                  "There is no mode",
                  "Mode is 5",
                  "Mode is 10",
                  "There are two modes",
                ]),
              };
            },
            hint: "Check if any number repeats more than others.",
          },
        ];

        // ═══════════════════════════════════════════════════
        class BootScene extends Phaser.Scene {
          constructor() {
            super("Boot");
          }
          create() {
            const g = this.make.graphics({ add: false });
            g.fillStyle(0xffffff, 1);
            g.fillCircle(4, 4, 4);
            g.generateTexture("dot", 8, 8);
            g.clear();
            g.fillStyle(0xf77f00, 1);
            g.fillRoundedRect(0, 0, 260, 54, 16);
            g.generateTexture("btn_orange", 260, 54);
            g.clear();
            g.fillStyle(0x1b998b, 1);
            g.fillRoundedRect(0, 0, 260, 54, 16);
            g.generateTexture("btn_teal", 260, 54);
            g.clear();
            g.fillStyle(0x14213d, 1);
            g.fillRoundedRect(0, 0, 260, 54, 16);
            g.generateTexture("btn_dark", 260, 54);
            g.clear();
            g.fillStyle(0x2a9d5c, 1);
            g.fillRoundedRect(0, 0, 260, 54, 16);
            g.generateTexture("btn_green", 260, 54);
            g.clear();
            g.fillStyle(0xe63946, 1);
            g.fillRoundedRect(0, 0, 260, 54, 16);
            g.generateTexture("btn_red", 260, 54);
            g.clear();
            g.destroy();
            this.scene.start("Title");
          }
        }

        // ═══════════════════════════════════════════════════
        class TitleScene extends Phaser.Scene {
          constructor() {
            super("Title");
          }
          create() {
            const cx = W / 2;
            this.cameras.main.setBackgroundColor(0x14213d);
            const bg = this.add.graphics();
            bg.fillGradientStyle(0x1a2744, 0x1a2744, 0x14213d, 0x14213d, 1);
            bg.fillRect(0, 0, W, H);
            this.add.particles(0, 0, "dot", {
              x: { min: 0, max: W },
              y: { min: 0, max: H },
              scale: { start: 0.3, end: 0 },
              alpha: { start: 0.3, end: 0 },
              speed: { min: 8, max: 25 },
              lifespan: 3500,
              frequency: 200,
              blendMode: "ADD",
              tint: [0xf77f00, 0xfcbf49, 0x1b998b],
            });
            const icon = this.add
              .text(cx, 110, "🏆", { fontSize: "72px" })
              .setOrigin(0.5);
            this.tweens.add({
              targets: icon,
              y: 100,
              duration: 1500,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut",
            });
            this.add
              .text(cx, 195, "SPORTS ANALYTICS\nMANAGER", {
                fontSize: "42px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#fcbf49",
                align: "center",
                lineSpacing: 4,
                stroke: "#14213d",
                strokeThickness: 4,
              })
              .setOrigin(0.5);
            this.add
              .text(cx, 285, "Use mean, median, and mode to manage your team", {
                fontSize: "16px",
                fontFamily: "Trebuchet MS",
                color: "#ffe3a3",
                align: "center",
              })
              .setOrigin(0.5);
            this.add
              .text(cx, 320, "Mean, Median, Mode — Statistics for Grade 6", {
                fontSize: "13px",
                fontFamily: "sans-serif",
                fontStyle: "bold",
                color: "#14213d",
                backgroundColor: "#fcbf49",
                padding: { x: 12, y: 6 },
              })
              .setOrigin(0.5);
            this.add
              .text(cx, 370, "Pick Your Season Length", {
                fontSize: "16px",
                fontFamily: "sans-serif",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            [
              {
                l: "🧭 Preseason (10 questions)",
                n: 10,
                y: 415,
                k: "btn_teal",
              },
              {
                l: "🏀 Regular Season (15 questions)",
                n: 15,
                y: 475,
                k: "btn_orange",
              },
              { l: "🏆 Playoffs (20 questions)", n: 20, y: 535, k: "btn_dark" },

              })
              .setOrigin(0.5)

            this.nextTxt = this.add
              .text(W / 2, 590, "Next Play →", {

            });

          createHUD() {
            this.add.text(30, 15, "🏆 SCORE", {
              fontSize: "10px",
              fontFamily: "sans-serif",
              fontStyle: "bold",
              color: "#fcbf49",
              letterSpacing: 2,
            });
            this.scoreTxt = this.add.text(30, 32, "0", {
              fontSize: "24px",
              fontFamily: "Trebuchet MS",
              fontStyle: "bold",
              color: "#fff",
            });
            this.add.text(170, 15, "🔥 STREAK", {
              fontSize: "10px",
              fontFamily: "sans-serif",
              fontStyle: "bold",
              color: "#f77f00",
              letterSpacing: 2,
            });
            this.comboTxt = this.add.text(170, 32, "0", {
              fontSize: "24px",
              fontFamily: "Trebuchet MS",
              fontStyle: "bold",
              color: "#f77f00",
            });
            this.add.text(W - 200, 15, "❤️ LIVES", {
              fontSize: "10px",
              fontFamily: "sans-serif",
              fontStyle: "bold",
              color: "#fb7185",
              letterSpacing: 2,
            });
            this.livesTxt = this.add.text(W - 200, 32, "", {
              fontSize: "20px",
            });
            this.add.text(W - 80, 15, "QTR", {
              fontSize: "10px",
              fontFamily: "sans-serif",
              fontStyle: "bold",
              color: "#1b998b",
              letterSpacing: 2,
            });
            this.qtrTxt = this.add
              .text(W - 60, 32, "1", {
                fontSize: "24px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#1b998b",
              })
              .setOrigin(0.5, 0);
          }
          updateHUD() {
            this.scoreTxt.setText(this.score.toString());
            this.comboTxt
              .setText(this.combo.toString())
              .setColor(this.combo >= 3 ? "#fcbf49" : "#f77f00");
            let h = "";
            for (let i = 0; i < 3; i++) h += i < this.lives ? "❤️" : "🖤";
            this.livesTxt.setText(h);
            this.quarter = Math.min(
              4,
              Math.floor(this.qIdx / (this.totalQs / 4)) + 1,
            );
            this.qtrTxt.setText(this.quarter.toString());
            const pct = this.qIdx / this.totalQs;
            this.progFill.clear();
            this.progFill.fillStyle(0xfcbf49, 1);
            if (pct > 0)
              this.progFill.fillRoundedRect(80, 520, (W - 160) * pct, 12, 6);
            this.progLabel.setText(
              "Question " + this.qIdx + " / " + this.totalQs,
            );
          }
          makeChoice(x, y, idx) {
            const c = this.add.container(x, y);
            const bg = this.add.graphics();
            bg.fillStyle(0xffffff, 0.05);
            bg.fillRoundedRect(-185, -30, 370, 60, 14);
            bg.lineStyle(2, 0xfcbf49, 0.3);
            bg.strokeRoundedRect(-185, -30, 370, 60, 14);
            const letter = this.add
              .text(-170, 0, ["A", "B", "C", "D"][idx], {
                fontSize: "16px",
                fontFamily: "Courier New",
                fontStyle: "bold",
                color: "#fcbf49",
              })
              .setOrigin(0, 0.5);
            const txt = this.add
              .text(-145, 0, "", {
                fontSize: "14px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#fff",
                wordWrap: { width: 320 },
                lineSpacing: 2,
              })
              .setOrigin(0, 0.5);
            c.add([bg, letter, txt]);
            c.setSize(370, 60).setInteractive({ useHandCursor: true });
            c.on("pointerover", () =>
              this.tweens.add({
                targets: c,
                scaleX: 1.03,
                scaleY: 1.03,
                duration: 80,
              }),
            );
            c.on("pointerout", () =>
              this.tweens.add({
                targets: c,
                scaleX: 1,
                scaleY: 1,
                duration: 80,
              }),
            );
            c.on("pointerdown", () => {
              if (!this.answering) this.checkAnswer(idx);
            });
            c._bg = bg;
            c._txt = txt;
            c._letter = letter;
            return c;
          }
          loadQuestion() {
            if (this.qIdx >= this.totalQs) {
              this.endGame();
              return;
            }
            this.answering = false;
            const qDef = this.questions[this.qIdx];
            const setupData = qDef.setup();
            this.qData = setupData;
            const solved = qDef.solve(setupData);
            this.currentQ = { ...qDef, ...solved, setupData };
            const sport = SPORTS[qDef.sport] || "Sports";
            const sportIcon = SPORT_ICONS[qDef.sport] || "🏆";
            // Header
            this.sportBg.clear();
            this.sportBg.fillStyle(0xfcbf49, 0.08);
            this.sportBg.fillRoundedRect(70, 64, W - 140, 48, 12);
            this.sportIcon.setText(sportIcon);
            this.sportTitle.setText(sport + " Analytics");
            this.sportSub.setText((setupData.stat || "STATS").toUpperCase());
            // Data chips
            this.dataChips.forEach((c) => c.destroy());
            this.dataChips = [];
            this.dataBg.clear();
            if (setupData.data && setupData.data.length > 0) {
              this.dataBg.fillStyle(0xfcbf49, 0.06);
              this.dataBg.fillRoundedRect(80, 132, W - 160, 46, 12);
              this.dataLabel.setAlpha(1);
              const startX = W / 2 - ((setupData.data.length - 1) * 42) / 2;
              setupData.data.forEach((v, i) => {
                const chip = this.add
                  .text(startX + i * 42, 155, v.toString(), {
                    fontSize: "18px",
                    fontFamily: "Courier New",
                    fontStyle: "bold",
                    color: "#fcbf49",
                    backgroundColor: "rgba(252,191,73,0.12)",
                    padding: { x: 6, y: 3 },
                  })
                  .setOrigin(0.5);
                this.dataChips.push(chip);
              });
            } else {
              this.dataLabel.setAlpha(0);
            }
            // Question
            this.qBg.clear();
            this.qBg.fillStyle(0xffffff, 0.03);
            this.qBg.fillRoundedRect(80, 185, W - 160, 70, 14);
            this.qType.setText(this.currentQ.type);
            this.qText.setText(this.currentQ.q).setAlpha(0);
            this.tweens.add({ targets: this.qText, alpha: 1, duration: 300 });
            // Choices
            this.currentQ.choices.forEach((ch, i) => {
              if (i < 4) {
                const btn = this.choiceBtns[i];
                btn._txt.setText(ch);
                btn._bg.clear();
                btn._bg.fillStyle(0xffffff, 0.05);
                btn._bg.fillRoundedRect(-185, -30, 370, 60, 14);
                btn._bg.lineStyle(2, 0xfcbf49, 0.3);
                btn._bg.strokeRoundedRect(-185, -30, 370, 60, 14);
                btn.setAlpha(1).setInteractive().setScale(1);
              }
            });
            this.fbBg.setAlpha(0);
            this.fbTitle.setAlpha(0);
            this.fbBody.setAlpha(0);
            this.nextBtn.setAlpha(0).disableInteractive();
            this.nextTxt.setAlpha(0);
            this.updateHUD();
          }
          checkAnswer(idx) {
            if (this.answering) return;
            this.answering = true;
            const q = this.currentQ;
            const selected = q.choices[idx];
            const isCorrect = selected === q.answer;
            this.qIdx++;
            this.choiceBtns.forEach((b, i) => {
              b.disableInteractive();
              if (q.choices[i] === q.answer) {
                b._bg.clear();
                b._bg.fillStyle(0x2a9d5c, 0.2);
                b._bg.fillRoundedRect(-185, -30, 370, 60, 14);
                b._bg.lineStyle(2, 0x2a9d5c, 0.8);
                b._bg.strokeRoundedRect(-185, -30, 370, 60, 14);
              } else if (i === idx && !isCorrect) {
                b._bg.clear();
                b._bg.fillStyle(0xe63946, 0.15);
                b._bg.fillRoundedRect(-185, -30, 370, 60, 14);
                b._bg.lineStyle(2, 0xe63946, 0.6);
                b._bg.strokeRoundedRect(-185, -30, 370, 60, 14);
              } else {
                b.setAlpha(0.35);
              }
            });
            if (isCorrect) {
              SFX.play("correct");
              this.combo++;
              this.maxCombo = Math.max(this.maxCombo, this.combo);
              this.correct++;
              const bonus = this.combo >= 5 ? 60 : this.combo >= 3 ? 30 : 0;
              const pts = 120 + bonus;
              this.score += pts;
              this.goodP.explode(18, W / 2, 345);
              if (this.combo >= 3) {
                SFX.play("combo");
                this.cameras.main.shake(100, 0.005);
              }
              this.showFB(
                true,
                this.combo >= 5
                  ? "🔥 ON FIRE! +" + pts
                  : this.combo >= 3
                    ? "💥 STREAK! +" + pts
                    : "✅ Correct! +" + pts,
                q.explain,
              );
              const pop = this.add
                .text(W / 2, 290, "+" + pts, {
                  fontSize: "26px",
                  fontFamily: "Trebuchet MS",
                  fontStyle: "bold",
                  color: "#fcbf49",
                })
                .setOrigin(0.5);
              this.tweens.add({
                targets: pop,
                y: 250,
                alpha: 0,
                duration: 800,
                onComplete: () => pop.destroy(),
              });
            } else {
              SFX.play("wrong");
              this.combo = 0;
              this.lives--;
              this.wrong++;
              this.badP.explode(10, W / 2, 345);
              this.cameras.main.shake(200, 0.012);
              this.showFB(
                false,
                "❌ Not quite!",
                q.explain + (q.hint ? "\n\n💡 Hint: " + q.hint : ""),
              );
              if (this.lives <= 0) {
                this.time.delayedCall(1800, () => this.endGame());
                return;
              }
            }
            this.updateHUD();
            // Quarter transitions
            const newQ = Math.min(
              4,
              Math.floor(this.qIdx / (this.totalQs / 4)) + 1,
            );
            if (newQ > this.quarter && this.qIdx < this.totalQs) {
              SFX.play("whistle");
              const b = this.add
                .text(W / 2, H / 2, "🏀 QUARTER " + newQ + "!", {
                  fontSize: "32px",
                  fontFamily: "Trebuchet MS",
                  fontStyle: "bold",
                  color: "#fcbf49",
                  stroke: "#14213d",
                  strokeThickness: 5,
                })
                .setOrigin(0.5)
                .setAlpha(0);
              this.tweens.add({
                targets: b,
                alpha: 1,
                scaleX: 1.2,
                scaleY: 1.2,
                duration: 400,
                yoyo: true,
                hold: 500,
                onComplete: () => b.destroy(),
              });
            }
            this.time.delayedCall(600, () => {
              this.nextBtn.setAlpha(1).setInteractive();
              this.nextTxt.setAlpha(1);
            });
          }
          showFB(good, title, body) {
            this.fbBg.clear();
            this.fbBg.fillStyle(good ? 0x2a9d5c : 0xe63946, 0.1);
            this.fbBg.fillRoundedRect(80, 420, W - 160, 95, 14);
            this.fbBg.lineStyle(2, good ? 0x2a9d5c : 0xe63946, 0.4);
            this.fbBg.strokeRoundedRect(80, 420, W - 160, 95, 14);
            this.fbBg.setAlpha(1);
            this.fbTitle
              .setText(title)
              .setAlpha(1)
              .setColor(good ? "#2a9d5c" : "#fb7185");
            this.fbBody.setText(body).setAlpha(1);
          }
          advance() {
            SFX.play("click");
            if (this.lives <= 0 || this.qIdx >= this.totalQs) this.endGame();
            else this.loadQuestion();
          }
          endGame() {
            this.cameras.main.fade(500);
            this.time.delayedCall(500, () =>
              this.scene.start("Results", {
                score: this.score,
                correct: this.correct,
                wrong: this.wrong,
                total: this.totalQs,
                combo: this.maxCombo,
                lives: this.lives,
              }),
            );
          }
        }

              .setInteractive({ useHandCursor: true });
            this.add
              .text(cx, 555, "🔄 New Season", {
                fontSize: "17px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            btn.on("pointerdown", () => {
              SFX.play("whoosh");
              this.cameras.main.fade(400);
              this.time.delayedCall(400, () => this.scene.start("Title"));
            });
            this.cameras.main.fadeIn(600);
            if (pct >= 70) SFX.play("levelup");
          }
        }

        // ═══════════════════════════════════════════════════
        new Phaser.Game({
          type: Phaser.AUTO,
          width: W,
          height: H,
          parent: document.body,
          backgroundColor: "#14213d",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          scene: [BootScene, TitleScene, GameScene, ResultsScene],
          input: { touch: true },
        });
      })();
    </script>
  </body>
</html>
