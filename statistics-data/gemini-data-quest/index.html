<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gemini Data Quest: an interactive 6th-grade median and mode AI adventure." />
  <title>Gemini Data Quest | Median & Mode</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at top right, rgba(37,99,235,.35), transparent 28rem), linear-gradient(135deg,#0f172a,#111827); color: #e5e7eb; }
    .loader { width: min(620px, calc(100% - 32px)); background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 24px; padding: 32px; box-shadow: 0 24px 70px rgba(0,0,0,.35); }
    h1 { margin: 0 0 8px; font-size: clamp(2rem, 6vw, 3rem); line-height: 1; letter-spacing: -.04em; }
    p { margin: 0; color: rgba(229,231,235,.72); font-size: 1rem; line-height: 1.6; }
    .bar { height: 10px; margin-top: 22px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.12); }
    .bar span { display: block; width: 70%; height: 100%; background: linear-gradient(90deg,#14b8a6,#3b82f6,#f59e0b); animation: load 1.4s ease-in-out infinite alternate; }
    .status { margin-top: 12px; font-size: .85rem; color: rgba(229,231,235,.56); }
    @keyframes load { from { transform: translateX(-55%); } to { transform: translateX(70%); } }
  </style>
</head>
<body>
  <main class="loader" role="status" aria-live="polite">
    <h1>Gemini Data Quest</h1>
    <p>Loading the Median & Mode AI Adventure...</p>
    <div class="bar" aria-hidden="true"><span></span></div>
    <div class="status" id="status">Preparing activity package.</div>
  </main>
  <script src="./chunks/chunk-00.js"></script>
  <script src="./chunks/chunk-01.js"></script>
  <script src="./chunks/chunk-02.js"></script>
  <script src="./chunks/chunk-03.js"></script>
  <script>
    async function inflateActivity() {
      const status = document.getElementById('status');
      try {
        if (!window.__GQ_B64) throw new Error('Activity package did not load.');
        window.__GQ_B64 = window.__GQ_B64.replace('wys++hTlx5', 'wys++9hTlx5');
        const binary = atob(window.__GQ_B64);
        const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
        if (!('DecompressionStream' in window)) {
          throw new Error('This browser does not support built-in gzip decompression. Please open in a current Chrome, Edge, or Safari browser.');
        }
        status.textContent = 'Opening activity...';
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
        const html = await new Response(stream).text();
        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        status.textContent = error.message || 'The activity could not load.';
        console.error(error);
      }
    }
    inflateActivity();
  </script>
</body>
</html>
