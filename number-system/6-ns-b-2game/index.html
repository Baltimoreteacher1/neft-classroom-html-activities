<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Asteroid Miner — 6.NS.B.2</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05050f;
        font-family: Inter, system-ui, sans-serif;
      }
      #game-container {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
      "use strict";
      (() => {
        /* ============================================================
   ASTEROID MINER — 6.NS.B.2
   Fluently divide multi-digit numbers.
   Mine asteroids by computing divisions, collect gems.
   ============================================================ */

        // --- Audio ---
        let audioCtx = null;
        function getAudio() {
          if (!audioCtx)
            try {
              audioCtx = new (
                window.AudioContext || window.webkitAudioContext
              )();
            } catch (e) {}
          return audioCtx;
        }
        function playTone(f, d, t = "sine", v = 0.05) {
          const c = getAudio();
          if (!c) return;
          if (c.state === "suspended") c.resume();
          const o = c.createOscillator(),
            g = c.createGain();
          o.type = t;
          o.frequency.value = f;
          g.gain.setValueAtTime(0.0001, c.currentTime);
          g.gain.linearRampToValueAtTime(v, c.currentTime + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + d);
          o.connect(g).connect(c.destination);
          o.start();
          o.stop(c.currentTime + d + 0.01);
        }
        function sfxMine() {
          playTone(440, 0.1, "square", 0.03);
          setTimeout(() => playTone(660, 0.12, "square", 0.03), 80);
          setTimeout(() => playTone(880, 0.15, "triangle", 0.04), 160);
        }
        function sfxWrong() {
          playTone(180, 0.15, "sawtooth", 0.03);
          setTimeout(() => playTone(140, 0.2, "sawtooth", 0.03), 100);
        }
        function sfxGem() {
          playTone(1200, 0.1, "sine", 0.03);
          setTimeout(() => playTone(1400, 0.08), 60);
        }
        function sfxExplosion() {
          playTone(80, 0.3, "sawtooth", 0.04);
        }
        function sfxLevelUp() {
          [440, 554, 659, 880].forEach((f, i) =>
            setTimeout(() => playTone(f, 0.15, "sine", 0.04), i * 90),
          );
        }
        function sfxLaser() {
          playTone(900, 0.06, "square", 0.03);
          setTimeout(() => playTone(600, 0.08, "square", 0.02), 50);
        }

        // --- Math ---
        function rand(a, b) {
          return Math.floor(Math.random() * (b - a + 1)) + a;
        }
        function pick(a) {
          return a[rand(0, a.length - 1)];
        }
        function shuffle(a) {
          const r = [...a];
          for (let i = r.length - 1; i > 0; i--) {
            const j = rand(0, i);
            [r[i], r[j]] = [r[j], r[i]];
          }
          return r;
        }

        function generateDivision(level) {
          let dividend, divisor, quotient;
          if (level <= 2) {
            // 2-digit ÷ 1-digit
            divisor = rand(2, 9);
            quotient = rand(10, 99);
            dividend = divisor * quotient;
          } else if (level <= 4) {
            // 3-digit ÷ 1-digit
            divisor = rand(3, 9);
            quotient = rand(100, 999);
            dividend = divisor * quotient;
            // Sometimes make it simpler
            if (Math.random() > 0.5) {
              quotient = rand(20, 300);
              dividend = divisor * quotient;
            }
          } else {
            // 4-digit ÷ 1-digit or 2-digit
            if (Math.random() > 0.4) {
              divisor = rand(4, 9);
              quotient = rand(100, 999);
            } else {
              divisor = rand(11, 25);
              quotient = rand(10, 200);
            }
            dividend = divisor * quotient;
          }

          const stem = dividend.toLocaleString() + " ÷ " + divisor;
          const answer = quotient;

          // Generate wrong choices
          const wrongs = new Set();
          wrongs.add(answer + rand(1, 10));
          wrongs.add(Math.max(1, answer - rand(1, 10)));
          wrongs.add(answer + divisor);
          wrongs.add(Math.max(1, answer - divisor));
          // Place-value error
          if (answer >= 100) wrongs.add(Math.floor(answer / 10) * 10);
          wrongs.add(answer * 10);
          wrongs.delete(answer);

          const wrongArr = [...wrongs]
            .filter((w) => w > 0 && w !== answer)
            .slice(0, 3);
          while (wrongArr.length < 3) wrongArr.push(answer + rand(5, 50));

          const choices = shuffle([
            { text: String(answer), correct: true },
            ...wrongArr
              .slice(0, 3)
              .map((w) => ({ text: String(w), correct: false })),
          ]);

          // Build worked example steps
          const steps = [];
          const dStr = String(dividend);
          steps.push("Start: " + stem);
          if (dStr.length >= 3) {
            const h = parseInt(dStr.substring(0, dStr.length - 1));
            const qh = Math.floor(h / divisor);
            steps.push(
              h +
                " ÷ " +
                divisor +
                " = " +
                qh +
                " (with remainder " +
                (h - qh * divisor) +
                ")",
            );
          }
          steps.push("Final quotient: " + answer);
          steps.push("Check: " + answer + " × " + divisor + " = " + dividend);

          return {
            dividend,
            divisor,
            quotient: answer,
            stem,
            choices,
            steps,
            hint:
              "Divide place by place. " +
              divisor +
              " goes into " +
              dividend +
              " = " +
              answer,
          };
        }

        // --- Phaser ---
        const W = 960,
          H = 640;
        const config = {
          type: Phaser.AUTO,
          parent: "game-container",
          width: W,
          height: H,
          backgroundColor: "#05050f",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          physics: {
            default: "arcade",
            arcade: { gravity: { y: 0 }, debug: false },
          },
          scene: [],
        };

        // ==================== BOOT ====================
        class BootScene extends Phaser.Scene {
          constructor() {
            super("Boot");
          }
          create() {
            const g = this.make.graphics({ add: false });

            // Ship
            g.clear();
            g.fillStyle(0x61dafb);
            g.fillTriangle(24, 0, 0, 20, 24, 14);
            g.fillTriangle(24, 0, 48, 20, 24, 14);
            g.fillStyle(0x38bdf8);
            g.fillRect(10, 14, 28, 10);
            g.fillStyle(0xffd166);
            g.fillCircle(24, 10, 4);
            g.generateTexture("ship", 48, 24);

            // Asteroid
            g.clear();
            g.fillStyle(0x4a5568);
            g.fillCircle(24, 24, 24);
            g.fillStyle(0x6b7280);
            g.fillCircle(16, 14, 6);
            g.fillCircle(30, 20, 4);
            g.fillCircle(20, 32, 5);
            g.generateTexture("asteroid", 48, 48);

            // Small asteroid
            g.clear();
            g.fillStyle(0x6b7280);
            g.fillCircle(12, 12, 12);
            g.fillStyle(0x9ca3af);
            g.fillCircle(8, 8, 3);
            g.generateTexture("asteroid_sm", 24, 24);

            // Gem
            g.clear();
            g.fillStyle(0xfbbf24);
            g.fillTriangle(8, 0, 0, 12, 16, 12);
            g.fillTriangle(0, 12, 16, 12, 8, 20);
            g.generateTexture("gem", 16, 20);

            // Laser
            g.clear();
            g.fillStyle(0x61dafb);
            g.fillRect(0, 0, 20, 3);
            g.generateTexture("laser", 20, 3);

            // Star particle
            g.clear();
            g.fillStyle(0xffffff);
            g.fillCircle(2, 2, 2);
            g.generateTexture("star", 4, 4);

            // Explosion particle
            g.clear();
            g.fillStyle(0xfb923c);
            g.fillCircle(4, 4, 4);
            g.generateTexture("explosion", 8, 8);

            // Health bar bg
            g.clear();
            g.fillStyle(0x1a1a2e);
            g.fillRoundedRect(0, 0, 200, 16, 6);
            g.generateTexture("hpbg", 200, 16);

            // Pod answer
            g.clear();
            g.lineStyle(2, 0x61dafb, 0.5);
            g.fillStyle(0x111827, 0.9);
            g.fillRoundedRect(0, 0, 80, 40, 10);
            g.strokeRoundedRect(0, 0, 80, 40, 10);
            g.generateTexture("pod", 80, 40);

            this.scene.start("Title");
          }
        }

        // ==================== TITLE ====================
        class TitleScene extends Phaser.Scene {
          constructor() {
            super("Title");
          }
          create() {
            // Starfield
            for (let i = 0; i < 120; i++) {
              const s = this.add.circle(
                rand(0, W),
                rand(0, H),
                Math.random() * 1.5 + 0.3,
                0xffffff,
                0.3 + Math.random() * 0.5,
              );
              this.tweens.add({
                targets: s,
                alpha: 0.1,
                duration: 1000 + rand(0, 2000),
                yoyo: true,
                repeat: -1,
              });
            }

            // Nebula glow
            const neb = this.add.ellipse(
              W * 0.3,
              H * 0.4,
              400,
              250,
              0x4c1d95,
              0.08,
            );
            this.tweens.add({
              targets: neb,
              scaleX: 1.1,
              scaleY: 1.1,
              alpha: 0.04,
              duration: 4000,
              yoyo: true,
              repeat: -1,
            });
            const neb2 = this.add.ellipse(
              W * 0.7,
              H * 0.6,
              300,
              200,
              0x1e40af,
              0.06,
            );
            this.tweens.add({
              targets: neb2,
              scaleX: 1.1,
              alpha: 0.03,
              duration: 3500,
              yoyo: true,
              repeat: -1,
            });

            this.add
              .text(W / 2, 100, "ASTEROID\nMINER", {
                fontSize: "56px",
                fontStyle: "bold",
                color: "#fbbf24",
                align: "center",
                lineSpacing: 6,
                stroke: "#78350f",
                strokeThickness: 4,
              })
              .setOrigin(0.5);

            this.add
              .text(
                W / 2,
                195,
                "6.NS.B.2 — Fluently Divide Multi-Digit Numbers",
                { fontSize: "15px", color: "#94a3b8" },
              )
              .setOrigin(0.5);

            // Floating asteroids
            for (let i = 0; i < 6; i++) {
              const a = this.add
                .image(rand(100, W - 100), rand(240, 380), "asteroid")
                .setScale(0.8 + Math.random() * 0.8)
                .setAlpha(0.6)
                .setAngle(rand(0, 360));
              this.tweens.add({
                targets: a,
                y: a.y + rand(-15, 15),
                x: a.x + rand(-10, 10),
                angle: a.angle + rand(-30, 30),
                duration: 3000 + rand(0, 2000),
                yoyo: true,
                repeat: -1,
                ease: "Sine.easeInOut",
              });
            }

            // Ship
            const ship = this.add.image(W / 2, 330, "ship").setScale(2.5);
            this.tweens.add({
              targets: ship,
              y: 340,
              duration: 2000,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut",
            });

            // Instructions
            const lines = [
              "Fly your ship and mine asteroids with division!",
              "Each asteroid shows a division problem.",
              "Fly into the correct answer to mine it.",
              "Collect gems for bonus points.",
              "Arrow keys / WASD / Touch to fly",
            ];
            lines.forEach((t, i) =>
              this.add
                .text(W / 2, 400 + i * 22, t, {
                  fontSize: "13px",
                  color: "#94a3b8",
                })
                .setOrigin(0.5),
            );

            // Start button
            const btn = this.add
              .rectangle(W / 2, 565, 200, 48, 0xfbbf24)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2, 565, "LAUNCH", {
                fontSize: "20px",
                fontStyle: "bold",
                color: "#000",
              })
              .setOrigin(0.5);
            btn.on("pointerover", () => btn.setFillStyle(0xfcd34d));
            btn.on("pointerout", () => btn.setFillStyle(0xfbbf24));
            btn.on("pointerdown", () => {
              getAudio();
              sfxLaser();
              this.cameras.main.fadeOut(400);
              this.time.delayedCall(400, () => this.scene.start("Game"));
            });

            this.input.keyboard.on("keydown-SPACE", () => {
              getAudio();
              sfxLaser();
              this.cameras.main.fadeOut(400);
              this.time.delayedCall(400, () => this.scene.start("Game"));
            });
            this.input.keyboard.on("keydown-ENTER", () => {
              getAudio();
              sfxLaser();
              this.cameras.main.fadeOut(400);
              this.time.delayedCall(400, () => this.scene.start("Game"));
            });

            this.cameras.main.fadeIn(400);
          }
        }

        // ==================== GAME ====================
        class GameScene extends Phaser.Scene {
          constructor() {
            super("Game");
          }

          create() {
            this.cameras.main.fadeIn(300);

            // State
            this.score = 0;
            this.combo = 0;
            this.bestCombo = 0;
            this.lives = 4;
            this.level = 1;
            this.gems = 0;
            this.questionsCorrect = 0;
            this.questionsTotal = 0;
            this.shield = 100;
            this.currentQ = null;
            this.answered = false;
            this.scrollSpeed = 0.5;

            // Starfield background (parallax layers)
            this.starLayers = [];
            for (let layer = 0; layer < 3; layer++) {
              const stars = [];
              for (let i = 0; i < 40; i++) {
                const s = this.add.circle(
                  rand(0, W),
                  rand(0, H),
                  0.5 + layer * 0.4,
                  0xffffff,
                  0.2 + layer * 0.15,
                );
                s.setData("speed", 0.2 + layer * 0.3);
                stars.push(s);
              }
              this.starLayers.push(stars);
            }

            // Nebula
            this.add.ellipse(300, 200, 500, 300, 0x4c1d95, 0.04);
            this.add.ellipse(700, 450, 400, 250, 0x1e3a5f, 0.04);

            // Player ship
            this.player = this.physics.add
              .image(120, H / 2, "ship")
              .setScale(1.6)
              .setDepth(10);
            this.player.setCollideWorldBounds(true);
            this.player.body.setMaxVelocity(350, 350);
            this.player.setDamping(true);
            this.player.setDrag(0.9);

            // Engine glow
            this.engineGlow = this.add
              .ellipse(0, 0, 30, 12, 0x61dafb, 0.25)
              .setDepth(9);
            this.tweens.add({
              targets: this.engineGlow,
              scaleX: 1.3,
              alpha: 0.1,
              duration: 300,
              yoyo: true,
              repeat: -1,
            });

            // Engine particles
            this.engineParticles = this.add
              .particles(0, 0, "star", {
                follow: this.player,
                followOffset: { x: -28, y: 0 },
                lifespan: 400,
                speedX: { min: -80, max: -40 },
                speedY: { min: -10, max: 10 },
                scale: { start: 0.8, end: 0 },
                alpha: { start: 0.6, end: 0 },
                tint: [0x61dafb, 0x38bdf8, 0x818cf8],
                frequency: 40,
                quantity: 1,
              })
              .setDepth(9);

            // Groups
            this.pods = this.physics.add.group();
            this.asteroids = this.physics.add.group();
            this.gemGroup = this.physics.add.group();
            this.hazards = this.physics.add.group();

            // HUD
            this.createHUD();

            // Controls
            this.cursors = this.input.keyboard.createCursorKeys();
            this.wasd = {
              up: this.input.keyboard.addKey("W"),
              down: this.input.keyboard.addKey("S"),
              left: this.input.keyboard.addKey("A"),
              right: this.input.keyboard.addKey("D"),
            };

            // Touch
            this.touchTarget = null;
            this.input.on("pointerdown", (p) => {
              this.touchTarget = { x: p.worldX, y: p.worldY };
            });
            this.input.on("pointermove", (p) => {
              if (p.isDown) this.touchTarget = { x: p.worldX, y: p.worldY };
            });
            this.input.on("pointerup", () => (this.touchTarget = null));

            // Collisions
            this.physics.add.overlap(
              this.player,
              this.pods,
              (p, pod) => this.hitPod(pod),
              null,
              this,
            );
            this.physics.add.overlap(
              this.player,
              this.gemGroup,
              (p, gem) => this.collectGem(gem),
              null,
              this,
            );
            this.physics.add.overlap(
              this.player,
              this.hazards,
              (p, h) => this.hitHazard(h),
              null,
              this,
            );

            // Spawn question
            this.nextQuestion();

            // Floating debris spawner
            this.time.addEvent({
              delay: 2000,
              callback: () => this.spawnDebris(),
              loop: true,
            });

            // Gem spawner
            this.time.addEvent({
              delay: 4000,
              callback: () => this.spawnGem(),
              loop: true,
            });

            // Small hazard spawner
            this.time.addEvent({
              delay: 3000 + rand(0, 2000),
              callback: () => this.spawnHazard(),
              loop: true,
            });
          }

          createHUD() {
            const pad = 10;
            // Score
            this.add
              .rectangle(80, pad + 16, 140, 32, 0x111827, 0.85)
              .setStrokeStyle(1, 0xfbbf24, 0.3)
              .setScrollFactor(0)
              .setDepth(100);
            this.scoreText = this.add
              .text(80, pad + 16, "Score: 0", {
                fontSize: "15px",
                fontStyle: "bold",
                color: "#fbbf24",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(101);

            // Combo
            this.add
              .rectangle(220, pad + 16, 110, 32, 0x111827, 0.85)
              .setStrokeStyle(1, 0xfb923c, 0.3)
              .setScrollFactor(0)
              .setDepth(100);
            this.comboText = this.add
              .text(220, pad + 16, "Combo: 0", {
                fontSize: "15px",
                fontStyle: "bold",
                color: "#fb923c",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(101);

            // Level
            this.add
              .rectangle(345, pad + 16, 110, 32, 0x111827, 0.85)
              .setStrokeStyle(1, 0xa78bfa, 0.3)
              .setScrollFactor(0)
              .setDepth(100);
            this.levelText = this.add
              .text(345, pad + 16, "Level: 1", {
                fontSize: "15px",
                fontStyle: "bold",
                color: "#a78bfa",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(101);

            // Gems
            this.add
              .rectangle(470, pad + 16, 110, 32, 0x111827, 0.85)
              .setStrokeStyle(1, 0xfbbf24, 0.3)
              .setScrollFactor(0)
              .setDepth(100);
            this.gemText = this.add
              .text(470, pad + 16, "Gems: 0", {
                fontSize: "15px",
                fontStyle: "bold",
                color: "#fbbf24",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(101);

            // Shield bar
            this.add
              .rectangle(W - 110, pad + 16, 180, 32, 0x111827, 0.85)
              .setStrokeStyle(1, 0x34d399, 0.3)
              .setScrollFactor(0)
              .setDepth(100);
            this.shieldBar = this.add
              .rectangle(W - 190, pad + 16, 0, 22, 0x34d399, 0.8)
              .setOrigin(0, 0.5)
              .setScrollFactor(0)
              .setDepth(101);
            this.shieldBar.width = 160;
            this.shieldText = this.add
              .text(W - 110, pad + 16, "Shield: 100%", {
                fontSize: "13px",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(102);

            // Question panel
            this.qPanel = this.add
              .rectangle(W / 2, H - 44, W - 60, 68, 0x111827, 0.88)
              .setStrokeStyle(1, 0x61dafb, 0.3)
              .setScrollFactor(0)
              .setDepth(100);
            this.qText = this.add
              .text(W / 2, H - 52, "", {
                fontSize: "22px",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(101);
            this.qHint = this.add
              .text(W / 2, H - 30, "", { fontSize: "12px", color: "#94a3b8" })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(101);

            // Feedback
            this.feedbackText = this.add
              .text(W / 2, H / 2, "", {
                fontSize: "28px",
                fontStyle: "bold",
                color: "#34d399",
                stroke: "#000",
                strokeThickness: 4,
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(102)
              .setAlpha(0);
          }

          nextQuestion() {
            this.pods.clear(true, true);
            this.answered = false;

            this.currentQ = generateDivision(this.level);
            this.qText.setText(this.currentQ.stem);
            this.qHint.setText("Fly into the correct quotient!");

            // Spawn answer asteroids
            const choices = this.currentQ.choices;
            const startX = W * 0.35;
            choices.forEach((c, i) => {
              const x = startX + rand(80, 400);
              const y = 70 + (i * (H - 220)) / choices.length + rand(-25, 25);

              // Asteroid
              const ast = this.add
                .image(x, y, "asteroid")
                .setScale(1.3 + Math.random() * 0.3)
                .setDepth(5);
              this.tweens.add({
                targets: ast,
                angle: ast.angle + 360,
                duration: 8000 + rand(0, 4000),
                repeat: -1,
              });

              // Pod overlay
              const pod = this.physics.add
                .image(x, y, "pod")
                .setScale(1.1)
                .setDepth(6)
                .setAlpha(0.9);
              pod.setData("correct", c.correct);
              pod.setData("text", c.text);
              pod.setData("asteroid", ast);
              pod.body.setImmovable(true);

              const label = this.add
                .text(x, y, c.text, {
                  fontSize: "17px",
                  fontStyle: "bold",
                  color: "#ecfbff",
                })
                .setOrigin(0.5)
                .setDepth(7);
              pod.setData("label", label);

              // Bob
              this.tweens.add({
                targets: [pod, label, ast],
                y: y + 10,
                duration: 1800 + rand(0, 600),
                yoyo: true,
                repeat: -1,
                ease: "Sine.easeInOut",
                delay: rand(0, 400),
              });

              this.pods.add(pod);
            });
          }

          hitPod(pod) {
            if (this.answered) return;
            this.answered = true;

            const correct = pod.getData("correct");
            const label = pod.getData("label");
            const ast = pod.getData("asteroid");

            if (correct) {
              sfxMine();
              this.combo++;
              this.bestCombo = Math.max(this.bestCombo, this.combo);
              this.questionsCorrect++;
              this.questionsTotal++;

              const pts = 120 + this.combo * 25 + this.level * 40;
              this.score += pts;

              // Explosion effect
              this.add
                .particles(pod.x, pod.y, "explosion", {
                  speed: { min: 80, max: 250 },
                  lifespan: 700,
                  scale: { start: 1.2, end: 0 },
                  alpha: { start: 1, end: 0 },
                  quantity: 20,
                  tint: [0xfbbf24, 0xfb923c, 0xef4444],
                  emitting: false,
                })
                .explode(20);

              if (ast) ast.destroy();
              pod.setTint(0x34d399);
              if (label) label.setColor("#34d399");

              this.showFeedback("MINED! +" + pts, 0x34d399);
              this.cameras.main.shake(150, 0.006);
              sfxExplosion();

              // Drop gems
              for (let i = 0; i < rand(2, 4); i++) {
                const gem = this.physics.add
                  .image(pod.x + rand(-30, 30), pod.y + rand(-20, 20), "gem")
                  .setScale(1.2)
                  .setDepth(5);
                gem.body.velocity.x = rand(-100, 100);
                gem.body.velocity.y = rand(-100, 100);
                gem.body.drag.x = 80;
                gem.body.drag.y = 80;
                this.gemGroup.add(gem);
              }

              // Level up
              if (
                this.questionsCorrect > 0 &&
                this.questionsCorrect % 4 === 0 &&
                this.level < 6
              ) {
                this.level++;
                this.levelText.setText("Level: " + this.level);
                sfxLevelUp();
                this.showFeedback("SECTOR " + this.level + "!", 0xa78bfa);
              }

              this.updateHUD();
              this.time.delayedCall(1000, () => {
                if (this.shield > 0) this.nextQuestion();
              });
            } else {
              sfxWrong();
              this.combo = 0;
              this.shield -= 18;
              this.questionsTotal++;

              pod.setTint(0xef4444);
              if (label) label.setColor("#ef4444");

              // Show correct
              this.pods.getChildren().forEach((p) => {
                if (p.getData("correct")) {
                  p.setTint(0x34d399);
                  const l = p.getData("label");
                  if (l) l.setColor("#34d399");
                }
              });

              this.showFeedback(
                "Miss! Answer: " + this.currentQ.quotient,
                0xef4444,
              );
              this.qHint.setText(this.currentQ.hint);
              this.cameras.main.shake(250, 0.01);

              this.add
                .particles(pod.x, pod.y, "star", {
                  speed: { min: 30, max: 100 },
                  lifespan: 500,
                  scale: { start: 0.6, end: 0 },
                  tint: 0xef4444,
                  quantity: 10,
                  emitting: false,
                })
                .explode(10);

              this.updateHUD();
              if (this.shield <= 0) {
                this.time.delayedCall(1200, () => this.endGame());
              } else {
                this.time.delayedCall(1800, () => this.nextQuestion());
              }
            }
          }

          collectGem(gem) {
            sfxGem();
            this.gems++;
            this.score += 30;
            this.add
              .particles(gem.x, gem.y, "star", {
                speed: { min: 20, max: 80 },
                lifespan: 400,
                scale: { start: 0.5, end: 0 },
                tint: 0xfbbf24,
                quantity: 5,
                emitting: false,
              })
              .explode(5);
            gem.destroy();
            this.updateHUD();
          }

          hitHazard(h) {
            sfxWrong();
            this.shield -= 10;
            this.combo = 0;
            this.cameras.main.shake(150, 0.005);
            this.tweens.add({
              targets: this.player,
              alpha: 0.3,
              duration: 80,
              yoyo: true,
              repeat: 3,
            });

            const angle = Phaser.Math.Angle.Between(
              h.x,
              h.y,
              this.player.x,
              this.player.y,
            );
            this.player.body.velocity.x = Math.cos(angle) * 200;
            this.player.body.velocity.y = Math.sin(angle) * 200;

            h.destroy();
            this.updateHUD();
            if (this.shield <= 0)
              this.time.delayedCall(500, () => this.endGame());
          }

          spawnDebris() {
            const y = rand(40, H - 100);
            const a = this.add
              .image(W + 30, y, "asteroid_sm")
              .setScale(0.6 + Math.random() * 0.6)
              .setAlpha(0.35)
              .setAngle(rand(0, 360));
            this.tweens.add({
              targets: a,
              x: -40,
              angle: a.angle + 180,
              duration: 5000 + rand(0, 3000),
              onComplete: () => a.destroy(),
            });
          }

          spawnGem() {
            if (this.gems > 30) return;
            const gem = this.physics.add
              .image(W + 20, rand(60, H - 120), "gem")
              .setScale(1)
              .setDepth(5);
            gem.body.velocity.x = -60 - rand(0, 40);
            this.tweens.add({
              targets: gem,
              y: gem.y + rand(-20, 20),
              duration: 1500,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut",
            });
            this.gemGroup.add(gem);
            this.time.delayedCall(8000, () => {
              if (gem.active) gem.destroy();
            });
          }

          spawnHazard() {
            if (!this.answered) return;
            const h = this.physics.add
              .image(W + 30, rand(50, H - 100), "asteroid_sm")
              .setScale(0.8)
              .setTint(0xef4444)
              .setDepth(4);
            h.body.velocity.x = -120 - this.level * 20;
            h.body.velocity.y = rand(-30, 30);
            this.hazards.add(h);
            this.time.delayedCall(6000, () => {
              if (h.active) h.destroy();
            });
          }

          showFeedback(text, color) {
            const hex = "#" + color.toString(16).padStart(6, "0");
            this.feedbackText
              .setText(text)
              .setColor(hex)
              .setAlpha(1)
              .setScale(0.5);
            this.tweens.add({
              targets: this.feedbackText,
              scale: 1,
              duration: 200,
              ease: "Back.easeOut",
            });
            this.tweens.add({
              targets: this.feedbackText,
              alpha: 0,
              duration: 700,
              delay: 900,
            });
          }

          updateHUD() {
            this.scoreText.setText("Score: " + this.score);
            this.comboText.setText(
              "Combo: " + this.combo + (this.combo >= 3 ? " 🔥" : ""),
            );
            this.levelText.setText("Level: " + this.level);
            this.gemText.setText("Gems: " + this.gems);
            this.shield = Math.max(0, Math.min(100, this.shield));
            this.shieldBar.width = Math.max(0, (this.shield / 100) * 160);
            this.shieldBar.fillColor =
              this.shield > 50
                ? 0x34d399
                : this.shield > 25
                  ? 0xfbbf24
                  : 0xef4444;
            this.shieldText.setText("Shield: " + Math.round(this.shield) + "%");
          }

          endGame() {
            this.physics.pause();
            this.scene.start("Results", {
              score: this.score,
              correct: this.questionsCorrect,
              total: this.questionsTotal,
              level: this.level,
              bestCombo: this.bestCombo,
              gems: this.gems,
            });
          }

          update(time, delta) {
            if (this.shield <= 0) return;

            const speed = 340;
            let vx = 0,
              vy = 0;
            if (this.cursors.left.isDown || this.wasd.left.isDown) vx = -speed;
            if (this.cursors.right.isDown || this.wasd.right.isDown) vx = speed;
            if (this.cursors.up.isDown || this.wasd.up.isDown) vy = -speed;
            if (this.cursors.down.isDown || this.wasd.down.isDown) vy = speed;

            if (this.touchTarget) {
              const dx = this.touchTarget.x - this.player.x;
              const dy = this.touchTarget.y - this.player.y;
              const dist = Math.hypot(dx, dy);
              if (dist > 15) {
                vx = (dx / dist) * speed;
                vy = (dy / dist) * speed;
              }
            }

            this.player.body.velocity.x = Phaser.Math.Linear(
              this.player.body.velocity.x,
              vx,
              0.15,
            );
            this.player.body.velocity.y = Phaser.Math.Linear(
              this.player.body.velocity.y,
              vy,
              0.15,
            );

            if (vx < -20) this.player.setFlipX(true);
            else if (vx > 20) this.player.setFlipX(false);

            // Engine glow
            this.engineGlow.setPosition(this.player.x - 22, this.player.y);

            // Parallax stars
            this.starLayers.forEach((layer) => {
              layer.forEach((s) => {
                s.x -= s.getData("speed");
                if (s.x < -5) {
                  s.x = W + 5;
                  s.y = rand(0, H);
                }
              });
            });

            // Clean offscreen
            this.gemGroup.getChildren().forEach((g) => {
              if (g.x < -30) g.destroy();
            });
            this.hazards.getChildren().forEach((h) => {
              if (h.x < -40) h.destroy();
            });
          }
        }

        // ==================== RESULTS ====================
        class ResultsScene extends Phaser.Scene {
          constructor() {
            super("Results");
          }
          init(data) {
            this.d = data;
          }
          create() {
            const d = this.d;

            for (let i = 0; i < 100; i++) {
              this.add.circle(
                rand(0, W),
                rand(0, H),
                Math.random() * 1.5 + 0.3,
                0xffffff,
                0.2 + Math.random() * 0.4,
              );
            }

            const acc = d.total ? Math.round((d.correct / d.total) * 100) : 0;
            const won = d.correct >= 10;

            this.add
              .text(W / 2, 55, won ? "MISSION COMPLETE!" : "MINING REPORT", {
                fontSize: "36px",
                fontStyle: "bold",
                color: won ? "#fbbf24" : "#61dafb",
                stroke: "#000",
                strokeThickness: 3,
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 90, "6.NS.B.2 — Multi-Digit Division", {
                fontSize: "14px",
                color: "#94a3b8",
              })
              .setOrigin(0.5);

            const stats = [
              { label: "Score", value: d.score, color: "#fbbf24" },
              {
                label: "Correct",
                value: d.correct + "/" + d.total,
                color: "#34d399",
              },
              { label: "Accuracy", value: acc + "%", color: "#61dafb" },
              { label: "Level", value: d.level, color: "#a78bfa" },
              { label: "Best Combo", value: d.bestCombo, color: "#fb923c" },
              { label: "Gems", value: d.gems, color: "#fbbf24" },
            ];

            stats.forEach((s, i) => {
              const col = i % 3,
                row = Math.floor(i / 3);
              const x = W / 2 - 190 + col * 190,
                y = 150 + row * 95;
              this.add
                .rectangle(x, y, 165, 70, 0x111827, 0.85)
                .setStrokeStyle(1, parseInt(s.color.slice(1), 16), 0.4);
              this.add
                .text(x, y - 14, s.label, {
                  fontSize: "11px",
                  color: "#94a3b8",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 12, String(s.value), {
                  fontSize: "24px",
                  fontStyle: "bold",
                  color: s.color,
                })
                .setOrigin(0.5);
            });

            // Badges
            const badges = [];
            if (acc >= 90) badges.push("Division Master");
            if (acc >= 70) badges.push("Skilled Miner");
            if (d.bestCombo >= 5) badges.push("Combo Expert");
            if (d.gems >= 10) badges.push("Gem Collector");
            if (d.level >= 4) badges.push("Deep Space");
            if (!badges.length) badges.push("Keep Mining!");

            this.add
              .text(W / 2, 370, "Achievements", {
                fontSize: "13px",
                color: "#94a3b8",
              })
              .setOrigin(0.5);
            badges.forEach((b, i) => {
              const bx = W / 2 + (i - (badges.length - 1) / 2) * 130;
              this.add
                .rectangle(bx, 400, 115, 28, 0x1a0d3e, 0.8)
                .setStrokeStyle(1, 0xa78bfa, 0.5);
              this.add
                .text(bx, 400, b, {
                  fontSize: "11px",
                  fontStyle: "bold",
                  color: "#a78bfa",
                })
                .setOrigin(0.5);
            });

            this.add
              .text(
                W / 2,
                455,
                "Tip: Divide place by place.\nEstimate first, then refine each digit.",
                {
                  fontSize: "13px",
                  color: "#94a3b8",
                  align: "center",
                  lineSpacing: 4,
                },
              )
              .setOrigin(0.5);

            // Buttons
            const btn = this.add
              .rectangle(W / 2 - 80, 530, 160, 46, 0xfbbf24)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2 - 80, 530, "MINE AGAIN", {
                fontSize: "17px",
                fontStyle: "bold",
                color: "#000",
              })
              .setOrigin(0.5);
            btn.on("pointerover", () => btn.setFillStyle(0xfcd34d));
            btn.on("pointerout", () => btn.setFillStyle(0xfbbf24));
            btn.on("pointerdown", () => {
              sfxLaser();
              this.scene.start("Game");
            });

            const menu = this.add
              .rectangle(W / 2 + 100, 530, 110, 46, 0x111827)
              .setStrokeStyle(1, 0x61dafb, 0.5)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2 + 100, 530, "MENU", {
                fontSize: "15px",
                fontStyle: "bold",
                color: "#61dafb",
              })
              .setOrigin(0.5);
            menu.on("pointerdown", () => this.scene.start("Title"));

            this.input.keyboard.on("keydown-SPACE", () => {
              sfxLaser();
              this.scene.start("Game");
            });
            this.cameras.main.fadeIn(400);

            if (acc >= 70) {
              for (let i = 0; i < 20; i++) {
                const s = this.add
                  .image(rand(50, W - 50), -20, "gem")
                  .setScale(1 + Math.random())
                  .setTint(pick([0xfbbf24, 0xfb923c, 0xa78bfa, 0x61dafb]));
                this.tweens.add({
                  targets: s,
                  y: H + 20,
                  x: s.x + rand(-80, 80),
                  angle: 360,
                  duration: 2000 + rand(0, 1500),
                  delay: rand(0, 800),
                  alpha: 0,
                });
              }
            }
          }
        }

        config.scene = [BootScene, TitleScene, GameScene, ResultsScene];
        new Phaser.Game(config);
      })();
    </script>
  </body>
</html>
