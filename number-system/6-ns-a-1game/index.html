<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Underwater Adventure — 6.NS.A.1</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #020a18;
        font-family: Inter, system-ui, sans-serif;
      }
      #game-container {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
      }
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="game-container"
      role="application"
      aria-label="Underwater Adventure — a Grade 6 math game for dividing fractions (6.NS.A.1)."
    >
      <p class="sr-only">
        Underwater Adventure is an interactive math game. Dive deeper by solving
        fraction-division problems and choosing the correct answer; avoid sea
        creatures carrying wrong answers. Play with touch, mouse, or keyboard.
      </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
      // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror
      // (document.write blocks parsing so the mirror is ready before the game script runs).
      if (typeof Phaser === "undefined") {
        document.write(
          '<script src="https://unpkg.com/phaser@3.80.1/dist/phaser.min.js"><\/script>',
        );
      }
      // If both CDNs are unreachable, show a clear message instead of a blank page.
      window.addEventListener("load", function () {
        if (typeof Phaser === "undefined") {
          document.body.innerHTML =
            '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">\u26a0\ufe0f This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
        }
      });
    </script>
    <script>
      "use strict";
      (() => {
        /* ============================================================
   UNDERWATER ADVENTURE — 6.NS.A.1
   Divide fractions by fractions.
   Dive deeper by solving fraction division problems.
   Avoid sea creatures carrying wrong answers.
   ============================================================ */

        // --- Audio helpers ---
        let audioCtx = null;
        function getAudio() {
          if (!audioCtx)
            try {
              audioCtx = new (
                window.AudioContext || window.webkitAudioContext
              )();
            } catch (e) {}
          return audioCtx;
        }
        function playTone(freq, dur, type = "sine", vol = 0.06) {
          const c = getAudio();
          if (!c) return;
          if (c.state === "suspended") c.resume();
          const o = c.createOscillator(),
            g = c.createGain();
          o.type = type;
          o.frequency.value = freq;
          g.gain.setValueAtTime(0.0001, c.currentTime);
          g.gain.linearRampToValueAtTime(vol, c.currentTime + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
          o.connect(g).connect(c.destination);
          o.start();
          o.stop(c.currentTime + dur + 0.01);
        }
        function sfxCorrect() {
          playTone(523, 0.12);
          setTimeout(() => playTone(659, 0.12), 80);
          setTimeout(() => playTone(784, 0.15), 160);
        }
        function sfxWrong() {
          playTone(200, 0.15, "sawtooth", 0.04);
          setTimeout(() => playTone(160, 0.18, "sawtooth", 0.03), 100);
        }
        function sfxDive() {
          playTone(330, 0.2, "triangle", 0.04);
          setTimeout(() => playTone(262, 0.25, "triangle", 0.03), 120);
        }
        function sfxBubble() {
          playTone(800 + Math.random() * 400, 0.08, "sine", 0.02);
        }
        function sfxLevelUp() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => playTone(f, 0.15, "sine", 0.05), i * 100),
          );
        }

        // --- Math helpers ---
        function gcd(a, b) {
          a = Math.abs(a);
          b = Math.abs(b);
          while (b) {
            [a, b] = [b, a % b];
          }
          return a || 1;
        }
        function simplify(n, d) {
          if (d < 0) {
            n *= -1;
            d *= -1;
          }
          const g = gcd(n, d);
          return { n: n / g, d: d / g };
        }
        function fracStr(f) {
          const s = simplify(f.n, f.d);
          if (s.d === 1) return "" + s.n;
          return s.n + "/" + s.d;
        }
        function fracDisplay(f) {
          const s = simplify(f.n, f.d);
          if (s.d === 1) return "" + s.n;
          if (Math.abs(s.n) > s.d) {
            const w = Math.trunc(s.n / s.d),
              r = Math.abs(s.n % s.d);
            return r === 0 ? "" + w : w + " " + r + "/" + s.d;
          }
          return s.n + "/" + s.d;
        }
        function fracEqual(a, b) {
          const x = simplify(a.n, a.d),
            y = simplify(b.n, b.d);
          return x.n === y.n && x.d === y.d;
        }
        function divFrac(a, b) {
          return simplify(a.n * b.d, a.d * b.n);
        }
        function mulFrac(a, b) {
          return simplify(a.n * b.n, a.d * b.d);
        }
        function rand(min, max) {
          return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        function pick(arr) {
          return arr[rand(0, arr.length - 1)];
        }
        function shuffle(arr) {
          const a = [...arr];
          for (let i = a.length - 1; i > 0; i--) {
            const j = rand(0, i);
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        }

        // --- Question generator ---
        function generateQuestion(level) {
          const dens =
            level <= 2
              ? [2, 3, 4]
              : level <= 4
                ? [2, 3, 4, 5, 6]
                : [2, 3, 4, 5, 6, 8];
          const maxN = level <= 2 ? 5 : level <= 4 ? 7 : 9;
          let a, b, answer;
          let attempts = 0;
          do {
            a = { n: rand(1, maxN), d: pick(dens) };
            b = { n: rand(1, Math.min(maxN, a.d)), d: pick(dens) };
            answer = divFrac(a, b);
            attempts++;
          } while (
            ((answer.d === 1 && Math.abs(answer.n) > 12) ||
              Math.abs(answer.n) > 20 ||
              answer.d > 12) &&
            attempts < 30
          );

          const correct = fracStr(answer);
          const wrongs = new Set();
          // Wrong: forgot reciprocal (just multiply straight)
          wrongs.add(fracStr(mulFrac(a, b)));
          // Wrong: flipped first fraction
          wrongs.add(fracStr(simplify(a.d * b.n, a.n * b.d)));
          // Wrong: unsimplified
          wrongs.add(answer.n * 2 + "/" + answer.d * 2);
          // Wrong: random
          wrongs.add(fracStr({ n: answer.n + 1, d: answer.d }));
          wrongs.add(fracStr({ n: Math.max(1, answer.n - 1), d: answer.d }));
          wrongs.add(fracStr({ n: rand(1, 8), d: rand(2, 8) }));

          wrongs.delete(correct);
          const wrongArr = [...wrongs].slice(0, 3);
          while (wrongArr.length < 3)
            wrongArr.push(fracStr({ n: rand(1, 10), d: rand(2, 10) }));

          const choices = shuffle([
            { text: correct, correct: true },
            ...wrongArr.map((w) => ({ text: w, correct: false })),
          ]);

          return {
            a,
            b,
            answer,
            prompt: fracStr(a) + " ÷ " + fracStr(b),
            hint:
              "Keep " +
              fracStr(a) +
              ", flip " +
              fracStr(b) +
              " to " +
              fracStr({ n: b.d, d: b.n }) +
              ", multiply.",
            choices,
            steps: [
              "Start: " + fracStr(a) + " ÷ " + fracStr(b),
              "Keep first: " + fracStr(a),
              "Flip second: " +
                fracStr(b) +
                " → " +
                fracStr({ n: b.d, d: b.n }),
              "Multiply: " + fracStr(a) + " × " + fracStr({ n: b.d, d: b.n }),
              "Result: " + fracDisplay(answer),
            ],
          };
        }

        // --- Phaser Config ---
        const W = 960,
          H = 640;
        const config = {
          type: Phaser.AUTO,
          parent: "game-container",
          width: W,
          height: H,
          backgroundColor: "#020a18",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          physics: {
            default: "arcade",
            arcade: { gravity: { y: 0 }, debug: false },
          },
          scene: [],
        };

        // ==================== BOOT SCENE ====================
        class BootScene extends Phaser.Scene {
          constructor() {
            super("Boot");
          }
          create() {
            // Generate textures
            const g = this.make.graphics({ add: false });

            // Diver (player)
            g.clear();
            g.fillStyle(0x61dafb);
            g.fillEllipse(20, 16, 40, 28);
            g.fillStyle(0xffd166);
            g.fillCircle(32, 10, 8);
            g.fillStyle(0x18d2ba);
            g.fillRect(0, 6, 10, 20);
            g.fillStyle(0x61dafb);
            g.fillTriangle(-6, 16, -18, 8, -18, 24);
            g.generateTexture("diver", 44, 32);

            // Bubble
            g.clear();
            g.fillStyle(0xffffff, 0.3);
            g.fillCircle(6, 6, 6);
            g.fillStyle(0xffffff, 0.5);
            g.fillCircle(4, 4, 2);
            g.generateTexture("bubble", 12, 12);

            // Answer pod (neutral)
            g.clear();
            g.lineStyle(2, 0x61dafb, 0.6);
            g.fillStyle(0x0a1e3a, 0.9);
            g.fillRoundedRect(0, 0, 100, 50, 12);
            g.strokeRoundedRect(0, 0, 100, 50, 12);
            g.generateTexture("pod", 100, 50);

            // Sea creature (enemy)
            g.clear();
            g.fillStyle(0xff6b6b);
            g.fillEllipse(20, 14, 40, 28);
            g.fillStyle(0xffffff);
            g.fillCircle(28, 10, 5);
            g.fillStyle(0x000000);
            g.fillCircle(29, 10, 2);
            g.fillStyle(0xff6b6b);
            g.fillTriangle(0, 14, -8, 6, -8, 22);
            g.generateTexture("enemy", 44, 28);

            // Jellyfish
            g.clear();
            g.fillStyle(0xc084fc, 0.7);
            g.fillEllipse(16, 10, 32, 20);
            for (let i = 0; i < 5; i++) {
              g.lineStyle(2, 0xc084fc, 0.5);
              g.lineBetween(4 + i * 7, 18, 2 + i * 7, 36);
            }
            g.generateTexture("jellyfish", 32, 38);

            // Treasure chest
            g.clear();
            g.fillStyle(0xfbbf24);
            g.fillRoundedRect(0, 8, 32, 20, 4);
            g.fillStyle(0xd97706);
            g.fillRoundedRect(0, 0, 32, 12, 4);
            g.fillStyle(0xffffff);
            g.fillRect(14, 4, 4, 6);
            g.generateTexture("chest", 32, 28);

            // Coral
            g.clear();
            g.fillStyle(0xff6b8a, 0.6);
            g.fillRoundedRect(0, 10, 8, 20, 3);
            g.fillRoundedRect(6, 5, 8, 25, 3);
            g.fillRoundedRect(12, 12, 8, 18, 3);
            g.generateTexture("coral", 20, 30);

            // Particle
            g.clear();
            g.fillStyle(0xffffff);
            g.fillCircle(3, 3, 3);
            g.generateTexture("particle", 6, 6);

            // Star particle
            g.clear();
            g.fillStyle(0xffd166);
            g.fillCircle(4, 4, 4);
            g.generateTexture("star", 8, 8);

            // Health heart
            g.clear();
            g.fillStyle(0xff6b6b);
            g.fillCircle(8, 6, 6);
            g.fillCircle(16, 6, 6);
            g.fillTriangle(2, 8, 22, 8, 12, 20);
            g.generateTexture("heart", 24, 20);

            this.scene.start("Title");
          }
        }

        // ==================== TITLE SCENE ====================
        class TitleScene extends Phaser.Scene {
          constructor() {
            super("Title");
          }
          create() {
            // Ocean gradient background
            const bg = this.add.graphics();
            bg.fillGradientStyle(0x031321, 0x031321, 0x072a44, 0x072a44, 1);
            bg.fillRect(0, 0, W, H);

            // Animated bubbles
            for (let i = 0; i < 30; i++) {
              const b = this.add
                .image(rand(20, W - 20), rand(20, H - 20), "bubble")
                .setAlpha(0.2 + Math.random() * 0.3)
                .setScale(0.5 + Math.random() * 1.5);
              this.tweens.add({
                targets: b,
                y: b.y - 100 - Math.random() * 200,
                alpha: 0,
                duration: 3000 + Math.random() * 4000,
                repeat: -1,
                delay: Math.random() * 3000,
              });
            }

            // Title
            this.add
              .text(W / 2, 120, "UNDERWATER\nADVENTURE", {
                fontSize: "52px",
                fontFamily: "Inter,system-ui,sans-serif",
                fontStyle: "bold",
                color: "#61dafb",
                align: "center",
                lineSpacing: 8,
                stroke: "#0a3a58",
                strokeThickness: 4,
              })
              .setOrigin(0.5);

            this.add
              .text(W / 2, 210, "6.NS.A.1 — Divide Fractions by Fractions", {
                fontSize: "16px",
                color: "#a8d7e5",
                align: "center",
              })
              .setOrigin(0.5);

            // Diver animation
            const diver = this.add.image(W / 2, 320, "diver").setScale(3);
            this.tweens.add({
              targets: diver,
              y: 340,
              duration: 2000,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut",
            });

            // Instructions
            const info = [
              "Dive deep and solve fraction division!",
              "Swim into the answer bubble with the correct result.",
              "Avoid sea creatures carrying wrong answers.",
              "Keep → Flip → Multiply → Simplify",
              "Arrow keys / WASD / Touch to move",
            ];
            info.forEach((t, i) => {
              this.add
                .text(W / 2, 400 + i * 24, t, {
                  fontSize: "14px",
                  color: "#7ec8e3",
                  align: "center",
                })
                .setOrigin(0.5);
            });

            // Start button
            const btn = this.add
              .rectangle(W / 2, 570, 220, 50, 0x18d2ba)
              .setInteractive({ useHandCursor: true });
            const btnTxt = this.add
              .text(W / 2, 570, "START DIVE", {
                fontSize: "20px",
                fontStyle: "bold",
                color: "#000",
              })
              .setOrigin(0.5);

            btn.on("pointerover", () => btn.setFillStyle(0x34d399));
            btn.on("pointerout", () => btn.setFillStyle(0x18d2ba));
            btn.on("pointerdown", () => {
              getAudio();
              sfxDive();
              this.cameras.main.fadeOut(500, 2, 10, 24);
              this.time.delayedCall(500, () => this.scene.start("Game"));
            });

            // Keyboard start
            this.input.keyboard.on("keydown-SPACE", () => {
              getAudio();
              sfxDive();
              this.cameras.main.fadeOut(500);
              this.time.delayedCall(500, () => this.scene.start("Game"));
            });
            this.input.keyboard.on("keydown-ENTER", () => {
              getAudio();
              sfxDive();
              this.cameras.main.fadeOut(500);
              this.time.delayedCall(500, () => this.scene.start("Game"));
            });

            this.cameras.main.fadeIn(400);
          }
        }

        // ==================== GAME SCENE ====================
        class GameScene extends Phaser.Scene {
          constructor() {
            super("Game");
          }

          create() {
            this.cameras.main.fadeIn(400);

            // State
            this.score = 0;
            this.combo = 0;
            this.lives = 4;
            this.level = 1;
            this.questionsAnswered = 0;
            this.questionsCorrect = 0;
            this.depth = 0;
            this.targetDepth = 0;
            this.currentQ = null;
            this.answered = false;
            this.bestCombo = 0;

            // Ocean background layers
            this.bgBack = this.add.tileSprite(0, 0, W, H, null).setOrigin(0);
            const bg = this.add.graphics();
            bg.fillGradientStyle(0x072a44, 0x072a44, 0x031321, 0x031321, 1);
            bg.fillRect(0, 0, W, H);
            bg.setScrollFactor(0);

            // Light rays
            this.rays = this.add.graphics().setAlpha(0.08).setScrollFactor(0);
            for (let i = 0; i < 6; i++) {
              this.rays.fillStyle(0x61dafb);
              const x = 100 + i * 160;
              this.rays.fillTriangle(x, 0, x - 40, H, x + 40, H);
            }

            // Bubbles particle
            this.bubbleParticles = this.add
              .particles(0, 0, "bubble", {
                x: { min: 0, max: W },
                y: { min: H + 10, max: H + 50 },
                lifespan: 4000,
                speedY: { min: -30, max: -80 },
                speedX: { min: -10, max: 10 },
                scale: { start: 0.3, end: 0.8 },
                alpha: { start: 0.4, end: 0 },
                frequency: 200,
                quantity: 1,
              })
              .setScrollFactor(0);

            // Coral decorations at bottom
            for (let i = 0; i < 12; i++) {
              this.add
                .image(rand(20, W - 20), H - rand(5, 30), "coral")
                .setScale(1 + Math.random())
                .setAlpha(0.3 + Math.random() * 0.3)
                .setTint(pick([0xff6b8a, 0xc084fc, 0x34d399, 0x61dafb]))
                .setScrollFactor(0);
            }

            // Player (diver)
            this.player = this.physics.add
              .image(120, H / 2, "diver")
              .setScale(1.8)
              .setDepth(10);
            this.player.setCollideWorldBounds(true);
            this.player.body.setMaxVelocity(280, 280);
            this.player.setDamping(true);
            this.player.setDrag(0.92);

            // Player glow
            this.playerGlow = this.add
              .ellipse(0, 0, 70, 50, 0x61dafb, 0.15)
              .setDepth(9);
            this.tweens.add({
              targets: this.playerGlow,
              scaleX: 1.2,
              scaleY: 1.2,
              alpha: 0.08,
              duration: 1000,
              yoyo: true,
              repeat: -1,
            });

            // Trail particles
            this.trailEmitter = this.add
              .particles(0, 0, "particle", {
                follow: this.player,
                followOffset: { x: -20, y: 0 },
                lifespan: 600,
                speedX: { min: -20, max: -60 },
                speedY: { min: -15, max: 15 },
                scale: { start: 0.5, end: 0 },
                alpha: { start: 0.5, end: 0 },
                tint: 0x61dafb,
                frequency: 50,
                quantity: 1,
              })
              .setDepth(9);

            // Answer pods group
            this.pods = this.physics.add.group();

            // Enemy creatures group
            this.enemies = this.physics.add.group();

            // Collectibles
            this.collectibles = this.physics.add.group();

            // HUD
            this.createHUD();

            // Controls
            this.cursors = this.input.keyboard.createCursorKeys();
            this.wasd = {
              up: this.input.keyboard.addKey("W"),
              down: this.input.keyboard.addKey("S"),
              left: this.input.keyboard.addKey("A"),
              right: this.input.keyboard.addKey("D"),
            };

            // Touch controls
            this.touchTarget = null;
            this.input.on("pointerdown", (p) => {
              this.touchTarget = { x: p.worldX, y: p.worldY };
            });
            this.input.on("pointermove", (p) => {
              if (p.isDown) this.touchTarget = { x: p.worldX, y: p.worldY };
            });
            this.input.on("pointerup", () => {
              this.touchTarget = null;
            });

            // Collisions
            this.physics.add.overlap(
              this.player,
              this.pods,
              (p, pod) => this.hitPod(pod),
              null,
              this,
            );
            this.physics.add.overlap(
              this.player,
              this.enemies,
              (p, e) => this.hitEnemy(e),
              null,
              this,
            );
            this.physics.add.overlap(
              this.player,
              this.collectibles,
              (p, c) => this.hitCollectible(c),
              null,
              this,
            );

            // Spawn first question
            this.nextQuestion();

            // Ambient fish spawner
            this.time.addEvent({
              delay: 3000,
              callback: () => this.spawnAmbientFish(),
              loop: true,
            });

            // Depth timer (auto increase)
            this.time.addEvent({
              delay: 100,
              callback: () => {
                this.depth += 0.3;
                this.depthText.setText(
                  "Depth: " + Math.floor(this.depth) + "m",
                );
              },
              loop: true,
            });
          }

          createHUD() {
            const pad = 12;
            // Score
            this.add
              .rectangle(80, pad + 18, 140, 36, 0x0a1e3a, 0.8)
              .setScrollFactor(0)
              .setDepth(100)
              .setStrokeStyle(1, 0x61dafb, 0.3);
            this.scoreText = this.add
              .text(80, pad + 18, "Score: 0", {
                fontSize: "16px",
                fontStyle: "bold",
                color: "#61dafb",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(101);

            // Combo
            this.add
              .rectangle(230, pad + 18, 120, 36, 0x0a1e3a, 0.8)
              .setScrollFactor(0)
              .setDepth(100)
              .setStrokeStyle(1, 0xffd166, 0.3);
            this.comboText = this.add
              .text(230, pad + 18, "Combo: 0", {
                fontSize: "16px",
                fontStyle: "bold",
                color: "#ffd166",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(101);

            // Level
            this.add
              .rectangle(370, pad + 18, 120, 36, 0x0a1e3a, 0.8)
              .setScrollFactor(0)
              .setDepth(100)
              .setStrokeStyle(1, 0x34d399, 0.3);
            this.levelText = this.add
              .text(370, pad + 18, "Level: 1", {
                fontSize: "16px",
                fontStyle: "bold",
                color: "#34d399",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(101);

            // Depth
            this.add
              .rectangle(510, pad + 18, 140, 36, 0x0a1e3a, 0.8)
              .setScrollFactor(0)
              .setDepth(100)
              .setStrokeStyle(1, 0xc084fc, 0.3);
            this.depthText = this.add
              .text(510, pad + 18, "Depth: 0m", {
                fontSize: "16px",
                fontStyle: "bold",
                color: "#c084fc",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(101);

            // Lives (hearts)
            this.heartsGroup = [];
            for (let i = 0; i < 4; i++) {
              const h = this.add
                .image(W - 120 + i * 28, pad + 18, "heart")
                .setScale(1.2)
                .setScrollFactor(0)
                .setDepth(101);
              this.heartsGroup.push(h);
            }

            // Question display (bottom panel)
            this.qPanel = this.add
              .rectangle(W / 2, H - 50, W - 40, 80, 0x0a1e3a, 0.85)
              .setScrollFactor(0)
              .setDepth(100)
              .setStrokeStyle(1, 0x61dafb, 0.4);
            this.qText = this.add
              .text(W / 2, H - 60, "", {
                fontSize: "24px",
                fontStyle: "bold",
                color: "#fff",
                align: "center",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(101);
            this.qHint = this.add
              .text(W / 2, H - 35, "", {
                fontSize: "13px",
                color: "#a8d7e5",
                align: "center",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(101);
            this.feedbackText = this.add
              .text(W / 2, H / 2, "", {
                fontSize: "28px",
                fontStyle: "bold",
                color: "#34d399",
                stroke: "#000",
                strokeThickness: 4,
                align: "center",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(102)
              .setAlpha(0);
          }

          nextQuestion() {
            // Clear old pods and enemies
            this.pods.clear(true, true);
            this.enemies.clear(true, true);
            this.answered = false;

            // Generate question
            this.currentQ = generateQuestion(this.level);
            this.qText.setText(this.currentQ.prompt);
            this.qHint.setText("Swim into the correct answer!");

            // Spawn answer pods
            const startX = W * 0.4;
            const choices = this.currentQ.choices;
            choices.forEach((c, i) => {
              const x = startX + rand(50, 350);
              const y = 80 + (i * (H - 200)) / choices.length + rand(-20, 20);

              const pod = this.physics.add
                .image(x, y, "pod")
                .setScale(1.2)
                .setDepth(5);
              pod.setData("correct", c.correct);
              pod.setData("text", c.text);
              pod.setData("bobOffset", Math.random() * Math.PI * 2);
              pod.body.setImmovable(true);

              // Answer label
              const label = this.add
                .text(x, y, c.text, {
                  fontSize: "18px",
                  fontStyle: "bold",
                  color: "#ecfbff",
                  align: "center",
                })
                .setOrigin(0.5)
                .setDepth(6);
              pod.setData("label", label);

              // Bob animation
              this.tweens.add({
                targets: [pod, label],
                y: y + 12,
                duration: 1500 + rand(0, 500),
                yoyo: true,
                repeat: -1,
                ease: "Sine.easeInOut",
                delay: rand(0, 500),
              });

              this.pods.add(pod);

              // If wrong answer, also spawn an enemy near it
              if (!c.correct && Math.random() > 0.4) {
                const ex = x + rand(-60, 60);
                const ey = y + rand(-40, 40);
                const enemy = this.physics.add
                  .image(ex, ey, pick(["enemy", "jellyfish"]))
                  .setScale(1.3)
                  .setDepth(4);
                enemy.setData("speed", rand(30, 80));
                enemy.setData("dir", Math.random() > 0.5 ? 1 : -1);
                this.enemies.add(enemy);
              }
            });

            // Spawn some extra roaming enemies
            for (let i = 0; i < this.level; i++) {
              const ex = rand(W * 0.3, W - 60);
              const ey = rand(60, H - 120);
              const enemy = this.physics.add
                .image(ex, ey, pick(["enemy", "jellyfish"]))
                .setScale(1.2)
                .setDepth(4);
              enemy.setData("speed", rand(40, 100));
              enemy.setData("dir", Math.random() > 0.5 ? 1 : -1);
              enemy.setData("vertDir", Math.random() > 0.5 ? 1 : -1);
              this.enemies.add(enemy);
            }

            // Spawn collectible bubbles
            for (let i = 0; i < rand(1, 3); i++) {
              const cx = rand(200, W - 80);
              const cy = rand(80, H - 150);
              const c = this.physics.add
                .image(cx, cy, "star")
                .setScale(1.5)
                .setDepth(4);
              c.setData("type", "bonus");
              this.tweens.add({
                targets: c,
                y: cy - 15,
                duration: 1000,
                yoyo: true,
                repeat: -1,
                ease: "Sine.easeInOut",
              });
              this.collectibles.add(c);
            }
          }

          hitPod(pod) {
            if (this.answered) return;
            this.answered = true;

            const correct = pod.getData("correct");
            const label = pod.getData("label");

            if (correct) {
              // Correct answer
              sfxCorrect();
              this.combo++;
              this.bestCombo = Math.max(this.bestCombo, this.combo);
              this.questionsCorrect++;
              this.questionsAnswered++;

              const points = 100 + this.combo * 20 + this.level * 30;
              this.score += points;

              // Visual feedback
              pod.setTint(0x34d399);
              label.setColor("#34d399");

              this.showFeedback("CORRECT! +" + points, 0x34d399);

              // Particles burst
              this.add
                .particles(pod.x, pod.y, "star", {
                  speed: { min: 60, max: 200 },
                  lifespan: 800,
                  scale: { start: 1, end: 0 },
                  alpha: { start: 1, end: 0 },
                  quantity: 15,
                  tint: 0xffd166,
                  emitting: false,
                })
                .explode(15);

              // Camera flash
              this.cameras.main.flash(200, 52, 211, 153, false, null, this);

              // Screen shake
              this.cameras.main.shake(150, 0.005);

              // Increase depth
              this.depth += 10 + this.level * 5;

              // Level up check
              if (
                this.questionsCorrect > 0 &&
                this.questionsCorrect % 4 === 0 &&
                this.level < 6
              ) {
                this.level++;
                this.levelText.setText("Level: " + this.level);
                sfxLevelUp();
                this.showFeedback(
                  "LEVEL " + this.level + "! Diving deeper!",
                  0xffd166,
                );
              }

              // Update HUD
              this.updateHUD();

              // Next question after delay
              this.time.delayedCall(1200, () => {
                if (this.lives > 0) this.nextQuestion();
              });
            } else {
              // Wrong answer
              sfxWrong();
              this.combo = 0;
              this.lives--;
              this.questionsAnswered++;

              pod.setTint(0xff6b6b);
              label.setColor("#ff6b6b");

              // Show the correct answer
              const correctPod = this.pods
                .getChildren()
                .find((p) => p.getData("correct"));
              if (correctPod) {
                correctPod.setTint(0x34d399);
                const cl = correctPod.getData("label");
                if (cl) cl.setColor("#34d399");
              }

              this.showFeedback(
                "Not quite! Answer: " + fracDisplay(this.currentQ.answer),
                0xff6b6b,
              );

              // Show hint
              this.qHint.setText(this.currentQ.hint);

              // Camera shake
              this.cameras.main.shake(300, 0.01);
              this.cameras.main.flash(200, 255, 107, 107, false, null, this);

              // Particles
              this.add
                .particles(pod.x, pod.y, "particle", {
                  speed: { min: 40, max: 150 },
                  lifespan: 600,
                  scale: { start: 0.8, end: 0 },
                  tint: 0xff6b6b,
                  quantity: 10,
                  emitting: false,
                })
                .explode(10);

              this.updateHUD();

              if (this.lives <= 0) {
                this.time.delayedCall(1500, () => this.endGame());
              } else {
                this.time.delayedCall(2000, () => this.nextQuestion());
              }
            }
          }

          hitEnemy(enemy) {
            if (this.answered) return;

            sfxWrong();
            this.combo = 0;
            this.lives--;

            // Knockback
            const angle = Phaser.Math.Angle.Between(
              enemy.x,
              enemy.y,
              this.player.x,
              this.player.y,
            );
            this.player.body.velocity.x = Math.cos(angle) * 250;
            this.player.body.velocity.y = Math.sin(angle) * 250;

            // Flash player
            this.tweens.add({
              targets: this.player,
              alpha: 0.3,
              duration: 100,
              yoyo: true,
              repeat: 3,
            });

            this.cameras.main.shake(200, 0.008);
            this.showFeedback("Ouch! Sea creature hit! -1 life", 0xff6b6b);

            // Particles
            this.add
              .particles(enemy.x, enemy.y, "particle", {
                speed: { min: 30, max: 100 },
                lifespan: 500,
                scale: { start: 0.6, end: 0 },
                tint: 0xff6b6b,
                quantity: 8,
                emitting: false,
              })
              .explode(8);

            // Remove this enemy
            enemy.destroy();

            this.updateHUD();

            if (this.lives <= 0) {
              this.time.delayedCall(800, () => this.endGame());
            }
          }

          hitCollectible(col) {
            sfxBubble();
            const type = col.getData("type");
            if (type === "bonus") {
              this.score += 50;
              this.showFeedback("+50 bonus!", 0xffd166);
            }
            this.add
              .particles(col.x, col.y, "star", {
                speed: { min: 30, max: 100 },
                lifespan: 500,
                scale: { start: 0.8, end: 0 },
                tint: 0xffd166,
                quantity: 6,
                emitting: false,
              })
              .explode(6);
            col.destroy();
            this.updateHUD();
          }

          showFeedback(text, color) {
            const hex = "#" + color.toString(16).padStart(6, "0");
            this.feedbackText
              .setText(text)
              .setColor(hex)
              .setAlpha(1)
              .setScale(0.5);
            this.tweens.add({
              targets: this.feedbackText,
              scale: 1,
              duration: 200,
              ease: "Back.easeOut",
            });
            this.tweens.add({
              targets: this.feedbackText,
              alpha: 0,
              y: this.feedbackText.y - 30,
              duration: 800,
              delay: 1000,
              onComplete: () => {
                this.feedbackText.y = H / 2;
              },
            });
          }

          updateHUD() {
            this.scoreText.setText("Score: " + this.score);
            this.comboText.setText(
              "Combo: " + this.combo + (this.combo >= 3 ? " 🔥" : ""),
            );
            this.levelText.setText("Level: " + this.level);

            // Hearts
            this.heartsGroup.forEach((h, i) => {
              h.setAlpha(i < this.lives ? 1 : 0.2);
              h.setTint(i < this.lives ? 0xffffff : 0x333333);
            });
          }

          spawnAmbientFish() {
            const y = rand(60, H - 120);
            const dir = Math.random() > 0.5 ? 1 : -1;
            const fish = this.add.ellipse(
              dir > 0 ? -30 : W + 30,
              y,
              30 + rand(0, 20),
              12 + rand(0, 8),
              pick([0x61dafb, 0xffd166, 0x34d399, 0xc084fc]),
              0.4,
            );
            this.tweens.add({
              targets: fish,
              x: dir > 0 ? W + 30 : -30,
              duration: 6000 + rand(0, 4000),
              onComplete: () => fish.destroy(),
            });
          }

          endGame() {
            this.physics.pause();
            this.scene.start("Results", {
              score: this.score,
              correct: this.questionsCorrect,
              total: this.questionsAnswered,
              level: this.level,
              bestCombo: this.bestCombo,
              depth: Math.floor(this.depth),
            });
          }

          update(time, delta) {
            if (this.lives <= 0) return;

            // Player movement
            const speed = 320;
            let vx = 0,
              vy = 0;

            if (this.cursors.left.isDown || this.wasd.left.isDown) vx = -speed;
            if (this.cursors.right.isDown || this.wasd.right.isDown) vx = speed;
            if (this.cursors.up.isDown || this.wasd.up.isDown) vy = -speed;
            if (this.cursors.down.isDown || this.wasd.down.isDown) vy = speed;

            // Touch
            if (this.touchTarget) {
              const dx = this.touchTarget.x - this.player.x;
              const dy = this.touchTarget.y - this.player.y;
              const dist = Math.hypot(dx, dy);
              if (dist > 15) {
                vx = (dx / dist) * speed;
                vy = (dy / dist) * speed;
              }
            }

            this.player.body.velocity.x = Phaser.Math.Linear(
              this.player.body.velocity.x,
              vx,
              0.15,
            );
            this.player.body.velocity.y = Phaser.Math.Linear(
              this.player.body.velocity.y,
              vy,
              0.15,
            );

            // Flip diver based on direction
            if (vx < -20) this.player.setFlipX(true);
            else if (vx > 20) this.player.setFlipX(false);

            // Player glow follows
            this.playerGlow.setPosition(this.player.x, this.player.y);

            // Animate enemies
            this.enemies.getChildren().forEach((e) => {
              const sp = e.getData("speed") || 50;
              const d = e.getData("dir") || 1;
              const vd = e.getData("vertDir") || 0;
              e.x += (d * sp * delta) / 1000;
              e.y += ((vd * (sp * 0.5) * delta) / 1000) * Math.sin(time / 500);

              // Bounce at edges
              if (e.x < 100 || e.x > W - 20) e.setData("dir", -d);
              if (e.y < 40 || e.y > H - 100) e.setData("vertDir", -(vd || 1));

              // Face direction
              e.setFlipX(d < 0);
            });

            // Subtle ray animation
            if (this.rays) {
              this.rays.setAlpha(0.06 + Math.sin(time / 2000) * 0.02);
            }
          }
        }

        // ==================== RESULTS SCENE ====================
        class ResultsScene extends Phaser.Scene {
          constructor() {
            super("Results");
          }

          init(data) {
            this.data = data;
          }

          create() {
            const d = this.data;

            // Background
            const bg = this.add.graphics();
            bg.fillGradientStyle(0x031321, 0x031321, 0x072a44, 0x072a44, 1);
            bg.fillRect(0, 0, W, H);

            // Bubbles
            for (let i = 0; i < 20; i++) {
              const b = this.add
                .image(rand(20, W - 20), rand(20, H - 20), "bubble")
                .setAlpha(0.15)
                .setScale(0.8 + Math.random());
              this.tweens.add({
                targets: b,
                y: b.y - 150,
                alpha: 0,
                duration: 4000 + Math.random() * 3000,
                repeat: -1,
                delay: Math.random() * 3000,
              });
            }

            // Title
            const won = d.correct >= 10;
            this.add
              .text(W / 2, 60, won ? "DEEP SEA CHAMPION!" : "DIVE COMPLETE", {
                fontSize: "38px",
                fontStyle: "bold",
                color: won ? "#ffd166" : "#61dafb",
                align: "center",
                stroke: "#000",
                strokeThickness: 3,
              })
              .setOrigin(0.5);

            this.add
              .text(W / 2, 100, "6.NS.A.1 — Fraction Division", {
                fontSize: "14px",
                color: "#7ec8e3",
              })
              .setOrigin(0.5);

            // Stats grid
            const stats = [
              { label: "Score", value: d.score, color: "#61dafb" },
              {
                label: "Correct",
                value: d.correct + "/" + d.total,
                color: "#34d399",
              },
              {
                label: "Accuracy",
                value:
                  (d.total ? Math.round((d.correct / d.total) * 100) : 0) + "%",
                color: "#ffd166",
              },
              { label: "Level", value: d.level, color: "#c084fc" },
              { label: "Best Combo", value: d.bestCombo, color: "#fb923c" },
              { label: "Depth", value: d.depth + "m", color: "#38bdf8" },
            ];

            stats.forEach((s, i) => {
              const col = i % 3;
              const row = Math.floor(i / 3);
              const x = W / 2 - 200 + col * 200;
              const y = 170 + row * 100;

              this.add
                .rectangle(x, y, 170, 75, 0x0a1e3a, 0.8)
                .setStrokeStyle(1, parseInt(s.color.slice(1), 16), 0.4);
              this.add
                .text(x, y - 15, s.label, {
                  fontSize: "12px",
                  color: "#7ec8e3",
                  align: "center",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 12, String(s.value), {
                  fontSize: "26px",
                  fontStyle: "bold",
                  color: s.color,
                  align: "center",
                })
                .setOrigin(0.5);
            });

            // Badges
            const acc = d.total ? (d.correct / d.total) * 100 : 0;
            const badges = [];
            if (acc >= 90) badges.push("Fraction Master");
            if (acc >= 75) badges.push("Strong Diver");
            if (d.bestCombo >= 5) badges.push("Combo King");
            if (d.depth >= 200) badges.push("Deep Explorer");
            if (d.level >= 4) badges.push("Advanced");
            if (badges.length === 0) badges.push("Keep Practicing!");

            this.add
              .text(W / 2, 390, "Achievements", {
                fontSize: "14px",
                color: "#7ec8e3",
              })
              .setOrigin(0.5);
            badges.forEach((b, i) => {
              const bx = W / 2 + (i - (badges.length - 1) / 2) * 140;
              this.add
                .rectangle(bx, 425, 120, 30, 0x1a0d3e, 0.8)
                .setStrokeStyle(1, 0xc084fc, 0.5);
              this.add
                .text(bx, 425, b, {
                  fontSize: "11px",
                  fontStyle: "bold",
                  color: "#c084fc",
                })
                .setOrigin(0.5);
            });

            // Tip
            this.add
              .text(
                W / 2,
                480,
                "Remember: Keep the first fraction, flip the second,\nmultiply across, then simplify!",
                {
                  fontSize: "14px",
                  color: "#a8d7e5",
                  align: "center",
                  lineSpacing: 4,
                },
              )
              .setOrigin(0.5);

            // Buttons
            const playBtn = this.add
              .rectangle(W / 2 - 80, 560, 160, 48, 0x18d2ba)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2 - 80, 560, "DIVE AGAIN", {
                fontSize: "18px",
                fontStyle: "bold",
                color: "#000",
              })
              .setOrigin(0.5);
            playBtn.on("pointerover", () => playBtn.setFillStyle(0x34d399));
            playBtn.on("pointerout", () => playBtn.setFillStyle(0x18d2ba));
            playBtn.on("pointerdown", () => {
              sfxDive();
              this.scene.start("Game");
            });

            const menuBtn = this.add
              .rectangle(W / 2 + 100, 560, 120, 48, 0x0a1e3a)
              .setStrokeStyle(1, 0x61dafb, 0.5)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2 + 100, 560, "MENU", {
                fontSize: "16px",
                fontStyle: "bold",
                color: "#61dafb",
              })
              .setOrigin(0.5);
            menuBtn.on("pointerdown", () => this.scene.start("Title"));

            // Keyboard
            this.input.keyboard.on("keydown-SPACE", () => {
              sfxDive();
              this.scene.start("Game");
            });

            this.cameras.main.fadeIn(400);

            // Confetti if good score
            if (acc >= 70) {
              for (let i = 0; i < 30; i++) {
                const star = this.add
                  .image(rand(50, W - 50), -20, "star")
                  .setScale(1 + Math.random())
                  .setTint(
                    pick([0xffd166, 0x34d399, 0x61dafb, 0xc084fc, 0xff6b8a]),
                  );
                this.tweens.add({
                  targets: star,
                  y: H + 20,
                  x: star.x + rand(-100, 100),
                  angle: 360,
                  duration: 2000 + rand(0, 2000),
                  delay: rand(0, 1000),
                  alpha: 0,
                });
              }
            }
          }
        }

        // --- Register scenes and start ---
        config.scene = [BootScene, TitleScene, GameScene, ResultsScene];
        const game = new Phaser.Game(config);
      })();
    </script>
      <script src="/assets/nt-page-enhance.js" defer></script>
