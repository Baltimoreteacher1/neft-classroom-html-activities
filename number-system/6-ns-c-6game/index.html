<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coordinate Treasure Hunt — 6.NS.C.6</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>
  // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror
  // (document.write blocks parsing so the mirror is ready before the game script runs).
  if (typeof Phaser === "undefined") {
    document.write('<script src="https://unpkg.com/phaser@3.80.1/dist/phaser.min.js"><\/script>');
  }
  // If both CDNs are unreachable, show a clear message instead of a blank page.
  window.addEventListener("load", function () {
    if (typeof Phaser === "undefined") {
      document.body.innerHTML =
        '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">\u26a0\ufe0f This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
    }
  });
</script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #051225;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script>
      // ============================================================
      //  COORDINATE TREASURE HUNT — 6.NS.C.6
      //  Number line and coordinate plane navigation
      // ============================================================

      const W = 800,
        H = 600;
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      function synth(f, d, t = "square", v = 0.1) {
        try {
          const o = audioCtx.createOscillator(),
            g = audioCtx.createGain();
          o.connect(g);
          g.connect(audioCtx.destination);
          o.frequency.value = f;
          o.type = t;
          g.gain.setValueAtTime(v, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
          o.start();
          o.stop(audioCtx.currentTime + d);
        } catch (e) {}
      }
      function sndMove() {
        synth(220, 0.04);
      }
      function sndTreasure() {
        [523, 659, 784, 1047].forEach((f, i) =>
          setTimeout(() => synth(f, 0.12), i * 80),
        );
      }
      function sndCorrect() {
        synth(523, 0.1);
        setTimeout(() => synth(784, 0.15), 100);
      }
      function sndWrong() {
        synth(150, 0.3, "sawtooth", 0.12);
      }
      function sndWave() {
        synth(180, 0.15, "sine", 0.06);
        setTimeout(() => synth(220, 0.15, "sine", 0.06), 100);
      }
      function sndLevelUp() {
        [440, 554, 659, 880].forEach((f, i) =>
          setTimeout(() => synth(f, 0.1), i * 90),
        );
      }

      function shuffle(a) {
        const b = [...a];
        for (let i = b.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [b[i], b[j]] = [b[j], b[i]];
        }
        return b;
      }

      // ============================================================
      // BOOT
      // ============================================================
      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          const g = this.make.graphics({ add: false });

          // Ship (top-down)
          g.fillStyle(0x8b5cf6);
          g.fillTriangle(10, 0, 0, 20, 20, 20);
          g.fillStyle(0xc084fc);
          g.fillTriangle(10, 2, 3, 18, 17, 18);
          g.generateTexture("ship", 20, 20);
          g.clear();

          // Treasure chest
          g.fillStyle(0xfbbf24);
          g.fillRoundedRect(0, 2, 16, 10, 2);
          g.fillStyle(0xf59e0b);
          g.fillRoundedRect(0, 0, 16, 6, 2);
          g.fillStyle(0xffffff);
          g.fillRect(6, 4, 4, 4);
          g.generateTexture("treasure", 16, 14);
          g.clear();

          // Rock (obstacle)
          g.fillStyle(0x6b7280);
          g.fillCircle(8, 8, 8);
          g.fillStyle(0x4b5563);
          g.fillCircle(6, 6, 3);
          g.generateTexture("rock", 16, 16);
          g.clear();

          // Whirlpool
          g.fillStyle(0x38bdf8, 0.4);
          g.fillCircle(12, 12, 12);
          g.fillStyle(0x0ea5e9, 0.3);
          g.fillCircle(12, 12, 8);
          g.fillStyle(0x0284c7, 0.2);
          g.fillCircle(12, 12, 4);
          g.generateTexture("whirlpool", 24, 24);
          g.clear();

          // Map marker
          g.fillStyle(0xef4444);
          g.fillCircle(6, 6, 6);
          g.fillStyle(0xffffff);
          g.fillCircle(6, 6, 2);
          g.generateTexture("map_pin", 12, 12);
          g.clear();

          // Compass rose
          g.fillStyle(0xfbbf24, 0.8);
          g.fillTriangle(8, 0, 4, 8, 12, 8);
          g.fillStyle(0xef4444, 0.8);
          g.fillTriangle(8, 16, 4, 8, 12, 8);
          g.generateTexture("compass", 16, 16);
          g.clear();

          // Coin
          g.fillStyle(0xfbbf24);
          g.fillCircle(6, 6, 6);
          g.fillStyle(0xf59e0b);
          g.fillCircle(6, 6, 4);
          g.generateTexture("coin", 12, 12);
          g.clear();

          // Heart
          g.fillStyle(0xef4444);
          g.fillRect(2, 1, 3, 3);
          g.fillRect(7, 1, 3, 3);
          g.fillRect(0, 3, 12, 3);
          g.fillRect(2, 6, 8, 3);
          g.fillRect(4, 9, 4, 2);
          g.generateTexture("heart", 12, 11);
          g.clear();

          // Button
          g.fillStyle(0x1e293b);
          g.fillRoundedRect(0, 0, 220, 52, 14);
          g.lineStyle(2, 0x8b5cf6);
          g.strokeRoundedRect(0, 0, 220, 52, 14);
          g.generateTexture("btn", 220, 52);
          g.clear();

          // Answer btn
          g.fillStyle(0x0f172a);
          g.fillRoundedRect(0, 0, 160, 44, 10);
          g.lineStyle(2, 0x8b5cf6);
          g.strokeRoundedRect(0, 0, 160, 44, 10);
          g.generateTexture("ans_btn", 160, 44);
          g.clear();

          g.fillStyle(0x064e3b);
          g.fillRoundedRect(0, 0, 160, 44, 10);
          g.lineStyle(2, 0x4ade80);
          g.strokeRoundedRect(0, 0, 160, 44, 10);
          g.generateTexture("ans_ok", 160, 44);
          g.clear();

          g.fillStyle(0x450a0a);
          g.fillRoundedRect(0, 0, 160, 44, 10);
          g.lineStyle(2, 0xf87171);
          g.strokeRoundedRect(0, 0, 160, 44, 10);
          g.generateTexture("ans_bad", 160, 44);
          g.clear();

          // Water tile
          g.fillStyle(0x0c4a6e);
          g.fillRect(0, 0, 40, 40);
          g.fillStyle(0x0e7490, 0.3);
          g.fillRect(0, 10, 40, 2);
          g.fillRect(5, 25, 30, 1);
          g.generateTexture("water", 40, 40);
          g.clear();

          // Particle
          g.fillStyle(0xffffff, 0.5);
          g.fillCircle(2, 2, 2);
          g.generateTexture("particle", 4, 4);
          g.clear();

          // Island tile
          g.fillStyle(0x4ade80, 0.4);
          g.fillCircle(10, 10, 10);
          g.generateTexture("island", 20, 20);
          g.clear();

          g.destroy();
          this.scene.start("Title");
        }
      }

      // ============================================================
      // TITLE
      // ============================================================
      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          this.cameras.main.setBackgroundColor("#051225");

          // Water shimmer bg
          for (let i = 0; i < 100; i++) {
            const c = this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.Between(1, 2),
              Phaser.Math.RND.pick([0x0ea5e9, 0x38bdf8, 0x7dd3fc]),
              Phaser.Math.FloatBetween(0.03, 0.15),
            );
            this.tweens.add({
              targets: c,
              alpha: { from: c.alpha, to: 0.02 },
              duration: Phaser.Math.Between(1000, 3000),
              yoyo: true,
              repeat: -1,
            });
          }

          this.add
            .text(W / 2, 80, "COORDINATE", {
              fontSize: "44px",
              fontStyle: "bold",
              color: "#38bdf8",
              stroke: "#051225",
              strokeThickness: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 135, "TREASURE HUNT", {
              fontSize: "50px",
              fontStyle: "bold",
              color: "#fbbf24",
              stroke: "#051225",
              strokeThickness: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 180, "6.NS.C.6 — Number Line & Coordinate Plane", {
              fontSize: "15px",
              color: "#94a3b8",
            })
            .setOrigin(0.5);

          // Animated ship
          const ship = this.add.image(W / 2, 280, "ship").setScale(4);
          this.tweens.add({
            targets: ship,
            y: 265,
            angle: 5,
            duration: 1500,
            yoyo: true,
            repeat: -1,
            ease: "Sine.InOut",
          });

          // Floating treasures
          for (let i = 0; i < 4; i++) {
            const t = this.add
              .image(180 + i * 160, 340, "treasure")
              .setScale(2.5);
            this.tweens.add({
              targets: t,
              y: 330,
              duration: 800 + i * 150,
              yoyo: true,
              repeat: -1,
              ease: "Sine.InOut",
            });
          }

          // Ship select
          this.add
            .text(W / 2, 400, "Choose your ship:", {
              fontSize: "17px",
              color: "#e2e8f0",
            })
            .setOrigin(0.5);
          const ships = [
            { name: "Purple Voyager", tint: 0x8b5cf6 },
            { name: "Ocean Runner", tint: 0x0ea5e9 },
            { name: "Gold Seeker", tint: 0xfbbf24 },
          ];
          this.selectedShip = 0;
          this.shipBtns = [];
          ships.forEach((s, i) => {
            const x = W / 2 - 180 + i * 180;
            const bg = this.add
              .image(x, 455, "btn")
              .setScale(0.75)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(x, 455, s.name, {
                fontSize: "13px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(0.5);
            bg.on("pointerdown", () => {
              this.selectedShip = i;
              this.shipBtns.forEach((b, j) =>
                b.setTint(j === i ? 0x4ade80 : 0xffffff),
              );
              synth(400 + i * 120, 0.08);
            });
            bg.on("pointerover", () => bg.setScale(0.8));
            bg.on("pointerout", () => bg.setScale(0.75));
            this.shipBtns.push(bg);
          });
          this.shipBtns[0].setTint(0x4ade80);

          // Start
          const startBtn = this.add
            .image(W / 2, 535, "btn")
            .setScale(1.2)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2, 535, "SET SAIL!", {
              fontSize: "22px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          this.tweens.add({
            targets: startBtn,
            scaleX: 1.25,
            scaleY: 1.25,
            duration: 800,
            yoyo: true,
            repeat: -1,
            ease: "Sine.InOut",
          });
          startBtn.on("pointerdown", () => {
            synth(600, 0.1);
            setTimeout(() => synth(800, 0.15), 80);
            this.cameras.main.fadeOut(400);
            this.time.delayedCall(400, () => {
              const tints = [0x8b5cf6, 0x0ea5e9, 0xfbbf24];
              this.scene.start("Game", { shipTint: tints[this.selectedShip] });
            });
          });

          this.add
            .text(
              W / 2,
              585,
              "Arrow keys / WASD / Touch to navigate the coordinate grid",
              {
                fontSize: "12px",
                color: "#64748b",
              },
            )
            .setOrigin(0.5);

          this.cameras.main.fadeIn(500);
        }
      }

      // ============================================================
      // GAME
      // ============================================================
      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }

        init(data) {
          this.shipTint = data.shipTint || 0x8b5cf6;
          this.level = data.level || 1;
          this.score = 0;
          this.lives = 3;
          this.combo = 0;
          this.maxCombo = 0;
          this.treasuresFound = 0;
          this.totalTreasures = 3 + Math.min(this.level, 4);
          this.qCorrect = 0;
          this.qTotal = 0;
          this.canMove = true;
          this.questionActive = false;
          this.gridRange = 6; // -6 to 6
          this.cellSize = 40;
          this.shipGridX = 0;
          this.shipGridY = 0;
          this.moveDelay = 0;
        }

        create() {
          if (audioCtx.state === "suspended") audioCtx.resume();
          this.cameras.main.setBackgroundColor("#051225");

          // Grid dimensions
          const range = this.gridRange;
          const cs = this.cellSize;
          const gridW = (range * 2 + 1) * cs;
          const gridH = (range * 2 + 1) * cs;
          const ox = W / 2; // origin screen x
          const oy = H / 2 - 20; // origin screen y

          this.ox = ox;
          this.oy = oy;
          this.cs = cs;
          this.range = range;

          // Draw ocean background
          for (let gx = -range; gx <= range; gx++) {
            for (let gy = -range; gy <= range; gy++) {
              const sx = ox + gx * cs;
              const sy = oy - gy * cs;
              const tile = this.add.image(sx, sy, "water").setAlpha(0.3);
            }
          }

          // Draw grid lines
          this.drawGrid();

          // Quadrant labels
          const qlSize = "14px";
          const qlAlpha = 0.2;
          this.add
            .text(ox + (range * cs) / 2, oy - (range * cs) / 2, "I", {
              fontSize: qlSize,
              color: "#4ade80",
            })
            .setOrigin(0.5)
            .setAlpha(qlAlpha);
          this.add
            .text(ox - (range * cs) / 2, oy - (range * cs) / 2, "II", {
              fontSize: qlSize,
              color: "#38bdf8",
            })
            .setOrigin(0.5)
            .setAlpha(qlAlpha);
          this.add
            .text(ox - (range * cs) / 2, oy + (range * cs) / 2, "III", {
              fontSize: qlSize,
              color: "#fbbf24",
            })
            .setOrigin(0.5)
            .setAlpha(qlAlpha);
          this.add
            .text(ox + (range * cs) / 2, oy + (range * cs) / 2, "IV", {
              fontSize: qlSize,
              color: "#c084fc",
            })
            .setOrigin(0.5)
            .setAlpha(qlAlpha);

          // Place treasures
          this.treasures = [];
          this.placeTreasures();

          // Place rocks/obstacles
          this.rocks = [];
          this.placeRocks();

          // Place coins (bonus)
          this.coins = [];
          this.placeCoins();

          // Ship
          this.ship = this.add
            .image(ox, oy, "ship")
            .setScale(2.2)
            .setTint(this.shipTint)
            .setDepth(10);

          // Coordinate label following ship
          this.coordLabel = this.add
            .text(ox, oy + 22, "(0, 0)", {
              fontSize: "12px",
              color: "#fbbf24",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 3,
            })
            .setOrigin(0.5)
            .setDepth(11);

          // HUD
          this.createHUD();

          // Controls
          this.cursors = this.input.keyboard.createCursorKeys();
          this.wasd = this.input.keyboard.addKeys("W,A,S,D");

          // Touch controls
          this.createTouchControls();

          // Level intro
          this.showLevelIntro();

          this.cameras.main.fadeIn(500);

          // Target arrow (points to nearest treasure)
          this.targetArrow = this.add
            .image(ox, oy - 30, "compass")
            .setScale(1.5)
            .setDepth(12)
            .setAlpha(0.7);
        }

        drawGrid() {
          const g = this.add.graphics();
          const { ox, oy, cs, range } = this;

          // Grid lines
          g.lineStyle(1, 0x38bdf8, 0.08);
          for (let i = -range; i <= range; i++) {
            g.moveTo(ox + i * cs, oy - range * cs);
            g.lineTo(ox + i * cs, oy + range * cs);
            g.moveTo(ox - range * cs, oy + i * cs);
            g.lineTo(ox + range * cs, oy + i * cs);
          }
          g.strokePath();

          // Axes (thicker)
          g.lineStyle(2, 0x38bdf8, 0.4);
          g.moveTo(ox - range * cs, oy);
          g.lineTo(ox + range * cs, oy);
          g.moveTo(ox, oy - range * cs);
          g.lineTo(ox, oy + range * cs);
          g.strokePath();

          // Axis labels
          for (let i = -range; i <= range; i++) {
            if (i === 0) continue;
            // x-axis
            this.add
              .text(ox + i * cs, oy + 10, `${i}`, {
                fontSize: "9px",
                color: "#64748b",
              })
              .setOrigin(0.5, 0);
            // y-axis
            this.add
              .text(ox - 14, oy - i * cs, `${i}`, {
                fontSize: "9px",
                color: "#64748b",
              })
              .setOrigin(0.5);
          }
          // Origin
          this.add.text(ox - 10, oy + 10, "0", {
            fontSize: "10px",
            color: "#fbbf24",
          });

          // Axis names
          this.add
            .text(ox + range * cs + 5, oy, "x", {
              fontSize: "12px",
              color: "#38bdf8",
              fontStyle: "bold",
            })
            .setOrigin(0, 0.5);
          this.add
            .text(ox, oy - range * cs - 12, "y", {
              fontSize: "12px",
              color: "#38bdf8",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
        }

        placeTreasures() {
          const used = new Set();
          used.add("0,0");
          for (let i = 0; i < this.totalTreasures; i++) {
            let gx, gy;
            do {
              gx = Phaser.Math.Between(-this.range + 1, this.range - 1);
              gy = Phaser.Math.Between(-this.range + 1, this.range - 1);
            } while (used.has(`${gx},${gy}`));
            used.add(`${gx},${gy}`);

            const sx = this.ox + gx * this.cs;
            const sy = this.oy - gy * this.cs;
            const t = this.add
              .image(sx, sy, "treasure")
              .setScale(2)
              .setDepth(5);
            this.tweens.add({
              targets: t,
              y: sy - 5,
              duration: 800 + i * 100,
              yoyo: true,
              repeat: -1,
              ease: "Sine.InOut",
            });

            // Glow
            const gl = this.add.circle(sx, sy, 12, 0xfbbf24, 0.15).setDepth(4);
            this.tweens.add({
              targets: gl,
              scale: 2,
              alpha: 0,
              duration: 1200,
              repeat: -1,
            });

            this.treasures.push({ gx, gy, sprite: t, glow: gl, found: false });
          }
          this.usedCells = used;
        }

        placeRocks() {
          const count = 3 + this.level * 2;
          for (let i = 0; i < count; i++) {
            let gx, gy;
            do {
              gx = Phaser.Math.Between(-this.range + 1, this.range - 1);
              gy = Phaser.Math.Between(-this.range + 1, this.range - 1);
            } while (this.usedCells.has(`${gx},${gy}`));
            this.usedCells.add(`${gx},${gy}`);

            const sx = this.ox + gx * this.cs;
            const sy = this.oy - gy * this.cs;
            this.add
              .image(sx, sy, "rock")
              .setScale(2)
              .setDepth(3)
              .setAlpha(0.7);
            this.rocks.push({ gx, gy });
          }
        }

        placeCoins() {
          const count = 5 + this.level * 2;
          for (let i = 0; i < count; i++) {
            let gx, gy;
            do {
              gx = Phaser.Math.Between(-this.range + 1, this.range - 1);
              gy = Phaser.Math.Between(-this.range + 1, this.range - 1);
            } while (this.usedCells.has(`${gx},${gy}`));
            this.usedCells.add(`${gx},${gy}`);

            const sx = this.ox + gx * this.cs;
            const sy = this.oy - gy * this.cs;
            const c = this.add.image(sx, sy, "coin").setScale(1.5).setDepth(4);
            this.tweens.add({
              targets: c,
              y: sy - 4,
              duration: 500 + i * 80,
              yoyo: true,
              repeat: -1,
              ease: "Sine.InOut",
            });
            this.coins.push({ gx, gy, sprite: c, collected: false });
          }
        }

        createHUD() {
          this.add.rectangle(W / 2, 18, W, 36, 0x0f172a, 0.9).setDepth(100);

          this.scoreText = this.add
            .text(12, 8, "Score: 0", {
              fontSize: "14px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setDepth(101);

          this.treasureText = this.add
            .text(12, 24, `Treasures: 0/${this.totalTreasures}`, {
              fontSize: "12px",
              color: "#c084fc",
            })
            .setDepth(101);

          this.levelText = this.add
            .text(W / 2, 8, `Level ${this.level}`, {
              fontSize: "14px",
              color: "#38bdf8",
              fontStyle: "bold",
            })
            .setOrigin(0.5, 0)
            .setDepth(101);

          this.comboText = this.add
            .text(W / 2, 24, "", {
              fontSize: "11px",
              color: "#4ade80",
            })
            .setOrigin(0.5, 0)
            .setDepth(101);

          // Hearts
          this.hearts = [];
          for (let i = 0; i < 3; i++) {
            this.hearts.push(
              this.add
                .image(W - 50 + i * 18, 18, "heart")
                .setScale(1.3)
                .setDepth(101),
            );
          }

          // Target display
          this.targetText = this.add
            .text(W / 2, H - 14, "Navigate to the treasure coordinates!", {
              fontSize: "13px",
              color: "#94a3b8",
              stroke: "#000",
              strokeThickness: 3,
            })
            .setOrigin(0.5)
            .setDepth(101);
        }

        createTouchControls() {
          const a = 0.25,
            s = 36;

          // D-pad style
          const bx = 70,
            by = H - 65;
          this.tUp = this.add
            .circle(bx, by - s, s, 0x38bdf8, a)
            .setDepth(200)
            .setInteractive();
          this.add
            .text(bx, by - s, "^", {
              fontSize: "22px",
              color: "#fff",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(201);
          this.tDown = this.add
            .circle(bx, by + s, s, 0x38bdf8, a)
            .setDepth(200)
            .setInteractive();
          this.add
            .text(bx, by + s, "v", {
              fontSize: "22px",
              color: "#fff",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(201);
          this.tLeft = this.add
            .circle(bx - s, by, s, 0x38bdf8, a)
            .setDepth(200)
            .setInteractive();
          this.add
            .text(bx - s, by, "<", {
              fontSize: "22px",
              color: "#fff",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(201);
          this.tRight = this.add
            .circle(bx + s, by, s, 0x38bdf8, a)
            .setDepth(200)
            .setInteractive();
          this.add
            .text(bx + s, by, ">", {
              fontSize: "22px",
              color: "#fff",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(201);

          this.touchDir = null;
          const setDir = (d) => () => {
            this.touchDir = d;
          };
          const clearDir = () => {
            this.touchDir = null;
          };
          this.tUp.on("pointerdown", setDir("up"));
          this.tUp.on("pointerup", clearDir);
          this.tUp.on("pointerout", clearDir);
          this.tDown.on("pointerdown", setDir("down"));
          this.tDown.on("pointerup", clearDir);
          this.tDown.on("pointerout", clearDir);
          this.tLeft.on("pointerdown", setDir("left"));
          this.tLeft.on("pointerup", clearDir);
          this.tLeft.on("pointerout", clearDir);
          this.tRight.on("pointerdown", setDir("right"));
          this.tRight.on("pointerup", clearDir);
          this.tRight.on("pointerout", clearDir);
        }

        showLevelIntro() {
          const ov = this.add
            .rectangle(W / 2, H / 2, W, H, 0x000000, 0.75)
            .setDepth(500);
          const t1 = this.add
            .text(W / 2, H / 2 - 40, `Level ${this.level}`, {
              fontSize: "44px",
              color: "#fbbf24",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 6,
            })
            .setOrigin(0.5)
            .setDepth(501);
          const t2 = this.add
            .text(
              W / 2,
              H / 2 + 10,
              `Find ${this.totalTreasures} treasures on the coordinate plane!`,
              {
                fontSize: "16px",
                color: "#94a3b8",
              },
            )
            .setOrigin(0.5)
            .setDepth(501);
          const t3 = this.add
            .text(
              W / 2,
              H / 2 + 40,
              "Use coordinates (x, y) to navigate. x = left/right, y = up/down",
              {
                fontSize: "13px",
                color: "#64748b",
              },
            )
            .setOrigin(0.5)
            .setDepth(501);

          this.canMove = false;
          this.tweens.add({
            targets: [ov, t1, t2, t3],
            alpha: 0,
            delay: 2000,
            duration: 500,
            onComplete: () => {
              ov.destroy();
              t1.destroy();
              t2.destroy();
              t3.destroy();
              this.canMove = true;
            },
          });
        }

        moveShip(dx, dy) {
          if (!this.canMove || this.questionActive) return;
          if (this.moveDelay > 0) return;

          const nx = this.shipGridX + dx;
          const ny = this.shipGridY + dy;

          // Bounds check
          if (
            nx < -this.range ||
            nx > this.range ||
            ny < -this.range ||
            ny > this.range
          )
            return;

          // Rock check
          if (this.rocks.some((r) => r.gx === nx && r.gy === ny)) {
            sndWrong();
            this.cameras.main.shake(100, 0.005);
            return;
          }

          sndMove();
          this.shipGridX = nx;
          this.shipGridY = ny;
          this.moveDelay = 8;

          const sx = this.ox + nx * this.cs;
          const sy = this.oy - ny * this.cs;

          this.tweens.add({
            targets: this.ship,
            x: sx,
            y: sy,
            duration: 120,
            ease: "Power2",
          });
          this.coordLabel.setText(`(${nx}, ${ny})`);
          this.tweens.add({
            targets: this.coordLabel,
            x: sx,
            y: sy + 22,
            duration: 120,
          });

          // Rotate ship
          if (dx > 0) this.ship.setAngle(-90);
          else if (dx < 0) this.ship.setAngle(90);
          else if (dy > 0) this.ship.setAngle(0);
          else if (dy < 0) this.ship.setAngle(180);

          // Check coin
          const coin = this.coins.find(
            (c) => !c.collected && c.gx === nx && c.gy === ny,
          );
          if (coin) {
            coin.collected = true;
            sndTreasure();
            this.score += 50;
            const ft = this.add
              .text(coin.sprite.x, coin.sprite.y - 15, "+50", {
                fontSize: "14px",
                color: "#fbbf24",
                fontStyle: "bold",
                stroke: "#000",
                strokeThickness: 3,
              })
              .setOrigin(0.5)
              .setDepth(50);
            this.tweens.add({
              targets: ft,
              y: ft.y - 25,
              alpha: 0,
              duration: 600,
              onComplete: () => ft.destroy(),
            });
            coin.sprite.destroy();
            this.updateHUD();
          }

          // Check treasure
          const tr = this.treasures.find(
            (t) => !t.found && t.gx === nx && t.gy === ny,
          );
          if (tr) {
            tr.found = true;
            this.treasuresFound++;
            tr.sprite.destroy();
            tr.glow.destroy();

            // Treasure found! Ask question
            this.showTreasureQuestion(tr);
          }

          // Update target arrow
          this.updateTargetArrow();
        }

        updateTargetArrow() {
          const nearest = this.treasures
            .filter((t) => !t.found)
            .sort((a, b) => {
              const da =
                Math.abs(a.gx - this.shipGridX) +
                Math.abs(a.gy - this.shipGridY);
              const db =
                Math.abs(b.gx - this.shipGridX) +
                Math.abs(b.gy - this.shipGridY);
              return da - db;
            })[0];

          if (nearest) {
            const angle = Phaser.Math.Angle.Between(
              this.shipGridX,
              this.shipGridY,
              nearest.gx,
              nearest.gy,
            );
            this.targetArrow.setAngle(Phaser.Math.RadToDeg(angle) + 90);
            this.targetArrow.setPosition(this.ship.x, this.ship.y - 28);
            this.targetText.setText(
              `Nearest treasure: look for (${nearest.gx}, ${nearest.gy})`,
            );
          } else {
            this.targetArrow.setVisible(false);
          }
        }

        showTreasureQuestion(treasure) {
          sndTreasure();
          this.questionActive = true;
          this.canMove = false;

          // Particle burst
          const sx = this.ox + treasure.gx * this.cs;
          const sy = this.oy - treasure.gy * this.cs;
          this.add
            .particles(sx, sy, "particle", {
              speed: { min: 60, max: 180 },
              scale: { start: 1.5, end: 0 },
              lifespan: 600,
              quantity: 15,
              tint: 0xfbbf24,
              emitting: false,
            })
            .explode(15);

          // Generate question about coordinates
          const q = this.genCoordQuestion(treasure);
          this.showQuestionOverlay(q);
        }

        genCoordQuestion(treasure) {
          const type = Phaser.Math.Between(0, 5);
          const tx = treasure.gx,
            ty = treasure.gy;

          if (type === 0) {
            return {
              q: `You found treasure at (${tx}, ${ty}). Which quadrant is this?`,
              ans:
                tx > 0 && ty > 0
                  ? "I"
                  : tx < 0 && ty > 0
                    ? "II"
                    : tx < 0 && ty < 0
                      ? "III"
                      : tx > 0 && ty < 0
                        ? "IV"
                        : tx === 0 || ty === 0
                          ? "Axis"
                          : "I",
              opts: shuffle(["I", "II", "III", "IV"]).slice(0, 3),
            };
          } else if (type === 1) {
            return {
              q: `The treasure is at (${tx}, ${ty}). What is the opposite of the x-coordinate?`,
              ans: `${-tx}`,
              opts: shuffle([`${-tx}`, `${tx}`, `${-ty}`]),
            };
          } else if (type === 2) {
            return {
              q: `Treasure at (${tx}, ${ty}). If you reflect across the y-axis, what is the new x?`,
              ans: `${-tx}`,
              opts: shuffle([`${-tx}`, `${tx}`, `${ty}`]),
            };
          } else if (type === 3) {
            return {
              q: `(${tx}, ${ty}) — Is the y-coordinate positive, negative, or zero?`,
              ans: ty > 0 ? "Positive" : ty < 0 ? "Negative" : "Zero",
              opts: shuffle(["Positive", "Negative", "Zero"]),
            };
          } else if (type === 4) {
            const dist = Math.abs(tx) + Math.abs(ty);
            return {
              q: `How many steps from the origin (0,0) to (${tx}, ${ty})? (|x|+|y|)`,
              ans: `${dist}`,
              opts: shuffle([
                `${dist}`,
                `${dist + 2}`,
                `${Math.abs(dist - 3)}`,
              ]),
            };
          } else {
            return {
              q: `At (${tx}, ${ty}), which direction is x from the origin?`,
              ans: tx > 0 ? "Right" : tx < 0 ? "Left" : "On y-axis",
              opts: shuffle(["Right", "Left", "On y-axis"]),
            };
          }
        }

        showQuestionOverlay(q) {
          this.qOverlay = this.add
            .rectangle(W / 2, H / 2, W, H, 0x000000, 0.85)
            .setDepth(600);
          this.qElements = [];

          const title = this.add
            .text(W / 2, 110, "TREASURE FOUND!", {
              fontSize: "24px",
              color: "#fbbf24",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 4,
            })
            .setOrigin(0.5)
            .setDepth(601);
          this.qElements.push(title);

          const qText = this.add
            .text(W / 2, 200, q.q, {
              fontSize: "20px",
              color: "#e2e8f0",
              fontStyle: "bold",
              wordWrap: { width: 600 },
              align: "center",
              stroke: "#000",
              strokeThickness: 4,
            })
            .setOrigin(0.5)
            .setDepth(601);
          this.qElements.push(qText);

          // Quadrant reference
          const ref = this.add
            .text(W / 2, 150, "I(+,+)  II(-,+)  III(-,-)  IV(+,-)", {
              fontSize: "12px",
              color: "#64748b",
            })
            .setOrigin(0.5)
            .setDepth(601);
          this.qElements.push(ref);

          const opts = q.opts.includes(q.ans)
            ? q.opts
            : shuffle([q.ans, ...q.opts.slice(0, 2)]);
          const uniqueOpts = [...new Set(opts)].slice(0, 3);
          while (uniqueOpts.length < 3) uniqueOpts.push("N/A");
          if (!uniqueOpts.includes(q.ans)) {
            uniqueOpts[0] = q.ans;
          }

          shuffle(uniqueOpts).forEach((opt, i) => {
            const bx = W / 2 - 180 + i * 180;
            const by = 310;
            const btn = this.add
              .image(bx, by, "ans_btn")
              .setScale(1.1)
              .setDepth(601)
              .setInteractive({ useHandCursor: true });
            const txt = this.add
              .text(bx, by, opt, {
                fontSize: "18px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(0.5)
              .setDepth(602);
            this.qElements.push(btn, txt);

            btn.on("pointerdown", () => {
              this.qElements.forEach((e) => {
                if (e.input) e.disableInteractive();
              });
              this.qTotal++;

              if (opt === q.ans) {
                sndCorrect();
                btn.setTexture("ans_ok");
                txt.setColor("#4ade80");
                this.qCorrect++;
                this.combo++;
                if (this.combo > this.maxCombo) this.maxCombo = this.combo;
                const pts = 300 * this.combo;
                this.score += pts;

                const fb = this.add
                  .text(W / 2, 380, `Correct! +${pts}`, {
                    fontSize: "20px",
                    color: "#4ade80",
                    fontStyle: "bold",
                  })
                  .setOrigin(0.5)
                  .setDepth(601);
                this.qElements.push(fb);
              } else {
                sndWrong();
                btn.setTexture("ans_bad");
                txt.setColor("#f87171");
                this.combo = 0;
                this.lives--;

                const fb = this.add
                  .text(W / 2, 380, `Answer: ${q.ans}`, {
                    fontSize: "20px",
                    color: "#f87171",
                    fontStyle: "bold",
                  })
                  .setOrigin(0.5)
                  .setDepth(601);
                this.qElements.push(fb);
              }

              this.updateHUD();

              this.time.delayedCall(1800, () => {
                this.qElements.forEach((e) => e.destroy());
                this.qOverlay.destroy();
                this.questionActive = false;
                this.canMove = true;

                if (this.lives <= 0) {
                  this.endGame();
                  return;
                }
                if (this.treasuresFound >= this.totalTreasures)
                  this.levelComplete();
              });
            });

            btn.on("pointerover", () => btn.setScale(1.15));
            btn.on("pointerout", () => btn.setScale(1.1));
          });
        }

        levelComplete() {
          sndLevelUp();
          this.canMove = false;

          const ov = this.add
            .rectangle(W / 2, H / 2, W, H, 0x000000, 0.85)
            .setDepth(600);
          this.add
            .text(W / 2, 130, "ALL TREASURES FOUND!", {
              fontSize: "36px",
              color: "#fbbf24",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 6,
            })
            .setOrigin(0.5)
            .setDepth(601);

          const pct = this.qTotal > 0 ? this.qCorrect / this.qTotal : 0;
          const stars = pct >= 0.85 ? 3 : pct >= 0.6 ? 2 : 1;
          this.add
            .text(W / 2, 190, "★".repeat(stars) + "☆".repeat(3 - stars), {
              fontSize: "40px",
              color: "#fbbf24",
            })
            .setOrigin(0.5)
            .setDepth(601);

          this.add
            .text(
              W / 2,
              240,
              `Score: ${this.score}  |  Correct: ${this.qCorrect}/${this.qTotal}  |  Combo: ${this.maxCombo}x`,
              {
                fontSize: "16px",
                color: "#e2e8f0",
              },
            )
            .setOrigin(0.5)
            .setDepth(601);

          // Confetti
          for (let i = 0; i < 30; i++) {
            const c = this.add
              .circle(
                Phaser.Math.Between(50, W - 50),
                -10,
                Phaser.Math.Between(3, 6),
                Phaser.Math.RND.pick([0x38bdf8, 0xfbbf24, 0x4ade80, 0xc084fc]),
              )
              .setDepth(602);
            this.tweens.add({
              targets: c,
              y: H + 20,
              x: c.x + Phaser.Math.Between(-80, 80),
              duration: Phaser.Math.Between(1500, 3000),
            });
          }

          const nextBtn = this.add
            .image(W / 2 - 110, 320, "btn")
            .setDepth(601)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 - 110, 320, "Next Level", {
              fontSize: "16px",
              color: "#4ade80",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(602);
          nextBtn.on("pointerdown", () => {
            this.cameras.main.fadeOut(400);
            this.time.delayedCall(400, () =>
              this.scene.restart({
                shipTint: this.shipTint,
                level: this.level + 1,
              }),
            );
          });

          const resBtn = this.add
            .image(W / 2 + 110, 320, "btn")
            .setDepth(601)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 + 110, 320, "Results", {
              fontSize: "16px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(602);
          resBtn.on("pointerdown", () => {
            this.scene.start("Results", {
              score: this.score,
              level: this.level,
              treasures: this.treasuresFound,
              qCorrect: this.qCorrect,
              qTotal: this.qTotal,
              maxCombo: this.maxCombo,
              shipTint: this.shipTint,
            });
          });
        }

        endGame() {
          this.canMove = false;
          this.cameras.main.shake(400, 0.02);
          this.time.delayedCall(500, () => {
            this.scene.start("Results", {
              score: this.score,
              level: this.level,
              treasures: this.treasuresFound,
              qCorrect: this.qCorrect,
              qTotal: this.qTotal,
              maxCombo: this.maxCombo,
              shipTint: this.shipTint,
              gameOver: true,
            });
          });
        }

        updateHUD() {
          this.scoreText.setText(`Score: ${this.score}`);
          this.treasureText.setText(
            `Treasures: ${this.treasuresFound}/${this.totalTreasures}`,
          );
          if (this.combo > 1) this.comboText.setText(`${this.combo}x Combo!`);
          else this.comboText.setText("");
          for (let i = 0; i < 3; i++)
            this.hearts[i].setAlpha(i < this.lives ? 1 : 0.2);
        }

        update() {
          if (this.moveDelay > 0) this.moveDelay--;

          // Keyboard
          if (
            Phaser.Input.Keyboard.JustDown(this.cursors.left) ||
            Phaser.Input.Keyboard.JustDown(this.wasd.A)
          )
            this.moveShip(-1, 0);
          else if (
            Phaser.Input.Keyboard.JustDown(this.cursors.right) ||
            Phaser.Input.Keyboard.JustDown(this.wasd.D)
          )
            this.moveShip(1, 0);
          else if (
            Phaser.Input.Keyboard.JustDown(this.cursors.up) ||
            Phaser.Input.Keyboard.JustDown(this.wasd.W)
          )
            this.moveShip(0, 1);
          else if (
            Phaser.Input.Keyboard.JustDown(this.cursors.down) ||
            Phaser.Input.Keyboard.JustDown(this.wasd.S)
          )
            this.moveShip(0, -1);

          // Touch
          if (this.touchDir && this.moveDelay <= 0) {
            if (this.touchDir === "left") this.moveShip(-1, 0);
            else if (this.touchDir === "right") this.moveShip(1, 0);
            else if (this.touchDir === "up") this.moveShip(0, 1);
            else if (this.touchDir === "down") this.moveShip(0, -1);
          }

          // Water shimmer on ship
          this.ship.setAlpha(0.95 + Math.sin(this.time.now * 0.003) * 0.05);
        }
      }

      // ============================================================
      // RESULTS
      // ============================================================
      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }
        init(data) {
          this.d = data;
        }
        create() {
          this.cameras.main.setBackgroundColor("#051225");

          for (let i = 0; i < 60; i++) {
            this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.Between(1, 2),
              Phaser.Math.RND.pick([0x0ea5e9, 0x38bdf8]),
              Phaser.Math.FloatBetween(0.03, 0.12),
            );
          }

          const title = this.d.gameOver ? "GAME OVER" : "VOYAGE COMPLETE";
          const color = this.d.gameOver ? "#f87171" : "#fbbf24";
          this.add
            .text(W / 2, 50, title, {
              fontSize: "40px",
              color,
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 6,
            })
            .setOrigin(0.5);

          const stats = [
            ["Score", this.d.score],
            ["Level", this.d.level],
            ["Treasures Found", this.d.treasures],
            ["Questions Correct", `${this.d.qCorrect}/${this.d.qTotal}`],
            ["Best Combo", `${this.d.maxCombo}x`],
            [
              "Accuracy",
              this.d.qTotal > 0
                ? Math.round((this.d.qCorrect / this.d.qTotal) * 100) + "%"
                : "N/A",
            ],
          ];

          stats.forEach((s, i) => {
            const y = 130 + i * 48;
            this.add.text(W / 2 - 140, y, s[0], {
              fontSize: "16px",
              color: "#94a3b8",
            });
            this.add
              .text(W / 2 + 140, y, `${s[1]}`, {
                fontSize: "20px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(1, 0);
            if (i < stats.length - 1)
              this.add.rectangle(W / 2, y + 36, 320, 1, 0x1e293b);
          });

          const pct = this.d.qTotal > 0 ? this.d.qCorrect / this.d.qTotal : 0;
          const stars = pct >= 0.85 ? 3 : pct >= 0.6 ? 2 : 1;
          this.add
            .text(W / 2, 440, "★".repeat(stars) + "☆".repeat(3 - stars), {
              fontSize: "38px",
              color: "#fbbf24",
            })
            .setOrigin(0.5);

          this.add
            .text(
              W / 2,
              490,
              "Coordinates: (x, y) = (right/left, up/down). Quadrants: I(+,+) II(-,+) III(-,-) IV(+,-)",
              {
                fontSize: "11px",
                color: "#64748b",
                wordWrap: { width: 600 },
                align: "center",
              },
            )
            .setOrigin(0.5);

          const playBtn = this.add
            .image(W / 2 - 120, 545, "btn")
            .setScale(0.9)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 - 120, 545, "Play Again", {
              fontSize: "16px",
              color: "#4ade80",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          playBtn.on("pointerdown", () =>
            this.scene.start("Game", { shipTint: this.d.shipTint }),
          );

          const menuBtn = this.add
            .image(W / 2 + 120, 545, "btn")
            .setScale(0.9)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 + 120, 545, "Main Menu", {
              fontSize: "16px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          menuBtn.on("pointerdown", () => this.scene.start("Title"));

          this.cameras.main.fadeIn(500);
        }
      }

      // ============================================================
      // CONFIG
      // ============================================================
      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: "game-container",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [BootScene, TitleScene, GameScene, ResultsScene],
        input: { activePointers: 3 },
      };

      new Phaser.Game(config);
    </script>
      <script src="/assets/nt-page-enhance.js" defer></script>
