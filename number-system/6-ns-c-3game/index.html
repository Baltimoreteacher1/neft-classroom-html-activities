    <script>
      // ============================================================
      //  NUMBER LINE JUMPER — 6.NS.C.3 Platformer Adventure
      //  Understand ordering and absolute value of rational numbers
      // ============================================================

      const W = 800,
        H = 600;
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      function synth(freq, dur, type = "square", vol = 0.12) {
        try {
          const o = audioCtx.createOscillator(),
            g = audioCtx.createGain();
          o.connect(g);
          g.connect(audioCtx.destination);
          o.frequency.value = freq;
          o.type = type;
          g.gain.setValueAtTime(vol, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(
            0.001,
            audioCtx.currentTime + dur,
          );
          o.start();
          o.stop(audioCtx.currentTime + dur);
        } catch (e) {}
      }
      function sndJump() {
        synth(400, 0.1);
        setTimeout(() => synth(600, 0.1), 50);
      }
      function sndCollect() {
        synth(880, 0.08);
        setTimeout(() => synth(1100, 0.12), 60);
      }
      function sndCorrect() {
        synth(523, 0.1);
        setTimeout(() => synth(659, 0.1), 80);
        setTimeout(() => synth(784, 0.15), 160);
      }
      function sndWrong() {
        synth(200, 0.3, "sawtooth", 0.15);
      }
      function sndLevelUp() {
        [523, 659, 784, 1047].forEach((f, i) =>
          setTimeout(() => synth(f, 0.12), i * 100),
        );
      }
      function sndDamage() {
        synth(120, 0.2, "sawtooth", 0.2);
      }

      // Question generator for 6.NS.C.3
      function generateQuestions(level) {
        const qs = [];
        const diff = Math.min(level, 5);
        const range = 5 + diff * 3;

        for (let i = 0; i < 4; i++) {
          const type = Phaser.Math.Between(0, 4);
          let q, ans, opts;

          if (type === 0) {
            // Absolute value
            const n = Phaser.Math.Between(-range, range);
            q = `What is |${n}|?`;
            ans = Math.abs(n);
            opts = shuffle([
              ans,
              -ans,
              n,
              Phaser.Math.Between(0, range),
            ]).filter((v, j, a) => a.indexOf(v) === j);
            while (opts.length < 3)
              opts.push(Phaser.Math.Between(0, range + 5));
            opts = shuffle(opts.slice(0, 3));
            if (!opts.includes(ans)) opts[0] = ans;
          } else if (type === 1) {
            // Ordering - which is greater
            const a = Phaser.Math.Between(-range, range);
            let b = Phaser.Math.Between(-range, range);
            while (b === a) b = Phaser.Math.Between(-range, range);
            q = `Which is greater: ${a} or ${b}?`;
            ans = Math.max(a, b);
            opts = shuffle([a, b, Math.min(a, b)]);
          } else if (type === 2) {
            // Which has greater absolute value
            const a = Phaser.Math.Between(-range, -1);
            const b = Phaser.Math.Between(1, range);
            q = `Which has greater absolute value: ${a} or ${b}?`;
            ans = Math.abs(a) > Math.abs(b) ? a : b;
            opts = shuffle([a, b, 0]);
          } else if (type === 3) {
            // Order from least to greatest - pick middle
            let nums = [];
            while (nums.length < 3) {
              const n = Phaser.Math.Between(-range, range);
              if (!nums.includes(n)) nums.push(n);
            }
            nums.sort((a, b) => a - b);
            q = `Order: ${shuffle([...nums]).join(", ")}. Which is in the MIDDLE?`;
            ans = nums[1];
            opts = shuffle([...nums]);
          } else {
            // Distance between on number line (absolute difference)
            const a = Phaser.Math.Between(-range, range);
            let b = Phaser.Math.Between(-range, range);
            while (b === a) b = Phaser.Math.Between(-range, range);
            q = `Distance between ${a} and ${b} on number line?`;
            ans = Math.abs(a - b);
            opts = shuffle([ans, a - b, b - a]).filter(
              (v, j, a2) => a2.indexOf(v) === j,
            );
            while (opts.length < 3)
              opts.push(Phaser.Math.Between(1, range * 2));
            opts = shuffle(opts.slice(0, 3));
            if (!opts.includes(ans)) opts[0] = ans;
          }

          qs.push({ q, ans, opts: shuffle(opts) });
        }
        return qs;
      }

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      // ============================================================
      // BOOT SCENE
      // ============================================================
      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          // Generate textures
          const g = this.make.graphics({ add: false });

          // Player sprite (16x24)
          g.clear();
          g.fillStyle(0x38bdf8);
          g.fillRect(2, 0, 12, 8);
          g.fillStyle(0xfbbf24);
          g.fillRect(4, 8, 8, 10);
          g.fillStyle(0x38bdf8);
          g.fillRect(2, 18, 5, 6);
          g.fillRect(9, 18, 5, 6);
          g.generateTexture("player", 16, 24);
          g.clear();

          // Platform
          g.fillStyle(0x4ade80);
          g.fillRect(0, 0, 64, 16);
          g.fillStyle(0x22c55e);
          g.fillRect(0, 12, 64, 4);
          g.generateTexture("platform", 64, 16);
          g.clear();

          // Gem (collectible)
          g.fillStyle(0xfbbf24);
          g.fillRect(4, 0, 8, 4);
          g.fillRect(2, 4, 12, 8);
          g.fillRect(4, 12, 8, 4);
          g.generateTexture("gem", 16, 16);
          g.clear();

          // Spike (hazard)
          g.fillStyle(0xf87171);
          g.fillTriangle(8, 0, 0, 16, 16, 16);
          g.generateTexture("spike", 16, 16);
          g.clear();

          // Heart
          g.fillStyle(0xef4444);
          g.fillRect(2, 2, 4, 4);
          g.fillRect(8, 2, 4, 4);
          g.fillRect(0, 4, 14, 4);
          g.fillRect(2, 8, 10, 4);
          g.fillRect(4, 12, 6, 2);
          g.generateTexture("heart", 14, 14);
          g.clear();

          // Star (bonus)
          g.fillStyle(0xc084fc);
          g.fillRect(6, 0, 4, 4);
          g.fillRect(0, 4, 16, 4);
          g.fillRect(4, 8, 8, 4);
          g.fillRect(2, 8, 4, 4);
          g.fillRect(10, 8, 4, 4);
          g.generateTexture("star", 16, 12);
          g.clear();

          // Button
          g.fillStyle(0x1e293b);
          g.fillRoundedRect(0, 0, 200, 50, 12);
          g.lineStyle(2, 0x38bdf8);
          g.strokeRoundedRect(0, 0, 200, 50, 12);
          g.generateTexture("btn", 200, 50);
          g.clear();

          // Answer button
          g.fillStyle(0x0f172a);
          g.fillRoundedRect(0, 0, 160, 44, 10);
          g.lineStyle(2, 0x38bdf8);
          g.strokeRoundedRect(0, 0, 160, 44, 10);
          g.generateTexture("ans_btn", 160, 44);
          g.clear();

          // Answer button correct
          g.fillStyle(0x064e3b);
          g.fillRoundedRect(0, 0, 160, 44, 10);
          g.lineStyle(2, 0x4ade80);
          g.strokeRoundedRect(0, 0, 160, 44, 10);
          g.generateTexture("ans_correct", 160, 44);
          g.clear();

          // Answer button wrong
          g.fillStyle(0x450a0a);
          g.fillRoundedRect(0, 0, 160, 44, 10);
          g.lineStyle(2, 0xf87171);
          g.strokeRoundedRect(0, 0, 160, 44, 10);
          g.generateTexture("ans_wrong", 160, 44);
          g.clear();

          // Ground tile
          g.fillStyle(0x1e3a2f);
          g.fillRect(0, 0, 64, 32);
          g.fillStyle(0x166534);
          g.fillRect(0, 0, 64, 4);
          g.generateTexture("ground", 64, 32);
          g.clear();

          // Number line marker
          g.fillStyle(0xfbbf24);
          g.fillCircle(8, 8, 8);
          g.generateTexture("marker", 16, 16);
          g.clear();

          // BG particle
          g.fillStyle(0xffffff, 0.3);
          g.fillCircle(2, 2, 2);
          g.generateTexture("particle", 4, 4);
          g.clear();

          g.destroy();
          this.scene.start("Title");
        }
      }

      // ============================================================
      // TITLE SCENE
      // ============================================================
      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }

        create() {
          this.cameras.main.setBackgroundColor("#0a0a2e");

          // Stars background
          for (let i = 0; i < 80; i++) {
            const s = this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.Between(1, 2),
              0xffffff,
              Phaser.Math.FloatBetween(0.1, 0.5),
            );
            this.tweens.add({
              targets: s,
              alpha: { from: s.alpha, to: 0.1 },
              duration: Phaser.Math.Between(1000, 3000),
              yoyo: true,
              repeat: -1,
            });
          }

          // Title
          this.add
            .text(W / 2, 100, "NUMBER LINE", {
              fontSize: "52px",
              fontFamily: "Segoe UI, system-ui",
              fontStyle: "bold",
              color: "#38bdf8",
              stroke: "#0a0a2e",
              strokeThickness: 6,
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 160, "JUMPER", {
              fontSize: "64px",
              fontFamily: "Segoe UI, system-ui",
              fontStyle: "bold",
              color: "#fbbf24",
              stroke: "#0a0a2e",
              strokeThickness: 6,
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 210, "6.NS.C.3 — Ordering & Absolute Value", {
              fontSize: "16px",
              color: "#94a3b8",
            })
            .setOrigin(0.5);

          // Animated player preview
          const p = this.add.image(W / 2, 310, "player").setScale(4);
          this.tweens.add({
            targets: p,
            y: 290,
            duration: 800,
            yoyo: true,
            repeat: -1,
            ease: "Sine.InOut",
          });

          // Floating gems
          for (let i = 0; i < 5; i++) {
            const gem = this.add.image(150 + i * 130, 350, "gem").setScale(2);
            this.tweens.add({
              targets: gem,
              y: 340,
              duration: 600 + i * 100,
              yoyo: true,
              repeat: -1,
              ease: "Sine.InOut",
            });
          }

          // Character select
          this.add
            .text(W / 2, 400, "Choose your jumper:", {
              fontSize: "18px",
              color: "#e2e8f0",
            })
            .setOrigin(0.5);

          const colors = [
            { name: "Sky Runner", color: 0x38bdf8 },
            { name: "Gold Dash", color: 0xfbbf24 },
            { name: "Violet Leap", color: 0xc084fc },
          ];

          this.selectedChar = 0;
          this.charButtons = [];

          colors.forEach((c, i) => {
            const x = W / 2 - 150 + i * 150;
            const bg = this.add
              .image(x, 460, "btn")
              .setScale(0.7)
              .setInteractive({ useHandCursor: true });
            const txt = this.add
              .text(x, 460, c.name, {
                fontSize: "14px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(0.5);
            bg.on("pointerdown", () => {
              this.selectedChar = i;
              this.charButtons.forEach((b, j) => {
                b.bg.setTint(j === i ? 0x4ade80 : 0xffffff);
              });
              synth(440 + i * 100, 0.1);
            });
            bg.on("pointerover", () => bg.setScale(0.75));
            bg.on("pointerout", () => bg.setScale(0.7));
            this.charButtons.push({ bg, txt, color: c.color });
          });
          this.charButtons[0].bg.setTint(0x4ade80);

          // Start button
          const startBtn = this.add
            .image(W / 2, 530, "btn")
            .setScale(1.2)
            .setInteractive({ useHandCursor: true });
          const startTxt = this.add
            .text(W / 2, 530, "START GAME", {
              fontSize: "22px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5);

          startBtn.on("pointerdown", () => {
            synth(600, 0.1);
            setTimeout(() => synth(800, 0.15), 80);
            this.cameras.main.fadeOut(400);
            this.time.delayedCall(400, () => {
              this.scene.start("Game", {
                charColor: this.charButtons[this.selectedChar].color,
              });
            });
          });

          startBtn.on("pointerover", () => startBtn.setScale(1.25));
          startBtn.on("pointerout", () => startBtn.setScale(1.2));

          this.tweens.add({
            targets: startBtn,
            scaleX: 1.25,
            scaleY: 1.25,
            duration: 800,
            yoyo: true,
            repeat: -1,
            ease: "Sine.InOut",
          });

          // Touch hint
          this.add
            .text(
              W / 2,
              585,
              "Keyboard: Arrow keys + Space  |  Touch: On-screen buttons",
              {
                fontSize: "12px",
                color: "#64748b",
              },
            )
            .setOrigin(0.5);

          this.cameras.main.fadeIn(500);
        }
      }

      // ============================================================
      // GAME SCENE
      // ============================================================
      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }

        init(data) {
          this.charColor = data.charColor || 0x38bdf8;
          this.score = 0;
          this.lives = 3;
          this.level = 1;
          this.combo = 0;
          this.maxCombo = 0;
          this.gemsCollected = 0;
          this.questionsAnswered = 0;
          this.questionsCorrect = 0;
          this.levelComplete = false;
          this.isQuestionActive = false;
          this.playerCanMove = true;
        }

        create() {
          if (audioCtx.state === "suspended") audioCtx.resume();
          this.cameras.main.setBackgroundColor("#0a0a2e");

          // Parallax stars
          this.bgStars = [];
          for (let i = 0; i < 60; i++) {
            const s = this.add
              .circle(
                Phaser.Math.Between(0, W),
                Phaser.Math.Between(0, H),
                Phaser.Math.Between(1, 2),
                0xffffff,
                Phaser.Math.FloatBetween(0.05, 0.3),
              )
              .setScrollFactor(0.2);
            this.bgStars.push(s);
          }

          // Particle emitter for ambient
          this.ambientParticles = this.add
            .particles(0, 0, "particle", {
              x: { min: 0, max: W },
              y: -10,
              lifespan: 6000,
              speedY: { min: 10, max: 30 },
              scale: { start: 0.5, end: 0 },
              alpha: { start: 0.3, end: 0 },
              frequency: 500,
              quantity: 1,
            })
            .setScrollFactor(0);

          // Build level
          this.buildLevel();

          // Player
          this.player = this.physics.add
            .sprite(100, H - 120, "player")
            .setScale(2);
          this.player.setCollideWorldBounds(false);
          this.player.setBounce(0.1);
          this.player.setTint(this.charColor);
          this.player.body.setSize(12, 22);
          this.player.body.setOffset(2, 1);
          this.player.setGravityY(400);
          this.player.setDepth(10);

          // Jump trail particles
          this.jumpEmitter = this.add.particles(0, 0, "particle", {
            follow: this.player,
            followOffset: { y: 12 },
            lifespan: 300,
            speed: { min: 10, max: 30 },
            scale: { start: 1, end: 0 },
            alpha: { start: 0.6, end: 0 },
            tint: this.charColor,
            frequency: -1,
            quantity: 5,
          });

          // Physics colliders
          this.physics.add.collider(this.player, this.platforms);
          this.physics.add.collider(this.player, this.ground);
          this.physics.add.overlap(
            this.player,
            this.gems,
            this.collectGem,
            null,
            this,
          );
          this.physics.add.overlap(
            this.player,
            this.stars,
            this.collectStar,
            null,
            this,
          );
          this.physics.add.overlap(
            this.player,
            this.spikes,
            this.hitSpike,
            null,
            this,
          );
          this.physics.add.overlap(
            this.player,
            this.goalZone,
            this.reachGoal,
            null,
            this,
          );

          // Number line display (bottom HUD)
          this.createHUD();
          this.createNumberLine();

          // Controls
          this.cursors = this.input.keyboard.createCursorKeys();
          this.spaceBar = this.input.keyboard.addKey(
            Phaser.Input.Keyboard.KeyCodes.SPACE,
          );
          this.wasd = this.input.keyboard.addKeys("W,A,S,D");

          // Touch controls
          this.createTouchControls();

          // Camera
          this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
          this.cameras.main.setBounds(0, 0, this.levelWidth, H);
          this.physics.world.setBounds(0, 0, this.levelWidth, H + 100);

          this.cameras.main.fadeIn(500);

          // Level text popup
          this.showLevelStart();
        }

        buildLevel() {
          const platsPerLevel = 12 + this.level * 3;
          this.levelWidth = Math.max(W, platsPerLevel * 120 + 200);

          // Ground
          this.ground = this.physics.add.staticGroup();
          for (let x = 0; x < this.levelWidth; x += 64) {
            this.ground.create(x + 32, H - 16, "ground");
          }

          // Platforms
          this.platforms = this.physics.add.staticGroup();
          this.gems = this.physics.add.group();
          this.stars = this.physics.add.group();
          this.spikes = this.physics.add.staticGroup();

          // Generate number line values for platforms
          const range = 5 + this.level * 2;

          for (let i = 0; i < platsPerLevel; i++) {
            const x = 200 + i * Phaser.Math.Between(80, 140);
            const y = Phaser.Math.Between(H - 200, H - 80);
            const plat = this.platforms.create(x, y, "platform");

            // Label platforms with number line values
            const val = Phaser.Math.Between(-range, range);
            const label = this.add
              .text(x, y - 16, `${val}`, {
                fontSize: "14px",
                color: "#fbbf24",
                fontStyle: "bold",
                stroke: "#000",
                strokeThickness: 3,
              })
              .setOrigin(0.5);

            // Add gems on some platforms
            if (Math.random() < 0.5) {
              const gem = this.gems.create(x, y - 36, "gem").setScale(1.5);
              gem.value = Math.abs(val);
              gem.numValue = val;
              gem.body.allowGravity = false;

              // Gem float
              this.tweens.add({
                targets: gem,
                y: gem.y - 8,
                duration: 800 + Math.random() * 400,
                yoyo: true,
                repeat: -1,
                ease: "Sine.InOut",
              });

              // Value label on gem
              this.add
                .text(x, y - 52, `|${val}|=${Math.abs(val)}`, {
                  fontSize: "10px",
                  color: "#fbbf24",
                  stroke: "#000",
                  strokeThickness: 2,
                })
                .setOrigin(0.5);
            }

            // Stars (bonus) on some higher platforms
            if (Math.random() < 0.15 && y < H - 150) {
              const star = this.stars.create(x, y - 50, "star").setScale(1.5);
              star.body.allowGravity = false;
              this.tweens.add({
                targets: star,
                angle: 360,
                duration: 2000,
                repeat: -1,
              });
            }

            // Spikes on ground between some platforms
            if (Math.random() < 0.2 && i > 2) {
              const sx = x - Phaser.Math.Between(20, 60);
              this.spikes.create(sx, H - 40, "spike").setScale(1.5);
            }
          }

          // Goal zone at end
          this.goalZone = this.physics.add.staticGroup();
          const goalX = this.levelWidth - 100;
          const goal = this.goalZone
            .create(goalX, H - 60, "marker")
            .setScale(3);
          goal.setTint(0x4ade80);

          // Goal label
          this.add
            .text(goalX, H - 110, "GOAL!", {
              fontSize: "20px",
              color: "#4ade80",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 4,
            })
            .setOrigin(0.5);

          // Goal glow
          const goalGlow = this.add.circle(goalX, H - 60, 30, 0x4ade80, 0.2);
          this.tweens.add({
            targets: goalGlow,
            scale: 1.5,
            alpha: 0,
            duration: 1000,
            repeat: -1,
          });
        }

        createHUD() {
          // Fixed HUD container
          const hudBg = this.add
            .rectangle(W / 2, 22, W, 44, 0x0f172a, 0.85)
            .setScrollFactor(0)
            .setDepth(100);

          this.scoreText = this.add
            .text(16, 12, "Score: 0", {
              fontSize: "16px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setScrollFactor(0)
            .setDepth(101);

          this.comboText = this.add
            .text(16, 30, "", {
              fontSize: "12px",
              color: "#c084fc",
            })
            .setScrollFactor(0)
            .setDepth(101);

          this.levelText = this.add
            .text(W / 2, 12, `Level ${this.level}`, {
              fontSize: "16px",
              color: "#38bdf8",
              fontStyle: "bold",
            })
            .setOrigin(0.5, 0)
            .setScrollFactor(0)
            .setDepth(101);

          // Lives
          this.heartIcons = [];
          for (let i = 0; i < 3; i++) {
            const h = this.add
              .image(W - 80 + i * 24, 22, "heart")
              .setScale(1.5)
              .setScrollFactor(0)
              .setDepth(101);
            this.heartIcons.push(h);
          }
        }

        createNumberLine() {
          // Number line at bottom of HUD
          const nlY = H - 6;
          const nlBg = this.add
            .rectangle(W / 2, nlY, W - 20, 8, 0x1e293b, 0.7)
            .setScrollFactor(0)
            .setDepth(100);
          this.add
            .rectangle(W / 2, nlY, W - 24, 2, 0x38bdf8, 0.5)
            .setScrollFactor(0)
            .setDepth(100);

          // Zero marker
          this.add
            .text(W / 2, nlY - 8, "0", { fontSize: "10px", color: "#fbbf24" })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(100);

          // Player position marker on number line
          this.nlMarker = this.add
            .circle(W / 2, nlY, 4, 0xfbbf24)
            .setScrollFactor(0)
            .setDepth(101);
        }

        createTouchControls() {
          const btnAlpha = 0.35;
          const btnSize = 50;

          // Left
          this.touchLeft = this.add
            .circle(60, H - 60, btnSize, 0x38bdf8, btnAlpha)
            .setScrollFactor(0)
            .setDepth(200)
            .setInteractive();
          this.add
            .text(60, H - 60, "<", {
              fontSize: "28px",
              color: "#fff",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(201);

          // Right
          this.touchRight = this.add
            .circle(170, H - 60, btnSize, 0x38bdf8, btnAlpha)
            .setScrollFactor(0)
            .setDepth(200)
            .setInteractive();
          this.add
            .text(170, H - 60, ">", {
              fontSize: "28px",
              color: "#fff",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(201);

          // Jump
          this.touchJump = this.add
            .circle(W - 80, H - 60, btnSize * 1.2, 0xfbbf24, btnAlpha)
            .setScrollFactor(0)
            .setDepth(200)
            .setInteractive();
          this.add
            .text(W - 80, H - 60, "JUMP", {
              fontSize: "14px",
              color: "#fff",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(201);

          this.touchLeftDown = false;
          this.touchRightDown = false;
          this.touchJumpDown = false;

          this.touchLeft.on("pointerdown", () => (this.touchLeftDown = true));
          this.touchLeft.on("pointerup", () => (this.touchLeftDown = false));
          this.touchLeft.on("pointerout", () => (this.touchLeftDown = false));
          this.touchRight.on("pointerdown", () => (this.touchRightDown = true));
          this.touchRight.on("pointerup", () => (this.touchRightDown = false));
          this.touchRight.on("pointerout", () => (this.touchRightDown = false));
          this.touchJump.on("pointerdown", () => (this.touchJumpDown = true));
          this.touchJump.on("pointerup", () => (this.touchJumpDown = false));
          this.touchJump.on("pointerout", () => (this.touchJumpDown = false));
        }

        showLevelStart() {
          const overlay = this.add
            .rectangle(W / 2, H / 2, W, H, 0x000000, 0.7)
            .setScrollFactor(0)
            .setDepth(500);
          const txt = this.add
            .text(W / 2, H / 2 - 20, `Level ${this.level}`, {
              fontSize: "48px",
              color: "#fbbf24",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 6,
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(501);

          const sub = this.add
            .text(
              W / 2,
              H / 2 + 30,
              "Collect gems, reach the goal, answer questions!",
              {
                fontSize: "16px",
                color: "#94a3b8",
              },
            )
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(501);

          this.playerCanMove = false;

          this.tweens.add({
            targets: [overlay, txt, sub],
            alpha: 0,
            delay: 1500,
            duration: 500,
            onComplete: () => {
              overlay.destroy();
              txt.destroy();
              sub.destroy();
              this.playerCanMove = true;
            },
          });
        }

        collectGem(player, gem) {
          sndCollect();
          this.gemsCollected++;
          const points = gem.value * 10 * (this.combo + 1);
          this.score += points;
          this.updateHUD();

          // Float text
          const ft = this.add
            .text(gem.x, gem.y - 20, `+${points}`, {
              fontSize: "18px",
              color: "#fbbf24",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 3,
            })
            .setOrigin(0.5)
            .setDepth(50);
          this.tweens.add({
            targets: ft,
            y: ft.y - 40,
            alpha: 0,
            duration: 800,
            onComplete: () => ft.destroy(),
          });

          // Particle burst
          this.add
            .particles(gem.x, gem.y, "particle", {
              speed: { min: 50, max: 150 },
              scale: { start: 1, end: 0 },
              lifespan: 400,
              quantity: 10,
              tint: 0xfbbf24,
              emitting: false,
            })
            .explode(10);

          gem.destroy();
        }

        collectStar(player, star) {
          synth(1000, 0.15);
          setTimeout(() => synth(1200, 0.15), 80);
          this.score += 500;
          this.combo++;
          if (this.combo > this.maxCombo) this.maxCombo = this.combo;
          this.updateHUD();

          const ft = this.add
            .text(star.x, star.y - 20, "BONUS +500!", {
              fontSize: "16px",
              color: "#c084fc",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 3,
            })
            .setOrigin(0.5)
            .setDepth(50);
          this.tweens.add({
            targets: ft,
            y: ft.y - 50,
            alpha: 0,
            duration: 1000,
            onComplete: () => ft.destroy(),
          });

          star.destroy();
        }

        hitSpike(player, spike) {
          if (this.isInvincible) return;
          sndDamage();
          this.lives--;
          this.updateHUD();
          this.combo = 0;
          this.comboText.setText("");

          // Flash red
          this.isInvincible = true;
          this.cameras.main.shake(200, 0.01);
          player.setTint(0xff0000);

          this.tweens.add({
            targets: player,
            alpha: 0.3,
            duration: 100,
            yoyo: true,
            repeat: 5,
            onComplete: () => {
              player.setAlpha(1);
              player.setTint(this.charColor);
              this.isInvincible = false;
            },
          });

          if (this.lives <= 0) {
            this.gameOver();
          }
        }

        reachGoal() {
          if (this.levelComplete) return;
          this.levelComplete = true;
          this.playerCanMove = false;
          sndLevelUp();

          // Show question overlay
          this.time.delayedCall(500, () => this.showQuestions());
        }

        showQuestions() {
          this.isQuestionActive = true;
          const questions = generateQuestions(this.level);
          this.currentQuestions = questions;
          this.currentQIndex = 0;
          this.qCorrect = 0;

          this.showSingleQuestion();
        }

        showSingleQuestion() {
          if (this.currentQIndex >= this.currentQuestions.length) {
            this.finishQuestions();
            return;
          }

          const q = this.currentQuestions[this.currentQIndex];

          // Overlay
          if (this.qOverlay) this.qOverlay.destroy();
          if (this.qContainer) this.qContainer.list.forEach((c) => c.destroy());

          this.qOverlay = this.add
            .rectangle(W / 2, H / 2, W, H, 0x000000, 0.8)
            .setScrollFactor(0)
            .setDepth(600);

          const container = [];

          // Question number
          const qNum = this.add
            .text(
              W / 2,
              120,
              `Question ${this.currentQIndex + 1} of ${this.currentQuestions.length}`,
              {
                fontSize: "14px",
                color: "#94a3b8",
              },
            )
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(601);
          container.push(qNum);

          // Question text
          const qText = this.add
            .text(W / 2, 180, q.q, {
              fontSize: "24px",
              color: "#e2e8f0",
              fontStyle: "bold",
              wordWrap: { width: 600 },
              align: "center",
              stroke: "#000",
              strokeThickness: 4,
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(601);
          container.push(qText);

          // Number line visualization for this question
          this.drawQuestionNumberLine(240, container);

          // Answer buttons
          const opts = q.opts.slice(0, 3);
          opts.forEach((opt, i) => {
            const bx = W / 2 - 200 + i * 200;
            const by = 360;

            const btn = this.add
              .image(bx, by, "ans_btn")
              .setScale(1.1)
              .setScrollFactor(0)
              .setDepth(601)
              .setInteractive({ useHandCursor: true });
            const txt = this.add
              .text(bx, by, `${opt}`, {
                fontSize: "22px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(602);

            container.push(btn, txt);

            btn.on("pointerdown", () => {
              // Disable all buttons
              container.forEach((c) => {
                if (c.input) c.disableInteractive();
              });

              if (opt === q.ans) {
                sndCorrect();
                btn.setTexture("ans_correct");
                txt.setColor("#4ade80");
                this.qCorrect++;
                this.questionsCorrect++;
                this.combo++;
                if (this.combo > this.maxCombo) this.maxCombo = this.combo;
                this.score += 200 * this.combo;

                const fb = this.add
                  .text(W / 2, 430, "Correct! +" + 200 * this.combo, {
                    fontSize: "20px",
                    color: "#4ade80",
                    fontStyle: "bold",
                  })
                  .setOrigin(0.5)
                  .setScrollFactor(0)
                  .setDepth(601);
                container.push(fb);
              } else {
                sndWrong();
                btn.setTexture("ans_wrong");
                txt.setColor("#f87171");
                this.combo = 0;

                // Highlight correct
                container.forEach((c) => {
                  if (c.text === `${q.ans}`) c.setColor("#4ade80");
                });

                const fb = this.add
                  .text(W / 2, 430, `Answer: ${q.ans}`, {
                    fontSize: "20px",
                    color: "#f87171",
                    fontStyle: "bold",
                  })
                  .setOrigin(0.5)
                  .setScrollFactor(0)
                  .setDepth(601);
                container.push(fb);
              }

              this.questionsAnswered++;
              this.updateHUD();

              this.time.delayedCall(1500, () => {
                container.forEach((c) => c.destroy());
                this.qOverlay.destroy();
                this.currentQIndex++;
                this.showSingleQuestion();
              });
            });

            btn.on("pointerover", () => btn.setScale(1.2));
            btn.on("pointerout", () => btn.setScale(1.1));
          });

          this.qContainer = { list: container };
        }

        drawQuestionNumberLine(y, container) {
          const nlWidth = 500;
          const nlX = W / 2 - nlWidth / 2;
          // line
          const line = this.add
            .rectangle(W / 2, y, nlWidth, 3, 0x38bdf8, 0.6)
            .setScrollFactor(0)
            .setDepth(601);
          container.push(line);

          // Ticks
          const range = 10;
          for (let v = -range; v <= range; v++) {
            const px = W / 2 + (v / range) * (nlWidth / 2);
            const tick = this.add
              .rectangle(
                px,
                y,
                1,
                v === 0 ? 16 : 8,
                v === 0 ? 0xfbbf24 : 0x38bdf8,
                0.6,
              )
              .setScrollFactor(0)
              .setDepth(601);
            container.push(tick);

            if (v % 2 === 0) {
              const lbl = this.add
                .text(px, y + 14, `${v}`, {
                  fontSize: "10px",
                  color: v === 0 ? "#fbbf24" : "#64748b",
                })
                .setOrigin(0.5, 0)
                .setScrollFactor(0)
                .setDepth(601);
              container.push(lbl);
            }
          }
        }

        finishQuestions() {
          this.isQuestionActive = false;

          // Bonus for correct answers
          const bonus = this.qCorrect * 300;
          this.score += bonus;

          // Level complete screen
          const overlay = this.add
            .rectangle(W / 2, H / 2, W, H, 0x000000, 0.85)
            .setScrollFactor(0)
            .setDepth(600);

          this.add
            .text(W / 2, 140, "LEVEL COMPLETE!", {
              fontSize: "40px",
              color: "#4ade80",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 6,
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(601);

          const stars = this.qCorrect >= 4 ? 3 : this.qCorrect >= 2 ? 2 : 1;
          this.add
            .text(W / 2, 200, "★".repeat(stars) + "☆".repeat(3 - stars), {
              fontSize: "40px",
              color: "#fbbf24",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(601);

          this.add
            .text(
              W / 2,
              260,
              `Gems: ${this.gemsCollected}  |  Score: ${this.score}`,
              {
                fontSize: "18px",
                color: "#e2e8f0",
              },
            )
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(601);

          this.add
            .text(
              W / 2,
              290,
              `Questions: ${this.qCorrect}/${this.currentQuestions.length}  |  Combo: ${this.maxCombo}x`,
              {
                fontSize: "16px",
                color: "#94a3b8",
              },
            )
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(601);

          // Confetti
          for (let i = 0; i < 30; i++) {
            const c = this.add
              .circle(
                Phaser.Math.Between(100, W - 100),
                -20,
                Phaser.Math.Between(3, 6),
                Phaser.Math.RND.pick([
                  0x38bdf8, 0xfbbf24, 0x4ade80, 0xc084fc, 0xf87171,
                ]),
              )
              .setScrollFactor(0)
              .setDepth(602);
            this.tweens.add({
              targets: c,
              y: H + 20,
              x: c.x + Phaser.Math.Between(-100, 100),
              duration: Phaser.Math.Between(1500, 3000),
              delay: Phaser.Math.Between(0, 500),
              onComplete: () => c.destroy(),
            });
          }

          // Next level button
          const nextBtn = this.add
            .image(W / 2 - 110, 380, "btn")
            .setScrollFactor(0)
            .setDepth(601)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 - 110, 380, "Next Level", {
              fontSize: "18px",
              color: "#4ade80",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(602);

          nextBtn.on("pointerdown", () => {
            synth(600, 0.1);
            this.cameras.main.fadeOut(400);
            this.time.delayedCall(400, () => {
              this.scene.restart({
                charColor: this.charColor,
                level: this.level + 1,
              });
            });
          });

          // Menu button
          const menuBtn = this.add
            .image(W / 2 + 110, 380, "btn")
            .setScrollFactor(0)
            .setDepth(601)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 + 110, 380, "Results", {
              fontSize: "18px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(602);

          menuBtn.on("pointerdown", () => {
            this.scene.start("Results", {
              score: this.score,
              level: this.level,
              gems: this.gemsCollected,
              questionsCorrect: this.questionsCorrect,
              questionsTotal: this.questionsAnswered,
              maxCombo: this.maxCombo,
              charColor: this.charColor,
            });
          });
        }

        gameOver() {
          this.playerCanMove = false;
          this.cameras.main.shake(500, 0.03);

          this.time.delayedCall(500, () => {
            this.scene.start("Results", {
              score: this.score,
              level: this.level,
              gems: this.gemsCollected,
              questionsCorrect: this.questionsCorrect,
              questionsTotal: this.questionsAnswered,
              maxCombo: this.maxCombo,
              charColor: this.charColor,
              gameOver: true,
            });
          });
        }

        updateHUD() {
          this.scoreText.setText(`Score: ${this.score}`);
          if (this.combo > 1) {
            this.comboText.setText(`${this.combo}x Combo!`);
          } else {
            this.comboText.setText("");
          }

          // Update hearts
          for (let i = 0; i < 3; i++) {
            this.heartIcons[i].setAlpha(i < this.lives ? 1 : 0.2);
          }
        }

        update() {
          if (!this.playerCanMove || this.isQuestionActive) {
            this.player.setVelocityX(0);
            return;
          }

          const onGround =
            this.player.body.touching.down || this.player.body.blocked.down;
          const speed = 220;
          const jumpVel = -420;

          // Movement
          const left =
            this.cursors.left.isDown ||
            this.wasd.A.isDown ||
            this.touchLeftDown;
          const right =
            this.cursors.right.isDown ||
            this.wasd.D.isDown ||
            this.touchRightDown;
          const jump =
            Phaser.Input.Keyboard.JustDown(this.spaceBar) ||
            Phaser.Input.Keyboard.JustDown(this.cursors.up) ||
            Phaser.Input.Keyboard.JustDown(this.wasd.W);

          if (left) {
            this.player.setVelocityX(-speed);
            this.player.setFlipX(true);
          } else if (right) {
            this.player.setVelocityX(speed);
            this.player.setFlipX(false);
          } else {
            this.player.setVelocityX(0);
          }

          if ((jump || this.touchJumpDown) && onGround) {
            this.player.setVelocityY(jumpVel);
            sndJump();
            this.jumpEmitter.explode(5);
            this.touchJumpDown = false; // prevent continuous jump
          }

          // Update number line marker
          const progress = this.player.x / this.levelWidth;
          this.nlMarker.x = 10 + progress * (W - 20);

          // Fall death
          if (this.player.y > H + 50) {
            this.lives--;
            this.updateHUD();
            if (this.lives <= 0) {
              this.gameOver();
            } else {
              sndDamage();
              this.player.setPosition(100, H - 120);
              this.player.setVelocity(0, 0);
            }
          }
        }

        // Override init for level progression
        init(data) {
          this.charColor = data.charColor || 0x38bdf8;
          this.level = data.level || 1;
          this.score = 0;
          this.lives = 3;
          this.combo = 0;
          this.maxCombo = 0;
          this.gemsCollected = 0;
          this.questionsAnswered = 0;
          this.questionsCorrect = 0;
          this.levelComplete = false;
          this.isQuestionActive = false;
          this.playerCanMove = true;
          this.isInvincible = false;
        }
      }

      // ============================================================
      // RESULTS SCENE
      // ============================================================
      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }

        init(data) {
          this.finalScore = data.score || 0;
          this.finalLevel = data.level || 1;
          this.gems = data.gems || 0;
          this.qCorrect = data.questionsCorrect || 0;
          this.qTotal = data.questionsTotal || 0;
          this.maxCombo = data.maxCombo || 0;
          this.charColor = data.charColor || 0x38bdf8;
          this.isGameOver = data.gameOver || false;
        }

        create() {
          this.cameras.main.setBackgroundColor("#0a0a2e");

          try {
            window.EduPulse &&
              EduPulse.record({
                activityTitle: document.title,
                score: this.qCorrect,
                maxScore: this.qTotal,
                problemsCorrect: this.qCorrect,
                problemsAttempted: this.qTotal,
                standard: "6.NS.C.3",
              });
          } catch (e) {}

          // Stars bg
          for (let i = 0; i < 60; i++) {
            this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.Between(1, 2),
              0xffffff,
              Phaser.Math.FloatBetween(0.05, 0.3),
            );
          }

          const title = this.isGameOver ? "GAME OVER" : "RESULTS";
          const titleColor = this.isGameOver ? "#f87171" : "#fbbf24";

          this.add
            .text(W / 2, 60, title, {
              fontSize: "44px",
              color: titleColor,
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 6,
            })
            .setOrigin(0.5);

          // Stats
          const stats = [
            ["Score", this.finalScore],
            ["Level Reached", this.finalLevel],
            ["Gems Collected", this.gems],
            ["Questions Correct", `${this.qCorrect}/${this.qTotal}`],
            ["Best Combo", `${this.maxCombo}x`],
            [
              "Accuracy",
              this.qTotal > 0
                ? Math.round((this.qCorrect / this.qTotal) * 100) + "%"
                : "N/A",
            ],
          ];

          stats.forEach((s, i) => {
            const y = 140 + i * 50;
            this.add.text(W / 2 - 150, y, s[0], {
              fontSize: "18px",
              color: "#94a3b8",
            });
            this.add
              .text(W / 2 + 150, y, `${s[1]}`, {
                fontSize: "22px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(1, 0);

            // Divider
            if (i < stats.length - 1) {
              this.add.rectangle(W / 2, y + 38, 350, 1, 0x1e293b);
            }
          });

          // Stars rating
          const pct = this.qTotal > 0 ? this.qCorrect / this.qTotal : 0;
          const starCount = pct >= 0.9 ? 3 : pct >= 0.6 ? 2 : 1;
          this.add
            .text(
              W / 2,
              450,
              "★".repeat(starCount) + "☆".repeat(3 - starCount),
              {
                fontSize: "40px",
                color: "#fbbf24",
              },
            )
            .setOrigin(0.5);

          // Buttons
          const playBtn = this.add
            .image(W / 2 - 120, 520, "btn")
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 - 120, 520, "Play Again", {
              fontSize: "18px",
              color: "#4ade80",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          playBtn.on("pointerdown", () => {
            this.scene.start("Game", { charColor: this.charColor });
          });

          const menuBtn = this.add
            .image(W / 2 + 120, 520, "btn")
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 + 120, 520, "Main Menu", {
              fontSize: "18px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          menuBtn.on("pointerdown", () => {
            this.scene.start("Title");
          });

          // ESOL tip
          this.add
            .text(
              W / 2,
              575,
              "Tip: |number| means distance from zero — always positive!",
              {
                fontSize: "13px",
                color: "#64748b",
              },
            )
            .setOrigin(0.5);

          this.cameras.main.fadeIn(500);
        }
      }
