      // ============================================================
      //  TEMPERATURE EXPLORER — 6.NS.C.5
      //  Understand positive/negative numbers in real-world contexts
      // ============================================================

      const W = 800,
        H = 600;
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      function synth(freq, dur, type = "square", vol = 0.1) {
        try {
          const o = audioCtx.createOscillator(),
            g = audioCtx.createGain();
          o.connect(g);
          g.connect(audioCtx.destination);
          o.frequency.value = freq;
          o.type = type;
          g.gain.setValueAtTime(vol, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(
            0.001,
            audioCtx.currentTime + dur,
          );
          o.start();
          o.stop(audioCtx.currentTime + dur);
        } catch (e) {}
      }
      function sndMove() {
        synth(300, 0.05);
      }
      function sndCollect() {
        synth(700, 0.08);
        setTimeout(() => synth(900, 0.1), 60);
      }
      function sndCorrect() {
        synth(523, 0.1);
        setTimeout(() => synth(659, 0.1), 80);
        setTimeout(() => synth(784, 0.15), 160);
      }
      function sndWrong() {
        synth(180, 0.3, "sawtooth", 0.15);
      }
      function sndLevelUp() {
        [523, 659, 784, 1047].forEach((f, i) =>
          setTimeout(() => synth(f, 0.1), i * 80),
        );
      }
      function sndFreeze() {
        synth(1200, 0.2, "sine", 0.08);
        synth(800, 0.3, "sine", 0.06);
      }
      function sndHeat() {
        synth(200, 0.2, "sawtooth", 0.1);
        synth(150, 0.3, "sawtooth", 0.08);
      }

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      // ============================================================
      // TITLE
      // ============================================================
      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          this.cameras.main.setBackgroundColor("#0b1628");

          // Gradient bg effect
          for (let i = 0; i < 80; i++) {
            const c = this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.Between(1, 3),
              i % 2 === 0 ? 0x38bdf8 : 0xef4444,
              Phaser.Math.FloatBetween(0.02, 0.15),
            );
            this.tweens.add({
              targets: c,
              alpha: { from: c.alpha, to: 0.02 },
              duration: Phaser.Math.Between(1500, 4000),

              repeat: -1,
            });

          this.add
            .text(W / 2, 80, "TEMPERATURE", {

              color: "#38bdf8",
              stroke: "#0b1628",

          this.add
            .text(W / 2, 135, "EXPLORER", {
              fontSize: "56px",
              fontStyle: "bold",
              color: "#ef4444",
              stroke: "#0b1628",
              strokeThickness: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(
              W / 2,
              180,
              "6.NS.C.5 — Positive & Negative in the Real World",
              {
                fontSize: "15px",
                color: "#94a3b8",
              },
            )
            .setOrigin(0.5);

          // Animated thermo
          const th = this.add.image(W / 2, 280, "thermo").setScale(3);
          this.tweens.add({
            targets: th,
            y: 270,
            duration: 1200,
            yoyo: true,
            repeat: -1,
            ease: "Sine.InOut",
          });

          // Snow/fire particles
          for (let i = 0; i < 6; i++) {
            const sn = this.add
              .image(
                Phaser.Math.Between(50, 380),
                Phaser.Math.Between(230, 340),
                "snow",
              )
              .setScale(1.5)
              .setAlpha(0.4);
            this.tweens.add({
              targets: sn,
              y: sn.y + 20,
              alpha: 0,
              duration: 2000 + i * 300,
              repeat: -1,
            });
          }
          for (let i = 0; i < 6; i++) {
            const fr = this.add
              .image(
                Phaser.Math.Between(420, 750),
                Phaser.Math.Between(230, 340),
                "fire_p",
              )
              .setScale(1.5)
              .setAlpha(0.4);
            this.tweens.add({
              targets: fr,
              y: fr.y - 20,
              alpha: 0,
              duration: 1500 + i * 200,
              repeat: -1,
            });
          }

          // Mode select
          this.add
            .text(W / 2, 380, "Choose your mode:", {
              fontSize: "18px",
              color: "#e2e8f0",
            })
            .setOrigin(0.5);

          const modes = [
            {
              name: "Explorer Mode",
              desc: "Navigate hot & cold zones",
              icon: "thermo",
            },
            {
              name: "Challenge Mode",
              desc: "Answer questions for speed",
              icon: "coin",
            },
            {
              name: "Survival Mode",
              desc: "How long can you last?",
              icon: "heart",
            },
          ];

          this.selectedMode = 0;
          this.modeButtons = [];

          modes.forEach((m, i) => {
            const x = W / 2 - 220 + i * 220;
            const bg = this.add
              .image(x, 440, "btn")
              .setScale(0.9)
              .setInteractive({ useHandCursor: true });
            const txt = this.add
              .text(x, 432, m.name, {
                fontSize: "14px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(0.5);
            const desc = this.add
              .text(x, 452, m.desc, { fontSize: "10px", color: "#94a3b8" })
              .setOrigin(0.5);

            bg.on("pointerdown", () => {
              this.selectedMode = i;
              this.modeButtons.forEach((b, j) =>
                b.bg.setTint(j === i ? 0x4ade80 : 0xffffff),
              );
              synth(400 + i * 100, 0.1);
            });
            bg.on("pointerover", () => bg.setScale(0.95));
            bg.on("pointerout", () => bg.setScale(0.9));
            this.modeButtons.push({ bg, txt });
          });
          this.modeButtons[0].bg.setTint(0x4ade80);

          // Start
          const startBtn = this.add
            .image(W / 2, 530, "btn")
            .setScale(1.2)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2, 530, "START EXPLORING", {
              fontSize: "20px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5);

          this.tweens.add({
            targets: startBtn,
            scaleX: 1.25,
            scaleY: 1.25,
            duration: 800,
            yoyo: true,
            repeat: -1,
            ease: "Sine.InOut",
          });

          startBtn.on("pointerdown", () => {
            synth(600, 0.1);
            setTimeout(() => synth(800, 0.15), 80);
            this.cameras.main.fadeOut(400);
            this.time.delayedCall(400, () => {
              this.scene.start("Game", { mode: this.selectedMode });
            });
          });

          this.add
            .text(
              W / 2,
              580,
              "Arrow keys or touch to move  |  Explore temperature zones!",
              {
                fontSize: "12px",
                color: "#64748b",
              },
            )
            .setOrigin(0.5);

          this.cameras.main.fadeIn(500);
        }
      }

      // ============================================================
      // GAME SCENE
      // ============================================================
      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }

        init(data) {
          this.mode = data.mode || 0;
          this.score = 0;
          this.lives = 3;
          this.level = 1;
          this.combo = 0;
          this.maxCombo = 0;
          this.temperature = 0; // player's current temp
          this.coinsCollected = 0;
          this.questionsCorrect = 0;
          this.questionsTotal = 0;
          this.questionActive = false;
          this.canMove = true;
          this.timeLeft = 90;
          this.zonesExplored = 0;
        }

        create() {
          if (audioCtx.state === "suspended") audioCtx.resume();
          this.cameras.main.setBackgroundColor("#0b1628");

          // World size
          this.worldW = 2400;
          this.worldH = H;

          // BG particles
          for (let i = 0; i < 40; i++) {
            const c = this.add.circle(
              Phaser.Math.Between(0, this.worldW),
              Phaser.Math.Between(0, H),
              Phaser.Math.Between(1, 2),
              0xffffff,
              Phaser.Math.FloatBetween(0.02, 0.12),
            );
          }

          // Build temperature zones
          this.buildWorld();

          // Player
          this.player = this.physics.add
            .sprite(120, H - 100, "thermo")
            .setScale(1.8);
          this.player.setCollideWorldBounds(true);
          this.player.body.setSize(14, 36);
          this.player.setGravityY(400);
          this.player.setDepth(10);

          // Trail particles
          this.trailEmitter = this.add.particles(0, 0, "particle", {
            follow: this.player,
            followOffset: { y: 18 },
            lifespan: 400,
            speed: { min: 5, max: 20 },
            scale: { start: 0.8, end: 0 },
            frequency: -1,
            quantity: 3,
          });

          // Collisions
          this.physics.add.collider(this.player, this.platforms);
          this.physics.add.overlap(
            this.player,
            this.hotZones,
            this.enterHotZone,
            null,
            this,
          );
          this.physics.add.overlap(
            this.player,
            this.coldZones,
            this.enterColdZone,
            null,
            this,
          );
          this.physics.add.overlap(
            this.player,
            this.coins,
            this.collectCoin,
            null,
            this,
          );
          this.physics.add.overlap(
            this.player,
            this.checkpoints,
            this.hitCheckpoint,
            null,
            this,
          );

          // Controls
          this.cursors = this.input.keyboard.createCursorKeys();
          this.wasd = this.input.keyboard.addKeys("W,A,S,D");
          this.spaceBar = this.input.keyboard.addKey(
            Phaser.Input.Keyboard.KeyCodes.SPACE,
          );

          // Camera
          this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
          this.cameras.main.setBounds(0, 0, this.worldW, H);
          this.physics.world.setBounds(0, 0, this.worldW, H);

          // HUD
          this.createHUD();

          // Touch
          this.createTouchControls();

          // Timer
          this.timerEvent = this.time.addEvent({
            delay: 1000,
            callback: () => {
              this.timeLeft--;
              this.updateHUD();
              if (this.timeLeft <= 0) this.endGame();
            },
            loop: true,
          });

          // Snowfall in cold areas, ember in hot areas (ambient)
          this.snowEmitter = this.add.particles(0, 0, "snow", {
            x: { min: 0, max: this.worldW },
            y: -10,
            lifespan: 4000,
            speedY: { min: 20, max: 50 },
            speedX: { min: -10, max: 10 },
            scale: { start: 0.6, end: 0 },
            alpha: { start: 0.4, end: 0 },
            frequency: 300,
            quantity: 1,
          });

          this.fireEmitter = this.add.particles(0, 0, "fire_p", {
            x: { min: 0, max: this.worldW },
            y: H + 10,
            lifespan: 3000,
            speedY: { min: -30, max: -60 },
            scale: { start: 0.5, end: 0 },
            alpha: { start: 0.3, end: 0 },
            frequency: 500,
            quantity: 1,
          });

          this.cameras.main.fadeIn(500);
          this.showLevelIntro();
        }

        buildWorld() {
          this.platforms = this.physics.add.staticGroup();
          this.hotZones = this.physics.add.staticGroup();
          this.coldZones = this.physics.add.staticGroup();
          this.coins = this.physics.add.group();
          this.checkpoints = this.physics.add.staticGroup();

          // Ground
          for (let x = 0; x < this.worldW; x += 80) {
            const segType = Math.floor(x / 400);
            const tex =
              segType % 3 === 0
                ? "plat"
                : segType % 3 === 1
                  ? "ice_plat"
                  : "lava_plat";
            this.platforms.create(x + 40, H - 10, tex);
          }

          // Temperature zones
          const zoneCount = 8 + this.level * 2;
          for (let i = 0; i < zoneCount; i++) {
            const x = 200 + i * Phaser.Math.Between(150, 250);
            const isHot = Math.random() > 0.5;
            const zoneY = H - 60;

            if (isHot) {
              const z = this.hotZones.create(x, zoneY, "hot_zone");
              z.setAlpha(0.5);
              // Label
              const temp = Phaser.Math.Between(10, 50);
              this.add
                .text(x, zoneY - 50, `+${temp}°`, {
                  fontSize: "16px",
                  color: "#ef4444",
                  fontStyle: "bold",
                  stroke: "#000",
                  strokeThickness: 3,
                })
                .setOrigin(0.5);
              z.tempValue = temp;
            } else {
              const z = this.coldZones.create(x, zoneY, "cold_zone");
              z.setAlpha(0.5);
              const temp = Phaser.Math.Between(-50, -5);
              this.add
                .text(x, zoneY - 50, `${temp}°`, {
                  fontSize: "16px",
                  color: "#38bdf8",
                  fontStyle: "bold",
                  stroke: "#000",
                  strokeThickness: 3,
                })
                .setOrigin(0.5);
              z.tempValue = temp;
            }

            // Platforms above
            if (Math.random() > 0.4) {
              const py = Phaser.Math.Between(H - 200, H - 100);
              this.platforms.create(x, py, "plat");

              // Coin on platform
              if (Math.random() > 0.3) {
                const c = this.coins.create(x, py - 24, "coin").setScale(1.5);
                c.body.allowGravity = false;
                c.value = Phaser.Math.Between(1, 5) * 10;
                this.tweens.add({
                  targets: c,
                  y: c.y - 8,
                  duration: 600 + Math.random() * 400,
                  yoyo: true,
                  repeat: -1,
                  ease: "Sine.InOut",
                });
              }
            }
          }

          // Checkpoints (question triggers)
          const cpSpacing = this.worldW / 6;
          for (let i = 1; i <= 4; i++) {
            const cx = i * cpSpacing;
            const cp = this.checkpoints.create(cx, H - 40, "coin").setScale(2);
            cp.setTint(0xc084fc);
            cp.triggered = false;
            this.add
              .text(cx, H - 80, "?", {
                fontSize: "28px",
                color: "#c084fc",
                fontStyle: "bold",
                stroke: "#000",
                strokeThickness: 4,
              })
              .setOrigin(0.5);

            // Glow
            const glow = this.add.circle(cx, H - 40, 20, 0xc084fc, 0.15);
            this.tweens.add({
              targets: glow,
              scale: 2,
              alpha: 0,
              duration: 1200,
              repeat: -1,
            });
          }
        }

        enterHotZone(player, zone) {
          if (!zone.active) return;
          const prev = this.temperature;
          this.temperature = Math.min(100, this.temperature + 0.3);
          if (
            Math.floor(prev) !== Math.floor(this.temperature) &&
            Math.floor(this.temperature) % 5 === 0
          ) {
            this.score += 5;
          }
          this.player.setTint(this.getTempTint());
          this.trailEmitter.setParticleTint(0xef4444);
          this.trailEmitter.explode(2);
          this.updateHUD();
        }

        enterColdZone(player, zone) {
          if (!zone.active) return;
          const prev = this.temperature;
          this.temperature = Math.max(-100, this.temperature - 0.3);
          if (
            Math.floor(prev) !== Math.floor(this.temperature) &&
            Math.floor(this.temperature) % 5 === 0
          ) {
            this.score += 5;
          }
          this.player.setTint(this.getTempTint());
          this.trailEmitter.setParticleTint(0x38bdf8);
          this.trailEmitter.explode(2);
          this.updateHUD();
        }

        getTempTint() {
          if (this.temperature > 30) return 0xef4444;
          if (this.temperature > 10) return 0xfb923c;
          if (this.temperature > -10) return 0xffffff;
          if (this.temperature > -30) return 0x93c5fd;
          return 0x38bdf8;
        }

        collectCoin(player, coin) {
          sndCollect();
          this.coinsCollected++;
          this.score += coin.value;
          const ft = this.add
            .text(coin.x, coin.y - 20, `+${coin.value}`, {
              fontSize: "16px",
              color: "#fbbf24",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 3,
            })
            .setOrigin(0.5)
            .setDepth(50);
          this.tweens.add({
            targets: ft,
            y: ft.y - 30,
            alpha: 0,
            duration: 700,
            onComplete: () => ft.destroy(),
          });
          this.add
            .particles(coin.x, coin.y, "particle", {
              speed: { min: 40, max: 120 },
              scale: { start: 1, end: 0 },
              lifespan: 300,
              quantity: 8,
              tint: 0xfbbf24,
              emitting: false,
            })
            .explode(8);
          coin.destroy();
          this.updateHUD();
        }

        hitCheckpoint(player, cp) {
          if (cp.triggered) return;
          cp.triggered = true;
          cp.setAlpha(0.3);
          this.showQuestion();
        }

        showQuestion() {
          this.questionActive = true;
          this.canMove = false;
          this.player.setVelocity(0, 0);

          const questions = genQuestions(this.level);
          const q = questions[0];

          // Overlay
          this.qOverlay = this.add
            .rectangle(W / 2, H / 2, W, H, 0x000000, 0.85)
            .setScrollFactor(0)
            .setDepth(600);
          this.qElements = [];

          // Category label
          const catColors = {
            temp: "#ef4444",
            elev: "#38bdf8",
            money: "#fbbf24",
            opp: "#c084fc",
            tf: "#4ade80",
          };
          const catNames = {
            temp: "Temperature",
            elev: "Elevation",
            money: "Money",
            opp: "Opposites",
            tf: "True/False",
          };

          const catLabel = this.add
            .text(W / 2, 95, catNames[q.cat] || "Question", {
              fontSize: "14px",
              color: catColors[q.cat] || "#94a3b8",
              fontStyle: "bold",
              letterSpacing: 2,
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(601);
          this.qElements.push(catLabel);

          // Calculate dynamic range and steps
          let maxAbs = Math.max(Math.abs(q.ans), 10);
          q.opts.forEach(o => maxAbs = Math.max(maxAbs, Math.abs(o)));
          
          let qRange = 10;
          let snapStep = 1;
          if (maxAbs > 1000) {
            qRange = 3000;
            snapStep = 100;
          } else if (maxAbs > 500) {
            qRange = 1000;
            snapStep = 50;
          } else if (maxAbs > 200) {
            qRange = 500;
            snapStep = 20;
          } else if (maxAbs > 100) {
            qRange = 300;
            snapStep = 10;
          } else if (maxAbs > 50) {
            qRange = 150;
            snapStep = 5;
          } else if (maxAbs > 20) {
            qRange = 80;
            snapStep = 2;
          } else if (maxAbs > 10) {
            qRange = 20;
            snapStep = 1;
          } else {
            qRange = 10;
            snapStep = 1;
          }

          const tw = 480;
          const nlY = 175;

          // Draw visual thermometer line
          this.drawQuestionThermo(nlY, q, this.qElements, qRange, tw);

          // Question Text
          const qText = this.add
            .text(W / 2, 260, q.q, {
              fontSize: "22px",
              color: "#e2e8f0",
              fontStyle: "bold",
              wordWrap: { width: 600 },
              align: "center",
              stroke: "#000",
              strokeThickness: 4,
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(601);
          this.qElements.push(qText);

          // Drag Selector (starts at 0)
          const selectorCont = this.add.container(W / 2, nlY).setDepth(605).setScrollFactor(0);
          this.qElements.push(selectorCont);

          const pointer = this.add.graphics();
          pointer.fillStyle(0xfbbf24, 1);
          pointer.fillCircle(0, 0, 9);
          pointer.lineStyle(2, 0x000000, 0.5);
          pointer.strokeCircle(0, 0, 9);
          selectorCont.add(pointer);

          const valText = this.add.text(0, -24, "0", {
            fontSize: "18px",
            fontFamily: "Segoe UI, Arial, sans-serif",
            fontStyle: "bold",
            color: "#fbbf24",
            stroke: "#000000",
            strokeThickness: 3
          }).setOrigin(0.5);
          selectorCont.add(valText);

          // Make draggable
          const hitArea = new Phaser.Geom.Circle(0, 0, 20);
          selectorCont.setInteractive(hitArea, Phaser.Geom.Circle.Contains);
          this.input.setDraggable(selectorCont);

          const updateSelectorFromValue = (v) => {
            const currentVal = Phaser.Math.Clamp(v, -qRange, qRange);
            const snappedX = W / 2 + (currentVal / qRange) * (tw / 2 - 20);
            selectorCont.x = snappedX;
            valText.setText(String(currentVal));
            sndMove();
          };

          selectorCont.on('drag', (pointer, dragX, dragY) => {
            const minX = W / 2 - (tw / 2 - 20);
            const maxX = W / 2 + (tw / 2 - 20);
            const clampedX = Phaser.Math.Clamp(dragX, minX, maxX);
            // Translate position to value snapped to snapStep
            const rawVal = ((clampedX - (W / 2)) / (tw / 2 - 20)) * qRange;
            const snappedVal = Math.round(rawVal / snapStep) * snapStep;
            updateSelectorFromValue(snappedVal);
          });

          // Click zone to position selector
          const clickZone = this.add.rectangle(W / 2, nlY, tw + 40, 50, 0x000000, 0.001)
            .setScrollFactor(0)
            .setDepth(601)
            .setInteractive({ useHandCursor: true });
          this.qElements.push(clickZone);

          clickZone.on('pointerdown', (pointer) => {
            const minX = W / 2 - (tw / 2 - 20);
            const maxX = W / 2 + (tw / 2 - 20);
            const clampedX = Phaser.Math.Clamp(pointer.x, minX, maxX);
            const rawVal = ((clampedX - (W / 2)) / (tw / 2 - 20)) * qRange;
            const snappedVal = Math.round(rawVal / snapStep) * snapStep;
            updateSelectorFromValue(snappedVal);
          });

          // Submit Button
          const submitBtn = this.add
            .image(W / 2, 360, "btn")
            .setScale(1.1)
            .setScrollFactor(0)
            .setDepth(601)
            .setInteractive({ useHandCursor: true });
          const submitTxt = this.add
            .text(W / 2, 360, "SUBMIT ANSWER", {
              fontSize: "18px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setScrollFactor(0)
            .setDepth(602);
          this.qElements.push(submitBtn, submitTxt);

          // Keyboard listeners
          const onKeyDown = (event) => {
            if (!this.questionActive) return;
            const currentVal = parseInt(valText.text, 10);
            if (event.key === "ArrowLeft" || event.key === "a" || event.key === "A") {
              event.preventDefault();
              updateSelectorFromValue(currentVal - snapStep);
            } else if (event.key === "ArrowRight" || event.key === "d" || event.key === "D") {
              event.preventDefault();
              updateSelectorFromValue(currentVal + snapStep);
            } else if (event.key === "Enter") {
              event.preventDefault();
              submitAnswer();
            }
          };
          this.input.keyboard.on("keydown", onKeyDown);

          const submitAnswer = () => {
            this.input.keyboard.off("keydown", onKeyDown);
            if (selectorCont.input) selectorCont.disableInteractive();
            if (clickZone.input) clickZone.disableInteractive();
            if (submitBtn.input) submitBtn.disableInteractive();

            this.questionsTotal++;
            const chosenVal = parseInt(valText.text, 10);
            const isCorrect = chosenVal === q.ans;

            if (isCorrect) {
              sndCorrect();
              valText.setColor("#4ade80");
              pointer.clear();
              pointer.fillStyle(0x4ade80, 1);
              pointer.fillCircle(0, 0, 9);
              pointer.lineStyle(2, 0x000000, 0.5);
              pointer.strokeCircle(0, 0, 9);

              this.questionsCorrect++;
              this.combo++;
              if (this.combo > this.maxCombo) this.maxCombo = this.combo;
              const pts = 200 * this.combo;
              this.score += pts;

              const fb = this.add
                .text(W / 2, 430, `Correct! +${pts}`, {
                  fontSize: "20px",
                  color: "#4ade80",
                  fontStyle: "bold",
                  stroke: "#000000",
                  strokeThickness: 3
                })
                .setOrigin(0.5)
                .setScrollFactor(0)
                .setDepth(601);
              this.qElements.push(fb);
            } else {
              sndWrong();
              valText.setColor("#f87171");
              pointer.clear();
              pointer.fillStyle(0xf87171, 1);
              pointer.fillCircle(0, 0, 9);
              pointer.lineStyle(2, 0x000000, 0.5);
              pointer.strokeCircle(0, 0, 9);

              this.combo = 0;
              this.lives--;

              // Draw correct marker
              const correctX = W / 2 + (q.ans / qRange) * (tw / 2 - 20);
              const correctMarker = this.add.circle(correctX, nlY, 7, 0x4ade80)
                .setScrollFactor(0)
                .setDepth(604);
              const correctLabel = this.add.text(correctX, nlY + 18, `Correct: ${q.ans}`, {
                fontSize: "12px",
                color: "#4ade80",
                fontStyle: "bold",
                stroke: "#000000",
                strokeThickness: 3
              }).setOrigin(0.5, 0).setDepth(604).setScrollFactor(0);
              this.qElements.push(correctMarker, correctLabel);

              const fb = this.add
                .text(W / 2, 430, `Incorrect. Answer is ${q.ans}`, {
                  fontSize: "20px",
                  color: "#f87171",
                  fontStyle: "bold",
                  stroke: "#000000",
                  strokeThickness: 3
                })
                .setOrigin(0.5)
                .setScrollFactor(0)
                .setDepth(601);
              this.qElements.push(fb);
            }

            // Explanation
            const exp = this.add
              .text(W / 2, 475, this.getExplanation(q), {
                fontSize: "14px",
                color: "#94a3b8",
                wordWrap: { width: 540 },
                align: "center",
                stroke: "#000000",
                strokeThickness: 3
              })
              .setOrigin(0.5)
              .setScrollFactor(0)
              .setDepth(601);
            this.qElements.push(exp);

            this.updateHUD();

            this.time.delayedCall(2800, () => {
              this.qElements.forEach((e) => e.destroy());
              this.qOverlay.destroy();
              this.questionActive = false;
              this.canMove = true;
              if (this.lives <= 0) this.endGame();
            });
          };

          submitBtn.on("pointerdown", () => {
            submitAnswer();
          });

          submitBtn.on("pointerover", () => submitBtn.setScale(1.15));
          submitBtn.on("pointerout", () => submitBtn.setScale(1.1));

          // Guide line
          const guideTxt = this.add.text(W / 2, 310, "Drag scale pointer or Tap  |  Use ←/→ and ENTER keys", {
            fontSize: "12px",
            color: "#94a3b8",
            fontStyle: "italic"
          }).setOrigin(0.5).setScrollFactor(0).setDepth(601);
          this.qElements.push(guideTxt);
        }

        getExplanation(q) {
          if (q.cat === "temp") {
            if (q.ans < 0)
              return '"Below zero" means NEGATIVE. Move LEFT on the number line.';
            if (q.ans > 0)
              return '"Above zero" means POSITIVE. Move RIGHT on the number line.';
            return "Zero is the reference point between positive and negative.";
          }
          if (q.cat === "elev") {
            if (q.ans < 0) return '"Below sea level" means NEGATIVE elevation.';
            if (q.ans > 0) return '"Above sea level" means POSITIVE elevation.';
            return "Sea level = 0. It separates above (+) from below (-).";
          }
          if (q.cat === "money") {
            if (q.ans < 0)
              return "Spending, debt, or withdrawal = NEGATIVE (money goes out).";
            if (q.ans > 0)
              return "Earning, deposit, or credit = POSITIVE (money comes in).";
            return "Zero balance means no money owed and no money saved.";
          }
          if (q.cat === "opp")
            return "Opposite numbers are the SAME distance from 0 but on different sides.";
          return "";
        }

        drawQuestionThermo(y, q, container, qRange, tw = 400) {
          // Horizontal thermometer line
          const bg = this.add
            .rectangle(W / 2, y, tw, 12, 0x1e293b)
            .setScrollFactor(0)
            .setDepth(601);
          container.push(bg);

          // Zero marker
          const zero = this.add
            .rectangle(W / 2, y, 2, 20, 0xfbbf24)
            .setScrollFactor(0)
            .setDepth(601);
          container.push(zero);
          const zLabel = this.add
            .text(W / 2, y + 16, "0", { fontSize: "11px", color: "#fbbf24" })
            .setOrigin(0.5, 0)
            .setScrollFactor(0)
            .setDepth(601);
          container.push(zLabel);

          // Draw tick marks at +/- half range and end points
          const ticks = [-qRange, -Math.round(qRange / 2), Math.round(qRange / 2), qRange];
          ticks.forEach(v => {
            const px = W / 2 + (v / qRange) * (tw / 2 - 20);
            const tick = this.add
              .rectangle(px, y, 1, 12, 0x64748b)
              .setScrollFactor(0)
              .setDepth(601);
            container.push(tick);
            const lbl = this.add
              .text(px, y + 16, `${v > 0 ? '+' : ''}${v}`, { fontSize: "10px", color: "#64748b" })
              .setOrigin(0.5, 0)
              .setScrollFactor(0)
              .setDepth(601);
            container.push(lbl);
          });

          // -/+ labels
          const neg = this.add
            .text(W / 2 - tw / 2, y - 18, "NEGATIVE (-)", {
              fontSize: "10px",
              color: "#38bdf8",
              fontStyle: "bold"
            })
            .setScrollFactor(0)
            .setDepth(601);
          const pos = this.add
            .text(W / 2 + tw / 2, y - 18, "POSITIVE (+)", {
              fontSize: "10px",
              color: "#ef4444",
              fontStyle: "bold"
            })
            .setOrigin(1, 0)
            .setScrollFactor(0)
            .setDepth(601);
          container.push(neg, pos);
        }

        updateHUD() {
          this.scoreText.setText(`Score: ${this.score}`);
          this.tempText.setText(`Temp: ${Math.round(this.temperature)}°`);
          this.timerText.setText(`Time: ${this.timeLeft}s`);
          if (this.combo > 1) this.comboText.setText(`${this.combo}x Combo!`);
          else this.comboText.setText("");

          for (let i = 0; i < 3; i++)
            this.heartIcons[i].setAlpha(i < this.lives ? 1 : 0.2);

          // Thermometer gauge
          const h = (Math.abs(this.temperature) / 100) * 160;
          const col = this.temperature >= 0 ? 0xef4444 : 0x38bdf8;
          this.thermoFill.setSize(16, h);
          this.thermoFill.y = H / 2 + 90 - h;
          this.thermoFill.fillColor = col;
          this.thermoLabel.setText(`${Math.round(this.temperature)}°`);
        }

        endGame() {
          this.canMove = false;
          this.timerEvent.destroy();
          this.cameras.main.fadeOut(500);
          this.time.delayedCall(500, () => {
            this.scene.start("Results", {
              score: this.score,
              level: this.level,
              coins: this.coinsCollected,
              qCorrect: this.questionsCorrect,
              qTotal: this.questionsTotal,
              maxCombo: this.maxCombo,
              tempReached: Math.round(this.temperature),
              mode: this.mode,
            });
          });
        }

        update() {
          if (!this.canMove || this.questionActive) {
            this.player.setVelocityX(0);
            return;
          }

          const onGround =
            this.player.body.touching.down || this.player.body.blocked.down;
          const speed = 200;
          const left =
            this.cursors.left.isDown || this.wasd.A.isDown || this.tL;
          const right =
            this.cursors.right.isDown || this.wasd.D.isDown || this.tR;
          const jump =
            Phaser.Input.Keyboard.JustDown(this.spaceBar) ||
            Phaser.Input.Keyboard.JustDown(this.cursors.up) ||
            Phaser.Input.Keyboard.JustDown(this.wasd.W);

          if (left) {
            this.player.setVelocityX(-speed);
            this.player.setFlipX(true);
          } else if (right) {
            this.player.setVelocityX(speed);
            this.player.setFlipX(false);
          } else this.player.setVelocityX(0);

          if ((jump || this.tJ) && onGround) {
            this.player.setVelocityY(-400);
            sndMove();
            this.trailEmitter.explode(4);
            this.tJ = false;
          }

          // Gradually normalize temperature
          if (this.temperature > 0)
            this.temperature = Math.max(0, this.temperature - 0.02);
          if (this.temperature < 0)
            this.temperature = Math.min(0, this.temperature + 0.02);
          this.player.setTint(this.getTempTint());

          // Auto-end when reaching far right
          if (this.player.x > this.worldW - 80) {
            sndLevelUp();
            this.level++;
            this.score += 500;
            this.canMove = false;
            this.cameras.main.fadeOut(500);
            this.time.delayedCall(500, () => {
              this.scene.restart({ mode: this.mode, level: this.level });
            });
          }
        }

        init(data) {
          this.mode = data.mode || 0;
          this.level = data.level || 1;
          this.score = 0;
          this.lives = 3;
          this.combo = 0;
          this.maxCombo = 0;
          this.temperature = 0;
          this.coinsCollected = 0;
          this.questionsCorrect = 0;
          this.questionsTotal = 0;
          this.questionActive = false;
          this.canMove = true;
          this.timeLeft = 90 + this.level * 10;
        }
      }

      // ============================================================
      // RESULTS
      // ============================================================
      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }
        init(data) {
          this.data = data;
        }
        create() {
          this.cameras.main.setBackgroundColor("#0b1628");

          try {
            window.EduPulse &&
              EduPulse.record({
                activityTitle: document.title,
                score: this.data.qCorrect,
                maxScore: this.data.qTotal,
                problemsCorrect: this.data.qCorrect,
                problemsAttempted: this.data.qTotal,
                standard: "6.NS.C.5",
              });
          } catch (e) {}

          for (let i = 0; i < 50; i++) {
            this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.Between(1, 2),
              0xffffff,
              Phaser.Math.FloatBetween(0.03, 0.15),
            );
          }

          this.add
            .text(W / 2, 50, "RESULTS", {
              fontSize: "44px",
              color: "#fbbf24",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 6,
            })
            .setOrigin(0.5);

          // Big thermometer visual
          const temp = this.data.tempReached || 0;
          const tempColor = temp >= 0 ? "#ef4444" : "#38bdf8";
          this.add
            .text(W / 2, 110, `Final Temp: ${temp}°`, {
              fontSize: "28px",
              color: tempColor,
              fontStyle: "bold",
            })
            .setOrigin(0.5);

          const stats = [
            ["Score", this.data.score],
            ["Level", this.data.level],
            ["Coins", this.data.coins],
            ["Questions", `${this.data.qCorrect}/${this.data.qTotal}`],
            ["Best Combo", `${this.data.maxCombo}x`],
            [
              "Accuracy",
              this.data.qTotal > 0
                ? Math.round((this.data.qCorrect / this.data.qTotal) * 100) +
                  "%"
                : "N/A",
            ],
          ];

          stats.forEach((s, i) => {
            const y = 170 + i * 46;
            this.add.text(W / 2 - 140, y, s[0], {
              fontSize: "16px",
              color: "#94a3b8",
            });
            this.add
              .text(W / 2 + 140, y, `${s[1]}`, {
                fontSize: "20px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(1, 0);
            if (i < stats.length - 1)
              this.add.rectangle(W / 2, y + 34, 320, 1, 0x1e293b);
          });

          // Stars
          const pct =
            this.data.qTotal > 0 ? this.data.qCorrect / this.data.qTotal : 0;
          const stars = pct >= 0.85 ? 3 : pct >= 0.6 ? 2 : 1;
          this.add
            .text(W / 2, 460, "★".repeat(stars) + "☆".repeat(3 - stars), {
              fontSize: "36px",
              color: "#fbbf24",
            })
            .setOrigin(0.5);

          // Key concepts recap
          this.add
            .text(
              W / 2,
              505,
              "Remember: Positive = above/gain/right | Negative = below/loss/left | Zero = reference",
              {
                fontSize: "12px",
                color: "#64748b",
                wordWrap: { width: 600 },
                align: "center",
              },
            )
            .setOrigin(0.5);

          // Buttons
          const playBtn = this.add
            .image(W / 2 - 120, 555, "btn")
            .setScale(0.9)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 - 120, 555, "Play Again", {
              fontSize: "16px",
              color: "#4ade80",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          playBtn.on("pointerdown", () =>
            this.scene.start("Game", { mode: this.data.mode }),
          );

          const menuBtn = this.add
            .image(W / 2 + 120, 555, "btn")
            .setScale(0.9)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 + 120, 555, "Main Menu", {
              fontSize: "16px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          menuBtn.on("pointerdown", () => this.scene.start("Title"));

          // Confetti
          for (let i = 0; i < 20; i++) {
            const c = this.add.circle(
              Phaser.Math.Between(50, W - 50),
              -10,
              Phaser.Math.Between(3, 6),
              Phaser.Math.RND.pick([
                0x38bdf8, 0xef4444, 0xfbbf24, 0x4ade80, 0xc084fc,
              ]),
            );
            this.tweens.add({
              targets: c,
              y: H + 20,
              x: c.x + Phaser.Math.Between(-80, 80),
              duration: Phaser.Math.Between(1500, 3000),
              delay: Phaser.Math.Between(0, 400),
            });
          }

          this.cameras.main.fadeIn(500);
        }
      }

      // ============================================================
      // CONFIG
      // ============================================================
      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: "game-container",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        physics: {
          default: "arcade",
          arcade: { gravity: { y: 500 }, debug: false },
        },
        scene: [BootScene, TitleScene, GameScene, ResultsScene],
        input: { activePointers: 3 },
      };

      new Phaser.Game(config);
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
  <script src="/shared/save-resume/save-resume-engine.js" defer></script>
  <!-- nsr-injected:end -->
  <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
  <script src="/assets/game-fx.js" defer></script>
  <!-- gfx-injected:end -->
</body>
</html>
