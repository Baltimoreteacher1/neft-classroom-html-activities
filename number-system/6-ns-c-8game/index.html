<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>City Builder — 6.NS.C.8</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
      // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror
      // (document.write blocks parsing so the mirror is ready before the game script runs).
      if (typeof Phaser === "undefined") {
        document.write(
          '<script src="https://unpkg.com/phaser@3.80.1/dist/phaser.min.js"><\/script>',
        );
      }
      // If both CDNs are unreachable, show a clear message instead of a blank page.
      window.addEventListener("load", function () {
        if (typeof Phaser === "undefined") {
          document.body.innerHTML =
            '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">\u26a0\ufe0f This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
        }
      });
    </script>
    <style>

        padding: 0;

      }

      canvas {

      }
    </style>

</head>
  <body>
    <div id="game-container"></div>
    <script>
      // ============================================================
      //  CITY BUILDER — 6.NS.C.8
      //  Solve problems by graphing in all four quadrants
      // ============================================================

      const W = 800,
        H = 600;
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      function synth(f, d, t = "square", v = 0.1) {
        try {
          const o = audioCtx.createOscillator(),
            g = audioCtx.createGain();
          o.connect(g);
          g.connect(audioCtx.destination);
          o.frequency.value = f;
          o.type = t;
          g.gain.setValueAtTime(v, audioCtx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
          o.start();
          o.stop(audioCtx.currentTime + d);
        } catch (e) {}
      }
      function sndPlace() {
        synth(500, 0.08);
        setTimeout(() => synth(700, 0.1), 60);
      }
      function sndCorrect() {
        synth(523, 0.1);
        setTimeout(() => synth(659, 0.1), 80);
        setTimeout(() => synth(784, 0.15), 160);
      }
      function sndWrong() {
        synth(150, 0.3, "sawtooth", 0.12);
      }
      function sndBuild() {
        synth(300, 0.05);
        setTimeout(() => synth(400, 0.05), 40);
        setTimeout(() => synth(500, 0.08), 80);
      }
      function sndLevelUp() {
        [523, 659, 784, 1047].forEach((f, i) =>
          setTimeout(() => synth(f, 0.1), i * 80),
        );
      }
      function sndConnect() {
        synth(440, 0.06);
        setTimeout(() => synth(550, 0.06), 50);
      }

      function shuffle(a) {
        const b = [...a];
        for (let i = b.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [b[i], b[j]] = [b[j], b[i]];
        }
        return b;
      }

      // Building types
      const BUILDINGS = [
        { name: "School", emoji: "🏫", color: 0x4ade80, points: 100 },
        { name: "Hospital", emoji: "🏥", color: 0xef4444, points: 120 },
        { name: "Fire Station", emoji: "🚒", color: 0xf97316, points: 110 },
        { name: "Library", emoji: "📚", color: 0x8b5cf6, points: 90 },
        { name: "Park", emoji: "🌳", color: 0x22c55e, points: 80 },
        { name: "Store", emoji: "🏪", color: 0xfbbf24, points: 85 },
        { name: "Police", emoji: "🚔", color: 0x3b82f6, points: 105 },
        { name: "Power Plant", emoji: "⚡", color: 0xeab308, points: 130 },
        { name: "Water Tower", emoji: "💧", color: 0x06b6d4, points: 95 },
        { name: "Apartment", emoji: "🏢", color: 0x6366f1, points: 75 },
        { name: "Restaurant", emoji: "🍕", color: 0xec4899, points: 70 },
        { name: "Gym", emoji: "🏋️", color: 0x14b8a6, points: 65 },
      ];

      // ============================================================
      // BOOT
      // ============================================================
      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          const g = this.make.graphics({ add: false });

          // Grid cell
          g.fillStyle(0x1e293b, 0.3);
          g.fillRect(0, 0, 48, 48);
          g.lineStyle(1, 0x334155, 0.4);
          g.strokeRect(0, 0, 48, 48);
          g.generateTexture("cell", 48, 48);
          g.clear();

          // Building placeholder (colored square)
          g.fillStyle(0x4ade80);
          g.fillRoundedRect(4, 4, 40, 40, 6);
          g.generateTexture("building", 48, 48);
          g.clear();

          // Road
          g.fillStyle(0x475569);
          g.fillRect(0, 0, 48, 8);
          g.fillStyle(0xfbbf24, 0.6);
          g.fillRect(20, 2, 8, 1);
          g.generateTexture("road_h", 48, 8);
          g.clear();

          g.fillStyle(0x475569);
          g.fillRect(0, 0, 8, 48);
          g.fillStyle(0xfbbf24, 0.6);
          g.fillRect(2, 20, 1, 8);
          g.generateTexture("road_v", 8, 48);
          g.clear();

          // Cursor highlight
          g.fillStyle(0xfbbf24, 0.2);
          g.fillRect(0, 0, 48, 48);
          g.lineStyle(2, 0xfbbf24, 0.8);
          g.strokeRect(0, 0, 48, 48);
          g.generateTexture("cursor", 48, 48);
          g.clear();

          // Button
          g.fillStyle(0x1e293b);
          g.fillRoundedRect(0, 0, 220, 52, 14);
          g.lineStyle(2, 0x8b5cf6);
          g.strokeRoundedRect(0, 0, 220, 52, 14);
          g.generateTexture("btn", 220, 52);
          g.clear();

          // Small button
          g.fillStyle(0x1e293b);
          g.fillRoundedRect(0, 0, 150, 42, 10);
          g.lineStyle(2, 0x38bdf8);
          g.strokeRoundedRect(0, 0, 150, 42, 10);
          g.generateTexture("btn_sm", 150, 42);
          g.clear();

          // Answer button
          g.fillStyle(0x0f172a);
          g.fillRoundedRect(0, 0, 180, 46, 10);
          g.lineStyle(2, 0x8b5cf6);
          g.strokeRoundedRect(0, 0, 180, 46, 10);
          g.generateTexture("ans_btn", 180, 46);
          g.clear();

          g.fillStyle(0x064e3b);
          g.fillRoundedRect(0, 0, 180, 46, 10);
          g.lineStyle(2, 0x4ade80);
          g.strokeRoundedRect(0, 0, 180, 46, 10);
          g.generateTexture("ans_ok", 180, 46);
          g.clear();

          g.fillStyle(0x450a0a);
          g.fillRoundedRect(0, 0, 180, 46, 10);
          g.lineStyle(2, 0xf87171);
          g.strokeRoundedRect(0, 0, 180, 46, 10);
          g.generateTexture("ans_bad", 180, 46);
          g.clear();

          // Heart
          g.fillStyle(0xef4444);
          g.fillRect(2, 1, 3, 3);
          g.fillRect(7, 1, 3, 3);
          g.fillRect(0, 3, 12, 3);
          g.fillRect(2, 6, 8, 3);
          g.fillRect(4, 9, 4, 2);
          g.generateTexture("heart", 12, 11);
          g.clear();

          // Particle
          g.fillStyle(0xffffff, 0.5);
          g.fillCircle(2, 2, 2);
          g.generateTexture("particle", 4, 4);
          g.clear();

          g.destroy();
          this.scene.start("Title");
        }
      }

      // ============================================================
      // TITLE
      // ============================================================
      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          this.cameras.main.setBackgroundColor("#0a0f1e");

          // City lights bg
          for (let i = 0; i < 120; i++) {
            const c = this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.Between(1, 3),
              Phaser.Math.RND.pick([
                0xfbbf24, 0x4ade80, 0x38bdf8, 0xc084fc, 0xef4444,
              ]),
              Phaser.Math.FloatBetween(0.03, 0.2),
            );
            this.tweens.add({
              targets: c,
              alpha: { from: c.alpha, to: 0.02 },
              duration: Phaser.Math.Between(800, 2500),
              yoyo: true,
              repeat: -1,
            });
          }

          this.add
            .text(W / 2, 75, "COORDINATE", {
              fontSize: "42px",
              fontStyle: "bold",
              color: "#38bdf8",
              stroke: "#0a0f1e",
              strokeThickness: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 130, "CITY BUILDER", {
              fontSize: "52px",
              fontStyle: "bold",
              color: "#fbbf24",
              stroke: "#0a0f1e",
              strokeThickness: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 175, "6.NS.C.8 — Graphing in All Four Quadrants", {
              fontSize: "15px",
              color: "#94a3b8",
            })
            .setOrigin(0.5);

          // Building emojis floating
          const emojis = [
            "🏫",
            "🏥",
            "🚒",
            "📚",
            "🌳",
            "🏪",
            "🚔",
            "⚡",
            "💧",
            "🏢",
          ];
          emojis.forEach((e, i) => {
            const t = this.add
              .text(80 + i * 70, 250, e, { fontSize: "32px" })
              .setOrigin(0.5);
            this.tweens.add({
              targets: t,
              y: 235,
              duration: 600 + i * 80,
              yoyo: true,
              repeat: -1,
              ease: "Sine.InOut",
            });
          });

          // Mini grid preview
          this.drawMiniGrid(W / 2, 360);

          // Difficulty select
          this.add
            .text(W / 2, 440, "Choose difficulty:", {
              fontSize: "16px",
              color: "#e2e8f0",
            })
            .setOrigin(0.5);
          const diffs = [
            { name: "Easy (5x5)", range: 2 },
            { name: "Medium (7x7)", range: 3 },
            { name: "Hard (9x9)", range: 4 },
          ];
          this.selectedDiff = 0;
          this.diffBtns = [];
          diffs.forEach((d, i) => {
            const x = W / 2 - 200 + i * 200;
            const bg = this.add
              .image(x, 480, "btn")
              .setScale(0.75)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(x, 480, d.name, {
                fontSize: "13px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(0.5);
            bg.on("pointerdown", () => {
              this.selectedDiff = i;
              this.diffBtns.forEach((b, j) =>
                b.setTint(j === i ? 0x4ade80 : 0xffffff),
              );
              synth(350 + i * 120, 0.08);
            });
            bg.on("pointerover", () => bg.setScale(0.8));
            bg.on("pointerout", () => bg.setScale(0.75));
            this.diffBtns.push(bg);
          });
          this.diffBtns[0].setTint(0x4ade80);

          // Start
          const startBtn = this.add
            .image(W / 2, 545, "btn")
            .setScale(1.2)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2, 545, "BUILD YOUR CITY!", {
              fontSize: "20px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          this.tweens.add({
            targets: startBtn,
            scaleX: 1.25,
            scaleY: 1.25,
            duration: 800,
            yoyo: true,
            repeat: -1,
            ease: "Sine.InOut",
          });
          startBtn.on("pointerdown", () => {
            synth(600, 0.1);
            setTimeout(() => synth(800, 0.15), 80);
            this.cameras.main.fadeOut(400);
            const ranges = [2, 3, 4];
            this.time.delayedCall(400, () => {
              this.scene.start("Game", { range: ranges[this.selectedDiff] });
            });
          });

          this.add
            .text(
              W / 2,
              585,
              "Click/tap grid cells to place buildings at coordinates",
              {
                fontSize: "12px",
                color: "#64748b",
              },
            )
            .setOrigin(0.5);

          this.cameras.main.fadeIn(500);
        }

        drawMiniGrid(cx, cy) {
          const g = this.add.graphics();
          const s = 18,
            r = 3;
          g.lineStyle(1, 0x334155, 0.3);
          for (let i = -r; i <= r; i++) {
            g.moveTo(cx + i * s, cy - r * s);
            g.lineTo(cx + i * s, cy + r * s);
            g.moveTo(cx - r * s, cy + i * s);
            g.lineTo(cx + r * s, cy + i * s);
          }
          g.strokePath();
          g.lineStyle(2, 0x38bdf8, 0.5);
          g.moveTo(cx - r * s, cy);
          g.lineTo(cx + r * s, cy);
          g.moveTo(cx, cy - r * s);
          g.lineTo(cx, cy + r * s);
          g.strokePath();
        }
      }

      // ============================================================
      // GAME
      // ============================================================
      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }

        init(data) {
          this.gridRange = data.range || 3;
          this.level = data.level || 1;
          this.score = 0;
          this.lives = 3;
          this.combo = 0;
          this.maxCombo = 0;
          this.buildingsPlaced = 0;
          this.totalBuildings = 4 + Math.min(this.level, 4);
          this.qCorrect = 0;
          this.qTotal = 0;
          this.currentTask = null;
          this.placedBuildings = [];
          this.connections = [];
          this.phase = "build"; // build or connect
          this.taskIndex = 0;
        }

        create() {
          if (audioCtx.state === "suspended") audioCtx.resume();
          this.cameras.main.setBackgroundColor("#0a0f1e");

          const range = this.gridRange;
          const cs = 44;
          this.cs = cs;
          this.range = range;

          // Center grid in left portion of screen
          const gridAreaW = 600;
          const ox = gridAreaW / 2;
          const oy = H / 2;
          this.ox = ox;
          this.oy = oy;

          // Draw background
          for (let i = 0; i < 40; i++) {
            this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.Between(1, 2),
              0xffffff,
              Phaser.Math.FloatBetween(0.01, 0.06),
            );
          }

          // Grid cells (interactive)
          this.cells = [];
          this.cellMap = {};
          for (let gx = -range; gx <= range; gx++) {
            for (let gy = -range; gy <= range; gy++) {
              const sx = ox + gx * cs;
              const sy = oy - gy * cs;
              const cell = this.add
                .image(sx, sy, "cell")
                .setInteractive({ useHandCursor: true })
                .setDepth(1);
              cell.gridX = gx;
              cell.gridY = gy;

              cell.on("pointerover", () => {
                if (this.phase === "build" && this.currentTask)
                  cell.setTint(0xfbbf24);
                this.hoverLabel.setText(`(${gx}, ${gy})`);
                this.hoverLabel.setPosition(sx, sy - 28);
                this.hoverLabel.setVisible(true);
              });
              cell.on("pointerout", () => {
                cell.clearTint();
                this.hoverLabel.setVisible(false);
              });
              cell.on("pointerdown", () => this.onCellClick(gx, gy));

              this.cells.push(cell);
              this.cellMap[`${gx},${gy}`] = cell;
            }
          }

          // Grid lines and axes
          this.drawGridLines();

          // Hover label
          this.hoverLabel = this.add
            .text(0, 0, "", {
              fontSize: "12px",
              color: "#fbbf24",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 3,
            })
            .setOrigin(0.5)
            .setDepth(20)
            .setVisible(false);

          // Building labels layer
          this.buildingLabels = [];

          // HUD
          this.createHUD();

          // Side panel
          this.createSidePanel();

          // Generate building tasks
          this.generateTasks();

          // Show first task
          this.showNextTask();

          this.cameras.main.fadeIn(500);
        }

        drawGridLines() {
          const g = this.add.graphics().setDepth(0);
          const { ox, oy, cs, range } = this;

          // Grid
          g.lineStyle(1, 0x334155, 0.25);
          for (let i = -range; i <= range; i++) {
            g.moveTo(ox + i * cs - cs / 2, oy - range * cs - cs / 2);
            g.lineTo(ox + i * cs - cs / 2, oy + range * cs + cs / 2);
            g.moveTo(ox - range * cs - cs / 2, oy + i * cs - cs / 2);
            g.lineTo(ox + range * cs + cs / 2, oy + i * cs - cs / 2);
          }
          g.strokePath();

          // Axes
          g.lineStyle(2, 0x38bdf8, 0.5);
          g.moveTo(ox - range * cs - cs / 2, oy);
          g.lineTo(ox + range * cs + cs / 2, oy);
          g.moveTo(ox, oy - range * cs - cs / 2);
          g.lineTo(ox, oy + range * cs + cs / 2);
          g.strokePath();

          // Labels
          for (let i = -range; i <= range; i++) {
            if (i === 0) continue;
            this.add
              .text(ox + i * cs, oy + range * cs + cs / 2 + 8, `${i}`, {
                fontSize: "10px",
                color: "#64748b",
              })
              .setOrigin(0.5);
            this.add
              .text(ox - range * cs - cs / 2 - 12, oy - i * cs, `${i}`, {
                fontSize: "10px",
                color: "#64748b",
              })
              .setOrigin(0.5);
          }
          this.add
            .text(ox + range * cs + cs / 2 + 12, oy, "x", {
              fontSize: "12px",
              color: "#38bdf8",
              fontStyle: "bold",
            })
            .setOrigin(0, 0.5);
          this.add
            .text(ox, oy - range * cs - cs / 2 - 12, "y", {
              fontSize: "12px",
              color: "#38bdf8",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          this.add.text(ox - 12, oy + 12, "0", {
            fontSize: "10px",
            color: "#fbbf24",
          });

          // Quadrant labels
          const qa = 0.15;
          this.add
            .text(ox + (range * cs) / 2, oy - (range * cs) / 2, "I", {
              fontSize: "16px",
              color: "#4ade80",
            })
            .setOrigin(0.5)
            .setAlpha(qa);
          this.add
            .text(ox - (range * cs) / 2, oy - (range * cs) / 2, "II", {
              fontSize: "16px",
              color: "#38bdf8",
            })
            .setOrigin(0.5)
            .setAlpha(qa);
          this.add
            .text(ox - (range * cs) / 2, oy + (range * cs) / 2, "III", {
              fontSize: "16px",
              color: "#fbbf24",
            })
            .setOrigin(0.5)
            .setAlpha(qa);
          this.add
            .text(ox + (range * cs) / 2, oy + (range * cs) / 2, "IV", {
              fontSize: "16px",
              color: "#c084fc",
            })
            .setOrigin(0.5)
            .setAlpha(qa);
        }

        createHUD() {
          this.add.rectangle(W / 2, 18, W, 36, 0x0f172a, 0.9).setDepth(100);
          this.scoreText = this.add
            .text(12, 8, "Score: 0", {
              fontSize: "14px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setDepth(101);
          this.buildText = this.add
            .text(12, 24, `Buildings: 0/${this.totalBuildings}`, {
              fontSize: "12px",
              color: "#4ade80",
            })
            .setDepth(101);
          this.levelText = this.add
            .text(W / 2, 8, `Level ${this.level}`, {
              fontSize: "14px",
              color: "#38bdf8",
              fontStyle: "bold",
            })
            .setOrigin(0.5, 0)
            .setDepth(101);
          this.comboText = this.add
            .text(W / 2, 24, "", { fontSize: "11px", color: "#c084fc" })
            .setOrigin(0.5, 0)
            .setDepth(101);
          this.hearts = [];
          for (let i = 0; i < 3; i++) {
            this.hearts.push(
              this.add
                .image(W - 50 + i * 18, 18, "heart")
                .setScale(1.3)
                .setDepth(101),
            );
          }
        }

        createSidePanel() {
          const px = 700,
            py = H / 2;

          // Panel bg
          this.add.rectangle(px, py, 190, H - 60, 0x0f172a, 0.8).setDepth(50);
          this.add
            .rectangle(px, py, 188, H - 62, 0x000000, 0)
            .setDepth(50)
            .setStrokeStyle(1, 0x334155);

          // Task area
          this.taskTitle = this.add
            .text(px, 60, "BUILDING TASK", {
              fontSize: "11px",
              color: "#38bdf8",
              fontStyle: "bold",
              letterSpacing: 2,
            })
            .setOrigin(0.5)
            .setDepth(51);

          this.taskEmoji = this.add
            .text(px, 100, "🏫", { fontSize: "36px" })
            .setOrigin(0.5)
            .setDepth(51);

          this.taskName = this.add
            .text(px, 140, "School", {
              fontSize: "16px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(51);

          this.taskDesc = this.add
            .text(px, 170, "Place at: (2, 3)", {
              fontSize: "14px",
              color: "#e2e8f0",
              fontStyle: "bold",
              wordWrap: { width: 170 },
              align: "center",
            })
            .setOrigin(0.5)
            .setDepth(51);

          this.taskHint = this.add
            .text(px, 210, "", {
              fontSize: "11px",
              color: "#94a3b8",
              wordWrap: { width: 170 },
              align: "center",
            })
            .setOrigin(0.5)
            .setDepth(51);

          // Quadrant reference
          this.add
            .text(px, 290, "QUADRANT MAP", {
              fontSize: "10px",
              color: "#64748b",
              fontStyle: "bold",
              letterSpacing: 1,
            })
            .setOrigin(0.5)
            .setDepth(51);

          const qData = [
            { label: "I (+,+)", color: "#4ade80", x: px + 30, y: 310 },
            { label: "II (-,+)", color: "#38bdf8", x: px - 30, y: 310 },
            { label: "III (-,-)", color: "#fbbf24", x: px - 30, y: 335 },
            { label: "IV (+,-)", color: "#c084fc", x: px + 30, y: 335 },
          ];
          qData.forEach((q) => {
            this.add
              .text(q.x, q.y, q.label, {
                fontSize: "11px",
                color: q.color,
                fontStyle: "bold",
              })

              .setDepth(51);
          });

          // Distance formula reference
          this.add
            .text(px, 380, "DISTANCE", {
              fontSize: "10px",
              color: "#64748b",
              fontStyle: "bold",
              letterSpacing: 1,
            })
            .setOrigin(0.5)
            .setDepth(51);
          this.add
            .text(px, 400, "d = |a - b|", {
              fontSize: "14px",
              color: "#e2e8f0",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(51);
          this.add
            .text(px, 420, "Same x: use y values\nSame y: use x values", {
              fontSize: "10px",
              color: "#94a3b8",
              align: "center",
            })
            .setOrigin(0.5)
            .setDepth(51);

          // Progress bar
          this.add
            .text(px, 470, "CITY PROGRESS", {
              fontSize: "10px",
              color: "#64748b",
              fontStyle: "bold",
              letterSpacing: 1,
            })
            .setOrigin(0.5)
            .setDepth(51);

          this.progressBg = this.add
            .rectangle(px, 490, 160, 10, 0x1e293b)
            .setDepth(51);
          this.progressFill = this.add
            .rectangle(px - 80, 490, 0, 8, 0x4ade80)
            .setOrigin(0, 0.5)
            .setDepth(52);
          this.progressText = this.add
            .text(px, 505, `0/${this.totalBuildings}`, {
              fontSize: "11px",
              color: "#94a3b8",
            })

        }

        generateTasks() {
          this.tasks = [];
          const used = new Set();
          used.add("0,0");
          const buildings = shuffle([...BUILDINGS]);

          for (let i = 0; i < this.totalBuildings; i++) {
            let gx, gy;
            do {
              gx = Phaser.Math.Between(-this.range, this.range);
              gy = Phaser.Math.Between(-this.range, this.range);
            } while (used.has(`${gx},${gy}`) || (gx === 0 && gy === 0));
            used.add(`${gx},${gy}`);

            const b = buildings[i % buildings.length];
            this.tasks.push({
              gx,
              gy,
              building: b,
              placed: false,
              question: this.genPlacementQuestion(gx, gy, b, i),
            });
          }
        }

        genPlacementQuestion(gx, gy, building, idx) {
          // Different types of placement instructions
          const type = idx % 6;
          if (type === 0) {
            return {
              text: `Place the ${building.name} at (${gx}, ${gy})`,
              hint: `x=${gx} means ${gx >= 0 ? "right" : "left"}. y=${gy} means ${gy >= 0 ? "up" : "down"}.`,
              targetX: gx,
              targetY: gy,
            };
          } else if (type === 1) {
            const quad =
              gx > 0 && gy > 0
                ? "I"
                : gx < 0 && gy > 0
                  ? "II"
                  : gx < 0 && gy < 0
                    ? "III"
                    : "IV";
            return {
              text: `Place the ${building.name} at (${gx}, ${gy}) in Quadrant ${quad}`,
              hint: `Quadrant ${quad}: x is ${gx >= 0 ? "positive" : "negative"}, y is ${gy >= 0 ? "positive" : "negative"}.`,
              targetX: gx,
              targetY: gy,
            };
          } else if (type === 2) {
            return {
              text: `The ${building.name} goes ${Math.abs(gx)} ${gx >= 0 ? "right" : "left"} and ${Math.abs(gy)} ${gy >= 0 ? "up" : "down"} from origin`,
              hint: `Start at (0,0). Move ${gx >= 0 ? "right" : "left"} ${Math.abs(gx)}, then ${gy >= 0 ? "up" : "down"} ${Math.abs(gy)}.`,
              targetX: gx,
              targetY: gy,
            };
          } else if (type === 3) {
            return {
              text: `Build the ${building.name} where x = ${gx} and y = ${gy}`,
              hint: `Find x = ${gx} on horizontal axis, y = ${gy} on vertical axis.`,
              targetX: gx,
              targetY: gy,
            };
          } else if (type === 4) {
            const signX = gx >= 0 ? "positive" : "negative";
            const signY = gy >= 0 ? "positive" : "negative";
            return {
              text: `Place ${building.name} at the point with ${signX} ${Math.abs(gx)} x and ${signY} ${Math.abs(gy)} y`,
              hint: `${signX} x = ${gx}, ${signY} y = ${gy}. Point: (${gx}, ${gy})`,
              targetX: gx,
              targetY: gy,
            };
          } else {
            return {
              text: `The ${building.name} is at (${gx}, ${gy}). Tap that cell!`,
              hint: `Move to column ${gx} and row ${gy}.`,
              targetX: gx,
              targetY: gy,
            };
          }
        }

        showNextTask() {
          if (this.taskIndex >= this.tasks.length) {
            this.showDistanceChallenge();
            return;
          }

          this.currentTask = this.tasks[this.taskIndex];
          const t = this.currentTask;
          const b = t.building;

          // Update side panel
          this.taskEmoji.setText(b.emoji);
          this.taskName.setText(b.name);
          this.taskDesc.setText(t.question.text);
          this.taskHint.setText(t.question.hint);

          // Pulse the task emoji
          this.tweens.add({
            targets: this.taskEmoji,
            scale: 1.2,
            duration: 400,
            yoyo: true,
            repeat: 2,
            ease: "Sine.InOut",
          });
        }

        onCellClick(gx, gy) {
          if (!this.currentTask) return;
          if (this.phase !== "build") return;

          const t = this.currentTask;
          const correct =
            gx === t.question.targetX && gy === t.question.targetY;

          if (correct) {
            sndPlace();
            this.placeBuilding(gx, gy, t.building);
            t.placed = true;
            this.buildingsPlaced++;
            this.combo++;
            if (this.combo > this.maxCombo) this.maxCombo = this.combo;
            this.qCorrect++;
            this.qTotal++;
            const pts = t.building.points * this.combo;
            this.score += pts;

            // Float text
            const sx = this.ox + gx * this.cs;
            const sy = this.oy - gy * this.cs;
            const ft = this.add
              .text(sx, sy - 30, `+${pts}`, {
                fontSize: "18px",
                color: "#4ade80",
                fontStyle: "bold",
                stroke: "#000",
                strokeThickness: 3,
              })
              .setOrigin(0.5)
              .setDepth(30);
            this.tweens.add({
              targets: ft,
              y: ft.y - 35,
              alpha: 0,
              duration: 800,
              onComplete: () => ft.destroy(),
            });

            // Particles
            this.add
              .particles(sx, sy, "particle", {
                speed: { min: 50, max: 150 },
                scale: { start: 1.5, end: 0 },
                lifespan: 500,
                quantity: 12,
                tint: t.building.color,
                emitting: false,
              })
              .explode(12);

            this.updateHUD();
            this.taskIndex++;
            this.time.delayedCall(600, () => this.showNextTask());
          } else {
            sndWrong();
            this.combo = 0;
            this.lives--;
            this.qTotal++;
            this.cameras.main.shake(150, 0.008);

            // Show where they clicked vs where they should click
            const sx = this.ox + gx * this.cs;
            const sy = this.oy - gy * this.cs;
            const ft = this.add
              .text(sx, sy - 20, `(${gx},${gy}) - wrong spot!`, {
                fontSize: "11px",
                color: "#f87171",
                fontStyle: "bold",
                stroke: "#000",
                strokeThickness: 3,
              })
              .setOrigin(0.5)
              .setDepth(30);
            this.tweens.add({
              targets: ft,
              alpha: 0,
              delay: 1500,
              duration: 500,
              onComplete: () => ft.destroy(),
            });

            // Highlight correct cell briefly
            const tx = t.question.targetX,
              ty = t.question.targetY;
            const cx = this.ox + tx * this.cs;
            const cy = this.oy - ty * this.cs;
            const highlight = this.add
              .rectangle(cx, cy, this.cs, this.cs, 0x4ade80, 0.3)
              .setDepth(15);
            this.tweens.add({
              targets: highlight,
              alpha: 0,
              delay: 2000,
              duration: 500,
              onComplete: () => highlight.destroy(),
            });

            this.updateHUD();
            if (this.lives <= 0) this.endGame();
          }
        }

        placeBuilding(gx, gy, building) {
          const sx = this.ox + gx * this.cs;
          const sy = this.oy - gy * this.cs;

          // Building sprite
          const bImg = this.add
            .text(sx, sy, building.emoji, { fontSize: "28px" })
            .setOrigin(0.5)
            .setDepth(8);

          // Scale-in animation
          bImg.setScale(0);
          this.tweens.add({
            targets: bImg,
            scale: 1,
            duration: 300,
            ease: "Back.easeOut",
          });

          // Label
          const label = this.add
            .text(sx, sy + 20, building.name, {
              fontSize: "8px",
              color: "#94a3b8",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(9);

          this.placedBuildings.push({ gx, gy, building, sprite: bImg });

          // Draw roads connecting to origin or neighbors
          this.drawConnection(gx, gy);
        }

        drawConnection(gx, gy) {
          const g = this.add.graphics().setDepth(2);
          const sx = this.ox + gx * this.cs;
          const sy = this.oy - gy * this.cs;

          // Draw dotted line to origin
          g.lineStyle(2, 0x475569, 0.3);
          const steps = Math.max(Math.abs(gx), Math.abs(gy)) * 4;
          for (let i = 0; i < steps; i++) {
            const t = i / steps;
            const px = this.ox + (sx - this.ox) * t;
            const py = this.oy + (sy - this.oy) * t;
            if (i % 2 === 0) g.fillStyle(0x475569, 0.3).fillCircle(px, py, 1);
          }

          sndConnect();
        }

        showDistanceChallenge() {
          this.phase = "questions";
          this.currentTask = null;

          // Generate distance questions from placed buildings
          const distQs = this.genDistanceQuestions();
          this.distQuestions = distQs;
          this.distQIndex = 0;

          this.taskTitle.setText("DISTANCE CHALLENGE");
          this.taskEmoji.setText("📏");
          this.taskName.setText("Calculate distances");
          this.taskDesc.setText("Find the distance between buildings!");
          this.taskHint.setText(
            "Use |a - b| for same x or same y coordinates.",
          );

          this.time.delayedCall(1000, () => this.showDistQuestion());
        }

        genDistanceQuestions() {
          const qs = [];
          const placed = this.placedBuildings;
          if (placed.length < 2) return qs;

          // Generate pairs
          for (let i = 0; i < Math.min(placed.length - 1, 4); i++) {
            const a = placed[i];
            const b = placed[(i + 1) % placed.length];

            // Same x (vertical distance)
            if (a.gx === b.gx) {
              const dist = Math.abs(a.gy - b.gy);
              qs.push({
                q: `Distance between ${a.building.name} (${a.gx},${a.gy}) and ${b.building.name} (${b.gx},${b.gy})?`,
                ans: `${dist}`,
                opts: shuffle([
                  `${dist}`,
                  `${dist + 2}`,
                  `${Math.max(1, dist - 1)}`,
                ]),
                explanation: `Same x = ${a.gx}. Distance = |${a.gy} - ${b.gy}| = |${a.gy - b.gy}| = ${dist}`,
              });
            }
            // Same y (horizontal distance)
            else if (a.gy === b.gy) {
              const dist = Math.abs(a.gx - b.gx);
              qs.push({
                q: `Distance between ${a.building.name} (${a.gx},${a.gy}) and ${b.building.name} (${b.gx},${b.gy})?`,
                ans: `${dist}`,
                opts: shuffle([
                  `${dist}`,
                  `${dist + 3}`,
                  `${Math.max(1, dist - 2)}`,
                ]),
                explanation: `Same y = ${a.gy}. Distance = |${a.gx} - ${b.gx}| = |${a.gx - b.gx}| = ${dist}`,
              });
            }
            // Manhattan distance
            else {
              const dist = Math.abs(a.gx - b.gx) + Math.abs(a.gy - b.gy);
              qs.push({
                q: `Total blocks from ${a.building.name} (${a.gx},${a.gy}) to ${b.building.name} (${b.gx},${b.gy})? (|dx|+|dy|)`,
                ans: `${dist}`,
                opts: shuffle([
                  `${dist}`,
                  `${dist + 2}`,
                  `${Math.max(1, dist - 3)}`,
                ]),
                explanation: `|${a.gx}-${b.gx}| + |${a.gy}-${b.gy}| = ${Math.abs(a.gx - b.gx)} + ${Math.abs(a.gy - b.gy)} = ${dist}`,
              });
            }
          }

          // Add quadrant questions about placed buildings
          if (placed.length > 0) {
            const p = placed[Phaser.Math.Between(0, placed.length - 1)];
            const quad =
              p.gx > 0 && p.gy > 0
                ? "I"
                : p.gx < 0 && p.gy > 0
                  ? "II"
                  : p.gx < 0 && p.gy < 0
                    ? "III"
                    : "IV";
            qs.push({
              q: `Which quadrant is ${p.building.name} at (${p.gx}, ${p.gy})?`,
              ans: quad,
              opts: shuffle(["I", "II", "III", "IV"]).slice(0, 3),
              explanation: `(${p.gx}, ${p.gy}): x is ${p.gx >= 0 ? "+" : "-"}, y is ${p.gy >= 0 ? "+" : "-"} = Quadrant ${quad}`,
            });
          }

          return qs.length > 0
            ? qs
            : [
                {
                  q: "A building at (-3,4) and one at (2,4). Distance?",
                  ans: "5",
                  opts: shuffle(["5", "7", "1"]),
                  explanation: "Same y=4. |(-3)-2| = |-5| = 5",
                },
              ];
        }

        showDistQuestion() {
          if (this.distQIndex >= this.distQuestions.length) {
            this.levelComplete();
            return;
          }

          const q = this.distQuestions[this.distQIndex];

          // Overlay
          this.qOverlay = this.add
            .rectangle(W / 2, H / 2, W, H, 0x000000, 0.85)
            .setDepth(600);
          this.qElements = [];

          const qNum = this.add
            .text(
              W / 2,
              100,
              `Distance Challenge ${this.distQIndex + 1}/${this.distQuestions.length}`,
              {
                fontSize: "13px",
                color: "#38bdf8",
                fontStyle: "bold",
              },
            )
            .setOrigin(0.5)
            .setDepth(601);
          this.qElements.push(qNum);

          const qText = this.add
            .text(W / 2, 170, q.q, {
              fontSize: "20px",
              color: "#e2e8f0",
              fontStyle: "bold",
              wordWrap: { width: 600 },
              align: "center",
              stroke: "#000",
              strokeThickness: 4,
            })
            .setOrigin(0.5)
            .setDepth(601);
          this.qElements.push(qText);

          const formula = this.add
            .text(W / 2, 220, "Formula: d = |coord1 - coord2|", {
              fontSize: "13px",
              color: "#64748b",
            })
            .setOrigin(0.5)
            .setDepth(601);
          this.qElements.push(formula);

          const opts = [...new Set(q.opts)];
          if (!opts.includes(q.ans)) {
            opts[0] = q.ans;
          }
          while (opts.length < 3)
            opts.push(`${parseInt(q.ans) + Phaser.Math.Between(2, 5)}`);

          shuffle(opts)
            .slice(0, 3)
            .forEach((opt, i) => {
              const bx = W / 2 - 180 + i * 180;
              const by = 300;
              const btn = this.add
                .image(bx, by, "ans_btn")
                .setScale(1.1)
                .setDepth(601)
                .setInteractive({ useHandCursor: true });
              const txt = this.add
                .text(bx, by, opt, {
                  fontSize: "20px",
                  color: "#e2e8f0",
                  fontStyle: "bold",
                })
                .setOrigin(0.5)
                .setDepth(602);
              this.qElements.push(btn, txt);

              btn.on("pointerdown", () => {
                this.qElements.forEach((e) => {
                  if (e.input) e.disableInteractive();
                });
                this.qTotal++;

                if (opt === q.ans) {
                  sndCorrect();
                  btn.setTexture("ans_ok");
                  txt.setColor("#4ade80");
                  this.qCorrect++;
                  this.combo++;
                  if (this.combo > this.maxCombo) this.maxCombo = this.combo;
                  const pts = 250 * this.combo;
                  this.score += pts;

                  const fb = this.add
                    .text(W / 2, 370, `Correct! +${pts}`, {
                      fontSize: "18px",
                      color: "#4ade80",
                      fontStyle: "bold",
                    })
                    .setOrigin(0.5)
                    .setDepth(601);
                  this.qElements.push(fb);
                } else {
                  sndWrong();
                  btn.setTexture("ans_bad");
                  txt.setColor("#f87171");
                  this.combo = 0;
                  this.lives--;

                  const fb = this.add
                    .text(W / 2, 370, `Answer: ${q.ans}`, {
                      fontSize: "18px",
                      color: "#f87171",
                      fontStyle: "bold",
                    })
                    .setOrigin(0.5)
                    .setDepth(601);
                  this.qElements.push(fb);
                }

                // Show explanation
                const exp = this.add
                  .text(W / 2, 410, q.explanation, {
                    fontSize: "13px",
                    color: "#94a3b8",
                    wordWrap: { width: 500 },
                    align: "center",
                  })
                  .setOrigin(0.5)
                  .setDepth(601);
                this.qElements.push(exp);

                this.updateHUD();

                this.time.delayedCall(2000, () => {
                  this.qElements.forEach((e) => e.destroy());
                  this.qOverlay.destroy();
                  this.distQIndex++;
                  if (this.lives <= 0) {
                    this.endGame();
                    return;
                  }
                  this.showDistQuestion();
                });
              });

              btn.on("pointerover", () => btn.setScale(1.15));
              btn.on("pointerout", () => btn.setScale(1.1));
            });
        }

        levelComplete() {
          sndLevelUp();

          const ov = this.add
            .rectangle(W / 2, H / 2, W, H, 0x000000, 0.85)
            .setDepth(600);
          this.add
            .text(W / 2, 100, "CITY COMPLETE!", {
              fontSize: "40px",
              color: "#fbbf24",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 6,
            })
            .setOrigin(0.5)
            .setDepth(601);

          const pct = this.qTotal > 0 ? this.qCorrect / this.qTotal : 0;
          const stars = pct >= 0.85 ? 3 : pct >= 0.6 ? 2 : 1;
          this.add
            .text(W / 2, 160, "★".repeat(stars) + "☆".repeat(3 - stars), {
              fontSize: "40px",
              color: "#fbbf24",
            })
            .setOrigin(0.5)
            .setDepth(601);

          this.add
            .text(
              W / 2,
              220,
              `Score: ${this.score}  |  Buildings: ${this.buildingsPlaced}`,
              {
                fontSize: "16px",
                color: "#e2e8f0",
              },
            )
            .setOrigin(0.5)
            .setDepth(601);
          this.add
            .text(
              W / 2,
              250,
              `Questions: ${this.qCorrect}/${this.qTotal}  |  Best Combo: ${this.maxCombo}x`,
              {
                fontSize: "14px",
                color: "#94a3b8",
              },
            )
            .setOrigin(0.5)
            .setDepth(601);

          // Confetti
          for (let i = 0; i < 40; i++) {
            const c = this.add
              .circle(
                Phaser.Math.Between(50, W - 50),
                -10,
                Phaser.Math.Between(3, 6),
                Phaser.Math.RND.pick([
                  0x38bdf8, 0xfbbf24, 0x4ade80, 0xc084fc, 0xef4444,
                ]),
              )
              .setDepth(602);
            this.tweens.add({
              targets: c,
              y: H + 20,
              x: c.x + Phaser.Math.Between(-100, 100),
              duration: Phaser.Math.Between(1500, 3000),
              delay: Phaser.Math.Between(0, 500),
            });
          }

          const nextBtn = this.add
            .image(W / 2 - 110, 320, "btn")
            .setScale(0.9)
            .setDepth(601)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 - 110, 320, "Next Level", {
              fontSize: "15px",
              color: "#4ade80",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(602);
          nextBtn.on("pointerdown", () => {
            this.cameras.main.fadeOut(400);
            this.time.delayedCall(400, () =>
              this.scene.restart({
                range: this.gridRange,
                level: this.level + 1,
              }),
            );
          });

          const resBtn = this.add
            .image(W / 2 + 110, 320, "btn")
            .setScale(0.9)
            .setDepth(601)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 + 110, 320, "Results", {
              fontSize: "15px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(602);
          resBtn.on("pointerdown", () => {
            this.scene.start("Results", {
              score: this.score,
              level: this.level,
              buildings: this.buildingsPlaced,
              qCorrect: this.qCorrect,
              qTotal: this.qTotal,
              maxCombo: this.maxCombo,
              range: this.gridRange,
            });
          });
        }

        endGame() {
          this.cameras.main.shake(400, 0.02);
          this.time.delayedCall(500, () => {
            this.scene.start("Results", {
              score: this.score,
              level: this.level,
              buildings: this.buildingsPlaced,
              qCorrect: this.qCorrect,
              qTotal: this.qTotal,
              maxCombo: this.maxCombo,
              range: this.gridRange,
              gameOver: true,
            });
          });
        }

        updateHUD() {
          this.scoreText.setText(`Score: ${this.score}`);
          this.buildText.setText(
            `Buildings: ${this.buildingsPlaced}/${this.totalBuildings}`,
          );
          if (this.combo > 1) this.comboText.setText(`${this.combo}x Combo!`);
          else this.comboText.setText("");
          for (let i = 0; i < 3; i++)
            this.hearts[i].setAlpha(i < this.lives ? 1 : 0.2);

          // Progress bar
          const pct = this.buildingsPlaced / this.totalBuildings;
          this.progressFill.width = 160 * pct;
          this.progressText.setText(
            `${this.buildingsPlaced}/${this.totalBuildings}`,
          );
        }
      }

      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }
        init(data) {
          this.d = data;
        }
        create() {
          this.cameras.main.setBackgroundColor("#0a0f1e");

          try {
            window.EduPulse &&
              EduPulse.record({
                activityTitle: document.title,
                score: this.d.qCorrect,
                maxScore: this.d.qTotal,
                problemsCorrect: this.d.qCorrect,
                problemsAttempted: this.d.qTotal,
                standard: "6.NS.C.8",
              });
          } catch (e) {}

          for (let i = 0; i < 80; i++) {
            this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.Between(1, 2),
              Phaser.Math.RND.pick([0xfbbf24, 0x4ade80, 0x38bdf8]),
              Phaser.Math.FloatBetween(0.02, 0.12),
            );
          }

          const title = this.d.gameOver ? "GAME OVER" : "CITY REPORT";
          const color = this.d.gameOver ? "#f87171" : "#fbbf24";
          this.add
            .text(W / 2, 50, title, {
              fontSize: "40px",
              color,
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 6,
            })
            .setOrigin(0.5);

          // City skyline emojis
          const skyline = [
            "🏫",
            "🏥",
            "🚒",
            "📚",
            "🌳",
            "🏪",
            "🚔",
            "⚡",
            "💧",
            "🏢",
          ];
          skyline.forEach((e, i) => {
            if (i < this.d.buildings)
              this.add
                .text(130 + i * 60, 100, e, { fontSize: "28px" })
                .setOrigin(0.5);
          });

          const stats = [
            ["Score", this.d.score],
            ["Level", this.d.level],
            ["Buildings Placed", this.d.buildings],
            ["Questions Correct", `${this.d.qCorrect}/${this.d.qTotal}`],
            ["Best Combo", `${this.d.maxCombo}x`],
            [
              "Accuracy",
              this.d.qTotal > 0
                ? Math.round((this.d.qCorrect / this.d.qTotal) * 100) + "%"
                : "N/A",
            ],
          ];

          stats.forEach((s, i) => {
            const y = 150 + i * 48;
            this.add.text(W / 2 - 140, y, s[0], {
              fontSize: "16px",
              color: "#94a3b8",
            });
            this.add
              .text(W / 2 + 140, y, `${s[1]}`, {
                fontSize: "20px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(1, 0);
            if (i < stats.length - 1)
              this.add.rectangle(W / 2, y + 36, 320, 1, 0x1e293b);
          });

          const pct = this.d.qTotal > 0 ? this.d.qCorrect / this.d.qTotal : 0;
          const stars = pct >= 0.85 ? 3 : pct >= 0.6 ? 2 : 1;
          this.add
            .text(W / 2, 460, "★".repeat(stars) + "☆".repeat(3 - stars), {
              fontSize: "38px",
              color: "#fbbf24",
            })
            .setOrigin(0.5);

          this.add
            .text(
              W / 2,
              505,
              "Remember: d = |coord1 - coord2| for same axis. Quadrants: I(+,+) II(-,+) III(-,-) IV(+,-)",
              {
                fontSize: "11px",
                color: "#64748b",
                wordWrap: { width: 600 },
                align: "center",
              },
            )
            .setOrigin(0.5);

          const playBtn = this.add
            .image(W / 2 - 120, 555, "btn")
            .setScale(0.9)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 - 120, 555, "Play Again", {
              fontSize: "16px",
              color: "#4ade80",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          playBtn.on("pointerdown", () =>
            this.scene.start("Game", { range: this.d.range }),
          );

          const menuBtn = this.add
            .image(W / 2 + 120, 555, "btn")
            .setScale(0.9)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2 + 120, 555, "Main Menu", {
              fontSize: "16px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          menuBtn.on("pointerdown", () => this.scene.start("Title"));

          this.cameras.main.fadeIn(500);
        }
      }

      // ============================================================
      // CONFIG
      // ============================================================
      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: "game-container",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [BootScene, TitleScene, GameScene, ResultsScene],
        input: { activePointers: 3 },
      };

      new Phaser.Game(config);
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
  <script src="/shared/save-resume/save-resume-engine.js" defer></script>
  <!-- nsr-injected:end -->
  <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
  <script src="/assets/game-fx.js" defer></script>
  <!-- gfx-injected:end -->
</body>
</html>
