<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraction Dungeon — Unit 1 RPG</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>
  // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror
  // (document.write blocks parsing so the mirror is ready before the game script runs).
  if (typeof Phaser === "undefined") {
    document.write('<script src="https://unpkg.com/phaser@3.80.1/dist/phaser.min.js"><\/script>');
  }
  // If both CDNs are unreachable, show a clear message instead of a blank page.
  window.addEventListener("load", function () {
    if (typeof Phaser === "undefined") {
      document.body.innerHTML =
        '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">\u26a0\ufe0f This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
    }
  });
</script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0b0c10;
        overflow: hidden;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script>
      (() => {
        const W = 1024,
          H = 768;

        // Audio
        const AC = window.AudioContext || window.webkitAudioContext;
        let actx = null;
        function au() {
          if (!actx) actx = new AC();
          if (actx.state === "suspended") actx.resume();
        }
        function bip(f, d, t = "sine", v = 0.14) {
          if (!actx) return;
          const o = actx.createOscillator(),
            g = actx.createGain();
          o.connect(g);
          g.connect(actx.destination);
          o.frequency.value = f;
          o.type = t;
          g.gain.setValueAtTime(v, actx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + d);
          o.start();
          o.stop(actx.currentTime + d);
        }
        function sfxOk() {
          bip(523, 0.08);
          setTimeout(() => bip(659, 0.08), 80);
          setTimeout(() => bip(784, 0.15), 160);
        }
        function sfxNo() {
          bip(150, 0.3, "sawtooth", 0.1);
        }
        function sfxCl() {
          bip(440, 0.05, "sine", 0.08);
        }
        function sfxLv() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => bip(f, 0.12), i * 90),
          );
        }
        function sfxHit() {
          bip(100, 0.15, "square", 0.12);
          setTimeout(() => bip(80, 0.1, "square", 0.08), 60);
        }
        function sfxLoot() {
          bip(880, 0.06, "triangle", 0.1);
          setTimeout(() => bip(1100, 0.08, "triangle", 0.08), 50);
          setTimeout(() => bip(1320, 0.1, "triangle", 0.06), 100);
        }
        function sfxDoor() {
          bip(220, 0.2, "triangle", 0.08);
          setTimeout(() => bip(330, 0.2, "triangle", 0.06), 100);
        }

        const COL = {
          bg: 0x0b0c10,
          panel: 0x161822,
          accent: 0x6366f1,
          gold: 0xfbbf24,
          red: 0xef4444,
          green: 0x22c55e,
          teal: 0x14b8a6,
          purple: 0xa855f7,
          rose: 0xf43f5e,
          white: 0xffffff,
          dark: 0x070810,
          slate: 0x334155,
          amber: 0xf59e0b,
          sky: 0x38bdf8,
        };

        function shuffle(a) {
          const b = [...a];
          for (let i = b.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [b[i], b[j]] = [b[j], b[i]];
          }
          return b;
        }

        // ─── QUESTION BANK ───
        function genQuestions() {
          const qs = [];

          // Unit conversion
          function unitConv() {
            const pairs = [
              { min: 15, frac: "1/4 hour", hint: "15 min = 1/4 of 60" },
              { min: 30, frac: "1/2 hour", hint: "30 min = half of 60" },
              {
                min: 45,
                frac: "3/4 hour",
                hint: "45 = 3 groups of 15; 60 has 4 groups of 15",
              },
              { min: 20, frac: "1/3 hour", hint: "20 min = 1/3 of 60" },
              {
                min: 40,
                frac: "2/3 hour",
                hint: "40 = 2 groups of 20; 60 has 3 groups of 20",
              },
              { min: 10, frac: "1/6 hour", hint: "10 min = 1/6 of 60" },
              {
                min: 90,
                frac: "1 1/2 hours",
                hint: "90 = 60 + 30 = 1 hour + 1/2 hour",
              },
            ];
            const p = pairs[Math.floor(Math.random() * pairs.length)];
            const wrong = pairs
              .filter((x) => x.frac !== p.frac)
              .slice(0, 3)
              .map((x) => x.frac);
            return {
              type: "conversion",
              monster: "\u{1F47B}",
              monsterName: "Time Wraith",
              text: `${p.min} minutes equals how many hours?`,
              correct: p.frac,
              choices: shuffle([p.frac, ...wrong]),
              hint: p.hint,
              explain: `${p.min} minutes = ${p.frac}`,
            };
          }

          // Fraction division (whole ÷ fraction)
          function fracDiv1() {
            const fracs = [
              [3, 4, "3/4"],
              [1, 2, "1/2"],
              [2, 3, "2/3"],
              [1, 3, "1/3"],
              [1, 4, "1/4"],
              [3, 5, "3/5"],
              [5, 6, "5/6"],
            ];
            const f = fracs[Math.floor(Math.random() * fracs.length)];
            const whole = 2 + Math.floor(Math.random() * 5);
            const ans = (whole * f[1]) / f[0];
            if (!Number.isInteger(ans)) return fracDiv1();
            const correct = String(ans);
            const wrong = [
              String(ans + 1),
              String(ans - 1),
              String(whole),
            ].filter((w) => w !== correct && parseInt(w) > 0);
            while (wrong.length < 3) wrong.push(String(ans + wrong.length + 2));
            return {
              type: "division",
              monster: "\u{1F409}",
              monsterName: "Fraction Dragon",
              text: `${whole} ÷ (${f[2]}) = ?`,
              correct,
              choices: shuffle([correct, ...wrong.slice(0, 3)]),
              hint: `How many ${f[2]} groups fit in ${whole}? Multiply by reciprocal: ${whole} × ${f[1]}/${f[0]}`,
              explain: `${whole} ÷ (${f[2]}) = ${whole} × ${f[1]}/${f[0]} = ${ans}`,
            };
          }

          // Fraction ÷ fraction
          function fracDiv2() {
            const combos = [
              { a: "7/2", b: "7/8", ans: 4, work: "7/2 × 8/7 = 56/14 = 4" },
              { a: "9/4", b: "3/8", ans: 6, work: "9/4 × 8/3 = 72/12 = 6" },
              { a: "5/3", b: "1/6", ans: 10, work: "5/3 × 6/1 = 30/3 = 10" },
              { a: "3/2", b: "3/4", ans: 2, work: "3/2 × 4/3 = 12/6 = 2" },
              { a: "4/3", b: "2/9", ans: 6, work: "4/3 × 9/2 = 36/6 = 6" },
              { a: "5/2", b: "5/4", ans: 2, work: "5/2 × 4/5 = 20/10 = 2" },
              {
                a: "11/3",
                b: "11/12",
                ans: 4,
                work: "11/3 × 12/11 = 132/33 = 4",
              },
            ];
            const c = combos[Math.floor(Math.random() * combos.length)];
            const correct = String(c.ans);
            const wrong = [
              String(c.ans * 2),
              String(c.ans + 2),
              String(Math.max(1, c.ans - 1)),
            ].filter((w) => w !== correct);
            while (wrong.length < 3)
              wrong.push(String(c.ans + wrong.length + 3));
            return {
              type: "division",
              monster: "\u{1F479}",
              monsterName: "Ogre Mage",
              text: `(${c.a}) ÷ (${c.b}) = ?`,
              correct,
              choices: shuffle([correct, ...wrong.slice(0, 3)]),
              hint: `Multiply by the reciprocal: ${c.a} × flip(${c.b})`,
              explain: `${c.work}`,
            };
          }

          // Tape diagram / grouping
          function tapeModel() {
            const scenarios = [
              {
                text: "A 3-hour block has activities of 3/4 hour each. How many activities fit?",
                ans: 4,
                hint: "3 hours = 12 quarter-hours. Each activity = 3 quarters.",
                explain: "3 ÷ (3/4) = 3 × 4/3 = 4",
              },
              {
                text: "A 2-hour workshop has tasks of 1/2 hour. How many tasks?",
                ans: 4,
                hint: "2 hours = 4 half-hours.",
                explain: "2 ÷ (1/2) = 2 × 2 = 4",
              },
              {
                text: "A 4-hour block has sessions of 2/3 hour. How many full sessions?",
                ans: 6,
                hint: "Think: 4 ÷ (2/3) = 4 × 3/2",
                explain: "4 ÷ (2/3) = 4 × 3/2 = 6",
              },
              {
                text: "A 5-hour day has activities of 5/6 hour. How many activities?",
                ans: 6,
                hint: "5 ÷ (5/6) = 5 × 6/5",
                explain: "5 ÷ (5/6) = 5 × 6/5 = 6",
              },
              {
                text: "How many 3/5-hour groups fit in 3 hours?",
                ans: 5,
                hint: "3 ÷ (3/5) = 3 × 5/3",
                explain: "3 ÷ (3/5) = 3 × 5/3 = 5",
              },
              {
                text: "A 6-hour camp day: sessions are 3/4 hour. How many sessions?",
                ans: 8,
                hint: "6 ÷ (3/4) = 6 × 4/3",
                explain: "6 ÷ (3/4) = 6 × 4/3 = 8",
              },
            ];
            const s = scenarios[Math.floor(Math.random() * scenarios.length)];
            const correct = String(s.ans);
            const wrong = [
              String(s.ans + 1),
              String(s.ans - 1),
              String(s.ans + 2),
            ].filter((w) => w !== correct && parseInt(w) > 0);
            while (wrong.length < 3)
              wrong.push(String(s.ans + wrong.length + 3));
            return {
              type: "model",
              monster: "\u{1F9DF}",
              monsterName: "Zombie Guard",
              text: s.text,
              correct,
              choices: shuffle([correct, ...wrong.slice(0, 3)]),
              hint: s.hint,
              explain: s.explain,
            };
          }

          // Boss: mixed harder
          function bossQ() {
            const pool = [
              {
                text: "Boss: 3 hours has how many 45-minute activities?",
                ans: "4",
                hint: "3 ÷ (3/4) = 4",
                explain: "45 min = 3/4 hr. 3 ÷ (3/4) = 4",
              },
              {
                text: "Boss: (5/3) ÷ (1/6) = ?",
                ans: "10",
                hint: "Multiply by 6",
                explain: "5/3 × 6/1 = 30/3 = 10",
              },
              {
                text: "Boss: A 2.5-hour block split into 30-min chunks gives how many?",
                ans: "5",
                hint: "2.5 hours = 150 min. 150 ÷ 30 = 5",
                explain: "2.5 hr = 150 min. 150 ÷ 30 = 5",
              },
              {
                text: "Boss: In a tape of 2 hours split into fourths, how many 1/2-hour activities?",
                ans: "4",
                hint: "8 fourths total. 1/2 hour = 2 fourths. 8 ÷ 2 = 4",
                explain:
                  "2 hr = 8 quarter-hours. 1/2 hr = 2 quarters. 8 ÷ 2 = 4",
              },
            ];
            const p = pool[Math.floor(Math.random() * pool.length)];
            const wrong = [
              String(parseInt(p.ans) + 2),
              String(parseInt(p.ans) + 1),
              String(Math.max(1, parseInt(p.ans) - 1)),
            ].filter((w) => w !== p.ans);
            while (wrong.length < 3)
              wrong.push(String(parseInt(p.ans) + wrong.length + 3));
            return {
              type: "boss",
              monster: "\u{1F432}",
              monsterName: "DUNGEON LORD",
              text: p.text,
              correct: p.ans,
              choices: shuffle([p.ans, ...wrong.slice(0, 3)]),
              hint: p.hint,
              explain: p.explain,
            };
          }

          const gens = [
            unitConv,
            fracDiv1,
            fracDiv2,
            tapeModel,
            fracDiv1,
            unitConv,
            tapeModel,
            fracDiv2,
          ];
          for (let i = 0; i < 16; i++) qs.push(gens[i % gens.length]());
          // Add 4 boss questions
          for (let i = 0; i < 4; i++) qs.push(bossQ());
          return qs; // Keep order: normal then boss
        }

        // ─── DUNGEON ROOMS ───
        const ROOMS = [
          {
            name: "CRYPT OF CONVERSIONS",
            icon: "\u{1F47B}",
            desc: "Convert time units",
            color: COL.teal,
            count: 4,
          },
          {
            name: "FRACTION CAVERNS",
            icon: "\u{1F409}",
            desc: "Divide fractions",
            color: COL.purple,
            count: 4,
          },
          {
            name: "MODEL MAZE",
            icon: "\u{1F9DF}",
            desc: "Tape diagrams & grouping",
            color: COL.amber,
            count: 4,
          },
          {
            name: "MIXED DEPTHS",
            icon: "\u{1F479}",
            desc: "All skills combined",
            color: COL.accent,
            count: 4,
          },
          {
            name: "DUNGEON LORD LAIR",
            icon: "\u{1F432}",
            desc: "Final boss battle!",
            color: COL.rose,
            count: 4,
          },
        ];

        // ─── TITLE SCENE ───
        class TitleScene extends Phaser.Scene {
          constructor() {
            super("TitleScene");
          }
          create() {
            this.cameras.main.setBackgroundColor(COL.bg).fadeIn(500);

            // Dungeon atmosphere
            for (let i = 0; i < 40; i++) {
              const s = this.add.circle(
                Math.random() * W,
                Math.random() * H,
                1,
                COL.white,
                0.15 + Math.random() * 0.2,
              );
              this.tweens.add({
                targets: s,
                alpha: 0.05,
                duration: 1500 + Math.random() * 2000,
                yoyo: true,
                repeat: -1,
              });
            }

            // Torch particles
            for (let tx of [80, W - 80]) {
              this.add
                .text(tx, 300, "\u{1F525}", { fontSize: "32px" })
                .setOrigin(0.5);
              for (let i = 0; i < 8; i++) {
                const p = this.add.circle(
                  tx + Math.random() * 20 - 10,
                  290,
                  2,
                  [COL.gold, COL.amber, COL.red][Math.floor(Math.random() * 3)],
                  0.6,
                );
                this.tweens.add({
                  targets: p,
                  y: p.y - 40 - Math.random() * 30,
                  alpha: 0,
                  duration: 800 + Math.random() * 600,
                  delay: Math.random() * 500,
                  repeat: -1,
                });
              }
            }

            this.add
              .text(W / 2, 100, "\u{2694}️ \u{1F5E1}️ \u{1F6E1}️", {
                fontSize: "48px",
              })
              .setOrigin(0.5);
            const title = this.add
              .text(W / 2, 170, "FRACTION\nDUNGEON", {
                fontSize: "60px",
                fontFamily: "Arial Black",
                color: "#6366f1",
                stroke: "#000",
                strokeThickness: 6,
                align: "center",
                lineSpacing: 2,
              })
              .setOrigin(0.5);
            this.tweens.add({
              targets: title,
              y: 165,
              duration: 2500,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut",
            });

            this.add
              .text(
                W / 2,
                260,
                "Unit 1 — Fraction Division & Unit Conversion",
                { fontSize: "16px", color: "#64748b" },
              )
              .setOrigin(0.5);
            this.add
              .text(
                W / 2,
                288,
                "Explore dungeons! Solve math to defeat monsters & unlock doors!",
                { fontSize: "14px", color: "#475569" },
              )
              .setOrigin(0.5);

            // Hero selection
            const heroes = [
              {
                name: "Knight",
                icon: "\u{1F9D1}‍\u{1F680}",
                power: "Shield Block",
                desc: "+1 life",
              },
              {
                name: "Mage",
                icon: "\u{1F9D9}",
                power: "Arcane Hint",
                desc: "Extra hints",
              },
              {
                name: "Rogue",
                icon: "\u{1F977}",
                power: "Quick Strike",
                desc: "+5s timer",
              },
              {
                name: "Paladin",
                icon: "\u{1F9DD}",
                power: "Holy Light",
                desc: "Combo boost",
              },
            ];
            this.sel = 0;
            this.cards = [];
            heroes.forEach((h, i) => {
              const x = 162 + i * 225,
                y = 430;
              const card = this.add
                .rectangle(x, y, 190, 165, COL.panel)
                .setStrokeStyle(3, i === 0 ? COL.accent : COL.slate)
                .setInteractive({ useHandCursor: true });
              this.add
                .text(x, y - 45, h.icon, { fontSize: "40px" })
                .setOrigin(0.5);
              this.add
                .text(x, y + 5, h.name, {
                  fontSize: "16px",
                  color: "#fff",
                  fontStyle: "bold",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 25, h.power, {
                  fontSize: "12px",
                  color: "#a855f7",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 45, h.desc, { fontSize: "11px", color: "#64748b" })
                .setOrigin(0.5);
              card.on("pointerdown", () => {
                au();
                sfxCl();
                this.sel = i;
                this.cards.forEach((c, j) =>
                  c.setStrokeStyle(3, j === i ? COL.accent : COL.slate),
                );
              });
              this.cards.push(card);
            });

            const btn = this.add
              .rectangle(W / 2, 580, 280, 56, COL.accent)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2, 580, "ENTER DUNGEON", {
                fontSize: "22px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);
            btn.on("pointerdown", () => {
              au();
              sfxDoor();
              this.cameras.main.fadeOut(400);
              this.time.delayedCall(400, () =>
                this.scene.start("GameScene", { hero: heroes[this.sel] }),
              );
            });
            btn.on("pointerover", () => btn.setScale(1.05));
            btn.on("pointerout", () => btn.setScale(1));
          }
        }

        // ─── GAME SCENE ───
        class GameScene extends Phaser.Scene {
          constructor() {
            super("GameScene");
          }
          init(d) {
            this.hero = d.hero;
          }

          create() {
            this.cameras.main.setBackgroundColor(COL.bg).fadeIn(400);

            this.questions = genQuestions();
            this.qIdx = 0;
            this.score = 0;
            this.streak = 0;
            this.bestStreak = 0;
            this.correct = 0;
            this.total = 0;
            this.lives = this.hero.name === "Knight" ? 4 : 3;
            this.maxLives = this.lives;
            this.answered = false;
            this.attempts = 0;
            this.timeLeft = this.hero.name === "Rogue" ? 35 : 30;
            this.baseTime = this.timeLeft;
            this.level = 1;
            this.xp = 0;
            this.loot = 0;
            this.roomIdx = 0;
            this.roomQ = 0;
            this.hintsLeft = this.hero.name === "Mage" ? 4 : 2;
            this.monsterHp = 100;

            // BG
            this.add.rectangle(W / 2, H / 2, W, H, COL.dark);
            // Stone texture
            const gfx = this.add.graphics();
            gfx.lineStyle(1, 0xffffff, 0.02);
            for (let x = 0; x < W; x += 64) gfx.lineBetween(x, 0, x, H);
            for (let y = 0; y < H; y += 64) gfx.lineBetween(0, y, W, y);

            // HUD
            this.add.rectangle(W / 2, 28, W, 56, COL.bg, 0.96);
            this.add.rectangle(W / 2, 56, W, 2, COL.accent, 0.2);
            this.hudHero = this.add.text(
              15,
              8,
              this.hero.icon + " " + this.hero.name,
              { fontSize: "14px", color: "#a855f7", fontStyle: "bold" },
            );
            this.hudLv = this.add.text(15, 30, "Lv 1", {
              fontSize: "11px",
              color: "#64748b",
            });
            this.hudScore = this.add
              .text(W / 2, 8, "0", {
                fontSize: "22px",
                fontFamily: "Arial Black",
                color: "#fbbf24",
              })
              .setOrigin(0.5, 0);
            this.add
              .text(W / 2, 34, "XP", { fontSize: "9px", color: "#64748b" })
              .setOrigin(0.5, 0);
            this.hudLives = this.add.text(W - 200, 8, "", {
              fontSize: "14px",
              color: "#ef4444",
            });
            this.hudStreak = this.add.text(W - 200, 30, "", {
              fontSize: "12px",
              color: "#a855f7",
            });
            this.hudTimer = this.add.text(W - 60, 14, "30s", {
              fontSize: "14px",
              color: "#fbbf24",
            });
            this.hudRoom = this.add.text(180, 14, "", {
              fontSize: "11px",
              color: "#64748b",
            });
            this.hudHints = this.add.text(180, 32, "", {
              fontSize: "11px",
              color: "#14b8a6",
            });
            this.hudXpBg = this.add.rectangle(W / 2, 54, 200, 3, 0x222, 0.3);
            this.hudXpFill = this.add
              .rectangle(W / 2 - 100, 54, 0, 3, COL.accent)
              .setOrigin(0, 0.5);

            // Room banner
            this.roomBanner = this.add
              .text(W / 2, 80, "", {
                fontSize: "14px",
                fontFamily: "Arial Black",
                color: "#6366f1",
              })
              .setOrigin(0.5);
            this.roomDesc = this.add
              .text(W / 2, 100, "", { fontSize: "12px", color: "#64748b" })
              .setOrigin(0.5);

            // Room progress dots
            this.roomDots = [];
            for (let i = 0; i < 5; i++) {
              const d = this.add.circle(W / 2 - 60 + i * 30, 125, 8, COL.slate);
              this.add
                .text(W / 2 - 60 + i * 30, 125, ROOMS[i].icon, {
                  fontSize: "12px",
                })
                .setOrigin(0.5);
              this.roomDots.push(d);
            }

            // Monster area
            this.monsterSprite = this.add
              .text(W / 2, 185, "", { fontSize: "56px" })
              .setOrigin(0.5);
            this.monsterName = this.add
              .text(W / 2, 225, "", {
                fontSize: "14px",
                color: "#ef4444",
                fontStyle: "bold",
              })
              .setOrigin(0.5);
            this.monHpBg = this.add.rectangle(W / 2, 248, 180, 8, 0x222);
            this.monHpBar = this.add
              .rectangle(W / 2 - 90, 248, 180, 8, COL.red)
              .setOrigin(0, 0.5);

            // Question card
            this.qCard = this.add
              .rectangle(W / 2, 380, 720, 260, COL.panel)
              .setStrokeStyle(1, COL.slate);
            this.add.rectangle(W / 2, 251, 720, 3, COL.accent, 0.2);
            this.qType = this.add
              .text(W / 2, 268, "", {
                fontSize: "10px",
                color: "#6366f1",
                letterSpacing: 2,
              })
              .setOrigin(0.5);
            this.qText = this.add
              .text(W / 2, 310, "", {
                fontSize: "18px",
                color: "#e2e8f0",
                fontStyle: "bold",
                wordWrap: { width: 660 },
                align: "center",
                lineSpacing: 4,
              })
              .setOrigin(0.5);

            // Choices
            this.btns = [];
            this.btnTxts = [];
            for (let i = 0; i < 4; i++) {
              const col = i % 2,
                row = Math.floor(i / 2);
              const x = W / 2 - 170 + col * 340,
                y = 380 + row * 58;
              const btn = this.add
                .rectangle(x, y, 320, 48, COL.dark)
                .setStrokeStyle(2, COL.slate)
                .setInteractive({ useHandCursor: true });
              const txt = this.add
                .text(x, y, "", {
                  fontSize: "16px",
                  color: "#e2e8f0",
                  fontStyle: "bold",
                })
                .setOrigin(0.5);
              btn.on("pointerdown", () => this.pick(i));
              btn.on("pointerover", () => {
                if (!this.answered) btn.setStrokeStyle(2, COL.accent);
              });
              btn.on("pointerout", () => {
                if (!this.answered) btn.setStrokeStyle(2, COL.slate);
              });
              this.btns.push(btn);
              this.btnTxts.push(txt);
            }

            // Hint button
            this.hintBtn = this.add
              .rectangle(W / 2 - 280, 520, 100, 32, COL.teal, 0.8)
              .setInteractive({ useHandCursor: true });
            this.hintBtnTxt = this.add
              .text(W / 2 - 280, 520, "\u{1F4A1} Hint", {
                fontSize: "12px",
                color: "#fff",
                fontStyle: "bold",
              })
              .setOrigin(0.5);
            this.hintBtn.on("pointerdown", () => this.useHint());

            // Hint display
            this.hintBg = this.add
              .rectangle(W / 2, 520, 500, 34, 0x1a2a1a, 0.8)
              .setAlpha(0);
            this.hintTxt = this.add
              .text(W / 2, 520, "", { fontSize: "13px", color: "#14b8a6" })
              .setOrigin(0.5)
              .setAlpha(0);

            // Feedback
            this.fbBg = this.add
              .rectangle(W / 2, 565, 720, 44, COL.panel)
              .setAlpha(0);
            this.fbTxt = this.add
              .text(W / 2, 565, "", {
                fontSize: "14px",
                color: "#e2e8f0",
                wordWrap: { width: 680 },
                align: "center",
              })
              .setOrigin(0.5)
              .setAlpha(0);

            // Next
            this.nxtBtn = this.add
              .rectangle(W / 2, 630, 220, 46, COL.accent)
              .setInteractive({ useHandCursor: true })
              .setAlpha(0);
            this.nxtTxt = this.add
              .text(W / 2, 630, "NEXT ROOM >", {
                fontSize: "14px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5)
              .setAlpha(0);
            this.nxtBtn.on("pointerdown", () => {
              if (this.answered) this.nextQ();
            });

            // Loot display
            this.lootTxt = this.add.text(W - 60, 42, "\u{1F48E} 0", {
              fontSize: "11px",
              color: "#fbbf24",
            });

            // Timer
            this.timerEvt = this.time.addEvent({
              delay: 1000,
              callback: this.tick,
              callbackScope: this,
              loop: true,
            });

            // Keys
            this.input.keyboard.on("keydown", (e) => {
              if (e.key === "1" || e.key === "a") this.pick(0);
              if (e.key === "2" || e.key === "b") this.pick(1);
              if (e.key === "3" || e.key === "c") this.pick(2);
              if (e.key === "4" || e.key === "d") this.pick(3);
              if (e.key === "Enter" && this.answered) this.nextQ();
              if (e.key === "h") this.useHint();
            });

            this.loadQ();
          }

          tick() {
            if (this.answered || this.timeLeft <= 0) return;
            this.timeLeft--;
            this.hudTimer.setText(this.timeLeft + "s");
            if (this.timeLeft <= 5 && this.timeLeft > 0) {
              bip(300, 0.04, "square", 0.03);
              this.hudTimer.setColor("#ff4444");
            }
            if (this.timeLeft <= 0) {
              this.answered = true;
              sfxNo();
              this.streak = 0;
              this.lives--;
              this.showFB(false);
              this.cameras.main.shake(200, 0.01);
              this.updateHUD();
              if (this.lives <= 0)
                this.time.delayedCall(1500, () => this.endGame());
            }
          }

          useHint() {
            if (this.answered || this.hintsLeft <= 0) return;
            au();
            sfxCl();
            this.hintsLeft--;
            const q = this.questions[this.qIdx];
            this.hintBg.setAlpha(0.8);
            this.hintTxt.setText("\u{1F4A1} " + q.hint).setAlpha(1);
            this.updateHUD();
          }

          loadQ() {
            if (this.qIdx >= this.questions.length)
              this.questions.push(...genQuestions());
            const q = this.questions[this.qIdx];
            this.answered = false;
            this.attempts = 0;
            this.timeLeft = this.baseTime;
            this.hudTimer.setColor("#fbbf24");

            // Determine room
            this.roomIdx = Math.min(4, Math.floor(this.qIdx / 4));
            this.roomQ = this.qIdx % 4;
            const room = ROOMS[Math.min(this.roomIdx, 4)];

            // Update room dots
            this.roomDots.forEach((d, i) => {
              if (i < this.roomIdx) d.fillColor = COL.green;
              else if (i === this.roomIdx) d.fillColor = COL.gold;
              else d.fillColor = COL.slate;
            });

            this.roomBanner.setText(room.icon + " " + room.name);
            this.roomDesc.setText(
              room.desc + " — Room " + (this.roomQ + 1) + "/" + room.count,
            );

            // Monster
            this.monsterSprite.setText(q.monster || "\u{1F47E}");
            this.monsterName.setText(q.monsterName || "Monster");
            this.monsterHp = 100;
            this.monHpBar.setDisplaySize(180, 8);
            this.tweens.add({
              targets: this.monsterSprite,
              scaleX: { from: 0.5, to: 1 },
              scaleY: { from: 0.5, to: 1 },
              duration: 300,
              ease: "Back.easeOut",
            });

            this.qType.setText(q.type.toUpperCase());
            this.qText.setText(q.text);

            q.choices.forEach((c, i) => {
              this.btnTxts[i].setText(String.fromCharCode(65 + i) + ". " + c);
              this.btns[i].fillColor = COL.dark;
              this.btns[i].setStrokeStyle(2, COL.slate);
              this.btns[i].setAlpha(1);
              this.btnTxts[i].setAlpha(1);
              this.btns[i].setInteractive();
            });

            this.hintBg.setAlpha(0);
            this.hintTxt.setAlpha(0);
            this.fbBg.setAlpha(0);
            this.fbTxt.setAlpha(0);
            this.nxtBtn.setAlpha(0);
            this.nxtTxt.setAlpha(0);
            this.hintBtn.setAlpha(this.hintsLeft > 0 ? 1 : 0.3);
            this.updateHUD();
          }

          pick(i) {
            if (this.answered) return;
            au();
            const q = this.questions[this.qIdx];
            const chosen = q.choices[i];

            if (chosen === q.correct) {
              this.answered = true;
              sfxOk();
              sfxHit();
              this.correct++;
              this.total++;
              this.streak++;
              if (this.streak > this.bestStreak) this.bestStreak = this.streak;
              const comboMult =
                this.hero.name === "Paladin"
                  ? Math.min(6, 1 + Math.floor(this.streak / 2))
                  : Math.min(5, 1 + Math.floor(this.streak / 3));
              const pts =
                (100 + (this.attempts === 0 ? 50 : 0) + this.streak * 12) *
                comboMult;
              this.score += pts;
              this.xp += 20;
              if (this.xp >= 100) {
                this.xp -= 100;
                this.level++;
                sfxLv();
              }

              // Loot
              const lootAmt = 10 + Math.floor(Math.random() * 20);
              this.loot += lootAmt;
              sfxLoot();

              // Monster damage
              this.monsterHp = 0;
              this.monHpBar.setDisplaySize(0, 8);
              this.tweens.add({
                targets: this.monsterSprite,
                alpha: 0,
                scaleX: 1.5,
                scaleY: 1.5,
                duration: 400,
              });

              this.btns[i].fillColor = COL.green;
              this.showFB(true);
              this.spawnParts(this.btns[i].x, this.btns[i].y, true);
              this.showPts(pts, lootAmt);
            } else {
              sfxNo();
              this.attempts++;
              this.btns[i].fillColor = COL.red;
              this.btns[i].setAlpha(0.4);
              this.btns[i].disableInteractive();
              this.cameras.main.shake(120, 0.006);

              // Monster attacks back
              this.tweens.add({
                targets: this.monsterSprite,
                x: W / 2 - 20,
                duration: 80,
                yoyo: true,
                repeat: 2,
              });

              if (this.attempts >= 2) {
                this.answered = true;
                this.total++;
                this.streak = 0;
                this.lives--;
                q.choices.forEach((c, j) => {
                  if (c === q.correct) this.btns[j].fillColor = COL.green;
                });
                this.showFB(false);
                if (this.lives <= 0)
                  this.time.delayedCall(1500, () => this.endGame());
              } else {
                // Auto-show hint on first miss
                this.hintBg.setAlpha(0.8);
                this.hintTxt.setText("\u{1F4A1} " + q.hint).setAlpha(1);
              }
            }
            this.updateHUD();
          }

          showFB(ok) {
            const q = this.questions[this.qIdx];
            this.fbBg.setAlpha(0.95);
            this.fbBg.fillColor = ok ? 0x0a200a : 0x200a0a;
            this.fbTxt
              .setText(
                (ok
                  ? "\u{2694}️ Monster defeated! "
                  : "💀 The monster strikes! ") + q.explain,
              )
              .setAlpha(1);
            this.nxtBtn.setAlpha(1);
            this.nxtTxt.setAlpha(1);

            const nextRoom = Math.floor((this.qIdx + 1) / 4);
            const isRoomEnd = (this.qIdx + 1) % 4 === 0;
            if (this.lives <= 0) this.nxtTxt.setText("GAME OVER");
            else if (this.qIdx >= 19) this.nxtTxt.setText("CLAIM VICTORY");
            else if (isRoomEnd) this.nxtTxt.setText("NEXT DUNGEON >");
            else this.nxtTxt.setText("NEXT MONSTER >");
          }

          showPts(p, loot) {
            const t = this.add
              .text(W / 2, 200, "+" + p + " XP  \u{1F48E}+" + loot, {
                fontSize: "20px",
                fontFamily: "Arial Black",
                color: "#fbbf24",
                stroke: "#000",
                strokeThickness: 3,
              })
              .setOrigin(0.5);
            this.tweens.add({
              targets: t,
              y: 160,
              alpha: 0,
              duration: 1000,
              onComplete: () => t.destroy(),
            });
          }

          spawnParts(x, y, ok) {
            const colors = ok
              ? [COL.gold, COL.accent, COL.green, COL.purple, COL.white]
              : [COL.red, COL.rose];
            for (let i = 0; i < 16; i++) {
              const p = this.add.circle(
                x,
                y,
                2 + Math.random() * 3,
                colors[Math.floor(Math.random() * colors.length)],
              );
              this.tweens.add({
                targets: p,
                x: x + (Math.random() - 0.5) * 280,
                y: y + (Math.random() - 0.5) * 180,
                alpha: 0,
                scale: 0,
                duration: 500 + Math.random() * 400,
                onComplete: () => p.destroy(),
              });
            }
          }

          nextQ() {
            if (!this.answered) return;
            sfxCl();
            if (this.lives <= 0 || this.qIdx >= 19) {
              this.endGame();
              return;
            }

            // Room transition
            const wasRoom = Math.floor(this.qIdx / 4);
            this.qIdx++;
            const newRoom = Math.floor(this.qIdx / 4);
            if (newRoom !== wasRoom && newRoom < 5) {
              sfxDoor();
              this.showRoomTransition(newRoom);
            } else {
              this.monsterSprite.setAlpha(1).setScale(1);
              this.loadQ();
            }
          }

          showRoomTransition(idx) {
            const room = ROOMS[Math.min(idx, 4)];
            const bg = this.add
              .rectangle(W / 2, H / 2, W, H, 0x000000, 0.9)
              .setDepth(100);
            const icon = this.add
              .text(W / 2, H / 2 - 40, room.icon, { fontSize: "64px" })
              .setOrigin(0.5)
              .setDepth(101);
            const title = this.add
              .text(W / 2, H / 2 + 20, room.name, {
                fontSize: "28px",
                fontFamily: "Arial Black",
                color: "#6366f1",
              })
              .setOrigin(0.5)
              .setDepth(101);
            const desc = this.add
              .text(W / 2, H / 2 + 55, room.desc, {
                fontSize: "14px",
                color: "#64748b",
              })
              .setOrigin(0.5)
              .setDepth(101);

            this.time.delayedCall(1800, () => {
              bg.destroy();
              icon.destroy();
              title.destroy();
              desc.destroy();
              this.monsterSprite.setAlpha(1).setScale(1);
              this.loadQ();
            });
          }

          updateHUD() {
            this.hudScore.setText(this.score.toLocaleString());
            this.hudLv.setText("Lv " + this.level);
            this.hudLives.setText(
              "❤️".repeat(Math.max(0, this.lives)) +
                "🖤".repeat(Math.max(0, this.maxLives - this.lives)),
            );
            this.hudStreak.setText(
              this.streak >= 3 ? "\u{1F525} " + this.streak + "x Combo" : "",
            );
            this.hudTimer.setText(this.timeLeft + "s");
            this.hudRoom.setText(
              "Room " + (this.roomIdx + 1) + "/5 | Q" + (this.roomQ + 1) + "/4",
            );
            this.hudHints.setText("\u{1F4A1} Hints: " + this.hintsLeft);
            this.hudXpFill.setDisplaySize(this.xp * 2, 3);
            this.lootTxt.setText("\u{1F48E} " + this.loot);
            this.hintBtnTxt.setText("\u{1F4A1} Hint (" + this.hintsLeft + ")");
          }

          endGame() {
            this.timerEvt.remove();
            this.cameras.main.fadeOut(500);
            this.time.delayedCall(500, () =>
              this.scene.start("ResultScene", {
                hero: this.hero,
                score: this.score,
                correct: this.correct,
                total: this.total,
                bestStreak: this.bestStreak,
                level: this.level,
                loot: this.loot,
                roomsCleared: this.roomIdx,
                won: this.qIdx >= 19 && this.lives > 0,
              }),
            );
          }
        }

        // ─── RESULT SCENE ───
        class ResultScene extends Phaser.Scene {
          constructor() {
            super("ResultScene");
          }
          init(d) {
            Object.assign(this, d);
          }
          create() {
            this.cameras.main.setBackgroundColor(COL.bg).fadeIn(500);
            const pct =
              this.total > 0
                ? Math.round((this.correct / this.total) * 100)
                : 0;
            let rank, emoji;
            if (this.won) {
              rank = "DUNGEON MASTER";
              emoji = "\u{1F451}";
            } else if (pct >= 80) {
              rank = "VETERAN EXPLORER";
              emoji = "\u{1F3C6}";
            } else if (pct >= 60) {
              rank = "DUNGEON DIVER";
              emoji = "⭐";
            } else {
              rank = "APPRENTICE";
              emoji = "\u{1F4DA}";
            }

            this.add
              .text(W / 2, 70, emoji, { fontSize: "64px" })
              .setOrigin(0.5);
            this.add
              .text(
                W / 2,
                140,
                this.won ? "DUNGEON CLEARED!" : "DUNGEON RUN OVER",
                {
                  fontSize: "40px",
                  fontFamily: "Arial Black",
                  color: this.won ? "#22c55e" : "#ef4444",
                  stroke: "#000",
                  strokeThickness: 4,
                },
              )
              .setOrigin(0.5);
            this.add
              .text(W / 2, 190, rank, {
                fontSize: "20px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 240, this.score.toLocaleString(), {
                fontSize: "48px",
                fontFamily: "Arial Black",
                color: "#fbbf24",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 278, "TOTAL XP", {
                fontSize: "12px",
                color: "#64748b",
              })
              .setOrigin(0.5);

            const stats = [
              { l: "Correct", v: this.correct + "/" + this.total },
              { l: "Streak", v: this.bestStreak },
              { l: "Level", v: this.level },
              { l: "Loot", v: "\u{1F48E}" + this.loot },
              { l: "Rooms", v: this.roomsCleared + 1 + "/5" },
            ];
            stats.forEach((s, i) => {
              const x = 112 + i * 180,
                y = 380;
              this.add
                .rectangle(x, y, 155, 80, COL.panel)
                .setStrokeStyle(1, COL.slate);
              this.add
                .text(x, y - 10, String(s.v), {
                  fontSize: "20px",
                  fontFamily: "Arial Black",
                  color: "#6366f1",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 22, s.l, { fontSize: "11px", color: "#64748b" })
                .setOrigin(0.5);
            });

            const btn = this.add
              .rectangle(W / 2, 500, 260, 54, COL.accent)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2, 500, "ENTER AGAIN", {
                fontSize: "20px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);
            btn.on("pointerdown", () => {
              sfxCl();
              this.scene.start("TitleScene");
            });
            btn.on("pointerover", () => btn.setScale(1.05));
            btn.on("pointerout", () => btn.setScale(1));

            if (this.won) {
              for (let i = 0; i < 30; i++) {
                const p = this.add.circle(
                  Math.random() * W,
                  Math.random() * H,
                  2 + Math.random() * 3,
                  [COL.gold, COL.accent, COL.purple, COL.teal][
                    Math.floor(Math.random() * 4)
                  ],
                  0.6,
                );
                this.tweens.add({
                  targets: p,
                  y: p.y - 200 - Math.random() * 300,
                  alpha: 0,
                  duration: 2000 + Math.random() * 2000,
                  delay: Math.random() * 1000,
                  repeat: -1,
                });
              }
            }
          }
        }

        new Phaser.Game({
          type: Phaser.AUTO,
          parent: "game-container",
          width: W,
          height: H,
          backgroundColor: "#0b0c10",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          scene: [TitleScene, GameScene, ResultScene],
        });
      })();
    </script>
  </body>
</html>
