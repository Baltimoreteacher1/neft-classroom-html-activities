<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACCESS Practice Lab — EduWonderLab</title>
    <style>
      :root {
        --paper: #f7f4ec;
        --navy: #17324d;
        --navy2: #274a6a;
        --teal: #1fa6a2;
        --teal-soft: #e3f2f0;
        --amber: #f2c15b;
        --ink: #24323f;
        --coral: #e8765b;
        --coral-soft: #fbe7e1;
        --purple: #4a2580;
        --green: #2e8b6f;
        --green-soft: #ddf1e9;
        --line: #dcd6c8;
        --white: #ffffff;
        --shadow: 0 2px 10px rgba(23, 50, 77, 0.1);
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Calibri, system-ui, Arial, sans-serif;
        background: var(--paper);
        color: var(--ink);
        line-height: 1.5;
      }
      header.app {
        background: var(--navy);
        color: #fff;
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        position: sticky;
        top: 0;
        z-index: 50;
        box-shadow: var(--shadow);
      }
      header.app h1 {
        font-size: 20px;
        margin: 0;
        letter-spacing: 0.3px;
      }
      header.app .sub {
        font-size: 12px;
        color: #cfe0e6;
        font-weight: 400;
      }
      .brandtag {
        background: var(--amber);
        color: var(--navy);
        font-weight: 700;
        font-size: 11px;
        padding: 3px 9px;
        border-radius: 20px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 18px;
      }
      /* domain tabs */
      .tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 6px 0 14px;
      }
      .tab {
        border: 2px solid var(--navy2);
        background: #fff;
        color: var(--navy);
        padding: 9px 16px;
        border-radius: 24px;
        font-weight: 700;
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 7px;
      }
      .tab .ic {
        font-size: 16px;
      }
      .tab[aria-selected="true"] {
        background: var(--navy);
        color: #fff;
        border-color: var(--navy);
      }
      .tab.teacher[aria-selected="true"] {
        background: var(--purple);
        border-color: var(--purple);
      }
      .tab.teacher {
        border-color: var(--purple);
        color: var(--purple);
      }
      /* band toggle */
      .bandbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .bandbar .lbl {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--navy2);
      }
      .bandtoggle {
        display: inline-flex;
        border: 2px solid var(--teal);
        border-radius: 22px;
        overflow: hidden;
      }
      .bandtoggle button {
        border: 0;
        background: #fff;
        color: var(--teal);
        padding: 8px 14px;
        font-weight: 700;
        cursor: pointer;
        font-size: 13px;
      }
      .bandtoggle button[aria-pressed="true"] {
        background: var(--teal);
        color: #fff;
      }
      .progresswrap {
        flex: 1;
        min-width: 180px;
      }
      .progressbar {
        height: 12px;
        background: #e7e0d0;
        border-radius: 8px;
        overflow: hidden;
      }
      .progressbar > i {
        display: block;
        height: 100%;
        background: linear-gradient(90deg, var(--teal), var(--green));
        width: 0%;
        transition: width 0.3s;
      }
      .progresswrap small {
        font-size: 11px;
        color: var(--navy2);
        font-weight: 600;
      }
      /* activity grid */
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
        gap: 16px;
      }
      .card {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: var(--shadow);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        position: relative;
      }
      .card.done {
        border-color: var(--green);
        box-shadow: 0 0 0 2px var(--green-soft);
      }
      .card .meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--navy2);
      }
      .card .meta .lvl {
        background: var(--teal-soft);
        color: var(--navy);
        padding: 2px 8px;
        border-radius: 12px;
      }
      .card .meta .typ {
        background: var(--paper);
        padding: 2px 8px;
        border-radius: 12px;
        border: 1px solid var(--line);
      }
      .card h3 {
        margin: 0;
        font-size: 16px;
        color: var(--navy);
      }
      .card .visual {
        font-size: 40px;
        line-height: 1;
        margin: 2px 0 2px;
      }
      .recwrap {
        margin: 6px 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .card .donebadge {
        position: absolute;
        top: -9px;
        right: -9px;
        background: var(--green);
        color: #fff;
        border-radius: 50%;
        width: 26px;
        height: 26px;
        display: none;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        box-shadow: var(--shadow);
      }
      .card.done .donebadge {
        display: flex;
      }
      .scriptbox,
      .passage {
        background: var(--paper);
        border-left: 4px solid var(--teal);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
      }
      .passage {
        border-left-color: var(--navy);
        white-space: pre-wrap;
      }
      .q {
        font-weight: 600;
        font-size: 14px;
      }
      .choices {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }
      .choice {
        text-align: left;
        border: 1.5px solid var(--line);
        background: #fff;
        border-radius: 9px;
        padding: 9px 11px;
        cursor: pointer;
        font-size: 14px;
        display: flex;
        gap: 8px;
        align-items: flex-start;
      }
      .choice:hover {
        border-color: var(--teal);
      }
      .choice .k {
        font-weight: 700;
        color: var(--navy2);
      }
      .choice.correct {
        background: var(--green-soft);
        border-color: var(--green);
      }
      .choice.wrong {
        background: var(--coral-soft);
        border-color: var(--coral);
      }
      .choice[disabled] {
        cursor: default;
        opacity: 0.95;
      }
      .fb {
        font-size: 13px;
        font-weight: 600;
        min-height: 18px;
      }
      .fb.ok {
        color: var(--green);
      }
      .fb.no {
        color: var(--coral);
      }
      .btn {
        border: 0;
        border-radius: 9px;
        padding: 9px 14px;
        font-weight: 700;
        cursor: pointer;
        font-size: 13px;
      }
      .btn.play {
        background: var(--navy);
        color: #fff;
        display: inline-flex;
        gap: 7px;
        align-items: center;
        align-self: flex-start;
      }
      .btn.tealb {
        background: var(--teal);
        color: #fff;
      }
      .btn.amberb {
        background: var(--amber);
        color: var(--navy);
      }
      .btn.ghost {
        background: #fff;
        border: 1.5px solid var(--navy2);
        color: var(--navy);
      }
      .btn:active {
        transform: translateY(1px);
      }
      .support {
        background: var(--teal-soft);
        border-radius: 8px;
        padding: 9px 11px;
        font-size: 13px;
      }
      .support b {
        color: var(--navy);
      }
      .frames {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 14px;
      }
      .frame {
        background: #fff;
        border: 1px dashed var(--teal);
        border-radius: 8px;
        padding: 7px 10px;
      }
      .wordbank {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .chip {
        background: var(--amber);
        color: var(--navy);
        border: 0;
        border-radius: 16px;
        padding: 5px 11px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .chip.muted {
        background: var(--paper);
        border: 1px solid var(--line);
        color: var(--navy2);
        cursor: default;
      }
      .blanks input {
        border: 0;
        border-bottom: 2px solid var(--teal);
        background: var(--paper);
        font-size: 14px;
        padding: 3px 6px;
        min-width: 90px;
        font-family: inherit;
      }
      textarea.write {
        width: 100%;
        min-height: 90px;
        border: 1.5px solid var(--line);
        border-radius: 9px;
        padding: 9px;
        font-family: inherit;
        font-size: 14px;
        resize: vertical;
      }
      .orgrow {
        display: flex;
        flex-direction: column;
        gap: 3px;
        margin-bottom: 7px;
      }
      .orgrow label {
        font-size: 12px;
        font-weight: 700;
        color: var(--navy2);
      }
      .orgrow input,
      .orgrow textarea {
        border: 1.5px solid var(--line);
        border-radius: 8px;
        padding: 7px;
        font-family: inherit;
        font-size: 13px;
      }
      .checklist {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .checklist li {
        display: flex;
        gap: 8px;
        align-items: flex-start;
        font-size: 13px;
      }
      .checklist input {
        margin-top: 3px;
      }
      .timer {
        font-size: 30px;
        font-weight: 800;
        color: var(--navy);
        text-align: center;
        font-variant-numeric: tabular-nums;
      }
      .timerctl {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      .stars {
        display: flex;
        gap: 4px;
        justify-content: center;
        font-size: 26px;
        color: #d8cdb4;
        cursor: pointer;
      }
      .stars span.on {
        color: var(--amber);
      }
      .ordlist {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .orditem {
        display: flex;
        gap: 8px;
        align-items: center;
        background: #fff;
        border: 1.5px solid var(--line);
        border-radius: 8px;
        padding: 7px 10px;
        font-size: 14px;
      }
      .orditem .num {
        background: var(--navy);
        color: #fff;
        border-radius: 6px;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 12px;
      }
      .orditem .mv {
        margin-left: auto;
        display: flex;
        gap: 4px;
      }
      .orditem .mv button {
        border: 1px solid var(--line);
        background: var(--paper);
        border-radius: 6px;
        width: 26px;
        height: 26px;
        cursor: pointer;
        font-weight: 700;
      }
      .row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .wc {
        font-size: 12px;
        color: var(--navy2);
        font-weight: 600;
      }
      /* teacher panel */
      .teacherhead {
        background: linear-gradient(120deg, var(--purple), #6a3fb0);
        color: #fff;
        border-radius: 14px;
        padding: 16px 18px;
        margin-bottom: 14px;
      }
      .teacherhead h2 {
        margin: 0 0 4px;
      }
      .teacherhead p {
        margin: 0;
        font-size: 13px;
        color: #ece3fa;
      }
      .acc {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        margin-bottom: 12px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }
      .acc > button.acchead {
        width: 100%;
        text-align: left;
        background: #fff;
        border: 0;
        padding: 14px 16px;
        font-size: 16px;
        font-weight: 700;
        color: var(--navy);
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .acc > button.acchead .ar {
        transition: transform 0.2s;
      }
      .acc.open > button.acchead .ar {
        transform: rotate(90deg);
      }
      .accbody {
        padding: 0 16px;
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }
      .acc.open .accbody {
        max-height: 6000px;
        padding: 0 16px 16px;
      }
      .path {
        border-left: 4px solid var(--teal);
        background: var(--paper);
        border-radius: 8px;
        padding: 11px 13px;
        margin-bottom: 10px;
      }
      .path h4 {
        margin: 0 0 5px;
        color: var(--navy);
      }
      .path .steps {
        margin: 0;
        padding-left: 18px;
        font-size: 13px;
      }
      .path .steps li {
        margin-bottom: 3px;
      }
      .plan {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 13px;
        margin-bottom: 12px;
        background: #fff;
      }
      .plan h4 {
        margin: 0 0 6px;
        color: var(--purple);
      }
      .plan table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .plan td,
      .plan th {
        border: 1px solid var(--line);
        padding: 7px 8px;
        text-align: left;
        vertical-align: top;
      }
      .plan th {
        background: var(--teal-soft);
        color: var(--navy);
      }
      .deck {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .promptcard {
        width: 100%;
        max-width: 520px;
        min-height: 200px;
        background: linear-gradient(135deg, #fff, var(--teal-soft));
        border: 2px solid var(--teal);
        border-radius: 16px;
        padding: 18px;
        box-shadow: var(--shadow);
      }
      .promptcard .cat {
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: var(--teal);
        display: flex;
        justify-content: space-between;
      }
      .promptcard .big {
        font-size: 19px;
        font-weight: 700;
        color: var(--navy);
        margin: 8px 0;
      }
      .promptcard .frames {
        margin-top: 8px;
      }
      .deckctl {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .note {
        font-size: 12px;
        color: var(--navy2);
        background: var(--paper);
        border-radius: 8px;
        padding: 8px 10px;
      }
      footer {
        text-align: center;
        font-size: 12px;
        color: var(--navy2);
        padding: 24px;
      }
      .hidden {
        display: none !important;
      }
      @media (max-width: 600px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header class="app">
      <div>
        <h1>ACCESS Practice Lab <span class="brandtag">v2.0</span></h1>
        <div class="sub">
          Interactive WIDA test-prep for Listening · Reading · Speaking ·
          Writing — EduWonderLab
        </div>
      </div>
      <div class="brandtag" id="statTotal">199 activities</div>
    </header>

    <div class="wrap">
      <div class="tabs" role="tablist" id="tabs">
        <button
          class="tab"
          role="tab"
          data-domain="Listening"
          aria-selected="true"
        >
          <span class="ic">🎧</span> Listening
        </button>
        <button class="tab" role="tab" data-domain="Reading">
          <span class="ic">📖</span> Reading
        </button>
        <button class="tab" role="tab" data-domain="Speaking">
          <span class="ic">🗣️</span> Speaking
        </button>
        <button class="tab" role="tab" data-domain="Writing">
          <span class="ic">✏️</span> Writing
        </button>
        <button class="tab" role="tab" data-domain="Results">
          <span class="ic">📊</span> My Results
        </button>
        <button class="tab teacher" role="tab" data-domain="Teacher">
          <span class="ic">🧑‍🏫</span> Teacher Hub
        </button>
      </div>

      <div id="bandbar" class="bandbar">
        <span class="lbl">WIDA Band:</span>
        <div class="bandtoggle" id="bandtoggle">
          <button data-band="A" aria-pressed="true">Level 1–2.5</button>
          <button data-band="B" aria-pressed="false">Level 2.6–4.5</button>
        </div>
        <div class="progresswrap">
          <div class="progressbar"><i id="progFill"></i></div>
          <small id="progText">0 of 0 done in this view</small>
        </div>
      </div>

      <main id="activityView" class="grid" aria-live="polite"></main>
      <section id="teacherView" class="hidden"></section>
      <section id="resultsView" class="hidden"></section>
    </div>

    <footer>
      ACCESS Practice Lab · EduWonderLab · Standalone — works offline, no
      logins. Listening audio uses your browser's built-in voice.
    </footer>

    <script>
      /* ============================ DATA ============================ */
      /* Activities injected below as ACTIVITIES; teacher resources as TEACHER. */
      var ACTIVITIES = [
        /* ===================== LISTENING — Band A (WIDA 1–2.5) ===================== */
        {
          id: "L-A-01",
          domain: "Listening",
          band: "A",
          level: "WIDA 1–2.5",
          type: "listen-mcq",
          typeLabel: "Listen & Choose",
          title: "Classroom Directions",
          script:
            "Take out your notebook. Open to page ten. Write your name at the top.",
          question: "What page do you open to?",
          choices: ["Page 2", "Page 10", "Page 12", "Page 20"],
          answer: 1,
          explain: 'The teacher says "page ten."',
          support: "Listen for the number word: ten.",
        },
        {
          id: "L-A-02",
          domain: "Listening",
          band: "A",
          level: "WIDA 1–2.5",
          type: "listen-mcq",
          typeLabel: "Listen & Choose",
          title: "Daily Schedule",
          script:
            "We have math at nine o'clock. Then we have lunch at twelve o'clock.",
          question: "What time is math?",
          choices: ["8:00", "9:00", "12:00", "3:00"],
          answer: 1,
          explain: "Math is at nine o'clock.",
          support: "Key words: math … nine.",
        },
        {
          id: "L-A-03",
          domain: "Listening",
          band: "A",
          level: "WIDA 1–2.5",
          type: "listen-mcq",
          typeLabel: "Listen & Choose",
          title: "Today's Weather",
          script:
            "Good morning. Today it is cold and rainy. Take your umbrella to school.",
          question: "What is the weather today?",
          choices: [
            "Hot and sunny",
            "Cold and rainy",
            "Warm and windy",
            "Snowy",
          ],
          answer: 1,
          explain: "It is cold and rainy.",
          support: "An umbrella is for rain.",
        },
        {
          id: "L-A-04",
          domain: "Listening",
          band: "A",
          level: "WIDA 1–2.5",
          type: "listen-mcq",
          typeLabel: "Listen & Choose",
          title: "Two-Step Directions",
          script: "First, color the circle blue. Then draw a line under it.",
          question: "What do you do first?",
          choices: [
            "Draw a line",
            "Color the circle blue",
            "Write your name",
            "Cut the paper",
          ],
          answer: 1,
          explain: '"First" tells you the first step.',
          support: "Listen for the order word: first.",
        },
        {
          id: "L-A-05",
          domain: "Listening",
          band: "A",
          level: "WIDA 1–2.5",
          type: "listen-mcq",
          typeLabel: "Listen & Choose",
          title: "In the Cafeteria",
          script:
            "The lunch line is on the left. Please take a tray and a fork.",
          question: "What two things do you take?",
          choices: [
            "A book and a pen",
            "A tray and a fork",
            "A coat and a hat",
            "A cup and a plate",
          ],
          answer: 1,
          explain: "You take a tray and a fork.",
          support: "Listen for two nouns: tray, fork.",
        },
        {
          id: "L-A-06",
          domain: "Listening",
          band: "A",
          level: "WIDA 1–2.5",
          type: "listen-mcq",
          typeLabel: "Listen & Choose",
          title: "How Many Apples?",
          script:
            "There are five red apples and two green apples on the table.",
          question: "How many green apples are there?",
          choices: ["Five", "Two", "Seven", "Three"],
          answer: 1,
          explain: "There are two green apples.",
          support: "Match the color to the number: green = two.",
        },
        {
          id: "L-A-07",
          domain: "Listening",
          band: "A",
          level: "WIDA 1–2.5",
          type: "listen-mcq",
          typeLabel: "Listen & Choose",
          title: "Where Is It?",
          script: "The backpack is under the desk. The pencil is on the chair.",
          question: "Where is the backpack?",
          choices: [
            "On the chair",
            "Under the desk",
            "In the bag",
            "On the desk",
          ],
          answer: 1,
          explain: "The backpack is under the desk.",
          support: "Position words: under, on, in.",
        },
        {
          id: "L-A-08",
          domain: "Listening",
          band: "A",
          level: "WIDA 1–2.5",
          type: "order",
          typeLabel: "Listen & Order",
          title: "Morning Routine",
          script:
            "Listen: First I wake up. Then I eat breakfast. Last, I go to school.",
          question: "Put the morning steps in the right order.",
          items: ["Wake up", "Eat breakfast", "Go to school"],
          support: "Order words: first, then, last.",
        },
        {
          id: "L-A-09",
          domain: "Listening",
          band: "A",
          level: "WIDA 1–2.5",
          type: "listen-mcq",
          typeLabel: "Listen & Choose",

      /* ============================ ENGINE ============================ */

      function saveProgress() {

        saveProgress();

      /* Record a scored item: mastered + whether it was correct on the first try. */

      }

      function visualFor(a) {
        var hay = [
          a.title,
          a.script,
          a.passage,
          a.question,
          a.prompt,
          a.sentence,
        ]
          .filter(Boolean)
          .join(" ");
        for (var i = 0; i < VIS_MAP.length; i++) {
          if (VIS_MAP[i][0].test(hay)) return VIS_MAP[i][1];
        }
        var byDomain = {
          Listening: "🎧",
          Reading: "📖",
          Speaking: "🗣️",
          Writing: "✏️",
        };
        return byDomain[a.domain] || "📘";
      }

      function esc(s) {
        return String(s).replace(/[&<>"]/g, function (c) {
          return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
        });
      }
      function el(html) {
        var t = document.createElement("template");
        t.innerHTML = html.trim();
        return t.content.firstChild;
      }
      function shuffle(a) {
        a = a.slice();
        for (var i = a.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var t = a[i];
          a[i] = a[j];
          a[j] = t;
        }
        return a;
      }

      /* ---- Text to speech ---- */
      function speak(text, btn) {
        if (!("speechSynthesis" in window)) {
          if (btn) {
            btn.textContent = "🔇 Audio not supported";
          }
          return;
        }
        window.speechSynthesis.cancel();
        var u = new SpeechSynthesisUtterance(text);
        u.rate = 0.92;
        u.pitch = 1;
        if (btn) {
          btn.classList.add("playing");
          u.onend = function () {
            btn.innerHTML = "🔊 Play again";
          };
        }
        window.speechSynthesis.speak(u);
      }

      /* ---- Card builders by type ---- */
      function cardShell(a) {
        var c = el('<article class="card" id="card-' + a.id + '"></article>');
        if (progress[a.id]) c.classList.add("done");
        c.appendChild(el('<div class="donebadge">✓</div>'));
        c.appendChild(
          el(
            '<div class="meta"><span class="lvl">' +
              esc(a.level) +
              '</span><span class="typ">' +
              esc(a.typeLabel || a.type) +
              "</span></div>",
          ),
        );
        c.appendChild(
          el(
            '<div class="visual" aria-hidden="true">' + visualFor(a) + "</div>",
          ),
        );
        c.appendChild(el("<h3>" + esc(a.title) + "</h3>"));
        return c;
      }
      function fbLine() {
        return el('<div class="fb" role="status"></div>');
      }

      function buildMCQ(a, c, promptText) {
        if (a.script) {
          c.appendChild(
            el('<button class="btn play">🔊 Play audio</button>'),
          ).onclick = function () {
            speak(a.script, this);
          };
          var sb = el(
            '<div class="scriptbox hidden"><b>Script (teacher view):</b><br>' +
              esc(a.script) +
              "</div>",
          );
          var tog = el(
            '<button class="btn ghost" style="align-self:flex-start;font-size:12px">Show/Hide script</button>',
          );
          tog.onclick = function () {
            sb.classList.toggle("hidden");
          };
          c.appendChild(tog);
          c.appendChild(sb);
        }
        if (a.passage) {
          c.appendChild(
            el('<div class="passage">' + esc(a.passage) + "</div>"),
          );
        }
        c.appendChild(el('<div class="q">' + esc(a.question) + "</div>"));
        var ch = el('<div class="choices"></div>');
        var fb = fbLine();
        var missed = false;
        a.choices.forEach(function (opt, i) {
          var b = el(
            '<button class="choice"><span class="k">' +
              "ABCD"[i] +
              ".</span><span>" +
              esc(opt) +
              "</span></button>",
          );
          b.onclick = function () {
            Array.prototype.forEach.call(ch.children, function (x) {
              x.setAttribute("disabled", "");
            });
            if (i === a.answer) {
              b.classList.add("correct");
              fb.textContent = "✓ Correct! " + (a.explain || "");
              fb.className = "fb ok";
              scoreItem(a, missed);
              c.classList.add("done");
              refreshProgress();
            } else {
              missed = true;
              b.classList.add("wrong");
              ch.children[a.answer].classList.add("correct");
              fb.textContent =
                "Not yet — the answer is " +
                "ABCD"[a.answer] +
                ". " +
                (a.explain || "");
              fb.className = "fb no";
            }
          };
          ch.appendChild(b);
        });
        c.appendChild(ch);
        c.appendChild(fb);
        if (a.support) {
          c.appendChild(
            el(
              '<div class="support"><b>Support:</b> ' +
                esc(a.support) +
                "</div>",
            ),
          );
        }
      }

      function buildOrder(a, c) {
        if (a.script) {
          c.appendChild(
            el('<button class="btn play">🔊 Play audio</button>'),
          ).onclick = function () {
            speak(a.script, this);
          };
        }
        c.appendChild(el('<div class="q">' + esc(a.question) + "</div>"));
        var list = el('<div class="ordlist"></div>');
        var order = shuffle(
          a.items.map(function (_, i) {
            return i;
          }),
        );
        function render() {
          list.innerHTML = "";
          order.forEach(function (itemIdx, pos) {
            var row = el(
              '<div class="orditem"><span class="num">' +
                (pos + 1) +
                "</span><span>" +
                esc(a.items[itemIdx]) +
                '</span><span class="mv"></span></div>',
            );
            var mv = row.querySelector(".mv");
            var up = el('<button aria-label="move up">▲</button>');
            up.onclick = function () {
              if (pos > 0) {
                var t = order[pos - 1];
                order[pos - 1] = order[pos];
                order[pos] = t;
                render();
              }
            };
            var dn = el('<button aria-label="move down">▼</button>');
            dn.onclick = function () {
              if (pos < order.length - 1) {
                var t = order[pos + 1];
                order[pos + 1] = order[pos];
                order[pos] = t;
                render();
              }
            };
            mv.appendChild(up);
            mv.appendChild(dn);
            list.appendChild(row);
          });
        }
        render();
        c.appendChild(list);
        var fb = fbLine();
        var missed = false;
        var check = el('<button class="btn tealb">Check order</button>');
        check.onclick = function () {
          var ok = order.every(function (v, i) {
            return v === i;
          });
          if (ok) {
            fb.textContent = "✓ Correct sequence!";
            fb.className = "fb ok";
            scoreItem(a, missed);
            c.classList.add("done");
            refreshProgress();
          } else {
            missed = true;
            fb.textContent = "Not yet — keep arranging. Use ▲ ▼ to reorder.";
            fb.className = "fb no";
          }
        };
        c.appendChild(check);
        c.appendChild(fb);
        if (a.support)
          c.appendChild(
            el(
              '<div class="support"><b>Support:</b> ' +
                esc(a.support) +
                "</div>",
            ),
          );
      }

      function buildFill(a, c) {
        if (a.passage)
          c.appendChild(
            el('<div class="passage">' + esc(a.passage) + "</div>"),
          );
        c.appendChild(
          el(
            '<div class="q">' +
              esc(a.question || "Fill each blank using the word bank.") +
              "</div>",
          ),
        );
        var wb = el('<div class="wordbank"></div>');
        shuffle(a.bank).forEach(function (w) {
          wb.appendChild(el('<span class="chip muted">' + esc(w) + "</span>"));
        });
        c.appendChild(wb);
        var holder = el(
          '<div class="blanks" style="font-size:14px;line-height:2"></div>',
        );
        var parts = a.sentence.split("___");
        var inputs = [];
        parts.forEach(function (p, i) {
          holder.appendChild(document.createTextNode(p));
          if (i < parts.length - 1) {
            var inp = el(
              '<input type="text" aria-label="blank ' + (i + 1) + '">',
            );
            inputs.push(inp);
            holder.appendChild(inp);
          }
        });
        c.appendChild(holder);
        var fb = fbLine();
        var missed = false;
        var check = el('<button class="btn tealb">Check answers</button>');
        check.onclick = function () {
          var allok = inputs.every(function (inp, i) {
            return (
              inp.value.trim().toLowerCase() ===
              String(a.answers[i]).toLowerCase()
            );
          });
          if (allok) {
            fb.textContent = "✓ All correct!";
            fb.className = "fb ok";
            scoreItem(a, missed);
            c.classList.add("done");
            refreshProgress();
          } else {
            missed = true;
            fb.textContent =
              "Some blanks need another try. Check spelling and the word bank.";
            fb.className = "fb no";
          }
        };
        c.appendChild(check);
        c.appendChild(fb);
      }

      function buildSpeak(a, c) {
        c.appendChild(
          el(
            '<div class="scriptbox"><b>Prompt:</b> ' + esc(a.prompt) + "</div>",
          ),
        );
        c.appendChild(
          el('<button class="btn play">🔊 Hear the prompt</button>'),
        ).onclick = function () {
          speak(a.prompt, this);
        };
        if (a.frames && a.frames.length) {
          var fr = el('<div class="frames"></div>');
          a.frames.forEach(function (f) {
            fr.appendChild(el('<div class="frame">' + esc(f) + "</div>"));
          });
          c.appendChild(
            el(
              '<div class="support"><b>Sentence frames — say it like this:</b></div>',
            ),
          );
          c.appendChild(fr);
        }
        if (a.wordBank && a.wordBank.length) {
          var wb = el('<div class="wordbank"></div>');
          a.wordBank.forEach(function (w) {
            wb.appendChild(
              el('<span class="chip muted">' + esc(w) + "</span>"),
            );
          });
          c.appendChild(el('<div class="support"><b>Useful words:</b></div>'));
          c.appendChild(wb);
        }
        /* timer */
        var secs = a.seconds || 60;
        var t = el('<div class="timer">' + fmt(secs) + "</div>");
        var ctl = el('<div class="timerctl"></div>');
        var startB = el(
          '<button class="btn navy" style="background:var(--navy);color:#fff">▶ Start ' +
            secs +
            "s</button>",
        );
        var resetB = el('<button class="btn ghost">Reset</button>');
        var iv = null,
          left = secs;
        function fmtUpdate() {
          t.textContent = fmt(left);
        }
        startB.onclick = function () {
          if (iv) return;
          iv = setInterval(function () {
            left--;
            fmtUpdate();
            if (left <= 0) {
              clearInterval(iv);
              iv = null;
              t.textContent = "Time!";
            }
          }, 1000);
        };
        resetB.onclick = function () {
          if (iv) {
            clearInterval(iv);
            iv = null;
          }
          left = secs;
          fmtUpdate();
        };
        ctl.appendChild(startB);
        ctl.appendChild(resetB);
        c.appendChild(t);
        c.appendChild(ctl);
        /* record + listen back to your answer (if the browser supports it) */
        var recWrap = el('<div class="recwrap"></div>');
        if (navigator.mediaDevices && window.MediaRecorder) {
          recWrap.appendChild(
            el(
              '<div class="support"><b>Record your answer, then listen back:</b></div>',
            ),
          );
          var recBtn = el(
            '<button class="btn" style="background:#b3261e;color:#fff">🎙️ Record</button>',
          );
          var audio = el(
            '<audio class="recplay" controls style="display:none;width:100%;margin-top:8px"></audio>',
          );
          var rec = null,
            chunks = [];
          recBtn.onclick = function () {
            if (rec && rec.state === "recording") {
              rec.stop();
              return;
            }
            navigator.mediaDevices
              .getUserMedia({ audio: true })
              .then(function (stream) {
                chunks = [];
                rec = new MediaRecorder(stream);
                rec.ondataavailable = function (e) {
                  if (e.data.size) chunks.push(e.data);
                };
                rec.onstop = function () {
                  audio.src = URL.createObjectURL(
                    new Blob(chunks, { type: "audio/webm" }),
                  );
                  audio.style.display = "block";
                  recBtn.textContent = "🎙️ Record again";
                  stream.getTracks().forEach(function (tr) {
                    tr.stop();
                  });
                };
                rec.start();
                recBtn.textContent = "⏹ Stop recording";
                if (!iv) startB.click();
              })
              .catch(function () {
                recBtn.textContent = "🎙️ Mic unavailable";
              });
          };
          recWrap.appendChild(recBtn);
          recWrap.appendChild(audio);
        } else {
          recWrap.appendChild(
            el(
              '<div class="support">Tip: record yourself on any device, then listen and check your sentences.</div>',
            ),
          );
        }
        c.appendChild(recWrap);
        /* self rating */
        c.appendChild(
          el(
            '<div class="support"><b>Rate your answer:</b> Did you use full sentences and key words?</div>',
          ),
        );
        var stars = el(
          '<div class="stars" role="radiogroup" aria-label="self rating"></div>',
        );
        for (var s = 1; s <= 4; s++) {
          (function (s) {
            var sp = el('<span data-v="' + s + '">★</span>');
            sp.onclick = function () {
              setStars(stars, s);
            };
            stars.appendChild(sp);
          })(s);
        }
        c.appendChild(stars);
        var fb = fbLine();
        var done = el('<button class="btn tealb">I practiced this ✓</button>');
        done.onclick = function () {
          markDone(a.id);
          c.classList.add("done");
          refreshProgress();
          fb.textContent = "Nice work — marked as practiced.";
          fb.className = "fb ok";
        };
        c.appendChild(done);
        c.appendChild(fb);
      }
      function setStars(box, v) {
        Array.prototype.forEach.call(box.children, function (sp, i) {
          sp.classList.toggle("on", i < v);
        });
      }
      function fmt(s) {
        var m = Math.floor(s / 60),
          x = s % 60;
        return m + ":" + (x < 10 ? "0" : "") + x;
      }

      function buildWrite(a, c) {
        c.appendChild(
          el(
            '<div class="scriptbox"><b>Writing task:</b> ' +
              esc(a.prompt) +
              "</div>",
          ),
        );
        if (a.wordBank && a.wordBank.length) {
          var wb = el('<div class="wordbank"></div>');
          var ta;
          a.wordBank.forEach(function (w) {
            var ch = el('<button class="chip">' + esc(w) + "</button>");
            ch.onclick = function () {
              if (ta) {
                ta.value += (ta.value && !/\s$/.test(ta.value) ? " " : "") + w;
                ta.dispatchEvent(new Event("input"));
                ta.focus();
              }
            };
            wb.appendChild(ch);
          });
          c.appendChild(
            el('<div class="support"><b>Word bank (click to add):</b></div>'),
          );
          c.appendChild(wb);
        }
        if (a.organizer && a.organizer.length) {
          a.organizer.forEach(function (o) {
            var row = el(
              '<div class="orgrow"><label>' +
                esc(o) +
                '</label><input type="text"></div>',
            );
            c.appendChild(row);
          });
        }
        var ta = el(
          '<textarea class="write" placeholder="Write your response here..."></textarea>',
        );
        /* connect first word bank to textarea */
        c.querySelectorAll(".wordbank .chip").forEach(function () {});
        c.appendChild(ta);
        /* rebind word bank chips to this textarea */
        c.querySelectorAll(".wordbank .chip:not(.muted)").forEach(
          function (ch) {
            ch.onclick = function () {
              ta.value +=
                (ta.value && !/\s$/.test(ta.value) ? " " : "") + ch.textContent;
              ta.dispatchEvent(new Event("input"));
              ta.focus();
            };
          },
        );
        var wc = el(
          '<div class="wc">0 words · target ' + (a.minWords || 30) + "+</div>",
        );
        ta.addEventListener("input", function () {
          var n = ta.value.trim() ? ta.value.trim().split(/\s+/).length : 0;
          wc.textContent = n + " words · target " + (a.minWords || 30) + "+";
          wc.style.color =
            n >= (a.minWords || 30) ? "var(--green)" : "var(--navy2)";
        });
        c.appendChild(wc);
        if (a.checklist && a.checklist.length) {
          c.appendChild(
            el('<div class="support"><b>Before you finish — check:</b></div>'),
          );
          var ul = el('<ul class="checklist"></ul>');
          a.checklist.forEach(function (item) {
            ul.appendChild(
              el(
                '<li><input type="checkbox"><span>' +
                  esc(item) +
                  "</span></li>",
              ),
            );
          });
          c.appendChild(ul);
        }
        var fb = fbLine();
        var done = el(
          '<button class="btn tealb">Submit & save draft ✓</button>',
        );
        done.onclick = function () {
          progress["draft_" + a.id] = ta.value;
          markDone(a.id);
          c.classList.add("done");
          refreshProgress();
          fb.textContent =
            "Saved. Draft length: " +
            (ta.value.trim() ? ta.value.trim().split(/\s+/).length : 0) +
            " words.";
          fb.className = "fb ok";
        };
        c.appendChild(done);
        c.appendChild(fb);
        if (progress["draft_" + a.id])
          ((ta.value = progress["draft_" + a.id]),
            ta.dispatchEvent(new Event("input")));
      }

      function buildCard(a) {
        var c = cardShell(a);
        switch (a.type) {
          case "listen-mcq":
          case "read-mcq":
            buildMCQ(a, c);
            break;
          case "order":
            buildOrder(a, c);
            break;
          case "fill":
            buildFill(a, c);
            break;
          case "speak":
            buildSpeak(a, c);
            break;
          case "write":
            buildWrite(a, c);
            break;
          default:
            buildMCQ(a, c);
        }
        return c;
      }

      /* ---- View rendering ---- */
      function refreshProgress() {
        var list = ACTIVITIES.filter(function (a) {
          return a.domain === state.domain && a.band === state.band;
        });
        var done = list.filter(function (a) {
          return progress[a.id];
        }).length;
        var pct = list.length ? Math.round((done / list.length) * 100) : 0;
        document.getElementById("progFill").style.width = pct + "%";
        document.getElementById("progText").textContent =
          done + " of " + list.length + " done in this view";
      }
      function renderActivities() {
        var view = document.getElementById("activityView");
        view.innerHTML = "";
        var list = ACTIVITIES.filter(function (a) {
          return a.domain === state.domain && a.band === state.band;
        });
        list.forEach(function (a) {
          view.appendChild(buildCard(a));
        });
        refreshProgress();
      }

      /* ---- Teacher hub ---- */
      function renderTeacher() {
        var v = document.getElementById("teacherView");
        v.innerHTML = "";
        v.appendChild(
          el(
            '<div class="teacherhead"><h2>🧑‍🏫 Teacher Hub</h2><p>Assignment paths, emergency sub-day plans, one-week ACCESS review plans, and printable speaking &amp; writing prompt-card decks — all wired to the same activity bank.</p></div>',
          ),
        );
        v.appendChild(accordion("Assignment Paths", renderPaths(), true));
        v.appendChild(
          accordion(
            "Emergency Sub-Day Plans (1 per domain)",
            renderSubPlans(),
            false,
          ),
        );
        v.appendChild(
          accordion(
            "One-Week Review · WIDA 1–2.5",
            renderReview(TEACHER.reviewA),
            false,
          ),
        );
        v.appendChild(
          accordion(
            "One-Week Review · WIDA 2.6–4.5",
            renderReview(TEACHER.reviewB),
            false,
          ),
        );
        v.appendChild(
          accordion(
            "Speaking Prompt-Card Deck",
            renderDeck(TEACHER.speakingCards, "speak"),
            false,
          ),
        );
        v.appendChild(
          accordion(
            "Writing Prompt-Card Deck",
            renderDeck(TEACHER.writingCards, "write"),
            false,
          ),
        );
      }
      function accordion(title, bodyNode, open) {
        var a = el('<div class="acc' + (open ? " open" : "") + '"></div>');
        var h = el(
          '<button class="acchead">' +
            esc(title) +
            '<span class="ar">▶</span></button>',
        );
        var b = el('<div class="accbody"></div>');
        b.appendChild(bodyNode);
        h.onclick = function () {
          a.classList.toggle("open");
        };
        a.appendChild(h);
        a.appendChild(b);
        return a;
      }
      function renderPaths() {
        var wrap = el("<div></div>");
        TEACHER.paths.forEach(function (p) {
          var d = el(
            '<div class="path"><h4>' +
              esc(p.name) +
              '</h4><div class="note">' +
              esc(p.who) +
              "</div></div>",
          );
          var ol = el('<ol class="steps"></ol>');
          p.steps.forEach(function (s) {
            ol.appendChild(el("<li>" + esc(s) + "</li>"));
          });
          d.appendChild(ol);
          wrap.appendChild(d);
        });
        return wrap;
      }
      function renderSubPlans() {
        var wrap = el("<div></div>");
        TEACHER.subPlans.forEach(function (p) {
          var d = el(
            '<div class="plan"><h4>' +
              esc(p.domain) +
              " — " +
              esc(p.title) +
              '</h4><div class="note">' +
              esc(p.overview) +
              "</div></div>",
          );
          var tbl = el(
            "<table><thead><tr><th>Time</th><th>What the sub does</th><th>What students do</th></tr></thead><tbody></tbody></table>",
          );
          var tb = tbl.querySelector("tbody");
          p.blocks.forEach(function (b) {
            tb.appendChild(
              el(
                "<tr><td>" +
                  esc(b[0]) +
                  "</td><td>" +
                  esc(b[1]) +
                  "</td><td>" +
                  esc(b[2]) +
                  "</td></tr>",
              ),
            );
          });
          d.appendChild(tbl);
          d.appendChild(
            el(
              '<div class="note" style="margin-top:8px"><b>No-tech backup:</b> ' +
                esc(p.backup) +
                "</div>",
            ),
          );
          wrap.appendChild(d);
        });
        return wrap;
      }
      function renderReview(r) {
        var wrap = el("<div></div>");
        wrap.appendChild(
          el('<div class="note"><b>Goal:</b> ' + esc(r.goal) + "</div>"),
        );
        var tbl = el(
          '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:10px"><thead><tr><th>Day</th><th>Domain focus</th><th>Do this</th><th>Exit check</th></tr></thead><tbody></tbody></table>',
        );
        tbl.querySelectorAll("th").forEach(function (th) {
          th.style.cssText =
            "border:1px solid var(--line);padding:7px;background:var(--teal-soft);color:var(--navy);text-align:left";
        });
        var tb = tbl.querySelector("tbody");
        r.days.forEach(function (d) {
          var tr = el("<tr></tr>");
          [d.day, d.focus, d.do, d.exit].forEach(function (cell) {
            var td = el("<td>" + esc(cell) + "</td>");
            td.style.cssText =
              "border:1px solid var(--line);padding:7px;vertical-align:top";
            tr.appendChild(td);
          });
          tb.appendChild(tr);
        });
        wrap.appendChild(tbl);
        return wrap;
      }
      function renderDeck(cards, kind) {
        var wrap = el('<div class="deck"></div>');
        var i = 0;
        var card = el('<div class="promptcard"></div>');
        function paint() {
          var c = cards[i];
          card.innerHTML = "";
          card.appendChild(
            el(
              '<div class="cat"><span>' +
                esc(c.cat) +
                "</span><span>" +
                (i + 1) +
                " / " +
                cards.length +
                "</span></div>",
            ),
          );
          card.appendChild(el('<div class="big">' + esc(c.prompt) + "</div>"));
          if (c.frames) {
            var fr = el('<div class="frames"></div>');
            c.frames.forEach(function (f) {
              fr.appendChild(el('<div class="frame">' + esc(f) + "</div>"));
            });
            card.appendChild(fr);
          }
          if (c.level)
            card.appendChild(
              el(
                '<div class="note" style="margin-top:8px">Best for: ' +
                  esc(c.level) +
                  "</div>",
              ),
            );
        }
        paint();
        var ctl = el('<div class="deckctl"></div>');
        var prev = el('<button class="btn ghost">◀ Prev</button>');
        prev.onclick = function () {
          i = (i - 1 + cards.length) % cards.length;
          paint();
        };
        var hear = el('<button class="btn amberb">🔊 Read aloud</button>');
        hear.onclick = function () {
          speak(cards[i].prompt);
        };
        var next = el('<button class="btn tealb">Next ▶</button>');
        next.onclick = function () {
          i = (i + 1) % cards.length;
          paint();
        };
        var rand = el('<button class="btn ghost">🔀 Shuffle</button>');
        rand.onclick = function () {
          i = Math.floor(Math.random() * cards.length);
          paint();
        };
        ctl.appendChild(prev);
        ctl.appendChild(hear);
        ctl.appendChild(rand);
        ctl.appendChild(next);
        wrap.appendChild(card);
        wrap.appendChild(ctl);
        return wrap;
      }

      /* ---- Tab + band wiring ---- */
      function selectDomain(domain) {
        state.domain = domain;
        Array.prototype.forEach.call(
          document.querySelectorAll("#tabs .tab"),
          function (t) {
            t.setAttribute(
              "aria-selected",
              t.dataset.domain === domain ? "true" : "false",
            );
          },
        );
        var isTeacher = domain === "Teacher";
        var isResults = domain === "Results";
        var isActivities = !isTeacher && !isResults;
        document
          .getElementById("bandbar")
          .classList.toggle("hidden", !isActivities);
        document
          .getElementById("activityView")
          .classList.toggle("hidden", !isActivities);
        document
          .getElementById("teacherView")
          .classList.toggle("hidden", !isTeacher);
        document
          .getElementById("resultsView")
          .classList.toggle("hidden", !isResults);
        if (isTeacher) renderTeacher();
        else if (isResults) renderResults();
        else renderActivities();
      }

      /* ---- My Results: auto-graded scorecard + teacher report ---- */
      function renderResults() {
        var v = document.getElementById("resultsView");
        v.innerHTML = "";
        v.appendChild(
          el(
            '<div class="teacherhead"><h2>📊 My Results</h2><p>Auto-scored from your work on this device. Multiple-choice, ordering, and word-bank items are scored; speaking and writing are counted as practiced. Use “Copy report” to send results to your teacher.</p></div>',
          ),
        );
        var domains = ["Listening", "Reading", "Speaking", "Writing"];
        var bands = [
          { b: "A", label: "Level 1–2.5" },
          { b: "B", label: "Level 2.6–4.5" },
        ];
        var lines = ["ACCESS Practice Lab — Results"];
        var tbl = el(
          '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:6px"></table>',
        );
        tbl.appendChild(
          el(
            "<thead><tr><th>Domain</th><th>Band</th><th>Completed</th><th>First-try correct</th></tr></thead>",
          ),
        );
        var tb = el("<tbody></tbody>");
        var totDone = 0,
          totAll = 0,
          totFt = 0,
          scoredAll = 0;
        domains.forEach(function (d) {
          bands.forEach(function (bd) {
            var list = ACTIVITIES.filter(function (a) {
              return a.domain === d && a.band === bd.b;
            });
            var done = list.filter(function (a) {
              return progress[a.id];
            }).length;
            var scored = list.filter(function (a) {
              return (
                a.type === "listen-mcq" ||
                a.type === "read-mcq" ||
                a.type === "order" ||
                a.type === "fill"
              );
            });
            var ft = scored.filter(function (a) {
              return progress["ft_" + a.id];
            }).length;
            totDone += done;
            totAll += list.length;
            totFt += ft;
            scoredAll += scored.length;
            var ftCell = scored.length ? ft + " / " + scored.length : "—";
            var tr = el(
              "<tr><td>" +
                d +
                "</td><td>" +
                bd.label +
                "</td><td>" +
                done +
                " / " +
                list.length +
                "</td><td>" +
                ftCell +
                "</td></tr>",
            );
            tr.querySelectorAll("td").forEach(function (td) {
              td.style.cssText =
                "border:1px solid var(--line);padding:7px;vertical-align:top";
            });
            tb.appendChild(tr);
            lines.push(
              d +
                " (" +
                bd.label +
                "): completed " +
                done +
                "/" +
                list.length +
                (scored.length
                  ? ", first-try correct " + ft + "/" + scored.length
                  : ""),
            );
          });
        });
        tbl.querySelectorAll("th").forEach(function (th) {
          th.style.cssText =
            "border:1px solid var(--line);padding:7px;background:var(--teal-soft);color:var(--navy);text-align:left";
        });
        tbl.appendChild(tb);
        var pct = scoredAll ? Math.round((totFt / scoredAll) * 100) : 0;
        v.appendChild(
          el(
            '<div class="note" style="font-size:15px"><b>Overall:</b> ' +
              totDone +
              " of " +
              totAll +
              " activities completed · first-try accuracy on auto-scored items: <b>" +
              pct +
              "%</b></div>",
          ),
        );
        lines.push(
          "OVERALL: " +
            totDone +
            "/" +
            totAll +
            " completed, first-try accuracy " +
            pct +
            "%",
        );
        v.appendChild(tbl);
        var ctl = el('<div class="timerctl" style="margin-top:14px"></div>');
        var copyB = el('<button class="btn tealb">📋 Copy report</button>');
        copyB.onclick = function () {
          var text = lines.join("\n");
          if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(function () {
              copyB.textContent = "✓ Copied";
            });
          } else {
            copyB.textContent = "Select & copy below";
            v.appendChild(
              el(
                '<textarea class="write" style="margin-top:10px">' +
                  esc(text) +
                  "</textarea>",
              ),
            );
          }
        };
        var printB = el('<button class="btn ghost">🖨️ Print</button>');
        printB.onclick = function () {
          window.print();
        };
        var resetB = el('<button class="btn ghost">Reset my progress</button>');
        resetB.onclick = function () {
          if (confirm("Clear all progress on this device?")) {
            progress = {};
            saveProgress();
            renderResults();
          }
        };
        ctl.appendChild(copyB);
        ctl.appendChild(printB);
        ctl.appendChild(resetB);
        v.appendChild(ctl);
      }
      function selectBand(b) {
        state.band = b;
        Array.prototype.forEach.call(
          document.querySelectorAll("#bandtoggle button"),
          function (t) {
            t.setAttribute(
              "aria-pressed",
              t.dataset.band === b ? "true" : "false",
            );
          },
        );
        renderActivities();
      }
      document.querySelectorAll("#tabs .tab").forEach(function (t) {
        t.onclick = function () {
          selectDomain(t.dataset.domain);
        };
      });
      document.querySelectorAll("#bandtoggle button").forEach(function (t) {
        t.onclick = function () {
          selectBand(t.dataset.band);
        };
      });

      /* ---- Boot ---- */
      function boot() {
        document.getElementById("statTotal").textContent =
          ACTIVITIES.length + " activities";
        selectDomain("Listening");
      }
      boot();
    </script>
  </body>
</html>
