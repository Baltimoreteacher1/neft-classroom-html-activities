<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Architecture Builder — Area of Parallelograms & Rhombuses</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>
  // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror
  // (document.write blocks parsing so the mirror is ready before the game script runs).
  if (typeof Phaser === "undefined") {
    document.write('<script src="https://unpkg.com/phaser@3.80.1/dist/phaser.min.js"><\/script>');
  }
  // If both CDNs are unreachable, show a clear message instead of a blank page.
  window.addEventListener("load", function () {
    if (typeof Phaser === "undefined") {
      document.body.innerHTML =
        '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">\u26a0\ufe0f This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
    }
  });
</script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a1628;
        overflow: hidden;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script>
      (() => {
        /* ═══════════════════════════════════════════
         SOUND ENGINE — Web Audio oscillator beeps
         ═══════════════════════════════════════════ */
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let actx = null;
        function ensureAudio() {
          if (!actx) actx = new AudioCtx();
          if (actx.state === "suspended") actx.resume();
        }
        function beep(freq, dur, type = "sine", vol = 0.18) {
          if (!actx) return;
          const o = actx.createOscillator(),
            g = actx.createGain();
          o.connect(g);
          g.connect(actx.destination);
          o.frequency.value = freq;
          o.type = type;
          g.gain.setValueAtTime(vol, actx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
          o.start();
          o.stop(actx.currentTime + dur);
        }
        function sfxCorrect() {
          beep(523, 0.08);
          setTimeout(() => beep(659, 0.08), 80);
          setTimeout(() => beep(784, 0.12), 160);
        }
        function sfxWrong() {
          beep(220, 0.15, "sawtooth", 0.14);
          setTimeout(() => beep(180, 0.2, "sawtooth", 0.12), 120);
        }
        function sfxClick() {
          beep(880, 0.04, "sine", 0.1);
        }
        function sfxLevelUp() {
          beep(523, 0.06);
          setTimeout(() => beep(659, 0.06), 70);
          setTimeout(() => beep(784, 0.06), 140);
          setTimeout(() => beep(1047, 0.15), 210);
        }
        function sfxBossHit() {
          beep(330, 0.1, "square", 0.15);
          setTimeout(() => beep(440, 0.08, "square", 0.12), 100);
        }
        function sfxBossDeath() {
          beep(523, 0.1);
          setTimeout(() => beep(659, 0.08), 80);
          setTimeout(() => beep(784, 0.08), 160);
          setTimeout(() => beep(1047, 0.15), 240);
          setTimeout(() => beep(1319, 0.2), 340);
        }
        function sfxHint() {
          beep(660, 0.06, "triangle", 0.1);
          setTimeout(() => beep(550, 0.08, "triangle", 0.08), 70);
        }
        function sfxPlace() {
          beep(392, 0.05, "sine", 0.12);
          setTimeout(() => beep(523, 0.06, "sine", 0.1), 60);
        }
        function sfxGameOver() {
          beep(330, 0.15, "sawtooth", 0.12);
          setTimeout(() => beep(262, 0.2, "sawtooth", 0.1), 150);
          setTimeout(() => beep(196, 0.3, "sawtooth", 0.08), 300);
        }

        /* ═══════════════════════════════════════════
         MATH CONTENT — Procedural question generators
         ═══════════════════════════════════════════ */
        const UNITS = ["cm", "m", "ft", "in"];
        const PARA_CTX = [
          "training platform",
          "display banner",
          "garden bed",
          "landing pad",
          "stage panel",
          "solar panel",
          "roof tile",
          "wall section",
        ];
        const RHOM_CTX = [
          "logo badge",
          "window pane",
          "diamond tile",
          "kite panel",
          "signal marker",
          "gem cut",
          "floor tile",
          "mirror frame",
        ];

        function ri(min, max) {
          return Math.floor(Math.random() * (max - min + 1)) + min;
        }
        function pick(arr) {
          return arr[Math.floor(Math.random() * arr.length)];
        }
        function shuffle(arr) {
          const a = arr.slice();
          for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        }
        function fmtA(v, u) {
          return v + " " + u + "²";
        }
        function fmtM(v, u) {
          return v + " " + u;
        }

        function mkChoices(correct, distractors, formatter) {
          const vals = [correct];
          distractors.forEach((d) => {
            if (!vals.includes(d) && d > 0) vals.push(d);
          });
          let extra = 1;
          while (vals.length < 4) {
            const c = correct + extra;
            if (!vals.includes(c)) vals.push(c);
            extra++;
          }
          return shuffle(
            vals
              .slice(0, 4)
              .map((v) => ({
                text: formatter(v),
                value: v,
                correct: v === correct,
              })),
          );
        }

        // ─── Type 1: Parallelogram area (A = b × h) ───
        function genParaArea() {
          const b = ri(4, 18),
            h = ri(3, 14),
            a = b * h,
            u = pick(UNITS);
          const ctx = pick(PARA_CTX);
          return {
            type: "para-area",
            shape: "para",
            stem: `A ${ctx} is shaped like a parallelogram.\nBase = ${fmtM(b, u)}, Height = ${fmtM(h, u)}.\nWhat is the area?`,
            hint: `A = b × h = ${b} × ${h}`,
            formula: "A = b × h",
            explain: `${b} × ${h} = ${a} ${u}²`,
            dims: { b, h, u },
            choices: mkChoices(
              a,
              [b + h, 2 * (b + h), Math.round(a / 2), a + b],
              (v) => fmtA(v, u),
            ),
          };
        }

        // ─── Type 2: Rhombus area via diagonals (A = 1/2 × d1 × d2) ───
        function genRhomDiag() {
          const d1 = ri(4, 16) * 2,
            d2 = ri(3, 12) * 2,
            a = (d1 * d2) / 2,
            u = pick(UNITS);
          const ctx = pick(RHOM_CTX);
          return {
            type: "rhom-diag",
            shape: "rhom",
            stem: `A ${ctx} is a rhombus.\nDiagonals: d1 = ${fmtM(d1, u)}, d2 = ${fmtM(d2, u)}.\nFind the area.`,
            hint: `A = 1/2 × ${d1} × ${d2}`,
            formula: "A = ½ × d1 × d2",
            explain: `½ × ${d1} × ${d2} = ${a} ${u}²`,
            dims: { d1, d2, u },
            choices: mkChoices(
              a,
              [d1 * d2, d1 + d2, Math.round(a / 2), a + d2],
              (v) => fmtA(v, u),
            ),
          };
        }

        // ─── Type 3: Rhombus area via base-height ───
        function genRhomBH() {
          const b = ri(5, 16),
            h = ri(4, 12),
            a = b * h,
            u = pick(UNITS);
          return {
            type: "rhom-bh",
            shape: "rhom",
            stem: `A rhombus has base ${fmtM(b, u)} and\nperpendicular height ${fmtM(h, u)}.\nWhat is its area?`,
            hint: `A rhombus is a parallelogram!\nA = b × h = ${b} × ${h}`,
            formula: "A = b × h",
            explain: `${b} × ${h} = ${a} ${u}²`,
            dims: { b, h, u },
            choices: mkChoices(
              a,
              [b + h, 2 * (b + h), Math.round(a / 2), a + h],
              (v) => fmtA(v, u),
            ),
          };
        }

        // ─── Type 4: Missing height (h = A / b) ───
        function genMissH() {
          const b = ri(6, 18),
            h = ri(3, 12),
            a = b * h,
            u = pick(UNITS);
          return {
            type: "miss-h",
            shape: "para",
            stem: `A parallelogram has area ${fmtA(a, u)}\nand base ${fmtM(b, u)}.\nWhat is the height?`,
            hint: `h = A ÷ b = ${a} ÷ ${b}`,
            formula: "h = A ÷ b",
            explain: `${a} ÷ ${b} = ${h} ${u}`,
            dims: { b, h, a, u },
            choices: mkChoices(
              h,
              [Math.max(1, Math.round(h / 2)), a - b, b, a],
              (v) => fmtM(v, u),
            ),
          };
        }

        // ─── Type 5: Missing base (b = A / h) ───
        function genMissB() {
          const b = ri(6, 18),
            h = ri(3, 12),
            a = b * h,
            u = pick(UNITS);
          return {
            type: "miss-b",
            shape: "para",
            stem: `A parallelogram has area ${fmtA(a, u)}\nand height ${fmtM(h, u)}.\nWhat is the base?`,
            hint: `b = A ÷ h = ${a} ÷ ${h}`,
            formula: "b = A ÷ h",
            explain: `${a} ÷ ${h} = ${b} ${u}`,
            dims: { b, h, a, u },
            choices: mkChoices(
              b,
              [Math.max(1, Math.round(b / 2)), a - h, h, a],
              (v) => fmtM(v, u),
            ),
          };
        }

        // ─── Type 6: Missing diagonal ───
        function genMissDiag() {
          const d1 = ri(4, 16) * 2,
            d2 = ri(3, 12) * 2,
            a = (d1 * d2) / 2,
            u = pick(UNITS);
          const askD1 = Math.random() > 0.5;
          const known = askD1 ? d2 : d1,
            missing = askD1 ? d1 : d2;
          const kLabel = askD1 ? "d2" : "d1",
            mLabel = askD1 ? "d1" : "d2";
          return {
            type: "miss-diag",
            shape: "rhom",
            stem: `A rhombus has area ${fmtA(a, u)}\nand ${kLabel} = ${fmtM(known, u)}.\nFind ${mLabel}.`,
            hint: `${mLabel} = (2 × A) ÷ ${kLabel}\n= (2 × ${a}) ÷ ${known}`,
            formula: mLabel + " = (2 × A) ÷ " + kLabel,
            explain: `(2 × ${a}) ÷ ${known} = ${missing} ${u}`,
            dims: { d1, d2, a, u, known, missing },
            choices: mkChoices(
              missing,
              [Math.max(1, Math.round(missing / 2)), known, missing * 2, a],
              (v) => fmtM(v, u),
            ),
          };
        }

        // ─── Type 7: Formula choice ───
        function genFormulaChoice() {
          const variant = pick(["para", "rhom-diag", "rhom-bh"]);
          if (variant === "para") {
            const b = ri(6, 14),
              h = ri(4, 10);
            return {
              type: "formula",
              shape: "para",
              stem: `A parallelogram has base ${b}\nand height ${h}.\nWhich formula should you use?`,
              hint: "Base and height are given.\nUse the direct formula.",
              formula: "A = b × h",
              explain: "Base and height given = A = b × h",
              dims: { b, h },
              choices: shuffle([
                { text: "A = b × h", value: 1, correct: true },
                { text: "A = ½ × d1 × d2", value: 2, correct: false },
                { text: "A = 2(b + h)", value: 3, correct: false },
                { text: "A = b + h", value: 4, correct: false },
              ]),
            };
          }
          if (variant === "rhom-bh") {
            const b = ri(6, 16),
              h = ri(4, 11);
            return {
              type: "formula",
              shape: "rhom",
              stem: `A rhombus has base ${b}\nand perpendicular height ${h}.\nWhich formula is best?`,
              hint: "A rhombus is a parallelogram.\nBase + height = A = b × h.",
              formula: "A = b × h",
              explain: "Rhombus with b and h = A = b × h",
              dims: { b, h },
              choices: shuffle([
                { text: "A = b × h", value: 1, correct: true },
                { text: "A = ½ × d1 × d2", value: 2, correct: false },
                { text: "A = d1 + d2", value: 3, correct: false },
                { text: "A = 2(b + h)", value: 4, correct: false },
              ]),
            };
          }
          const d1 = ri(4, 16) * 2,
            d2 = ri(3, 12) * 2;
          return {
            type: "formula",
            shape: "rhom",
            stem: `A rhombus has diagonals ${d1} and ${d2}.\nWhich formula is the best match?`,
            hint: "Both diagonals are given.\nHalve the product.",
            formula: "A = ½ × d1 × d2",
            explain: "Diagonals given = A = ½ × d1 × d2",
            dims: { d1, d2 },
            choices: shuffle([
              { text: "A = ½ × d1 × d2", value: 1, correct: true },
              { text: "A = b × h", value: 2, correct: false },
              { text: "A = 2(b + h)", value: 3, correct: false },
              { text: "A = d1 + d2", value: 4, correct: false },
            ]),
          };
        }

        // ─── Type 8: Compare two shapes ───
        function genCompare() {
          const scenario = pick(["equal", "para-wins", "rhom-wins"]);
          const u = pick(UNITS);
          let pb, ph, d1, d2, answer;
          if (scenario === "equal") {
            pb = ri(6, 14);
            ph = ri(4, 10);
            d1 = pb * 2;
            d2 = ph;
            answer = "They are equal";
          } else if (scenario === "para-wins") {
            pb = ri(10, 16);
            ph = ri(6, 10);
            d1 = ri(4, 8) * 2;
            d2 = ri(3, 6) * 2;
            answer = "Parallelogram is larger";
          } else {
            pb = ri(5, 10);
            ph = ri(4, 8);
            d1 = ri(10, 16) * 2;
            d2 = ri(6, 10) * 2;
            answer = "Rhombus is larger";
          }
          const pa = pb * ph,
            ra = (d1 * d2) / 2;
          return {
            type: "compare",
            shape: "both",
            stem: `Parallelogram: b=${pb}, h=${ph} (${u})\nRhombus: d1=${d1}, d2=${d2} (${u})\nWhich has the greater area?`,
            hint: `Para = ${pb}×${ph} = ${pa}\nRhom = ½×${d1}×${d2} = ${ra}`,
            formula: "Compute both, then compare",
            explain: `Para = ${pa}, Rhom = ${ra}`,
            dims: { pb, ph, d1, d2, u },
            choices: shuffle([
              {
                text: "Parallelogram is larger",
                value: 1,
                correct: answer === "Parallelogram is larger",
              },
              {
                text: "Rhombus is larger",
                value: 2,
                correct: answer === "Rhombus is larger",
              },
              {
                text: "They are equal",
                value: 3,
                correct: answer === "They are equal",
              },
              { text: "Not enough info", value: 4, correct: false },
            ]),
          };
        }

        // ─── Type 9: Scenario cost ───
        function genCost() {
          const rate = pick([2, 3, 4, 5]),
            u = pick(["m", "ft"]);
          const isPara = Math.random() > 0.5;
          if (isPara) {
            const b = ri(7, 15),
              h = ri(4, 10),
              a = b * h,
              cost = a * rate;
            return {
              type: "cost",
              shape: "para",
              stem: `A parallelogram mural:\nb=${fmtM(b, u)}, h=${fmtM(h, u)}.\nPaint costs $${rate} per ${u}².\nTotal cost?`,
              hint: `Area = ${b}×${h} = ${a}\nCost = ${a} × $${rate}`,
              formula: "Cost = Area × Rate",
              explain: `${a} × $${rate} = $${cost}`,
              dims: { b, h, rate, u },
              choices: mkChoices(
                cost,
                [
                  a,
                  a * Math.max(1, rate - 1),
                  cost + rate,
                  Math.round(cost / 2),
                ],
                (v) => "$" + v,
              ),
            };
          }
          const d1 = ri(4, 10) * 2,
            d2 = ri(3, 8) * 2,
            a = (d1 * d2) / 2,
            cost = a * rate;
          return {
            type: "cost",
            shape: "rhom",
            stem: `A rhombus sign:\nd1=${fmtM(d1, u)}, d2=${fmtM(d2, u)}.\nCosts $${rate} per ${u}².\nTotal cost?`,
            hint: `Area = ½×${d1}×${d2} = ${a}\nCost = ${a} × $${rate}`,
            formula: "Cost = Area × Rate",
            explain: `${a} × $${rate} = $${cost}`,
            dims: { d1, d2, rate, u },
            choices: mkChoices(
              cost,
              [a, d1 * d2 * rate, cost + rate, Math.round(cost / 2)],
              (v) => "$" + v,
            ),
          };
        }

        // ─── Type 10: Boss questions (Mr. Neft) ───
        function genBoss(phase) {
          if (phase === "prep") {
            const b = ri(8, 16),
              h = ri(5, 11),
              a = b * h,
              u = pick(["m", "ft"]);
            return {
              type: "boss",
              shape: "para",
              bossPhase: "prep",
              stem: `Mr. Neft throws a shield panel!\nParallelogram: b=${fmtM(b, u)}, h=${fmtM(h, u)}.\nBreak the shield!`,
              hint: `A = b × h = ${b} × ${h}`,
              formula: "A = b × h",
              explain: `${b} × ${h} = ${a} ${u}²`,
              dims: { b, h, u },
              choices: mkChoices(
                a,
                [b + h, 2 * (b + h), Math.round(a / 2), a + h],
                (v) => fmtA(v, u),
              ),
            };
          }
          if (phase === "diag") {
            const d1 = ri(6, 14) * 2,
              d2 = ri(5, 12) * 2,
              a = (d1 * d2) / 2,
              u = pick(["m", "ft"]);
            return {
              type: "boss",
              shape: "rhom",
              bossPhase: "diag",
              stem: `Mr. Neft launches a rhombus barrier!\nd1=${fmtM(d1, u)}, d2=${fmtM(d2, u)}.\nCrack it!`,
              hint: `A = ½ × ${d1} × ${d2}`,
              formula: "A = ½ × d1 × d2",
              explain: `½ × ${d1} × ${d2} = ${a} ${u}²`,
              dims: { d1, d2, u },
              choices: mkChoices(
                a,
                [d1 * d2, d1 + d2, Math.round(a / 2), a + d1],
                (v) => fmtA(v, u),
              ),
            };
          }
          // final: combined
          const pb = ri(10, 16),
            ph = ri(6, 10),
            d1 = ri(10, 16) * 2,
            d2 = ri(6, 10) * 2,
            u = pick(["m", "ft"]);
          const pa = pb * ph,
            ra = (d1 * d2) / 2,
            total = pa + ra;
          return {
            type: "boss",
            shape: "both",
            bossPhase: "final",
            stem: `FINAL STRIKE!\nPara: b=${pb}, h=${ph} (${u})\nRhom: d1=${d1}, d2=${d2} (${u})\nTotal area to defeat Mr. Neft?`,
            hint: `Para = ${pb}×${ph} = ${pa}\nRhom = ½×${d1}×${d2} = ${ra}\nTotal = ${pa}+${ra}`,
            formula: "Add both areas",
            explain: `${pa} + ${ra} = ${total} ${u}²`,
            dims: { pb, ph, d1, d2, u },
            choices: mkChoices(total, [pa, ra, pa + d1, total + ph], (v) =>
              fmtA(v, u),
            ),
          };
        }

        /* ─── ZONE DEFINITIONS ─── */
        const ZONES = [
          {
            name: "Foundation Floor",
            emoji: "🏗️",
            color: 0x4ecdc4,
            generators: [genParaArea, genRhomDiag, genRhomBH, genFormulaChoice],
            count: 4,
          },
          {
            name: "Measurement Wing",
            emoji: "📏",
            color: 0xf7dc6f,
            generators: [genMissH, genMissB, genMissDiag, genFormulaChoice],
            count: 4,
          },
          {
            name: "Design Studio",
            emoji: "🎨",
            color: 0xaf7ac5,
            generators: [genCompare, genCost, genParaArea, genRhomDiag],
            count: 4,
          },
          {
            name: "Engineering Lab",
            emoji: "🔧",
            color: 0xe74c3c,
            generators: [genCost, genCompare, genMissH, genMissDiag],
            count: 4,
          },
          {
            name: "Mr. Neft Arena",
            emoji: "👾",
            color: 0xff6b6b,
            generators: null,
            count: 4,
          },
        ];

        /* ═══════════════════════════════════════════
         SHARED CONSTANTS
         ═══════════════════════════════════════════ */
        const W = 960,
          H = 600;
        const CLR = {
          bg: 0x0a1628,
          panel: 0x101b35,
          panelLt: 0x162648,
          gold: 0xffcf72,
          teal: 0x4ecdc4,
          coral: 0xff6b6b,
          violet: 0xa88bff,
          lime: 0xb9ff78,
          white: 0xeef5ff,
          muted: 0xa4b8dc,
          ok: 0x48df8a,
          danger: 0xff6273,
          darkBlue: 0x091526,
        };

        /* ═══════════════════════════════════════════
         TITLE SCENE
         ═══════════════════════════════════════════ */
        class TitleScene extends Phaser.Scene {
          constructor() {
            super("TitleScene");
          }

          create() {
            this.cameras.main.setBackgroundColor(CLR.bg);
            // Starfield background
            for (let i = 0; i < 80; i++) {
              const x = Phaser.Math.Between(0, W),
                y = Phaser.Math.Between(0, H);
              const s = this.add.circle(
                x,
                y,
                Phaser.Math.Between(1, 2),
                0xffffff,
                Phaser.Math.FloatBetween(0.1, 0.4),
              );
              this.tweens.add({
                targets: s,
                alpha: { from: s.alpha, to: 0.05 },
                duration: Phaser.Math.Between(1500, 3500),
                yoyo: true,
                repeat: -1,
              });
            }

            // Grid floor lines
            const gfx = this.add.graphics();
            gfx.lineStyle(1, 0x1a2d50, 0.3);
            for (let y = 200; y < H; y += 40) gfx.lineBetween(0, y, W, y);
            for (let x = 0; x < W; x += 60) gfx.lineBetween(x, 200, x, H);

            // Animated building silhouettes
            this.drawBuildings(gfx);

            // Title
            this.add
              .text(W / 2, 100, "ARCHITECTURE BUILDER", {
                fontSize: "48px",
                fontFamily: "Arial Black, sans-serif",
                color: "#ffcf72",
                stroke: "#0a1628",
                strokeThickness: 6,
              })
              .setOrigin(0.5);

            this.add

          drawBuildings(gfx) {

              { x: 450, w: 90, h: 220 },
              { x: 570, w: 55, h: 150 },
              { x: 660, w: 75, h: 190 },

            buildings.forEach((b) => {
              gfx.fillStyle(0x0d1830, 0.7);
              gfx.fillRect(b.x, H - b.h, b.w, b.h);

              gfx.strokeRect(b.x, H - b.h, b.w, b.h);

        /* ═══════════════════════════════════════════
         GAME SCENE
         ═══════════════════════════════════════════ */
        class GameScene extends Phaser.Scene {
          constructor() {
            super("GameScene");
          }

          init(data) {
            this.architect = data.architect;
            this.zone = 0;
            this.qIndex = 0;
            this.score = 0;
            this.combo = 0;
            this.maxCombo = 0;
            this.correct = 0;
            this.total = 0;
            this.lives = this.architect.perk === "+1 Life" ? 6 : 5;
            this.maxLives = this.lives;
            this.hints = this.architect.perk === "Extra Hints" ? 4 : 2;
            this.maxHints = this.hints;
            this.timerBase = this.architect.perk === "+5s Timer" ? 35 : 30;
            this.comboMult = this.architect.perk === "Combo Boost" ? 1.5 : 1.0;
            this.bossHP = 4;
            this.bossMaxHP = 4;
            this.questions = this.generateAllQuestions();
            this.answered = false;
            this.shownHint = false;
            this.building = []; // track placed blocks
          }

          generateAllQuestions() {
            const qs = [];
            for (let z = 0; z < 4; z++) {
              const zone = ZONES[z];
              for (let i = 0; i < zone.count; i++) {
                const gen = zone.generators[i % zone.generators.length];
                qs.push({ ...gen(), zone: z });
              }
            }
            // Boss zone (zone 4)
            qs.push({ ...genBoss("prep"), zone: 4 });
            qs.push({ ...genBoss("prep"), zone: 4 });
            qs.push({ ...genBoss("diag"), zone: 4 });
            qs.push({ ...genBoss("final"), zone: 4 });
            return qs;
          }

          create() {
            this.cameras.main.setBackgroundColor(CLR.bg);

            // Background grid
            const gfx = this.add.graphics();
            gfx.lineStyle(1, 0x1a2d50, 0.15);
            for (let y = 0; y < H; y += 30) gfx.lineBetween(0, y, W, y);
            for (let x = 0; x < W; x += 30) gfx.lineBetween(x, 0, x, H);

            // Building area (right side)
            this.buildingGfx = this.add.graphics();
            this.drawBuildingArea();

            // HUD
            this.createHUD();

            // Question area
            this.showQuestion();

            // Keyboard controls
            this.input.keyboard.on("keydown", (e) => {
              if (this.answered) return;
              const map = { 1: 0, 2: 1, 3: 2, 4: 3, a: 0, b: 1, c: 2, d: 3 };
              if (map[e.key.toLowerCase()] !== undefined)
                this.selectAnswer(map[e.key.toLowerCase()]);
              if (e.key.toLowerCase() === "h") this.useHint();
            });
          }

          createHUD() {
            // Top bar
            this.add
              .rectangle(W / 2, 25, W - 20, 44, CLR.panel, 0.85)
              .setStrokeStyle(1, 0x1a2d50);

            const q = this.questions[this.qIndex];
            const zn = ZONES[q.zone];

            this.zoneText = this.add.text(15, 14, `${zn.emoji} ${zn.name}`, {
              fontSize: "15px",
              fontFamily: "Arial, sans-serif",
              color: "#4ecdc4",
              fontStyle: "bold",
            });

            this.scoreText = this.add
              .text(W / 2, 14, `Score: ${this.score}`, {
                fontSize: "15px",
                fontFamily: "Arial, sans-serif",
                color: "#ffcf72",
                fontStyle: "bold",
              })
              .setOrigin(0.5, 0);

            this.comboText = this.add
              .text(W / 2, 32, "", {
                fontSize: "11px",
                fontFamily: "Arial, sans-serif",
                color: "#b9ff78",
              })
              .setOrigin(0.5, 0);
            this.updateComboText();

            // Lives
            this.livesText = this.add
              .text(W - 15, 14, "", {
                fontSize: "14px",
                fontFamily: "Arial, sans-serif",
                color: "#ff6b6b",
              })
              .setOrigin(1, 0);
            this.updateLivesText();

            // Progress bar
            this.progressBg = this.add
              .rectangle(W / 2, 52, W - 20, 6, 0x091526)
              .setStrokeStyle(1, 0x1a2d50);
            this.progressBar = this.add
              .rectangle(15, 52, 0, 6, CLR.teal)
              .setOrigin(0, 0.5);
            this.updateProgress();

            // Timer bar
            this.timerBg = this.add.rectangle(W / 2, 62, W - 20, 4, 0x091526);
            this.timerBar = this.add
              .rectangle(15, 62, W - 30, 4, CLR.gold)
              .setOrigin(0, 0.5);
            this.timeLeft = this.getTimerDuration();
            this.timerMax = this.timeLeft;
            this.timerEvent = this.time.addEvent({
              delay: 100,
              loop: true,
              callback: () => {
                if (this.answered) return;
                this.timeLeft -= 100;
                const pct = Math.max(0, this.timeLeft / this.timerMax);
                this.timerBar.width = (W - 30) * pct;
                if (pct < 0.3) this.timerBar.setFillStyle(CLR.danger);
                else if (pct < 0.6) this.timerBar.setFillStyle(0xf7dc6f);
                else this.timerBar.setFillStyle(CLR.gold);
                if (this.timeLeft <= 0) this.handleTimeout();
              },
            });

            // Question counter
            this.qCountText = this.add
              .text(
                W - 15,
                32,
                `Q ${this.qIndex + 1}/${this.questions.length}`,
                {
                  fontSize: "11px",
                  fontFamily: "Arial, sans-serif",
                  color: "#7e96c2",
                },
              )
              .setOrigin(1, 0);

            // Hint button
            this.hintBtn = this.add
              .text(15, 35, `[H] Hints: ${this.hints}`, {
                fontSize: "11px",
                fontFamily: "Arial, sans-serif",
                color: "#a88bff",
              })
              .setInteractive({ useHandCursor: true });
            this.hintBtn.on("pointerdown", () => this.useHint());

            // Architect info
            this.add
              .text(
                W - 15,
                76,
                `${this.architect.emoji} ${this.architect.name}`,
                {
                  fontSize: "12px",
                  fontFamily: "Arial, sans-serif",
                  color: "#a4b8dc",
                },
              )
              .setOrigin(1, 0);
          }

          getTimerDuration() {
            const base = this.timerBase * 1000;
            // Decrease timer slightly as zones progress
            const reduction = this.zone * 1500;
            return Math.max(15000, base - reduction);
          }

          updateProgress() {
            const pct = this.qIndex / this.questions.length;
            this.progressBar.width = (W - 30) * pct;
          }

          updateLivesText() {
            this.livesText.setText(
              "❤️".repeat(this.lives) + "🖤".repeat(this.maxLives - this.lives),
            );
          }

          updateComboText() {
            if (this.combo > 1) {
              const mult = Math.min(
                5,
                1 + Math.floor(this.combo / 2) * this.comboMult,
              );
              this.comboText.setText(
                `🔥 Streak: ${this.combo} (${mult.toFixed(1)}x)`,
              );
            } else if (this.combo === 1) {
              this.comboText.setText("⭐ Streak: 1");
            } else {
              this.comboText.setText("");
            }
          }

          showQuestion() {
            // Clear previous question elements
            if (this.questionGroup) this.questionGroup.destroy(true);
            this.questionGroup = this.add.group();
            this.answered = false;
            this.shownHint = false;

            const q = this.questions[this.qIndex];
            const zn = ZONES[q.zone];
            const isBoss = q.type === "boss";

            // Update zone text
            if (this.zoneText) this.zoneText.setText(`${zn.emoji} ${zn.name}`);
            if (this.qCountText)
              this.qCountText.setText(
                `Q ${this.qIndex + 1}/${this.questions.length}`,
              );

            // Boss banner
            if (isBoss && q.bossPhase === "prep" && this.zone !== 4) {
              this.zone = 4;
              this.showZoneBanner(zn.name, zn.emoji, zn.color);
            }

            // Boss HP bar
            if (isBoss) {
              this.showBossHP();
            }

            // Shape diagram area (left-center)
            const shapeX = 120,
              shapeY = 200;
            this.drawShapeDiagram(q, shapeX, shapeY);

            // Question stem
            const stemX = 30,
              stemY = 100;
            const stemBg = this.add
              .rectangle(270, stemY + 60, 500, 130, CLR.panel, 0.9)
              .setStrokeStyle(1, isBoss ? CLR.coral : 0x1a2d50);
            this.questionGroup.add(stemBg);

            if (isBoss) {
              const bossIcon = this.add.text(stemX + 10, stemY + 5, "👾", {
                fontSize: "20px",
              });
              this.questionGroup.add(bossIcon);
              this.tweens.add({
                targets: bossIcon,
                scaleX: 1.2,
                scaleY: 1.2,
                duration: 500,
                yoyo: true,
                repeat: -1,
              });
            }

            const stemText = this.add.text(
              stemX + (isBoss ? 40 : 10),
              stemY + 5,
              q.stem,
              {
                fontSize: "15px",
                fontFamily: "Arial, sans-serif",
                color: "#eef5ff",
                wordWrap: { width: 460 },
                lineSpacing: 6,
              },
            );
            this.questionGroup.add(stemText);

            // Formula reference
            const formulaText = this.add.text(
              stemX + 10,
              stemY + 110,
              `Formula: ${q.formula}`,
              {
                fontSize: "12px",
                fontFamily: "Courier New, monospace",
                color: "#4ecdc4",
              },
            );
            this.questionGroup.add(formulaText);

            // Answer choices (below question area)
            const choiceStartY = 290;
            this.choiceBtns = [];

            q.choices.forEach((c, i) => {
              const label = String.fromCharCode(65 + i);
              const cy = choiceStartY + i * 48;
              const bg = this.add
                .rectangle(270, cy, 500, 40, CLR.panelLt, 0.85)
                .setStrokeStyle(1, 0x1a2d50)
                .setInteractive({ useHandCursor: true });
              this.questionGroup.add(bg);

              const keyText = this.add
                .text(40, cy, `[${i + 1}] ${label}.`, {
                  fontSize: "13px",
                  fontFamily: "Arial, sans-serif",
                  color: "#a88bff",
                  fontStyle: "bold",
                })
                .setOrigin(0, 0.5);
              this.questionGroup.add(keyText);

              const choiceText = this.add
                .text(100, cy, c.text, {
                  fontSize: "15px",
                  fontFamily: "Arial, sans-serif",
                  color: "#eef5ff",
                })
                .setOrigin(0, 0.5);
              this.questionGroup.add(choiceText);

              bg.on("pointerover", () => {
                if (!this.answered) bg.setStrokeStyle(2, CLR.teal);
              });
              bg.on("pointerout", () => {
                if (!this.answered) bg.setStrokeStyle(1, 0x1a2d50);
              });
              bg.on("pointerdown", () => {
                if (!this.answered) this.selectAnswer(i);
              });

              this.choiceBtns.push({ bg, keyText, choiceText, data: c });
            });

            // Hint display area
            this.hintText = this.add.text(30, 505, "", {
              fontSize: "12px",
              fontFamily: "Arial, sans-serif",
              color: "#a88bff",
              wordWrap: { width: 480 },
            });
            this.questionGroup.add(this.hintText);

            // Feedback area
            this.feedbackText = this.add.text(30, 535, "", {
              fontSize: "13px",
              fontFamily: "Arial, sans-serif",
              color: "#48df8a",
              wordWrap: { width: 480 },
            });
            this.questionGroup.add(this.feedbackText);

            // Reset timer
            this.timeLeft = this.getTimerDuration();
            this.timerMax = this.timeLeft;
            this.timerBar.setFillStyle(CLR.gold);
            this.timerBar.width = W - 30;
          }

          drawShapeDiagram(q, cx, cy) {
            const gfx = this.add.graphics();
            this.questionGroup.add(gfx);

            if (
              q.shape === "para" ||
              (q.shape === "both" && q.type !== "compare")
            ) {
              // Parallelogram
              gfx.fillStyle(0x1fc7ad, 0.15);
              gfx.lineStyle(3, 0x1fc7ad, 0.8);
              const pts = [
                { x: cx - 60, y: cy + 40 },
                { x: cx + 60, y: cy + 40 },
                { x: cx + 90, y: cy - 40 },
                { x: cx - 30, y: cy - 40 },
              ];
              gfx.fillPoints(pts, true);
              gfx.strokePoints(pts, true);
              // Height dashed line
              gfx.lineStyle(2, CLR.gold, 0.7);
              for (let dy = cy - 40; dy < cy + 40; dy += 8) {
                gfx.lineBetween(
                  cx - 30,
                  dy,
                  cx - 30,
                  Math.min(dy + 4, cy + 40),
                );
              }
              // Right angle marker
              gfx.lineStyle(1, CLR.gold, 0.6);
              gfx.strokeRect(cx - 30, cy + 28, 10, 12);
            }

            if (q.shape === "rhom" || q.shape === "both") {
              const rx = q.shape === "both" ? cx + 200 : cx;
              // Rhombus
              gfx.fillStyle(0xff9d37, 0.15);
              gfx.lineStyle(3, 0xff9d37, 0.8);
              const pts = [
                { x: rx, y: cy - 45 },
                { x: rx + 50, y: cy },
                { x: rx, y: cy + 45 },
                { x: rx - 50, y: cy },
              ];
              gfx.fillPoints(pts, true);
              gfx.strokePoints(pts, true);
              // Diagonal lines (dashed)
              gfx.lineStyle(2, 0x4ecdc4, 0.5);
              for (let dx = rx - 50; dx < rx + 50; dx += 8) {
                gfx.lineBetween(dx, cy, Math.min(dx + 4, rx + 50), cy);
              }
              gfx.lineStyle(2, 0x1a4a7d, 0.5);
              for (let dy = cy - 45; dy < cy + 45; dy += 8) {
                gfx.lineBetween(rx, dy, rx, Math.min(dy + 4, cy + 45));
              }
            }
          }

          drawBuildingArea() {
            this.buildingGfx.clear();
            // Building platform on right side
            const bx = 620,
              by = 100,
              bw = 320,
              bh = 490;
            this.buildingGfx.fillStyle(CLR.darkBlue, 0.5);
            this.buildingGfx.fillRect(bx, by, bw, bh);
            this.buildingGfx.lineStyle(1, 0x1a2d50, 0.4);
            this.buildingGfx.strokeRect(bx, by, bw, bh);

            // Grid inside building area
            this.buildingGfx.lineStyle(1, 0x1a2d50, 0.15);
            for (let y = by; y <= by + bh; y += 30)
              this.buildingGfx.lineBetween(bx, y, bx + bw, y);
            for (let x = bx; x <= bx + bw; x += 30)
              this.buildingGfx.lineBetween(x, by, x, by + bh);

            // Title
            if (!this.buildingTitle) {
              this.buildingTitle = this.add
                .text(bx + bw / 2, by - 10, "🏗️ YOUR BUILDING", {
                  fontSize: "13px",
                  fontFamily: "Arial, sans-serif",
                  color: "#ffcf72",
                  fontStyle: "bold",
                })
                .setOrigin(0.5, 1);
            }

            // Draw placed blocks
            const blockH = 28;
            const baseY = by + bh - 10;
            this.building.forEach((block, i) => {
              const y = baseY - i * (blockH + 3);
              const bWidth = Phaser.Math.Clamp(
                block.score * 0.8 + 60,
                60,
                bw - 20,
              );
              const x = bx + bw / 2 - bWidth / 2;

              if (block.correct) {
                const color = block.isBoss
                  ? CLR.coral
                  : block.zone < 2
                    ? CLR.teal
                    : block.zone < 4
                      ? CLR.violet
                      : CLR.gold;
                this.buildingGfx.fillStyle(color, 0.7);
                this.buildingGfx.fillRoundedRect(x, y, bWidth, blockH, 4);
                this.buildingGfx.lineStyle(1, 0xffffff, 0.3);
                this.buildingGfx.strokeRoundedRect(x, y, bWidth, blockH, 4);

                // Windows on block
                for (let wx = x + 8; wx < x + bWidth - 12; wx += 18) {
                  this.buildingGfx.fillStyle(0xffcf72, 0.3);
                  this.buildingGfx.fillRect(wx, y + 6, 8, 10);
                }
              } else {
                // Cracked/broken block for wrong answers
                this.buildingGfx.fillStyle(0x333333, 0.4);
                this.buildingGfx.fillRoundedRect(x, y, bWidth, blockH, 4);
                this.buildingGfx.lineStyle(1, CLR.danger, 0.3);
                this.buildingGfx.strokeRoundedRect(x, y, bWidth, blockH, 4);
              }
            });
          }

          showBossHP() {
            if (this.bossHPGroup) this.bossHPGroup.destroy(true);
            this.bossHPGroup = this.add.group();

            const bx = 620,
              by = 75;
            const label = this.add
              .text(
                bx + 160,
                by,
                `👾 Mr. Neft  HP: ${this.bossHP}/${this.bossMaxHP}`,
                {
                  fontSize: "13px",
                  fontFamily: "Arial, sans-serif",
                  color: "#ff6b6b",
                  fontStyle: "bold",
                },
              )
              .setOrigin(0.5, 0.5);
            this.bossHPGroup.add(label);

            // HP bar
            const barW = 200,
              barH = 8;
            const bg = this.add.rectangle(
              bx + 160,
              by + 14,
              barW,
              barH,
              0x333333,
            );
            this.bossHPGroup.add(bg);
            const pct = this.bossHP / this.bossMaxHP;
            const fill = this.add
              .rectangle(
                bx + 160 - (barW / 2) * (1 - pct),
                by + 14,
                barW * pct,
                barH,
                CLR.danger,
              )
              .setOrigin(0, 0.5);
            fill.x = bx + 160 - barW / 2;
            this.bossHPGroup.add(fill);
          }

          showZoneBanner(name, emoji, color) {
            const banner = this.add
              .rectangle(W / 2, H / 2, 500, 80, 0x000000, 0.85)
              .setStrokeStyle(3, color)
              .setDepth(100);
            const text = this.add
              .text(W / 2, H / 2, `${emoji} ${name} ${emoji}`, {
                fontSize: "28px",
                fontFamily: "Arial Black, sans-serif",
                color: "#" + color.toString(16).padStart(6, "0"),
                stroke: "#000000",
                strokeThickness: 4,
              })
              .setOrigin(0.5)
              .setDepth(101);

            this.tweens.add({
              targets: [banner, text],
              alpha: 0,
              delay: 1500,
              duration: 500,
              onComplete: () => {
                banner.destroy();
                text.destroy();
              },
            });
          }

          selectAnswer(idx) {
            if (this.answered || idx >= this.choiceBtns.length) return;
            this.answered = true;

            const chosen = this.choiceBtns[idx];
            const q = this.questions[this.qIndex];
            const isCorrect = chosen.data.correct;
            const isBoss = q.type === "boss";

            // Highlight correct/wrong
            this.choiceBtns.forEach((btn) => {
              if (btn.data.correct) {
                btn.bg.setFillStyle(CLR.ok, 0.3);
                btn.bg.setStrokeStyle(2, CLR.ok);
              }
            });

            if (isCorrect) {
              sfxCorrect();
              this.combo++;
              if (this.combo > this.maxCombo) this.maxCombo = this.combo;
              this.correct++;

              const mult = Math.min(
                5,
                1 + Math.floor(this.combo / 2) * this.comboMult,
              );
              const timeBonus = Math.floor(this.timeLeft / 1000);
              let pts = Math.round((100 + timeBonus * 5) * mult);
              if (this.shownHint) pts = Math.round(pts * 0.7);
              this.score += pts;

              this.feedbackText.setColor("#48df8a");
              this.feedbackText.setText(
                `✅ Correct! +${pts} pts  |  ${q.explain}`,
              );

              // Boss damage
              if (isBoss) {
                this.bossHP--;
                sfxBossHit();
                if (this.bossHP <= 0) sfxBossDeath();
                this.showBossHP();
                this.cameras.main.shake(200, 0.01);
              }

              // Place building block
              this.building.push({
                correct: true,
                score: pts,
                zone: q.zone,
                isBoss,
              });
              sfxPlace();
              this.drawBuildingArea();

              // Floating score text
              const floatTxt = this.add
                .text(W / 2, 500, `+${pts}`, {
                  fontSize: "22px",
                  fontFamily: "Arial Black, sans-serif",
                  color: "#b9ff78",
                })
                .setOrigin(0.5);
              this.tweens.add({
                targets: floatTxt,
                y: 460,
                alpha: 0,
                duration: 800,
                onComplete: () => floatTxt.destroy(),
              });

              // Particle burst
              this.emitParticles(270, 300, CLR.ok);
            } else {
              sfxWrong();
              chosen.bg.setFillStyle(CLR.danger, 0.3);
              chosen.bg.setStrokeStyle(2, CLR.danger);
              this.combo = 0;
              this.lives--;

              this.feedbackText.setColor("#ff6273");
              this.feedbackText.setText(`❌ Incorrect.  ${q.explain}`);

              // Cracked block
              this.building.push({
                correct: false,
                score: 0,
                zone: q.zone,
                isBoss,
              });
              this.drawBuildingArea();

              this.cameras.main.shake(300, 0.015);
              this.updateLivesText();

              if (this.lives <= 0) {
                sfxGameOver();
                this.time.delayedCall(1500, () => {
                  this.scene.start("ResultScene", {
                    score: this.score,
                    correct: this.correct,
                    total: this.qIndex + 1,
                    maxCombo: this.maxCombo,
                    architect: this.architect,
                    bossDefeated: false,
                    building: this.building,
                    gameOver: true,
                  });
                });
                return;
              }
            }

            this.total = this.qIndex + 1;
            this.scoreText.setText(`Score: ${this.score}`);
            this.updateComboText();
            this.updateProgress();

            // Next question after delay
            this.time.delayedCall(isCorrect ? 1200 : 2000, () => {
              this.qIndex++;
              if (this.qIndex >= this.questions.length) {
                this.scene.start("ResultScene", {
                  score: this.score,
                  correct: this.correct,
                  total: this.questions.length,
                  maxCombo: this.maxCombo,
                  architect: this.architect,
                  bossDefeated: this.bossHP <= 0,
                  building: this.building,
                  gameOver: false,
                });
              } else {
                // Check zone transition
                const newZone = this.questions[this.qIndex].zone;
                if (newZone !== this.zone) {
                  this.zone = newZone;
                  const zn = ZONES[newZone];
                  if (newZone < 4) {
                    sfxLevelUp();
                    this.showZoneBanner(zn.name, zn.emoji, zn.color);
                  } else {
                    this.showZoneBanner(zn.name, zn.emoji, zn.color);
                  }
                }
                this.showQuestion();
              }
            });
          }

          handleTimeout() {
            if (this.answered) return;
            this.answered = true;
            sfxWrong();
            this.combo = 0;
            this.lives--;

            const q = this.questions[this.qIndex];
            this.feedbackText.setColor("#ff6273");
            this.feedbackText.setText(`⏰ Time's up!  ${q.explain}`);

            // Show correct answer
            this.choiceBtns.forEach((btn) => {
              if (btn.data.correct) {
                btn.bg.setFillStyle(CLR.ok, 0.3);
                btn.bg.setStrokeStyle(2, CLR.ok);
              }
            });

            this.building.push({
              correct: false,
              score: 0,
              zone: q.zone,
              isBoss: q.type === "boss",
            });
            this.drawBuildingArea();
            this.updateLivesText();
            this.updateComboText();
            this.cameras.main.shake(300, 0.015);

            if (this.lives <= 0) {
              sfxGameOver();
              this.time.delayedCall(1500, () => {
                this.scene.start("ResultScene", {
                  score: this.score,
                  correct: this.correct,
                  total: this.qIndex + 1,
                  maxCombo: this.maxCombo,
                  architect: this.architect,
                  bossDefeated: false,
                  building: this.building,
                  gameOver: true,
                });
              });
              return;
            }

            this.time.delayedCall(2000, () => {
              this.qIndex++;
              if (this.qIndex >= this.questions.length) {
                this.scene.start("ResultScene", {
                  score: this.score,
                  correct: this.correct,
                  total: this.questions.length,
                  maxCombo: this.maxCombo,
                  architect: this.architect,
                  bossDefeated: this.bossHP <= 0,
                  building: this.building,
                  gameOver: false,
                });
              } else {
                const newZone = this.questions[this.qIndex].zone;
                if (newZone !== this.zone) {
                  this.zone = newZone;
                  const zn = ZONES[newZone];
                  sfxLevelUp();
                  this.showZoneBanner(zn.name, zn.emoji, zn.color);
                }
                this.showQuestion();
              }
            });
          }

          useHint() {
            if (this.answered || this.hints <= 0 || this.shownHint) return;
            sfxHint();
            this.hints--;
            this.shownHint = true;
            const q = this.questions[this.qIndex];
            this.hintText.setText(`💡 HINT: ${q.hint}`);
            this.hintBtn.setText(`[H] Hints: ${this.hints}`);
          }

          emitParticles(x, y, color) {
            for (let i = 0; i < 12; i++) {
              const p = this.add.circle(
                x,
                y,
                Phaser.Math.Between(2, 5),
                color,
                0.8,
              );
              this.tweens.add({
                targets: p,
                x: x + Phaser.Math.Between(-80, 80),
                y: y + Phaser.Math.Between(-60, -120),
                alpha: 0,
                scale: 0,
                duration: Phaser.Math.Between(400, 800),
                ease: "Cubic.easeOut",
                onComplete: () => p.destroy(),
              });
            }
          }
        }

        /* ═══════════════════════════════════════════
         RESULT SCENE
         ═══════════════════════════════════════════ */
        class ResultScene extends Phaser.Scene {
          constructor() {
            super("ResultScene");
          }

          init(data) {
            this.data = data;
          }

          create() {
            this.cameras.main.setBackgroundColor(CLR.bg);
            const d = this.data;

            // Stars background
            for (let i = 0; i < 60; i++) {
              const x = Phaser.Math.Between(0, W),
                y = Phaser.Math.Between(0, H);
              this.add.circle(
                x,
                y,
                Phaser.Math.Between(1, 2),
                0xffffff,
                Phaser.Math.FloatBetween(0.1, 0.3),
              );
            }

            // Title
            const titleText = d.gameOver
              ? "BUILDING COLLAPSED"
              : d.bossDefeated
                ? "MR. NEFT DEFEATED!"
                : "BUILDING COMPLETE!";
            const titleColor = d.gameOver
              ? "#ff6273"
              : d.bossDefeated
                ? "#ffcf72"
                : "#48df8a";
            this.add
              .text(W / 2, 40, titleText, {
                fontSize: "38px",
                fontFamily: "Arial Black, sans-serif",
                color: titleColor,
                stroke: "#0a1628",
                strokeThickness: 5,
              })
              .setOrigin(0.5);

            if (d.bossDefeated) {
              sfxBossDeath();
              // Victory particles
              for (let i = 0; i < 30; i++) {
                this.time.delayedCall(i * 50, () => {
                  this.emitConfetti(
                    Phaser.Math.Between(100, W - 100),
                    Phaser.Math.Between(50, 200),
                  );
                });
              }
            }

            // Stats panel
            const pX = 100,
              pY = 90;
            this.add
              .rectangle(240, pY + 120, 300, 240, CLR.panel, 0.9)
              .setStrokeStyle(1, 0x1a2d50);

            this.add.text(
              pX,
              pY + 15,
              `${d.architect.emoji} ${d.architect.name}`,
              {
                fontSize: "16px",
                fontFamily: "Arial, sans-serif",
                color: "#4ecdc4",
                fontStyle: "bold",
              },
            );

            const stats = [
              `Score: ${d.score}`,
              `Correct: ${d.correct} / ${d.total}`,
              `Accuracy: ${d.total > 0 ? Math.round((d.correct / d.total) * 100) : 0}%`,
              `Best Streak: ${d.maxCombo}`,
              `Boss: ${d.bossDefeated ? "DEFEATED 🏆" : d.gameOver ? "SURVIVED" : "STANDING"}`,
              `Blocks Placed: ${d.building.filter((b) => b.correct).length}`,
            ];

            stats.forEach((s, i) => {
              this.add.text(pX, pY + 48 + i * 30, s, {
                fontSize: "15px",
                fontFamily: "Arial, sans-serif",
                color: "#eef5ff",
              });
            });

            // Grade
            const pct = d.total > 0 ? d.correct / d.total : 0;
            let grade, gradeColor;
            if (pct >= 0.95) {
              grade = "S - Master Architect";
              gradeColor = "#ffcf72";
            } else if (pct >= 0.85) {
              grade = "A - Expert Builder";
              gradeColor = "#48df8a";
            } else if (pct >= 0.7) {
              grade = "B - Skilled Designer";
              gradeColor = "#4ecdc4";
            } else if (pct >= 0.5) {
              grade = "C - Apprentice";
              gradeColor = "#f7dc6f";
            } else {
              grade = "D - Keep Practicing!";
              gradeColor = "#ff6273";
            }

            this.add.text(pX, pY + 240, `Grade: ${grade}`, {
              fontSize: "18px",
              fontFamily: "Arial, sans-serif",
              color: gradeColor,
              fontStyle: "bold",
            });

            // Building visualization (right side)
            this.drawFinalBuilding(d.building);

            // Play again button
            const replayBg = this.add
              .rectangle(W / 2, H - 60, 220, 50, CLR.panel, 0.9)
              .setStrokeStyle(2, CLR.teal)
              .setInteractive({ useHandCursor: true });
            const replayText = this.add
              .text(W / 2, H - 60, "🔄 Play Again (Enter)", {
                fontSize: "16px",
                fontFamily: "Arial, sans-serif",
                color: "#4ecdc4",
                fontStyle: "bold",
              })
              .setOrigin(0.5);

            replayBg.on("pointerover", () =>
              replayBg.setStrokeStyle(3, CLR.gold),
            );
            replayBg.on("pointerout", () =>
              replayBg.setStrokeStyle(2, CLR.teal),
            );
            replayBg.on("pointerdown", () => {
              sfxClick();
              this.scene.start("TitleScene");
            });

            this.input.keyboard.on("keydown", (e) => {
              if (e.key === "Enter") {
                sfxClick();
                this.scene.start("TitleScene");
              }
            });

            // Formula reference
            this.add
              .text(
                W / 2,
                H - 20,
                "Parallelogram: A = b × h     Rhombus: A = ½ × d1 × d2  or  A = b × h",
                {
                  fontSize: "11px",
                  fontFamily: "Courier New, monospace",
                  color: "#7e96c2",
                },
              )
              .setOrigin(0.5);
          }

          drawFinalBuilding(blocks) {
            const gfx = this.add.graphics();
            const bx = 520,
              by = 80,
              bw = 400,
              bh = 480;

            // Platform
            gfx.fillStyle(CLR.darkBlue, 0.5);
            gfx.fillRect(bx, by, bw, bh);
            gfx.lineStyle(1, 0x1a2d50, 0.3);
            gfx.strokeRect(bx, by, bw, bh);

            // Ground
            gfx.fillStyle(0x2d4a3e, 0.6);
            gfx.fillRect(bx, by + bh - 15, bw, 15);

            this.add
              .text(bx + bw / 2, by - 5, "🏗️ FINAL BUILDING", {
                fontSize: "14px",
                fontFamily: "Arial, sans-serif",
                color: "#ffcf72",
                fontStyle: "bold",
              })
              .setOrigin(0.5, 1);

            const blockH = 22;
            const baseY = by + bh - 20;

            blocks.forEach((block, i) => {
              const y = baseY - i * (blockH + 2);
              if (y < by + 10) return; // don't overflow
              const blockW = Phaser.Math.Clamp(
                block.score * 0.6 + 80,
                80,
                bw - 30,
              );
              const x = bx + bw / 2 - blockW / 2;

              if (block.correct) {
                const colors = [
                  CLR.teal,
                  CLR.teal,
                  0xf7dc6f,
                  0xf7dc6f,
                  CLR.violet,
                  CLR.violet,
                  0xe74c3c,
                  0xe74c3c,
                ];
                const zoneColors = [
                  CLR.teal,
                  0xf7dc6f,
                  CLR.violet,
                  0xe74c3c,
                  CLR.coral,
                ];
                const color = block.isBoss
                  ? CLR.gold
                  : zoneColors[block.zone] || CLR.teal;
                gfx.fillStyle(color, 0.65);
                gfx.fillRoundedRect(x, y, blockW, blockH, 3);
                gfx.lineStyle(1, 0xffffff, 0.2);
                gfx.strokeRoundedRect(x, y, blockW, blockH, 3);

                // Windows
                for (let wx = x + 6; wx < x + blockW - 10; wx += 14) {
                  gfx.fillStyle(0xffcf72, 0.25);
                  gfx.fillRect(wx, y + 4, 6, 8);
                }

                // Antenna on top block
                if (i === blocks.length - 1 && block.correct) {
                  gfx.lineStyle(2, 0xffffff, 0.5);
                  gfx.lineBetween(bx + bw / 2, y, bx + bw / 2, y - 20);
                  gfx.fillStyle(CLR.coral, 0.8);
                  gfx.fillCircle(bx + bw / 2, y - 22, 4);
                }
              } else {
                gfx.fillStyle(0x444444, 0.3);
                gfx.fillRoundedRect(x, y, blockW, blockH, 3);
                gfx.lineStyle(1, CLR.danger, 0.2);
                gfx.strokeRoundedRect(x, y, blockW, blockH, 3);
                // Crack lines
                gfx.lineStyle(1, CLR.danger, 0.3);
                gfx.lineBetween(
                  x + blockW * 0.3,
                  y,
                  x + blockW * 0.5,
                  y + blockH,
                );
                gfx.lineBetween(
                  x + blockW * 0.7,
                  y,
                  x + blockW * 0.6,
                  y + blockH,
                );
              }
            });
          }

          emitConfetti(x, y) {
            const colors = [
              CLR.gold,
              CLR.teal,
              CLR.coral,
              CLR.lime,
              CLR.violet,
            ];
            for (let i = 0; i < 4; i++) {
              const p = this.add.circle(
                x,
                y,
                Phaser.Math.Between(2, 5),
                Phaser.Utils.Array.GetRandom(colors),
                0.8,
              );
              this.tweens.add({
                targets: p,
                x: x + Phaser.Math.Between(-100, 100),
                y: y + Phaser.Math.Between(100, 300),
                alpha: 0,
                duration: Phaser.Math.Between(800, 1500),
                ease: "Cubic.easeOut",
                onComplete: () => p.destroy(),
              });
            }
          }
        }

        /* ═══════════════════════════════════════════
         BOOT
         ═══════════════════════════════════════════ */
        const config = {
          type: Phaser.AUTO,
          parent: "game-container",
          width: W,
          height: H,
          backgroundColor: "#0a1628",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          scene: [TitleScene, GameScene, ResultScene],
        };
        new Phaser.Game(config);
      })();
    </script>
  </body>
</html>
