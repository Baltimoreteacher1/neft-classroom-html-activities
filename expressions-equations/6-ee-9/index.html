<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --neon-cyan:#00f0ff;--neon-pink:#ff2d95;--neon-green:#39ff14;--neon-gold:#ffd700;
  --neon-purple:#b44aff;--neon-orange:#ff6b2b;
  --bg-deep:#0a0a1a;--bg-mid:#12122a;--bg-card:rgba(18,18,42,0.85);
  --glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.12);
  --text:#e8e8f0;--text-dim:#8888aa;--text-bright:#ffffff;
  --font-main:'Segoe UI',system-ui,sans-serif;
  --radius:16px;--radius-sm:10px;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:var(--font-main);color:var(--text);background:var(--bg-deep);
  min-height:100vh;overflow-x:hidden;position:relative;
}
/* PARALLAX STARS */
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.stars canvas{width:100%;height:100%}
/* GLASS MORPHISM */
.glass{
  background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);
  -webkit-backdrop-filter:blur(20px) saturate(1.4);
  border:1px solid var(--glass-border);border-radius:var(--radius);
}
.glass-sm{
  background:rgba(255,255,255,0.04);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);
}
/* NEON GLOW UTILITIES */
.glow-cyan{text-shadow:0 0 10px var(--neon-cyan),0 0 40px rgba(0,240,255,0.3)}
.glow-pink{text-shadow:0 0 10px var(--neon-pink),0 0 40px rgba(255,45,149,0.3)}
.glow-green{text-shadow:0 0 10px var(--neon-green),0 0 40px rgba(57,255,20,0.3)}
.glow-gold{text-shadow:0 0 10px var(--neon-gold),0 0 40px rgba(255,215,0,0.3)}
.btn-neon{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:14px 32px;border:2px solid var(--neon-cyan);border-radius:var(--radius-sm);
  background:rgba(0,240,255,0.08);color:var(--neon-cyan);font-size:1rem;font-weight:700;
  cursor:pointer;transition:all .25s;letter-spacing:1px;text-transform:uppercase;
}
.btn-neon:hover{background:rgba(0,240,255,0.2);box-shadow:0 0 30px rgba(0,240,255,0.3);transform:translateY(-2px)}
.btn-neon:active{transform:translateY(0)}
.btn-neon.pink{border-color:var(--neon-pink);color:var(--neon-pink);background:rgba(255,45,149,0.08)}
.btn-neon.pink:hover{background:rgba(255,45,149,0.2);box-shadow:0 0 30px rgba(255,45,149,0.3)}
.btn-neon.green{border-color:var(--neon-green);color:var(--neon-green);background:rgba(57,255,20,0.08)}
.btn-neon.green:hover{background:rgba(57,255,20,0.2);box-shadow:0 0 30px rgba(57,255,20,0.3)}
.btn-neon.gold{border-color:var(--neon-gold);color:var(--neon-gold);background:rgba(255,215,0,0.08)}
.btn-neon.gold:hover{background:rgba(255,215,0,0.2);box-shadow:0 0 30px rgba(255,215,0,0.3)}
.btn-neon:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none!important}
/* SCREEN LAYOUT */
.screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;position:relative;z-index:1}
.screen.active{display:flex}
/* TOP BAR */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;
  justify-content:space-between;padding:10px 20px;

}
.top-bar .left{display:flex;align-items:center;gap:12px}
.top-bar .right{display:flex;align-items:center;gap:10px}
.icon-btn{

  background:var(--glass);color:var(--text);display:flex;align-items:center;justify-content:center;

}
.icon-btn:hover{background:rgba(255,255,255,0.12);border-color:var(--neon-cyan)}
.streak-badge{

}
.xp-bar{

}
.xp-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--neon-cyan),var(--neon-purple));transition:width .5s}

/* FEEDBACK */

/* ACTIONS */
.actions{display:flex;gap:12px;flex-wrap:wrap}
/* RESULTS */

  background:rgba(255,215,0,0.1);border:1px solid rgba(255,215,0,0.3);color:var(--neon-gold);
}
/* STATS SCREEN */
#stats-screen{padding-top:70px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;width:min(600px,95%);margin-bottom:24px}

/* PARTICLES */
.particle{position:fixed;pointer-events:none;z-index:200;border-radius:50%}
/* SCREEN FLASH */
.screen-flash{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:150;pointer-events:none;opacity:0;
}
/* BILINGUAL TOGGLE */
.lang-toggle{
  padding:4px 10px;border-radius:12px;font-size:.75rem;font-weight:700;
  border:1px solid var(--glass-border);background:var(--glass);color:var(--text);cursor:pointer;
}
/* ACCESSIBILITY */
.high-contrast{--bg-deep:#000;--bg-mid:#111;--text:#fff;--text-dim:#ccc;--glass:rgba(255,255,255,0.1);--glass-border:rgba(255,255,255,0.25)}

/* RESPONSIVE */
@media(max-width:600px){
  .top-bar{padding:8px 12px}
  .game-container{margin-top:10px}

/* TIMER (optional / adjustable) */
.timer-bar{width:100%;height:4px;border-radius:2px;background:rgba(255,255,255,0.06);margin-bottom:8px;display:none}

/* KEYBOARD NAV */
.option-btn:focus-visible{outline:2px solid var(--neon-cyan);outline-offset:2px}
.btn-neon:focus-visible{outline:2px solid var(--neon-cyan);outline-offset:2px}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════
// AUDIO ENGINE (Web Audio API)
// ═══════════════════════════════════════════════════
const AudioEngine = (() => {
  let ctx, muted = false, gain;
  function init() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    gain = ctx.createGain(); gain.connect(ctx.destination); gain.gain.value = 0.3;
  }
  function play(freq, type, dur, delay = 0) {
    if (muted || !ctx) return;
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0.3, ctx.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
    o.connect(g); g.connect(gain); o.start(ctx.currentTime + delay); o.stop(ctx.currentTime + delay + dur);
  }
  return {
    init,
    correct() { play(523, 'sine', 0.15); play(659, 'sine', 0.15, 0.1); play(784, 'sine', 0.2, 0.2); },
    incorrect() { play(200, 'sawtooth', 0.3); play(180, 'sawtooth', 0.3, 0.15); },
    click() { play(800, 'sine', 0.05); },
    levelUp() { play(523, 'sine', 0.15); play(659, 'sine', 0.15, 0.12); play(784, 'sine', 0.15, 0.24); play(1047, 'sine', 0.3, 0.36); },
    achievement() { play(880, 'sine', 0.1); play(1100, 'sine', 0.1, 0.08); play(1320, 'sine', 0.2, 0.16); },
    toggle() { muted = !muted; document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊'; },
    get muted() { return muted; }
  };
})();

// ═══════════════════════════════════════════════════
// PARALLAX STARS
// ═══════════════════════════════════════════════════
(() => {
  const canvas = document.getElementById('starCanvas');
  const c = canvas.getContext('2d');
  let stars = [], W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function create() {
    stars = [];
    for (let i = 0; i < 200; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.8 + 0.2,
        speed: Math.random() * 0.3 + 0.05, alpha: Math.random() * 0.7 + 0.3 });
    }
  }
  function draw() {
    c.clearRect(0, 0, W, H);
    stars.forEach(s => {
      s.y += s.speed; if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
      c.beginPath(); c.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      c.fillStyle = `rgba(200,220,255,${s.alpha})`; c.fill();
    });
    requestAnimationFrame(draw);
  }
  resize(); create(); draw();
  window.addEventListener('resize', () => { resize(); create(); });
})();

// ═══════════════════════════════════════════════════
// STATE MANAGEMENT
// ═══════════════════════════════════════════════════
const STORE_KEY = 'variable_voyager_6eec9_v2';
let state = loadState();

function defaultState() {
  return {
    xp: 0, level: 1, totalCorrect: 0, totalAttempted: 0, bestStreak: 0,
    missions: {}, achievements: [], gamesPlayed: 0, comebackXP: 0
  };
}
function loadState() {
  try { const d = localStorage.getItem(STORE_KEY); return d ? { ...defaultState(), ...JSON.parse(d) } : defaultState(); }
  catch { return defaultState(); }
}
function saveState() { try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch {} }

// ═══════════════════════════════════════════════════
// LANGUAGE SYSTEM
// ═══════════════════════════════════════════════════
let lang = 'en';
function toggleLang() {
  lang = lang === 'en' ? 'es' : 'en';
  document.querySelectorAll('[data-en]').forEach(el => { el.textContent = el.getAttribute(`data-${lang}`); });
}

// ═══════════════════════════════════════════════════
// QUESTION BANK (18 problems, shuffled per mission)
// ═══════════════════════════════════════════════════
const Q = [
  // MISSION 1: Identify Variables (MC)
  {m:0, type:'mc', context:'A baker makes cookies. The number of cookies depends on how many batches she bakes.',
   contextEs:'Una panadera hace galletas. El número de galletas depende de cuántas tandas hornea.',
   prompt:'Which is the independent variable?', promptEs:'¿Cuál es la variable independiente?',
   options:['Number of batches','Number of cookies','Cost of flour','Oven temperature'],
   optionsEs:['Número de tandas','Número de galletas','Costo de la harina','Temperatura del horno'],
   answer:0,
   hints:[
     {en:'Think: which variable does the baker CHOOSE?',es:'Piensa: ¿qué variable ELIGE la panadera?'},
     {en:'The independent variable is the input — the one you control.',es:'La variable independiente es la entrada — la que tú controlas.'},
     {en:'The baker chooses how many batches to make. Batches = independent. Cookies = dependent (the result).',es:'La panadera elige cuántas tandas hacer. Tandas = independiente. Galletas = dependiente (el resultado).'}

// ═══════════════════════════════════════════════════
// PARTICLES & EFFECTS
// ═══════════════════════════════════════════════════
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = x + 'px'; p.style.top = y + 'px';
    p.style.width = p.style.height = (Math.random() * 6 + 3) + 'px';
    p.style.background = color;
    document.body.appendChild(p);
    gsap.to(p, {
      x: (Math.random() - 0.5) * 200, y: (Math.random() - 0.5) * 200,
      opacity: 0, scale: 0, duration: 0.8 + Math.random() * 0.4, ease: 'power2.out',
      onComplete: () => p.remove()
    });
  }
}

function screenFlash(color) {
  const el = document.getElementById('screenFlash');
  el.style.background = color;
  gsap.fromTo(el, { opacity: 0.3 }, { opacity: 0, duration: 0.4, ease: 'power2.out' });
}

// ═══════════════════════════════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════════════════════════════
function showScreen(id) {
  AudioEngine.init();
  AudioEngine.click();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const bar = document.getElementById('topBar');
  bar.style.display = (id === 'title-screen') ? 'none' : 'flex';
  if (id === 'skill-screen') renderSkillTree();
  if (id === 'stats-screen') renderStats();
  updateTopBar();
}

function updateTopBar() {
  const xpForLevel = state.level * 100;
  const pct = Math.min((state.xp % 100) / 100 * 100, 100);
  document.getElementById('xpFill').style.width = pct + '%';
  document.getElementById('levelBadge').textContent = `LV ${state.level}`;
}

// ═══════════════════════════════════════════════════
// SKILL TREE
// ═══════════════════════════════════════════════════
function renderSkillTree() {
  const tree = document.getElementById('skillTree');
  tree.innerHTML = '';
  MISSIONS.forEach((m, i) => {
    const missionState = state.missions[m.id] || { stars: 0, best: 0, attempts: 0 };
    const unlocked = i === 0 || (state.missions[MISSIONS[i - 1].id]?.stars || 0) >= 1;
    const node = document.createElement('div');
    node.className = `skill-node glass ${unlocked ? '' : 'locked'}`;
    node.innerHTML = `
      <div class="icon" style="border-color:var(${m.color})">${m.icon}</div>
      <div class="info">
        <h3 style="color:var(${m.color})" data-en="${m.name}" data-es="${m.nameEs}">${lang === 'es' ? m.nameEs : m.name}</h3>
        <p data-en="${m.desc}" data-es="${m.descEs}">${lang === 'es' ? m.descEs : m.desc}</p>
        ${missionState.best > 0 ? `<p style="color:var(--neon-gold);font-size:.75rem">Best: ${missionState.best}%</p>` : ''}
      </div>
      <div class="stars-display">${'★'.repeat(missionState.stars)}${'☆'.repeat(3 - missionState.stars)}</div>
    `;
    if (unlocked) node.onclick = () => startMission(i);
    tree.appendChild(node);
    gsap.from(node, { x: -40, opacity: 0, duration: 0.4, delay: i * 0.1, ease: 'power2.out' });
  });
}

// ═══════════════════════════════════════════════════
// GAME ENGINE
// ═══════════════════════════════════════════════════
let game = {};

function startMission(missionIdx) {
  const questions = Q.filter(q => q.m === missionIdx);
  // Shuffle
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  game = {
    missionIdx, questions, current: 0, score: 0, streak: 0, maxStreak: 0,
    combo: 0, attempts: 0, hintsUsed: 0, startTime: Date.now(),
    answered: false, currentAttempts: 0
  };
  showScreen('game-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = game.questions[game.current];
  const card = document.getElementById('questionCard');
  const total = game.questions.length;
  const pct = (game.current / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('hintBox').classList.remove('visible');
  document.getElementById('hintBox').textContent = '';
  document.getElementById('feedbackBox').classList.remove('visible', 'correct-fb', 'incorrect-fb');
  game.answered = false;
  game.currentAttempts = 0;

  const context = lang === 'es' ? (q.contextEs || q.context) : q.context;
  const prompt = lang === 'es' ? (q.promptEs || q.prompt) : q.prompt;

  if (q.type === 'mc') renderMC(card, q, context, prompt);
  else if (q.type === 'table') renderTable(card, q, context, prompt);

  gsap.from(card, { y: 30, opacity: 0, duration: 0.4, ease: 'power2.out' });
  renderActions();
}

function renderMC(card, q, context, prompt) {
  const opts = lang === 'es' ? (q.optionsEs || q.options) : q.options;
  const letters = ['A', 'B', 'C', 'D'];
  card.innerHTML = `
    <div class="q-type">${lang === 'es' ? 'Pregunta' : 'Question'} ${game.current + 1} / ${game.questions.length}</div>
    <div class="q-context">${context}</div>
    <div class="q-prompt">${prompt}</div>
    <div class="options" id="optionsContainer">
      ${opts.map((o, i) => `
        <button class="option-btn" tabindex="0" data-idx="${i}" onclick="selectOption(${i})" onkeydown="if(event.key==='Enter')selectOption(${i})">
          <span class="option-letter">${letters[i]}</span>
          <span>${o}</span>
        </button>
      `).join('')}
    </div>
  `;
}

function renderTable(card, q, context, prompt) {
  const il = lang === 'es' ? (q.indepLabelEs || q.indepLabel) : q.indepLabel;
  const dl = lang === 'es' ? (q.depLabelEs || q.depLabel) : q.depLabel;
  let headerCells = q.inputs.map(v => `<th>${v}</th>`).join('');
  let dataCells = q.inputs.map((v, i) => {
    if (q.given.includes(i)) return `<td class="given">${q.rule(v)}</td>`;
    return `<td><input type="text" id="tbl_${i}" data-idx="${i}" data-expected="${q.rule(v)}" inputmode="decimal" aria-label="${dl} for ${il} ${v}"></td>`;
  }).join('');
  card.innerHTML = `
    <div class="q-type">${lang === 'es' ? 'Pregunta' : 'Question'} ${game.current + 1} / ${game.questions.length}</div>
    <div class="q-context">${context}</div>
    <div class="q-prompt">${prompt}</div>
    <table class="table-input">
      <tr><th>${il}</th>${headerCells}</tr>
      <tr><th>${dl}</th>${dataCells}</tr>
    </table>
  `;
}

function selectOption(idx) {
  if (game.answered) return;
  AudioEngine.click();
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`.option-btn[data-idx="${idx}"]`).classList.add('selected');
  game.selectedOption = idx;
}

function renderActions() {
  const acts = document.getElementById('actionBtns');
  const submitTxt = lang === 'es' ? 'Enviar' : 'Submit';
  const hintTxt = lang === 'es' ? 'Pista' : 'Hint';
  const nextTxt = lang === 'es' ? 'Siguiente' : 'Next';

  if (game.answered) {
    acts.innerHTML = `<button class="btn-neon green" onclick="nextQuestion()">→ ${nextTxt}</button>`;
  } else {
    acts.innerHTML = `
      <button class="btn-neon" onclick="submitAnswer()">✓ ${submitTxt}</button>
      <button class="btn-neon gold" id="hintBtn" onclick="showHint()">💡 ${hintTxt} (${3 - game.currentAttempts})</button>
    `;
  }
}

function showHint() {
  const q = game.questions[game.current];
  const hintIdx = Math.min(game.currentAttempts, 2);
  const hint = q.hints[hintIdx];
  const hintBox = document.getElementById('hintBox');
  hintBox.textContent = lang === 'es' ? hint.es : hint.en;
  hintBox.classList.add('visible');
  game.hintsUsed++;
  gsap.from(hintBox, { y: 10, opacity: 0, duration: 0.3 });
}

function submitAnswer() {
  if (game.answered) return;
  const q = game.questions[game.current];

  if (q.type === 'mc') {
    if (game.selectedOption === undefined) return;
    const correct = game.selectedOption === q.answer;
    handleResult(correct, q);
  } else if (q.type === 'table') {
    const inputs = document.querySelectorAll('.table-input input');
    let allCorrect = true, allFilled = true;
    inputs.forEach(inp => {
      if (inp.value.trim() === '') { allFilled = false; return; }
      const val = parseFloat(inp.value.trim());
      const exp = parseFloat(inp.dataset.expected);
      if (Math.abs(val - exp) < 0.011) {
        inp.classList.add('correct-input');
      } else {
        inp.classList.add('incorrect-input');
        allCorrect = false;
      }
    });
    if (!allFilled) return;
    handleResult(allCorrect, q);
  }
}

function handleResult(correct, q) {
  game.attempts++;
  game.currentAttempts++;

  if (correct) {
    game.answered = true;
    game.score++;
    game.streak++;
    game.combo++;
    if (game.streak > game.maxStreak) game.maxStreak = game.streak;
    state.totalCorrect++;

    AudioEngine.correct();
    screenFlash('rgba(57,255,20,0.15)');

    const fb = document.getElementById('feedbackBox');
    const comboText = game.combo >= 3 ? ` 🔥 ${game.combo}x Combo!` : '';
    fb.textContent = (lang === 'es' ? '¡Correcto!' : 'Correct!') + comboText;
    fb.className = 'feedback visible correct-fb';

    if (q.type === 'mc') {
      document.querySelectorAll('.option-btn').forEach(b => {
        b.classList.remove('selected');
        if (parseInt(b.dataset.idx) === q.answer) b.classList.add('correct');
      });
    }

    // Particles at center
    const rect = document.getElementById('questionCard').getBoundingClientRect();
    spawnParticles(rect.left + rect.width / 2, rect.top + rect.height / 2, '#39ff14', 16);

    // XP
    let xpGain = 10 + (game.combo >= 5 ? 10 : game.combo >= 3 ? 5 : 0);
    if (game.currentAttempts === 1 && game.hintsUsed === 0) xpGain += 5; // First-try bonus
    addXP(xpGain);
    document.getElementById('streakBadge').textContent = `🔥 ${game.streak}`;
  } else {
    game.streak = 0;
    game.combo = 0;
    document.getElementById('streakBadge').textContent = `🔥 0`;

    AudioEngine.incorrect();
    screenFlash('rgba(255,45,149,0.15)');

    if (q.type === 'mc') {
      document.querySelector(`.option-btn[data-idx="${game.selectedOption}"]`).classList.add('incorrect');
      game.selectedOption = undefined;
    }

    if (game.currentAttempts >= 3) {
      // Reveal answer after 3 attempts
      game.answered = true;
      const fb = document.getElementById('feedbackBox');
      if (q.type === 'mc') {
        const correctOpt = (lang === 'es' ? (q.optionsEs || q.options) : q.options)[q.answer];
        fb.textContent = (lang === 'es' ? `La respuesta correcta es: ${correctOpt}` : `The correct answer is: ${correctOpt}`);
        document.querySelectorAll('.option-btn').forEach(b => {
          if (parseInt(b.dataset.idx) === q.answer) b.classList.add('correct');
        });
      } else {
        fb.textContent = lang === 'es' ? 'Revisa los valores correctos arriba.' : 'Check the correct values above.';
        document.querySelectorAll('.table-input input').forEach(inp => {
          inp.value = inp.dataset.expected;
          inp.classList.remove('incorrect-input');
          inp.classList.add('correct-input');
        });
      }
      fb.className = 'feedback visible incorrect-fb';
      // Comeback XP
      addXP(2);
    } else {
      const fb = document.getElementById('feedbackBox');
      const attemptsLeft = 3 - game.currentAttempts;
      fb.textContent = (lang === 'es' ? `Inténtalo de nuevo. ${attemptsLeft} intento(s) restante(s). Usa la pista.` : `Try again. ${attemptsLeft} attempt(s) left. Use the hint!`);
      fb.className = 'feedback visible incorrect-fb';
      // Show hint automatically
      showHint();
    }

    if (q.type === 'table' && game.currentAttempts < 3) {
      // Clear incorrect for retry
      document.querySelectorAll('.table-input input.incorrect-input').forEach(inp => {
        setTimeout(() => inp.classList.remove('incorrect-input'), 800);
      });
    }
  }

  state.totalAttempted++;
  saveState();
  renderActions();
}

function addXP(amount) {
  state.xp += amount;
  const newLevel = Math.floor(state.xp / 100) + 1;
  if (newLevel > state.level) {
    state.level = newLevel;
    AudioEngine.levelUp();
    spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#b44aff', 30);
  }
  updateTopBar();
}

function nextQuestion() {
  game.current++;
  if (game.current >= game.questions.length) {
    endMission();
  } else {
    renderQuestion();
  }
}

function endMission() {
  const mission = MISSIONS[game.missionIdx];
  const pct = Math.round((game.score / game.questions.length) * 100);
  const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : pct >= 50 ? 1 : 0;
  const elapsed = Math.round((Date.now() - game.startTime) / 1000);

  // Update state
  const ms = state.missions[mission.id] || { stars: 0, best: 0, attempts: 0 };
  ms.stars = Math.max(ms.stars, stars);
  ms.best = Math.max(ms.best, pct);
  ms.attempts++;
  state.missions[mission.id] = ms;
  state.gamesPlayed++;
  if (game.maxStreak > state.bestStreak) state.bestStreak = game.maxStreak;

  // Achievements
  const newAchievements = [];
  if (pct === 100 && !state.achievements.includes('perfect')) { state.achievements.push('perfect'); newAchievements.push('🏆 Perfect Score'); }
  if (game.maxStreak >= 5 && !state.achievements.includes('streak5')) { state.achievements.push('streak5'); newAchievements.push('🔥 5-Streak'); }
  if (game.maxStreak >= game.questions.length && !state.achievements.includes('flawless')) { state.achievements.push('flawless'); newAchievements.push('💎 Flawless'); }
  if (state.gamesPlayed >= 5 && !state.achievements.includes('dedicated')) { state.achievements.push('dedicated'); newAchievements.push('🎯 Dedicated (5 games)'); }
  if (stars === 3 && !state.achievements.includes('star3')) { state.achievements.push('star3'); newAchievements.push('⭐ 3-Star Master'); }
  const allStars = MISSIONS.every(m => (state.missions[m.id]?.stars || 0) >= 3);
  if (allStars && !state.achievements.includes('allstars')) { state.achievements.push('allstars'); newAchievements.push('🌟 Variable Voyager Legend'); }

  if (newAchievements.length) AudioEngine.achievement();
  saveState();

  // Render results
  const card = document.getElementById('resultsCard');
  const starDisplay = '★'.repeat(stars) + '☆'.repeat(3 - stars);
  card.innerHTML = `
    <h2 class="glow-cyan" data-en="Mission Complete!" data-es="¡Misión Completa!">${lang === 'es' ? '¡Misión Completa!' : 'Mission Complete!'}</h2>
    <p style="color:var(--text-dim)">${lang === 'es' ? mission.nameEs : mission.name}</p>
    <div class="score glow-${stars >= 2 ? 'gold' : 'cyan'}">${pct}%</div>
    <div class="star-display">${starDisplay.split('').map(s => `<span style="color:${s === '★' ? 'var(--neon-gold)' : 'var(--text-dim)'}">${s}</span>`).join('')}</div>
    <div class="stat-row"><span>${lang === 'es' ? 'Correctas' : 'Correct'}</span><span>${game.score} / ${game.questions.length}</span></div>
    <div class="stat-row"><span>${lang === 'es' ? 'Mejor racha' : 'Best Streak'}</span><span>🔥 ${game.maxStreak}</span></div>
    <div class="stat-row"><span>${lang === 'es' ? 'Tiempo' : 'Time'}</span><span>${elapsed}s</span></div>
    <div class="stat-row"><span>${lang === 'es' ? 'Pistas usadas' : 'Hints Used'}</span><span>${game.hintsUsed}</span></div>
    ${newAchievements.length ? `<div class="achievements-earned">${newAchievements.map(a => `<span class="achievement-badge">${a}</span>`).join('')}</div>` : ''}
    <div style="display:flex;gap:12px;margin-top:20px;justify-content:center;flex-wrap:wrap">
      <button class="btn-neon" onclick="startMission(${game.missionIdx})">🔄 <span data-en="Retry" data-es="Reintentar">${lang === 'es' ? 'Reintentar' : 'Retry'}</span></button>
      <button class="btn-neon green" onclick="showScreen('skill-screen')">🗺️ <span data-en="Missions" data-es="Misiones">${lang === 'es' ? 'Misiones' : 'Missions'}</span></button>
    </div>
  `;
  showScreen('results-screen');

  // Celebration particles
  if (stars >= 2) {
    for (let i = 0; i < 5; i++) {
      setTimeout(() => spawnParticles(Math.random() * window.innerWidth, Math.random() * window.innerHeight / 2, ['#ffd700', '#39ff14', '#00f0ff', '#ff2d95'][i % 4], 10), i * 200);
    }
  }
}

// ═══════════════════════════════════════════════════
// STATS SCREEN
// ═══════════════════════════════════════════════════
function renderStats() {
  const grid = document.getElementById('statsGrid');
  const accuracy = state.totalAttempted > 0 ? Math.round((state.totalCorrect / state.totalAttempted) * 100) : 0;
  const totalStars = MISSIONS.reduce((s, m) => s + (state.missions[m.id]?.stars || 0), 0);
  grid.innerHTML = `
    <div class="stat-card glass"><div class="value glow-cyan">${state.level}</div><div class="label">${lang === 'es' ? 'Nivel' : 'Level'}</div></div>
    <div class="stat-card glass"><div class="value glow-gold">${state.xp}</div><div class="label">XP</div></div>
    <div class="stat-card glass"><div class="value glow-green">${accuracy}%</div><div class="label">${lang === 'es' ? 'Precisión' : 'Accuracy'}</div></div>
    <div class="stat-card glass"><div class="value glow-pink">🔥 ${state.bestStreak}</div><div class="label">${lang === 'es' ? 'Mejor Racha' : 'Best Streak'}</div></div>
    <div class="stat-card glass"><div class="value" style="color:var(--neon-gold)">⭐ ${totalStars}/9</div><div class="label">${lang === 'es' ? 'Estrellas' : 'Stars'}</div></div>
    <div class="stat-card glass"><div class="value" style="color:var(--neon-purple)">${state.gamesPlayed}</div><div class="label">${lang === 'es' ? 'Partidas' : 'Games Played'}</div></div>
  `;
  if (state.achievements.length > 0) {
    grid.innerHTML += `<div class="stat-card glass" style="grid-column:1/-1"><div class="label" style="margin-bottom:8px">${lang === 'es' ? 'Logros' : 'Achievements'}</div><div class="achievements-earned">${state.achievements.map(a => `<span class="achievement-badge">${{perfect:'🏆 Perfect',streak5:'🔥 5-Streak',flawless:'💎 Flawless',dedicated:'🎯 Dedicated',star3:'⭐ 3-Star',allstars:'🌟 Legend'}[a] || a}</span>`).join('')}</div></div>`;
  }
}

document.getElementById('muteBtn').addEventListener('click', () => { AudioEngine.init(); AudioEngine.toggle(); });
document.getElementById('langToggle').addEventListener('click', () => { toggleLang(); });
document.getElementById('contrastBtn').addEventListener('click', () => { document.body.classList.toggle('high-contrast'); });
document.getElementById('homeBtn').addEventListener('click', () => showScreen('title-screen'));

// Keyboard navigation: 1-4 for options, Enter to submit
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('game-screen').classList.contains('active')) return;
  if (['1','2','3','4'].includes(e.key)) {
    const idx = parseInt(e.key) - 1;
    const btn = document.querySelector(`.option-btn[data-idx="${idx}"]`);
    if (btn && !game.answered) selectOption(idx);
  }
  if (e.key === 'Enter' && !game.answered) submitAnswer();
  if (e.key === 'Enter' && game.answered) nextQuestion();
  if (e.key === 'h' || e.key === 'H') { if (!game.answered) showHint(); }
});

gsap.from('#title-screen .title', { y: -40, opacity: 0, duration: 0.8, ease: 'power3.out' });
gsap.from('#title-screen .subtitle', { y: 20, opacity: 0, duration: 0.6, delay: 0.3 });
gsap.from('#title-screen .standard', { y: 20, opacity: 0, duration: 0.6, delay: 0.45 });
gsap.from('.title-buttons', { y: 30, opacity: 0, duration: 0.6, delay: 0.6 });
