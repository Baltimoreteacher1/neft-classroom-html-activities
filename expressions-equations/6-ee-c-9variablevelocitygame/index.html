<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variable Velocity - Racing Game | 6.EE.C.9</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #game-container {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script>
      // ============================================================
      // VARIABLE VELOCITY — Racing Game (6.EE.C.9)
      // Answer correctly to boost speed, wrong answers slow you down.
      // Race through 3 laps with 15+ math questions woven in.
      // ============================================================

      const QUESTIONS = [
        {
          stem: "A robot charges $8/hour. Which variable is INDEPENDENT?",
          choices: [
            "Hours worked",
            "Total earnings",
            "Number of robots",
            "Hourly rate",
          ],
          correct: 0,
          hint: "Independent = what you choose first.",
          explain: "You choose hours; earnings depend on it.",
        },
        {
          stem: "A drone flies 15 km/min. Which variable is DEPENDENT?",
          choices: [
            "Total distance",
            "Minutes flown",
            "Speed",
            "Number of drones",
          ],
          correct: 0,
          hint: "Dependent = changes because of the other.",
          explain: "Distance depends on minutes flown.",
        },
        {
          stem: "Server downloads 25 MB/sec. t=seconds, d=MB. Equation?",
          choices: ["d = 25t", "t = 25d", "d = t + 25", "d = 25 / t"],
          correct: 0,
          hint: "Dependent = rate x independent.",
          explain: "d = 25 x t, so d = 25t.",
        },
        {
          stem: "Table: Hours(h) 1,2,3,5 | Cost(c) $12,$24,$36,$60. Equation?",
          choices: ["c = 12h", "c = h + 12", "h = 12c", "c = 12/h"],
          correct: 0,
          hint: "Look at how cost changes per hour.",
          explain: "c = 12 x h = 12h.",
        },
        {
          stem: "Energy output (e) depends on fuel (f). Independent variable?",
          choices: ["Fuel used (f)", "Energy output (e)", "Both", "Neither"],
          correct: 0,
          hint: "The cause is independent.",
          explain: "f causes e, so f is independent.",
        },
        {
          stem: "3D printer: 5g filament/layer. L=layers, g=grams. Dependent?",
          choices: ["g (grams)", "L (layers)", "5 (rate)", "Both"],
          correct: 0,
          hint: "Which RESULTS from the other?",
          explain: "Grams used results from layers chosen.",
        },
        {
          stem: "Rover: 3 m/s, starts 10m from sensor. d = distance. Equation?",
          choices: ["d = 3t + 10", "d = 3t", "d = 10t + 3", "d = 3t - 10"],
          correct: 0,
          hint: "Starting amount + rate x time.",
          explain: "Starts at 10, adds 3 per second.",
        },
        {
          stem: "Table: Time(t) 0,1,2,4 | Temp 68,71,74,80. Equation?",
          choices: ["T = 3t + 68", "T = 3t", "T = 68t + 3", "T = 3t - 68"],
          correct: 0,
          hint: "Rate of change + starting value.",
          explain: "Rate=3, start=68, so T = 3t + 68.",
        },
        {
          stem: "Graph: packets vs time. Through (0,0) and (4,20). Equation?",
          choices: ["y = 5x", "y = x + 5", "y = 4x", "x = 5y"],
          correct: 0,
          hint: "Rate = rise / run = 20/4.",
          explain: "20/4 = 5, so y = 5x.",
        },
        {
          stem: "Recycler: 6 cans/sec, 18 already loaded. c = total. Equation?",
          choices: ["c = 6t + 18", "c = 6t", "c = 18t + 6", "c = 6t x 18"],
          correct: 0,
          hint: "Rate x time + starting amount.",
          explain: "6 per second plus 18 already there.",
        },
        {
          stem: "Solar panels(p) 2,4,6,10 | Savings(s) $30,$60,$90,$150. Rate?",
          choices: [
            "$15/panel; p independent",
            "$15/panel; s independent",
            "$30/panel",
            "$2/dollar",
          ],
          correct: 0,
          hint: "Rate = change in s / change in p.",
          explain: "30/2 = 15 per panel, p is chosen first.",
        },
        {
          stem: "Graph: y-intercept at 4, rises 2 per 1 unit right. Equation?",
          choices: ["y = 2x + 4", "y = 4x + 2", "y = 2x", "y = 2x - 4"],
          correct: 0,
          hint: "Slope = 2, y-intercept = 4.",
          explain: "y = 2x + 4.",
        },
        {
          stem: "Charging station: $5 fee + $0.20/min. 45 minutes cost?",
          choices: ["$14.00", "$9.00", "$225.20", "$9.00"],
          correct: 0,
          hint: "Fee + rate x minutes.",
          explain: "0.20 x 45 + 5 = 14.",
        },
        {
          stem: "Drone A: d=4t. Drone B: d=2t+6. Same data at t=?",
          choices: ["t = 3", "t = 6", "t = 2", "Never"],
          correct: 0,
          hint: "Set 4t = 2t + 6 and solve.",
          explain: "2t = 6, t = 3. Both have 12 at t=3.",
        },
        {
          stem: "Table: h 0,1,2,3 | GB 0,5,10,15. Proportional?",
          choices: [
            "Yes - constant 5 GB/hr, through (0,0)",
            "No - keeps increasing",
            "Yes - easy numbers",
            "No - only money works",
          ],
          correct: 0,
          hint: "Constant ratio AND through origin.",
          explain: "5/1=5, 10/2=5, starts at (0,0). Proportional.",
        },
        {
          stem: "y=7x vs y=7x+3. Which is TRUE?",
          choices: [
            "Both rate 7, only A through origin",
            "Both proportional",
            "B has greater rate",
            "They are the same",
          ],
          correct: 0,
          hint: "Same slope but different y-intercept.",
          explain: "Both have rate 7, but B starts at 3, not 0.",
        },
        {
          stem: "Turbine A: y=40t+120. Turbine B: y=55t. B overtakes A at t=?",
          choices: ["t = 8", "t = 4", "Never", "t = 3"],
          correct: 0,
          hint: "Set 40t+120 = 55t.",
          explain: "120 = 15t, t = 8.",
        },
        {
          stem: 'p = 9n. Student says "can\'t tell dependent." Correct?',
          choices: [
            "No - context determines roles",
            "Yes - both can be independent",
            "No - left is always dependent",
            "Yes - only in science",
          ],
          correct: 0,
          hint: "Context tells us which we choose first.",
          explain: "If n=hours chosen, p=pay earned. Context decides.",
        },
      ];

      const SFX = {
        ctx: null,
        init() {
          if (!this.ctx)
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        },
        tone(f, d, t = "sine", v = 0.1) {
          if (!this.ctx) return;
          try {
            const o = this.ctx.createOscillator(),
              g = this.ctx.createGain();
            o.connect(g);
            g.connect(this.ctx.destination);
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              this.ctx.currentTime + d,
            );
            o.start();
            o.stop(this.ctx.currentTime + d);
          } catch (e) {}
        },
        boost() {
          this.tone(523, 0.08);
          setTimeout(() => this.tone(784, 0.1), 60);
        },
        slow() {
          this.tone(180, 0.2, "sawtooth", 0.08);
        },
        engine() {
          this.tone(120, 0.05, "square", 0.02);
        },
        finish() {
          this.tone(523, 0.1);
          setTimeout(() => this.tone(659, 0.1), 100);
          setTimeout(() => this.tone(784, 0.15), 200);
        },
      };

      const W = 800,
        H = 600;

      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          const g = this.make.graphics({ add: false });
          // Player car (top-down)
          g.fillStyle(0x00ccff, 1);
          g.fillRoundedRect(4, 0, 24, 40, 4);
          g.fillStyle(0x0088dd, 1);
          g.fillRect(8, 2, 16, 10); // windshield
          g.fillStyle(0x003366, 1);
          g.fillRect(0, 8, 32, 6);
          g.fillRect(0, 30, 32, 6); // wheels
          g.generateTexture("car", 32, 40);
          g.clear();
          // Rival car
          g.fillStyle(0xff4444, 1);
          g.fillRoundedRect(4, 0, 24, 40, 4);
          g.fillStyle(0xcc2222, 1);
          g.fillRect(8, 2, 16, 10);
          g.fillStyle(0x660000, 1);
          g.fillRect(0, 8, 32, 6);
          g.fillRect(0, 30, 32, 6);
          g.generateTexture("rival", 32, 40);
          g.clear();
          // Road stripe
          g.fillStyle(0xffffff, 1);
          g.fillRect(0, 0, 6, 30);
          g.generateTexture("stripe", 6, 30);
          g.clear();
          // Tree
          g.fillStyle(0x228833, 1);
          g.fillCircle(12, 8, 12);
          g.fillStyle(0x664422, 1);
          g.fillRect(10, 16, 4, 12);
          g.generateTexture("tree", 24, 28);
          g.clear();
          // Spark
          g.fillStyle(0xffcc00, 1);
          g.fillCircle(3, 3, 3);
          g.generateTexture("spark", 6, 6);
          g.clear();
          // Boost icon
          g.fillStyle(0x00ff88, 1);
          g.fillTriangle(12, 0, 0, 24, 24, 24);
          g.generateTexture("boostIcon", 24, 24);
          g.clear();
          g.destroy();
          this.scene.start("Title");
        }
      }

      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          SFX.init();
          this.cameras.main.setBackgroundColor(0x0a0a2e);

          // Animated road lines
          for (let i = 0; i < 20; i++) {
            const y = i * 35;
            const s = this.add.rectangle(W / 2, y, 6, 25, 0x444444, 0.4);
            this.tweens.add({
              targets: s,
              y: H + 30,
              duration: 2000,
              repeat: -1,
              delay: i * 100,
            });
          }

          this.add
            .text(W / 2, 100, "VARIABLE VELOCITY", {
              fontSize: "48px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ccff",
              stroke: "#002244",
              strokeThickness: 4,
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 155, "Dependent & Independent Variables Racing", {
              fontSize: "15px",
              fontFamily: "Arial",
              color: "#88aacc",
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 180, "CCSS 6.EE.C.9", {
              fontSize: "12px",
              fontFamily: "Arial",
              color: "#6688aa",
            })
            .setOrigin(0.5);

          // Car preview
          const car = this.add.image(W / 2, 280, "car").setScale(3);
          this.tweens.add({
            targets: car,
            y: 270,
            duration: 800,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });

          // Mode select
          this.add
            .text(W / 2, 360, "Choose Mode:", {
              fontSize: "16px",
              fontFamily: "Arial",
              color: "#aaa",
            })
            .setOrigin(0.5);

          const modes = [
            { name: "Sprint", desc: "5 questions, fast race", qs: 5 },
            { name: "Marathon", desc: "All 18 questions", qs: 18 },
            {
              name: "Time Trial",
              desc: "10 questions, beat the clock",
              qs: 10,
            },
          ];
          this.selectedMode = 1;
          const cards = [];
          modes.forEach((m, i) => {
            const x = W / 2 - 160 + i * 160;
            const c = this.add
              .rectangle(x, 420, 140, 70, 0x112244, 0.8)
              .setStrokeStyle(2, 0x336699, 0.5)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(x, 408, m.name, {
                fontSize: "15px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.add
              .text(x, 430, m.desc, {
                fontSize: "10px",
                fontFamily: "Arial",
                color: "#888",
                wordWrap: { width: 120 },
                align: "center",
              })
              .setOrigin(0.5);
            c.on("pointerdown", () => {
              this.selectedMode = i;
              cards.forEach((cc, j) =>
                cc.setStrokeStyle(
                  j === i ? 3 : 2,
                  j === i ? 0x00ccff : 0x336699,
                  j === i ? 1 : 0.5,
                ),
              );
            });
            cards.push(c);
          });
          cards[1].setStrokeStyle(3, 0x00ccff, 1);

          const btn = this.add
            .text(W / 2, 510, "[ START RACE ]", {
              fontSize: "22px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ffcc",
              padding: { x: 20, y: 10 },
              backgroundColor: "rgba(0,255,200,0.1)",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });
          btn.on("pointerover", () =>
            btn.setStyle({ backgroundColor: "rgba(0,255,200,0.25)" }),
          );
          btn.on("pointerout", () =>
            btn.setStyle({ backgroundColor: "rgba(0,255,200,0.1)" }),
          );
          btn.on("pointerdown", () => {
            SFX.init();
            this.scene.start("Race", {
              numQs: modes[this.selectedMode].qs,
              modeName: modes[this.selectedMode].name,
            });
          });

          // Info
          [
            "Arrow/WASD to steer",
            "Correct = BOOST",
            "Wrong = SLOW DOWN",
            "Beat the rival!",
          ].forEach((t, i) => {
            this.add
              .text(W / 2 - 180 + i * 120, 570, t, {
                fontSize: "10px",
                fontFamily: "Arial",
                color: "#556677",
                padding: { x: 4, y: 2 },
                backgroundColor: "rgba(255,255,255,0.03)",
              })
              .setOrigin(0.5);
          });
        }
      }

      class RaceScene extends Phaser.Scene {
        constructor() {
          super("Race");
        }
        init(data) {
          this.numQs = data.numQs || 10;
          this.modeName = data.modeName || "Race";
          this.score = 0;
          this.speed = 3; // base scroll speed
          this.maxSpeed = 8;
          this.playerLane = 1; // 0=left, 1=center, 2=right
          this.distance = 0;
          this.totalDistance = this.numQs * 500;
          this.qIndex = 0;
          this.nextQAt = 400;
          this.streak = 0;
          this.bestStreak = 0;
          this.correct = 0;
          this.total = 0;
          this.lives = 3;
          this.combo = 1;
          this.questionActive = false;
          this.shuffledQs = Phaser.Utils.Array.Shuffle([...QUESTIONS]).slice(
            0,
            this.numQs,
          );
          this.rivalDist = 0;
          this.rivalSpeed = 3.5;
          this.boostTimer = 0;
        }
        create() {
          this.cameras.main.setBackgroundColor(0x1a3a1a);

          // Road
          this.roadBg = this.add.rectangle(W / 2, H / 2, 360, H, 0x333333, 1);
          this.add.rectangle(W / 2 - 180, H / 2, 4, H, 0xffffff, 0.3); // left edge
          this.add.rectangle(W / 2 + 180, H / 2, 4, H, 0xffffff, 0.3); // right edge

          // Stripes (center dashes)
          this.stripes = [];
          for (let i = 0; i < 15; i++) {
            const s = this.add.image(W / 2, i * 50, "stripe").setAlpha(0.4);
            this.stripes.push(s);
          }

          // Trees (scenery)
          this.trees = [];
          for (let i = 0; i < 12; i++) {
            const side = i % 2 === 0 ? W / 2 - 230 : W / 2 + 230;
            const t = this.add
              .image(side + Phaser.Math.Between(-20, 20), i * 60, "tree")
              .setScale(1.5)
              .setAlpha(0.6);
            this.trees.push(t);
          }

          // Lane positions
          this.laneX = [W / 2 - 100, W / 2, W / 2 + 100];

          // Player car
          this.car = this.add.image(this.laneX[1], H - 80, "car").setScale(1.8);

          // Rival car
          this.rival = this.add
            .image(this.laneX[2], H - 200, "rival")
            .setScale(1.6)
            .setAlpha(0.7);
          this.rivalY = H - 200;

          // Boost particles
          this.boostEmitter = this.add.particles(0, 0, "spark", {
            speed: { min: 50, max: 150 },
            angle: { min: 80, max: 100 },
            lifespan: 400,
            scale: { start: 0.8, end: 0 },
            alpha: { start: 1, end: 0 },
            blendMode: "ADD",
            emitting: false,
          });

          // HUD
          this.add.rectangle(W / 2, 20, W, 40, 0x000000, 0.7).setDepth(100);
          this.scoreText = this.add
            .text(10, 8, "SCORE: 0", {
              fontSize: "14px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
            })
            .setDepth(101);
          this.speedText = this.add
            .text(W / 2, 8, "", {
              fontSize: "13px",
              fontFamily: "monospace",
              color: "#00ff88",
            })
            .setOrigin(0.5, 0)
            .setDepth(101);
          this.livesText = this.add
            .text(W - 10, 8, "", {
              fontSize: "16px",
              fontFamily: "monospace",
              color: "#ff4444",
            })
            .setOrigin(1, 0)
            .setDepth(101);
          this.updateLives();
          this.progressBar = this.add
            .rectangle(W / 2, 35, W - 40, 6, 0x333333, 0.8)
            .setDepth(101);
          this.progressFill = this.add
            .rectangle(20, 35, 0, 6, 0x00ccff, 1)
            .setOrigin(0, 0.5)
            .setDepth(102);
          this.streakText = this.add
            .text(W / 2, 22, "", {
              fontSize: "10px",
              fontFamily: "monospace",
              color: "#ff8800",
            })
            .setOrigin(0.5, 0)
            .setDepth(101);

          // Question panel
          this.qContainer = this.add
            .container(W / 2, H / 2)
            .setDepth(200)
            .setVisible(false);
          this.qBg = this.add
            .rectangle(0, 0, 660, 300, 0x0a1a2e, 0.95)
            .setStrokeStyle(2, 0x00ccff, 0.6);
          this.qStem = this.add
            .text(0, -120, "", {
              fontSize: "15px",
              fontFamily: "Arial",
              fontStyle: "bold",
              color: "#fff",
              wordWrap: { width: 600 },
              align: "center",
            })
            .setOrigin(0.5);
          this.qHint = this.add
            .text(0, -85, "", {
              fontSize: "12px",
              fontFamily: "Arial",
              color: "#ffcc00",
              wordWrap: { width: 580 },
              align: "center",
            })
            .setOrigin(0.5);
          this.qContainer.add([this.qBg, this.qStem, this.qHint]);

          this.qBtns = [];
          this.qTxts = [];
          for (let i = 0; i < 4; i++) {
            const y = -40 + i * 45;
            const bg = this.add
              .rectangle(0, y, 540, 38, 0x112244, 0.8)
              .setStrokeStyle(1, 0x336699, 0.6)
              .setInteractive({ useHandCursor: true });
            const txt = this.add
              .text(0, y, "", {
                fontSize: "14px",
                fontFamily: "Arial",
                color: "#ccddff",
                wordWrap: { width: 500 },
                align: "center",
              })
              .setOrigin(0.5);
            const idx = i;
            bg.on("pointerdown", () => this.answerQ(idx));
            bg.on("pointerover", () => {
              if (this.questionActive) bg.setStrokeStyle(2, 0x00ccff, 1);
            });
            bg.on("pointerout", () => {
              if (this.questionActive) bg.setStrokeStyle(1, 0x336699, 0.6);
            });
            this.qContainer.add([bg, txt]);
            this.qBtns.push(bg);
            this.qTxts.push(txt);
          }
          this.qExplain = this.add
            .text(0, 140, "", {
              fontSize: "12px",
              fontFamily: "Arial",
              color: "#88ff88",
              wordWrap: { width: 580 },
              align: "center",
            })
            .setOrigin(0.5)
            .setVisible(false);
          this.qContainer.add(this.qExplain);

          // Input
          this.cursors = this.input.keyboard.createCursorKeys();
          this.wasd = this.input.keyboard.addKeys("W,A,S,D");
          this.input.keyboard.on("keydown-ONE", () => this.answerQ(0));
          this.input.keyboard.on("keydown-TWO", () => this.answerQ(1));
          this.input.keyboard.on("keydown-THREE", () => this.answerQ(2));
          this.input.keyboard.on("keydown-FOUR", () => this.answerQ(3));

          // Touch swipe
          this.input.on("pointerdown", (p) => {
            this.touchStart = { x: p.x, y: p.y };
          });
          this.input.on("pointerup", (p) => {
            if (this.touchStart && !this.questionActive) {
              const dx = p.x - this.touchStart.x;
              if (Math.abs(dx) > 30) {
                if (dx < 0 && this.playerLane > 0) this.playerLane--;
                else if (dx > 0 && this.playerLane < 2) this.playerLane++;
              }
            }
          });

          // Countdown
          this.showCountdown();
        }

        showCountdown() {
          const nums = ["3", "2", "1", "GO!"];
          let i = 0;
          const show = () => {
            if (i >= nums.length) {
              this.racing = true;
              return;
            }
            const t = this.add
              .text(W / 2, H / 2 - 50, nums[i], {
                fontSize: "72px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: i < 3 ? "#ffcc00" : "#00ff88",
              })
              .setOrigin(0.5)
              .setDepth(300);
            SFX.tone(i < 3 ? 440 : 880, 0.15);
            this.tweens.add({
              targets: t,
              scale: { from: 1.5, to: 0.5 },
              alpha: 0,
              duration: 700,
              onComplete: () => {
                t.destroy();
                i++;
                show();
              },
            });
          };
          show();
        }

        updateLives() {
          let h = "";
          for (let i = 0; i < 3; i++) h += i < this.lives ? "♥" : "♡";
          this.livesText.setText(h);
        }

        showQuestion() {
          if (this.qIndex >= this.shuffledQs.length) return;
          const q = this.shuffledQs[this.qIndex];
          this.currentQ = q;
          this.questionActive = true;
          this.qContainer.setVisible(true);
          this.qStem.setText(q.stem);
          this.qHint.setText("").setVisible(false);
          this.qExplain.setVisible(false);
          this.hintShown = false;

          q.choices.forEach((c, i) => {
            this.qTxts[i]
              .setText(String.fromCharCode(65 + i) + ". " + c)
              .setStyle({ color: "#ccddff" });
            this.qBtns[i]
              .setFillStyle(0x112244, 0.8)
              .setStrokeStyle(1, 0x336699, 0.6)
              .setInteractive();
          });
        }

        answerQ(idx) {
          if (!this.questionActive) return;
          this.questionActive = false;
          this.total++;
          const q = this.currentQ;
          const right = idx === q.correct;

          this.qBtns.forEach((b, i) => {
            b.disableInteractive();
            if (i === q.correct) {
              b.setFillStyle(0x004400, 0.9).setStrokeStyle(2, 0x00ff88, 1);
              this.qTxts[i].setStyle({ color: "#00ff88" });
            } else if (i === idx && !right) {
              b.setFillStyle(0x440000, 0.9).setStrokeStyle(2, 0xff4444, 1);
              this.qTxts[i].setStyle({ color: "#ff4444" });
            }
          });

          if (right) {
            this.correct++;
            this.streak++;
            if (this.streak > this.bestStreak) this.bestStreak = this.streak;
            this.combo = Math.min(4, 1 + Math.floor(this.streak / 3));
            const pts = 100 * this.combo;
            this.score += pts;
            this.speed = Math.min(this.maxSpeed, this.speed + 1.5);
            this.boostTimer = 120;
            SFX.boost();
            this.cameras.main.flash(150, 0, 80, 0);
            const pop = this.add
              .text(W / 2, H / 2 - 170, "BOOST! +" + pts, {
                fontSize: "24px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: "#00ff88",
              })
              .setOrigin(0.5)
              .setDepth(300);
            this.tweens.add({
              targets: pop,
              y: pop.y - 40,
              alpha: 0,
              duration: 1000,
              onComplete: () => pop.destroy(),
            });
          } else {
            this.streak = 0;
            this.combo = 1;
            this.speed = Math.max(1.5, this.speed - 1.5);
            this.lives--;
            this.updateLives();
            SFX.slow();
            this.cameras.main.shake(300, 0.01);
            const pop = this.add
              .text(W / 2, H / 2 - 170, "SLOW DOWN!", {
                fontSize: "24px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: "#ff4444",
              })
              .setOrigin(0.5)
              .setDepth(300);
            this.tweens.add({
              targets: pop,
              y: pop.y - 40,
              alpha: 0,
              duration: 1000,
              onComplete: () => pop.destroy(),
            });
          }

          this.qExplain.setText(q.explain).setVisible(true);
          this.scoreText.setText("SCORE: " + this.score);
          this.streakText.setText(
            this.streak >= 2 ? "STREAK x" + this.streak : "",
          );

          if (this.lives <= 0) {
            this.time.delayedCall(1500, () =>
              this.scene.start("Results", {
                score: this.score,
                correct: this.correct,
                total: this.total,
                bestStreak: this.bestStreak,
                won: false,
                modeName: this.modeName,
              }),
            );
            return;
          }

          this.time.delayedCall(1800, () => {
            this.qContainer.setVisible(false);
            this.qIndex++;
            this.nextQAt = this.distance + 400;
          });
        }

        update() {
          if (!this.racing) return;

          // Scroll road
          this.stripes.forEach((s) => {
            s.y += this.speed * 3;
            if (s.y > H + 30) s.y = -30;
          });
          this.trees.forEach((t) => {
            t.y += this.speed * 2;
            if (t.y > H + 30) t.y = -30;
          });

          // Distance
          this.distance += this.speed;
          this.rivalDist += this.rivalSpeed;

          // Progress bar
          const pct = Math.min(this.distance / this.totalDistance, 1);
          this.progressFill.width = (W - 40) * pct;

          // Speed display
          const mph = Math.round(this.speed * 30);
          this.speedText.setText(mph + " MPH");

          // Boost effect
          if (this.boostTimer > 0) {
            this.boostTimer--;
            this.boostEmitter.emitParticleAt(this.car.x, this.car.y + 25, 1);
            if (this.boostTimer === 0)
              this.speed = Math.max(3, this.speed - 0.5);
          }

          // Lane movement (keyboard)
          if (!this.questionActive) {
            if (
              Phaser.Input.Keyboard.JustDown(this.cursors.left) ||
              Phaser.Input.Keyboard.JustDown(this.wasd.A)
            ) {
              if (this.playerLane > 0) this.playerLane--;
            }
            if (
              Phaser.Input.Keyboard.JustDown(this.cursors.right) ||
              Phaser.Input.Keyboard.JustDown(this.wasd.D)
            ) {
              if (this.playerLane < 2) this.playerLane++;
            }
          }

          // Smooth car position
          const targetX = this.laneX[this.playerLane];
          this.car.x += (targetX - this.car.x) * 0.15;

          // Rival movement
          const rivalTarget =
            this.laneX[Math.floor(Math.sin(this.time.now / 3000) * 1.5 + 1)];
          this.rival.x += (rivalTarget - this.rival.x) * 0.05;
          const rDiff = this.distance - this.rivalDist;
          const targetRivalY = H - 200 + rDiff * 0.3;
          this.rivalY +=
            (Phaser.Math.Clamp(targetRivalY, 50, H + 100) - this.rivalY) * 0.02;
          this.rival.y = this.rivalY;

          // Trigger questions
          if (
            !this.questionActive &&
            this.distance >= this.nextQAt &&
            this.qIndex < this.shuffledQs.length
          ) {
            this.showQuestion();
          }

          // Check finish
          if (this.distance >= this.totalDistance && !this.questionActive) {
            this.racing = false;
            const won = this.distance >= this.rivalDist;
            this.time.delayedCall(1000, () => {
              SFX.finish();
              this.scene.start("Results", {
                score: this.score,
                correct: this.correct,
                total: this.total,
                bestStreak: this.bestStreak,
                won: won,
                modeName: this.modeName,
              });
            });
          }
        }
      }

      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }
        init(data) {
          this.finalScore = data.score || 0;
          this.correct = data.correct || 0;
          this.total = data.total || 0;
          this.bestStreak = data.bestStreak || 0;
          this.won = data.won !== undefined ? data.won : true;
          this.modeName = data.modeName || "Race";
        }
        create() {
          this.cameras.main.setBackgroundColor(0x0a0a2e);
          for (let i = 0; i < 60; i++)
            this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.FloatBetween(0.5, 1.5),
              0xffffff,
              Phaser.Math.FloatBetween(0.15, 0.5),
            );

          const pct =
            this.total > 0 ? Math.round((this.correct / this.total) * 100) : 0;
          const title = this.won ? "YOU WON THE RACE!" : "RACE OVER";
          const titleColor = this.won ? "#ffcc00" : "#ff6644";

          this.add
            .text(W / 2, 60, title, {
              fontSize: "40px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: titleColor,
              stroke: "#333",
              strokeThickness: 3,
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 110, this.modeName + " Mode", {
              fontSize: "16px",
              fontFamily: "Arial",
              color: "#888",
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 170, String(this.finalScore), {
              fontSize: "60px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 210, "POINTS", {
              fontSize: "13px",
              fontFamily: "monospace",
              color: "#888",
            })
            .setOrigin(0.5);

          let grade, gc;
          if (pct >= 90) {
            grade = "S RANK";
            gc = "#ffcc00";
          } else if (pct >= 80) {
            grade = "A RANK";
            gc = "#00ff88";
          } else if (pct >= 70) {
            grade = "B RANK";
            gc = "#00ccff";
          } else if (pct >= 60) {
            grade = "C RANK";
            gc = "#ff8800";
          } else {
            grade = "KEEP GOING";
            gc = "#ff4444";
          }
          this.add
            .text(W / 2, 250, grade, {
              fontSize: "22px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: gc,
            })
            .setOrigin(0.5);

          [
            { l: "Correct", v: this.correct + "/" + this.total },
            { l: "Accuracy", v: pct + "%" },
            { l: "Best Streak", v: String(this.bestStreak) },
          ].forEach((s, i) => {
            const x = W / 2 - 120 + i * 120;
            this.add
              .rectangle(x, 330, 100, 65, 0x112233, 0.8)
              .setStrokeStyle(1, 0x336699, 0.5);
            this.add
              .text(x, 318, s.v, {
                fontSize: "22px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: "#00ccff",
              })
              .setOrigin(0.5);
            this.add
              .text(x, 345, s.l, {
                fontSize: "11px",
                fontFamily: "Arial",
                color: "#888",
              })
              .setOrigin(0.5);
          });

          const btn = this.add
            .text(W / 2, 430, "[ RACE AGAIN ]", {
              fontSize: "22px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ffcc",
              padding: { x: 20, y: 10 },
              backgroundColor: "rgba(0,255,200,0.1)",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });
          btn.on("pointerover", () =>
            btn.setStyle({ backgroundColor: "rgba(0,255,200,0.25)" }),
          );
          btn.on("pointerout", () =>
            btn.setStyle({ backgroundColor: "rgba(0,255,200,0.1)" }),
          );
          btn.on("pointerdown", () => this.scene.start("Title"));

          this.add
            .text(W / 2, 520, "6.EE.C.9 -- Dependent & Independent Variables", {
              fontSize: "12px",
              fontFamily: "Arial",
              color: "#556677",
            })
            .setOrigin(0.5);
        }
      }

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: "game-container",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        physics: {
          default: "arcade",
          arcade: { gravity: { y: 0 }, debug: false },
        },
        scene: [BootScene, TitleScene, RaceScene, ResultsScene],
        backgroundColor: "#0a0a2e",
      };
      new Phaser.Game(config);
    </script>
  </body>
</html>
