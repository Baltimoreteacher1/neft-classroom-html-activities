      const SFX = {
        ctx: null,
        init() {
          if (!this.ctx)
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        },
        tone(f, d, t = "sine", v = 0.1) {
          if (!this.ctx) return;
          try {
            const o = this.ctx.createOscillator(),
              g = this.ctx.createGain();
            o.connect(g);
            g.connect(this.ctx.destination);
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              this.ctx.currentTime + d,
            );
            o.start();
            o.stop(this.ctx.currentTime + d);
          } catch (e) {}
        },
        correct() {
          this.tone(660, 0.1);
          setTimeout(() => this.tone(880, 0.12), 80);
        },
        wrong() {
          this.tone(180, 0.25, "sawtooth", 0.08);
        },
        unlock() {
          this.tone(523, 0.1);
          setTimeout(() => this.tone(659, 0.1), 100);
          setTimeout(() => this.tone(784, 0.15), 200);
        },
        step() {
          this.tone(300, 0.03, "square", 0.03);
        },
        scan() {
          this.tone(1200, 0.05, "sine", 0.04);
        },
      };

      const W = 800,
        H = 600;
      const TILE = 40;
      const MW = 20,
        MH = 15; // map tiles

      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          const g = this.make.graphics({ add: false });
          // Rover
          g.fillStyle(0xff7744, 1);
          g.fillRoundedRect(2, 2, 28, 28, 4);
          g.fillStyle(0xffaa66, 1);
          g.fillRect(8, 6, 16, 8);
          g.fillStyle(0x884422, 1);
          g.fillRect(0, 6, 32, 4);
          g.fillRect(0, 22, 32, 4);
          g.generateTexture("rover", 32, 32);
          g.clear();
          // Mars ground tile
          g.fillStyle(0x8b4513, 1);
          g.fillRect(0, 0, TILE, TILE);
          g.fillStyle(0x7a3b10, 0.3);
          g.fillCircle(12, 15, 5);
          g.fillCircle(28, 8, 3);
          g.fillCircle(8, 32, 4);
          g.generateTexture("ground", TILE, TILE);
          g.clear();
          // Rock
          g.fillStyle(0x555555, 1);
          g.fillCircle(16, 16, 14);
          g.fillStyle(0x444444, 1);
          g.fillCircle(12, 12, 4);
          g.generateTexture("rock", 32, 32);
          g.clear();
          // Gate
          g.fillStyle(0x00ccff, 0.4);
          g.fillRect(0, 0, TILE, TILE);
          g.lineStyle(3, 0x00ccff, 0.8);
          g.strokeRect(2, 2, TILE - 4, TILE - 4);
          g.generateTexture("gate", TILE, TILE);
          g.clear();
          // Gate locked
          g.fillStyle(0xff4444, 0.3);
          g.fillRect(0, 0, TILE, TILE);
          g.lineStyle(3, 0xff4444, 0.7);
          g.strokeRect(2, 2, TILE - 4, TILE - 4);
          g.generateTexture("gateLocked", TILE, TILE);
          g.clear();
          // Sector beacon
          g.fillStyle(0xffcc00, 1);
          g.fillCircle(12, 12, 12);
          g.fillStyle(0xffffff, 0.5);
          g.fillCircle(12, 12, 6);
          g.generateTexture("beacon", 24, 24);
          g.clear();
          // Oxygen pickup
          g.fillStyle(0x00ff88, 1);
          g.fillCircle(8, 8, 8);
          g.fillStyle(0xffffff, 0.6);
          g.fillRect(6, 4, 4, 8);
          g.fillRect(4, 6, 8, 4);
          g.generateTexture("oxygen", 16, 16);
          g.clear();
          // Spark
          g.fillStyle(0xffcc00, 1);
          g.fillCircle(3, 3, 3);
          g.generateTexture("spark", 6, 6);
          g.clear();
          // Sand tile
          g.fillStyle(0xa0522d, 1);
          g.fillRect(0, 0, TILE, TILE);
          g.fillStyle(0x8b4513, 0.2);
          for (let i = 0; i < 5; i++) {
            g.fillCircle(
              Phaser.Math.Between(5, 35),
              Phaser.Math.Between(5, 35),
              2,
            );
          }
          g.generateTexture("sand", TILE, TILE);
          g.clear();
          g.destroy();
          this.scene.start("Title");
        }
      }

      class ExploreScene extends Phaser.Scene {
        constructor() {
          super("Explore");
        }
        init() {
          this.score = 0;
          this.oxygen = 100;
          this.streak = 0;
          this.bestStreak = 0;
          this.correct = 0;
          this.total = 0;
          this.sectorsCleared = 0;
          this.currentSector = 0;
          this.sectorProgress = [0, 0, 0, 0];
          this.questionActive = false;
          // Generate map
          this.mapData = this.generateMap();
        }

        generateMap() {
          // 20x15 grid. Sectors in quadrants. Gates between them.
          const m = [];
          for (let y = 0; y < MH; y++) {
            m[y] = [];
            for (let x = 0; x < MW; x++) {
              let type = "ground";
              // Borders with rocks
              if (x === 0 || x === MW - 1 || y === 0 || y === MH - 1)
                type = "rock";
              // Sector dividers
              else if (x === 10 && y > 0 && y < MH - 1)
                type = y === 4 || y === 7 || y === 11 ? "gate" : "rock";
              else if (y === 7 && x > 0 && x < MW - 1)
                type = x === 4 || x === 15 ? "gate" : "rock";
              m[y][x] = {
                type,
                sector: this.getSector(x, y),
                gateOpen: false,
                gateId: null,
              };
            }
          }
          // Mark gates with sector IDs
          [
            [10, 4, 0],
            [10, 11, 1],
            [4, 7, 2],
            [15, 7, 3],
            [10, 7, 3],
          ].forEach(([gx, gy, s]) => {
            if (m[gy] && m[gy][gx]) {
              m[gy][gx].gateId = s;
              m[gy][gx].type = "gate";
            }
          });
          return m;
        }

        getSector(x, y) {
          if (x <= 10 && y <= 7) return 0;
          if (x > 10 && y <= 7) return 1;
          if (x <= 10 && y > 7) return 2;
          return 3;
        }

        create() {
          this.cameras.main.setBackgroundColor(0x1a0f0a);

          // Tilemap
          this.groundTiles = this.add.group();
          this.gateTiles = this.add.group();
          this.rockTiles = this.add.group();

          for (let y = 0; y < MH; y++) {
            for (let x = 0; x < MW; x++) {
              const px = x * TILE + TILE / 2,
                py = y * TILE + TILE / 2;
              const cell = this.mapData[y][x];
              if (cell.type === "ground") {
                this.add.image(px, py, "ground");
              } else if (cell.type === "rock") {
                this.add.image(px, py, "ground");
                const r = this.add.image(px, py, "rock").setScale(0.9);
                this.rockTiles.add(r);
              } else if (cell.type === "gate") {
                this.add.image(px, py, "ground");
                const gt = this.add.image(px, py, "gateLocked");
                gt.tileX = x;
                gt.tileY = y;
                gt.gateId = cell.gateId;
                this.gateTiles.add(gt);
                cell.gateSprite = gt;
              }
            }
          }

          // Beacons (collectibles in each sector)
          this.beacons = this.physics.add.group();
          [
            [3, 3],
            [7, 2],
            [5, 5],
            [14, 3],
            [17, 5],
            [13, 2],
            [3, 10],
            [7, 12],
            [5, 9],
            [14, 10],
            [17, 12],
            [15, 9],
          ].forEach(([bx, by]) => {
            const b = this.beacons.create(
              bx * TILE + TILE / 2,
              by * TILE + TILE / 2,
              "beacon",
            );
            b.setScale(0.8);
            b.body.setSize(16, 16);
            this.tweens.add({
              targets: b,
              alpha: { from: 0.6, to: 1 },
              scale: { from: 0.7, to: 0.9 },
              duration: 800,
              yoyo: true,
              repeat: -1,
            });
          });

          // Oxygen pickups
          this.oxygenPickups = this.physics.add.group();
          [
            [2, 5],
            [8, 4],
            [16, 4],
            [12, 10],
            [6, 11],
            [18, 9],
          ].forEach(([ox, oy]) => {
            const o = this.oxygenPickups.create(
              ox * TILE + TILE / 2,
              oy * TILE + TILE / 2,
              "oxygen",
            );
            o.body.setSize(12, 12);
          });

          // Rover
          this.rover = this.physics.add
            .image(2 * TILE + TILE / 2, 2 * TILE + TILE / 2, "rover")
            .setScale(1.2);
          this.rover.setCollideWorldBounds(true);
          this.rover.body.setSize(24, 24);
          this.physics.world.setBounds(0, 0, MW * TILE, MH * TILE);

          // Collisions
          this.physics.add.overlap(
            this.rover,
            this.beacons,
            this.collectBeacon,
            null,
            this,
          );
          this.physics.add.overlap(
            this.rover,
            this.oxygenPickups,
            this.collectOxygen,
            null,
            this,
          );

          // Camera
          this.cameras.main.startFollow(this.rover, true, 0.1, 0.1);
          this.cameras.main.setBounds(0, 0, MW * TILE, MH * TILE);

          // Spark particles
          this.sparkEmitter = this.add.particles(0, 0, "spark", {
            speed: { min: 50, max: 150 },
            angle: { min: 0, max: 360 },
            lifespan: 400,
            scale: { start: 0.8, end: 0 },
            alpha: { start: 1, end: 0 },
            blendMode: "ADD",
            emitting: false,
          });

          // HUD (fixed to camera)
          this.hudBg = this.add
            .rectangle(W / 2, 20, W, 40, 0x000000, 0.7)
            .setScrollFactor(0)
            .setDepth(100);
          this.scoreText = this.add
            .text(10, 6, "SCORE: 0", {
              fontSize: "13px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
            })
            .setScrollFactor(0)
            .setDepth(101);
          this.oxygenText = this.add
            .text(W / 2, 6, "O2: 100%", {
              fontSize: "13px",
              fontFamily: "monospace",
              color: "#00ff88",
            })
            .setOrigin(0.5, 0)
            .setScrollFactor(0)
            .setDepth(101);
          this.sectorText = this.add
            .text(W - 10, 6, "", {
              fontSize: "12px",
              fontFamily: "monospace",
              color: "#70ddff",
            })
            .setOrigin(1, 0)
            .setScrollFactor(0)
            .setDepth(101);
          this.streakText = this.add
            .text(W / 2, 22, "", {
              fontSize: "10px",
              fontFamily: "monospace",
              color: "#ff8800",
            })
            .setOrigin(0.5, 0)
            .setScrollFactor(0)
            .setDepth(101);
          this.oxygenBar = this.add
            .rectangle(W / 2, 35, W - 40, 5, 0x333333, 0.6)
            .setScrollFactor(0)
            .setDepth(101);
          this.oxygenFill = this.add
            .rectangle(20, 35, W - 40, 5, 0x00ff88, 0.8)
            .setOrigin(0, 0.5)
            .setScrollFactor(0)
            .setDepth(102);
          this.updateHUD();

          // Question panel
          this.qContainer = this.add
            .container(W / 2, H / 2)
            .setDepth(200)
            .setScrollFactor(0)
            .setVisible(false);
          const qBg = this.add
            .rectangle(0, 0, 660, 320, 0x0a1a2e, 0.96)
            .setStrokeStyle(2, 0x70ddff, 0.6);
          this.qTitle = this.add
            .text(0, -135, "", {
              fontSize: "13px",
              fontFamily: "monospace",
              color: "#70ddff",
            })
            .setOrigin(0.5);
          this.qText = this.add
            .text(0, -100, "", {
              fontSize: "15px",
              fontFamily: "Arial",
              fontStyle: "bold",
              color: "#fff",
              wordWrap: { width: 600 },
              align: "center",
            })
            .setOrigin(0.5);
          this.qContainer.add([qBg, this.qTitle, this.qText]);

          this.qBtns = [];
          this.qTxts = [];
          for (let i = 0; i < 4; i++) {
            const y = -35 + i * 45;
            const bg = this.add
              .rectangle(0, y, 540, 38, 0x112244, 0.8)
              .setStrokeStyle(1, 0x336699, 0.6)
              .setInteractive({ useHandCursor: true });
            const txt = this.add
              .text(0, y, "", {
                fontSize: "14px",
                fontFamily: "Arial",
                color: "#ccddff",
                wordWrap: { width: 500 },
                align: "center",
              })
              .setOrigin(0.5);
            const idx = i;
            bg.on("pointerdown", () => this.answerQ(idx));
            bg.on("pointerover", () => {
              if (this.questionActive) bg.setStrokeStyle(2, 0x00ccff, 1);
            });
            bg.on("pointerout", () => {
              if (this.questionActive) bg.setStrokeStyle(1, 0x336699, 0.6);
            });
            this.qContainer.add([bg, txt]);
            this.qBtns.push(bg);
            this.qTxts.push(txt);
          }
          this.qExplain = this.add
            .text(0, 148, "", {
              fontSize: "12px",
              fontFamily: "Arial",
              color: "#88ff88",
              wordWrap: { width: 580 },
              align: "center",
            })
            .setOrigin(0.5);
          this.qContainer.add(this.qExplain);

          // Input
          this.cursors = this.input.keyboard.createCursorKeys();
          this.wasd = this.input.keyboard.addKeys("W,A,S,D");
          this.input.keyboard.on("keydown-ONE", () => this.answerQ(0));
          this.input.keyboard.on("keydown-TWO", () => this.answerQ(1));
          this.input.keyboard.on("keydown-THREE", () => this.answerQ(2));
          this.input.keyboard.on("keydown-FOUR", () => this.answerQ(3));

          // Oxygen drain timer
          this.time.addEvent({
            delay: 2000,
            callback: () => {
              if (!this.questionActive) {
                this.oxygen = Math.max(0, this.oxygen - 1);
                this.updateHUD();
                if (this.oxygen <= 0) this.gameOver();
              }
            },
            loop: true,
          });

          // Touch joystick area
          this.touchDir = { x: 0, y: 0 };
          this.input.on("pointermove", (p) => {
            if (p.isDown && !this.questionActive) {
              const dx = p.x - W / 2,
                dy = p.y - H / 2;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist > 20) {
                this.touchDir.x = dx / dist;
                this.touchDir.y = dy / dist;
              } else {
                this.touchDir.x = 0;
                this.touchDir.y = 0;
              }
            }
          });
          this.input.on("pointerup", () => {
            this.touchDir.x = 0;
            this.touchDir.y = 0;
          });
        }

        updateHUD() {
          this.scoreText.setText("SCORE: " + this.score);
          this.oxygenText.setText("O2: " + this.oxygen + "%");
          this.oxygenFill.width = (W - 40) * (this.oxygen / 100);
          this.oxygenFill.setFillStyle(
            this.oxygen > 30 ? 0x00ff88 : 0xff4444,
            0.8,
          );
          const sec = SECTORS[this.currentSector];
          this.sectorText.setText(
            sec.name +
              " [" +
              this.sectorProgress[this.currentSector] +
              "/" +
              sec.questions.length +
              "]",
          );
          this.streakText.setText(
            this.streak >= 2 ? "STREAK x" + this.streak : "",
          );
        }

        collectBeacon(rover, beacon) {
          beacon.destroy();
          this.score += 25;
          SFX.scan();
          this.sparkEmitter.emitParticleAt(beacon.x, beacon.y, 10);
          this.updateHUD();
        }

        collectOxygen(rover, pickup) {
          pickup.destroy();
          this.oxygen = Math.min(100, this.oxygen + 20);
          SFX.correct();
          const pop = this.add
            .text(pickup.x, pickup.y - 10, "+20 O2", {
              fontSize: "14px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ff88",
            })
            .setOrigin(0.5)
            .setDepth(150);
          this.tweens.add({
            targets: pop,
            y: pop.y - 30,
            alpha: 0,
            duration: 800,
            onComplete: () => pop.destroy(),
          });
          this.updateHUD();
        }

        checkGateCollision() {
          if (this.questionActive) return;
          const rx = Math.floor(this.rover.x / TILE);
          const ry = Math.floor(this.rover.y / TILE);
          // Check adjacent tiles for gates
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              const tx = rx + dx,
                ty = ry + dy;
              if (tx < 0 || tx >= MW || ty < 0 || ty >= MH) continue;
              const cell = this.mapData[ty][tx];
              if (cell.type === "gate" && !cell.gateOpen) {
                const dist = Phaser.Math.Distance.Between(
                  this.rover.x,
                  this.rover.y,
                  (tx + 0.5) * TILE,
                  (ty + 0.5) * TILE,
                );
                if (dist < TILE * 0.8) {
                  this.triggerGate(cell, tx, ty);
                  return;
                }
              }
            }
          }
        }

        triggerGate(cell, tx, ty) {
          const sectorId =
            cell.gateId !== null ? cell.gateId : this.getSector(tx, ty);
          const sector = SECTORS[sectorId];
          if (!sector) return;
          const qIdx = this.sectorProgress[sectorId];
          if (qIdx >= sector.questions.length) {
            // Already cleared, open gate
            this.openGate(cell);
            return;
          }
          this.currentGate = cell;
          this.currentGateSector = sectorId;
          this.showQuestion(sector, qIdx);
        }

        showQuestion(sector, qIdx) {
          const q = sector.questions[qIdx];
          this.currentQ = q;
          this.questionActive = true;
          this.rover.setVelocity(0);
          this.qContainer.setVisible(true);
          this.qTitle.setText(
            sector.name +
              " -- Mission " +
              (qIdx + 1) +
              "/" +
              sector.questions.length,
          );
          this.qText.setText(q.q);
          this.qExplain.setText("").setVisible(false);

          q.choices.forEach((c, i) => {
            this.qTxts[i]
              .setText(String.fromCharCode(65 + i) + ". " + c)
              .setStyle({ color: "#ccddff" });
            this.qBtns[i]
              .setFillStyle(0x112244, 0.8)
              .setStrokeStyle(1, 0x336699, 0.6)
              .setInteractive();
          });
        }

        answerQ(idx) {
          if (!this.questionActive) return;
          this.questionActive = false;
          this.total++;
          const q = this.currentQ;
          const right = idx === q.correct;

          this.qBtns.forEach((b, i) => {
            b.disableInteractive();
            if (i === q.correct) {
              b.setFillStyle(0x004400, 0.9).setStrokeStyle(2, 0x00ff88, 1);
              this.qTxts[i].setStyle({ color: "#00ff88" });
            } else if (i === idx && !right) {
              b.setFillStyle(0x440000, 0.9).setStrokeStyle(2, 0xff4444, 1);
              this.qTxts[i].setStyle({ color: "#ff4444" });
            }
          });

          this.qExplain.setText(q.explain).setVisible(true);

          if (right) {
            this.correct++;
            this.streak++;
            if (this.streak > this.bestStreak) this.bestStreak = this.streak;
            const pts = 100 * Math.min(4, 1 + Math.floor(this.streak / 3));
            this.score += pts;
            this.sectorProgress[this.currentGateSector]++;
            this.oxygen = Math.min(100, this.oxygen + 10);
            SFX.correct();
            this.cameras.main.flash(150, 0, 80, 0);

            // Open gate
            if (this.currentGate) {
              this.openGate(this.currentGate);
            }

            // Check sector clear
            const sec = SECTORS[this.currentGateSector];
            if (
              this.sectorProgress[this.currentGateSector] >=
              sec.questions.length
            ) {
              this.sectorsCleared++;
              SFX.unlock();
            }
          } else {
            this.streak = 0;
            this.oxygen = Math.max(0, this.oxygen - 15);
            SFX.wrong();
            this.cameras.main.shake(300, 0.01);
          }

          this.updateHUD();

          this.time.delayedCall(1800, () => {
            this.qContainer.setVisible(false);
            // Check win
            if (this.sectorsCleared >= 4) {
              this.time.delayedCall(500, () =>
                this.scene.start("Results", {
                  score: this.score,
                  correct: this.correct,
                  total: this.total,
                  bestStreak: this.bestStreak,
                  sectorsCleared: this.sectorsCleared,
                  oxygen: this.oxygen,
                }),
              );
            }
          });
        }

        openGate(cell) {
          cell.gateOpen = true;
          cell.type = "ground";
          if (cell.gateSprite) {
            cell.gateSprite.setTexture("ground");
            this.sparkEmitter.emitParticleAt(
              cell.gateSprite.x,
              cell.gateSprite.y,
              15,
            );
          }
        }

        gameOver() {
          this.scene.start("Results", {
            score: this.score,
            correct: this.correct,
            total: this.total,
            bestStreak: this.bestStreak,
            sectorsCleared: this.sectorsCleared,
            oxygen: 0,
          });
        }

        update() {
          if (this.questionActive) {
            this.rover.setVelocity(0);
            return;
          }

          const spd = 160;
          let vx = 0,
            vy = 0;

          if (this.cursors.left.isDown || this.wasd.A.isDown) vx = -spd;
          else if (this.cursors.right.isDown || this.wasd.D.isDown) vx = spd;
          if (this.cursors.up.isDown || this.wasd.W.isDown) vy = -spd;
          else if (this.cursors.down.isDown || this.wasd.S.isDown) vy = spd;

          // Touch
          if (this.touchDir.x !== 0 || this.touchDir.y !== 0) {
            vx = this.touchDir.x * spd;
            vy = this.touchDir.y * spd;
          }

          this.rover.setVelocity(vx, vy);

          // Block on rocks
          const rx = Math.floor(this.rover.x / TILE);
          const ry = Math.floor(this.rover.y / TILE);
          if (rx >= 0 && rx < MW && ry >= 0 && ry < MH) {
            const cell = this.mapData[ry][rx];
            if (cell.type === "rock") {
              // Push back
              this.rover.setVelocity(-vx * 0.5, -vy * 0.5);
            }
            // Update current sector
            this.currentSector = this.getSector(rx, ry);
          }

          this.checkGateCollision();

          // Rover tilt
          if (vx !== 0 || vy !== 0) {
            this.rover.angle = Phaser.Math.RadToDeg(Math.atan2(vy, vx)) + 90;
          }
        }
      }

      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }
        init(data) {
          this.finalScore = data.score || 0;
          this.correct = data.correct || 0;
          this.total = data.total || 0;
          this.bestStreak = data.bestStreak || 0;
          this.sectorsCleared = data.sectorsCleared || 0;
          this.oxygen = data.oxygen || 0;
        }
        create() {
          this.cameras.main.setBackgroundColor(0x06111d);
          for (let i = 0; i < 50; i++)
            this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.FloatBetween(0.5, 1.5),
              0xffffff,
              Phaser.Math.FloatBetween(0.1, 0.4),
            );

          const pct =
            this.total > 0 ? Math.round((this.correct / this.total) * 100) : 0;
          const allClear = this.sectorsCleared >= 4;
          const title = allClear
            ? "COLONY ESTABLISHED!"
            : this.oxygen <= 0
              ? "OXYGEN DEPLETED"
              : "EXPLORATION ENDED";
          const tc = allClear
            ? "#ffcc00"
            : this.oxygen <= 0
              ? "#ff4444"
              : "#ff8844";

          this.add
            .text(W / 2, 50, title, {
              fontSize: "36px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: tc,
              stroke: "#333",
              strokeThickness: 3,
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 120, String(this.finalScore), {
              fontSize: "56px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 158, "POINTS", {
              fontSize: "13px",
              fontFamily: "monospace",
              color: "#888",
            })
            .setOrigin(0.5);

          let grade, gc;
          if (pct >= 90) {
            grade = "S RANK";
            gc = "#ffcc00";
          } else if (pct >= 80) {
            grade = "A RANK";
            gc = "#00ff88";
          } else if (pct >= 70) {
            grade = "B RANK";
            gc = "#00ccff";
          } else if (pct >= 60) {
            grade = "C RANK";
            gc = "#ff8800";
          } else {
            grade = "KEEP EXPLORING";
            gc = "#ff4444";
          }
          this.add
            .text(W / 2, 195, grade, {
              fontSize: "20px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: gc,
            })
            .setOrigin(0.5);

          [
            { l: "Correct", v: this.correct + "/" + this.total },
            { l: "Accuracy", v: pct + "%" },
            { l: "Best Streak", v: String(this.bestStreak) },
            { l: "Sectors", v: this.sectorsCleared + "/4" },
          ].forEach((s, i) => {
            const x = W / 2 - 180 + i * 120;
            this.add
              .rectangle(x, 270, 105, 60, 0x112233, 0.8)
              .setStrokeStyle(1, 0x336699, 0.5);
            this.add
              .text(x, 258, s.v, {
                fontSize: "22px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: "#70ddff",
              })
              .setOrigin(0.5);
            this.add
              .text(x, 282, s.l, {
                fontSize: "10px",
                fontFamily: "Arial",
                color: "#888",
              })
              .setOrigin(0.5);
          });

          // Sector status
          SECTORS.forEach((s, i) => {
            const x = W / 2 - 225 + i * 150;
            const cleared =
              this.sectorsCleared > i ||
              this.correct >=
                SECTORS.slice(0, i + 1).reduce(
                  (a, sec) => a + sec.questions.length,
                  0,
                );
            this.add
              .text(x, 340, s.name, {
                fontSize: "11px",
                fontFamily: "monospace",
                color: cleared ? "#00ff88" : "#ff4444",
              })
              .setOrigin(0.5);
            this.add
              .text(x, 356, cleared ? "CLEARED" : "LOCKED", {
                fontSize: "10px",
                fontFamily: "Arial",
                color: "#888",
              })
              .setOrigin(0.5);
          });

          const btn = this.add
            .text(W / 2, 420, "[ EXPLORE AGAIN ]", {
              fontSize: "22px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ff8844",
              padding: { x: 20, y: 10 },
              backgroundColor: "rgba(255,120,60,0.1)",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });
          btn.on("pointerover", () =>
            btn.setStyle({ backgroundColor: "rgba(255,120,60,0.25)" }),
          );
          btn.on("pointerout", () =>
            btn.setStyle({ backgroundColor: "rgba(255,120,60,0.1)" }),
          );
          btn.on("pointerdown", () => this.scene.start("Title"));

          this.add
            .text(
              W / 2,
              500,
              "6.EE.C.9 -- Variables, Tables, Equations, Graphs",
              { fontSize: "12px", fontFamily: "Arial", color: "#665544" },
            )
            .setOrigin(0.5);
        }
      }

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: "game-container",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        physics: {
          default: "arcade",
          arcade: { gravity: { y: 0 }, debug: false },
        },
        scene: [BootScene, TitleScene, ExploreScene, ResultsScene],
        backgroundColor: "#06111d",
      };
      new Phaser.Game(config);
    </script>
  </body>
</html>
