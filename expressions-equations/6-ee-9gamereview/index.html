<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Equation Fortress - Tower Defense | 6.EE.C.9</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>
  // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror
  // (document.write blocks parsing so the mirror is ready before the game script runs).
  if (typeof Phaser === "undefined") {
    document.write('<script src="https://unpkg.com/phaser@3.80.1/dist/phaser.min.js"><\/script>');
  }
  // If both CDNs are unreachable, show a clear message instead of a blank page.
  window.addEventListener("load", function () {
    if (typeof Phaser === "undefined") {
      document.body.innerHTML =
        '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">\u26a0\ufe0f This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
    }
  });
</script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #game-container {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script>
      // ============================================================
      // EQUATION FORTRESS — Tower Defense (6.EE.C.9 Review)
      // Solve equations to power/place towers. Enemies carry wrong answers.
      // Waves of enemies march along a path; towers auto-fire.
      // ============================================================

      const QUESTIONS = [
        {
          q: "x + 3 = 8. Solve for x.",
          choices: ["5", "11", "3", "8"],
          correct: 0,
          explain: "x = 8 - 3 = 5",
        },
        {
          q: "2x = 10. Solve for x.",
          choices: ["5", "20", "2", "10"],
          correct: 0,
          explain: "x = 10/2 = 5",
        },
        {
          q: "x - 4 = 6. Solve for x.",
          choices: ["10", "2", "6", "4"],
          correct: 0,
          explain: "x = 6 + 4 = 10",
        },
        {
          q: "3x = 15. Solve for x.",
          choices: ["5", "45", "3", "12"],
          correct: 0,
          explain: "x = 15/3 = 5",
        },
        {
          q: "x / 4 = 2. Solve for x.",
          choices: ["8", "2", "6", "0.5"],
          correct: 0,
          explain: "x = 2 x 4 = 8",
        },
        {
          q: "5x = 25. Solve for x.",
          choices: ["5", "125", "20", "30"],
          correct: 0,
          explain: "x = 25/5 = 5",
        },
        {
          q: "2x + 3 = 11. Solve for x.",
          choices: ["4", "7", "5.5", "8"],
          correct: 0,
          explain: "2x = 8, x = 4",
        },
        {
          q: "3x - 2 = 10. Solve for x.",
          choices: ["4", "6", "3", "8"],
          correct: 0,
          explain: "3x = 12, x = 4",
        },
        {
          q: "4x + 5 = 21. Solve for x.",
          choices: ["4", "6.5", "16", "5"],
          correct: 0,
          explain: "4x = 16, x = 4",
        },
        {
          q: "5x - 7 = 3. Solve for x.",
          choices: ["2", "10", "5", "1"],
          correct: 0,
          explain: "5x = 10, x = 2",
        },
        {
          q: "2x + 3 = x + 8. Solve for x.",
          choices: ["5", "11", "3", "8"],
          correct: 0,
          explain: "x + 3 = 8, x = 5",
        },
        {
          q: "3x - 2 = x + 6. Solve for x.",
          choices: ["4", "8", "2", "6"],
          correct: 0,
          explain: "2x = 8, x = 4",
        },
        {
          q: "2(x + 1) = 10. Solve for x.",
          choices: ["4", "5", "9", "6"],
          correct: 0,
          explain: "2x + 2 = 10, 2x = 8, x = 4",
        },
        {
          q: "3(x - 2) = 9. Solve for x.",
          choices: ["5", "3", "7", "11"],
          correct: 0,
          explain: "3x - 6 = 9, 3x = 15, x = 5",
        },
        {
          q: "Maria has x books. After buying 5 more she has 23. x = ?",
          choices: ["18", "28", "23", "5"],
          correct: 0,
          explain: "x + 5 = 23, x = 18",
        },
        {
          q: "Table: x 1,2,3 | y 9,18,27. What is y when x = 5?",
          choices: ["45", "36", "54", "27"],
          correct: 0,
          explain: "Rate = 9. y = 9 x 5 = 45",
        },
      ];

      const SFX = {
        ctx: null,
        init() {
          if (!this.ctx)
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        },
        tone(f, d, t = "sine", v = 0.1) {
          if (!this.ctx) return;
          try {
            const o = this.ctx.createOscillator(),
              g = this.ctx.createGain();
            o.connect(g);
            g.connect(this.ctx.destination);
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              this.ctx.currentTime + d,
            );
            o.start();
            o.stop(this.ctx.currentTime + d);
          } catch (e) {}
        },
        shoot() {
          this.tone(600, 0.06, "square", 0.05);
        },
        correct() {
          this.tone(660, 0.1);
          setTimeout(() => this.tone(880, 0.12), 80);
        },
        wrong() {
          this.tone(180, 0.25, "sawtooth", 0.08);
        },
        hit() {
          this.tone(300, 0.08, "sawtooth", 0.06);
        },
        explode() {
          this.tone(80, 0.3, "sawtooth", 0.12);
        },
        wave() {
          this.tone(440, 0.1);
          setTimeout(() => this.tone(550, 0.1), 100);
          setTimeout(() => this.tone(660, 0.15), 200);
        },
        lose() {
          this.tone(200, 0.3, "sawtooth", 0.1);
          setTimeout(() => this.tone(150, 0.4, "sawtooth", 0.1), 200);
        },
      };

      const W = 800,
        H = 600;

      // Path waypoints for enemies
      const PATH = [
        { x: 0, y: 200 },
        { x: 150, y: 200 },
        { x: 150, y: 350 },
        { x: 350, y: 350 },
        { x: 350, y: 150 },
        { x: 550, y: 150 },
        { x: 550, y: 400 },
        { x: 750, y: 400 },
        { x: 800, y: 400 },
      ];

      // Tower placement spots (near the path)
      const TOWER_SPOTS = [
        { x: 100, y: 140 },
        { x: 200, y: 290 },
        { x: 280, y: 400 },
        { x: 400, y: 280 },
        { x: 300, y: 100 },
        { x: 500, y: 90 },
        { x: 480, y: 340 },
        { x: 600, y: 460 },
        { x: 700, y: 340 },
        { x: 650, y: 200 },
      ];

      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          const g = this.make.graphics({ add: false });
          // Tower
          g.fillStyle(0x00ccff, 1);
          g.fillRect(4, 8, 24, 24);
          g.fillStyle(0x0088dd, 1);
          g.fillRect(10, 0, 12, 12);
          g.fillStyle(0x00ffcc, 0.6);
          g.fillCircle(16, 4, 3);
          g.generateTexture("tower", 32, 32);
          g.clear();
          // Tower spot
          g.lineStyle(2, 0x446688, 0.5);
          g.strokeCircle(16, 16, 14);
          g.fillStyle(0x223344, 0.3);
          g.fillCircle(16, 16, 14);
          g.generateTexture("spot", 32, 32);
          g.clear();
          // Enemy
          g.fillStyle(0xff4444, 1);
          g.fillCircle(12, 12, 12);
          g.fillStyle(0xcc0000, 1);
          g.fillCircle(12, 12, 8);
          g.fillStyle(0xff8888, 0.5);
          g.fillCircle(9, 9, 3);
          g.generateTexture("enemy", 24, 24);
          g.clear();
          // Fast enemy
          g.fillStyle(0xff8800, 1);
          g.fillCircle(10, 10, 10);
          g.fillStyle(0xcc6600, 1);
          g.fillCircle(10, 10, 6);
          g.generateTexture("enemyFast", 20, 20);
          g.clear();
          // Tank enemy
          g.fillStyle(0x8844ff, 1);
          g.fillCircle(14, 14, 14);
          g.fillStyle(0x6622cc, 1);
          g.fillCircle(14, 14, 10);
          g.generateTexture("enemyTank", 28, 28);
          g.clear();
          // Bullet
          g.fillStyle(0x00ffcc, 1);
          g.fillCircle(3, 3, 3);
          g.generateTexture("tbullet", 6, 6);
          g.clear();
          // Spark
          g.fillStyle(0xffcc00, 1);
          g.fillCircle(3, 3, 3);
          g.generateTexture("spark", 6, 6);
          g.clear();
          // Base
          g.fillStyle(0x00ff88, 1);
          g.fillRect(0, 0, 40, 40);
          g.fillStyle(0x00cc66, 1);
          g.fillRect(4, 4, 32, 32);
          g.fillStyle(0xffffff, 0.5);
          g.fillRect(12, 12, 16, 16);
          g.generateTexture("base", 40, 40);
          g.clear();
          g.destroy();
          this.scene.start("Title");
        }
      }

      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          SFX.init();
          this.cameras.main.setBackgroundColor(0x0a0e27);

          for (let i = 0; i < 60; i++)
            this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.FloatBetween(0.5, 1.5),
              0xffffff,
              Phaser.Math.FloatBetween(0.1, 0.4),
            );

          this.add
            .text(W / 2, 80, "EQUATION FORTRESS", {
              fontSize: "44px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ff88",
              stroke: "#003322",
              strokeThickness: 4,
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 130, "Tower Defense Math Review", {
              fontSize: "16px",
              fontFamily: "Arial",
              color: "#88ccaa",
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 155, "6.EE.C.9 -- Equations Review", {
              fontSize: "12px",
              fontFamily: "Arial",
              color: "#668877",
            })
            .setOrigin(0.5);

          const tower = this.add.image(W / 2, 240, "tower").setScale(4);
          this.tweens.add({
            targets: tower,
            y: 230,
            duration: 1200,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });

          this.add
            .text(W / 2, 320, "Solve equations to place towers.", {
              fontSize: "14px",
              fontFamily: "Arial",
              color: "#aaa",
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 340, "Towers auto-fire at enemies on the path.", {
              fontSize: "14px",
              fontFamily: "Arial",
              color: "#aaa",
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 360, "Stop enemies from reaching your base!", {
              fontSize: "14px",
              fontFamily: "Arial",
              color: "#aaa",
            })
            .setOrigin(0.5);

          // Difficulty
          this.add
            .text(W / 2, 410, "Select Difficulty:", {
              fontSize: "14px",
              fontFamily: "Arial",
              color: "#888",
            })
            .setOrigin(0.5);
          const diffs = [
            { name: "Easy", waves: 5, hp: 2 },
            { name: "Normal", waves: 8, hp: 3 },
            { name: "Hard", waves: 12, hp: 4 },
          ];
          this.selDiff = 1;
          const cards = [];
          diffs.forEach((d, i) => {
            const x = W / 2 - 140 + i * 140;
            const c = this.add
              .rectangle(x, 450, 120, 50, 0x112244, 0.8)
              .setStrokeStyle(2, 0x336699, 0.5)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(x, 445, d.name, {
                fontSize: "14px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            c.on("pointerdown", () => {
              this.selDiff = i;
              cards.forEach((cc, j) =>
                cc.setStrokeStyle(
                  j === i ? 3 : 2,
                  j === i ? 0x00ff88 : 0x336699,
                  j === i ? 1 : 0.5,
                ),
              );
            });
            cards.push(c);
          });
          cards[1].setStrokeStyle(3, 0x00ff88, 1);

          const btn = this.add
            .text(W / 2, 520, "[ DEFEND THE BASE ]", {
              fontSize: "22px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ffcc",
              padding: { x: 20, y: 10 },
              backgroundColor: "rgba(0,255,200,0.1)",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });
          btn.on("pointerover", () =>
            btn.setStyle({ backgroundColor: "rgba(0,255,200,0.25)" }),
          );
          btn.on("pointerout", () =>
            btn.setStyle({ backgroundColor: "rgba(0,255,200,0.1)" }),
          );
          btn.on("pointerdown", () => {
            SFX.init();
            this.scene.start("Defend", { diff: diffs[this.selDiff] });
          });
        }
      }

      class DefendScene extends Phaser.Scene {
        constructor() {
          super("Defend");
        }
        init(data) {
          this.diff = data.diff || { name: "Normal", waves: 8, hp: 3 };
          this.score = 0;
          this.lives = 20;
          this.wave = 0;
          this.maxWaves = this.diff.waves;
          this.towersPlaced = 0;
          this.enemiesKilled = 0;
          this.correct = 0;
          this.total = 0;
          this.streak = 0;
          this.bestStreak = 0;
          this.questionActive = false;
          this.pendingSpot = null;
          this.shuffledQs = Phaser.Utils.Array.Shuffle([...QUESTIONS]);
          this.qIdx = 0;
          this.waveActive = false;
          this.enemiesInWave = 0;
          this.enemiesSpawned = 0;
          this.towerObjects = [];
        }
        create() {
          this.cameras.main.setBackgroundColor(0x1a2a1a);

          // Draw path
          const pathGfx = this.add.graphics();
          pathGfx.lineStyle(30, 0x4a3a2a, 0.8);
          pathGfx.beginPath();
          pathGfx.moveTo(PATH[0].x, PATH[0].y);
          for (let i = 1; i < PATH.length; i++)
            pathGfx.lineTo(PATH[i].x, PATH[i].y);
          pathGfx.strokePath();
          // Path outline
          pathGfx.lineStyle(2, 0x665544, 0.4);
          pathGfx.beginPath();
          pathGfx.moveTo(PATH[0].x, PATH[0].y);
          for (let i = 1; i < PATH.length; i++)
            pathGfx.lineTo(PATH[i].x, PATH[i].y);
          pathGfx.strokePath();

          // Phaser path for enemy following
          this.enemyPath = new Phaser.Curves.Path(PATH[0].x, PATH[0].y);
          for (let i = 1; i < PATH.length; i++)
            this.enemyPath.lineTo(PATH[i].x, PATH[i].y);

          // Base at end of path
          const lastP = PATH[PATH.length - 1];
          this.add.image(lastP.x - 20, lastP.y, "base").setScale(1.5);
          this.add
            .text(lastP.x - 20, lastP.y + 30, "BASE", {
              fontSize: "10px",
              fontFamily: "monospace",
              color: "#00ff88",
            })
            .setOrigin(0.5);

          // Tower spots
          this.spotSprites = [];
          TOWER_SPOTS.forEach((sp, i) => {
            const s = this.add
              .image(sp.x, sp.y, "spot")
              .setScale(1.3)
              .setInteractive({ useHandCursor: true })
              .setAlpha(0.6);
            s.spotIndex = i;
            s.hasTower = false;
            s.on("pointerdown", () => this.clickSpot(i));
            s.on("pointerover", () => {
              if (!s.hasTower) s.setAlpha(1);
            });
            s.on("pointerout", () => {
              if (!s.hasTower) s.setAlpha(0.6);
            });
            this.spotSprites.push(s);
          });

          // Groups
          this.enemies = this.add.group();
          this.bullets = this.physics.add.group();

          // Spark emitter
          this.sparkEmitter = this.add.particles(0, 0, "spark", {
            speed: { min: 60, max: 180 },
            angle: { min: 0, max: 360 },
            lifespan: 350,
            scale: { start: 0.8, end: 0 },
            alpha: { start: 1, end: 0 },
            blendMode: "ADD",
            emitting: false,
          });

          // HUD
          this.add.rectangle(W / 2, 20, W, 40, 0x000000, 0.7).setDepth(100);
          this.scoreText = this.add
            .text(10, 6, "SCORE: 0", {
              fontSize: "13px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
            })
            .setDepth(101);
          this.livesText = this.add
            .text(W / 2, 6, "BASE HP: 20", {
              fontSize: "13px",
              fontFamily: "monospace",
              color: "#00ff88",
            })
            .setOrigin(0.5, 0)
            .setDepth(101);
          this.waveText = this.add
            .text(W - 10, 6, "WAVE 0/" + this.maxWaves, {
              fontSize: "12px",
              fontFamily: "monospace",
              color: "#00ccff",
            })
            .setOrigin(1, 0)
            .setDepth(101);
          this.towersText = this.add
            .text(W - 10, 22, "TOWERS: 0", {
              fontSize: "10px",
              fontFamily: "monospace",
              color: "#888",
            })
            .setOrigin(1, 0)
            .setDepth(101);
          this.streakText = this.add
            .text(W / 2, 22, "", {
              fontSize: "10px",
              fontFamily: "monospace",
              color: "#ff8800",
            })
            .setOrigin(0.5, 0)
            .setDepth(101);

          // Question panel
          this.qContainer = this.add
            .container(W / 2, H / 2)
            .setDepth(200)
            .setVisible(false);
          const qBg = this.add
            .rectangle(0, 0, 620, 280, 0x0a1a2e, 0.96)
            .setStrokeStyle(2, 0x00ff88, 0.6);
          this.qText = this.add
            .text(0, -110, "", {
              fontSize: "16px",
              fontFamily: "Arial",
              fontStyle: "bold",
              color: "#fff",
              wordWrap: { width: 560 },
              align: "center",
            })
            .setOrigin(0.5);
          this.qContainer.add([qBg, this.qText]);
          this.qBtns = [];
          this.qTxts = [];
          for (let i = 0; i < 4; i++) {
            const y = -45 + i * 42;
            const bg = this.add
              .rectangle(0, y, 500, 36, 0x112244, 0.8)
              .setStrokeStyle(1, 0x336699, 0.6)
              .setInteractive({ useHandCursor: true });
            const txt = this.add
              .text(0, y, "", {
                fontSize: "14px",
                fontFamily: "Arial",
                color: "#ccddff",
              })
              .setOrigin(0.5);
            const idx = i;
            bg.on("pointerdown", () => this.answerQ(idx));
            bg.on("pointerover", () => {
              if (this.questionActive) bg.setStrokeStyle(2, 0x00ccff, 1);
            });
            bg.on("pointerout", () => {
              if (this.questionActive) bg.setStrokeStyle(1, 0x336699, 0.6);
            });
            this.qContainer.add([bg, txt]);
            this.qBtns.push(bg);
            this.qTxts.push(txt);
          }
          this.qExplain = this.add
            .text(0, 125, "", {
              fontSize: "12px",
              fontFamily: "Arial",
              color: "#88ff88",
              wordWrap: { width: 540 },
              align: "center",
            })
            .setOrigin(0.5);
          this.qContainer.add(this.qExplain);

          // Keyboard answers
          this.input.keyboard.on("keydown-ONE", () => this.answerQ(0));
          this.input.keyboard.on("keydown-TWO", () => this.answerQ(1));
          this.input.keyboard.on("keydown-THREE", () => this.answerQ(2));
          this.input.keyboard.on("keydown-FOUR", () => this.answerQ(3));

          // Wave button
          this.waveBtn = this.add
            .text(W / 2, H - 30, "[ SEND NEXT WAVE ]", {
              fontSize: "16px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ffcc",
              padding: { x: 14, y: 6 },
              backgroundColor: "rgba(0,255,200,0.1)",
            })
            .setOrigin(0.5)
            .setDepth(100)
            .setInteractive({ useHandCursor: true });
          this.waveBtn.on("pointerdown", () => this.startWave());

          // Instructions
          this.add
            .text(
              W / 2,
              H - 55,
              "Click empty spots to place towers (solve to build). Then send waves!",
              {
                fontSize: "11px",
                fontFamily: "Arial",
                color: "#668877",
              },
            )
            .setOrigin(0.5)
            .setDepth(99);

          // Tower firing timer
          this.time.addEvent({
            delay: 800,
            callback: () => this.towersFire(),
            loop: true,
          });
        }

        clickSpot(idx) {
          if (this.questionActive) return;
          const sp = this.spotSprites[idx];
          if (sp.hasTower) return;
          this.pendingSpot = idx;
          this.showQuestion();
        }

        showQuestion() {
          if (this.qIdx >= this.shuffledQs.length) this.qIdx = 0;
          const q = this.shuffledQs[this.qIdx];
          this.currentQ = q;
          this.questionActive = true;
          this.qContainer.setVisible(true);
          this.qText.setText(q.q);
          this.qExplain.setText("").setVisible(false);
          q.choices.forEach((c, i) => {
            this.qTxts[i]
              .setText(String.fromCharCode(65 + i) + ". " + c)
              .setStyle({ color: "#ccddff" });
            this.qBtns[i]
              .setFillStyle(0x112244, 0.8)
              .setStrokeStyle(1, 0x336699, 0.6)
              .setInteractive();
          });
        }

        answerQ(idx) {
          if (!this.questionActive) return;
          this.questionActive = false;
          this.total++;
          const q = this.currentQ;
          const right = idx === q.correct;

          this.qBtns.forEach((b, i) => {
            b.disableInteractive();
            if (i === q.correct) {
              b.setFillStyle(0x004400, 0.9).setStrokeStyle(2, 0x00ff88, 1);
              this.qTxts[i].setStyle({ color: "#00ff88" });
            } else if (i === idx && !right) {
              b.setFillStyle(0x440000, 0.9).setStrokeStyle(2, 0xff4444, 1);
              this.qTxts[i].setStyle({ color: "#ff4444" });
            }
          });
          this.qExplain.setText(q.explain).setVisible(true);

          if (right) {
            this.correct++;
            this.streak++;
            if (this.streak > this.bestStreak) this.bestStreak = this.streak;
            this.score += 50 * (1 + Math.floor(this.streak / 3));
            SFX.correct();
            this.cameras.main.flash(100, 0, 60, 0);
            // Place tower
            if (this.pendingSpot !== null) {
              this.placeTower(this.pendingSpot);
            }
          } else {
            this.streak = 0;
            SFX.wrong();
            this.cameras.main.shake(200, 0.008);
          }
          this.pendingSpot = null;
          this.qIdx++;
          this.updateHUD();

          this.time.delayedCall(1500, () => {
            this.qContainer.setVisible(false);
          });
        }

        placeTower(idx) {
          const sp = this.spotSprites[idx];
          sp.hasTower = true;
          sp.setAlpha(0);
          const t = this.add
            .image(TOWER_SPOTS[idx].x, TOWER_SPOTS[idx].y, "tower")
            .setScale(1.3);
          t.range = 120 + this.towersPlaced * 5;
          t.spotX = TOWER_SPOTS[idx].x;
          t.spotY = TOWER_SPOTS[idx].y;
          this.towerObjects.push(t);
          this.towersPlaced++;
          this.sparkEmitter.emitParticleAt(t.x, t.y, 12);
          SFX.correct();
          // Range circle
          const rc = this.add
            .circle(t.x, t.y, t.range, 0x00ccff, 0.05)
            .setStrokeStyle(1, 0x00ccff, 0.15);
          this.tweens.add({
            targets: rc,
            alpha: 0,
            duration: 2000,
            onComplete: () => rc.destroy(),
          });
        }

        startWave() {
          if (this.waveActive || this.wave >= this.maxWaves) return;
          this.wave++;
          this.waveActive = true;
          this.waveBtn.setVisible(false);
          SFX.wave();
          this.updateHUD();

          const count = 3 + this.wave * 2;
          this.enemiesInWave = count;
          this.enemiesSpawned = 0;
          this.spawnTimer = this.time.addEvent({
            delay: 800,
            callback: () => {
              if (this.enemiesSpawned < count) {
                this.spawnEnemy();
                this.enemiesSpawned++;
              }
            },
            repeat: count - 1,
          });
        }

        spawnEnemy() {
          const types = ["normal", "normal", "fast", "tank"];
          const type =
            this.wave <= 2 ? "normal" : Phaser.Utils.Array.GetRandom(types);
          const hp =
            type === "tank"
              ? this.diff.hp * 2
              : type === "fast"
                ? 1
                : this.diff.hp;
          const speed =
            type === "fast" ? 0.004 : type === "tank" ? 0.0015 : 0.002;
          const tex =
            type === "tank"
              ? "enemyTank"
              : type === "fast"
                ? "enemyFast"
                : "enemy";

          const follower = { t: 0, vec: new Phaser.Math.Vector2() };
          const sprite = this.add.image(PATH[0].x, PATH[0].y, tex);
          sprite.hp = hp;
          sprite.maxHp = hp;
          sprite.speed = speed + this.wave * 0.0002;
          sprite.follower = follower;
          sprite.alive = true;
          sprite.enemyType = type;

          // HP bar
          const hpBg = this.add.rectangle(
            sprite.x,
            sprite.y - 16,
            24,
            4,
            0x333333,
            0.8,
          );
          const hpFill = this.add
            .rectangle(sprite.x, sprite.y - 16, 24, 4, 0x00ff88, 1)
            .setOrigin(0, 0.5);
          hpFill.x = sprite.x - 12;
          sprite.hpBg = hpBg;
          sprite.hpFill = hpFill;

          // Wrong answer label
          const wrongAnswers = QUESTIONS[
            this.qIdx % QUESTIONS.length
          ].choices.filter((_, i) => i !== 0);
          const label = Phaser.Utils.Array.GetRandom(wrongAnswers);
          sprite.label = this.add
            .text(sprite.x, sprite.y + 16, label, {
              fontSize: "9px",
              fontFamily: "monospace",
              color: "#ff8888",
              backgroundColor: "rgba(0,0,0,0.5)",
              padding: { x: 2, y: 1 },
            })
            .setOrigin(0.5);

          this.enemies.add(sprite);
        }

        towersFire() {
          this.towerObjects.forEach((tower) => {
            let closest = null,
              closestDist = tower.range;
            this.enemies.children.iterate((e) => {
              if (!e || !e.alive) return;
              const d = Phaser.Math.Distance.Between(
                tower.spotX,
                tower.spotY,
                e.x,
                e.y,
              );
              if (d < closestDist) {
                closestDist = d;
                closest = e;
              }
            });
            if (closest) {
              const b = this.bullets.create(
                tower.spotX,
                tower.spotY,
                "tbullet",
              );
              this.physics.moveToObject(b, closest, 300);
              b.target = closest;
              SFX.shoot();
              // Rotate tower toward enemy
              tower.angle =
                Phaser.Math.RadToDeg(
                  Phaser.Math.Angle.Between(
                    tower.spotX,
                    tower.spotY,
                    closest.x,
                    closest.y,
                  ),
                ) - 90;
            }
          });
        }

        updateHUD() {
          this.scoreText.setText("SCORE: " + this.score);
          this.livesText.setText("BASE HP: " + this.lives);
          this.livesText.setStyle({
            color:
              this.lives > 10
                ? "#00ff88"
                : this.lives > 5
                  ? "#ffcc00"
                  : "#ff4444",
          });
          this.waveText.setText("WAVE " + this.wave + "/" + this.maxWaves);
          this.towersText.setText("TOWERS: " + this.towersPlaced);
          this.streakText.setText(
            this.streak >= 2 ? "STREAK x" + this.streak : "",
          );
        }

        update() {
          // Move enemies along path
          this.enemies.children.iterate((e) => {
            if (!e || !e.alive) return;
            e.follower.t += e.speed;
            if (e.follower.t >= 1) {
              // Reached base
              e.alive = false;
              this.lives--;
              this.updateHUD();
              if (e.label) e.label.destroy();
              if (e.hpBg) e.hpBg.destroy();
              if (e.hpFill) e.hpFill.destroy();
              e.destroy();
              if (this.lives <= 0) {
                SFX.lose();
                this.time.delayedCall(800, () =>
                  this.scene.start("Results", {
                    score: this.score,
                    correct: this.correct,
                    total: this.total,
                    bestStreak: this.bestStreak,
                    wave: this.wave,
                    towers: this.towersPlaced,
                    kills: this.enemiesKilled,
                    won: false,
                  }),
                );
              }
              return;
            }
            this.enemyPath.getPoint(e.follower.t, e.follower.vec);
            e.x = e.follower.vec.x;
            e.y = e.follower.vec.y;
            if (e.hpBg) {
              e.hpBg.x = e.x;
              e.hpBg.y = e.y - 16;
            }
            if (e.hpFill) {
              e.hpFill.x = e.x - 12;
              e.hpFill.y = e.y - 16;
              e.hpFill.width = 24 * (e.hp / e.maxHp);
            }
            if (e.label) {
              e.label.x = e.x;
              e.label.y = e.y + 16;
            }
          });

          // Bullet collision
          this.bullets.children.iterate((b) => {
            if (!b || !b.active) return;
            // Check distance to any enemy
            this.enemies.children.iterate((e) => {
              if (!e || !e.alive) return;
              if (Phaser.Math.Distance.Between(b.x, b.y, e.x, e.y) < 16) {
                b.setActive(false).setVisible(false).destroy();
                e.hp--;
                SFX.hit();
                if (e.hp <= 0) {
                  e.alive = false;
                  this.enemiesKilled++;
                  this.score += 20;
                  this.sparkEmitter.emitParticleAt(e.x, e.y, 8);
                  SFX.explode();
                  if (e.label) e.label.destroy();
                  if (e.hpBg) e.hpBg.destroy();
                  if (e.hpFill) e.hpFill.destroy();
                  e.destroy();
                  this.updateHUD();
                }
              }
            });
            // Remove if off screen
            if (
              b.active &&
              (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20)
            ) {
              b.setActive(false).setVisible(false).destroy();
            }
          });

          // Check wave complete
          if (this.waveActive) {
            let aliveCount = 0;
            this.enemies.children.iterate((e) => {
              if (e && e.alive) aliveCount++;
            });
            if (this.enemiesSpawned >= this.enemiesInWave && aliveCount === 0) {
              this.waveActive = false;
              if (this.wave >= this.maxWaves) {
                // Victory!
                SFX.wave();
                this.time.delayedCall(1000, () =>
                  this.scene.start("Results", {
                    score: this.score,
                    correct: this.correct,
                    total: this.total,
                    bestStreak: this.bestStreak,
                    wave: this.wave,
                    towers: this.towersPlaced,
                    kills: this.enemiesKilled,
                    won: true,
                  }),
                );
              } else {
                this.waveBtn.setVisible(true);
                this.score += this.wave * 25;
                this.updateHUD();
              }
            }
          }
        }
      }

      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }
        init(data) {
          this.finalScore = data.score || 0;
          this.correct = data.correct || 0;
          this.total = data.total || 0;
          this.bestStreak = data.bestStreak || 0;
          this.wave = data.wave || 0;
          this.towers = data.towers || 0;
          this.kills = data.kills || 0;
          this.won = data.won || false;
        }
        create() {
          this.cameras.main.setBackgroundColor(0x0a0e27);
          for (let i = 0; i < 50; i++)
            this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.FloatBetween(0.5, 1.5),
              0xffffff,
              Phaser.Math.FloatBetween(0.1, 0.4),
            );

          const pct =
            this.total > 0 ? Math.round((this.correct / this.total) * 100) : 0;
          const title = this.won ? "FORTRESS DEFENDED!" : "BASE DESTROYED";
          const tc = this.won ? "#00ff88" : "#ff4444";

          this.add
            .text(W / 2, 50, title, {
              fontSize: "38px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: tc,
              stroke: "#222",
              strokeThickness: 3,
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 110, String(this.finalScore), {
              fontSize: "56px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 148, "POINTS", {
              fontSize: "13px",
              fontFamily: "monospace",
              color: "#888",
            })
            .setOrigin(0.5);

          let grade, gc;
          if (pct >= 90 && this.won) {
            grade = "S RANK";
            gc = "#ffcc00";
          } else if (pct >= 80) {
            grade = "A RANK";
            gc = "#00ff88";
          } else if (pct >= 70) {
            grade = "B RANK";
            gc = "#00ccff";
          } else if (pct >= 60) {
            grade = "C RANK";
            gc = "#ff8800";
          } else {
            grade = "KEEP PRACTICING";
            gc = "#ff4444";
          }
          this.add
            .text(W / 2, 185, grade, {
              fontSize: "20px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: gc,
            })
            .setOrigin(0.5);

          [
            { l: "Correct", v: this.correct + "/" + this.total },
            { l: "Accuracy", v: pct + "%" },
            { l: "Towers", v: String(this.towers) },
            { l: "Enemies Defeated", v: String(this.kills) },
            { l: "Wave", v: this.wave + "/" + this.wave },
          ].forEach((s, i) => {
            const x = W / 2 - 240 + i * 120;
            this.add
              .rectangle(x, 270, 105, 60, 0x112233, 0.8)
              .setStrokeStyle(1, 0x336699, 0.5);
            this.add
              .text(x, 258, s.v, {
                fontSize: "20px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: "#00ff88",
              })
              .setOrigin(0.5);
            this.add
              .text(x, 282, s.l, {
                fontSize: "9px",
                fontFamily: "Arial",
                color: "#888",
              })
              .setOrigin(0.5);
          });

          const btn = this.add
            .text(W / 2, 370, "[ DEFEND AGAIN ]", {
              fontSize: "22px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ffcc",
              padding: { x: 20, y: 10 },
              backgroundColor: "rgba(0,255,200,0.1)",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });
          btn.on("pointerover", () =>
            btn.setStyle({ backgroundColor: "rgba(0,255,200,0.25)" }),
          );
          btn.on("pointerout", () =>
            btn.setStyle({ backgroundColor: "rgba(0,255,200,0.1)" }),
          );
          btn.on("pointerdown", () => this.scene.start("Title"));

          this.add
            .text(W / 2, 460, "6.EE.C.9 -- Equations Review", {
              fontSize: "12px",
              fontFamily: "Arial",
              color: "#556677",
            })
            .setOrigin(0.5);
        }
      }

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: "game-container",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        physics: {
          default: "arcade",
          arcade: { gravity: { y: 0 }, debug: false },
        },
        scene: [BootScene, TitleScene, DefendScene, ResultsScene],
        backgroundColor: "#0a0e27",
      };
      new Phaser.Game(config);
    </script>
  </body>
</html>
