<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variable Blaster - Space Shooter | 6.EE.C.9</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #game-container {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script>
      // ============================================================
      // VARIABLE BLASTER — Space Shooter (6.EE.C.9)
      // Shoot asteroids carrying the correct answer about
      // dependent/independent variables and equations from tables.
      // ============================================================

      const QUESTIONS = [
        {
          scenario:
            "A car travels on the highway. The longer you drive, the farther it goes.",
          q: "What is the INDEPENDENT variable?",
          choices: ["Hours driven", "Miles traveled", "The car", "The highway"],
          answer: 0,
          explain: "Hours driven is independent -- you control it.",
        },
        {
          scenario: "A babysitter earns $8 per hour worked.",
          q: "Which is the DEPENDENT variable?",
          choices: ["Hours worked", "Money earned", "Babysitter", "Family"],
          answer: 1,
          explain: "Money earned depends on hours worked.",
        },
        {
          scenario: "Table: Hours(x): 1,2,3 | Miles(y): 55,110,165.",
          q: "What is the rate (k)?",
          choices: ["110", "55", "165", "3"],
          answer: 1,
          explain: "k = 55/1 = 55.",
        },
        {
          scenario: "Table: Hours(x): 1,3,5 | Earnings(y): 9,27,45.",
          q: "What is the equation?",
          choices: ["y = 3x", "y = 27x", "y = 9x", "y = 45x"],
          answer: 2,
          explain: "k = 9/1 = 9, so y = 9x.",
        },
        {
          scenario: "Table: Pizzas(x): 2,4,6 | Cost(y): 26,52,78.",
          q: "What is the cost per pizza (k)?",
          choices: ["26", "52", "13", "6"],
          answer: 2,
          explain: "k = 26/2 = 13.",
        },
        {
          scenario: "A plant grows taller with more sunlight each day.",
          q: "Which is the INDEPENDENT variable?",
          choices: [
            "Height of plant",
            "Days of sunlight",
            "Type of soil",
            "Water amount",
          ],
          answer: 1,
          explain: "Days of sunlight is what you control.",
        },
        {
          scenario: "A student reads books and earns points.",
          q: "Which is TRUE?",
          choices: [
            "Points = independent",
            "Books = dependent",
            "Books = independent",
            "No relationship",
          ],
          answer: 2,
          explain: "Books read is independent -- points depend on it.",
        },
        {
          scenario: "A line passes through (0,0) and (1,8).",
          q: "What is the equation?",
          choices: ["y = 1x", "y = 8x", "y = 0x", "y = 16x"],
          answer: 1,
          explain: "k = 8/1 = 8, so y = 8x.",
        },
        {
          scenario: "Graph: line through (0,0),(2,10),(4,20).",
          q: "What is the equation?",
          choices: ["y = 2x", "y = 10x", "y = 5x", "y = 20x"],
          answer: 2,
          explain: "k = 10/2 = 5, so y = 5x.",
        },
        {
          scenario: "Table: x:3,6,9 | y:21,42,63. Predict y when x=12.",
          q: "What is y when x = 12?",
          choices: ["y = 84", "y = 252", "y = 36", "y = 72"],
          answer: 0,
          explain: "k = 7, so y = 7*12 = 84.",
        },
        {
          scenario: "A graph: 4 units right, line rises 20. Through (0,0).",
          q: "What is the equation?",
          choices: ["y = 4x", "y = 20x", "y = 5x", "y = 80x"],
          answer: 2,
          explain: "k = 20/4 = 5, so y = 5x.",
        },
        {
          scenario: "Equation y=15x. x=hours, y=miles. Trip = 180 miles.",
          q: "How many hours?",
          choices: ["15", "180", "12", "13"],
          answer: 2,
          explain: "180 = 15x, x = 12 hours.",
        },
        {
          scenario: "Streaming service: more songs = more data.",
          q: "What is the DEPENDENT variable?",
          choices: [
            "Songs downloaded",
            "Total data used",
            "Streaming service",
            "Price per song",
          ],
          answer: 1,
          explain: "Data used depends on songs downloaded.",
        },
        {
          scenario: "Table: Weeks(x):1,4,7 | Height(y):6,24,42.",
          q: "Which equation is correct?",
          choices: ["y = 4x", "y = 7x", "y = 6x", "y = 42x"],
          answer: 2,
          explain: "k = 6/1 = 6, so y = 6x.",
        },
        {
          scenario: "Graph A: (1,3),(2,6),(3,9). Graph B: (1,2),(2,5),(3,9).",
          q: "Which shows a proportional relationship?",
          choices: ["Graph A only", "Graph B only", "Both", "Neither"],
          answer: 0,
          explain: "Graph A: constant rate 3. Graph B: rate changes.",
        },
      ];

      // Audio synth
      const AudioSys = {
        ctx: null,
        init() {
          if (!this.ctx)
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        },
        play(freq, dur, type = "sine", vol = 0.12) {
          if (!this.ctx) return;
          try {
            const o = this.ctx.createOscillator(),
              g = this.ctx.createGain();
            o.connect(g);
            g.connect(this.ctx.destination);
            o.type = type;
            o.frequency.value = freq;
            g.gain.setValueAtTime(vol, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              this.ctx.currentTime + dur,
            );
            o.start();
            o.stop(this.ctx.currentTime + dur);
          } catch (e) {}
        },
        shoot() {
          this.play(880, 0.08, "square", 0.06);
        },
        hit() {
          this.play(220, 0.15, "sawtooth", 0.08);
        },
        correct() {
          this.play(660, 0.1);
          setTimeout(() => this.play(880, 0.12), 80);
        },
        wrong() {
          this.play(180, 0.25, "sawtooth", 0.1);
        },
        explode() {
          this.play(80, 0.3, "sawtooth", 0.15);
        },
        levelUp() {
          this.play(523, 0.1);
          setTimeout(() => this.play(659, 0.1), 100);
          setTimeout(() => this.play(784, 0.15), 200);
        },
      };

      const W = 800,
        H = 600;

      // ========= BOOT SCENE =========
      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          // Generate textures
          const g = this.make.graphics({ add: false });
          // Ship
          g.clear();
          g.fillStyle(0x00ccff, 1);
          g.fillTriangle(16, 0, 0, 32, 32, 32);
          g.fillStyle(0x0088ff, 1);
          g.fillRect(12, 20, 8, 16);
          g.generateTexture("ship", 32, 36);
          g.clear();
          // Bullet
          g.fillStyle(0x00ffff, 1);
          g.fillRect(0, 0, 4, 12);
          g.fillStyle(0xffffff, 0.7);
          g.fillRect(1, 0, 2, 6);
          g.generateTexture("bullet", 4, 12);
          g.clear();
          // Asteroid
          g.fillStyle(0x888888, 1);
          g.fillCircle(24, 24, 24);
          g.fillStyle(0x666666, 1);
          g.fillCircle(18, 16, 6);
          g.fillStyle(0x555555, 1);
          g.fillCircle(28, 28, 4);
          g.generateTexture("asteroid", 48, 48);
          g.clear();
          // Star particle
          g.fillStyle(0xffffff, 1);
          g.fillCircle(2, 2, 2);
          g.generateTexture("star", 4, 4);
          g.clear();
          // Explosion particle
          g.fillStyle(0xffaa00, 1);
          g.fillCircle(4, 4, 4);
          g.generateTexture("spark", 8, 8);
          g.clear();
          // Shield powerup
          g.fillStyle(0x00ff88, 1);
          g.fillCircle(12, 12, 12);
          g.fillStyle(0x00ffcc, 0.6);
          g.fillCircle(12, 12, 8);
          g.generateTexture("powerup", 24, 24);
          g.clear();

          g.destroy();
          this.scene.start("Title");
        }
      }

      // ========= TITLE SCENE =========
      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          AudioSys.init();
          // Starfield
          for (let i = 0; i < 120; i++) {
            const s = this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.FloatBetween(0.5, 2),
              0xffffff,
              Phaser.Math.FloatBetween(0.2, 0.8),
            );
            this.tweens.add({
              targets: s,
              alpha: { from: s.alpha, to: 0.1 },
              duration: Phaser.Math.Between(1500, 4000),
              yoyo: true,
              repeat: -1,
            });
          }

          // Title
          this.add
            .text(W / 2, 100, "VARIABLE BLASTER", {
              fontSize: "48px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ccff",
              stroke: "#003366",
              strokeThickness: 4,
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 155, "A Space Shooter Math Adventure", {
              fontSize: "16px",
              fontFamily: "Arial",
              color: "#88ccff",
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 180, "6.EE.C.9 -- Variables, Tables & Equations", {
              fontSize: "13px",
              fontFamily: "Arial",
              color: "#6699cc",
            })
            .setOrigin(0.5);

          // Ship preview
          const ship = this.add.image(W / 2, 270, "ship").setScale(3);
          this.tweens.add({
            targets: ship,
            y: 260,
            duration: 1500,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });

          // Character select
          this.add
            .text(W / 2, 340, "Choose Your Pilot:", {
              fontSize: "18px",
              fontFamily: "Arial",
              color: "#aaa",
            })
            .setOrigin(0.5);

          const chars = [
            { name: "Ace", color: 0x00ccff, desc: "Speed boost" },
            { name: "Nova", color: 0xff44aa, desc: "Extra shield" },
            { name: "Bolt", color: 0xffcc00, desc: "Rapid fire" },
            { name: "Sage", color: 0x44ff88, desc: "Double XP" },
          ];

          this.selectedChar = 0;
          this.charCards = [];
          chars.forEach((c, i) => {
            const x = W / 2 - 180 + i * 120;
            const card = this.add
              .rectangle(x, 400, 100, 80, c.color, 0.15)
              .setStrokeStyle(2, c.color, 0.6)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(x, 385, c.name, {
                fontSize: "15px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.add
              .text(x, 408, c.desc, {
                fontSize: "11px",
                fontFamily: "Arial",
                color: "#aaa",
              })
              .setOrigin(0.5);
            card.on("pointerdown", () => {
              this.selectedChar = i;
              this.charCards.forEach((cc, j) => {
                cc.setStrokeStyle(
                  j === i ? 3 : 2,
                  chars[j].color,
                  j === i ? 1 : 0.4,
                );
                cc.setFillStyle(chars[j].color, j === i ? 0.3 : 0.1);
              });
              this.startBtn.setAlpha(1);
            });
            this.charCards.push(card);
          });
          this.charCards[0]
            .setStrokeStyle(3, chars[0].color, 1)
            .setFillStyle(chars[0].color, 0.3);

          // Start button
          this.startBtn = this.add
            .text(W / 2, 490, "[ LAUNCH MISSION ]", {
              fontSize: "22px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ffcc",
              padding: { x: 20, y: 10 },
              backgroundColor: "rgba(0,255,200,0.1)",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });

          this.startBtn.on("pointerover", () =>
            this.startBtn.setStyle({ backgroundColor: "rgba(0,255,200,0.25)" }),
          );
          this.startBtn.on("pointerout", () =>
            this.startBtn.setStyle({ backgroundColor: "rgba(0,255,200,0.1)" }),
          );
          this.startBtn.on("pointerdown", () => {
            AudioSys.init();
            this.scene.start("Game", { charIndex: this.selectedChar });
          });

          // Info chips
          const info = [
            "15 Missions",
            "3 Lives",
            "Combo Scoring",
            "Keyboard + Touch",
          ];
          info.forEach((t, i) => {
            this.add
              .text(W / 2 - 200 + i * 130, 550, t, {
                fontSize: "11px",
                fontFamily: "Arial",
                color: "#668899",
                padding: { x: 6, y: 3 },
                backgroundColor: "rgba(255,255,255,0.05)",
              })
              .setOrigin(0.5);
          });
        }
      }

      // ========= GAME SCENE =========
      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }

        init(data) {
          this.charIndex = data.charIndex || 0;
          this.score = 0;
          this.lives = 3;
          this.streak = 0;
          this.bestStreak = 0;
          this.combo = 1;
          this.level = 1;
          this.qIndex = 0;
          this.totalCorrect = 0;
          this.totalAnswered = 0;
          this.questionActive = false;
          this.shuffledQs = Phaser.Utils.Array.Shuffle([...QUESTIONS]);
        }

        create() {
          // Stars background
          this.starsBg = [];
          for (let i = 0; i < 80; i++) {
            const s = this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.FloatBetween(0.5, 1.5),
              0xffffff,
              Phaser.Math.FloatBetween(0.15, 0.6),
            );
            this.starsBg.push({
              obj: s,
              speed: Phaser.Math.FloatBetween(0.3, 1.2),
            });
          }

          // Ship
          this.ship = this.physics.add
            .image(W / 2, H - 60, "ship")
            .setCollideWorldBounds(true);
          this.ship.setDamping(true).setDrag(0.92).setMaxVelocity(350);

          // Groups
          this.bullets = this.physics.add.group({ maxSize: 20 });
          this.asteroids = this.physics.add.group();
          this.powerups = this.physics.add.group();
          this.explosionEmitters = [];

          // Particle manager
          this.sparkEmitter = this.add.particles(0, 0, "spark", {
            speed: { min: 80, max: 250 },
            angle: { min: 0, max: 360 },
            lifespan: 400,
            scale: { start: 1, end: 0 },
            alpha: { start: 1, end: 0 },
            blendMode: "ADD",
            emitting: false,
          });

          // Collision
          this.physics.add.overlap(
            this.bullets,
            this.asteroids,
            this.hitAsteroid,
            null,
            this,
          );
          this.physics.add.overlap(
            this.ship,
            this.powerups,
            this.collectPowerup,
            null,
            this,
          );
          this.physics.add.overlap(
            this.ship,
            this.asteroids,
            this.shipHit,
            null,
            this,
          );

          // Input
          this.cursors = this.input.keyboard.createCursorKeys();
          this.wasd = this.input.keyboard.addKeys("W,A,S,D");
          this.spaceKey = this.input.keyboard.addKey("SPACE");
          this.lastShot = 0;

          // Touch controls
          this.input.on("pointermove", (p) => {
            if (p.isDown && !this.questionActive) {
              this.ship.x = Phaser.Math.Clamp(p.x, 20, W - 20);
              this.ship.y = Phaser.Math.Clamp(p.y, H / 2, H - 20);
            }
          });
          this.input.on("pointerdown", (p) => {
            if (!this.questionActive) this.fireWeapon();
          });

          // HUD
          this.createHUD();

          // Screen shake camera
          this.cameras.main.setBackgroundColor(0x000011);

          // Start first question wave
          this.time.delayedCall(1000, () => this.spawnQuestionWave());
        }

        createHUD() {
          const hudBg = this.add
            .rectangle(W / 2, 18, W, 36, 0x000033, 0.8)
            .setDepth(100);

          this.scoreText = this.add
            .text(10, 6, "SCORE: 0", {
              fontSize: "14px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
            })
            .setDepth(101);

          this.livesText = this.add
            .text(W - 10, 6, "", {
              fontSize: "16px",
              fontFamily: "monospace",
              color: "#ff4444",
            })
            .setOrigin(1, 0)
            .setDepth(101);
          this.updateLives();

          this.levelText = this.add
            .text(W / 2, 6, "LEVEL 1", {
              fontSize: "13px",
              fontFamily: "monospace",
              color: "#00ccff",
            })
            .setOrigin(0.5, 0)
            .setDepth(101);

          this.streakText = this.add
            .text(W / 2, 20, "", {
              fontSize: "11px",
              fontFamily: "monospace",
              color: "#ff8800",
            })
            .setOrigin(0.5, 0)
            .setDepth(101);

          this.comboText = this.add
            .text(W - 10, 22, "", {
              fontSize: "11px",
              fontFamily: "monospace",
              color: "#ffcc00",
            })
            .setOrigin(1, 0)
            .setDepth(101);

          // Question panel (hidden initially)
          this.qPanel = this.add
            .container(W / 2, H / 2)
            .setDepth(200)
            .setVisible(false);
          this.qPanelBg = this.add
            .rectangle(0, 0, 680, 340, 0x0a1a2e, 0.95)
            .setStrokeStyle(2, 0x00ccff, 0.6);
          this.qScenarioText = this.add
            .text(0, -140, "", {
              fontSize: "13px",
              fontFamily: "Arial",
              color: "#88ccff",
              wordWrap: { width: 620 },
              align: "center",
            })
            .setOrigin(0.5);
          this.qQuestionText = this.add
            .text(0, -100, "", {
              fontSize: "17px",
              fontFamily: "Arial",
              fontStyle: "bold",
              color: "#ffffff",
              wordWrap: { width: 620 },
              align: "center",
            })
            .setOrigin(0.5);
          this.qPanel.add([
            this.qPanelBg,
            this.qScenarioText,
            this.qQuestionText,
          ]);
          this.qChoiceTexts = [];
          this.qChoiceBgs = [];
          for (let i = 0; i < 4; i++) {
            const y = -40 + i * 48;
            const bg = this.add
              .rectangle(0, y, 560, 40, 0x112244, 0.8)
              .setStrokeStyle(1, 0x336699, 0.6)
              .setInteractive({ useHandCursor: true });
            const txt = this.add
              .text(0, y, "", {
                fontSize: "15px",
                fontFamily: "Arial",
                color: "#ccddff",
                wordWrap: { width: 520 },
                align: "center",
              })
              .setOrigin(0.5);
            bg.on("pointerover", () => {
              if (this.questionActive) bg.setStrokeStyle(2, 0x00ccff, 1);
            });
            bg.on("pointerout", () => {
              if (this.questionActive) bg.setStrokeStyle(1, 0x336699, 0.6);
            });
            const idx = i;
            bg.on("pointerdown", () => this.answerQuestion(idx));
            this.qPanel.add([bg, txt]);
            this.qChoiceBgs.push(bg);
            this.qChoiceTexts.push(txt);
          }
          this.qExplainText = this.add
            .text(0, 160, "", {
              fontSize: "13px",
              fontFamily: "Arial",
              color: "#88ff88",
              wordWrap: { width: 600 },
              align: "center",
            })
            .setOrigin(0.5)
            .setVisible(false);
          this.qPanel.add(this.qExplainText);
        }

        updateLives() {
          let h = "";
          for (let i = 0; i < 3; i++) h += i < this.lives ? "♥" : "♡";
          this.livesText.setText(h);
        }

        fireWeapon() {
          if (this.questionActive) return;
          const now = this.time.now;
          if (now - this.lastShot < 200) return;
          this.lastShot = now;

          const b = this.bullets.get(this.ship.x, this.ship.y - 20, "bullet");
          if (b) {
            b.setActive(true).setVisible(true).setVelocityY(-500);
            b.body.setSize(4, 12);
            AudioSys.shoot();
          }
        }

        spawnQuestionWave() {
          if (this.qIndex >= this.shuffledQs.length) {
            this.scene.start("Results", {
              score: this.score,
              correct: this.totalCorrect,
              total: this.totalAnswered,
              bestStreak: this.bestStreak,
              level: this.level,
            });
            return;
          }

          const q = this.shuffledQs[this.qIndex];
          this.currentQuestion = q;
          this.questionActive = false;

          // Spawn asteroids with choices
          const positions = [
            { x: 100, y: -50 },
            { x: 300, y: -90 },
            { x: 500, y: -60 },
            { x: 700, y: -80 },
          ];

          this.currentAsteroids = [];
          q.choices.forEach((choice, i) => {
            const pos = positions[i];
            const ast = this.asteroids.create(pos.x, pos.y, "asteroid");
            ast.setVelocityY(Phaser.Math.Between(30, 50 + this.level * 5));
            ast.setVelocityX(Phaser.Math.Between(-15, 15));
            ast.choiceIndex = i;
            ast.choiceText = choice;
            ast.hp = 1;

            // Label on asteroid
            const label = this.add
              .text(pos.x, pos.y, String.fromCharCode(65 + i), {
                fontSize: "18px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: "#ffffff",
              })
              .setOrigin(0.5)
              .setDepth(50);
            ast.label = label;

            this.currentAsteroids.push(ast);
          });

          // Show scenario & question
          this.showQuestion(q);
        }

        showQuestion(q) {
          this.questionActive = true;
          this.qPanel.setVisible(true);
          this.qScenarioText.setText(q.scenario);
          this.qQuestionText.setText(q.q);
          this.qExplainText.setVisible(false);

          q.choices.forEach((c, i) => {
            this.qChoiceTexts[i].setText(
              String.fromCharCode(65 + i) + ". " + c,
            );
            this.qChoiceBgs[i]
              .setFillStyle(0x112244, 0.8)
              .setStrokeStyle(1, 0x336699, 0.6);
            this.qChoiceBgs[i].setInteractive();
          });

          // Also allow keyboard 1-4
          this.input.keyboard.once("keydown-ONE", () => this.answerQuestion(0));
          this.input.keyboard.once("keydown-TWO", () => this.answerQuestion(1));
          this.input.keyboard.once("keydown-THREE", () =>
            this.answerQuestion(2),
          );
          this.input.keyboard.once("keydown-FOUR", () =>
            this.answerQuestion(3),
          );
        }

        answerQuestion(idx) {
          if (!this.questionActive) return;
          this.questionActive = false;
          this.totalAnswered++;

          const q = this.currentQuestion;
          const correct = idx === q.answer;

          // Remove keyboard listeners
          this.input.keyboard.removeAllListeners("keydown-ONE");
          this.input.keyboard.removeAllListeners("keydown-TWO");
          this.input.keyboard.removeAllListeners("keydown-THREE");
          this.input.keyboard.removeAllListeners("keydown-FOUR");

          // Visual feedback on panel
          this.qChoiceBgs.forEach((bg, i) => {
            bg.disableInteractive();
            if (i === q.answer) {
              bg.setFillStyle(0x004400, 0.9).setStrokeStyle(2, 0x00ff88, 1);
              this.qChoiceTexts[i].setStyle({ color: "#00ff88" });
            } else if (i === idx && !correct) {
              bg.setFillStyle(0x440000, 0.9).setStrokeStyle(2, 0xff4444, 1);
              this.qChoiceTexts[i].setStyle({ color: "#ff4444" });
            }
          });

          // Explode wrong asteroids, highlight correct
          this.currentAsteroids.forEach((ast) => {
            if (!ast.active) return;
            if (ast.choiceIndex === q.answer) {
              // Correct asteroid glows
              this.tweens.add({ targets: ast, tint: 0x00ff88, duration: 300 });
            } else {
              // Wrong asteroids explode
              this.createExplosion(ast.x, ast.y);
              if (ast.label) ast.label.destroy();
              ast.destroy();
            }
          });

          if (correct) {
            this.totalCorrect++;
            this.streak++;
            if (this.streak > this.bestStreak) this.bestStreak = this.streak;
            this.combo = Math.min(4, 1 + Math.floor(this.streak / 3));
            const pts = 100 * this.combo;
            this.score += pts;
            AudioSys.correct();
            this.cameras.main.flash(200, 0, 100, 0);

            // Points popup
            const pop = this.add
              .text(
                W / 2,
                H / 2 - 180,
                "+" + pts + (this.combo > 1 ? " x" + this.combo : ""),
                {
                  fontSize: "28px",
                  fontFamily: "monospace",
                  fontStyle: "bold",
                  color: "#00ff88",
                },
              )
              .setOrigin(0.5)
              .setDepth(300);
            this.tweens.add({
              targets: pop,
              y: pop.y - 60,
              alpha: 0,
              duration: 1200,
              onComplete: () => pop.destroy(),
            });
          } else {
            this.streak = 0;
            this.combo = 1;
            this.lives--;
            AudioSys.wrong();
            this.cameras.main.shake(300, 0.01);
            this.updateLives();
          }

          this.qExplainText.setText(q.explain).setVisible(true);
          this.scoreText.setText("SCORE: " + this.score);
          this.streakText.setText(
            this.streak >= 2 ? "STREAK x" + this.streak : "",
          );
          this.comboText.setText(this.combo > 1 ? "COMBO x" + this.combo : "");

          // Check game over
          if (this.lives <= 0) {
            this.time.delayedCall(1500, () => {
              this.scene.start("Results", {
                score: this.score,
                correct: this.totalCorrect,
                total: this.totalAnswered,
                bestStreak: this.bestStreak,
                level: this.level,
              });
            });
            return;
          }

          // Next question
          this.time.delayedCall(2000, () => {
            this.qPanel.setVisible(false);
            // Clean remaining asteroids
            this.currentAsteroids.forEach((a) => {
              if (a.active) {
                if (a.label) a.label.destroy();
                a.destroy();
              }
            });
            this.qIndex++;
            if (this.qIndex % 5 === 0) {
              this.level++;
              this.levelText.setText("LEVEL " + this.level);
              AudioSys.levelUp();
              this.showLevelUp();
            } else {
              this.time.delayedCall(800, () => this.spawnQuestionWave());
            }
          });
        }

        showLevelUp() {
          const bg = this.add
            .rectangle(W / 2, H / 2, 400, 120, 0x001133, 0.95)
            .setStrokeStyle(3, 0xffcc00, 0.8)
            .setDepth(300);
          const txt = this.add
            .text(W / 2, H / 2 - 15, "LEVEL " + this.level, {
              fontSize: "36px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
            })
            .setOrigin(0.5)
            .setDepth(301);
          const sub = this.add
            .text(W / 2, H / 2 + 25, "Asteroids get faster!", {
              fontSize: "14px",
              fontFamily: "Arial",
              color: "#88aacc",
            })
            .setOrigin(0.5)
            .setDepth(301);

          this.time.delayedCall(1800, () => {
            bg.destroy();
            txt.destroy();
            sub.destroy();
            this.spawnQuestionWave();
          });

          // Spawn powerup sometimes
          if (Math.random() < 0.5) {
            const pu = this.powerups.create(
              Phaser.Math.Between(100, W - 100),
              -30,
              "powerup",
            );
            pu.setVelocityY(80);
          }
        }

        createExplosion(x, y) {
          this.sparkEmitter.emitParticleAt(x, y, 20);
          AudioSys.explode();
        }

        hitAsteroid(bullet, asteroid) {
          bullet.setActive(false).setVisible(false).setVelocity(0);
          this.createExplosion(asteroid.x, asteroid.y);
          AudioSys.hit();

          // Only destroy if it's a 'wrong' asteroid being shot during free-play
          // During question mode, shooting doesn't destroy answer asteroids
        }

        collectPowerup(ship, powerup) {
          powerup.destroy();
          if (this.lives < 3) {
            this.lives++;
            this.updateLives();
          }
          this.score += 50;
          this.scoreText.setText("SCORE: " + this.score);
          AudioSys.correct();

          const pop = this.add
            .text(ship.x, ship.y - 30, "+1 LIFE", {
              fontSize: "16px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ff88",
            })
            .setOrigin(0.5)
            .setDepth(300);
          this.tweens.add({
            targets: pop,
            y: pop.y - 40,
            alpha: 0,
            duration: 1000,
            onComplete: () => pop.destroy(),
          });
        }

        shipHit(ship, asteroid) {
          // Only during non-question time
          if (this.questionActive) return;
          this.createExplosion(asteroid.x, asteroid.y);
          if (asteroid.label) asteroid.label.destroy();
          asteroid.destroy();
          this.lives--;
          this.updateLives();
          this.cameras.main.shake(400, 0.015);
          AudioSys.wrong();

          if (this.lives <= 0) {
            this.time.delayedCall(1000, () => {
              this.scene.start("Results", {
                score: this.score,
                correct: this.totalCorrect,
                total: this.totalAnswered,
                bestStreak: this.bestStreak,
                level: this.level,
              });
            });
          }
        }

        update() {
          // Scroll stars
          this.starsBg.forEach((s) => {
            s.obj.y += s.speed;
            if (s.obj.y > H + 5) {
              s.obj.y = -5;
              s.obj.x = Phaser.Math.Between(0, W);
            }
          });

          // Ship movement
          if (!this.questionActive) {
            const spd = 300;
            if (this.cursors.left.isDown || this.wasd.A.isDown)
              this.ship.setVelocityX(-spd);
            else if (this.cursors.right.isDown || this.wasd.D.isDown)
              this.ship.setVelocityX(spd);

            if (this.cursors.up.isDown || this.wasd.W.isDown)
              this.ship.setVelocityY(-spd);
            else if (this.cursors.down.isDown || this.wasd.S.isDown)
              this.ship.setVelocityY(spd);

            // Auto-fire with space
            if (this.spaceKey.isDown) this.fireWeapon();
          }

          // Update asteroid labels
          this.asteroids.children.iterate((ast) => {
            if (ast && ast.active && ast.label) {
              ast.label.setPosition(ast.x, ast.y);
            }
            // Remove if off screen
            if (ast && ast.y > H + 50) {
              if (ast.label) ast.label.destroy();
              ast.destroy();
            }
          });

          // Remove bullets off screen
          this.bullets.children.iterate((b) => {
            if (b && b.active && b.y < -10)
              b.setActive(false).setVisible(false);
          });
        }
      }

      // ========= RESULTS SCENE =========
      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }

        init(data) {
          this.finalScore = data.score || 0;
          this.correct = data.correct || 0;
          this.total = data.total || 0;
          this.bestStreak = data.bestStreak || 0;
          this.level = data.level || 1;
        }

        create() {
          // Stars
          for (let i = 0; i < 80; i++) {
            this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.FloatBetween(0.5, 1.5),
              0xffffff,
              Phaser.Math.FloatBetween(0.2, 0.6),
            );
          }

          const pct =
            this.total > 0 ? Math.round((this.correct / this.total) * 100) : 0;
          let grade, gradeColor;
          if (pct >= 90) {
            grade = "S RANK - MASTER!";
            gradeColor = "#ffcc00";
          } else if (pct >= 80) {
            grade = "A RANK - EXCELLENT!";
            gradeColor = "#00ff88";
          } else if (pct >= 70) {
            grade = "B RANK - GREAT!";
            gradeColor = "#00ccff";
          } else if (pct >= 60) {
            grade = "C RANK - GOOD TRY!";
            gradeColor = "#ff8800";
          } else {
            grade = "KEEP PRACTICING!";
            gradeColor = "#ff4444";
          }

          this.add
            .text(W / 2, 60, "MISSION COMPLETE", {
              fontSize: "40px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
              stroke: "#664400",
              strokeThickness: 3,
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 120, grade, {
              fontSize: "22px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: gradeColor,
            })
            .setOrigin(0.5);

          // Score
          this.add
            .text(W / 2, 180, String(this.finalScore), {
              fontSize: "64px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 220, "POINTS", {
              fontSize: "14px",
              fontFamily: "monospace",
              color: "#888",
            })
            .setOrigin(0.5);

          // Stats
          const stats = [
            { label: "Correct", val: this.correct + "/" + this.total },
            { label: "Accuracy", val: pct + "%" },
            { label: "Best Streak", val: String(this.bestStreak) },
            { label: "Final Level", val: String(this.level) },
          ];

          stats.forEach((s, i) => {
            const x = W / 2 - 180 + i * 120;
            this.add
              .rectangle(x, 310, 105, 70, 0x112233, 0.8)
              .setStrokeStyle(1, 0x336699, 0.5);
            this.add
              .text(x, 295, s.val, {
                fontSize: "24px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: "#00ccff",
              })
              .setOrigin(0.5);
            this.add
              .text(x, 325, s.label, {
                fontSize: "11px",
                fontFamily: "Arial",
                color: "#888",
              })
              .setOrigin(0.5);
          });

          // Play Again
          const btn = this.add
            .text(W / 2, 420, "[ PLAY AGAIN ]", {
              fontSize: "22px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ffcc",
              padding: { x: 24, y: 12 },
              backgroundColor: "rgba(0,255,200,0.1)",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });

          btn.on("pointerover", () =>
            btn.setStyle({ backgroundColor: "rgba(0,255,200,0.25)" }),
          );
          btn.on("pointerout", () =>
            btn.setStyle({ backgroundColor: "rgba(0,255,200,0.1)" }),
          );
          btn.on("pointerdown", () => this.scene.start("Title"));

          // Standard reference
          this.add
            .text(
              W / 2,
              500,
              "6.EE.C.9 -- Dependent & Independent Variables, Tables, Equations",
              {
                fontSize: "12px",
                fontFamily: "Arial",
                color: "#556677",
              },
            )
            .setOrigin(0.5);
        }
      }

      // ========= CONFIG =========
      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: "game-container",
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        physics: {
          default: "arcade",
          arcade: { gravity: { y: 0 }, debug: false },
        },
        scene: [BootScene, TitleScene, GameScene, ResultsScene],
        backgroundColor: "#000011",
      };

      const game = new Phaser.Game(config);
    </script>
  </body>
</html>
