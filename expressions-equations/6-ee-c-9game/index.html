<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Variable Blaster - Space Shooter | 6.EE.C.9</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
      // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror
      // (document.write blocks parsing so the mirror is ready before the game script runs).
      if (typeof Phaser === "undefined") {
        document.write(
          '<script src="https://unpkg.com/phaser@3.80.1/dist/phaser.min.js"><\/script>',
        );
      }
      // If both CDNs are unreachable, show a clear message instead of a blank page.
      window.addEventListener("load", function () {
        if (typeof Phaser === "undefined") {
          document.body.innerHTML =
            '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">\u26a0\ufe0f This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
        }
      });
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #game-container {
        width: 100%;
        height: 100%;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script>
      // ============================================================
      // VARIABLE BLASTER — Space Shooter (6.EE.C.9)
      // Shoot asteroids carrying the correct answer about
      // dependent/independent variables and equations from tables.
      // ============================================================

      // Each question's "choices" are SHORT labels printed directly on the
      // asteroids. "answer" is the index of the correct label. Shoot the
      // asteroid carrying the correct answer to score and advance.
      const QUESTIONS = [
        {
          scenario:
            "A car drives on the highway. The longer you drive, the farther it goes.",
          q: "Shoot the INDEPENDENT variable",
          choices: ["Hours", "Miles", "Speed", "Road"],
          answer: 0,
          explain: "Hours driven is independent -- you control it.",
        },
        {
          scenario: "A babysitter earns $8 for every hour worked.",
          q: "Shoot the DEPENDENT variable",
          choices: ["Hours", "Money", "Family", "Time"],
          answer: 1,
          explain: "Money earned depends on hours worked.",
        },
        {
          scenario: "Table  Hours(x): 1, 2, 3   Miles(y): 55, 110, 165",
          q: "Shoot the rate k (miles per hour)",
          choices: ["110", "55", "165", "3"],
          answer: 1,
          explain: "k = 55 / 1 = 55.",
        },
        {
          scenario: "Table  Hours(x): 1, 3, 5   Earnings(y): 9, 27, 45",
          q: "Shoot the correct equation",
          choices: ["y = 3x", "y = 27x", "y = 9x", "y = 45x"],
          answer: 2,
          explain: "k = 9 / 1 = 9, so y = 9x.",
        },
        {
          scenario: "Table  Pizzas(x): 2, 4, 6   Cost(y): 26, 52, 78",
          q: "Shoot the cost per pizza (k)",
          choices: ["26", "52", "13", "6"],
          answer: 2,
          explain: "k = 26 / 2 = 13.",
        },
        {
          scenario: "A plant grows taller with more days of sunlight.",
          q: "Shoot the INDEPENDENT variable",
          choices: ["Height", "Sunlight", "Soil", "Water"],
          answer: 1,
          explain: "Days of sunlight is what you control.",
        },
        {
          scenario:
            "A student reads books and earns points. Points depend on books.",
          q: "Shoot the INDEPENDENT variable",
          choices: ["Points", "Books", "Prizes", "Time"],
          answer: 1,
          explain: "Books read is independent -- points depend on it.",
        },
        {
          scenario: "A line passes through (0,0) and (1,8).",
          q: "Shoot the correct equation",
          choices: ["y = 1x", "y = 8x", "y = 0x", "y = 16x"],
          answer: 1,
          explain: "k = 8 / 1 = 8, so y = 8x.",
        },
        {
          scenario: "Graph: a line through (0,0), (2,10), (4,20).",
          q: "Shoot the correct equation",
          choices: ["y = 2x", "y = 10x", "y = 5x", "y = 20x"],
          answer: 2,
          explain: "k = 10 / 2 = 5, so y = 5x.",
        },
        {
          scenario: "Table  x: 3, 6, 9   y: 21, 42, 63",
          q: "Shoot the value of y when x = 12",
          choices: ["84", "252", "36", "72"],
          answer: 0,
          explain: "k = 7, so y = 7 x 12 = 84.",
        },
        {
          scenario: "Graph: 4 units right, the line rises 20. Through (0,0).",
          q: "Shoot the correct equation",
          choices: ["y = 4x", "y = 20x", "y = 5x", "y = 80x"],
          answer: 2,
          explain: "k = 20 / 4 = 5, so y = 5x.",
        },
        {
          scenario:
            "Equation y = 15x.  x = hours, y = miles. A trip is 180 miles.",
          q: "Shoot the number of hours",
          choices: ["15", "180", "12", "13"],
          answer: 2,
          explain: "180 = 15x, so x = 12 hours.",
        },
        {
          scenario:
            "Streaming: the more songs you download, the more data used.",
          q: "Shoot the DEPENDENT variable",
          choices: ["Songs", "Data", "Service", "Price"],
          answer: 1,
          explain: "Data used depends on songs downloaded.",
        },
        {
          scenario: "Table  Weeks(x): 1, 4, 7   Height(y): 6, 24, 42",
          q: "Shoot the correct equation",
          choices: ["y = 4x", "y = 7x", "y = 6x", "y = 42x"],
          answer: 2,
          explain: "k = 6 / 1 = 6, so y = 6x.",
        },
        {
          scenario: "Graph A: (1,3),(2,6),(3,9).  Graph B: (1,2),(2,5),(3,9).",
          q: "Shoot the graph that is PROPORTIONAL",
          choices: ["Graph A", "Graph B", "Both", "Neither"],
          answer: 0,
          explain: "Graph A has a constant rate of 3. Graph B's rate changes.",
        },
      ];

      // Audio synth
      const AudioSys = {
        ctx: null,
        init() {
          if (!this.ctx)
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        },
        play(freq, dur, type = "sine", vol = 0.12) {
          if (!this.ctx) return;
          try {
            const o = this.ctx.createOscillator(),
              g = this.ctx.createGain();
            o.connect(g);
            g.connect(this.ctx.destination);
            o.type = type;
            o.frequency.value = freq;
            g.gain.setValueAtTime(vol, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              this.ctx.currentTime + dur,
            );
            o.start();
            o.stop(this.ctx.currentTime + dur);
          } catch (e) {}
        },
        shoot() {
          this.play(880, 0.08, "square", 0.06);
        },
        hit() {
          this.play(220, 0.15, "sawtooth", 0.08);
        },
        correct() {
          this.play(660, 0.1);
          setTimeout(() => this.play(880, 0.12), 80);
        },
        wrong() {
          this.play(180, 0.25, "sawtooth", 0.1);
        },
        explode() {
          this.play(80, 0.3, "sawtooth", 0.15);
        },
        levelUp() {
          this.play(523, 0.1);
          setTimeout(() => this.play(659, 0.1), 100);
          setTimeout(() => this.play(784, 0.15), 200);
        },
      };

      const W = 800,
        H = 600;

      // ========= BOOT SCENE =========
      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          // Generate textures
          const g = this.make.graphics({ add: false });
          // Ship
          g.clear();
          g.fillStyle(0x00ccff, 1);
          g.fillTriangle(16, 0, 0, 32, 32, 32);
          g.fillStyle(0x0088ff, 1);
          g.fillRect(12, 20, 8, 16);
          g.generateTexture("ship", 32, 36);
          g.clear();
          // Bullet
          g.fillStyle(0x00ffff, 1);
          g.fillRect(0, 0, 4, 12);
          g.fillStyle(0xffffff, 0.7);
          g.fillRect(1, 0, 2, 6);
          g.generateTexture("bullet", 4, 12);
          g.clear();
          // Asteroid
          g.fillStyle(0x888888, 1);
          g.fillCircle(24, 24, 24);
          g.fillStyle(0x666666, 1);
          g.fillCircle(18, 16, 6);
          g.fillStyle(0x555555, 1);
          g.fillCircle(28, 28, 4);
          g.generateTexture("asteroid", 48, 48);
          g.clear();
          // Star particle
          g.fillStyle(0xffffff, 1);
          g.fillCircle(2, 2, 2);
          g.generateTexture("star", 4, 4);
          g.clear();
          // Explosion particle
          g.fillStyle(0xffaa00, 1);
          g.fillCircle(4, 4, 4);
          g.generateTexture("spark", 8, 8);
          g.clear();
          // Shield powerup
          g.fillStyle(0x00ff88, 1);
          g.fillCircle(12, 12, 12);
          g.fillStyle(0x00ffcc, 0.6);
          g.fillCircle(12, 12, 8);
          g.generateTexture("powerup", 24, 24);
          g.clear();

          g.destroy();
          this.scene.start("Title");
        }
      }

      // ========= TITLE SCENE =========
      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          AudioSys.init();
          // Starfield
          for (let i = 0; i < 120; i++) {
            const s = this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.FloatBetween(0.5, 2),
              0xffffff,
              Phaser.Math.FloatBetween(0.2, 0.8),
            );
            this.tweens.add({
              targets: s,
              alpha: { from: s.alpha, to: 0.1 },
              duration: Phaser.Math.Between(1500, 4000),
              yoyo: true,
              repeat: -1,
            });
          }

          // Title
          this.add
            .text(W / 2, 100, "VARIABLE BLASTER", {
              fontSize: "48px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ccff",
              stroke: "#003366",
              strokeThickness: 4,
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 155, "A Space Shooter Math Adventure", {
              fontSize: "16px",
              fontFamily: "Arial",
              color: "#88ccff",
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 180, "6.EE.C.9 -- Variables, Tables & Equations", {
              fontSize: "13px",
              fontFamily: "Arial",
              color: "#6699cc",
            })
            .setOrigin(0.5);

          // Ship preview
          const ship = this.add.image(W / 2, 270, "ship").setScale(3);
          this.tweens.add({
            targets: ship,
            y: 260,
            duration: 1500,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });

          // Character select
          this.add
            .text(W / 2, 340, "Choose Your Pilot:", {
              fontSize: "18px",
              fontFamily: "Arial",
              color: "#aaa",
            })
            .setOrigin(0.5);

          const chars = [
            { name: "Ace", color: 0x00ccff, desc: "Speed boost" },
            { name: "Nova", color: 0xff44aa, desc: "Extra shield" },
            { name: "Bolt", color: 0xffcc00, desc: "Rapid fire" },
            { name: "Sage", color: 0x44ff88, desc: "Double XP" },
          ];

          this.selectedChar = 0;
          this.charCards = [];
          chars.forEach((c, i) => {
            const x = W / 2 - 180 + i * 120;
            const card = this.add
              .rectangle(x, 400, 100, 80, c.color, 0.15)
              .setStrokeStyle(2, c.color, 0.6)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(x, 385, c.name, {
                fontSize: "15px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.add
              .text(x, 408, c.desc, {
                fontSize: "11px",
                fontFamily: "Arial",
                color: "#aaa",
              })
              .setOrigin(0.5);
            card.on("pointerdown", () => {
              this.selectedChar = i;
              this.charCards.forEach((cc, j) => {
                cc.setStrokeStyle(
                  j === i ? 3 : 2,
                  chars[j].color,
                  j === i ? 1 : 0.4,
                );
                cc.setFillStyle(chars[j].color, j === i ? 0.3 : 0.1);
              });
              this.startBtn.setAlpha(1);
            });
            this.charCards.push(card);
          });
          this.charCards[0]
            .setStrokeStyle(3, chars[0].color, 1)
            .setFillStyle(chars[0].color, 0.3);

          // How-to-play hint
          this.add
            .text(
              W / 2,
              458,
              "Fly with WASD / Arrows / drag.  SHOOT the asteroid with the correct answer (Space / tap).",
              {
                fontSize: "12px",
                fontFamily: "Arial",
                color: "#9fc4e0",
                align: "center",
                wordWrap: { width: W - 80 },
              },
            )
            .setOrigin(0.5);

          // Start button
          this.startBtn = this.add
            .text(W / 2, 495, "[ LAUNCH MISSION ]", {
              fontSize: "22px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ffcc",
              padding: { x: 20, y: 10 },
              backgroundColor: "rgba(0,255,200,0.1)",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });

          this.startBtn.on("pointerover", () =>
            this.startBtn.setStyle({ backgroundColor: "rgba(0,255,200,0.25)" }),
          );
          this.startBtn.on("pointerout", () =>
            this.startBtn.setStyle({ backgroundColor: "rgba(0,255,200,0.1)" }),
          );
          this.startBtn.on("pointerdown", () => {
            AudioSys.init();
            this.scene.start("Game", { charIndex: this.selectedChar });
          });

          // Info chips
          const info = [
            "15 Missions",
            "3 Lives",
            "Combo Scoring",
            "Keyboard + Touch",
          ];
          info.forEach((t, i) => {
            this.add
              .text(W / 2 - 200 + i * 130, 550, t, {
                fontSize: "11px",
                fontFamily: "Arial",
                color: "#668899",
                padding: { x: 6, y: 3 },
                backgroundColor: "rgba(255,255,255,0.05)",
              })
              .setOrigin(0.5);
          });
        }
      }

      // ========= GAME SCENE =========
      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }

        init(data) {
          this.charIndex = data.charIndex || 0;
          this.score = 0;
          this.lives = 3;
          this.streak = 0;
          this.bestStreak = 0;
          this.combo = 1;
          this.level = 1;
          this.qIndex = 0;
          this.totalCorrect = 0;
          this.totalAnswered = 0;
          this.questionActive = false;
          this.shuffledQs = Phaser.Utils.Array.Shuffle([...QUESTIONS]);
        }

        create() {
          // Stars background
          this.starsBg = [];
          for (let i = 0; i < 80; i++) {
            const s = this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.FloatBetween(0.5, 1.5),
              0xffffff,
              Phaser.Math.FloatBetween(0.15, 0.6),
            );
            this.starsBg.push({
              obj: s,
              speed: Phaser.Math.FloatBetween(0.3, 1.2),
            });
          }

          // Ship
          this.ship = this.physics.add
            .image(W / 2, H - 60, "ship")
            .setCollideWorldBounds(true);
          this.ship.setDamping(true).setDrag(0.92).setMaxVelocity(350);

          // Groups
          this.bullets = this.physics.add.group({ maxSize: 20 });
          this.asteroids = this.physics.add.group();
          this.powerups = this.physics.add.group();
          this.explosionEmitters = [];

          // Particle manager
          this.sparkEmitter = this.add.particles(0, 0, "spark", {
            speed: { min: 80, max: 250 },
            angle: { min: 0, max: 360 },
            lifespan: 400,
            scale: { start: 1, end: 0 },
            alpha: { start: 1, end: 0 },
            blendMode: "ADD",
            emitting: false,
          });

          // Collision
          this.physics.add.overlap(
            this.bullets,
            this.asteroids,
            this.hitAsteroid,
            null,
            this,
          );
          this.physics.add.overlap(
            this.ship,
            this.powerups,
            this.collectPowerup,
            null,
            this,
          );
          this.physics.add.overlap(
            this.ship,
            this.asteroids,
            this.shipHit,
            null,
            this,
          );

          // Input
          this.cursors = this.input.keyboard.createCursorKeys();
          this.wasd = this.input.keyboard.addKeys("W,A,S,D");
          this.spaceKey = this.input.keyboard.addKey("SPACE");
          this.lastShot = 0;

          // Touch controls -- drag to fly, tap to shoot. Never gated.
          this.input.on("pointermove", (p) => {
            if (p.isDown) {
              this.ship.x = Phaser.Math.Clamp(p.x, 20, W - 20);
              this.ship.y = Phaser.Math.Clamp(p.y, H / 4, H - 20);
            }
          });
          this.input.on("pointerdown", (p) => {
            this.fireWeapon();
          });

          // HUD
          this.createHUD();

          // Screen shake camera
          this.cameras.main.setBackgroundColor(0x000011);

          // Brief countdown, then start first wave
          this.locked = true;
          this.showReady(() => this.spawnQuestionWave());
        }

        showReady(cb) {
          const txt = this.add
            .text(W / 2, H / 2, "GET READY", {
              fontSize: "40px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ffcc",
            })
            .setOrigin(0.5)
            .setDepth(300);
          this.tweens.add({
            targets: txt,
            scale: { from: 0.6, to: 1.1 },
            alpha: { from: 1, to: 0 },
            duration: 1100,
            onComplete: () => {
              txt.destroy();
              cb();
            },
          });
        }

        createHUD() {
          // Persistent question BANNER at the top of the play area.
          this.bannerBg = this.add
            .rectangle(W / 2, 54, W, 88, 0x06182e, 0.9)
            .setDepth(100);
          this.add.rectangle(W / 2, 98, W, 2, 0x00ccff, 0.5).setDepth(100);

          this.qScenarioText = this.add
            .text(W / 2, 30, "", {
              fontSize: "14px",
              fontFamily: "Arial",
              color: "#88ccff",
              wordWrap: { width: W - 40 },
              align: "center",
            })
            .setOrigin(0.5)
            .setDepth(101);

          this.qQuestionText = this.add
            .text(W / 2, 64, "", {
              fontSize: "20px",
              fontFamily: "Arial",
              fontStyle: "bold",
              color: "#ffffff",
              wordWrap: { width: W - 40 },
              align: "center",
            })
            .setOrigin(0.5)
            .setDepth(101);

          // Stats row just under the banner.
          const statY = 90;
          this.scoreText = this.add
            .text(10, statY, "SCORE: 0", {
              fontSize: "14px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
            })
            .setOrigin(0, 0.5)
            .setDepth(101);

          this.livesText = this.add
            .text(W - 10, statY, "", {
              fontSize: "16px",
              fontFamily: "monospace",
              color: "#ff4444",
            })
            .setOrigin(1, 0.5)
            .setDepth(101);
          this.updateLives();

          this.levelText = this.add
            .text(W / 2, statY, "LEVEL 1", {
              fontSize: "13px",
              fontFamily: "monospace",
              color: "#00ccff",
            })
            .setOrigin(0.5)
            .setDepth(101);

          this.streakText = this.add
            .text(W / 2 + 120, statY, "", {
              fontSize: "12px",
              fontFamily: "monospace",
              color: "#ff8800",
            })
            .setOrigin(0.5)
            .setDepth(101);

          this.comboText = this.add
            .text(W / 2 - 120, statY, "", {
              fontSize: "12px",
              fontFamily: "monospace",
              color: "#ffcc00",
            })
            .setOrigin(0.5)
            .setDepth(101);

          // Transient feedback toast (non-blocking).
          this.toastText = this.add
            .text(W / 2, H - 40, "", {
              fontSize: "15px",
              fontFamily: "Arial",
              fontStyle: "bold",
              color: "#88ff88",
              wordWrap: { width: W - 80 },
              align: "center",
              backgroundColor: "rgba(0,0,0,0.55)",
              padding: { x: 12, y: 6 },
            })
            .setOrigin(0.5)
            .setDepth(150)
            .setVisible(false);
        }

        showToast(msg, color) {
          if (this.toastTween) this.toastTween.stop();
          this.toastText
            .setText(msg)
            .setColor(color || "#88ff88")
            .setAlpha(1)
            .setVisible(true);
          this.toastTween = this.tweens.add({
            targets: this.toastText,
            alpha: { from: 1, to: 0 },
            delay: 1400,
            duration: 700,
            onComplete: () => this.toastText.setVisible(false),
          });
        }

        updateLives() {
          let h = "";
          for (let i = 0; i < 3; i++) h += i < this.lives ? "♥" : "♡";
          this.livesText.setText(h);
        }

        fireWeapon() {
          const now = this.time.now;
          if (now - this.lastShot < 200) return;
          this.lastShot = now;

          const b = this.bullets.get(this.ship.x, this.ship.y - 20, "bullet");
          if (b) {
            b.setActive(true).setVisible(true).setVelocityY(-500);
            b.body.setSize(4, 12);
            AudioSys.shoot();
          }
        }

        spawnQuestionWave() {
          if (this.qIndex >= this.shuffledQs.length) {
            this.scene.start("Results", {
              score: this.score,
              correct: this.totalCorrect,
              total: this.totalAnswered,
              bestStreak: this.bestStreak,
              level: this.level,
            });
            return;
          }

          const q = this.shuffledQs[this.qIndex];
          this.currentQuestion = q;
          this.questionActive = true;
          this.locked = false;

          // Update the persistent banner (no modal, gameplay continues).
          this.qScenarioText.setText(q.scenario);
          this.qQuestionText.setText(q.q);

          // Spawn one asteroid per choice, each LABELED with the answer text.
          // Difficulty scales speed & horizontal drift with the level.
          const slots = Phaser.Utils.Array.Shuffle([0, 1, 2, 3]);
          const baseY = -60;
          const speed = 28 + this.level * 12; // Lv1 ~40, Lv2 ~52, Lv3 ~64
          const drift = 10 + this.level * 6;

          this.currentAsteroids = [];
          q.choices.forEach((choice, i) => {
            const slot = slots[i];
            const x = 110 + slot * ((W - 220) / 3);
            const y = baseY - i * 70;
            const ast = this.asteroids.create(x, y, "asteroid");
            ast.setScale(1.25); // large tap target
            ast.body.setCircle(24);
            ast.setVelocityY(Phaser.Math.Between(speed, speed + 18));
            ast.setVelocityX(Phaser.Math.Between(-drift, drift));
            ast.choiceIndex = i;
            ast.isCorrect = i === q.answer;

            // Answer label rides on the asteroid.
            const label = this.add
              .text(x, y, choice, {
                fontSize: "17px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: "#ffffff",
                stroke: "#000000",
                strokeThickness: 3,
              })
              .setOrigin(0.5)
              .setDepth(50);
            ast.label = label;
            this.currentAsteroids.push(ast);
          });

          this.totalAnswered++;
        }

        // Called from hitAsteroid: a bullet hit an answer asteroid.
        resolveAnswer(asteroid) {
          if (!this.questionActive) return;
          const q = this.currentQuestion;
          const correct = !!asteroid.isCorrect;

          if (correct) {
            this.questionActive = false; // lock this question, advance
            this.totalCorrect++;
            this.streak++;
            if (this.streak > this.bestStreak) this.bestStreak = this.streak;
            this.combo = Math.min(4, 1 + Math.floor(this.streak / 3));
            const pts = 100 * this.combo;
            this.score += pts;
            AudioSys.correct();
            this.cameras.main.flash(160, 0, 90, 0);

            this.createExplosion(asteroid.x, asteroid.y);
            const px = asteroid.x,
              py = asteroid.y;
            if (asteroid.label) asteroid.label.destroy();
            asteroid.destroy();

            const pop = this.add
              .text(
                px,
                py,
                "+" + pts + (this.combo > 1 ? " x" + this.combo : ""),
                {
                  fontSize: "26px",
                  fontFamily: "monospace",
                  fontStyle: "bold",
                  color: "#00ff88",
                },
              )
              .setOrigin(0.5)
              .setDepth(300);
            this.tweens.add({
              targets: pop,
              y: pop.y - 60,
              alpha: 0,
              duration: 1100,
              onComplete: () => pop.destroy(),
            });

            this.showToast("Correct!  " + q.explain, "#88ff88");
            this.updateStats();
            this.endQuestion(true);
          } else {
            // Wrong answer: lose a life, explode that asteroid, keep playing.
            this.streak = 0;
            this.combo = 1;
            this.lives--;
            AudioSys.wrong();
            this.cameras.main.shake(250, 0.012);
            this.createExplosion(asteroid.x, asteroid.y);
            if (asteroid.label) asteroid.label.destroy();
            asteroid.destroy();
            this.currentAsteroids = this.currentAsteroids.filter(
              (a) => a !== asteroid,
            );
            this.showToast("Not that one -- try again!", "#ff6666");
            this.updateLives();
            this.updateStats();

            if (this.lives <= 0) {
              this.questionActive = false;
              this.locked = true;
              this.time.delayedCall(900, () => this.gotoResults());
            }
          }
        }

        updateStats() {
          this.scoreText.setText("SCORE: " + this.score);
          this.streakText.setText(
            this.streak >= 2 ? "STREAK x" + this.streak : "",
          );
          this.comboText.setText(this.combo > 1 ? "COMBO x" + this.combo : "");
        }

        gotoResults() {
          this.scene.start("Results", {
            score: this.score,
            correct: this.totalCorrect,
            total: this.totalAnswered,
            bestStreak: this.bestStreak,
            level: this.level,
          });
        }

        // Clear any leftover answer asteroids and queue the next question.
        endQuestion(advance) {
          this.locked = true;
          this.time.delayedCall(700, () => {
            this.currentAsteroids.forEach((a) => {
              if (a && a.active) {
                if (a.label) a.label.destroy();
                a.destroy();
              }
            });
            this.currentAsteroids = [];
            if (!advance) return;
            this.qIndex++;
            if (this.qIndex < this.shuffledQs.length && this.qIndex % 5 === 0) {
              this.level++;
              this.levelText.setText("LEVEL " + this.level);
              AudioSys.levelUp();
              this.showLevelUp();
            } else {
              this.time.delayedCall(500, () => this.spawnQuestionWave());
            }
          });
        }

        showLevelUp() {
          const bg = this.add
            .rectangle(W / 2, H / 2, 400, 120, 0x001133, 0.95)
            .setStrokeStyle(3, 0xffcc00, 0.8)
            .setDepth(300);
          const txt = this.add
            .text(W / 2, H / 2 - 15, "LEVEL " + this.level, {
              fontSize: "36px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
            })
            .setOrigin(0.5)
            .setDepth(301);
          const sub = this.add
            .text(W / 2, H / 2 + 25, "Asteroids get faster!", {
              fontSize: "14px",
              fontFamily: "Arial",
              color: "#88aacc",
            })
            .setOrigin(0.5)
            .setDepth(301);

          this.time.delayedCall(1800, () => {
            bg.destroy();
            txt.destroy();
            sub.destroy();
            this.spawnQuestionWave();
          });

          // Spawn powerup sometimes
          if (Math.random() < 0.5) {
            const pu = this.powerups.create(
              Phaser.Math.Between(100, W - 100),
              -30,
              "powerup",
            );
            pu.setVelocityY(80);
          }
        }

        createExplosion(x, y) {
          this.sparkEmitter.emitParticleAt(x, y, 20);
          AudioSys.explode();
        }

        hitAsteroid(bullet, asteroid) {
          if (!asteroid.active) return;
          bullet.setActive(false).setVisible(false).setVelocity(0);
          AudioSys.hit();
          // The math is solved BY shooting: resolve correctness here.
          this.resolveAnswer(asteroid);
        }

        collectPowerup(ship, powerup) {
          powerup.destroy();
          if (this.lives < 3) {
            this.lives++;
            this.updateLives();
          }
          this.score += 50;
          this.updateStats();
          AudioSys.correct();

          const pop = this.add
            .text(ship.x, ship.y - 30, "+1 LIFE", {
              fontSize: "16px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ff88",
            })
            .setOrigin(0.5)
            .setDepth(300);
          this.tweens.add({
            targets: pop,
            y: pop.y - 40,
            alpha: 0,
            duration: 1000,
            onComplete: () => pop.destroy(),
          });
        }

        shipHit(ship, asteroid) {
          // Ship crashing into an answer asteroid: same as picking it.
          this.resolveAnswer(asteroid);
        }

        update() {
          // Scroll stars
          this.starsBg.forEach((s) => {
            s.obj.y += s.speed;
            if (s.obj.y > H + 5) {
              s.obj.y = -5;
              s.obj.x = Phaser.Math.Between(0, W);
            }
          });

          // Ship movement -- always responsive (never gated by a modal).
          const spd = 300;
          if (this.cursors.left.isDown || this.wasd.A.isDown)
            this.ship.setVelocityX(-spd);
          else if (this.cursors.right.isDown || this.wasd.D.isDown)
            this.ship.setVelocityX(spd);

          if (this.cursors.up.isDown || this.wasd.W.isDown)
            this.ship.setVelocityY(-spd);
          else if (this.cursors.down.isDown || this.wasd.S.isDown)
            this.ship.setVelocityY(spd);

          // Fire with space
          if (this.spaceKey.isDown) this.fireWeapon();

          // Keep labels glued to asteroids; handle off-screen escapes.
          this.asteroids.children.iterate((ast) => {
            if (!ast) return;
            if (ast.active && ast.label) ast.label.setPosition(ast.x, ast.y);
            if (ast.active && ast.y > H + 50) {
              // If the CORRECT answer escaped, it's a miss: lose a life.
              const wasCorrect = ast.isCorrect && this.questionActive;
              if (ast.label) ast.label.destroy();
              ast.destroy();
              if (wasCorrect) {
                this.questionActive = false;
                this.streak = 0;
                this.combo = 1;
                this.lives--;
                AudioSys.wrong();
                this.cameras.main.shake(250, 0.012);
                this.showToast(
                  "Missed it!  " + this.currentQuestion.explain,
                  "#ffaa44",
                );
                this.updateLives();
                this.updateStats();
                if (this.lives <= 0) {
                  this.locked = true;
                  this.time.delayedCall(900, () => this.gotoResults());
                } else {
                  this.endQuestion(true);
                }
              }
            }
          });

          // Remove bullets off screen
          this.bullets.children.iterate((b) => {
            if (b && b.active && b.y < -10)
              b.setActive(false).setVisible(false);
          });
        }
      }

      // ========= RESULTS SCENE =========
      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }

        init(data) {
          this.finalScore = data.score || 0;
          this.correct = data.correct || 0;
          this.total = data.total || 0;
          this.bestStreak = data.bestStreak || 0;
          this.level = data.level || 1;
        }

        create() {
          // Stars
          for (let i = 0; i < 80; i++) {
            this.add.circle(
              Phaser.Math.Between(0, W),
              Phaser.Math.Between(0, H),
              Phaser.Math.FloatBetween(0.5, 1.5),
              0xffffff,
              Phaser.Math.FloatBetween(0.2, 0.6),
            );
          }

          const pct =
            this.total > 0 ? Math.round((this.correct / this.total) * 100) : 0;
          let grade, gradeColor;
          if (pct >= 90) {
            grade = "S RANK - MASTER!";
            gradeColor = "#ffcc00";
          } else if (pct >= 80) {
            grade = "A RANK - EXCELLENT!";
            gradeColor = "#00ff88";
          } else if (pct >= 70) {
            grade = "B RANK - GREAT!";
            gradeColor = "#00ccff";
          } else if (pct >= 60) {
            grade = "C RANK - GOOD TRY!";
            gradeColor = "#ff8800";
          } else {
            grade = "KEEP PRACTICING!";
            gradeColor = "#ff4444";
          }

          this.add
            .text(W / 2, 60, "MISSION COMPLETE", {
              fontSize: "40px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
              stroke: "#664400",
              strokeThickness: 3,
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 120, grade, {
              fontSize: "22px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: gradeColor,
            })
            .setOrigin(0.5);

          // Score
          this.add
            .text(W / 2, 180, String(this.finalScore), {
              fontSize: "64px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#ffcc00",
            })
            .setOrigin(0.5);

          this.add
            .text(W / 2, 220, "POINTS", {
              fontSize: "14px",
              fontFamily: "monospace",
              color: "#888",
            })
            .setOrigin(0.5);

          // Stats
          const stats = [
            { label: "Correct", val: this.correct + "/" + this.total },
            { label: "Accuracy", val: pct + "%" },
            { label: "Best Streak", val: String(this.bestStreak) },
            { label: "Final Level", val: String(this.level) },
          ];

          stats.forEach((s, i) => {
            const x = W / 2 - 180 + i * 120;
            this.add
              .rectangle(x, 310, 105, 70, 0x112233, 0.8)
              .setStrokeStyle(1, 0x336699, 0.5);
            this.add
              .text(x, 295, s.val, {
                fontSize: "24px",
                fontFamily: "monospace",
                fontStyle: "bold",
                color: "#00ccff",
              })
              .setOrigin(0.5);
            this.add
              .text(x, 325, s.label, {
                fontSize: "11px",
                fontFamily: "Arial",
                color: "#888",
              })
              .setOrigin(0.5);
          });

          // Play Again
          const btn = this.add
            .text(W / 2, 420, "[ PLAY AGAIN ]", {
              fontSize: "22px",
              fontFamily: "monospace",
              fontStyle: "bold",
              color: "#00ffcc",
              padding: { x: 24, y: 12 },
              backgroundColor: "rgba(0,255,200,0.1)",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });

          btn.on("pointerover", () =>
            btn.setStyle({ backgroundColor: "rgba(0,255,200,0.25)" }),
          );
          btn.on("pointerout", () =>
            btn.setStyle({ backgroundColor: "rgba(0,255,200,0.1)" }),
          );
          btn.on("pointerdown", () => this.scene.start("Title"));

          // Standard reference
          this.add
            .text(
              W / 2,
              500,
              "6.EE.C.9 -- Dependent & Independent Variables, Tables, Equations",
              {
                fontSize: "12px",
                fontFamily: "Arial",
                color: "#556677",
              },
            )
            .setOrigin(0.5);
        }
      }

      // ========= CONFIG =========
      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: "game-container",
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        physics: {
          default: "arcade",
          arcade: { gravity: { y: 0 }, debug: false },
        },
        scene: [BootScene, TitleScene, GameScene, ResultsScene],
        backgroundColor: "#000011",
      };

      const game = new Phaser.Game(config);
    </script>
      <script src="/assets/nt-page-enhance.js" defer></script>
  </body>
