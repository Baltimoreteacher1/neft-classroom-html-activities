<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="1.5; url=/expressions-equations/ind-dep-variables/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to corrected path...</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/shared.css">

  <style>
    :root {
      --bg: #0b0f19;
      --teal: #10b981;
      --text: #e2e8f0;
    }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .redirect-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 20px;
      padding: 32px;
      text-align: center;
      max-width: 440px;
      width: 90vw;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 1.4rem;
      margin: 0 0 12px 0;
      color: #fff;
    }

    p {
      color: #94a3b8;
      font-size: 0.95rem;
      margin: 0 0 24px 0;
      line-height: 1.5;
    }

    .loader {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(16, 185, 129, 0.2);
      border-radius: 50%;
      border-top-color: var(--teal);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 16px;
    }

    .manual-link {
      color: var(--teal);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
      border-bottom: 1.5px dashed var(--teal);
      padding-bottom: 1px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="redirect-box">
    <div class="loader"></div>
    <h1>Redirecting to Card sorting...</h1>
    <p>We detected an old spelling route (<em>ind-dep-varaibles</em>) and are safely forwarding you to the active, corrected variable sorting studio.</p>
    <a class="manual-link" href="/expressions-equations/ind-dep-variables/">Click here if not redirected automatically</a>
  </div>
</body>
</html>
