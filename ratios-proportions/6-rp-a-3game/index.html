<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Mall Tycoon — 6.RP.A.3</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<script>
  // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror
  // (document.write blocks parsing so the mirror is ready before the game script runs).
  if (typeof Phaser === "undefined") {
    document.write('<script src="https://unpkg.com/phaser@3.80.1/dist/phaser.min.js"><\/script>');
  }
  // If both CDNs are unreachable, show a clear message instead of a blank page.
  window.addEventListener("load", function () {
    if (typeof Phaser === "undefined") {
      document.body.innerHTML =
        '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">\u26a0\ufe0f This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
    }
  });
</script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0608;
        overflow: hidden;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script>
      (() => {
        const W = 1024,
          H = 768;

        // Audio
        const AC = window.AudioContext || window.webkitAudioContext;
        let actx = null;
        function au() {
          if (!actx) actx = new AC();
          if (actx.state === "suspended") actx.resume();
        }
        function bip(f, d, t = "sine", v = 0.14) {
          if (!actx) return;
          const o = actx.createOscillator(),
            g = actx.createGain();
          o.connect(g);
          g.connect(actx.destination);
          o.frequency.value = f;
          o.type = t;
          g.gain.setValueAtTime(v, actx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + d);
          o.start();
          o.stop(actx.currentTime + d);
        }
        function sfxOk() {
          bip(523, 0.08);
          setTimeout(() => bip(659, 0.08), 80);
          setTimeout(() => bip(784, 0.15), 160);
        }
        function sfxNo() {
          bip(180, 0.25, "square", 0.1);
        }
        function sfxCl() {
          bip(440, 0.05, "sine", 0.08);
        }
        function sfxLv() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => bip(f, 0.12), i * 90),
          );
        }
        function sfxCoin() {
          bip(1200, 0.06, "triangle", 0.1);
          setTimeout(() => bip(1400, 0.06, "triangle", 0.08), 60);
        }

        const COL = {
          bg: 0x0a0608,
          panel: 0x1e1018,
          gold: 0xd4a017,
          ruby: 0xc0392b,
          emerald: 0x1a6b3c,
          sapphire: 0x1a3a6b,
          amethyst: 0x6b2d8b,
          parch: 0xf5e6c8,
          dim: 0x9a8070,
          white: 0xffffff,
          dark: 0x130c10,
        };

        function shuffle(a) {
          const b = [...a];
          for (let i = b.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [b[i], b[j]] = [b[j], b[i]];
          }
          return b;
        }

        // Question generators for 6.RP.A.3
        function genQuestions() {
          const qs = [];

          // Equivalent ratios
          function eqRatio() {
            const a = 2 + Math.floor(Math.random() * 6),
              b = 2 + Math.floor(Math.random() * 6);
            const m = 2 + Math.floor(Math.random() * 4);
            const correct = `${a * m}:${b * m}`;
            const wrong = [
              `${a * m}:${b * (m + 1)}`,
              `${a * (m - 1)}:${b * m}`,
              `${a + m}:${b + m}`,
            ];
            return {
              zone: "RATIOS",
              icon: "\u{2696}",
              text: `A store mixes gift bags with ${a} chocolates and ${b} candies. Which ratio is equivalent to ${a}:${b}?`,
              correct,
              choices: shuffle([correct, ...wrong]),
              hint: `Multiply both by ${m}`,
              explain: `${a}×${m}=${a * m}, ${b}×${m}=${b * m} → ${correct}`,
            };
          }

          // Simplify ratio
          function simpRatio() {
            const g = 2 + Math.floor(Math.random() * 4);
            const a = (1 + Math.floor(Math.random() * 5)) * g,
              b = (1 + Math.floor(Math.random() * 5)) * g;
            if (a === b) return simpRatio();
            const correct = `${a / g}:${b / g}`;
            const wrong = [
              `${a}:${b}`,
              `${b / g}:${a / g}`,
              `${a / g + 1}:${b / g}`,
            ];
            return {
              zone: "RATIOS",
              icon: "\u{2696}",
              text: `A sale sign shows ${a} red tags to ${b} blue tags. Simplify the ratio.`,
              correct,
              choices: shuffle([correct, ...wrong]),
              hint: `GCF of ${a} and ${b} is ${g}`,
              explain: `${a}÷${g}=${a / g}, ${b}÷${g}=${b / g} → ${correct}`,
            };
          }

          // Unit rate / best buy
          function bestBuy() {
            const pA = 2 + Math.floor(Math.random() * 6),
              cA = 150 + Math.floor(Math.random() * 20) * 25;
            const pB = pA + 2 + Math.floor(Math.random() * 4),
              cB = (cA * pB) / pA + Math.floor(Math.random() * 50) - 25;
            const unitA = +(cA / pA / 100).toFixed(2),
              unitB = +(cB / pB / 100).toFixed(2);
            const better = unitA <= unitB ? "Pack A" : "Pack B";
            const betterUnit = unitA <= unitB ? unitA : unitB;
            const wrong = [
              unitA <= unitB ? "Pack B" : "Pack A",
              `They cost the same`,
              `Not enough info`,
            ];
            return {
              zone: "UNIT RATES",
              icon: "\u{1F6D2}",
              text: `Pack A: ${pA} items for $${(cA / 100).toFixed(2)}. Pack B: ${pB} items for $${(cB / 100).toFixed(2)}. Which is the better buy?`,
              correct: better,
              choices: shuffle([better, ...wrong]),
              hint: `Find unit price: divide total cost by number of items`,
              explain: `A: $${unitA}/item. B: $${unitB}/item. ${better} wins at $${betterUnit}/item`,
            };
          }

          // Percent of a number
          function pctOf() {
            const whole = [40, 50, 60, 80, 100, 120, 150, 200, 250, 300][
              Math.floor(Math.random() * 10)
            ];
            const pct = [10, 15, 20, 25, 30, 40, 50, 60, 75][
              Math.floor(Math.random() * 9)
            ];
            const ans = (whole * pct) / 100;
            const correct = String(ans);
            const wrong = [
              String(whole - ans),
              String(Math.round(ans * 1.5)),
              String(Math.round(ans * 0.5)),
            ];
            return {
              zone: "PERCENTS",
              icon: "\u{1F4B0}",
              text: `A $${whole} jacket is ${pct}% off. How much is the discount?`,
              correct: "$" + correct,
              choices: shuffle(["$" + correct, ...wrong.map((w) => "$" + w)]),
              hint: `${pct}% of ${whole} = ${whole} × ${pct}/100`,
              explain: `${whole} × ${pct / 100} = $${ans} discount`,
            };
          }

          // Sale price after discount
          function salePrice() {
            const price = [40, 50, 60, 80, 100, 120][
              Math.floor(Math.random() * 6)
            ];
            const pct = [10, 15, 20, 25, 30][Math.floor(Math.random() * 5)];
            const disc = (price * pct) / 100;
            const sale = price - disc;
            const correct = "$" + sale;
            const wrong = [
              "$" + (price - disc * 2),
              "$" + (sale + disc / 2),
              "$" + disc,
            ];
            return {
              zone: "PERCENTS",
              icon: "\u{1F3F7}",
              text: `Shoes cost $${price}. The mall has a ${pct}% sale. What is the sale price?`,
              correct,
              choices: shuffle([correct, ...wrong]),
              hint: `Discount = $${price} × ${pct}% = $${disc}. Then subtract.`,
              explain: `$${price} − $${disc} = ${correct}`,
            };
          }

          // Tax calculation
          function taxCalc() {
            const price = [20, 30, 40, 50, 60, 80][
              Math.floor(Math.random() * 6)
            ];
            const taxPct = [5, 6, 7, 8, 10][Math.floor(Math.random() * 5)];
            const tax = +((price * taxPct) / 100).toFixed(2);
            const total = +(price + tax).toFixed(2);
            const correct = "$" + total.toFixed(2);
            const wrong = [
              "$" + (price - tax).toFixed(2),
              "$" + tax.toFixed(2),
              "$" + (total + tax).toFixed(2),
            ];
            return {
              zone: "PERCENTS",
              icon: "\u{1F4B3}",
              text: `An item costs $${price}. Tax is ${taxPct}%. What is the total with tax?`,
              correct,
              choices: shuffle([correct, ...wrong]),
              hint: `Tax = $${price} × ${taxPct}% = $${tax}. Add to price.`,
              explain: `$${price} + $${tax} = ${correct}`,
            };
          }

          // Proportion / scaling
          function proportion() {
            const a = 2 + Math.floor(Math.random() * 5),
              b = 3 + Math.floor(Math.random() * 6);
            const m = 2 + Math.floor(Math.random() * 5);
            const scaled = b * m;
            const ans = a * m;
            const correct = String(ans);
            const wrong = [String(ans + a), String(ans - a), String(a + m)];
            return {
              zone: "PROPORTIONS",
              icon: "\u{1F4CA}",
              text: `A store sells ${a} shirts for every ${b} customers. If ${scaled} customers come, how many shirts are sold?`,
              correct,
              choices: shuffle([correct, ...wrong]),
              hint: `${scaled} ÷ ${b} = ${m}. Multiply ${a} × ${m}`,
              explain: `${scaled}÷${b}=${m} groups. ${a}×${m}=${ans} shirts`,
            };
          }

          // Map/conversion scale
          function mapScale() {
            const scale = 5 + Math.floor(Math.random() * 10) * 5;
            const inches = 2 + Math.floor(Math.random() * 8);
            const real = scale * inches;
            const correct = real + " miles";
            const wrong = [
              real + scale + " miles",
              real - scale + " miles",
              inches + " miles",
            ];
            return {
              zone: "PROPORTIONS",
              icon: "\u{1F5FA}",
              text: `A mall map: 1 inch = ${scale} miles. Two stores are ${inches} inches apart. Real distance?`,
              correct,
              choices: shuffle([correct, ...wrong]),
              hint: `${inches} inches × ${scale} miles/inch`,
              explain: `${inches} × ${scale} = ${real} miles`,
            };
          }

          const gens = [
            eqRatio,
            simpRatio,
            bestBuy,
            pctOf,
            salePrice,
            taxCalc,
            proportion,
            mapScale,
          ];
          for (let i = 0; i < 24; i++) qs.push(gens[i % gens.length]());
          return shuffle(qs);
        }

        // ─── TITLE SCENE ───
        class TitleScene extends Phaser.Scene {
          constructor() {
            super("TitleScene");
          }
          create() {
            this.cameras.main.setBackgroundColor(COL.bg).fadeIn(500);

            // Subtle texture
            const gfx = this.add.graphics();
            gfx.lineStyle(1, COL.gold, 0.02);
            for (let x = 0; x < W; x += 60) gfx.lineBetween(x, 0, x, H);
            for (let y = 0; y < H; y += 60) gfx.lineBetween(0, y, W, y);

            this.add
              .text(W / 2, 100, "\u{1F3EC}", { fontSize: "72px" })
              .setOrigin(0.5);
            const title = this.add
              .text(W / 2, 185, "SHOPPING MALL\nTYCOON", {
                fontSize: "52px",
                fontFamily: "Arial Black",
                color: "#d4a017",
                stroke: "#000",
                strokeThickness: 5,
                align: "center",
                lineSpacing: 4,
              })
              .setOrigin(0.5);
            this.tweens.add({
              targets: title,
              y: 180,
              duration: 2500,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut",
            });

            this.add
              .text(W / 2, 275, "6.RP.A.3 — Ratio & Rate Reasoning", {
                fontSize: "16px",
                color: "#9a8070",
              })
              .setOrigin(0.5);
            this.add
              .text(
                W / 2,
                300,
                "Run your store: discounts, percentages, tax, and proportions!",
                {
                  fontSize: "14px",
                  color: "#6b5b50",
                },
              )
              .setOrigin(0.5);

            // Store type selection
            const stores = [
              { name: "Boutique", icon: "\u{1F457}", desc: "Fashion & style" },
              {
                name: "Electronics",
                icon: "\u{1F4F1}",
                desc: "Gadgets & gear",
              },
              { name: "Bakery", icon: "\u{1F370}", desc: "Sweets & treats" },
              { name: "Sports", icon: "\u{26BD}", desc: "Athletic gear" },
            ];
            this.sel = 0;
            this.cards = [];
            stores.forEach((s, i) => {
              const x = 162 + i * 225,
                y = 430;
              const card = this.add
                .rectangle(x, y, 190, 160, COL.panel)
                .setStrokeStyle(3, i === 0 ? COL.gold : 0x3a2030)
                .setInteractive({ useHandCursor: true });
              this.add
                .text(x, y - 40, s.icon, { fontSize: "42px" })
                .setOrigin(0.5);
              this.add
                .text(x, y + 10, s.name, {
                  fontSize: "16px",
                  color: "#f5e6c8",
                  fontStyle: "bold",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 34, s.desc, { fontSize: "12px", color: "#9a8070" })
                .setOrigin(0.5);
              card.on("pointerdown", () => {
                au();
                sfxCl();
                this.sel = i;
                this.cards.forEach((c, j) =>
                  c.setStrokeStyle(3, j === i ? COL.gold : 0x3a2030),
                );
              });
              this.cards.push(card);
            });

            const btn = this.add
              .rectangle(W / 2, 580, 280, 56, COL.gold)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2, 580, "OPEN STORE", {
                fontSize: "22px",
                fontFamily: "Arial Black",
                color: "#0a0608",
              })
              .setOrigin(0.5);
            btn.on("pointerdown", () => {
              au();
              sfxCl();
              this.cameras.main.fadeOut(400);
              this.time.delayedCall(400, () =>
                this.scene.start("GameScene", { store: stores[this.sel] }),
              );
            });
            btn.on("pointerover", () => btn.setScale(1.05));
            btn.on("pointerout", () => btn.setScale(1));

            // Features
            const feats = [
              "5 Zones",
              "3 Life Crystals",
              "\u{1F525} Streak Bonus",
              "\u{1F3C6} Tycoon Rank",
            ];
            feats.forEach((f, i) => {
              this.add
                .text(112 + i * 240, 660, f, {
                  fontSize: "12px",
                  color: "#6b5b50",
                  backgroundColor: "#1e1018",
                  padding: { x: 10, y: 5 },
                })
                .setOrigin(0.5);
            });
          }
        }

        // ─── GAME SCENE ───
        class GameScene extends Phaser.Scene {
          constructor() {
            super("GameScene");
          }
          init(d) {
            this.store = d.store;
          }

          create() {
            this.cameras.main.setBackgroundColor(COL.bg).fadeIn(400);

            this.questions = genQuestions();
            this.qIdx = 0;
            this.score = 0;
            this.streak = 0;
            this.bestStreak = 0;
            this.correct = 0;
            this.total = 0;
            this.lives = 3;
            this.answered = false;
            this.attempts = 0;
            this.gold = 0;
            this.level = 1;
            this.timeLeft = 35;
            this.customersServed = 0;

            // BG
            this.add.rectangle(W / 2, H / 2, W, H, COL.dark);
            const gfx = this.add.graphics();
            gfx.lineStyle(1, COL.gold, 0.015);
            for (let x = 0; x < W; x += 50) gfx.lineBetween(x, 0, x, H);
            for (let y = 0; y < H; y += 50) gfx.lineBetween(0, y, W, y);

            // HUD
            this.add.rectangle(W / 2, 28, W, 56, COL.bg, 0.96);
            this.add.rectangle(W / 2, 56, W, 2, COL.gold, 0.2);
            this.hudGold = this.add.text(30, 10, "\u{1F4B0} 0 Gold", {
              fontSize: "16px",
              fontFamily: "Arial Black",
              color: "#d4a017",
            });
            this.hudZone = this.add
              .text(W / 2, 10, "", {
                fontSize: "11px",
                color: "#9a8070",
                letterSpacing: 2,
              })
              .setOrigin(0.5, 0);
            this.hudHP = this.add.text(W - 160, 8, "", {
              fontSize: "14px",
              color: "#c0392b",
            });
            this.hudStreak = this.add
              .text(W / 2, 32, "", { fontSize: "13px", color: "#d4a017" })
              .setOrigin(0.5, 0);
            this.hudTimer = this.add.text(W - 60, 14, "35s", {
              fontSize: "14px",
              color: "#d4a017",
            });
            this.hudQ = this.add.text(200, 14, "", {
              fontSize: "12px",
              color: "#6b5b50",
            });

            // Store front
            this.add
              .text(W / 2, 85, this.store.icon, { fontSize: "48px" })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 120, this.store.name.toUpperCase() + " STORE", {
                fontSize: "16px",
                fontFamily: "Arial Black",
                color: "#d4a017",
              })
              .setOrigin(0.5);

            // Customer queue
            this.custEmoji = [
              "\u{1F466}",
              "\u{1F467}",
              "\u{1F468}",
              "\u{1F469}",
              "\u{1F475}",
              "\u{1F474}",
              "\u{1F9D1}",
              "\u{1F471}",
            ];
            this.custSprite = this.add
              .text(100, 85, "", { fontSize: "36px" })
              .setOrigin(0.5)
              .setAlpha(0);

            // Question area
            this.qCard = this.add
              .rectangle(W / 2, 340, 720, 260, COL.panel)
              .setStrokeStyle(1, 0x3a2030);
            // gradient top line
            this.add.rectangle(W / 2, 211, 720, 3, COL.gold, 0.3);

            this.qZone = this.add
              .text(W / 2, 225, "", {
                fontSize: "11px",
                color: "#d4a017",
                letterSpacing: 2,
              })
              .setOrigin(0.5);
            this.qText = this.add
              .text(W / 2, 275, "", {
                fontSize: "17px",
                color: "#f5e6c8",
                fontStyle: "bold",
                wordWrap: { width: 660 },
                align: "center",
                lineSpacing: 4,
              })
              .setOrigin(0.5);

            // Choices
            this.btns = [];
            this.btnTxts = [];
            for (let i = 0; i < 4; i++) {
              const col = i % 2,
                row = Math.floor(i / 2);
              const x = W / 2 - 170 + col * 340,
                y = 350 + row * 58;
              const btn = this.add
                .rectangle(x, y, 320, 48, 0x1e1018)
                .setStrokeStyle(2, 0x3a2030)
                .setInteractive({ useHandCursor: true });
              const txt = this.add
                .text(x, y, "", {
                  fontSize: "15px",
                  color: "#f5e6c8",
                  fontStyle: "bold",
                })
                .setOrigin(0.5);
              btn.on("pointerdown", () => this.pick(i));
              btn.on("pointerover", () => {
                if (!this.answered) btn.setStrokeStyle(2, COL.gold);
              });
              btn.on("pointerout", () => {
                if (!this.answered) btn.setStrokeStyle(2, 0x3a2030);
              });
              this.btns.push(btn);
              this.btnTxts.push(txt);
            }

            // Hint
            this.hintBg = this.add
              .rectangle(W / 2, 498, 600, 36, 0x2a2000, 0.8)
              .setAlpha(0);
            this.hintTxt = this.add
              .text(W / 2, 498, "", { fontSize: "13px", color: "#d4a017" })
              .setOrigin(0.5)
              .setAlpha(0);

            // Feedback
            this.fbBg = this.add
              .rectangle(W / 2, 545, 720, 44, COL.panel)
              .setAlpha(0);
            this.fbTxt = this.add
              .text(W / 2, 545, "", {
                fontSize: "14px",
                color: "#f5e6c8",
                wordWrap: { width: 680 },
                align: "center",
              })
              .setOrigin(0.5)
              .setAlpha(0);

            // Next
            this.nxtBtn = this.add
              .rectangle(W / 2, 610, 220, 46, COL.gold)
              .setInteractive({ useHandCursor: true })
              .setAlpha(0);
            this.nxtTxt = this.add
              .text(W / 2, 610, "NEXT CUSTOMER >", {
                fontSize: "14px",
                fontFamily: "Arial Black",
                color: "#0a0608",
              })
              .setOrigin(0.5)
              .setAlpha(0);
            this.nxtBtn.on("pointerdown", () => {
              if (this.answered) this.nextQ();
            });

            // Timer
            this.timerEvt = this.time.addEvent({
              delay: 1000,
              callback: this.tick,
              callbackScope: this,
              loop: true,
            });

            // Keys
            this.input.keyboard.on("keydown", (e) => {
              if (e.key === "1" || e.key === "a") this.pick(0);
              if (e.key === "2" || e.key === "b") this.pick(1);
              if (e.key === "3" || e.key === "c") this.pick(2);
              if (e.key === "4" || e.key === "d") this.pick(3);
              if (e.key === "Enter" && this.answered) this.nextQ();
            });

            this.loadQ();
          }

          tick() {
            if (this.answered || this.timeLeft <= 0) return;
            this.timeLeft--;
            this.hudTimer.setText(this.timeLeft + "s");
            if (this.timeLeft <= 5 && this.timeLeft > 0) {
              bip(300, 0.04, "square", 0.03);
              this.hudTimer.setColor("#ff4444");
            }
            if (this.timeLeft <= 0) {
              this.answered = true;
              sfxNo();
              this.streak = 0;
              this.lives--;
              this.showFB(false);
              this.cameras.main.shake(200, 0.01);
              this.updateHUD();
              if (this.lives <= 0)
                this.time.delayedCall(1500, () => this.endGame());
            }
          }

          loadQ() {
            if (this.qIdx >= this.questions.length)
              this.questions.push(...genQuestions());
            const q = this.questions[this.qIdx];
            this.answered = false;
            this.attempts = 0;
            this.timeLeft = 35;
            this.hudTimer.setColor("#d4a017");

            // Customer walks in
            const ce =
              this.custEmoji[Math.floor(Math.random() * this.custEmoji.length)];
            this.custSprite.setText(ce).setX(-30);
            this.tweens.add({
              targets: this.custSprite,
              x: 100,
              alpha: 1,
              duration: 400,
              ease: "Back.easeOut",
            });

            this.qZone.setText(q.icon + " " + q.zone);
            this.qText.setText(q.text);

            q.choices.forEach((c, i) => {
              this.btnTxts[i].setText(String.fromCharCode(65 + i) + ". " + c);
              this.btns[i].fillColor = 0x1e1018;
              this.btns[i].setStrokeStyle(2, 0x3a2030);
              this.btns[i].setAlpha(1);
              this.btnTxts[i].setAlpha(1);
              this.btns[i].setInteractive();
            });

            this.hintBg.setAlpha(0);
            this.hintTxt.setAlpha(0);
            this.fbBg.setAlpha(0);
            this.fbTxt.setAlpha(0);
            this.nxtBtn.setAlpha(0);
            this.nxtTxt.setAlpha(0);
            this.updateHUD();
          }

          pick(i) {
            if (this.answered) return;
            au();
            const q = this.questions[this.qIdx];
            const chosen = q.choices[i];

            if (chosen === q.correct) {
              this.answered = true;
              sfxOk();
              sfxCoin();
              this.correct++;
              this.total++;
              this.streak++;
              this.customersServed++;
              if (this.streak > this.bestStreak) this.bestStreak = this.streak;
              const combo = Math.min(5, 1 + Math.floor(this.streak / 3));
              const bonus = this.streak >= 2 ? 40 : 0;
              const earned =
                (100 + bonus + (this.attempts === 0 ? 50 : 0)) * combo;
              this.gold += earned;
              this.score += earned;
              if (this.correct % 5 === 0) {
                this.level++;
                sfxLv();
              }

              this.btns[i].fillColor = COL.emerald;
              this.showFB(true);
              this.spawnParts(this.btns[i].x, this.btns[i].y, true);
              this.showPts(earned);

              // Customer leaves happy
              this.tweens.add({
                targets: this.custSprite,
                x: W + 50,
                alpha: 0,
                duration: 600,
                delay: 300,
                ease: "Power2",
              });
            } else {
              sfxNo();
              this.attempts++;
              this.btns[i].fillColor = COL.ruby;
              this.btns[i].setAlpha(0.4);
              this.btns[i].disableInteractive();
              this.cameras.main.shake(120, 0.006);

              if (this.attempts >= 2) {
                this.answered = true;
                this.total++;
                this.streak = 0;
                this.lives--;
                q.choices.forEach((c, j) => {
                  if (c === q.correct) this.btns[j].fillColor = COL.emerald;
                });
                this.showFB(false);
                if (this.lives <= 0)
                  this.time.delayedCall(1500, () => this.endGame());
              } else {
                this.hintBg.setAlpha(0.8);
                this.hintTxt.setText("\u{1F4A1} " + q.hint).setAlpha(1);
              }
            }
            this.updateHUD();
          }

          showFB(ok) {
            const q = this.questions[this.qIdx];
            this.fbBg.setAlpha(0.95);
            this.fbBg.fillColor = ok ? 0x0a200a : 0x200a0a;
            this.fbTxt.setText((ok ? "✅ " : "❌ ") + q.explain).setAlpha(1);
            this.nxtBtn.setAlpha(1);
            this.nxtTxt.setAlpha(1);
            this.nxtTxt.setText(
              this.lives <= 0 ? "SEE RESULTS" : "NEXT CUSTOMER >",
            );
          }

          showPts(p) {
            const t = this.add
              .text(W / 2, 190, "+" + p + " \u{1F4B0}", {
                fontSize: "22px",
                fontFamily: "Arial Black",
                color: "#d4a017",
                stroke: "#000",
                strokeThickness: 3,
              })
              .setOrigin(0.5);
            this.tweens.add({
              targets: t,
              y: 150,
              alpha: 0,
              duration: 1000,
              onComplete: () => t.destroy(),
            });
          }

          spawnParts(x, y, ok) {
            const colors = ok
              ? [COL.gold, COL.emerald, COL.parch, COL.white]
              : [COL.ruby, 0xff6b6b];
            for (let i = 0; i < 14; i++) {
              const p = this.add.circle(
                x,
                y,
                2 + Math.random() * 3,
                colors[Math.floor(Math.random() * colors.length)],
              );
              this.tweens.add({
                targets: p,
                x: x + (Math.random() - 0.5) * 280,
                y: y + (Math.random() - 0.5) * 180,
                alpha: 0,
                scale: 0,
                duration: 500 + Math.random() * 400,
                onComplete: () => p.destroy(),
              });
            }
          }

          nextQ() {
            if (!this.answered) return;
            sfxCl();
            if (this.lives <= 0) {
              this.endGame();
              return;
            }
            this.custSprite.setAlpha(0);
            this.qIdx++;
            this.loadQ();
          }

          updateHUD() {
            this.hudGold.setText("\u{1F4B0} " + this.gold + " Gold");
            this.hudHP.setText("");
            for (let i = 0; i < 3; i++) {
              this.hudHP.text += i < this.lives ? "❤️" : "🖤";
            }
            this.hudStreak.setText(
              this.streak >= 2 ? "\u{1F525} " + this.streak + "× Streak!" : "",
            );
            this.hudTimer.setText(this.timeLeft + "s");
            this.hudQ.setText(
              "Customer " + (this.qIdx + 1) + " | Lv " + this.level,
            );
          }

          endGame() {
            this.timerEvt.remove();
            this.cameras.main.fadeOut(500);
            this.time.delayedCall(500, () =>
              this.scene.start("ResultScene", {
                score: this.score,
                gold: this.gold,
                correct: this.correct,
                total: this.total,
                bestStreak: this.bestStreak,
                level: this.level,
                served: this.customersServed,
                store: this.store,
              }),
            );
          }
        }

        // ─── RESULT SCENE ───
        class ResultScene extends Phaser.Scene {
          constructor() {
            super("ResultScene");
          }
          init(d) {
            Object.assign(this, d);
          }
          create() {
            this.cameras.main.setBackgroundColor(COL.bg).fadeIn(500);
            const pct =
              this.total > 0
                ? Math.round((this.correct / this.total) * 100)
                : 0;
            let rank, emoji;
            if (pct >= 90) {
              rank = "MALL MOGUL";
              emoji = "\u{1F451}";
            } else if (pct >= 80) {
              rank = "STORE MANAGER";
              emoji = "\u{1F3C6}";
            } else if (pct >= 70) {
              rank = "SENIOR CLERK";
              emoji = "⭐";
            } else if (pct >= 60) {
              rank = "CASHIER";
              emoji = "\u{1F4AA}";
            } else {
              rank = "TRAINEE";
              emoji = "\u{1F4DA}";
            }

            this.add
              .text(W / 2, 70, emoji, { fontSize: "64px" })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 145, "STORE CLOSED", {
                fontSize: "44px",
                fontFamily: "Arial Black",
                color: "#d4a017",
                stroke: "#000",
                strokeThickness: 4,
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 200, rank, {
                fontSize: "20px",
                color: "#f5e6c8",
                fontStyle: "bold",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 255, this.gold.toLocaleString() + " \u{1F4B0}", {
                fontSize: "48px",
                fontFamily: "Arial Black",
                color: "#d4a017",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 295, "GOLD EARNED", {
                fontSize: "12px",
                color: "#9a8070",
              })
              .setOrigin(0.5);

            const stats = [
              { l: "Correct", v: this.correct + "/" + this.total },
              { l: "Accuracy", v: pct + "%" },
              { l: "Streak", v: this.bestStreak },
              { l: "Level", v: this.level },
              { l: "Served", v: this.served },
            ];
            stats.forEach((s, i) => {
              const x = 112 + i * 180,
                y = 400;
              this.add
                .rectangle(x, y, 155, 80, COL.panel)
                .setStrokeStyle(1, 0x3a2030);
              this.add
                .text(x, y - 10, String(s.v), {
                  fontSize: "22px",
                  fontFamily: "Arial Black",
                  color: "#d4a017",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 20, s.l, { fontSize: "11px", color: "#9a8070" })
                .setOrigin(0.5);
            });

            const btn = this.add
              .rectangle(W / 2, 520, 260, 54, COL.gold)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2, 520, "PLAY AGAIN", {
                fontSize: "20px",
                fontFamily: "Arial Black",
                color: "#0a0608",
              })
              .setOrigin(0.5);
            btn.on("pointerdown", () => {
              sfxCl();
              this.scene.start("TitleScene");
            });
            btn.on("pointerover", () => btn.setScale(1.05));
            btn.on("pointerout", () => btn.setScale(1));

            for (let i = 0; i < 25; i++) {
              const p = this.add.circle(
                Math.random() * W,
                Math.random() * H,
                2 + Math.random() * 2,
                [COL.gold, COL.emerald, COL.amethyst][
                  Math.floor(Math.random() * 3)
                ],
                0.5,
              );
              this.tweens.add({
                targets: p,
                y: p.y - 200 - Math.random() * 300,
                alpha: 0,
                duration: 2000 + Math.random() * 2000,
                delay: Math.random() * 1000,
                repeat: -1,
              });
            }
          }
        }

        new Phaser.Game({
          type: Phaser.AUTO,
          parent: "game-container",
          width: W,
          height: H,
          backgroundColor: "#0a0608",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          scene: [TitleScene, GameScene, ResultScene],
        });
      })();
    </script>
  </body>
</html>
