<!doctype html>
<html lang="en">
  <head>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Rate Factory — 6.RP.A.2</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
      // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror
      // (document.write blocks parsing so the mirror is ready before the game script runs).
      if (typeof Phaser === "undefined") {
        document.write(
          '<script src="https://unpkg.com/phaser@3.80.1/dist/phaser.min.js"><\/script>',
        );
      }
      // If both CDNs are unreachable, show a clear message instead of a blank page.
      window.addEventListener("load", function () {
        if (typeof Phaser === "undefined") {
          document.body.innerHTML =
            '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">\u26a0\ufe0f This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
        }
      });
    </script>
    <style>

        margin: 0;

        background: #0a0e1a;

        width: 100vw;

    </style>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->

</head>
  <body>
    <div id="game-container"></div>
    <script>
      (() => {
        // ════════════════════════════════════════════════════════════════
        //  UNIT RATE FACTORY — "Best-Buy Sorting Line"  (6.RP.A.2)
        //  The MATH IS THE MECHANIC: boxes ride a conveyor belt, each
        //  stamped with a QUANTITY and a TOTAL PRICE (e.g. "6 cans / $3.00").
        //  You must compute the UNIT RATE (price ÷ quantity = price each) and
        //  send each box into the lane-bin whose bracket it falls in BEFORE
        //  it reaches the end of the belt. A correct bin SNAPS the box in;
        //  a wrong bin JAMS the line (visible pile-up) and costs time.
        //  Speed pressure comes from the belt. No A/B/C/D. No printed answer.
        //  Level 1: slow belt, friendly numbers, 2 bins, shows ÷ hint.
        //  Level 2: faster, 3–4 bins, trickier rates, no hint.
        // ════════════════════════════════════════════════════════════════

        const W = 1024,
          H = 768;

        // ─── AUDIO ───
        const AC = window.AudioContext || window.webkitAudioContext;
        let actx = null;
        function audio() {
          if (!actx && AC) actx = new AC();
          if (actx && actx.state === "suspended") actx.resume();
        }
        function beep(f, d, t = "sine", v = 0.15) {
          if (!actx) return;
          const o = actx.createOscillator(),
            g = actx.createGain();
          o.connect(g);
          g.connect(actx.destination);
          o.frequency.value = f;
          o.type = t;
          g.gain.setValueAtTime(v, actx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + d);
          o.start();
          o.stop(actx.currentTime + d);
        }
        const sfxPick = () => beep(360 + Math.random() * 40, 0.05, "sine", 0.1);
        const sfxSnap = () => {
          beep(523, 0.07);
          setTimeout(() => beep(784, 0.12), 70);
        };
        const sfxJam = () => beep(150, 0.28, "square", 0.12);
        const sfxLevel = () =>
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => beep(f, 0.13), i * 85),
          );
        const sfxClick = () => beep(440, 0.05, "sine", 0.08);

        // ─── PALETTE (colourblind-safe: every bin also has a label + emoji) ───
        const C = {
          bg: 0x0a0e1a,
          belt: 0x1d2740,
          beltDark: 0x141c30,
          panel: 0x18213a,
          panelHi: 0x243154,
          gold: 0xf6c343,
          white: 0xffffff,
          dim: 0x8da2c9,
          green: 0x2ec26b,
          red: 0xe7556b,
          stroke: 0x3a4a72,
          box: 0xb07a3c,
          boxLid: 0x8a5d2a,
        };

        // Products — emoji + name; colour is never the only cue.
        const PRODUCTS = [
          { name: "Juice", emoji: "\u{1F9C3}", unit: "bottles" },
          { name: "Soup", emoji: "\u{1F963}", unit: "cans" },
          { name: "Apples", emoji: "\u{1F34E}", unit: "apples" },
          { name: "Bread", emoji: "\u{1F35E}", unit: "loaves" },
          { name: "Eggs", emoji: "\u{1F95A}", unit: "eggs" },
          { name: "Pencils", emoji: "\u{270F}\u{FE0F}", unit: "pencils" },
          { name: "Cookies", emoji: "\u{1F36A}", unit: "cookies" },
          { name: "Water", emoji: "\u{1F4A7}", unit: "bottles" },
        ];

        // ─── MATH HELPERS ───
        const rnd = (n) => Math.floor(Math.random() * n);
        const pick = (arr) => arr[rnd(arr.length)];
        const money = (cents) => "$" + (cents / 100).toFixed(2);

        // Bin brackets are defined in CENTS-per-unit so all math is integer.
        // Each bracket: { lo, hi } inclusive-lo, exclusive-hi (hi=null = open top).
        // A box's unit rate (cents) lands in EXACTLY one bracket because the
        // brackets tile [0, ∞) with no gaps or overlaps (verified by sim).
        function binBrackets(tier) {
          if (tier === 1) {
            // 2 bins, clean 50¢ split
            return [
              {
                lo: 0,
                hi: 51,
                emoji: "\u{1F7E2}",
                label: "Best buy",
                sub: "≤ $0.50 each",
              },
              {
                lo: 51,
                hi: null,
                emoji: "\u{1F534}",
                label: "Too pricey",
                sub: "more than $0.50 each",
              },
            ];
          }
          // tier 2: 3–4 bins. Randomly choose 3 or 4 lanes.
          if (Math.random() < 0.5) {
            return [
              {
                lo: 0,
                hi: 41,
                emoji: "\u{1F7E2}",
                label: "Great deal",
                sub: "≤ $0.40 each",
              },
              {
                lo: 41,
                hi: 61,
                emoji: "\u{1F7E1}",
                label: "Fair price",
                sub: "$0.41 – $0.60 each",
              },
              {
                lo: 61,
                hi: null,
                emoji: "\u{1F534}",
                label: "Overpriced",
                sub: "more than $0.60 each",
              },
            ];
          }
          return [
            {
              lo: 0,
              hi: 31,
              emoji: "\u{1F7E2}",
              label: "Steal",
              sub: "≤ $0.30 each",
            },
            {
              lo: 31,
              hi: 51,
              emoji: "\u{1F7E1}",
              label: "Okay",
              sub: "$0.31 – $0.50 each",
            },
            {
              lo: 51,
              hi: 71,
              emoji: "\u{1F7E0}",
              label: "Pricey",
              sub: "$0.51 – $0.70 each",
            },
            {
              lo: 71,
              hi: null,
              emoji: "\u{1F534}",
              label: "Rip-off",
              sub: "more than $0.70 each",
            },
          ];
        }

        // index of the one bracket containing a unit rate (cents).
        function binFor(rateCents, bins) {
          for (let i = 0; i < bins.length; i++) {
            const b = bins[i];
            if (rateCents >= b.lo && (b.hi === null || rateCents < b.hi))
              return i;
          }
          return -1; // impossible given tiling; guarded in generator
        }

        // ─── BOX (ROUND) GENERATOR ───
        // Produces { qty, totalCents, rateCents } where totalCents / qty divides
        // EXACTLY (integer cents per unit) so grade-6 division stays clean.
        function makeBox(tier, bins) {
          // Pick a target bin first, then build a box that lands in it. This
          // guarantees a balanced spread across lanes (every lane gets boxes).
          const targetBin = rnd(bins.length);
          const b = bins[targetBin];
          // choose a clean integer cents-per-unit inside this bracket
          const lo = b.lo;
          const hi = b.hi === null ? lo + 40 : b.hi; // open-top bins get a sane ceiling
          // grade-friendly rates: multiples of 5¢ (e.g. $0.25, $0.30, $0.45)
          const choices = [];
          for (let r = Math.max(5, Math.ceil(lo / 5) * 5); r < hi; r += 5) {
            if (r >= lo) choices.push(r);
          }
          // fall back to any integer if the 5¢ grid is empty (very narrow band)
          if (!choices.length) {
            for (let r = lo; r < hi; r++) choices.push(r);
          }
          const rateCents = pick(choices);
          // quantity small enough to read, large enough to require real division
          const qty = tier === 1 ? 2 + rnd(7) : 3 + rnd(10); // L1: 2–8, L2: 3–12
          const totalCents = rateCents * qty; // exact division by construction
          const product = pick(PRODUCTS);
          return { qty, totalCents, rateCents, product, bin: targetBin };
        }

        // ════════════════════════════════════════════════════════════════
        //  TITLE SCENE — real Level 1 (Support) / Level 2 (Challenge) choice
        // ════════════════════════════════════════════════════════════════
        class TitleScene extends Phaser.Scene {
          constructor() {
            super("TitleScene");
          }
          create() {
            this.cameras.main.setBackgroundColor(C.bg);
            this.add
              .text(W / 2, 96, "UNIT RATE FACTORY", {
                fontSize: "60px",
                fontFamily: "Arial Black, sans-serif",
                color: "#f6c343",
                stroke: "#000",
                strokeThickness: 7,
              })
              .setOrigin(0.5);
            this.add
              .text(
                W / 2,
                150,
                "6.RP.A.2 — Sort boxes by their price-per-item",
                {
                  fontSize: "20px",
                  fontFamily: "Arial",
                  color: "#9fb4dd",
                },
              )
              .setOrigin(0.5);
            this.add
              .text(
                W / 2,
                206,
                "Boxes roll down the belt. Each shows a QUANTITY and a TOTAL PRICE.\n" +
                  "Find the unit rate (price ÷ quantity = price for ONE) and drop the\n" +
                  "box in the matching lane before it reaches the end!",
                {
                  fontSize: "16px",
                  fontFamily: "Arial",
                  color: "#8da2c9",
                  align: "center",
                  lineSpacing: 6,
                },
              )
              .setOrigin(0.5);

            this.drawDemo(W / 2, 360);

            const tiers = [
              {
                t: 1,
                label: "Level 1",
                sub: "Support",
                desc: "Slow belt · friendly numbers · 2 lanes · shows the ÷ hint · 5 lives",
                col: C.green,
              },
              {
                t: 2,
                label: "Level 2",
                sub: "Challenge",
                desc: "Fast belt · trickier rates · 3–4 lanes · no hint · 3 lives",
                col: C.gold,
              },
            ];
            tiers.forEach((d, i) => {
              const x = W / 2 + (i === 0 ? -200 : 200),
                y = 560;
              const card = this.add
                .rectangle(x, y, 330, 150, C.panel)
                .setStrokeStyle(3, C.stroke)
                .setInteractive({ useHandCursor: true });
              this.add
                .text(x, y - 48, d.label, {
                  fontSize: "30px",
                  fontFamily: "Arial Black",
                  color: "#fff",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y - 16, d.sub, {
                  fontSize: "16px",
                  fontFamily: "Arial",
                  color: Phaser.Display.Color.IntegerToColor(d.col).rgba,
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 28, d.desc, {
                  fontSize: "12.5px",
                  fontFamily: "Arial",
                  color: "#b9c8e6",
                  align: "center",
                  wordWrap: { width: 300 },
                  lineSpacing: 3,
                })
                .setOrigin(0.5);
              card.on("pointerover", () => {
                card.setStrokeStyle(3, d.col);
                card.setScale(1.04);
              });
              card.on("pointerout", () => {
                card.setStrokeStyle(3, C.stroke);
                card.setScale(1);
              });
              card.on("pointerdown", () => {
                audio();
                sfxClick();
                this.cameras.main.fadeOut(320, 0, 0, 0);
                this.time.delayedCall(320, () =>
                  this.scene.start("GameScene", { tier: d.t }),
                );
              });
            });

            this.add
              .text(
                W / 2,
                676,
                "Drag a box to a lane  ·  OR press number keys 1–4 to send it to that lane  ·  H for a hint",
                { fontSize: "12.5px", color: "#5e6f99" },
              )
              .setOrigin(0.5);
            this.cameras.main.fadeIn(380);
          }
          drawDemo(cx, cy) {
            // "6 cans / $3.00 → $0.50 each" worked once, as a teaching read.
            const box = this.add
              .rectangle(cx - 150, cy, 120, 96, C.box)
              .setStrokeStyle(3, C.boxLid);
            this.add
              .text(cx - 150, cy - 26, "\u{1F963} 6 cans", {
                fontSize: "17px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.add
              .text(cx - 150, cy + 4, "$3.00", {
                fontSize: "26px",
                fontFamily: "Arial Black",
                color: "#ffe9a8",
              })
              .setOrigin(0.5);
            this.add
              .text(cx - 150, cy + 30, "total", {
                fontSize: "11px",
                color: "#b9c8e6",
              })
              .setOrigin(0.5);
            this.add
              .text(cx - 30, cy, "$3.00 ÷ 6 =", {
                fontSize: "20px",
                fontFamily: "Arial",
                color: "#8da2c9",
              })
              .setOrigin(0, 0.5);
            this.add
              .text(cx + 130, cy, "$0.50 each", {
                fontSize: "24px",
                fontFamily: "Arial Black",
                color: "#2ec26b",
              })
              .setOrigin(0, 0.5);
          }
        }

        // ════════════════════════════════════════════════════════════════
        //  GAME SCENE
        // ════════════════════════════════════════════════════════════════
        class GameScene extends Phaser.Scene {
          constructor() {
            super("GameScene");
          }
          init(data) {
            this.tier = data.tier || 1;
          }

          create() {
            this.cameras.main.setBackgroundColor(C.bg);
            this.cameras.main.fadeIn(320);

            // ── state ──
            this.score = 0;
            this.streak = 0;
            this.bestStreak = 0;
            this.sorted = 0; // boxes resolved (correct or wrong)
            this.correct = 0;
            this.attemptsOnBox = 0;
            this.lives = this.tier === 1 ? 5 : 3;
            this.level = 1;
            this.goal = this.tier === 1 ? 10 : 14;
            this.jamTimer = 0; // seconds the line is jammed (frozen)
            this.bins = binBrackets(this.tier);
            // Honor prefers-reduced-motion (GameFX exposes the OS flag). When on,
            // the decorative belt tread stops scrolling; boxes still travel since
            // the timed sort IS the mechanic — but at a calmer base speed.
            this.reduce = !!(window.GameFX && window.GameFX.reduce);

            // belt geometry
            this.beltTop = 150;
            this.beltBottom = 470;
            this.beltY = (this.beltTop + this.beltBottom) / 2;
            this.beltStartX = -120;
            this.beltEndX = W + 80;
            this.dropZoneY = this.beltBottom + 40; // boxes "fall off" past here
            this.beltSpeed =
              (this.tier === 1 ? 42 : 70) * (this.reduce ? 0.8 : 1); // px/sec base
            this.beltPhase = 0;

            this.activeBox = null; // the box currently on the belt
            this.dragging = false;

            this.drawStaticChrome();
            this.buildBins();
            this.buildHUD();
            this.buildControls();

            // keyboard: number keys send the active box to that lane
            this.input.keyboard.on("keydown", (e) => {
              if (e.key >= "1" && e.key <= "9") {
                const idx = parseInt(e.key, 10) - 1;
                if (idx < this.bins.length) this.sendToBin(idx);
              } else if (e.key.toLowerCase() === "h") this.showHint();
            });

            this.spawnBox();
          }

          drawStaticChrome() {
            this.add.rectangle(W / 2, H / 2, W, H, C.bg);
            // factory wall
            this.add.rectangle(W / 2, 90, W, 180, 0x101728);
            // belt frame
            this.beltGfx = this.add.graphics();
            this.add
              .text(40, this.beltTop - 34, "\u{1F3ED} SORTING LINE", {
                fontSize: "15px",
                fontFamily: "Arial Black",
                color: "#9fb4dd",
              })
              .setOrigin(0, 0.5);
            // end-of-belt warning chute
            this.add.rectangle(
              this.beltEndX - 60,
              this.beltY,
              70,
              124,
              0x2a1420,
            );
            this.add
              .text(W - 56, this.beltY - 74, "⚠️ OUT", {
                fontSize: "13px",
                fontFamily: "Arial Black",
                color: "#e7556b",
              })
              .setOrigin(0.5);
          }

          buildBins() {
            const n = this.bins.length;
            const margin = 40;
            const gap = 14;
            const totalW = W - margin * 2 - gap * (n - 1);
            const binW = totalW / n;
            const binTop = this.beltBottom + 56;
            const binH = H - binTop - 100;
            this.binRects = [];
            this.binPiles = []; // jam pile-up counters
            this.bins.forEach((b, i) => {
              const x = margin + binW / 2 + i * (binW + gap);
              const y = binTop + binH / 2;
              const rect = this.add
                .rectangle(x, y, binW, binH, C.panel)
                .setStrokeStyle(3, C.stroke)
                .setInteractive({ useHandCursor: true });
              // drop target via pointer-up handled globally; store bounds
              rect.binIndex = i;
              this.add
                .text(x, y - binH / 2 + 26, `${b.emoji}  ${i + 1}`, {
                  fontSize: "26px",
                  fontFamily: "Arial Black",
                  color: "#fff",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y - binH / 2 + 58, b.label, {
                  fontSize: "17px",
                  fontFamily: "Arial Black",
                  color: "#ffe9a8",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y - binH / 2 + 84, b.sub, {
                  fontSize: "14px",
                  fontFamily: "Arial",
                  color: "#b9c8e6",
                  align: "center",
                  wordWrap: { width: binW - 24 },
                })
                .setOrigin(0.5);
              const pileTxt = this.add
                .text(x, y + binH / 2 - 22, "", {
                  fontSize: "13px",
                  fontFamily: "Arial",
                  color: "#e7556b",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + binH / 2 - 44, `press ${i + 1}`, {
                  fontSize: "12px",
                  color: "#5e6f99",
                })
                .setOrigin(0.5);
              this.binRects.push({ rect, x, y, w: binW, h: binH, pileTxt });
              this.binPiles.push(0);
            });
          }

          buildHUD() {
            this.add.rectangle(W / 2, 26, W, 52, 0x080c16, 0.96);
            this.hScore = this.add.text(22, 12, "0", {
              fontSize: "24px",
              fontFamily: "Arial Black",
              color: "#f6c343",
            });
            this.add.text(24, 40, "POINTS", {
              fontSize: "10px",
              color: "#6f82ad",
            });
            this.hLevel = this.add
              .text(W / 2, 10, "Level 1", {
                fontSize: "16px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5, 0);
            this.hSorted = this.add
              .text(W / 2, 34, "Sorted 0 / " + this.goal, {
                fontSize: "12px",
                color: "#9fb4dd",
              })
              .setOrigin(0.5, 0);
            this.hLives = this.add
              .text(W - 22, 14, "", { fontSize: "20px" })
              .setOrigin(1, 0);
            this.hStreak = this.add
              .text(W - 22, 40, "", { fontSize: "13px", color: "#f6c343" })
              .setOrigin(1, 0);
          }

          buildControls() {
            // feedback line above the bins
            this.feedback = this.add
              .text(W / 2, this.beltBottom + 26, "", {
                fontSize: "16px",
                fontFamily: "Arial",
                fontStyle: "bold",
                color: "#fff",
                align: "center",
                wordWrap: { width: 760 },
              })
              .setOrigin(0.5);
            // hint button (L1 only auto-shows division setup on each box)
            this.hintBtn = this.add
              .rectangle(90, H - 36, 150, 44, C.panelHi)
              .setStrokeStyle(2, C.stroke)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(90, H - 36, "\u{1F4A1} Hint (H)", {
                fontSize: "15px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.hintBtn.on("pointerover", () => this.hintBtn.setScale(1.05));
            this.hintBtn.on("pointerout", () => this.hintBtn.setScale(1));
            this.hintBtn.on("pointerdown", () => {
              audio();
              this.showHint();
            });
            // global drag release → which bin?
            this.input.on("pointerup", (p) => this.onPointerUp(p));
            this.updateHUD();
          }

          // ── spawn a fresh box at the start of the belt ──
          spawnBox() {
            const data = makeBox(this.tier, this.bins);
            this.attemptsOnBox = 0;
            const cont = this.add.container(this.beltStartX, this.beltY);

            const body = this.add
              .rectangle(0, 0, 150, 116, C.box)
              .setStrokeStyle(4, C.boxLid);
            const lid = this.add.rectangle(0, -50, 158, 18, C.boxLid);
            const head = this.add
              .text(0, -30, `${data.product.emoji}`, { fontSize: "30px" })
              .setOrigin(0.5);
            // QUANTITY + UNIT  (the divisor)
            const qtyTxt = this.add
              .text(0, 6, `${data.qty} ${data.product.unit}`, {
                fontSize: "18px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);
            // TOTAL PRICE  (the dividend) — never the unit rate
            const priceTxt = this.add
              .text(0, 34, money(data.totalCents), {
                fontSize: "26px",
                fontFamily: "Arial Black",
                color: "#ffe9a8",
              })
              .setOrigin(0.5);
            const totLbl = this.add
              .text(0, 54, "total price", {
                fontSize: "11px",
                color: "#e8d9b0",
              })
              .setOrigin(0.5);

            cont.add([body, lid, head, qtyTxt, priceTxt, totLbl]);
            cont.setSize(150, 116);
            cont.setInteractive(
              new Phaser.Geom.Rectangle(-75, -58, 150, 116),
              Phaser.Geom.Rectangle.Contains,
            );
            this.input.setDraggable(cont);
            cont.box = data;
            cont.body = body;
            cont.grabbed = false;

            cont.on("pointerover", () => body.setStrokeStyle(4, C.gold));
            cont.on("pointerout", () => {
              if (!cont.grabbed) body.setStrokeStyle(4, C.boxLid);
            });
            this.input.on("dragstart", (p, obj) => {
              if (obj === cont) {
                cont.grabbed = true;
                audio();
                sfxPick();
                body.setStrokeStyle(4, C.gold);
                cont.setScale(1.06);
              }
            });
            this.input.on("drag", (p, obj, dx, dy) => {
              if (obj === cont) {
                cont.x = dx;
                cont.y = dy;
              }
            });

            this.activeBox = cont;

            // L1 auto-shows the division setup so support students always see method
            if (this.tier === 1) {
              this.feedback
                .setText(
                  `\u{1F4A1} ${money(data.totalCents)} ÷ ${data.qty} = price for ONE ${data.product.name.toLowerCase()}. Which lane?`,
                )
                .setColor("#ffe9a8")
                .setAlpha(1);
            } else {
              this.feedback.setText("");
            }
          }

          // ── drag release: find the bin under the pointer ──
          onPointerUp(p) {
            const cont = this.activeBox;
            if (!cont || !cont.grabbed) return;
            cont.grabbed = false;
            cont.setScale(1);
            let hit = -1;
            this.binRects.forEach((b, i) => {
              if (
                p.x >= b.x - b.w / 2 &&
                p.x <= b.x + b.w / 2 &&
                p.y >= b.y - b.h / 2 &&
                p.y <= b.y + b.h / 2
              )
                hit = i;
            });
            if (hit === -1) {
              // dropped off-target → glide back onto the belt, keep playing
              this.tweens.add({
                targets: cont,
                y: this.beltY,
                duration: 180,
                ease: "Quad.easeOut",
              });
              cont.body.setStrokeStyle(4, C.boxLid);
              return;
            }
            this.sendToBin(hit);
          }

          // ── core scoring: does the box belong in this bin? ──
          sendToBin(idx) {
            const cont = this.activeBox;
            if (!cont || this.jamTimer > 0) return;
            const data = cont.box;
            const correctBin = binFor(data.rateCents, this.bins);

            if (idx === correctBin) {
              this.resolveCorrect(cont, idx);
            } else {
              this.resolveWrong(cont, idx, correctBin);
            }
          }

          resolveCorrect(cont, idx) {
            audio();
            sfxSnap();
            this.activeBox = null;
            const target = this.binRects[idx];
            const firstTry = this.attemptsOnBox === 0;
            this.correct++;
            this.sorted++;
            this.streak++;
            if (this.streak > this.bestStreak) this.bestStreak = this.streak;
            const combo = Math.min(4, 1 + Math.floor(this.streak / 3));
            const pts = (100 + (firstTry ? 50 : 0) + this.streak * 6) * combo;
            this.score += pts;

            this.feedback
              .setText(
                `✅ ${money(cont.box.totalCents)} ÷ ${cont.box.qty} = ${money(cont.box.rateCents)} each — snapped in!  +${pts}${combo > 1 ? " x" + combo : ""}`,
              )
              .setColor("#bff7cf")
              .setAlpha(1);

            // snap animation into the bin
            this.tweens.add({
              targets: cont,
              x: target.x,
              y: target.y,
              scale: 0.5,
              alpha: 0,
              duration: 320,
              ease: "Back.easeIn",
              onComplete: () => cont.destroy(),
            });
            this.sparkle(target.x, target.y);

            if (this.correct % 4 === 0) {
              this.level++;
              this.beltSpeed *= 1.08; // ramps pressure
              sfxLevel();
            }
            this.updateHUD();
            this.afterResolve();
          }

          resolveWrong(cont, idx, correctBin) {
            audio();
            sfxJam();
            this.attemptsOnBox++;
            this.streak = 0;
            this.cameras.main.shake(160, 0.006);
            // JAM: pile up at the wrong bin + freeze the line briefly
            this.binPiles[idx]++;
            this.binRects[idx].pileTxt.setText(
              "\u{1F4E6}".repeat(Math.min(4, this.binPiles[idx])) + " jam!",
            );
            this.jamTimer = this.tier === 1 ? 1.4 : 1.8;

            // diagnostic, NON-giveaway feedback: teaches the division method,
            // compares the lane bracket to the computed rate WITHOUT printing it
            const data = cont.box;
            const wrongB = this.bins[idx];
            let msg;
            if (this.attemptsOnBox === 1) {
              msg = `❌ Jam! That lane is "${wrongB.sub}". Work out ${money(data.totalCents)} ÷ ${data.qty} first, then pick the lane it fits.`;
            } else {
              const groupHint = data.qty <= 5 ? data.qty : data.qty;
              msg = `❌ Still off. Split ${money(data.totalCents)} into ${data.qty} equal shares — what does ONE ${data.product.name.toLowerCase()} cost? Compare that to each lane's range.`;
            }
            this.feedback.setText(msg).setColor("#ffb4b4").setAlpha(1);

            // box bounces back onto the belt to be re-sorted
            this.tweens.add({
              targets: cont,
              y: this.beltY,
              scale: 1,
              duration: 220,
              ease: "Quad.easeOut",
            });
            cont.body.setStrokeStyle(4, C.red);
            this.time.delayedCall(400, () => {
              if (cont.active) cont.body.setStrokeStyle(4, C.boxLid);
            });

            // a jam costs a life after repeated misses (gentler on support tier)
            if (this.attemptsOnBox >= (this.tier === 1 ? 3 : 2)) {
              this.loseLife();
            }
            this.updateHUD();
          }

          // box reached the end of the belt unsorted → counts as a miss
          boxFellOff(cont) {
            audio();
            sfxJam();
            this.activeBox = null;
            this.streak = 0;
            this.sorted++;
            this.feedback
              .setText(
                `⏱️ Box rolled off! It was ${money(cont.box.totalCents)} for ${cont.box.qty} — that's ${money(cont.box.rateCents)} each. Sort faster!`,
              )
              .setColor("#ffd34d")
              .setAlpha(1);
            this.tweens.add({
              targets: cont,
              x: cont.x + 120,
              alpha: 0,
              duration: 300,
              onComplete: () => cont.destroy(),
            });
            this.loseLife();
            this.updateHUD();
            this.afterResolve();
          }

          loseLife() {
            this.lives--;
            if (this.lives <= 0) {
              this.lives = 0;
              this.updateHUD();
              this.time.delayedCall(900, () => this.endGame());
            }
          }

          afterResolve() {
            if (this.lives <= 0) return;
            if (this.sorted >= this.goal) {
              this.time.delayedCall(1000, () => this.endGame());
              return;
            }
            this.time.delayedCall(650, () => {
              if (this.lives > 0 && !this.activeBox) this.spawnBox();
            });
          }

          showHint() {
            const cont = this.activeBox;
            if (!cont) return;
            sfxClick();
            const d = cont.box;
            this.feedback
              .setText(
                `\u{1F4A1} Unit rate = total ÷ quantity. Compute ${money(d.totalCents)} ÷ ${d.qty} (the price of ONE ${d.product.name.toLowerCase()}), then match it to a lane's range.`,
              )
              .setColor("#ffe9a8")
              .setAlpha(1);
          }

          sparkle(x, y) {
            for (let i = 0; i < 14; i++) {
              const p = this.add.circle(
                x,
                y,
                3 + Math.random() * 3,
                [C.gold, C.green, C.white][rnd(3)],
              );
              this.tweens.add({
                targets: p,
                x: x + (Math.random() - 0.5) * 220,
                y: y + (Math.random() - 0.5) * 180,
                alpha: 0,
                scale: 0,
                duration: 500 + Math.random() * 300,
                onComplete: () => p.destroy(),
              });
            }
          }

          updateHUD() {
            this.hScore.setText(this.score.toLocaleString());
            this.hLevel.setText("Level " + this.level);
            this.hSorted.setText(`Sorted ${this.sorted} / ${this.goal}`);
            this.hLives.setText("❤️".repeat(Math.max(0, this.lives)));
            this.hStreak.setText(
              this.streak >= 3 ? "\u{1F525} streak " + this.streak : "",
            );
          }

          // ── belt animation + box travel ──
          update(time, delta) {
            const dt = delta / 1000;
            // Decorative tread scroll only advances when motion is allowed.
            if (!this.reduce) this.beltPhase = (this.beltPhase + dt * 60) % 28;
            this.drawBelt();

            if (this.jamTimer > 0) {
              this.jamTimer = Math.max(0, this.jamTimer - dt);
              return; // line frozen during a jam
            }
            const cont = this.activeBox;
            if (cont && cont.active && !cont.grabbed) {
              cont.x += this.beltSpeed * dt;
              // pull box back to belt line if it drifted
              if (Math.abs(cont.y - this.beltY) > 1)
                cont.y += (this.beltY - cont.y) * Math.min(1, dt * 6);
              if (cont.x > this.beltEndX - 70) this.boxFellOff(cont);
            }
          }

          drawBelt() {
            const g = this.beltGfx;
            g.clear();
            // belt body
            g.fillStyle(C.belt, 1);
            g.fillRect(
              this.beltStartX,
              this.beltTop,
              W - this.beltStartX + 120,
              this.beltBottom - this.beltTop,
            );
            g.lineStyle(4, C.stroke, 1);
            g.strokeRect(0, this.beltTop, W, this.beltBottom - this.beltTop);
            // moving tread chevrons (animated, gives sense of speed)
            g.fillStyle(C.beltDark, 1);
            for (let x = -this.beltPhase; x < W; x += 28) {
              g.fillRect(x, this.beltTop, 10, this.beltBottom - this.beltTop);
            }
          }

          endGame() {
            this.cameras.main.fadeOut(420, 0, 0, 0);
            this.time.delayedCall(420, () =>
              this.scene.start("ResultScene", {
                tier: this.tier,
                score: this.score,
                correct: this.correct,
                sorted: this.sorted,
                goal: this.goal,
                bestStreak: this.bestStreak,
                level: this.level,
              }),
            );
          }
        }

        // ════════════════════════════════════════════════════════════════
        //  RESULT SCENE
        // ════════════════════════════════════════════════════════════════
        class ResultScene extends Phaser.Scene {
          constructor() {
            super("ResultScene");
          }
          init(d) {
            Object.assign(this, d);
          }
          create() {
            this.cameras.main.setBackgroundColor(C.bg);
            this.cameras.main.fadeIn(420);
            const goal = this.goal || 1;
            const pct = goal > 0 ? Math.round((this.correct / goal) * 100) : 0;

            try {
              window.EduPulse &&
                EduPulse.record({
                  activityTitle: document.title,
                  score: this.correct,
                  maxScore: goal,
                  problemsCorrect: this.correct,
                  problemsAttempted: this.sorted,
                  standard: "6.RP.A.2",
                });
            } catch (e) {}

            let rank, emoji;
            if (pct >= 90) {
              rank = "FACTORY FOREMAN!";
              emoji = "\u{1F451}";
            } else if (pct >= 75) {
              rank = "LINE SUPERVISOR!";
              emoji = "\u{1F3C6}";
            } else if (pct >= 50) {
              rank = "SORTER";
              emoji = "⭐";
            } else {
              rank = "KEEP PRACTICING!";
              emoji = "\u{1F4DA}";
            }

            this.add
              .text(W / 2, 108, emoji, { fontSize: "76px" })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 194, "SHIFT OVER", {
                fontSize: "46px",
                fontFamily: "Arial Black",
                color: "#f6c343",
                stroke: "#000",
                strokeThickness: 4,
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 248, rank, {
                fontSize: "24px",
                fontFamily: "Arial",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 312, this.score.toLocaleString(), {
                fontSize: "58px",
                fontFamily: "Arial Black",
                color: "#f6c343",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 352, "POINTS", {
                fontSize: "13px",
                color: "#6f82ad",
              })
              .setOrigin(0.5);

            const stats = [
              { l: "Boxes sorted right", v: `${this.correct}/${goal}` },
              { l: "Best streak", v: this.bestStreak },
              { l: "Level reached", v: this.level },
            ];
            stats.forEach((s, i) => {
              const x = 282 + i * 230,
                y = 444;
              this.add
                .rectangle(x, y, 200, 96, C.panel)
                .setStrokeStyle(2, C.stroke);
              this.add
                .text(x, y - 12, String(s.v), {
                  fontSize: "30px",
                  fontFamily: "Arial Black",
                  color: "#f6c343",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 26, s.l, { fontSize: "13px", color: "#b9c8e6" })
                .setOrigin(0.5);
            });

            const again = this.add
              .rectangle(W / 2 - 130, 584, 240, 58, C.gold)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2 - 130, 584, "RUN AGAIN", {
                fontSize: "22px",
                fontFamily: "Arial Black",
                color: "#0a0e1a",
              })
              .setOrigin(0.5);
            again.on("pointerdown", () => {
              audio();
              sfxClick();
              this.scene.start("GameScene", { tier: this.tier });
            });
            again.on("pointerover", () => again.setScale(1.05));
            again.on("pointerout", () => again.setScale(1));

            const menu = this.add
              .rectangle(W / 2 + 130, 584, 240, 58, C.panel)
              .setStrokeStyle(2, C.stroke)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2 + 130, 584, "CHANGE LEVEL", {
                fontSize: "20px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);
            menu.on("pointerdown", () => {
              audio();
              sfxClick();
              this.scene.start("TitleScene");
            });
            menu.on("pointerover", () => menu.setScale(1.05));
            menu.on("pointerout", () => menu.setScale(1));

            for (let i = 0; i < 28; i++) {
              const p = this.add
                .circle(
                  Math.random() * W,
                  Math.random() * H,
                  2 + Math.random() * 3,
                  [C.gold, C.green, C.white, C.box][rnd(4)],
                )
                .setAlpha(0.7);
              this.tweens.add({
                targets: p,
                y: p.y - 200 - Math.random() * 300,
                alpha: 0,
                duration: 2000 + Math.random() * 2000,
                delay: Math.random() * 1000,
                repeat: -1,
                ease: "Power1",
              });
            }
          }
        }

        // ─── BOOT ───
        new Phaser.Game({
          type: Phaser.AUTO,
          parent: "game-container",
          width: W,
          height: H,
          backgroundColor: "#0a0e1a",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          scene: [TitleScene, GameScene, ResultScene],
        });
      })();
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <script src="/shared/save-resume/save-resume-engine.js" defer></script>
    <!-- nsr-injected:end -->
    <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
  <script src="/assets/game-fx.js" defer></script>
  <!-- gfx-injected:end -->
