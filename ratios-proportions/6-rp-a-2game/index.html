<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Rate Factory — 6.RP.A.2</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
      // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror
      // (document.write blocks parsing so the mirror is ready before the game script runs).
      if (typeof Phaser === "undefined") {
        document.write(
          '<script src="https://unpkg.com/phaser@3.80.1/dist/phaser.min.js"><\/script>',
        );
      }
      // If both CDNs are unreachable, show a clear message instead of a blank page.
      window.addEventListener("load", function () {
        if (typeof Phaser === "undefined") {
          document.body.innerHTML =
            '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">\u26a0\ufe0f This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
        }
      });
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0e1a;
        overflow: hidden;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script>
      (() => {
        const W = 1024,
          H = 768;

        // ─── AUDIO ───
        const AC = window.AudioContext || window.webkitAudioContext;
        let actx = null;
        function audio() {
          if (!actx) actx = new AC();
          if (actx.state === "suspended") actx.resume();
        }
        function beep(f, d, t = "sine", v = 0.15) {
          if (!actx) return;
          const o = actx.createOscillator(),
            g = actx.createGain();
          o.connect(g);
          g.connect(actx.destination);
          o.frequency.value = f;
          o.type = t;
          g.gain.setValueAtTime(v, actx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + d);
          o.start();
          o.stop(actx.currentTime + d);
        }
        function sfxOk() {
          beep(523, 0.08);
          setTimeout(() => beep(659, 0.08), 80);
          setTimeout(() => beep(784, 0.15), 160);
        }
        function sfxNo() {
          beep(180, 0.25, "square", 0.1);
        }
        function sfxClick() {
          beep(440, 0.05, "sine", 0.08);
        }
        function sfxLvl() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => beep(f, 0.12), i * 90),
          );
        }
        function sfxConveyor() {
          beep(200, 0.08, "triangle", 0.04);
        }

        // ─── COLORS ───
        const C = {
          bg: 0x0a0e1a,
          panel: 0x111827,
          teal: 0x00f5c4,
          gold: 0xffd700,
          purple: 0xa855f7,
          rose: 0xf43f5e,
          sky: 0x38bdf8,
          ok: 0x10b981,
          err: 0xef4444,
          white: 0xffffff,
          dark: 0x060a14,
          line: 0x1a2744,
        };

        // ─── QUESTION GENERATOR ───
        function genQuestions() {
          const qs = [];
          const contexts = [
            {
              cat: "MARKET",
              icon: "\u{1F6D2}",
              templates: [
                (a, b) => ({
                  text: `A store sells ${a} cans for $${((b * a) / 100).toFixed(2)}. Unit price per can?`,
                  ans: +(b / 100).toFixed(2),
                  unit: "$ per can",
                  num: ((b * a) / 100).toFixed(2),
                  den: a,
                }),
                (a, b) => ({
                  text: `${a} pounds of fruit cost $${((b * a) / 100).toFixed(2)}. Price per pound?`,
                  ans: +(b / 100).toFixed(2),
                  unit: "$ per pound",
                  num: ((b * a) / 100).toFixed(2),
                  den: a,
                }),
                (a, b) => ({
                  text: `A ${a}-pack of water costs $${((b * a) / 100).toFixed(2)}. Price per bottle?`,
                  ans: +(b / 100).toFixed(2),
                  unit: "$ per bottle",
                  num: ((b * a) / 100).toFixed(2),
                  den: a,
                }),
              ],
            },
            {
              cat: "SPEED",
              icon: "\u{1F697}",
              templates: [
                (a, b) => ({
                  text: `A car travels ${a * b} miles in ${a} hours. Speed in mph?`,
                  ans: b,
                  unit: "mph",
                  num: a * b,
                  den: a,
                }),
                (a, b) => ({
                  text: `A train covers ${a * b} km in ${a} hours. Speed in km/h?`,
                  ans: b,
                  unit: "km/h",
                  num: a * b,
                  den: a,
                }),
                (a, b) => ({
                  text: `A bike rides ${a * b} miles in ${a} hours. Miles per hour?`,
                  ans: b,
                  unit: "mph",
                  num: a * b,
                  den: a,
                }),
              ],
            },
            {
              cat: "RECIPE",
              icon: "\u{1F373}",
              templates: [
                (a, b) => ({
                  text: `${a} cups of flour for ${b} servings. Cups per serving?`,
                  ans: +(a / b).toFixed(2),
                  unit: "cups/serving",
                  num: a,
                  den: b,
                }),
                (a, b) => ({
                  text: `${a} eggs for ${b} batches. Eggs per batch?`,
                  ans: +(a / b).toFixed(2),
                  unit: "eggs/batch",
                  num: a,
                  den: b,
                }),
              ],
            },
            {
              cat: "WORK",
              icon: "\u{1F4BC}",
              templates: [
                (a, b) => ({
                  text: `$${a * b} earned in ${a} hours. Hourly rate?`,
                  ans: b,
                  unit: "$/hour",
                  num: a * b,
                  den: a,
                }),
                (a, b) => ({
                  text: `A factory makes ${a * b} bottles in ${a} hours. Bottles per hour?`,
                  ans: b,
                  unit: "bottles/hr",
                  num: a * b,
                  den: a,
                }),
                (a, b) => ({
                  text: `${a * b} pages printed in ${a} minutes. Pages per minute?`,
                  ans: b,
                  unit: "pages/min",
                  num: a * b,
                  den: a,
                }),
              ],
            },
            {
              cat: "FITNESS",
              icon: "\u{1F3C3}",
              templates: [
                (a, b) => ({
                  text: `${a * b} jumping jacks in ${a} minutes. Per minute?`,
                  ans: b,
                  unit: "per min",
                  num: a * b,
                  den: a,
                }),
                (a, b) => ({
                  text: `${a * b} laps in ${a} hours. Laps per hour?`,
                  ans: b,
                  unit: "laps/hr",
                  num: a * b,
                  den: a,
                }),
                (a, b) => ({
                  text: `${a * b} points in ${a} games. Points per game?`,
                  ans: b,
                  unit: "pts/game",
                  num: a * b,
                  den: a,
                }),
              ],
            },
          ];

          for (let i = 0; i < 20; i++) {
            const ctx = contexts[i % contexts.length];
            const tmpl =
              ctx.templates[Math.floor(Math.random() * ctx.templates.length)];
            const a = 3 + Math.floor(Math.random() * 8);
            const b =
              ctx.cat === "MARKET"
                ? 25 + Math.floor(Math.random() * 20) * 5
                : 5 + Math.floor(Math.random() * 20) * 5;
            const q = tmpl(a, b);
            const correct = q.ans;
            const wrongs = [
              correct * 2,
              +(correct + correct * 0.5).toFixed(2),
              +(correct * 0.5).toFixed(2),
            ].filter((w) => w !== correct);
            while (wrongs.length < 3)
              wrongs.push(+(correct + 1 + wrongs.length).toFixed(2));
            const choices = shuffle([correct, ...wrongs.slice(0, 3)]);
            qs.push({
              cat: ctx.cat,
              icon: ctx.icon,
              text: q.text,
              ans: correct,
              unit: q.unit,
              num: q.num,
              den: q.den,
              choices: choices.map((c) =>
                typeof c === "number"
                  ? Number.isInteger(c)
                    ? String(c)
                    : c.toFixed(2)
                  : String(c),
              ),
              correctStr:
                typeof correct === "number"
                  ? Number.isInteger(correct)
                    ? String(correct)
                    : correct.toFixed(2)
                  : String(correct),
              hint: `Divide: ${q.num} ÷ ${q.den}`,
              explain: `${q.num} ÷ ${q.den} = ${typeof correct === "number" ? (Number.isInteger(correct) ? correct : correct.toFixed(2)) : correct} ${q.unit}`,
            });
          }
          return shuffle(qs);
        }
        function shuffle(a) {
          const b = [...a];
          for (let i = b.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [b[i], b[j]] = [b[j], b[i]];
          }
          return b;
        }

        // ─── TITLE SCENE ───
        class TitleScene extends Phaser.Scene {
          constructor() {
            super("TitleScene");
          }
          create() {
            this.cameras.main.setBackgroundColor(C.bg).fadeIn(500);

            // Grid lines BG
            const gfx = this.add.graphics();
            gfx.lineStyle(1, C.teal, 0.04);
            for (let x = 0; x < W; x += 50) {
              gfx.lineBetween(x, 0, x, H);
            }
            for (let y = 0; y < H; y += 50) {
              gfx.lineBetween(0, y, W, y);
            }

            // Stars
            for (let i = 0; i < 60; i++) {
              const s = this.add.circle(
                Math.random() * W,
                Math.random() * H,
                1 + Math.random(),
                C.white,
                0.3 + Math.random() * 0.4,
              );
              this.tweens.add({
                targets: s,
                alpha: 0.1,
                duration: 1500 + Math.random() * 2000,
                yoyo: true,
                repeat: -1,
              });
            }

            this.add
              .text(W / 2, 140, "UNIT RATE FACTORY", {
                fontSize: "56px",
                fontFamily: "Arial Black",
                color: "#00f5c4",
                stroke: "#000",
                strokeThickness: 4,
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 205, "6.RP.A.2 — Understand Unit Rates", {
                fontSize: "18px",
                color: "#64748b",
              })
              .setOrigin(0.5);
            this.add
              .text(
                W / 2,
                240,
                "Manage the factory conveyor belt! Calculate unit rates to keep production running!",
                {
                  fontSize: "14px",
                  color: "#4a5568",
                },
              )
              .setOrigin(0.5);

            // Mode select
            const modes = [
              {
                name: "Apprentice",
                desc: "Guided, forgiving",
                icon: "\u{1F527}",
                color: C.teal,
              },
              {
                name: "Engineer",
                desc: "Standard challenge",
                icon: "⚙️",
                color: C.gold,
              },
              {
                name: "Foreman",
                desc: "Fast & intense",
                icon: "\u{1F525}",
                color: C.rose,
              },
            ];
            this.selectedMode = 1;
            this.modeCards = [];

            modes.forEach((m, i) => {
              const x = 262 + i * 250,
                y = 400;
              const card = this.add
                .rectangle(x, y, 210, 180, C.panel)
                .setStrokeStyle(3, i === 1 ? C.gold : 0x1a2744)
                .setInteractive({ useHandCursor: true });
              this.add
                .text(x, y - 50, m.icon, { fontSize: "40px" })
                .setOrigin(0.5);
              this.add
                .text(x, y, m.name, {
                  fontSize: "18px",
                  color: "#fff",
                  fontStyle: "bold",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 28, m.desc, { fontSize: "12px", color: "#64748b" })
                .setOrigin(0.5);
              card.on("pointerdown", () => {
                audio();
                sfxClick();
                this.selectedMode = i;
                this.modeCards.forEach((c, j) =>
                  c.setStrokeStyle(3, j === i ? C.gold : 0x1a2744),
                );
              });
              this.modeCards.push(card);
            });

            const btn = this.add
              .rectangle(W / 2, 560, 280, 56, C.teal)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2, 560, "START PRODUCTION", {
                fontSize: "22px",
                fontFamily: "Arial Black",
                color: "#0a0e1a",
              })
              .setOrigin(0.5);
            btn.on("pointerdown", () => {
              audio();
              sfxClick();
              this.cameras.main.fadeOut(400);
              this.time.delayedCall(400, () =>
                this.scene.start("GameScene", { mode: this.selectedMode }),
              );
            });
            btn.on("pointerover", () => btn.setScale(1.04));
            btn.on("pointerout", () => btn.setScale(1));
          }
        }

        // ─── GAME SCENE ───
        class GameScene extends Phaser.Scene {
          constructor() {
            super("GameScene");
          }
          init(data) {
            this.mode = data.mode;
          }

          create() {
            this.cameras.main.setBackgroundColor(C.bg).fadeIn(400);
            const diffMult = [0.7, 1.0, 1.5][this.mode];

            // State
            this.questions = genQuestions();
            this.qIdx = 0;
            this.score = 0;
            this.streak = 0;
            this.bestStreak = 0;
            this.correct = 0;
            this.total = 0;
            this.lives = [4, 3, 2][this.mode];
            this.maxLives = this.lives;
            this.answered = false;
            this.attempts = 0;
            this.timeLeft = Math.round([35, 30, 20][this.mode]);
            this.baseTime = this.timeLeft;
            this.level = 1;
            this.xp = 0;
            this.combo = 1;
            this.enemyHp = 100;

            // Factory BG
            this.add.rectangle(W / 2, H / 2, W, H, C.dark);
            const gfx = this.add.graphics();
            gfx.lineStyle(1, C.teal, 0.03);
            for (let x = 0; x < W; x += 50) gfx.lineBetween(x, 0, x, H);
            for (let y = 0; y < H; y += 50) gfx.lineBetween(0, y, W, y);

            // Conveyor belt visual
            this.conveyorY = 120;
            this.add
              .rectangle(W / 2, this.conveyorY, W, 50, 0x1a2744)
              .setStrokeStyle(1, 0x2a3754);
            this.conveyorLines = [];
            for (let x = 0; x < W; x += 40) {
              const ln = this.add.rectangle(
                x,
                this.conveyorY,
                3,
                50,
                C.teal,
                0.15,
              );
              this.conveyorLines.push(ln);
            }

            // Product on conveyor
            this.product = this.add
              .text(50, this.conveyorY, "\u{1F4E6}", { fontSize: "32px" })
              .setOrigin(0.5);
            this.productTween = null;
            this.startConveyor();

            // HUD
            this.add.rectangle(W / 2, 30, W, 60, C.bg, 0.95);
            this.add.rectangle(W / 2, 60, W, 2, C.teal, 0.15);
            this.hudScore = this.add.text(60, 12, "0", {
              fontSize: "22px",
              fontFamily: "Arial Black",
              color: "#ffd700",
            });
            this.add.text(60, 38, "SCORE", {
              fontSize: "9px",
              color: "#64748b",
              letterSpacing: 2,
            });
            this.hudStreak = this.add.text(200, 18, "\u{1F525} 0x", {
              fontSize: "14px",
              color: "#a855f7",
              fontStyle: "bold",
            });
            this.hudLives = this.add.text(W - 120, 12, "", {
              fontSize: "14px",
              color: "#f43f5e",
            });
            this.hudTimer = this.add.text(W - 120, 36, "", {
              fontSize: "14px",
              color: "#ffd700",
            });
            this.hudQ = this.add
              .text(W / 2, 18, "", { fontSize: "13px", color: "#00f5c4" })
              .setOrigin(0.5, 0);
            this.hudXp = this.add.rectangle(W / 2, 58, 200, 4, 0x222, 0.3);
            this.hudXpFill = this.add
              .rectangle(W / 2 - 100, 58, 0, 4, C.purple)
              .setOrigin(0, 0.5);

            // Enemy (machine boss)
            this.enemyArea = this.add.container(W / 2, 175);
            this.enemySprite = this.add
              .text(0, -10, "\u{1F3ED}", { fontSize: "48px" })
              .setOrigin(0.5);
            this.enemyName = this.add
              .text(0, 25, "Production Machine", {
                fontSize: "14px",
                color: "#00f5c4",
                fontStyle: "bold",
              })
              .setOrigin(0.5);
            this.enemyHpBg = this.add
              .rectangle(0, 45, 200, 10, 0x222)
              .setOrigin(0.5);
            this.enemyHpBar = this.add
              .rectangle(-100, 45, 200, 10, C.rose)
              .setOrigin(0, 0.5);
            this.enemyArea.add([
              this.enemySprite,
              this.enemyName,
              this.enemyHpBg,
              this.enemyHpBar,
            ]);

            // Question card
            this.qCard = this.add
              .rectangle(W / 2, 350, 720, 240, C.panel)
              .setStrokeStyle(1, 0x2a3754);
            this.qCat = this.add
              .text(W / 2, 245, "", {
                fontSize: "11px",
                color: "#ffd700",
                letterSpacing: 2,
              })
              .setOrigin(0.5);
            this.qText = this.add
              .text(W / 2, 290, "", {
                fontSize: "18px",
                color: "#e2e8f0",
                fontStyle: "bold",
                wordWrap: { width: 660 },
                align: "center",
              })
              .setOrigin(0.5);

            // Choices (4 buttons)
            this.btns = [];
            this.btnTexts = [];
            for (let i = 0; i < 4; i++) {
              const col = i % 2,
                row = Math.floor(i / 2);
              const x = W / 2 - 170 + col * 340,
                y = 355 + row * 58;
              const btn = this.add
                .rectangle(x, y, 320, 48, 0x0d1527)
                .setStrokeStyle(2, 0x1a2744)
                .setInteractive({ useHandCursor: true });
              const txt = this.add
                .text(x, y, "", {
                  fontSize: "16px",
                  color: "#e2e8f0",
                  fontStyle: "bold",
                })
                .setOrigin(0.5);
              btn.on("pointerdown", () => this.pick(i));
              btn.on("pointerover", () => {
                if (!this.answered) btn.setStrokeStyle(2, C.teal);
              });
              btn.on("pointerout", () => {
                if (!this.answered) btn.setStrokeStyle(2, 0x1a2744);
              });
              this.btns.push(btn);
              this.btnTexts.push(txt);
            }

            // Hint
            this.hintBg = this.add
              .rectangle(W / 2, 498, 600, 36, 0x1a1a00, 0.8)
              .setAlpha(0);
            this.hintTxt = this.add
              .text(W / 2, 498, "", { fontSize: "13px", color: "#ffd700" })
              .setOrigin(0.5)
              .setAlpha(0);

            // Feedback
            this.fbBg = this.add
              .rectangle(W / 2, 545, 720, 44, C.panel)
              .setAlpha(0);
            this.fbTxt = this.add
              .text(W / 2, 545, "", {
                fontSize: "14px",
                color: "#e2e8f0",
                wordWrap: { width: 680 },
                align: "center",
              })
              .setOrigin(0.5)
              .setAlpha(0);

            // Next
            this.nxtBtn = this.add
              .rectangle(W / 2, 610, 220, 46, C.teal)
              .setInteractive({ useHandCursor: true })
              .setAlpha(0);
            this.nxtTxt = this.add
              .text(W / 2, 610, "NEXT UNIT >", {
                fontSize: "16px",
                fontFamily: "Arial Black",
                color: "#0a0e1a",
              })
              .setOrigin(0.5)
              .setAlpha(0);
            this.nxtBtn.on("pointerdown", () => {
              if (this.answered) this.nextQ();
            });

            // Timer
            this.timerEvt = this.time.addEvent({
              delay: 1000,
              callback: this.tick,
              callbackScope: this,
              loop: true,
            });

            // Keys
            this.input.keyboard.on("keydown", (e) => {
              if (e.key === "1" || e.key === "a") this.pick(0);
              if (e.key === "2" || e.key === "b") this.pick(1);
              if (e.key === "3" || e.key === "c") this.pick(2);
              if (e.key === "4" || e.key === "d") this.pick(3);
              if (e.key === "Enter" && this.answered) this.nextQ();
            });

            this.loadQ();
          }

          startConveyor() {
            this.product.setX(-30);
            this.productTween = this.tweens.add({
              targets: this.product,
              x: W + 30,
              duration: 8000,
              ease: "Linear",
              repeat: -1,
              onRepeat: () => {
                sfxConveyor();
              },
            });
            // Animate conveyor lines
            this.tweens.add({
              targets: this.conveyorLines,
              x: "+=40",
              duration: 2000,
              ease: "Linear",
              repeat: -1,
              onRepeat: () => {
                this.conveyorLines.forEach((l) => {
                  if (l.x > W) l.setX(l.x - W - 40);
                });
              },
            });
          }

          tick() {
            if (this.answered || this.timeLeft <= 0) return;
            this.timeLeft--;
            this.hudTimer.setText("\u{23F1} " + this.timeLeft + "s");
            if (this.timeLeft <= 5 && this.timeLeft > 0) {
              beep(300, 0.04, "square", 0.04);
              this.hudTimer.setColor("#ff4444");
            }
            if (this.timeLeft <= 0) {
              this.timeout();
            }
          }

          timeout() {
            this.answered = true;
            sfxNo();
            this.streak = 0;
            this.combo = 1;
            this.lives--;
            this.showFB(false);
            this.cameras.main.shake(200, 0.01);
            this.updateHUD();
            if (this.lives <= 0)
              this.time.delayedCall(1500, () => this.endGame());
          }

          loadQ() {
            if (this.qIdx >= this.questions.length)
              this.questions.push(...genQuestions());
            const q = this.questions[this.qIdx];
            this.answered = false;
            this.attempts = 0;
            this.timeLeft = this.baseTime;
            this.hudTimer.setColor("#ffd700");

            this.qCat.setText(q.icon + " " + q.cat);
            this.qText.setText(q.text);

            q.choices.forEach((c, i) => {
              this.btnTexts[i].setText(
                String.fromCharCode(65 + i) + ". " + c + " " + q.unit,
              );
              this.btns[i].fillColor = 0x0d1527;
              this.btns[i].setStrokeStyle(2, 0x1a2744);
              this.btns[i].setAlpha(1);
              this.btnTexts[i].setAlpha(1);
              this.btns[i].setInteractive();
            });

            this.hintBg.setAlpha(0);
            this.hintTxt.setAlpha(0);
            this.fbBg.setAlpha(0);
            this.fbTxt.setAlpha(0);
            this.nxtBtn.setAlpha(0);
            this.nxtTxt.setAlpha(0);
            this.updateHUD();
          }

          pick(i) {
            if (this.answered) return;
            audio();
            const q = this.questions[this.qIdx];
            const chosen = q.choices[i];

            if (chosen === q.correctStr) {
              this.answered = true;
              sfxOk();
              this.correct++;
              this.total++;
              this.streak++;
              if (this.streak > this.bestStreak) this.bestStreak = this.streak;
              this.combo = Math.min(5, 1 + Math.floor(this.streak / 3));
              const pts =
                (100 + (this.attempts === 0 ? 50 : 0) + this.streak * 15) *
                this.combo;
              this.score += pts;
              this.xp += 20;
              if (this.xp >= 100) {
                this.xp -= 100;
                this.level++;
                sfxLvl();
              }

              // Damage enemy
              const dmg = 100 / 5;
              this.enemyHp = Math.max(0, this.enemyHp - dmg);
              this.enemyHpBar.setDisplaySize(Math.max(0, this.enemyHp * 2), 10);
              this.tweens.add({
                targets: this.enemySprite,
                angle: 10,
                duration: 80,
                yoyo: true,
                repeat: 2,
              });
              if (this.enemyHp <= 0) {
                this.level++;
                this.enemyHp = 100;
                this.enemyHpBar.setDisplaySize(200, 10);
                sfxLvl();
                this.showLevelBanner();
              }

              this.btns[i].fillColor = C.ok;
              this.showFB(true);
              this.spawnParts(this.btns[i].x, this.btns[i].y, true);
              this.showPts(pts);
            } else {
              sfxNo();
              this.attempts++;
              this.btns[i].fillColor = C.err;
              this.btns[i].setAlpha(0.4);
              this.btns[i].disableInteractive();
              this.cameras.main.shake(120, 0.006);

              if (this.attempts >= 2) {
                this.answered = true;
                this.total++;
                this.streak = 0;
                this.combo = 1;
                this.lives--;
                q.choices.forEach((c, j) => {
                  if (c === q.correctStr) this.btns[j].fillColor = C.ok;
                });
                this.showFB(false);
                if (this.lives <= 0)
                  this.time.delayedCall(1500, () => this.endGame());
              } else {
                this.hintBg.setAlpha(0.8);
                this.hintTxt.setText("\u{1F4A1} " + q.hint).setAlpha(1);
              }
            }
            this.updateHUD();
          }

          showFB(ok) {
            const q = this.questions[this.qIdx];
            this.fbBg.setAlpha(0.95);
            this.fbBg.fillColor = ok ? 0x0a2010 : 0x200a0a;
            this.fbTxt.setText((ok ? "✅ " : "❌ ") + q.explain).setAlpha(1);
            this.nxtBtn.setAlpha(1);
            this.nxtTxt.setAlpha(1);
            this.nxtTxt.setText(this.lives <= 0 ? "RESULTS" : "NEXT UNIT >");
          }

          showPts(p) {
            const t = this.add
              .text(
                W / 2,
                200,
                "+" + p + (this.combo > 1 ? " x" + this.combo : ""),
                {
                  fontSize: "24px",
                  fontFamily: "Arial Black",
                  color: "#ffd700",
                  stroke: "#000",
                  strokeThickness: 3,
                },
              )
              .setOrigin(0.5);
            this.tweens.add({
              targets: t,
              y: 160,
              alpha: 0,
              duration: 1000,
              onComplete: () => t.destroy(),
            });
          }

          showLevelBanner() {
            const bg = this.add
              .rectangle(W / 2, H / 2, 400, 120, C.panel, 0.95)
              .setStrokeStyle(2, C.gold)
              .setDepth(100);
            const txt = this.add
              .text(W / 2, H / 2 - 15, "PRODUCTION LEVEL " + this.level + "!", {
                fontSize: "24px",
                fontFamily: "Arial Black",
                color: "#ffd700",
              })
              .setOrigin(0.5)
              .setDepth(101);
            const sub = this.add
              .text(W / 2, H / 2 + 20, "Machine upgraded!", {
                fontSize: "14px",
                color: "#00f5c4",
              })
              .setOrigin(0.5)
              .setDepth(101);
            this.time.delayedCall(1800, () => {
              bg.destroy();
              txt.destroy();
              sub.destroy();
            });
          }

          spawnParts(x, y, ok) {
            const colors = ok
              ? [C.teal, C.gold, C.ok, C.white]
              : [C.err, C.rose];
            for (let i = 0; i < 14; i++) {
              const p = this.add.circle(
                x,
                y,
                2 + Math.random() * 3,
                colors[Math.floor(Math.random() * colors.length)],
              );
              this.tweens.add({
                targets: p,
                x: x + (Math.random() - 0.5) * 280,
                y: y + (Math.random() - 0.5) * 180,
                alpha: 0,
                scale: 0,
                duration: 500 + Math.random() * 400,
                onComplete: () => p.destroy(),
              });
            }
          }

          nextQ() {
            if (!this.answered) return;
            sfxClick();
            if (this.lives <= 0) {
              this.endGame();
              return;
            }
            this.qIdx++;
            this.loadQ();
          }

          updateHUD() {
            this.hudScore.setText(this.score.toLocaleString());
            this.hudStreak.setText("\u{1F525} " + this.streak + "x");
            this.hudLives.setText("❤️".repeat(Math.max(0, this.lives)));
            this.hudTimer.setText("\u{23F1} " + this.timeLeft + "s");
            this.hudQ.setText(
              "Unit " + (this.qIdx + 1) + " | Lv " + this.level,
            );
            this.hudXpFill.setDisplaySize(this.xp * 2, 4);
          }

          endGame() {
            this.timerEvt.remove();
            if (this.productTween) this.productTween.stop();
            this.cameras.main.fadeOut(500);
            this.time.delayedCall(500, () => {
              this.scene.start("ResultScene", {
                score: this.score,
                correct: this.correct,
                total: this.total,
                bestStreak: this.bestStreak,
                level: this.level,
                mode: this.mode,
              });
            });
          }
        }

        // ─── RESULT SCENE ───
        class ResultScene extends Phaser.Scene {
          constructor() {
            super("ResultScene");
          }
          init(d) {
            Object.assign(this, d);
          }
          create() {
            this.cameras.main.setBackgroundColor(C.bg).fadeIn(500);
            const pct =
              this.total > 0
                ? Math.round((this.correct / this.total) * 100)
                : 0;

            try {
              window.EduPulse &&
                EduPulse.record({
                  activityTitle: document.title,
                  score: this.correct,
                  maxScore: this.total,
                  problemsCorrect: this.correct,
                  problemsAttempted: this.total,
                  standard: "6.RP.A.2",
                });
            } catch (e) {}

            let rank, emoji;
            if (pct >= 90) {
              rank = "S — FACTORY LEGEND";
              emoji = "\u{1F451}";
            } else if (pct >= 80) {
              rank = "A — EXCELLENT";
              emoji = "\u{1F3C6}";
            } else if (pct >= 70) {
              rank = "B — GREAT";
              emoji = "⭐";
            } else if (pct >= 60) {
              rank = "C — GOOD TRY";
              emoji = "\u{1F4AA}";
            } else {
              rank = "KEEP TRAINING";
              emoji = "\u{1F4DA}";
            }

            this.add
              .text(W / 2, 80, emoji, { fontSize: "64px" })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 150, "PRODUCTION REPORT", {
                fontSize: "40px",
                fontFamily: "Arial Black",
                color: "#00f5c4",
                stroke: "#000",
                strokeThickness: 3,
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 200, rank, {
                fontSize: "20px",
                color: "#fff",
                fontStyle: "bold",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 260, this.score.toLocaleString(), {
                fontSize: "52px",
                fontFamily: "Arial Black",
                color: "#ffd700",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 300, "POINTS", {
                fontSize: "12px",
                color: "#64748b",
              })
              .setOrigin(0.5);

            const stats = [
              { l: "Correct", v: this.correct + "/" + this.total },
              { l: "Accuracy", v: pct + "%" },
              { l: "Best Streak", v: this.bestStreak },
              { l: "Level", v: this.level },
            ];
            stats.forEach((s, i) => {
              const x = 162 + i * 200,
                y = 400;
              this.add
                .rectangle(x, y, 170, 80, C.panel)
                .setStrokeStyle(1, 0x1a2744);
              this.add
                .text(x, y - 10, String(s.v), {
                  fontSize: "24px",
                  fontFamily: "Arial Black",
                  color: "#00f5c4",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 20, s.l, { fontSize: "11px", color: "#64748b" })
                .setOrigin(0.5);
            });

            const btn = this.add
              .rectangle(W / 2, 520, 260, 54, C.teal)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2, 520, "PLAY AGAIN", {
                fontSize: "20px",
                fontFamily: "Arial Black",
                color: "#0a0e1a",
              })
              .setOrigin(0.5);
            btn.on("pointerdown", () => {
              sfxClick();
              this.scene.start("TitleScene");
            });
            btn.on("pointerover", () => btn.setScale(1.05));
            btn.on("pointerout", () => btn.setScale(1));

            for (let i = 0; i < 25; i++) {
              const p = this.add.circle(
                Math.random() * W,
                Math.random() * H,
                2 + Math.random() * 2,
                [C.teal, C.gold, C.purple][Math.floor(Math.random() * 3)],
                0.5,
              );
              this.tweens.add({
                targets: p,
                y: p.y - 200 - Math.random() * 300,
                alpha: 0,
                duration: 2000 + Math.random() * 2000,
                delay: Math.random() * 1000,
                repeat: -1,
              });
            }
          }
        }

        new Phaser.Game({
          type: Phaser.AUTO,
          parent: "game-container",
          width: W,
          height: H,
          backgroundColor: "#0a0e1a",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          scene: [TitleScene, GameScene, ResultScene],
        });
      })();
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
  </body>
