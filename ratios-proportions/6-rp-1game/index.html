<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ratio Kitchen — 6.RP.A.1</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
      // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror
      // (document.write blocks parsing so the mirror is ready before the game script runs).
      if (typeof Phaser === "undefined") {
        document.write(
          '<script src="https://unpkg.com/phaser@3.80.1/dist/phaser.min.js"><\/script>',
        );
      }
      // If both CDNs are unreachable, show a clear message instead of a blank page.
      window.addEventListener("load", function () {
        if (typeof Phaser === "undefined") {
          document.body.innerHTML =
            '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">\u26a0\ufe0f This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
        }
      });
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a0a2e;
        overflow: hidden;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script>
      (() => {
        // ─── SOUND ENGINE ───
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let actx = null;
        function ensureAudio() {
          if (!actx) actx = new AudioCtx();
          if (actx.state === "suspended") actx.resume();
        }
        function beep(freq, dur, type = "sine", vol = 0.18) {
          if (!actx) return;
          const o = actx.createOscillator(),
            g = actx.createGain();
          o.connect(g);
          g.connect(actx.destination);
          o.frequency.value = freq;
          o.type = type;
          g.gain.setValueAtTime(vol, actx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
          o.start();
          o.stop(actx.currentTime + dur);
        }
        function sfxCorrect() {
          beep(523, 0.08);
          setTimeout(() => beep(659, 0.08), 80);
          setTimeout(() => beep(784, 0.15), 160);
        }
        function sfxWrong() {
          beep(180, 0.25, "square", 0.12);
        }
        function sfxClick() {
          beep(440, 0.06, "sine", 0.1);
        }
        function sfxLevelUp() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => beep(f, 0.15), i * 100),
          );
        }
        function sfxServe() {
          beep(880, 0.1, "triangle", 0.12);
          setTimeout(() => beep(1200, 0.08, "triangle", 0.08), 60);
        }
        function sfxTimer() {
          beep(300, 0.05, "square", 0.05);
        }

        // ─── QUESTION BANK ───
        function generateQuestions() {
          const items = [
            "apples",
            "oranges",
            "lemons",
            "limes",
            "eggs",
            "cups of flour",
            "cups of sugar",
            "tomatoes",
            "peppers",
            "onions",
            "carrots",
            "potatoes",
            "slices of bread",
            "meatballs",
            "cookies",
            "cupcakes",
            "pancakes",
            "sausages",
            "mushrooms",
            "olives",
          ];
          const qs = [];

          // Type 1: Simple "what is the ratio" (part-to-part)
          function mkRatio() {
            const a = 2 + Math.floor(Math.random() * 10);
            const b = 2 + Math.floor(Math.random() * 10);
            if (a === b) return mkRatio();
            const i1 = items[Math.floor(Math.random() * items.length)];
            let i2 = items[Math.floor(Math.random() * items.length)];
            while (i2 === i1)
              i2 = items[Math.floor(Math.random() * items.length)];
            const correct = `${a}:${b}`;
            const wrong = [`${b}:${a}`, `${a + b}:${a}`, `${a}:${a + b}`];
            return {
              scene: `A recipe needs ${a} ${i1} and ${b} ${i2}.`,
              ask: `What is the ratio of ${i1} to ${i2}?`,
              correct,
              choices: shuffle([correct, ...wrong]),
              explain: `${i1} to ${i2} means ${i1} first: ${a}:${b}`,
              hint: `Put ${i1} first, ${i2} second`,
            };
          }

          // Type 2: Part-to-whole
          function mkPartWhole() {
            const a = 2 + Math.floor(Math.random() * 8);
            const b = 2 + Math.floor(Math.random() * 8);
            const total = a + b;
            const i1 = items[Math.floor(Math.random() * items.length)];
            let i2 = items[Math.floor(Math.random() * items.length)];
            while (i2 === i1)
              i2 = items[Math.floor(Math.random() * items.length)];
            const correct = `${a}:${total}`;
            const wrong = [`${a}:${b}`, `${total}:${a}`, `${b}:${total}`];
            return {
              scene: `A bowl has ${a} ${i1} and ${b} ${i2}.`,
              ask: `What is the ratio of ${i1} to ALL items?`,
              correct,
              choices: shuffle([correct, ...wrong]),
              explain: `Part-to-whole: ${a} ${i1} out of ${total} total = ${a}:${total}`,
              hint: `Total = ${a} + ${b} = ${total}`,
            };
          }

          // Type 3: Scale a recipe
          function mkScale() {
            const base = 2 + Math.floor(Math.random() * 5);
            const mult = 2 + Math.floor(Math.random() * 4);
            const needed = base * mult;
            const partner = 1 + Math.floor(Math.random() * 6);
            const partnerNeeded = partner * mult;
            const i1 = items[Math.floor(Math.random() * items.length)];
            let i2 = items[Math.floor(Math.random() * items.length)];
            while (i2 === i1)
              i2 = items[Math.floor(Math.random() * items.length)];
            const correct = `${partnerNeeded}`;
            const wrong = [
              `${partner}`,
              `${partner * (mult + 1)}`,
              `${partner * (mult - 1)}`,
            ];
            return {
              scene: `Recipe ratio: ${base} ${i1} for every ${partner} ${i2}.`,
              ask: `If you use ${needed} ${i1}, how many ${i2}?`,
              correct,
              choices: shuffle([correct, ...wrong]),
              explain: `${needed} ÷ ${base} = ${mult}. So ${partner} × ${mult} = ${partnerNeeded}`,
              hint: `Find the multiplier: ${needed} ÷ ${base}`,
            };
          }

          // Type 4: Equivalent ratio identification
          function mkEquiv() {
            const a = 2 + Math.floor(Math.random() * 6);
            const b = 2 + Math.floor(Math.random() * 6);
            const m = 2 + Math.floor(Math.random() * 4);
            const correct = `${a * m}:${b * m}`;
            const wrong = [
              `${a * m}:${b * (m + 1)}`,
              `${a * (m - 1)}:${b * m}`,
              `${a + m}:${b + m}`,
            ];
            return {
              scene: `The base recipe ratio is ${a}:${b}.`,
              ask: `Which ratio is equivalent to ${a}:${b}?`,
              correct,
              choices: shuffle([correct, ...wrong]),
              explain: `Multiply both by ${m}: ${a}×${m}=${a * m}, ${b}×${m}=${b * m}`,
              hint: `Multiply BOTH parts by the same number`,
            };
          }

          // Type 5: Ratio language / notation
          function mkNotation() {
            const a = 3 + Math.floor(Math.random() * 8);
            const b = 2 + Math.floor(Math.random() * 8);
            const forms = [`${a}:${b}`, `${a} to ${b}`, `${a}/${b}`];
            const wrong = [`${b}:${a}`, `${a + b}:${a}`, `${b} to ${a}`];
            const correct = forms[Math.floor(Math.random() * forms.length)];
            return {
              scene: `A chef uses ${a} cups of sauce and ${b} cups of cheese.`,
              ask: `Which shows the ratio of sauce to cheese?`,
              correct,
              choices: shuffle([correct, ...wrong]),
              explain: `Sauce to cheese → sauce first: ${a}:${b} or "${a} to ${b}" or ${a}/${b}`,
              hint: `Sauce comes FIRST in this ratio`,
            };
          }

          const generators = [
            mkRatio,
            mkPartWhole,
            mkScale,
            mkEquiv,
            mkNotation,
          ];
          for (let i = 0; i < 20; i++) {
            qs.push(generators[i % generators.length]());
          }
          return shuffle(qs);
        }

        function shuffle(arr) {
          const a = [...arr];
          for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        }

        // ─── GAME CONFIG ───
        const W = 1024,
          H = 768;
        const COLORS = {
          bg: 0x1a0a2e,
          panel: 0x2d1b4e,
          accent: 0xf093fb,
          gold: 0xf39c12,
          pink: 0xf5576c,
          teal: 0x11998e,
          green: 0x27ae60,
          red: 0xe74c3c,
          white: 0xffffff,
          dark: 0x0a0015,
          orange: 0xe67e22,
        };

        // ─── TITLE SCENE ───
        class TitleScene extends Phaser.Scene {
          constructor() {
            super("TitleScene");
          }
          create() {
            this.cameras.main.setBackgroundColor(COLORS.bg);
            // Animated BG particles
            const particles = this.add.particles(0, 0, "flare", {
              x: { min: 0, max: W },
              y: { min: 0, max: H },
              scale: { start: 0.1, end: 0 },
              alpha: { start: 0.4, end: 0 },
              speed: 20,
              lifespan: 3000,
              frequency: 200,
              blendMode: "ADD",
              tint: [COLORS.accent, COLORS.gold, COLORS.pink],
            });

            // Title
            const title = this.add
              .text(W / 2, 160, "RATIO KITCHEN", {
                fontSize: "64px",
                fontFamily: "Arial Black, sans-serif",
                color: "#f39c12",
                stroke: "#000",
                strokeThickness: 6,
              })
              .setOrigin(0.5);
            this.tweens.add({
              targets: title,
              y: 155,
              duration: 2000,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut",
            });

            this.add
              .text(W / 2, 230, "6.RP.A.1 — Understand Ratio Concepts", {
                fontSize: "20px",
                fontFamily: "Arial, sans-serif",
                color: "#cc88ff",
              })
              .setOrigin(0.5);

            this.add
              .text(
                W / 2,
                265,
                "Run a kitchen! Scale recipes using ratios to serve customers!",
                {
                  fontSize: "16px",
                  fontFamily: "Arial, sans-serif",
                  color: "#9966cc",
                },
              )
              .setOrigin(0.5);

            // Chef selection
            const chefs = [
              {
                emoji: "\u{1F468}‍\u{1F373}",
                name: "Chef Marco",
                power: "Speed Cook",
              },
              {
                emoji: "\u{1F469}‍\u{1F373}",
                name: "Chef Luna",
                power: "Ratio Eye",
              },
              {
                emoji: "\u{1F9D1}‍\u{1F373}",
                name: "Chef Kai",
                power: "Combo Chef",
              },
              { emoji: "\u{1F477}", name: "Chef Rex", power: "Iron Will" },
            ];
            this.selectedChef = -1;
            this.chefCards = [];

            chefs.forEach((c, i) => {
              const x = 212 + i * 170,
                y = 400;
              const card = this.add
                .rectangle(x, y, 140, 160, COLORS.panel)
                .setStrokeStyle(3, 0x4a2080)
                .setInteractive({ useHandCursor: true });
              this.add
                .text(x, y - 35, c.emoji, { fontSize: "48px" })
                .setOrigin(0.5);
              this.add
                .text(x, y + 25, c.name, {
                  fontSize: "14px",
                  fontFamily: "Arial",
                  color: "#fff",
                  fontStyle: "bold",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 48, c.power, {
                  fontSize: "12px",
                  fontFamily: "Arial",
                  color: "#cc88ff",
                })
                .setOrigin(0.5);
              card.on("pointerdown", () => {
                ensureAudio();
                sfxClick();
                this.chefCards.forEach((cc, j) => {
                  cc.setStrokeStyle(3, j === i ? COLORS.gold : 0x4a2080);
                });
                this.selectedChef = i;
                startBtn.setAlpha(1);
              });
              card.on("pointerover", () => card.setScale(1.05));
              card.on("pointerout", () => card.setScale(1));
              this.chefCards.push(card);
            });

            // Start button
            const startBtn = this.add
              .rectangle(W / 2, 580, 260, 60, COLORS.pink)
              .setInteractive({ useHandCursor: true })
              .setAlpha(0.4);
            this.add
              .text(W / 2, 580, "START COOKING", {
                fontSize: "24px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);
            startBtn.on("pointerdown", () => {
              if (this.selectedChef < 0) return;
              ensureAudio();
              sfxClick();
              this.cameras.main.fadeOut(400, 0, 0, 0);
              this.time.delayedCall(400, () => {
                this.scene.start("GameScene", {
                  chef: chefs[this.selectedChef],
                });
              });
            });
            startBtn.on("pointerover", () => {
              if (this.selectedChef >= 0) startBtn.setScale(1.05);
            });
            startBtn.on("pointerout", () => startBtn.setScale(1));

            this.add
              .text(W / 2, 720, "Keyboard + Touch | Level 1 Friendly", {
                fontSize: "12px",
                color: "#666",
              })
              .setOrigin(0.5);

            this.cameras.main.fadeIn(500);
          }
        }

        // ─── GAME SCENE ───
        class GameScene extends Phaser.Scene {
          constructor() {
            super("GameScene");
          }
          init(data) {
            this.chef = data.chef;
          }

          create() {
            this.cameras.main.setBackgroundColor(COLORS.bg);
            this.cameras.main.fadeIn(400);

            // State
            this.questions = generateQuestions();
            this.qIndex = 0;
            this.score = 0;
            this.streak = 0;
            this.bestStreak = 0;
            this.correct = 0;
            this.total = 0;
            this.lives = 5;
            this.level = 1;
            this.combo = 1;
            this.timeLeft = 30;
            this.answered = false;
            this.customersServed = 0;

            // ─── Kitchen Background ───
            this.add.rectangle(W / 2, H / 2, W, H, 0x1e1028);
            // Counter
            this.add.rectangle(W / 2, 680, W, 180, 0x3d2158);
            this.add.rectangle(W / 2, 594, W, 6, COLORS.gold).setAlpha(0.3);

            // ─── HUD ───
            this.hudBg = this.add
              .rectangle(W / 2, 30, W, 60, 0x0a0015)
              .setAlpha(0.95);
            this.hudChef = this.add.text(20, 18, this.chef.emoji, {
              fontSize: "28px",
            });
            this.hudName = this.add.text(58, 12, this.chef.name, {
              fontSize: "14px",
              color: "#f093fb",
              fontStyle: "bold",
            });
            this.hudLevel = this.add.text(58, 32, "Level 1", {
              fontSize: "12px",
              color: "#cc88ff",
            });
            this.hudScore = this.add
              .text(W / 2, 18, "0", {
                fontSize: "28px",
                fontFamily: "Arial Black",
                color: "#f39c12",
              })
              .setOrigin(0.5, 0);
            this.hudScoreLbl = this.add
              .text(W / 2, 48, "POINTS", { fontSize: "10px", color: "#888" })
              .setOrigin(0.5);
            this.hudStreak = this.add.text(W - 200, 20, "", {
              fontSize: "16px",
              color: "#f093fb",
              fontStyle: "bold",
            });
            this.hudLives = this.add.text(W - 80, 15, "", {
              fontSize: "14px",
              color: "#f5576c",
            });
            this.hudTimer = this.add.text(W - 80, 35, "30s", {
              fontSize: "14px",
              color: "#f39c12",
            });
            this.hudQ = this.add.text(200, 20, "", {
              fontSize: "12px",
              color: "#aaa",
            });

            // ─── Customer Area ───
            this.customerEmojis = [
              "\u{1F466}",
              "\u{1F467}",
              "\u{1F468}",
              "\u{1F469}",
              "\u{1F475}",
              "\u{1F474}",
              "\u{1F9D1}",
              "\u{1F471}",
            ];
            this.customerSprite = this.add
              .text(W / 2, 100, this.customerEmojis[0], { fontSize: "56px" })
              .setOrigin(0.5)
              .setAlpha(0);
            this.customerBubble = this.add
              .rectangle(W / 2, 160, 500, 40, COLORS.panel, 0.9)
              .setAlpha(0);

            // ─── Question Card ───
            this.qCard = this.add
              .rectangle(W / 2, 340, 700, 260, COLORS.panel)
              .setStrokeStyle(2, 0x4a2080);
            this.qGlow = this.add.rectangle(W / 2, 211, 700, 4, 0).setAlpha(0);
            this.qScene = this.add
              .text(W / 2, 240, "", {
                fontSize: "16px",
                color: "#cc88ff",
                fontFamily: "Arial",
                wordWrap: { width: 640 },
                align: "center",
              })
              .setOrigin(0.5);
            this.qAsk = this.add
              .text(W / 2, 290, "", {
                fontSize: "20px",
                color: "#fff",
                fontFamily: "Arial",
                fontStyle: "bold",
                wordWrap: { width: 640 },
                align: "center",
              })
              .setOrigin(0.5);

            // ─── Choice Buttons ───
            this.choiceBtns = [];
            this.choiceTexts = [];
            const letters = ["A", "B", "C", "D"];
            for (let i = 0; i < 4; i++) {
              const col = i % 2,
                row = Math.floor(i / 2);
              const x = W / 2 - 165 + col * 330,
                y = 370 + row * 65;
              const btn = this.add
                .rectangle(x, y, 310, 52, 0x1a0a2e)
                .setStrokeStyle(2, 0x4a2080)
                .setInteractive({ useHandCursor: true });
              const txt = this.add
                .text(x, y, "", {
                  fontSize: "16px",
                  color: "#fff",
                  fontFamily: "Arial",
                  fontStyle: "bold",
                })
                .setOrigin(0.5);
              btn.on("pointerdown", () => this.pickAnswer(i));
              btn.on("pointerover", () => {
                if (!this.answered) btn.setStrokeStyle(2, COLORS.accent);
              });
              btn.on("pointerout", () => {
                if (!this.answered) btn.setStrokeStyle(2, 0x4a2080);
              });
              this.choiceBtns.push(btn);
              this.choiceTexts.push(txt);
            }

            // ─── Hint Panel ───
            this.hintBg = this.add
              .rectangle(W / 2, 510, 600, 44, 0x332200)
              .setAlpha(0);
            this.hintText = this.add
              .text(W / 2, 510, "", {
                fontSize: "14px",
                color: "#f39c12",
                fontFamily: "Arial",
              })
              .setOrigin(0.5)
              .setAlpha(0);

            // ─── Feedback ───
            this.feedbackBg = this.add
              .rectangle(W / 2, 560, 700, 50, COLORS.panel)
              .setAlpha(0);
            this.feedbackText = this.add
              .text(W / 2, 560, "", {
                fontSize: "15px",
                color: "#fff",
                fontFamily: "Arial",
                wordWrap: { width: 640 },
                align: "center",
              })
              .setOrigin(0.5)
              .setAlpha(0);

            // ─── Next Button ───
            this.nextBtn = this.add
              .rectangle(W / 2, 630, 200, 48, COLORS.accent)
              .setInteractive({ useHandCursor: true })
              .setAlpha(0);
            this.nextBtnText = this.add
              .text(W / 2, 630, "NEXT ORDER >", {
                fontSize: "16px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5)
              .setAlpha(0);
            this.nextBtn.on("pointerdown", () => {
              if (this.answered) this.nextQuestion();
            });

            // ─── Timer ───
            this.timerEvent = this.time.addEvent({
              delay: 1000,
              callback: this.tickTimer,
              callbackScope: this,
              loop: true,
            });

            // ─── Particles ───
            this.sparkGfx = this.make.graphics({ add: false });
            this.sparkGfx.fillStyle(0xffffff);
            this.sparkGfx.fillCircle(4, 4, 4);
            this.sparkGfx.generateTexture("spark", 8, 8);
            this.sparkGfx.destroy();

            // ─── Keyboard ───
            this.input.keyboard.on("keydown", (e) => {
              if (e.key === "1" || e.key === "a") this.pickAnswer(0);
              if (e.key === "2" || e.key === "b") this.pickAnswer(1);
              if (e.key === "3" || e.key === "c") this.pickAnswer(2);
              if (e.key === "4" || e.key === "d") this.pickAnswer(3);
              if (e.key === "Enter" && this.answered) this.nextQuestion();
            });

            this.loadQuestion();
          }

          tickTimer() {
            if (this.answered || this.timeLeft <= 0) return;
            this.timeLeft--;
            this.hudTimer.setText(this.timeLeft + "s");
            if (this.timeLeft <= 5 && this.timeLeft > 0) {
              sfxTimer();
              this.hudTimer.setColor("#ff4444");
            }
            if (this.timeLeft <= 0) {
              this.handleTimeout();
            }
          }

          handleTimeout() {
            this.answered = true;
            sfxWrong();
            this.streak = 0;
            this.combo = 1;
            this.lives--;
            this.showFeedback(false, this.questions[this.qIndex]);
            this.cameras.main.shake(200, 0.01);
            this.updateHUD();
            if (this.lives <= 0) {
              this.time.delayedCall(1500, () => this.endGame());
            }
          }

          loadQuestion() {
            if (this.qIndex >= this.questions.length) {
              this.questions = [...this.questions, ...generateQuestions()];
            }
            const q = this.questions[this.qIndex];
            this.answered = false;
            this.timeLeft = Math.max(15, 30 - this.level * 2);
            this.hudTimer.setColor("#f39c12");
            this.attempts = 0;

            // Customer animation
            const ce =
              this.customerEmojis[
                Math.floor(Math.random() * this.customerEmojis.length)
              ];
            this.customerSprite.setText(ce);
            this.tweens.add({
              targets: this.customerSprite,
              alpha: 1,
              x: W / 2,
              duration: 400,
              ease: "Back.easeOut",
            });
            this.tweens.add({
              targets: this.customerBubble,
              alpha: 0.9,
              duration: 300,
            });

            // Set question
            this.qScene.setText(q.scene);
            this.qAsk.setText(q.ask);

            // Set choices
            q.choices.forEach((c, i) => {
              this.choiceTexts[i].setText(
                String.fromCharCode(65 + i) + ". " + c,
              );
              this.choiceBtns[i].fillColor = 0x1a0a2e;
              this.choiceBtns[i].setStrokeStyle(2, 0x4a2080);
              this.choiceBtns[i].setAlpha(1);
              this.choiceTexts[i].setAlpha(1);
              this.choiceBtns[i].setInteractive();
            });

            // Hide hint/feedback/next
            this.hintBg.setAlpha(0);
            this.hintText.setAlpha(0);
            this.feedbackBg.setAlpha(0);
            this.feedbackText.setAlpha(0);
            this.nextBtn.setAlpha(0);
            this.nextBtnText.setAlpha(0);

            this.updateHUD();

            // Card entrance
            this.tweens.add({
              targets: [this.qCard],
              scaleX: { from: 0.95, to: 1 },
              scaleY: { from: 0.95, to: 1 },
              alpha: { from: 0.5, to: 1 },
              duration: 300,
              ease: "Back.easeOut",
            });
          }

          pickAnswer(idx) {
            if (this.answered) return;
            ensureAudio();
            const q = this.questions[this.qIndex];
            const chosen = q.choices[idx];

            if (chosen === q.correct) {
              // CORRECT
              this.answered = true;
              sfxCorrect();
              this.correct++;
              this.total++;
              this.streak++;
              if (this.streak > this.bestStreak) this.bestStreak = this.streak;
              this.combo = Math.min(5, 1 + Math.floor(this.streak / 3));
              const pts =
                (100 + (this.attempts === 0 ? 50 : 0) + this.streak * 10) *
                this.combo;
              this.score += pts;
              this.customersServed++;

              // Level up every 4 correct
              if (this.correct % 4 === 0) {
                this.level++;
                sfxLevelUp();
              }

              this.choiceBtns[idx].fillColor = COLORS.green;
              this.showFeedback(true, q);
              this.spawnParticles(
                this.choiceBtns[idx].x,
                this.choiceBtns[idx].y,
                true,
              );
              this.showServeAnimation();
              this.showPointsPopup(pts);
            } else {
              // WRONG
              sfxWrong();
              this.attempts++;
              this.choiceBtns[idx].fillColor = COLORS.red;
              this.choiceBtns[idx].setAlpha(0.4);
              this.choiceBtns[idx].disableInteractive();
              this.cameras.main.shake(150, 0.008);

              if (this.attempts >= 2) {
                this.answered = true;
                this.total++;
                this.streak = 0;
                this.combo = 1;
                this.lives--;
                // Reveal correct
                q.choices.forEach((c, i) => {
                  if (c === q.correct)
                    this.choiceBtns[i].fillColor = COLORS.green;
                });
                this.showFeedback(false, q);
                if (this.lives <= 0) {
                  this.time.delayedCall(1500, () => this.endGame());
                }
              } else {
                // Show hint
                this.hintBg.setAlpha(0.8);
                this.hintText.setText("\u{1F4A1} " + q.hint).setAlpha(1);
              }
            }
            this.updateHUD();
          }

          showFeedback(correct, q) {
            this.feedbackBg.setAlpha(0.95);
            this.feedbackBg.fillColor = correct ? 0x1a3d1a : 0x3d1a1a;
            const prefix = correct
              ? "✅ Correct! "
              : "❌ " + (this.timeLeft <= 0 ? "Time up! " : "Wrong. ");
            this.feedbackText.setText(prefix + q.explain).setAlpha(1);
            this.nextBtn.setAlpha(1);
            this.nextBtnText.setAlpha(1);
            this.nextBtnText.setText(
              this.lives <= 0 ? "SEE RESULTS" : "NEXT ORDER >",
            );
          }

          showServeAnimation() {
            sfxServe();
            const plate = this.add
              .text(W / 2, 400, "\u{1F37D}️", { fontSize: "48px" })
              .setOrigin(0.5);
            this.tweens.add({
              targets: plate,
              y: 100,
              alpha: 0,
              scale: 0.3,
              duration: 800,
              ease: "Power2",
              onComplete: () => plate.destroy(),
            });
            // Customer happy
            this.tweens.add({
              targets: this.customerSprite,
              x: W + 100,
              alpha: 0,
              duration: 600,
              delay: 400,
              ease: "Power2",
            });
          }

          showPointsPopup(pts) {
            const pop = this.add
              .text(
                W / 2,
                200,
                "+" + pts + (this.combo > 1 ? " x" + this.combo : ""),
                {
                  fontSize: "28px",
                  fontFamily: "Arial Black",
                  color: "#f39c12",
                  stroke: "#000",
                  strokeThickness: 3,
                },
              )
              .setOrigin(0.5);
            this.tweens.add({
              targets: pop,
              y: 150,
              alpha: 0,
              duration: 1200,
              ease: "Power2",
              onComplete: () => pop.destroy(),
            });
          }

          spawnParticles(x, y, good) {
            const colors = good
              ? [0xf39c12, 0xf093fb, 0x27ae60, 0xffffff]
              : [0xe74c3c, 0xff6b6b];
            for (let i = 0; i < 16; i++) {
              const p = this.add.circle(
                x,
                y,
                3 + Math.random() * 3,
                colors[Math.floor(Math.random() * colors.length)],
              );
              this.tweens.add({
                targets: p,
                x: x + (Math.random() - 0.5) * 300,
                y: y + (Math.random() - 0.5) * 200,
                alpha: 0,
                scale: 0,
                duration: 600 + Math.random() * 400,
                ease: "Power2",
                onComplete: () => p.destroy(),
              });
            }
          }

          nextQuestion() {
            if (!this.answered) return;
            sfxClick();
            if (this.lives <= 0) {
              this.endGame();
              return;
            }
            // Customer leaves
            this.customerSprite.setAlpha(0).setX(W / 2);
            this.customerBubble.setAlpha(0);
            this.qIndex++;
            this.loadQuestion();
          }

          updateHUD() {
            this.hudScore.setText(this.score.toLocaleString());
            this.hudLevel.setText("Level " + this.level);
            this.hudStreak.setText(
              this.streak >= 3 ? "\u{1F525} x" + this.streak : "",
            );
            this.hudLives.setText("❤️ ".repeat(Math.max(0, this.lives)));
            this.hudTimer.setText(this.timeLeft + "s");
            this.hudQ.setText(
              "Order " +
                (this.qIndex + 1) +
                " | Served: " +
                this.customersServed,
            );
          }

          endGame() {
            this.timerEvent.remove();
            this.cameras.main.fadeOut(500, 0, 0, 0);
            this.time.delayedCall(500, () => {
              this.scene.start("ResultScene", {
                chef: this.chef,
                score: this.score,
                correct: this.correct,
                total: this.total,
                bestStreak: this.bestStreak,
                level: this.level,
                served: this.customersServed,
              });
            });
          }
        }

        // ─── RESULT SCENE ───
        class ResultScene extends Phaser.Scene {
          constructor() {
            super("ResultScene");
          }
          init(data) {
            Object.assign(this, data);
          }

          create() {
            this.cameras.main.setBackgroundColor(COLORS.bg);
            this.cameras.main.fadeIn(500);

            const pct =
              this.total > 0
                ? Math.round((this.correct / this.total) * 100)
                : 0;
            let rank, emoji;
            if (pct >= 90) {
              rank = "S RANK — MASTER CHEF!";
              emoji = "\u{1F451}";
            } else if (pct >= 80) {
              rank = "A RANK — EXCELLENT!";
              emoji = "\u{1F3C6}";
            } else if (pct >= 70) {
              rank = "B RANK — GREAT JOB!";
              emoji = "⭐";
            } else if (pct >= 60) {
              rank = "C RANK — GOOD TRY!";
              emoji = "\u{1F4AA}";
            } else {
              rank = "KEEP COOKING!";
              emoji = "\u{1F4DA}";
            }

            this.add
              .text(W / 2, 80, emoji, { fontSize: "72px" })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 160, "KITCHEN CLOSED", {
                fontSize: "48px",
                fontFamily: "Arial Black",
                color: "#f39c12",
                stroke: "#000",
                strokeThickness: 4,
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 220, rank, {
                fontSize: "22px",
                fontFamily: "Arial",
                color: "#fff",
                fontStyle: "bold",
              })
              .setOrigin(0.5);

            // Score
            this.add
              .text(W / 2, 280, this.score.toLocaleString(), {
                fontSize: "56px",
                fontFamily: "Arial Black",
                color: "#f39c12",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 320, "POINTS", { fontSize: "14px", color: "#888" })
              .setOrigin(0.5);

            // Stats grid
            const stats = [
              { label: "Correct", val: this.correct + "/" + this.total },
              { label: "Best Streak", val: this.bestStreak },
              { label: "Level", val: this.level },
              { label: "Served", val: this.served },
            ];
            stats.forEach((s, i) => {
              const x = 212 + i * 175,
                y = 420;
              this.add
                .rectangle(x, y, 150, 90, COLORS.panel)
                .setStrokeStyle(1, 0x4a2080);
              this.add
                .text(x, y - 10, String(s.val), {
                  fontSize: "28px",
                  fontFamily: "Arial Black",
                  color: "#f39c12",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 25, s.label, {
                  fontSize: "12px",
                  color: "#aaa",
                })
                .setOrigin(0.5);
            });

            // Replay
            const btn = this.add
              .rectangle(W / 2, 560, 250, 56, COLORS.gold)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2, 560, "COOK AGAIN", {
                fontSize: "22px",
                fontFamily: "Arial Black",
                color: "#1a0a2e",
              })
              .setOrigin(0.5);
            btn.on("pointerdown", () => {
              sfxClick();
              this.scene.start("TitleScene");
            });
            btn.on("pointerover", () => btn.setScale(1.05));
            btn.on("pointerout", () => btn.setScale(1));

            // Celebration particles
            for (let i = 0; i < 30; i++) {
              const p = this.add
                .circle(
                  Math.random() * W,
                  Math.random() * H,
                  2 + Math.random() * 3,
                  [COLORS.gold, COLORS.accent, COLORS.pink, COLORS.teal][
                    Math.floor(Math.random() * 4)
                  ],
                )
                .setAlpha(0.7);
              this.tweens.add({
                targets: p,
                y: p.y - 200 - Math.random() * 300,
                alpha: 0,
                duration: 2000 + Math.random() * 2000,
                delay: Math.random() * 1000,
                repeat: -1,
                ease: "Power1",
              });
            }
          }
        }

        // ─── BOOT ───
        const config = {
          type: Phaser.AUTO,
          parent: "game-container",
          width: W,
          height: H,
          backgroundColor: "#1a0a2e",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          scene: [TitleScene, GameScene, ResultScene],
        };
        new Phaser.Game(config);
      })();
    </script>
      <script src="/assets/nt-page-enhance.js" defer></script>
  </body>
