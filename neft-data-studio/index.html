,n=m.buildGroups(r,t);return`\n    <div class="container">\n      ${S()}\n\n      <section class="card" role="region" aria-label="Action plan summary">\n        <div class="card-header">\n          <div>\n            <h2 class="card-title">Action Plan</h2>\n            <p class="card-subtitle">Scoped instructional action plans based on current data.</p>\n          </div>\n        </div>\n        <div class="grid grid-3">\n          <div class="insight-item">\n            <strong style="color:var(--color-urgent);">Urgent (${n.urgent.length})</strong>\n            <p class="hint">Schedule immediate 1-on-1 check-ins and scaffolded practice.</p>\n          </div>\n          <div class="insight-item">\n            <strong style="color:var(--color-reteach);">Guided (${n.strategic.length})</strong>\n            <p class="hint">Small-group reteach sprint on the top priority standard.</p>\n          </div>\n          <div class="insight-item">\n            <strong style="color:var(--color-extension);">Extension (${n.extension.length})</strong>\n            <p class="hint">Self-paced projects, peer tutoring, or advanced challenges.</p>\n          </div>\n        </div>\n      </section>\n    </div>\n  `}function I(e){return`\n    <div class="container">\n      ${S()}\n\n      <section class="card" role="region" aria-label="Planning studio">\n        <div class="card-header">\n          <div>\n            <h2 class="card-title">Planning Studio</h2>\n            <p class="card-subtitle">Interactive lesson planning with whiteboard helpers and data-driven scaffolds.</p>\n          </div>\n        </div>\n        <p class="hint" style="text-align:center; padding:40px;">Planning Studio renders interactive whiteboard geometry aids, daily lesson outlines, ESOL accommodations, and family bulletins. Full implementation uses DSM_PLATINUM.renderPlanningStudio().</p>\n      </section>\n    </div>\n  `}function N(e){const t=m.predictionAnalysis(e);return`\n    <div class="container">\n      ${S()}\n\n      <section class="card" role="region" aria-label="Regression projection">\n        <div class="card-header">\n          <div>\n            <h2 class="card-title">Regression Projection\n              <button class="info-btn" onclick="showStatsExplanation('regression')" title="Learn about regression" aria-label="Explain regression projection">&#9432;</button>\n            </h2>\n            <p class="card-subtitle">Linear trend projection based on assessment window averages</p>\n          </div>\n        </div>\n        <div class="grid grid-3">\n          <div class="insight-item">\n            <strong>Projected Next Score</strong>\n            <p class="kpi-value">${v(t.projected)}</p>\n          </div>\n          <div class="insight-item">\n            <strong>Model Confidence</strong>\n            <p class="kpi-value">${b(t.confidence)}</p>\n          </div>\n        </div>\n      </section>\n\n      <section class="card" role="region" aria-label="Supplemental data correlation">\n        <div class="card-header">\n          <div>\n            <h2 class="card-title">Inter-Measure Correlation\n              <button class="info-btn" onclick="showStatsExplanation('correlation')" title="Learn about correlation" aria-label="Explain correlation analysis">&#9432;</button>\n            </h2>\n            <p class="card-subtitle">Upload supplemental student data to analyze correlations with scores</p>\n          </div>\n        </div>\n        <p class="hint" style="text-align:center; padding:20px;">${g.state.extraRows.length?`${g.state.extraRows.length} supplemental rows loaded.`:"Upload supplemental data via Data Manager to enable correlation analysis."}</p>\n      </section>\n    </div>\n  `}function F(e){return`\n    <div class="container">\n      ${S()}\n\n      <section class="card" role="region" aria-label="Score predictor">\n        <div class="card-header">\n          <div>\n            <h2 class="card-title">Standardized Score Predictor\n ta">\n              <span class="kpi-value">${v(s)}</span>\n              <span class="kpi-label">Proficiency Rate</span>\n            </div>\n          </div>\n          <div class="card" style="background:var(--bg-panel);" role="region" aria-label="Scenario B">\n            <h3 style="color:var(--brand-secondary);">Scenario B: +10% Interventions</h3>\n            <p class="hint">After rigorous tier-2 coaching</p>\n            <div class="kpi-data" style="margin-top:12px;">\n              <span class="kpi-value">${v(i)}</span>\n              <span class="kpi-label">Projected Average</span>\n            </div>\n            <div class="kpi-data">\n              <span class="kpi-value">${v(o)}</span>\n              <span class="kpi-label">Proficiency Rate</span>\n            </div>\n          </div>\n          <div class="card" style="background:var(--bg-panel);" role="region" aria-label="Scenario C">\n            <h3 style="color:var(--brand-secondary);">Scenario C: +5 Target Points</h3>\n            <p class="hint">If we raise the bar to ${l}%</p>\n            <div class="kpi-data" style="margin-top:12px;">\n              <span class="kpi-value">${v(n)}</span>\n              <span class="kpi-label">Average (unchanged)</span>\n            </div>\n            <div class="kpi-data">\n              <span class="kpi-value">${v(c)}</span>\n              <span class="kpi-label">Proficiency Rate</span>\n            </div>\n          </div>\n        </div>\n      </section>\n    </div>\n  `}function B(e){const t=m.unique(e.map(e=>e.className)),r=Number(g.state.filters.target);return t.length<2?`\n      <div class="container">\n        ${S()}\n        <div class="card" style="text-align:center; padding:40px;">\n          <h2>Class Comparison</h2>\n          <p class="hint">Requires data from 2 or more class periods to compare.</p>\n        </div>\n      </div>\n    `:`\n    <div class="container">\n      ${S()}\n\n      <section class="card" role="region" aria-label="Class period comparison">\n        <div class="card-header">\n          <div>\n            <h2 class="card-title">Class Period Comparison</h2>\n            <p class="card-subtitle">Side-by-side performance metrics for each class section</p>\n          </div>\n        </div>\n        <div class="table-wrap">\n          <table aria-label="Performance comparison across class periods">\n            <caption class="sr-only">Key metrics for each class period including students, average, and proficiency rate</caption>\n            <thead>\n              <tr>\n                <th scope="col">Class</th>\n                <th scope="col">Students</th>\n                <th scope="col">Average</th>\n                <th scope="col">Proficiency Rate</th>\n              </tr>\n            </thead>\n            <tbody>\n              ${t.map(t=>{const n=e.filter(e=>e.className===t),a=n.map(e=>e.score).filter(Number.isFinite),s=m.mean(a),i=m.unique(n.map(e=>e.student)).length,o=a.length?a.filter(e=>e>=r).length/a.length*100:0;return`<tr>\n                  <td style="font-weight:800;">${b(t)}</td>\n                  <td>${i}</td>\n                  <td>${v(s)}</td>\n                  <td>${v(o)}</td>\n                </tr>`}).join("")}\n            </tbody>\n          </table>\n        </div>\n      </section>\n    </div>\n  `}function U(){const e=g.state.fields,t=g.state.rawHeaders,r=(r,n)=>{const a=e[n]||"",s=`mgr-field-${n}`;return`\n      <div class="setup-mapping-item">\n        <label for="${s}">${b(r)}</label>\n        <select id="${s}" onchange="updateDatabaseField('${n}', this.value)">\n          <option value="">-- Not Mapped --</option>\n          ${t.map(e=>`<option value="${b(e)}" ${e===a?"selected":""}>${b(e)}</option>`).join("")}\n        </select>\n      </div>\n    `};return`\n    <div class="container">\n      <section class="card" role="region" aria-label="Data manager">\n        <div class="card-header">\n          <div>\n            <h2 class="card-title">Data Manager</h   <body>
    <!-- Skip to content link for keyboard/screen reader users -->
    <a href="#mainContent" class="skip-to-content">Skip to main content</a>

    <!-- Application Root -->
    <div id="app" class="app" role="application" aria-label="Data Studio Analytics"></div>

    <!-- Accessible Live Region for announcements -->
    <div
      id="liveAnnouncer"
      class="sr-only"
      aria-live="polite"
      aria-atomic="true"
      role="status"
    ></div>

    <!-- Explanation & Translation Modal -->
    <div
      id="modalBackdrop"
      class="modal-backdrop"
      data-action="close-modal"
      aria-hidden="true"
    ></div>
    <div
      id="explainModal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
      aria-describedby="modalBody"
    >
      <div class="modal-header">
        <h2 id="modalTitle" class="modal-title">Statistical Meaning</h2>
        <button
          data-action="close-modal"
          aria-label="Close dialog"
          style="font-size: 1.5rem; font-weight: 700; color: var(--text-muted)"
        >
          &times;
        </button>
      </div>
      <div id="modalBody" class="modal-body"></div>
      <div class="modal-footer">
        <button class="btn btn-primary" data-action="close-modal">Got it</button>
      </div>
    </div>

    <!-- Diagnostics Panel -->
    <div
      id="diagnosticsPanel"
      class="diagnostics-panel"
      role="complementary"
      aria-label="System diagnostics"
      aria-hidden="true"
    >
      <div class="diag-header">
        <span class="diag-title">SYSTEM DIAGNOSTICS & PERFORMANCE MATRIX (Ctrl + D)</span>
        <button
          data-action="toggle-diagnostics"
          aria-label="Close diagnostics panel"
          style="color: hsl(120, 80%, 40%); font-weight: 800; font-size: 1.15rem"
        >
          [CLOSE]
        </button>
      </div>
      <div
        id="diagSuiteStatus"
        style="font-weight: 800; border-bottom: 1px dashed hsl(120, 80%, 20%); padding-bottom: 6px"
        role="status"
        aria-label="Test suite status"
      ></div>
      <div
        id="diagLogs"
        class="diag-log-container"
        role="log"
        aria-label="Diagnostic log entries"
      ></div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true"></div>

    <!-- Scatter Plot Tooltip -->
    <div id="scatterTooltip" class="scatter-tooltip" role="tooltip" aria-hidden="true"></div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay" aria-hidden="true" role="status">
      <div class="loading-spinner" aria-label="Loading data"></div>
      <p class="loading-text" id="loadingText">Processing your data...</p>
    </div>

  </body>
</html>
