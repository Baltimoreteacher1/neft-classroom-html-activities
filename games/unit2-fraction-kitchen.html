    <script>
      // ── FRACTION KITCHEN — Cooking Tycoon ──
      // Phaser 3 single-file game for Grade 6 ESOL — Fraction Operations
      // Enhanced with particles, streaks, star ratings, high scores, power-ups

      // ── localStorage ──
      const LS_KEY = "fractionKitchen_highScores";
      function getHighScore(diff) {
        try {
          const d = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
          return d[diff] || 0;
        } catch (e) {
          return 0;
        }
      }
      function setHighScore(diff, score) {
        try {
          const d = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
          d[diff] = score;
          localStorage.setItem(LS_KEY, JSON.stringify(d));
        } catch (e) {}
      }

      const SFX = {
        ctx: null,
        init() {
          if (!this.ctx)
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        },
        play(type, freq, dur, vol = 0.25) {
          this.init();
          const c = this.ctx,
            o = c.createOscillator(),
            g = c.createGain();
          if (type === "noise") {
            const bufSize = c.sampleRate * dur;
            const buf = c.createBuffer(1, bufSize, c.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
            const src = c.createBufferSource();
            src.buffer = buf;
            const gn = c.createGain();
            gn.gain.setValueAtTime(vol, c.currentTime);
            gn.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
            src.connect(gn);
            gn.connect(c.destination);
            src.start();
            src.stop(c.currentTime + dur);
            return;
          }
          o.type = type;
          o.frequency.value = freq;
          g.gain.setValueAtTime(vol, c.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
          o.connect(g);
          g.connect(c.destination);
          o.start();
          o.stop(c.currentTime + dur);
        },
        ding() {
          this.play("sine", 880, 0.15, 0.3);
          this.play("sine", 1100, 0.2, 0.25);
        },
        wrong() {
          this.play("sawtooth", 200, 0.25, 0.2);
        },
        glassBreak() {
          this.play("noise", 3000, 0.12, 0.2);
          this.play("noise", 5000, 0.08, 0.15);
          this.play("square", 100, 0.15, 0.1);
        },
        sizzle() {
          this.play("noise", 800, 0.12, 0.08);
        },
        serve() {
          this.play("sine", 523, 0.08);
          this.play("sine", 659, 0.08);
          this.play("sine", 784, 0.12);
        },
        bell() {
          this.play("sine", 1200, 0.3, 0.2);
        },
        tick() {
          this.play("square", 600, 0.03, 0.1);
        },
        streak3() {
          [784, 988, 1175].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.12, 0.25), i * 60),
          );
        },
        streak5() {
          [784, 988, 1175, 1319, 1568].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.1, 0.3), i * 50),
          );
        },
        streak7() {
          [523, 659, 784, 988, 1175, 1319, 1568].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.1, 0.35), i * 40),
          );
        },
        upgrade() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.15, 0.25), i * 80),
          );
        },
        phaseTransition() {
          [330, 440, 550, 660].forEach((f, i) =>
            setTimeout(() => this.play("triangle", f, 0.15, 0.2), i * 100),
          );
        },
        win() {
          [523, 659, 784, 880, 1047].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.2, 0.3), i * 120),
          );
        },
        win3Star() {
          [523, 659, 784, 880, 1047, 1175, 1319, 1568].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.18, 0.35), i * 80),
          );
        },
        newHighScore() {
          [1047, 1319, 1568, 1047, 1319, 1568].forEach((f, i) =>
            setTimeout(() => this.play("triangle", f, 0.15, 0.3), i * 100),
          );
        },
        lose() {
          [400, 350, 300, 250].forEach((f, i) =>
            setTimeout(() => this.play("sawtooth", f, 0.3, 0.15), i * 180),
          );
        },
        chop() {
          this.play("noise", 2000, 0.05, 0.15);
        },
        doublePoints() {
          this.play("sine", 880, 0.1, 0.2);
          this.play("sine", 1100, 0.12, 0.25);
        },
        fiftyFifty() {
          this.play("triangle", 600, 0.1, 0.2);
          this.play("triangle", 800, 0.12, 0.2);
        },
        speedBonus() {
          this.play("sine", 1047, 0.08, 0.2);
          this.play("sine", 1319, 0.1, 0.25);
        },
      };

      function randInt(a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a;
      }
      function shuffle(a) {
        const r = [...a];
        for (let i = r.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [r[i], r[j]] = [r[j], r[i]];
        }
        return r;
      }
      function gcd(a, b) {
        return b === 0 ? a : gcd(b, a % b);
      }
      function simplify(n, d) {
        const g = gcd(Math.abs(n), Math.abs(d));
        return [n / g, d / g];
      }
      function fracStr(n, d) {
        const [sn, sd] = simplify(n, d);
        if (sd === 1) return `${sn}`;
        return `${sn}/${sd}`;
      }

      // ── Question Generator ──
      function generateOrders(difficulty) {
        const orders = [];
        const recipes = [
          { name: "Pancakes", emoji: "\u{1F95E}", color: 0xf5d6a0 },
          { name: "Pizza", emoji: "\u{1F355}", color: 0xe84040 },
          { name: "Cookies", emoji: "\u{1F36A}", color: 0xc8956e },
          { name: "Tacos", emoji: "\u{1F32E}", color: 0xf0c040 },
          { name: "Smoothie", emoji: "\u{1F964}", color: 0xd060d0 },
          { name: "Soup", emoji: "\u{1F372}", color: 0x60b060 },
          { name: "Cake", emoji: "\u{1F382}", color: 0xff88cc },
          { name: "Salad", emoji: "\u{1F957}", color: 0x40c040 },
          { name: "Pasta", emoji: "\u{1F35D}", color: 0xf0a040 },
          { name: "Sandwich", emoji: "\u{1F96A}", color: 0xd4a050 },
        ];

        const easyDenoms = [2, 3, 4, 6];
        const medDenoms = [2, 3, 4, 5, 6, 8];
        const hardDenoms = [2, 3, 4, 5, 6, 8, 10, 12];

        for (let i = 0; i < 18; i++) {
          const recipe = recipes[i % recipes.length];
          let q, answer, choices, operation;
          const denoms =
            difficulty === "easy"
              ? easyDenoms
              : difficulty === "medium"
                ? medDenoms
                : hardDenoms;

          const opType = randInt(0, 3);
          const d1 = denoms[randInt(0, denoms.length - 1)];
          const d2 = denoms[randInt(0, denoms.length - 1)];
          const n1 = randInt(1, d1 - 1);
          const n2 = randInt(1, d2 - 1);

          if (opType === 0) {
            // Division
            const ansN = n1 * d2;
            const ansD = d1 * n2;
            answer = fracStr(ansN, ansD);
            operation = "divide";
            q = `${fracStr(n1, d1)} ÷ ${fracStr(n2, d2)} = ?`;
            const wrong1 = fracStr(n1 * n2, d1 * d2);
            const wrong2 = fracStr(n1 + n2, d1);
            const wrong3 = fracStr(Math.abs(n1 * d2 - d1 * n2), d1 * d2);
            choices = shuffle(
              [answer, wrong1, wrong2, wrong3].filter(
                (v, i, a) => a.indexOf(v) === i,
              ),
            );
            while (choices.length < 4)
              choices.push(fracStr(randInt(1, 12), randInt(2, 8)));
            choices = choices.slice(0, 4);
            if (!choices.includes(answer)) {
              choices[3] = answer;
              choices = shuffle(choices);
            }
          } else if (opType === 1) {
            // Multiplication
            const ansN = n1 * n2;
            const ansD = d1 * d2;
            answer = fracStr(ansN, ansD);
            operation = "multiply";
            q = `${fracStr(n1, d1)} × ${fracStr(n2, d2)} = ?`;
            const wrong1 = fracStr(n1 + n2, d1 + d2);
            const wrong2 = fracStr(n1 * d2 + n2 * d1, d1 * d2);
            const wrong3 = fracStr(n1 * n2 + 1, d1 * d2);
            choices = shuffle(
              [answer, wrong1, wrong2, wrong3].filter(
                (v, i, a) => a.indexOf(v) === i,
              ),
            );
            while (choices.length < 4)
              choices.push(fracStr(randInt(1, 10), randInt(2, 8)));
            choices = choices.slice(0, 4);
            if (!choices.includes(answer)) {
              choices[3] = answer;
              choices = shuffle(choices);
            }
          } else if (opType === 2) {
            // Addition
            const lcd = (d1 * d2) / gcd(d1, d2);
            const ansN = n1 * (lcd / d1) + n2 * (lcd / d2);
            answer = fracStr(ansN, lcd);
            operation = "add";
            q = `${fracStr(n1, d1)} + ${fracStr(n2, d2)} = ?`;
            const wrong1 = fracStr(n1 + n2, d1 + d2);
            const wrong2 = fracStr(ansN + 1, lcd);
            const wrong3 = fracStr(Math.abs(ansN - 2), lcd);
            choices = shuffle(
              [answer, wrong1, wrong2, wrong3].filter(
                (v, i, a) => a.indexOf(v) === i,
              ),
            );
            while (choices.length < 4)
              choices.push(fracStr(randInt(1, 12), randInt(2, 8)));
            choices = choices.slice(0, 4);
            if (!choices.includes(answer)) {
              choices[3] = answer;
              choices = shuffle(choices);
            }
          } else {
            // Subtraction
            const lcd = (d1 * d2) / gcd(d1, d2);
            const big = Math.max(n1 * (lcd / d1), n2 * (lcd / d2));
            const small = Math.min(n1 * (lcd / d1), n2 * (lcd / d2));
            const ansN = big - small;
            answer = fracStr(ansN, lcd);
            operation = "subtract";
            const bfn = big === n1 * (lcd / d1) ? n1 : n2;
            const bfd = big === n1 * (lcd / d1) ? d1 : d2;
            const sfn = big === n1 * (lcd / d1) ? n2 : n1;
            const sfd = big === n1 * (lcd / d1) ? d2 : d1;
            q = `${fracStr(bfn, bfd)} − ${fracStr(sfn, sfd)} = ?`;
            const wrong1 = fracStr(bfn + sfn, bfd + sfd);
            const wrong2 = fracStr(ansN + 1, lcd);
            const wrong3 = fracStr(bfn * sfn, bfd * sfd);
            choices = shuffle(
              [answer, wrong1, wrong2, wrong3].filter(
                (v, i, a) => a.indexOf(v) === i,
              ),
            );
            while (choices.length < 4)
              choices.push(fracStr(randInt(1, 10), randInt(2, 8)));
            choices = choices.slice(0, 4);
            if (!choices.includes(answer)) {
              choices[3] = answer;
              choices = shuffle(choices);
            }
          }

          const opLabels = {
            divide: "Divide",
            multiply: "Multiply",
            add: "Add",
            subtract: "Subtract",
          };
          orders.push({
            recipe,
            q,
            answer,
            choices,
            operation,
            context: `${recipe.emoji} ${recipe.name}: ${opLabels[operation]} the fractions`,
            timeLimit:
              difficulty === "easy" ? 35 : difficulty === "medium" ? 28 : 22,
          });
        }
        return orders;
      }

      const W = 800,
        H = 600;

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#2d1508",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [
          BootScene,
          TitleScene,
          DifficultyScene,
          TransitionScene,
          GameScene,
          UpgradeScene,
          ResultScene,
        ],
      };

      // ── BOOT ──
      function BootScene() {
        return new Phaser.Scene("Boot");
      }
      BootScene.prototype = Object.create(Phaser.Scene.prototype);
      BootScene.prototype.constructor = BootScene;
      BootScene.prototype.create = function () {
        const g = this.make.graphics({ add: false });

        // Kitchen counter
        g.fillStyle(0x8b4513);
        g.fillRect(0, 0, W, 200);
        g.generateTexture("counter", W, 200);
        g.clear();

        // Bowl
        g.fillStyle(0xdddddd);
        g.fillCircle(40, 40, 40);
        g.fillStyle(0xcccccc);
        g.fillCircle(40, 40, 32);
        g.generateTexture("bowl", 80, 80);
        g.clear();

        // Stove
        g.fillStyle(0x444444);
        g.fillRoundedRect(0, 0, 120, 80, 8);
        g.fillStyle(0xff3300);
        g.fillCircle(30, 40, 15);
        g.fillCircle(90, 40, 15);
        g.generateTexture("stove", 120, 80);
        g.clear();

        // Ingredient
        g.fillStyle(0xff8844);
        g.fillRoundedRect(0, 0, 50, 50, 6);
        g.generateTexture("ingredient", 50, 50);
        g.clear();

        // Plate
        g.fillStyle(0xffffff);
        g.fillCircle(30, 30, 30);
        g.fillStyle(0xeeeeee);
        g.fillCircle(30, 30, 22);
        g.generateTexture("plate", 60, 60);
        g.clear();

        // Order ticket
        g.fillStyle(0xfff8e0);
        g.fillRoundedRect(0, 0, 180, 90, 6);
        g.lineStyle(2, 0xd4a050);
        g.strokeRoundedRect(0, 0, 180, 90, 6);
        g.generateTexture("ticket", 180, 90);
        g.clear();

        // Button
        g.fillStyle(0xd97706);
        g.fillRoundedRect(0, 0, 160, 48, 10);
        g.generateTexture("btn", 160, 48);
        g.clear();

        // Particle
        g.fillStyle(0xffffff);
        g.fillCircle(3, 3, 3);
        g.generateTexture("particle", 6, 6);
        g.clear();

        // Star
        g.fillStyle(0xffdd00);
        g.fillCircle(4, 4, 4);
        g.generateTexture("star", 8, 8);
        g.clear();

        // Star big (for rating)
        g.fillStyle(0xffdd00);
        g.fillCircle(16, 16, 16);
        g.generateTexture("star_big", 32, 32);
        g.clear();

        // Star empty
        g.lineStyle(2, 0xffdd00);
        g.strokeCircle(16, 16, 16);
        g.generateTexture("star_empty", 32, 32);
        g.clear();

        // Confetti
        g.fillStyle(0xff4488);
        g.fillRect(0, 0, 6, 10);
        g.generateTexture("confetti", 6, 10);
        g.clear();

        // Steam particle
        g.fillStyle(0xffffff);
        g.fillCircle(4, 4, 4);
        g.generateTexture("steam", 8, 8);
        g.clear();

        // Ambient spice particle
        g.fillStyle(0xf59e0b);
        g.fillCircle(2, 2, 2);
        g.generateTexture("spice", 4, 4);
        g.clear();

        // Timer bar bg
        g.fillStyle(0x333333);
        g.fillRoundedRect(0, 0, 300, 14, 4);
        g.generateTexture("timerBg", 300, 14);
        g.clear();

        // Progress bar bg
        g.fillStyle(0x3d2010);
        g.fillRoundedRect(0, 0, 200, 8, 4);
        g.generateTexture("progbar_bg", 200, 8);
        g.clear();

        // Progress bar fill
        g.fillStyle(0xf59e0b);
        g.fillRoundedRect(0, 0, 200, 8, 4);
        g.generateTexture("progbar_fill", 200, 8);
        g.clear();

        // Red flash overlay
        g.fillStyle(0xff0000);
        g.fillRect(0, 0, W, H);
        g.generateTexture("red_flash", W, H);
        g.clear();

        // Speed indicator
        g.fillStyle(0x00ff88);
        g.fillCircle(6, 6, 6);
        g.generateTexture("speed_dot", 12, 12);
        g.clear();

        g.destroy();
        this.scene.start("Title");
      };

      // ── TITLE ──
      function TitleScene() {
        return new Phaser.Scene("Title");
      }
      TitleScene.prototype = Object.create(Phaser.Scene.prototype);
      TitleScene.prototype.constructor = TitleScene;
      TitleScene.prototype.create = function () {
        const cx = W / 2;

        // Warm kitchen background
        this.add.rectangle(cx, H / 2, W, H, 0x2d1508);
        // Gradient top
        for (let i = 0; i < 20; i++) {
          this.add.rectangle(cx, i * 8, W, 8, 0xd97706, 0.03 * (20 - i));
        }

        // Ambient spice particles
        this.add.particles(0, 0, "spice", {
          x: { min: 0, max: W },
          y: { min: 0, max: H },
          speed: { min: 3, max: 12 },
          scale: { start: 0.6, end: 0 },
          alpha: { start: 0.3, end: 0 },
          lifespan: { min: 5000, max: 9000 },
          frequency: 300,
          quantity: 1,
          tint: [0xf59e0b, 0xd97706, 0xff6644, 0xef4444],
          angle: { min: 260, max: 280 },
        });

        // Floating food emojis
        const foods = [
          "\u{1F95E}",
          "\u{1F355}",
          "\u{1F36A}",
          "\u{1F32E}",
          "\u{1F964}",
          "\u{1F372}",
          "\u{1F382}",
          "\u{1F957}",
          "\u{1F35D}",
          "\u{1F96A}",
        ];
        for (let i = 0; i < 12; i++) {
          const txt = this.add
            .text(
              randInt(40, W - 40),
              randInt(60, H - 60),
              foods[i % foods.length],
              { fontSize: randInt(28, 48) + "px" },
            )
            .setAlpha(0.3);
          this.tweens.add({
            targets: txt,
            y: txt.y - 20,
            alpha: { from: 0.15, to: 0.4 },
            duration: randInt(2000, 4000),
            yoyo: true,
            repeat: -1,
          });
        }

        // Title with animated entrance
        const egg = this.add
          .text(cx, 80, "\u{1F373}", { fontSize: "72px" })
          .setOrigin(0.5)
          .setAlpha(0)
          .setScale(0.3);
        this.tweens.add({
          targets: egg,
          alpha: 1,
          scale: 1,
          duration: 500,
          ease: "Back.easeOut",
          delay: 100,
        });
        // Wobble the egg
        this.tweens.add({
          targets: egg,
          angle: { from: -5, to: 5 },
          duration: 1200,
          yoyo: true,
          repeat: -1,
          delay: 800,
        });

        const titleFraction = this.add
          .text(cx, 150, "FRACTION", {
            fontSize: "56px",
            fontFamily: "Impact,sans-serif",
            color: "#f59e0b",
            stroke: "#5c3a0a",
            strokeThickness: 5,
          })
          .setOrigin(0.5)
          .setAlpha(0)
          .setScale(0.5);
        this.tweens.add({
          targets: titleFraction,
          alpha: 1,
          scale: 1,
          duration: 500,
          ease: "Back.easeOut",
          delay: 200,
        });

        const titleKitchen = this.add
          .text(cx, 210, "KITCHEN", {
            fontSize: "56px",
            fontFamily: "Impact,sans-serif",
            color: "#ef4444",
            stroke: "#5c0a0a",
            strokeThickness: 5,
          })
          .setOrigin(0.5)
          .setAlpha(0)
          .setScale(0.5);
        this.tweens.add({
          targets: titleKitchen,
          alpha: 1,
          scale: 1,
          duration: 500,
          ease: "Back.easeOut",
          delay: 350,
        });

        // Pulsing glow on titles
        this.tweens.add({
          targets: titleFraction,
          scaleX: { from: 1, to: 1.03 },
          scaleY: { from: 1, to: 1.03 },
          duration: 1500,
          yoyo: true,
          repeat: -1,
          delay: 1000,
        });
        this.tweens.add({
          targets: titleKitchen,
          scaleX: { from: 1, to: 1.03 },
          scaleY: { from: 1, to: 1.03 },
          duration: 1500,
          yoyo: true,
          repeat: -1,
          delay: 1200,
        });

        const subtitle = this.add
          .text(cx, 260, "COOKING TYCOON", {
            fontSize: "18px",
            color: "#d4a050",
            letterSpacing: 6,
          })
          .setOrigin(0.5)
          .setAlpha(0);
        this.tweens.add({
          targets: subtitle,
          alpha: 1,
          duration: 400,
          delay: 600,
        });

        this.add
          .text(cx, 310, "Add  •  Subtract  •  Multiply  •  Divide Fractions", {
            fontSize: "15px",
            color: "#aa8855",
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 340, "Fill orders by solving fraction problems!", {
            fontSize: "14px",
            color: "#886644",
          })
          .setOrigin(0.5);

        // Animated plate and bowl
        const plate = this.add.image(cx - 100, 420, "plate").setScale(1.5);
        const bowl = this.add.image(cx + 100, 420, "bowl").setScale(1.2);
        this.tweens.add({
          targets: plate,
          angle: { from: -5, to: 5 },
          duration: 2000,
          yoyo: true,
          repeat: -1,
        });
        this.tweens.add({
          targets: bowl,
          y: bowl.y - 8,
          duration: 1500,
          yoyo: true,
          repeat: -1,
        });

        // Steam from bowl
        this.add.particles(cx + 100, 400, "steam", {
          speed: { min: 10, max: 30 },
          scale: { start: 0.6, end: 0 },
          alpha: { start: 0.4, end: 0 },
          lifespan: 1500,
          frequency: 400,
          quantity: 1,
          angle: { min: -100, max: -80 },
        });

        // Start button with hover
        const btn = this.add
          .rectangle(cx, 510, 260, 56, 0xd97706)
          .setInteractive({ useHandCursor: true });
        const btnTxt = this.add
          .text(cx, 510, "START COOKING", {
            fontSize: "22px",
            fontStyle: "bold",
            color: "#fff",

      GameScene.prototype.loadOrder = function () {
        if (this.currentOrder >= this.orders.length || this.lives <= 0) {
          this.endGame();
          return;
        }
        const o = this.orders[this.currentOrder];
        this.contextText.setText(o.context);
        this.questionText.setText(o.q);
        this.orderNumText.setText(
          `Order ${this.currentOrder + 1} of ${this.orders.length}`,
        );

        o.choices.forEach((c, i) => {
          if (i < 4) this.bowlTexts[i].setText(c);
        });

        // Reset bowls with entrance animation
        this.bowls.forEach((b, i) => {
          b.setTint(0xffffff);
          b.setScale(0.8);
          b.setAlpha(1);
          this.tweens.add({
            targets: b,
            scaleX: 1.4,
            scaleY: 1.4,
            duration: 250,
            delay: i * 60,
            ease: "Back.easeOut",
          });
        });
        this.bowlLetterBgs.forEach((bg) => bg.setFillStyle(0xd97706));
        this.feedbackText.setAlpha(0);
        this.answered = false;
        this.doublePointsActive = this.hasDoublePoints
          ? this.doublePointsActive
          : false;

        // Timer
        this.timeLeft = o.timeLimit + this.timerBonus;
        this.maxTime = this.timeLeft;
        this.timerRunning = true;
        this.timerBar.setDisplaySize(400, 10);
        this.timerBar.setFillStyle(0x22c55e);
        this.timerText.setText(`${this.timeLeft}s`);

        // Update progress bar
        const pct = this.currentOrder / this.orders.length;
        this.progFill.setDisplaySize(200 * pct, 8);
        this.progLabel.setText(
          `Order ${this.currentOrder + 1}/${this.orders.length}`,
        );

        // Entrance animation for ticket
        this.tweens.add({
          targets: this.orderBg,
          scaleX: { from: 0.8, to: 1 },
          scaleY: { from: 0.8, to: 1 },
          duration: 300,
          ease: "Back.easeOut",
        });

        // Steam effect
        this.steamParticles.emitParticleAt(150 + randInt(0, 2) * 250, H - 100);

        SFX.bell();
      };

      GameScene.prototype.showStreakMilestone = function (text, color) {
        const milestone = this.add
          .text(W / 2, H / 2 - 40, text, {
            fontSize: "34px",
            fontStyle: "bold",
            color: Phaser.Display.Color.IntegerToColor(color).rgba,
            stroke: "#000",
            strokeThickness: 4,
          })
          .setOrigin(0.5)
          .setAlpha(0)
          .setScale(0.3)
          .setDepth(50);

        this.tweens.add({
          targets: milestone,
          alpha: 1,
          scale: 1.2,
          duration: 400,
          ease: "Back.easeOut",
          onComplete: () => {
            this.tweens.add({
              targets: milestone,
              alpha: 0,
              scale: 1.5,
              y: milestone.y - 30,
              duration: 500,
              delay: 400,
              onComplete: () => milestone.destroy(),
            });
          },
        });
      };

      GameScene.prototype.selectAnswer = function (idx) {
        if (this.answered || !this.timerRunning) return;
        this.answered = true;
        this.timerRunning = false;

        const o = this.orders[this.currentOrder];
        const chosen = o.choices[idx];
        const isCorrect = chosen === o.answer;

        if (isCorrect) {
          SFX.serve();
          this.combo++;
          if (this.combo > this.maxCombo) this.maxCombo = this.combo;
          this.totalCorrect++;
          this.ordersComplete++;

          // Time bonus calculation
          let pts = 100 + Math.floor(this.timeLeft * 5);
          const timeRatio = this.timeLeft / this.maxTime;

          // Speed bonus indicator
          if (timeRatio > 0.7) {
            SFX.speedBonus();
            const speedBonus = 50;
            pts += speedBonus;
            this.speedIndicator.setText(`SPEED +${speedBonus}`).setAlpha(1);
            this.tweens.add({
              targets: this.speedIndicator,
              alpha: 0,
              y: 45,
              duration: 800,
              onComplete: () => {
                this.speedIndicator.y = 55;
              },
            });
          }

          // Combo multiplier
          if (this.combo >= 3) pts = Math.floor(pts * 1.5);
          if (this.combo >= 5) pts = Math.floor(pts * 2);
          if (this.combo >= 7) pts = Math.floor(pts * 2.5);

          // Double points power-up
          if (this.doublePointsActive) pts *= 2;

          this.score += pts;
          this.satisfaction = Math.min(100, this.satisfaction + 5);

          // Bowl visual
          this.bowls[idx].setTint(0x22cc66);

          // Streak counter
          this.streakContainer.setAlpha(1);
          this.streakLabel.setText(`${this.combo}`);
          this.streakSub.setAlpha(1);
          this.tweens.add({
            targets: this.streakContainer,
            scaleX: { from: 1.4, to: 1 },
            scaleY: { from: 1.4, to: 1 },
            duration: 300,
            ease: "Back.easeOut",
          });

          // Screen shake scales with streak
          const shakeIntensity = Math.min(0.004 + this.combo * 0.002, 0.02);
          const shakeDuration = Math.min(80 + this.combo * 15, 250);
          this.cameras.main.shake(shakeDuration, shakeIntensity);

          // Streak milestone effects
          if (this.combo === 3 && this.streakMilestoneShown < 3) {
            this.streakMilestoneShown = 3;
            SFX.streak3();
            this.showStreakMilestone("STREAK x3!", 0xffdd00);
            this.confettiParticles.emitParticleAt(W / 2, 280);
          } else if (this.combo === 5 && this.streakMilestoneShown < 5) {
            this.streakMilestoneShown = 5;
            SFX.streak5();
            this.showStreakMilestone("STREAK x5!", 0xff8800);
            this.confettiParticles.emitParticleAt(W / 4, 280);
            this.confettiParticles.emitParticleAt((3 * W) / 4, 280);
          } else if (this.combo === 7 && this.streakMilestoneShown < 7) {
            this.streakMilestoneShown = 7;
            SFX.streak7();
            this.showStreakMilestone("STREAK x7! ON FIRE!", 0xff4444);
            this.confettiParticles.emitParticleAt(W / 4, 250);
            this.confettiParticles.emitParticleAt(W / 2, 250);
            this.confettiParticles.emitParticleAt((3 * W) / 4, 250);
          }

          // Combo text
          if (this.combo >= 3) {
            const fireCount = Math.min(this.combo - 2, 5);
            const fires = "\u{1F525}".repeat(fireCount);
            this.comboText.setText(`${fires} Combo x${this.combo}!`);
            this.tweens.add({
              targets: this.comboText,
              scale: { from: 1.3, to: 1 },
              duration: 300,
            });
          }

          // Feedback text with varied messages
          let feedMsg = `✓ Correct! +${pts}`;
          if (this.doublePointsActive) feedMsg = `✓ +${pts} (2X!)`;
          if (this.combo >= 5) feedMsg = `✓ AMAZING! +${pts}`;
          if (this.combo >= 7) feedMsg = `✓ LEGENDARY! +${pts}`;
          this.feedbackText.setText(feedMsg).setColor("#22c55e").setAlpha(1);

          // Sparkle particles at bowl
          this.sparkles.emitParticleAt(this.bowls[idx].x, this.bowls[idx].y);

          // Floating score popup
          const popupColor =
            this.combo >= 5
              ? "#ffdd00"
              : this.combo >= 3
                ? "#ff8800"
                : "#22c55e";
          const popupSize =
            this.combo >= 5 ? "26px" : this.combo >= 3 ? "22px" : "18px";
          const popup = this.add
            .text(this.bowls[idx].x, this.bowls[idx].y - 10, `+${pts}`, {
              fontSize: popupSize,
              color: popupColor,
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 2,
            })
            .setOrigin(0.5);
          this.tweens.add({
            targets: popup,
            y: popup.y - 50,
            alpha: 0,
            scale: { from: 1, to: 1.5 },
            duration: 700,
            onComplete: () => popup.destroy(),
          });
        } else {
          // WRONG — dramatic punishment
          SFX.wrong();
          SFX.glassBreak();
          this.combo = 0;
          this.streakMilestoneShown = 0;
          this.comboText.setText("");
          this.totalWrong++;
          this.lives--;
          this.satisfaction = Math.max(0, this.satisfaction - 15);

          // Hide streak
          this.tweens.add({
            targets: this.streakContainer,
            alpha: 0,
            duration: 300,
          });

          this.bowls[idx].setTint(0xff3333);

          // Red flash
          this.redFlash.setAlpha(0.3);
          this.tweens.add({ targets: this.redFlash, alpha: 0, duration: 400 });

          // Dramatic camera shake
          this.cameras.main.shake(300, 0.018);

          // Highlight correct
          const correctIdx = o.choices.indexOf(o.answer);
          if (correctIdx >= 0) {
            this.bowls[correctIdx].setTint(0x22cc66);
            // Pulse correct answer
            this.tweens.add({
              targets: this.bowls[correctIdx],
              scaleX: { from: 1.4, to: 1.6 },
              scaleY: { from: 1.4, to: 1.6 },
              duration: 300,
              yoyo: true,
            });
          }

          this.feedbackText
            .setText(`✗ Answer: ${o.answer}`)
            .setColor("#ef4444")
            .setAlpha(1);

          // Wrong popup
          const wrongPopup = this.add
            .text(this.bowls[idx].x, this.bowls[idx].y + 20, "WRONG!", {
              fontSize: "16px",
              color: "#ff4444",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 2,
            })
            .setOrigin(0.5);
          this.tweens.add({
            targets: wrongPopup,
            y: wrongPopup.y - 30,
            alpha: 0,
            duration: 800,
            onComplete: () => wrongPopup.destroy(),
          });
        }

        this.updateHUD();

        // Next order after delay
        this.time.delayedCall(1500, () => {
          this.currentOrder++;
          if (this.lives <= 0) {
            this.endGame();
          } else if (
            this.currentOrder > 0 &&
            this.currentOrder % 6 === 0 &&
            this.currentOrder < this.orders.length
          ) {
            // Upgrade screen every 6 orders
            this.scene.start("Upgrade", {
              difficulty: this.difficulty,
              score: this.score,
              combo: this.maxCombo,
              lives: this.lives,
              satisfaction: this.satisfaction,
              ordersComplete: this.ordersComplete,
              totalCorrect: this.totalCorrect,
              totalWrong: this.totalWrong,
              currentOrder: this.currentOrder,
              orders: this.orders,
              kitchenLevel: this.kitchenLevel,
              timerBonus: this.timerBonus,
              hasFiftyFifty: this.hasFiftyFifty,
              hasDoublePoints: this.hasDoublePoints,
            });
          } else {
            this.loadOrder();
          }
        });
      };

      GameScene.prototype.endGame = function () {
        this.timerRunning = false;
        if (this.lives <= 0) SFX.lose();
        else SFX.win();
        this.time.delayedCall(500, () => {
          this.scene.start("Results", {
            score: this.score,
            maxCombo: this.maxCombo,
            lives: this.lives,
            satisfaction: this.satisfaction,
            ordersComplete: this.ordersComplete,
            totalCorrect: this.totalCorrect,
            totalWrong: this.totalWrong,
            difficulty: this.difficulty,
            kitchenLevel: this.kitchenLevel,
          });
        });
      };

      GameScene.prototype.updateHUD = function () {
        this.scoreText.setText(`Score: ${this.score}`);
        this.livesText.setText(
          "♥".repeat(this.lives) + "♡".repeat(Math.max(0, 3 - this.lives)),
        );
        const satPct = this.satisfaction / 100;
        this.satBar.setDisplaySize(200 * satPct, 8);
        this.satBar.setFillStyle(
          satPct > 0.6 ? 0x22c55e : satPct > 0.3 ? 0xf59e0b : 0xef4444,
        );
      };

      GameScene.prototype.update = function (time, delta) {
        if (this.timerRunning && this.timeLeft > 0) {
          this.timeLeft -= delta / 1000;
          if (this.timeLeft <= 0) {
            this.timeLeft = 0;
            this.timerRunning = false;
            // Time's up
            this.answered = true;
            SFX.wrong();
            SFX.glassBreak();
            this.combo = 0;
            this.streakMilestoneShown = 0;
            this.comboText.setText("");
            this.totalWrong++;
            this.lives--;
            this.satisfaction = Math.max(0, this.satisfaction - 20);

            // Red flash
            this.redFlash.setAlpha(0.25);
            this.tweens.add({
              targets: this.redFlash,
              alpha: 0,
              duration: 400,
            });

            // Hide streak
            this.tweens.add({
              targets: this.streakContainer,
              alpha: 0,
              duration: 300,
            });

            const o = this.orders[this.currentOrder];
            const correctIdx = o.choices.indexOf(o.answer);
            if (correctIdx >= 0) this.bowls[correctIdx].setTint(0x22cc66);
            this.feedbackText
              .setText(`⏱ Time up! Answer: ${o.answer}`)
              .setColor("#f59e0b")
              .setAlpha(1);
            this.cameras.main.shake(200, 0.012);
            this.updateHUD();
            this.time.delayedCall(1500, () => {
              this.currentOrder++;
              if (this.lives <= 0) this.endGame();
              else this.loadOrder();
            });
          }
          const pct = this.timeLeft / this.maxTime;
          this.timerBar.setDisplaySize(400 * pct, 10);
          this.timerBar.setFillStyle(
            pct > 0.5 ? 0x22c55e : pct > 0.25 ? 0xf59e0b : 0xef4444,
          );
          this.timerText.setText(`${Math.ceil(this.timeLeft)}s`);

          // Tick sound + pulse in last 5 seconds
          if (
            this.timeLeft <= 5 &&
            this.timeLeft > 0 &&
            Math.floor(this.timeLeft * 2) % 2 === 0
          ) {
            this.timerBar.setAlpha(this.timerBar.alpha > 0.7 ? 0.5 : 1);
          }
        }
      };

      // ── UPGRADE SCENE ──

      UpgradeScene.prototype.create = function () {

            .setAlpha(0);
          const labelTxt = this.add
            .text(cx, y - 12, u.label, {

              targets: btn,
              scaleX: 1,
              scaleY: 1,
              duration: 100,

                difficulty: d.difficulty,

        this.cameras.main.fadeIn(500);

      // ── RESULTS ──
      function ResultScene() {
        return new Phaser.Scene("Results");
      }
      ResultScene.prototype = Object.create(Phaser.Scene.prototype);
      ResultScene.prototype.constructor = ResultScene;
      ResultScene.prototype.init = function (data) {
        this.d = data;
      };
      ResultScene.prototype.create = function () {
        const cx = W / 2,
          d = this.d;
        this.add.rectangle(cx, H / 2, W, H, 0x2d1508);

        const won = d.lives > 0;
        const pct =
          (d.totalCorrect / Math.max(1, d.totalCorrect + d.totalWrong)) * 100;
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : pct >= 50 ? 1 : 0;

        // High score check
        const prevBest = getHighScore(d.difficulty);
        const isNewHighScore = d.score > prevBest;
        if (isNewHighScore) setHighScore(d.difficulty, d.score);

        // SFX based on performance
        if (won) {
          if (stars === 3) SFX.win3Star();
          else SFX.win();
          if (isNewHighScore)
            this.time.delayedCall(800, () => SFX.newHighScore());
        } else {
          SFX.lose();
        }

        // Celebration particles
        if (won) {
          for (let i = 0; i < 6; i++) {
            this.time.delayedCall(i * 300, () => {
              const p = this.add.particles(0, 0, "star", {
                speed: { min: 60, max: 200 },
                scale: { start: 1.5, end: 0 },
                lifespan: 700,
                quantity: 12,
                tint: [0xf59e0b, 0xef4444, 0x22c55e],
              });
              p.emitParticleAt(randInt(100, W - 100), randInt(80, 250));
              this.time.delayedCall(800, () => p.destroy());
            });
          }

          if (stars === 3) {
            for (let i = 0; i < 3; i++) {
              this.time.delayedCall(i * 500, () => {
                const c = this.add.particles(0, 0, "confetti", {
                  speed: { min: 80, max: 300 },
                  scale: { start: 1, end: 0.2 },
                  lifespan: 1200,
                  quantity: 20,
                  tint: [0xff4488, 0x44ff88, 0xf59e0b, 0xffdd00],
                  rotate: { min: 0, max: 360 },
                  gravityY: 150,
                });
                c.emitParticleAt(randInt(100, W - 100), 50);
                this.time.delayedCall(1500, () => c.destroy());
              });
            }
          }
        }

        // Title with entrance animation
        const titleText = this.add
          .text(cx, 35, won ? "SHIFT COMPLETE!" : "KITCHEN CLOSED!", {
            fontSize: "36px",
            fontStyle: "bold",
            color: won ? "#22c55e" : "#ef4444",
            stroke: "#000",
            strokeThickness: 4,
          })
          .setOrigin(0.5)
          .setAlpha(0)
          .setScale(0.5);
        this.tweens.add({
          targets: titleText,
          alpha: 1,
          scale: 1,
          duration: 500,
          ease: "Back.easeOut",

        this.add
          .text(
            cx,
            70,
            won ? "Great cooking today!" : "Better luck next time!",
            { fontSize: "14px", color: "#d4a050" },

          .setOrigin(0.5);

        // Star rating
        const starY = 100;
        for (let i = 0; i < 3; i++) {
          const sx = cx - 50 + i * 50;
          const emptyStarImg = this.add
            .image(sx, starY, "star_empty")
            .setScale(1.2)
            .setAlpha(0);
          this.tweens.add({
            targets: emptyStarImg,
            alpha: 1,
            duration: 300,
            delay: 400 + i * 200,
          });

          if (i < stars) {
            const filledStar = this.add
              .image(sx, starY, "star_big")
              .setScale(0)
              .setAlpha(0)
              .setDepth(1);
            this.tweens.add({
              targets: filledStar,

              scale: 1.2,
              duration: 400,
              delay: 600 + i * 300,

                  scale: { start: 1, end: 0 },
                  lifespan: 500,
                  quantity: 8,
                  tint: [0xffdd00, 0xff8800],

                sp.emitParticleAt(sx, starY);
                this.time.delayedCall(600, () => sp.destroy());
              },
            });
          }

        // NEW HIGH SCORE banner
        if (isNewHighScore && d.score > 0) {
          const hsText = this.add
            .text(cx, 130, "NEW HIGH SCORE!", {
              fontSize: "20px",
              fontStyle: "bold",
              color: "#ffdd00",
              stroke: "#885500",
              strokeThickness: 3,

            .setOrigin(0.5)

            alpha: 1,
            duration: 500,
            delay: 1800,

            targets: hsText,
            scaleX: { from: 1, to: 1.05 },
            scaleY: { from: 1, to: 1.05 },
            duration: 600,
            yoyo: true,
            repeat: -1,
            delay: 2000,

            label: "Best Score",

            label: "Orders Served",
            val: `${d.ordersComplete}/${d.totalCorrect + d.totalWrong}`,
            color: "#22c55e",

          { label: "Correct", val: String(d.totalCorrect), color: "#22c55e" },
          { label: "Wrong", val: String(d.totalWrong), color: "#ef4444" },
          { label: "Max Combo", val: `x${d.maxCombo}`, color: "#ffdd00" },
          {
            label: "Satisfaction",
            val: `${d.satisfaction}%`,
            color: d.satisfaction > 60 ? "#22c55e" : "#ef4444",
          },
          {
            label: "Kitchen Level",
            val: String(d.kitchenLevel),
            color: "#d97706",

        stats.forEach((s, i) => {

          this.add.rectangle(cx, y, 380, 32, 0x3d2010, 0.8);
          this.add
            .text(cx - 160, y, s.label, { fontSize: "14px", color: "#aa8855" })
            .setOrigin(0, 0.5);
          const v = this.add
            .text(cx + 160, y, s.val, {

              fontStyle: "bold",
              color: s.color,
            })
            .setOrigin(1, 0.5)
            .setAlpha(0);
          this.tweens.add({
            targets: v,
            alpha: 1,
            x: { from: cx + 200, to: cx + 160 },
            duration: 350,
            delay: i * 100,
          });
        });

        // Grade
        const grade =
          pct >= 90
            ? "A+"
            : pct >= 80
              ? "A"
              : pct >= 70
                ? "B"
                : pct >= 60
                  ? "C"
                  : "D";
        const gradeY = statsStartY + stats.length * 40 + 20;
        const gradeText = this.add
          .text(cx, gradeY, grade, {
            fontSize: "48px",
            fontStyle: "bold",
            color: pct >= 80 ? "#22c55e" : pct >= 60 ? "#f59e0b" : "#ef4444",
            stroke: "#000",
            strokeThickness: 4,
          })
          .setOrigin(0.5)
          .setAlpha(0)
          .setScale(0.3);
        this.tweens.add({
          targets: gradeText,
          alpha: 1,
          scale: 1,
          duration: 500,
          delay: stats.length * 100 + 200,
          ease: "Back.easeOut",
        });
        this.add
          .text(cx, gradeY + 30, `${Math.round(pct)}% Accuracy`, {
            fontSize: "14px",
            color: "#d4a050",
          })
          .setOrigin(0.5);

        // Buttons with hover effects
        const btnY = gradeY + 60;
        const retry = this.add
          .rectangle(cx - 100, btnY, 170, 44, 0xd97706)
          .setInteractive({ useHandCursor: true });
        this.add
          .text(cx - 100, btnY, "COOK AGAIN", {
            fontSize: "17px",
            fontStyle: "bold",
            color: "#fff",
          })
          .setOrigin(0.5);
        retry.on("pointerover", () => {
          retry.setFillStyle(0xf59e0b);
          this.tweens.add({
            targets: retry,
            scaleX: 1.05,
            scaleY: 1.05,
            duration: 100,
          });
        });
        retry.on("pointerout", () => {
          retry.setFillStyle(0xd97706);
          this.tweens.add({
            targets: retry,
            scaleX: 1,
            scaleY: 1,
            duration: 100,
          });

        retry.on("pointerdown", () => {
          this.cameras.main.fadeOut(300);
          this.time.delayedCall(300, () =>
            this.scene.start("Transition", {
              difficulty: d.difficulty,
              text: "NEW SHIFT!",
            }),
          );
        });

        const menu = this.add
          .rectangle(cx + 100, btnY, 170, 44, 0x5c3a0a)
          .setInteractive({ useHandCursor: true });
        this.add
          .text(cx + 100, btnY, "MAIN MENU", {
            fontSize: "17px",
            fontStyle: "bold",
            color: "#d4a050",
          })
          .setOrigin(0.5);
        menu.on("pointerover", () => {
          menu.setFillStyle(0x7c5a2a);
          this.tweens.add({
            targets: menu,
            scaleX: 1.05,
            scaleY: 1.05,
            duration: 100,
          });
        });
        menu.on("pointerout", () => {
          menu.setFillStyle(0x5c3a0a);
          this.tweens.add({
            targets: menu,
            scaleX: 1,
            scaleY: 1,
            duration: 100,
          });
        });
        menu.on("pointerdown", () => {
          this.cameras.main.fadeOut(300);
          this.time.delayedCall(300, () => this.scene.start("Title"));
        });

        this.cameras.main.fadeIn(600);
      };

      new Phaser.Game(config);
    </script>
  </body>
</html>
