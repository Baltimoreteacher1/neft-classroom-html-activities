<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraction Kitchen — Pour Master</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body,
      html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      #game {
        width: 100%;
        height: 100%;
      }
    </style>
    <script src="/games/vendor/phaser/phaser-3.80.1.min.js"></script>
    <script>
      if (typeof Phaser === "undefined") {
        document.write(
          '<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"><\/script>',
        );
      }
      window.addEventListener("load", function () {
        if (typeof Phaser === "undefined") {
          document.body.innerHTML =
            '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">⚠️ This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
        }
      });
    </script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <link rel="stylesheet" href="/shared/save-resume/save-resume-styles.css" />
    <!-- nsr-injected:end -->
    <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
    <link rel="stylesheet" href="/assets/game-fx.css" />
    <!-- gfx-injected:end -->
  </head>
  <body>
    <div id="game"></div>
    <script>
      // ───────────────────────────────────────────────────────────
      // FRACTION KITCHEN — POUR MASTER  (Neft Teacher)
      // Grade 6: 6.NS.A.1, 6.NS.B — fractions, equivalent fractions, division.
      //
      // REAL GAME: A physics pouring/timing game. Liquid streams into a
      // graduated measuring jug at a steady rate. HOLD to pour, RELEASE to
      // stop. Stop the rising liquid level EXACTLY on the target fraction
      // line (e.g. 3/4 full). The jug is divided into the recipe's
      // denominator, so the player is literally reasoning about fraction
      // size as they aim. Equivalent-fraction twists (the line says 6/8 but
      // the jug shows fourths) make them convert on the fly. Real fluid
      // animation, a rising pour, combo scoring, and increasing difficulty.
      // ───────────────────────────────────────────────────────────
      const W = 1024,
        H = 768;
      const LS_KEY = "fractionkitchen_pour_hi";
      // Respect the OS "reduce motion" setting for every bespoke animation
      // below (liquid ripple, pour tilt, target pulse, parallax, splash,
      // hint glow). Gameplay/scoring is identical either way — only the
      // decorative motion is dialled down. Re-checked live so toggling the
      // OS setting mid-session is honoured.
      const RM = window.matchMedia
        ? window.matchMedia("(prefers-reduced-motion: reduce)")
        : { matches: false };
      const reduceMotion = () => !!RM.matches;

      class SFX {
        constructor() {
          this.ctx = null;
        }
        init() {
          if (!this.ctx)
            try {
              this.ctx = new (
                window.AudioContext || window.webkitAudioContext
              )();
            } catch (e) {}
        }
        tone(f, d, t = "sine", v = 0.06) {
          if (!this.ctx) return;
          try {
            const o = this.ctx.createOscillator(),
              g = this.ctx.createGain();
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              this.ctx.currentTime + d,
            );
            o.connect(g);
            g.connect(this.ctx.destination);
            o.start();
            o.stop(this.ctx.currentTime + d);
          } catch (e) {}
        }
        pour() {
          this.tone(180 + Math.random() * 40, 0.04, "sawtooth", 0.02);
        }
        perfect() {
          this.tone(659, 0.1, "sine");
          setTimeout(() => this.tone(988, 0.16, "sine"), 80);
        }
        good() {
          this.tone(523, 0.12, "sine");
        }
        spill() {
          this.tone(140, 0.3, "sawtooth", 0.08);
        }
      }
      const sfx = new SFX();
      const randInt = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
      const gcd = (a, b) => (b ? gcd(b, a % b) : a);

      function simplify(n, d) {
        const g = gcd(n, d);
        return [n / g, d / g];
      }

      // Build a recipe order: an exact target fraction of the jug. Sometimes
      // it is shown as an EQUIVALENT fraction the player must convert against
      // the jug's actual gradations.
      function makeOrder(round) {
        const dens = round < 3 ? [2, 4] : round < 6 ? [3, 4, 6] : [4, 6, 8, 5];
        const jugDen = Phaser.Utils.Array.GetRandom(dens);
        const targetNum = randInt(1, jugDen - 1); // proper fraction < 1
        const [sn, sd] = simplify(targetNum, jugDen);

        let shownNum = targetNum,
          shownDen = jugDen,
          equiv = false;
        if (round >= 3 && Math.random() < 0.4) {
          const mult = randInt(2, 3);
          if (sd * mult !== jugDen) {
            shownNum = sn * mult;
            shownDen = sd * mult;
            equiv = true;
          }
        }
        const foods = [
          "🥞 Pancakes",
          "🍰 Cake",
          "🥤 Smoothie",
          "🍲 Soup",
          "🧃 Juice",
          "🍪 Cookies",
          "🥛 Custard",
        ];
        return {
          jugDen,
          targetNum,
          fraction: targetNum / jugDen,
          shownNum,
          shownDen,
          equiv,
          food: Phaser.Utils.Array.GetRandom(foods),
        };
      }

      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          this.scene.start("Title");
        }
      }

      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          this.cameras.main.setBackgroundColor("#1a1230");
          this.add
            .text(W / 2, 140, "FRACTION KITCHEN", {
              fontFamily: "Segoe UI",
              fontSize: "62px",
              fontStyle: "900",
              color: "#ffd166",
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 208, "POUR MASTER", {
              fontFamily: "Segoe UI",
              fontSize: "28px",
              fontStyle: "700",
              color: "#ff7eb6",
              letterSpacing: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(
              W / 2,
              320,
              "Each order needs a fraction of a jug, like 3/4.\nHOLD to pour. RELEASE the instant the liquid\nhits the target line. Stop too late and it spills!",
              {
                fontFamily: "Segoe UI",
                fontSize: "21px",
                color: "#f0e6ff",
                align: "center",
                lineSpacing: 8,
              },
            )
            .setOrigin(0.5);
          this.add
            .text(
              W / 2,
              440,
              "HOLD  Space / Click / Tap  to pour    •    Watch for equivalent fractions!",
              {
                fontFamily: "Segoe UI",
                fontSize: "18px",
                color: "#b9a7d6",
              },
            )
            .setOrigin(0.5);
          const hi = parseInt(localStorage.getItem(LS_KEY) || "0");
          this.add
            .text(W / 2, 500, "Best service total: " + hi, {
              fontFamily: "Segoe UI",
              fontSize: "18px",
              color: "#ffd43b",
            })
            .setOrigin(0.5);
          const btn = this.add
            .rectangle(W / 2, 600, 280, 70, 0xffd166)
            .setInteractive({ useHandCursor: true });
          const t = this.add
            .text(W / 2, 600, "OPEN KITCHEN", {
              fontFamily: "Segoe UI",
              fontSize: "28px",
              fontStyle: "800",
              color: "#1a1230",
            })
            .setOrigin(0.5);
          this.tweens.add({
            targets: [btn, t],
            scale: 1.05,
            duration: 700,
            yoyo: true,
            repeat: -1,
            ease: "Sine.inOut",
          });
          const go = () => {
            sfx.init();
            this.scene.start("Game");
          };
          btn.on("pointerdown", go);
          this.input.keyboard.once("keydown-ENTER", go);
        }
      }

      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }
        create() {
          this.cameras.main.setBackgroundColor("#241a3d");
          this.score = 0;
          this.round = 1;
          this.lives = 3;
          this.combo = 0;
          this.pouring = false;
          this.fill = 0; // 0..1 of jug
          this.locked = false;
          this.tiltCur = 0; // smoothed jug pour-spout tilt (degrees)
          this.tiltTarget = 0;

          // ── Parallax floating recipe card (background decoration) ─────────
          // A softly drifting "order ticket" pinned behind the jug. It also
          // nudges toward the pointer for a subtle depth effect. Purely
          // decorative; the live order text lives on the HUD as before.
          this.bgCard = this.add.container(W - 230, 330).setDepth(1);
          const cardBg = this.add
            .rectangle(0, 0, 240, 300, 0x2e2150, 0.55)
            .setStrokeStyle(3, 0x6b53a8, 0.7);
          const cardPin = this.add.circle(0, -150, 9, 0xff7eb6, 0.85);
          const cardTitle = this.add
            .text(0, -118, "RECIPE", {
              fontFamily: "Segoe UI",
              fontSize: "20px",
              fontStyle: "800",
              color: "#cdbce8",
            })
            .setOrigin(0.5);
          this.bgCardLines = [];
          for (let i = 0; i < 5; i++) {
            const ln = this.add.rectangle(
              0,
              -70 + i * 30,
              170 - (i % 2) * 40,
              7,
              0x6b53a8,
              0.5,
            );
            this.bgCardLines.push(ln);
            this.bgCard.add(ln);
          }
          this.bgCard.add([cardBg, cardPin, cardTitle]);
          this.bgCardBaseX = this.bgCard.x;
          this.bgCardBaseY = this.bgCard.y;
          this.bgCardT = 0;
          // Track pointer for parallax (no per-frame layout cost).
          this.ptr = { x: W / 2, y: H / 2 };
          this.input.on("pointermove", (p) => {
            this.ptr.x = p.x;
            this.ptr.y = p.y;
          });

          // Jug geometry
          this.jugX = W / 2;
          this.jugTop = 200;
          this.jugBottom = 620;
          this.jugH = this.jugBottom - this.jugTop;
          this.jugW = 180;

          this.add
            .rectangle(
              this.jugX,
              (this.jugTop + this.jugBottom) / 2,
              this.jugW,
              this.jugH,
              0x0e1428,
              0.4,
            )
            .setStrokeStyle(4, 0xbcd0ff)
            .setDepth(2);

          // ── Animated liquid with a sine-wave / ripple surface ───────────
          // Replaces the flat rectangle with a redrawn Graphics body so the
          // top surface ripples while pouring and gently settles when still.
          // `this.fill` (0..1) still drives the level exactly as before, so
          // the math/answer check in release() is untouched.
          this.liquidW = this.jugW - 8;
          this.liquid = this.add.graphics().setDepth(3);
          this.liquidPhase = 0;
          this.liquidAmp = 0; // surface wave amplitude (px), eased

          // Pour stream rendered as a Graphics ribbon so it can wobble.
          this.stream = this.add.graphics().setDepth(4);
          this.streamPhase = 0;
          this.jug2 = this.add
            .text(this.jugX, this.jugTop - 95, "🫗", { fontSize: "54px" })
            .setOrigin(0.5)
            .setDepth(4);

          this.gradGroup = this.add.container(0, 0).setDepth(5);
          // Glow behind the target line (pulses before the pour, fades once
          // the player commits). Drawn as a soft band under the crisp line.
          this.targetGlow = this.add
            .rectangle(this.jugX, 0, this.jugW + 40, 22, 0x51cf66, 0)
            .setDepth(5);
          this.targetBand = this.add
            .rectangle(this.jugX, 0, this.jugW, 6, 0x51cf66, 0)
            .setDepth(6);

          // HUD
          this.hud = this.add
            .text(20, 16, "", {
              fontFamily: "Segoe UI",
              fontSize: "22px",
              fontStyle: "700",
              color: "#ffd166",
            })
            .setDepth(20);
          this.orderText = this.add
            .text(W / 2, 56, "", {
              fontFamily: "Segoe UI",
              fontSize: "28px",
              fontStyle: "800",
              color: "#ffffff",
              align: "center",
            })
            .setOrigin(0.5, 0)
            .setDepth(20);
          this.comboText = this.add
            .text(W - 20, 16, "", {
              fontFamily: "Segoe UI",
              fontSize: "22px",
              color: "#ff7eb6",
            })
            .setOrigin(1, 0)
            .setDepth(20);
          // Equivalent-fraction hint (animated in nextOrder()).
          this.equivHint = this.add
            .text(W / 2, 98, "", {
              fontFamily: "Segoe UI",
              fontSize: "19px",
              fontStyle: "700",
              color: "#ffe08a",
              align: "center",
            })
            .setOrigin(0.5, 0)
            .setAlpha(0)
            .setDepth(20);

          const down = () => {
            if (!this.locked) this.pouring = true;
          };
          const up = () => {
            if (this.pouring && !this.locked) this.release();
          };
          this.input.on("pointerdown", down);
          this.input.on("pointerup", up);
          this.input.keyboard.on("keydown-SPACE", down);
          this.input.keyboard.on("keyup-SPACE", up);

          this.nextOrder();
        }

        nextOrder() {
          this.order = makeOrder(this.round);
          this.fill = 0;
          this.pouring = false;
          this.locked = false;
          this.liquidAmp = 0;
          this.drawLiquid();
          this.tiltCur = 0;
          this.tiltTarget = 0;
          this.jug2.angle = 0;

          this.gradGroup.removeAll(true);
          const den = this.order.jugDen;
          for (let i = 1; i < den; i++) {
            const y = this.jugBottom - (i / den) * this.jugH;
            const line = this.add
              .rectangle(this.jugX, y, this.jugW, 2, 0x7d8bb5, 0.8)
              .setOrigin(0.5);
            const lbl = this.add
              .text(this.jugX - this.jugW / 2 - 14, y, `${i}/${den}`, {
                fontFamily: "Consolas, monospace",
                fontSize: "16px",
                color: "#b9a7d6",
              })
              .setOrigin(1, 0.5);
            this.gradGroup.add(line);
            this.gradGroup.add(lbl);
          }

          const ty = this.jugBottom - this.order.fraction * this.jugH;
          this.targetY = ty;
          this.targetBand.y = ty;
          this.targetGlow.y = ty;
          this.targetBand.setFillStyle(0x51cf66, 0.9);
          this.targetGlow.setFillStyle(0x51cf66, 0.35);
          // Target line glow + pulse BEFORE the pour. Both stop the moment the
          // player commits (handled in release()/spill()).
          this.tweens.killTweensOf(this.targetBand);
          this.tweens.killTweensOf(this.targetGlow);
          if (reduceMotion()) {
            this.targetBand.setAlpha(0.95);
            this.targetGlow.setAlpha(0.35);
          } else {
            this.tweens.add({
              targets: this.targetBand,
              alpha: { from: 0.4, to: 0.95 },
              duration: 500,
              yoyo: true,
              repeat: -1,
            });
            this.tweens.add({
              targets: this.targetGlow,
              alpha: { from: 0.12, to: 0.5 },
              scaleY: { from: 0.7, to: 1.35 },
              duration: 700,
              yoyo: true,
              repeat: -1,
              ease: "Sine.inOut",
            });
          }

          const o = this.order;
          this.orderText.setText(
            `${o.food}   —   fill to  ${o.shownNum}/${o.shownDen}`,
          );

          // Equivalent-fraction hint: dedicated text that scales + glows so
          // students notice they must convert against the jug's gradations.
          this.equivHint.setText(
            o.equiv ? `jug is in ${o.jugDen}ths — convert it!` : "",
          );
          this.tweens.killTweensOf(this.equivHint);
          this.equivHint.setScale(1).setAlpha(o.equiv ? 1 : 0);
          this.equivHint.setShadow(0, 0, "#ffd166", 0, true, true);
          if (o.equiv && !reduceMotion()) {
            this.equivHint.setScale(0.6);
            this.tweens.add({
              targets: this.equivHint,
              scale: 1,
              duration: 420,
              ease: "Back.out",
            });
            this.equivGlowTween = this.tweens.add({
              targets: this.equivHint,
              alpha: { from: 0.7, to: 1 },
              duration: 650,
              yoyo: true,
              repeat: -1,
              ease: "Sine.inOut",
              onUpdate: (tw) => {
                const b = 4 + 10 * tw.getValue();
                this.equivHint.setShadow(0, 0, "#ffd166", b, true, true);
              },
            });
          } else if (o.equiv) {
            this.equivHint.setShadow(0, 0, "#ffd166", 8, true, true);
          }
          this.updateHUD();
        }

        // Draw the liquid body with a sine-wave ripple along its top surface.
        // Called every frame from update() and once per order from nextOrder().
        drawLiquid() {
          const g = this.liquid;
          g.clear();
          const h = this.fill * this.jugH;
          if (h <= 0.5) return;
          const topY = this.jugBottom - h;
          const left = this.jugX - this.liquidW / 2;
          const amp = this.liquidAmp;
          const segs = 22;
          // Body fill.
          g.fillStyle(0xffd166, 1);
          g.beginPath();
          g.moveTo(left, this.jugBottom);
          g.lineTo(left, topY);
          for (let i = 0; i <= segs; i++) {
            const x = left + (this.liquidW * i) / segs;
            const wave =
              amp > 0.05
                ? Math.sin(this.liquidPhase + (i / segs) * Math.PI * 3) * amp +
                  Math.sin(this.liquidPhase * 0.6 + i) * amp * 0.4
                : 0;
            g.lineTo(x, topY + wave);
          }
          g.lineTo(left + this.liquidW, this.jugBottom);
          g.closePath();
          g.fillPath();
          // Lighter crest line on the surface for a glossy meniscus.
          g.lineStyle(2, 0xfff0b8, amp > 0.05 ? 0.9 : 0.5);
          g.beginPath();
          for (let i = 0; i <= segs; i++) {
            const x = left + (this.liquidW * i) / segs;
            const wave =
              amp > 0.05
                ? Math.sin(this.liquidPhase + (i / segs) * Math.PI * 3) * amp +
                  Math.sin(this.liquidPhase * 0.6 + i) * amp * 0.4
                : 0;
            if (i === 0) g.moveTo(x, topY + wave);
            else g.lineTo(x, topY + wave);
          }
          g.strokePath();
        }

        // Draw the pour stream as a wobbling ribbon from spout to surface.
        drawStream(active) {
          const g = this.stream;
          g.clear();
          if (!active) return;
          const topY = this.jugTop - 60;
          const surfaceY = this.jugBottom - this.fill * this.jugH;
          const wob = reduceMotion() ? 0 : 4;
          g.fillStyle(0xffe08a, 0.9);
          g.beginPath();
          const segs = 10;
          const pts = [];
          for (let i = 0; i <= segs; i++) {
            const t = i / segs;
            const y = topY + (surfaceY - topY) * t;
            const x =
              this.jugX + Math.sin(this.streamPhase + t * 6) * wob * (1 - t);
            pts.push([x, y]);
          }
          // left edge down, right edge up = ribbon ~6px wide.
          g.moveTo(pts[0][0] - 5, pts[0][1]);
          for (let i = 0; i <= segs; i++) g.lineTo(pts[i][0] - 5, pts[i][1]);
          for (let i = segs; i >= 0; i--) g.lineTo(pts[i][0] + 5, pts[i][1]);
          g.closePath();
          g.fillPath();
        }

        // Spill splash: a capped procedural particle burst over the jug rim.
        splash(x, y) {
          if (reduceMotion()) return;
          const N = 14; // capped particle count for Chromebook smoothness
          for (let i = 0; i < N; i++) {
            const drop = this.add
              .circle(x, y, 3 + Math.random() * 3, 0xffd166, 0.95)
              .setDepth(7);
            const ang = -Math.PI / 2 + (Math.random() - 0.5) * 2.2;
            const spd = 120 + Math.random() * 180;
            this.tweens.add({
              targets: drop,
              x: x + Math.cos(ang) * spd,
              y: y + Math.sin(ang) * spd * 0.6 + 160, // gravity-ish arc down
              alpha: 0,
              scale: 0.3,
              duration: 650 + Math.random() * 250,
              ease: "Quad.in",
              onComplete: () => drop.destroy(),
            });
          }
        }

        // Stop the pre-pour target pulse/glow and reset pour visuals once the
        // player commits. Purely cosmetic.
        stopPourFx() {
          this.tweens.killTweensOf(this.targetBand);
          this.tweens.killTweensOf(this.targetGlow);
          this.targetGlow.setAlpha(0);
          this.tweens.killTweensOf(this.equivHint);
          this.tiltTarget = 0;
          this.tiltCur = 0;
          this.jug2.angle = 0;
          this.liquidAmp = 0;
          this.drawStream(false);
        }

        release() {
          this.pouring = false;
          this.locked = true;
          this.stopPourFx();
          const err = Math.abs(this.fill - this.order.fraction);
          const tol = 1 / this.order.jugDen;
          let pts = 0,
            label,
            color;
          if (err <= tol * 0.18) {
            pts = 100 + this.combo * 20;
            this.combo++;
            label = "PERFECT POUR!";
            color = "#51cf66";
            sfx.perfect();
          } else if (err <= tol * 0.5) {
            pts = 50;
            this.combo = 0;
            label = "Close enough!";
            color = "#a9e34b";
            sfx.good();
          } else {
            pts = 0;
            this.combo = 0;
            label = "Off the line!";
            color = "#ff922b";
            sfx.spill();
            this.lives--;
          }
          this.score += pts;
          this.flashLabel(label, color, pts);
          this.updateHUD();
          this.time.delayedCall(1300, () => {
            if (this.lives <= 0) return this.endGame(false);
            this.round++;
            if (this.round > 12) return this.endGame(true);
            this.nextOrder();
          });
        }

        spill() {
          this.locked = true;
          this.pouring = false;
          this.stopPourFx();
          this.combo = 0;
          this.lives--;
          sfx.spill();
          // Splash particle burst over the jug rim on overfill.
          this.splash(this.jugX, this.jugTop + 6);
          if (!reduceMotion()) this.cameras.main.shake(200, 0.01);
          this.flashLabel("SPILLED! 💦", "#ff6b6b", 0);
          this.updateHUD();
          this.time.delayedCall(1300, () => {
            if (this.lives <= 0) return this.endGame(false);
            this.round++;
            if (this.round > 12) return this.endGame(true);
            this.nextOrder();
          });
        }

        flashLabel(text, color, pts) {
          const t = this.add
            .text(W / 2, 700, text + (pts ? "  +" + pts : ""), {
              fontFamily: "Segoe UI",
              fontSize: "34px",
              fontStyle: "900",
              color,
              backgroundColor: "#1a1230",
              padding: { x: 18, y: 8 },
            })
            .setOrigin(0.5)
            .setDepth(30);
          this.tweens.add({
            targets: t,
            y: 660,
            alpha: 0,
            duration: 1200,
            ease: "Cubic.out",
            onComplete: () => t.destroy(),
          });
        }

        updateHUD() {
          this.hud.setText(
            `SCORE ${this.score}    ${"♥".repeat(Math.max(0, this.lives))}`,
          );
          this.comboText.setText(
            "ORDER " +
              this.round +
              "/12" +
              (this.combo > 1 ? "   x" + this.combo + " combo" : ""),
          );
        }

        endGame(won) {
          const hi = parseInt(localStorage.getItem(LS_KEY) || "0");
          if (this.score > hi) localStorage.setItem(LS_KEY, this.score);
          try {
            window.EduPulse &&
              EduPulse.record({
                activityTitle: document.title,
                score: this.score,
              });
          } catch (e) {}
          this.scene.start("Results", { score: this.score, won });
        }

        update(time, delta) {
          const rm = reduceMotion();
          const dt = delta / 16.67; // normalize to ~60fps steps

          // ── Always-on cosmetic motion (safe while locked too) ───────────
          // Parallax floating recipe card: idle drift + gentle pointer pull.
          if (this.bgCard) {
            if (rm) {
              this.bgCard.x = this.bgCardBaseX;
              this.bgCard.y = this.bgCardBaseY;
            } else {
              this.bgCardT += delta * 0.0012;
              const px = (this.ptr.x - W / 2) * 0.02;
              const py = (this.ptr.y - H / 2) * 0.02;
              this.bgCard.x =
                this.bgCardBaseX + Math.sin(this.bgCardT) * 10 + px;
              this.bgCard.y =
                this.bgCardBaseY + Math.cos(this.bgCardT * 0.8) * 8 + py;
              this.bgCard.rotation = Math.sin(this.bgCardT * 0.7) * 0.02;
            }
          }

          // Advance ripple/stream phases.
          if (!rm) {
            this.liquidPhase += dt * 0.18;
            this.streamPhase += dt * 0.35;
          }

          // ── Gameplay (UNCHANGED rate + overfill rule) ───────────────────
          if (!this.locked) {
            if (this.pouring) {
              const rate = (0.00028 + this.round * 0.00003) * delta;
              this.fill += rate;
              this.tiltTarget = -28; // spout tilts as it pours
              sfx.pour();
              if (this.fill >= 1) {
                this.fill = 1;
                this.liquidAmp = 0;
                this.drawLiquid();
                return this.spill();
              }
            } else {
              this.tiltTarget = 0;
            }
          }

          // Ease the pour-spout tilt toward its target (smooth pour-in/out).
          if (rm) {
            this.jug2.angle = this.tiltTarget;
          } else {
            this.tiltCur +=
              (this.tiltTarget - this.tiltCur) * Math.min(1, 0.18 * dt);
            this.jug2.angle = this.tiltCur;
          }

          // Ripple amplitude swells while pouring, settles when not.
          const ampTarget = !this.locked && this.pouring && !rm ? 6 : 0;
          this.liquidAmp +=
            (ampTarget - this.liquidAmp) * Math.min(1, 0.12 * dt);

          this.drawLiquid();
          this.drawStream(!this.locked && this.pouring);
        }
      }

      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }
        init(d) {
          this.r = d || {};
        }
        create() {
          this.cameras.main.setBackgroundColor("#241a3d");
          const won = this.r.won;
          this.add
            .text(W / 2, 210, won ? "KITCHEN STAR! ⭐" : "SHIFT OVER", {
              fontFamily: "Segoe UI",
              fontSize: "56px",
              fontStyle: "900",
              color: won ? "#51cf66" : "#ff8787",
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 300, "Score: " + (this.r.score || 0), {
              fontFamily: "Segoe UI",
              fontSize: "34px",
              color: "#ffd166",
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 360, "Best: " + localStorage.getItem(LS_KEY), {
              fontFamily: "Segoe UI",
              fontSize: "22px",
              color: "#ff7eb6",
            })
            .setOrigin(0.5);
          this.add
            .text(
              W / 2,
              430,
              "A perfect pour means the liquid's fraction of the jug\nmatched the recipe exactly.",
              {
                fontFamily: "Segoe UI",
                fontSize: "18px",
                color: "#b9a7d6",
                align: "center",
                lineSpacing: 6,
              },
            )
            .setOrigin(0.5);
          const btn = this.add
            .rectangle(W / 2, 540, 240, 64, 0xffd166)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2, 540, "COOK AGAIN", {
              fontFamily: "Segoe UI",
              fontSize: "26px",
              fontStyle: "800",
              color: "#1a1230",
            })
            .setOrigin(0.5);
          btn.on("pointerdown", () => this.scene.start("Title"));
          this.input.keyboard.once("keydown-ENTER", () =>
            this.scene.start("Title"),
          );
        }
      }

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: "game",
        backgroundColor: "#241a3d",
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        scene: [BootScene, TitleScene, GameScene, ResultsScene],
      };
      new Phaser.Game(config);
    </script>
