  <body>
    <script>
      // ── RATIO RALLY — Top-Down Racing Game (Enhanced) ──
      // Phaser 3 — Grade 6 Math — Equivalent Ratios, Proportions, Unit Rates

      const LS_KEY = "ratio_rally_hiscore";

      const SFX = {
        ctx: null,
        init() {
          if (!this.ctx)
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        },
        play(t, f, d, v = 0.2) {
          this.init();
          const c = this.ctx,
            o = c.createOscillator(),
            g = c.createGain();
          o.type = t;
          o.frequency.value = f;
          g.gain.setValueAtTime(v, c.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
          o.connect(g);
          g.connect(c.destination);
          o.start();
          o.stop(c.currentTime + d);
        },
        noise(d, v = 0.1) {
          this.init();
          const c = this.ctx;
          const bufferSize = c.sampleRate * d;
          const buffer = c.createBuffer(1, bufferSize, c.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
          const src = c.createBufferSource();
          src.buffer = buffer;
          const g = c.createGain();
          g.gain.setValueAtTime(v, c.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
          src.connect(g);
          g.connect(c.destination);
          src.start();
        },
        engine() {
          this.play("sawtooth", 80, 0.08, 0.06);
        },
        boost() {
          this.play("sine", 400, 0.1, 0.25);
          this.play("sine", 600, 0.12, 0.2);
          this.play("sine", 800, 0.15, 0.2);
        },
        correct() {
          this.play("sine", 660, 0.1, 0.3);
          this.play("sine", 880, 0.15, 0.25);
        },
        wrong() {
          this.play("sawtooth", 180, 0.3, 0.2);
          this.noise(0.15, 0.12);
        },
        checkpoint() {
          this.play("triangle", 523, 0.08);
          this.play("triangle", 659, 0.08);
          this.play("triangle", 784, 0.12);
        },
        crash() {
          this.noise(0.2, 0.15);
          this.play("square", 80, 0.15, 0.1);
        },
        countdown() {
          this.play("square", 440, 0.15, 0.15);
        },
        go() {
          this.play("square", 880, 0.3, 0.25);
        },
        win() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.25, 0.3), i * 120),
          );
        },
        winElaborate() {
          [523, 659, 784, 1047, 1319, 1047, 1319, 1568].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.22, 0.28), i * 100),
          );
        },
        lose() {
          [400, 350, 300, 200].forEach((f, i) =>
            setTimeout(() => this.play("sawtooth", f, 0.3, 0.15), i * 180),
          );
        },
        lap() {
          this.play("sine", 1047, 0.15, 0.2);
          this.play("sine", 1319, 0.2, 0.2);
        },
        streak3() {
          [784, 988, 1175].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.1, 0.25), i * 60),
          );
        },
        streak5() {
          [784, 988, 1175, 1319, 1568].forEach((f, i) =>
            setTimeout(() => this.play("triangle", f, 0.12, 0.28), i * 50),
          );
        },
        streak7() {
          [523, 659, 784, 988, 1175, 1319, 1568].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.14, 0.3), i * 45),
          );
        },
        glassBreak() {
          this.noise(0.25, 0.2);
          this.play("square", 150, 0.1, 0.15);
          this.play("square", 100, 0.15, 0.1);
        },
        phaseTransition() {
          [440, 554, 659, 880].forEach((f, i) =>
            setTimeout(() => this.play("triangle", f, 0.15, 0.2), i * 80),
          );
        },
        powerUp() {
          [660, 880, 1100, 1320].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.08, 0.25), i * 50),
          );
        },
        newRecord() {
          [523, 659, 784, 1047, 784, 1047, 1319, 1568].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.15, 0.3), i * 90),
          );
        },
        crowd(level) {
          // Ambient crowd noise that builds
          const v = Math.min(0.08, 0.02 + level * 0.01);
          this.noise(0.3, v);
        },
      };

      function randInt(a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a;
      }
      function shuffle(a) {
        const r = [...a];
        for (let i = r.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [r[i], r[j]] = [r[j], r[i]];
        }
        return r;
      }
      function gcd(a, b) {
        return b === 0 ? a : gcd(b, a % b);
      }
      function simplifyRatio(a, b) {
        const g = gcd(a, b);
        return `${a / g}:${b / g}`;
      }

      // ── Question Generator ──
      function generateQuestions(difficulty) {
        const qs = [];
        for (let i = 0; i < 18; i++) {
          const type = randInt(0, 4);
          let q, answer, choices, prompt;

          if (type === 0) {
            const a = randInt(2, 10),
              b = randInt(2, 10);
            prompt = `A bag has ${a} red and ${b} blue marbles. Ratio of red to blue?`;
            answer = `${a}:${b}`;
            const g = gcd(a, b);
            choices = [answer, `${b}:${a}`, `${a + 1}:${b}`, `${a}:${b + 2}`];
          } else if (type === 1) {
            const a = randInt(2, 6),
              b = randInt(2, 6);
            const mult = randInt(2, 5);
            prompt = `Which ratio equals ${a}:${b}?`;
            answer = `${a * mult}:${b * mult}`;
            choices = [
              answer,
              `${a * mult + 1}:${b * mult}`,
              `${a * mult}:${b * mult + 2}`,
              `${a + b}:${b * 2}`,
            ];
          } else if (type === 2) {
            const a = randInt(2, 6),
              b = randInt(2, 8);
            const mult = randInt(2, 5);
            prompt = `Ratio table: ${a}→${b}, ${a * mult}→?`;
            answer = String(b * mult);
            choices = [
              answer,
              String(b * mult + a),
              String(b * mult - 1),
              String(a * mult),
            ];
          } else if (type === 3) {
            const items = randInt(3, 12);
            const cost = items * randInt(2, 5);
            const rate = cost / items;
            prompt = `${items} items cost $${cost}. Price per item?`;
            answer = `$${rate}`;
            choices = [
              answer,
              `$${rate + 1}`,
              `$${Math.max(1, rate - 1)}`,
              `$${items}`,
            ];
          } else {
            const a = randInt(2, 8),
              b = randInt(2, 8),
              mult = randInt(2, 5);
            prompt = `${a}/${b} = ${a * mult}/?`;
            answer = String(b * mult);
            choices = [
              answer,
              String(b * mult + 2),
              String(a * mult),
              String(b * mult - 1),
            ];
          }

          choices = [...new Set(choices)];
          while (choices.length < 4) choices.push(String(randInt(1, 50)));
          choices = choices.slice(0, 4);
          if (!choices.includes(answer)) {
            choices[3] = answer;
          }
          choices = shuffle(choices);

          qs.push({ prompt, answer, choices, type });
        }
        return qs;
      }

      const W = 800,
        H = 600;
      const ROAD_W = 300,
        LANE_W = 75;
      const ROAD_LEFT = (W - ROAD_W) / 2;

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#1a3a1a",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        physics: { default: "arcade", arcade: { debug: false } },
        scene: [BootScene, TitleScene, DiffScene, GameScene, ResultScene],
      };

      // ── BOOT ──
      function BootScene() {
        return new Phaser.Scene("Boot");
      }
      BootScene.prototype = Object.create(Phaser.Scene.prototype);
      BootScene.prototype.constructor = BootScene;
      BootScene.prototype.create = function () {
        const g = this.make.graphics({ add: false });

        // Player car (top-down view)
        g.fillStyle(0x00aaff);
        g.fillRoundedRect(0, 0, 30, 50, 6);
        g.fillStyle(0x0088cc);
        g.fillRect(4, 4, 22, 14);
        g.fillStyle(0x333333);
        g.fillRect(0, 0, 6, 12);
        g.fillRect(24, 0, 6, 12);
        g.fillStyle(0x333333);
        g.fillRect(0, 38, 6, 12);
        g.fillRect(24, 38, 6, 12);
        g.generateTexture("car_player", 30, 50);
        g.clear();

        // AI car 1
        g.fillStyle(0xff4444);
        g.fillRoundedRect(0, 0, 30, 50, 6);
        g.fillStyle(0xcc2222);
        g.fillRect(4, 4, 22, 14);
        g.fillStyle(0x333333);
        g.fillRect(0, 0, 6, 12);
        g.fillRect(24, 0, 6, 12);
        g.fillStyle(0x333333);
        g.fillRect(0, 38, 6, 12);
        g.fillRect(24, 38, 6, 12);
        g.generateTexture("car_ai1", 30, 50);
        g.clear();

        // AI car 2
        g.fillStyle(0xffaa00);
        g.fillRoundedRect(0, 0, 30, 50, 6);
        g.fillStyle(0xcc8800);
        g.fillRect(4, 4, 22, 14);
        g.fillStyle(0x333333);
        g.fillRect(0, 0, 6, 12);
        g.fillRect(24, 0, 6, 12);
        g.fillStyle(0x333333);
        g.fillRect(0, 38, 6, 12);
        g.fillRect(24, 38, 6, 12);
        g.generateTexture("car_ai2", 30, 50);
        g.clear();

        // Road segment
        g.fillStyle(0x444444);
        g.fillRect(0, 0, ROAD_W, H);
        g.lineStyle(3, 0xffffff);
        g.lineBetween(0, 0, 0, H);
        g.lineBetween(ROAD_W, 0, ROAD_W, H);
        g.lineStyle(2, 0xffff00, 0.5);
        for (let y = 0; y < H; y += 40) {
          g.fillStyle(0xffff00);
          g.fillRect(ROAD_W / 2 - 2, y, 4, 20);
        }
        g.generateTexture("road", ROAD_W, H);
        g.clear();

        // Checkpoint banner
        g.fillStyle(0xff8800, 0.8);
        g.fillRect(0, 0, ROAD_W, 8);
        g.fillStyle(0xffffff);
        for (let x = 0; x < ROAD_W; x += 16) {
          g.fillRect(x, 0, 8, 8);
        }
        g.generateTexture("checkpoint", ROAD_W, 8);
        g.clear();

        // Obstacle (cone)
        g.fillStyle(0xff6600);
        g.beginPath();
        g.moveTo(12, 0);
        g.lineTo(24, 24);
        g.lineTo(0, 24);
        g.closePath();
        g.fill();
        g.fillStyle(0xffffff);
        g.fillRect(2, 12, 20, 4);
        g.generateTexture("cone", 24, 24);
        g.clear();

        // Speed boost
        g.fillStyle(0x00ff88);
        g.beginPath();
        g.moveTo(15, 0);
        g.lineTo(30, 20);
        g.lineTo(20, 20);
        g.lineTo(25, 35);
        g.lineTo(0, 12);
        g.lineTo(12, 12);
        g.closePath();
        g.fill();
        g.generateTexture("speedboost", 30, 35);
        g.clear();

        // Particle
        g.fillStyle(0xffffff);
        g.fillCircle(3, 3, 3);
        g.generateTexture("particle", 6, 6);
        g.clear();

        // Star
        g.fillStyle(0xffdd00);
        g.fillCircle(4, 4, 4);
        g.generateTexture("star", 8, 8);
        g.clear();

        // Big star for results
        g.fillStyle(0xffdd00);
        g.fillCircle(16, 16, 16);
        g.generateTexture("bigstar", 32, 32);
        g.clear();

        // Empty star
        g.lineStyle(3, 0x666666);
        g.strokeCircle(16, 16, 15);
        g.generateTexture("emptystar", 32, 32);
        g.clear();

        // Confetti piece
        g.fillStyle(0xff4488);
        g.fillRect(0, 0, 6, 4);
        g.generateTexture("confetti", 6, 4);
        g.clear();

        // Spark
        g.fillStyle(0xffffff);
        g.fillCircle(2, 2, 2);
        g.generateTexture("spark", 4, 4);
        g.clear();

        // Tree
        g.fillStyle(0x2d5a1e);
        g.fillCircle(12, 12, 12);
        g.fillStyle(0x3a7028);
        g.fillCircle(12, 10, 9);
        g.generateTexture("tree", 24, 24);
        g.clear();

        // Dust particle for ambient
        g.fillStyle(0xffffee);
        g.fillCircle(2, 2, 2);
        g.generateTexture("dust", 4, 4);
        g.clear();

        // Glow circle
        g.fillStyle(0xffffff);
        g.fillCircle(8, 8, 8);
        g.generateTexture("glow", 16, 16);
        g.clear();

        g.destroy();
        this.scene.start("Title");
      };

      // ── TITLE ──
      function TitleScene() {
        return new Phaser.Scene("Title");
      }
      TitleScene.prototype = Object.create(Phaser.Scene.prototype);
      TitleScene.prototype.constructor = TitleScene;
      TitleScene.prototype.create = function () {
        const cx = W / 2;

        // Background
        this.add.rectangle(cx, H / 2, W, H, 0x1a3a1a);
        // Road in background
        this.add.image(cx, H / 2, "road").setAlpha(0.3);

        // Ambient floating dust particles
        this.ambientParticles = this.add.particles(0, 0, "dust", {
          x: { min: 0, max: W },
          y: { min: 0, max: H },
          speed: { min: 5, max: 20 },
          scale: { start: 0.5, end: 0 },
          alpha: { start: 0.3, end: 0 },
          lifespan: { min: 3000, max: 6000 },
          frequency: 200,
          tint: [0x88ff88, 0x44cc44, 0xaaffaa],
        });

        // Scrolling road lines effect
        for (let i = 0; i < 8; i++) {
          const line = this.add.rectangle(cx, i * 80, 4, 30, 0xffff00, 0.4);
          this.tweens.add({
            targets: line,
            y: H + 40,

        }

        // Cars racing with more dynamic animation
        const pc = this.add.image(cx - 40, 400, "car_player").setScale(1.8);
        const ai1 = this.add.image(cx + 50, 440, "car_ai1").setScale(1.5);

          .image(cx + 10, 380, "car_ai2")

          yoyo: true,

        });
        this.tweens.add({

          y: { from: 460, to: 410 },
          duration: 600,
          yoyo: true,
          repeat: -1,
        });
        this.tweens.add({
          targets: ai2,
          y: { from: 400, to: 360 },
          x: { from: cx, to: cx + 20 },
          duration: 800,
          yoyo: true,
          repeat: -1,

        // Exhaust particles from title cars
        this.titleExhaust = this.add.particles(0, 0, "particle", {

          angle: { min: 80, max: 100 },

        // Title with animated glow
        const titleRatio = this.add

            stroke: "#003366",
            strokeThickness: 6,
          })
          .setOrigin(0.5);
        const titleRally = this.add
          .text(cx, 130, "RALLY", {
            fontSize: "72px",
            fontFamily: "Impact,sans-serif",
            color: "#ff8800",
            stroke: "#663300",
            strokeThickness: 6,
          })
          .setOrigin(0.5);

        // Pulsing glow on title
        this.tweens.add({
          targets: titleRatio,
          scaleX: { from: 1, to: 1.05 },
          scaleY: { from: 1, to: 1.05 },
          duration: 1200,
          yoyo: true,
          repeat: -1,
          ease: "Sine.easeInOut",
        });
        this.tweens.add({
          targets: titleRally,
          scaleX: { from: 1, to: 1.05 },
          scaleY: { from: 1, to: 1.05 },
          duration: 1200,
          yoyo: true,
          repeat: -1,
          ease: "Sine.easeInOut",
          delay: 200,
        });

        this.add
          .text(cx, 180, "TOP-DOWN RACING", {
            fontSize: "18px",
            color: "#88ccaa",
            letterSpacing: 6,
          })
          .setOrigin(0.5);

        this.add
          .text(cx, 220, "Ratios  •  Proportions  •  Unit Rates", {
            fontSize: "15px",
            color: "#6699aa",
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 248, "Race to the finish by solving ratio problems!", {
            fontSize: "14px",
            color: "#558877",

          .setOrigin(0.5);

        const hiScore = parseInt(localStorage.getItem(LS_KEY) || "0");

      };

      // ── DIFFICULTY ──
      function DiffScene() {

      }

        const diffs = [

            key: "easy",

          },

        diffs.forEach((d, idx) => {
          const btn = this.add
            .rectangle(cx, d.y, 380, 95, d.color, 0.85)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx - 150, d.y - 10, d.emoji, { fontSize: "40px" })
            .setOrigin(0, 0.5);
          this.add
            .text(cx + 10, d.y - 14, d.label, {
              fontSize: "26px",
              fontStyle: "bold",
              color: "#fff",
            })
            .setOrigin(0.5);
          this.add
            .text(cx + 10, d.y + 16, d.sub, {
              fontSize: "13px",
              color: "#ffffffcc",
            })
            .setOrigin(0.5);

          // Hover effects
          btn.on("pointerover", () => {
            btn.setFillStyle(d.color, 1);
            this.tweens.add({
              targets: btn,
              scaleX: 1.03,
              scaleY: 1.03,
              duration: 100,
            });
          });
          btn.on("pointerout", () => {
            btn.setFillStyle(d.color, 0.85);
            btn.setScale(1);
          });
          btn.on("pointerdown", () => {
            SFX.countdown();
            this.cameras.main.fadeOut(300);
            this.time.delayedCall(300, () =>
              this.scene.start("Game", { difficulty: d.key }),
            );
          });

          // Entrance animation
          btn.setAlpha(0).setScale(0.8);
          this.tweens.add({
            targets: btn,
            alpha: 0.85,
            scaleX: 1,
            scaleY: 1,
            duration: 400,
            delay: idx * 150,
            ease: "Back.easeOut",
          });
        });
        this.cameras.main.fadeIn(400);
      };

      // ── GAME SCENE ──
      function GameScene() {
        return new Phaser.Scene("Game");
      }
      GameScene.prototype = Object.create(Phaser.Scene.prototype);
      GameScene.prototype.constructor = GameScene;

      GameScene.prototype.init = function (data) {
        this.difficulty = data.difficulty || "easy";
        this.questions = generateQuestions(this.difficulty);
        this.currentQ = 0;
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.lives = 3;
        this.totalCorrect = 0;
        this.totalWrong = 0;
        this.speed =
          data.speed ||
          (this.difficulty === "easy"
            ? 2
            : this.difficulty === "medium"
              ? 3
              : 4);
        this.baseSpeed = this.speed;
        this.boostTimer = 0;
        this.distance = 0;
        this.nextCheckpoint = 800;
        this.checkpointInterval = 800;
        this.raceFinished = false;
        this.checkpointsHit = 0;
        this.totalCheckpoints = this.questions.length;
        this.obstacleTimer = 0;
        this.paused = false;
        this.lapCount = data.lapCount || 1;
        this.envColors =
          this.difficulty === "easy"
            ? { grass: 0xd4a050, road: 0x666655 }
            : this.difficulty === "medium"
              ? { grass: 0x334455, road: 0x555555 }
              : { grass: 0x1a0a33, road: 0x333344 };
        // Power-ups state
        this.powerups = { fiftyFifty: 1, doublePoints: 1, extraTime: 0 };
        this.doublePointsActive = false;
        this.questionStartTime = 0;
        this.crowdLevel = 0;
        this.lastCrowdTime = 0;
      };

      GameScene.prototype.create = function () {
        const scene = this;

        // Environment background
        this.add.rectangle(W / 2, H / 2, W, H, this.envColors.grass);

        // Ambient background particles
        const ambientTint =
          this.difficulty === "easy"
            ? [0xffddaa, 0xffcc88] // desert dust
            : this.difficulty === "medium"
              ? [0xaaaacc, 0x8888aa] // city smog
              : [0x8844ff, 0x6622cc, 0xffffff]; // space stars

        this.ambientBg = this.add.particles(0, 0, "dust", {
          x: { min: 0, max: W },
          y: { min: 0, max: H },
          speed: { min: 3, max: 15 },
          scale: { start: 0.4, end: 0 },
          alpha: { start: 0.25, end: 0 },
          lifespan: { min: 3000, max: 7000 },
          frequency: 150,
          tint: ambientTint,
        });

        // Road
        this.roadGroup = this.add.group();
        this.add.rectangle(W / 2, H / 2, ROAD_W + 20, H, 0x888888);
        this.add.rectangle(W / 2, H / 2, ROAD_W, H, this.envColors.road);
        this.laneLines = [];
        for (let y = -40; y < H + 40; y += 60) {
          const line = this.add.rectangle(W / 2, y, 4, 25, 0xffff00, 0.7);
          this.laneLines.push(line);
        }

        // Trees / scenery
        this.scenery = [];
        for (let i = 0; i < 20; i++) {
          const side = Math.random() < 0.5 ? -1 : 1;
          const x = W / 2 + side * (ROAD_W / 2 + randInt(30, 120));
          const y = randInt(-50, H + 50);
          const t = this.add
            .image(x, y, "tree")
            .setScale(randInt(8, 15) / 10)
            .setAlpha(0.7);
          this.scenery.push(t);
        }

        // Player car
        this.player = this.physics.add
          .image(W / 2, H - 120, "car_player")
          .setScale(1.3);
        this.player.setCollideWorldBounds(true);
        this.player.body.setSize(24, 40);

        // AI cars
        this.aiCars = [];
        const aiTextures = ["car_ai1", "car_ai2"];
        for (let i = 0; i < 2; i++) {
          const aiCar = this.physics.add
            .image(W / 2 + (-1 + i * 2) * 60, H - 200 - i * 100, aiTextures[i])
            .setScale(1.2);
          aiCar.body.allowGravity = false;
          aiCar.aiSpeed = this.baseSpeed * (0.7 + i * 0.2);
          aiCar.aiLane = i;
          aiCar.aiTimer = 0;
          this.aiCars.push(aiCar);
        }

        // Obstacles group
        this.obstacles = this.physics.add.group();
        this.boosts = this.physics.add.group();

        // Collisions
        this.physics.add.overlap(this.player, this.obstacles, (p, o) => {
          SFX.crash();
          this.speed = Math.max(1, this.speed - 1);
          this.cameras.main.shake(200, 0.02);
          o.destroy();
          const slowTxt = this.add
            .text(p.x, p.y - 30, "SLOW!", {
              fontSize: "18px",
              color: "#ff4444",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 2,
            })
            .setOrigin(0.5);
          this.tweens.add({
            targets: slowTxt,
            y: slowTxt.y - 40,
            alpha: 0,
            duration: 600,
            onComplete: () => slowTxt.destroy(),
          });
          this.time.delayedCall(2000, () => {
            this.speed = Math.max(this.speed, this.baseSpeed);
          });
        });

        this.physics.add.overlap(this.player, this.boosts, (p, b) => {
          SFX.boost();
          b.destroy();
          this.boostTimer = 3;
          this.speed = this.baseSpeed + 3;
          const txt = this.add
            .text(p.x, p.y - 30, "BOOST!", {
              fontSize: "18px",
              color: "#00ff88",
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 2,
            })
            .setOrigin(0.5);
          this.tweens.add({
            targets: txt,
            y: txt.y - 60,
            alpha: 0,
            scaleX: 1.5,
            scaleY: 1.5,
            duration: 600,
            onComplete: () => txt.destroy(),
          });
        });

        // HUD
        this.add.rectangle(W / 2, 20, W, 40, 0x000000, 0.7).setOrigin(0.5, 0);
        this.scoreText = this.add.text(16, 26, "Score: 0", {
          fontSize: "16px",
          color: "#00ccff",
          fontStyle: "bold",
        });
        this.livesText = this.add
          .text(W - 16, 26, "", { fontSize: "16px", color: "#ff4444" })
          .setOrigin(1, 0);
        this.speedText = this.add
          .text(W / 2, 26, "", { fontSize: "14px", color: "#88ff88" })
          .setOrigin(0.5, 0);

        // Streak counter (visual, grows/pulses)
        this.streakContainer = this.add.container(W / 2, 52);
        this.streakBg = this.add
          .rectangle(0, 0, 120, 22, 0xff8800, 0)
          .setOrigin(0.5);
        this.streakLabel = this.add
          .text(0, 0, "", {
            fontSize: "15px",
            color: "#ffdd00",
            fontStyle: "bold",
            stroke: "#000",
            strokeThickness: 2,
          })
          .setOrigin(0.5);
        this.streakContainer.add([this.streakBg, this.streakLabel]);
        this.streakContainer.setDepth(5);

        // Question counter / progress bar
        this.add.rectangle(W / 2, 8, W - 100, 8, 0x333333);
        this.progressBar = this.add
          .rectangle(50, 8, 0, 6, 0x00ccff)
          .setOrigin(0, 0.5);
        this.progressLabel = this.add
          .text(W / 2, 8, "", {
            fontSize: "9px",
            color: "#ffffff",
            fontStyle: "bold",
          })
          .setOrigin(0.5);
        this.add.text(28, 8, "🏁", { fontSize: "12px" }).setOrigin(0.5);
        this.add.text(W - 28, 8, "🏁", { fontSize: "12px" }).setOrigin(0.5);

        // Checkpoint indicator
        this.cpText = this.add
          .text(W / 2, H / 2, "", {
            fontSize: "40px",
            fontStyle: "bold",
            color: "#ffaa00",
            stroke: "#000",
            strokeThickness: 4,
          })
          .setOrigin(0.5)
          .setAlpha(0)
          .setDepth(10);

        // Exhaust Particles
        this.exhaustParticles = this.add.particles(0, 0, "particle", {
          speed: { min: 10, max: 40 },
          scale: { start: 0.5, end: 0 },
          lifespan: 300,
          emitting: false,
          quantity: 2,
          tint: [0x888888, 0x666666],
          angle: { min: 80, to: 100 },
        });

        // Confetti emitter (for correct answers)
        this.confettiEmitter = this.add.particles(0, 0, "confetti", {
          speed: { min: 80, max: 250 },
          scale: { start: 1.2, end: 0 },
          lifespan: 800,
          emitting: false,
          quantity: 20,
          tint: [0xff4488, 0x44ff88, 0x4488ff, 0xffdd00, 0xff8800, 0xaa44ff],
          angle: { min: 0, max: 360 },
          rotate: { min: 0, max: 360 },
          gravityY: 200,
        });

        // Sparkle emitter (for streaks)
        this.sparkleEmitter = this.add.particles(0, 0, "spark", {
          speed: { min: 50, max: 150 },
          scale: { start: 1.5, end: 0 },
          lifespan: 500,
          emitting: false,
          quantity: 15,
          tint: [0xffdd00, 0xffffff, 0xff8800],
          angle: { min: 0, max: 360 },
        });

        // Input
        this.cursors = this.input.keyboard.createCursorKeys();

        // Touch zones
        this.input.on("pointermove", (pointer) => {
          if (pointer.isDown && !this.paused) {
            this.player.x = Phaser.Math.Clamp(
              pointer.x,
              ROAD_LEFT + 20,
              ROAD_LEFT + ROAD_W - 20,
            );
          }
        });

        // Countdown
        this.paused = true;
        this.doCountdown();

        this.updateHUD();
        this.cameras.main.fadeIn(400);
      };

      GameScene.prototype.doCountdown = function () {
        const nums = ["3", "2", "1", "GO!"];
        const colors = ["#ff4444", "#ffaa00", "#22cc66", "#00ccff"];
        nums.forEach((n, i) => {
          this.time.delayedCall(i * 800, () => {
            if (i < 3) SFX.countdown();
            else SFX.go();
            const txt = this.add
              .text(W / 2, H / 2, n, {
                fontSize: "80px",
                fontStyle: "bold",
                color: colors[i],
                stroke: "#000",
                strokeThickness: 6,
              })
              .setOrigin(0.5)
              .setDepth(20);
            this.tweens.add({
              targets: txt,
              scale: { from: 2, to: 0.5 },
              alpha: { from: 1, to: 0 },
              duration: 700,
              onComplete: () => txt.destroy(),
            });
          });
        });
        this.time.delayedCall(3200, () => {
          this.paused = false;
        });
      };

      GameScene.prototype.updateHUD = function () {
        this.scoreText.setText(`Score: ${this.score}`);
        this.livesText.setText(
          "♥".repeat(this.lives) + "♡".repeat(Math.max(0, 3 - this.lives)),
        );
        this.speedText.setText(`Speed: ${Math.round(this.speed * 20)} mph`);

        // Streak display
        if (this.combo >= 2) {
          this.streakBg.setAlpha(0.6);
          this.streakLabel.setText(`STREAK x${this.combo}`);
          // Scale streak counter based on combo
          const s = Math.min(1.5, 1 + this.combo * 0.05);
          this.streakContainer.setScale(s);
        } else {
          this.streakBg.setAlpha(0);
          this.streakLabel.setText("");
          this.streakContainer.setScale(1);
        }

        // Progress
        const totalDist = this.checkpointInterval * this.totalCheckpoints;
        const pct = Math.min(1, this.distance / totalDist);
        this.progressBar.setDisplaySize((W - 100) * pct, 6);
        this.progressLabel.setText(`${this.currentQ}/${this.totalCheckpoints}`);
      };

      GameScene.prototype.update = function (time, delta) {
        if (this.paused || this.raceFinished) return;

        const dt = delta / 1000;

        // Road scroll
        this.laneLines.forEach((l) => {
          l.y += this.speed * 60 * dt;
          if (l.y > H + 40) l.y = -40;
        });
        this.scenery.forEach((s) => {
          s.y += this.speed * 40 * dt;
          if (s.y > H + 60) {
            s.y = -60;
            s.x =
              W / 2 +
              (Math.random() < 0.5 ? -1 : 1) * (ROAD_W / 2 + randInt(30, 120));
          }
        });

        // Player movement
        const moveSpeed = 250;
        if (this.cursors.left.isDown) {
          this.player.x -= moveSpeed * dt;
          this.player.angle = Phaser.Math.Linear(this.player.angle, -8, 0.1);
        } else if (this.cursors.right.isDown) {
          this.player.x += moveSpeed * dt;
          this.player.angle = Phaser.Math.Linear(this.player.angle, 8, 0.1);
        } else {
          this.player.angle = Phaser.Math.Linear(this.player.angle, 0, 0.15);
        }
        if (this.cursors.up.isDown)
          this.speed = Math.min(this.baseSpeed + 2, this.speed + 2 * dt);
        if (this.cursors.down.isDown)
          this.speed = Math.max(1, this.speed - 3 * dt);

        this.player.x = Phaser.Math.Clamp(
          this.player.x,
          ROAD_LEFT + 20,
          ROAD_LEFT + ROAD_W - 20,
        );

        // Exhaust
        this.exhaustParticles.emitParticleAt(this.player.x, this.player.y + 25);

        // Boost timer
        if (this.boostTimer > 0) {
          this.boostTimer -= dt;
          if (this.boostTimer <= 0) {
            this.speed = this.baseSpeed;
          }
        }

        // Distance
        this.distance += this.speed * 60 * dt;

        // AI cars
        this.aiCars.forEach((ai) => {
          ai.y += (this.speed - ai.aiSpeed) * 40 * dt;
          if (ai.y > H + 100) ai.y = -100;
          if (ai.y < -200) ai.y = H + 50;
          ai.aiTimer -= dt;
          if (ai.aiTimer <= 0) {
            ai.aiTimer = randInt(1, 3);
            const targetX =
              ROAD_LEFT + LANE_W + ai.aiLane * LANE_W * 2 + randInt(-20, 20);
            this.tweens.add({
              targets: ai,
              x: targetX,
              duration: 800,
              ease: "Sine.easeInOut",
            });
          }
        });

        // Spawn obstacles
        this.obstacleTimer -= dt;
        if (this.obstacleTimer <= 0) {
          this.obstacleTimer = randInt(2, 4);
          const ox = ROAD_LEFT + randInt(20, ROAD_W - 20);
          if (Math.random() < 0.3) {
            const boost = this.boosts
              .create(ox, -30, "speedboost")
              .setScale(0.8);
            boost.body.allowGravity = false;
            boost.setVelocityY(this.speed * 50);
          } else {
            const obs = this.obstacles.create(ox, -30, "cone").setScale(0.9);
            obs.body.allowGravity = false;
            obs.setVelocityY(this.speed * 40);
          }
        }

        // Clean off-screen
        this.obstacles.getChildren().forEach((o) => {
          if (o.y > H + 50) o.destroy();
        });
        this.boosts.getChildren().forEach((b) => {
          if (b.y > H + 50) b.destroy();
        });

        // Ambient crowd sound builds with streak
        if (this.combo >= 3 && time - this.lastCrowdTime > 4000) {
          this.lastCrowdTime = time;
          SFX.crowd(this.combo);
        }

        // Streak pulse animation
        if (this.combo >= 3 && this.streakContainer) {
          const pulse = 1 + Math.sin(time * 0.005) * 0.05;
          this.streakContainer.setScale(
            Math.min(1.5, 1 + this.combo * 0.05) * pulse,
          );
        }

        // Checkpoint check
        if (
          this.distance >= this.nextCheckpoint &&
          this.currentQ < this.questions.length
        ) {
          this.nextCheckpoint += this.checkpointInterval;
          this.checkpointsHit++;
          this.paused = true;

          SFX.checkpoint();
          // Flash checkpoint
          const banner = this.add
            .image(W / 2, H / 2, "checkpoint")
            .setScale(1, 6)
            .setAlpha(0.7)
            .setDepth(5);
          this.tweens.add({
            targets: banner,
            alpha: 0,
            duration: 800,
            onComplete: () => banner.destroy(),
          });

          // Phase transition animation
          this.cpText
            .setText(`CHECKPOINT ${this.checkpointsHit}`)
            .setAlpha(1)
            .setY(H / 2);
          this.tweens.add({
            targets: this.cpText,
            alpha: 0,
            y: H / 2 - 40,
            scaleX: { from: 1.3, to: 1 },
            scaleY: { from: 1.3, to: 1 },
            duration: 800,
          });

          this.time.delayedCall(600, () => {
            this.showCheckpointQuestion();
          });
        }

        // Race finish
        const totalDist = this.checkpointInterval * this.totalCheckpoints;
        if (
          this.distance >= totalDist &&
          this.currentQ >= this.questions.length &&
          !this.raceFinished
        ) {
          this.raceFinished = true;
          SFX.win();
          // Finish line confetti
          for (let i = 0; i < 5; i++) {
            this.time.delayedCall(i * 200, () => {
              this.confettiEmitter.emitParticleAt(
                randInt(100, W - 100),
                randInt(100, 300),
              );
            });
          }
          this.time.delayedCall(1500, () => {
            this.scene.start("Results", {
              score: this.score,
              maxCombo: this.maxCombo,
              lives: this.lives,
              totalCorrect: this.totalCorrect,
              totalWrong: this.totalWrong,
              difficulty: this.difficulty,
              checkpointsHit: this.checkpointsHit,
            });
          });
        }

        // Engine sound (throttled)
        if (Math.random() < 0.02) SFX.engine();

        this.updateHUD();
      };

      GameScene.prototype.showCheckpointQuestion = function () {
        const q = this.questions[this.currentQ];
        if (!q) {
          this.paused = false;
          return;
        }

        this.questionStartTime = Date.now();

        // Overlay
        const overlay = this.add
          .rectangle(W / 2, H / 2, W, H, 0x000000, 0.75)
          .setDepth(15);
        const panel = this.add
          .rectangle(W / 2, H / 2, 550, 360, 0x1a2a4a, 0.95)
          .setStrokeStyle(3, 0x00ccff)
          .setDepth(16);

        // Panel entrance animation
        panel.setScale(0.8);
        this.tweens.add({
          targets: panel,
          scaleX: 1,
          scaleY: 1,
          duration: 250,
          ease: "Back.easeOut",
        });

        const pText = this.add
          .text(W / 2, H / 2 - 140, "CHECKPOINT CHALLENGE", {
            fontSize: "20px",
            color: "#00ccff",
            fontStyle: "bold",
          })
          .setOrigin(0.5)
          .setDepth(17);
        const qText = this.add
          .text(W / 2, H / 2 - 85, q.prompt, {
            fontSize: "20px",
            color: "#ffffff",
            fontStyle: "bold",
            wordWrap: { width: 480 },
            align: "center",
          })
          .setOrigin(0.5)
          .setDepth(17);

        // Speed indicator
        const speedInd = this.add
          .text(W / 2, H / 2 - 50, "Answer fast for bonus points!", {
            fontSize: "11px",
            color: "#88ccaa",
          })
          .setOrigin(0.5)
          .setDepth(17);

        const elems = [overlay, panel, pText, qText, speedInd];
        const btns = [];
        const allBtnElems = [];

        // Determine active choices (for 50/50)
        let activeIndices = [0, 1, 2, 3];

        q.choices.forEach((c, i) => {
          const x = W / 2 - 180 + i * 120;
          const y = H / 2 + 20;
          const btn = this.add
            .rectangle(x, y, 105, 55, 0x224466)
            .setInteractive({ useHandCursor: true })
            .setDepth(17);
          const txt = this.add
            .text(x, y - 8, String.fromCharCode(65 + i), {
              fontSize: "12px",
              color: "#88aacc",
            })
            .setOrigin(0.5)
            .setDepth(17);
          const val = this.add
            .text(x, y + 10, c, {
              fontSize: "16px",
              color: "#fff",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(17);
          elems.push(btn, txt, val);
          btns.push(btn);
          allBtnElems.push({ btn, txt, val });

          // Hover effects
          btn.on("pointerover", () => {
            btn.setFillStyle(0x336688);
            this.tweens.add({
              targets: [btn, txt, val],
              scaleX: 1.08,
              scaleY: 1.08,
              duration: 80,
            });
          });
          btn.on("pointerout", () => {
            btn.setFillStyle(0x224466);
            btn.setScale(1);
            txt.setScale(1);
            val.setScale(1);
          });
          btn.on("pointerdown", () => {
            btns.forEach((b) => b.disableInteractive());

            const isCorrect = c === q.answer;
            const answerTime = (Date.now() - this.questionStartTime) / 1000;

            if (isCorrect) {
              SFX.correct();
              this.combo++;
              if (this.combo > this.maxCombo) this.maxCombo = this.combo;
              this.totalCorrect++;

              // Time bonus: faster = more points
              let timeBonus = Math.max(0, Math.floor((10 - answerTime) * 10));
              let pts = 150 + this.combo * 25 + timeBonus;
              if (this.doublePointsActive) {
                pts *= 2;
                this.doublePointsActive = false;
              }
              this.score += pts;
              this.speed = Math.min(this.baseSpeed + 2, this.speed + 1);

              btn.setFillStyle(0x22cc66);

              // Screen shake scales with streak
              const shakeIntensity = Math.min(
                0.025,
                0.005 + this.combo * 0.003,
              );
              this.cameras.main.shake(150, shakeIntensity);

              // Confetti burst
              this.confettiEmitter.emitParticleAt(W / 2, H / 2);

              // Floating score text
              let scoreLabel = `+${pts}`;
              if (timeBonus > 0) scoreLabel += ` (FAST!)`;
              const floatTxt = this.add
                .text(W / 2, H / 2 - 20, scoreLabel, {
                  fontSize: "28px",
                  color: "#ffdd00",
                  fontStyle: "bold",
                  stroke: "#000",
                  strokeThickness: 3,
                })
                .setOrigin(0.5)
                .setDepth(18);
              this.tweens.add({
                targets: floatTxt,
                y: floatTxt.y - 60,
                alpha: 0,
                scaleX: 1.3,
                scaleY: 1.3,
                duration: 900,
                onComplete: () => floatTxt.destroy(),
              });

              // Streak milestone effects
              if (this.combo === 3) {
                SFX.streak3();
                this.showStreakMilestone("STREAK x3!", 0xff8800);
              } else if (this.combo === 5) {
                SFX.streak5();
                this.showStreakMilestone("STREAK x5!!", 0xff4400);
                this.sparkleEmitter.emitParticleAt(W / 2, H / 2);
              } else if (this.combo === 7) {
                SFX.streak7();
                this.showStreakMilestone("STREAK x7!!!", 0xff0000);
                this.sparkleEmitter.emitParticleAt(W / 2, H / 2 - 40);
                this.sparkleEmitter.emitParticleAt(W / 2, H / 2 + 40);
              } else if (this.combo >= 10) {
                SFX.streak7();
                this.showStreakMilestone(
                  `UNSTOPPABLE x${this.combo}!`,
                  0xaa00ff,
                );
                this.sparkleEmitter.emitParticleAt(W / 2, H / 2);
              }

              const fb = this.add
                .text(W / 2, H / 2 + 110, `Correct! +${pts} — Speed Boost!`, {
                  fontSize: "20px",
                  color: "#22cc66",
                  fontStyle: "bold",
                  stroke: "#000",
                  strokeThickness: 2,
                })
                .setOrigin(0.5)
                .setDepth(17);
              elems.push(fb, floatTxt);
            } else {
              SFX.glassBreak();
              this.combo = 0;
              this.streakLabel.setText("");
              this.streakBg.setAlpha(0);
              this.totalWrong++;
              this.lives--;
              this.speed = Math.max(1, this.speed - 0.5);

              btn.setFillStyle(0xff3333);
              const ci = q.choices.indexOf(q.answer);
              if (ci >= 0) btns[ci].setFillStyle(0x22cc66);

              // Red flash overlay
              const redFlash = this.add
                .rectangle(W / 2, H / 2, W, H, 0xff0000, 0.3)
                .setDepth(14);
              this.tweens.add({
                targets: redFlash,
                alpha: 0,
                duration: 400,
                onComplete: () => redFlash.destroy(),
              });

              // Strong camera shake for wrong
              this.cameras.main.shake(350, 0.03);

              const fb = this.add
                .text(W / 2, H / 2 + 110, `Wrong! Answer: ${q.answer}`, {
                  fontSize: "20px",
                  color: "#ff4444",
                  fontStyle: "bold",
                  stroke: "#000",
                  strokeThickness: 2,
                })
                .setOrigin(0.5)
                .setDepth(17);
              elems.push(fb, redFlash);

              if (this.lives <= 0) {
                SFX.lose();
                this.time.delayedCall(1500, () => {
                  elems.forEach((e) => {
                    if (e && e.destroy) e.destroy();
                  });
                  this.scene.start("Results", {
                    score: this.score,
                    maxCombo: this.maxCombo,
                    lives: 0,
                    totalCorrect: this.totalCorrect,
                    totalWrong: this.totalWrong,
                    difficulty: this.difficulty,
                    checkpointsHit: this.checkpointsHit,
                  });
                });
                return;
              }
            }

            this.currentQ++;
            this.updateHUD();

            this.time.delayedCall(1200, () => {
              elems.forEach((e) => {
                if (e && e.destroy) e.destroy();
              });
              this.paused = false;
            });
          });
        });

        // Power-up buttons
        const puY = H / 2 + 85;
        const puElems = [];

        // 50/50
        if (this.powerups.fiftyFifty > 0) {
          const pu5050 = this.add
            .rectangle(W / 2 - 120, puY, 100, 32, 0x664488)
            .setInteractive({ useHandCursor: true })
            .setDepth(17);
          const pu5050T = this.add
            .text(W / 2 - 120, puY, "50/50", {
              fontSize: "13px",
              color: "#ddaaff",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(17);
          elems.push(pu5050, pu5050T);

          pu5050.on("pointerover", () => {
            pu5050.setFillStyle(0x8866aa);
            this.tweens.add({
              targets: pu5050,
              scaleX: 1.05,
              scaleY: 1.05,
              duration: 80,
            });
          });
          pu5050.on("pointerout", () => {
            pu5050.setFillStyle(0x664488);
            pu5050.setScale(1);
          });
          pu5050.on("pointerdown", () => {
            if (this.powerups.fiftyFifty <= 0) return;
            this.powerups.fiftyFifty--;
            SFX.powerUp();
            pu5050.disableInteractive();
            pu5050.setAlpha(0.3);
            // Remove 2 wrong answers
            let removed = 0;
            q.choices.forEach((c, i) => {
              if (c !== q.answer && removed < 2) {
                allBtnElems[i].btn.setAlpha(0.2);
                allBtnElems[i].btn.disableInteractive();
                allBtnElems[i].val.setAlpha(0.2);
                allBtnElems[i].txt.setAlpha(0.2);
                removed++;
              }
            });
          });
        }

        // Double Points
        if (this.powerups.doublePoints > 0) {
          const puDbl = this.add
            .rectangle(W / 2, puY, 100, 32, 0x448866)
            .setInteractive({ useHandCursor: true })
            .setDepth(17);
          const puDblT = this.add
            .text(W / 2, puY, "2x PTS", {
              fontSize: "13px",
              color: "#aaffcc",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(17);
          elems.push(puDbl, puDblT);

          puDbl.on("pointerover", () => {
            puDbl.setFillStyle(0x66aa88);
            this.tweens.add({
              targets: puDbl,
              scaleX: 1.05,
              scaleY: 1.05,
              duration: 80,
            });
          });
          puDbl.on("pointerout", () => {
            puDbl.setFillStyle(0x448866);
            puDbl.setScale(1);
          });
          puDbl.on("pointerdown", () => {
            if (this.powerups.doublePoints <= 0) return;
            this.powerups.doublePoints--;
            SFX.powerUp();
            this.doublePointsActive = true;
            puDbl.disableInteractive();
            puDbl.setAlpha(0.3);
            // Visual indicator
            const dblTxt = this.add
              .text(W / 2, H / 2 - 30, "DOUBLE POINTS ACTIVE!", {
                fontSize: "16px",
                color: "#aaffcc",
                fontStyle: "bold",
                stroke: "#000",
                strokeThickness: 2,
              })
              .setOrigin(0.5)
              .setDepth(18);
            this.tweens.add({
              targets: dblTxt,
              y: dblTxt.y - 30,
              alpha: 0,
              duration: 1000,
              onComplete: () => dblTxt.destroy(),
            });
            elems.push(dblTxt);
          });
        }

        // Keyboard 1-4
        const keyHandler = (idx) => {
          if (idx < q.choices.length) {
            btns[idx].emit("pointerdown");
            this.input.keyboard.off("keydown-ONE");
            this.input.keyboard.off("keydown-TWO");
            this.input.keyboard.off("keydown-THREE");
            this.input.keyboard.off("keydown-FOUR");
          }
        };
        this.input.keyboard.once("keydown-ONE", () => keyHandler(0));
        this.input.keyboard.once("keydown-TWO", () => keyHandler(1));
        this.input.keyboard.once("keydown-THREE", () => keyHandler(2));
        this.input.keyboard.once("keydown-FOUR", () => keyHandler(3));
      };

      GameScene.prototype.showStreakMilestone = function (text, color) {
        const milestone = this.add
          .text(W / 2, H / 2 - 60, text, {
            fontSize: "32px",
            fontStyle: "bold",
            color: "#" + color.toString(16).padStart(6, "0"),
            stroke: "#000",
            strokeThickness: 4,
          })
          .setOrigin(0.5)
          .setDepth(19);
        this.tweens.add({
          targets: milestone,
          y: milestone.y - 50,
          scaleX: { from: 0.5, to: 1.5 },
          scaleY: { from: 0.5, to: 1.5 },
          alpha: { from: 1, to: 0 },
          duration: 1200,
          ease: "Cubic.easeOut",
          onComplete: () => milestone.destroy(),
        });
      };

      // ── RESULTS ──
      function ResultScene() {
        return new Phaser.Scene("Results");
      }
      ResultScene.prototype = Object.create(Phaser.Scene.prototype);
      ResultScene.prototype.constructor = ResultScene;
      ResultScene.prototype.init = function (data) {
        this.d = data;
      };
      ResultScene.prototype.create = function () {
        const cx = W / 2,
          d = this.d;
        this.add.rectangle(cx, H / 2, W, H, 0x0a1628);

        const won = d.lives > 0;
        const pct =
          (d.totalCorrect / Math.max(1, d.totalCorrect + d.totalWrong)) * 100;
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : pct >= 50 ? 1 : 0;

        // Check high score
        const prevHigh = parseInt(localStorage.getItem(LS_KEY) || "0");
        const isNewHighScore = d.score > prevHigh;
        if (isNewHighScore) {
          localStorage.setItem(LS_KEY, String(d.score));
        }

        if (won) {
          if (stars === 3) SFX.winElaborate();
          else SFX.win();
        } else {
          SFX.lose();
        }

        // Victory confetti
        if (won) {
          for (let i = 0; i < 8; i++) {
            this.time.delayedCall(i * 250, () => {
              const p = this.add.particles(0, 0, "confetti", {
                speed: { min: 60, max: 250 },
                scale: { start: 1.5, end: 0 },
                lifespan: 900,
                quantity: 15,
                tint: [0x00ccff, 0xff8800, 0x22cc66, 0xff4488, 0xffdd00],
                angle: { min: 0, max: 360 },
                rotate: { min: 0, max: 360 },
                gravityY: 150,
              });
              p.emitParticleAt(randInt(100, W - 100), randInt(50, 200));
              this.time.delayedCall(1000, () => p.destroy());
            });
          }
        }

        this.add
          .text(cx, 30, won ? "RACE COMPLETE!" : "RACE OVER!", {
            fontSize: "40px",
            fontStyle: "bold",
            color: won ? "#22cc66" : "#ff4444",
            stroke: "#000",
            strokeThickness: 4,
          })
          .setOrigin(0.5);
        this.add
          .text(
            cx,
            68,
            won ? "You crossed the finish line!" : "Better luck next race!",
            { fontSize: "16px", color: "#88aacc" },
          )
          .setOrigin(0.5);

        // Star rating with animated fill
        const starY = 100;
        for (let i = 0; i < 3; i++) {
          const sx = cx - 50 + i * 50;
          // Empty star first
          this.add.image(sx, starY, "emptystar").setScale(1.5).setDepth(1);
          if (i < stars) {
            this.time.delayedCall(500 + i * 400, () => {
              const filledStar = this.add
                .image(sx, starY, "bigstar")
                .setScale(0)
                .setDepth(2);
              this.tweens.add({
                targets: filledStar,
                scaleX: 1.5,
                scaleY: 1.5,
                duration: 400,
                ease: "Back.easeOut",
              });
              // Star sparkle
              const sparkle = this.add.particles(0, 0, "spark", {
                speed: { min: 30, max: 80 },
                scale: { start: 1, end: 0 },
                lifespan: 400,
                quantity: 8,
                tint: [0xffdd00, 0xffaa00],
              });
              sparkle.emitParticleAt(sx, starY);
              this.time.delayedCall(500, () => sparkle.destroy());
              SFX.checkpoint();
            });
          }
        }

        // New High Score banner
        if (isNewHighScore && d.score > 0) {
          SFX.newRecord();
          const nhs = this.add
            .text(cx, 135, "NEW HIGH SCORE!", {
              fontSize: "24px",
              fontStyle: "bold",
              color: "#ffdd00",
              stroke: "#664400",
              strokeThickness: 3,
            })
            .setOrigin(0.5);
          this.tweens.add({
            targets: nhs,
            scaleX: { from: 1, to: 1.15 },
            scaleY: { from: 1, to: 1.15 },
            duration: 500,
            yoyo: true,
            repeat: -1,
          });
        }

        // Podium-style display
        const carY = isNewHighScore ? 165 : 150;
        const car = this.add.image(cx, carY, "car_player").setScale(2);
        this.tweens.add({
          targets: car,
          angle: { from: -5, to: 5 },
          duration: 1000,
          yoyo: true,
          repeat: -1,
        });

        const statsStartY = carY + 40;
        const stats = [
          { label: "Final Score", val: String(d.score), color: "#00ccff" },
          {
            label: "Checkpoints",
            val: `${d.checkpointsHit}`,
            color: "#ff8800",
          },
          { label: "Correct", val: String(d.totalCorrect), color: "#22cc66" },
          { label: "Wrong", val: String(d.totalWrong), color: "#ff4444" },
          { label: "Max Streak", val: `x${d.maxCombo}`, color: "#ffdd00" },
          { label: "Track", val: d.difficulty.toUpperCase(), color: "#aaccff" },
        ];
        if (prevHigh > 0 && !isNewHighScore) {
          stats.push({
            label: "Personal Best",
            val: String(prevHigh),
            color: "#ffdd00",
          });
        }
        stats.forEach((s, i) => {
          const y = statsStartY + i * 42;
          this.add.rectangle(cx, y, 380, 34, 0x1a2a4a, 0.8);
          this.add
            .text(cx - 160, y, s.label, { fontSize: "15px", color: "#6688aa" })
            .setOrigin(0, 0.5);
          const v = this.add
            .text(cx + 160, y, s.val, {
              fontSize: "18px",
              fontStyle: "bold",
              color: s.color,
            })
            .setOrigin(1, 0.5)
            .setAlpha(0);
          this.tweens.add({
            targets: v,
            alpha: 1,
            x: { from: cx + 200, to: cx + 160 },
            duration: 350,
            delay: i * 120,
          });
        });

        const gradeY = statsStartY + stats.length * 42 + 18;
        const grade =
          pct >= 90
            ? "A+"
            : pct >= 80
              ? "A"
              : pct >= 70
                ? "B"
                : pct >= 60
                  ? "C"
                  : "D";
        this.add
          .text(cx, gradeY, grade, {
            fontSize: "48px",
            fontStyle: "bold",
            color: pct >= 80 ? "#22cc66" : pct >= 60 ? "#ffaa00" : "#ff4444",
            stroke: "#000",
            strokeThickness: 4,
          })
          .setOrigin(0.5);
        this.add
          .text(cx, gradeY + 34, `${Math.round(pct)}% Accuracy`, {
            fontSize: "15px",
            color: "#88aacc",
          })
          .setOrigin(0.5);

        const btnY = Math.min(575, gradeY + 70);
        const retry = this.add
          .rectangle(cx - 100, btnY, 170, 44, 0x00ccff)
          .setInteractive({ useHandCursor: true });
        this.add
          .text(cx - 100, btnY, "RACE AGAIN", {
            fontSize: "17px",
            fontStyle: "bold",
            color: "#002244",
          })
          .setOrigin(0.5);
        retry.on("pointerover", () => retry.setFillStyle(0x44ddff));
        retry.on("pointerout", () => retry.setFillStyle(0x00ccff));
        retry.on("pointerdown", () => {
          this.cameras.main.fadeOut(300);
          this.time.delayedCall(300, () =>
            this.scene.start("Game", { difficulty: d.difficulty }),
          );
        });

        const menu = this.add
          .rectangle(cx + 100, btnY, 170, 44, 0x1a2a4a)
          .setInteractive({ useHandCursor: true });
        this.add
          .text(cx + 100, btnY, "MAIN MENU", {
            fontSize: "17px",
            fontStyle: "bold",
            color: "#88aacc",
          })
          .setOrigin(0.5);
        menu.on("pointerover", () => menu.setFillStyle(0x2a3a5a));
        menu.on("pointerout", () => menu.setFillStyle(0x1a2a4a));
        menu.on("pointerdown", () => {
          this.cameras.main.fadeOut(300);
          this.time.delayedCall(300, () => this.scene.start("Title"));
        });

        this.cameras.main.fadeIn(600);
      };

      new Phaser.Game(config);
    </script>
      <script src="/assets/nt-page-enhance.js" defer></script>
  </body>
</html>
