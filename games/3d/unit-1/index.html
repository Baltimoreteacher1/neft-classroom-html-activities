<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>
      Unit 1 — Smoothie Stand | Ratios &amp; Unit Rates (6.RP.A.1–3)
    </title>
    <link rel="stylesheet" href="/assets/design-tokens.css" />
    <!-- Shared clarity/onboarding kit (start overlay, how-to-play, HUD, end
         screen). The kit JS is imported by game.js; this preloads its CSS so the
         overlays render without a flash. -->
    <link rel="stylesheet" href="/games/3d/_clarity/clarity-kit.css" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--navy, #12355b);
        font-family: var(--font-body, system-ui, sans-serif);
      }
      #game {
        position: fixed;
        inset: 0;
      }
      .e3d-intro {
        position: absolute;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        color: #fff;
        font-size: 13px;
        opacity: 0.78;
        z-index: 16;
        pointer-events: none;
        text-align: center;
        max-width: 92%;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }
      .e3d-boot-title {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        z-index: 16;
        pointer-events: none;
        font-family: var(--font-display, system-ui, sans-serif);
        font-weight: 700;
        font-size: 15px;
        opacity: 0.85;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }
      .e3d-fallback {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #fff;
        text-align: center;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div
      id="game"
      role="application"
      tabindex="0"
      aria-label="Smoothie Stand — Match the Ratio. Interactive 3D math game."
      aria-describedby="e3d-intro"
    ></div>
    <div class="e3d-boot-title">Smoothie Stand — Match the Ratio</div>
    <p class="e3d-intro" id="e3d-intro">
      Read the order. Add red and yellow scoops to match it. Then tap Serve.
    </p>
    <div class="e3d-fallback" id="fallback">
      <div>
        <h2>Couldn't start the 3D game</h2>
        <p>
          Please use an up-to-date browser with WebGL and an internet connection
          (the 3D library loads from a CDN).
        </p>
      </div>
    </div>

    <script type="module">
      import { mountGame } from "/games/engine3d/index.js";
      import unit1SmoothieStand from "/games/3d/unit-1/game.js";

      try {
        // Omit `level` to show the Level 1 / Level 2 selector first.
        mountGame(document.getElementById("game"), unit1SmoothieStand, {
          sceneOpts: { background: 0x123a6b, cameraPos: [0, 6.5, 12] },
        });
      } catch (err) {
        console.error("Failed to mount Unit 1 game:", err);
        document.getElementById("fallback").style.display = "flex";
      }
    </script>
  </body>
</html>
