    <title>MCAP Boss Battle 3D — Grade 6 Math Review (Reveal, BCPS)</title>
    <link rel="stylesheet" href="/assets/design-tokens.css" />
    <!-- Shared clarity/onboarding kit (start overlay, how-to-play, end screen).
         Auto-injected by clarity-kit.js too; preloaded here to avoid a flash. -->
    <link rel="stylesheet" href="/games/3d/_clarity/clarity-kit.css" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--navy, #12355b);
        font-family: var(--font-body, system-ui, sans-serif);
      }
      #game {
        position: fixed;
        inset: 0;
      }
      .e3d-boot-title {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        z-index: 16;
        pointer-events: none;
        font-family: var(--font-display, system-ui, sans-serif);
        font-weight: 700;
        font-size: 15px;
        opacity: 0.85;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }
      .e3d-fallback {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px;
        color: #fff;
        text-align: center;
      }
      .e3d-fallback a {
        color: var(--amber, #f2c15b);
      }

      /* ===========================================================
         BESPOKE BOSS-BATTLE OVERLAY POLISH (additive, DOM/CSS only)
         Sits BEHIND the WebGL canvas (arena) and ABOVE it but BELOW
         the HUD (battle FX). Never touches three.js. Every animation
         is gated by prefers-reduced-motion.
         =========================================================== */

      /* --- Parallax battle arena: receding pillars + depth fog ---
         The WebGL canvas is opaque (alpha:false), so the arena is a
         peripheral atmosphere FRAME layered ABOVE the canvas (z-index 13,
         under FX 14 / HUD 15). A radial mask fades the center to fully
         transparent so the 3D boss stays unobstructed. pointer-events
         stay off. The FX kit auto-wires pointer parallax via
         [data-parallax] + [data-parallax-layer]. */
      .bb-arena {
        position: fixed;
        inset: 0;
        z-index: 13;
        overflow: hidden;
        pointer-events: none;
        perspective: 700px;
        /* Keep the middle clear; only frame the edges/floor. */
        -webkit-mask-image: radial-gradient(
          120% 96% at 50% 42%,
          transparent 0%,
          transparent 46%,
          rgba(0, 0, 0, 0.85) 78%,
          #000 100%
        );
        mask-image: radial-gradient(
          120% 96% at 50% 42%,
          transparent 0%,
          transparent 46%,
          rgba(0, 0, 0, 0.85) 78%,
          #000 100%
        );
      }
      .bb-arena-layer {
        position: absolute;
        inset: -8%;
        transform: translate3d(0, 0, 0);
        will-change: transform;
        opacity: 0.6;
      }
      /* Receding pillars drawn procedurally with stacked gradients. */
      .bb-pillars {
        position: absolute;
        left: 50%;
        bottom: -6%;
        width: 160%;
        height: 78%;
        transform: translateX(-50%);
        background-repeat: no-repeat;
        background-position:
          6% bottom,
          18% bottom,
          34% bottom,
          66% bottom,
          82% bottom,
          94% bottom;
        background-size:
          5% 64%,
          7% 80%,
          10% 100%,
          10% 100%,
          7% 80%,
          5% 64%;
        background-image:
          linear-gradient(
            180deg,
            rgba(60, 92, 150, 0),
            rgba(46, 74, 128, 0.55)
          ),
          linear-gradient(
            180deg,
            rgba(70, 104, 168, 0),
            rgba(52, 82, 140, 0.62)
          ),
          linear-gradient(
            180deg,
            rgba(86, 124, 196, 0),
            rgba(60, 94, 158, 0.7)
          ),
          linear-gradient(
            180deg,
            rgba(86, 124, 196, 0),
            rgba(60, 94, 158, 0.7)
          ),
          linear-gradient(
            180deg,
            rgba(70, 104, 168, 0),
            rgba(52, 82, 140, 0.62)
          ),
          linear-gradient(180deg, rgba(60, 92, 150, 0), rgba(46, 74, 128, 0.55));
        opacity: 0.8;
        filter: blur(0.5px);
      }
      /* Depth fog rolling across the arena floor. */
      .bb-fog {
        position: absolute;
        left: -20%;
        right: -20%;
        bottom: 0;
        height: 46%;
        background:
          radial-gradient(
            120% 80% at 50% 120%,
            rgba(120, 170, 235, 0.22),
            rgba(120, 170, 235, 0) 60%
          ),
          linear-gradient(
            0deg,
            rgba(12, 24, 48, 0.55),
            rgba(12, 24, 48, 0) 100%
          );
        opacity: 0.85;
      }
      .bb-fog::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          40% 60% at 30% 90%,
          rgba(160, 200, 255, 0.18),
          rgba(160, 200, 255, 0) 70%
        );
        animation: bbFogDrift 22s ease-in-out infinite alternate;
      }
      @keyframes bbFogDrift {
        0% {
          transform: translateX(-6%);
          opacity: 0.7;
        }
        100% {
          transform: translateX(8%);
          opacity: 1;
        }
      }
      /* Twinkling depth motes for arena atmosphere. */
      .bb-motes {
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(
            1.5px 1.5px at 20% 30%,
            rgba(180, 215, 255, 0.5),
            transparent
          ),
          radial-gradient(
            1.5px 1.5px at 70% 22%,
            rgba(200, 225, 255, 0.45),
            transparent
          ),
          radial-gradient(
            1px 1px at 45% 60%,
            rgba(160, 200, 255, 0.4),
            transparent
          ),
          radial-gradient(
            1.5px 1.5px at 86% 48%,
            rgba(190, 220, 255, 0.4),
            transparent
          ),
          radial-gradient(
            1px 1px at 12% 70%,
            rgba(170, 210, 255, 0.35),
            transparent
          );
        opacity: 0.55;
        animation: bbMotes 9s ease-in-out infinite alternate;
      }
      @keyframes bbMotes {
        0% {
          opacity: 0.3;
          transform: translateY(0);
        }
        100% {
          opacity: 0.7;
          transform: translateY(-8px);
        }
      }

      /* --- Battle FX layer: above canvas, below HUD (z-index 14) --- */
      .bb-fx {
        position: fixed;
        inset: 0;
        z-index: 14;
        pointer-events: none;
        overflow: hidden;
      }

      /* Strike energy beam on a correct answer. */
      .bb-beam {
        position: absolute;
        left: 50%;
        top: 58%;
        width: 4px;
        height: 0;
        transform: translate(-50%, -100%);
        transform-origin: bottom center;
        border-radius: 4px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(159, 226, 255, 0.95) 25%,
          #ffffff 55%,
          rgba(242, 193, 91, 0.95) 100%
        );
        box-shadow:
          0 0 18px 6px rgba(159, 226, 255, 0.7),
          0 0 42px 14px rgba(242, 193, 91, 0.4);
        opacity: 0;
      }
      .bb-fx.bb-strike .bb-beam {
        animation: bbBeam 480ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes bbBeam {
        0% {
          height: 0;
          opacity: 0;
        }
        18% {
          opacity: 1;
        }
        42% {
          height: 62vh;
          opacity: 1;
        }
        100% {
          height: 62vh;
          opacity: 0;
        }
      }
      /* Impact shockwave at the strike point. */
      .bb-impact {
        position: absolute;
        left: 50%;
        top: 30%;
        width: 8px;
        height: 8px;
        margin: -4px 0 0 -4px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 24px 6px rgba(159, 226, 255, 0.6);
        opacity: 0;
      }
      .bb-fx.bb-strike .bb-impact {
        animation: bbImpact 520ms cubic-bezier(0.16, 1, 0.3, 1) 120ms;
      }
      @keyframes bbImpact {
        0% {
          transform: scale(0.2);
          opacity: 0;
        }
        25% {
          opacity: 1;
        }
        100% {
          transform: scale(26);
          opacity: 0;
          border-color: rgba(242, 193, 91, 0);
        }
      }

      /* Boss eye-glow / incoming-attack tell (on a wrong answer). */
      .bb-tell {
        position: absolute;
        inset: 0;
        opacity: 0;
        background:
          radial-gradient(
            60% 42% at 50% 30%,
            rgba(217, 121, 93, 0),
            rgba(217, 121, 93, 0) 100%
          ),
          radial-gradient(
            100% 60% at 50% 50%,
            rgba(180, 60, 40, 0) 55%,
            rgba(180, 60, 40, 0.4) 100%
          );
      }
      .bb-eye {
        position: absolute;
        top: 28%;
        width: 26px;
        height: 12px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          #ffd2a0 0%,
          #ff5a3c 45%,
          rgba(255, 90, 60, 0) 75%
        );
        filter: blur(1px);
        opacity: 0;
      }
      .bb-eye.bb-eye-l {
        left: 42%;
      }
      .bb-eye.bb-eye-r {
        right: 42%;
      }
      .bb-fx.bb-incoming .bb-tell {
        animation: bbTell 760ms ease-out;
      }
      .bb-fx.bb-incoming .bb-eye {
        animation: bbEye 760ms ease-out;
      }
      @keyframes bbTell {
        0% {
          opacity: 0;
        }
        30% {
          opacity: 1;
        }
        100% {
          opacity: 0;
        }
      }
      @keyframes bbEye {
        0% {
          opacity: 0;
          transform: scaleY(0.4);
        }
        25% {
          opacity: 1;
          transform: scaleY(1);
        }
        70% {
          opacity: 0.9;
          transform: scaleY(1);
        }
        100% {
          opacity: 0;
          transform: scaleY(0.4);
        }
      }

      /* --- Phase transition ceremony (zoom + color burst + name) --- */
      .bb-phase {
        position: fixed;
        inset: 0;
        z-index: 17;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        opacity: 0;
        visibility: hidden;
      }
      .bb-phase.bb-show {
        animation: bbPhaseFade 1500ms ease-out forwards;
      }
      @keyframes bbPhaseFade {
        0% {
          opacity: 0;
          visibility: visible;
        }
        12% {
          opacity: 1;
        }
        78% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          visibility: hidden;
        }
      }
      .bb-phase-burst {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 40px;
        height: 40px;
        margin: -20px 0 0 -20px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.9),
          rgba(242, 193, 91, 0.5) 40%,
          rgba(159, 226, 255, 0) 72%
        );
      }
      .bb-phase.bb-show .bb-phase-burst {
        animation: bbPhaseBurst 1200ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes bbPhaseBurst {
        0% {
          transform: scale(0.2);
          opacity: 0;
        }
        20% {
          opacity: 0.95;
        }
        100% {
          transform: scale(34);
          opacity: 0;
        }
      }
      .bb-phase-name {
        position: relative;
        color: #fff;
        font-family: var(--font-display, system-ui, sans-serif);
        font-weight: 800;
        text-align: center;
        text-shadow:
          0 2px 10px rgba(0, 0, 0, 0.6),
          0 0 28px rgba(159, 226, 255, 0.6);
        letter-spacing: 0.02em;
        padding: 0 24px;
      }
      .bb-phase-eyebrow {
        display: block;
        font-size: clamp(12px, 2vw, 16px);
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--amber, #f2c15b);
        opacity: 0.95;
        margin-bottom: 6px;
      }
      .bb-phase-title {
        display: block;
        font-size: clamp(28px, 6.5vw, 64px);
        line-height: 1.05;
      }
      .bb-phase.bb-show .bb-phase-name {
        animation: bbPhaseZoom 1500ms cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes bbPhaseZoom {
        0% {
          transform: scale(1.5);
          opacity: 0;
          filter: blur(8px);
        }
        16% {
          opacity: 1;
          filter: blur(0);
        }
        82% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(0.96);
          opacity: 0;
        }
      }

      /* ---- Reduced-motion: keep static arena depth, kill all motion ---- */
      @media (prefers-reduced-motion: reduce) {
        .bb-fog::before,
        .bb-motes {
          animation: none;
        }
        .bb-fx.bb-strike .bb-beam,
        .bb-fx.bb-strike .bb-impact,
        .bb-fx.bb-incoming .bb-tell,
        .bb-fx.bb-incoming .bb-eye,
        .bb-phase.bb-show,
        .bb-phase.bb-show .bb-phase-burst,
        .bb-phase.bb-show .bb-phase-name {
          animation: none;
        }
        /* Show the phase name briefly without zoom motion. */
        .bb-phase.bb-show {
          animation: bbPhaseFade 1200ms steps(1, end) forwards;
        }
        .bb-phase.bb-show .bb-phase-name {
          opacity: 1;
          transform: none;
          filter: none;
        }
      }
    </style>

  <body>
    <!-- Parallax battle arena (purely decorative, behind the WebGL canvas).
         The FX kit wires pointer parallax via [data-parallax] + layer child. -->
    <div class="bb-arena" data-parallax aria-hidden="true">
      <div class="bb-arena-layer" data-parallax-layer>
        <div class="bb-pillars"></div>
        <div class="bb-motes"></div>
        <div class="bb-fog"></div>
      </div>
    </div>
    <div
      id="game"
      role="application"
      tabindex="0"
      aria-label="MCAP Boss Battle. A 3D math review game. Answer Grade 6 questions to attack the boss across 10 phases."
    ></div>
    <!-- Battle FX overlay (above canvas, below HUD). Decorative only. -->
    <div class="bb-fx" id="bb-fx" aria-hidden="true">
      <div class="bb-beam"></div>
      <div class="bb-impact"></div>
      <div class="bb-tell"></div>
      <div class="bb-eye bb-eye-l"></div>
      <div class="bb-eye bb-eye-r"></div>
    </div>
    <!-- Phase-transition ceremony banner. aria-hidden: HUD already announces. -->
    <div class="bb-phase" id="bb-phase" aria-hidden="true">
      <div class="bb-phase-burst"></div>
      <div class="bb-phase-name">
        <span class="bb-phase-eyebrow">Phase</span>
        <span class="bb-phase-title" id="bb-phase-title"></span>
      </div>
    </div>
    <div class="e3d-boot-title">MCAP Boss Battle 3D — Grade 6 Review</div>
    <div class="e3d-fallback" id="fallback">
      <div>
        <h2>Couldn't start the 3D Boss Battle</h2>
        <p>
          This game needs a browser with WebGL turned on. Try refreshing once,
          or open it in a different browser or on another device.
        </p>
      </div>
    </div>

    <script type="module">
      import { mountGame } from "/games/engine3d/index.js";
      import bossBattle from "/games/3d/boss-battle-3d/game.js";

      try {
        // Omit `level` so the Level 1 (support) / Level 2 (enrichment) selector
        // shows first, then the vocab gate, then the battle.
        mountGame(document.getElementById("game"), bossBattle, {
          sceneOpts: {
            background: 0x0c1830,
            cameraPos: [0, 3.4, 11],
            fov: 55,
            // a touch more bloom than default so the boss core / strikes glow
            bloomStrength: 0.32,
            bloomThreshold: 0.82,
          },
        });
      } catch (err) {
        console.error("Failed to mount Boss Battle 3D:", err);
        document.getElementById("fallback").style.display = "flex";
      }
    </script>

    <!-- ===========================================================
         BESPOKE OVERLAY DRIVER (decorative only).
         Observes the engine HUD's existing DOM hooks and fires the
         arena/strike/tell/phase overlays. Reads only; never mutates
         game state, scoring, answer-checking, or the WebGL scene.
         All motion is gated by prefers-reduced-motion + matchMedia.
         =========================================================== -->
    <script>
      (function () {
        "use strict";
        try {
          var reduceMQ = window.matchMedia
            ? window.matchMedia("(prefers-reduced-motion: reduce)")
            : { matches: false };
          var reduce = function () {
            return !!reduceMQ.matches;
          };

          var fx = document.getElementById("bb-fx");
          var phaseEl = document.getElementById("bb-phase");
          var phaseTitle = document.getElementById("bb-phase-title");

          // Re-trigger a CSS animation class by removing it, forcing reflow,
          // then re-adding. Cheap and only runs on discrete events.
          function fire(el, cls) {
            if (!el) return;
            el.classList.remove(cls);
            void el.offsetWidth; // reflow so the animation restarts
            el.classList.add(cls);
          }

          function strike() {
            if (!fx || reduce()) return;
            fire(fx, "bb-strike");
            window.setTimeout(function () {
              fx.classList.remove("bb-strike");
            }, 700);
          }
          function incoming() {
            if (!fx || reduce()) return;
            fire(fx, "bb-incoming");
            window.setTimeout(function () {
              fx.classList.remove("bb-incoming");
            }, 800);
          }
          function phaseCeremony(name) {
            if (!phaseEl) return;
            if (phaseTitle) phaseTitle.textContent = name || "";
            fire(phaseEl, "bb-show");
            window.setTimeout(function () {
              phaseEl.classList.remove("bb-show");
            }, 1600);
          }

          var fxApi = window.GameFX || null;
          function pop(el) {
            if (el && fxApi && typeof fxApi.pop === "function") fxApi.pop(el);
          }

          // The engine injects the HUD asynchronously into #game. Poll briefly
          // for the message banner + level label, then attach observers.
          var tries = 0;
          var waitTimer = window.setInterval(function () {
            tries++;
            var game = document.getElementById("game");
            var msgEl = game && game.querySelector('[data-hud="msg"]');
            if (msgEl) {
              window.clearInterval(waitTimer);
              attach(game, msgEl);
            } else if (tries > 200) {
              // ~30s; give up quietly. Arena/parallax still work.
              window.clearInterval(waitTimer);
            }
          }, 150);

          function attach(game, msgEl) {
            // Center banner: data-tone="ok" => correct strike; "warn" => tell.
            var lastShown = false;
            var msgObs = new MutationObserver(function () {
              var shown = !msgEl.hidden;
              if (shown && !lastShown) {
                var tone = msgEl.dataset ? msgEl.dataset.tone : "";
                if (tone === "ok") strike();
                else if (tone === "warn") incoming();
              }
              lastShown = shown;
            });
            msgObs.observe(msgEl, {
              attributes: true,
              attributeFilter: ["hidden", "data-tone"],
            });

            // Level/phase label: text change => phase ceremony + score pop.
            var levelEl = game.querySelector('[data-hud="level"]');
            if (levelEl) {
              var lastLevel = (levelEl.textContent || "").trim();
              if (lastLevel) {
                /* don't fire on the very first label paint */
              }
              var lvlObs = new MutationObserver(function () {
                var now = (levelEl.textContent || "").trim();
                if (now && now !== lastLevel) {
                  lastLevel = now;
                  phaseCeremony(now);
                }
              });
              lvlObs.observe(levelEl, {
                childList: true,
                characterData: true,
                subtree: true,
              });
            }

            // Score / streak updates: gentle pop on the existing HUD chips.
            var scoreEl = game.querySelector('[data-hud="score"]');
            if (scoreEl) {
              var scoreObs = new MutationObserver(function () {
                pop(scoreEl);
              });
              scoreObs.observe(scoreEl, {
                childList: true,
                characterData: true,
                subtree: true,
              });
            }
            var streakEl = game.querySelector('[data-hud="streak"]');
            if (streakEl) {
              var streakObs = new MutationObserver(function () {
                if (!streakEl.hidden) pop(streakEl);
              });
              streakObs.observe(streakEl, {
                attributes: true,
                childList: true,
                characterData: true,
                subtree: true,
                attributeFilter: ["hidden"],
              });
            }
          }
        } catch (e) {
          /* overlay polish is non-essential; never break the game */
          if (window.console)
            console.warn("Boss-battle overlay FX disabled:", e);
        }
      })();
    </script>
