    <script>
      // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror
      // (document.write blocks parsing so the mirror is ready before the game script runs).
      if (typeof Phaser === "undefined") {
        document.write(
          '<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"><\/script>',
        );
      }
      // If both CDNs are unreachable, show a clear message instead of a blank page.
      window.addEventListener("load", function () {
        if (typeof Phaser === "undefined") {
          document.body.innerHTML =
            '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">\u26a0\ufe0f This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
        }
      });
    </script>

  <body>
    <script>
      // Coordinate Quest — Space Navigation
      // Grade 6: 6.NS.5–6.NS.8 (Coordinate plane, integers, absolute value)
      // Neft Teacher

      const W = 1024,
        H = 768;
      const LS_KEY = "coordquest_highscore";

      // --- SFX ---
      class SFX {
        constructor() {
          this.ctx = null;
        }
        init() {
          if (!this.ctx)
            try {
              this.ctx = new (
                window.AudioContext || window.webkitAudioContext
              )();
            } catch (e) {}
        }
        tone(f, d, t = "sine", v = 0.08) {
          if (!this.ctx) return;
          try {
            const o = this.ctx.createOscillator(),
              g = this.ctx.createGain();
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              this.ctx.currentTime + d,
            );
            o.connect(g);
            g.connect(this.ctx.destination);
            o.start();
            o.stop(this.ctx.currentTime + d);
          } catch (e) {}
        }
        noise(d, v = 0.04) {
          if (!this.ctx) return;
          try {
            const bufSize = this.ctx.sampleRate * d;
            const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
            const src = this.ctx.createBufferSource();
            src.buffer = buf;
            const g = this.ctx.createGain();
            g.gain.setValueAtTime(v, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              this.ctx.currentTime + d,
            );
            src.connect(g);
            g.connect(this.ctx.destination);
            src.start();
          } catch (e) {}
        }
        warp() {
          [300, 500, 800, 1200].forEach((f, i) =>
            setTimeout(() => this.tone(f, 0.1), i * 50),
          );
        }
        hit() {
          this.tone(200, 0.3, "sawtooth");
          setTimeout(() => this.tone(150, 0.2, "sawtooth"), 100);
        }
        click() {
          this.tone(600, 0.04);
        }
        nav() {
          this.tone(800, 0.08);
          setTimeout(() => this.tone(1000, 0.08), 60);
        }
        collect() {
          this.tone(880, 0.08);
          setTimeout(() => this.tone(1100, 0.1), 60);
          setTimeout(() => this.tone(1320, 0.12), 120);
        }
        engine() {
          this.tone(80, 0.15, "triangle", 0.03);
        }
        win() {
          [523, 659, 784, 880, 1047, 1319].forEach((f, i) =>
            setTimeout(() => this.tone(f, 0.12), i * 70),
          );
        }
        winBig() {
          [523, 659, 784, 1047, 1319, 1568, 2093].forEach((f, i) =>
            setTimeout(() => this.tone(f, 0.15, "sine", 0.1), i * 80),
          );
          setTimeout(() => {
            [1047, 1319, 1568].forEach((f, i) =>
              setTimeout(() => this.tone(f, 0.25, "triangle", 0.06), i * 60),
            );
          }, 600);
        }
        lose() {
          [500, 400, 300, 200].forEach((f, i) =>
            setTimeout(() => this.tone(f, 0.2, "sawtooth"), i * 100),
          );
        }
        alarm() {
          this.tone(400, 0.1, "square");
          setTimeout(() => this.tone(600, 0.1, "square"), 100);
        }
        glassBreak() {
          this.noise(0.3, 0.08);
          this.tone(800, 0.05, "square", 0.06);
          setTimeout(() => this.noise(0.15, 0.04), 50);
          setTimeout(() => this.tone(400, 0.08, "sawtooth", 0.05), 80);
        }
        streakMilestone(level) {
          const base = 600 + level * 100;
          [base, base + 200, base + 400, base + 600].forEach((f, i) =>
            setTimeout(() => this.tone(f, 0.08, "sine", 0.07), i * 40),
          );
        }
        powerUp() {
          [400, 600, 800, 1000, 1200].forEach((f, i) =>
            setTimeout(() => this.tone(f, 0.06, "sine", 0.06), i * 30),
          );
        }
        phaseTransition() {
          [200, 300, 400, 600, 800, 1000, 1200].forEach((f, i) =>
            setTimeout(() => this.tone(f, 0.12, "triangle", 0.06), i * 60),
          );
        }
        speedBonus() {
          this.tone(1200, 0.06, "sine", 0.06);
          setTimeout(() => this.tone(1500, 0.08, "sine", 0.05), 40);
        }
        crowdCheer(intensity) {
          const v = Math.min(0.03 + intensity * 0.005, 0.08);
          this.noise(0.4, v);
          this.tone(300 + intensity * 40, 0.3, "triangle", v * 0.5);
        }
      }
      const sfx = new SFX();

      // --- QUESTIONS ---
      function genQuestions() {
        const qs = [];
        function shuf(a) {
          const b = [...a];
          for (let i = b.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [b[i], b[j]] = [b[j], b[i]];
          }
          return b;
        }
        function mk(text, correct, wrongs, explain, tier, coord) {
          const opts = shuf([correct, ...wrongs]);
          return {
            text,
            correct,
            options: opts,
            explain,
            tier,
            coord: coord || null,
          };
        }
        // Tier 1: Quadrants, QI plotting, absolute value
        for (let i = 0; i < 2; i++) {
          const x = Phaser.Math.Between(1, 9),
            y = Phaser.Math.Between(1, 9);
          qs.push(
            mk(
              `Navigate to (${x}, ${y}). Which quadrant?`,
              "Quadrant I",
              ["Quadrant II", "Quadrant III", "Quadrant IV"],
              `(${x},${y}): both positive = Quadrant I`,
              1,
              { x, y },
            ),
          );
        }
        for (let i = 0; i < 2; i++) {
          const n = Phaser.Math.Between(2, 15);
          qs.push(
            mk(
              `What is |−${n}|?`,
              String(n),
              [String(-n), "0", String(n + 1)],
              `|−${n}| = ${n}. Distance from 0 is always positive.`,
              1,
            ),
          );
        }
        qs.push(
          mk(
            "Which point is in Quadrant I?",
            "(4, 7)",
            ["(−2, 5)", "(3, −1)", "(−6, −4)"],
            "QI: both x and y positive. (4,7) works.",
            1,
            { x: 4, y: 7 },
          ),
        );
        // Tier 2: All 4 quadrants, reflections, comparing integers
        const q2pairs = [
          { x: -4, y: 6, q: "II" },
          { x: -7, y: -2, q: "III" },
          { x: 5, y: -3, q: "IV" },
        ];
        q2pairs.forEach((p) => {
          qs.push(
            mk(
              `Waypoint at (${p.x}, ${p.y}). Which quadrant?`,
              `Quadrant ${p.q}`,
              [
                ...["I", "II", "III", "IV"]
                  .filter((q) => q !== p.q)
                  .map((q) => `Quadrant ${q}`),
              ].slice(0, 3),
              `(${p.x},${p.y}): check signs => Q${p.q}`,
              2,
              { x: p.x, y: p.y },
            ),
          );
        });
        qs.push(
          mk(
            "Which integer is greater: −3 or −8?",
            "−3",
            ["−8", "Equal", "Cannot tell"],
            "−3 is right of −8 on number line, so −3 > −8.",
            2,
          ),
        );
        qs.push(
          mk(
            "Reflect (5, 3) across the y-axis. New coordinates?",
            "(−5, 3)",
            ["(5, −3)", "(−5, −3)", "(3, 5)"],
            "y-axis reflection: (x,y) → (−x,y). So (−5,3).",
            2,
            { x: -5, y: 3 },
          ),
        );
        qs.push(
          mk(
            "Reflect (2, −6) across the x-axis. New coordinates?",
            "(2, 6)",
            ["(−2, −6)", "(−2, 6)", "(2, −6)"],
            "x-axis reflection: (x,y) → (x,−y). So (2,6).",
            2,
            { x: 2, y: 6 },
          ),
        );
        // Tier 3: Distance, ordering, word problems
        qs.push(
          mk(
            "Distance between (3, −2) and (3, 5)?",
            "7 units",
            ["3 units", "5 units", "2 units"],
            "Same x: distance = |−2 − 5| = 7",
            3,
            { x: 3, y: -2 },
          ),
        );
        qs.push(
          mk(
            "Order least to greatest: −4, 1.5, −7, 0, 3",
            "−7, −4, 0, 1.5, 3",
            ["−4, −7, 0, 1.5, 3", "3, 1.5, 0, −4, −7", "0, −4, −7, 1.5, 3"],
            "Number line: −7 < −4 < 0 < 1.5 < 3",
            3,
          ),
        );
        qs.push(
          mk(
            "Diver at −40 ft, bird at +25 ft. Distance between them?",
            "65 feet",
            ["15 feet", "40 feet", "25 feet"],
            "|−40 − 25| = 65 feet",
            3,
          ),
        );
        qs.push(
          mk(
            "Distance between (−5, 4) and (2, 4)?",
            "7 units",
            ["3 units", "5 units", "9 units"],
            "Same y: |−5 − 2| = 7 units",
            3,
            { x: -5, y: 4 },
          ),
        );
        qs.push(
          mk(
            "Sub at (−3, −8) surfaces to (−3, 0). How far?",
            "8 units",
            ["3 units", "11 units", "5 units"],
            "Same x: |−8 − 0| = 8 units",
            3,
            { x: -3, y: -8 },
          ),
        );
        return shuf(qs).slice(0, 15);
      }

      // --- STARS BACKGROUND ---
      function createStarfield(scene) {
        for (let i = 0; i < 120; i++) {
          const x = Phaser.Math.Between(0, W),
            y = Phaser.Math.Between(0, H);
          const s = Math.random() * 2 + 0.5;
          const star = scene.add
            .circle(x, y, s, 0xffffff, Math.random() * 0.5 + 0.3)
            .setDepth(0);
          scene.tweens.add({
            targets: star,
            alpha: Math.random() * 0.3 + 0.1,
            duration: Phaser.Math.Between(1000, 3000),
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });
        }
        // Nebula patches
        for (let i = 0; i < 3; i++) {
          const nx = Phaser.Math.Between(100, W - 100),
            ny = Phaser.Math.Between(100, H - 100);
          scene.add
            .circle(
              nx,
              ny,
              Phaser.Math.Between(60, 120),
              [0x4361ee, 0x7c3aed, 0x0ea5e9][i],
              0.04,
            )
            .setDepth(0);
        }
      }

      // --- AMBIENT PARTICLES ---
      function createAmbientParticles(scene) {
        // Floating space dust
        scene.add
          .particles(W / 2, H / 2, "__WHITE", {
            x: { min: 0, max: W },
            y: { min: 0, max: H },
            speed: { min: 3, max: 12 },
            angle: { min: 250, max: 290 },
            scale: { start: 0.15, end: 0 },
            alpha: { start: 0.3, end: 0 },
            lifespan: { min: 4000, max: 8000 },
            tint: [0x4361ee, 0x7c3aed, 0x22d3ee, 0xffffff],
            quantity: 1,
            frequency: 300,
            blendMode: "ADD",
          })
          .setDepth(0);
      }

      // --- BOOT ---
      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          this.scene.start("Title");
        }
      }

      // --- TITLE ---
      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          sfx.init();
          const cx = W / 2;
          this.cameras.main.setBackgroundColor("#020617");
          createStarfield(this);
          createAmbientParticles(this);

          // Animated shooting stars
          this.time.addEvent({
            delay: 2000,
            loop: true,
            callback: () => {
              const sx = Phaser.Math.Between(0, W);
              const star = this.add
                .circle(sx, -5, 2, 0x22d3ee, 0.8)
                .setDepth(1);
              this.tweens.add({
                targets: star,
                x: sx + Phaser.Math.Between(-200, 200),
                y: H + 10,
                alpha: 0,
                duration: Phaser.Math.Between(800, 1500),
                onComplete: () => star.destroy(),
              });
            },
          });

          // Spaceship
          const ship = this.add.graphics().setPosition(cx, 380);
          ship.fillStyle(0x64748b);
          ship.fillTriangle(0, -40, 25, 20, -25, 20);
          ship.fillStyle(0x3b82f6);
          ship.fillTriangle(0, -30, 18, 15, -18, 15);
          ship.fillStyle(0x475569);
          ship.fillTriangle(-18, 10, -40, 25, -15, 25);
          ship.fillTriangle(18, 10, 40, 25, 15, 25);
          ship.fillStyle(0x22d3ee);
          ship.fillCircle(0, -10, 7);
          ship.fillStyle(0xf97316);
          ship.fillTriangle(-8, 20, 8, 20, 0, 35);
          this.tweens.add({
            targets: ship,
            y: ship.y - 12,
            duration: 1500,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });
          // Engine particles
          this.add.particles(cx, 415, "__WHITE", {
            speed: { min: 20, max: 80 },
            angle: { min: 80, max: 100 },
            scale: { start: 0.3, end: 0 },
            lifespan: 500,
            tint: [0xf97316, 0xfbbf24, 0xef4444],
            quantity: 2,
            frequency: 60,
            blendMode: "ADD",
          });

          // Title with animated glow
          const titleCoord = this.add
            .text(cx, 70, "COORDINATE", {
              fontSize: "52px",
              fontFamily: "monospace",
              color: "#22d3ee",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          this.tweens.add({
            targets: titleCoord,
            alpha: 0.7,
            duration: 1500,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });

          const titleQuest = this.add
            .text(cx, 135, "QUEST", {
              fontSize: "68px",
              fontFamily: "monospace",
              color: "#a78bfa",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          this.tweens.add({
            targets: titleQuest,
            scaleX: 1.03,
            scaleY: 1.03,
            duration: 2000,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });

          this.add
            .text(cx, 195, "Space Navigation", {
              fontSize: "22px",
              color: "#94a3b8",
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 225, "6.NS.5–6.NS.8 | Neft Teacher", {
              fontSize: "13px",
              color: "#64748b",
            })
            .setOrigin(0.5);

          // High score display
          const hi = parseInt(localStorage.getItem(LS_KEY)) || 0;
          if (hi > 0) {
            this.add
              .text(cx, 250, `HIGH SCORE: ${hi}`, {
                fontSize: "14px",
                color: "#fbbf24",
                fontStyle: "bold",
              })
              .setOrigin(0.5);
          }

          // Mini coordinate grid preview
          const gx = cx,
            gy = 300,
            gs = 60;
          this.add.line(gx, gy, -gs * 2, 0, gs * 2, 0, 0x334155).setDepth(1);
          this.add.line(gx, gy, 0, -gs * 2, 0, gs * 2, 0x334155).setDepth(1);
          // Quadrant labels with pulsing
          const qlabels = [
            { x: gx + gs / 2, y: gy - gs, t: "QI", c: "#22c55e" },
            { x: gx - gs / 2, y: gy - gs, t: "QII", c: "#3b82f6" },
            { x: gx - gs / 2, y: gy + gs / 2, t: "QIII", c: "#f59e0b" },
            { x: gx + gs / 2, y: gy + gs / 2, t: "QIV", c: "#ef4444" },
          ];
          qlabels.forEach((q, i) => {
            const lbl = this.add
              .text(q.x, q.y, q.t, { fontSize: "10px", color: q.c })
              .setOrigin(0.5)
              .setDepth(1);
            this.tweens.add({
              targets: lbl,
              alpha: 0.4,
              duration: 1200 + i * 200,
              yoyo: true,
              repeat: -1,
            });
          });

          // Animated dot on grid
          const dot = this.add
            .circle(gx + gs, gy - gs, 4, 0x22d3ee)
            .setDepth(2);
          this.tweens.add({
            targets: dot,
            x: gx - gs,
            y: gy + gs / 2,
            duration: 3000,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });

          // Features
          const feats = [
            { t: "Navigate all 4 quadrants", c: "#22d3ee" },
            { t: "Plot waypoints & reflect", c: "#a78bfa" },
            { t: "Calculate distances", c: "#f59e0b" },
          ];
          feats.forEach((f, i) => {
            const ft = this.add
              .text(cx, 475 + i * 28, "● " + f.t, {
                fontSize: "14px",
                color: f.c,
              })
              .setOrigin(0.5)
              .setAlpha(0);
            this.tweens.add({
              targets: ft,
              alpha: 1,
              y: ft.y - 5,
              duration: 400,
              delay: 300 + i * 150,
              ease: "Back.easeOut",
            });
          });

          // Start button with pulse
          const btn = this.add
            .rectangle(cx, 600, 260, 60, 0x7c3aed)
            .setStrokeStyle(2, 0xa78bfa)
            .setInteractive({ useHandCursor: true });
          const btnText = this.add
            .text(cx, 600, "LAUNCH MISSION", {
              fontSize: "24px",
              color: "#fff",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          this.tweens.add({
            targets: btn,
            scaleX: 1.04,
            scaleY: 1.04,
            duration: 800,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });
          btn.on("pointerover", () => {
            btn.setFillStyle(0x6d28d9);
            this.tweens.add({
              targets: [btn, btnText],
              scaleX: 1.08,
              scaleY: 1.08,
              duration: 150,
            });
          });
          btn.on("pointerout", () => {
            btn.setFillStyle(0x7c3aed);
            this.tweens.add({
              targets: [btn, btnText],
              scaleX: 1,
              scaleY: 1,
              duration: 150,
            });
          });
          btn.on("pointerdown", () => {
            sfx.warp();
            this.cameras.main.fade(400, 0, 0, 0);
            this.time.delayedCall(400, () => this.scene.start("Game"));
          });
          this.add
            .text(cx, 660, "Keys 1-4 or click | Arrows + Enter", {
              fontSize: "12px",
              color: "#475569",
            })
            .setOrigin(0.5);
          this.input.keyboard.on("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              sfx.warp();
              this.cameras.main.fade(400, 0, 0, 0);
              this.time.delayedCall(400, () => this.scene.start("Game"));
            }
          });
        }
      }

      // --- GAME ---
      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }
        create() {
          sfx.init();
          this.questions = genQuestions();
          this.qIndex = 0;
          this.score = 0;
          this.lives = 3;
          this.streak = 0;
          this.bestStreak = 0;
          this.multiplier = 1;
          this.totalQ = Math.min(15, this.questions.length);
          this.answered = false;
          this.startTime = Date.now();
          this.questionStartTime = Date.now();
          this.selectedIdx = -1;
          this.currentTier = 0;
          this.powerUps = { fiftyFifty: 1, doublePoints: 1, extraTime: 0 };
          this.doublePointsActive = false;
          this.cameras.main.setBackgroundColor("#020617");
          this.cameras.main.fadeIn(500);
          createStarfield(this);
          createAmbientParticles(this);
          this.buildGrid();
          this.buildShip();
          this.buildHUD();
          this.buildPowerUpButtons();
          this.loadQuestion();
          this.input.keyboard.on("keydown", this.handleKey, this);
        }

        buildGrid() {
          this.gridX = 720;
          this.gridY = 380;
          this.gridSize = 25;
          this.gridRange = 8;
          const gx = this.gridX,
            gy = this.gridY,
            gs = this.gridSize,
            gr = this.gridRange;
          this.add
            .rectangle(
              gx,
              gy,
              gs * gr * 2 + 20,
              gs * gr * 2 + 20,
              0x0f172a,
              0.8,
            )
            .setStrokeStyle(1, 0x1e293b)
            .setDepth(1);
          for (let i = -gr; i <= gr; i++) {
            const alpha = i === 0 ? 0.6 : 0.15;
            const color = i === 0 ? 0x64748b : 0x334155;
            this.add
              .line(gx, gy, i * gs, -gr * gs, i * gs, gr * gs, color, alpha)
              .setDepth(2);
            this.add
              .line(gx, gy, -gr * gs, i * gs, gr * gs, i * gs, color, alpha)
              .setDepth(2);
          }
          this.add
            .text(gx + gr * gs + 5, gy, "x", {
              fontSize: "11px",
              color: "#64748b",
            })
            .setDepth(3);
          this.add
            .text(gx, gy - gr * gs - 15, "y", {
              fontSize: "11px",
              color: "#64748b",
            })
            .setOrigin(0.5)
            .setDepth(3);
          for (let i = -gr; i <= gr; i += 2) {
            if (i !== 0) {
              this.add
                .text(gx + i * gs, gy + 12, String(i), {
                  fontSize: "8px",
                  color: "#475569",
                })
                .setOrigin(0.5)
                .setDepth(3);
              this.add
                .text(gx - 14, gy - i * gs, String(i), {
                  fontSize: "8px",
                  color: "#475569",
                })
                .setOrigin(0.5)
                .setDepth(3);
            }
          }
          this.add
            .text(gx - 10, gy + 10, "0", { fontSize: "8px", color: "#475569" })
            .setDepth(3);
          this.add
            .text(gx + (gr * gs) / 2, gy - (gr * gs) / 2, "QI", {
              fontSize: "10px",
              color: "#22c55e",
              alpha: 0.4,
            })
            .setOrigin(0.5)
            .setDepth(2);
          this.add
            .text(gx - (gr * gs) / 2, gy - (gr * gs) / 2, "QII", {
              fontSize: "10px",
              color: "#3b82f6",
              alpha: 0.4,
            })
            .setOrigin(0.5)
            .setDepth(2);
          this.add
            .text(gx - (gr * gs) / 2, gy + (gr * gs) / 2, "QIII", {
              fontSize: "10px",
              color: "#f59e0b",
              alpha: 0.4,
            })
            .setOrigin(0.5)
            .setDepth(2);
          this.add
            .text(gx + (gr * gs) / 2, gy + (gr * gs) / 2, "QIV", {
              fontSize: "10px",
              color: "#ef4444",
              alpha: 0.4,
            })
            .setOrigin(0.5)
            .setDepth(2);
          this.waypoint = this.add.graphics().setDepth(5);
          this.waypointLabel = this.add
            .text(0, 0, "", {
              fontSize: "10px",
              color: "#22d3ee",
              fontStyle: "bold",
            })
            .setDepth(5);
          this.shipMarker = this.add.graphics().setDepth(6);
        }

        plotWaypoint(coord) {
          this.waypoint.clear();
          this.waypointLabel.setText("");
          if (!coord) return;
          const px = this.gridX + coord.x * this.gridSize;
          const py = this.gridY - coord.y * this.gridSize;
          this.waypoint.lineStyle(2, 0x22d3ee);
          this.waypoint.strokeCircle(px, py, 8);
          this.waypoint.fillStyle(0x22d3ee, 0.3);
          this.waypoint.fillCircle(px, py, 5);
          this.waypointLabel
            .setText(`(${coord.x},${coord.y})`)
            .setPosition(px + 10, py - 12);
          if (this.wpTween) this.wpTween.remove();
          this.wpTween = this.tweens.add({
            targets: this.waypoint,
            alpha: 0.4,
            duration: 600,
            yoyo: true,
            repeat: -1,
          });
        }

        moveShipToGrid(coord) {
          if (!coord) return;
          const px = this.gridX + coord.x * this.gridSize;
          const py = this.gridY - coord.y * this.gridSize;
          this.shipMarker.clear();
          this.shipMarker.fillStyle(0xf97316);
          this.shipMarker.fillTriangle(
            px,
            py - 6,
            px + 5,
            py + 4,
            px - 5,
            py + 4,
          );
          this.tweens.add({
            targets: this.shipMarker,
            alpha: 0.5,
            duration: 400,
            yoyo: true,
            repeat: 2,
          });
        }

        buildShip() {
          this.ship = this.add.graphics().setPosition(160, 400).setDepth(4);
          this.drawShip(this.ship);
          this.tweens.add({
            targets: this.ship,
            y: this.ship.y - 8,
            duration: 1200,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });
          this.engineParticles = this.add
            .particles(160, 430, "__WHITE", {
              speed: { min: 10, max: 40 },
              angle: { min: 85, max: 95 },
              scale: { start: 0.2, end: 0 },
              lifespan: 400,
              tint: [0xf97316, 0xfbbf24],
              quantity: 1,
              frequency: 80,
              blendMode: "ADD",
            })
            .setDepth(3);
        }

        drawShip(g) {
          g.clear();
          g.fillStyle(0x64748b);
          g.fillTriangle(0, -30, 20, 15, -20, 15);
          g.fillStyle(0x3b82f6);
          g.fillTriangle(0, -22, 14, 10, -14, 10);
          g.fillStyle(0x475569);
          g.fillTriangle(-14, 8, -30, 20, -12, 20);
          g.fillTriangle(14, 8, 30, 20, 12, 20);
          g.fillStyle(0x22d3ee);
          g.fillCircle(0, -8, 5);
          g.fillStyle(0xf97316);
          g.fillTriangle(-6, 15, 6, 15, 0, 25);
        }

        buildHUD() {
          this.hudBg = this.add
            .rectangle(W / 2, 22, W, 44, 0x000000, 0.8)
            .setDepth(10);
          this.hudQ = this.add
            .text(15, 10, "", {
              fontSize: "14px",
              color: "#94a3b8",
              fontStyle: "bold",
            })
            .setDepth(11);
          this.hudScore = this.add
            .text(170, 10, "", {
              fontSize: "14px",
              color: "#22d3ee",
              fontStyle: "bold",
            })
            .setDepth(11);
          this.hudLives = this.add
            .text(340, 10, "", { fontSize: "14px", color: "#ef4444" })
            .setDepth(11);
          this.hudStreak = this.add
            .text(520, 10, "", { fontSize: "14px", color: "#a78bfa" })
            .setDepth(11);
          this.hudTimer = this.add
            .text(W - 100, 10, "", { fontSize: "14px", color: "#94a3b8" })
            .setDepth(11);

          // Multiplier display
          this.hudMultiplier = this.add
            .text(W - 220, 10, "", {
              fontSize: "14px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setDepth(11);

          // Progress bar
          this.progBg = this.add
            .rectangle(W / 2, 44, W - 20, 6, 0x1e293b)
            .setDepth(10);
          this.progFill = this.add
            .rectangle(10, 44, 0, 6, 0x7c3aed)
            .setOrigin(0, 0.5)
            .setDepth(10);

          // Question counter dots
          this.qDots = [];
          for (let i = 0; i < this.totalQ; i++) {
            const dot = this.add
              .circle(15 + i * 18, 56, 4, 0x1e293b)
              .setStrokeStyle(1, 0x334155)
              .setDepth(10);
            this.qDots.push(dot);
          }

          // Streak counter (visual)
          this.streakContainer = this.add.container(W / 2, H - 30).setDepth(15);
          this.streakBg = this.add
            .rectangle(0, 0, 200, 28, 0x000000, 0)
            .setDepth(15);
          this.streakText = this.add
            .text(0, 0, "", {
              fontSize: "16px",
              color: "#a78bfa",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(15);
          this.streakContainer.add([this.streakBg, this.streakText]);

          // Speed indicator
          this.speedIndicator = this.add
            .text(400, 56, "", {
              fontSize: "11px",
              color: "#22d3ee",
            })
            .setDepth(11);
        }

        buildPowerUpButtons() {
          this.puGroup = this.add.container(0, 0).setDepth(12);
          // 50/50 button
          const pu1bg = this.add
            .rectangle(430, H - 30, 80, 24, 0x1e293b)
            .setStrokeStyle(1, 0x7c3aed)
            .setInteractive({ useHandCursor: true });
          this.pu1text = this.add
            .text(430, H - 30, "50/50 (1)", {
              fontSize: "11px",
              color: "#a78bfa",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          pu1bg.on("pointerdown", () => this.usePowerUp("fiftyFifty"));
          pu1bg.on("pointerover", () => pu1bg.setFillStyle(0x334155));
          pu1bg.on("pointerout", () => pu1bg.setFillStyle(0x1e293b));
          this.pu1bg = pu1bg;

          // Double Points button
          const pu2bg = this.add
            .rectangle(540, H - 30, 90, 24, 0x1e293b)
            .setStrokeStyle(1, 0xfbbf24)
            .setInteractive({ useHandCursor: true });
          this.pu2text = this.add
            .text(540, H - 30, "2x PTS (1)", {
              fontSize: "11px",
              color: "#fbbf24",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          pu2bg.on("pointerdown", () => this.usePowerUp("doublePoints"));
          pu2bg.on("pointerover", () => pu2bg.setFillStyle(0x334155));
          pu2bg.on("pointerout", () => pu2bg.setFillStyle(0x1e293b));
          this.pu2bg = pu2bg;

          this.puGroup.add([pu1bg, this.pu1text, pu2bg, this.pu2text]);
        }

        usePowerUp(type) {
          if (this.answered) return;
          if (type === "fiftyFifty" && this.powerUps.fiftyFifty > 0) {
            this.powerUps.fiftyFifty--;
            sfx.powerUp();
            const q = this.questions[this.qIndex];
            let removed = 0;
            this.answerBtns.forEach((b) => {
              if (b.optText !== q.correct && removed < 2) {
                b.bg.setAlpha(0.3);
                b.txt.setAlpha(0.3);
                b.bg.disableInteractive();
                b.eliminated = true;
                removed++;
              }
            });
            this.pu1text.setText(
              this.powerUps.fiftyFifty > 0
                ? `50/50 (${this.powerUps.fiftyFifty})`
                : "50/50 --",
            );
            if (this.powerUps.fiftyFifty <= 0) this.pu1bg.setAlpha(0.4);
            this.showFloatingText(430, H - 50, "50/50!", "#a78bfa", 18);
          }
          if (type === "doublePoints" && this.powerUps.doublePoints > 0) {
            this.powerUps.doublePoints--;
            this.doublePointsActive = true;
            sfx.powerUp();
            this.pu2text.setText(
              this.powerUps.doublePoints > 0
                ? `2x PTS (${this.powerUps.doublePoints})`
                : "2x PTS --",
            );
            if (this.powerUps.doublePoints <= 0) this.pu2bg.setAlpha(0.4);
            this.showFloatingText(540, H - 50, "DOUBLE POINTS!", "#fbbf24", 18);
            // Glow effect
            this.cameras.main.flash(200, 251, 191, 36, false, (_, progress) => {
              if (progress >= 1) this.doublePointsActive = true;
            });
          }
        }

        showFloatingText(x, y, text, color, size = 22) {
          const ft = this.add
            .text(x, y, text, {
              fontSize: `${size}px`,
              color: color,
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 3,
            })
            .setOrigin(0.5)
            .setDepth(20);
          this.tweens.add({
            targets: ft,
            y: y - 60,
            alpha: 0,
            scaleX: 1.3,
            scaleY: 1.3,
            duration: 1000,
            ease: "Power2",
            onComplete: () => ft.destroy(),
          });
        }

        showPhaseTransition(tierName, tierColor) {
          const overlay = this.add
            .rectangle(W / 2, H / 2, W, H, 0x000000, 0.7)
            .setDepth(50);
          const label = this.add
            .text(W / 2, H / 2 - 20, tierName, {
              fontSize: "48px",
              color: tierColor,
              fontStyle: "bold",
              stroke: "#000",
              strokeThickness: 4,
            })
            .setOrigin(0.5)
            .setDepth(51)
            .setAlpha(0)
            .setScale(0.3);
          const sub = this.add
            .text(W / 2, H / 2 + 30, "ENTERING NEW SECTOR", {
              fontSize: "16px",
              color: "#94a3b8",
            })
            .setOrigin(0.5)
            .setDepth(51)
            .setAlpha(0);

          sfx.phaseTransition();

          this.tweens.add({
            targets: label,
            alpha: 1,
            scaleX: 1,
            scaleY: 1,
            duration: 400,
            ease: "Back.easeOut",
          });
          this.tweens.add({
            targets: sub,
            alpha: 1,
            duration: 400,
            delay: 200,
          });
          this.time.delayedCall(1200, () => {
            this.tweens.add({
              targets: [overlay, label, sub],
              alpha: 0,
              duration: 400,
              onComplete: () => {
                overlay.destroy();
                label.destroy();
                sub.destroy();
              },
            });
          });
        }

        loadQuestion() {
          if (this.qIndex >= this.totalQ || this.lives <= 0) {
            this.endGame();
            return;
          }
          this.answered = false;
          this.selectedIdx = -1;
          this.questionStartTime = Date.now();
          const q = this.questions[this.qIndex];

          // Phase transition
          if (q.tier !== this.currentTier) {
            this.currentTier = q.tier;
            const tierNames = ["SECTOR 1", "SECTOR 2", "SECTOR 3"];
            const tierColors = ["#22c55e", "#f59e0b", "#ef4444"];
            if (this.qIndex > 0) {
              this.showPhaseTransition(
                tierNames[q.tier - 1],
                tierColors[q.tier - 1],
              );
            }
          }

          this.updateHUD();
          // Animate progress bar
          this.tweens.add({
            targets: this.progFill,
            width: (this.qIndex / this.totalQ) * (W - 20),
            duration: 300,
            ease: "Power2",
          });

          this.plotWaypoint(q.coord);

          if (this.qGroup) this.qGroup.destroy(true);
          this.qGroup = this.add.group();
          const tierColors = ["#22c55e", "#f59e0b", "#ef4444"];
          const tierNames = ["Sector 1", "Sector 2", "Sector 3"];
          const panel = this.add
            .rectangle(200, 140, 360, 120, 0x0f172a, 0.9)
            .setStrokeStyle(2, 0x7c3aed)
            .setDepth(5);
          this.qGroup.add(panel);
          const badge = this.add
            .text(30, 85, tierNames[q.tier - 1], {
              fontSize: "11px",
              color: tierColors[q.tier - 1],
              backgroundColor: "#1e293b",
              padding: { x: 6, y: 2 },
            })
            .setDepth(6);
          this.qGroup.add(badge);
          const qtext = this.add
            .text(200, 140, q.text, {
              fontSize: "16px",
              color: "#e2e8f0",
              fontStyle: "bold",
              align: "center",
              wordWrap: { width: 330 },
            })
            .setOrigin(0.5)
            .setDepth(6);
          this.qGroup.add(qtext);

          // Animate question entrance
          panel.setAlpha(0).setScale(0.9);
          qtext.setAlpha(0);
          badge.setAlpha(0);
          this.tweens.add({
            targets: panel,
            alpha: 0.9,
            scaleX: 1,
            scaleY: 1,
            duration: 300,
            ease: "Back.easeOut",
          });
          this.tweens.add({
            targets: [qtext, badge],
            alpha: 1,
            duration: 300,
            delay: 100,
          });

          // Answer options
          this.answerBtns = [];
          q.options.forEach((opt, i) => {
            const by = 240 + i * 55;
            const bg = this.add
              .rectangle(200, by, 350, 45, 0x1e293b)
              .setStrokeStyle(2, 0x334155)
              .setInteractive({ useHandCursor: true })
              .setDepth(6);
            const num = this.add
              .text(35, by - 6, String(i + 1), {
                fontSize: "10px",
                color: "#64748b",
              })
              .setDepth(7);
            const txt = this.add
              .text(200, by, opt, {
                fontSize: "15px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(0.5)
              .setDepth(7);

            // Animate entrance
            bg.setAlpha(0).setX(180);
            txt.setAlpha(0);
            num.setAlpha(0);
            this.tweens.add({
              targets: bg,
              alpha: 1,
              x: 200,
              duration: 250,
              delay: 150 + i * 60,
              ease: "Power2",
            });
            this.tweens.add({
              targets: [txt, num],
              alpha: 1,
              duration: 250,
              delay: 200 + i * 60,
            });

            bg.on("pointerover", () => {
              if (!this.answered) {
                bg.setStrokeStyle(3, 0x22d3ee);
                this.tweens.add({
                  targets: [bg],
                  scaleX: 1.03,
                  scaleY: 1.03,
                  duration: 100,
                });
                sfx.click();
              }
            });
            bg.on("pointerout", () => {
              if (!this.answered && this.selectedIdx !== i) {
                bg.setStrokeStyle(2, 0x334155);
                this.tweens.add({
                  targets: [bg],
                  scaleX: 1,
                  scaleY: 1,
                  duration: 100,
                });
              }
            });
            bg.on("pointerdown", () => {
              if (!this.answered) this.submitAnswer(i);
            });
            this.qGroup.add(bg);
            this.qGroup.add(txt);
            this.qGroup.add(num);
            this.answerBtns.push({
              bg,
              txt,
              num,
              optText: opt,
              eliminated: false,
            });
          });

          // Feedback
          this.fbObj = this.add
            .text(200, 490, "", {
              fontSize: "14px",
              color: "#94a3b8",
              align: "center",
              wordWrap: { width: 350 },
            })
            .setOrigin(0.5)
            .setDepth(8);
          this.qGroup.add(this.fbObj);
          this.hintObj = this.add
            .text(200, 520, "", {
              fontSize: "11px",
              color: "#64748b",
              align: "center",
              wordWrap: { width: 350 },
            })
            .setOrigin(0.5)
            .setDepth(8);
          this.qGroup.add(this.hintObj);

          // Reset double points indicator
          if (!this.doublePointsActive) {
            // nothing to reset
          }
        }

        submitAnswer(idx) {
          if (this.answered) return;
          if (this.answerBtns[idx].eliminated) return;
          this.answered = true;
          const q = this.questions[this.qIndex];
          const chosen = this.answerBtns[idx].optText;
          const correct = chosen === q.correct;
          const answerTime = (Date.now() - this.questionStartTime) / 1000;

          if (correct) {
            // Score calculation
            let pts = q.tier * 10 + Math.min(this.streak, 5) * 5;
            let timeBonus = 0;
            if (answerTime < 5) {
              timeBonus = 15;
              this.showFloatingText(
                300,
                470,
                "SPEED BONUS! +15",
                "#22d3ee",
                14,
              );
              sfx.speedBonus();
            } else if (answerTime < 10) {
              timeBonus = 8;
              this.showFloatingText(300, 470, "QUICK! +8", "#22d3ee", 12);
            }
            pts += timeBonus;

            // Multiplier from streak
            this.multiplier = 1 + Math.floor(this.streak / 2) * 0.5;
            pts = Math.round(pts * this.multiplier);

            if (this.doublePointsActive) {
              pts *= 2;
              this.doublePointsActive = false;
              this.showFloatingText(200, 180, "DOUBLE!", "#fbbf24", 20);
            }

            this.score += pts;
            this.streak++;
            if (this.streak > this.bestStreak) this.bestStreak = this.streak;

            this.answerBtns[idx].bg.setFillStyle(0x22c55e);
            this.answerBtns[idx].bg.setStrokeStyle(3, 0x22c55e);

            // Floating score text
            this.showFloatingText(200, 210, `+${pts}`, "#22c55e", 28);

            // Streak milestone effects
            if (this.streak === 3) {
              this.showFloatingText(W / 2, H / 2, "WARP x3!", "#a78bfa", 36);
              sfx.streakMilestone(1);
              sfx.crowdCheer(3);
            } else if (this.streak === 5) {
              this.showFloatingText(W / 2, H / 2, "WARP x5!!", "#fbbf24", 42);
              sfx.streakMilestone(2);
              sfx.crowdCheer(5);
              // Bonus confetti
              for (let i = 0; i < 3; i++) {
                this.time.delayedCall(i * 100, () => {
                  this.add
                    .particles(
                      Phaser.Math.Between(100, W - 100),
                      Phaser.Math.Between(100, 300),
                      "__WHITE",
                      {
                        speed: { min: 80, max: 200 },
                        angle: { min: 0, max: 360 },
                        scale: { start: 0.4, end: 0 },
                        lifespan: 800,
                        tint: [0xfbbf24, 0xa78bfa, 0x22d3ee, 0x22c55e],
                        quantity: 10,
                        emitting: false,
                        blendMode: "ADD",
                      },
                    )
                    .explode(12);
                });
              }
            } else if (this.streak === 7) {
              this.showFloatingText(
                W / 2,
                H / 2,
                "HYPERDRIVE x7!!!",
                "#ef4444",
                48,
              );
              sfx.streakMilestone(3);
              sfx.crowdCheer(7);
              this.cameras.main.flash(300, 100, 50, 200);
            }

            let fbText = "WAYPOINT REACHED! +" + pts;
            if (this.streak >= 3) fbText += " WARP x" + this.streak;
            if (this.multiplier > 1) fbText += ` (${this.multiplier}x)`;
            this.fbObj.setText(fbText);
            this.fbObj.setColor("#22c55e");
            sfx.collect();

            if (q.coord) this.moveShipToGrid(q.coord);

            // Confetti burst with scaling intensity
            const particleCount = 15 + this.streak * 3;
            const spark = this.add
              .particles(
                this.gridX + (q.coord ? q.coord.x * this.gridSize : 0),
                this.gridY - (q.coord ? q.coord.y * this.gridSize : 0),
                "__WHITE",
                {
                  speed: { min: 30, max: 120 + this.streak * 15 },
                  angle: { min: 0, max: 360 },
                  scale: { start: 0.3, end: 0 },
                  lifespan: 500 + this.streak * 50,
                  tint: [0x22d3ee, 0xa78bfa, 0x22c55e, 0xfbbf24],
                  quantity: particleCount,
                  emitting: false,
                  blendMode: "ADD",
                },
              )
              .setDepth(8);
            spark.explode(particleCount);

            // Screen shake scales with streak
            const shakeIntensity = 0.003 + this.streak * 0.001;
            this.cameras.main.shake(
              100 + this.streak * 20,
              Math.min(shakeIntensity, 0.015),
            );

            // Ship pulse
            this.tweens.add({
              targets: this.ship,
              scaleX: 1.15,
              scaleY: 1.15,
              duration: 150,
              yoyo: true,
            });

            // Update streak display
            this.updateStreakDisplay();

            // Update question dot
            if (this.qDots[this.qIndex]) {
              this.qDots[this.qIndex].setFillStyle(0x22c55e);
              this.tweens.add({
                targets: this.qDots[this.qIndex],
                scaleX: 1.5,
                scaleY: 1.5,
                duration: 200,
                yoyo: true,
              });
            }
          } else {
            this.lives--;
            this.streak = 0;
            this.multiplier = 1;
            this.doublePointsActive = false;
            this.answerBtns[idx].bg.setFillStyle(0xef4444);
            this.answerBtns[idx].bg.setStrokeStyle(3, 0xef4444);
            const ci = this.answerBtns.findIndex(
              (b) => b.optText === q.correct,
            );
            if (ci >= 0) {
              this.answerBtns[ci].bg.setFillStyle(0x22c55e, 0.5);
              this.answerBtns[ci].bg.setStrokeStyle(2, 0x22c55e);
            }
            this.fbObj.setText("ASTEROID HIT! Answer: " + q.correct);
            this.fbObj.setColor("#ef4444");
            this.hintObj.setText(q.explain);

            sfx.glassBreak();
            sfx.alarm();

            // More dramatic wrong answer effects
            this.cameras.main.shake(350, 0.02);
            this.cameras.main.flash(200, 255, 50, 50);

            // Red vignette pulse
            const vignette = this.add
              .rectangle(W / 2, H / 2, W, H, 0xff0000, 0.15)
              .setDepth(25);
            this.tweens.add({
              targets: vignette,
              alpha: 0,
              duration: 600,
              onComplete: () => vignette.destroy(),
            });

            // Ship damage flash
            this.drawShipDamaged();
            this.time.delayedCall(400, () => this.drawShip(this.ship));

            // Update streak display
            this.updateStreakDisplay();

            // Update question dot
            if (this.qDots[this.qIndex]) {
              this.qDots[this.qIndex].setFillStyle(0xef4444);
            }
          }
          this.updateHUD();
          this.time.delayedCall(correct ? 1500 : 2500, () => {
            this.qIndex++;
            this.loadQuestion();
          });
        }

        updateStreakDisplay() {
          if (this.streak >= 2) {
            this.streakBg.setFillStyle(0x7c3aed, 0.3);
            this.streakText.setText(`WARP STREAK: ${this.streak}x`);
            this.tweens.add({
              targets: this.streakText,
              scaleX: 1.2,
              scaleY: 1.2,
              duration: 150,
              yoyo: true,
            });
          } else {
            this.streakBg.setFillStyle(0x000000, 0);
            this.streakText.setText("");
          }
        }

        drawShipDamaged() {
          this.ship.clear();
          this.ship.fillStyle(0xef4444);
          this.ship.fillTriangle(0, -30, 20, 15, -20, 15);
          this.ship.fillStyle(0x991b1b);
          this.ship.fillTriangle(0, -22, 14, 10, -14, 10);
          this.ship.fillStyle(0x7f1d1d);
          this.ship.fillTriangle(-14, 8, -30, 20, -12, 20);
          this.ship.fillTriangle(14, 8, 30, 20, 12, 20);
          this.ship.fillStyle(0xfbbf24);
          this.ship.fillCircle(0, -8, 5);
        }

        handleKey(e) {
          if (this.answered) return;
          if (e.key >= "1" && e.key <= "4") {
            const i = parseInt(e.key) - 1;
            if (i < this.answerBtns.length && !this.answerBtns[i].eliminated)
              this.submitAnswer(i);
          }
          if (e.key === "ArrowDown" || e.key === "ArrowRight") {
            do {
              this.selectedIdx = Math.min(
                this.selectedIdx + 1,
                this.answerBtns.length - 1,
              );
            } while (
              this.answerBtns[this.selectedIdx].eliminated &&
              this.selectedIdx < this.answerBtns.length - 1
            );
            if (this.selectedIdx < 0) this.selectedIdx = 0;
            this.highlightSel();
          }
          if (e.key === "ArrowUp" || e.key === "ArrowLeft") {
            do {
              this.selectedIdx = Math.max(this.selectedIdx - 1, 0);
            } while (
              this.answerBtns[this.selectedIdx].eliminated &&
              this.selectedIdx > 0
            );
            this.highlightSel();
          }
          if (
            e.key === "Enter" &&
            this.selectedIdx >= 0 &&
            !this.answerBtns[this.selectedIdx].eliminated
          )
            this.submitAnswer(this.selectedIdx);
          // Power-up hotkeys
          if (e.key === "q" || e.key === "Q") this.usePowerUp("fiftyFifty");
          if (e.key === "w" || e.key === "W") this.usePowerUp("doublePoints");
        }

        highlightSel() {
          this.answerBtns.forEach((b, i) => {
            if (!b.eliminated) {
              b.bg.setStrokeStyle(
                i === this.selectedIdx ? 3 : 2,
                i === this.selectedIdx ? 0x22d3ee : 0x334155,
              );
              if (i === this.selectedIdx) {
                this.tweens.add({
                  targets: b.bg,
                  scaleX: 1.03,
                  scaleY: 1.03,
                  duration: 100,
                });
              } else {
                this.tweens.add({
                  targets: b.bg,
                  scaleX: 1,
                  scaleY: 1,
                  duration: 100,
                });
              }
            }
          });
          sfx.click();
        }

        updateHUD() {
          this.hudQ.setText(`MISSION ${this.qIndex + 1}/${this.totalQ}`);
          this.hudScore.setText(`SCORE: ${this.score}`);
          this.hudLives.setText(
            "SHIELDS: " + "■".repeat(this.lives) + "□".repeat(3 - this.lives),
          );
          this.hudStreak.setText(
            this.streak >= 2 ? `WARP x${this.streak}` : "",
          );
          this.hudMultiplier.setText(
            this.multiplier > 1 ? `${this.multiplier}x` : "",
          );
          const el = Math.floor((Date.now() - this.startTime) / 1000);
          const m = Math.floor(el / 60),
            s = el % 60;
          this.hudTimer.setText(`${m}:${s < 10 ? "0" : ""}${s}`);

          // Speed indicator
          if (!this.answered) {
            const elapsed = (Date.now() - this.questionStartTime) / 1000;
            if (elapsed < 5) {
              this.speedIndicator.setText("FAST").setColor("#22c55e");
            } else if (elapsed < 10) {
              this.speedIndicator.setText("GOOD").setColor("#22d3ee");
            } else {
              this.speedIndicator.setText("").setColor("#94a3b8");
            }
          } else {
            this.speedIndicator.setText("");
          }
        }

        update() {
          this.updateHUD();
        }

        endGame() {
          const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
          const correct = this.qIndex - (3 - this.lives);
          const epCorrect = Math.max(0, correct);
          try {
            window.EduPulse &&
              EduPulse.record({
                activityTitle: document.title,
                score: epCorrect,
                maxScore: this.totalQ,
                problemsCorrect: epCorrect,
                problemsAttempted: this.totalQ,
                percent: this.totalQ
                  ? Math.round((epCorrect / this.totalQ) * 100)
                  : 0,
              });
          } catch (e) {}
          this.cameras.main.fade(500, 0, 0, 0);
          this.time.delayedCall(500, () => {
            this.scene.start("Results", {
              score: this.score,
              total: this.totalQ,
              correct: Math.max(0, correct),
              bestStreak: this.bestStreak,
              time: elapsed,
            });
          });
        }
      }

      // --- RESULTS ---
      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }
        init(data) {
          this.d = data;
        }
        create() {
          sfx.init();
          const d = this.d,
            cx = W / 2;
          this.cameras.main.setBackgroundColor("#020617");
          this.cameras.main.fadeIn(500);
          createStarfield(this);
          createAmbientParticles(this);

          const pct = d.total > 0 ? Math.round((d.correct / d.total) * 100) : 0;
          const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : pct >= 50 ? 1 : 0;

          // High score check
          const prevHigh = parseInt(localStorage.getItem(LS_KEY)) || 0;
          const isNewHigh = d.score > prevHigh;
          if (isNewHigh) {
            localStorage.setItem(LS_KEY, d.score);
          }

          if (stars >= 2) {
            if (stars === 3) sfx.winBig();
            else sfx.win();
            // Elaborate confetti for high star counts
            const bursts = stars === 3 ? 8 : 4;
            for (let i = 0; i < bursts; i++) {
              this.time.delayedCall(i * 200, () => {
                this.add
                  .particles(
                    Phaser.Math.Between(100, W - 100),
                    Phaser.Math.Between(30, 200),
                    "__WHITE",
                    {
                      speed: { min: 60, max: 220 },
                      angle: { min: 0, max: 360 },
                      scale: { start: 0.35, end: 0 },
                      lifespan: 1200,
                      tint: [0x22d3ee, 0xa78bfa, 0xfbbf24, 0x22c55e, 0xef4444],
                      quantity: 15,
                      emitting: false,
                      blendMode: "ADD",
                    },
                  )
                  .explode(18);
              });
            }
          } else sfx.lose();

          const titles = [
            "Lost in Space",
            "Cadet Pilot",
            "Star Navigator!",
            "GALACTIC COMMANDER!",
          ];

          const titleText = this.add
            .text(cx, 60, titles[stars], {
              fontSize: "40px",
              color: stars >= 2 ? "#22d3ee" : "#94a3b8",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setAlpha(0)
            .setScale(0.5);
          this.tweens.add({
            targets: titleText,
            alpha: 1,
            scaleX: 1,
            scaleY: 1,
            duration: 600,
            ease: "Back.easeOut",
          });

          // Animated star fill
          for (let i = 0; i < 3; i++) {
            const starChar = i < stars ? "★" : "☆";
            const s = this.add
              .text(cx - 60 + i * 60, 115, starChar, {
                fontSize: "48px",
                color: "#fbbf24",
              })
              .setOrigin(0.5)
              .setAlpha(0)
              .setScale(0);
            this.tweens.add({
              targets: s,
              alpha: 1,
              scaleX: 1,
              scaleY: 1,
              duration: 400,
              delay: 600 + i * 300,
              ease: "Back.easeOut",
              onStart: () => {
                if (i < stars) sfx.collect();
              },
            });
          }

          // New High Score banner
          if (isNewHigh && d.score > 0) {
            const hsBanner = this.add
              .text(cx, 160, "NEW HIGH SCORE!", {
                fontSize: "28px",
                color: "#fbbf24",
                fontStyle: "bold",
                stroke: "#000",
                strokeThickness: 3,
              })
              .setOrigin(0.5)
              .setAlpha(0);
            this.tweens.add({
              targets: hsBanner,
              alpha: 1,
              duration: 400,
              delay: 1500,
            });
            this.tweens.add({
              targets: hsBanner,
              scaleX: 1.05,
              scaleY: 1.05,
              duration: 500,
              yoyo: true,
              repeat: -1,
              delay: 1500,
            });
            // Extra celebration particles
            this.time.delayedCall(1500, () => {
              for (let i = 0; i < 3; i++) {
                this.time.delayedCall(i * 150, () => {
                  this.add
                    .particles(
                      cx + Phaser.Math.Between(-100, 100),
                      160,
                      "__WHITE",
                      {
                        speed: { min: 40, max: 120 },
                        angle: { min: 0, max: 360 },
                        scale: { start: 0.3, end: 0 },
                        lifespan: 600,
                        tint: [0xfbbf24, 0xf59e0b],
                        quantity: 8,
                        emitting: false,
                        blendMode: "ADD",
                      },
                    )
                    .explode(10);
                });
              }
            });
          }

          // Score circle
          const scoreY = isNewHigh ? 230 : 215;
          this.add.circle(cx, scoreY, 60, 0x0f172a).setStrokeStyle(4, 0x7c3aed);
          const pctText = this.add
            .text(cx, scoreY - 10, "0%", {
              fontSize: "32px",
              color: "#e2e8f0",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          // Animate percentage count up
          this.tweens.addCounter({
            from: 0,
            to: pct,
            duration: 1000,
            delay: 500,
            onUpdate: (t) => {
              pctText.setText(Math.round(t.getValue()) + "%");
            },
          });
          this.add
            .text(cx, scoreY + 20, "Accuracy", {
              fontSize: "12px",
              color: "#64748b",
            })
            .setOrigin(0.5);

          const statsY = isNewHigh ? 345 : 340;
          const stats = [
            { l: "Score", v: d.score, c: "#22d3ee" },
            { l: "Waypoints", v: `${d.correct}/${d.total}`, c: "#22c55e" },
            { l: "Best Warp", v: d.bestStreak, c: "#a78bfa" },
            {
              l: "Time",
              v: `${Math.floor(d.time / 60)}:${(d.time % 60 < 10 ? "0" : "") + (d.time % 60)}`,
              c: "#94a3b8",
            },
          ];
          stats.forEach((s, i) => {
            const x = cx - 240 + i * 165,
              y = statsY;
            const card = this.add
              .rectangle(x, y, 135, 60, 0x0f172a)
              .setStrokeStyle(1, 0x1e293b)
              .setAlpha(0);
            const val = this.add
              .text(x, y - 8, String(s.v), {
                fontSize: "22px",
                color: s.c,
                fontStyle: "bold",
              })
              .setOrigin(0.5)
              .setAlpha(0);
            const lbl = this.add
              .text(x, y + 14, s.l, { fontSize: "11px", color: "#64748b" })
              .setOrigin(0.5)
              .setAlpha(0);
            this.tweens.add({
              targets: [card, val, lbl],
              alpha: 1,
              duration: 300,
              delay: 800 + i * 100,
            });
          });

          // Previous high score
          if (prevHigh > 0 && !isNewHigh) {
            this.add
              .text(cx, statsY + 45, `Personal Best: ${prevHigh}`, {
                fontSize: "12px",
                color: "#64748b",
              })
              .setOrigin(0.5);
          }

          this.add
            .text(
              cx,
              statsY + 60,
              `Sectors explored: ${Math.min(d.correct, 15)} of ${d.total}`,
              {
                fontSize: "14px",
                color: "#94a3b8",
              },
            )
            .setOrigin(0.5);

          const btnY = statsY + 120;
          const btn1 = this.add
            .rectangle(cx - 110, btnY, 190, 50, 0x7c3aed)
            .setStrokeStyle(2, 0xa78bfa)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx - 110, btnY, "NEW MISSION", {
              fontSize: "17px",
              color: "#fff",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          btn1.on("pointerdown", () => {
            sfx.click();
            this.cameras.main.fade(400, 0, 0, 0);
            this.time.delayedCall(400, () => this.scene.start("Game"));
          });
          btn1.on("pointerover", () => {
            btn1.setFillStyle(0x6d28d9);
            this.tweens.add({
              targets: btn1,
              scaleX: 1.05,
              scaleY: 1.05,
              duration: 100,
            });
          });
          btn1.on("pointerout", () => {
            btn1.setFillStyle(0x7c3aed);
            this.tweens.add({
              targets: btn1,
              scaleX: 1,
              scaleY: 1,
              duration: 100,
            });
          });

          const btn2 = this.add
            .rectangle(cx + 110, btnY, 190, 50, 0x1e293b)
            .setStrokeStyle(2, 0x334155)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx + 110, btnY, "MAIN MENU", {
              fontSize: "17px",
              color: "#94a3b8",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          btn2.on("pointerdown", () => {
            sfx.click();
            this.cameras.main.fade(400, 0, 0, 0);
            this.time.delayedCall(400, () => this.scene.start("Title"));
          });
          btn2.on("pointerover", () => {
            btn2.setFillStyle(0x334155);
            this.tweens.add({
              targets: btn2,
              scaleX: 1.05,
              scaleY: 1.05,
              duration: 100,
            });
          });
          btn2.on("pointerout", () => {
            btn2.setFillStyle(0x1e293b);
            this.tweens.add({
              targets: btn2,
              scaleX: 1,
              scaleY: 1,
              duration: 100,
            });
          });

          this.add
            .text(
              cx,
              H - 25,
              "Coordinate Quest — Neft Teacher — 6.NS.5–6.NS.8",
              {
                fontSize: "11px",
                color: "#475569",
              },
            )
            .setOrigin(0.5);

          this.input.keyboard.on("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              this.cameras.main.fade(400, 0, 0, 0);
              this.time.delayedCall(400, () => this.scene.start("Game"));
            }
            if (e.key === "Escape") {
              this.cameras.main.fade(400, 0, 0, 0);
              this.time.delayedCall(400, () => this.scene.start("Title"));
            }
          });
        }
      }

      // --- CONFIG ---
      new Phaser.Game({
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#020617",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [BootScene, TitleScene, GameScene, ResultsScene],
        physics: {
          default: "arcade",
          arcade: { gravity: { y: 0 }, debug: false },
        },
        input: { keyboard: true, mouse: true, touch: true },
      });
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
  <script src="/shared/save-resume/save-resume-engine.js" defer></script>
  <!-- nsr-injected:end -->
  <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
  <script src="/assets/game-fx.js" defer></script>
  <!-- gfx-injected:end -->
</body>
