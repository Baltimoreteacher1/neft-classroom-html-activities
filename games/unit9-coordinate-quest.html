<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coordinate Quest — Space Navigation</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body,
      html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #020617;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
  </head>
  <body>
    <script>
      // Coordinate Quest — Space Navigation
      // Grade 6: 6.NS.5–6.NS.8 (Coordinate plane, integers, absolute value)
      // Neft Teacher

      const W = 1024,
        H = 768;

      // --- SFX ---
      class SFX {
        constructor() {
          this.ctx = null;
        }
        init() {
          if (!this.ctx)
            try {
              this.ctx = new (
                window.AudioContext || window.webkitAudioContext
              )();
            } catch (e) {}
        }
        tone(f, d, t = "sine", v = 0.08) {
          if (!this.ctx) return;
          try {
            const o = this.ctx.createOscillator(),
              g = this.ctx.createGain();
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              this.ctx.currentTime + d,
            );
            o.connect(g);
            g.connect(this.ctx.destination);
            o.start();
            o.stop(this.ctx.currentTime + d);
          } catch (e) {}
        }
        warp() {
          [300, 500, 800, 1200].forEach((f, i) =>
            setTimeout(() => this.tone(f, 0.1), i * 50),
          );
        }
        hit() {
          this.tone(200, 0.3, "sawtooth");
          setTimeout(() => this.tone(150, 0.2, "sawtooth"), 100);
        }
        click() {
          this.tone(600, 0.04);
        }
        nav() {
          this.tone(800, 0.08);
          setTimeout(() => this.tone(1000, 0.08), 60);
        }
        collect() {
          this.tone(880, 0.08);
          setTimeout(() => this.tone(1100, 0.1), 60);
          setTimeout(() => this.tone(1320, 0.12), 120);
        }
        engine() {
          this.tone(80, 0.15, "triangle", 0.03);
        }
        win() {
          [523, 659, 784, 880, 1047, 1319].forEach((f, i) =>
            setTimeout(() => this.tone(f, 0.12), i * 70),
          );
        }
        lose() {
          [500, 400, 300, 200].forEach((f, i) =>
            setTimeout(() => this.tone(f, 0.2, "sawtooth"), i * 100),
          );
        }
        alarm() {
          this.tone(400, 0.1, "square");
          setTimeout(() => this.tone(600, 0.1, "square"), 100);
        }
      }
      const sfx = new SFX();

      // --- QUESTIONS ---
      function genQuestions() {
        const qs = [];
        function shuf(a) {
          const b = [...a];
          for (let i = b.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [b[i], b[j]] = [b[j], b[i]];
          }
          return b;
        }
        function mk(text, correct, wrongs, explain, tier, coord) {
          const opts = shuf([correct, ...wrongs]);
          return {
            text,
            correct,
            options: opts,
            explain,
            tier,
            coord: coord || null,
          };
        }
        // Tier 1: Quadrants, QI plotting, absolute value
        for (let i = 0; i < 2; i++) {
          const x = Phaser.Math.Between(1, 9),
            y = Phaser.Math.Between(1, 9);
          qs.push(
            mk(
              `Navigate to (${x}, ${y}). Which quadrant?`,
              "Quadrant I",
              ["Quadrant II", "Quadrant III", "Quadrant IV"],
              `(${x},${y}): both positive = Quadrant I`,
              1,
              { x, y },
            ),
          );
        }
        for (let i = 0; i < 2; i++) {
          const n = Phaser.Math.Between(2, 15);
          qs.push(
            mk(
              `What is |−${n}|?`,
              String(n),
              [String(-n), "0", String(n + 1)],
              `|−${n}| = ${n}. Distance from 0 is always positive.`,
              1,
            ),
          );
        }
        qs.push(
          mk(
            "Which point is in Quadrant I?",
            "(4, 7)",
            ["(−2, 5)", "(3, −1)", "(−6, −4)"],
            "QI: both x and y positive. (4,7) works.",
            1,
            { x: 4, y: 7 },
          ),
        );
        // Tier 2: All 4 quadrants, reflections, comparing integers
        const q2pairs = [
          { x: -4, y: 6, q: "II" },
          { x: -7, y: -2, q: "III" },
          { x: 5, y: -3, q: "IV" },
        ];
        q2pairs.forEach((p) => {
          qs.push(
            mk(
              `Waypoint at (${p.x}, ${p.y}). Which quadrant?`,
              `Quadrant ${p.q}`,
              [
                ...["I", "II", "III", "IV"]
                  .filter((q) => q !== p.q)
                  .map((q) => `Quadrant ${q}`),
              ].slice(0, 3),
              `(${p.x},${p.y}): check signs => Q${p.q}`,
              2,
              { x: p.x, y: p.y },
            ),
          );
        });
        qs.push(
          mk(
            "Which integer is greater: −3 or −8?",
            "−3",
            ["−8", "Equal", "Cannot tell"],
            "−3 is right of −8 on number line, so −3 > −8.",
            2,
          ),
        );
        qs.push(
          mk(
            "Reflect (5, 3) across the y-axis. New coordinates?",
            "(−5, 3)",
            ["(5, −3)", "(−5, −3)", "(3, 5)"],
            "y-axis reflection: (x,y) → (−x,y). So (−5,3).",
            2,
            { x: -5, y: 3 },
          ),
        );
        qs.push(
          mk(
            "Reflect (2, −6) across the x-axis. New coordinates?",
            "(2, 6)",
            ["(−2, −6)", "(−2, 6)", "(2, −6)"],
            "x-axis reflection: (x,y) → (x,−y). So (2,6).",
            2,
            { x: 2, y: 6 },
          ),
        );
        // Tier 3: Distance, ordering, word problems
        qs.push(
          mk(
            "Distance between (3, −2) and (3, 5)?",
            "7 units",
            ["3 units", "5 units", "2 units"],
            "Same x: distance = |−2 − 5| = 7",
            3,
            { x: 3, y: -2 },
          ),
        );
        qs.push(
          mk(
            "Order least to greatest: −4, 1.5, −7, 0, 3",
            "−7, −4, 0, 1.5, 3",
            ["−4, −7, 0, 1.5, 3", "3, 1.5, 0, −4, −7", "0, −4, −7, 1.5, 3"],
            "Number line: −7 < −4 < 0 < 1.5 < 3",
            3,
          ),
        );
        qs.push(
          mk(
            "Diver at −40 ft, bird at +25 ft. Distance between them?",
            "65 feet",
            ["15 feet", "40 feet", "25 feet"],
            "|−40 − 25| = 65 feet",
            3,
          ),
        );
        qs.push(
          mk(
            "Distance between (−5, 4) and (2, 4)?",
            "7 units",
            ["3 units", "5 units", "9 units"],
            "Same y: |−5 − 2| = 7 units",
            3,
            { x: -5, y: 4 },
          ),
        );
        qs.push(
          mk(
            "Sub at (−3, −8) surfaces to (−3, 0). How far?",
            "8 units",
            ["3 units", "11 units", "5 units"],
            "Same x: |−8 − 0| = 8 units",
            3,
            { x: -3, y: -8 },
          ),
        );
        return shuf(qs).slice(0, 15);
      }

      // --- STARS BACKGROUND ---
      function createStarfield(scene) {
        for (let i = 0; i < 120; i++) {
          const x = Phaser.Math.Between(0, W),
            y = Phaser.Math.Between(0, H);
          const s = Math.random() * 2 + 0.5;
          const star = scene.add
            .circle(x, y, s, 0xffffff, Math.random() * 0.5 + 0.3)
            .setDepth(0);
          scene.tweens.add({
            targets: star,
            alpha: Math.random() * 0.3 + 0.1,
            duration: Phaser.Math.Between(1000, 3000),
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });
        }
        // Nebula patches
        for (let i = 0; i < 3; i++) {
          const nx = Phaser.Math.Between(100, W - 100),
            ny = Phaser.Math.Between(100, H - 100);
          const neb = scene.add
            .circle(
              nx,
              ny,
              Phaser.Math.Between(60, 120),
              [0x4361ee, 0x7c3aed, 0x0ea5e9][i],
              0.04,
            )
            .setDepth(0);
        }
      }

      // --- BOOT ---
      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          this.scene.start("Title");
        }
      }

      // --- TITLE ---
      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          sfx.init();
          const cx = W / 2;
          this.cameras.main.setBackgroundColor("#020617");
          createStarfield(this);
          // Spaceship
          const ship = this.add.graphics().setPosition(cx, 380);
          // Body
          ship.fillStyle(0x64748b);
          ship.fillTriangle(0, -40, 25, 20, -25, 20);
          ship.fillStyle(0x3b82f6);
          ship.fillTriangle(0, -30, 18, 15, -18, 15);
          // Wings
          ship.fillStyle(0x475569);
          ship.fillTriangle(-18, 10, -40, 25, -15, 25);
          ship.fillTriangle(18, 10, 40, 25, 15, 25);
          // Cockpit
          ship.fillStyle(0x22d3ee);
          ship.fillCircle(0, -10, 7);
          // Engine glow
          ship.fillStyle(0xf97316);
          ship.fillTriangle(-8, 20, 8, 20, 0, 35);
          this.tweens.add({
            targets: ship,
            y: ship.y - 12,
            duration: 1500,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });
          // Engine particles
          this.add.particles(cx, 415, "__WHITE", {
            speed: { min: 20, max: 80 },
            angle: { min: 80, max: 100 },
            scale: { start: 0.3, end: 0 },
            lifespan: 500,
            tint: [0xf97316, 0xfbbf24, 0xef4444],
            quantity: 2,
            frequency: 60,
            blendMode: "ADD",
          });
          // Title
          this.add
            .text(cx, 70, "COORDINATE", {
              fontSize: "52px",
              fontFamily: "monospace",
              color: "#22d3ee",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 135, "QUEST", {
              fontSize: "68px",
              fontFamily: "monospace",
              color: "#a78bfa",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 195, "Space Navigation", {
              fontSize: "22px",
              color: "#94a3b8",
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 225, "6.NS.5–6.NS.8 | Neft Teacher", {
              fontSize: "13px",
              color: "#64748b",
            })
            .setOrigin(0.5);
          // Mini coordinate grid preview
          const gx = cx,
            gy = 300;
          const gs = 60;
          // Axes
          this.add.line(gx, gy, -gs * 2, 0, gs * 2, 0, 0x334155).setDepth(1);
          this.add.line(gx, gy, 0, -gs * 2, 0, gs * 2, 0x334155).setDepth(1);
          // Quadrant labels
          this.add
            .text(gx + gs / 2, gy - gs, "QI", {
              fontSize: "10px",
              color: "#22c55e",
            })
            .setOrigin(0.5)
            .setDepth(1);
          this.add
            .text(gx - gs / 2, gy - gs, "QII", {
              fontSize: "10px",
              color: "#3b82f6",
            })
            .setOrigin(0.5)
            .setDepth(1);
          this.add
            .text(gx - gs / 2, gy + gs / 2, "QIII", {
              fontSize: "10px",
              color: "#f59e0b",
            })
            .setOrigin(0.5)
            .setDepth(1);
          this.add
            .text(gx + gs / 2, gy + gs / 2, "QIV", {
              fontSize: "10px",
              color: "#ef4444",
            })
            .setOrigin(0.5)
            .setDepth(1);
          // Features
          const feats = [
            { t: "Navigate all 4 quadrants", c: "#22d3ee" },
            { t: "Plot waypoints & reflect", c: "#a78bfa" },
            { t: "Calculate distances", c: "#f59e0b" },
          ];
          feats.forEach((f, i) => {
            this.add
              .text(cx, 475 + i * 28, "● " + f.t, {
                fontSize: "14px",
                color: f.c,
              })
              .setOrigin(0.5);
          });
          // Start
          const btn = this.add
            .rectangle(cx, 600, 260, 60, 0x7c3aed)
            .setStrokeStyle(2, 0xa78bfa)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx, 600, "LAUNCH MISSION", {
              fontSize: "24px",
              color: "#fff",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          btn.on("pointerover", () => btn.setFillStyle(0x6d28d9));
          btn.on("pointerout", () => btn.setFillStyle(0x7c3aed));
          btn.on("pointerdown", () => {
            sfx.warp();
            this.scene.start("Game");
          });
          this.add
            .text(cx, 660, "Keys 1-4 or click | Arrows + Enter", {
              fontSize: "12px",
              color: "#475569",
            })
            .setOrigin(0.5);
          this.input.keyboard.on("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              sfx.warp();
              this.scene.start("Game");
            }
          });
        }
      }

      // --- GAME ---
      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }
        create() {
          sfx.init();
          this.questions = genQuestions();
          this.qIndex = 0;
          this.score = 0;
          this.lives = 3;
          this.streak = 0;
          this.bestStreak = 0;
          this.totalQ = Math.min(15, this.questions.length);
          this.answered = false;
          this.startTime = Date.now();
          this.selectedIdx = -1;
          this.cameras.main.setBackgroundColor("#020617");
          createStarfield(this);
          this.buildGrid();
          this.buildShip();
          this.buildHUD();
          this.loadQuestion();
          this.input.keyboard.on("keydown", this.handleKey, this);
        }

        buildGrid() {
          // Coordinate grid (right side, compact)
          this.gridX = 720;
          this.gridY = 380;
          this.gridSize = 25;
          this.gridRange = 8;
          const gx = this.gridX,
            gy = this.gridY,
            gs = this.gridSize,
            gr = this.gridRange;
          // Grid background
          this.add
            .rectangle(
              gx,
              gy,
              gs * gr * 2 + 20,
              gs * gr * 2 + 20,
              0x0f172a,
              0.8,
            )
            .setStrokeStyle(1, 0x1e293b)
            .setDepth(1);
          // Grid lines
          for (let i = -gr; i <= gr; i++) {
            const alpha = i === 0 ? 0.6 : 0.15;
            const color = i === 0 ? 0x64748b : 0x334155;
            this.add
              .line(gx, gy, i * gs, -gr * gs, i * gs, gr * gs, color, alpha)
              .setDepth(2);
            this.add
              .line(gx, gy, -gr * gs, i * gs, gr * gs, i * gs, color, alpha)
              .setDepth(2);
          }
          // Axis labels
          this.add
            .text(gx + gr * gs + 5, gy, "x", {
              fontSize: "11px",
              color: "#64748b",
            })
            .setDepth(3);
          this.add
            .text(gx, gy - gr * gs - 15, "y", {
              fontSize: "11px",
              color: "#64748b",
            })
            .setOrigin(0.5)
            .setDepth(3);
          // Number labels
          for (let i = -gr; i <= gr; i += 2) {
            if (i !== 0) {
              this.add
                .text(gx + i * gs, gy + 12, String(i), {
                  fontSize: "8px",
                  color: "#475569",
                })
                .setOrigin(0.5)
                .setDepth(3);
              this.add
                .text(gx - 14, gy - i * gs, String(i), {
                  fontSize: "8px",
                  color: "#475569",
                })
                .setOrigin(0.5)
                .setDepth(3);
            }
          }
          this.add
            .text(gx - 10, gy + 10, "0", { fontSize: "8px", color: "#475569" })
            .setDepth(3);
          // Quadrant labels
          this.add
            .text(gx + (gr * gs) / 2, gy - (gr * gs) / 2, "QI", {
              fontSize: "10px",
              color: "#22c55e",
              alpha: 0.4,
            })
            .setOrigin(0.5)
            .setDepth(2);
          this.add
            .text(gx - (gr * gs) / 2, gy - (gr * gs) / 2, "QII", {
              fontSize: "10px",
              color: "#3b82f6",
              alpha: 0.4,
            })
            .setOrigin(0.5)
            .setDepth(2);
          this.add
            .text(gx - (gr * gs) / 2, gy + (gr * gs) / 2, "QIII", {
              fontSize: "10px",
              color: "#f59e0b",
              alpha: 0.4,
            })
            .setOrigin(0.5)
            .setDepth(2);
          this.add
            .text(gx + (gr * gs) / 2, gy + (gr * gs) / 2, "QIV", {
              fontSize: "10px",
              color: "#ef4444",
              alpha: 0.4,
            })
            .setOrigin(0.5)
            .setDepth(2);
          // Waypoint marker (will be positioned per question)
          this.waypoint = this.add.graphics().setDepth(5);
          this.waypointLabel = this.add
            .text(0, 0, "", {
              fontSize: "10px",
              color: "#22d3ee",
              fontStyle: "bold",
            })
            .setDepth(5);
          // Ship marker on grid
          this.shipMarker = this.add.graphics().setDepth(6);
        }

        plotWaypoint(coord) {
          this.waypoint.clear();
          this.waypointLabel.setText("");
          if (!coord) return;
          const px = this.gridX + coord.x * this.gridSize;
          const py = this.gridY - coord.y * this.gridSize;
          // Pulsing ring
          this.waypoint.lineStyle(2, 0x22d3ee);
          this.waypoint.strokeCircle(px, py, 8);
          this.waypoint.fillStyle(0x22d3ee, 0.3);
          this.waypoint.fillCircle(px, py, 5);
          this.waypointLabel
            .setText(`(${coord.x},${coord.y})`)
            .setPosition(px + 10, py - 12);
          // Pulse tween
          if (this.wpTween) this.wpTween.remove();
          this.wpTween = this.tweens.add({
            targets: this.waypoint,
            alpha: 0.4,
            duration: 600,
            yoyo: true,
            repeat: -1,
          });
        }

        moveShipToGrid(coord) {
          if (!coord) return;
          const px = this.gridX + coord.x * this.gridSize;
          const py = this.gridY - coord.y * this.gridSize;
          this.shipMarker.clear();
          this.shipMarker.fillStyle(0xf97316);
          this.shipMarker.fillTriangle(
            px,
            py - 6,
            px + 5,
            py + 4,
            px - 5,
            py + 4,
          );
          this.tweens.add({
            targets: this.shipMarker,
            alpha: 0.5,
            duration: 400,
            yoyo: true,
            repeat: 2,
          });
        }

        buildShip() {
          // Main ship on left side
          this.ship = this.add.graphics().setPosition(160, 400).setDepth(4);
          this.drawShip(this.ship);
          this.tweens.add({
            targets: this.ship,
            y: this.ship.y - 8,
            duration: 1200,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });
          // Engine particles
          this.engineParticles = this.add
            .particles(160, 430, "__WHITE", {
              speed: { min: 10, max: 40 },
              angle: { min: 85, max: 95 },
              scale: { start: 0.2, end: 0 },
              lifespan: 400,
              tint: [0xf97316, 0xfbbf24],
              quantity: 1,
              frequency: 80,
              blendMode: "ADD",
            })
            .setDepth(3);
        }

        drawShip(g) {
          g.clear();
          g.fillStyle(0x64748b);
          g.fillTriangle(0, -30, 20, 15, -20, 15);
          g.fillStyle(0x3b82f6);
          g.fillTriangle(0, -22, 14, 10, -14, 10);
          g.fillStyle(0x475569);
          g.fillTriangle(-14, 8, -30, 20, -12, 20);
          g.fillTriangle(14, 8, 30, 20, 12, 20);
          g.fillStyle(0x22d3ee);
          g.fillCircle(0, -8, 5);
          g.fillStyle(0xf97316);
          g.fillTriangle(-6, 15, 6, 15, 0, 25);
        }

        buildHUD() {
          this.hudBg = this.add
            .rectangle(W / 2, 22, W, 44, 0x000000, 0.8)
            .setDepth(10);
          this.hudQ = this.add
            .text(15, 10, "", {
              fontSize: "14px",
              color: "#94a3b8",
              fontStyle: "bold",
            })
            .setDepth(11);
          this.hudScore = this.add
            .text(170, 10, "", {
              fontSize: "14px",
              color: "#22d3ee",
              fontStyle: "bold",
            })
            .setDepth(11);
          this.hudLives = this.add
            .text(340, 10, "", { fontSize: "14px", color: "#ef4444" })
            .setDepth(11);
          this.hudStreak = this.add
            .text(520, 10, "", { fontSize: "14px", color: "#a78bfa" })
            .setDepth(11);
          this.hudTimer = this.add
            .text(W - 100, 10, "", { fontSize: "14px", color: "#94a3b8" })
            .setDepth(11);
          this.progBg = this.add
            .rectangle(W / 2, 44, W - 20, 4, 0x1e293b)
            .setDepth(10);
          this.progFill = this.add
            .rectangle(10, 44, 0, 4, 0x7c3aed)
            .setOrigin(0, 0.5)
            .setDepth(10);
        }

        loadQuestion() {
          if (this.qIndex >= this.totalQ || this.lives <= 0) {
            this.endGame();
            return;
          }
          this.answered = false;
          this.selectedIdx = -1;
          const q = this.questions[this.qIndex];
          this.updateHUD();
          this.progFill.width = (this.qIndex / this.totalQ) * (W - 20);
          // Plot waypoint if question has coordinates
          this.plotWaypoint(q.coord);
          // Clean old
          if (this.qGroup) this.qGroup.destroy(true);
          this.qGroup = this.add.group();
          // Question panel (left side, above ship)
          const tierColors = ["#22c55e", "#f59e0b", "#ef4444"];
          const tierNames = ["Sector 1", "Sector 2", "Sector 3"];
          const panel = this.add
            .rectangle(200, 140, 360, 120, 0x0f172a, 0.9)
            .setStrokeStyle(2, 0x7c3aed)
            .setDepth(5);
          this.qGroup.add(panel);
          const badge = this.add
            .text(30, 85, tierNames[q.tier - 1], {
              fontSize: "11px",
              color: tierColors[q.tier - 1],
              backgroundColor: "#1e293b",
              padding: { x: 6, y: 2 },
            })
            .setDepth(6);
          this.qGroup.add(badge);
          const qtext = this.add
            .text(200, 140, q.text, {
              fontSize: "16px",
              color: "#e2e8f0",
              fontStyle: "bold",
              align: "center",
              wordWrap: { width: 330 },
            })
            .setOrigin(0.5)
            .setDepth(6);
          this.qGroup.add(qtext);
          // Answer options (left column)
          this.answerBtns = [];
          q.options.forEach((opt, i) => {
            const by = 240 + i * 55;
            const bg = this.add
              .rectangle(200, by, 350, 45, 0x1e293b)
              .setStrokeStyle(2, 0x334155)
              .setInteractive({ useHandCursor: true })
              .setDepth(6);
            const num = this.add
              .text(35, by - 6, String(i + 1), {
                fontSize: "10px",
                color: "#64748b",
              })
              .setDepth(7);
            const txt = this.add
              .text(200, by, opt, {
                fontSize: "15px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(0.5)
              .setDepth(7);
            bg.on("pointerover", () => {
              if (!this.answered) {
                bg.setStrokeStyle(3, 0x22d3ee);
                sfx.click();
              }
            });
            bg.on("pointerout", () => {
              if (!this.answered && this.selectedIdx !== i)
                bg.setStrokeStyle(2, 0x334155);
            });
            bg.on("pointerdown", () => {
              if (!this.answered) this.submitAnswer(i);
            });
            this.qGroup.add(bg);
            this.qGroup.add(txt);
            this.qGroup.add(num);
            this.answerBtns.push({ bg, txt, num, optText: opt });
          });
          // Feedback
          this.fbObj = this.add
            .text(200, 490, "", {
              fontSize: "14px",
              color: "#94a3b8",
              align: "center",
              wordWrap: { width: 350 },
            })
            .setOrigin(0.5)
            .setDepth(8);
          this.qGroup.add(this.fbObj);
          this.hintObj = this.add
            .text(200, 520, "", {
              fontSize: "11px",
              color: "#64748b",
              align: "center",
              wordWrap: { width: 350 },
            })
            .setOrigin(0.5)
            .setDepth(8);
          this.qGroup.add(this.hintObj);
        }

        submitAnswer(idx) {
          if (this.answered) return;
          this.answered = true;
          const q = this.questions[this.qIndex];
          const chosen = this.answerBtns[idx].optText;
          const correct = chosen === q.correct;
          if (correct) {
            const pts = q.tier * 10 + Math.min(this.streak, 5) * 5;
            this.score += pts;
            this.streak++;
            if (this.streak > this.bestStreak) this.bestStreak = this.streak;
            this.answerBtns[idx].bg.setFillStyle(0x22c55e);
            this.answerBtns[idx].bg.setStrokeStyle(3, 0x22c55e);
            this.fbObj.setText(
              "WAYPOINT REACHED! +" +
                pts +
                (this.streak >= 3 ? " WARP x" + this.streak : ""),
            );
            this.fbObj.setColor("#22c55e");
            sfx.collect();
            // Move ship to waypoint on grid
            if (q.coord) this.moveShipToGrid(q.coord);
            // Particles
            const spark = this.add
              .particles(
                this.gridX + (q.coord ? q.coord.x * this.gridSize : 0),
                this.gridY - (q.coord ? q.coord.y * this.gridSize : 0),
                "__WHITE",
                {
                  speed: { min: 30, max: 120 },
                  angle: { min: 0, max: 360 },
                  scale: { start: 0.3, end: 0 },
                  lifespan: 500,
                  tint: [0x22d3ee, 0xa78bfa, 0x22c55e],
                  quantity: 15,
                  emitting: false,
                  blendMode: "ADD",
                },
              )
              .setDepth(8);
            spark.explode(18);
            this.cameras.main.shake(100, 0.003);
            // Ship pulse
            this.tweens.add({
              targets: this.ship,
              scaleX: 1.15,
              scaleY: 1.15,
              duration: 150,
              yoyo: true,
            });
          } else {
            this.lives--;
            this.streak = 0;
            this.answerBtns[idx].bg.setFillStyle(0xef4444);
            this.answerBtns[idx].bg.setStrokeStyle(3, 0xef4444);
            const ci = this.answerBtns.findIndex(
              (b) => b.optText === q.correct,
            );
            if (ci >= 0) {
              this.answerBtns[ci].bg.setFillStyle(0x22c55e, 0.5);
              this.answerBtns[ci].bg.setStrokeStyle(2, 0x22c55e);
            }
            this.fbObj.setText("ASTEROID HIT! Answer: " + q.correct);
            this.fbObj.setColor("#ef4444");
            this.hintObj.setText(q.explain);
            sfx.hit();
            sfx.alarm();
            this.cameras.main.shake(250, 0.015);
            this.cameras.main.flash(150, 255, 50, 50);
            // Ship damage flash
            this.drawShipDamaged();
            this.time.delayedCall(400, () => this.drawShip(this.ship));
          }
          this.updateHUD();
          this.time.delayedCall(correct ? 1500 : 2500, () => {
            this.qIndex++;
            this.loadQuestion();
          });
        }

        drawShipDamaged() {
          this.ship.clear();
          this.ship.fillStyle(0xef4444);
          this.ship.fillTriangle(0, -30, 20, 15, -20, 15);
          this.ship.fillStyle(0x991b1b);
          this.ship.fillTriangle(0, -22, 14, 10, -14, 10);
          this.ship.fillStyle(0x7f1d1d);
          this.ship.fillTriangle(-14, 8, -30, 20, -12, 20);
          this.ship.fillTriangle(14, 8, 30, 20, 12, 20);
          this.ship.fillStyle(0xfbbf24);
          this.ship.fillCircle(0, -8, 5);
        }

        handleKey(e) {
          if (this.answered) return;
          if (e.key >= "1" && e.key <= "4") {
            const i = parseInt(e.key) - 1;
            if (i < this.answerBtns.length) this.submitAnswer(i);
          }
          if (e.key === "ArrowDown" || e.key === "ArrowRight") {
            this.selectedIdx = Math.min(
              this.selectedIdx + 1,
              this.answerBtns.length - 1,
            );
            if (this.selectedIdx < 0) this.selectedIdx = 0;
            this.highlightSel();
          }
          if (e.key === "ArrowUp" || e.key === "ArrowLeft") {
            this.selectedIdx = Math.max(this.selectedIdx - 1, 0);
            this.highlightSel();
          }
          if (e.key === "Enter" && this.selectedIdx >= 0)
            this.submitAnswer(this.selectedIdx);
        }

        highlightSel() {
          this.answerBtns.forEach((b, i) => {
            b.bg.setStrokeStyle(
              i === this.selectedIdx ? 3 : 2,
              i === this.selectedIdx ? 0x22d3ee : 0x334155,
            );
          });
          sfx.click();
        }

        updateHUD() {
          this.hudQ.setText(`MISSION ${this.qIndex + 1}/${this.totalQ}`);
          this.hudScore.setText(`SCORE: ${this.score}`);
          this.hudLives.setText(
            "SHIELDS: " + "■".repeat(this.lives) + "□".repeat(3 - this.lives),
          );
          this.hudStreak.setText(
            this.streak >= 2 ? `WARP x${this.streak}` : "",
          );
          const el = Math.floor((Date.now() - this.startTime) / 1000);
          const m = Math.floor(el / 60),
            s = el % 60;
          this.hudTimer.setText(`${m}:${s < 10 ? "0" : ""}${s}`);
        }

        update() {
          this.updateHUD();
        }

        endGame() {
          const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
          const correct = this.qIndex - (3 - this.lives);
          this.scene.start("Results", {
            score: this.score,
            total: this.totalQ,
            correct: Math.max(0, correct),
            bestStreak: this.bestStreak,
            time: elapsed,
          });
        }
      }

      // --- RESULTS ---
      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }
        init(data) {
          this.d = data;
        }
        create() {
          sfx.init();
          const d = this.d,
            cx = W / 2;
          this.cameras.main.setBackgroundColor("#020617");
          createStarfield(this);
          const pct = d.total > 0 ? Math.round((d.correct / d.total) * 100) : 0;
          const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : pct >= 50 ? 1 : 0;
          if (stars >= 2) {
            sfx.win();
            for (let i = 0; i < 4; i++) {
              this.time.delayedCall(i * 200, () => {
                this.add
                  .particles(
                    Phaser.Math.Between(150, W - 150),
                    Phaser.Math.Between(50, 200),
                    "__WHITE",
                    {
                      speed: { min: 60, max: 180 },
                      angle: { min: 0, max: 360 },
                      scale: { start: 0.3, end: 0 },
                      lifespan: 1000,
                      tint: [0x22d3ee, 0xa78bfa, 0xfbbf24],
                      quantity: 12,
                      emitting: false,
                      blendMode: "ADD",
                    },
                  )
                  .explode(15);
              });
            }
          } else sfx.lose();
          const titles = [
            "Lost in Space",
            "Cadet Pilot",
            "Star Navigator!",
            "GALACTIC COMMANDER!",
          ];
          this.add
            .text(cx, 60, titles[stars], {
              fontSize: "40px",
              color: stars >= 2 ? "#22d3ee" : "#94a3b8",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          let starStr = "";
          for (let i = 0; i < 3; i++) starStr += i < stars ? "★ " : "☆ ";
          this.add
            .text(cx, 115, starStr, { fontSize: "48px", color: "#fbbf24" })
            .setOrigin(0.5);
          this.add.circle(cx, 215, 60, 0x0f172a).setStrokeStyle(4, 0x7c3aed);
          this.add
            .text(cx, 205, pct + "%", {
              fontSize: "32px",
              color: "#e2e8f0",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 230, "Accuracy", { fontSize: "12px", color: "#64748b" })
            .setOrigin(0.5);
          const stats = [
            { l: "Score", v: d.score, c: "#22d3ee" },
            { l: "Waypoints", v: `${d.correct}/${d.total}`, c: "#22c55e" },
            { l: "Best Warp", v: d.bestStreak, c: "#a78bfa" },
            {
              l: "Time",
              v: `${Math.floor(d.time / 60)}:${(d.time % 60 < 10 ? "0" : "") + (d.time % 60)}`,
              c: "#94a3b8",
            },
          ];
          stats.forEach((s, i) => {
            const x = cx - 240 + i * 165,
              y = 340;
            this.add
              .rectangle(x, y, 135, 60, 0x0f172a)
              .setStrokeStyle(1, 0x1e293b);
            this.add
              .text(x, y - 8, String(s.v), {
                fontSize: "22px",
                color: s.c,
                fontStyle: "bold",
              })
              .setOrigin(0.5);
            this.add
              .text(x, y + 14, s.l, { fontSize: "11px", color: "#64748b" })
              .setOrigin(0.5);
          });
          this.add
            .text(
              cx,
              400,
              `Sectors explored: ${Math.min(d.correct, 15)} of ${d.total}`,
              { fontSize: "14px", color: "#94a3b8" },
            )
            .setOrigin(0.5);
          const btn1 = this.add
            .rectangle(cx - 110, 480, 190, 50, 0x7c3aed)
            .setStrokeStyle(2, 0xa78bfa)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx - 110, 480, "NEW MISSION", {
              fontSize: "17px",
              color: "#fff",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          btn1.on("pointerdown", () => {
            sfx.click();
            this.scene.start("Game");
          });
          btn1.on("pointerover", () => btn1.setFillStyle(0x6d28d9));
          btn1.on("pointerout", () => btn1.setFillStyle(0x7c3aed));
          const btn2 = this.add
            .rectangle(cx + 110, 480, 190, 50, 0x1e293b)
            .setStrokeStyle(2, 0x334155)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx + 110, 480, "MAIN MENU", {
              fontSize: "17px",
              color: "#94a3b8",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          btn2.on("pointerdown", () => {
            sfx.click();
            this.scene.start("Title");
          });
          btn2.on("pointerover", () => btn2.setFillStyle(0x334155));
          btn2.on("pointerout", () => btn2.setFillStyle(0x1e293b));
          this.add
            .text(
              cx,
              H - 25,
              "Coordinate Quest — Neft Teacher — 6.NS.5–6.NS.8",
              { fontSize: "11px", color: "#475569" },
            )
            .setOrigin(0.5);
          this.input.keyboard.on("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") this.scene.start("Game");
            if (e.key === "Escape") this.scene.start("Title");
          });
        }
      }

      // --- CONFIG ---
      new Phaser.Game({
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#020617",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [BootScene, TitleScene, GameScene, ResultsScene],
        physics: {
          default: "arcade",
          arcade: { gravity: { y: 0 }, debug: false },
        },
        input: { keyboard: true, mouse: true, touch: true },
      });
    </script>
  </body>
</html>
