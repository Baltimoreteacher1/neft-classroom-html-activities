    <script>
      // Expression Engine — Factory Assembly Line
      // Grade 6: 6.EE.1–6.EE.4 (Write & evaluate expressions)
      // Neft Teacher — Enhanced with juice, particles, streaks, star rating, high scores, power-ups

      const W = 1024,
        H = 768;
      const LS_KEY = "expression_engine_highscore";

      // --- QUESTION BANK (procedurally generated + curated) ---
      function generateQuestions() {
        const qs = [];
        function shuffle(a) {
          const b = [...a];
          for (let i = b.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [b[i], b[j]] = [b[j], b[i]];
          }
          return b;
        }
        function makeQ(text, correct, wrongs, hint, tier) {
          const opts = shuffle([correct, ...wrongs]);
          return { text, correct, options: opts, hint, tier };
        }
        // TIER 1: Simple evaluation
        for (let i = 0; i < 6; i++) {
          const c = Phaser.Math.Between(2, 9),
            x = Phaser.Math.Between(1, 10);
          const ans = c * x;
          qs.push(
            makeQ(
              `Evaluate ${c}x when x = ${x}`,
              String(ans),
              [String(ans + c), String(ans - x), String(c + x)],
              `Multiply ${c} × ${x} = ${ans}`,
              1,
            ),
          );
        }
        // TIER 1: Two-term expressions
        for (let i = 0; i < 4; i++) {
          const a = Phaser.Math.Between(1, 5),
            b = Phaser.Math.Between(2, 7),
            n = Phaser.Math.Between(1, 8);
          const ans = a + b * n;
          qs.push(
            makeQ(
              `Evaluate ${a} + ${b}n when n = ${n}`,
              String(ans),
              [String(a * b + n), String(b * n), String(a + b + n)],
              `First: ${b}×${n}=${b * n}, then add ${a}`,
              1,
            ),
          );
        }
        // TIER 2: Distributive property
        for (let i = 0; i < 5; i++) {
          const a = Phaser.Math.Between(2, 6),
            b = Phaser.Math.Between(1, 9),
            c = Phaser.Math.Between(1, 9);
          qs.push(
            makeQ(
              `Which is equivalent to ${a}(x + ${c})?`,
              `${a}x + ${a * c}`,
              [`${a}x + ${c}`, `x + ${a * c}`, `${a}x + ${a + c}`],
              `Distribute: ${a}×x = ${a}x, ${a}×${c} = ${a * c}`,
              2,
            ),
          );
        }
        // TIER 2: Evaluate with exponents
        for (let i = 0; i < 3; i++) {
          const co = Phaser.Math.Between(1, 3),
            a = Phaser.Math.Between(2, 5);
          const ans = co * a * a + 1;
          qs.push(
            makeQ(
              `Evaluate ${co}a² + 1 when a = ${a}`,
              String(ans),
              [String(co * a + 1), String(co * a * a), String(co + a * a + 1)],
              `${a}²=${a * a}, then ${co}×${a * a}=${co * a * a}, add 1`,
              2,
            ),
          );
        }
        // TIER 3: Combine like terms
        for (let i = 0; i < 4; i++) {
          const a = Phaser.Math.Between(2, 7),
            b = Phaser.Math.Between(1, 8),
            c = Phaser.Math.Between(1, 5),
            d = Phaser.Math.Between(1, b);
          const xc = a + c,
            nc = b - d;
          qs.push(
            makeQ(
              `Simplify: ${a}x + ${b} + ${c}x − ${d}`,
              `${xc}x + ${nc}`,
              [
                `${xc}x + ${b + d}`,
                `${a + c + b}x − ${d}`,
                `${a * c}x + ${nc}`,
              ],
              `Combine x-terms: ${a}x+${c}x=${xc}x; constants: ${b}−${d}=${nc}`,
              3,
            ),
          );
        }
        // TIER 3: Multi-step evaluation
        for (let i = 0; i < 3; i++) {
          const a = Phaser.Math.Between(2, 5),
            b = Phaser.Math.Between(1, 4),
            c = Phaser.Math.Between(2, 5),
            y = Phaser.Math.Between(2, 6);
          const inner = a * y - b,
            ans = c * inner;
          if (inner > 0) {
            qs.push(
              makeQ(
                `Evaluate ${c}(${a}y − ${b}) when y = ${y}`,
                String(ans),
                [String(c * a * y - b), String(ans + c), String(ans - b)],
                `Inside: ${a}×${y}−${b}=${inner}. Then ${c}×${inner}=${ans}`,
                3,
              ),
            );
          }
        }
        return shuffle(qs).slice(0, 20);
      }

      // --- SOUND SYSTEM (Web Audio API) ---
      class SFX {
        constructor() {
          this.ctx = null;
        }
        init() {
          if (!this.ctx)
            try {
              this.ctx = new (
                window.AudioContext || window.webkitAudioContext
              )();
            } catch (e) {}
        }
        play(freq, dur, type = "sine", vol = 0.1) {
          if (!this.ctx) return;
          try {
            const o = this.ctx.createOscillator(),
              g = this.ctx.createGain();
            o.type = type;
            o.frequency.value = freq;
            g.gain.setValueAtTime(vol, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              this.ctx.currentTime + dur,
            );
            o.connect(g);
            g.connect(this.ctx.destination);
            o.start();
            o.stop(this.ctx.currentTime + dur);
          } catch (e) {}
        }
        noise(dur, vol = 0.08) {
          if (!this.ctx) return;
          try {
            const bufSize = this.ctx.sampleRate * dur;
            const buf = this.ctx.createBuffer(1, bufSize, this.ctx.sampleRate);
            const data = buf.getChannelData(0);
            for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
            const src = this.ctx.createBufferSource();
            src.buffer = buf;
            const g = this.ctx.createGain();
            g.gain.setValueAtTime(vol, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              this.ctx.currentTime + dur,
            );
            src.connect(g);
            g.connect(this.ctx.destination);
            src.start();
            src.stop(this.ctx.currentTime + dur);
          } catch (e) {}
        }
        correct() {
          this.play(523, 0.12);
          setTimeout(() => this.play(659, 0.12), 80);
          setTimeout(() => this.play(784, 0.15), 160);
        }
        wrong() {
          this.play(200, 0.3, "sawtooth");
          setTimeout(() => this.play(150, 0.3, "sawtooth"), 100);
        }
        glassBreak() {
          this.noise(0.2, 0.12);
          this.play("800", 0.05, "square", 0.08);
          setTimeout(() => this.play(600, 0.06, "square", 0.06), 50);
        }
        click() {
          this.play(440, 0.06);
        }
        lever() {
          this.play(300, 0.15, "square");
          setTimeout(() => this.play(500, 0.1, "square"), 100);
        }
        convey() {
          this.play(120, 0.08, "triangle", 0.03);
        }
        streak3() {
          [523, 659, 784].forEach((f, i) =>
            setTimeout(() => this.play(f, 0.15, "sine", 0.2), i * 60),
          );
        }
        streak5() {
          [523, 659, 784, 988, 1175].forEach((f, i) =>
            setTimeout(() => this.play(f, 0.18, "sine", 0.25), i * 50),
          );
        }
        streak7() {
          [523, 659, 784, 988, 1175, 1318, 1568].forEach((f, i) =>
            setTimeout(() => this.play(f, 0.2, "sine", 0.3), i * 45),
          );
        }
        powerUp() {
          [440, 554, 659, 880].forEach((f, i) =>
            setTimeout(() => this.play(f, 0.12, "triangle", 0.2), i * 70),
          );
        }
        phaseTransition() {
          [392, 440, 523, 659, 784, 880].forEach((f, i) =>
            setTimeout(() => this.play(f, 0.2, "sine", 0.2), i * 60),
          );
        }
        levelUp() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => this.play(f, 0.15), i * 100),
          );
        }
        win3star() {
          [523, 659, 784, 880, 1047, 1175, 1318, 1568].forEach((f, i) =>
            setTimeout(() => this.play(f, 0.3, "sine", 0.3), i * 100),
          );
        }
        highScore() {
          [523, 784, 1047, 784, 1047, 1318].forEach((f, i) =>
            setTimeout(() => this.play(f, 0.2, "sine", 0.3), i * 120),
          );
        }
        gameOver() {
          [784, 659, 523, 392].forEach((f, i) =>
            setTimeout(() => this.play(f, 0.2, "sawtooth"), i * 150),
          );
        }
      }
      const sfx = new SFX();

      // --- BOOT SCENE ---
      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          // Generate textures
          const g = this.make.graphics({ add: false });
          // Confetti
          g.fillStyle(0xffffff);
          g.fillRect(0, 0, 6, 3);
          g.generateTexture("confetti", 6, 3);
          g.clear();
          // Glow
          g.fillStyle(0xffffff);
          g.fillCircle(8, 8, 8);
          g.generateTexture("glow_tex", 16, 16);
          g.clear();
          // Spark
          g.fillStyle(0xffffff);
          g.fillCircle(3, 3, 3);
          g.generateTexture("spark_tex", 6, 6);
          g.clear();
          g.destroy();
          this.scene.start("Title");
        }
      }

      // --- TITLE SCENE ---
      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          sfx.init();
          const cx = W / 2,
            cy = H / 2;
          this.cameras.main.setBackgroundColor("#0d1117");

          // Ambient background particles (floating sparks)
          this.add.particles(0, 0, "spark_tex", {
            x: { min: 0, max: W },
            y: { min: 0, max: H },
            speed: { min: 3, max: 15 },
            angle: { min: 260, max: 280 },
            scale: { start: 0.3, end: 0 },
            alpha: { start: 0.4, end: 0 },
            lifespan: { min: 3000, max: 7000 },
            frequency: 300,
            tint: [0xfbbf24, 0x3b82f6, 0x475569],
            blendMode: "ADD",
          });

          // Animated gears
          for (let i = 0; i < 6; i++) {
            const g = this.add.graphics();
            const x = Phaser.Math.Between(50, W - 50),
              y = Phaser.Math.Between(50, H - 50);
            const r = Phaser.Math.Between(30, 70);
            g.lineStyle(3, 0x334155);
            g.strokeCircle(0, 0, r);
            for (let t = 0; t < 8; t++) {
              const a = (t * Math.PI) / 4;
              g.strokeRect(Math.cos(a) * r - 4, Math.sin(a) * r - 4, 8, 8);
            }
            g.setPosition(x, y);
            g.setAlpha(0.3);
            this.tweens.add({
              targets: g,
              angle: 360,
              duration: 8000 + i * 2000,
              repeat: -1,
              ease: "Linear",
            });
          }
          // Conveyor belt animation
          for (let i = 0; i < 20; i++) {
            const r = this.add
              .rectangle(i * 55, H - 40, 50, 8, 0x475569)
              .setOrigin(0, 0.5);
            this.tweens.add({
              targets: r,
              x: r.x - 55,
              duration: 1500,
              repeat: -1,
              ease: "Linear",
              onRepeat: () => {
                r.x = i * 55;
              },
            });
          }

          // Title with animated entrance
          const titleExp = this.add
            .text(cx, 140, "EXPRESSION", {
              fontSize: "64px",
              fontFamily: "monospace",
              color: "#f59e0b",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setAlpha(0)
            .setScale(0.5);
          this.tweens.add({
            targets: titleExp,
            alpha: 1,
            scale: 1,
            duration: 800,
            ease: "Back.easeOut",
            delay: 200,
          });

          const titleEng = this.add
            .text(cx, 210, "ENGINE", {
              fontSize: "72px",
              fontFamily: "monospace",
              color: "#ef4444",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setAlpha(0)
            .setScale(0.5);
          this.tweens.add({
            targets: titleEng,
            alpha: 1,
            scale: 1,
            duration: 800,
            ease: "Back.easeOut",
            delay: 500,
          });

          // Title pulse
          this.tweens.add({
            targets: [titleExp, titleEng],
            scaleX: { from: 1, to: 1.02 },
            scaleY: { from: 1, to: 1.02 },
            duration: 2000,
            yoyo: true,
            repeat: -1,
            delay: 1500,
          });

          const subtitle = this.add
            .text(cx, 270, "Factory Assembly Line", {
              fontSize: "22px",
              color: "#94a3b8",
            })
            .setOrigin(0.5)
            .setAlpha(0);
          this.tweens.add({
            targets: subtitle,
            alpha: 1,
            y: { from: 285, to: 270 },
            duration: 600,
            delay: 900,
          });

          this.add
            .text(cx, 305, "6.EE.1 – 6.EE.4 | Neft Teacher", {
              fontSize: "14px",
              color: "#64748b",
            })
            .setOrigin(0.5);

          // Robot mascot
          const robot = this.add.graphics();
          robot.setPosition(cx, 410);
          robot.fillStyle(0x3b82f6);
          robot.fillRoundedRect(-35, -50, 70, 65, 8);
          robot.fillStyle(0x60a5fa);
          robot.fillCircle(-12, -30, 10);
          robot.fillCircle(12, -30, 10);
          robot.fillStyle(0x1e3a5f);
          robot.fillCircle(-12, -30, 5);
          robot.fillCircle(12, -30, 5);
          robot.fillStyle(0xfbbf24);
          robot.fillRect(-15, -5, 30, 6);
          robot.fillStyle(0x475569);
          robot.fillRect(-25, 15, 15, 35);
          robot.fillRect(10, 15, 15, 35);
          this.tweens.add({
            targets: robot,
            y: robot.y - 10,
            duration: 1200,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",

          // High score display
          const hs = localStorage.getItem(LS_KEY);
          if (hs) {
            this.add
              .text(cx, 480, `HIGH SCORE: ${hs}`, {
                fontSize: "14px",
                color: "#fbbf24",
                fontStyle: "bold",
              })
              .setOrigin(0.5);
          }

          // Difficulty buttons
          const diffs = [
            { label: "EASY", color: 0x22c55e, sub: "Tier 1 only" },
            { label: "STANDARD", color: 0xf59e0b, sub: "All tiers" },
            { label: "HARD", color: 0xef4444, sub: "Speed mode" },
          ];
          diffs.forEach((d, i) => {
            const bx = cx - 200 + i * 200,
              by = 560;
            const bg = this.add
              .rectangle(bx, by, 170, 70, d.color, 0.15)
              .setStrokeStyle(2, d.color)
              .setInteractive({ useHandCursor: true })
              .setScale(0)
              .setAlpha(0);
            // Animated entrance
            this.tweens.add({
              targets: bg,
              scale: 1,
              alpha: 1,
              duration: 500,
              ease: "Back.easeOut",
              delay: 1000 + i * 150,
            });
            const lbl = this.add
              .text(bx, by - 10, d.label, {
                fontSize: "22px",
                color: "#" + d.color.toString(16).padStart(6, "0"),
                fontStyle: "bold",
              })
              .setOrigin(0.5)
              .setAlpha(0);
            const sub = this.add
              .text(bx, by + 14, d.sub, { fontSize: "12px", color: "#94a3b8" })
              .setOrigin(0.5)
              .setAlpha(0);
            this.tweens.add({
              targets: [lbl, sub],
              alpha: 1,
              duration: 400,
              delay: 1200 + i * 150,
            });
            bg.on("pointerover", () => {
              bg.setFillStyle(d.color, 0.3);
              this.tweens.add({
                targets: bg,
                scaleX: 1.08,
                scaleY: 1.08,
                duration: 120,
              });
              sfx.click();
            });
            bg.on("pointerout", () => {
              bg.setFillStyle(d.color, 0.15);
              this.tweens.add({
                targets: bg,
                scaleX: 1,
                scaleY: 1,
                duration: 120,
              });
            });
            bg.on("pointerdown", () => {
              sfx.click();
              this.cameras.main.fadeOut(400);
              this.time.delayedCall(400, () =>
                this.scene.start("Game", { difficulty: i }),
              );
            });
          });
          // Controls info
          this.add
            .text(
              cx,
              660,
              "Click / Tap answers on the conveyor belt | Language-Friendly",
              { fontSize: "13px", color: "#64748b" },
            )
            .setOrigin(0.5);
          this.add
            .text(
              cx,
              685,
              "Arrow Keys to highlight | Enter to select | 1-4 for quick pick",
              { fontSize: "12px", color: "#475569" },
            )
            .setOrigin(0.5);

          this.cameras.main.fadeIn(500);
        }
      }

      // --- GAME SCENE ---
      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }
        init(data) {
          this.difficulty = data.difficulty || 1;
        }
        create() {
          this.cameras.main.setBackgroundColor("#0f172a");
          sfx.init();
          this.questions = generateQuestions();
          if (this.difficulty === 0)
            this.questions = this.questions
              .filter((q) => q.tier === 1)
              .slice(0, 15);
          if (this.questions.length < 15) {
            while (this.questions.length < 15) {
              this.questions.push(
                ...generateQuestions().filter((q) =>
                  this.difficulty === 0 ? q.tier === 1 : true,
                ),
              );
            }
            this.questions = this.questions.slice(0, 15);
          }
          this.qIndex = 0;
          this.score = 0;
          this.lives = 3;
          this.streak = 0;
          this.bestStreak = 0;
          this.combo = 1;
          this.totalQ = Math.min(15, this.questions.length);
          this.answered = false;
          this.startTime = Date.now();
          this.conveyorSpeed = this.difficulty === 2 ? 2.5 : 1.5;
          this.selectedIdx = -1;
          this.questionStartTime = 0;
          // Power-ups
          this.powerUps = { fiftyFifty: 1, doublePoints: 1 };
          this.doublePointsActive = false;
          this.removedChoices = [];
          this.totalCorrect = 0;

          // Factory background
          this.drawFactory();

          // Ambient particles (floating sparks in factory)
          this.ambientParticles = this.add
            .particles(0, 0, "spark_tex", {
              x: { min: 0, max: W },
              y: { min: 100, max: 500 },

            .text(W / 2 - 320, 105, "", {
              fontSize: "13px",
              padding: { x: 8, y: 3 },
              backgroundColor: "#334155",
              color: "#94a3b8",
            })
            .setDepth(6);
          this.qText = this.add
            .text(W / 2, 120, "", {
              fontSize: "22px",
              color: "#e2e8f0",
              fontStyle: "bold",
              align: "center",
              wordWrap: { width: 660 },
            })
            .setOrigin(0.5)
            .setDepth(6);

          // Power-up buttons
          this.puBtns = [];
          const puDefs = [
            { key: "fiftyFifty", label: "50/50 [Q]", color: 0x3b82f6, x: 80 },
            {
              key: "doublePoints",
              label: "2x PTS [W]",
              color: 0xfbbf24,
              x: 220,
            },
          ];
          puDefs.forEach((pu) => {
            const bg = this.add
              .rectangle(pu.x, 185, 120, 28, pu.color, 0.2)
              .setStrokeStyle(1, pu.color)
              .setInteractive({ useHandCursor: true })
              .setDepth(6);
            const txt = this.add
              .text(pu.x, 185, "", {
                fontSize: "12px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(0.5)
              .setDepth(7);
            bg.on("pointerover", () => bg.setFillStyle(pu.color, 0.4));
            bg.on("pointerout", () => bg.setFillStyle(pu.color, 0.2));
            bg.on("pointerdown", () => this.activatePowerUp(pu.key));
            this.puBtns.push({ bg, txt, key: pu.key, label: pu.label });
          });

          // Conveyor belt
          this.conveyorParts = [];
          for (let i = 0; i < 30; i++) {
            const seg = this.add
              .rectangle(i * 40, 480, 36, 10, 0x475569)
              .setOrigin(0, 0.5)
              .setDepth(1);
            this.conveyorParts.push(seg);
          }
          this.add.rectangle(W / 2, 480, W + 20, 4, 0x64748b).setDepth(1);
          this.add.rectangle(W / 2, 476, W + 20, 2, 0x94a3b8, 0.3).setDepth(1);

          // Answer boxes on conveyor
          this.answerBoxes = [];
          this.answerTexts = [];

          // Robot
          this.robotG = this.add
            .graphics()
            .setPosition(W / 2, 600)
            .setDepth(4);
          this.drawRobot(this.robotG, 0x3b82f6);
          this.tweens.add({
            targets: this.robotG,
            y: 595,
            duration: 800,
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut",
          });

          // Feedback text
          this.fbText = this.add
            .text(W / 2, 680, "", {
              fontSize: "16px",
              color: "#94a3b8",
              align: "center",
              wordWrap: { width: 600 },
            })
            .setOrigin(0.5)
            .setDepth(8);

          // Hint text
          this.hintText = this.add
            .text(W / 2, 720, "", {
              fontSize: "13px",
              color: "#64748b",
              align: "center",
              wordWrap: { width: 600 },
            })
            .setOrigin(0.5)
            .setDepth(8);

          // Lever
          this.lever = this.add
            .graphics()
            .setPosition(W - 80, 380)
            .setDepth(5);
          this.drawLever(this.lever, false);

          // Confetti particle emitter
          this.confettiEmitter = this.add
            .particles(0, 0, "confetti", {
              speed: { min: 80, max: 300 },
              angle: { min: 0, max: 360 },
              scale: { start: 1.5, end: 0.2 },
              rotate: { min: 0, max: 360 },
              lifespan: 1200,
              emitting: false,
              quantity: 25,
              tint: [0xfbbf24, 0x3b82f6, 0x22c55e, 0xef4444, 0xa78bfa],
              gravityY: 200,
            })
            .setDepth(20);

          // Spark particles for correct
          this.sparkEmitter = this.add
            .particles(0, 0, "spark_tex", {
              speed: { min: 50, max: 200 },
              angle: { min: 0, max: 360 },
              scale: { start: 0.6, end: 0 },
              lifespan: 600,
              blendMode: "ADD",
              tint: 0xfbbf24,
              emitting: false,
              quantity: 15,
            })
            .setDepth(9);

          // Smoke for wrong answers
          this.smokeEmitter = this.add
            .particles(0, 0, "spark_tex", {
              speed: { min: 20, max: 60 },
              angle: { min: 250, max: 290 },
              scale: { start: 0.6, end: 0 },
              lifespan: 800,
              blendMode: "NORMAL",
              tint: 0xef4444,
              emitting: false,
              quantity: 10,
            })
            .setDepth(9);

          // Red flash overlay
          this.redFlash = this.add
            .rectangle(W / 2, H / 2, W, H, 0xff0000, 0)
            .setDepth(30);

          // Phase transition overlay
          this.transitionOverlay = this.add
            .rectangle(W / 2, H / 2, W, H, 0x0f172a, 0)
            .setDepth(50);
          this.transitionText = this.add
            .text(W / 2, H / 2, "", {
              fontSize: "42px",
              fontStyle: "bold",
              color: "#fbbf24",
              stroke: "#000",
              strokeThickness: 5,
            })
            .setOrigin(0.5)
            .setDepth(51)
            .setAlpha(0);

          // Keyboard
          this.input.keyboard.on("keydown", this.handleKey, this);

          // Start first question
          this.loadQuestion();
          // Timer
          this.timerEvent = this.time.addEvent({
            delay: 1000,
            callback: () => {},
            loop: true,
          });

          this.cameras.main.fadeIn(500);
        }

        drawFactory() {
          this.add.rectangle(W / 2, H / 2, W, H, 0x0f172a);
          for (let i = 0; i < 5; i++) {
            this.add.rectangle(i * 260 + 20, H / 2, 8, H, 0x1e293b).setDepth(0);
          }
          this.add.rectangle(W / 2, H - 20, W, 40, 0x1e293b).setDepth(0);
          for (let i = 0; i < 25; i++) {
            this.add
              .rectangle(
                i * 50,
                H - 2,
                25,
                4,
                i % 2 === 0 ? 0xfbbf24 : 0x0f172a,
              )
              .setOrigin(0, 0.5)
              .setDepth(1);
          }
          this.add.rectangle(50, 200, 12, 300, 0x334155).setDepth(0);
          this.add.rectangle(W - 50, 200, 12, 300, 0x334155).setDepth(0);
          this.add.circle(50, 60, 15, 0x475569).setDepth(0);
          this.add.circle(W - 50, 60, 15, 0x475569).setDepth(0);
          for (let i = 0; i < 4; i++) {
            const g = this.add
              .graphics()
              .setPosition(
                Phaser.Math.Between(100, W - 100),
                Phaser.Math.Between(200, 400),
              )
              .setDepth(0)
              .setAlpha(0.15);
            const r = Phaser.Math.Between(20, 50);
            g.lineStyle(2, 0x64748b);
            g.strokeCircle(0, 0, r);
            for (let t = 0; t < 6; t++) {
              const a = (t * Math.PI) / 3;
              g.lineStyle(2, 0x64748b);
              g.lineBetween(
                Math.cos(a) * (r - 5),
                Math.sin(a) * (r - 5),
                Math.cos(a) * (r + 10),
                Math.sin(a) * (r + 10),
              );
            }
            this.tweens.add({
              targets: g,
              angle: 360,
              duration: 6000 + i * 2000,
              repeat: -1,
              ease: "Linear",
            });
          }
        }

        drawRobot(g, color) {
          g.clear();
          g.fillStyle(color);
          g.fillRoundedRect(-30, -45, 60, 55, 6);
          g.fillStyle(0x60a5fa);
          g.fillCircle(-10, -25, 8);
          g.fillCircle(10, -25, 8);
          g.fillStyle(0x1e3a5f);
          g.fillCircle(-10, -25, 4);
          g.fillCircle(10, -25, 4);
          g.fillStyle(0xfbbf24);
          g.fillRect(-12, -3, 24, 4);
          g.fillStyle(0x475569);
          g.fillRect(-22, 10, 12, 30);
          g.fillRect(10, 10, 12, 30);
          g.lineStyle(2, 0x94a3b8);
          g.lineBetween(0, -45, 0, -58);
          g.fillStyle(0xef4444);
          g.fillCircle(0, -60, 4);
        }

        drawLever(g, pulled) {
          g.clear();
          g.fillStyle(0x475569);
          g.fillRect(-5, 0, 10, 60);
          g.fillStyle(pulled ? 0x22c55e : 0xef4444);
          g.fillCircle(0, pulled ? 60 : 0, 12);
          g.lineStyle(2, 0x64748b);
          g.strokeRect(-8, -5, 16, 70);
        }

        activatePowerUp(key) {
          if (this.answered || this.qIndex >= this.totalQ) return;
          if (this.powerUps[key] <= 0) return;

          if (key === "fiftyFifty") {
            this.powerUps.fiftyFifty--;
            sfx.powerUp();
            const q = this.questions[this.qIndex];
            const wrongIndices = [];
            this.answerBoxes.forEach((b, i) => {
              if (b.optText !== q.correct && !this.removedChoices.includes(i)) {
                wrongIndices.push(i);
              }
            });
            const toRemove = wrongIndices
              .sort(() => Math.random() - 0.5)
              .slice(0, 2);
            toRemove.forEach((i) => {
              const box = this.answerBoxes[i];
              box.bg.setFillStyle(0x111122, 0.3).setStrokeStyle(1, 0x333344);
              box.txt.setText("--");
              box.bg.removeInteractive();
              this.removedChoices.push(i);
            });
            this.showFloatingText(W / 2, 350, "50/50!", "#3b82f6");
          } else if (key === "doublePoints") {
            this.powerUps.doublePoints--;
            this.doublePointsActive = true;
            sfx.powerUp();
            this.showFloatingText(W / 2, 350, "DOUBLE POINTS!", "#fbbf24");
          }
          this.updatePowerUpHUD();
        }

        showFloatingText(x, y, text, color, size) {
          const ft = this.add
            .text(x, y, text, {
              fontSize: size || "24px",
              fontStyle: "bold",
              color: color || "#fbbf24",
              stroke: "#000",
              strokeThickness: 3,
            })
            .setOrigin(0.5)
            .setDepth(40);
          this.tweens.add({
            targets: ft,
            y: y - 60,
            alpha: { from: 1, to: 0 },
            scale: { from: 1, to: 1.5 },
            duration: 1000,
            onComplete: () => ft.destroy(),
          });
        }

        showPhaseTransition(text) {
          sfx.phaseTransition();
          this.transitionOverlay.setAlpha(0);
          this.transitionText.setText(text).setAlpha(0).setScale(0.5);
          this.tweens.add({
            targets: this.transitionOverlay,
            alpha: 0.7,
            duration: 300,
            yoyo: true,
            hold: 800,
          });
          this.tweens.add({
            targets: this.transitionText,
            alpha: 1,
            scale: 1.3,
            duration: 400,
            yoyo: true,
            hold: 600,
            ease: "Back.easeOut",
            onComplete: () => this.transitionText.setAlpha(0),
          });
        }

        updatePowerUpHUD() {
          this.puBtns.forEach((pu) => {
            const count = this.powerUps[pu.key];
            pu.txt.setText(`${pu.label} (${count})`);
            pu.bg.setAlpha(count > 0 ? 1 : 0.3);
          });
        }

        loadQuestion() {
          if (this.qIndex >= this.totalQ || this.lives <= 0) {
            this.endGame();
            return;
          }
          this.answered = false;
          this.selectedIdx = -1;
          this.doublePointsActive = false;
          this.removedChoices = [];
          this.questionStartTime = Date.now();
          const q = this.questions[this.qIndex];

          // Phase transition at question 6 and 11
          if (this.qIndex === 5) {
            this.showPhaseTransition("PHASE 2: PICKING UP SPEED!");
          } else if (this.qIndex === 10) {
            this.showPhaseTransition("PHASE 3: FINAL STRETCH!");
          }

          // Update HUD
          this.updateHUD();
          this.updatePowerUpHUD();
          // Progress
          this.progFill.width = (this.qIndex / this.totalQ) * (W - 40);
          // Tier badge
          const tierLabels = ["TIER 1", "TIER 2", "TIER 3"];
          const tierColors = ["#22c55e", "#f59e0b", "#ef4444"];
          this.tierBadge.setText(tierLabels[q.tier - 1]);
          this.tierBadge.setStyle({
            backgroundColor: tierColors[q.tier - 1],
            color: "#fff",
            fontSize: "13px",
            padding: { x: 8, y: 3 },
          });
          // Question text with entrance animation
          this.qText.setText(q.text).setAlpha(0).setScale(0.8);
          this.tweens.add({
            targets: this.qText,
            alpha: 1,
            scale: 1,
            duration: 300,
            ease: "Back.easeOut",
          });
          // Clear old answer boxes
          this.answerBoxes.forEach((b) => {
            b.bg.destroy();
            b.txt.destroy();
            b.highlight.destroy();
            if (b.numLabel) b.numLabel.destroy();
          });
          this.answerBoxes = [];
          // Create new answer boxes on conveyor
          const opts = q.options;
          const spacing = 200;
          const startX = W + 100;
          opts.forEach((opt, i) => {
            const x = startX + i * spacing;
            const bg = this.add
              .rectangle(x, 440, 160, 50, 0x1e293b)
              .setStrokeStyle(2, 0x3b82f6)
              .setDepth(3)
              .setInteractive({ useHandCursor: true });
            const highlight = this.add
              .rectangle(x, 440, 164, 54, 0x3b82f6, 0)
              .setDepth(2);
            const txt = this.add
              .text(x, 440, opt, {
                fontSize: "18px",
                color: "#e2e8f0",
                fontStyle: "bold",
              })
              .setOrigin(0.5)
              .setDepth(4);
            const numLabel = this.add
              .text(x - 70, 418, String(i + 1), {
                fontSize: "11px",
                color: "#64748b",
              })
              .setDepth(4);
            bg.on("pointerover", () => {
              if (!this.answered && !this.removedChoices.includes(i)) {
                bg.setStrokeStyle(3, 0xfbbf24);
                this.tweens.add({
                  targets: bg,
                  scaleX: 1.06,
                  scaleY: 1.06,
                  duration: 100,
                });
                sfx.click();
              }
            });
            bg.on("pointerout", () => {
              if (!this.answered && this.selectedIdx !== i) {
                bg.setStrokeStyle(2, 0x3b82f6);
                this.tweens.add({
                  targets: bg,
                  scaleX: 1,
                  scaleY: 1,
                  duration: 100,
                });
              }
            });
            bg.on("pointerdown", () => {
              if (!this.answered && !this.removedChoices.includes(i))
                this.selectAnswer(i);
            });
            this.answerBoxes.push({
              bg,
              txt,
              highlight,
              numLabel,
              optText: opt,
              idx: i,
              x,
            });
          });
          // Animate boxes sliding in
          this.answerBoxes.forEach((box, i) => {
            const targetX = 150 + i * 220;
            this.tweens.add({
              targets: [box.bg, box.txt, box.highlight, box.numLabel],
              x: targetX,
              duration: 800 + i * 150,
              ease: "Back.easeOut",
              delay: i * 100,
            });
          });
          // Reset feedback
          this.fbText.setText("");
          this.hintText.setText("");
          this.speedIndicator.setAlpha(0);
          this.drawLever(this.lever, false);
        }

        selectAnswer(idx) {
          if (this.answered) return;
          if (this.removedChoices.includes(idx)) return;
          // Deselect previous
          this.answerBoxes.forEach((b, i) => {
            if (!this.removedChoices.includes(i)) {
              b.bg.setStrokeStyle(2, 0x3b82f6);
              b.highlight.setAlpha(0);
            }
          });
          this.selectedIdx = idx;
          const box = this.answerBoxes[idx];
          box.bg.setStrokeStyle(3, 0xfbbf24);
          box.highlight.setAlpha(0.15);
          sfx.click();
          // Auto-submit after short delay
          this.time.delayedCall(200, () => {
            if (this.selectedIdx === idx && !this.answered)
              this.submitAnswer(idx);
          });
        }

        submitAnswer(idx) {
          if (this.answered) return;
          this.answered = true;
          const q = this.questions[this.qIndex];
          const chosen = this.answerBoxes[idx].optText;
          const correct = chosen === q.correct;
          const answerTime = (Date.now() - this.questionStartTime) / 1000;

          // Pull lever animation
          this.drawLever(this.lever, true);
          sfx.lever();

          if (correct) {
            this.totalCorrect++;
            let pts = q.tier * 10 * (1 + Math.min(this.streak, 5) * 0.1);
            pts = Math.round(pts);

            // Time bonus
            let timeBonus = 0;
            if (answerTime < 3) {
              timeBonus = 15;
              this.speedIndicator
                .setText("SPEED BONUS +15")
                .setColor("#22c55e")
                .setAlpha(1);
            } else if (answerTime < 5) {
              timeBonus = 8;
              this.speedIndicator
                .setText("QUICK +8")
                .setColor("#94a3b8")
                .setAlpha(1);
            }
            pts += timeBonus;

            // Double points
            if (this.doublePointsActive) {
              pts *= 2;
              this.showFloatingText(W / 2, 300, "DOUBLED!", "#fbbf24", "18px");
            }

            this.score += pts;
            this.streak++;
            if (this.streak > this.bestStreak) this.bestStreak = this.streak;
            this.combo = Math.min(this.streak, 5);

            // Green flash on correct box
            this.answerBoxes[idx].bg.setFillStyle(0x22c55e);
            this.answerBoxes[idx].bg.setStrokeStyle(3, 0x22c55e);

            // Click feedback
            this.tweens.add({
              targets: this.answerBoxes[idx].bg,
              scaleX: { from: 1.15, to: 1 },
              scaleY: { from: 1.15, to: 1 },
              duration: 200,
            });

            const streakText =
              this.streak >= 3 ? ` STREAK x${this.streak}!` : "";
            this.fbText.setText(`CORRECT! +${pts} pts${streakText}`);
            this.fbText.setColor("#22c55e");
            sfx.correct();

            // Floating score text
            const box = this.answerBoxes[idx];
            this.showFloatingText(
              box.bg.x,
              box.bg.y - 40,
              `+${pts}`,
              "#22c55e",
              "28px",
            );

            // Streak milestone effects
            if (this.streak === 3) {
              sfx.streak3();
              this.showFloatingText(
                W / 2,
                H / 2 - 50,
                "STREAK x3!",
                "#f59e0b",
                "32px",
              );
            } else if (this.streak === 5) {
              sfx.streak5();
              this.showFloatingText(
                W / 2,
                H / 2 - 50,
                "STREAK x5! AMAZING!",
                "#ef4444",
                "34px",
              );
            } else if (this.streak === 7) {
              sfx.streak7();
              this.showFloatingText(
                W / 2,
                H / 2 - 50,
                "STREAK x7! UNSTOPPABLE!",
                "#a78bfa",
                "36px",
              );
            }

            // Streak counter pulse
            if (this.streak >= 2) {
              this.hudStreak.setText(`STREAK: ${this.streak}x`);
              this.streakBg.setSize(130, 28).setFillStyle(0xf59e0b, 0.15);
              this.tweens.add({
                targets: this.streakContainer,
                scaleX: { from: 1.3, to: 1 },
                scaleY: { from: 1.3, to: 1 },
                duration: 300,
                ease: "Back.easeOut",
              });
            }

            // Confetti burst — scales with streak
            const confettiCount = Math.min(10 + this.streak * 5, 40);
            this.confettiEmitter.setQuantity(confettiCount);
            this.confettiEmitter.emitParticleAt(box.bg.x, box.bg.y);

            // Sparks
            this.sparkEmitter.setPosition(box.bg.x, box.bg.y);
            this.sparkEmitter.explode(20);

            // Screen shake scales with streak
            const shakeIntensity = Math.min(0.004 + this.streak * 0.003, 0.025);
            this.cameras.main.shake(150, shakeIntensity);

            // Animate correct box sliding right (accepted)
            this.tweens.add({
              targets: [box.bg, box.txt],
              x: W + 200,
              duration: 600,
              ease: "Power2",
              delay: 300,
            });
            // Reject wrong boxes (fall)
            this.answerBoxes.forEach((b, i) => {
              if (i !== idx) {
                b.bg.setFillStyle(0x7f1d1d, 0.5);
                this.tweens.add({
                  targets: [b.bg, b.txt, b.highlight, b.numLabel],
                  y: 800,
                  alpha: 0,
                  duration: 500,
                  ease: "Power2",
                  delay: 200 + i * 80,
                });
              }
            });
          } else {
            this.lives--;
            this.streak = 0;
            this.combo = 1;
            this.hudStreak.setText("");
            this.streakBg.setFillStyle(0x000000, 0);

            // Red flash
            this.answerBoxes[idx].bg.setFillStyle(0xef4444);
            this.answerBoxes[idx].bg.setStrokeStyle(3, 0xef4444);
            // Show correct
            const correctIdx = this.answerBoxes.findIndex(
              (b) => b.optText === q.correct,
            );
            if (correctIdx >= 0) {
              this.answerBoxes[correctIdx].bg.setFillStyle(0x22c55e, 0.5);
              this.answerBoxes[correctIdx].bg.setStrokeStyle(2, 0x22c55e);
            }
            this.fbText.setText("DEFECTIVE PART! The answer was: " + q.correct);
            this.fbText.setColor("#ef4444");
            this.hintText.setText(q.hint);
            sfx.wrong();
            sfx.glassBreak();

            // Dramatic wrong answer effects
            this.cameras.main.shake(350, 0.025);

            // Red screen flash
            this.redFlash.setAlpha(0.35);
            this.tweens.add({
              targets: this.redFlash,
              alpha: 0,
              duration: 500,
            });

            // Smoke
            this.smokeEmitter.setPosition(
              this.answerBoxes[idx].bg.x,
              this.answerBoxes[idx].bg.y,
            );
            this.smokeEmitter.explode(15);

            // Floating wrong text
            this.showFloatingText(W / 2, 400, "DEFECTIVE!", "#ef4444", "30px");

            // Robot turns red briefly
            this.drawRobot(this.robotG, 0xef4444);
            this.time.delayedCall(500, () =>
              this.drawRobot(this.robotG, 0x3b82f6),
            );
          }
          this.updateHUD();
          // Auto advance
          this.time.delayedCall(correct ? 1500 : 2500, () => {
            this.qIndex++;
            if (this.qIndex < this.totalQ && this.lives > 0) {
              this.loadQuestion();
              if (this.difficulty === 2)
                this.conveyorSpeed = Math.min(4, this.conveyorSpeed + 0.1);
            } else {
              this.endGame();
            }
          });
        }

        handleKey(e) {
          if (this.answered) return;
          if (e.key >= "1" && e.key <= "4") {
            const idx = parseInt(e.key) - 1;
            if (
              idx < this.answerBoxes.length &&
              !this.removedChoices.includes(idx)
            )
              this.selectAnswer(idx);
          }
          if (e.key === "q" || e.key === "Q") {
            this.activatePowerUp("fiftyFifty");
          }
          if (e.key === "w" || e.key === "W") {
            this.activatePowerUp("doublePoints");
          }
          if (e.key === "ArrowRight") {
            this.selectedIdx = Math.min(
              this.selectedIdx + 1,
              this.answerBoxes.length - 1,
            );
            if (this.selectedIdx < 0) this.selectedIdx = 0;
            // Skip removed choices
            while (
              this.removedChoices.includes(this.selectedIdx) &&
              this.selectedIdx < this.answerBoxes.length - 1
            ) {
              this.selectedIdx++;
            }
            this.highlightSelected();
          }
          if (e.key === "ArrowLeft") {
            this.selectedIdx = Math.max(this.selectedIdx - 1, 0);
            while (
              this.removedChoices.includes(this.selectedIdx) &&
              this.selectedIdx > 0
            ) {
              this.selectedIdx--;
            }
            this.highlightSelected();
          }
          if (
            e.key === "Enter" &&
            this.selectedIdx >= 0 &&
            !this.removedChoices.includes(this.selectedIdx)
          ) {
            this.submitAnswer(this.selectedIdx);
          }
        }

        highlightSelected() {
          this.answerBoxes.forEach((b, i) => {
            if (this.removedChoices.includes(i)) return;
            if (i === this.selectedIdx) {
              b.bg.setStrokeStyle(3, 0xfbbf24);
              b.highlight.setAlpha(0.15);
            } else {
              b.bg.setStrokeStyle(2, 0x3b82f6);
              b.highlight.setAlpha(0);
            }
          });
          sfx.click();
        }

        updateHUD() {
          this.hudQ.setText(`PART ${this.qIndex + 1}/${this.totalQ}`);
          this.hudScore.setText(`SCORE: ${this.score}`);
          this.hudLives.setText(
            "LIVES: " +
              "■".repeat(Math.max(0, this.lives)) +
              "□".repeat(Math.max(0, 3 - this.lives)),
          );
          if (this.streak < 2) {
            this.hudStreak.setText("");
            this.streakBg.setFillStyle(0x000000, 0);
          }
          this.hudCombo.setText(this.combo > 1 ? `COMBO x${this.combo}` : "");
          const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
          const m = Math.floor(elapsed / 60),
            s = elapsed % 60;
          this.hudTimer.setText(`${m}:${s < 10 ? "0" : ""}${s}`);
        }

        update() {
          // Animate conveyor segments
          this.conveyorParts.forEach((seg) => {
            seg.x -= this.conveyorSpeed;
            if (seg.x < -40) seg.x += 30 * 40;
          });
          // Update timer
          this.updateHUD();
        }

        endGame() {
          const elapsed = Math.floor((Date.now() - this.startTime) / 1000);
          try {
            window.EduPulse &&
              EduPulse.record({
                activityTitle: document.title,
                score: this.totalCorrect,
                maxScore: this.totalQ,
                problemsCorrect: this.totalCorrect,
                problemsAttempted: this.totalQ,
                percent: this.totalQ
                  ? Math.round((this.totalCorrect / this.totalQ) * 100)
                  : 0,
              });
          } catch (e) {}
          this.cameras.main.fadeOut(400);
          this.time.delayedCall(400, () => {
            this.scene.start("Results", {
              score: this.score,
              total: this.totalQ,
              correct: this.totalCorrect,
              bestStreak: this.bestStreak,
              time: elapsed,
              difficulty: this.difficulty,
            });
          });
        }
      }

      // --- RESULTS SCENE ---
      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }
        init(data) {
          this.data = data;
        }
        create() {
          sfx.init();
          const d = this.data;
          const cx = W / 2;
          this.cameras.main.setBackgroundColor("#0f172a");
          const pct = d.total > 0 ? Math.round((d.correct / d.total) * 100) : 0;
          const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : pct >= 50 ? 1 : 0;

          // High score check
          const prevHigh = parseInt(localStorage.getItem(LS_KEY) || "0", 10);
          const isNewHigh = d.score > prevHigh;
          if (isNewHigh && d.score > 0) {
            localStorage.setItem(LS_KEY, String(d.score));
          }

          // Celebration particles
          if (stars >= 2) {
            const burstCount = stars === 3 ? 8 : 5;
            for (let i = 0; i < burstCount; i++) {
              this.time.delayedCall(i * 300, () => {
                const e = this.add.particles(
                  Phaser.Math.Between(200, W - 200),
                  0,
                  "confetti",
                  {
                    speed: { min: 100, max: 300 },
                    angle: { min: 60, max: 120 },
                    scale: { start: 1.5, end: 0.2 },
                    rotate: { min: 0, max: 360 },
                    lifespan: 1500,
                    tint: [0xfbbf24, 0x3b82f6, 0x22c55e, 0xef4444, 0xa78bfa],
                    gravityY: 200,
                    quantity: 20,
                    emitting: false,
                  },
                );
                e.explode(25);
              });
            }
            if (stars === 3) {
              sfx.win3star();
            } else {
              sfx.levelUp();
            }
          } else {
            sfx.gameOver();
          }

          // Title
          const titles = [
            "Keep Practicing!",
            "Good Effort!",
            "Great Work!",
            "FACTORY MASTER!",
          ];
          const titleText = this.add
            .text(cx, 50, titles[stars], {
              fontSize: "42px",
              color: stars >= 2 ? "#fbbf24" : "#94a3b8",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setAlpha(0)
            .setScale(0.5);
          this.tweens.add({
            targets: titleText,
            alpha: 1,
            scale: 1,
            duration: 600,
            ease: "Back.easeOut",
          });

          // Star rating with animated fill
          const starY = 110;
          for (let i = 0; i < 3; i++) {
            const sx = cx - 60 + i * 60;
            this.add
              .text(sx, starY, "☆", {
                fontSize: "48px",
                color: "#334155",
              })
              .setOrigin(0.5);

            if (i < stars) {
              const fullStar = this.add
                .text(sx, starY, "★", {
                  fontSize: "48px",
                  color: "#fbbf24",
                })
                .setOrigin(0.5)
                .setAlpha(0)
                .setScale(0);
              this.tweens.add({
                targets: fullStar,
                alpha: 1,
                scale: 1,
                duration: 400,
                delay: 600 + i * 300,
                ease: "Back.easeOut",
                onStart: () => sfx.click(),
              });
            }
          }

          // NEW HIGH SCORE banner
          if (isNewHigh && d.score > 0) {
            sfx.highScore();
            const hsText = this.add
              .text(cx, 155, "NEW HIGH SCORE!", {
                fontSize: "24px",
                fontStyle: "bold",
                color: "#fbbf24",
                stroke: "#000",
                strokeThickness: 3,
              })
              .setOrigin(0.5);
            this.tweens.add({
              targets: hsText,
              scaleX: { from: 0.8, to: 1.1 },
              scaleY: { from: 0.8, to: 1.1 },
              duration: 600,
              yoyo: true,
              repeat: -1,
            });
          }

          // Score circle
          const circleY = isNewHigh ? 210 : 195;
          this.add
            .circle(cx, circleY, 60, 0x1e293b)
            .setStrokeStyle(4, 0x3b82f6);
          this.add
            .text(cx, circleY - 8, String(pct) + "%", {
              fontSize: "32px",
              color: "#e2e8f0",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          this.add
            .text(cx, circleY + 22, "Accuracy", {
              fontSize: "13px",
              color: "#64748b",
            })
            .setOrigin(0.5);

          // Stats grid
          const statsY = isNewHigh ? 320 : 310;
          const stats = [
            { label: "Score", val: d.score, color: "#fbbf24" },
            {
              label: "Correct",
              val: `${d.correct}/${d.total}`,
              color: "#22c55e",
            },
            { label: "Best Streak", val: d.bestStreak, color: "#f59e0b" },
            {
              label: "Time",
              val: `${Math.floor(d.time / 60)}:${(d.time % 60 < 10 ? "0" : "") + (d.time % 60)}`,
              color: "#94a3b8",
            },
          ];
          stats.forEach((s, i) => {
            const x = cx - 250 + i * 170,
              y = statsY;
            this.add
              .rectangle(x, y, 140, 70, 0x1e293b)
              .setStrokeStyle(1, 0x334155);
            const valText = this.add
              .text(x, y - 12, String(s.val), {
                fontSize: "24px",
                color: s.color,
                fontStyle: "bold",
              })
              .setOrigin(0.5)
              .setAlpha(0);
            this.tweens.add({
              targets: valText,
              alpha: 1,
              y: { from: y - 2, to: y - 12 },
              duration: 400,
              delay: 300 + i * 150,
            });
            this.add
              .text(x, y + 16, s.label, { fontSize: "12px", color: "#64748b" })
              .setOrigin(0.5);
          });

          // Difficulty label
          const diffLabels = ["Easy", "Standard", "Hard"];
          this.add
            .text(cx, statsY + 55, `Mode: ${diffLabels[d.difficulty]}`, {
              fontSize: "14px",
              color: "#475569",
            })
            .setOrigin(0.5);

          // Personal best
          const bestScore = parseInt(localStorage.getItem(LS_KEY) || "0", 10);
          if (bestScore > 0 && !isNewHigh) {
            this.add
              .text(cx, statsY + 78, `Personal Best: ${bestScore}`, {
                fontSize: "13px",
                color: "#64748b",
              })
              .setOrigin(0.5);
          }

          // Buttons
          const btnY = statsY + 120;
          const playAgain = this.add
            .rectangle(cx - 120, btnY, 200, 55, 0x3b82f6)
            .setStrokeStyle(2, 0x60a5fa)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx - 120, btnY, "PLAY AGAIN", {
              fontSize: "18px",
              color: "#fff",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          playAgain.on("pointerdown", () => {
            sfx.click();
            this.cameras.main.fadeOut(300);
            this.time.delayedCall(300, () =>
              this.scene.start("Game", { difficulty: d.difficulty }),
            );
          });
          playAgain.on("pointerover", () => {
            playAgain.setFillStyle(0x2563eb);
            this.tweens.add({
              targets: playAgain,
              scaleX: 1.05,
              scaleY: 1.05,
              duration: 100,
            });
          });
          playAgain.on("pointerout", () => {
            playAgain.setFillStyle(0x3b82f6);
            this.tweens.add({
              targets: playAgain,
              scaleX: 1,
              scaleY: 1,
              duration: 100,
            });
          });

          const menu = this.add
            .rectangle(cx + 120, btnY, 200, 55, 0x334155)
            .setStrokeStyle(2, 0x475569)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx + 120, btnY, "MAIN MENU", {
              fontSize: "18px",
              color: "#94a3b8",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          menu.on("pointerdown", () => {
            sfx.click();
            this.cameras.main.fadeOut(300);
            this.time.delayedCall(300, () => this.scene.start("Title"));
          });
          menu.on("pointerover", () => {
            menu.setFillStyle(0x475569);
            this.tweens.add({
              targets: menu,
              scaleX: 1.05,
              scaleY: 1.05,
              duration: 100,
            });
          });
          menu.on("pointerout", () => {
            menu.setFillStyle(0x334155);
            this.tweens.add({
              targets: menu,
              scaleX: 1,
              scaleY: 1,
              duration: 100,
            });
          });

          // Footer
          this.add
            .text(
              cx,
              H - 30,
              "Expression Engine — Neft Teacher — 6.EE.1–6.EE.4",
              { fontSize: "12px", color: "#475569" },
            )
            .setOrigin(0.5);

          // Keyboard
          this.input.keyboard.on("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") {
              this.cameras.main.fadeOut(300);
              this.time.delayedCall(300, () =>
                this.scene.start("Game", { difficulty: d.difficulty }),
              );
            }
            if (e.key === "Escape") {
              this.cameras.main.fadeOut(300);
              this.time.delayedCall(300, () => this.scene.start("Title"));
            }
          });

          this.cameras.main.fadeIn(600);
        }
      }

      // --- PHASER CONFIG ---
      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#0f172a",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [BootScene, TitleScene, GameScene, ResultsScene],
        physics: {
          default: "arcade",
          arcade: { gravity: { y: 0 }, debug: false },
        },
        input: { keyboard: true, mouse: true, touch: true },
      };
      const game = new Phaser.Game(config);
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
  <script src="/shared/save-resume/save-resume-engine.js" defer></script>
  <!-- nsr-injected:end -->
  <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
  <script src="/assets/game-fx.js" defer></script>
  <!-- gfx-injected:end -->
