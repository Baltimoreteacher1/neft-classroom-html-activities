<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discount Dash — Sale Runner</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body,
      html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0a0a;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      #game {
        width: 100%;
        height: 100%;
      }
    </style>
    <script src="/games/vendor/phaser/phaser-3.80.1.min.js"></script>
    <script>
      if (typeof Phaser === "undefined") {
        document.write(
          '<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"><\/script>',
        );
      }
      window.addEventListener("load", function () {
        if (typeof Phaser === "undefined") {
          document.body.innerHTML =
            '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">⚠️ This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
        }
      });
    </script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <link rel="stylesheet" href="/shared/save-resume/save-resume-styles.css" />
    <!-- nsr-injected:end -->
    <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
    <link rel="stylesheet" href="/assets/game-fx.css" />
    <!-- gfx-injected:end -->
  </head>
  <body>
    <div id="game"></div>
    <script>
      // ───────────────────────────────────────────────────────────
      // DISCOUNT DASH — SALE RUNNER  (Neft Teacher)
      // Grade 6: 6.RP.A.3c — percent of a quantity (discounts, sale price).
      //
      // REAL GAME: A 3-lane endless runner. The shopper sprints down a mall
      // aisle that scrolls toward the player. Deal-pads appear across the
      // lanes, each a SAME item at a different "% off". The player must steer
      // (lane-change) into the lane holding the BEST DEAL — the lowest sale
      // price = original × (1 − pct/100) — and grab it before it whizzes past.
      // Grabbing the cheaper deal banks the savings; grabbing the worse one
      // (or a "full price" trap) costs a life. Speed ramps up, a coin combo
      // builds, and the percent math is the split-second steering decision.
      // ───────────────────────────────────────────────────────────
      const W = 1024,
        H = 768;
      const LS_KEY = "discountdash_runner_hi";
      const LANES = [W / 2 - 240, W / 2, W / 2 + 240];

      // ── Reduced-motion guard (bespoke FX respect prefers-reduced-motion) ──
      // Live-tracked so an OS-level toggle is honored without a reload.
      const RM = { reduce: false };
      try {
        const _mq = window.matchMedia("(prefers-reduced-motion: reduce)");
        RM.reduce = !!_mq.matches;
        const _onRM = (e) => {
          RM.reduce = !!e.matches;
        };
        _mq.addEventListener
          ? _mq.addEventListener("change", _onRM)
          : _mq.addListener && _mq.addListener(_onRM);
      } catch (e) {}
      const reducedMotion = () => RM.reduce;

      class SFX {
        constructor() {
          this.ctx = null;
        }
        init() {
          if (!this.ctx)
            try {
              this.ctx = new (
                window.AudioContext || window.webkitAudioContext
              )();
            } catch (e) {}
        }
        tone(f, d, t = "sine", v = 0.06) {
          if (!this.ctx) return;
          try {
            const o = this.ctx.createOscillator(),
              g = this.ctx.createGain();
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, this.ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(
              0.001,
              this.ctx.currentTime + d,
            );
            o.connect(g);
            g.connect(this.ctx.destination);
            o.start();
            o.stop(this.ctx.currentTime + d);
          } catch (e) {}
        }
        grab() {
          this.tone(660, 0.08, "sine");
          setTimeout(() => this.tone(990, 0.1, "sine"), 60);
        }
        bad() {
          this.tone(150, 0.25, "sawtooth", 0.08);
        }
        swish() {
          this.tone(400, 0.05, "triangle", 0.03);
        }
      }
      const sfx = new SFX();
      const randInt = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
      const money = (n) => "$" + n.toFixed(2);

      // Build a deal-row: an item at one original price, with a different
      // percent-off in each lane. Exactly one lane is the best (lowest) deal.
      function makeRow(round) {
        const items = [
          "👟",
          "🎧",
          "🧥",
          "🎒",
          "⌚",
          "📱",
          "🕹️",
          "👕",
          "🧢",
          "👜",
        ];
        const base = randInt(round < 4 ? 10 : 20, round < 4 ? 60 : 120);
        // percents get closer together as rounds climb (harder to compare)
        const pcts =
          round < 3 ? [10, 25, 50] : round < 6 ? [15, 30, 45] : [20, 35, 40];
        Phaser.Utils.Array.Shuffle(pcts);
        const emoji = Phaser.Utils.Array.GetRandom(items);
        const cells = pcts.map((p) => ({
          pct: p,
          sale: Math.round(base * (1 - p / 100) * 100) / 100,
        }));
        // best deal = lowest sale price
        let bestIdx = 0;
        cells.forEach((c, i) => {
          if (c.sale < cells[bestIdx].sale) bestIdx = i;
        });
        return { emoji, base, cells, bestIdx };
      }

      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          this.scene.start("Title");
        }
      }

      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          this.cameras.main.setBackgroundColor("#10243f");
          this.add
            .text(W / 2, 140, "DISCOUNT DASH", {
              fontFamily: "Segoe UI",
              fontSize: "66px",
              fontStyle: "900",
              color: "#ffe066",
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 208, "SALE RUNNER", {
              fontFamily: "Segoe UI",
              fontSize: "28px",
              fontStyle: "700",
              color: "#74c0fc",
              letterSpacing: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(
              W / 2,
              320,
              "Sprint the aisle. Each row shows the SAME item at\ndifferent % off. Steer into the lane with the\nLOWEST sale price to grab the best deal!",
              {
                fontFamily: "Segoe UI",
                fontSize: "21px",
                color: "#dbe4ff",
                align: "center",
                lineSpacing: 8,
              },
            )
            .setOrigin(0.5);
          this.add
            .text(
              W / 2,
              440,
              "← →  or  A / D  to change lanes    •    sale price = price × (1 − %/100)",
              {
                fontFamily: "Segoe UI",
                fontSize: "18px",
                color: "#94a3b8",
              },
            )
            .setOrigin(0.5);
          const hi = parseInt(localStorage.getItem(LS_KEY) || "0");
          this.add
            .text(W / 2, 500, "Best savings total: " + hi, {
              fontFamily: "Segoe UI",
              fontSize: "18px",
              color: "#ffd43b",
            })
            .setOrigin(0.5);
          const btn = this.add
            .rectangle(W / 2, 600, 280, 70, 0xffe066)
            .setInteractive({ useHandCursor: true });
          const t = this.add
            .text(W / 2, 600, "START SPREE", {
              fontFamily: "Segoe UI",
              fontSize: "28px",
              fontStyle: "800",
              color: "#10243f",
            })
            .setOrigin(0.5);
          this.tweens.add({
            targets: [btn, t],
            scale: 1.05,
            duration: 700,
            yoyo: true,
            repeat: -1,
            ease: "Sine.inOut",
          });
          const go = () => {
            sfx.init();
            this.scene.start("Game");
          };
          btn.on("pointerdown", go);
          this.input.keyboard.once("keydown-ENTER", go);
        }
      }

      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }
        create() {
          this.cameras.main.setBackgroundColor("#10243f");
          this.score = 0;
          this.savings = 0;
          this.lives = 3;
          this.combo = 0;
          this.round = 1;
          this.lane = 1;
          this.speed = 4;
          this.gameOver = false;
          this.rows = [];
          this.rowGap = 360;
          this.distSinceRow = 0;

          // ── Parallax mall storefront background (multi-speed layers) ──
          // Three depth bands of procedural storefronts scroll DOWN with the
          // aisle at different speeds (far = slow). Pure decoration behind the
          // play surface; never intercepts input. Honors reduced-motion.
          this.bgLayers = this.buildStorefronts();
          // Subtle pointer parallax sway of the whole mall (skybox feel).
          this.bgSwayX = 0;
          this.input.on("pointermove", (p) => {
            if (reducedMotion()) return;
            this.bgSwayX = ((p.x / W) * 2 - 1) * 18;
          });

          // scrolling floor stripes
          this.stripes = [];
          for (let i = 0; i < 14; i++) {
            const s = this.add
              .rectangle(
                W / 2,
                i * 60 - 60,
                700,
                30,
                i % 2 ? 0x16335a : 0x12294a,
              )
              .setDepth(0);
            this.stripes.push(s);
          }
          // lane dividers
          for (const lx of [W / 2 - 120, W / 2 + 120]) {
            for (let i = 0; i < 20; i++)
              this.add.rectangle(lx, i * 80, 4, 40, 0x2c4a72, 0.6).setDepth(1);
          }

          // player shopper
          this.player = this.add
            .text(LANES[this.lane], H - 130, "🛒", { fontSize: "70px" })
            .setOrigin(0.5)
            .setDepth(10);

          // HUD
          this.hud = this.add
            .text(20, 16, "", {
              fontFamily: "Segoe UI",
              fontSize: "22px",
              fontStyle: "700",
              color: "#ffe066",
            })
            .setDepth(20);
          this.savHud = this.add
            .text(W - 20, 16, "", {
              fontFamily: "Segoe UI",
              fontSize: "22px",
              fontStyle: "700",
              color: "#51cf66",
            })
            .setOrigin(1, 0)
            .setDepth(20);
          this.comboHud = this.add
            .text(W / 2, 16, "", {
              fontFamily: "Segoe UI",
              fontSize: "20px",
              color: "#ff7eb6",
            })
            .setOrigin(0.5, 0)
            .setDepth(20);

          // input
          this.input.keyboard.on("keydown-LEFT", () => this.move(-1));
          this.input.keyboard.on("keydown-RIGHT", () => this.move(1));
          this.input.keyboard.on("keydown-A", () => this.move(-1));
          this.input.keyboard.on("keydown-D", () => this.move(1));
          this.input.on("pointerdown", (p) => {
            if (p.x < W / 2 - 60) this.move(-1);
            else if (p.x > W / 2 + 60) this.move(1);
          });

          this.spawnRow();
          this.updateHUD();
        }

        // Build procedural mall storefronts in three parallax bands. Returns
        // an array of {container, speed, baseX} ready for the scroll loop.
        buildStorefronts() {
          const cfg = [
            {
              speed: 0.18,
              depth: -12,
              alpha: 0.5,
              fill: 0x102a4d,
              w: 120,
              h: 90,
              gap: 30,
            },
            {
              speed: 0.34,
              depth: -11,
              alpha: 0.7,
              fill: 0x163a66,
              w: 150,
              h: 130,
              gap: 26,
            },
            {
              speed: 0.55,
              depth: -10,
              alpha: 0.85,
              fill: 0x1d4a80,
              w: 190,
              h: 180,
              gap: 22,
            },
          ];
          const accent = [0xffe066, 0x74c0fc, 0xff7eb6, 0x51cf66];
          const layers = [];
          cfg.forEach((band, bi) => {
            const cont = this.add.container(0, 0).setDepth(band.depth);
            const unit = band.w + band.gap;
            const count = Math.ceil(W / unit) + 2;
            const baseY = 50 + (2 - bi) * 12;
            // Vertical wrap distance: one band tall + breathing room. Two
            // stacked copies (one a full span above) make the downward scroll
            // seamless — copy A leaves the top exactly as copy B arrives.
            const span = band.h + 70;
            const drawShop = (x, y, i) => {
              const shop = this.add
                .rectangle(x, y, band.w, band.h, band.fill, band.alpha)
                .setOrigin(0.5, 0);
              cont.add(shop);
              // awning stripe (accent) — the classic mall storefront cue
              const aw = this.add
                .rectangle(
                  x,
                  y + band.h,
                  band.w + 6,
                  10,
                  accent[(i + bi) % accent.length],
                  band.alpha,
                )
                .setOrigin(0.5, 0);
              cont.add(aw);
              // lit "window"
              const wq = this.add
                .rectangle(
                  x,
                  y + band.h * 0.45,
                  band.w * 0.6,
                  band.h * 0.4,
                  0x0a1830,
                  Math.min(1, band.alpha + 0.1),
                )
                .setOrigin(0.5, 0.5);
              cont.add(wq);
            };
            for (let i = 0; i < count; i++) {
              const x = i * unit + band.w / 2;
              drawShop(x, baseY, i); // copy B (on-screen)
              drawShop(x, baseY - span, i); // copy A (one span above)
            }
            layers.push({ cont, speed: band.speed, span });
          });
          return layers;
        }

        move(dir) {
          const nl = Phaser.Math.Clamp(this.lane + dir, 0, 2);
          if (nl !== this.lane) {
            this.lane = nl;
            sfx.swish();
            this.tweens.add({
              targets: this.player,
              x: LANES[this.lane],
              duration: 120,
              ease: "Quad.out",
            });
          }
        }

        spawnRow() {
          const data = makeRow(this.round);
          const y = -120;
          const cells = data.cells.map((cell, i) => {
            const c = this.add.container(LANES[i], y).setDepth(5);
            const pad = this.add
              .rectangle(0, 0, 200, 150, 0x1d3a63)
              .setStrokeStyle(3, 0x3b6cb5);
            const emo = this.add
              .text(0, -42, data.emoji, { fontSize: "40px" })
              .setOrigin(0.5);
            const wasT = this.add
              .text(0, 2, money(data.base), {
                fontFamily: "Segoe UI",
                fontSize: "16px",
                color: "#94a3b8",
              })
              .setOrigin(0.5);
            wasT.setStyle({ fontStyle: "italic" });
            const pctT = this.add
              .text(0, 26, cell.pct + "% OFF", {
                fontFamily: "Segoe UI",
                fontSize: "24px",
                fontStyle: "900",
                color: "#ffe066",
              })
              .setOrigin(0.5);
            c.add([pad, emo, wasT, pctT]);
            // ── Deal card eased rotation/flip on approach ──
            // Each pad flips open (scaleY 0→1) with a small lean as the row
            // appears, then settles flat. Cosmetic only: the y-scroll in
            // update() owns position, so we only animate scaleY/angle here.
            if (reducedMotion()) {
              c.setScale(1).setAngle(0);
            } else {
              c.setScale(1, 0.05);
              c.setAngle(i === 0 ? -8 : i === 2 ? 8 : 0);
              this.tweens.add({
                targets: c,
                scaleY: 1,
                angle: 0,
                duration: 360,
                delay: i * 70,
                ease: "Back.out",
              });
            }
            return c;
          });
          this.rows.push({ data, cells, y, scored: false });
        }

        grabCell(row, laneIdx) {
          row.scored = true;
          const rm = reducedMotion();
          const isBest = laneIdx === row.data.bestIdx;
          if (isBest) {
            const saved = row.data.base - row.data.cells[laneIdx].sale;
            this.combo++;
            const pts = 100 + this.combo * 15;
            this.score += pts;
            const prevSav = this.savings;
            this.savings += saved;
            sfx.grab();
            this.popText(
              "BEST DEAL!  saved " + money(saved) + "  +" + pts,
              "#51cf66",
            );
            // ── Best-deal lane gold glow (revealed only AFTER the grab, so it
            // never gives away the answer) — pulses around the grabbed pad. ──
            this.flashBestLane(row.cells[laneIdx]);
            // Animated savings ticker counts the HUD up to the new total.
            this.tickSavings(prevSav, this.savings);
            // Combo multiplier badge scaling pop.
            this.popCombo();
            // DOM-level spark burst over the canvas via the shared FX kit.
            try {
              window.GameFX && window.GameFX.celebrate(this.game.canvas);
            } catch (e) {}
            // sparkle (capped; skipped under reduced-motion)
            if (!rm) {
              for (let i = 0; i < 10; i++) {
                const s = this.add
                  .rectangle(this.player.x, this.player.y, 4, 4, 0xffe066)
                  .setDepth(15);
                this.tweens.add({
                  targets: s,
                  x: this.player.x + randInt(-90, 90),
                  y: this.player.y + randInt(-90, 20),
                  alpha: 0,
                  duration: 500,
                  onComplete: () => s.destroy(),
                });
              }
            }
          } else {
            this.combo = 0;
            this.lives--;
            sfx.bad();
            if (!rm) this.cameras.main.shake(160, 0.008);
            // ── Wrong-deal brief red flash overlay ──
            this.wrongFlash();
            const best = row.data.cells[row.data.bestIdx];
            this.popText(
              "Overpaid! Best was " +
                best.pct +
                "% off (" +
                money(best.sale) +
                ")",
              "#ff6b6b",
            );
          }
          this.updateHUD();
          if (this.lives <= 0) this.endGame();
        }

        // Gold glow + quick pop around the pad the player correctly grabbed.
        flashBestLane(cell) {
          if (!cell || !cell.active) return;
          if (reducedMotion()) {
            // static, readable confirmation outline only
            const g = this.add
              .rectangle(cell.x, cell.y, 224, 174, 0xffe066, 0.18)
              .setStrokeStyle(4, 0xffe066, 0.9)
              .setDepth(4);
            this.time.delayedCall(450, () => g.destroy());
            return;
          }
          const glow = this.add
            .rectangle(cell.x, cell.y, 220, 170, 0xffe066, 0.0)
            .setStrokeStyle(5, 0xffe066, 0.95)
            .setDepth(4);
          // keep the glow pinned to the (still-scrolling) grabbed pad
          const follow = () => {
            if (cell.active) glow.y = cell.y;
          };
          this.events.on("update", follow);
          this.tweens.add({
            targets: glow,
            scaleX: 1.18,
            scaleY: 1.18,
            fillAlpha: 0.28,
            alpha: 0,
            duration: 620,
            ease: "Quad.out",
            onComplete: () => {
              this.events.off("update", follow);
              glow.destroy();
            },
          });
          if (cell.active) {
            this.tweens.add({
              targets: cell,
              scaleX: 1.12,
              scaleY: 1.12,
              yoyo: true,
              duration: 150,
              ease: "Quad.out",
            });
          }
        }

        // Animated savings ticker — eases the SAVED HUD value upward.
        tickSavings(from, to) {
          if (this.savTween) this.savTween.remove();
          if (reducedMotion()) {
            this.savHud.setText("SAVED  " + money(to));
            return;
          }
          const obj = { v: from };
          this.savTween = this.tweens.add({
            targets: obj,
            v: to,
            duration: 500,
            ease: "Cubic.out",
            onUpdate: () => this.savHud.setText("SAVED  " + money(obj.v)),
            onComplete: () => this.savHud.setText("SAVED  " + money(to)),
          });
          try {
            window.GameFX && window.GameFX.pop(this.game.canvas);
          } catch (e) {}
        }

        // Combo multiplier badge scaling — bigger pop for bigger combos.
        popCombo() {
          if (this.combo < 2 || reducedMotion()) return;
          const k = Math.min(1.6, 1.2 + this.combo * 0.05);
          this.comboHud.setScale(1);
          this.tweens.add({
            targets: this.comboHud,
            scaleX: k,
            scaleY: k,
            yoyo: true,
            duration: 170,
            ease: "Back.out",
          });
        }

        // Brief full-screen red flash on a wrong (overpaid) grab.
        wrongFlash() {
          const f = this.add
            .rectangle(
              W / 2,
              H / 2,
              W,
              H,
              0xff3b3b,
              reducedMotion() ? 0.12 : 0.3,
            )
            .setDepth(30);
          this.tweens.add({
            targets: f,
            alpha: 0,
            duration: reducedMotion() ? 220 : 320,
            ease: "Quad.out",
            onComplete: () => f.destroy(),
          });
        }

        popText(msg, color) {
          const t = this.add
            .text(W / 2, H - 230, msg, {
              fontFamily: "Segoe UI",
              fontSize: "26px",
              fontStyle: "800",
              color,
              backgroundColor: "#0a1830",
              padding: { x: 14, y: 6 },
            })
            .setOrigin(0.5)
            .setDepth(25);
          this.tweens.add({
            targets: t,
            y: H - 290,
            alpha: 0,
            duration: 1100,
            onComplete: () => t.destroy(),
          });
        }

        updateHUD() {
          this.hud.setText(
            "SCORE " +
              this.score +
              "    " +
              "♥".repeat(Math.max(0, this.lives)),
          );
          // Skip while the savings ticker tween is mid-count so it isn't
          // clobbered; it lands on the exact total in its onComplete.
          if (!(this.savTween && this.savTween.isPlaying())) {
            this.savHud.setText("SAVED  " + money(this.savings));
          }
          this.comboHud.setText(
            "ROUND " + this.round + (this.combo > 1 ? "   x" + this.combo : ""),
          );
        }

        endGame() {
          this.gameOver = true;
          const hi = parseInt(localStorage.getItem(LS_KEY) || "0");
          if (this.score > hi) localStorage.setItem(LS_KEY, this.score);
          try {
            window.EduPulse &&
              EduPulse.record({
                activityTitle: document.title,
                score: this.score,
              });
          } catch (e) {}
          this.scene.start("Results", {
            score: this.score,
            savings: this.savings,
          });
        }

        update(time, delta) {
          if (this.gameOver) return;
          const dt = delta / 16.67;
          const v = this.speed * dt;
          const rm = reducedMotion();

          // ── Parallax storefront drift (far layers move slower) ──
          // Under reduced-motion we freeze the drift but keep the scenery.
          if (this.bgLayers) {
            const swayTarget = rm ? 0 : this.bgSwayX || 0;
            this.bgLayers.forEach((L) => {
              if (!rm) {
                L.cont.y += v * L.speed;
                if (L.cont.y >= L.span) L.cont.y -= L.span;
              }
              // ease container x toward parallax sway target
              L.cont.x += (swayTarget * L.speed - L.cont.x) * 0.08;
            });
          }

          // scroll stripes
          this.stripes.forEach((s) => {
            s.y += v;
            if (s.y > H + 30) s.y -= 14 * 60;
          });

          // move rows down, detect grab line near player
          for (let i = this.rows.length - 1; i >= 0; i--) {
            const row = this.rows[i];
            row.y += v;
            row.cells.forEach((c) => (c.y = row.y));
            // grab zone aligned to player row
            if (!row.scored && row.y >= H - 150) {
              this.grabCell(row, this.lane);
            }
            if (row.y > H + 100) {
              row.cells.forEach((c) => c.destroy());
              this.rows.splice(i, 1);
            }
          }

          // spawn next row by distance
          this.distSinceRow += v;
          if (this.distSinceRow >= this.rowGap) {
            this.distSinceRow = 0;
            this.round++;
            this.speed = Math.min(9, 4 + this.round * 0.25);
            this.spawnRow();
            this.updateHUD();
          }
        }
      }

      class ResultsScene extends Phaser.Scene {
        constructor() {
          super("Results");
        }
        init(d) {
          this.r = d || {};
        }
        create() {
          this.cameras.main.setBackgroundColor("#10243f");
          this.add
            .text(W / 2, 200, "CHECKOUT!", {
              fontFamily: "Segoe UI",
              fontSize: "60px",
              fontStyle: "900",
              color: "#ffe066",
            })
            .setOrigin(0.5);
          this.add
            .text(W / 2, 300, "Score: " + (this.r.score || 0), {
              fontFamily: "Segoe UI",
              fontSize: "34px",
              color: "#ffffff",
            })
            .setOrigin(0.5);
          this.add
            .text(
              W / 2,
              360,
              "Total saved: $" + (this.r.savings || 0).toFixed(2),
              {
                fontFamily: "Segoe UI",
                fontSize: "26px",
                color: "#51cf66",
              },
            )
            .setOrigin(0.5);
          this.add
            .text(W / 2, 410, "Best: " + localStorage.getItem(LS_KEY), {
              fontFamily: "Segoe UI",
              fontSize: "20px",
              color: "#74c0fc",
            })
            .setOrigin(0.5);
          this.add
            .text(
              W / 2,
              470,
              "Best deal = lowest sale price = price × (1 − % off ÷ 100).",
              {
                fontFamily: "Segoe UI",
                fontSize: "18px",
                color: "#94a3b8",
              },
            )
            .setOrigin(0.5);
          const btn = this.add
            .rectangle(W / 2, 560, 240, 64, 0xffe066)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2, 560, "SHOP AGAIN", {
              fontFamily: "Segoe UI",
              fontSize: "26px",
              fontStyle: "800",
              color: "#10243f",
            })
            .setOrigin(0.5);
          btn.on("pointerdown", () => this.scene.start("Title"));
          this.input.keyboard.once("keydown-ENTER", () =>
            this.scene.start("Title"),
          );
        }
      }

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: "game",
        backgroundColor: "#10243f",
        scale: {
          mode: Phaser.Scale.FIT,
          autoCenter: Phaser.Scale.CENTER_BOTH,
        },
        scene: [BootScene, TitleScene, GameScene, ResultsScene],
      };
      new Phaser.Game(config);
    </script>
