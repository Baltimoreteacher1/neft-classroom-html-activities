        }
        .aa-star {
          animation: none !important;
          opacity: 0.4 !important;

      }
      #aa-sr {
        position: absolute;

  <body>
    <!-- Decorative animated star-field (behind the Phaser canvas). -->
    <div id="aa-bg" data-parallax aria-hidden="true">
      <div id="aa-bg-layer" data-parallax-layer></div>
    </div>
    <!-- Screen-reader live region: mirrors the current shape + result. -->
    <div id="aa-sr" role="status" aria-live="polite"></div>
    <script>
      // Decorative star-field builder (reduced-motion safe; pointer-neutral).
      (function () {
        "use strict";
        var reduceMQ =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)");
        var layer = document.getElementById("aa-bg-layer");
        if (!layer) return;
        function rnd(a, b) {
          return a + Math.random() * (b - a);
        }
        function build() {
          layer.textContent = "";
          var reduce = !!(reduceMQ && reduceMQ.matches);
          var n = reduce ? 16 : 34;
          for (var i = 0; i < n; i++) {
            var s = document.createElement("div");
            s.className = "aa-star";
            var sz = rnd(1.5, 4);
            s.style.width = s.style.height = sz.toFixed(1) + "px";
            s.style.left = rnd(0, 100).toFixed(2) + "%";
            s.style.top = rnd(0, 100).toFixed(2) + "%";
            s.style.setProperty("--tw", rnd(2.2, 5).toFixed(2) + "s");
            s.style.animationDelay = "-" + rnd(0, 4).toFixed(2) + "s";
            layer.appendChild(s);
          }
        }
        build();
        var driver = false;
        function onMove(e) {
          var dx = e.clientX / (window.innerWidth || 1) - 0.5;
          var dy = e.clientY / (window.innerHeight || 1) - 0.5;
          layer.style.transform =
            "translate3d(" +
            (dx * 20).toFixed(2) +
            "px," +
            (dy * 12).toFixed(2) +
            "px,0)";
        }
        function attach() {
          if (driver || (reduceMQ && reduceMQ.matches)) return;
          driver = true;
          window.addEventListener("pointermove", onMove, { passive: true });
        }
        function detach() {
          if (!driver) return;
          driver = false;
          window.removeEventListener("pointermove", onMove);
          layer.style.transform = "";
        }
        attach();
        if (reduceMQ) {
          var onChange = function () {
            build();
            if (reduceMQ.matches) detach();
            else attach();
          };
          if (reduceMQ.addEventListener)
            reduceMQ.addEventListener("change", onChange);
          else if (reduceMQ.addListener) reduceMQ.addListener(onChange);
        }
        var rt;
        window.addEventListener("resize", function () {
          clearTimeout(rt);
          rt = setTimeout(build, 200);
        });
      })();
    </script>
    <script>
      // ── AREA ATTACK — BRICK CANNON ──
      // Phaser 3 — Grade 6 Math — Area of rectangles, parallelograms,
      // triangles, trapezoids (6.G.1).
      // Mechanic: a shape (with labeled dimensions) is drawn at the bottom.
      // Three or four answer-targets drift across the sky. Aim the cannon
      // (rotate left/right) and fire a brick at the target that shows the
      // shape's correct area. Hit the right one = build a tower; hit a wrong
      // one or miss everything = lose a life. Targets move faster each level.

      const W = 820,
        H = 600;
      const LS_KEY = "aa_brick_cannon_highscore";

      const SFX = {
        ctx: null,
        init() {
          if (!this.ctx)
            try {
              this.ctx = new (window.AudioContext ||
                window.webkitAudioContext)();
            } catch (e) {}
        },
        play(t, f, d, v = 0.18) {
          if (!this.ctx) return;
          try {
            const c = this.ctx,
              o = c.createOscillator(),
              g = c.createGain();
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
            o.connect(g);
            g.connect(c.destination);
            o.start();
            o.stop(c.currentTime + d);
          } catch (e) {}
        },
        fire() {
          this.play("square", 180, 0.08, 0.12);
        },
        good() {
          this.play("sine", 660, 0.1, 0.25);
          this.play("sine", 880, 0.14, 0.2);
        },
        bad() {
          this.play("sawtooth", 200, 0.25, 0.18);
          this.play("sawtooth", 150, 0.3, 0.14);
        },
        level() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.15, 0.22), i * 70),
          );
        },
        win() {
          [523, 659, 784, 1047, 1318].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.25, 0.25), i * 110),
          );
        },
        lose() {
          [400, 330, 260, 200].forEach((f, i) =>
            setTimeout(() => this.play("sawtooth", f, 0.3, 0.14), i * 170),
          );
        },
      };

      function randInt(a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a;
      }
      function shuffle(a) {
        const r = [...a];
        for (let i = r.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [r[i], r[j]] = [r[j], r[i]];
        }
        return r;
      }
      function srSay(msg) {
        const el = document.getElementById("aa-sr");
        if (el) el.textContent = msg;
      }

      // ── Shape generator ────────────────────────────────────────────────
      // Returns { type, prompt, formula, area(int), shapeData, options:[ints] }
      // Dimensions chosen so every area is a whole number (triangle/trapezoid
      // use even products → integer area). Level controls which types appear.
      function generateShape(level) {
        const types =
          level <= 2
            ? ["rectangle", "parallelogram"]
            : level <= 4
              ? ["rectangle", "parallelogram", "triangle"]
              : ["rectangle", "parallelogram", "triangle", "trapezoid"];
        const type = types[randInt(0, types.length - 1)];
        const maxDim = level <= 2 ? 12 : level <= 4 ? 16 : 22;
        const minDim = 3;

        let prompt, formula, area, shapeData;
        if (type === "rectangle") {
          const b = randInt(minDim, maxDim),
            h = randInt(minDim, maxDim);
          area = b * h;
          prompt = "Rectangle  base " + b + ",  height " + h;
          formula = "A = b × h";
          shapeData = { type, b, h };
        } else if (type === "parallelogram") {
          const b = randInt(minDim, maxDim),
            h = randInt(minDim, maxDim);
          area = b * h;
          prompt = "Parallelogram  base " + b + ",  height " + h;
          formula = "A = b × h";
          shapeData = { type, b, h };
        } else if (type === "triangle") {
          // Force integer area: ensure b*h is even.
          let b = randInt(minDim, maxDim),
            h = randInt(minDim, maxDim);
          if ((b * h) % 2 !== 0) h = h + 1; // bump height so product even
          area = (b * h) / 2;
          prompt = "Triangle  base " + b + ",  height " + h;
          formula = "A = ½ × b × h";
          shapeData = { type, b, h };
        } else {
          // Trapezoid: (b1+b2)*h/2; force (b1+b2)*h even for integer area.
          let b1 = randInt(minDim, maxDim),
            b2 = randInt(minDim, maxDim),
            h = randInt(minDim, maxDim);
          if (((b1 + b2) * h) % 2 !== 0) h = h + 1;
          area = ((b1 + b2) * h) / 2;
          prompt =
            "Trapezoid  bases " + b1 + " & " + b2 + ",  height " + h;
          formula = "A = ½ (b₁ + b₂) × h";
          shapeData = { type, b1, b2, h };
        }

        // Build 4 distinct positive integer options including the area.
        const seen = new Set([area]);
        const opts = [area];
        // Common misconception distractors (forgot ½, used perimeter, etc.).
        const pool = [
          area * 2,
          Math.round(area / 2),
          area + randInt(2, 9),
          area - randInt(2, 9),
          area + randInt(10, 20),
        ];
        for (const v of shuffle(pool)) {
          if (opts.length >= 4) break;
          if (v > 0 && Number.isInteger(v) && !seen.has(v)) {
            seen.add(v);
            opts.push(v);
          }
        }
        let g = 1;
        while (opts.length < 4 && g < 60) {
          const v = area + g;
          if (v > 0 && !seen.has(v)) {
            seen.add(v);
            opts.push(v);
          }
          g++;
        }
        return {
          type,
          prompt,
          formula,
          area,
          shapeData,
          options: shuffle(opts.slice(0, 4)),
        };
      }

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#0c1c30",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [BootScene, TitleScene, GameScene, ResultScene],
      };

      function BootScene() {
        return new Phaser.Scene("Boot");
      }
      BootScene.prototype = Object.create(Phaser.Scene.prototype);
      BootScene.prototype.constructor = BootScene;
      BootScene.prototype.create = function () {
        const g = this.make.graphics({ add: false });
        g.fillStyle(0xffffff);
        g.fillCircle(4, 4, 4);
        g.generateTexture("dot", 8, 8);
        g.clear();
        g.fillStyle(0xff8844);
        g.fillRect(0, 0, 14, 14);
        g.generateTexture("chunk", 14, 14);
        g.destroy();
        this.scene.start("Title");
      };

      function TitleScene() {
        return new Phaser.Scene("Title");
      }
      TitleScene.prototype = Object.create(Phaser.Scene.prototype);
      TitleScene.prototype.constructor = TitleScene;
      TitleScene.prototype.create = function () {
        const cx = W / 2;
        this.add.rectangle(cx, H / 2, W, H, 0x0c1c30);
        this.add
          .text(cx, 120, "AREA ATTACK", {
            fontFamily: "Impact, sans-serif",
            fontSize: "64px",
            color: "#4488ff",
            stroke: "#060f1a",
            strokeThickness: 6,
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 175, "Brick Cannon", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "26px",
            color: "#88ccaa",
          })
          .setOrigin(0.5);
        this.add
          .text(
            cx,
            235,
            "Find the area of the shape, then AIM the cannon and FIRE\na brick at the target with the matching area!",
            {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "16px",
              color: "#cfe0f0",
              align: "center",
            },
          )
          .setOrigin(0.5);
        this.add
          .text(cx, 295, "← → aim · SPACE fire · 6.G.1 · Lessons 5.1–5.5", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "14px",
            color: "#7fa0c0",
          })
          .setOrigin(0.5);

        const hs = localStorage.getItem(LS_KEY);
        if (hs)
          this.add
            .text(cx, 330, "High Score: " + hs, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "16px",
              color: "#ffd24a",
              fontStyle: "bold",
            })
            .setOrigin(0.5);

        const btn = this.add
          .rectangle(cx, 400, 240, 58, 0x1a6fb5)
          .setInteractive({ useHandCursor: true });
        const btnT = this.add
          .text(cx, 400, "START ▶", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "24px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);
        this.tweens.add({
          targets: [btn, btnT],
          scaleX: 1.05,
          scaleY: 1.05,
          duration: 800,
          yoyo: true,
          repeat: -1,
        });
        const start = () => {
          SFX.init();
          SFX.fire();
          this.scene.start("Game");
        };
        btn.on("pointerover", () => btn.setFillStyle(0x2484d0));
        btn.on("pointerout", () => btn.setFillStyle(0x1a6fb5));
        btn.on("pointerdown", start);
        this.input.keyboard.on("keydown-SPACE", start);
        this.input.keyboard.on("keydown-ENTER", start);

        const hub = this.add
          .text(cx, 540, "← Back to Math Games", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "15px",
            color: "#7fa0c0",
          })
          .setOrigin(0.5)
          .setInteractive({ useHandCursor: true });
        hub.on("pointerover", () => hub.setColor("#4488ff"));
        hub.on("pointerout", () => hub.setColor("#7fa0c0"));
        hub.on("pointerdown", () => (window.location.href = "/math/games/"));
        srSay("Area Attack Brick Cannon. Press Start to play.");
      };

      function GameScene() {
        return new Phaser.Scene("Game");
      }
      GameScene.prototype = Object.create(Phaser.Scene.prototype);
      GameScene.prototype.constructor = GameScene;

      GameScene.prototype.init = function () {
        this.reduceMotion = !!(
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches
        );
        this.score = 0;
        this.lives = 3;
        this.streak = 0;
        this.level = 1;
        this.solved = 0;
        this.target = 10;
        this.angle = -90; // degrees, straight up
        this.targets = [];
        this.brick = null; // active projectile
        this.locked = false;
        this.problem = null;
      };

      GameScene.prototype.create = function () {
        this.add.rectangle(W / 2, H / 2, W, H, 0x0c1c30);
        // Ground
        this.add.rectangle(W / 2, H - 12, W, 24, 0x16345a);

        const hudStyle = {
          fontFamily: "Segoe UI, sans-serif",
          fontSize: "18px",
          fontStyle: "bold",
        };
        this.scoreText = this.add.text(16, 12, "Score: 0", {
          ...hudStyle,
          color: "#88ccaa",
        });
        this.livesText = this.add.text(16, 36, "❤❤❤", {
          ...hudStyle,
          color: "#ff8f8f",
        });
        this.streakText = this.add
          .text(W - 16, 12, "Streak: 0", { ...hudStyle, color: "#ffd24a" })
          .setOrigin(1, 0);
        this.levelText = this.add
          .text(W - 16, 36, "Level 1", { ...hudStyle, color: "#cfe0f0" })
          .setOrigin(1, 0);
        this.progressText = this.add
          .text(W / 2, 12, "0 / " + this.target, {
            ...hudStyle,
            color: "#cfe0f0",
          })
          .setOrigin(0.5, 0);

        // Shape panel (bottom-left)
        this.shapeG = this.add.graphics();
        this.promptText = this.add
          .text(150, 470, "", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "15px",
            fontStyle: "bold",
            color: "#ffffff",
            align: "center",
            wordWrap: { width: 260 },
          })
          .setOrigin(0.5);
        this.formulaText = this.add
          .text(150, 510, "", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "14px",
            color: "#88ccaa",
          })
          .setOrigin(0.5);

        this.feedback = this.add
          .text(W / 2, 90, "", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "18px",
            fontStyle: "bold",
            color: "#ffd24a",
            stroke: "#060f1a",
            strokeThickness: 3,
            align: "center",
            wordWrap: { width: 600 },
          })
          .setOrigin(0.5)
          .setAlpha(0);

        // Cannon at bottom-center
        this.cannonX = W / 2 + 230;
        this.cannonY = H - 24;
        this.add.circle(this.cannonX, this.cannonY, 26, 0x2d5a8c);
        this.barrel = this.add.rectangle(
          this.cannonX,
          this.cannonY,
          60,
          16,
          0x4488ff,
        );
        this.barrel.setOrigin(0, 0.5);
        this.barrel.setStrokeStyle(2, 0xbcd8ff);

        // Particles
        this.burst = this.add
          .particles(0, 0, "chunk", {
            speed: { min: 80, max: 260 },
            angle: { min: 0, max: 360 },
            scale: { start: 1, end: 0 },
            rotate: { min: 0, max: 360 },
            lifespan: 700,
            emitting: false,
            quantity: 18,
            gravityY: 240,
            tint: [0xff8844, 0x4488ff, 0xffd24a, 0x88ccaa],
          })
          .setDepth(20);

        this.redFlash = this.add
          .rectangle(W / 2, H / 2, W, H, 0xff3333, 0)
          .setDepth(30);

        // Input
        this.cursors = this.input.keyboard.createCursorKeys();
        this.keyA = this.input.keyboard.addKey(
          Phaser.Input.Keyboard.KeyCodes.A,
        );
        this.keyD = this.input.keyboard.addKey(
          Phaser.Input.Keyboard.KeyCodes.D,
        );
        this.input.keyboard.on("keydown-SPACE", () => this.fire());
        // Pointer: aim toward pointer, click to fire.
        this.input.on("pointermove", (p) => {
          this.aimAt(p.x, p.y);
        });
        this.input.on("pointerdown", (p) => {
          this.aimAt(p.x, p.y);
          this.fire();
        });

        this.cameras.main.fadeIn(400);
        this.newProblem();
      };

      GameScene.prototype.aimAt = function (x, y) {
        const a =
          (Math.atan2(y - this.cannonY, x - this.cannonX) * 180) / Math.PI;
        // Clamp to upper hemisphere (between -170 and -10 degrees).
        this.angle = Phaser.Math.Clamp(a, -170, -10);
      };

      GameScene.prototype.newProblem = function () {
        this.locked = false;
        this.brick = null;
        this.clearTargets();
        this.problem = generateShape(this.level);
        this.drawShape();
        this.promptText.setText(this.problem.prompt);
        this.formulaText.setText(this.problem.formula + " = ? sq units");
        srSay(
          this.problem.prompt +
            ". " +
            this.problem.formula +
            ". Aim and fire at the correct area.",
        );

        // Spawn drifting targets across the sky.
        const ys = shuffle([130, 180, 230, 280]);
        const dir = [];
        this.problem.options.forEach((opt, i) => {
          const fromLeft = Math.random() < 0.5;
          const x = fromLeft ? -40 : W + 40;
          const y = ys[i];
          const speed =
            (40 + (this.level - 1) * 10 + randInt(0, 20)) *
            (fromLeft ? 1 : -1);
          const circ = this.add.circle(x, y, 34, 0x16345a);
          circ.setStrokeStyle(3, 0x4488ff);
          const txt = this.add
            .text(x, y, String(opt), {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "20px",
              fontStyle: "bold",
              color: "#ffffff",
            })
            .setOrigin(0.5);
          this.targets.push({ circ, txt, value: opt, vx: speed });
        });
      };

      GameScene.prototype.drawShape = function () {
        const g = this.shapeG;
        g.clear();
        const sd = this.problem.shapeData;
        const cx = 150,
          cy = 380;
        g.fillStyle(0x2d6a9c, 0.9);
        g.lineStyle(3, 0xbcd8ff, 1);
        const s = 7; // px per unit (visual only)
        if (sd.type === "rectangle") {
          const w = Math.min(sd.b * s, 180),
            h = Math.min(sd.h * s, 120);
          g.fillRect(cx - w / 2, cy - h / 2, w, h);
          g.strokeRect(cx - w / 2, cy - h / 2, w, h);
        } else if (sd.type === "parallelogram") {
          const w = Math.min(sd.b * s, 160),
            h = Math.min(sd.h * s, 110),
            sk = 22;
          g.beginPath();
          g.moveTo(cx - w / 2 + sk, cy - h / 2);
          g.lineTo(cx + w / 2 + sk, cy - h / 2);
          g.lineTo(cx + w / 2 - sk, cy + h / 2);
          g.lineTo(cx - w / 2 - sk, cy + h / 2);
          g.closePath();
          g.fillPath();
          g.strokePath();
        } else if (sd.type === "triangle") {
          const w = Math.min(sd.b * s, 170),
            h = Math.min(sd.h * s, 120);
          g.beginPath();
          g.moveTo(cx, cy - h / 2);
          g.lineTo(cx + w / 2, cy + h / 2);
          g.lineTo(cx - w / 2, cy + h / 2);
          g.closePath();
          g.fillPath();
          g.strokePath();
        } else {
          const w1 = Math.min(sd.b1 * s, 100),
            w2 = Math.min(sd.b2 * s, 170),
            h = Math.min(sd.h * s, 110);
          g.beginPath();
          g.moveTo(cx - w1 / 2, cy - h / 2);
          g.lineTo(cx + w1 / 2, cy - h / 2);
          g.lineTo(cx + w2 / 2, cy + h / 2);
          g.lineTo(cx - w2 / 2, cy + h / 2);
          g.closePath();
          g.fillPath();
          g.strokePath();
        }
      };

      GameScene.prototype.clearTargets = function () {
        this.targets.forEach((t) => {
          t.circ.destroy();
          t.txt.destroy();
        });
        this.targets = [];
      };

      GameScene.prototype.fire = function () {
        if (this.locked || this.brick) return;
        SFX.fire();
        const rad = (this.angle * Math.PI) / 180;
        const tipX = this.cannonX + Math.cos(rad) * 60;
        const tipY = this.cannonY + Math.sin(rad) * 60;
        const speed = 720;
        const b = this.add.circle(tipX, tipY, 12, 0xff8844);
        b.setStrokeStyle(2, 0xffd24a);
        this.brick = {
          obj: b,
          vx: Math.cos(rad) * speed,
          vy: Math.sin(rad) * speed,
        };
      };

      GameScene.prototype.update = function (time, delta) {
        const dt = delta / 1000;

        // Cannon aim with keys.
        if (this.cursors.left.isDown || this.keyA.isDown) this.angle -= 90 * dt;
        else if (this.cursors.right.isDown || this.keyD.isDown)
          this.angle += 90 * dt;
        this.angle = Phaser.Math.Clamp(this.angle, -170, -10);
        this.barrel.rotation = (this.angle * Math.PI) / 180;

        if (this.locked) return;

        // Move targets, wrap around edges.
        for (const t of this.targets) {
          t.circ.x += t.vx * dt;
          t.txt.x = t.circ.x;
          if (t.vx > 0 && t.circ.x > W + 50) t.circ.x = -50;
          if (t.vx < 0 && t.circ.x < -50) t.circ.x = W + 50;
        }

        // Move brick, test collisions.
        if (this.brick) {
          const b = this.brick.obj;
          b.x += this.brick.vx * dt;
          b.y += this.brick.vy * dt;
          // Hit test against targets.
          for (const t of this.targets) {
            const d = Phaser.Math.Distance.Between(b.x, b.y, t.circ.x, t.circ.y);
            if (d <= 34 + 12) {
              this.resolveHit(t);
              return;
            }
          }
          // Off-screen miss.
          if (b.x < -30 || b.x > W + 30 || b.y < -30) {
            b.destroy();
            this.brick = null;
            // A whiff isn't a life loss; the player can re-aim and fire again.
            srSay("Missed all targets. Aim again and fire.");
          }
        }
      };

      GameScene.prototype.resolveHit = function (t) {
        this.locked = true;
        if (this.brick) {
          this.burst.setPosition(this.brick.obj.x, this.brick.obj.y);
          this.burst.explode(18);
          this.brick.obj.destroy();
          this.brick = null;
        }
        const correct = t.value === this.problem.area;
        if (correct) {
          SFX.good();
          this.solved++;
          this.streak++;
          const bonus = Math.min(this.streak, 5) * 5;
          this.score += 25 + bonus;
          this.flash(t.circ.x, t.circ.y, "+1 ✓", "#88ccaa");
          this.feedback
            .setText(
              "Correct! Area = " +
                this.problem.area +
                " sq units  (" +
                this.problem.formula +
                ")",
            )
            .setAlpha(1);
          srSay("Correct. The area is " + this.problem.area + " square units.");
        } else {
          SFX.bad();
          this.streak = 0;
          this.lives--;
          this.flashRed();
          this.flash(t.circ.x, t.circ.y, "✗", "#ff8f8f");
          this.feedback
            .setText(
              "Not that one. Correct area = " + this.problem.area + " sq units.",
            )
            .setAlpha(1);
          srSay(
            "Wrong target. The correct area was " +
              this.problem.area +
              " square units.",
          );
        }
        this.afterAttempt();
      };

      GameScene.prototype.afterAttempt = function () {
        const newLevel = Math.min(8, 1 + Math.floor(this.solved / 3));
        if (newLevel > this.level) {
          this.level = newLevel;
          SFX.level();
          this.flash(W / 2, 220, "LEVEL " + this.level + "!", "#ffd24a");
        }
        this.updateHUD();
        if (this.lives <= 0) {
          this.endGame(false);
          return;
        }
        if (this.solved >= this.target) {
          this.endGame(true);
          return;
        }
        this.time.delayedCall(1000, () => {
          this.feedback.setAlpha(0);
          this.newProblem();
        });
      };

      GameScene.prototype.flash = function (x, y, text, color) {
        const ft = this.add
          .text(x, y, text, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "26px",
            fontStyle: "bold",
            color: color,
            stroke: "#060f1a",
            strokeThickness: 4,
          })
          .setOrigin(0.5)
          .setDepth(40);
        this.tweens.add({
          targets: ft,
          y: y - 50,
          alpha: { from: 1, to: 0 },
          duration: this.reduceMotion ? 500 : 900,
          onComplete: () => ft.destroy(),
        });
      };

      GameScene.prototype.flashRed = function () {
        if (this.reduceMotion) return;
        this.redFlash.setAlpha(0.35);
        this.tweens.add({ targets: this.redFlash, alpha: 0, duration: 350 });
      };

      GameScene.prototype.updateHUD = function () {
        this.scoreText.setText("Score: " + this.score);
        this.livesText.setText(this.lives > 0 ? "❤".repeat(this.lives) : "—");
        this.streakText.setText("Streak: " + this.streak);
        this.levelText.setText("Level " + this.level);
        this.progressText.setText(this.solved + " / " + this.target);
      };

      GameScene.prototype.endGame = function (won) {
        this.locked = true;
        this.clearTargets();
        this.time.delayedCall(500, () => {
          this.scene.start("Result", {
            score: this.score,
            solved: this.solved,
            target: this.target,
            won: won,
          });
        });
      };

      function ResultScene() {
        return new Phaser.Scene("Result");
      }
      ResultScene.prototype = Object.create(Phaser.Scene.prototype);
      ResultScene.prototype.constructor = ResultScene;
      ResultScene.prototype.init = function (data) {
        this.data2 = data;
      };
      ResultScene.prototype.create = function () {
        const d = this.data2;
        const cx = W / 2;
        this.add.rectangle(cx, H / 2, W, H, 0x0c1c30);
        const stars =
          d.solved >= d.target ? 3 : d.solved >= d.target * 0.6 ? 2 : 1;
        let hs = parseInt(localStorage.getItem(LS_KEY) || "0", 10);
        if (d.score > hs) {
          hs = d.score;
          try {
            localStorage.setItem(LS_KEY, String(hs));
          } catch (e) {}
        }

        this.add
          .text(cx, 110, d.won ? "CITY BUILT!" : "OUT OF LIVES", {
            fontFamily: "Impact, sans-serif",
            fontSize: "48px",
            color: d.won ? "#88ccaa" : "#ff8f8f",
            stroke: "#060f1a",
            strokeThickness: 5,
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 185, "★".repeat(stars) + "☆".repeat(3 - stars), {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "48px",
            color: "#ffd24a",
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 255, "Score: " + d.score, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "30px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);
        this.add
          .text(
            cx,
            295,
            "Solved " + d.solved + " of " + d.target + " shapes",
            {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "18px",
              color: "#cfe0f0",
            },
          )
          .setOrigin(0.5);
        this.add
          .text(cx, 325, "High Score: " + hs, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "16px",
            color: "#ffd24a",
          })
          .setOrigin(0.5);

        if (d.won) SFX.win();
        else SFX.lose();

        try {
          window.EduPulse &&
            EduPulse.record({
              activityTitle: document.title,
              score: d.score,
              stars: stars,
              standard: "6.G.1",
              problemsAttempted: d.solved,
            });
        } catch (e) {}
        srSay(
          (d.won ? "You won! " : "Game over. ") +
            "Final score " +
            d.score +
            ", " +
            stars +
            " stars.",
        );

        const btn = this.add
          .rectangle(cx, 400, 220, 54, 0x1a6fb5)
          .setInteractive({ useHandCursor: true });
        const btnT = this.add
          .text(cx, 400, "PLAY AGAIN 🔁", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "20px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);
        const again = () => this.scene.start("Game");
        btn.on("pointerover", () => btn.setFillStyle(0x2484d0));
        btn.on("pointerout", () => btn.setFillStyle(0x1a6fb5));
        btn.on("pointerdown", again);
        this.input.keyboard.on("keydown-SPACE", again);
        this.input.keyboard.on("keydown-ENTER", again);

        const hub = this.add
          .text(cx, 480, "← Back to Math Games", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "15px",
            color: "#7fa0c0",
          })
          .setOrigin(0.5)
          .setInteractive({ useHandCursor: true });
        hub.on("pointerover", () => hub.setColor("#4488ff"));
        hub.on("pointerout", () => hub.setColor("#7fa0c0"));
        hub.on("pointerdown", () => (window.location.href = "/math/games/"));
      };

      const aaGame = new Phaser.Game(config);

      aaGame.events.once("ready", function () {
        try {
          const cv = aaGame.canvas;
          if (!cv) return;
          cv.setAttribute("role", "application");
          cv.setAttribute(
            "aria-label",
            "Area Attack Brick Cannon math game. Find the area of the shape, " +
              "aim the cannon with the left and right arrow keys, and press " +
              "space to fire a brick at the target showing the correct area.",
          );
          cv.setAttribute("aria-roledescription", "math game");
          if (!cv.hasAttribute("tabindex")) cv.setAttribute("tabindex", "0");
          cv.addEventListener("pointerdown", function () {
            try {
              cv.focus({ preventScroll: true });
            } catch (e) {
              cv.focus();
            }
          });
        } catch (e) {}
      });
    </script>

    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
