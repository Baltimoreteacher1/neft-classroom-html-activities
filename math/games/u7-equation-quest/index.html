    <style>

      .eq-rune {

      }
      #eq-sr {
        position: absolute;
        width: 1px;

        padding: 0;

  <body>
    <!-- Decorative animated rune-field (behind the Phaser canvas). -->
    <div id="eq-bg" data-parallax aria-hidden="true">
      <div id="eq-bg-layer" data-parallax-layer></div>
    </div>
    <!-- Screen-reader live region: mirrors the current equation + result. -->
    <div id="eq-sr" role="status" aria-live="polite"></div>
    <script>
      // Decorative rune-field builder (reduced-motion safe; pointer-neutral).
      (function () {
        "use strict";
        var reduceMQ =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)");
        var layer = document.getElementById("eq-bg-layer");
        if (!layer) return;
        function rnd(a, b) {
          return a + Math.random() * (b - a);
        }
        function build() {
          layer.textContent = "";
          var reduce = !!(reduceMQ && reduceMQ.matches);
          var n = reduce ? 16 : 34;
          for (var i = 0; i < n; i++) {
            var s = document.createElement("div");
            s.className = "eq-rune";
            var sz = rnd(1.5, 4);
            s.style.width = s.style.height = sz.toFixed(1) + "px";
            s.style.left = rnd(0, 100).toFixed(2) + "%";
            s.style.top = rnd(0, 100).toFixed(2) + "%";
            s.style.setProperty("--tw", rnd(2.2, 5).toFixed(2) + "s");
            s.style.animationDelay = "-" + rnd(0, 4).toFixed(2) + "s";
            layer.appendChild(s);
          }
        }
        build();
        var driver = false;
        function onMove(e) {
          var dx = e.clientX / (window.innerWidth || 1) - 0.5;
          var dy = e.clientY / (window.innerHeight || 1) - 0.5;
          layer.style.transform =
            "translate3d(" +
            (dx * 20).toFixed(2) +
            "px," +
            (dy * 12).toFixed(2) +
            "px,0)";
        }
        function attach() {
          if (driver || (reduceMQ && reduceMQ.matches)) return;
          driver = true;
          window.addEventListener("pointermove", onMove, { passive: true });
        }
        function detach() {
          if (!driver) return;
          driver = false;
          window.removeEventListener("pointermove", onMove);
          layer.style.transform = "";
        }
        attach();
        if (reduceMQ) {
          var onChange = function () {
            build();
            if (reduceMQ.matches) detach();
            else attach();
          };
          if (reduceMQ.addEventListener)
            reduceMQ.addEventListener("change", onChange);
          else if (reduceMQ.addListener) reduceMQ.addListener(onChange);
        }
        var rt;
        window.addEventListener("resize", function () {
          clearTimeout(rt);
          rt = setTimeout(build, 200);
        });
      })();
    </script>
    <script>
      // ── EQUATION QUEST — RUNE LEAP ──
      // Phaser 3 — Grade 6 Math — One-step equations (6.EE.7).
      // Mechanic: a one-step equation glows at the top. Three rune stones —
      // one per lane, each carved with a candidate value of x — float at the
      // far side of a chasm. Move the hero left/right to pick a lane, then
      // LEAP (Space/Up). Land on the stone with the correct x to cross; leap
      // onto a wrong stone and it crumbles, costing a life. Higher levels add
      // multiplication/division equations and a shrinking aim window.

      const W = 820,
        H = 600;
      const LS_KEY = "eq_rune_leap_highscore";
      const LANES = 3;

      const SFX = {
        ctx: null,
        init() {
          if (!this.ctx)
            try {
              this.ctx = new (window.AudioContext ||
                window.webkitAudioContext)();
            } catch (e) {}
        },
        play(t, f, d, v = 0.18) {
          if (!this.ctx) return;
          try {
            const c = this.ctx,
              o = c.createOscillator(),
              g = c.createGain();
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
            o.connect(g);
            g.connect(c.destination);
            o.start();
            o.stop(c.currentTime + d);
          } catch (e) {}
        },
        step() {
          this.play("square", 440, 0.04, 0.06);
        },
        jump() {
          this.play("sine", 520, 0.12, 0.14);
          this.play("sine", 760, 0.1, 0.1);
        },
        good() {
          this.play("sine", 660, 0.1, 0.25);
          this.play("sine", 880, 0.14, 0.2);
        },
        bad() {
          this.play("sawtooth", 200, 0.25, 0.18);
          this.play("sawtooth", 150, 0.3, 0.14);
        },
        level() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.15, 0.22), i * 70),
          );
        },
        win() {
          [523, 659, 784, 1047, 1318].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.25, 0.25), i * 110),
          );
        },
        lose() {
          [400, 330, 260, 200].forEach((f, i) =>
            setTimeout(() => this.play("sawtooth", f, 0.3, 0.14), i * 170),
          );
        },
      };

      function randInt(a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a;
      }
      function shuffle(a) {
        const r = [...a];
        for (let i = r.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [r[i], r[j]] = [r[j], r[i]];
        }
        return r;
      }
      function srSay(msg) {
        const el = document.getElementById("eq-sr");
        if (el) el.textContent = msg;
      }

      // ── One-step equation generator ────────────────────────────────────
      // Returns { prompt, answer(int x), why, options:[ints length=3] }
      // Forms (rising by level), all with whole-number solutions:
      //   1-2: x + a = b   and   x − a = b
      //   3-4: add/subtract + a·x = b (where b is a multiple of a)
      //   5+ : all of the above + x / a = b  (mixed)
      // The solution is generated FIRST as a known integer, then the equation
      // is built around it, so x is always an exact whole number.
      function genAddSub() {
        const x = randInt(1, 20);
        if (Math.random() < 0.5) {
          const a = randInt(1, 15);
          const b = x + a;
          return {
            prompt: "x + " + a + " = " + b,
            answer: x,
            why: "x = " + b + " − " + a + " = " + x + ".",
          };
        } else {
          const a = randInt(1, 15);
          const b = x - a; // could be negative; rebuild so b>=0 by ordering
          if (b < 0) {
            // ensure x - a >= 0 by swapping to a smaller a
            const a2 = randInt(1, x);
            const b2 = x - a2;
            return {
              prompt: "x − " + a2 + " = " + b2,
              answer: x,
              why: "x = " + b2 + " + " + a2 + " = " + x + ".",
            };
          }
          return {
            prompt: "x − " + a + " = " + b,
            answer: x,
            why: "x = " + b + " + " + a + " = " + x + ".",
          };
        }
      }
      function genMul() {
        const x = randInt(2, 12);
        const a = randInt(2, 9);
        const b = a * x;
        return {
          prompt: a + "x = " + b,
          answer: x,
          why: "x = " + b + " ÷ " + a + " = " + x + ".",
        };
      }
      function genDiv() {
        const x = randInt(2, 12);
        const a = randInt(2, 6);
        const b = x; // x / a = b  ⇒  b = x/a ⇒ make dividend = x*a, quotient x
        // Use form x / a = b where dividend D and D/a = b. Pick b then D=a*b.
        const bb = randInt(2, 9);
        const D = a * bb;
        return {
          prompt: "x ÷ " + a + " = " + bb,
          answer: D,
          why: "x = " + bb + " × " + a + " = " + D + ".",
        };
      }
      function makeEquation(level) {
        let base;
        if (level <= 2) base = genAddSub();
        else if (level <= 4)
          base = Math.random() < 0.5 ? genAddSub() : genMul();
        else {
          const r = randInt(0, 2);
          base = r === 0 ? genAddSub() : r === 1 ? genMul() : genDiv();
        }
        const ans = base.answer;
        // Build exactly 3 distinct positive-integer rune values incl. answer.
        const seen = new Set([ans]);
        const opts = [ans];
        const pool = [
          ans + randInt(1, 5),
          ans - randInt(1, 5),
          ans + randInt(6, 12),
          ans * 2,
          Math.max(1, ans - randInt(6, 10)),
        ];
        for (const v of shuffle(pool)) {
          if (opts.length >= 3) break;
          if (v > 0 && Number.isInteger(v) && !seen.has(v)) {
            seen.add(v);
            opts.push(v);
          }
        }
        let g = 1;
        while (opts.length < 3 && g < 50) {
          const v = ans + g;
          if (v > 0 && !seen.has(v)) {
            seen.add(v);
            opts.push(v);
          }
          g++;
        }
        return {
          prompt: base.prompt,
          answer: ans,
          why: base.why,
          options: shuffle(opts.slice(0, 3)),
        };
      }

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#0c281d",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [BootScene, TitleScene, GameScene, ResultScene],
      };

      function BootScene() {
        return new Phaser.Scene("Boot");
      }
      BootScene.prototype = Object.create(Phaser.Scene.prototype);
      BootScene.prototype.constructor = BootScene;
      BootScene.prototype.create = function () {
        const g = this.make.graphics({ add: false });
        g.fillStyle(0xffffff);
        g.fillCircle(4, 4, 4);
        g.generateTexture("dot", 8, 8);
        g.clear();
        g.fillStyle(0x9af0c8);
        g.fillRect(0, 0, 10, 10);
        g.generateTexture("dust", 10, 10);
        g.destroy();
        this.scene.start("Title");
      };

      function TitleScene() {
        return new Phaser.Scene("Title");
      }
      TitleScene.prototype = Object.create(Phaser.Scene.prototype);
      TitleScene.prototype.constructor = TitleScene;
      TitleScene.prototype.create = function () {
        const cx = W / 2;
        this.add.rectangle(cx, H / 2, W, H, 0x0c281d);
        this.add
          .text(cx, 116, "EQUATION QUEST", {
            fontFamily: "Impact, sans-serif",
            fontSize: "54px",
            color: "#3fbf8f",
            stroke: "#061410",
            strokeThickness: 6,
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 168, "Rune Leap", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "26px",
            color: "#9af0c8",
          })
          .setOrigin(0.5);
        this.add
          .text(
            cx,
            230,
            "Solve the equation for x, then move and LEAP onto the rune\nstone carved with the correct value of x!",
            {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "16px",
              color: "#cdeede",
              align: "center",
            },
          )
          .setOrigin(0.5);
        this.add
          .text(
            cx,
            285,
            "← → move · SPACE / ↑ leap · 6.EE.7 · Lessons 7.1–7.7",
            {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "14px",
              color: "#7fc0a0",
            },
          )
          .setOrigin(0.5);

        const hs = localStorage.getItem(LS_KEY);
        if (hs)
          this.add
            .text(cx, 320, "High Score: " + hs, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "16px",
              color: "#ffd24a",
              fontStyle: "bold",
            })
            .setOrigin(0.5);

        const btn = this.add
          .rectangle(cx, 392, 240, 58, 0x2d874b)
          .setInteractive({ useHandCursor: true });
        const btnT = this.add
          .text(cx, 392, "BEGIN QUEST ▶", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "22px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);
        this.tweens.add({
          targets: [btn, btnT],
          scaleX: 1.05,
          scaleY: 1.05,
          duration: 800,
          yoyo: true,
          repeat: -1,
        });
        const start = () => {
          SFX.init();
          SFX.jump();
          this.scene.start("Game");
        };
        btn.on("pointerover", () => btn.setFillStyle(0x36a35b));
        btn.on("pointerout", () => btn.setFillStyle(0x2d874b));
        btn.on("pointerdown", start);
        this.input.keyboard.on("keydown-SPACE", start);
        this.input.keyboard.on("keydown-ENTER", start);

        const hub = this.add
          .text(cx, 535, "← Back to Math Games", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "15px",
            color: "#7fc0a0",
          })
          .setOrigin(0.5)
          .setInteractive({ useHandCursor: true });
        hub.on("pointerover", () => hub.setColor("#3fbf8f"));
        hub.on("pointerout", () => hub.setColor("#7fc0a0"));
        hub.on("pointerdown", () => (window.location.href = "/math/games/"));
        srSay("Equation Quest Rune Leap. Press Start to play.");
      };

      function GameScene() {
        return new Phaser.Scene("Game");
      }
      GameScene.prototype = Object.create(Phaser.Scene.prototype);
      GameScene.prototype.constructor = GameScene;

      GameScene.prototype.init = function () {
        this.reduceMotion = !!(
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches
        );
        this.score = 0;
        this.lives = 3;
        this.streak = 0;
        this.level = 1;
        this.solved = 0;
        this.target = 10;
        this.lane = 1;
        this.stones = null;
        this.locked = false;
        this.problem = null;
        this.jumping = false;
      };

      GameScene.prototype.laneX = function (i) {
        const margin = 160;
        const span = (W - 2 * margin) / (LANES - 1);
        return margin + span * i;
      };

      GameScene.prototype.create = function () {
        this.add.rectangle(W / 2, H / 2, W, H, 0x0c281d);
        // Chasm
        this.add.rectangle(W / 2, H - 30, W, 60, 0x05130d);
        // Start ledge (where hero stands)
        this.startY = 360;
        this.stoneY = 230;

        const hudStyle = {
          fontFamily: "Segoe UI, sans-serif",
          fontSize: "18px",
          fontStyle: "bold",
        };
        this.scoreText = this.add.text(16, 12, "Score: 0", {
          ...hudStyle,
          color: "#9af0c8",
        });
        this.livesText = this.add.text(16, 36, "❤❤❤", {
          ...hudStyle,
          color: "#ff8f8f",
        });
        this.streakText = this.add
          .text(W - 16, 12, "Streak: 0", { ...hudStyle, color: "#ffd24a" })
          .setOrigin(1, 0);
        this.levelText = this.add
          .text(W - 16, 36, "Level 1", { ...hudStyle, color: "#cdeede" })
          .setOrigin(1, 0);
        this.progressText = this.add
          .text(W / 2, 12, "0 / " + this.target, {
            ...hudStyle,
            color: "#cdeede",
          })
          .setOrigin(0.5, 0);

        // Equation banner
        this.add
          .text(W / 2, 76, "Solve for x:", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "14px",
            color: "#7fc0a0",
          })
          .setOrigin(0.5);
        this.bannerText = this.add
          .text(W / 2, 110, "", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "40px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);

        this.feedback = this.add
          .text(W / 2, 156, "", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "17px",
            fontStyle: "bold",
            color: "#ffd24a",
            stroke: "#061410",
            strokeThickness: 3,
            align: "center",
            wordWrap: { width: 620 },
          })
          .setOrigin(0.5)
          .setAlpha(0);

        // Hero on the start ledge.
        this.heroLedge = this.add.rectangle(
          this.laneX(this.lane),
          this.startY + 40,
          120,
          18,
          0x1d5a3c,
        );
        this.hero = this.add.rectangle(
          this.laneX(this.lane),
          this.startY,
          34,
          44,
          0x3fbf8f,
        );
        this.hero.setStrokeStyle(3, 0xcdeede);
        this.heroEmoji = this.add
          .text(this.laneX(this.lane), this.startY, "🧝", { fontSize: "30px" })
          .setOrigin(0.5);

        // Particles
        this.burst = this.add
          .particles(0, 0, "dust", {
            speed: { min: 70, max: 230 },
            angle: { min: 0, max: 360 },
            scale: { start: 1.2, end: 0 },
            lifespan: 650,
            emitting: false,
            quantity: 16,
            tint: [0x3fbf8f, 0x9af0c8, 0xffd24a, 0xffffff],
          })
          .setDepth(20);

        this.redFlash = this.add
          .rectangle(W / 2, H / 2, W, H, 0xff3333, 0)
          .setDepth(30);

        // Input
        this.cursors = this.input.keyboard.createCursorKeys();
        this.input.keyboard.on("keydown-LEFT", () => this.moveLane(-1));
        this.input.keyboard.on("keydown-RIGHT", () => this.moveLane(1));
        this.input.keyboard.on("keydown-A", () => this.moveLane(-1));
        this.input.keyboard.on("keydown-D", () => this.moveLane(1));
        this.input.keyboard.on("keydown-SPACE", () => this.leap());
        this.input.keyboard.on("keydown-UP", () => this.leap());
        this.input.keyboard.on("keydown-W", () => this.leap());
        // Pointer: tap a stone to move under it; tap again (or tap same lane) to leap.
        this.input.on("pointerdown", (p) => {
          let best = 0,
            bd = Infinity;
          for (let i = 0; i < LANES; i++) {
            const d = Math.abs(p.x - this.laneX(i));
            if (d < bd) {
              bd = d;
              best = i;
            }
          }
          if (best === this.lane) this.leap();
          else this.setLane(best);
        });

        this.cameras.main.fadeIn(400);
        this.newProblem();
      };

      GameScene.prototype.moveLane = function (dir) {
        if (this.jumping || this.locked) return;
        this.setLane(Phaser.Math.Clamp(this.lane + dir, 0, LANES - 1));
      };
      GameScene.prototype.setLane = function (i) {
        if (this.jumping || this.locked) return;
        if (i === this.lane) return;
        this.lane = i;
        SFX.step();
        const x = this.laneX(i);
        this.hero.x = x;
        this.heroEmoji.x = x;
        this.heroLedge.x = x;
      };

      GameScene.prototype.newProblem = function () {
        this.locked = false;
        this.jumping = false;
        this.clearStones();
        // Reset hero to start ledge.
        this.lane = 1;
        const sx = this.laneX(this.lane);
        this.hero.setPosition(sx, this.startY);
        this.heroEmoji.setPosition(sx, this.startY);
        this.heroLedge.setPosition(sx, this.startY + 40);

        this.problem = makeEquation(this.level);
        this.bannerText.setText(this.problem.prompt);
        srSay(
          "Solve " +
            this.problem.prompt +
            " for x. Move and leap onto the correct rune stone.",
        );

        const vals = this.problem.options;
        this.stones = [];
        for (let i = 0; i < LANES; i++) {
          const x = this.laneX(i);
          const stone = this.add.rectangle(x, this.stoneY, 96, 60, 0x16402c);
          stone.setStrokeStyle(3, 0x3fbf8f);
          const txt = this.add
            .text(x, this.stoneY, "x = " + vals[i], {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "20px",
              fontStyle: "bold",
              color: "#ffffff",
            })
            .setOrigin(0.5);
          // Gentle bob so the stones feel alive (skipped under reduced motion).
          if (!this.reduceMotion) {
            this.tweens.add({
              targets: [stone, txt],
              y: this.stoneY - 8,
              duration: 1400 + i * 160,
              yoyo: true,
              repeat: -1,
              ease: "Sine.easeInOut",
            });
          }
          this.stones.push({ stone, txt, value: vals[i] });
        }
      };

      GameScene.prototype.clearStones = function () {
        if (this.stones)
          this.stones.forEach((s) => {
            this.tweens.killTweensOf([s.stone, s.txt]);
            s.stone.destroy();
            s.txt.destroy();
          });
        this.stones = null;
      };

      GameScene.prototype.leap = function () {
        if (this.jumping || this.locked || !this.stones) return;
        this.jumping = true;
        SFX.jump();
        const targetStone = this.stones[this.lane];
        const startX = this.hero.x,
          startY = this.startY;
        const endX = targetStone.stone.x,
          endY = this.stoneY - 38;
        const dur = this.reduceMotion ? 200 : 480;
        // Arc the hero up to the chosen stone.
        this.tweens.add({
          targets: [this.hero, this.heroEmoji],
          x: endX,
          duration: dur,
          ease: "Sine.easeInOut",
        });
        // Vertical arc via a manual tween on a proxy value.
        const peak = (startY + endY) / 2 - 90;
        const proxy = { t: 0 };
        this.tweens.add({
          targets: proxy,
          t: 1,
          duration: dur,
          ease: "Linear",
          onUpdate: () => {
            const t = proxy.t;
            // quadratic bezier: start -> peak -> end
            const y =
              (1 - t) * (1 - t) * startY +
              2 * (1 - t) * t * peak +
              t * t * endY;
            this.hero.y = y;
            this.heroEmoji.y = y;
          },
          onComplete: () => this.land(targetStone),
        });
      };

      GameScene.prototype.land = function (stone) {
        this.locked = true;
        const correct = stone.value === this.problem.answer;
        if (correct) {
          SFX.good();
          this.solved++;
          this.streak++;
          const bonus = Math.min(this.streak, 5) * 5;
          this.score += 25 + bonus;
          this.burst.setPosition(stone.stone.x, stone.stone.y);
          this.burst.explode(18);
          this.flash(stone.stone.x, this.stoneY - 70, "+1 ✓", "#3fbf8f");
          this.feedback.setText("Correct! " + this.problem.why).setAlpha(1);
          srSay("Correct. " + this.problem.why);
        } else {
          SFX.bad();
          this.streak = 0;
          this.lives--;
          this.flashRed();
          this.flash(stone.stone.x, this.stoneY - 70, "✗", "#ff8f8f");
          // Crumble the wrong stone.
          if (!this.reduceMotion) {
            this.tweens.add({
              targets: [stone.stone, stone.txt, this.hero, this.heroEmoji],
              y: "+=120",
              alpha: 0,
              duration: 400,
            });
          }
          this.feedback
            .setText(
              "The stone crumbled! x = " +
                this.problem.answer +
                ".  " +
                this.problem.why,
            )
            .setAlpha(1);
          srSay(
            "Wrong stone. The correct value was x = " +
              this.problem.answer +
              ". " +
              this.problem.why,
          );
        }
        this.afterAttempt();
      };

      GameScene.prototype.afterAttempt = function () {
        const newLevel = Math.min(8, 1 + Math.floor(this.solved / 3));
        if (newLevel > this.level) {
          this.level = newLevel;
          SFX.level();
          this.flash(W / 2, 200, "LEVEL " + this.level + "!", "#ffd24a");
        }
        this.updateHUD();
        if (this.lives <= 0) {
          this.endGame(false);
          return;
        }
        if (this.solved >= this.target) {
          this.endGame(true);
          return;
        }
        this.time.delayedCall(1100, () => {
          this.feedback.setAlpha(0);
          this.hero.setAlpha(1);
          this.heroEmoji.setAlpha(1);
          this.newProblem();
        });
      };

      GameScene.prototype.flash = function (x, y, text, color) {
        const ft = this.add
          .text(x, y, text, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "26px",
            fontStyle: "bold",
            color: color,
            stroke: "#061410",
            strokeThickness: 4,
          })
          .setOrigin(0.5)
          .setDepth(40);
        this.tweens.add({
          targets: ft,
          y: y - 50,
          alpha: { from: 1, to: 0 },
          duration: this.reduceMotion ? 500 : 900,
          onComplete: () => ft.destroy(),
        });
      };

      GameScene.prototype.flashRed = function () {
        if (this.reduceMotion) return;
        this.redFlash.setAlpha(0.35);
        this.tweens.add({ targets: this.redFlash, alpha: 0, duration: 350 });
      };

      GameScene.prototype.updateHUD = function () {
        this.scoreText.setText("Score: " + this.score);
        this.livesText.setText(this.lives > 0 ? "❤".repeat(this.lives) : "—");
        this.streakText.setText("Streak: " + this.streak);
        this.levelText.setText("Level " + this.level);
        this.progressText.setText(this.solved + " / " + this.target);
      };

      GameScene.prototype.endGame = function (won) {
        this.locked = true;
        this.clearStones();
        this.time.delayedCall(600, () => {
          this.scene.start("Result", {
            score: this.score,
            solved: this.solved,
            target: this.target,
            won: won,
          });
        });
      };

      function ResultScene() {
        return new Phaser.Scene("Result");
      }
      ResultScene.prototype = Object.create(Phaser.Scene.prototype);
      ResultScene.prototype.constructor = ResultScene;
      ResultScene.prototype.init = function (data) {
        this.data2 = data;
      };
      ResultScene.prototype.create = function () {
        const d = this.data2;
        const cx = W / 2;
        this.add.rectangle(cx, H / 2, W, H, 0x0c281d);
        const stars =
          d.solved >= d.target ? 3 : d.solved >= d.target * 0.6 ? 2 : 1;
        let hs = parseInt(localStorage.getItem(LS_KEY) || "0", 10);
        if (d.score > hs) {
          hs = d.score;
          try {
            localStorage.setItem(LS_KEY, String(hs));
          } catch (e) {}
        }

        this.add
          .text(cx, 110, d.won ? "QUEST COMPLETE!" : "OUT OF LIVES", {
            fontFamily: "Impact, sans-serif",
            fontSize: "46px",
            color: d.won ? "#3fbf8f" : "#ff8f8f",
            stroke: "#061410",
            strokeThickness: 5,
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 185, "★".repeat(stars) + "☆".repeat(3 - stars), {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "48px",
            color: "#ffd24a",
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 255, "Score: " + d.score, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "30px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);
        this.add
          .text(
            cx,
            295,
            "Solved " + d.solved + " of " + d.target + " equations",
            {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "18px",
              color: "#cdeede",
            },
          )
          .setOrigin(0.5);
        this.add
          .text(cx, 325, "High Score: " + hs, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "16px",
            color: "#ffd24a",
          })
          .setOrigin(0.5);

        if (d.won) SFX.win();
        else SFX.lose();

        try {
          window.EduPulse &&
            EduPulse.record({
              activityTitle: document.title,
              score: d.score,
              stars: stars,
              standard: "6.EE.7",
              problemsAttempted: d.solved,
            });
        } catch (e) {}
        srSay(
          (d.won ? "You won! " : "Game over. ") +
            "Final score " +
            d.score +
            ", " +
            stars +
            " stars.",
        );

        const btn = this.add
          .rectangle(cx, 400, 220, 54, 0x2d874b)
          .setInteractive({ useHandCursor: true });
        const btnT = this.add
          .text(cx, 400, "PLAY AGAIN 🔁", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "20px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);
        const again = () => this.scene.start("Game");
        btn.on("pointerover", () => btn.setFillStyle(0x36a35b));
        btn.on("pointerout", () => btn.setFillStyle(0x2d874b));
        btn.on("pointerdown", again);
        this.input.keyboard.on("keydown-SPACE", again);
        this.input.keyboard.on("keydown-ENTER", again);

        const hub = this.add
          .text(cx, 480, "← Back to Math Games", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "15px",
            color: "#7fc0a0",
          })
          .setOrigin(0.5)
          .setInteractive({ useHandCursor: true });
        hub.on("pointerover", () => hub.setColor("#3fbf8f"));
        hub.on("pointerout", () => hub.setColor("#7fc0a0"));
        hub.on("pointerdown", () => (window.location.href = "/math/games/"));
      };

      const eqGame = new Phaser.Game(config);

      eqGame.events.once("ready", function () {
        try {
          const cv = eqGame.canvas;
          if (!cv) return;
          cv.setAttribute("role", "application");
          cv.setAttribute(
            "aria-label",
            "Equation Quest Rune Leap math game. Solve the one-step equation " +
              "for x, move with the left and right arrow keys, and press space " +
              "to leap onto the rune stone showing the correct value of x.",
          );
          cv.setAttribute("aria-roledescription", "math game");
          if (!cv.hasAttribute("tabindex")) cv.setAttribute("tabindex", "0");
          cv.addEventListener("pointerdown", function () {
            try {
              cv.focus({ preventScroll: true });
            } catch (e) {
              cv.focus();
            }
          });
        } catch (e) {}
      });
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <script src="/shared/save-resume/save-resume-engine.js" defer></script>
    <!-- nsr-injected:end -->

    <script src="/assets/game-fx.js" defer></script>
