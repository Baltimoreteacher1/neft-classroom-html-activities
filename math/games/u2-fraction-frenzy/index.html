    <div id="fr-bg" aria-hidden="true"></div>
    <div id="fr-sr" role="status" aria-live="polite"></div>
    <script>
      (function () {
        var host = document.getElementById("fr-bg");
        if (!host) return;
        var reduce =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var n = reduce ? 10 : 26;
        for (var i = 0; i < n; i++) {
          var d = document.createElement("div");
          d.className = "fr-mote";
          var sz = 2 + Math.random() * 4;
          d.style.width = d.style.height = sz.toFixed(1) + "px";

          d.style.top = (Math.random() * 100).toFixed(2) + "%";

          d.style.animationDelay = "-" + (Math.random() * 4).toFixed(2) + "s";
          host.appendChild(d);

    <script>
      // ════════════════════════════════════════════════════════════════════
      // FRACTION FRENZY — Bubble Popper  ·  Grade 6  ·  6.NS.1
      // Lessons 2.1–2.5: dividing fractions (keep-change-flip).
      //
      // MECHANIC: A cannon sits at the bottom center. Three answer "bubbles"
      //   drift across the upper screen. Read the division problem, ROTATE the
      //   cannon (← → / A D) so its aim line points at the bubble with the
      //   correct quotient, then FIRE (Space / Up / tap a bubble). The shell
      //   flies along the aim; popping the right bubble = correct, popping a
      //   wrong one = miss (lose a life). Bubbles drift faster each round.
      //
      // FLOAT SAFETY: answers are integers or "1/d" reciprocal strings produced
      //   directly from integer arithmetic; correctness is a STRING comparison,
      //   so no float equality is ever used.
      // ════════════════════════════════════════════════════════════════════
      const LS_KEY = "fr_fraction_frenzy_highscore";
      const W = 800,
        H = 600;
      const ACTIVITY_TITLE = "Fraction Frenzy — Lessons 2.1–2.5";
      const STANDARD = "6.NS.1";

      const SFX = {
        ctx: null,
        init() {
          if (!this.ctx)
            try {
              this.ctx = new (window.AudioContext ||
                window.webkitAudioContext)();
            } catch (e) {}
        },
        play(t, f, d, v = 0.2) {
          if (!this.ctx) return;
          try {
            const c = this.ctx,
              o = c.createOscillator(),
              g = c.createGain();
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
            o.connect(g);
            g.connect(c.destination);
            o.start();
            o.stop(c.currentTime + d);
          } catch (e) {}
        },
        noise(d, v = 0.1) {
          if (!this.ctx) return;
          try {
            const c = this.ctx,
              n = c.sampleRate * d,
              buf = c.createBuffer(1, n, c.sampleRate),
              dt = buf.getChannelData(0);
            for (let i = 0; i < n; i++) dt[i] = Math.random() * 2 - 1;
            const s = c.createBufferSource();
            s.buffer = buf;
            const g = c.createGain();
            g.gain.setValueAtTime(v, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
            s.connect(g);
            g.connect(c.destination);
            s.start();
            s.stop(c.currentTime + d);
          } catch (e) {}
        },
        fire() {
          this.play("square", 300, 0.08, 0.12);
        },
        pop() {
          this.play("sine", 720, 0.1, 0.3);
          this.play("sine", 1080, 0.13, 0.22);
        },
        miss() {
          this.noise(0.18, 0.12);
          this.play("sawtooth", 170, 0.28, 0.16);
        },
        rotate() {
          this.play("triangle", 360, 0.03, 0.04);
        },
        tick() {
          this.play("square", 600, 0.03, 0.07);
        },
        streak(n) {
          [523, 659, 784, 988, 1175]
            .slice(0, Math.min(n, 5))
            .forEach((f, i) =>
              setTimeout(() => this.play("sine", f, 0.12, 0.2), i * 55),
            );
        },
        levelUp() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.15, 0.22), i * 70),
          );
        },
        win() {
          [523, 659, 784, 1047, 1318].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.22, 0.28), i * 110),
          );
        },
        lose() {
          [400, 350, 300, 200].forEach((f, i) =>
            setTimeout(() => this.play("sawtooth", f, 0.28, 0.15), i * 170),
          );
        },
      };

      function randInt(a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a;
      }
      function shuffle(a) {
        const r = a.slice();
        for (let i = r.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [r[i], r[j]] = [r[j], r[i]];
        }
        return r;
      }

      // Build 3 distinct bubble labels with exactly one correct.
      // makeWrong returns a label STRING already.
      function buildBubbles(correctLabel, makeWrong) {
        const set = new Set([correctLabel]);
        let guard = 0;
        while (set.size < 3 && guard++ < 200) {
          const w = makeWrong();
          if (w && w !== correctLabel) set.add(w);
        }
        const labels = shuffle(Array.from(set));
        return { labels: labels, correctIndex: labels.indexOf(correctLabel) };
      }

      // round 1: whole ÷ unit fraction = integer  (n ÷ 1/d = n·d)
      // round 2: fraction ÷ unit fraction = integer  ((a/b) ÷ 1/d = a·d/b, d multiple of b)
      // round 3: unit fraction ÷ whole = unit fraction  (1/b ÷ n = 1/(b·n))
      function genQuestion(round) {
        if (round === 1) {
          const n = randInt(2, 6),
            d = randInt(2, 5);
          const ans = n * d;
          const g = buildBubbles(String(ans), () => {
            const step = randInt(1, 3) * (Math.random() < 0.5 ? 1 : -1);
            let w = ans + step * d;
            if (w <= 0 || w === ans) w = ans + randInt(1, 3);
            return String(w);
          });
          return {
            tag: "Whole ÷ Unit Fraction",
            prompt: n + " ÷ 1/" + d,
            why: n + " ÷ 1/" + d + " = " + n + " × " + d + " = " + ans + ".",
            bubbles: g.labels,
            correctIndex: g.correctIndex,
          };
        }
        if (round === 2) {
          const b = randInt(2, 4);
          const a = randInt(1, b - 1); // proper fraction (b>=2 so b-1>=1)
          const mult = randInt(1, 4),
            d = b * mult; // d is a multiple of b -> integer answer
          const ans = (a * d) / b; // guaranteed integer
          const g = buildBubbles(String(ans), () => {
            const delta = randInt(1, 4);
            let w = Math.random() < 0.5 ? ans + delta : ans - delta;
            if (w <= 0 || w === ans) w = ans + randInt(1, 4);
            return String(w);
          });
          return {
            tag: "Fraction ÷ Unit Fraction",
            prompt: a + "/" + b + " ÷ 1/" + d,
            why:
              a + "/" + b + " ÷ 1/" + d + " = " + a + "/" + b + " × " + d + " = " + ans + ".",
            bubbles: g.labels,
            correctIndex: g.correctIndex,
          };
        }
        // round 3
        const b = randInt(2, 6),
          n = randInt(2, 5);
        const denom = b * n;
        const correct = "1/" + denom;
        const g = buildBubbles(correct, () => {
          const delta = randInt(1, 5);
          let dd = Math.random() < 0.5 ? denom + delta : denom - delta;
          if (dd <= 1 || dd === denom) dd = denom + randInt(1, 5);
          return "1/" + dd;
        });
        return {
          tag: "Unit Fraction ÷ Whole",
          prompt: "1/" + b + " ÷ " + n,
          why: "1/" + b + " ÷ " + n + " = 1/(" + b + "×" + n + ") = 1/" + denom + ".",
          bubbles: g.labels,
          correctIndex: g.correctIndex,
        };
      }

      function srSay(msg) {
        try {
          const el = document.getElementById("fr-sr");
          if (el) el.textContent = msg;
        } catch (e) {}
      }

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#2a1326",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [],
      };

      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          const g = this.make.graphics({ add: false });
          g.fillStyle(0xffffff);
          g.fillRect(0, 0, 7, 4);
          g.generateTexture("confetti", 7, 4);
          g.clear();
          g.fillStyle(0xffffff);
          g.fillCircle(4, 4, 4);
          g.generateTexture("spark", 8, 8);
          g.clear();
          g.fillStyle(0xffe08a);
          g.fillCircle(7, 7, 7);
          g.generateTexture("shell", 14, 14);
          g.destroy();
          this.scene.start("Title");
        }
      }

      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          const cx = W / 2;
          this.reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          this.add.rectangle(cx, H / 2, W, H, 0x2a1326);
          this.add
            .text(cx, 120, "FRACTION", {
              fontSize: "62px",
              fontFamily: "Impact, sans-serif",
              color: "#ff7ba8",
              stroke: "#1c0c19",
              strokeThickness: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 186, "FRENZY", {
              fontSize: "62px",
              fontFamily: "Impact, sans-serif",
              color: "#ffb648",
              stroke: "#1c0c19",
              strokeThickness: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 244, "Bubble Popper  ·  Lessons 2.1–2.5  ·  6.NS.1", {
              fontSize: "15px",
              color: "#e0a8c0",
            })
            .setOrigin(0.5);
          this.add
            .text(
              cx,
              300,
              "Divide the fractions, AIM the cannon at the bubble with\nthe correct quotient, and fire to pop it!",
              { fontSize: "15px", color: "#c890a8", align: "center" },
            )
            .setOrigin(0.5);
          this.add
            .text(cx, 356, "← → or A/D to aim   ·   Space/↑ to fire   ·   tap a bubble", {
              fontSize: "14px",
              color: "#b380a0",
            })
            .setOrigin(0.5);

          const hs = localStorage.getItem(LS_KEY);
          if (hs)
            this.add
              .text(cx, 392, "HIGH SCORE: " + hs, {
                fontSize: "15px",
                color: "#ffb648",
                fontStyle: "bold",
              })
              .setOrigin(0.5);

          const btn = this.add
            .rectangle(cx, 450, 260, 56, 0xc45a3c)
            .setInteractive({ useHandCursor: true });
          const btnT = this.add
            .text(cx, 450, "LOAD CANNON ▶", {
              fontSize: "22px",
              fontStyle: "bold",
              color: "#fff3ec",
            })
            .setOrigin(0.5);
          if (!this.reduce)
            this.tweens.add({
              targets: [btn, btnT],
              scaleX: 1.05,
              scaleY: 1.05,
              duration: 800,
              yoyo: true,
              repeat: -1,
            });
          const go = () => {
            SFX.init();
            SFX.tick();
            this.cameras.main.fadeOut(300);
            this.time.delayedCall(300, () => this.scene.start("Game"));
          };
          btn.on("pointerover", () => btn.setFillStyle(0xd86c4c));
          btn.on("pointerout", () => btn.setFillStyle(0xc45a3c));
          btn.on("pointerdown", go);
          this.input.keyboard.on("keydown-SPACE", go);
          this.input.keyboard.on("keydown-ENTER", go);

          const hub = this.add
            .text(cx, 555, "← Back to Games hub", {
              fontSize: "15px",
              fontStyle: "bold",
              color: "#b380a0",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });
          hub.on("pointerover", () => hub.setColor("#ffb648"));
          hub.on("pointerout", () => hub.setColor("#b380a0"));
          hub.on("pointerdown", () => (window.location.href = "/math/games/"));

          this.cameras.main.fadeIn(400);
        }
      }

      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }
        init() {
          this.reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          this.score = 0;
          this.lives = 3;
          this.streak = 0;
          this.maxStreak = 0;
          this.correct = 0;
          this.qIndex = 0;
          this.TOTAL = 12;
          this.level = 1;
          this.busy = false;
          this.aim = -Math.PI / 2; // straight up
          this.bubbles = [];
          this.shell = null;
        }
        roundFor(i) {
          return i < 4 ? 1 : i < 8 ? 2 : 3;
        }
        create() {
          const cx = W / 2;
          this.cannonX = cx;
          this.cannonY = H - 40;
          this.add.rectangle(cx, H / 2, W, H, 0x2a1326);

          // HUD
          this.add.rectangle(cx, 24, W, 48, 0x1c0c19, 0.92).setDepth(8);
          this.scoreText = this.add
            .text(16, 12, "Score: 0", {
              fontSize: "20px",
              color: "#ff7ba8",
              fontStyle: "bold",
            })
            .setDepth(9);
          this.livesText = this.add
            .text(W - 16, 12, "❤❤❤", { fontSize: "20px", color: "#ff6b8a" })
            .setOrigin(1, 0)
            .setDepth(9);
          this.streakText = this.add
            .text(cx, 12, "Streak: 0", {
              fontSize: "16px",
              color: "#ffb648",
              fontStyle: "bold",
            })
            .setOrigin(0.5, 0)
            .setDepth(9);

          // prompt
          this.add.rectangle(cx, 78, 360, 56, 0x1c0c19, 0.92).setDepth(8);
          this.tagText = this.add
            .text(cx, 62, "", { fontSize: "13px", color: "#e0a8c0" })
            .setOrigin(0.5)
            .setDepth(9);
          this.promptText = this.add
            .text(cx, 86, "", {
              fontSize: "28px",
              color: "#ffffff",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(9);
          this.qnumText = this.add
            .text(cx, 112, "", { fontSize: "12px", color: "#c890a8" })
            .setOrigin(0.5)
            .setDepth(9);

          // Cannon base + barrel
          this.add.circle(this.cannonX, this.cannonY, 34, 0x6b3050).setDepth(10);
          this.barrel = this.add
            .rectangle(this.cannonX, this.cannonY, 18, 56, 0xffb648)
            .setOrigin(0.5, 1)
            .setDepth(11);
          this.barrel.rotation = this.aim + Math.PI / 2;
          // aim guide line
          this.aimLine = this.add.graphics().setDepth(9);

          // particles
          this.confetti = this.add
            .particles(0, 0, "confetti", {
              speed: { min: 80, max: 280 },
              angle: { min: 0, max: 360 },
              scale: { start: 1.4, end: 0.2 },
              rotate: { min: 0, max: 360 },
              lifespan: 1100,
              gravityY: 240,
              emitting: false,
              quantity: 22,
              tint: [0xff7ba8, 0xffb648, 0xc45a3c, 0x9fd6ff],
            })
            .setDepth(40);
          this.popParticles = this.add
            .particles(0, 0, "spark", {
              speed: { min: 60, max: 220 },
              scale: { start: 1.4, end: 0 },
              lifespan: 500,
              emitting: false,
              quantity: 16,
              tint: [0xff7ba8, 0xffb648, 0xffffff],
            })
            .setDepth(40);
          this.redFlash = this.add
            .rectangle(cx, H / 2, W, H, 0xff3355, 0)
            .setDepth(35);
          this.feedback = this.add
            .text(cx, 150, "", {
              fontSize: "16px",
              color: "#fff",
              fontStyle: "bold",
              align: "center",
              wordWrap: { width: W - 80 },
            })
            .setOrigin(0.5)
            .setAlpha(0)
            .setDepth(20);

          // input
          this.cursors = this.input.keyboard.createCursorKeys();
          this.keyA = this.input.keyboard.addKey("A");
          this.keyD = this.input.keyboard.addKey("D");
          this.input.keyboard.on("keydown-SPACE", () => this.fire());
          this.input.keyboard.on("keydown-UP", () => this.fire());
          this.input.on("pointerdown", (p) => {
            // tapping a bubble fires directly at it
            let hit = -1;
            this.bubbles.forEach((b, i) => {
              if (!b.alive) return;
              const dx = b.sprite.x - p.worldX,
                dy = b.sprite.y - p.worldY;
              if (dx * dx + dy * dy <= 48 * 48) hit = i;
            });
            if (hit >= 0) {
              this.aim = Math.atan2(
                this.bubbles[hit].sprite.y - this.cannonY,
                this.bubbles[hit].sprite.x - this.cannonX,
              );
              this.fire();
            } else {
              // aim toward pointer, then fire
              this.aim = Math.atan2(
                p.worldY - this.cannonY,
                p.worldX - this.cannonX,
              );
              this.fire();
            }
          });

          this.nextQuestion();
          this.cameras.main.fadeIn(350);
        }

        nextQuestion() {
          if (this.qIndex >= this.TOTAL || this.lives <= 0) {
            this.endGame();
            return;
          }
          const round = this.roundFor(this.qIndex);
          if (round !== this.level && this.qIndex > 0) SFX.levelUp();
          this.level = round;
          this.q = genQuestion(round);
          this.qIndex++;
          this.busy = false;

          this.tagText.setText(this.q.tag);
          this.promptText.setText(this.q.prompt + " = ?");
          this.qnumText.setText(this.qIndex + " / " + this.TOTAL);
          this.feedback.setAlpha(0);

          srSay(
            this.q.tag +
              ". " +
              this.q.prompt +
              " equals what? Bubbles: " +
              this.q.bubbles.join(", ") +
              ". Aim the cannon and fire at the correct one.",
          );

          // spawn bubbles in 3 horizontal slots, drifting
          this.bubbles.forEach((b) => b.sprite.destroy());
          this.bubbles = [];
          const slotX = [W * 0.25, W * 0.5, W * 0.75];
          const drift = (28 + (this.level - 1) * 22) / 1000; // px/ms
          for (let i = 0; i < 3; i++) {
            const c = this.add.container(slotX[i], 200 + (i % 2) * 40).setDepth(14);
            const circle = this.add.graphics();
            circle.fillStyle(0x6b3050, 0.92);
            circle.fillCircle(0, 0, 42);
            circle.lineStyle(3, 0xff7ba8, 0.9);
            circle.strokeCircle(0, 0, 42);
            c.add(circle);
            c.add(
              this.add
                .text(0, 0, this.q.bubbles[i], {
                  fontSize: "26px",
                  color: "#ffffff",
                  fontStyle: "bold",
                })
                .setOrigin(0.5),
            );
            this.bubbles.push({
              sprite: c,
              alive: true,
              label: this.q.bubbles[i],
              correct: i === this.q.correctIndex,
              vx: (i % 2 === 0 ? 1 : -1) * drift,
            });
          }
          if (this.shell) {
            this.shell.destroy();
            this.shell = null;
          }
        }

        update(time, delta) {
          // aim rotation (held keys)
          let rotated = false;
          const rs = 0.0028 * delta;
          if (this.cursors.left.isDown || this.keyA.isDown) {
            this.aim -= rs;
            rotated = true;
          }
          if (this.cursors.right.isDown || this.keyD.isDown) {
            this.aim += rs;
            rotated = true;
          }
          // clamp aim to upper hemisphere so you can always reach bubbles
          this.aim = Phaser.Math.Clamp(this.aim, -Math.PI + 0.25, -0.25);
          this.barrel.rotation = this.aim + Math.PI / 2;

          // draw aim guide
          this.aimLine.clear();
          this.aimLine.lineStyle(2, 0xffb648, 0.45);
          this.aimLine.lineBetween(
            this.cannonX,
            this.cannonY - 30,
            this.cannonX + Math.cos(this.aim) * 520,
            this.cannonY - 30 + Math.sin(this.aim) * 520,
          );

          // drift bubbles (only while not resolving)
          if (!this.busy) {
            this.bubbles.forEach((b) => {
              if (!b.alive) return;
              b.sprite.x += b.vx * delta;
              if (b.sprite.x < 70) {
                b.sprite.x = 70;
                b.vx = Math.abs(b.vx);
              }
              if (b.sprite.x > W - 70) {
                b.sprite.x = W - 70;
                b.vx = -Math.abs(b.vx);
              }
            });
          }

          // shell flight
          if (this.shell) {
            this.shell.x += this.shellVX * delta;
            this.shell.y += this.shellVY * delta;
            // off screen miss
            if (
              this.shell.y < -20 ||
              this.shell.x < -20 ||
              this.shell.x > W + 20
            ) {
              this.shell.destroy();
              this.shell = null;
              if (!this.busy) this.resolveMiss(null);
            } else {
              // check collision with bubbles
              for (let i = 0; i < this.bubbles.length; i++) {
                const b = this.bubbles[i];
                if (!b.alive) continue;
                const dx = b.sprite.x - this.shell.x,
                  dy = b.sprite.y - this.shell.y;
                if (dx * dx + dy * dy <= 46 * 46) {
                  this.shell.destroy();
                  this.shell = null;
                  this.resolveHit(i);
                  break;
                }
              }
            }
          }
        }

        fire() {
          if (this.busy || this.shell) return;
          SFX.init();
          SFX.fire();
          const sp = 0.6; // px/ms
          this.shell = this.add
            .image(
              this.cannonX + Math.cos(this.aim) * 32,
              this.cannonY - 30 + Math.sin(this.aim) * 32,
              "shell",
            )
            .setDepth(16);
          this.shellVX = Math.cos(this.aim) * sp;
          this.shellVY = Math.sin(this.aim) * sp;
        }

        resolveHit(i) {
          this.busy = true;
          const b = this.bubbles[i];
          b.alive = false;
          SFX.init();
          this.popParticles.emitParticleAt(b.sprite.x, b.sprite.y);
          if (!this.reduce)
            this.tweens.add({
              targets: b.sprite,
              scale: { from: 1, to: 1.6 },
              alpha: 0,
              duration: 200,
              onComplete: () => b.sprite.setVisible(false),
            });
          else b.sprite.setVisible(false);

          if (b.correct) {
            this.correct++;
            this.streak++;
            this.maxStreak = Math.max(this.maxStreak, this.streak);
            const gained = 10 + Math.min(this.streak, 5) * 2;
            this.score += gained;
            SFX.pop();
            if (this.streak >= 3) SFX.streak(this.streak);
            this.confetti.emitParticleAt(b.sprite.x, b.sprite.y);
            this.flash(
              "✓ +" +
                gained +
                (this.streak > 1 ? "   🔥 ×" + this.streak : "") +
                "   " +
                this.q.why,
              "#9fffc0",
            );
            srSay("Correct! " + this.q.why);
            try {
              if (window.GameFX && GameFX.celebrate && this.streak >= 3)
                GameFX.celebrate(document.querySelector("canvas"));
            } catch (e) {}
            this.updateHUD();
            this.time.delayedCall(950, () => this.nextQuestion());
          } else {
            this.resolveMiss(i);
          }
        }

        resolveMiss(i) {
          this.busy = true;
          this.streak = 0;
          this.lives--;
          SFX.init();
          SFX.miss();
          this.doRedFlash();
          this.flash("✗ " + this.q.why + "  (−1 ❤)", "#ff9ab0");
          srSay("Missed. " + this.q.why);
          // highlight correct bubble
          const cb = this.bubbles[this.q.correctIndex];
          if (cb && cb.alive)
            this.tweens.add({
              targets: cb.sprite,
              scale: { from: 1, to: 1.3 },
              duration: 300,
              yoyo: true,
              repeat: 1,
            });
          this.updateHUD();
          this.time.delayedCall(1600, () => this.nextQuestion());
        }

        flash(msg, color) {
          this.feedback.setText(msg).setColor(color).setAlpha(1).setScale(0.85);
          this.tweens.add({
            targets: this.feedback,
            scale: 1,
            duration: this.reduce ? 1 : 220,
            ease: "Back.easeOut",
          });
        }
        doRedFlash() {
          if (this.reduce) return;
          this.redFlash.setAlpha(0.35);
          this.tweens.add({ targets: this.redFlash, alpha: 0, duration: 350 });
        }
        updateHUD() {
          this.scoreText.setText("Score: " + this.score);
          this.streakText.setText("Streak: " + this.streak);
          this.livesText.setText(this.lives > 0 ? "❤".repeat(this.lives) : "—");
        }
        endGame() {
          this.scene.start("Result", {
            score: this.score,
            correct: this.correct,
            attempted: this.qIndex,
            maxStreak: this.maxStreak,
            outOfLives: this.lives <= 0,
          });
        }
      }

      class ResultScene extends Phaser.Scene {
        constructor() {
          super("Result");
        }
        init(data) {
          this.d = data;
        }
        create() {
          const cx = W / 2;
          const d = this.d;
          this.reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          this.add.rectangle(cx, H / 2, W, H, 0x2a1326);
          const pct = d.attempted ? (d.correct / d.attempted) * 100 : 0;
          const stars = pct >= 90 ? 3 : pct >= 65 ? 2 : pct >= 40 ? 1 : 0;
          const won = !d.outOfLives;
          if (stars >= 2) SFX.win();
          else SFX.lose();

          this.add
            .text(cx, 70, won ? "ALL POPPED!" : "OUT OF LIVES", {
              fontSize: "38px",
              fontStyle: "bold",
              color: won ? "#ff7ba8" : "#ff6b8a",
              stroke: "#1c0c19",
              strokeThickness: 4,
            })
            .setOrigin(0.5);

          for (let i = 0; i < 3; i++) {
            const sx = cx - 70 + i * 70;
            this.add
              .text(sx, 150, "☆", { fontSize: "54px", color: "#503040" })
              .setOrigin(0.5);
            if (i < stars) {
              const s = this.add
                .text(sx, 150, "★", { fontSize: "54px", color: "#ffb648" })
                .setOrigin(0.5)
                .setScale(0);
              this.tweens.add({
                targets: s,
                scale: 1,
                duration: this.reduce ? 1 : 380,
                delay: 250 + i * 220,
                ease: "Back.easeOut",
              });
            }
          }

          const prevHigh = parseInt(localStorage.getItem(LS_KEY) || "0", 10);
          const isNewHigh = d.score > prevHigh;
          if (isNewHigh && d.score > 0)
            localStorage.setItem(LS_KEY, String(d.score));

          const stats = [
            ["Final Score", String(d.score)],
            ["Bubbles Popped", d.correct + " / " + d.attempted],
            ["Accuracy", Math.round(pct) + "%"],
            ["Best Streak", "×" + d.maxStreak],
          ];
          stats.forEach((s, i) => {
            const y = 230 + i * 42;
            this.add.rectangle(cx, y, 380, 34, 0x1c0c19, 0.85);
            this.add
              .text(cx - 165, y, s[0], { fontSize: "15px", color: "#c890a8" })
              .setOrigin(0, 0.5);
            this.add
              .text(cx + 165, y, s[1], {
                fontSize: "17px",
                color: "#ff7ba8",
                fontStyle: "bold",
              })
              .setOrigin(1, 0.5);
          });

          if (isNewHigh && d.score > 0)
            this.add
              .text(cx, 415, "★ NEW HIGH SCORE! ★", {
                fontSize: "18px",
                color: "#ffb648",
                fontStyle: "bold",
              })
              .setOrigin(0.5);

          try {
            window.EduPulse &&
              EduPulse.record({
                activityTitle: ACTIVITY_TITLE,
                score: d.score,
                stars: stars,
                problemsCorrect: d.correct,
                problemsAttempted: d.attempted,
                percent: Math.round(pct),
                standard: STANDARD,
              });
          } catch (e) {}

          srSay(
            (won ? "All popped. " : "Out of lives. ") +
              "Score " +
              d.score +
              ", " +
              d.correct +
              " of " +
              d.attempted +
              " correct, " +
              stars +
              " stars.",
          );

          const retry = this.add
            .rectangle(cx - 95, 470, 170, 46, 0xc45a3c)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx - 95, 470, "PLAY AGAIN", {
              fontSize: "17px",
              fontStyle: "bold",
              color: "#fff3ec",
            })
            .setOrigin(0.5);
          retry.on("pointerover", () => retry.setFillStyle(0xd86c4c));
          retry.on("pointerout", () => retry.setFillStyle(0xc45a3c));
          retry.on("pointerdown", () => {
            SFX.tick();
            this.scene.start("Game");
          });

          const hub = this.add
            .rectangle(cx + 95, 470, 170, 46, 0x4a2240)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx + 95, 470, "ALL GAMES", {
              fontSize: "17px",
              fontStyle: "bold",
              color: "#e0a8c0",
            })
            .setOrigin(0.5);
          hub.on("pointerover", () => hub.setFillStyle(0x5c2c50));
          hub.on("pointerout", () => hub.setFillStyle(0x4a2240));
          hub.on("pointerdown", () => (window.location.href = "/math/games/"));

          this.input.keyboard.on("keydown-SPACE", () => this.scene.start("Game"));

          if (won && stars >= 2 && !this.reduce) {
            const p = this.add
              .particles(0, 0, "confetti", {
                speed: { min: 60, max: 240 },
                angle: { min: 0, max: 360 },
                scale: { start: 1.4, end: 0 },
                rotate: { min: 0, max: 360 },
                lifespan: 1500,
                gravityY: 160,
                quantity: 20,
                tint: [0xff7ba8, 0xffb648, 0xc45a3c, 0x9fd6ff],
              })
              .setDepth(40);
            for (let i = 0; i < 5; i++)
              this.time.delayedCall(i * 280, () =>
                p.emitParticleAt(randInt(120, W - 120), randInt(40, 140)),
              );
          }
          this.cameras.main.fadeIn(400);
        }
      }

      config.scene = [BootScene, TitleScene, GameScene, ResultScene];
      const game = new Phaser.Game(config);

      game.events.once("ready", function () {
        try {
          const cv = game.canvas;
          if (!cv) return;
          cv.setAttribute("role", "application");
          cv.setAttribute(
            "aria-label",
            "Fraction Frenzy bubble-popper math game. Divide the fractions, then " +
              "aim the cannon with the arrow keys or A and D and press Space or Up " +
              "to fire at the bubble showing the correct quotient. Press Space to " +
              "start.",
          );
          cv.setAttribute("aria-roledescription", "math game");
          if (!cv.hasAttribute("tabindex")) cv.setAttribute("tabindex", "0");
          cv.addEventListener("pointerdown", function () {
            try {
              cv.focus();
            } catch (e) {}
          });
        } catch (e) {}
      });
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <script src="/shared/save-resume/save-resume-engine.js" defer></script>
    <!-- nsr-injected:end -->
    <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
    <script src="/assets/game-fx.js" defer></script>
    <!-- gfx-injected:end -->
  </body>
