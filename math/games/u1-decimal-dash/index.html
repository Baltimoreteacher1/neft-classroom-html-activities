    <script>
      (function () {
        var host = document.getElementById("dd-bg");
        if (!host) return;
        var reduce =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    <script>
      // ════════════════════════════════════════════════════════════════════
      // DECIMAL DASH — Lane Runner  ·  Grade 6  ·  6.NS.2 / 6.NS.3
      // Lessons 1.4–1.7: multi-digit division, decimal + − × ÷.
      //
      // MECHANIC: You drive a car down a 3-lane highway. A row of "answer gates"
      //   (one per lane) rushes toward you, each gate labeled with a value. The
      //   prompt at top is a computation; steer the car (← → / A D / tap a lane)
      //   into the lane whose gate holds the CORRECT answer to pass through.
      //   Driving into a wrong gate = crash (lose a life). Speed (and number
      //   size) rises each round.
      //
      // FLOAT SAFETY: every value is normalized through r2()/fmt() to a fixed
      //   2-decimal string; correctness is checked by string equality, never by
      //   raw float ==, so 0.1+0.2 style drift can never mislabel a gate.
      // ════════════════════════════════════════════════════════════════════
      const LS_KEY = "dd_decimal_dash_highscore";
      const W = 800,
        H = 600;
      const ACTIVITY_TITLE = "Decimal Dash — Lessons 1.4–1.7";
      const STANDARD = "6.NS.3";

      const SFX = {
        ctx: null,
        init() {
          if (!this.ctx)
            try {
              this.ctx = new (window.AudioContext ||
                window.webkitAudioContext)();
            } catch (e) {}
        },
        play(t, f, d, v = 0.2) {
          if (!this.ctx) return;
          try {
            const c = this.ctx,
              o = c.createOscillator(),
              g = c.createGain();
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
            o.connect(g);
            g.connect(c.destination);
            o.start();
            o.stop(c.currentTime + d);
          } catch (e) {}
        },
        noise(d, v = 0.1) {
          if (!this.ctx) return;
          try {
            const c = this.ctx,
              n = c.sampleRate * d,
              buf = c.createBuffer(1, n, c.sampleRate),
              dt = buf.getChannelData(0);
            for (let i = 0; i < n; i++) dt[i] = Math.random() * 2 - 1;
            const s = c.createBufferSource();
            s.buffer = buf;
            const g = c.createGain();
            g.gain.setValueAtTime(v, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
            s.connect(g);
            g.connect(c.destination);
            s.start();
            s.stop(c.currentTime + d);
          } catch (e) {}
        },
        pass() {
          this.play("sine", 660, 0.1, 0.3);
          this.play("sine", 990, 0.14, 0.22);
        },
        crash() {
          this.noise(0.25, 0.15);
          this.play("sawtooth", 160, 0.3, 0.18);
        },
        engine() {
          this.play("triangle", 220, 0.05, 0.05);
        },
        tick() {
          this.play("square", 600, 0.03, 0.07);
        },
        streak(n) {
          [523, 659, 784, 988, 1175]
            .slice(0, Math.min(n, 5))
            .forEach((f, i) =>
              setTimeout(() => this.play("sine", f, 0.12, 0.2), i * 55),
            );
        },
        levelUp() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.15, 0.22), i * 70),
          );
        },
        win() {
          [523, 659, 784, 1047, 1318].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.22, 0.28), i * 110),
          );
        },
        lose() {
          [400, 350, 300, 200].forEach((f, i) =>
            setTimeout(() => this.play("sawtooth", f, 0.28, 0.15), i * 170),
          );
        },
      };

      function randInt(a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a;
      }
      function shuffle(a) {
        const r = a.slice();
        for (let i = r.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [r[i], r[j]] = [r[j], r[i]];
        }
        return r;
      }
      // Round to 2 decimals (integer-cents math to avoid float drift).
      function r2(x) {
        return Math.round((x + Number.EPSILON) * 100) / 100;
      }
      // Canonical display/compare string. Whole numbers stay plain; decimals
      // trim trailing zeros but keep at least one place.
      function fmt(x) {
        const v = r2(x);
        if (Number.isInteger(v)) return String(v);
        let s = v.toFixed(2);
        s = s.replace(/0$/, ""); // 3.50 -> 3.5 ; 3.05 stays
        return s;
      }

      // Build 3 distinct gate labels containing exactly one correct answer.
      function buildGates(answer, makeWrong) {
        const correct = fmt(answer);
        const set = new Set([correct]);
        let guard = 0;
        while (set.size < 3 && guard++ < 200) {
          const w = fmt(makeWrong());
          if (w !== correct && w !== "NaN" && Number(w) > 0) set.add(w);
        }
        // Safety fallback: pad with offsets if collisions left us short.
        let pad = 1;
        while (set.size < 3 && pad < 50) {
          const w = fmt(r2(answer) + pad * (pad % 2 ? 1 : -1));
          if (w !== correct && Number(w) > 0) set.add(w);
          pad++;
        }
        const labels = shuffle(Array.from(set));
        return { labels: labels, correctIndex: labels.indexOf(correct) };
      }

      // round 1: multi-digit division (whole quotient)
      // round 2: add/subtract decimals
      // round 3: multiply OR divide decimals
      function genQuestion(round) {
        if (round === 1) {
          const q = randInt(12, 48),
            d = randInt(3, 9),
            dividend = q * d;
          const g = buildGates(q, () => q + randInt(-7, 7));
          return {
            tag: "Multi-Digit Division",
            prompt: dividend + " ÷ " + d,
            why: dividend + " ÷ " + d + " = " + q + ".",
            gates: g.labels,
            correctIndex: g.correctIndex,
          };
        }
        if (round === 2) {
          let a = r2(randInt(15, 95) / 10 + randInt(0, 9) / 100);
          let b = r2(randInt(10, 70) / 10 + randInt(0, 9) / 100);
          const add = Math.random() < 0.5;
          if (!add && b > a) {
            const t = a;
            a = b;
            b = t;
          }
          const ans = r2(add ? a + b : a - b);
          const g = buildGates(ans, () => {
            const w = r2(ans + (randInt(1, 9) / 10) * (Math.random() < 0.5 ? 1 : -1));
            return w > 0 ? w : r2(ans + randInt(1, 9) / 10);
          });
          return {
            tag: "Add & Subtract Decimals",
            prompt: fmt(a) + (add ? " + " : " − ") + fmt(b),
            why: fmt(a) + (add ? " + " : " − ") + fmt(b) + " = " + fmt(ans) + ".",
            gates: g.labels,
            correctIndex: g.correctIndex,
          };
        }
        // round 3
        const mul = Math.random() < 0.5;
        if (mul) {
          const x = r2(randInt(2, 9) / 10 + (Math.random() < 0.5 ? randInt(1, 4) : 0));
          const y = randInt(2, 9);
          const ans = r2(x * y);
          const g = buildGates(ans, () => {
            const w = r2(ans + (randInt(1, 9) / 10) * (Math.random() < 0.5 ? 1 : -1));
            return w > 0 ? w : r2(ans + randInt(1, 9) / 10);
          });
          return {
            tag: "Multiply Decimals",
            prompt: fmt(x) + " × " + y,
            why: fmt(x) + " × " + y + " = " + fmt(ans) + ".",
            gates: g.labels,
            correctIndex: g.correctIndex,
          };
        } else {
          const quo = r2(randInt(11, 49) / 10); // 1.1 .. 4.9
          const dv = randInt(2, 6);
          const dividend = r2(quo * dv);
          const g = buildGates(quo, () => {
            const w = r2(quo + (randInt(1, 9) / 10) * (Math.random() < 0.5 ? 1 : -1));
            return w > 0 ? w : r2(quo + randInt(1, 9) / 10);
          });
          return {
            tag: "Divide Decimals",
            prompt: fmt(dividend) + " ÷ " + dv,
            why: fmt(dividend) + " ÷ " + dv + " = " + fmt(quo) + ".",
            gates: g.labels,
            correctIndex: g.correctIndex,
          };
        }
      }

      function srSay(msg) {
        try {
          const el = document.getElementById("dd-sr");
          if (el) el.textContent = msg;
        } catch (e) {}
      }

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#102338",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [],
      };

      // 3 lanes
      const LANE_X = [W * 0.22, W * 0.5, W * 0.78];

      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          const g = this.make.graphics({ add: false });
          g.fillStyle(0xffffff);
          g.fillRect(0, 0, 7, 4);
          g.generateTexture("confetti", 7, 4);
          g.clear();
          g.fillStyle(0xffffff);
          g.fillCircle(3, 3, 3);
          g.generateTexture("spark", 6, 6);
          g.destroy();
          this.scene.start("Title");
        }
      }

      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          const cx = W / 2;
          this.reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          this.add.rectangle(cx, H / 2, W, H, 0x102338);
          this.add
            .text(cx, 120, "DECIMAL", {
              fontSize: "66px",
              fontFamily: "Impact, sans-serif",
              color: "#5ad1ff",
              stroke: "#0a1626",
              strokeThickness: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 186, "DASH", {
              fontSize: "66px",
              fontFamily: "Impact, sans-serif",
              color: "#d4952a",
              stroke: "#0a1626",
              strokeThickness: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 244, "Lane Runner  ·  Lessons 1.4–1.7  ·  6.NS.2 / 6.NS.3", {
              fontSize: "15px",
              color: "#9fc6e0",
            })
            .setOrigin(0.5);
          this.add
            .text(
              cx,
              300,
              "Solve the problem at the top, then STEER your car into\nthe lane whose gate shows the correct answer.",
              { fontSize: "15px", color: "#7fa8c3", align: "center" },
            )
            .setOrigin(0.5);
          this.add
            .text(cx, 356, "← → or A/D to change lanes   ·   tap a lane on touch", {
              fontSize: "14px",
              color: "#6b97b3",
            })
            .setOrigin(0.5);

          const hs = localStorage.getItem(LS_KEY);
          if (hs)
            this.add
              .text(cx, 392, "HIGH SCORE: " + hs, {
                fontSize: "15px",
                color: "#d4952a",
                fontStyle: "bold",
              })
              .setOrigin(0.5);

          const btn = this.add
            .rectangle(cx, 450, 260, 56, 0x1a6fb5)
            .setInteractive({ useHandCursor: true });
          const btnT = this.add
            .text(cx, 450, "START ENGINE ▶", {
              fontSize: "22px",
              fontStyle: "bold",
              color: "#eaf6ff",
            })
            .setOrigin(0.5);
          if (!this.reduce)
            this.tweens.add({
              targets: [btn, btnT],
              scaleX: 1.05,
              scaleY: 1.05,
              duration: 800,
              yoyo: true,
              repeat: -1,
            });
          const go = () => {
            SFX.init();
            SFX.tick();
            this.cameras.main.fadeOut(300);
            this.time.delayedCall(300, () => this.scene.start("Game"));
          };
          btn.on("pointerover", () => btn.setFillStyle(0x2080cc));
          btn.on("pointerout", () => btn.setFillStyle(0x1a6fb5));
          btn.on("pointerdown", go);
          this.input.keyboard.on("keydown-SPACE", go);
          this.input.keyboard.on("keydown-ENTER", go);

          const hub = this.add
            .text(cx, 555, "← Back to Games hub", {
              fontSize: "15px",
              fontStyle: "bold",
              color: "#6b97b3",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });
          hub.on("pointerover", () => hub.setColor("#5ad1ff"));
          hub.on("pointerout", () => hub.setColor("#6b97b3"));
          hub.on("pointerdown", () => (window.location.href = "/math/games/"));

          this.cameras.main.fadeIn(400);
        }
      }

      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }
        init() {
          this.reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          this.score = 0;
          this.lives = 3;
          this.streak = 0;
          this.maxStreak = 0;
          this.correct = 0;
          this.qIndex = 0;
          this.TOTAL = 12;
          this.level = 1;
          this.lane = 1;
          this.busy = false;
          this.gateRow = null;
        }
        roundFor(i) {
          return i < 4 ? 1 : i < 8 ? 2 : 3;
        }
        create() {
          const cx = W / 2;
          this.add.rectangle(cx, H / 2, W, H, 0x223a2a); // grass
          // road
          this.roadX0 = LANE_X[0] - 90;
          this.roadX1 = LANE_X[2] + 90;
          this.roadW = this.roadX1 - this.roadX0;
          this.add.rectangle(
            (this.roadX0 + this.roadX1) / 2,
            H / 2,
            this.roadW,
            H,
            0x2b3340,
          );
          // lane divider dashes (animated by scrolling)
          this.dashes = [];
          for (let li = 0; li < 2; li++) {
            const dx = (LANE_X[li] + LANE_X[li + 1]) / 2;
            for (let y = -40; y < H + 40; y += 60) {
              const dsh = this.add.rectangle(dx, y, 6, 30, 0xf0d060, 0.7);
              this.dashes.push(dsh);
            }
          }

          // top HUD band
          this.add.rectangle(cx, 24, W, 48, 0x0a1626, 0.92).setDepth(8);
          this.scoreText = this.add
            .text(16, 12, "Score: 0", {
              fontSize: "20px",
              color: "#5ad1ff",
              fontStyle: "bold",
            })
            .setDepth(9);
          this.livesText = this.add
            .text(W - 16, 12, "❤❤❤", { fontSize: "20px", color: "#ff6b5a" })
            .setOrigin(1, 0)
            .setDepth(9);
          this.streakText = this.add
            .text(cx, 12, "Streak: 0", {
              fontSize: "16px",
              color: "#d4952a",
              fontStyle: "bold",
            })
            .setOrigin(0.5, 0)
            .setDepth(9);

          // prompt panel
          this.add.rectangle(cx, 78, 360, 56, 0x0a1626, 0.92).setDepth(8);
          this.tagText = this.add
            .text(cx, 62, "", { fontSize: "13px", color: "#9fc6e0" })
            .setOrigin(0.5)
            .setDepth(9);
          this.promptText = this.add
            .text(cx, 86, "", {
              fontSize: "26px",
              color: "#ffffff",
              fontStyle: "bold",
            })
            .setOrigin(0.5)
            .setDepth(9);
          this.qnumText = this.add
            .text(cx, 112, "", { fontSize: "12px", color: "#7fa8c3" })
            .setOrigin(0.5)
            .setDepth(9);

          // Car
          this.carY = H - 80;
          this.car = this.add.container(LANE_X[this.lane], this.carY).setDepth(15);
          const body = this.add.graphics();
          body.fillStyle(0xd43c3c, 1);
          body.fillRoundedRect(-22, -34, 44, 68, 10);
          body.fillStyle(0xa42c2c, 1);
          body.fillRoundedRect(-22, -6, 44, 28, 6);
          body.fillStyle(0x9fd6ff, 1);
          body.fillRoundedRect(-15, -26, 30, 16, 4); // windshield
          body.lineStyle(2, 0xffffff, 0.6);
          body.strokeRoundedRect(-22, -34, 44, 68, 10);
          this.car.add(body);

          this.confetti = this.add
            .particles(0, 0, "confetti", {
              speed: { min: 80, max: 280 },
              angle: { min: 0, max: 360 },
              scale: { start: 1.4, end: 0.2 },
              rotate: { min: 0, max: 360 },
              lifespan: 1100,
              gravityY: 240,
              emitting: false,
              quantity: 22,
              tint: [0x5ad1ff, 0x1a6fb5, 0xd4952a, 0x2d874b],
            })
            .setDepth(40);
          this.crashParticles = this.add
            .particles(0, 0, "spark", {
              speed: { min: 60, max: 220 },
              scale: { start: 1.4, end: 0 },
              lifespan: 500,
              emitting: false,
              quantity: 16,
              tint: [0xff6b5a, 0xffaa33, 0xaa3333],
            })
            .setDepth(40);
          this.redFlash = this.add
            .rectangle(cx, H / 2, W, H, 0xff3322, 0)
            .setDepth(35);
          this.feedback = this.add
            .text(cx, 150, "", {
              fontSize: "16px",
              color: "#fff",
              fontStyle: "bold",
              align: "center",
              wordWrap: { width: W - 80 },
            })
            .setOrigin(0.5)
            .setAlpha(0)
            .setDepth(20);

          // Input
          this.cursors = this.input.keyboard.createCursorKeys();
          this.keyA = this.input.keyboard.addKey("A");
          this.keyD = this.input.keyboard.addKey("D");
          this.input.keyboard.on("keydown-LEFT", () => this.moveLane(-1));
          this.input.keyboard.on("keydown-RIGHT", () => this.moveLane(1));
          this.input.keyboard.on("keydown-A", () => this.moveLane(-1));
          this.input.keyboard.on("keydown-D", () => this.moveLane(1));
          this.input.on("pointerdown", (p) => {
            // pick nearest lane by pointer x
            let best = 0,
              bd = Infinity;
            LANE_X.forEach((lx, i) => {
              const dd = Math.abs(lx - p.worldX);
              if (dd < bd) {
                bd = dd;
                best = i;
              }
            });
            this.setLane(best);
          });

          this.nextQuestion();
          this.cameras.main.fadeIn(350);
        }

        moveLane(dir) {
          this.setLane(Phaser.Math.Clamp(this.lane + dir, 0, 2));
        }
        setLane(i) {
          if (i === this.lane || this.busy) {
            this.lane = i;
            return;
          }
          this.lane = i;
          SFX.init();
          SFX.engine();
          this.tweens.add({
            targets: this.car,
            x: LANE_X[i],
            duration: this.reduce ? 1 : 120,
            ease: "Quad.easeOut",
          });
        }

        nextQuestion() {
          if (this.qIndex >= this.TOTAL || this.lives <= 0) {
            this.endGame();
            return;
          }
          const round = this.roundFor(this.qIndex);
          if (round !== this.level && this.qIndex > 0) SFX.levelUp();
          this.level = round;
          this.q = genQuestion(round);
          this.qIndex++;
          this.busy = false;

          this.tagText.setText(this.q.tag);
          this.promptText.setText(this.q.prompt + " = ?");
          this.qnumText.setText(this.qIndex + " / " + this.TOTAL);
          this.feedback.setAlpha(0);

          srSay(
            this.q.tag +
              ". " +
              this.q.prompt +
              " equals what? Lane gates: left " +
              this.q.gates[0] +
              ", middle " +
              this.q.gates[1] +
              ", right " +
              this.q.gates[2] +
              ". Steer into the correct gate.",
          );

          // Build gate row container (starts above the visible road)
          if (this.gateRow) this.gateRow.destroy();
          this.gateRow = this.add.container(0, -60).setDepth(12);
          this.gateSprites = [];
          for (let i = 0; i < 3; i++) {
            const lx = LANE_X[i];
            const g = this.add.graphics();
            const col = i === this.q.correctIndex ? 0x2d874b : 0x1a6fb5;
            g.fillStyle(col, 0.85);
            g.fillRoundedRect(lx - 70, -28, 140, 56, 12);
            g.lineStyle(3, 0xffffff, 0.85);
            g.strokeRoundedRect(lx - 70, -28, 140, 56, 12);
            this.gateRow.add(g);
            const t = this.add
              .text(lx, 0, this.q.gates[i], {
                fontSize: "26px",
                color: "#ffffff",
                fontStyle: "bold",
              })
              .setOrigin(0.5);
            this.gateRow.add(t);
            this.gateSprites.push({ g: g, t: t });
          }
          // Gate descends toward the car; speed rises with level.
          this.gateVY = (110 + (this.level - 1) * 45) / 1000; // px/ms
          this.gateResolved = false;
        }

        update(time, delta) {
          // scroll lane dashes for a sense of motion
          if (!this.reduce) {
            const ds = 0.25 * delta * (1 + (this.level - 1) * 0.3);
            this.dashes.forEach((d) => {
              d.y += ds;
              if (d.y > H + 30) d.y -= H + 70;
            });
          }
          // also allow held arrow keys (key events handle taps; this covers holds)
          if (this.busy || !this.gateRow || this.gateResolved) return;
          this.gateRow.y += this.gateVY * delta;
          // resolve when gate row center reaches car
          if (this.gateRow.y >= this.carY) {
            this.gateResolved = true;
            this.resolve();
          }
        }

        resolve() {
          this.busy = true;
          SFX.init();
          const right = this.lane === this.q.correctIndex;
          if (right) {
            this.correct++;
            this.streak++;
            this.maxStreak = Math.max(this.maxStreak, this.streak);
            const gained = 10 + Math.min(this.streak, 5) * 2;
            this.score += gained;
            SFX.pass();
            if (this.streak >= 3) SFX.streak(this.streak);
            this.confetti.emitParticleAt(LANE_X[this.lane], this.carY - 40);
            this.flash(
              "✓ +" +
                gained +
                (this.streak > 1 ? "   🔥 ×" + this.streak : "") +
                "   " +
                this.q.why,
              "#7fffb0",
            );
            srSay("Correct! " + this.q.why);
            // let the gate pass by
            this.tweens.add({
              targets: this.gateRow,
              y: H + 80,
              duration: this.reduce ? 1 : 220,
            });
            try {
              if (window.GameFX && GameFX.celebrate && this.streak >= 3)
                GameFX.celebrate(document.querySelector("canvas"));
            } catch (e) {}
          } else {
            this.streak = 0;
            this.lives--;
            SFX.crash();
            this.crashParticles.emitParticleAt(LANE_X[this.lane], this.carY);
            this.doRedFlash();
            if (!this.reduce)
              this.tweens.add({
                targets: this.car,
                angle: { from: -8, to: 8 },
                duration: 70,
                yoyo: true,
                repeat: 3,
                onComplete: () => this.car.setAngle(0),
              });
            this.flash("💥 Crash! " + this.q.why + "  (−1 ❤)", "#ff8a7a");
            srSay("Crash. " + this.q.why);
            // highlight correct gate
            const cs = this.gateSprites[this.q.correctIndex];
            if (cs)
              this.tweens.add({
                targets: cs.t,
                scale: { from: 1, to: 1.4 },
                duration: 300,
                yoyo: true,
                repeat: 1,
              });
          }
          this.updateHUD();
          this.time.delayedCall(right ? 950 : 1600, () => this.nextQuestion());
        }

        flash(msg, color) {
          this.feedback.setText(msg).setColor(color).setAlpha(1).setScale(0.85);
          this.tweens.add({
            targets: this.feedback,
            scale: 1,
            duration: this.reduce ? 1 : 220,
            ease: "Back.easeOut",
          });
        }
        doRedFlash() {
          if (this.reduce) return;
          this.redFlash.setAlpha(0.35);
          this.tweens.add({ targets: this.redFlash, alpha: 0, duration: 350 });
        }
        updateHUD() {
          this.scoreText.setText("Score: " + this.score);
          this.streakText.setText("Streak: " + this.streak);
          this.livesText.setText(this.lives > 0 ? "❤".repeat(this.lives) : "—");
        }
        endGame() {
          this.scene.start("Result", {
            score: this.score,
            correct: this.correct,
            attempted: this.qIndex,
            maxStreak: this.maxStreak,
            outOfLives: this.lives <= 0,
          });
        }
      }

      class ResultScene extends Phaser.Scene {
        constructor() {
          super("Result");
        }
        init(data) {
          this.d = data;
        }
        create() {
          const cx = W / 2;
          const d = this.d;
          this.reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          this.add.rectangle(cx, H / 2, W, H, 0x102338);
          const pct = d.attempted ? (d.correct / d.attempted) * 100 : 0;
          const stars = pct >= 90 ? 3 : pct >= 65 ? 2 : pct >= 40 ? 1 : 0;
          const won = !d.outOfLives;
          if (stars >= 2) SFX.win();
          else SFX.lose();

          this.add
            .text(cx, 70, won ? "FINISH LINE!" : "OUT OF LIVES", {
              fontSize: "38px",
              fontStyle: "bold",
              color: won ? "#5ad1ff" : "#ff6b5a",
              stroke: "#0a1626",
              strokeThickness: 4,
            })
            .setOrigin(0.5);

          for (let i = 0; i < 3; i++) {
            const sx = cx - 70 + i * 70;
            this.add
              .text(sx, 150, "☆", { fontSize: "54px", color: "#33505a" })
              .setOrigin(0.5);
            if (i < stars) {
              const s = this.add
                .text(sx, 150, "★", { fontSize: "54px", color: "#d4952a" })
                .setOrigin(0.5)
                .setScale(0);
              this.tweens.add({
                targets: s,
                scale: 1,
                duration: this.reduce ? 1 : 380,
                delay: 250 + i * 220,
                ease: "Back.easeOut",
              });
            }
          }

          const prevHigh = parseInt(localStorage.getItem(LS_KEY) || "0", 10);
          const isNewHigh = d.score > prevHigh;
          if (isNewHigh && d.score > 0)
            localStorage.setItem(LS_KEY, String(d.score));

          const stats = [
            ["Final Score", String(d.score)],
            ["Gates Cleared", d.correct + " / " + d.attempted],
            ["Accuracy", Math.round(pct) + "%"],
            ["Best Streak", "×" + d.maxStreak],
          ];
          stats.forEach((s, i) => {
            const y = 230 + i * 42;
            this.add.rectangle(cx, y, 380, 34, 0x0a1626, 0.85);
            this.add
              .text(cx - 165, y, s[0], { fontSize: "15px", color: "#7fa8c3" })
              .setOrigin(0, 0.5);
            this.add
              .text(cx + 165, y, s[1], {
                fontSize: "17px",
                color: "#5ad1ff",
                fontStyle: "bold",
              })
              .setOrigin(1, 0.5);
          });

          if (isNewHigh && d.score > 0)
            this.add
              .text(cx, 415, "★ NEW HIGH SCORE! ★", {
                fontSize: "18px",
                color: "#d4952a",
                fontStyle: "bold",
              })
              .setOrigin(0.5);

          try {
            window.EduPulse &&
              EduPulse.record({
                activityTitle: ACTIVITY_TITLE,
                score: d.score,
                stars: stars,
                problemsCorrect: d.correct,
                problemsAttempted: d.attempted,
                percent: Math.round(pct),
                standard: STANDARD,
              });
          } catch (e) {}

          srSay(
            (won ? "Finish line. " : "Out of lives. ") +
              "Score " +
              d.score +
              ", " +
              d.correct +
              " of " +
              d.attempted +
              " correct, " +
              stars +
              " stars.",
          );

          const retry = this.add
            .rectangle(cx - 95, 470, 170, 46, 0x1a6fb5)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx - 95, 470, "DRIVE AGAIN", {
              fontSize: "17px",
              fontStyle: "bold",
              color: "#eaf6ff",
            })
            .setOrigin(0.5);
          retry.on("pointerover", () => retry.setFillStyle(0x2080cc));
          retry.on("pointerout", () => retry.setFillStyle(0x1a6fb5));
          retry.on("pointerdown", () => {
            SFX.tick();
            this.scene.start("Game");
          });

          const hub = this.add
            .rectangle(cx + 95, 470, 170, 46, 0x223a48)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx + 95, 470, "ALL GAMES", {
              fontSize: "17px",
              fontStyle: "bold",
              color: "#9fc6e0",
            })
            .setOrigin(0.5);
          hub.on("pointerover", () => hub.setFillStyle(0x2c4c5c));
          hub.on("pointerout", () => hub.setFillStyle(0x223a48));
          hub.on("pointerdown", () => (window.location.href = "/math/games/"));

          this.input.keyboard.on("keydown-SPACE", () => this.scene.start("Game"));

          if (won && stars >= 2 && !this.reduce) {
            const p = this.add
              .particles(0, 0, "confetti", {
                speed: { min: 60, max: 240 },
                angle: { min: 0, max: 360 },
                scale: { start: 1.4, end: 0 },
                rotate: { min: 0, max: 360 },
                lifespan: 1500,
                gravityY: 160,
                quantity: 20,
                tint: [0x5ad1ff, 0x1a6fb5, 0xd4952a, 0x2d874b],
              })
              .setDepth(40);
            for (let i = 0; i < 5; i++)
              this.time.delayedCall(i * 280, () =>
                p.emitParticleAt(randInt(120, W - 120), randInt(40, 140)),
              );
          }
          this.cameras.main.fadeIn(400);
        }
      }

      config.scene = [BootScene, TitleScene, GameScene, ResultScene];
      const game = new Phaser.Game(config);

      game.events.once("ready", function () {
        try {
          const cv = game.canvas;
          if (!cv) return;
          cv.setAttribute("role", "application");
          cv.setAttribute(
            "aria-label",
            "Decimal Dash lane-runner math game. Solve the division or decimal " +
              "problem at the top, then steer your car with the arrow keys or A " +
              "and D into the lane whose gate shows the correct answer. Press " +
              "Space to start.",
          );
          cv.setAttribute("aria-roledescription", "math game");
          if (!cv.hasAttribute("tabindex")) cv.setAttribute("tabindex", "0");
          cv.addEventListener("pointerdown", function () {
            try {
              cv.focus();
            } catch (e) {}
          });
        } catch (e) {}
      });
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <script src="/shared/save-resume/save-resume-engine.js" defer></script>
    <!-- nsr-injected:end -->
    <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
    <script src="/assets/game-fx.js" defer></script>
    <!-- gfx-injected:end -->
  </body>
</html>
