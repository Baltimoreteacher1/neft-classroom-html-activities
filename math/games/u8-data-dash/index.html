    <style>

      /* Decorative animated chart-bar field behind the Phaser canvas. */
      #dd-bg {
        position: fixed;

        z-index: 0;

          130% 90% at 50% 0%,

          #0a1c2c 55%,
          #050d16 100%
        );
      }
      #dd-bg-layer {
        position: absolute;
        inset: -6% -6%;
        will-change: transform;
        transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
      }
      .dd-bar {
        position: absolute;
        bottom: 0;
        border-radius: 4px 4px 0 0;

      @keyframes ddPulse {
        0%,
        100% {
          opacity: 0.22;
        }
        50% {
          opacity: 0.5;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #dd-bg-layer {
          transition: none !important;
          transform: none !important;
        }
        .dd-bar {
          animation: none !important;
          opacity: 0.34 !important;
        }
      }
      #dd-sr {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

  <body>
    <!-- Decorative animated chart-bar field (behind the Phaser canvas). -->
    <div id="dd-bg" data-parallax aria-hidden="true">
      <div id="dd-bg-layer" data-parallax-layer></div>
    </div>
    <!-- Screen-reader live region mirrors the current question + result. -->
    <div id="dd-sr" role="status" aria-live="polite"></div>

    <script>
      // Decorative chart-bar builder + pointer parallax (gameplay-neutral).
      (function () {
        var layer = document.getElementById("dd-bg-layer");
        if (!layer) return;
        var reduce =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var colors = ["#1a6fb5", "#0e8a7d", "#d4952a", "#2d874b", "#2bd1c4"];
        var frag = document.createDocumentFragment();
        var n = Math.max(14, Math.round((window.innerWidth || 900) / 60));
        for (var i = 0; i < n; i++) {
          var b = document.createElement("div");
          b.className = "dd-bar";
          var w = 22 + Math.random() * 26;
          b.style.width = w + "px";
          b.style.height = 30 + Math.random() * 220 + "px";
          b.style.left = (i / n) * 100 + Math.random() * 2 + "%";
          b.style.background = colors[(Math.random() * colors.length) | 0];
          b.style.setProperty("--p", (3 + Math.random() * 4).toFixed(2) + "s");
          b.style.animationDelay = (-Math.random() * 5).toFixed(2) + "s";
          frag.appendChild(b);
        }
        layer.appendChild(frag);
        if (reduce) return;
        window.addEventListener(
          "pointermove",
          function (e) {
            var tx = (e.clientX / window.innerWidth - 0.5) * -22;
            var ty = (e.clientY / window.innerHeight - 0.5) * -14;
            layer.style.transform =
              "translate3d(" + tx + "px," + ty + "px,0)";
          },
          { passive: true },
        );
      })();
    </script>

    <script>
      // ════════════════════════════════════════════════════════════════════
      //  DATA DASH — STAT CATCHER   ·   Lessons 8.1-8.7 · 6.SP
      //  True 2D mechanic: a data set is shown; four answer tiles fall from the
      //  top; slide your collector cart (← → / pointer) to CATCH the tile that
      //  equals the requested statistic (mean, median, or range). Catch a wrong
      //  tile or let the correct one hit the floor = lose a life.
      //  Rising difficulty: Round 1 mean → Round 2 median (ODD sets) →
      //  Round 3 range; faster drops + larger data sets at higher levels.
      // ════════════════════════════════════════════════════════════════════
      const W = 900,
        H = 620;

      const C = {
        bg: 0x0a1c2c,
        panel: 0x10283c,
        panelEdge: 0x244a63,
        ink: "#eaf6ff",
        sub: "#9cc4dd",
        accent: 0x2bd1c4,
        good: 0x4fd18b,
        bad: 0xff6b6b,
        gold: 0xffcd4d,
        mean: 0x0e8a7d,
        median: 0xd4952a,
        range: 0xc45a3c,
        cart: 0x2bd1c4,
        tile: 0x163a52,
      };

      const STAT_INFO = {
        mean: { label: "MEAN", color: C.mean, hint: "Add all values, then divide by how many there are." },
        median: { label: "MEDIAN", color: C.median, hint: "Sort the values; the median is the middle one." },
        range: { label: "RANGE", color: C.range, hint: "Range = greatest value − least value." },
      };

      const randInt = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
      const choice = (arr) => arr[Math.floor(Math.random() * arr.length)];
      function shuffle(a) {
        a = a.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }
      const VV_RM_QUERY =
        window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)");
      const reducedMotion = () => !!(VV_RM_QUERY && VV_RM_QUERY.matches);

      const TOTAL_LEVELS = 3;
      const ROUNDS_PER_LEVEL = 4; // catches needed to clear a level
      const START_LIVES = 3;

      // ── Question generators (exported on window for stress testing) ──

      // MEAN: choose a whole-number target mean and a count, build values that
      // sum to mean*count so the mean is always an exact integer.
      function buildMeanQuestion(level) {
        const count = level === 0 ? 4 : level === 1 ? 5 : 6;
        const mean = randInt(4, 14);
        let nums, total, computed;
        let guard = 0;
        do {
          nums = [];
          let offsetSum = 0;
          for (let k = 0; k < count - 1; k++) {
            const delta = randInt(-3, 3);
            nums.push(mean + delta);
            offsetSum += delta;
          }
          nums.push(mean - offsetSum); // corrects the sum so total = mean*count
          total = nums.reduce((a, b) => a + b, 0);
          computed = total / count;
          guard++;
        } while (
          (nums.some((v) => v < 1) || computed !== Math.floor(computed)) &&
          guard < 40
        );
        if (nums.some((v) => v < 1) || computed !== Math.floor(computed)) {
          // deterministic fallback (always integer mean, all positive)
          nums = [];
          for (let k = 0; k < count; k++) nums.push(mean);
          total = mean * count;
          computed = mean;
        }
        return finishQuestion("mean", nums, computed,
          "Sum = " + total + "; " + total + " ÷ " + count + " = " + computed + ".");
      }

      // MEDIAN: ODD-length set (5 or 7), distinct values, answer = middle.
      function buildMedianQuestion(level) {
        const count = level <= 1 ? 5 : 7; // always odd
        const seen = {};
        const nums = [];
        while (nums.length < count) {
          const v = randInt(1, 24);
          if (!seen[v]) {
            seen[v] = true;
            nums.push(v);
          }
        }
        const sorted = nums.slice().sort((a, b) => a - b);
        const median = sorted[(count - 1) / 2];
        return finishQuestion("median", nums, median,
          "Sorted: " + sorted.join(", ") + ". Middle value = " + median + ".");
      }

      // RANGE: distinct values; answer = max - min.
      function buildRangeQuestion(level) {
        const count = level === 0 ? 4 : level === 1 ? 5 : 6;
        const seen = {};
        const nums = [];
        while (nums.length < count) {
          const v = randInt(1, 28);
          if (!seen[v]) {
            seen[v] = true;
            nums.push(v);
          }
        }
        const mn = Math.min.apply(null, nums);
        const mx = Math.max.apply(null, nums);
        const range = mx - mn;
        return finishQuestion("range", nums, range,
          "Max = " + mx + ", Min = " + mn + "; " + mx + " − " + mn + " = " + range + ".");
      }

      // Build four DISTINCT integer answer tiles, exactly one correct.
      function finishQuestion(statType, nums, answer, why) {
        const seen = {};
        seen[answer] = true;
        const tiles = [answer];
        let guard = 0;
        while (tiles.length < 4 && guard < 60) {
          guard++;
          const sign = Math.random() < 0.5 ? 1 : -1;
          let cand = answer + randInt(1, 5) * sign;
          if (cand < 0) cand = answer + randInt(1, 5); // keep non-negative
          if (!seen[cand]) {
            seen[cand] = true;
            tiles.push(cand);
          }
        }
        // deterministic padding so we always render 4 distinct tiles
        let pad = 1;
        while (tiles.length < 4) {
          const cand = answer + pad;
          if (!seen[cand]) {
            seen[cand] = true;
            tiles.push(cand);
          }
          pad++;
        }
        return {
          statType: statType,
          nums: nums.slice(),
          answer: answer,
          tiles: shuffle(tiles),
          why: why,
        };
      }

      function buildQuestion(level) {
        // Round (statistic) cycles by level: 0=mean, 1=median, 2=range
        if (level === 0) return buildMeanQuestion(level);
        if (level === 1) return buildMedianQuestion(level);
        return buildRangeQuestion(level);
      }
      // expose for offline stress testing
      window.DataDash = {
        buildMeanQuestion,
        buildMedianQuestion,
        buildRangeQuestion,
        buildQuestion,
      };

      // ════════════════════════════════════════════════════════════════════
      //  BOOT
      // ════════════════════════════════════════════════════════════════════
      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          const g = this.make.graphics({ add: false });
          g.fillStyle(0xffffff).fillCircle(4, 4, 4);
          g.generateTexture("dot", 8, 8);
          g.clear();
          g.fillStyle(0xffffff).fillRect(0, 0, 7, 4);
          g.generateTexture("chip", 7, 4);
          g.clear();
          g.destroy();
          this.scene.start("Title");
        }
      }

      // ════════════════════════════════════════════════════════════════════
      //  TITLE
      // ════════════════════════════════════════════════════════════════════
      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          this.cameras.main.setBackgroundColor(C.bg);
          const cx = W / 2;

          // mini bar-chart emblem
          const badge = this.add.container(cx, 150);
          const heights = [40, 70, 54, 86, 62];
          heights.forEach((h, i) => {
            badge.add(
              this.add
                .rectangle(-90 + i * 45, 0 - h / 2, 32, h,
                  [C.mean, C.median, C.range, C.accent, C.gold][i])
                .setOrigin(0.5, 0.5),
            );
          });
          if (!reducedMotion()) {
            this.tweens.add({
              targets: badge,
              y: 138,
              duration: 1600,
              yoyo: true,
              repeat: -1,
              ease: "Sine.inOut",
            });
          }

          this.add
            .text(cx, 250, "DATA DASH", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "56px",
              fontStyle: "900",
              color: "#eaf6ff",
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 296, "Stat Catcher", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "26px",
              fontStyle: "bold",
              color: "#2bd1c4",
            })
            .setOrigin(0.5);
          this.add
            .text(
              cx,
              350,
              "Read the data set, then slide your cart to CATCH the tile\nthat equals the mean, median, or range.",
              {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "18px",
                color: "#9cc4dd",
                align: "center",
                lineSpacing: 6,
              },
            )
            .setOrigin(0.5);
          this.add
            .text(cx, 406, "Grade 6 · Lessons 8.1–8.7 · Standard 6.SP", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "15px",
              fontStyle: "bold",
              color: "#2bd1c4",
            })
            .setOrigin(0.5);

          this.makeButton(cx, 474, "▶  START GAME", 0x0e8a7d, () =>
            this.scene.start("Game", { level: 0, score: 0, lives: START_LIVES }),
          );
          this.add
            .text(
              cx,
              548,
              "Move with ← → arrows or your finger.   Catch the correct tile, dodge the rest.",
              {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "14px",
                color: "#7fa9c2",
              },
            )
            .setOrigin(0.5);
          this.makeLink(cx, 586, "← Back to Math Games");
          this.setSR(
            "Data Dash, Stat Catcher. A catcher game for mean, median, and range, standard 6.SP. Press start to play.",
          );
        }
        makeButton(x, y, label, color, cb) {
          const b = this.add
            .rectangle(x, y, 290, 56, color)
            .setStrokeStyle(3, 0xffffff, 0.85)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(x, y, label, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "22px",
              fontStyle: "bold",
              color: "#ffffff",
            })
            .setOrigin(0.5);
          b.on("pointerover", () => b.setScale(1.04));
          b.on("pointerout", () => b.setScale(1));
          b.on("pointerdown", cb);
          this.input.keyboard.once("keydown-SPACE", cb);
          this.input.keyboard.once("keydown-ENTER", cb);
          return b;
        }
        makeLink(x, y, label) {
          const t = this.add
            .text(x, y, label, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "15px",
              fontStyle: "bold",
              color: "#9cc4dd",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });
          t.on("pointerover", () => t.setColor("#2bd1c4"));
          t.on("pointerout", () => t.setColor("#9cc4dd"));
          t.on("pointerdown", () => {
            window.location.href = "/math/games/";
          });
          return t;
        }
        setSR(msg) {
          const el = document.getElementById("dd-sr");
          if (el) el.textContent = msg;
        }
      }

      // ════════════════════════════════════════════════════════════════════
      //  GAME
      // ════════════════════════════════════════════════════════════════════
      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }
        init(data) {
          this.levelIndex = data.level || 0;
          this.score = data.score || 0;
          this.lives = data.lives != null ? data.lives : START_LIVES;
          this.streak = 0;
          this.caught = 0; // catches this level
          this.locked = false;
          this.tiles = [];
          this.falling = false;
        }
        create() {
          this.cameras.main.setBackgroundColor(C.bg);
          this.playLeft = 30;
          this.playRight = W - 30;
          this.floorY = H - 70;

          this.buildHUD();
          this.buildDataPanel();
          this.buildCart();

          // input
          this.cursors = this.input.keyboard.createCursorKeys();
          this.aKey = this.input.keyboard.addKey("A");
          this.dKey = this.input.keyboard.addKey("D");
          this.input.on("pointermove", (p) => {
            if (this.falling) this.targetX = Phaser.Math.Clamp(p.x, this.playLeft + 50, this.playRight - 50);
          });

          this.targetX = W / 2;
          this.nextQuestion();
          this.cameras.main.fadeIn(400);
        }

        buildHUD() {
          this.add.rectangle(W / 2, 30, W, 60, C.panel).setDepth(1);
          this.add.rectangle(W / 2, 60, W, 2, C.panelEdge).setDepth(1);
          const mk = (x, label) => {
            this.add
              .text(x, 16, label, {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "12px",
                color: "#7fa9c2",
              })
              .setOrigin(1, 0)
              .setDepth(2);
            return this.add
              .text(x, 30, "", {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "22px",
                fontStyle: "900",
                color: "#eaf6ff",
              })
              .setOrigin(1, 0)
              .setDepth(2);
          };
          this.add
            .text(20, 18, "📊 Data Dash", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "18px",
              fontStyle: "bold",
              color: "#2bd1c4",
            })
            .setDepth(2);
          this.scoreT = mk(W - 20, "SCORE");
          this.levelT = mk(W - 150, "ROUND");
          this.streakT = mk(W - 290, "STREAK");
          this.livesT = mk(W - 420, "LIVES");

          const menu = this.add
            .text(180, 30, "☰ Menu", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "14px",
              fontStyle: "bold",
              color: "#9cc4dd",
            })
            .setOrigin(0, 0.5)
            .setDepth(2)
            .setInteractive({ useHandCursor: true });
          menu.on("pointerdown", () => this.scene.start("Title"));
          menu.on("pointerover", () => menu.setColor("#2bd1c4"));
          menu.on("pointerout", () => menu.setColor("#9cc4dd"));
          this.refreshHUD();
        }
        refreshHUD() {
          this.scoreT.setText(String(this.score));
          this.levelT.setText(`${this.levelIndex + 1} / ${TOTAL_LEVELS}`);
          this.streakT.setText(this.streak > 0 ? `×${this.streak}` : "—");
          this.livesT.setText("❤".repeat(Math.max(0, this.lives)) || "—");
        }

        buildDataPanel() {
          this.add
            .rectangle(W / 2, 122, W - 60, 96, C.panel)
            .setStrokeStyle(2, C.panelEdge)
            .setDepth(1);
          this.statTag = this.add
            .text(W / 2, 90, "", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "16px",
              fontStyle: "900",
            })
            .setOrigin(0.5)
            .setDepth(2);
          this.dataText = this.add
            .text(W / 2, 120, "", {
              fontFamily: "Consolas, monospace",
              fontSize: "26px",
              fontStyle: "bold",
              color: "#eaf6ff",
            })
            .setOrigin(0.5)
            .setDepth(2);
          this.hintText = this.add
            .text(W / 2, 150, "", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "14px",
              color: "#9cc4dd",
            })
            .setOrigin(0.5)
            .setDepth(2);

          // floor / collection line
          this.add
            .rectangle(W / 2, this.floorY + 26, W, 4, C.panelEdge)
            .setDepth(1);

          this.fbText = this.add
            .text(W / 2, this.floorY + 46, "", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "15px",
              fontStyle: "bold",
              color: "#9cc4dd",
              align: "center",
              wordWrap: { width: W - 80 },
            })
            .setOrigin(0.5, 0)
            .setDepth(2);
        }

        buildCart() {
          this.cart = this.add.container(W / 2, this.floorY).setDepth(6);
          const body = this.add
            .rectangle(0, 0, 110, 30, C.cart)
            .setStrokeStyle(3, 0x0a5a54);
          const rim = this.add
            .rectangle(0, -16, 110, 8, 0x0a5a54);
          const w1 = this.add.circle(-34, 20, 9, 0x123040).setStrokeStyle(3, C.cart);
          const w2 = this.add.circle(34, 20, 9, 0x123040).setStrokeStyle(3, C.cart);
          this.cartGlow = this.add
            .rectangle(0, 0, 110, 36, 0xffffff, 0)
            .setStrokeStyle(0);
          this.cart.add([w1, w2, rim, body, this.cartGlow]);
          this.cartHalf = 55;
        }

        nextQuestion() {
          this.locked = false;
          this.q = buildQuestion(this.levelIndex);
          const info = STAT_INFO[this.q.statType];
          this.statTag.setText("FIND THE " + info.label).setColor(
            "#" + info.color.toString(16).padStart(6, "0"),
          );
          this.dataText.setText(this.q.nums.join("   "));
          this.hintText.setText(info.hint);
          this.fbText.setText("Catch the tile that equals the " + info.label.toLowerCase() + "!");

          this.spawnTiles();
          this.setSR(
            "Find the " + info.label.toLowerCase() +
              " of " + this.q.nums.join(", ") + ". " +
              "Falling answers: " + this.q.tiles.join(", ") +
              ". Move your cart to catch the correct one.",
          );
        }

        spawnTiles() {
          this.tiles.forEach((t) => t.destroy());
          this.tiles = [];
          // four lanes across the play area
          const lanes = 4;
          const usable = this.playRight - this.playLeft - 120;
          const order = shuffle([0, 1, 2, 3]);
          const speedBase = 70 + this.levelIndex * 35 + this.streak * 4; // px/sec
          this.q.tiles.forEach((val, i) => {
            const lane = order[i];
            const x = this.playLeft + 60 + (usable / (lanes - 1)) * lane;
            const y = 200 - i * 70 - randInt(0, 40); // staggered start above view
            const cont = this.add.container(x, y).setDepth(5);
            const isCorrect = val === this.q.answer;
            const rect = this.add
              .rectangle(0, 0, 78, 54, C.tile)
              .setStrokeStyle(3, C.panelEdge);
            const lab = this.add
              .text(0, 0, String(val), {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "26px",
                fontStyle: "900",
                color: "#eaf6ff",
              })
              .setOrigin(0.5);
            cont.add([rect, lab]);
            cont.rect = rect;
            cont.lab = lab;
            cont.value = val;
            cont.correct = isCorrect;
            cont.speed = speedBase + randInt(-10, 20);
            cont.done = false;
            this.tiles.push(cont);
          });
          this.falling = true;
        }

        update(time, delta) {
          // cart movement
          const dt = delta / 1000;
          const speed = 460;
          let dx = 0;
          if (this.cursors.left.isDown || this.aKey.isDown) dx -= 1;
          if (this.cursors.right.isDown || this.dKey.isDown) dx += 1;
          if (dx !== 0) {
            this.cart.x = Phaser.Math.Clamp(
              this.cart.x + dx * speed * dt,
              this.playLeft + this.cartHalf,
              this.playRight - this.cartHalf,
            );
          } else if (this.input.activePointer.isDown && this.falling) {
            // follow pointer when held
            this.cart.x = Phaser.Math.Clamp(
              this.input.activePointer.x,
              this.playLeft + this.cartHalf,
              this.playRight - this.cartHalf,
            );
          }

          if (!this.falling) return;
          const catchY = this.floorY;
          this.tiles.forEach((t) => {
            if (t.done) return;
            t.y += t.speed * dt;
            // catch zone: tile bottom reaches cart top and within cart width
            if (t.y >= catchY - 24 && t.y <= catchY + 30) {
              if (Math.abs(t.x - this.cart.x) <= this.cartHalf + 38) {
                t.done = true;
                this.resolveCatch(t);
              }
            } else if (t.y > this.floorY + 40) {
              // hit floor uncaught
              t.done = true;
              this.resolveMiss(t);
            }
          });
        }

        resolveCatch(tile) {
          if (this.locked) return;
          this.locked = true;
          this.falling = false;
          const info = STAT_INFO[this.q.statType];
          if (tile.correct) {
            tile.rect.setFillStyle(0x1c5a3a).setStrokeStyle(3, C.good);
            this.streak++;
            this.caught++;
            const gain = 100 + Math.min(this.streak, 5) * 20;
            this.score += gain;
            this.fbText.setColor("#4fd18b").setText("✓ +" + gain + "   " + this.q.why);
            this.burst(tile.x, tile.y, C.good);
            this.flashCart(C.good);
            this.setSR("Correct. " + this.q.why);
          } else {
            tile.rect.setFillStyle(0x5a1c1c).setStrokeStyle(3, C.bad);
            this.streak = 0;
            this.lives--;
            this.fbText.setColor("#ff8f8f").setText(
              "✗ That was " + tile.value + ", not the " + info.label.toLowerCase() +
                " (" + this.q.answer + "). " + this.q.why,
            );
            this.flashCart(C.bad);
            if (!reducedMotion()) this.cameras.main.shake(180, 0.006);
            this.setSR("Not quite. " + this.q.why);
          }
          this.refreshHUD();
          this.afterResolve(tile.correct);
        }

        resolveMiss(tile) {
          if (this.locked) return;
          // only penalize if the CORRECT tile hit the floor uncaught
          if (tile.correct) {
            this.locked = true;
            this.falling = false;
            this.streak = 0;
            this.lives--;
            this.fbText.setColor("#ff8f8f").setText(
              "✗ Missed it! The " + STAT_INFO[this.q.statType].label.toLowerCase() +
                " was " + this.q.answer + ". " + this.q.why,
            );
            if (!reducedMotion()) this.cameras.main.shake(160, 0.005);
            this.refreshHUD();
            this.setSR("Missed. " + this.q.why);
            this.afterResolve(false);
          }
        }

        afterResolve(correct) {
          this.time.delayedCall(correct ? 1000 : 1700, () => {
            this.tiles.forEach((t) => t.destroy());
            this.tiles = [];
            if (this.lives <= 0) return this.gameOver();
            if (this.caught >= ROUNDS_PER_LEVEL) return this.completeLevel();
            this.nextQuestion();
          });
        }

        flashCart(color) {
          if (reducedMotion()) return;
          this.cartGlow.setStrokeStyle(4, color, 1);
          this.tweens.add({
            targets: this.cartGlow,
            alpha: { from: 1, to: 0 },
            duration: 500,
            onComplete: () => {
              this.cartGlow.setStrokeStyle(0).setAlpha(1);
            },
          });
        }

        burst(x, y, color) {
          const p = this.add.particles(x, y, "dot", {
            speed: { min: 60, max: 180 },
            angle: { min: 0, max: 360 },
            scale: { start: 1, end: 0 },
            lifespan: 500,
            quantity: 14,
            tint: color,
          });
          this.time.delayedCall(550, () => p.destroy());
        }

        completeLevel() {
          this.score += 250;
          this.refreshHUD();
          const ov = this.add.container(0, 0).setDepth(20);
          ov.add(this.add.rectangle(W / 2, H / 2, W, H, 0x05101d, 0.8));
          ov.add(
            this.add
              .text(W / 2, 230, "ROUND CLEAR!", {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "42px",
                fontStyle: "900",
                color: "#4fd18b",
              })
              .setOrigin(0.5),
          );
          ov.add(
            this.add
              .text(
                W / 2,
                292,
                "You mastered the " + STAT_INFO[this.q.statType].label.toLowerCase() +
                  "!\n+250 round bonus",
                {
                  fontFamily: "Segoe UI, sans-serif",
                  fontSize: "20px",
                  color: "#eaf6ff",
                  align: "center",
                  lineSpacing: 6,
                },
              )
              .setOrigin(0.5),
          );
          this.confetti();
          const last = this.levelIndex + 1 >= TOTAL_LEVELS;
          const label = last ? "🏁  SEE RESULTS" : "▶  NEXT ROUND";
          const btn = this.add
            .rectangle(W / 2, 380, 300, 56, 0x0e8a7d)
            .setStrokeStyle(3, 0xffffff, 0.85)
            .setDepth(21)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2, 380, label, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "22px",
              fontStyle: "bold",
              color: "#fff",
            })
            .setOrigin(0.5)
            .setDepth(22);
          btn.on("pointerover", () => btn.setScale(1.04));
          btn.on("pointerout", () => btn.setScale(1));
          const go = () => {
            if (last) {
              this.scene.start("Result", { score: this.score, won: true });
            } else {
              this.scene.start("Game", {
                level: this.levelIndex + 1,
                score: this.score,
                lives: this.lives,
              });
            }
          };
          btn.on("pointerdown", go);
          this.input.keyboard.once("keydown-SPACE", go);
          this.setSR(
            "Round clear. You mastered the " +
              STAT_INFO[this.q.statType].label.toLowerCase() +
              ". Score " + this.score + ".",
          );
        }

        gameOver() {
          this.scene.start("Result", { score: this.score, won: false });
        }

        confetti() {
          const p = this.add.particles(W / 2, -10, "chip", {
            x: { min: 0, max: W },
            y: -10,
            speedY: { min: 120, max: 280 },
            speedX: { min: -60, max: 60 },
            angle: { min: 0, max: 360 },
            rotate: { min: 0, max: 360 },
            scale: { min: 0.7, max: 1.4 },
            lifespan: 2600,
            quantity: 3,
            frequency: 40,
            tint: [0xffcd4d, 0x2bd1c4, 0x4fd18b, 0xc45a3c],
          });
          this.time.delayedCall(1800, () => p.stop());
        }

        setSR(msg) {
          const el = document.getElementById("dd-sr");
          if (el) el.textContent = msg;
        }
      }

      // ════════════════════════════════════════════════════════════════════
      //  RESULT
      // ════════════════════════════════════════════════════════════════════
      class ResultScene extends Phaser.Scene {
        constructor() {
          super("Result");
        }
        init(data) {
          this.score = data.score || 0;
          this.won = !!data.won;
        }
        create() {
          this.cameras.main.setBackgroundColor(C.bg);
          const cx = W / 2;
          const stars = this.score >= 1500 ? 3 : this.score >= 900 ? 2 : 1;
          try {
            window.EduPulse &&
              EduPulse.record({
                activityTitle: document.title,
                score: this.score,
                stars: stars,
              });
          } catch (e) {}
          this.add
            .text(cx, 150, this.won ? "DATA MASTERED!" : "OUT OF LIVES", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "46px",
              fontStyle: "900",
              color: this.won ? "#4fd18b" : "#ff8f8f",
            })
            .setOrigin(0.5);
          for (let i = 0; i < 3; i++) {
            this.add
              .text(cx - 80 + i * 80, 240, i < stars ? "★" : "☆", {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "64px",
                color: i < stars ? "#ffcd4d" : "#3a5a74",
              })
              .setOrigin(0.5);
          }
          this.add
            .text(cx, 326, "Final Score: " + this.score, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "30px",
              fontStyle: "bold",
              color: "#eaf6ff",
            })
            .setOrigin(0.5);
          this.add
            .text(
              cx,
              372,
              this.won
                ? "You caught the mean, median, and range across every round."
                : "Tip: mean = sum ÷ count, median = middle of the sorted set, range = max − min. Try again!",
              {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "16px",
                color: "#9cc4dd",
                align: "center",
                wordWrap: { width: 560 },
              },
            )
            .setOrigin(0.5);
          this.btn(cx - 150, 460, "↻  PLAY AGAIN", 0x0e8a7d, () =>
            this.scene.start("Game", { level: 0, score: 0, lives: START_LIVES }),
          );
          this.btn(cx + 150, 460, "🏠  ALL GAMES", 0x355a86, () => {
            window.location.href = "/math/games/";
          });
          const el = document.getElementById("dd-sr");
          if (el)
            el.textContent =
              (this.won ? "Data mastered" : "Out of lives") +
              ". Final score " + this.score + ", " + stars + " stars.";
        }
        btn(x, y, label, color, cb) {
          const b = this.add
            .rectangle(x, y, 270, 56, color)
            .setStrokeStyle(3, 0xffffff, 0.85)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(x, y, label, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "20px",
              fontStyle: "bold",
              color: "#fff",
            })
            .setOrigin(0.5);
          b.on("pointerover", () => b.setScale(1.04));
          b.on("pointerout", () => b.setScale(1));
          b.on("pointerdown", cb);
        }
      }

      // ── launch ──
      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#0a1c2c",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [BootScene, TitleScene, GameScene, ResultScene],
      };
      const ddGame = new Phaser.Game(config);

      // ── Canvas accessibility (additive; no gameplay change) ──
      ddGame.events.once("ready", function () {
        try {
          const cv = ddGame.canvas;
          if (!cv) return;
          cv.setAttribute("role", "application");
          cv.setAttribute(
            "aria-label",
            "Data Dash Stat Catcher math game. Read the data set, then move your " +
              "cart with the left and right arrow keys to catch the falling tile that " +
              "equals the mean, median, or range.",
          );
          cv.setAttribute("aria-roledescription", "math game");
          if (!cv.hasAttribute("tabindex")) cv.setAttribute("tabindex", "0");
          cv.addEventListener("pointerdown", function () {
            try {
              cv.focus({ preventScroll: true });
            } catch (e) {
              cv.focus();
            }
          });
        } catch (e) {}
      });
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <script src="/shared/save-resume/save-resume-engine.js" defer></script>
    <!-- nsr-injected:end -->
    <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
    <script src="/assets/game-fx.js" defer></script>
    <!-- gfx-injected:end -->
  </body>
