    <script>
      (function () {
        var host = document.getElementById("rr-bg");
        if (!host) return;
        var reduce =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var n = reduce ? 10 : 26;
        for (var i = 0; i < n; i++) {

    <script>
      // ════════════════════════════════════════════════════════════════════
      // RATIO RUSH — Lily-Pad Hopper  ·  Grade 6  ·  6.RP.1–3
      // Lessons 3.1–3.5: simplify ratios, equivalent ratios, unit rates.
      //
      // MECHANIC: Your frog stands on a river bank. Each turn, three lily pads
      //   appear ahead — left, center, right — each carrying a candidate answer.
      //   Read the prompt, then HOP onto the pad with the correct answer
      //   (← / ↑ / → , or A / W / D, or tap a pad). Land right → the frog leaps
      //   forward and the river scrolls; land on a wrong pad → splash (lose a
      //   life). Pads bob faster each round.
      //
      // FLOAT SAFETY: every answer is a ratio STRING ("a:b") or an INTEGER
      //   produced from integer arithmetic; correctness is a string/int compare,
      //   never a float ==.
      // ════════════════════════════════════════════════════════════════════
      const LS_KEY = "rr_ratio_rush_highscore";
      const W = 800,
        H = 600;
      const ACTIVITY_TITLE = "Ratio Rush — Lessons 3.1–3.5";
      const STANDARD = "6.RP.3";

      const SFX = {
        ctx: null,
        init() {
          if (!this.ctx)
            try {
              this.ctx = new (window.AudioContext ||
                window.webkitAudioContext)();
            } catch (e) {}
        },
        play(t, f, d, v = 0.2) {
          if (!this.ctx) return;
          try {
            const c = this.ctx,
              o = c.createOscillator(),
              g = c.createGain();
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
            o.connect(g);
            g.connect(c.destination);
            o.start();
            o.stop(c.currentTime + d);
          } catch (e) {}
        },
        noise(d, v = 0.1) {
          if (!this.ctx) return;
          try {
            const c = this.ctx,
              n = c.sampleRate * d,
              buf = c.createBuffer(1, n, c.sampleRate),
              dt = buf.getChannelData(0);
            for (let i = 0; i < n; i++) dt[i] = Math.random() * 2 - 1;
            const s = c.createBufferSource();
            s.buffer = buf;
            const g = c.createGain();
            g.gain.setValueAtTime(v, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
            s.connect(g);
            g.connect(c.destination);
            s.start();
            s.stop(c.currentTime + d);
          } catch (e) {}
        },
        hop() {
          this.play("sine", 520, 0.08, 0.18);
          this.play("sine", 780, 0.1, 0.16);
        },
        splash() {
          this.noise(0.22, 0.13);
          this.play("sawtooth", 180, 0.26, 0.15);
        },
        tick() {
          this.play("square", 600, 0.03, 0.07);
        },
        streak(n) {
          [523, 659, 784, 988, 1175]
            .slice(0, Math.min(n, 5))
            .forEach((f, i) =>
              setTimeout(() => this.play("sine", f, 0.12, 0.2), i * 55),
            );
        },
        levelUp() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.15, 0.22), i * 70),
          );
        },
        win() {
          [523, 659, 784, 1047, 1318].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.22, 0.28), i * 110),
          );
        },
        lose() {
          [400, 350, 300, 200].forEach((f, i) =>
            setTimeout(() => this.play("sawtooth", f, 0.28, 0.15), i * 170),
          );
        },
      };

      function randInt(a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a;
      }
      function shuffle(a) {
        const r = a.slice();
        for (let i = r.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [r[i], r[j]] = [r[j], r[i]];
        }
        return r;
      }

      // Coprime pairs — simplest-form ratio bases.
      const COPRIME_PAIRS = [
        [1, 2], [1, 3], [1, 4], [1, 5], [2, 3], [2, 5], [3, 4], [3, 5],
        [4, 5], [3, 7], [2, 7], [5, 7], [5, 8], [5, 9], [4, 7], [3, 8],
      ];

      const UNIT_RATE_TEMPLATES = [
        { tmpl: (t, c) => "$" + t + " for " + c + " items", unit: "$ per item", word: "item" },
        { tmpl: (t, c) => t + " miles in " + c + " hours", unit: "mph", word: "hour" },
        { tmpl: (t, c) => t + " words in " + c + " minutes", unit: "words/min", word: "minute" },
        { tmpl: (t, c) => "$" + t + " for " + c + " pounds", unit: "$ per lb", word: "pound" },
        { tmpl: (t, c) => t + " pages in " + c + " days", unit: "pages/day", word: "day" },
      ];

      // Build 3 distinct pad labels (strings) with exactly one correct.
      function buildPads(correctLabel, makeWrong) {
        const set = new Set([correctLabel]);
        let guard = 0;
        while (set.size < 3 && guard++ < 200) {
          const w = makeWrong();
          if (w && w !== correctLabel) set.add(w);
        }
        const labels = shuffle(Array.from(set));
        return { labels: labels, correctIndex: labels.indexOf(correctLabel) };
      }

      // round 1: simplify ratio  (bigA:bigB -> a:b)
      // round 2: equivalent ratio missing value  (a:b = ?:b·k)
      // round 3: unit rate  (total ÷ count = rate)
      function genQuestion(round) {
        if (round === 1) {
          const pair = COPRIME_PAIRS[randInt(0, COPRIME_PAIRS.length - 1)];
          const a = pair[0],
            b = pair[1];
          const k = randInt(2, 6);
          const bigA = a * k,
            bigB = b * k;
          const correct = a + ":" + b;
          const g = buildPads(correct, () => {
            const dp = COPRIME_PAIRS[randInt(0, COPRIME_PAIRS.length - 1)];
            return dp[0] + ":" + dp[1];
          });
          return {
            tag: "Simplify Ratios",
            prompt: bigA + " : " + bigB,
            why:
              bigA + ":" + bigB + " = " + a + ":" + b + " (÷" + k + " each).",
            pads: g.labels,
            correctIndex: g.correctIndex,
          };
        }
        if (round === 2) {
          const pair = COPRIME_PAIRS[randInt(0, COPRIME_PAIRS.length - 1)];
          const a = pair[0],
            b = pair[1];
          const k = randInt(2, 8);
          const ans = a * k; // missing value
          const bigB = b * k;
          const g = buildPads(String(ans), () => {
            const delta = randInt(1, 5) * (Math.random() < 0.5 ? 1 : -1);
            let v = ans + delta;
            if (v < 1 || v === ans) v = ans + randInt(1, 5);
            return String(v);
          });
          return {
            tag: "Equivalent Ratios",
            prompt: a + " : " + b + " = ? : " + bigB,
            why:
              a + ":" + b + " = " + ans + ":" + bigB + " (×" + k + " each).",
            pads: g.labels,
            correctIndex: g.correctIndex,
          };
        }
        // round 3 — unit rate
        const tpl = UNIT_RATE_TEMPLATES[randInt(0, UNIT_RATE_TEMPLATES.length - 1)];
        const count = randInt(2, 9);
        const rate = randInt(3, 15);
        const total = rate * count;
        const g = buildPads(String(rate), () => {
          const delta = randInt(1, 6) * (Math.random() < 0.5 ? 1 : -1);
          let v = rate + delta;
          if (v < 1 || v === rate) v = rate + randInt(1, 6);
          return String(v);
        });
        return {
          tag: "Unit Rates",
          prompt: tpl.tmpl(total, count),
          why:
            total + " ÷ " + count + " = " + rate + " " + tpl.unit + " (per " + tpl.word + ").",
          pads: g.labels,
          correctIndex: g.correctIndex,
        };
      }

      function srSay(msg) {
        try {
          const el = document.getElementById("rr-sr");
          if (el) el.textContent = msg;
        } catch (e) {}
      }

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#0c2a2e",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [],
      };

      const PAD_X = [W * 0.24, W * 0.5, W * 0.76];
      const PAD_Y = 250;

      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          const g = this.make.graphics({ add: false });
          g.fillStyle(0xffffff);
          g.fillRect(0, 0, 7, 4);
          g.generateTexture("confetti", 7, 4);
          g.clear();
          g.fillStyle(0xffffff);
          g.fillCircle(4, 4, 4);
          g.generateTexture("drop", 8, 8);
          g.destroy();
          this.scene.start("Title");
        }
      }

      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          const cx = W / 2;
          this.reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          this.add.rectangle(cx, H / 2, W, H, 0x0c2a2e);
          this.add
            .text(cx, 120, "RATIO", {
              fontSize: "70px",
              fontFamily: "Impact, sans-serif",
              color: "#6be0c0",
              stroke: "#07191c",
              strokeThickness: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 188, "RUSH", {
              fontSize: "70px",
              fontFamily: "Impact, sans-serif",
              color: "#d4952a",
              stroke: "#07191c",
              strokeThickness: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 245, "Lily-Pad Hopper  ·  Lessons 3.1–3.5  ·  6.RP.1–3", {
              fontSize: "15px",
              color: "#9fd6c0",
            })
            .setOrigin(0.5);
          this.add
            .text(
              cx,
              300,
              "Read each ratio or unit-rate problem, then HOP your frog\nonto the lily pad with the correct answer.",
              { fontSize: "15px", color: "#7fb3a0", align: "center" },
            )
            .setOrigin(0.5);
          this.add
            .text(cx, 356, "← ↑ → or A/W/D to hop   ·   tap a pad on touch", {
              fontSize: "14px",
              color: "#6ba390",
            })
            .setOrigin(0.5);

          const hs = localStorage.getItem(LS_KEY);
          if (hs)
            this.add
              .text(cx, 392, "HIGH SCORE: " + hs, {
                fontSize: "15px",
                color: "#d4952a",
                fontStyle: "bold",
              })
              .setOrigin(0.5);

          const btn = this.add
            .rectangle(cx, 450, 260, 56, 0x0e8a7d)
            .setInteractive({ useHandCursor: true });
          const btnT = this.add
            .text(cx, 450, "START HOPPING ▶", {
              fontSize: "22px",
              fontStyle: "bold",
              color: "#062420",
            })
            .setOrigin(0.5);
          if (!this.reduce)
            this.tweens.add({
              targets: [btn, btnT],
              scaleX: 1.05,
              scaleY: 1.05,
              duration: 800,
              yoyo: true,
              repeat: -1,
            });
          const go = () => {
            SFX.init();
            SFX.tick();
            this.cameras.main.fadeOut(300);
            this.time.delayedCall(300, () => this.scene.start("Game"));
          };
          btn.on("pointerover", () => btn.setFillStyle(0x12a596));
          btn.on("pointerout", () => btn.setFillStyle(0x0e8a7d));
          btn.on("pointerdown", go);
          this.input.keyboard.on("keydown-SPACE", go);
          this.input.keyboard.on("keydown-ENTER", go);

          const hub = this.add
            .text(cx, 555, "← Back to Games hub", {
              fontSize: "15px",
              fontStyle: "bold",
              color: "#6ba390",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });
          hub.on("pointerover", () => hub.setColor("#6be0c0"));
          hub.on("pointerout", () => hub.setColor("#6ba390"));
          hub.on("pointerdown", () => (window.location.href = "/math/games/"));

          this.cameras.main.fadeIn(400);
        }
      }

      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }
        init() {
          this.reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          this.score = 0;
          this.lives = 3;
          this.streak = 0;
          this.maxStreak = 0;
          this.correct = 0;
          this.qIndex = 0;
          this.TOTAL = 12;
          this.level = 1;
          this.busy = false;
          this.pads = [];
          this.bobT = 0;
        }
        roundFor(i) {
          return i < 4 ? 1 : i < 8 ? 2 : 3;
        }
        create() {
          const cx = W / 2;
          this.add.rectangle(cx, H / 2, W, H, 0x123a3e); // water
          // gentle water stripes
          this.stripes = [];
          for (let y = 140; y < H; y += 46) {
            const s = this.add.rectangle(cx, y, W, 3, 0x1c5054, 0.4);
            this.stripes.push(s);
          }

          // HUD
          this.add.rectangle(cx, 24, W, 48, 0x07191c, 0.92).setDepth(8);
          this.scoreText = this.add
            .text(16, 12, "Score: 0", {
              fontSize: "20px",
              color: "#6be0c0",
              fontStyle: "bold",
            })
            .setDepth(9);
          this.livesText = this.add
            .text(W - 16, 12, "❤❤❤", { fontSize: "20px", color: "#ff7b6b" })
            .setOrigin(1, 0)
            .setDepth(9);
          this.streakText = this.add
            .text(cx, 12, "Streak: 0", {
              fontSize: "16px",
              color: "#d4952a",
              fontStyle: "bold",
            })
            .setOrigin(0.5, 0)
            .setDepth(9);

          // prompt
          this.add.rectangle(cx, 80, 420, 60, 0x07191c, 0.92).setDepth(8);
          this.tagText = this.add
            .text(cx, 62, "", { fontSize: "13px", color: "#9fd6c0" })
            .setOrigin(0.5)
            .setDepth(9);
          this.promptText = this.add
            .text(cx, 88, "", {
              fontSize: "24px",
              color: "#ffffff",
              fontStyle: "bold",
              align: "center",
              wordWrap: { width: 400 },
            })
            .setOrigin(0.5)
            .setDepth(9);
          this.qnumText = this.add
            .text(cx, 118, "", { fontSize: "12px", color: "#7fb3a0" })
            .setOrigin(0.5)
            .setDepth(9);

          // Frog
          this.frogHome = { x: cx, y: H - 80 };
          this.frog = this.add.container(this.frogHome.x, this.frogHome.y).setDepth(16);
          const fg = this.add.graphics();
          fg.fillStyle(0x57c84a, 1);
          fg.fillEllipse(0, 0, 50, 40);
          fg.fillStyle(0x57c84a, 1);
          fg.fillCircle(-13, -16, 9);
          fg.fillCircle(13, -16, 9);
          fg.fillStyle(0xffffff, 1);
          fg.fillCircle(-13, -17, 5);
          fg.fillCircle(13, -17, 5);
          fg.fillStyle(0x103018, 1);
          fg.fillCircle(-13, -17, 2.5);
          fg.fillCircle(13, -17, 2.5);
          this.frog.add(fg);

          // bank under frog
          this.add
            .ellipse(this.frogHome.x, this.frogHome.y + 26, 96, 30, 0x2d6a3a)
            .setDepth(15);

          // particles
          this.confetti = this.add
            .particles(0, 0, "confetti", {
              speed: { min: 80, max: 280 },
              angle: { min: 0, max: 360 },
              scale: { start: 1.4, end: 0.2 },
              rotate: { min: 0, max: 360 },
              lifespan: 1100,
              gravityY: 240,
              emitting: false,
              quantity: 22,
              tint: [0x6be0c0, 0xd4952a, 0x57c84a, 0x1a6fb5],
            })
            .setDepth(40);
          this.splashParticles = this.add
            .particles(0, 0, "drop", {
              speed: { min: 60, max: 220 },
              scale: { start: 1.4, end: 0 },
              lifespan: 500,
              emitting: false,
              quantity: 16,
              tint: [0x6be0c0, 0x9fd6ff, 0xffffff],
              gravityY: 300,
            })
            .setDepth(40);
          this.redFlash = this.add
            .rectangle(cx, H / 2, W, H, 0x2255cc, 0)
            .setDepth(35);
          this.feedback = this.add
            .text(cx, 155, "", {
              fontSize: "16px",
              color: "#fff",
              fontStyle: "bold",
              align: "center",
              wordWrap: { width: W - 80 },
            })
            .setOrigin(0.5)
            .setAlpha(0)
            .setDepth(20);

          // input
          this.input.keyboard.on("keydown-LEFT", () => this.choose(0));
          this.input.keyboard.on("keydown-A", () => this.choose(0));
          this.input.keyboard.on("keydown-UP", () => this.choose(1));
          this.input.keyboard.on("keydown-W", () => this.choose(1));
          this.input.keyboard.on("keydown-RIGHT", () => this.choose(2));
          this.input.keyboard.on("keydown-D", () => this.choose(2));
          this.input.on("pointerdown", (p) => {
            let best = -1,
              bd = Infinity;
            this.pads.forEach((pad, i) => {
              const dx = pad.sprite.x - p.worldX,
                dy = pad.sprite.y - p.worldY;
              const dist = dx * dx + dy * dy;
              if (dist < bd && dist <= 70 * 70) {
                bd = dist;
                best = i;
              }
            });
            if (best >= 0) this.choose(best);
          });

          this.nextQuestion();
          this.cameras.main.fadeIn(350);
        }

        nextQuestion() {
          if (this.qIndex >= this.TOTAL || this.lives <= 0) {
            this.endGame();
            return;
          }
          const round = this.roundFor(this.qIndex);
          if (round !== this.level && this.qIndex > 0) SFX.levelUp();
          this.level = round;
          this.q = genQuestion(round);
          this.qIndex++;
          this.busy = false;

          this.tagText.setText(this.q.tag);
          this.promptText.setText(this.q.prompt);
          this.qnumText.setText(this.qIndex + " / " + this.TOTAL);
          this.feedback.setAlpha(0);
          // reset frog to bank
          this.frog.setPosition(this.frogHome.x, this.frogHome.y).setScale(1);

          srSay(
            this.q.tag +
              ". " +
              this.q.prompt +
              ". Pads: left " +
              this.q.pads[0] +
              ", center " +
              this.q.pads[1] +
              ", right " +
              this.q.pads[2] +
              ". Hop to the correct pad.",
          );

          // build pads
          this.pads.forEach((p) => p.sprite.destroy());
          this.pads = [];
          this.bobAmp = this.reduce ? 0 : 4 + (this.level - 1) * 4;
          this.bobSpeed = 0.002 + (this.level - 1) * 0.0012;
          for (let i = 0; i < 3; i++) {
            const c = this.add.container(PAD_X[i], PAD_Y).setDepth(14);
            const pad = this.add.graphics();
            pad.fillStyle(0x2f8f5a, 0.95);
            pad.fillEllipse(0, 0, 120, 70);
            pad.lineStyle(4, 0x6be0c0, 0.85);
            pad.strokeEllipse(0, 0, 120, 70);
            // decorative notch (simple triangle wedge — safe across Phaser builds)
            pad.fillStyle(0x123a3e, 1);
            pad.beginPath();
            pad.moveTo(60, 0);
            pad.lineTo(30, -16);
            pad.lineTo(30, 16);
            pad.closePath();
            pad.fillPath();
            c.add(pad);
            c.add(
              this.add
                .text(0, 0, this.q.pads[i], {
                  fontSize: "24px",
                  color: "#ffffff",
                  fontStyle: "bold",
                })
                .setOrigin(0.5),
            );
            this.pads.push({
              sprite: c,
              baseY: PAD_Y + (i % 2) * 18,
              phase: i * 1.3,
              label: this.q.pads[i],
              correct: i === this.q.correctIndex,
            });
            c.y = this.pads[i].baseY;
          }
        }

        update(time, delta) {
          this.bobT += delta;
          if (!this.reduce) {
            this.pads.forEach((p) => {
              p.sprite.y =
                p.baseY + Math.sin(this.bobT * this.bobSpeed + p.phase) * this.bobAmp;
            });
            // drift water stripes downward for motion
            this.stripes.forEach((s) => {
              s.y += 0.02 * delta;
              if (s.y > H + 4) s.y = 138;
            });
          }
        }

        choose(i) {
          if (this.busy || !this.pads[i]) return;
          this.busy = true;
          SFX.init();
          const pad = this.pads[i];
          const right = pad.correct;

          // hop the frog onto the chosen pad
          this.tweens.add({
            targets: this.frog,
            x: pad.sprite.x,
            y: pad.sprite.y - 8,
            scaleY: { from: 1, to: 1.25 },
            duration: this.reduce ? 1 : 260,
            ease: "Quad.easeOut",
            yoyo: false,
            onComplete: () => this.frog.setScale(1),
          });
          SFX.hop();

          if (right) {
            this.correct++;
            this.streak++;
            this.maxStreak = Math.max(this.maxStreak, this.streak);
            const gained = 10 + Math.min(this.streak, 5) * 2;
            this.score += gained;
            if (this.streak >= 3) SFX.streak(this.streak);
            this.confetti.emitParticleAt(pad.sprite.x, pad.sprite.y);
            this.flash(
              "✓ +" +
                gained +
                (this.streak > 1 ? "   🔥 ×" + this.streak : "") +
                "   " +
                this.q.why,
              "#9fffc0",
            );
            srSay("Correct! " + this.q.why);
            try {
              if (window.GameFX && GameFX.celebrate && this.streak >= 3)
                GameFX.celebrate(document.querySelector("canvas"));
            } catch (e) {}
            this.updateHUD();
            this.time.delayedCall(950, () => this.nextQuestion());
          } else {
            this.streak = 0;
            this.lives--;
            SFX.splash();
            this.splashParticles.emitParticleAt(pad.sprite.x, pad.sprite.y);
            this.doBlueFlash();
            // sink the frog a touch
            if (!this.reduce)
              this.tweens.add({
                targets: this.frog,
                y: pad.sprite.y + 14,
                alpha: { from: 1, to: 0.6 },
                duration: 250,
                yoyo: true,
                onComplete: () => this.frog.setAlpha(1),
              });
            this.flash("💦 Splash! " + this.q.why + "  (−1 ❤)", "#9fd6ff");
            srSay("Splash. " + this.q.why);
            // highlight correct pad
            const cp = this.pads[this.q.correctIndex];
            if (cp)
              this.tweens.add({
                targets: cp.sprite,
                scale: { from: 1, to: 1.18 },
                duration: 300,
                yoyo: true,
                repeat: 1,
              });
            this.updateHUD();
            this.time.delayedCall(1600, () => this.nextQuestion());
          }
        }

        flash(msg, color) {
          this.feedback.setText(msg).setColor(color).setAlpha(1).setScale(0.85);
          this.tweens.add({
            targets: this.feedback,
            scale: 1,
            duration: this.reduce ? 1 : 220,
            ease: "Back.easeOut",
          });
        }
        doBlueFlash() {
          if (this.reduce) return;
          this.redFlash.setAlpha(0.3);
          this.tweens.add({ targets: this.redFlash, alpha: 0, duration: 350 });
        }
        updateHUD() {
          this.scoreText.setText("Score: " + this.score);
          this.streakText.setText("Streak: " + this.streak);
          this.livesText.setText(this.lives > 0 ? "❤".repeat(this.lives) : "—");
        }
        endGame() {
          this.scene.start("Result", {
            score: this.score,
            correct: this.correct,
            attempted: this.qIndex,
            maxStreak: this.maxStreak,
            outOfLives: this.lives <= 0,
          });
        }
      }

      class ResultScene extends Phaser.Scene {
        constructor() {
          super("Result");
        }
        init(data) {
          this.d = data;
        }
        create() {
          const cx = W / 2;
          const d = this.d;
          this.reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          this.add.rectangle(cx, H / 2, W, H, 0x0c2a2e);
          const pct = d.attempted ? (d.correct / d.attempted) * 100 : 0;
          const stars = pct >= 90 ? 3 : pct >= 65 ? 2 : pct >= 40 ? 1 : 0;
          const won = !d.outOfLives;
          if (stars >= 2) SFX.win();
          else SFX.lose();

          this.add
            .text(cx, 70, won ? "REACHED THE BANK!" : "OUT OF LIVES", {
              fontSize: "36px",
              fontStyle: "bold",
              color: won ? "#6be0c0" : "#ff7b6b",
              stroke: "#07191c",
              strokeThickness: 4,
            })
            .setOrigin(0.5);

          for (let i = 0; i < 3; i++) {
            const sx = cx - 70 + i * 70;
            this.add
              .text(sx, 150, "☆", { fontSize: "54px", color: "#2a4a48" })
              .setOrigin(0.5);
            if (i < stars) {
              const s = this.add
                .text(sx, 150, "★", { fontSize: "54px", color: "#d4952a" })
                .setOrigin(0.5)
                .setScale(0);
              this.tweens.add({
                targets: s,
                scale: 1,
                duration: this.reduce ? 1 : 380,
                delay: 250 + i * 220,
                ease: "Back.easeOut",
              });
            }
          }

          const prevHigh = parseInt(localStorage.getItem(LS_KEY) || "0", 10);
          const isNewHigh = d.score > prevHigh;
          if (isNewHigh && d.score > 0)
            localStorage.setItem(LS_KEY, String(d.score));

          const stats = [
            ["Final Score", String(d.score)],
            ["Pads Cleared", d.correct + " / " + d.attempted],
            ["Accuracy", Math.round(pct) + "%"],
            ["Best Streak", "×" + d.maxStreak],
          ];
          stats.forEach((s, i) => {
            const y = 230 + i * 42;
            this.add.rectangle(cx, y, 380, 34, 0x07191c, 0.85);
            this.add
              .text(cx - 165, y, s[0], { fontSize: "15px", color: "#7fb3a0" })
              .setOrigin(0, 0.5);
            this.add
              .text(cx + 165, y, s[1], {
                fontSize: "17px",
                color: "#6be0c0",
                fontStyle: "bold",
              })
              .setOrigin(1, 0.5);
          });

          if (isNewHigh && d.score > 0)
            this.add
              .text(cx, 415, "★ NEW HIGH SCORE! ★", {
                fontSize: "18px",
                color: "#d4952a",
                fontStyle: "bold",
              })
              .setOrigin(0.5);

          try {
            window.EduPulse &&
              EduPulse.record({
                activityTitle: ACTIVITY_TITLE,
                score: d.score,
                stars: stars,
                problemsCorrect: d.correct,
                problemsAttempted: d.attempted,
                percent: Math.round(pct),
                standard: STANDARD,
              });
          } catch (e) {}

          srSay(
            (won ? "Reached the bank. " : "Out of lives. ") +
              "Score " +
              d.score +
              ", " +
              d.correct +
              " of " +
              d.attempted +
              " correct, " +
              stars +
              " stars.",
          );

          const retry = this.add
            .rectangle(cx - 95, 470, 170, 46, 0x0e8a7d)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx - 95, 470, "HOP AGAIN", {
              fontSize: "17px",
              fontStyle: "bold",
              color: "#062420",
            })
            .setOrigin(0.5);
          retry.on("pointerover", () => retry.setFillStyle(0x12a596));
          retry.on("pointerout", () => retry.setFillStyle(0x0e8a7d));
          retry.on("pointerdown", () => {
            SFX.tick();
            this.scene.start("Game");
          });

          const hub = this.add
            .rectangle(cx + 95, 470, 170, 46, 0x1a3a3e)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx + 95, 470, "ALL GAMES", {
              fontSize: "17px",
              fontStyle: "bold",
              color: "#9fd6c0",
            })
            .setOrigin(0.5);
          hub.on("pointerover", () => hub.setFillStyle(0x244c50));
          hub.on("pointerout", () => hub.setFillStyle(0x1a3a3e));
          hub.on("pointerdown", () => (window.location.href = "/math/games/"));

          this.input.keyboard.on("keydown-SPACE", () => this.scene.start("Game"));

          if (won && stars >= 2 && !this.reduce) {
            const p = this.add
              .particles(0, 0, "confetti", {
                speed: { min: 60, max: 240 },
                angle: { min: 0, max: 360 },
                scale: { start: 1.4, end: 0 },
                rotate: { min: 0, max: 360 },
                lifespan: 1500,
                gravityY: 160,
                quantity: 20,
                tint: [0x6be0c0, 0xd4952a, 0x57c84a, 0x1a6fb5],
              })
              .setDepth(40);
            for (let i = 0; i < 5; i++)
              this.time.delayedCall(i * 280, () =>
                p.emitParticleAt(randInt(120, W - 120), randInt(40, 140)),
              );
          }
          this.cameras.main.fadeIn(400);
        }
      }

      config.scene = [BootScene, TitleScene, GameScene, ResultScene];
      const game = new Phaser.Game(config);

      game.events.once("ready", function () {
        try {
          const cv = game.canvas;
          if (!cv) return;
          cv.setAttribute("role", "application");
          cv.setAttribute(
            "aria-label",
            "Ratio Rush lily-pad hopper math game. Read each ratio or unit-rate " +
              "problem, then hop your frog with the left, up, and right arrow keys " +
              "(or A, W, D) onto the lily pad showing the correct answer. Press " +
              "Space to start.",
          );
          cv.setAttribute("aria-roledescription", "math game");
          if (!cv.hasAttribute("tabindex")) cv.setAttribute("tabindex", "0");
          cv.addEventListener("pointerdown", function () {
            try {
              cv.focus();
            } catch (e) {}
          });
        } catch (e) {}
      });
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <script src="/shared/save-resume/save-resume-engine.js" defer></script>
    <!-- nsr-injected:end -->
    <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
    <script src="/assets/game-fx.js" defer></script>
    <!-- gfx-injected:end -->
  </body>
</html>
