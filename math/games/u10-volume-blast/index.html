    <style>

        display: block;

      canvas:focus-visible {

      /* Decorative drifting wireframe-cube field behind the Phaser canvas. */
      #vb-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;

          #051209 100%
        );
      }
      #vb-bg-layer {
        position: absolute;
        inset: -6% -6%;

        transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);

      .vb-cube {
        position: absolute;
        border: 1.5px solid rgba(180, 255, 220, 0.35);

      .vb-cube::after {
        content: "";

        left: -7px;
        right: 0;

        border-radius: 3px;
      }
      @keyframes vbDrift {
        0% {
          transform: translateY(10px) rotate(0deg);
        }
        50% {
          transform: translateY(-14px) rotate(10deg);
        }
        100% {
          transform: translateY(10px) rotate(0deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #vb-bg-layer {
          transition: none !important;
          transform: none !important;
        }
        .vb-cube {
          animation: none !important;
        }
      }
      #vb-sr {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;

  <body>
    <!-- Decorative drifting wireframe-cube field (behind the Phaser canvas). -->
    <div id="vb-bg" data-parallax aria-hidden="true">
      <div id="vb-bg-layer" data-parallax-layer></div>
    </div>
    <!-- Screen-reader live region mirrors the current question + result. -->
    <div id="vb-sr" role="status" aria-live="polite"></div>

    <script>
      // Decorative cube-field builder + pointer parallax (gameplay-neutral).
      (function () {
        var layer = document.getElementById("vb-bg-layer");
        if (!layer) return;
        var reduce =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 16; i++) {
          var c = document.createElement("div");
          c.className = "vb-cube";
          var size = 18 + Math.round(Math.random() * 40);
          c.style.width = size + "px";
          c.style.height = size + "px";
          c.style.left = Math.round(Math.random() * 92) + "%";
          c.style.top = Math.round(Math.random() * 84) + "%";
          c.style.setProperty("--d", (11 + Math.random() * 8).toFixed(2) + "s");
          c.style.animationDelay = (-Math.random() * 14).toFixed(2) + "s";
          frag.appendChild(c);
        }
        layer.appendChild(frag);
        if (reduce) return;
        window.addEventListener(
          "pointermove",
          function (e) {
            var tx = (e.clientX / window.innerWidth - 0.5) * -22;
            var ty = (e.clientY / window.innerHeight - 0.5) * -14;
            layer.style.transform = "translate3d(" + tx + "px," + ty + "px,0)";
          },
          { passive: true },
        );
      })();
    </script>

    <script>
      // ════════════════════════════════════════════════════════════════════
      //  VOLUME BLAST — CRATE CANNON   ·   Lessons 10.1-10.5 · 6.G.2
      //  True 2D mechanic: a rectangular prism shows the problem. Four answer
      //  crates float in an arc across the top. AIM the cannon (← → rotate) and
      //  FIRE (Space) a cube-shell. Hit the crate whose number is the correct
      //  volume / missing dimension. A real projectile flies, collides, and
      //  resolves on impact. Hit the wrong crate or miss everything = lose a life.
      //  Rising difficulty:
      //   • Round 1 — V = l × w × h (whole numbers)
      //   • Round 2 — missing dimension: h = V ÷ (l × w)
      //   • Round 3 — fractional edge (one decimal dimension; compare ROUNDED)
      // ════════════════════════════════════════════════════════════════════
      const W = 900,
        H = 620;

      const C = {
        bg: 0x0a241b,
        panel: 0x123026,
        panelEdge: 0x2a5a44,
        ink: "#eafff4",
        sub: "#a8d8c4",
        accent: 0x4fd18b,
        good: 0x4fd18b,
        bad: 0xff6b6b,
        gold: 0xffcd4d,
        prism: 0x1a6fb5,
        prismEdge: 0x6fb7e8,
        crate: 0x1d4a38,
        cannon: 0xd4952a,
        shell: 0x4fd18b,
      };

      const randInt = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
      const choice = (arr) => arr[Math.floor(Math.random() * arr.length)];
      function shuffle(a) {
        a = a.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }
      const RM_QUERY =
        window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)");
      const reducedMotion = () => !!(RM_QUERY && RM_QUERY.matches);

      const TOTAL_LEVELS = 3;
      const ROUNDS_PER_LEVEL = 4;
      const START_LIVES = 3;

      const round2 = (n) => Math.round(n * 100) / 100;
      // Compare answers by their ROUNDED STRING form to dodge float pitfalls
      // (e.g. 0.5*3*5 must equal "7.5", never 7.499999…).
      function fmtNum(n) {
        const r = round2(n);
        return Number.isInteger(r) ? String(r) : String(r);
      }

      // ── Question generators (also exposed on window for stress tests) ──

      // ROUND 1: V = l × w × h with whole numbers.
      function buildWhole(level) {
        const hi = 6 + level; // dimension range grows slightly with level
        const l = randInt(2, hi),
          w = randInt(2, hi),
          h = randInt(2, hi);
        const ans = l * w * h;
        return finishQ(
          "whole",
          { l, w, h },
          ans,
          "Box " + l + " × " + w + " × " + h + ".  Find the volume.",
          "Use V = length × width × height.",
          "V = " + l + " × " + w + " × " + h + " = " + ans + " cubic units.",
        );
      }

      // ROUND 2: missing dimension — given V, l, w, find h = V ÷ (l × w).
      function buildMissing(level) {
        const l = randInt(2, 6),
          w = randInt(2, 6),
          h = randInt(2, 8);
        const V = l * w * h; // guarantees an exact integer height
        return finishQ(
          "missing",
          { l, w, h, V, missing: "h" },
          h,
          "Volume = " + V + ".  Length = " + l + ", width = " + w + ".  Find the height.",
          "Use h = V ÷ (l × w).",
          "h = " + V + " ÷ (" + l + " × " + w + ") = " + V + " ÷ " + l * w + " = " + h + ".",
        );
      }

      // ROUND 3: fractional edge — one decimal dimension; whole product result.
      const FRAC_EDGES = [0.5, 1.5, 2.5, 3.5, 4.5];
      function buildFraction(level) {
        const frac = choice(FRAC_EDGES);
        const w = randInt(2, 6),
          h = randInt(2, 6);
        const ans = round2(frac * w * h);
        return finishQ(
          "fraction",
          { l: frac, w, h },
          ans,
          "Box " + fmtNum(frac) + " × " + w + " × " + h + ".  Find the volume.",
          "Multiply carefully — one edge is a decimal.",
          "V = " + fmtNum(frac) + " × " + w + " × " + h + " = " + fmtNum(ans) + " cubic units.",
        );
      }

      // Build four DISTINCT crates (by rounded-string form), exactly one correct.
      function finishQ(kind, dims, answer, prompt, hint, why) {
        const ansStr = fmtNum(answer);
        const seen = {};
        seen[ansStr] = true;
        const labels = [ansStr];
        const fracMode = kind === "fraction";
        let guard = 0;
        while (labels.length < 4 && guard < 80) {
          guard++;
          let cand;
          if (fracMode) {
            const step = (Math.random() < 0.5 ? 0.5 : 1) * randInt(1, 4) *
              (Math.random() < 0.5 ? 1 : -1);
            cand = round2(answer + step);
          } else {
            cand = answer + randInt(1, 6) * (Math.random() < 0.5 ? 1 : -1);
          }
          if (cand <= 0) continue;
          const k = fmtNum(cand);
          if (!seen[k]) {
            seen[k] = true;
            labels.push(k);
          }
        }
        // deterministic padding so we always render 4 distinct crates
        let pad = 1;
        while (labels.length < 4) {
          const cand = fracMode ? round2(answer + pad * 0.5) : answer + pad;
          const k = fmtNum(cand);
          if (cand > 0 && !seen[k]) {
            seen[k] = true;
            labels.push(k);
          }
          pad++;
        }
        return {
          kind,
          dims,
          answer,
          answerStr: ansStr,
          labels: shuffle(labels), // STRINGS — compared as rounded strings
          prompt,
          hint,
          why,
        };
      }

      function buildQuestion(level) {
        if (level === 0) return buildWhole(level);
        if (level === 1) return buildMissing(level);
        return buildFraction(level);
      }
      window.VolumeBlast = {
        buildWhole,
        buildMissing,
        buildFraction,
        buildQuestion,
        fmtNum,
        round2,
      };

      // ════════════════════════════════════════════════════════════════════
      //  BOOT
      // ════════════════════════════════════════════════════════════════════
      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          const g = this.make.graphics({ add: false });
          g.fillStyle(0xffffff).fillCircle(4, 4, 4);
          g.generateTexture("dot", 8, 8);
          g.clear();
          g.fillStyle(0xffffff).fillRect(0, 0, 8, 8);
          g.generateTexture("cubechip", 8, 8);
          g.clear();
          g.destroy();
          this.scene.start("Title");
        }
      }

      // ════════════════════════════════════════════════════════════════════
      //  TITLE
      // ════════════════════════════════════════════════════════════════════
      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          this.cameras.main.setBackgroundColor(C.bg);
          const cx = W / 2;

          // isometric prism emblem
          const badge = this.add.container(cx, 150);
          const g = this.add.graphics();
          g.fillStyle(C.prism, 1).fillRect(-40, -20, 80, 56);
          g.fillStyle(0x2a8fd8, 1);
          g.beginPath();
          g.moveTo(-40, -20);
          g.lineTo(-20, -44);
          g.lineTo(60, -44);
          g.lineTo(40, -20);
          g.closePath();
          g.fillPath();
          g.fillStyle(0x12568f, 1);
          g.beginPath();
          g.moveTo(40, -20);
          g.lineTo(60, -44);
          g.lineTo(60, 12);
          g.lineTo(40, 36);
          g.closePath();
          g.fillPath();
          g.lineStyle(2, C.prismEdge, 1).strokeRect(-40, -20, 80, 56);
          badge.add(g);
          if (!reducedMotion()) {
            this.tweens.add({ targets: badge, y: 138, duration: 1600, yoyo: true, repeat: -1, ease: "Sine.inOut" });
          }

          this.add
            .text(cx, 250, "VOLUME BLAST", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "56px",
              fontStyle: "900",
              color: "#eafff4",
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 296, "Crate Cannon", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "26px",
              fontStyle: "bold",
              color: "#ffcd4d",
            })
            .setOrigin(0.5);
          this.add
            .text(
              cx,
              350,
              "Solve the prism, then AIM the cannon and BLAST the crate\nwith the correct volume or missing dimension.",
              {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "18px",
                color: "#a8d8c4",
                align: "center",
                lineSpacing: 6,
              },
            )
            .setOrigin(0.5);
          this.add
            .text(cx, 406, "Grade 6 · Lessons 10.1–10.5 · Standard 6.G.2", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "15px",
              fontStyle: "bold",
              color: "#4fd18b",
            })
            .setOrigin(0.5);

          this.makeButton(cx, 474, "▶  START GAME", 0x1f7a52, () =>
            this.scene.start("Game", { level: 0, score: 0, lives: START_LIVES }),
          );
          this.add
            .text(
              cx,
              548,
              "← → rotate the cannon · Space fires · or tap a crate to blast it.",
              {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "14px",
                color: "#7fb8a0",
              },
            )
            .setOrigin(0.5);
          this.makeLink(cx, 586, "← Back to Math Games");
          this.setSR(
            "Volume Blast, Crate Cannon. A game for the volume of rectangular prisms, standard 6.G.2. Press start to play.",
          );
        }
        makeButton(x, y, label, color, cb) {
          const b = this.add
            .rectangle(x, y, 290, 56, color)
            .setStrokeStyle(3, 0xffffff, 0.85)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(x, y, label, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "22px",
              fontStyle: "bold",
              color: "#ffffff",
            })
            .setOrigin(0.5);
          b.on("pointerover", () => b.setScale(1.04));
          b.on("pointerout", () => b.setScale(1));
          b.on("pointerdown", cb);
          this.input.keyboard.once("keydown-SPACE", cb);
          this.input.keyboard.once("keydown-ENTER", cb);
          return b;
        }
        makeLink(x, y, label) {
          const t = this.add
            .text(x, y, label, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "15px",
              fontStyle: "bold",
              color: "#a8d8c4",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });
          t.on("pointerover", () => t.setColor("#4fd18b"));
          t.on("pointerout", () => t.setColor("#a8d8c4"));
          t.on("pointerdown", () => {
            window.location.href = "/math/games/";
          });
          return t;
        }
        setSR(msg) {
          const el = document.getElementById("vb-sr");
          if (el) el.textContent = msg;
        }
      }

      // ════════════════════════════════════════════════════════════════════
      //  GAME
      // ════════════════════════════════════════════════════════════════════
      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }
        init(data) {
          this.levelIndex = data.level || 0;
          this.score = data.score || 0;
          this.lives = data.lives != null ? data.lives : START_LIVES;
          this.streak = 0;
          this.solved = 0;
          this.locked = false;
          this.crates = [];
          this.shell = null;
          this.aim = -Math.PI / 2; // straight up
        }
        create() {
          this.cameras.main.setBackgroundColor(C.bg);
          this.cannonX = W / 2;
          this.cannonY = H - 60;

          this.buildHUD();
          this.buildPanel();
          this.buildCannon();

          this.left = this.input.keyboard.addKey("LEFT");
          this.right = this.input.keyboard.addKey("RIGHT");
          this.aKey = this.input.keyboard.addKey("A");
          this.dKey = this.input.keyboard.addKey("D");
          this.input.keyboard.on("keydown-SPACE", () => this.fire());
          this.input.keyboard.on("keydown-ENTER", () => this.fire());
          // tap a crate to aim+fire at it
          this.input.on("pointerdown", (p) => {
            if (this.locked || this.shell) return;
            // aim toward pointer then fire
            this.aim = Math.atan2(p.y - this.cannonY, p.x - this.cannonX);
            if (this.aim > -0.15) this.aim = -0.15; // never fire downward
            if (this.aim < -Math.PI + 0.15) this.aim = -Math.PI + 0.15;
            this.fire();
          });

          this.nextQuestion();
          this.cameras.main.fadeIn(400);
        }

        buildHUD() {
          this.add.rectangle(W / 2, 30, W, 60, C.panel).setDepth(1);
          this.add.rectangle(W / 2, 60, W, 2, C.panelEdge).setDepth(1);
          const mk = (x, label) => {
            this.add
              .text(x, 16, label, {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "12px",
                color: "#7fb8a0",
              })
              .setOrigin(1, 0)
              .setDepth(2);
            return this.add
              .text(x, 30, "", {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "22px",
                fontStyle: "900",
                color: "#eafff4",
              })
              .setOrigin(1, 0)
              .setDepth(2);
          };
          this.add
            .text(20, 18, "📦 Volume Blast", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "18px",
              fontStyle: "bold",
              color: "#ffcd4d",
            })
            .setDepth(2);
          this.scoreT = mk(W - 20, "SCORE");
          this.levelT = mk(W - 150, "ROUND");
          this.streakT = mk(W - 290, "STREAK");
          this.livesT = mk(W - 420, "LIVES");

          const menu = this.add
            .text(190, 30, "☰ Menu", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "14px",
              fontStyle: "bold",
              color: "#a8d8c4",
            })
            .setOrigin(0, 0.5)
            .setDepth(2)
            .setInteractive({ useHandCursor: true });
          menu.on("pointerdown", () => this.scene.start("Title"));
          menu.on("pointerover", () => menu.setColor("#4fd18b"));
          menu.on("pointerout", () => menu.setColor("#a8d8c4"));
          this.refreshHUD();
        }
        refreshHUD() {
          this.scoreT.setText(String(this.score));
          this.levelT.setText(`${this.levelIndex + 1} / ${TOTAL_LEVELS}`);
          this.streakT.setText(this.streak > 0 ? `×${this.streak}` : "—");
          this.livesT.setText("❤".repeat(Math.max(0, this.lives)) || "—");
        }

        buildPanel() {
          // problem panel (top-center under HUD)
          this.add
            .rectangle(W / 2, 118, W - 60, 92, C.panel)
            .setStrokeStyle(2, C.panelEdge)
            .setDepth(1);
          this.tagT = this.add
            .text(W / 2, 86, "", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "14px",
              fontStyle: "900",
              color: "#4fd18b",
            })
            .setOrigin(0.5)
            .setDepth(2);
          this.promptT = this.add
            .text(W / 2, 112, "", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "21px",
              fontStyle: "bold",
              color: "#eafff4",
              align: "center",
              wordWrap: { width: W - 100 },
            })
            .setOrigin(0.5)
            .setDepth(2);
          this.hintT = this.add
            .text(W / 2, 144, "", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "14px",
              color: "#a8d8c4",
            })
            .setOrigin(0.5)
            .setDepth(2);

          // prism diagram (left)
          this.prismGfx = this.add.graphics().setDepth(2);
          this.prismLabels = this.add.container(0, 0).setDepth(3);

          // feedback (bottom)
          this.fbText = this.add
            .text(W / 2, H - 26, "", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "15px",
              fontStyle: "bold",
              color: "#a8d8c4",
              align: "center",
              wordWrap: { width: W - 80 },
            })
            .setOrigin(0.5)
            .setDepth(4);
        }

        buildCannon() {
          this.cannon = this.add.container(this.cannonX, this.cannonY).setDepth(6);
          const base = this.add.circle(0, 6, 26, 0x123026).setStrokeStyle(3, C.cannon);
          this.barrel = this.add
            .rectangle(0, -22, 16, 46, C.cannon)
            .setOrigin(0.5, 1)
            .setStrokeStyle(2, 0x7a5510);
          this.cannon.add([base, this.barrel]);
          // aim guide line
          this.aimGfx = this.add.graphics().setDepth(5);
        }

        drawPrism(dims, missing) {
          const g = this.prismGfx;
          g.clear();
          this.prismLabels.removeAll(true);
          // isometric box in a fixed spot lower-left of play area
          const ox = 150,
            oy = 320;
          const fw = 120,
            fh = 88,
            dep = 44;
          // front
          g.fillStyle(C.prism, 0.9).fillRect(ox, oy, fw, fh);
          g.lineStyle(2, C.prismEdge, 1).strokeRect(ox, oy, fw, fh);
          // top
          g.fillStyle(0x2a8fd8, 0.9);
          g.beginPath();
          g.moveTo(ox, oy);
          g.lineTo(ox + dep, oy - dep);
          g.lineTo(ox + fw + dep, oy - dep);
          g.lineTo(ox + fw, oy);
          g.closePath();
          g.fillPath();
          g.lineStyle(2, C.prismEdge, 1).strokePath();
          // right side
          g.fillStyle(0x12568f, 0.9);
          g.beginPath();
          g.moveTo(ox + fw, oy);
          g.lineTo(ox + fw + dep, oy - dep);
          g.lineTo(ox + fw + dep, oy + fh - dep);
          g.lineTo(ox + fw, oy + fh);
          g.closePath();
          g.fillPath();
          g.lineStyle(2, C.prismEdge, 1).strokePath();

          const mkLbl = (x, y, txt, color) =>
            this.prismLabels.add(
              this.add
                .text(x, y, txt, {
                  fontFamily: "Segoe UI, sans-serif",
                  fontSize: "16px",
                  fontStyle: "bold",
                  color: color || "#eafff4",
                })
                .setOrigin(0.5),
            );
          const lTxt = missing === "l" ? "?" : "l = " + fmtNum(dims.l);
          const wTxt = "w = " + fmtNum(dims.w);
          const hTxt = missing === "h" ? "h = ?" : "h = " + fmtNum(dims.h);
          mkLbl(ox + fw / 2, oy + fh + 18, lTxt, missing === "l" ? "#ffcd4d" : "#eafff4");
          mkLbl(ox + fw + dep + 26, oy + (fh - dep) / 2, wTxt);
          mkLbl(ox - 26, oy + fh / 2, hTxt, missing === "h" ? "#ffcd4d" : "#eafff4");
          if (missing === "h") {
            mkLbl(ox + fw / 2, oy + fh / 2, "V = " + fmtNum(dims.V), "#ffcd4d");
          }
        }

        nextQuestion() {
          this.locked = false;
          this.q = buildQuestion(this.levelIndex);
          this.tagT.setText("ROUND " + (this.levelIndex + 1) + " · " +
            (this.q.kind === "whole" ? "V = l × w × h"
              : this.q.kind === "missing" ? "MISSING DIMENSION" : "FRACTIONAL EDGE"));
          this.promptT.setText(this.q.prompt);
          this.hintT.setText(this.q.hint);
          this.drawPrism(this.q.dims, this.q.dims.missing);
          this.fbText.setText("Aim with ← →, then press Space to fire at the correct crate.");
          this.spawnCrates();
          this.setSR(
            this.q.prompt + " " + this.q.hint + " Crates: " + this.q.labels.join(", ") + ".",
          );
        }

        spawnCrates() {
          this.crates.forEach((c) => c.destroy());
          this.crates = [];
          // place four crates across an arc near the top of the play area
          const slots = 4;
          const xStart = 360,
            xEnd = W - 70,
            yTop = 210;
          this.q.labels.forEach((label, i) => {
            const x = xStart + ((xEnd - xStart) / (slots - 1)) * i;
            const y = yTop + (i % 2 === 0 ? 0 : 56);
            const cont = this.add.container(x, y).setDepth(5);
            const isCorrect = label === this.q.answerStr;
            const box = this.add
              .rectangle(0, 0, 82, 58, C.crate)
              .setStrokeStyle(3, C.panelEdge);
            // crate cross-slats for a wooden look
            const slatA = this.add.line(0, 0, -41, -29, 41, 29, 0x2a5a44).setLineWidth(1.5);
            const slatB = this.add.line(0, 0, 41, -29, -41, 29, 0x2a5a44).setLineWidth(1.5);
            const lab = this.add
              .text(0, 0, label, {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "24px",
                fontStyle: "900",
                color: "#eafff4",
              })
              .setOrigin(0.5);
            cont.add([box, slatA, slatB, lab]);
            cont.box = box;
            cont.label = label;
            cont.correct = isCorrect;
            cont.alive = true;
            // gentle bobbing
            if (!reducedMotion()) {
              this.tweens.add({
                targets: cont,
                y: y + 14,
                duration: 1200 + i * 130,
                yoyo: true,
                repeat: -1,
                ease: "Sine.inOut",
              });
            }
            this.crates.push(cont);
          });
        }

        update(time, delta) {
          // aim control
          if (!this.locked && !this.shell) {
            const dt = delta / 1000;
            const rate = 1.7 * dt;
            if (this.left.isDown || this.aKey.isDown) this.aim -= rate;
            if (this.right.isDown || this.dKey.isDown) this.aim += rate;
            // clamp so the barrel always points upward into the play field
            this.aim = Phaser.Math.Clamp(this.aim, -Math.PI + 0.15, -0.15);
            this.barrel.rotation = this.aim + Math.PI / 2;
            this.drawAimGuide();
          }

          // shell flight
          if (this.shell) {
            const dt = delta / 1000;
            this.shell.x += this.shell.vx * dt;
            this.shell.y += this.shell.vy * dt;
            // collision with crates
            for (const c of this.crates) {
              if (!c.alive) continue;
              if (
                Math.abs(this.shell.x - c.x) <= 46 &&
                Math.abs(this.shell.y - c.y) <= 34
              ) {
                this.hitCrate(c);
                return;
              }
            }
            // off-screen miss
            if (
              this.shell.x < -20 ||
              this.shell.x > W + 20 ||
              this.shell.y < 70 ||
              this.shell.y > H + 20
            ) {
              this.shell.destroy();
              this.shell = null;
              this.resolveMissShot();
            }
          }
        }

        drawAimGuide() {
          const g = this.aimGfx;
          g.clear();
          g.lineStyle(2, C.cannon, 0.35);
          const len = 90;
          g.lineBetween(
            this.cannonX,
            this.cannonY - 20,
            this.cannonX + Math.cos(this.aim) * len,
            this.cannonY - 20 + Math.sin(this.aim) * len,
          );
        }

        fire() {
          if (this.locked || this.shell) return;
          const speed = 720;
          const sx = this.cannonX + Math.cos(this.aim) * 46;
          const sy = this.cannonY - 20 + Math.sin(this.aim) * 46;
          const s = this.add
            .rectangle(sx, sy, 16, 16, C.shell)
            .setStrokeStyle(2, 0x0a3a28)
            .setDepth(6);
          s.vx = Math.cos(this.aim) * speed;
          s.vy = Math.sin(this.aim) * speed;
          this.shell = s;
          this.aimGfx.clear();
          if (!reducedMotion()) {
            this.tweens.add({ targets: this.barrel, scaleY: { from: 0.82, to: 1 }, duration: 160 });
          }
        }

        hitCrate(crate) {
          this.shell.destroy();
          this.shell = null;
          crate.alive = false;
          this.locked = true;
          if (crate.correct) {
            crate.box.setFillStyle(0x1c5a3a).setStrokeStyle(3, C.good);
            this.streak++;
            this.solved++;
            const gain = 100 + Math.min(this.streak, 5) * 20;
            this.score += gain;
            this.fbText.setColor("#4fd18b").setText("✓ +" + gain + "   " + this.q.why);
            this.burst(crate.x, crate.y, C.good);
            this.setSR("Correct. " + this.q.why);
          } else {
            crate.box.setFillStyle(0x5a1c1c).setStrokeStyle(3, C.bad);
            this.streak = 0;
            this.lives--;
            this.fbText.setColor("#ff8f8f").setText(
              "✗ That crate was " + crate.label + ". The answer is " +
                this.q.answerStr + ". " + this.q.why,
            );
            this.burst(crate.x, crate.y, C.bad);
            if (!reducedMotion()) this.cameras.main.shake(180, 0.006);
            this.setSR("Not quite. " + this.q.why);
          }
          this.refreshHUD();
          this.afterResolve(crate.correct);
        }

        resolveMissShot() {
          // a clean miss costs nothing but lets the student re-aim
          if (this.locked) return;
          this.fbText.setColor("#ffcd4d").setText("Missed every crate — aim again!");
          this.setSR("The shell missed. Aim again and fire.");
        }

        afterResolve(correct) {
          this.time.delayedCall(correct ? 1000 : 1700, () => {
            if (this.lives <= 0) return this.gameOver();
            if (this.solved >= ROUNDS_PER_LEVEL) return this.completeLevel();
            this.nextQuestion();
          });
        }

        burst(x, y, color) {
          const p = this.add.particles(x, y, "cubechip", {
            speed: { min: 80, max: 220 },
            angle: { min: 0, max: 360 },
            scale: { start: 1, end: 0 },
            rotate: { min: 0, max: 360 },
            gravityY: 260,
            lifespan: 700,
            quantity: 16,
            tint: color === C.good ? [0x4fd18b, 0xd4952a, 0x1a6fb5] : [0xff6b6b, 0xc45a3c],
          });
          this.time.delayedCall(750, () => p.destroy());
        }

        completeLevel() {
          this.score += 250;
          this.refreshHUD();
          const ov = this.add.container(0, 0).setDepth(20);
          ov.add(this.add.rectangle(W / 2, H / 2, W, H, 0x05140d, 0.8));
          ov.add(
            this.add
              .text(W / 2, 230, "ROUND CLEAR!", {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "42px",
                fontStyle: "900",
                color: "#4fd18b",
              })
              .setOrigin(0.5),
          );
          ov.add(
            this.add
              .text(W / 2, 292, "Volume round " + (this.levelIndex + 1) + " blasted!\n+250 bonus", {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "20px",
                color: "#eafff4",
                align: "center",
                lineSpacing: 6,
              })
              .setOrigin(0.5),
          );
          this.confetti();
          const last = this.levelIndex + 1 >= TOTAL_LEVELS;
          const label = last ? "🏁  SEE RESULTS" : "▶  NEXT ROUND";
          const btn = this.add
            .rectangle(W / 2, 380, 300, 56, 0x1f7a52)
            .setStrokeStyle(3, 0xffffff, 0.85)
            .setDepth(21)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(W / 2, 380, label, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "22px",
              fontStyle: "bold",
              color: "#fff",
            })
            .setOrigin(0.5)
            .setDepth(22);
          btn.on("pointerover", () => btn.setScale(1.04));
          btn.on("pointerout", () => btn.setScale(1));
          const go = () => {
            if (last) {
              this.scene.start("Result", { score: this.score, won: true });
            } else {
              this.scene.start("Game", {
                level: this.levelIndex + 1,
                score: this.score,
                lives: this.lives,
              });
            }
          };
          btn.on("pointerdown", go);
          this.input.keyboard.once("keydown-SPACE", go);
          this.setSR("Round clear. Score " + this.score + ".");
        }

        gameOver() {
          this.scene.start("Result", { score: this.score, won: false });
        }

        confetti() {
          const p = this.add.particles(W / 2, -10, "cubechip", {
            x: { min: 0, max: W },
            y: -10,
            speedY: { min: 120, max: 280 },
            speedX: { min: -60, max: 60 },
            angle: { min: 0, max: 360 },
            rotate: { min: 0, max: 360 },
            scale: { min: 0.6, max: 1.3 },
            lifespan: 2600,
            quantity: 3,
            frequency: 40,
            tint: [0xffcd4d, 0x4fd18b, 0x1a6fb5, 0xc45a3c],
          });
          this.time.delayedCall(1800, () => p.stop());
        }

        setSR(msg) {
          const el = document.getElementById("vb-sr");
          if (el) el.textContent = msg;
        }
      }

      // ════════════════════════════════════════════════════════════════════
      //  RESULT
      // ════════════════════════════════════════════════════════════════════
      class ResultScene extends Phaser.Scene {
        constructor() {
          super("Result");
        }
        init(data) {
          this.score = data.score || 0;
          this.won = !!data.won;
        }
        create() {
          this.cameras.main.setBackgroundColor(C.bg);
          const cx = W / 2;
          const stars = this.score >= 1500 ? 3 : this.score >= 900 ? 2 : 1;
          try {
            window.EduPulse &&
              EduPulse.record({
                activityTitle: document.title,
                score: this.score,
                stars: stars,
              });
          } catch (e) {}
          this.add
            .text(cx, 150, this.won ? "VOLUME MASTERED!" : "OUT OF LIVES", {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "46px",
              fontStyle: "900",
              color: this.won ? "#4fd18b" : "#ff8f8f",
            })
            .setOrigin(0.5);
          for (let i = 0; i < 3; i++) {
            this.add
              .text(cx - 80 + i * 80, 240, i < stars ? "★" : "☆", {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "64px",
                color: i < stars ? "#ffcd4d" : "#2a5a44",
              })
              .setOrigin(0.5);
          }
          this.add
            .text(cx, 326, "Final Score: " + this.score, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "30px",
              fontStyle: "bold",
              color: "#eafff4",
            })
            .setOrigin(0.5);
          this.add
            .text(
              cx,
              372,
              this.won
                ? "You blasted whole-number, missing-dimension, and fractional-edge volumes."
                : "Tip: V = l × w × h. To find a missing edge, divide V by the other two. Try again!",
              {
                fontFamily: "Segoe UI, sans-serif",
                fontSize: "16px",
                color: "#a8d8c4",
                align: "center",
                wordWrap: { width: 560 },
              },
            )
            .setOrigin(0.5);
          this.btn(cx - 150, 460, "↻  PLAY AGAIN", 0x1f7a52, () =>
            this.scene.start("Game", { level: 0, score: 0, lives: START_LIVES }),
          );
          this.btn(cx + 150, 460, "🏠  ALL GAMES", 0x355a86, () => {
            window.location.href = "/math/games/";
          });
          const el = document.getElementById("vb-sr");
          if (el)
            el.textContent =
              (this.won ? "Volume mastered" : "Out of lives") +
              ". Final score " + this.score + ", " + stars + " stars.";
        }
        btn(x, y, label, color, cb) {
          const b = this.add
            .rectangle(x, y, 270, 56, color)
            .setStrokeStyle(3, 0xffffff, 0.85)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(x, y, label, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "20px",
              fontStyle: "bold",
              color: "#fff",
            })
            .setOrigin(0.5);
          b.on("pointerover", () => b.setScale(1.04));
          b.on("pointerout", () => b.setScale(1));
          b.on("pointerdown", cb);
        }
      }

      // ── launch ──
      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#0a241b",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [BootScene, TitleScene, GameScene, ResultScene],
      };
      const vbGame = new Phaser.Game(config);

      // ── Canvas accessibility (additive; no gameplay change) ──
      vbGame.events.once("ready", function () {
        try {
          const cv = vbGame.canvas;
          if (!cv) return;
          cv.setAttribute("role", "application");
          cv.setAttribute(
            "aria-label",
            "Volume Blast Crate Cannon math game. Solve the rectangular prism, " +
              "rotate the cannon with the left and right arrow keys, and press Space " +
              "to fire at the crate with the correct volume.",
          );
          cv.setAttribute("aria-roledescription", "math game");
          if (!cv.hasAttribute("tabindex")) cv.setAttribute("tabindex", "0");
          cv.addEventListener("pointerdown", function () {
            try {
              cv.focus({ preventScroll: true });
            } catch (e) {
              cv.focus();
            }
          });
        } catch (e) {}
      });
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <script src="/shared/save-resume/save-resume-engine.js" defer></script>
    <!-- nsr-injected:end -->
    <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
    <script src="/assets/game-fx.js" defer></script>
    <!-- gfx-injected:end -->
  </body>
