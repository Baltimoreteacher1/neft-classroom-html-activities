    <!-- Decorative animated star-field (behind the Phaser canvas). -->

    <script>
      // Decorative star-field builder (reduced-motion safe; pointer-neutral).
      (function () {
        "use strict";
        var reduceMQ =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)");
        var layer = document.getElementById("ee-bg-layer");
        if (!layer) return;
        function rnd(a, b) {
          return a + Math.random() * (b - a);
        }
        function build() {
          layer.textContent = "";
          var reduce = !!(reduceMQ && reduceMQ.matches);
          var n = reduce ? 16 : 34;
          for (var i = 0; i < n; i++) {
            var s = document.createElement("div");
            s.className = "ee-star";
            var sz = rnd(1.5, 4);
            s.style.width = s.style.height = sz.toFixed(1) + "px";
            s.style.left = rnd(0, 100).toFixed(2) + "%";
            s.style.top = rnd(0, 100).toFixed(2) + "%";
            s.style.setProperty("--tw", rnd(2.2, 5).toFixed(2) + "s");
            s.style.animationDelay = "-" + rnd(0, 4).toFixed(2) + "s";
            layer.appendChild(s);
          }
        }
        build();
        var driver = false;
        function onMove(e) {
          var dx = e.clientX / (window.innerWidth || 1) - 0.5;
          var dy = e.clientY / (window.innerHeight || 1) - 0.5;
          layer.style.transform =
            "translate3d(" +
            (dx * 20).toFixed(2) +
            "px," +
            (dy * 12).toFixed(2) +
            "px,0)";
        }
        function attach() {
          if (driver || (reduceMQ && reduceMQ.matches)) return;
          driver = true;
          window.addEventListener("pointermove", onMove, { passive: true });
        }
        function detach() {
          if (!driver) return;
          driver = false;
          window.removeEventListener("pointermove", onMove);
          layer.style.transform = "";
        }
        attach();
        if (reduceMQ) {
          var onChange = function () {
            build();
            if (reduceMQ.matches) detach();
            else attach();
          };
          if (reduceMQ.addEventListener)
            reduceMQ.addEventListener("change", onChange);
          else if (reduceMQ.addListener) reduceMQ.addListener(onChange);
        }
        var rt;
        window.addEventListener("resize", function () {
          clearTimeout(rt);
          rt = setTimeout(build, 200);
        });
      })();
    </script>
    <script>
      // ── EXPRESSION EXPRESS — TRACK SWITCH ──
      // Phaser 3 — Grade 6 Math — Exponents, evaluating expressions, order of
      // operations (6.EE.1-4).
      // Mechanic: a train sits in one of three lanes. An expression shows at
      // the top. A row of "gates" (one per lane, each labeled with a value)
      // rushes DOWN the track toward the train. Switch lanes so the train
      // passes through the gate whose value equals the expression. Hitting the
      // wrong gate costs a life. Gates fall faster each level.

      const W = 820,
        H = 600;
      const LS_KEY = "ee_track_switch_highscore";
      const LANES = 3;

      const SFX = {
        ctx: null,
        init() {
          if (!this.ctx)
            try {
              this.ctx = new (window.AudioContext ||
                window.webkitAudioContext)();
            } catch (e) {}
        },
        play(t, f, d, v = 0.18) {
          if (!this.ctx) return;
          try {
            const c = this.ctx,
              o = c.createOscillator(),
              g = c.createGain();
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
            o.connect(g);
            g.connect(c.destination);
            o.start();
            o.stop(c.currentTime + d);
          } catch (e) {}
        },
        switchLane() {
          this.play("square", 520, 0.05, 0.08);
        },
        good() {
          this.play("sine", 660, 0.1, 0.25);
          this.play("sine", 880, 0.14, 0.2);
        },
        bad() {
          this.play("sawtooth", 200, 0.25, 0.18);
          this.play("sawtooth", 150, 0.3, 0.14);
        },
        level() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.15, 0.22), i * 70),
          );
        },
        win() {
          [523, 659, 784, 1047, 1318].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.25, 0.25), i * 110),
          );
        },
        lose() {
          [400, 330, 260, 200].forEach((f, i) =>
            setTimeout(() => this.play("sawtooth", f, 0.3, 0.14), i * 170),
          );
        },
      };

      function randInt(a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a;
      }
      function shuffle(a) {
        const r = [...a];
        for (let i = r.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [r[i], r[j]] = [r[j], r[i]];
        }
        return r;
      }
      function srSay(msg) {
        const el = document.getElementById("ee-sr");
        if (el) el.textContent = msg;
      }

      // ── Expression generator ───────────────────────────────────────────
      // Returns { prompt, answer(int), why, options:[ints length=3] }
      // Coverage by level:
      //   1-2: exponents (a^n) and a^2 ± b        → 6.EE.1
      //   3-4: evaluate with one operation        → 6.EE.2
      //   5+ : order of operations (PEMDAS)       → 6.EE.2c
      // All answers are positive integers computed directly in JS. Tests
      // recompute each value independently to confirm correctness.
      function pow(base, exp) {
        let r = 1;
        for (let i = 0; i < exp; i++) r *= base;
        return r;
      }
      function genExponent() {
        const base = randInt(2, 6);
        const exp = randInt(2, 3);
        const ans = pow(base, exp);
        return {
          prompt: base + (exp === 2 ? "²" : "³"),
          answer: ans,
          why: base + "^" + exp + " = " + ans + ".",
        };
      }
      function genOneOp() {
        // a² + b  or  a² − b  (b kept small so result stays positive)
        const a = randInt(2, 7);
        const sq = a * a;
        const op = Math.random() < 0.5 ? "+" : "-";
        const b = randInt(1, op === "-" ? Math.min(sq - 1, 12) : 12);
        const ans = op === "+" ? sq + b : sq - b;
        return {
          prompt: a + "² " + (op === "+" ? "+" : "−") + " " + b,
          answer: ans,
          why:
            a +
            "² = " +
            sq +
            ", then " +
            sq +
            " " +
            op +
            " " +
            b +
            " = " +
            ans +
            ".",
        };
      }
      function genOrderOps() {
        // Patterns that exercise PEMDAS with a guaranteed positive integer.
        const pat = randInt(0, 3);
        let prompt, answer, why;
        if (pat === 0) {
          // a + b × c
          const a = randInt(1, 9),
            b = randInt(2, 6),
            c = randInt(2, 6);
          answer = a + b * c;
          prompt = a + " + " + b + " × " + c;
          why =
            "Multiply first: " +
            b +
            "×" +
            c +
            " = " +
            b * c +
            ", then + " +
            a +
            " = " +
            answer +
            ".";
        } else if (pat === 1) {
          // a × b − c  (ensure positive)
          let a = randInt(2, 8),
            b = randInt(2, 6),
            c = randInt(1, 10);
          if (c >= a * b) c = a * b - 1;
          answer = a * b - c;
          prompt = a + " × " + b + " − " + c;
          why =
            "Multiply first: " +
            a +
            "×" +
            b +
            " = " +
            a * b +
            ", then − " +
            c +
            " = " +
            answer +
            ".";
        } else if (pat === 2) {
          // a² + b × c
          const a = randInt(2, 5),
            b = randInt(2, 5),
            c = randInt(2, 5);
          answer = a * a + b * c;
          prompt = a + "² + " + b + " × " + c;
          why =
            a +
            "² = " +
            a * a +
            ", " +
            b +
            "×" +
            c +
            " = " +
            b * c +
            ", sum = " +
            answer +
            ".";
        } else {
          // (a + b) × c
          const a = randInt(1, 8),
            b = randInt(1, 8),
            c = randInt(2, 5);
          answer = (a + b) * c;
          prompt = "(" + a + " + " + b + ") × " + c;
          why =
            "Parentheses first: " +
            a +
            "+" +
            b +
            " = " +
            (a + b) +
            ", × " +
            c +
            " = " +
            answer +
            ".";
        }
        return { prompt, answer, why };
      }
      function makeExpression(level) {
        let base;
        if (level <= 2) base = Math.random() < 0.7 ? genExponent() : genOneOp();
        else if (level <= 4)
          base = Math.random() < 0.5 ? genOneOp() : genExponent();
        else base = Math.random() < 0.7 ? genOrderOps() : genOneOp();

        const ans = base.answer;
        // Build exactly 3 distinct positive-integer gate values incl. answer.
        const seen = new Set([ans]);
        const opts = [ans];
        const pool = [
          ans + randInt(1, 6),
          ans - randInt(1, 6),
          ans + randInt(7, 14),
          ans * 2,
          Math.round(ans / 2),
        ];
        for (const v of shuffle(pool)) {
          if (opts.length >= 3) break;
          if (v > 0 && Number.isInteger(v) && !seen.has(v)) {
            seen.add(v);
            opts.push(v);
          }
        }
        let g = 1;
        while (opts.length < 3 && g < 50) {
          const v = ans + g;
          if (v > 0 && !seen.has(v)) {
            seen.add(v);
            opts.push(v);
          }
          g++;
        }
        return {
          prompt: base.prompt + " = ?",
          answer: ans,
          why: base.why,
          options: shuffle(opts.slice(0, 3)),
        };
      }

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#221636",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [BootScene, TitleScene, GameScene, ResultScene],
      };

      function BootScene() {
        return new Phaser.Scene("Boot");
      }
      BootScene.prototype = Object.create(Phaser.Scene.prototype);
      BootScene.prototype.constructor = BootScene;
      BootScene.prototype.create = function () {
        const g = this.make.graphics({ add: false });
        g.fillStyle(0xffffff);
        g.fillCircle(4, 4, 4);
        g.generateTexture("dot", 8, 8);
        g.clear();
        g.fillStyle(0xb06fd4);
        g.fillRect(0, 0, 10, 10);
        g.generateTexture("steam", 10, 10);
        g.destroy();
        this.scene.start("Title");
      };

      function TitleScene() {
        return new Phaser.Scene("Title");
      }
      TitleScene.prototype = Object.create(Phaser.Scene.prototype);
      TitleScene.prototype.constructor = TitleScene;
      TitleScene.prototype.create = function () {
        const cx = W / 2;
        this.add.rectangle(cx, H / 2, W, H, 0x221636);
        this.add
          .text(cx, 116, "EXPRESSION", {
            fontFamily: "Impact, sans-serif",
            fontSize: "58px",
            color: "#b06fd4",
            stroke: "#140c20",
            strokeThickness: 6,
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 168, "EXPRESS", {
            fontFamily: "Impact, sans-serif",
            fontSize: "58px",
            color: "#e0c8ff",
            stroke: "#140c20",
            strokeThickness: 6,
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 215, "Track Switch", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "24px",
            color: "#c8a0e0",
          })
          .setOrigin(0.5);
        this.add
          .text(
            cx,
            270,
            "Evaluate the expression, then SWITCH lanes so your train\npasses through the gate showing the correct value!",
            {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "16px",
              color: "#e0d0f0",
              align: "center",
            },
          )
          .setOrigin(0.5);
        this.add
          .text(
            cx,
            320,
            "← → or A/D to switch lanes · 6.EE.1–4 · Lessons 6.1–6.7",
            {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "14px",
              color: "#a080c0",
            },
          )
          .setOrigin(0.5);

        const hs = localStorage.getItem(LS_KEY);
        if (hs)
          this.add
            .text(cx, 352, "High Score: " + hs, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "16px",
              color: "#ffd24a",
              fontStyle: "bold",
            })
            .setOrigin(0.5);

        const btn = this.add
          .rectangle(cx, 420, 240, 58, 0x7a3fb0)
          .setInteractive({ useHandCursor: true });
        const btnT = this.add
          .text(cx, 420, "ALL ABOARD ▶", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "22px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);
        this.tweens.add({
          targets: [btn, btnT],
          scaleX: 1.05,
          scaleY: 1.05,
          duration: 800,
          yoyo: true,
          repeat: -1,
        });
        const start = () => {
          SFX.init();
          SFX.switchLane();
          this.scene.start("Game");
        };
        btn.on("pointerover", () => btn.setFillStyle(0x9050c8));
        btn.on("pointerout", () => btn.setFillStyle(0x7a3fb0));
        btn.on("pointerdown", start);
        this.input.keyboard.on("keydown-SPACE", start);
        this.input.keyboard.on("keydown-ENTER", start);

        const hub = this.add
          .text(cx, 540, "← Back to Math Games", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "15px",
            color: "#a080c0",
          })
          .setOrigin(0.5)
          .setInteractive({ useHandCursor: true });
        hub.on("pointerover", () => hub.setColor("#b06fd4"));
        hub.on("pointerout", () => hub.setColor("#a080c0"));
        hub.on("pointerdown", () => (window.location.href = "/math/games/"));
        srSay("Expression Express Track Switch. Press Start to play.");
      };

      function GameScene() {
        return new Phaser.Scene("Game");
      }
      GameScene.prototype = Object.create(Phaser.Scene.prototype);
      GameScene.prototype.constructor = GameScene;

      GameScene.prototype.init = function () {
        this.reduceMotion = !!(
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches
        );
        this.score = 0;
        this.lives = 3;
        this.streak = 0;
        this.level = 1;
        this.solved = 0;
        this.target = 10;
        this.lane = 1; // 0,1,2
        this.gates = null; // array of {circ,txt,value} or null
        this.gateY = 0;
        this.locked = false;
        this.problem = null;
        this.fallSpeed = 110;
      };

      GameScene.prototype.laneX = function (i) {
        const margin = 150;
        const span = (W - 2 * margin) / (LANES - 1);
        return margin + span * i;
      };

      GameScene.prototype.create = function () {
        this.add.rectangle(W / 2, H / 2, W, H, 0x221636);
        // Track lanes
        for (let i = 0; i < LANES; i++) {
          this.add.rectangle(this.laneX(i), H / 2 + 40, 70, H, 0x2e1f46, 0.7);
          const g = this.add.graphics();
          g.lineStyle(3, 0x42305f, 0.6);
          for (let y = 120; y < H; y += 40)
            g.lineBetween(this.laneX(i) - 30, y, this.laneX(i) + 30, y);
        }

        const hudStyle = {
          fontFamily: "Segoe UI, sans-serif",
          fontSize: "18px",
          fontStyle: "bold",
        };
        this.scoreText = this.add.text(16, 12, "Score: 0", {
          ...hudStyle,
          color: "#c8a0e0",
        });
        this.livesText = this.add.text(16, 36, "❤❤❤", {
          ...hudStyle,
          color: "#ff8f8f",
        });
        this.streakText = this.add
          .text(W - 16, 12, "Streak: 0", { ...hudStyle, color: "#ffd24a" })
          .setOrigin(1, 0);
        this.levelText = this.add
          .text(W - 16, 36, "Level 1", { ...hudStyle, color: "#e0d0f0" })
          .setOrigin(1, 0);
        this.progressText = this.add
          .text(W / 2, 12, "0 / " + this.target, {
            ...hudStyle,
            color: "#e0d0f0",
          })
          .setOrigin(0.5, 0);

        this.add
          .text(W / 2, 70, "Evaluate:", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "14px",
            color: "#a080c0",
          })
          .setOrigin(0.5);
        this.bannerText = this.add
          .text(W / 2, 100, "", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "40px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);

        this.feedback = this.add
          .text(W / 2, 145, "", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "17px",
            fontStyle: "bold",
            color: "#ffd24a",
            stroke: "#140c20",
            strokeThickness: 3,
            align: "center",
            wordWrap: { width: 620 },
          })
          .setOrigin(0.5)
          .setAlpha(0);

        // Train (player) near bottom
        this.trainY = H - 70;
        this.train = this.add.rectangle(
          this.laneX(this.lane),
          this.trainY,
          56,
          70,
          0x7a3fb0,
        );
        this.train.setStrokeStyle(3, 0xe0c8ff);
        this.trainEmoji = this.add
          .text(this.laneX(this.lane), this.trainY, "🚂", { fontSize: "34px" })
          .setOrigin(0.5);

        this.burst = this.add
          .particles(0, 0, "steam", {
            speed: { min: 70, max: 230 },
            angle: { min: 0, max: 360 },
            scale: { start: 1.2, end: 0 },
            lifespan: 650,
            emitting: false,
            quantity: 16,
            tint: [0xb06fd4, 0xe0c8ff, 0xffd24a, 0xffffff],
          })
          .setDepth(20);

        this.redFlash = this.add
          .rectangle(W / 2, H / 2, W, H, 0xff3333, 0)
          .setDepth(30);

        // Input
        this.cursors = this.input.keyboard.createCursorKeys();
        this.input.keyboard.on("keydown-LEFT", () => this.moveLane(-1));
        this.input.keyboard.on("keydown-RIGHT", () => this.moveLane(1));
        this.input.keyboard.on("keydown-A", () => this.moveLane(-1));
        this.input.keyboard.on("keydown-D", () => this.moveLane(1));
        // Pointer: tap a lane to jump to it.
        this.input.on("pointerdown", (p) => {
          let best = 0,
            bd = Infinity;
          for (let i = 0; i < LANES; i++) {
            const d = Math.abs(p.x - this.laneX(i));
            if (d < bd) {
              bd = d;
              best = i;
            }
          }
          this.setLane(best);
        });

        this.cameras.main.fadeIn(400);
        this.newProblem();
      };

      GameScene.prototype.moveLane = function (dir) {
        this.setLane(Phaser.Math.Clamp(this.lane + dir, 0, LANES - 1));
      };
      GameScene.prototype.setLane = function (i) {
        if (i === this.lane) return;
        this.lane = i;
        SFX.switchLane();
      };

      GameScene.prototype.newProblem = function () {
        this.locked = false;
        this.clearGates();
        this.problem = makeExpression(this.level);
        this.bannerText.setText(this.problem.prompt);
        srSay(
          "Evaluate " +
            this.problem.prompt +
            ". Switch lanes to the gate with the correct value.",
        );
        const vals = this.problem.options;
        this.gates = [];
        this.gateY = -50;
        for (let i = 0; i < LANES; i++) {
          const x = this.laneX(i);
          const circ = this.add.circle(x, this.gateY, 32, 0x2e1f46);
          circ.setStrokeStyle(3, 0xb06fd4);
          const txt = this.add
            .text(x, this.gateY, String(vals[i]), {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "22px",
              fontStyle: "bold",
              color: "#ffffff",
            })
            .setOrigin(0.5);
          this.gates.push({ circ, txt, value: vals[i] });
        }
      };

      GameScene.prototype.clearGates = function () {
        if (this.gates)
          this.gates.forEach((g) => {
            g.circ.destroy();
            g.txt.destroy();
          });
        this.gates = null;
      };

      GameScene.prototype.update = function (time, delta) {
        const dt = delta / 1000;
        // Smoothly slide train to its lane.
        const tx = this.laneX(this.lane);
        this.train.x += (tx - this.train.x) * Math.min(1, dt * 14);
        this.trainEmoji.x = this.train.x;

        if (this.locked || !this.gates) return;

        const fall = this.fallSpeed + (this.level - 1) * 22;
        this.gateY += fall * dt;
        for (const g of this.gates) {
          g.circ.y = this.gateY;
          g.txt.y = this.gateY;
        }
        if (this.gateY >= this.trainY - 6) {
          this.resolve();
        }
      };

      GameScene.prototype.resolve = function () {
        this.locked = true;
        const chosen = this.gates[this.lane];
        const correct = chosen.value === this.problem.answer;
        if (correct) {
          SFX.good();
          this.solved++;
          this.streak++;
          const bonus = Math.min(this.streak, 5) * 5;
          this.score += 20 + bonus;
          this.burst.setPosition(chosen.circ.x, chosen.circ.y);
          this.burst.explode(16);
          this.flash(this.train.x, this.trainY - 60, "+1 ✓", "#b06fd4");
          this.feedback.setText("Correct! " + this.problem.why).setAlpha(1);
          srSay("Correct. " + this.problem.why);
        } else {
          SFX.bad();
          this.streak = 0;
          this.lives--;
          this.flashRed();
          this.flash(this.train.x, this.trainY - 60, "✗", "#ff8f8f");
          this.feedback
            .setText(
              "Crash! Correct value = " +
                this.problem.answer +
                ".  " +
                this.problem.why,
            )
            .setAlpha(1);
          srSay(
            "Wrong gate. The correct value was " +
              this.problem.answer +
              ". " +
              this.problem.why,
          );
        }
        this.afterAttempt();
      };

      GameScene.prototype.afterAttempt = function () {
        const newLevel = Math.min(8, 1 + Math.floor(this.solved / 3));
        if (newLevel > this.level) {
          this.level = newLevel;
          SFX.level();
          this.flash(W / 2, 220, "LEVEL " + this.level + "!", "#ffd24a");
        }
        this.updateHUD();
        if (this.lives <= 0) {
          this.endGame(false);
          return;
        }
        if (this.solved >= this.target) {
          this.endGame(true);
          return;
        }
        this.time.delayedCall(1000, () => {
          this.feedback.setAlpha(0);
          this.newProblem();
        });
      };

      GameScene.prototype.flash = function (x, y, text, color) {
        const ft = this.add
          .text(x, y, text, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "26px",
            fontStyle: "bold",
            color: color,
            stroke: "#140c20",
            strokeThickness: 4,
          })
          .setOrigin(0.5)
          .setDepth(40);
        this.tweens.add({
          targets: ft,
          y: y - 50,
          alpha: { from: 1, to: 0 },
          duration: this.reduceMotion ? 500 : 900,
          onComplete: () => ft.destroy(),
        });
      };

      GameScene.prototype.flashRed = function () {
        if (this.reduceMotion) return;
        this.redFlash.setAlpha(0.35);
        this.tweens.add({ targets: this.redFlash, alpha: 0, duration: 350 });
      };

      GameScene.prototype.updateHUD = function () {
        this.scoreText.setText("Score: " + this.score);
        this.livesText.setText(this.lives > 0 ? "❤".repeat(this.lives) : "—");
        this.streakText.setText("Streak: " + this.streak);
        this.levelText.setText("Level " + this.level);
        this.progressText.setText(this.solved + " / " + this.target);
      };

      GameScene.prototype.endGame = function (won) {
        this.locked = true;
        this.clearGates();
        this.time.delayedCall(500, () => {
          this.scene.start("Result", {
            score: this.score,
            solved: this.solved,
            target: this.target,
            won: won,
          });
        });
      };

      function ResultScene() {
        return new Phaser.Scene("Result");
      }
      ResultScene.prototype = Object.create(Phaser.Scene.prototype);
      ResultScene.prototype.constructor = ResultScene;
      ResultScene.prototype.init = function (data) {
        this.data2 = data;
      };
      ResultScene.prototype.create = function () {
        const d = this.data2;
        const cx = W / 2;
        this.add.rectangle(cx, H / 2, W, H, 0x221636);
        const stars =
          d.solved >= d.target ? 3 : d.solved >= d.target * 0.6 ? 2 : 1;
        let hs = parseInt(localStorage.getItem(LS_KEY) || "0", 10);
        if (d.score > hs) {
          hs = d.score;
          try {
            localStorage.setItem(LS_KEY, String(hs));
          } catch (e) {}
        }

        this.add
          .text(cx, 110, d.won ? "FULL STEAM AHEAD!" : "OUT OF LIVES", {
            fontFamily: "Impact, sans-serif",
            fontSize: "44px",
            color: d.won ? "#b06fd4" : "#ff8f8f",
            stroke: "#140c20",
            strokeThickness: 5,
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 185, "★".repeat(stars) + "☆".repeat(3 - stars), {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "48px",
            color: "#ffd24a",
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 255, "Score: " + d.score, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "30px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);
        this.add
          .text(
            cx,
            295,
            "Solved " + d.solved + " of " + d.target + " expressions",
            {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "18px",
              color: "#e0d0f0",
            },
          )
          .setOrigin(0.5);
        this.add
          .text(cx, 325, "High Score: " + hs, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "16px",
            color: "#ffd24a",
          })
          .setOrigin(0.5);

        if (d.won) SFX.win();
        else SFX.lose();

        try {
          window.EduPulse &&
            EduPulse.record({
              activityTitle: document.title,
              score: d.score,
              stars: stars,
              standard: "6.EE.2",
              problemsAttempted: d.solved,
            });
        } catch (e) {}
        srSay(
          (d.won ? "You won! " : "Game over. ") +
            "Final score " +
            d.score +
            ", " +
            stars +
            " stars.",
        );

        const btn = this.add
          .rectangle(cx, 400, 220, 54, 0x7a3fb0)
          .setInteractive({ useHandCursor: true });
        const btnT = this.add
          .text(cx, 400, "PLAY AGAIN 🔁", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "20px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);
        const again = () => this.scene.start("Game");
        btn.on("pointerover", () => btn.setFillStyle(0x9050c8));
        btn.on("pointerout", () => btn.setFillStyle(0x7a3fb0));
        btn.on("pointerdown", again);
        this.input.keyboard.on("keydown-SPACE", again);
        this.input.keyboard.on("keydown-ENTER", again);

        const hub = this.add
          .text(cx, 480, "← Back to Math Games", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "15px",
            color: "#a080c0",
          })
          .setOrigin(0.5)
          .setInteractive({ useHandCursor: true });
        hub.on("pointerover", () => hub.setColor("#b06fd4"));
        hub.on("pointerout", () => hub.setColor("#a080c0"));
        hub.on("pointerdown", () => (window.location.href = "/math/games/"));
      };

      const eeGame = new Phaser.Game(config);

      eeGame.events.once("ready", function () {
        try {
          const cv = eeGame.canvas;
          if (!cv) return;
          cv.setAttribute("role", "application");
          cv.setAttribute(
            "aria-label",
            "Expression Express Track Switch math game. Evaluate the " +
              "expression at the top, then use the left and right arrow keys " +
              "to switch the train into the gate with the correct value.",
          );
          cv.setAttribute("aria-roledescription", "math game");
          if (!cv.hasAttribute("tabindex")) cv.setAttribute("tabindex", "0");
          cv.addEventListener("pointerdown", function () {
            try {
              cv.focus({ preventScroll: true });
            } catch (e) {
              cv.focus();
            }
          });
        } catch (e) {}
      });
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <script src="/shared/save-resume/save-resume-engine.js" defer></script>
    <!-- nsr-injected:end -->
    <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
    <script src="/assets/game-fx.js" defer></script>
    <!-- gfx-injected:end -->
  </body>
