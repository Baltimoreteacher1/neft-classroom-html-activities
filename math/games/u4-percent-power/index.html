    <meta
      name="description"
      content="A 2D catch-and-sort game for Grade 6 lessons 4.1-4.5 (6.RP.3c): catch the correct percent of a number, sale price, and percent-decimal equivalent as values rain down."
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0f1d10;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      canvas {
        display: block;
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }
      canvas:focus-visible {
        outline: 3px solid #d4952a;
        outline-offset: 4px;
        border-radius: 8px;
      }
      canvas:focus:not(:focus-visible) {
        outline: none;
      }
      #pp-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        background: radial-gradient(
          130% 90% at 50% 0%,
          #1e3a22 0%,
          #122413 55%,
          #0a160b 100%
        );
      }
      #pp-bg-layer {
        position: absolute;
        inset: -6% -6%;
        will-change: transform;
        transition: transform 0.5s cubic-bezier(0.22, 0.61, 0.36, 1);
      }
      .pp-spark {
        position: absolute;
        border-radius: 50%;
        background: #ffe07a;
        opacity: 0.5;
        animation: ppTwinkle var(--tw, 3s) ease-in-out infinite;
      }
      @keyframes ppTwinkle {
        0%,
        100% {
          opacity: 0.15;
          transform: scale(0.8);
        }
        50% {
          opacity: 0.75;
          transform: scale(1.2);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #pp-bg-layer {
          transition: none !important;
          transform: none !important;
        }
        .pp-spark {
          animation: none !important;
          opacity: 0.4 !important;
        }
      }
      #pp-sr {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

  <body>
    <!-- Decorative animated spark-field (behind the Phaser canvas). -->
    <div id="pp-bg" data-parallax aria-hidden="true">
      <div id="pp-bg-layer" data-parallax-layer></div>
    </div>
    <!-- Screen-reader live region: mirrors the current problem + result. -->
    <div id="pp-sr" role="status" aria-live="polite"></div>
    <script>
      // Decorative spark-field builder (reduced-motion safe; pointer-neutral).
      (function () {
        "use strict";
        var reduceMQ =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)");
        var layer = document.getElementById("pp-bg-layer");
        if (!layer) return;
        function rnd(a, b) {
          return a + Math.random() * (b - a);
        }
        function build() {
          layer.textContent = "";
          var reduce = !!(reduceMQ && reduceMQ.matches);
          var n = reduce ? 16 : 34;
          for (var i = 0; i < n; i++) {
            var s = document.createElement("div");
            s.className = "pp-spark";
            var sz = rnd(2, 5);
            s.style.width = s.style.height = sz.toFixed(1) + "px";
            s.style.left = rnd(0, 100).toFixed(2) + "%";
            s.style.top = rnd(0, 100).toFixed(2) + "%";
            s.style.setProperty("--tw", rnd(2.2, 5).toFixed(2) + "s");
            s.style.animationDelay = "-" + rnd(0, 4).toFixed(2) + "s";
            layer.appendChild(s);
          }
        }
        build();
        var driver = false;
        function onMove(e) {
          var dx = e.clientX / (window.innerWidth || 1) - 0.5;
          var dy = e.clientY / (window.innerHeight || 1) - 0.5;
          layer.style.transform =
            "translate3d(" +
            (dx * 20).toFixed(2) +
            "px," +
            (dy * 12).toFixed(2) +
            "px,0)";
        }
        function attach() {
          if (driver || (reduceMQ && reduceMQ.matches)) return;
          driver = true;
          window.addEventListener("pointermove", onMove, { passive: true });
        }
        function detach() {
          if (!driver) return;
          driver = false;
          window.removeEventListener("pointermove", onMove);
          layer.style.transform = "";
        }
        attach();
        if (reduceMQ) {
          var onChange = function () {
            build();
            if (reduceMQ.matches) detach();
            else attach();
          };
          if (reduceMQ.addEventListener)
            reduceMQ.addEventListener("change", onChange);
          else if (reduceMQ.addListener) reduceMQ.addListener(onChange);
        }
        var rt;
        window.addEventListener("resize", function () {
          clearTimeout(rt);
          rt = setTimeout(build, 200);
        });
      })();
    </script>
    <script>
      // ── PERCENT POWER — COIN CATCHER ──
      // Phaser 3 — Grade 6 Math — Percent of a number, sale price, %↔decimal
      // Mechanic: a cart you steer left/right at the bottom of the screen.
      // Coins rain down, each stamped with a candidate value. Catch the coin
      // that correctly answers the current percent problem; let the wrong ones
      // fall past (or catch a wrong one and lose a life). Difficulty rises by
      // level: faster coins, tighter cart, harder problem types.

      const W = 820,
        H = 600;
      const LS_KEY = "pp_coin_catcher_highscore";

      // ── Audio (tiny WebAudio blips; gracefully no-op without a context) ──
      const SFX = {
        ctx: null,
        init() {
          if (!this.ctx)
            try {
              this.ctx = new (window.AudioContext ||
                window.webkitAudioContext)();
            } catch (e) {}
        },
        play(t, f, d, v = 0.18) {
          if (!this.ctx) return;
          try {
            const c = this.ctx,
              o = c.createOscillator(),
              g = c.createGain();
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
            o.connect(g);
            g.connect(c.destination);
            o.start();
            o.stop(c.currentTime + d);
          } catch (e) {}
        },
        good() {
          this.play("sine", 660, 0.1, 0.25);
          this.play("sine", 880, 0.14, 0.2);
        },
        bad() {
          this.play("sawtooth", 200, 0.25, 0.18);
          this.play("sawtooth", 150, 0.3, 0.14);
        },
        miss() {
          this.play("triangle", 240, 0.16, 0.12);
        },
        coin() {
          this.play("square", 1040, 0.05, 0.08);
        },
        level() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.15, 0.22), i * 70),
          );
        },
        win() {
          [523, 659, 784, 1047, 1318].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.25, 0.25), i * 110),
          );
        },
        lose() {
          [400, 330, 260, 200].forEach((f, i) =>
            setTimeout(() => this.play("sawtooth", f, 0.3, 0.14), i * 170),
          );
        },
      };

      function randInt(a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a;
      }
      function shuffle(a) {
        const r = [...a];
        for (let i = r.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [r[i], r[j]] = [r[j], r[i]];
        }
        return r;
      }
      function srSay(msg) {
        const el = document.getElementById("pp-sr");
        if (el) el.textContent = msg;
      }

      // ── Problem generator ───────────────────────────────────────────────
      // Returns { prompt, answer (string, canonical), why, label, options:[strings] }
      // Three skill modes scale with level:
      //   level 1-2: percent of a number    (6.RP.3c)
      //   level 3-4: sale price after discount
      //   level 5+ : percent ↔ decimal      (mixed back in lower modes too)
      // All numeric answers are whole; equivalence answers compared as strings.
      const FRIENDLY = [10, 20, 25, 50, 75];
      function pctOfNumber() {
        // Choose pct + base so the part is a whole number.
        let pct, base, ans;
        do {
          pct = FRIENDLY[randInt(0, FRIENDLY.length - 1)];
          base = randInt(2, 20) * 10; // multiples of 10 up to 200
          ans = (pct / 100) * base;
        } while (!Number.isInteger(ans));
        const correct = String(ans);
        const distract = new Set([correct]);
        const pool = [
          ans + 5,
          ans - 5,
          ans * 2,
          Math.round(ans / 2),
          ans + 10,
          ans + base - ans, // = base
        ];
        const opts = [correct];
        for (const v of shuffle(pool)) {
          if (opts.length >= 4) break;
          if (v > 0 && Number.isInteger(v) && !distract.has(String(v))) {
            distract.add(String(v));
            opts.push(String(v));
          }
        }
        let g = 1;
        while (opts.length < 4 && g < 40) {
          const v = ans + g * 3;
          if (v > 0 && !distract.has(String(v))) {
            distract.add(String(v));
            opts.push(String(v));
          }
          g++;
        }
        return {
          prompt: pct + "% of " + base,
          answer: correct,
          label: "Find the part",
          why: pct + "% of " + base + " = " + ans + ".",
          options: shuffle(opts.slice(0, 4)),
        };
      }
      function salePrice() {
        let price, disc, sale;
        do {
          disc = FRIENDLY[randInt(0, FRIENDLY.length - 1)];
          price = randInt(2, 20) * 10;
          sale = price - (disc / 100) * price;
        } while (!Number.isInteger(sale) || sale <= 0);
        const correct = String(sale);
        const savings = price - sale;
        const distract = new Set([correct]);
        const pool = [price, savings, sale + 10, sale - 10, sale + 5];
        const opts = [correct];
        for (const v of shuffle(pool)) {
          if (opts.length >= 4) break;
          if (v > 0 && Number.isInteger(v) && !distract.has(String(v))) {
            distract.add(String(v));
            opts.push(String(v));
          }
        }
        let g = 1;
        while (opts.length < 4 && g < 40) {
          const v = sale + g * 4;
          if (v > 0 && !distract.has(String(v))) {
            distract.add(String(v));
            opts.push(String(v));
          }
          g++;
        }
        return {
          prompt: "$" + price + ", " + disc + "% off",
          answer: correct,
          label: "Sale price ($)",
          why:
            disc +
            "% of $" +
            price +
            " = $" +
            savings +
            "; sale = $" +
            sale +
            ".",
          options: shuffle(opts.slice(0, 4)),
        };
      }
      function pctDecimal() {
        // Compare as strings to avoid float pitfalls.
        const bank = [
          { p: "10%", d: "0.1" },
          { p: "20%", d: "0.2" },
          { p: "25%", d: "0.25" },
          { p: "50%", d: "0.5" },
          { p: "75%", d: "0.75" },
          { p: "5%", d: "0.05" },
          { p: "1%", d: "0.01" },
          { p: "30%", d: "0.3" },
          { p: "40%", d: "0.4" },
          { p: "60%", d: "0.6" },
        ];
        const item = bank[randInt(0, bank.length - 1)];
        const toDecimal = Math.random() < 0.5;
        let prompt, answer, wrongs;
        if (toDecimal) {
          prompt = item.p + " as a decimal";
          answer = item.d;
          // Plausible wrong decimal forms (string-built, never NaN).
          wrongs = shuffle(
            bank.filter((b) => b.d !== item.d).map((b) => b.d),
          ).slice(0, 3);
        } else {
          prompt = item.d + " as a percent";
          answer = item.p;
          wrongs = shuffle(
            bank.filter((b) => b.p !== item.p).map((b) => b.p),
          ).slice(0, 3);
        }
        return {
          prompt: prompt,
          answer: answer,
          label: "Equivalent value",
          why: item.p + " = " + item.d + ".",
          options: shuffle([answer, ...wrongs]),
        };
      }
      function makeProblem(level) {
        // Weighted by level so coverage rises in difficulty.
        let roll;
        if (level <= 2) roll = Math.random() < 0.75 ? 0 : 2;
        else if (level <= 4) roll = Math.random() < 0.6 ? 1 : Math.random() < 0.5 ? 0 : 2;
        else roll = randInt(0, 2);
        if (roll === 0) return pctOfNumber();
        if (roll === 1) return salePrice();
        return pctDecimal();
      }

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#122413",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [BootScene, TitleScene, GameScene, ResultScene],
      };

      // ── BOOT ──
      function BootScene() {
        return new Phaser.Scene("Boot");
      }
      BootScene.prototype = Object.create(Phaser.Scene.prototype);
      BootScene.prototype.constructor = BootScene;
      BootScene.prototype.create = function () {
        const g = this.make.graphics({ add: false });
        g.fillStyle(0xffffff);
        g.fillCircle(4, 4, 4);
        g.generateTexture("dot", 8, 8);
        g.clear();
        g.fillStyle(0xffe07a);
        g.fillCircle(5, 5, 5);
        g.generateTexture("spark", 10, 10);
        g.destroy();
        this.scene.start("Title");
      };

      // ── TITLE ──
      function TitleScene() {
        return new Phaser.Scene("Title");
      }
      TitleScene.prototype = Object.create(Phaser.Scene.prototype);
      TitleScene.prototype.constructor = TitleScene;
      TitleScene.prototype.create = function () {
        const cx = W / 2;
        this.add.rectangle(cx, H / 2, W, H, 0x122413);
        this.add
          .text(cx, 120, "PERCENT POWER", {
            fontFamily: "Impact, sans-serif",
            fontSize: "64px",
            color: "#ffd24a",
            stroke: "#0a160b",
            strokeThickness: 6,
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 175, "Coin Catcher", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "26px",
            color: "#8fd6a0",
          })
          .setOrigin(0.5);
        this.add
          .text(
            cx,
            230,
            "A problem appears at the top. Steer your cart to CATCH the\ncoin showing the correct answer — let wrong coins fall!",
            {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "16px",
              color: "#bfe0c8",
              align: "center",
            },
          )
          .setOrigin(0.5);
        this.add
          .text(cx, 295, "← → or A/D to move · 6.RP.3c · Lessons 4.1–4.5", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "14px",
            color: "#7fae8c",
          })
          .setOrigin(0.5);

        const hs = localStorage.getItem(LS_KEY);
        if (hs)
          this.add
            .text(cx, 330, "High Score: " + hs, {
              fontFamily: "Segoe UI, sans-serif",
              fontSize: "16px",
              color: "#ffd24a",
              fontStyle: "bold",
            })
            .setOrigin(0.5);

        const btn = this.add
          .rectangle(cx, 400, 240, 58, 0x2d874b)
          .setInteractive({ useHandCursor: true });
        const btnT = this.add
          .text(cx, 400, "START ▶", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "24px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);
        this.tweens.add({
          targets: [btn, btnT],
          scaleX: 1.05,
          scaleY: 1.05,
          duration: 800,
          yoyo: true,
          repeat: -1,
        });
        const start = () => {
          SFX.init();
          SFX.coin();
          this.scene.start("Game");
        };
        btn.on("pointerover", () => btn.setFillStyle(0x36a35b));
        btn.on("pointerout", () => btn.setFillStyle(0x2d874b));
        btn.on("pointerdown", start);
        this.input.keyboard.on("keydown-SPACE", start);
        this.input.keyboard.on("keydown-ENTER", start);

        const hub = this.add
          .text(cx, 540, "← Back to Math Games", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "15px",
            color: "#7fae8c",
          })
          .setOrigin(0.5)
          .setInteractive({ useHandCursor: true });
        hub.on("pointerover", () => hub.setColor("#ffd24a"));
        hub.on("pointerout", () => hub.setColor("#7fae8c"));
        hub.on("pointerdown", () => (window.location.href = "/math/games/"));
        srSay("Percent Power Coin Catcher. Press Start to play.");
      };

      // ── GAME ──
      function GameScene() {
        return new Phaser.Scene("Game");
      }
      GameScene.prototype = Object.create(Phaser.Scene.prototype);
      GameScene.prototype.constructor = GameScene;

      GameScene.prototype.init = function () {
        this.reduceMotion = !!(
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches
        );
        this.score = 0;
        this.lives = 3;
        this.streak = 0;
        this.level = 1;
        this.solved = 0; // problems answered correctly
        this.target = 10; // win condition: solve this many problems
        this.coins = [];
        this.problem = null;
        this.locked = false;
        this.fallSpeed = 90; // px/s baseline
      };

      GameScene.prototype.create = function () {
        this.add.rectangle(W / 2, H / 2, W, H, 0x122413);
        // Floor / catch line.
        this.add.rectangle(W / 2, H - 18, W, 4, 0x2d874b, 0.6);

        // HUD
        const hudStyle = {
          fontFamily: "Segoe UI, sans-serif",
          fontSize: "18px",
          fontStyle: "bold",
        };
        this.scoreText = this.add.text(16, 12, "Score: 0", {
          ...hudStyle,
          color: "#8fd6a0",
        });
        this.livesText = this.add.text(16, 36, "❤❤❤", {
          ...hudStyle,
          color: "#ff8f8f",
        });
        this.streakText = this.add
          .text(W - 16, 12, "Streak: 0", { ...hudStyle, color: "#ffd24a" })
          .setOrigin(1, 0);
        this.levelText = this.add
          .text(W - 16, 36, "Level 1", { ...hudStyle, color: "#bfe0c8" })
          .setOrigin(1, 0);
        this.progressText = this.add
          .text(W / 2, 12, "0 / " + this.target, {
            ...hudStyle,
            color: "#bfe0c8",
          })
          .setOrigin(0.5, 0);

        // Problem banner
        this.bannerLabel = this.add
          .text(W / 2, 78, "", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "14px",
            color: "#7fae8c",
          })
          .setOrigin(0.5);
        this.bannerText = this.add
          .text(W / 2, 108, "", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "36px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);

        this.feedback = this.add
          .text(W / 2, 150, "", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "18px",
            fontStyle: "bold",
            color: "#ffd24a",
            stroke: "#0a160b",
            strokeThickness: 3,
          })
          .setOrigin(0.5)
          .setAlpha(0);

        // Cart (player)
        this.cartW = 120;
        this.cart = this.add.rectangle(W / 2, H - 40, this.cartW, 26, 0xd4952a);
        this.cart.setStrokeStyle(3, 0xffe07a);
        this.cartGlow = this.add
          .text(this.cart.x, this.cart.y, "🛒", { fontSize: "26px" })
          .setOrigin(0.5);

        // Particles
        this.burst = this.add
          .particles(0, 0, "spark", {
            speed: { min: 80, max: 240 },
            angle: { min: 0, max: 360 },
            scale: { start: 1.2, end: 0 },
            lifespan: 600,
            emitting: false,
            quantity: 16,
            tint: [0xffd24a, 0x8fd6a0, 0xffffff],
          })
          .setDepth(20);

        this.redFlash = this.add
          .rectangle(W / 2, H / 2, W, H, 0xff3333, 0)
          .setDepth(30);

        // Input
        this.cursors = this.input.keyboard.createCursorKeys();
        this.keyA = this.input.keyboard.addKey(
          Phaser.Input.Keyboard.KeyCodes.A,
        );
        this.keyD = this.input.keyboard.addKey(
          Phaser.Input.Keyboard.KeyCodes.D,
        );
        // Pointer steering (drag / move): cart follows pointer X.
        this.pointerX = null;
        this.input.on("pointermove", (p) => {
          this.pointerX = p.x;
        });
        this.input.on("pointerdown", (p) => {
          this.pointerX = p.x;
        });

        this.cameras.main.fadeIn(400);
        this.newProblem();
      };

      GameScene.prototype.newProblem = function () {
        this.locked = false;
        this.clearCoins();
        this.problem = makeProblem(this.level);
        this.bannerLabel.setText(this.problem.label);
        this.bannerText.setText(this.problem.prompt + " = ?");
        srSay(
          this.problem.label +
            ": " +
            this.problem.prompt +
            ". Catch the correct coin.",
        );
        // Spawn one coin per option, spaced across the width, staggered in Y.
        const lanes = shuffle([0, 1, 2, 3]);
        const margin = 90;
        const span = (W - 2 * margin) / 3;
        this.problem.options.forEach((opt, i) => {
          const lane = lanes[i];
          const x = margin + span * lane + randInt(-20, 20);
          const y = -40 - i * 130; // staggered entry
          this.spawnCoin(x, y, opt);
        });
      };

      GameScene.prototype.spawnCoin = function (x, y, value) {
        const c = this.add.circle(x, y, 30, 0xffd24a);
        c.setStrokeStyle(3, 0xb87b1d);
        const t = this.add
          .text(x, y, value, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "18px",
            fontStyle: "bold",
            color: "#5a3a08",
          })
          .setOrigin(0.5);
        this.coins.push({ c, t, value, caught: false });
      };

      GameScene.prototype.clearCoins = function () {
        this.coins.forEach((co) => {
          co.c.destroy();
          co.t.destroy();
        });
        this.coins = [];
      };

      GameScene.prototype.update = function (time, delta) {
        const dt = delta / 1000;
        // Cart movement.
        const speed = 420;
        let vx = 0;
        if (this.cursors.left.isDown || this.keyA.isDown) vx = -speed;
        else if (this.cursors.right.isDown || this.keyD.isDown) vx = speed;
        if (vx !== 0) {
          this.cart.x += vx * dt;
          this.pointerX = null; // keyboard overrides pointer follow
        } else if (this.pointerX !== null) {
          this.cart.x += (this.pointerX - this.cart.x) * Math.min(1, dt * 12);
        }
        const half = this.cartW / 2;
        this.cart.x = Phaser.Math.Clamp(this.cart.x, half, W - half);
        this.cartGlow.x = this.cart.x;

        if (this.locked) return;

        // Coin falling + collision.
        const fall = this.fallSpeed + (this.level - 1) * 16;
        for (const co of this.coins) {
          if (co.caught) continue;
          co.c.y += fall * dt;
          co.t.y = co.c.y;
          // Catch: coin overlaps cart top band.
          if (
            co.c.y >= this.cart.y - 26 &&
            co.c.y <= this.cart.y + 26 &&
            Math.abs(co.c.x - this.cart.x) <= half + 26
          ) {
            this.catchCoin(co);
            return;
          }
          // Fell past the floor.
          if (co.c.y > H + 40) {
            co.caught = true;
            co.c.setVisible(false);
            co.t.setVisible(false);
            if (co.value === this.problem.answer) {
              // Missed the correct coin → counts as a miss.
              this.handleMiss();
              return;
            }
          }
        }
        // If all coins gone and correct never caught, advance with a miss-safety.
        if (this.coins.every((co) => co.caught)) {
          // already handled by miss/catch; nothing pending
        }
      };

      GameScene.prototype.catchCoin = function (co) {
        this.locked = true;
        co.caught = true;
        SFX.coin();
        const correct = co.value === this.problem.answer;
        if (correct) {
          SFX.good();
          this.solved++;
          this.streak++;
          const bonus = Math.min(this.streak, 5) * 5;
          this.score += 20 + bonus;
          this.burst.setPosition(co.c.x, co.c.y);
          this.burst.explode(16);
          this.flash(co.c.x, co.c.y, "+1 ✓", "#8fd6a0");
          this.feedback.setText("Correct! " + this.problem.why).setAlpha(1);
          srSay("Correct. " + this.problem.why);
        } else {
          SFX.bad();
          this.streak = 0;
          this.lives--;
          this.flashRed();
          this.flash(co.c.x, co.c.y, "✗", "#ff8f8f");
          this.feedback
            .setText("Not quite — answer was " + this.problem.answer)
            .setAlpha(1);
          srSay(
            "Wrong coin. The correct answer was " +
              this.problem.answer +
              ". " +
              this.problem.why,
          );
        }
        co.c.destroy();
        co.t.destroy();
        this.afterAttempt(correct);
      };

      GameScene.prototype.handleMiss = function () {
        this.locked = true;
        SFX.miss();
        this.streak = 0;
        this.lives--;
        this.flashRed();
        this.feedback
          .setText("Missed it! Answer was " + this.problem.answer)
          .setAlpha(1);
        srSay(
          "You missed the correct coin. The answer was " +
            this.problem.answer +
            ".",
        );
        this.afterAttempt(false);
      };

      GameScene.prototype.afterAttempt = function (correct) {
        // Level up every 3 correct.
        const newLevel = Math.min(8, 1 + Math.floor(this.solved / 3));
        if (newLevel > this.level) {
          this.level = newLevel;
          SFX.level();
          this.flash(W / 2, 200, "LEVEL " + this.level + "!", "#ffd24a");
        }
        this.updateHUD();
        if (this.lives <= 0) {
          this.endGame(false);
          return;
        }
        if (this.solved >= this.target) {
          this.endGame(true);
          return;
        }
        this.time.delayedCall(900, () => {
          this.feedback.setAlpha(0);
          this.newProblem();
        });
      };

      GameScene.prototype.flash = function (x, y, text, color) {
        const ft = this.add
          .text(x, y, text, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "26px",
            fontStyle: "bold",
            color: color,
            stroke: "#0a160b",
            strokeThickness: 4,
          })
          .setOrigin(0.5)
          .setDepth(40);
        this.tweens.add({
          targets: ft,
          y: y - 50,
          alpha: { from: 1, to: 0 },
          duration: this.reduceMotion ? 500 : 900,
          onComplete: () => ft.destroy(),
        });
      };

      GameScene.prototype.flashRed = function () {
        if (this.reduceMotion) return;
        this.redFlash.setAlpha(0.35);
        this.tweens.add({
          targets: this.redFlash,
          alpha: 0,
          duration: 350,
        });
      };

      GameScene.prototype.updateHUD = function () {
        this.scoreText.setText("Score: " + this.score);
        this.livesText.setText(
          this.lives > 0 ? "❤".repeat(this.lives) : "—",
        );
        this.streakText.setText("Streak: " + this.streak);
        this.levelText.setText("Level " + this.level);
        this.progressText.setText(this.solved + " / " + this.target);
      };

      GameScene.prototype.endGame = function (won) {
        this.locked = true;
        this.clearCoins();
        this.time.delayedCall(500, () => {
          this.scene.start("Result", {
            score: this.score,
            solved: this.solved,
            target: this.target,
            won: won,
          });
        });
      };

      // ── RESULT ──
      function ResultScene() {
        return new Phaser.Scene("Result");
      }
      ResultScene.prototype = Object.create(Phaser.Scene.prototype);
      ResultScene.prototype.constructor = ResultScene;
      ResultScene.prototype.init = function (data) {
        this.data2 = data;
      };
      ResultScene.prototype.create = function () {
        const d = this.data2;
        const cx = W / 2;
        this.add.rectangle(cx, H / 2, W, H, 0x122413);
        // Stars from accuracy/score.
        const stars =
          d.solved >= d.target ? 3 : d.solved >= d.target * 0.6 ? 2 : 1;
        // High score
        let hs = parseInt(localStorage.getItem(LS_KEY) || "0", 10);
        if (d.score > hs) {
          hs = d.score;
          try {
            localStorage.setItem(LS_KEY, String(hs));
          } catch (e) {}
        }

        this.add
          .text(cx, 110, d.won ? "CITY OF SAVINGS!" : "OUT OF LIVES", {
            fontFamily: "Impact, sans-serif",
            fontSize: "48px",
            color: d.won ? "#8fd6a0" : "#ff8f8f",
            stroke: "#0a160b",
            strokeThickness: 5,
          })
          .setOrigin(0.5);

        const starStr =
          "★".repeat(stars) + "☆".repeat(3 - stars);
        this.add
          .text(cx, 185, starStr, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "48px",
            color: "#ffd24a",
          })
          .setOrigin(0.5);

        this.add
          .text(cx, 255, "Score: " + d.score, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "30px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 295, "Solved " + d.solved + " of " + d.target + " problems", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "18px",
            color: "#bfe0c8",
          })
          .setOrigin(0.5);
        this.add
          .text(cx, 325, "High Score: " + hs, {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "16px",
            color: "#ffd24a",
          })
          .setOrigin(0.5);

        if (d.won) SFX.win();
        else SFX.lose();

        // EduPulse reporting (guarded; safe no-op without bridge).
        try {
          window.EduPulse &&
            EduPulse.record({
              activityTitle: document.title,
              score: d.score,
              stars: stars,
              standard: "6.RP.3c",
              problemsAttempted: d.solved,
            });
        } catch (e) {}
        srSay(
          (d.won ? "You won! " : "Game over. ") +
            "Final score " +
            d.score +
            ", " +
            stars +
            " stars.",
        );

        const btn = this.add
          .rectangle(cx, 400, 220, 54, 0x2d874b)
          .setInteractive({ useHandCursor: true });
        const btnT = this.add
          .text(cx, 400, "PLAY AGAIN 🔁", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "20px",
            fontStyle: "bold",
            color: "#ffffff",
          })
          .setOrigin(0.5);
        const again = () => this.scene.start("Game");
        btn.on("pointerover", () => btn.setFillStyle(0x36a35b));
        btn.on("pointerout", () => btn.setFillStyle(0x2d874b));
        btn.on("pointerdown", again);
        this.input.keyboard.on("keydown-SPACE", again);
        this.input.keyboard.on("keydown-ENTER", again);

        const hub = this.add
          .text(cx, 480, "← Back to Math Games", {
            fontFamily: "Segoe UI, sans-serif",
            fontSize: "15px",
            color: "#7fae8c",
          })
          .setOrigin(0.5)
          .setInteractive({ useHandCursor: true });
        hub.on("pointerover", () => hub.setColor("#ffd24a"));
        hub.on("pointerout", () => hub.setColor("#7fae8c"));
        hub.on("pointerdown", () => (window.location.href = "/math/games/"));
      };

      // ── Launch ──
      const ppGame = new Phaser.Game(config);

      // Canvas accessibility (additive; no gameplay change).
      ppGame.events.once("ready", function () {
        try {
          const cv = ppGame.canvas;
          if (!cv) return;
          cv.setAttribute("role", "application");
          cv.setAttribute(
            "aria-label",
            "Percent Power Coin Catcher math game. A percent problem appears " +
              "at the top; steer the cart with the left and right arrow keys " +
              "or A and D to catch the coin showing the correct answer.",
          );
          cv.setAttribute("aria-roledescription", "math game");
          if (!cv.hasAttribute("tabindex")) cv.setAttribute("tabindex", "0");
          cv.addEventListener("pointerdown", function () {
            try {
              cv.focus({ preventScroll: true });
            } catch (e) {
              cv.focus();
            }
          });
        } catch (e) {}
      });
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <script src="/shared/save-resume/save-resume-engine.js" defer></script>
    <!-- nsr-injected:end -->
    <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
    <script src="/assets/game-fx.js" defer></script>
    <!-- gfx-injected:end -->
  </body>
