  <body>
    <div id="ff-bg" aria-hidden="true"></div>
    <div id="ff-sr" role="status" aria-live="polite"></div>
    <script>
      // ── Decorative drifting motes behind the canvas (reduced-motion safe). ──
      (function () {
        var host = document.getElementById("ff-bg");
        if (!host) return;
        var reduce =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var n = reduce ? 10 : 26;
        for (var i = 0; i < n; i++) {
          var d = document.createElement("div");
          d.className = "ff-mote";
          var sz = 2 + Math.random() * 4;
          d.style.width = d.style.height = sz.toFixed(1) + "px";
          d.style.left = (Math.random() * 100).toFixed(2) + "%";
          d.style.top = (Math.random() * 100).toFixed(2) + "%";
          d.style.setProperty("--tw", (2 + Math.random() * 4).toFixed(2) + "s");
          d.style.animationDelay = "-" + (Math.random() * 4).toFixed(2) + "s";
          host.appendChild(d);
        }
      })();
    </script>
    <script>
      // ════════════════════════════════════════════════════════════════════
      // FACTOR FRENZY — Catch & Sort  ·  Grade 6  ·  6.NS.4
      // Lessons 1.1–1.3: prime vs composite, GCF, LCM.
      //
      // MECHANIC: A "claw basket" you steer left/right along the bottom catches
      //   a falling answer tile. Bins/lanes at the bottom are labeled; you must
      //   position the basket under the CORRECT bin as the tile lands.
      //   • Round 1 (Prime/Composite): a number falls; steer it into the PRIME
      //     bin or the COMPOSITE bin.
      //   • Round 2 (GCF): the GCF tile falls; bins are labeled with candidate
      //     values — catch it in the bin equal to GCF(a,b).
      //   • Round 3 (LCM): same, bins labeled with candidates — catch in LCM(a,b).
      //   Rising difficulty: bigger numbers + faster fall as rounds advance.
      // ════════════════════════════════════════════════════════════════════
      const LS_KEY = "ff_factor_frenzy_highscore";
      const W = 800,
        H = 600;
      const ACTIVITY_TITLE = "Factor Frenzy — Lessons 1.1–1.3";
      const STANDARD = "6.NS.4";

      // ── Tiny WebAudio SFX ──
      const SFX = {
        ctx: null,
        init() {
          if (!this.ctx)
            try {
              this.ctx = new (window.AudioContext ||
                window.webkitAudioContext)();
            } catch (e) {}
        },
        play(t, f, d, v = 0.2) {
          if (!this.ctx) return;
          try {
            const c = this.ctx,
              o = c.createOscillator(),
              g = c.createGain();
            o.type = t;
            o.frequency.value = f;
            g.gain.setValueAtTime(v, c.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
            o.connect(g);
            g.connect(c.destination);
            o.start();
            o.stop(c.currentTime + d);
          } catch (e) {}
        },
        correct() {
          this.play("sine", 660, 0.1, 0.3);
          this.play("sine", 880, 0.15, 0.25);
        },
        wrong() {
          this.play("sawtooth", 200, 0.25, 0.2);
          this.play("sawtooth", 150, 0.3, 0.15);
        },
        tick() {
          this.play("square", 600, 0.03, 0.07);
        },
        move() {
          this.play("triangle", 320, 0.04, 0.05);
        },
        streak(n) {
          const seq = [523, 659, 784, 988, 1175].slice(0, Math.min(n, 5));
          seq.forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.12, 0.2), i * 55),
          );
        },
        levelUp() {
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.15, 0.22), i * 70),
          );
        },
        win() {
          [523, 659, 784, 1047, 1318].forEach((f, i) =>
            setTimeout(() => this.play("sine", f, 0.22, 0.28), i * 110),
          );
        },
        lose() {
          [400, 350, 300, 200].forEach((f, i) =>
            setTimeout(() => this.play("sawtooth", f, 0.28, 0.15), i * 170),
          );
        },
      };

      // ── Math helpers ──
      function randInt(a, b) {
        return Math.floor(Math.random() * (b - a + 1)) + a;
      }
      function shuffle(a) {
        const r = a.slice();
        for (let i = r.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [r[i], r[j]] = [r[j], r[i]];
        }
        return r;
      }
      function gcd(a, b) {
        a = Math.abs(a);
        b = Math.abs(b);
        while (b) {
          const t = b;
          b = a % b;
          a = t;
        }
        return a;
      }
      function lcm(a, b) {
        return (a / gcd(a, b)) * b;
      }
      function isPrime(n) {
        if (n < 2) return false;
        for (let i = 2; i * i <= n; i++) if (n % i === 0) return false;
        return true;
      }

      // ── Question generator ──
      // round: 1 = prime/composite, 2 = GCF, 3 = LCM.
      // Returns: { round, tag, prompt, why, bins:[label...], correctBin, fallText }
      //   bins   = array of bin labels (2 for round 1, 3 for rounds 2-3)
      //   correctBin = index into bins of the right bin
      //   fallText = the tile that drops (number for R1, the answer for R2/R3)
      function genQuestion(round) {
        if (round === 1) {
          const n = randInt(2, 49);
          const prime = isPrime(n);
          return {
            round: 1,
            tag: "Prime or Composite?",
            prompt: "Sort " + n,
            why: prime
              ? n + " is PRIME — only factors are 1 and " + n + "."
              : n + " is COMPOSITE — it has more than two factors.",
            bins: ["PRIME", "COMPOSITE"],
            correctBin: prime ? 0 : 1,
            fallText: String(n),
          };
        }
        if (round === 2) {
          let a = randInt(6, 24),
            b = randInt(6, 24);
          if (a === b) b = a + randInt(1, 4);
          const g = gcd(a, b);
          const labels = new Set([g]);
          let guard = 0;
          while (labels.size < 3 && guard++ < 60) {
            const cand = randInt(1, Math.max(a, b));
            if (cand !== g) labels.add(cand);
          }
          const bins = shuffle(Array.from(labels)).map(String);
          return {
            round: 2,
            tag: "Greatest Common Factor",
            prompt: "GCF of " + a + " and " + b,
            why: "GCF(" + a + ", " + b + ") = " + g + ".",
            bins: bins,
            correctBin: bins.indexOf(String(g)),
            fallText: "GCF",
          };
        }
        // round 3 — LCM
        let a = randInt(2, 10),
          b = randInt(2, 10);
        if (a === b) b = a + 1;
        const l = lcm(a, b);
        const labels = new Set([l]);
        let guard = 0;
        while (labels.size < 3 && guard++ < 80) {
          const cand =
            Math.random() < 0.5 ? a * randInt(1, 7) : b * randInt(1, 7);
          if (cand !== l && cand > 0) labels.add(cand);
        }
        while (labels.size < 3 && guard++ < 120) {
          const cand = l + randInt(1, 10);
          if (cand !== l) labels.add(cand);
        }
        const bins = shuffle(Array.from(labels)).map(String);
        return {
          round: 3,
          tag: "Least Common Multiple",
          prompt: "LCM of " + a + " and " + b,
          why: "LCM(" + a + ", " + b + ") = " + l + ".",
          bins: bins,
          correctBin: bins.indexOf(String(l)),
          fallText: "LCM",
        };
      }

      function srSay(msg) {
        try {
          const el = document.getElementById("ff-sr");
          if (el) el.textContent = msg;
        } catch (e) {}
      }

      const config = {
        type: Phaser.AUTO,
        width: W,
        height: H,
        parent: document.body,
        backgroundColor: "#0f2b3c",
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: [],
      };

      // ════════ BOOT ════════
      class BootScene extends Phaser.Scene {
        constructor() {
          super("Boot");
        }
        create() {
          const g = this.make.graphics({ add: false });
          g.fillStyle(0xffffff);
          g.fillCircle(4, 4, 4);
          g.generateTexture("dot", 8, 8);
          g.clear();
          g.fillStyle(0xffffff);
          g.fillRect(0, 0, 7, 4);
          g.generateTexture("confetti", 7, 4);
          g.destroy();
          this.scene.start("Title");
        }
      }

      // ════════ TITLE ════════
      class TitleScene extends Phaser.Scene {
        constructor() {
          super("Title");
        }
        create() {
          const cx = W / 2;
          this.reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          this.add.rectangle(cx, H / 2, W, H, 0x0f2b3c);

          this.add
            .text(cx, 120, "FACTOR", {
              fontSize: "70px",
              fontFamily: "Impact, sans-serif",
              color: "#d4952a",
              stroke: "#08202c",
              strokeThickness: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 188, "FRENZY", {
              fontSize: "70px",
              fontFamily: "Impact, sans-serif",
              color: "#0e8a7d",
              stroke: "#08202c",
              strokeThickness: 6,
            })
            .setOrigin(0.5);
          this.add
            .text(cx, 245, "Catch & Sort  ·  Lessons 1.1–1.3  ·  6.NS.4", {
              fontSize: "16px",
              color: "#9fc6cf",
            })
            .setOrigin(0.5);
          this.add
            .text(
              cx,
              300,
              "Steer the basket to catch each falling tile in the\nright bin: PRIME vs COMPOSITE, then GCF, then LCM.",
              { fontSize: "15px", color: "#7fa8b3", align: "center" },
            )
            .setOrigin(0.5);
          this.add
            .text(cx, 358, "← → or A/D to move   ·   tap/drag on touch", {
              fontSize: "14px",
              color: "#6b97a3",
            })
            .setOrigin(0.5);

          const hs = localStorage.getItem(LS_KEY);
          if (hs)
            this.add
              .text(cx, 392, "HIGH SCORE: " + hs, {
                fontSize: "15px",
                color: "#d4952a",
                fontStyle: "bold",
              })
              .setOrigin(0.5);

          const btn = this.add
            .rectangle(cx, 450, 260, 56, 0x0e8a7d)
            .setInteractive({ useHandCursor: true });
          const btnT = this.add
            .text(cx, 450, "START GAME ▶", {
              fontSize: "22px",
              fontStyle: "bold",
              color: "#06202c",
            })
            .setOrigin(0.5);
          if (!this.reduce)
            this.tweens.add({
              targets: [btn, btnT],
              scaleX: 1.05,
              scaleY: 1.05,
              duration: 800,
              yoyo: true,
              repeat: -1,
            });
          const go = () => {
            SFX.init();
            SFX.tick();
            this.cameras.main.fadeOut(300);
            this.time.delayedCall(300, () => this.scene.start("Game"));
          };
          btn.on("pointerover", () => btn.setFillStyle(0x12a596));
          btn.on("pointerout", () => btn.setFillStyle(0x0e8a7d));
          btn.on("pointerdown", go);
          this.input.keyboard.on("keydown-SPACE", go);
          this.input.keyboard.on("keydown-ENTER", go);

          const hub = this.add
            .text(cx, 555, "← Back to Games hub", {
              fontSize: "15px",
              fontStyle: "bold",
              color: "#6b97a3",
            })
            .setOrigin(0.5)
            .setInteractive({ useHandCursor: true });
          hub.on("pointerover", () => hub.setColor("#0e8a7d"));
          hub.on("pointerout", () => hub.setColor("#6b97a3"));
          hub.on("pointerdown", () => (window.location.href = "/math/games/"));

          this.cameras.main.fadeIn(400);
        }
      }

      // ════════ GAME ════════
      class GameScene extends Phaser.Scene {
        constructor() {
          super("Game");
        }
        init() {
          this.reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          this.score = 0;
          this.lives = 3;
          this.streak = 0;
          this.maxStreak = 0;
          this.correct = 0;
          this.attempted = 0;
          this.qIndex = 0;
          this.TOTAL = 12; // 4 per round × 3 rounds
          this.level = 1;
          this.busy = false;
          this.tile = null;
        }

        roundFor(i) {
          return i < 4 ? 1 : i < 8 ? 2 : 3;
        }

        create() {
          const cx = W / 2;
          this.add.rectangle(cx, H / 2, W, H, 0x0f2b3c);
          // subtle top band
          this.add.rectangle(cx, 26, W, 52, 0x0a2230);

          // HUD
          this.scoreText = this.add.text(16, 12, "Score: 0", {
            fontSize: "20px",
            color: "#0e8a7d",
            fontStyle: "bold",
          });
          this.livesText = this.add
            .text(W - 16, 12, "❤❤❤", {
              fontSize: "20px",
              color: "#c45a3c",
            })
            .setOrigin(1, 0);
          this.streakText = this.add
            .text(cx, 12, "Streak: 0", {
              fontSize: "16px",
              color: "#d4952a",
              fontStyle: "bold",
            })
            .setOrigin(0.5, 0);
          this.levelText = this.add
            .text(cx, 34, "", { fontSize: "13px", color: "#7fa8b3" })
            .setOrigin(0.5, 0);

          // Prompt panel
          this.tagText = this.add
            .text(cx, 74, "", {
              fontSize: "14px",
              color: "#9fc6cf",
              fontStyle: "bold",
            })
            .setOrigin(0.5);
          this.promptText = this.add
            .text(cx, 104, "", {
              fontSize: "30px",
              color: "#ffffff",
              fontStyle: "bold",
            })
            .setOrigin(0.5);

          // Bin geometry
          this.binY = H - 70;
          this.binH = 80;
          this.binTopY = H - 110; // catch line
          this.binGraphics = this.add.graphics();
          this.binTexts = [];
          this.bins = []; // {x, w, label, correct}

          // Basket
          this.basketW = 96;
          this.basketX = cx;
          this.basket = this.add.container(this.basketX, this.binTopY - 24);
          const bBody = this.add.graphics();
          bBody.fillStyle(0xd4952a, 1);
          bBody.fillRoundedRect(
            -this.basketW / 2,
            -8,
            this.basketW,
            34,
            { tl: 4, tr: 4, bl: 14, br: 14 },
          );
          bBody.lineStyle(3, 0xffffff, 0.9);
          bBody.strokeRoundedRect(-this.basketW / 2, -8, this.basketW, 34, {
            tl: 4,
            tr: 4,
            bl: 14,
            br: 14,
          });
          this.basket.add(bBody);
          this.basket.add(
            this.add
              .text(0, 9, "▲", { fontSize: "16px", color: "#ffffff" })
              .setOrigin(0.5),
          );

          // Particles
          this.confetti = this.add
            .particles(0, 0, "confetti", {
              speed: { min: 80, max: 280 },
              angle: { min: 0, max: 360 },
              scale: { start: 1.4, end: 0.2 },
              rotate: { min: 0, max: 360 },
              lifespan: 1100,
              gravityY: 260,
              emitting: false,
              quantity: 24,
              tint: [0x0e8a7d, 0x1a6fb5, 0xd4952a, 0x2d874b, 0xc45a3c],
            })
            .setDepth(30);
          this.redFlash = this.add
            .rectangle(cx, H / 2, W, H, 0xc45a3c, 0)
            .setDepth(28);

          this.feedback = this.add
            .text(cx, 150, "", {
              fontSize: "16px",
              color: "#fff",
              fontStyle: "bold",
              align: "center",
              wordWrap: { width: W - 80 },
            })
            .setOrigin(0.5)
            .setAlpha(0)
            .setDepth(20);

          // Input — keyboard
          this.cursors = this.input.keyboard.createCursorKeys();
          this.keyA = this.input.keyboard.addKey("A");
          this.keyD = this.input.keyboard.addKey("D");
          // Input — pointer drag/tap to set target X
          this.pointerTargetX = null;
          this.input.on("pointermove", (p) => {
            if (p.isDown) this.pointerTargetX = p.worldX;
          });
          this.input.on("pointerdown", (p) => {
            this.pointerTargetX = p.worldX;
          });
          this.input.on("pointerup", () => {
            this.pointerTargetX = null;
          });

          this.fallSpeedBase = 70; // px/sec, scales with level
          this.nextQuestion();
          this.cameras.main.fadeIn(350);
        }

        layoutBins(labels, correctBin) {
          this.binGraphics.clear();
          this.binTexts.forEach((t) => t.destroy());
          this.binTexts = [];
          this.bins = [];
          const n = labels.length;
          const margin = 24;
          const gap = 14;
          const totalW = W - margin * 2 - gap * (n - 1);
          const binW = totalW / n;
          const palette = [0x1a6fb5, 0x0e8a7d, 0x2d874b];
          for (let i = 0; i < n; i++) {
            const x = margin + i * (binW + gap) + binW / 2;
            const col = palette[i % palette.length];
            this.binGraphics.fillStyle(col, 0.32);
            this.binGraphics.fillRoundedRect(
              x - binW / 2,
              this.binY - this.binH / 2,
              binW,
              this.binH,
              10,
            );
            this.binGraphics.lineStyle(3, col, 0.95);
            this.binGraphics.strokeRoundedRect(
              x - binW / 2,
              this.binY - this.binH / 2,
              binW,
              this.binH,
              10,
            );
            const t = this.add
              .text(x, this.binY, String(labels[i]), {
                fontSize: n === 2 ? "26px" : "30px",
                color: "#ffffff",
                fontStyle: "bold",
                align: "center",
                wordWrap: { width: binW - 12 },
              })
              .setOrigin(0.5);
            this.binTexts.push(t);
            this.bins.push({
              x: x,
              w: binW,
              label: labels[i],
              correct: i === correctBin,
            });
          }
        }

        nextQuestion() {
          if (this.qIndex >= this.TOTAL || this.lives <= 0) {
            this.endGame();
            return;
          }
          const round = this.roundFor(this.qIndex);
          const newLevel = round;
          if (newLevel !== this.level && this.qIndex > 0) {
            SFX.levelUp();
          }
          this.level = newLevel;
          this.q = genQuestion(round);
          this.qIndex++;
          this.attempted = this.qIndex; // will reconcile on miss/end
          this.busy = false;

          this.tagText.setText(this.q.tag);
          this.promptText.setText(
            this.q.prompt + "   (" + this.qIndex + "/" + this.TOTAL + ")",
          );
          this.levelText.setText("Round " + round + " of 3");
          this.feedback.setAlpha(0);
          this.layoutBins(this.q.bins, this.q.correctBin);

          srSay(
            this.q.tag +
              ". " +
              this.q.prompt +
              ". Bins: " +
              this.q.bins.join(", ") +
              ". Steer the basket to the correct bin.",
          );

          // Falling tile
          const startX = randInt(120, W - 120);
          if (this.tile) this.tile.destroy();
          this.tile = this.add.container(startX, 184);
          const tg = this.add.graphics();
          tg.fillStyle(0xfdf6e9, 1);
          tg.fillRoundedRect(-34, -28, 68, 56, 10);
          tg.lineStyle(3, 0xd4952a, 1);
          tg.strokeRoundedRect(-34, -28, 68, 56, 10);
          this.tile.add(tg);
          this.tile.add(
            this.add
              .text(0, 0, this.q.fallText, {
                fontSize: this.q.fallText.length > 2 ? "20px" : "28px",
                color: "#0f2b3c",
                fontStyle: "bold",
              })
              .setOrigin(0.5),
          );
          this.tileVY =
            (this.fallSpeedBase + (this.level - 1) * 26) / 1000; // px/ms
          this.tileLanded = false;
        }

        update(time, delta) {
          if (this.busy || !this.tile || this.tileLanded) return;
          // Move basket
          const step = 0.42 * delta;
          let moved = false;
          if (this.cursors.left.isDown || this.keyA.isDown) {
            this.basketX -= step;
            moved = true;
          }
          if (this.cursors.right.isDown || this.keyD.isDown) {
            this.basketX += step;
            moved = true;
          }
          if (this.pointerTargetX != null) {
            const dx = this.pointerTargetX - this.basketX;
            this.basketX += Phaser.Math.Clamp(dx, -step, step);
          }
          this.basketX = Phaser.Math.Clamp(
            this.basketX,
            this.basketW / 2 + 6,
            W - this.basketW / 2 - 6,
          );
          this.basket.x = this.basketX;

          // Fall tile
          this.tile.y += this.tileVY * delta;
          // Land when tile bottom reaches the catch line
          if (this.tile.y + 28 >= this.binTopY) {
            this.tileLanded = true;
            this.resolve();
          }
        }

        binUnderBasket() {
          // Which bin's horizontal span contains the basket center?
          for (let i = 0; i < this.bins.length; i++) {
            const b = this.bins[i];
            if (
              this.basketX >= b.x - b.w / 2 &&
              this.basketX <= b.x + b.w / 2
            )
              return i;
          }
          // fallback: nearest
          let best = 0,
            bd = Infinity;
          this.bins.forEach((b, i) => {
            const d = Math.abs(b.x - this.basketX);
            if (d < bd) {
              bd = d;
              best = i;
            }
          });
          return best;
        }

        resolve() {
          this.busy = true;
          const chosen = this.binUnderBasket();
          const right = chosen === this.q.correctBin;
          SFX.init();

          // drop tile into chosen bin visually
          const targetBin = this.bins[chosen];
          this.tweens.add({
            targets: this.tile,
            x: targetBin.x,
            y: this.binY,
            duration: this.reduce ? 1 : 180,
            ease: "Quad.easeIn",
          });

          if (right) {
            this.correct++;
            this.streak++;
            this.maxStreak = Math.max(this.maxStreak, this.streak);
            const bonus = Math.min(this.streak, 5) * 2;
            const gained = 10 + bonus;
            this.score += gained;
            SFX.correct();
            if (this.streak >= 3) SFX.streak(this.streak);
            this.confetti.emitParticleAt(targetBin.x, this.binY - 30);
            this.flash(
              "✓ +" +
                gained +
                (this.streak > 1 ? "   🔥 Streak ×" + this.streak : ""),
              "#2d874b",
            );
            srSay("Correct! " + this.q.why);
            try {
              if (window.GameFX && GameFX.celebrate && this.streak >= 3) {
                GameFX.celebrate(document.querySelector("canvas"));
              }
            } catch (e) {}
          } else {
            this.streak = 0;
            this.lives--;
            SFX.wrong();
            this.doRedFlash();
            this.flash(
              "✗ " + this.q.why + "  (−1 ❤)",
              "#c45a3c",
            );
            // highlight the correct bin
            const cb = this.bins[this.q.correctBin];
            const hl = this.add
              .rectangle(cb.x, this.binY, cb.w, this.binH, 0x2d874b, 0.25)
              .setDepth(5);
            this.tweens.add({
              targets: hl,
              alpha: 0,
              duration: 900,
              onComplete: () => hl.destroy(),
            });
            srSay("Not quite. " + this.q.why);
          }
          this.updateHUD();

          this.time.delayedCall(right ? 850 : 1500, () => {
            this.nextQuestion();
          });
        }

        flash(msg, color) {
          this.feedback.setText(msg).setColor(color).setAlpha(1).setScale(0.8);
          this.tweens.add({
            targets: this.feedback,
            scale: 1,
            duration: this.reduce ? 1 : 220,
            ease: "Back.easeOut",
          });
        }

        doRedFlash() {
          if (this.reduce) return;
          this.redFlash.setAlpha(0.35);
          this.tweens.add({
            targets: this.redFlash,
            alpha: 0,
            duration: 350,
          });
        }

        updateHUD() {
          this.scoreText.setText("Score: " + this.score);
          this.streakText.setText("Streak: " + this.streak);
          this.livesText.setText(
            this.lives > 0 ? "❤".repeat(this.lives) : "—",
          );
        }

        endGame() {
          const attempted = this.qIndex; // questions actually shown
          this.scene.start("Result", {
            score: this.score,
            correct: this.correct,
            attempted: attempted,
            maxStreak: this.maxStreak,
            outOfLives: this.lives <= 0,
          });
        }
      }

      // ════════ RESULT ════════
      class ResultScene extends Phaser.Scene {
        constructor() {
          super("Result");
        }
        init(data) {
          this.d = data;
        }
        create() {
          const cx = W / 2;
          const d = this.d;
          this.reduce =
            window.matchMedia &&
            window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          this.add.rectangle(cx, H / 2, W, H, 0x0f2b3c);

          const pct = d.attempted ? (d.correct / d.attempted) * 100 : 0;
          const stars = pct >= 90 ? 3 : pct >= 65 ? 2 : pct >= 40 ? 1 : 0;
          const won = !d.outOfLives;

          if (stars >= 2) SFX.win();
          else SFX.lose();

          this.add
            .text(cx, 70, won ? "ROUND COMPLETE!" : "OUT OF LIVES", {
              fontSize: "38px",
              fontStyle: "bold",
              color: won ? "#0e8a7d" : "#c45a3c",
              stroke: "#08202c",
              strokeThickness: 4,
            })
            .setOrigin(0.5);

          // stars
          for (let i = 0; i < 3; i++) {
            const sx = cx - 70 + i * 70;
            this.add
              .text(sx, 150, "☆", { fontSize: "54px", color: "#33505a" })
              .setOrigin(0.5);
            if (i < stars) {
              const s = this.add
                .text(sx, 150, "★", { fontSize: "54px", color: "#d4952a" })
                .setOrigin(0.5)
                .setScale(0);
              this.tweens.add({
                targets: s,
                scale: 1,
                duration: this.reduce ? 1 : 380,
                delay: 250 + i * 220,
                ease: "Back.easeOut",
              });
            }
          }

          const prevHigh = parseInt(localStorage.getItem(LS_KEY) || "0", 10);
          const isNewHigh = d.score > prevHigh;
          if (isNewHigh && d.score > 0)
            localStorage.setItem(LS_KEY, String(d.score));

          const stats = [
            ["Final Score", String(d.score)],
            ["Correct", d.correct + " / " + d.attempted],
            ["Accuracy", Math.round(pct) + "%"],
            ["Best Streak", "×" + d.maxStreak],
          ];
          stats.forEach((s, i) => {
            const y = 230 + i * 42;
            this.add.rectangle(cx, y, 380, 34, 0x0a2230, 0.85);
            this.add
              .text(cx - 165, y, s[0], { fontSize: "15px", color: "#7fa8b3" })
              .setOrigin(0, 0.5);
            this.add
              .text(cx + 165, y, s[1], {
                fontSize: "17px",
                color: "#0e8a7d",
                fontStyle: "bold",
              })
              .setOrigin(1, 0.5);
          });

          if (isNewHigh && d.score > 0)
            this.add
              .text(cx, 415, "★ NEW HIGH SCORE! ★", {
                fontSize: "18px",
                color: "#d4952a",
                fontStyle: "bold",
              })
              .setOrigin(0.5);

          // EduPulse (guarded)
          try {
            window.EduPulse &&
              EduPulse.record({
                activityTitle: ACTIVITY_TITLE,
                score: d.score,
                stars: stars,
                problemsCorrect: d.correct,
                problemsAttempted: d.attempted,
                percent: Math.round(pct),
                standard: STANDARD,
              });
          } catch (e) {}

          srSay(
            (won ? "Round complete. " : "Out of lives. ") +
              "Score " +
              d.score +
              ", " +
              d.correct +
              " of " +
              d.attempted +
              " correct, " +
              stars +
              " stars.",
          );

          const retry = this.add
            .rectangle(cx - 95, 470, 170, 46, 0x0e8a7d)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx - 95, 470, "PLAY AGAIN", {
              fontSize: "17px",
              fontStyle: "bold",
              color: "#06202c",
            })
            .setOrigin(0.5);
          retry.on("pointerover", () => retry.setFillStyle(0x12a596));
          retry.on("pointerout", () => retry.setFillStyle(0x0e8a7d));
          retry.on("pointerdown", () => {
            SFX.tick();
            this.scene.start("Game");
          });

          const hub = this.add
            .rectangle(cx + 95, 470, 170, 46, 0x1a3a48)
            .setInteractive({ useHandCursor: true });
          this.add
            .text(cx + 95, 470, "ALL GAMES", {
              fontSize: "17px",
              fontStyle: "bold",
              color: "#9fc6cf",
            })
            .setOrigin(0.5);
          hub.on("pointerover", () => hub.setFillStyle(0x244c5c));
          hub.on("pointerout", () => hub.setFillStyle(0x1a3a48));
          hub.on("pointerdown", () => (window.location.href = "/math/games/"));

          this.input.keyboard.on("keydown-SPACE", () =>
            this.scene.start("Game"),
          );

          if (won && stars >= 2 && !this.reduce) {
            const p = this.add
              .particles(0, 0, "confetti", {
                speed: { min: 60, max: 240 },
                angle: { min: 0, max: 360 },
                scale: { start: 1.4, end: 0 },
                rotate: { min: 0, max: 360 },
                lifespan: 1500,
                gravityY: 160,
                quantity: 20,
                tint: [0x0e8a7d, 0x1a6fb5, 0xd4952a, 0x2d874b],
              })
              .setDepth(40);
            for (let i = 0; i < 5; i++)
              this.time.delayedCall(i * 280, () =>
                p.emitParticleAt(randInt(120, W - 120), randInt(40, 140)),
              );
          }

          this.cameras.main.fadeIn(400);
        }
      }

      config.scene = [BootScene, TitleScene, GameScene, ResultScene];
      const game = new Phaser.Game(config);

      // ── Canvas accessibility wiring ──
      game.events.once("ready", function () {
        try {
          const cv = game.canvas;
          if (!cv) return;
          cv.setAttribute("role", "application");
          cv.setAttribute(
            "aria-label",
            "Factor Frenzy catch-and-sort math game. Steer the basket left and " +
              "right with the arrow keys or A and D to catch each falling tile in " +
              "the correct bin: prime versus composite, then greatest common " +
              "factor, then least common multiple. Press Space to start.",
          );
          cv.setAttribute("aria-roledescription", "math game");
          if (!cv.hasAttribute("tabindex")) cv.setAttribute("tabindex", "0");
          // Focus the canvas on pointer down so keyboard controls work immediately.
          cv.addEventListener("pointerdown", function () {
            try {
              cv.focus();
            } catch (e) {}
          });
        } catch (e) {}
      });
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <script src="/shared/save-resume/save-resume-engine.js" defer></script>
    <!-- nsr-injected:end -->
    <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
    <script src="/assets/game-fx.js" defer></script>
    <!-- gfx-injected:end -->
  </body>
