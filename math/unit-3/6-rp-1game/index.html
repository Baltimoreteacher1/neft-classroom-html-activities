    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
      // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror.
      if (typeof Phaser === "undefined") {
        document.write(
          '<script src="https://unpkg.com/phaser@3.80.1/dist/phaser.min.js"><\/script>',
        );
      }
      window.addEventListener("load", function () {
        if (typeof Phaser === "undefined") {
          document.body.innerHTML =
            '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">⚠️ This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
        }
      });
    </script>

</head>
  <body>
    <div id="game-container"></div>
    <script>
      (() => {
        // ════════════════════════════════════════════════════════════════
        //  RATIO KITCHEN — a real smoothie-bar game for 6.RP.A.1
        //  The MATH IS THE MECHANIC: you BUILD each drink by adding scoops
        //  into two side-by-side tubes. The order is a ratio (e.g. 2:3) and
        //  you serve it only when the tube heights are EQUIVALENT to that
        //  ratio — so 4:6 also serves a 2:3 order (equivalence, felt).
        //  Round types: make a ratio, scale a batch to a fill line, and
        //  finish a partly-poured drink (missing value). No A/B/C/D.
        // ════════════════════════════════════════════════════════════════

        // ─── SOUND ENGINE ───
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let actx = null;
        function ensureAudio() {
          if (!actx && AudioCtx) actx = new AudioCtx();
          if (actx && actx.state === "suspended") actx.resume();
        }
        function beep(freq, dur, type = "sine", vol = 0.16) {
          if (!actx) return;
          const o = actx.createOscillator(),
            g = actx.createGain();
          o.connect(g);
          g.connect(actx.destination);
          o.frequency.value = freq;
          o.type = type;
          g.gain.setValueAtTime(vol, actx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
          o.start();
          o.stop(actx.currentTime + dur);
        }
        const sfxScoop = () =>
          beep(420 + Math.random() * 60, 0.07, "sine", 0.12);
        const sfxRemove = () => beep(240, 0.08, "sine", 0.1);
        const sfxServe = () => {
          beep(523, 0.08);
          setTimeout(() => beep(659, 0.08), 70);
          setTimeout(() => beep(880, 0.16), 150);
        };
        const sfxWrong = () => beep(170, 0.22, "square", 0.1);
        const sfxLevel = () =>
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => beep(f, 0.14), i * 90),
          );
        const sfxClick = () => beep(440, 0.05, "sine", 0.09);

        // ─── PALETTE ───
        const W = 1024,
          H = 768;
        const C = {
          bg: 0x14082a,
          panel: 0x2a1850,
          panelHi: 0x3a2270,
          gold: 0xf6c343,
          white: 0xffffff,
          dim: 0x9b86c9,
          green: 0x2ec26b,
          red: 0xe7556b,
          glass: 0x0d0420,
          stroke: 0x533a8f,
        };
        // Ingredients: colour + label + emoji. Colour is never the only cue —
        // every tube is labelled with the fruit name + emoji (colourblind-safe).
        const INGREDIENTS = [
          {
            name: "Strawberry",
            emoji: "\u{1F353}",
            color: 0xf5476c,
            css: "#f5476c",
          },
          {
            name: "Banana",
            emoji: "\u{1F34C}",
            color: 0xf1c40f,
            css: "#f1c40f",
          },
          {
            name: "Blueberry",
            emoji: "\u{1FAD0}",
            color: 0x4a7cf0,
            css: "#4a7cf0",
          },
          { name: "Lime", emoji: "\u{1F33F}", color: 0x42c96a, css: "#42c96a" },
          {
            name: "Mango",
            emoji: "\u{1F96D}",
            color: 0xe6892b,
            css: "#e6892b",
          },
          {
            name: "Grape",
            emoji: "\u{1F347}",
            color: 0xa569d6,
            css: "#a569d6",
          },
        ];

        // ─── MATH HELPERS ───
        const gcd = (a, b) => (b ? gcd(b, a % b) : a);
        const rnd = (n) => Math.floor(Math.random() * n);
        const pick = (arr) => arr[rnd(arr.length)];
        function shuffle(arr) {
          const a = [...arr];
          for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        }
        // current counts [ca,cb] equivalent to target [a,b] via cross-multiply
        const crossMatch = (ca, cb, a, b) =>
          ca > 0 && cb > 0 && ca * b === cb * a;

        // ─── ROUND GENERATOR ───
        // level 1 = support (small ratios, more help); level 2 = challenge.
        function makeRound(tier, index) {
          // two distinct ingredients
          const [ia, ib] = shuffle(INGREDIENTS).slice(0, 2);
          // base ratio in lowest terms
          const lowPairs = [
            [1, 2],
            [2, 3],
            [1, 3],
            [3, 4],
            [2, 5],
            [3, 5],
            [1, 4],
            [4, 5],
            [3, 2],
            [2, 1],
          ];
          let [a, b] = pick(lowPairs);
          const g = gcd(a, b);
          a /= g;
          b /= g; // ensure lowest terms

          let type;
          if (tier === 1) type = index % 2 === 0 ? "make" : "missing";
          else type = pick(["make", "batch", "missing", "make", "batch"]);

          const r = {
            ia,
            ib,
            a,
            b,
            type,
            preseed: [0, 0],
            capacity: null,
            locked: false,
          };

          // largest scale factor whose solution still fits the visual tubes
          const maxK = Math.floor(TUBE_MAX / Math.max(a, b));
          if ((type === "batch" || type === "missing") && maxK < 2)
            type = "make";
          r.type = type;

          if (type === "batch") {
            // scale the base ratio by k so total fills a fill-line (solution fits tubes)
            const sum = a + b;
            const k = 2 + rnd(Math.min(maxK, tier === 1 ? 3 : 4) - 1);
            r.capacity = sum * k; // exact total scoops needed
            r.need = [a * k, b * k];
          } else if (type === "missing") {
            // pre-pour ingredient A (locked); student completes B to keep ratio
            const k = 2 + rnd(Math.min(maxK, 3) - 1);
            r.preseed = [a * k, 0];
            r.locked = true;
            r.need = [a * k, b * k];
          } else {
            // make: build any equivalent of a:b (smallest is a:b)
            r.need = [a, b];
          }
          return r;
        }

        // capacity ceiling for the visual tubes (keeps art clean)
        const TUBE_MAX = 12;

        // ════════════════════════════════════════════════════════════════
        //  TITLE SCENE — real choice: Level 1 (support) vs Level 2 (challenge)
        // ════════════════════════════════════════════════════════════════
        class TitleScene extends Phaser.Scene {
          constructor() {
            super("TitleScene");
          }
          create() {
            this.cameras.main.setBackgroundColor(C.bg);
            this.add
              .text(W / 2, 120, "RATIO KITCHEN", {
                fontSize: "66px",
                fontFamily: "Arial Black, sans-serif",
                color: "#f6c343",
                stroke: "#000",
                strokeThickness: 7,
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 178, "6.RP.A.1 — Build drinks to match the ratio", {
                fontSize: "20px",
                fontFamily: "Arial",
                color: "#c9b6ff",
              })
              .setOrigin(0.5);
            this.add
              .text(
                W / 2,
                230,
                "Customers order by RATIO. Pour scoops into the two tubes until the\n" +
                  "heights match the order — then serve. 4:6 works for a 2:3 order!",
                {
                  fontSize: "16px",
                  fontFamily: "Arial",
                  color: "#9b86c9",
                  align: "center",
                  lineSpacing: 6,
                },
              )
              .setOrigin(0.5);

            // little demo of two tubes 2:3
            this.drawDemo(W / 2, 430);

            // ── Level pick (real difficulty, not cosmetic) ──
            const tiers = [
              {
                t: 1,
                label: "Level 1",
                sub: "Support",
                desc: "Small ratios · always shows the rule · 5 lives",
                col: C.green,
              },
              {
                t: 2,
                label: "Level 2",
                sub: "Challenge",
                desc: "Scaling & missing values · less help · 3 lives",
                col: C.gold,
              },
            ];
            tiers.forEach((d, i) => {
              const x = W / 2 + (i === 0 ? -200 : 200),
                y = 590;
              const card = this.add
                .rectangle(x, y, 320, 130, C.panel)
                .setStrokeStyle(3, C.stroke)
                .setInteractive({ useHandCursor: true });
              this.add
                .text(x, y - 38, d.label, {
                  fontSize: "30px",
                  fontFamily: "Arial Black",
                  color: "#fff",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y - 8, d.sub, {
                  fontSize: "16px",
                  fontFamily: "Arial",
                  color: Phaser.Display.Color.IntegerToColor(d.col).rgba,
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 30, d.desc, {
                  fontSize: "12.5px",
                  fontFamily: "Arial",
                  color: "#c9b6ff",
                  align: "center",
                  wordWrap: { width: 290 },
                })
                .setOrigin(0.5);
              card.on("pointerover", () => {
                card.setStrokeStyle(3, d.col);
                card.setScale(1.04);
              });
              card.on("pointerout", () => {
                card.setStrokeStyle(3, C.stroke);
                card.setScale(1);
              });
              card.on("pointerdown", () => {
                ensureAudio();
                sfxClick();
                this.cameras.main.fadeOut(350, 0, 0, 0);
                this.time.delayedCall(350, () =>
                  this.scene.start("GameScene", { tier: d.t }),
                );
              });
            });

            this.add
              .text(
                W / 2,
                712,
                "Tap +Add / −  ·  keys 1 & 2 add, Backspace removes, Enter serves, H for a hint",
                { fontSize: "12px", color: "#6f5ba0" },
              )
              .setOrigin(0.5);
            this.cameras.main.fadeIn(400);
          }
          drawDemo(cx, cy) {
            // 🍓 2 : 🍌 3 mini tubes to teach the read
            const draw = (x, color, n) => {
              this.add
                .rectangle(x, cy, 46, 130, C.glass)
                .setStrokeStyle(2, C.stroke);
              for (let s = 0; s < n; s++)
                this.add
                  .rectangle(x, cy + 55 - s * 22 - 11, 38, 18, color)
                  .setStrokeStyle(1, 0x000000, 0.25);
            };
            draw(cx - 70, INGREDIENTS[0].color, 2);
            draw(cx - 18, INGREDIENTS[1].color, 3);
            this.add
              .text(cx + 36, cy, "= 2 : 3", {
                fontSize: "24px",
                fontFamily: "Arial Black",
                color: "#f6c343",
              })
              .setOrigin(0, 0.5);
          }
        }

        // ════════════════════════════════════════════════════════════════
        //  GAME SCENE
        // ════════════════════════════════════════════════════════════════
        class GameScene extends Phaser.Scene {
          constructor() {
            super("GameScene");
          }
          init(data) {
            this.tier = data.tier || 1;
          }

          create() {
            this.cameras.main.setBackgroundColor(C.bg);
            this.cameras.main.fadeIn(350);

            // state
            this.score = 0;
            this.streak = 0;
            this.bestStreak = 0;
            this.served = 0;
            this.correct = 0;
            this.attempts = 0;
            this.lives = this.tier === 1 ? 5 : 3;
            this.level = 1;
            this.roundIx = 0;
            this.counts = [0, 0]; // current scoops in tube A / B

            // backdrop
            this.add.rectangle(W / 2, H / 2, W, H, 0x1a0d35);
            this.add.rectangle(W / 2, 690, W, 156, 0x241048); // counter

            // HUD bar
            this.add.rectangle(W / 2, 28, W, 56, 0x0c0420, 0.96);
            this.hScore = this.add.text(24, 14, "0", {
              fontSize: "26px",
              fontFamily: "Arial Black",
              color: "#f6c343",
            });
            this.add.text(26, 42, "POINTS", {
              fontSize: "10px",
              color: "#8a76bf",
            });
            this.hLevel = this.add
              .text(W / 2, 12, "Level 1", {
                fontSize: "16px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5, 0);
            this.hServed = this.add
              .text(W / 2, 36, "Served 0", {
                fontSize: "12px",
                color: "#9b86c9",
              })
              .setOrigin(0.5, 0);
            this.hLives = this.add
              .text(W - 24, 16, "", { fontSize: "20px" })
              .setOrigin(1, 0);
            this.hStreak = this.add
              .text(W - 24, 42, "", { fontSize: "13px", color: "#f6c343" })
              .setOrigin(1, 0);

            // ── Order ticket (left) ──
            this.add
              .rectangle(176, 250, 300, 320, C.panel)
              .setStrokeStyle(3, C.stroke);
            this.add
              .text(176, 118, "\u{1F9FE} ORDER", {
                fontSize: "18px",
                fontFamily: "Arial Black",
                color: "#f6c343",
              })
              .setOrigin(0.5);
            this.customer = this.add
              .text(176, 168, "", { fontSize: "52px" })
              .setOrigin(0.5);
            this.orderRatio = this.add
              .text(176, 232, "", {
                fontSize: "40px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.orderLegend = this.add
              .text(176, 286, "", {
                fontSize: "15px",
                fontFamily: "Arial",
                color: "#c9b6ff",
                align: "center",
                lineSpacing: 4,
              })
              .setOrigin(0.5);
            this.orderTask = this.add
              .text(176, 360, "", {
                fontSize: "15px",
                fontFamily: "Arial",
                fontStyle: "bold",
                color: "#ffe9a8",
                align: "center",
                wordWrap: { width: 270 },
                lineSpacing: 4,
              })
              .setOrigin(0.5);

            // ── Tubes (center) ──  two glass columns side by side
            this.tubeX = [468, 556];
            this.tubeBottom = 560;
            this.scoopH = 30;
            this.tubeW = 70;
            this.tubeMaxH = TUBE_MAX * this.scoopH;
            this.tubeGfx = this.add.graphics();
            this.fillLine = this.add.graphics(); // capacity marker
            this.scoopLayer = this.add.container(); // scoop rectangles
            // live count chips under each tube
            this.tubeLabel = this.tubeX.map((x) =>
              this.add
                .text(x, 588, "", {
                  fontSize: "15px",
                  fontFamily: "Arial",
                  color: "#fff",
                  align: "center",
                })
                .setOrigin(0.5, 0),
            );
            this.liveRatio = this.add
              .text(512, 632, "", {
                fontSize: "26px",
                fontFamily: "Arial Black",
                color: "#9b86c9",
              })
              .setOrigin(0.5);
            this.fillNote = this.add
              .text(512, 150, "", {
                fontSize: "15px",
                fontFamily: "Arial",
                fontStyle: "bold",
                color: "#ffe9a8",
              })
              .setOrigin(0.5);

            // ── Dispenser buttons (right) ──
            this.dispenser = [];
            [0, 1].forEach((i) => {
              const x = 830,
                y = 200 + i * 150;
              this.add
                .rectangle(x, y, 320, 128, C.panel)
                .setStrokeStyle(3, C.stroke);
              const emoji = this.add
                .text(x - 128, y, "", { fontSize: "44px" })
                .setOrigin(0.5);
              const name = this.add
                .text(x - 92, y - 30, "", {
                  fontSize: "16px",
                  fontFamily: "Arial Black",
                  color: "#fff",
                })
                .setOrigin(0, 0.5);
              const keyhint = this.add
                .text(x - 92, y - 6, "", { fontSize: "11px", color: "#9b86c9" })
                .setOrigin(0, 0.5);
              const addBtn = this.makeBtn(
                x + 36,
                y + 4,
                150,
                56,
                "+ ADD",
                0x2e7d46,
                () => this.addScoop(i),
              );
              const remBtn = this.makeBtn(
                x + 122,
                y - 40,
                40,
                36,
                "−",
                0x6a3a52,
                () => this.removeScoop(i),
                "18px",
              );
              this.dispenser.push({ emoji, name, keyhint, addBtn, remBtn });
            });

            // ── Action row ──
            this.serveBtn = this.makeBtn(
              512,
              700,
              240,
              60,
              "\u{1F379} SERVE",
              0xf6c343,
              () => this.serve(),
              "24px",
              0x1a0d35,
            );
            this.undoBtn = this.makeBtn(
              300,
              700,
              150,
              50,
              "↶ Undo all",
              0x4a2d70,
              () => this.clearTubes(),
              "16px",
            );
            this.hintBtn = this.makeBtn(
              724,
              700,
              150,
              50,
              "\u{1F4A1} Hint",
              0x4a2d70,
              () => this.showHint(),
              "16px",
            );
            this.feedback = this.add
              .text(512, 656, "", {
                fontSize: "16px",
                fontFamily: "Arial",
                fontStyle: "bold",
                color: "#fff",
                align: "center",
                wordWrap: { width: 520 },
              })
              .setOrigin(0.5);

            // keyboard
            this.input.keyboard.on("keydown", (e) => {
              if (e.key === "1") this.addScoop(0);
              else if (e.key === "2") this.addScoop(1);
              else if (e.key === "Backspace") {
                e.preventDefault?.();
                this.removeScoop(this.counts[1] >= this.counts[0] ? 1 : 0);
              } else if (e.key === "Enter") this.serve();
              else if (e.key.toLowerCase() === "h") this.showHint();
            });

            this.loadRound();
          }

          makeBtn(
            x,
            y,
            w,
            h,
            label,
            color,
            cb,
            fs = "18px",
            txtColor = 0xffffff,
          ) {
            const r = this.add
              .rectangle(x, y, w, h, color)
              .setStrokeStyle(2, 0x000000, 0.25)
              .setInteractive({ useHandCursor: true });
            const t = this.add
              .text(x, y, label, {
                fontSize: fs,
                fontFamily: "Arial Black",
                color: Phaser.Display.Color.IntegerToColor(txtColor).rgba,
              })
              .setOrigin(0.5);
            r.on("pointerover", () => r.setScale(1.05));
            r.on("pointerout", () => r.setScale(1));
            r.on("pointerdown", () => {
              ensureAudio();
              cb();
            });
            r._t = t;
            return r;
          }

          loadRound() {
            this.round = makeRound(this.tier, this.roundIx);
            const r = this.round;
            this.counts = [r.preseed[0], r.preseed[1]];
            this.attempts = 0;
            this.feedback.setText("");

            // customer + order
            this.customer.setText(
              pick([
                "\u{1F466}",
                "\u{1F467}",
                "\u{1F469}",
                "\u{1F468}",
                "\u{1F475}",
                "\u{1F474}",
                "\u{1F9D1}",
                "\u{1F471}",
              ]),
            );
            this.orderRatio.setText(`${r.a} : ${r.b}`);
            this.orderRatio.setColor("#fff");
            this.orderLegend.setText(
              `${r.ia.emoji} ${r.ia.name}  ${r.a}\n${r.ib.emoji} ${r.ib.name}  ${r.b}`,
            );

            // task text per type
            let task = "";
            if (r.type === "make")
              task = `Pour a drink that is\n${r.a} ${r.ia.name} to ${r.b} ${r.ib.name}.`;
            else if (r.type === "batch")
              task = `BIG BATCH: fill to ${r.capacity} scoops total,\nkeeping the ratio ${r.a} : ${r.b}.`;
            else if (r.type === "missing")
              task = `${r.preseed[0]} ${r.ia.name} are already poured.\nAdd ${r.ib.name} to keep ${r.a} : ${r.b}.`;
            this.orderTask.setText(task);

            // fill-line note
            this.fillNote.setText(
              r.capacity ? `Fill line: ${r.capacity} scoops total` : "",
            );

            // dispensers
            [0, 1].forEach((i) => {
              const ing = i === 0 ? r.ia : r.ib;
              const d = this.dispenser[i];
              d.emoji.setText(ing.emoji);
              d.name.setText(ing.name);
              d.keyhint.setText(`key ${i + 1}`);
              const locked = r.locked && i === 0;
              d.addBtn.setAlpha(locked ? 0.35 : 1).setData("locked", locked);
              d.remBtn.setAlpha(locked ? 0.35 : 1).setData("locked", locked);
              d.addBtn.fillColor = locked ? 0x3a2f50 : 0x2e7d46;
            });

            this.updateHUD();
            this.redrawTubes(true);
          }

          ingColor(i) {
            return (i === 0 ? this.round.ia : this.round.ib).color;
          }

          addScoop(i) {
            const r = this.round;
            if (r.locked && i === 0) {
              sfxWrong();
              this.flash(
                this.feedback,
                "That ingredient is already poured — add the other one.",
              );
              return;
            }
            const total = this.counts[0] + this.counts[1];
            if (
              this.counts[i] >= TUBE_MAX ||
              (r.capacity && total >= r.capacity + 2)
            ) {
              sfxWrong();
              this.flash(
                this.feedback,
                r.capacity
                  ? "Tube is overflowing — remove some scoops."
                  : "That tube is full.",
              );
              return;
            }
            this.counts[i]++;
            sfxScoop();
            this.redrawTubes();
            this.checkOverfill();
          }
          removeScoop(i) {
            const r = this.round;
            if (r.locked && i === 0) {
              sfxWrong();
              return;
            }
            if (this.counts[i] <= (r.preseed[i] || 0)) {
              sfxWrong();
              return;
            }
            this.counts[i]--;
            sfxRemove();
            this.redrawTubes();
            this.feedback.setText("");
          }
          clearTubes() {
            sfxClick();
            this.counts = [this.round.preseed[0], this.round.preseed[1]];
            this.feedback.setText("");
            this.redrawTubes();
          }

          checkOverfill() {
            const r = this.round,
              total = this.counts[0] + this.counts[1];
            if (r.capacity && total > r.capacity)
              this.flash(
                this.feedback,
                `Over the fill line (${total} > ${r.capacity}). Remove ${total - r.capacity}.`,
                "#ffb4b4",
              );
          }

          redrawTubes(full) {
            const g = this.tubeGfx;
            g.clear();
            this.scoopLayer.removeAll(true);
            // draw glass shells
            this.tubeX.forEach((x) => {
              g.fillStyle(C.glass, 1);
              g.fillRoundedRect(
                x - this.tubeW / 2,
                this.tubeBottom - this.tubeMaxH,
                this.tubeW,
                this.tubeMaxH,
                8,
              );
              g.lineStyle(3, C.stroke, 1);
              g.strokeRoundedRect(
                x - this.tubeW / 2,
                this.tubeBottom - this.tubeMaxH,
                this.tubeW,
                this.tubeMaxH,
                8,
              );
            });
            // scoops
            [0, 1].forEach((i) => {
              const x = this.tubeX[i],
                color = this.ingColor(i);
              const preset = this.round.preseed[i] || 0;
              for (let s = 0; s < this.counts[i]; s++) {
                const y =
                  this.tubeBottom - s * this.scoopH - this.scoopH / 2 - 3;
                const rect = this.add
                  .rectangle(x, y, this.tubeW - 12, this.scoopH - 4, color)
                  .setStrokeStyle(1, 0x000000, 0.28);
                if (s < preset) rect.setStrokeStyle(2, C.white, 0.5); // mark pre-poured (locked)
                this.scoopLayer.add(rect);
              }
            });
            // fill line
            this.fillLine.clear();
            if (this.round.capacity) {
              // a "total scoops" gauge to the right of the tubes
              const need = this.round.capacity;
              const gx = 612,
                gTop = this.tubeBottom - this.tubeMaxH,
                gH = this.tubeMaxH;
              this.fillLine
                .fillStyle(C.glass, 1)
                .fillRoundedRect(gx, gTop, 26, gH, 6);
              this.fillLine
                .lineStyle(2, C.stroke, 1)
                .strokeRoundedRect(gx, gTop, 26, gH, 6);
              const total = this.counts[0] + this.counts[1];
              const fillH = Math.min(total / TUBE_MAX, 1) * gH;
              const ok = total === need;
              this.fillLine.fillStyle(
                ok ? C.green : total > need ? C.red : C.gold,
                0.9,
              );
              this.fillLine.fillRoundedRect(
                gx + 3,
                this.tubeBottom - fillH,
                20,
                fillH,
                4,
              );
              // target tick
              const ty = this.tubeBottom - Math.min(need / TUBE_MAX, 1) * gH;
              this.fillLine.lineStyle(3, C.white, 0.95).beginPath();
              this.fillLine.moveTo(gx - 4, ty);
              this.fillLine.lineTo(gx + 30, ty);
              this.fillLine.strokePath();
            }
            // labels
            this.tubeLabel[0].setText(
              `${this.round.ia.emoji}\n${this.counts[0]}`,
            );
            this.tubeLabel[1].setText(
              `${this.round.ib.emoji}\n${this.counts[1]}`,
            );
            const [ca, cb] = this.counts;
            this.liveRatio.setText(`You: ${ca} : ${cb}`);
            const match = crossMatch(ca, cb, this.round.a, this.round.b);
            this.liveRatio.setColor(match ? "#2ec26b" : "#9b86c9");
          }

          serve() {
            const r = this.round,
              [ca, cb] = this.counts;
            const total = ca + cb;
            const ratioOk = crossMatch(ca, cb, r.a, r.b);
            const capOk = !r.capacity || total === r.capacity;

            if (ratioOk && capOk) {
              this.onCorrect();
              return;
            }

            // ── diagnostic, non-giveaway failure ──
            sfxWrong();
            this.attempts++;
            this.streak = 0;
            this.cameras.main.shake(160, 0.006);
            let msg;
            if (ca === 0 || cb === 0)
              msg = "Add some of BOTH ingredients first.";
            else if (!ratioOk)
              msg = `That's ${ca}:${cb}. Is ${ca}:${cb} equivalent to ${r.a}:${r.b}? Check by multiplying.`;
            else if (r.capacity && total < r.capacity)
              msg = `Ratio is right! Now reach the fill line — ${r.capacity} scoops total (you have ${total}).`;
            else if (r.capacity && total > r.capacity)
              msg = `Right ratio, but over the fill line. Remove ${total - r.capacity}.`;
            else msg = "Not quite — compare your tubes to the order.";
            this.flash(this.feedback, "❌ " + msg, "#ffb4b4");
            this.orderRatio.setColor("#ffd34d");

            // a wrong serve costs a life only after a nudge, so support tier stays gentle
            if (this.attempts >= (this.tier === 1 ? 3 : 2)) {
              this.lives--;
              this.attempts = 0;
              if (this.lives <= 0) {
                this.updateHUD();
                this.time.delayedCall(900, () => this.endGame());
                return;
              }
            }
            this.updateHUD();
          }

          onCorrect() {
            sfxServe();
            this.correct++;
            this.served++;
            this.streak++;
            if (this.streak > this.bestStreak) this.bestStreak = this.streak;
            const combo = Math.min(4, 1 + Math.floor(this.streak / 3));
            const firstTry = this.attempts === 0 ? 60 : 0;
            const pts = (100 + firstTry + this.streak * 8) * combo;
            this.score += pts;
            this.orderRatio.setColor("#2ec26b");
            this.flash(
              this.feedback,
              `✅ Perfect! ${this.counts[0]}:${this.counts[1]} = ${this.round.a}:${this.round.b}  +${pts}${combo > 1 ? " x" + combo : ""}`,
              "#bff7cf",
            );
            this.popServe();

            if (this.correct % 4 === 0) {
              this.level++;
              sfxLevel();
            }
            this.updateHUD();

            const done = this.served >= (this.tier === 1 ? 10 : 12);
            this.time.delayedCall(1100, () => {
              if (done) this.endGame();
              else {
                this.roundIx++;
                this.loadRound();
              }
            });
          }

          popServe() {
            const cup = this.add
              .text(512, 560, "\u{1F379}", { fontSize: "54px" })
              .setOrigin(0.5);
            this.tweens.add({
              targets: cup,
              y: 168,
              x: 176,
              scale: 0.4,
              alpha: 0,
              duration: 850,
              ease: "Cubic.easeIn",
              onComplete: () => cup.destroy(),
            });
            for (let i = 0; i < 18; i++) {
              const p = this.add.circle(
                512,
                520,
                3 + Math.random() * 3,
                [C.gold, C.green, INGREDIENTS[0].color, INGREDIENTS[1].color][
                  rnd(4)
                ],
              );
              this.tweens.add({
                targets: p,
                x: 512 + (Math.random() - 0.5) * 320,
                y: 520 + (Math.random() - 0.5) * 220,
                alpha: 0,
                scale: 0,
                duration: 600 + Math.random() * 400,
                onComplete: () => p.destroy(),
              });
            }
          }

          showHint() {
            sfxClick();
            const r = this.round;
            let h;
            if (r.type === "missing")
              h = `\u{1F4A1} The rule is ${r.a} ${r.ia.name} : ${r.b} ${r.ib.name}. You have ${this.counts[0]} ${r.ia.name} — that's ${this.counts[0] / r.a} group${this.counts[0] / r.a === 1 ? "" : "s"} of the rule.`;
            else if (r.type === "batch")
              h = `\u{1F4A1} Each "group" is ${r.a}+${r.b}=${r.a + r.b} scoops. How many groups make ${r.capacity}? Add that many of each.`;
            else
              h = `\u{1F4A1} For every ${r.a} ${r.ia.name}, add ${r.b} ${r.ib.name}. Keep the same number of groups in each tube.`;
            this.flash(this.feedback, h, "#ffe9a8", 3200);
          }

          flash(obj, msg, color = "#ffffff", hold = 2400) {
            obj.setText(msg).setColor(color).setAlpha(1);
            this.tweens.killTweensOf(obj);
            this.tweens.add({
              targets: obj,
              alpha: 1,
              duration: 10,
              onComplete: () => {
                this.time.delayedCall(hold, () => {
                  if (obj.text === msg)
                    this.tweens.add({
                      targets: obj,
                      alpha: 0.0,
                      duration: 400,
                    });
                });
              },
            });
          }

          updateHUD() {
            this.hScore.setText(this.score.toLocaleString());
            this.hLevel.setText("Level " + this.level);
            this.hServed.setText("Served " + this.served);
            this.hLives.setText("❤️".repeat(Math.max(0, this.lives)));
            this.hStreak.setText(
              this.streak >= 3 ? "\u{1F525} streak " + this.streak : "",
            );
          }

          endGame() {
            this.cameras.main.fadeOut(450, 0, 0, 0);
            this.time.delayedCall(450, () =>
              this.scene.start("ResultScene", {
                tier: this.tier,
                score: this.score,
                correct: this.correct,
                served: this.served,
                bestStreak: this.bestStreak,
                level: this.level,
              }),
            );
          }
        }

        // ════════════════════════════════════════════════════════════════
        //  RESULT SCENE
        // ════════════════════════════════════════════════════════════════
        class ResultScene extends Phaser.Scene {
          constructor() {
            super("ResultScene");
          }
          init(d) {
            Object.assign(this, d);
          }
          create() {
            this.cameras.main.setBackgroundColor(C.bg);
            this.cameras.main.fadeIn(450);
            const goal = this.tier === 1 ? 10 : 12;
            const pct = goal > 0 ? Math.round((this.correct / goal) * 100) : 0;

            try {
              window.EduPulse &&
                EduPulse.record({
                  activityTitle: document.title,
                  score: this.correct,
                  maxScore: goal,
                  problemsCorrect: this.correct,
                  problemsAttempted: this.served,
                  standard: "6.RP.A.1",
                });
            } catch (e) {}

            let rank, emoji;
            if (pct >= 90) {
              rank = "MASTER MIXOLOGIST!";
              emoji = "\u{1F451}";
            } else if (pct >= 75) {
              rank = "HEAD CHEF!";
              emoji = "\u{1F3C6}";
            } else if (pct >= 50) {
              rank = "LINE COOK";
              emoji = "⭐";
            } else {
              rank = "KEEP PRACTICING!";
              emoji = "\u{1F4DA}";
            }

            this.add
              .text(W / 2, 110, emoji, { fontSize: "76px" })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 196, "KITCHEN CLOSED", {
                fontSize: "46px",
                fontFamily: "Arial Black",
                color: "#f6c343",
                stroke: "#000",
                strokeThickness: 4,
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 250, rank, {
                fontSize: "24px",
                fontFamily: "Arial",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 312, this.score.toLocaleString(), {
                fontSize: "58px",
                fontFamily: "Arial Black",
                color: "#f6c343",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 352, "POINTS", {
                fontSize: "13px",
                color: "#8a76bf",
              })
              .setOrigin(0.5);

            const stats = [
              { l: "Drinks served", v: `${this.correct}/${goal}` },
              { l: "Best streak", v: this.bestStreak },
              { l: "Level reached", v: this.level },
            ];
            stats.forEach((s, i) => {
              const x = 282 + i * 230,
                y = 440;
              this.add
                .rectangle(x, y, 200, 96, C.panel)
                .setStrokeStyle(2, C.stroke);
              this.add
                .text(x, y - 12, String(s.v), {
                  fontSize: "30px",
                  fontFamily: "Arial Black",
                  color: "#f6c343",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 26, s.l, { fontSize: "13px", color: "#c9b6ff" })
                .setOrigin(0.5);
            });

            const again = this.add
              .rectangle(W / 2 - 130, 580, 240, 58, C.gold)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2 - 130, 580, "COOK AGAIN", {
                fontSize: "22px",
                fontFamily: "Arial Black",
                color: "#1a0d35",
              })
              .setOrigin(0.5);
            again.on("pointerdown", () => {
              ensureAudio();
              sfxClick();
              this.scene.start("GameScene", { tier: this.tier });
            });
            again.on("pointerover", () => again.setScale(1.05));
            again.on("pointerout", () => again.setScale(1));

            const menu = this.add
              .rectangle(W / 2 + 130, 580, 240, 58, C.panel)
              .setStrokeStyle(2, C.stroke)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2 + 130, 580, "CHANGE LEVEL", {
                fontSize: "20px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);
            menu.on("pointerdown", () => {
              ensureAudio();
              sfxClick();
              this.scene.start("TitleScene");
            });
            menu.on("pointerover", () => menu.setScale(1.05));
            menu.on("pointerout", () => menu.setScale(1));

            for (let i = 0; i < 28; i++) {
              const p = this.add
                .circle(
                  Math.random() * W,
                  Math.random() * H,
                  2 + Math.random() * 3,
                  [C.gold, INGREDIENTS[0].color, INGREDIENTS[1].color, C.green][
                    rnd(4)
                  ],
                )
                .setAlpha(0.7);
              this.tweens.add({
                targets: p,
                y: p.y - 200 - Math.random() * 300,
                alpha: 0,
                duration: 2000 + Math.random() * 2000,
                delay: Math.random() * 1000,
                repeat: -1,
                ease: "Power1",
              });
            }
          }
        }

        // ─── BOOT ───
        new Phaser.Game({
          type: Phaser.AUTO,
          parent: "game-container",
          width: W,
          height: H,
          backgroundColor: "#14082a",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          scene: [TitleScene, GameScene, ResultScene],
        });
      })();
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>

    <script src="/assets/edupulse-bridge.js"></script>

    <script src="/shared/save-resume/save-resume-engine.js" defer></script>

  <script src="/assets/game-fx.js" defer></script>
