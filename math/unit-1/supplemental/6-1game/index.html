<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="/assets/shared.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fraction Dungeon — Unit 1 RPG</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
      // CDN fallback: if the primary CDN failed, synchronously load Phaser from a mirror
      // (document.write blocks parsing so the mirror is ready before the game script runs).
      if (typeof Phaser === "undefined") {
        document.write(
          '<script src="https://unpkg.com/phaser@3.80.1/dist/phaser.min.js"><\/script>',
        );
      }
      // If both CDNs are unreachable, show a clear message instead of a blank page.
      window.addEventListener("load", function () {
        if (typeof Phaser === "undefined") {
          document.body.innerHTML =
            '<div style="font:600 18px/1.5 system-ui,sans-serif;padding:2rem;max-width:32rem;margin:3rem auto;text-align:center;color:#12355b">⚠️ This game needs an internet connection to load. Please check your connection and refresh the page.</div>';
        }
      });
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0b0c10;
        overflow: hidden;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
      }
    </style>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <link rel="stylesheet" href="/shared/save-resume/save-resume-styles.css" />
    <!-- nsr-injected:end -->
  </head>
  <body>
    <div id="game-container"></div>
    <script>
      (() => {
        // ════════════════════════════════════════════════════════════════
        //  FRACTION DUNGEON — "Tile the Corridor" — 6.NS.A.1
        //  The MATH IS THE MECHANIC: fraction division is felt as MEASUREMENT.
        //  A corridor is drawn as a measured bar of length L (e.g. 3 units).
        //  You drag/place identical segment-tiles of length 1/d (e.g. 3/4)
        //  to physically TILE the hall. The door opens ONLY when the tiles
        //  EXACTLY cover the length — no gap, no overshoot. So "3 ÷ 3/4 = 4"
        //  is felt as "four 3/4-tiles fill a 3-length hall." The monster's
        //  HP decrements by the FRACTION of the corridor you've covered
        //  (graduated feedback, not binary). No A/B/C/D — you build the answer.
        //  Variants: scoops filling a cup (mixed numbers) and 15-min time
        //  blocks filling a named fraction of an hour (unit conversion).
        // ════════════════════════════════════════════════════════════════

        // ─── SOUND ENGINE ───
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let actx = null;
        function ensureAudio() {
          if (!actx && AudioCtx) actx = new AudioCtx();
          if (actx && actx.state === "suspended") actx.resume();
        }
        function beep(freq, dur, type = "sine", vol = 0.16) {
          if (!actx) return;
          const o = actx.createOscillator(),
            g = actx.createGain();
          o.connect(g);
          g.connect(actx.destination);
          o.frequency.value = freq;
          o.type = type;
          g.gain.setValueAtTime(vol, actx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
          o.start();
          o.stop(actx.currentTime + dur);
        }
        const sfxPlace = () =>
          beep(360 + Math.random() * 50, 0.06, "triangle", 0.12);
        const sfxRemove = () => beep(220, 0.07, "sine", 0.1);
        const sfxOpen = () => {
          beep(523, 0.09);
          setTimeout(() => beep(659, 0.09), 80);
          setTimeout(() => beep(880, 0.18), 170);
        };
        const sfxWrong = () => beep(150, 0.22, "square", 0.1);
        const sfxLevel = () =>
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => beep(f, 0.14), i * 90),
          );
        const sfxClick = () => beep(440, 0.05, "sine", 0.09);

        // ─── LAYOUT / PALETTE ───
        const W = 1024,
          H = 768;
        // Colourblind-safe: every state uses TEXT + ICON + shape, not colour alone.
        const C = {
          bg: 0x0b0c10,
          stone: 0x1c2230,
          stoneHi: 0x2a3346,
          gold: 0xf6c343,
          white: 0xffffff,
          dim: 0x9aa6c0,
          green: 0x2ec26b,
          red: 0xe7556b,
          floor: 0x141926,
          stroke: 0x3c4a66,
          tile: 0x4aa3ff, // a single colour for the player's tiles
          tileEdge: 0x0d2742,
        };

        // ─── MATH HELPERS ───
        const gcd = (a, b) => (b ? gcd(b, a % b) : a);
        const rnd = (n) => Math.floor(Math.random() * n);
        const pick = (arr) => arr[rnd(arr.length)];

        // Render a value num/den as a clean string: whole + proper fraction.
        function fracStr(num, den) {
          if (den === 1) return String(num);
          const g = gcd(num, den);
          num /= g;
          den /= g;
          if (den === 1) return String(num);
          const whole = Math.floor(num / den);
          const rem = num - whole * den;
          if (whole === 0) return `${rem}/${den}`;
          if (rem === 0) return String(whole);
          return `${whole} ${rem}/${den}`;
        }

        // ─── ROUND GENERATOR (solvability-verified; see _sim.mjs) ───
        // Every corridor length is an EXACT integer multiple of the tile, so the
        // quotient q is always a whole number and tiles tile the hall perfectly.
        const MAX_TILES = 12; // tiles must fit visibly across the corridor

        function makeRound(tier, index) {
          let type, tileNum, tileDen, q, corridorN, corridorD;

          if (tier === 1) {
            // Level 1: UNIT-fraction tiles 1/d, whole-number-ish corridor. q = tiles.
            tileDen = pick([2, 3, 4]);
            tileNum = 1;
            q = 2 + rnd(MAX_TILES - 1); // 2..12 tiles → always fits
            corridorN = q * tileNum;
            corridorD = tileDen;
            type = index % 3 === 2 ? "time" : "tile";
          } else {
            // Level 2: non-unit fractions / mixed numbers, fewer guides.
            const variant = pick([
              "nonunit",
              "mixed",
              "time",
              "nonunit",
              "mixed",
            ]);
            if (variant === "nonunit") {
              const d = pick([3, 4, 5, 6, 8]);
              let n = 2 + rnd(Math.max(1, d - 2));
              if (n >= d) n = d - 1;
              const g = gcd(n, d);
              tileNum = n / g;
              tileDen = d / g;
              q = 2 + rnd(MAX_TILES - 1);
              corridorN = q * tileNum;
              corridorD = tileDen;
              type = "tile";
            } else if (variant === "mixed") {
              tileDen = pick([2, 3, 4]);
              tileNum = 1;
              q = 3 + rnd(MAX_TILES - 2);
              corridorN = q * tileNum;
              corridorD = tileDen;
              type = "tile";
            } else {
              tileDen = pick([2, 3, 4]);
              tileNum = 1;
              q = 2 + rnd(MAX_TILES - 1);
              corridorN = q * tileNum;
              corridorD = tileDen;
              type = "time";
            }
          }

          // Invariant guard: corridor must be an exact multiple of the tile.
          // (corridorN/corridorD) ÷ (tileNum/tileDen) === q, integer.
          const num = corridorN * tileDen,
            den = corridorD * tileNum;
          if (num % den !== 0 || num / den !== q) {
            // self-heal to the canonical unit-fraction case (never ships a bad round)
            tileNum = 1;
            tileDen = pick([2, 3, 4]);
            q = 2 + rnd(MAX_TILES - 1);
            corridorN = q;
            corridorD = tileDen;
          }

          const cg = gcd(corridorN, corridorD);
          return {
            tier,
            type,
            tileNum,
            tileDen,
            q, // exact number of tiles that fill the hall
            corridorN,
            corridorD,
            dispN: corridorN / cg,
            dispD: corridorD / cg,
          };
        }

        // ════════════════════════════════════════════════════════════════
        //  TITLE SCENE — real Level 1 (Support) vs Level 2 (Challenge)
        // ════════════════════════════════════════════════════════════════
        class TitleScene extends Phaser.Scene {
          constructor() {
            super("TitleScene");
          }
          create() {
            this.cameras.main.setBackgroundColor(C.bg);
            this.add
              .text(W / 2, 96, "FRACTION DUNGEON", {
                fontSize: "62px",
                fontFamily: "Arial Black, sans-serif",
                color: "#f6c343",
                stroke: "#000",
                strokeThickness: 7,
              })
              .setOrigin(0.5);
            this.add
              .text(
                W / 2,
                150,
                "6.NS.A.1 — Tile the corridor to open the door",
                {
                  fontSize: "20px",
                  fontFamily: "Arial",
                  color: "#bcd0ff",
                },
              )
              .setOrigin(0.5);
            this.add
              .text(
                W / 2,
                204,
                "Each hall has a measured LENGTH. Lay down equal tiles of size 1/d\n" +
                  "until they exactly cover it — no gap, no overflow. The number of\n" +
                  "tiles that fit IS the answer to “length ÷ tile size.”",
                {
                  fontSize: "16px",
                  fontFamily: "Arial",
                  color: "#9aa6c0",
                  align: "center",
                  lineSpacing: 6,
                },
              )
              .setOrigin(0.5);

            this.drawDemo(W / 2, 400);

            const tiers = [
              {
                t: 1,
                label: "Level 1",
                sub: "Support",
                desc: "Unit fractions (1/2, 1/3, 1/4) · gridlines shown · 5 keys",
                col: C.green,
              },
              {
                t: 2,
                label: "Level 2",
                sub: "Challenge",
                desc: "Non-unit & mixed numbers · fewer guides · 3 keys",
                col: C.gold,
              },
            ];
            tiers.forEach((d, i) => {
              const x = W / 2 + (i === 0 ? -200 : 200),
                y = 588;
              const card = this.add
                .rectangle(x, y, 322, 132, C.stone)
                .setStrokeStyle(3, C.stroke)
                .setInteractive({ useHandCursor: true });
              this.add
                .text(x, y - 40, d.label, {
                  fontSize: "30px",
                  fontFamily: "Arial Black",
                  color: "#fff",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y - 10, d.sub, {
                  fontSize: "16px",
                  fontFamily: "Arial",
                  color: Phaser.Display.Color.IntegerToColor(d.col).rgba,
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 30, d.desc, {
                  fontSize: "12.5px",
                  fontFamily: "Arial",
                  color: "#bcd0ff",
                  align: "center",
                  wordWrap: { width: 296 },
                })
                .setOrigin(0.5);
              card.on("pointerover", () => {
                card.setStrokeStyle(3, d.col);
                card.setScale(1.04);
              });
              card.on("pointerout", () => {
                card.setStrokeStyle(3, C.stroke);
                card.setScale(1);
              });
              card.on("pointerdown", () => {
                ensureAudio();
                sfxClick();
                this.cameras.main.fadeOut(350, 0, 0, 0);
                this.time.delayedCall(350, () =>
                  this.scene.start("GameScene", { tier: d.t }),
                );
              });
            });

            this.add
              .text(
                W / 2,
                704,
                "Touch: tap the tile bin to lay a tile, tap a placed tile to lift it.  " +
                  "Keyboard: SPACE/→ lay a tile · ←/Backspace lift · Enter opens the door · H = hint",
                { fontSize: "12px", color: "#6f7ba0", align: "center" },
              )
              .setOrigin(0.5);
            this.cameras.main.fadeIn(400);
          }
          drawDemo(cx, cy) {
            // 3-length hall tiled by four 3/4 tiles → 3 ÷ 3/4 = 4
            const barW = 360,
              x0 = cx - barW / 2;
            this.add
              .rectangle(cx, cy, barW + 8, 46, C.floor)
              .setStrokeStyle(2, C.stroke);
            for (let s = 0; s < 4; s++) {
              this.add
                .rectangle(
                  x0 + 6 + s * (barW / 4),
                  cy,
                  barW / 4 - 6,
                  36,
                  C.tile,
                )
                .setOrigin(0, 0.5)
                .setStrokeStyle(2, C.tileEdge);
            }
            this.add
              .text(cx, cy - 44, "Hall length 3", {
                fontSize: "15px",
                color: "#9aa6c0",
              })
              .setOrigin(0.5);
            this.add
              .text(cx, cy + 44, "4 tiles of 3/4 fill it  →  3 ÷ 3/4 = 4", {
                fontSize: "18px",
                fontFamily: "Arial Black",
                color: "#f6c343",
              })
              .setOrigin(0.5);
          }
        }

        // ════════════════════════════════════════════════════════════════
        //  GAME SCENE
        // ════════════════════════════════════════════════════════════════
        class GameScene extends Phaser.Scene {
          constructor() {
            super("GameScene");
          }
          init(data) {
            this.tier = data.tier || 1;
          }

          create() {
            this.cameras.main.setBackgroundColor(C.bg);
            this.cameras.main.fadeIn(350);

            // ── state ──
            this.score = 0;
            this.streak = 0;
            this.bestStreak = 0;
            this.cleared = 0; // corridors cleared
            this.correct = 0;
            this.attempts = 0;
            this.lives = this.tier === 1 ? 5 : 3;
            this.depth = 1;
            this.roundIx = 0;
            this.placed = 0; // tiles currently laid down

            // ── backdrop: dungeon ──
            this.add.rectangle(W / 2, H / 2, W, H, C.bg);
            this.add.rectangle(W / 2, 690, W, 156, C.floor);

            // HUD
            this.add.rectangle(W / 2, 28, W, 56, 0x06070b, 0.96);
            this.hScore = this.add.text(24, 14, "0", {
              fontSize: "26px",
              fontFamily: "Arial Black",
              color: "#f6c343",
            });
            this.add.text(26, 42, "GOLD", {
              fontSize: "10px",
              color: "#7e8ab0",
            });
            this.hDepth = this.add
              .text(W / 2, 12, "Depth 1", {
                fontSize: "16px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5, 0);
            this.hCleared = this.add
              .text(W / 2, 36, "Cleared 0", {
                fontSize: "12px",
                color: "#9aa6c0",
              })
              .setOrigin(0.5, 0);
            this.hLives = this.add
              .text(W - 24, 16, "", { fontSize: "20px" })
              .setOrigin(1, 0);
            this.hStreak = this.add
              .text(W - 24, 42, "", { fontSize: "13px", color: "#f6c343" })
              .setOrigin(1, 0);

            // ── Quest card (left) ──
            this.add
              .rectangle(168, 250, 290, 332, C.stone)
              .setStrokeStyle(3, C.stroke);
            this.add
              .text(168, 116, "\u{1F5FA}️ QUEST", {
                fontSize: "18px",
                fontFamily: "Arial Black",
                color: "#f6c343",
              })
              .setOrigin(0.5);
            this.monster = this.add
              .text(168, 168, "", { fontSize: "52px" })
              .setOrigin(0.5);
            this.questLen = this.add
              .text(168, 226, "", {
                fontSize: "30px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.questTile = this.add
              .text(168, 268, "", {
                fontSize: "18px",
                fontFamily: "Arial",
                color: "#bcd0ff",
              })
              .setOrigin(0.5);
            this.questTask = this.add
              .text(168, 330, "", {
                fontSize: "14px",
                fontFamily: "Arial",
                fontStyle: "bold",
                color: "#ffe9a8",
                align: "center",
                wordWrap: { width: 262 },
                lineSpacing: 4,
              })
              .setOrigin(0.5);

            // ── Corridor (center) ──
            this.barX = 360; // left edge of corridor bar
            this.barW = 540; // px width of the full corridor length
            this.barY = 300;
            this.barH = 88;
            this.corridorGfx = this.add.graphics();
            this.gridGfx = this.add.graphics();
            this.tileLayer = this.add.container();
            this.doorGfx = this.add.graphics();

            // coverage read-out under the corridor
            this.coverNote = this.add
              .text(630, 408, "", {
                fontSize: "17px",
                fontFamily: "Arial",
                fontStyle: "bold",
                color: "#9aa6c0",
                align: "center",
              })
              .setOrigin(0.5);

            // monster HP bar (decrements by fraction covered)
            this.add
              .text(630, 196, "MONSTER HP", {
                fontSize: "13px",
                fontFamily: "Arial Black",
                color: "#e7a0ad",
              })
              .setOrigin(0.5);
            this.hpGfx = this.add.graphics();
            this.hpLabel = this.add
              .text(630, 168, "", {
                fontSize: "14px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);

            // ── Tile bin (right) ──
            this.add
              .rectangle(630, 540, 300, 150, C.stone)
              .setStrokeStyle(3, C.stroke);
            this.add
              .text(630, 488, "TILE BIN — equal pieces", {
                fontSize: "14px",
                fontFamily: "Arial Black",
                color: "#bcd0ff",
              })
              .setOrigin(0.5);
            this.binTile = this.add
              .rectangle(630, 540, 150, 44, C.tile)
              .setStrokeStyle(3, C.tileEdge)
              .setInteractive({ useHandCursor: true });
            this.binTileLbl = this.add
              .text(630, 540, "", {
                fontSize: "18px",
                fontFamily: "Arial Black",
                color: "#06121f",
              })
              .setOrigin(0.5);
            this.binTile.on("pointerover", () => this.binTile.setScale(1.05));
            this.binTile.on("pointerout", () => this.binTile.setScale(1));
            this.binTile.on("pointerdown", () => {
              ensureAudio();
              this.placeTile();
            });
            this.add
              .text(630, 580, "Tap to LAY one tile into the hall", {
                fontSize: "12px",
                color: "#7e8ab0",
              })
              .setOrigin(0.5);

            // ── Action buttons ──
            this.openBtn = this.makeBtn(
              630,
              700,
              240,
              56,
              "\u{1F6AA} OPEN DOOR",
              0xf6c343,
              () => this.tryOpen(),
              "22px",
              0x1a0d35,
            );
            this.liftBtn = this.makeBtn(
              405,
              700,
              150,
              48,
              "↩ Lift tile",
              0x35406a,
              () => this.liftTile(),
              "15px",
            );
            this.hintBtn = this.makeBtn(
              855,
              700,
              140,
              48,
              "\u{1F4A1} Hint",
              0x35406a,
              () => this.showHint(),
              "15px",
            );

            this.feedback = this.add
              .text(630, 444, "", {
                fontSize: "16px",
                fontFamily: "Arial",
                fontStyle: "bold",
                color: "#fff",
                align: "center",
                wordWrap: { width: 560 },
              })
              .setOrigin(0.5);

            // ── keyboard ──
            this.input.keyboard.on("keydown", (e) => {
              const k = e.key;
              if (k === " " || k === "ArrowRight") {
                e.preventDefault?.();
                this.placeTile();
              } else if (k === "ArrowLeft" || k === "Backspace") {
                e.preventDefault?.();
                this.liftTile();
              } else if (k === "Enter") this.tryOpen();
              else if (k.toLowerCase() === "h") this.showHint();
            });

            this.loadRound();
          }

          makeBtn(
            x,
            y,
            w,
            h,
            label,
            color,
            cb,
            fs = "18px",
            txtColor = 0xffffff,
          ) {
            const r = this.add
              .rectangle(x, y, w, h, color)
              .setStrokeStyle(2, 0x000000, 0.25)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(x, y, label, {
                fontSize: fs,
                fontFamily: "Arial Black",
                color: Phaser.Display.Color.IntegerToColor(txtColor).rgba,
              })
              .setOrigin(0.5);
            r.on("pointerover", () => r.setScale(1.05));
            r.on("pointerout", () => r.setScale(1));
            r.on("pointerdown", () => {
              ensureAudio();
              cb();
            });
            return r;
          }

          loadRound() {
            this.round = makeRound(this.tier, this.roundIx);
            const r = this.round;
            this.placed = 0;
            this.attempts = 0;
            this.feedback.setText("");

            // theme: dungeon (tile) vs clock (time)
            if (r.type === "time") {
              this.monster.setText("\u{1F570}️");
              const hallStr = fracStr(r.dispN, r.dispD);
              this.questLen.setText(hallStr + " hour");
              this.questTile.setText("Blocks of 15 min = 1/4 hour");
              // for a time round we relabel: tile is always 1/4 hour (15 min)
              r.tileNum = 1;
              r.tileDen = 4;
              r.corridorD = 4;
              r.corridorN = r.q; // q quarter-hours; recompute hall display
              const cg = gcd(r.corridorN, r.corridorD);
              r.dispN = r.corridorN / cg;
              r.dispD = r.corridorD / cg;
              this.questLen.setText(fracStr(r.dispN, r.dispD) + " hour");
              this.questTask.setText(
                "Lay 15-minute blocks end to end until they exactly fill " +
                  fracStr(r.dispN, r.dispD) +
                  " of an hour. How many blocks?",
              );
              this.binTileLbl.setText("15 min");
            } else {
              this.monster.setText(
                pick([
                  "\u{1F479}",
                  "\u{1F47E}",
                  "\u{1F432}",
                  "\u{1F9DF}",
                  "\u{1F47B}",
                ]),
              );
              this.questLen.setText("Hall = " + fracStr(r.dispN, r.dispD));
              this.questTile.setText(
                "Tile size = " + fracStr(r.tileNum, r.tileDen),
              );
              this.questTask.setText(
                "Lay " +
                  fracStr(r.tileNum, r.tileDen) +
                  " tiles end to end until they EXACTLY cover the " +
                  fracStr(r.dispN, r.dispD) +
                  "-length hall. No gap, no overflow.",
              );
              this.binTileLbl.setText(fracStr(r.tileNum, r.tileDen));
            }

            this.updateHUD();
            this.redraw();
          }

          // one tile spans (tileNum/tileDen) of a unit; corridor total length = corridorN/corridorD units.
          // px per unit:
          unitPx() {
            return (this.barW * this.round.corridorD) / this.round.corridorN; // barW spans the whole hall
          }
          tilePx() {
            // width of one tile in px = (tileNum/tileDen) units * unitPx
            const r = this.round;
            return this.barW / r.q; // exactly barW/q since q tiles fill the bar
          }

          placeTile() {
            const r = this.round;
            if (this.placed >= MAX_TILES + 2) {
              sfxWrong();
              this.flash(
                this.feedback,
                "The hall can't hold more tiles.",
                "#ffb4b4",
              );
              return;
            }
            this.placed++;
            sfxPlace();
            this.redraw();
            this.checkOvershoot();
          }
          liftTile() {
            if (this.placed <= 0) {
              sfxWrong();
              return;
            }
            this.placed--;
            sfxRemove();
            this.feedback.setText("");
            this.redraw();
          }

          checkOvershoot() {
            const r = this.round;
            if (this.placed > r.q)
              this.flash(
                this.feedback,
                "Those tiles stick out past the end of the hall — lift " +
                  (this.placed - r.q) +
                  ".",
                "#ffd9b4",
              );
          }

          redraw() {
            const r = this.round;
            const g = this.corridorGfx;
            g.clear();
            this.gridGfx.clear();
            this.doorGfx.clear();
            this.tileLayer.removeAll(true);

            const x0 = this.barX,
              y = this.barY,
              w = this.barW,
              h = this.barH;

            // corridor floor (measured bar of length L)
            g.fillStyle(C.floor, 1).fillRoundedRect(
              x0 - 4,
              y - h / 2 - 4,
              w + 8,
              h + 8,
              8,
            );
            g.lineStyle(3, C.stroke, 1).strokeRoundedRect(
              x0 - 4,
              y - h / 2 - 4,
              w + 8,
              h + 8,
              8,
            );

            // whole-unit measure ticks + labels (always)
            const units = r.corridorN / r.corridorD; // total length in units (may be fractional)
            const upx = w / units;
            for (let u = 0; u <= Math.ceil(units); u++) {
              const ux = x0 + Math.min(u, units) * upx;
              this.gridGfx.lineStyle(2, C.stroke, 0.9).beginPath();
              this.gridGfx.moveTo(ux, y - h / 2 - 4);
              this.gridGfx.lineTo(ux, y + h / 2 + 10);
              this.gridGfx.strokePath();
            }
            // unit number labels under the bar
            if (!this._unitLabels) this._unitLabels = [];
            this._unitLabels.forEach((t) => t.destroy());
            this._unitLabels = [];
            for (let u = 0; u <= Math.floor(units); u++) {
              const ux = x0 + u * upx;
              this._unitLabels.push(
                this.add
                  .text(ux, y + h / 2 + 22, String(u), {
                    fontSize: "13px",
                    color: "#7e8ab0",
                  })
                  .setOrigin(0.5),
              );
            }
            // end-of-hall marker
            this._unitLabels.push(
              this.add
                .text(x0 + w, y - h / 2 - 20, "END", {
                  fontSize: "12px",
                  fontFamily: "Arial Black",
                  color: "#f6c343",
                })
                .setOrigin(0.5),
            );

            // Level 1 (Support): faint gridlines at every tile boundary as a guide.
            if (this.tier === 1) {
              const tpx = w / r.q;
              for (let s = 1; s < r.q; s++) {
                const gx = x0 + s * tpx;
                this.gridGfx.lineStyle(1, C.stroke, 0.5).beginPath();
                this.gridGfx.moveTo(gx, y - h / 2);
                this.gridGfx.lineTo(gx, y + h / 2);
                this.gridGfx.strokePath();
              }
            }

            // placed tiles (each exactly w/q wide → they tile perfectly)
            const tpx = w / r.q;
            for (let s = 0; s < this.placed; s++) {
              const tx = x0 + s * tpx;
              const over = s >= r.q; // this tile pokes past the end
              const rect = this.add
                .rectangle(tx + 2, y, tpx - 4, h - 14, over ? C.red : C.tile)
                .setOrigin(0, 0.5)
                .setStrokeStyle(2, over ? 0x5a1020 : C.tileEdge)
                .setInteractive({ useHandCursor: true });
              rect.on("pointerdown", () => {
                ensureAudio();
                this.liftTile();
              });
              this.tileLayer.add(rect);
              // count chip on the tile
              this.tileLayer.add(
                this.add
                  .text(tx + tpx / 2, y, String(s + 1), {
                    fontSize: "13px",
                    fontFamily: "Arial Black",
                    color: "#06121f",
                  })
                  .setOrigin(0.5),
              );
            }

            // door at the end of the hall
            const doorOpen = this.placed === r.q;
            this.doorGfx.fillStyle(doorOpen ? C.green : C.stoneHi, 1);
            this.doorGfx.fillRoundedRect(
              x0 + w + 8,
              y - h / 2 - 4,
              22,
              h + 8,
              5,
            );
            this.doorGfx.lineStyle(2, doorOpen ? C.green : C.stroke, 1);
            this.doorGfx.strokeRoundedRect(
              x0 + w + 8,
              y - h / 2 - 4,
              22,
              h + 8,
              5,
            );

            // coverage read-out (felt fraction) — ICON + words, not colour alone
            const coveredUnits = this.placed * (r.tileNum / r.tileDen);
            const coverStr = fracStr(this.placed * r.tileNum, r.tileDen);
            let state;
            if (this.placed === 0)
              state = "Hall is empty — start laying tiles.";
            else if (this.placed < r.q)
              state = `△ Covered ${coverStr} of ${fracStr(r.dispN, r.dispD)} — a GAP remains. Add more.`;
            else if (this.placed === r.q)
              state = `✔ Exactly covered! ${this.placed} tiles = ${fracStr(r.dispN, r.dispD)}. Door is open.`;
            else
              state = `⚠ Overflow — tiles stick out past the END. Lift ${this.placed - r.q}.`;
            this.coverNote
              .setText(state)
              .setColor(
                this.placed === r.q
                  ? "#2ec26b"
                  : this.placed > r.q
                    ? "#ffb4b4"
                    : "#9aa6c0",
              );

            // monster HP = remaining fraction of hall NOT covered (graduated)
            this.drawHP(Math.min(this.placed, r.q) / r.q);
          }

          drawHP(coveredFrac) {
            const hp = Math.max(0, 1 - coveredFrac); // remaining
            const g = this.hpGfx;
            g.clear();
            const bx = 520,
              by = 210,
              bw = 220,
              bh = 18;
            g.fillStyle(0x06070b, 1).fillRoundedRect(bx, by, bw, bh, 5);
            g.lineStyle(2, C.stroke, 1).strokeRoundedRect(bx, by, bw, bh, 5);
            g.fillStyle(hp <= 0 ? C.green : C.red, 0.92);
            g.fillRoundedRect(
              bx + 2,
              by + 2,
              Math.max(0, (bw - 4) * hp),
              bh - 4,
              4,
            );
            this.hpLabel.setText(
              hp <= 0 ? "DEFEATED ✔" : Math.round(hp * 100) + "% HP",
            );
          }

          tryOpen() {
            const r = this.round;
            if (this.placed === r.q) {
              this.onCorrect();
              return;
            }
            // diagnostic, non-giveaway feedback that teaches the GROUPING method
            sfxWrong();
            this.attempts++;
            this.streak = 0;
            this.cameras.main.shake(150, 0.006);
            let msg;
            if (this.placed === 0)
              msg = "The door is sealed. Lay tiles to measure how many fit.";
            else if (this.placed < r.q)
              msg =
                "There's still a GAP at the end. Keep laying " +
                fracStr(r.tileNum, r.tileDen) +
                " tiles until they reach the END mark.";
            else
              msg =
                "Your tiles OVERSHOOT the end. Lift tiles until the last one stops exactly at the END.";
            this.flash(this.feedback, "❌ " + msg, "#ffb4b4");

            if (this.attempts >= (this.tier === 1 ? 3 : 2)) {
              this.lives--;
              this.attempts = 0;
              if (this.lives <= 0) {
                this.updateHUD();
                this.time.delayedCall(900, () => this.endGame());
                return;
              }
            }
            this.updateHUD();
          }

          onCorrect() {
            sfxOpen();
            this.correct++;
            this.cleared++;
            this.streak++;
            if (this.streak > this.bestStreak) this.bestStreak = this.streak;
            const r = this.round;
            const combo = Math.min(4, 1 + Math.floor(this.streak / 3));
            const firstTry = this.attempts === 0 ? 60 : 0;
            const pts = (100 + firstTry + this.streak * 8) * combo;
            this.score += pts;
            this.drawHP(1);
            this.flash(
              this.feedback,
              `✅ ${fracStr(r.dispN, r.dispD)} ÷ ${fracStr(r.tileNum, r.tileDen)} = ${r.q} tiles!  +${pts}${combo > 1 ? " x" + combo : ""}`,
              "#bff7cf",
            );
            this.popOpen();

            if (this.correct % 4 === 0) {
              this.depth++;
              sfxLevel();
            }
            this.updateHUD();

            const done = this.cleared >= (this.tier === 1 ? 10 : 12);
            this.time.delayedCall(1150, () => {
              if (done) this.endGame();
              else {
                this.roundIx++;
                this.loadRound();
              }
            });
          }

          popOpen() {
            const r = this.round;
            const hero = this.add
              .text(this.barX - 30, this.barY, "\u{1F9B8}", {
                fontSize: "44px",
              })
              .setOrigin(0.5);
            this.tweens.add({
              targets: hero,
              x: this.barX + this.barW + 20,
              duration: 950,
              ease: "Cubic.easeInOut",
              onComplete: () => hero.destroy(),
            });
            for (let i = 0; i < 18; i++) {
              const p = this.add.circle(
                this.barX + this.barW,
                this.barY,
                3 + Math.random() * 3,
                [C.gold, C.green, C.tile][rnd(3)],
              );
              this.tweens.add({
                targets: p,
                x: this.barX + this.barW + (Math.random() - 0.2) * 200,
                y: this.barY + (Math.random() - 0.5) * 200,
                alpha: 0,
                scale: 0,
                duration: 600 + Math.random() * 400,
                onComplete: () => p.destroy(),
              });
            }
          }

          showHint() {
            sfxClick();
            const r = this.round;
            const h =
              "\u{1F4A1} Ask: how many " +
              fracStr(r.tileNum, r.tileDen) +
              "-tiles fit in " +
              fracStr(r.dispN, r.dispD) +
              "? Lay one tile, see how far it reaches, then keep adding equal tiles until the last one lands on the END mark. You have " +
              this.placed +
              " down so far.";
            this.flash(this.feedback, h, "#ffe9a8", 3400);
          }

          flash(obj, msg, color = "#ffffff", hold = 2400) {
            obj.setText(msg).setColor(color).setAlpha(1);
            this.tweens.killTweensOf(obj);
            this.time.delayedCall(hold, () => {
              if (obj.text === msg)
                this.tweens.add({ targets: obj, alpha: 0.0, duration: 400 });
            });
          }

          updateHUD() {
            this.hScore.setText(this.score.toLocaleString());
            this.hDepth.setText("Depth " + this.depth);
            this.hCleared.setText("Cleared " + this.cleared);
            this.hLives.setText("\u{1F511}".repeat(Math.max(0, this.lives)));
            this.hStreak.setText(
              this.streak >= 3 ? "\u{1F525} streak " + this.streak : "",
            );
          }

          endGame() {
            this.cameras.main.fadeOut(450, 0, 0, 0);
            this.time.delayedCall(450, () =>
              this.scene.start("ResultScene", {
                tier: this.tier,
                score: this.score,
                correct: this.correct,
                cleared: this.cleared,
                bestStreak: this.bestStreak,
                depth: this.depth,
              }),
            );
          }
        }

        // ════════════════════════════════════════════════════════════════
        //  RESULT SCENE
        // ════════════════════════════════════════════════════════════════
        class ResultScene extends Phaser.Scene {
          constructor() {
            super("ResultScene");
          }
          init(d) {
            Object.assign(this, d);
          }
          create() {
            this.cameras.main.setBackgroundColor(C.bg);
            this.cameras.main.fadeIn(450);
            const goal = this.tier === 1 ? 10 : 12;
            const pct = goal > 0 ? Math.round((this.correct / goal) * 100) : 0;

            try {
              window.EduPulse &&
                EduPulse.record({
                  activityTitle: document.title,
                  score: this.correct,
                  maxScore: goal,
                  problemsCorrect: this.correct,
                  problemsAttempted: this.cleared,
                  standard: "6.NS.A.1",
                });
            } catch (e) {}

            let rank, emoji;
            if (pct >= 90) {
              rank = "DUNGEON MASTER!";
              emoji = "\u{1F451}";
            } else if (pct >= 75) {
              rank = "CORRIDOR CHAMPION!";
              emoji = "\u{1F3C6}";
            } else if (pct >= 50) {
              rank = "TILE APPRENTICE";
              emoji = "⭐";
            } else {
              rank = "KEEP DELVING!";
              emoji = "\u{1F4DA}";
            }

            this.add
              .text(W / 2, 110, emoji, { fontSize: "76px" })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 196, "DUNGEON CLEARED", {
                fontSize: "44px",
                fontFamily: "Arial Black",
                color: "#f6c343",
                stroke: "#000",
                strokeThickness: 4,
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 250, rank, {
                fontSize: "24px",
                fontFamily: "Arial",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 312, this.score.toLocaleString(), {
                fontSize: "58px",
                fontFamily: "Arial Black",
                color: "#f6c343",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 352, "GOLD", { fontSize: "13px", color: "#7e8ab0" })
              .setOrigin(0.5);

            const stats = [
              { l: "Halls tiled", v: `${this.correct}/${goal}` },
              { l: "Best streak", v: this.bestStreak },
              { l: "Depth reached", v: this.depth },
            ];
            stats.forEach((s, i) => {
              const x = 282 + i * 230,
                y = 440;
              this.add
                .rectangle(x, y, 200, 96, C.stone)
                .setStrokeStyle(2, C.stroke);
              this.add
                .text(x, y - 12, String(s.v), {
                  fontSize: "30px",
                  fontFamily: "Arial Black",
                  color: "#f6c343",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 26, s.l, { fontSize: "13px", color: "#bcd0ff" })
                .setOrigin(0.5);
            });

            const again = this.add
              .rectangle(W / 2 - 130, 580, 240, 58, C.gold)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2 - 130, 580, "DELVE AGAIN", {
                fontSize: "22px",
                fontFamily: "Arial Black",
                color: "#1a0d35",
              })
              .setOrigin(0.5);
            again.on("pointerdown", () => {
              ensureAudio();
              sfxClick();
              this.scene.start("GameScene", { tier: this.tier });
            });
            again.on("pointerover", () => again.setScale(1.05));
            again.on("pointerout", () => again.setScale(1));

            const menu = this.add
              .rectangle(W / 2 + 130, 580, 240, 58, C.stone)
              .setStrokeStyle(2, C.stroke)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2 + 130, 580, "CHANGE LEVEL", {
                fontSize: "20px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);
            menu.on("pointerdown", () => {
              ensureAudio();
              sfxClick();
              this.scene.start("TitleScene");
            });
            menu.on("pointerover", () => menu.setScale(1.05));
            menu.on("pointerout", () => menu.setScale(1));

            for (let i = 0; i < 28; i++) {
              const p = this.add
                .circle(
                  Math.random() * W,
                  Math.random() * H,
                  2 + Math.random() * 3,
                  [C.gold, C.tile, C.green][rnd(3)],
                )
                .setAlpha(0.7);
              this.tweens.add({
                targets: p,
                y: p.y - 200 - Math.random() * 300,
                alpha: 0,
                duration: 2000 + Math.random() * 2000,
                delay: Math.random() * 1000,
                repeat: -1,
                ease: "Power1",
              });
            }
          }
        }

        // ─── BOOT ───
        new Phaser.Game({
          type: Phaser.AUTO,
          parent: "game-container",
          width: W,
          height: H,
          backgroundColor: "#0b0c10",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          scene: [TitleScene, GameScene, ResultScene],
        });
      })();
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
