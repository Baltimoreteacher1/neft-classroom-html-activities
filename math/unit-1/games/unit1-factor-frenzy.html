<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Factor Frenzy — Brick Breaker | Unit 1</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0a2e;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      /* ── Parallax prime-chain backdrop (bespoke depth behind the canvas) ──
         Sits behind #game-container; GameFX moves [data-parallax-layer] on
         pointer move, and disables it under prefers-reduced-motion. */
      #fx-backdrop {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        pointer-events: none;
        background: radial-gradient(circle at 50% 18%, #16164a 0%, #0a0a2e 60%);
      }
      #fx-backdrop .deco {
        position: absolute;
        inset: -6%;
        will-change: transform;
        opacity: 0.5;
      }
      /* far layer: slow-drifting prime-chain glyphs */
      #fx-chains {
        font:
          800 30px/1 "Arial Black",
          system-ui,
          sans-serif;
        color: #2a2a72;
        white-space: pre;
        letter-spacing: 6px;
        animation: fxDrift 46s linear infinite;
      }
      /* near layer: scrolling factor reference cards */
      #fx-cards {
        animation: fxDriftR 64s linear infinite;
      }
      #fx-cards span {
        position: absolute;
        padding: 6px 12px;
        border-radius: 10px;
        font:
          700 15px/1.2 "Arial",
          system-ui,
          sans-serif;
        color: #aab6ee;
        background: rgba(34, 34, 104, 0.45);
        border: 1px solid rgba(90, 90, 170, 0.4);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
      }
      @keyframes fxDrift {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(-46px);
        }
      }
      @keyframes fxDriftR {
        from {
          transform: translateY(0);
        }
        to {
          transform: translateY(38px);
        }
      }
      #game-container {
        margin: 0 auto;
        position: relative;
        z-index: 1;
      }
      canvas {
        display: block;
        margin: 0 auto;
        max-width: 100%;
        border-radius: 10px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
      }
      /* Back-to-hub link, kept above the canvas. */
      .nt-back-hub {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 50;
        padding: 6px 12px;
        border-radius: 8px;
        font: 600 13px/1 "Segoe UI", system-ui, sans-serif;
        color: #e6f1ff;
        background: rgba(10, 10, 46, 0.7);
        border: 1px solid rgba(120, 160, 220, 0.5);
        text-decoration: none;
      }
      .nt-back-hub:hover,
      .nt-back-hub:focus {
        background: rgba(34, 34, 104, 0.9);
        outline: 2px solid #ffd23f;
      }
      /* Respect reduced-motion: freeze every backdrop drift. */
      @media (prefers-reduced-motion: reduce) {
        #fx-chains,
        #fx-cards {
          animation: none !important;
        }
        #fx-backdrop .deco {
          transform: none !important;
        }
      }
    </style>
    <script src="/games/vendor/phaser/phaser-3.80.1.min.js"></script>

        }
      });
    </script>

  <body>

      >← Back to Unit&nbsp;1</a
    >
    <!-- Parallax prime-chain backdrop (GameFX pointer-parallax target; both
         layers freeze under prefers-reduced-motion via CSS + the FX kit). -->
    <div id="fx-backdrop" data-parallax aria-hidden="true">
      <div id="fx-chains" class="deco" data-parallax-layer></div>
      <div id="fx-cards" class="deco" data-parallax-layer></div>
    </div>
    <div id="game-container"></div>
    <script>
      // Populate the parallax backdrop with procedural prime-factor chains and
      // floating factor reference cards. Purely decorative; no gameplay impact.
      (function buildBackdrop() {
        try {
          var chains = document.getElementById("fx-chains");
          var cards = document.getElementById("fx-cards");
          if (!chains || !cards) return;
          var rows = [];
          var samples = [
            "12 = 2·2·3",
            "18 = 2·3·3",
            "24 = 2·2·2·3",
            "30 = 2·3·5",
            "36 = 2·2·3·3",
            "2 · 3 · 5 · 7 · 11 · 13",
            "GCF · LCM · PRIME",
          ];
          for (var r = 0; r < 16; r++) {
            rows.push(samples[r % samples.length]);
          }
          chains.textContent = rows.join("\n");
          // scattered factor cards
          var facts = [
            "8 = 2³",
            "20 = 2²·5",
            "45 = 3²·5",
            "60 = 2²·3·5",
            "42 = 2·3·7",
            "27 = 3³",
            "50 = 2·5²",
            "70 = 2·5·7",
          ];
          var frag = document.createDocumentFragment();
          for (var i = 0; i < facts.length; i++) {
            var s = document.createElement("span");
            s.textContent = facts[i];
            s.style.left = 4 + ((i * 137) % 86) + "%";
            s.style.top = 6 + ((i * 91) % 84) + "%";
            frag.appendChild(s);
          }
          cards.appendChild(frag);
        } catch (e) {
          /* decorative only — never block the game */
        }
      })();
    </script>
    <script>
      (() => {
        // ════════════════════════════════════════════════════════════════
        //  FACTOR FRENZY — "PRIME FACTORY"  (standard 6.NS.B.4)
        //  THE MATH IS THE MECHANIC. There are NO 1-of-N number buttons and
        //  no answer menus. The player physically SORTS prime-factor tiles,
        //  and the product of what they seat IS the answer:
        //   • GCF round: drag prime tiles into a shared OVERLAP zone. A prime
        //     only LOCKS in the overlap if it divides BOTH numbers; others
        //     bounce out. The product of the locked tiles = the GCF. The vault
        //     opens when the largest common factorisation is seated.
        //   • LCM round: build each number's prime TOWER, then drag missing
        //     primes until every prime's tower is as tall as the taller side.
        //     The merged tower's product = the LCM.
        //   • Prime vs composite: drop a number onto a "rows" grid. A prime
        //     visibly refuses to form any rectangle except 1×n.
        //  Level 1 (Support): numbers <= 24, prime tiles pre-provided.
        //  Level 2 (Challenge): larger numbers, player picks primes themselves.
        //  Feedback never gives the answer — it teaches factoring.
        // ════════════════════════════════════════════════════════════════

        // ─── SOUND ENGINE ───
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let actx = null;
        function ensureAudio() {
          if (!actx && AudioCtx) actx = new AudioCtx();
          if (actx && actx.state === "suspended") actx.resume();
        }
        function beep(freq, dur, type = "sine", vol = 0.16) {
          if (!actx) return;
          const o = actx.createOscillator(),
            g = actx.createGain();
          o.connect(g);
          g.connect(actx.destination);
          o.frequency.value = freq;
          o.type = type;
          g.gain.setValueAtTime(vol, actx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
          o.start();
          o.stop(actx.currentTime + dur);
        }
        const sfxGrab = () => beep(360 + Math.random() * 40, 0.05, "sine", 0.1);
        const sfxLock = () => {
          beep(523, 0.06);
          setTimeout(() => beep(784, 0.08), 55);
        };
        const sfxBounce = () => beep(200, 0.14, "square", 0.1);
        const sfxSolve = () => {
          beep(523, 0.08);
          setTimeout(() => beep(659, 0.08), 70);
          setTimeout(() => beep(880, 0.16), 150);
        };
        const sfxWrong = () => beep(160, 0.22, "square", 0.1);
        const sfxLevel = () =>
          [523, 659, 784, 1047].forEach((f, i) =>
            setTimeout(() => beep(f, 0.14), i * 90),
          );
        const sfxClick = () => beep(440, 0.05, "sine", 0.09);

        // ─── MOTION PREFERENCE ───
        // Single source of truth for "should we animate?" Every bespoke tween
        // and particle burst below checks this so the game honors the OS
        // prefers-reduced-motion setting (kept live via a change listener).
        const reduceQuery =
          window.matchMedia &&
          window.matchMedia("(prefers-reduced-motion: reduce)");
        let REDUCE_MOTION = !!(reduceQuery && reduceQuery.matches);
        if (reduceQuery && reduceQuery.addEventListener) {
          reduceQuery.addEventListener(
            "change",
            (e) => (REDUCE_MOTION = e.matches),
          );
        }

        // ─── LAYOUT + PALETTE ───
        const W = 960,
          H = 720;
        const C = {
          bg: 0x0a0a2e,
          panel: 0x161645,
          panelHi: 0x222268,
          gold: 0xffd23f,
          white: 0xffffff,
          dim: 0x8fa3d6,
          green: 0x35c46b,
          red: 0xe7556b,
          slot: 0x05051c,
          stroke: 0x3a3a7a,
          // colourblind-safe prime palette (Okabe–Ito derived); each prime
          // ALSO carries its number + a glyph shape, so colour is never the
          // only cue.
        };
        // distinct primes used by tiles; colour + the printed number identify them
        const PRIME_INFO = {
          2: { color: 0x0072b2, css: "#0072b2" },
          3: { color: 0xd55e00, css: "#d55e00" },
          5: { color: 0x009e73, css: "#009e73" },
          7: { color: 0xcc79a7, css: "#cc79a7" },
          11: { color: 0xe69f00, css: "#e69f00" },
          13: { color: 0x56b4e9, css: "#56b4e9" },
        };
        const pinfo = (p) => PRIME_INFO[p] || { color: 0x999999, css: "#999" };

        // ─── MATH HELPERS ───
        const gcdF = (a, b) => (b ? gcdF(b, a % b) : a);
        const lcmF = (a, b) => (a / gcdF(a, b)) * b;
        const rnd = (n) => Math.floor(Math.random() * n);
        const pick = (arr) => arr[rnd(arr.length)];
        function shuffle(arr) {
          const a = [...arr];
          for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        }
        function isPrime(n) {
          if (n < 2) return false;
          for (let i = 2; i * i <= n; i++) if (n % i === 0) return false;
          return true;
        }
        // prime factorisation as a {prime: exponent} map
        function primeFactor(n) {
          const m = {};
          let x = n;
          for (let p = 2; p * p <= x; p++) {
            while (x % p === 0) {
              m[p] = (m[p] || 0) + 1;
              x /= p;
            }
          }
          if (x > 1) m[x] = (m[x] || 0) + 1;
          return m;
        }
        // flatten a factor-map into a multiset list of primes
        function primeList(n) {
          const m = primeFactor(n),
            out = [];
          Object.keys(m).forEach((p) => {
            for (let i = 0; i < m[p]; i++) out.push(+p);
          });
          return out.sort((a, b) => a - b);
        }
        // product of a list of primes (the player's seated factorisation)
        const product = (list) => list.reduce((a, b) => a * b, 1);

        // ─── ROUND GENERATOR (solvability-verified) ───
        // Builds prime/gcf/lcm rounds whose tile interaction yields the true
        // answer. Numbers are kept inside the visual capacity per tier.
        function makeRound(tier, index) {
          // every 3rd round is a prime-vs-composite warm-up; alternate gcf/lcm
          let type;
          const m = index % 3;
          if (m === 0) type = "prime";
          else type = m === 1 ? "gcf" : "lcm";

          if (type === "prime") return makePrimeRound(tier);
          if (type === "gcf") return makeGcfRound(tier);
          return makeLcmRound(tier);
        }

        function makePrimeRound(tier) {
          // show one number; player decides prime or composite by trying to
          // build equal rows. Mix of primes + composites across the game.
          const wantPrime = Math.random() < 0.5;
          let n;
          let guard = 0;
          do {
            n =
              tier === 1
                ? 4 + rnd(21) // 4..24
                : 12 + rnd(48); // 12..59
            guard++;
          } while (guard < 200 && isPrime(n) !== wantPrime);
          return { type: "prime", n, isPrime: isPrime(n) };
        }

        function makeGcfRound(tier) {
          // pick two numbers sharing a non-trivial common factor so the
          // overlap zone has real tiles to seat.
          let a,
            b,
            g,
            guard = 0;
          do {
            if (tier === 1) {
              a = 4 + rnd(21);
              b = 4 + rnd(21);
            } else {
              a = 12 + rnd(48);
              b = 12 + rnd(48);
            }
            g = gcdF(a, b);
            guard++;
          } while (
            guard < 400 &&
            (a === b || g < 2 || Math.max(a, b) > (tier === 1 ? 24 : 60))
          );
          return {
            type: "gcf",
            a,
            b,
            gcf: g,
            // the multiset of primes that should seat in the overlap
            overlap: primeList(g),
          };
        }

        function makeLcmRound(tier) {
          // keep the LCM inside the tower height budget
          let a,
            b,
            l,
            guard = 0;
          const cap = tier === 1 ? 36 : 90;
          do {
            if (tier === 1) {
              a = 2 + rnd(11); // 2..12
              b = 2 + rnd(11);
            } else {
              a = 4 + rnd(17); // 4..20
              b = 4 + rnd(17);
            }
            l = lcmF(a, b);
            guard++;
          } while (guard < 400 && (a === b || l > cap || l === Math.max(a, b)));
          return {
            type: "lcm",
            a,
            b,
            lcm: l,
            mapA: primeFactor(a),
            mapB: primeFactor(b),
            mapL: primeFactor(l),
          };
        }

        // ════════════════════════════════════════════════════════════════
        //  TITLE SCENE — Level 1 (Support) vs Level 2 (Challenge)
        // ════════════════════════════════════════════════════════════════
        class TitleScene extends Phaser.Scene {
          constructor() {
            super("TitleScene");
          }
          create() {
            this.cameras.main.setBackgroundColor(C.bg);
            this.add
              .text(W / 2, 96, "FACTOR FRENZY", {
                fontSize: "62px",
                fontFamily: "Arial Black, sans-serif",
                color: "#ffd23f",
                stroke: "#000",
                strokeThickness: 7,
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 148, "Prime Factory · 6.NS.B.4", {
                fontSize: "20px",
                fontFamily: "Arial",
                color: "#aaccff",
              })
              .setOrigin(0.5);
            this.add
              .text(
                W / 2,
                202,
                "Sort the PRIME tiles. The product of what you seat IS the answer —\n" +
                  "shared primes make the GCF, matched towers make the LCM.",
                {
                  fontSize: "16px",
                  fontFamily: "Arial",
                  color: "#8fa3d6",
                  align: "center",
                  lineSpacing: 6,
                },
              )
              .setOrigin(0.5);

            this.drawDemo(W / 2, 330);

            const tiers = [
              {
                t: 1,
                label: "Level 1",
                sub: "Support",
                desc: "Numbers up to 24 · prime tiles given for you · 5 lives",
                col: C.green,
              },
              {
                t: 2,
                label: "Level 2",
                sub: "Challenge",
                desc: "Bigger numbers · you pick the primes yourself · 3 lives",
                col: C.gold,
              },
            ];
            tiers.forEach((d, i) => {
              const x = W / 2 + (i === 0 ? -200 : 200),
                y = 520;
              const card = this.add
                .rectangle(x, y, 330, 140, C.panel)
                .setStrokeStyle(3, C.stroke)
                .setInteractive({ useHandCursor: true });
              this.add
                .text(x, y - 42, d.label, {
                  fontSize: "30px",
                  fontFamily: "Arial Black",
                  color: "#fff",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y - 12, d.sub, {
                  fontSize: "16px",
                  fontFamily: "Arial",
                  color: Phaser.Display.Color.IntegerToColor(d.col).rgba,
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 28, d.desc, {
                  fontSize: "13px",
                  fontFamily: "Arial",
                  color: "#c9d4f5",
                  align: "center",
                  wordWrap: { width: 300 },
                  lineSpacing: 3,
                })
                .setOrigin(0.5);
              card.on("pointerover", () => {
                card.setStrokeStyle(3, d.col);
                card.setScale(1.04);
              });
              card.on("pointerout", () => {
                card.setStrokeStyle(3, C.stroke);
                card.setScale(1);
              });
              card.on("pointerdown", () => {
                ensureAudio();
                sfxClick();
                this.cameras.main.fadeOut(350, 0, 0, 0);
                this.time.delayedCall(350, () =>
                  this.scene.start("GameScene", { tier: d.t }),
                );
              });
            });

            this.add
              .text(
                W / 2,
                648,
                "Drag tiles with mouse or finger · TAB picks a tile, ←/→ moves it, ENTER seats it · H for a hint",
                { fontSize: "13px", color: "#6f7fb5" },
              )
              .setOrigin(0.5);
            this.cameras.main.fadeIn(400);
          }
          drawDemo(cx, cy) {
            // mini overlap showing 12 = 2·2·3, 18 = 2·3·3, shared 2·3 → GCF 6
            this.add
              .text(cx - 250, cy, "12 = 2·2·3", {
                fontSize: "20px",
                fontFamily: "Arial",
                color: "#0072b2",
              })
              .setOrigin(0.5);
            this.add
              .text(cx + 250, cy, "18 = 2·3·3", {
                fontSize: "20px",
                fontFamily: "Arial",
                color: "#d55e00",
              })
              .setOrigin(0.5);
            const ring = this.add
              .ellipse(cx, cy, 150, 86, C.panelHi)
              .setStrokeStyle(3, C.gold);
            this.add
              .text(cx, cy - 16, "shared: 2 · 3", {
                fontSize: "16px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.add
              .text(cx, cy + 14, "GCF = 6", {
                fontSize: "18px",
                fontFamily: "Arial Black",
                color: "#ffd23f",
              })
              .setOrigin(0.5);
          }
        }

        // ════════════════════════════════════════════════════════════════
        //  GAME SCENE — the Prime Factory
        // ════════════════════════════════════════════════════════════════
        class GameScene extends Phaser.Scene {
          constructor() {
            super("GameScene");
          }
          init(data) {
            this.tier = data.tier || 1;
          }

          create() {
            this.cameras.main.setBackgroundColor(C.bg);
            this.cameras.main.fadeIn(350);

            // ── run state ──
            this.score = 0;
            this.streak = 0;
            this.bestStreak = 0;
            this.solved = 0;
            this.attempted = 0;
            this.correct = 0;
            this.faults = 0; // wrong actions on the current round
            this.lives = this.tier === 1 ? 5 : 3;
            this.level = 1;
            this.roundIx = 0;
            this.goal = this.tier === 1 ? 9 : 12;

            // backdrop
            this.add.rectangle(W / 2, H / 2, W, H, C.bg);
            this.add.rectangle(W / 2, 700, W, 200, 0x121238); // tile tray base

            // ── HUD ──
            this.add.rectangle(W / 2, 26, W, 52, C.slot, 0.96);
            this.hScore = this.add.text(20, 12, "0", {
              fontSize: "24px",
              fontFamily: "Arial Black",
              color: "#ffd23f",
            });
            this.add.text(22, 40, "POINTS", {
              fontSize: "10px",
              color: "#7f8fc5",
            });
            this.hLevel = this.add
              .text(W / 2, 10, "Round 1", {
                fontSize: "16px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5, 0);
            this.hSolved = this.add
              .text(W / 2, 34, "Solved 0", {
                fontSize: "12px",
                color: "#8fa3d6",
              })
              .setOrigin(0.5, 0);
            this.hLives = this.add
              .text(W - 20, 14, "", { fontSize: "20px" })
              .setOrigin(1, 0);
            this.hStreak = this.add
              .text(W - 20, 40, "", { fontSize: "13px", color: "#ffd23f" })
              .setOrigin(1, 0);

            // ── prompt + task ──
            this.promptText = this.add
              .text(W / 2, 70, "", {
                fontSize: "26px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5, 0);
            this.taskText = this.add
              .text(W / 2, 108, "", {
                fontSize: "15px",
                fontFamily: "Arial",
                color: "#c9d4f5",
                align: "center",
                wordWrap: { width: 760 },
                lineSpacing: 3,
              })
              .setOrigin(0.5, 0);

            // ── live computed-answer readout (product of what is seated) ──
            this.resultText = this.add
              .text(W / 2, 560, "", {
                fontSize: "22px",
                fontFamily: "Arial Black",
                color: "#8fa3d6",
              })
              .setOrigin(0.5);

            // ── feedback line ──
            this.feedback = this.add
              .text(W / 2, 596, "", {
                fontSize: "15px",
                fontFamily: "Arial",
                fontStyle: "bold",
                color: "#fff",
                align: "center",
                wordWrap: { width: 760 },
              })
              .setOrigin(0.5);

            // ── action buttons ──
            this.checkBtn = this.makeBtn(
              W / 2,
              664,
              260,
              52,
              "✅ OPEN THE VAULT",
              0xffd23f,
              () => this.check(),
              "20px",
              0x1a1a40,
            );
            this.resetBtn = this.makeBtn(
              W / 2 - 250,
              664,
              160,
              46,
              "↶ Reset tiles",
              0x33335f,
              () => this.resetTiles(),
              "15px",
            );
            this.hintBtn = this.makeBtn(
              W / 2 + 250,
              664,
              160,
              46,
              "\u{1F4A1} Hint",
              0x33335f,
              () => this.showHint(),
              "15px",
            );

            // containers we rebuild each round
            this.boardLayer = this.add.container();
            this.tileLayer = this.add.container();
            this.tiles = []; // active draggable tile objects
            this.zones = []; // drop targets {x,y,w,h,accepts(tile),seated:[]}
            this.kbIndex = 0;

            // global drag wiring (touch + mouse)
            this.input.on("dragstart", (p, obj) => this.onDragStart(obj));
            this.input.on("drag", (p, obj, dx, dy) => {
              obj.x = dx;
              obj.y = dy;
            });
            this.input.on("dragend", (p, obj) => this.onDragEnd(obj));

            // keyboard controls (TAB select, arrows move, ENTER seat)
            this.input.keyboard.on("keydown", (e) => {
              const k = e.key;
              if (k === "Tab") {
                e.preventDefault?.();
                this.cycleTile(e.shiftKey ? -1 : 1);
              } else if (k === "ArrowLeft" || k === "ArrowRight") {
                e.preventDefault?.();
                this.nudgeTile(k === "ArrowLeft" ? -1 : 1);
              } else if (k === "ArrowUp" || k === "ArrowDown") {
                e.preventDefault?.();
                this.nudgeTileV(k === "ArrowUp" ? -1 : 1);
              } else if (k === "Enter") {
                this.seatKbTile();
              } else if (k === " ") {
                e.preventDefault?.();
                this.check();
              } else if (k.toLowerCase() === "h") this.showHint();
              else if (k.toLowerCase() === "r") this.resetTiles();
            });

            this.updateHUD();
            this.loadRound();
          }

          makeBtn(x, y, w, h, label, color, cb, fs = "16px", txt = 0xffffff) {
            const r = this.add
              .rectangle(x, y, w, h, color)
              .setStrokeStyle(2, 0x000000, 0.25)
              .setInteractive({ useHandCursor: true });
            const t = this.add
              .text(x, y, label, {
                fontSize: fs,
                fontFamily: "Arial Black",
                color: Phaser.Display.Color.IntegerToColor(txt).rgba,
              })
              .setOrigin(0.5);
            r.on("pointerover", () => r.setScale(1.04));
            r.on("pointerout", () => r.setScale(1));
            r.on("pointerdown", () => {
              ensureAudio();
              cb();
            });
            r._t = t;
            return r;
          }

          // ── ROUND SETUP ────────────────────────────────────────────────
          loadRound() {
            this.round = makeRound(this.tier, this.roundIx);
            this.faults = 0;
            this.feedback.setText("");
            this.resultText.setText("");
            this.boardLayer.removeAll(true);
            this.tileLayer.removeAll(true);
            this.tiles = [];
            this.zones = [];
            this.kbIndex = 0;

            const r = this.round;
            if (r.type === "prime") this.buildPrimeRound(r);
            else if (r.type === "gcf") this.buildGcfRound(r);
            else this.buildLcmRound(r);

            this.updateHUD();
            this.refreshResult();
          }

          // factory for a single draggable prime tile
          makeTile(p, home) {
            const info = pinfo(p);
            const cont = this.add.container(home.x, home.y);
            const box = this.add
              .rectangle(0, 0, 54, 54, info.color)
              .setStrokeStyle(3, 0x000000, 0.35);
            const num = this.add
              .text(0, -4, String(p), {
                fontSize: "26px",
                fontFamily: "Arial Black",
                color: "#ffffff",
              })
              .setOrigin(0.5);
            const tag = this.add
              .text(0, 18, "prime", { fontSize: "9px", color: "#ffffffcc" })
              .setOrigin(0.5);
            cont.add([box, num, tag]);
            cont.setSize(54, 54);
            cont.setInteractive({ useHandCursor: true, draggable: true });
            this.input.setDraggable(cont);
            cont.prime = p;
            cont.home = { x: home.x, y: home.y };
            cont.seatedIn = null;
            cont._box = box;
            this.tiles.push(cont);
            this.tileLayer.add(cont);
            return cont;
          }

          // a labelled drop zone; accepts(tile) decides if a tile may lock here
          makeZone(x, y, w, h, label, sub, accepts) {
            const g = this.add
              .rectangle(x, y, w, h, C.slot, 0.85)
              .setStrokeStyle(3, C.stroke);
            this.boardLayer.add(g);
            if (label)
              this.boardLayer.add(
                this.add
                  .text(x, y - h / 2 - 16, label, {
                    fontSize: "16px",
                    fontFamily: "Arial Black",
                    color: "#fff",
                  })
                  .setOrigin(0.5),
              );
            if (sub)
              this.boardLayer.add(
                this.add
                  .text(x, y - h / 2 + 14, sub, {
                    fontSize: "12px",
                    color: "#8fa3d6",
                  })
                  .setOrigin(0.5),
              );
            const zone = {
              x,
              y,
              w,
              h,
              rect: g,
              accepts,
              seated: [],
              base: C.slot,
            };
            this.zones.push(zone);
            return zone;
          }

          // ── PRIME vs COMPOSITE ROUND ───────────────────────────────────
          // The number becomes a tile the player drops onto a "rows" grid.
          // It only seats if it forms a true rectangle r×c (r>=2,c>=2) for a
          // composite; a prime can only ever lie flat as 1×n, so the grid
          // visibly rejects every "equal rows" attempt → it must go to PRIME.
          buildPrimeRound(r) {
            this.promptText.setText("Prime or Composite?");
            this.taskText.setText(
              `Drop the ${r.n}-block onto a tray. The COMPOSITE tray only accepts it if it splits into equal rows (rows × columns). The PRIME tray accepts it only if it can't.`,
            );

            // the number block
            const block = this.add.container(W / 2, 470);
            const bx = this.add
              .rectangle(0, 0, 90, 64, C.gold)
              .setStrokeStyle(3, 0x000000, 0.4);
            const bn = this.add
              .text(0, -6, String(r.n), {
                fontSize: "30px",
                fontFamily: "Arial Black",
                color: "#1a1a40",
              })
              .setOrigin(0.5);
            const bt = this.add
              .text(0, 18, `${r.n} blocks`, {
                fontSize: "10px",
                color: "#1a1a40cc",
              })
              .setOrigin(0.5);
            block.add([bx, bn, bt]);
            block.setSize(90, 64);
            block.setInteractive({ useHandCursor: true, draggable: true });
            this.input.setDraggable(block);
            block.prime = null;
            block.isNumberBlock = true;
            block.home = { x: W / 2, y: 470 };
            block.seatedIn = null;
            this.tiles.push(block);
            this.tileLayer.add(block);

            // COMPOSITE tray: accepts only if a true r×c (r,c>=2) exists → composite
            this.makeZone(
              W / 2 - 230,
              300,
              260,
              150,
              "\u{1F9F1} COMPOSITE",
              "splits into equal rows",
              (t) => t.isNumberBlock && !isPrime(r.n),
            );
            // PRIME tray: accepts only if the number is prime
            this.makeZone(
              W / 2 + 230,
              300,
              260,
              150,
              "\u{1F4A0} PRIME",
              "only 1 row of n",
              (t) => t.isNumberBlock && isPrime(r.n),
            );

            // a little live "rows" preview grid under the trays
            this.rowsHint = this.add
              .text(W / 2, 560, "", {
                fontSize: "14px",
                color: "#8fa3d6",
                align: "center",
              })
              .setOrigin(0.5);
            this.boardLayer.add(this.rowsHint);
          }

          // ── GCF ROUND ──────────────────────────────────────────────────
          // Two number bins with their FULL prime factor tiles in trays. The
          // OVERLAP ring accepts a prime only if it divides BOTH numbers and
          // hasn't over-counted the shared multiplicity. Product of seated =
          // GCF. Tier 1 hands you the exact prime tiles; Tier 2 gives a mixed
          // bag of primes and you must pick the right multiset.
          buildGcfRound(r) {
            this.promptText.setText(`GCF of ${r.a} and ${r.b}`);
            this.taskText.setText(
              `Drag PRIME tiles into the shared ring. A prime locks only if it divides BOTH ${r.a} and ${r.b}. The product of the locked tiles is the GCF.`,
            );

            // bins (visual reference only)
            this.add &&
              this.boardLayer.add(
                this.add
                  .text(
                    W / 2 - 300,
                    200,
                    `${r.a}\n= ${primeList(r.a).join("·")}`,
                    {
                      fontSize: "18px",
                      fontFamily: "Arial",
                      color: "#0072b2",
                      align: "center",
                      lineSpacing: 4,
                    },
                  )
                  .setOrigin(0.5),
              );
            this.boardLayer.add(
              this.add
                .text(
                  W / 2 + 300,
                  200,
                  `${r.b}\n= ${primeList(r.b).join("·")}`,
                  {
                    fontSize: "18px",
                    fontFamily: "Arial",
                    color: "#d55e00",
                    align: "center",
                    lineSpacing: 4,
                  },
                )
                .setOrigin(0.5),
            );

            // overlap ring zone — the math gate
            const seatedCount = {}; // prime -> how many already locked
            this.makeZone(
              W / 2,
              250,
              260,
              160,
              "\u{1F501} SHARED PRIMES",
              "divides BOTH numbers",
              (t) => {
                if (t.prime == null) return false;
                const p = t.prime;
                // available shared multiplicity = min exponent in a and b
                const shared =
                  Math.min(
                    this.round.mapA ? this.round.mapA[p] || 0 : 0,
                    this.round.mapB ? this.round.mapB[p] || 0 : 0,
                  ) ||
                  Math.min(
                    primeFactor(this.round.a)[p] || 0,
                    primeFactor(this.round.b)[p] || 0,
                  );
                const already = seatedCount[p] || 0;
                return shared - already >= 1;
              },
            );
            this.gcfSeatedCount = seatedCount;
            this.round.mapA = primeFactor(r.a);
            this.round.mapB = primeFactor(r.b);

            // build the tile tray
            const tray = this.buildPrimeTray(r);
            this.layoutTray(tray);
          }

          // ── LCM ROUND ──────────────────────────────────────────────────
          // Build per-prime TOWERS. For every prime appearing in a or b, the
          // tower must reach the MAX exponent across the two numbers. Player
          // drags tiles into each prime's tower until it matches the target
          // height. Product across all towers = LCM.
          buildLcmRound(r) {
            this.promptText.setText(`LCM of ${r.a} and ${r.b}`);
            this.taskText.setText(
              `Each number is a stack of prime towers. Add prime tiles so every tower is as tall as the TALLER number needs. The product of all towers is the LCM.`,
            );
            this.boardLayer.add(
              this.add
                .text(
                  W / 2,
                  156,
                  `${r.a} = ${primeList(r.a).join("·")}     ${r.b} = ${primeList(r.b).join("·")}`,
                  {
                    fontSize: "15px",
                    color: "#8fa3d6",
                  },
                )
                .setOrigin(0.5),
            );

            // target = union of primes at max exponent
            const target = {};
            Object.keys(r.mapL).forEach((p) => (target[+p] = r.mapL[p]));
            this.lcmTarget = target;
            const primes = Object.keys(target)
              .map(Number)
              .sort((a, b) => a - b);

            // one tower zone per prime; pre-seat the exponent that BOTH share
            // is NOT pre-seated — player builds full towers (clear + concrete).
            const n = primes.length;
            const spacing = Math.min(200, 720 / n);
            const startX = W / 2 - ((n - 1) * spacing) / 2;
            this.lcmZones = {};
            primes.forEach((p, i) => {
              const x = startX + i * spacing;
              const need = target[p];
              const zh = Math.max(90, need * 50 + 30);
              const z = this.makeZone(
                x,
                360,
                88,
                zh,
                `prime ${p}`,
                `need ${need} tall`,
                (t) => {
                  if (t.prime !== p) return false;
                  return (z.seated.length || 0) < need;
                },
              );
              z.targetPrime = p;
              z.need = need;
              this.lcmZones[p] = z;
            });

            const tray = this.buildPrimeTray(r);
            this.layoutTray(tray);
          }

          // tray of prime tiles. Tier 1: exactly the primes needed (with the
          // right multiplicity for the round). Tier 2: a superset including
          // decoy primes so the player must choose.
          buildPrimeTray(r) {
            let needed = [];
            if (r.type === "gcf") {
              // give every prime of a and b (so overlap must be discovered)
              needed = [...primeList(r.a), ...primeList(r.b)];
            } else if (r.type === "lcm") {
              // give enough of each prime to build the max towers
              Object.keys(r.mapL).forEach((p) => {
                for (let i = 0; i < r.mapL[p]; i++) needed.push(+p);
              });
              // extra copies so towers are buildable with spares to spare
              Object.keys(r.mapL).forEach((p) => needed.push(+p));
            }
            if (this.tier === 2) {
              // add decoy primes that do NOT belong, forcing real selection
              const decoyPool = [2, 3, 5, 7, 11, 13].filter(
                (p) => !needed.includes(p),
              );
              shuffle(decoyPool)
                .slice(0, 2)
                .forEach((p) => needed.push(p));
              // and one extra copy of a relevant prime as a "do I need this?" test
              if (needed.length) needed.push(pick(needed));
            }
            return shuffle(needed);
          }

          layoutTray(list) {
            const y = 660;
            const gap = 64;
            const startX = W / 2 - ((list.length - 1) * gap) / 2;
            list.forEach((p, i) =>
              this.makeTile(p, { x: startX + i * gap, y }),
            );
          }

          // ── DRAG HANDLERS ──────────────────────────────────────────────
          onDragStart(obj) {
            ensureAudio();
            sfxGrab();
            this.tileLayer.bringToTop(obj);
            // if it was seated, free it from its zone
            if (obj.seatedIn) this.unseat(obj);
          }

          onDragEnd(obj) {
            const zone = this.zoneAt(obj.x, obj.y);
            if (zone && zone.accepts(obj)) {
              this.seat(obj, zone);
            } else if (zone) {
              // bounce out — the prime does NOT belong here
              sfxBounce();
              this.faults++;
              this.bounceBack(obj, zone);
              this.diagnoseBadDrop(obj, zone);
              this.maybeLoseLife();
            } else {
              this.returnHome(obj);
            }
            this.refreshResult();
          }

          zoneAt(x, y) {
            return this.zones.find(
              (z) =>
                x > z.x - z.w / 2 &&
                x < z.x + z.w / 2 &&
                y > z.y - z.h / 2 &&
                y < z.y + z.h / 2,
            );
          }

          seat(obj, zone) {
            sfxLock();
            obj.seatedIn = zone;
            zone.seated.push(obj);
            if (this.gcfSeatedCount && obj.prime != null)
              this.gcfSeatedCount[obj.prime] =
                (this.gcfSeatedCount[obj.prime] || 0) + 1;
            this.arrangeZone(zone);
            zone.rect.setStrokeStyle(3, C.green);
            this.flash(
              this.feedback,
              "Locked in. Keep going…",
              "#bff7cf",
              1400,
            );
            this.checkZonePulse();
          }

          unseat(obj) {
            const zone = obj.seatedIn;
            zone.seated = zone.seated.filter((t) => t !== obj);
            if (this.gcfSeatedCount && obj.prime != null)
              this.gcfSeatedCount[obj.prime] = Math.max(
                0,
                (this.gcfSeatedCount[obj.prime] || 0) - 1,
              );
            obj.seatedIn = null;
            this.arrangeZone(zone);
            if (zone.seated.length === 0) zone.rect.setStrokeStyle(3, C.stroke);
            this.checkZonePulse();
          }

          arrangeZone(zone) {
            // stack seated tiles bottom-up (towers) or left-right (overlap).
            // Tiles ease into their slot (cubic/elastic) for a tactile "snap";
            // under reduced-motion the position is set instantly.
            const isTower = zone.targetPrime != null;
            zone.seated.forEach((t, i) => {
              let tx, ty;
              if (isTower) {
                tx = zone.x;
                ty = zone.y + zone.h / 2 - 32 - i * 50;
              } else {
                const perRow = 4;
                const col = i % perRow,
                  row = Math.floor(i / perRow);
                tx = zone.x - 84 + col * 56;
                ty = zone.y - 26 + row * 56;
              }
              this.easeTileTo(t, tx, ty);
            });
          }

          // smooth seat/unseat motion with a settle bounce; respects motion pref
          easeTileTo(t, tx, ty) {
            if (REDUCE_MOTION) {
              this.tweens.killTweensOf(t);
              t.x = tx;
              t.y = ty;
              return;
            }
            this.tweens.killTweensOf(t);
            this.tweens.add({
              targets: t,
              x: tx,
              y: ty,
              duration: 320,
              ease: "Back.easeOut",
              easeParams: [1.6],
            });
          }

          // glow + scale pulse on a zone when its seated tiles hit the target
          // product/height (GCF match or a full LCM tower). Visual only.
          pulseZone(zone) {
            if (!zone || !zone.rect) return;
            zone.rect.setStrokeStyle(4, C.gold);
            if (REDUCE_MOTION) return;
            this.tweens.killTweensOf(zone.rect);
            this.tweens.add({
              targets: zone.rect,
              scaleX: 1.06,
              scaleY: 1.06,
              duration: 160,
              yoyo: true,
              ease: "Sine.easeInOut",
              onComplete: () => {
                zone.rect.setScale(1);
                zone.rect.setStrokeStyle(3, C.gold);
              },
            });
            // aura ring that expands and fades out
            const aura = this.add
              .rectangle(zone.x, zone.y, zone.w + 10, zone.h + 10, 0x000000, 0)
              .setStrokeStyle(3, C.gold, 0.9);
            this.boardLayer.add(aura);
            this.tweens.add({
              targets: aura,
              scaleX: 1.18,
              scaleY: 1.18,
              alpha: 0,
              duration: 520,
              ease: "Cubic.easeOut",
              onComplete: () => aura.destroy(),
            });
          }

          // after a seat/unseat, pulse zones that exactly reach their target
          checkZonePulse() {
            const r = this.round;
            if (!r) return;
            if (r.type === "gcf") {
              const ring = this.zones[0];
              if (ring && product(ring.seated.map((t) => t.prime)) === r.gcf)
                this.pulseZone(ring);
            } else if (r.type === "lcm" && this.lcmZones) {
              Object.keys(this.lcmZones).forEach((p) => {
                const z = this.lcmZones[p];
                if (z && z.seated.length === z.need && z.need > 0)
                  this.pulseZone(z);
              });
            }
          }

          bounceBack(obj, zone) {
            // visible rejection: shove the tile back to its home with a shake
            zone.rect.setStrokeStyle(3, C.red);
            const restore = () =>
              zone.rect.setStrokeStyle(
                3,
                zone.seated.length ? C.green : C.stroke,
              );
            if (REDUCE_MOTION) {
              this.tweens.killTweensOf(obj);
              obj.x = obj.home.x;
              obj.y = obj.home.y;
              this.time.delayedCall(220, restore);
              return;
            }
            this.tweens.killTweensOf(obj);
            this.tweens.add({
              targets: obj,
              x: obj.home.x,
              y: obj.home.y,
              duration: 350,
              ease: "Back.easeOut",
            });
            this.tweens.add({
              targets: zone.rect,
              duration: 60,
              x: zone.x + 6,
              yoyo: true,
              repeat: 3,
              onComplete: restore,
            });
          }

          returnHome(obj) {
            if (REDUCE_MOTION) {
              this.tweens.killTweensOf(obj);
              obj.x = obj.home.x;
              obj.y = obj.home.y;
              return;
            }
            this.tweens.killTweensOf(obj);
            this.tweens.add({
              targets: obj,
              x: obj.home.x,
              y: obj.home.y,
              duration: 250,
              ease: "Cubic.easeOut",
            });
          }

          // teach (never give the answer) why a drop bounced
          diagnoseBadDrop(obj, zone) {
            const r = this.round;
            let msg = "";
            if (r.type === "prime") {
              if (zone.accepts === undefined) return;
              const wantedComposite = !isPrime(r.n);
              msg = wantedComposite
                ? `${r.n} CAN make equal rows — try the other tray and find a row size that divides ${r.n}.`
                : `Can ${r.n} make equal rows of 2 or more? Try dividing it — if nothing works, it's prime.`;
            } else if (r.type === "gcf") {
              const p = obj.prime;
              const inA = r.a % p === 0,
                inB = r.b % p === 0;
              if (!inA && !inB)
                msg = `${p} divides neither ${r.a} nor ${r.b}. Shared primes must divide BOTH.`;
              else if (!inA)
                msg = `${p} divides ${r.b} but not ${r.a}. It can't be shared.`;
              else if (!inB)
                msg = `${p} divides ${r.a} but not ${r.b}. It can't be shared.`;
              else
                msg = `You've already used every shared ${p}. Count how many ${p}'s are in BOTH numbers.`;
            } else if (r.type === "lcm") {
              const p = obj.prime;
              if (!this.lcmTarget[p])
                msg = `Neither ${r.a} nor ${r.b} has ${p} as a factor — its tower isn't needed.`;
              else
                msg = `That ${p}-tower is already as tall as the taller number needs.`;
            }
            if (msg) this.flash(this.feedback, "⚠️ " + msg, "#ffd9a0", 3200);
          }

          maybeLoseLife() {
            // gentle: only after repeated faults on a round
            const tol = this.tier === 1 ? 4 : 3;
            if (this.faults >= tol) {
              this.faults = 0;
              this.lives--;
              this.streak = 0;
              if (this.lives <= 0) {
                this.updateHUD();
                this.time.delayedCall(700, () => this.endGame());
                return;
              }
            }
            this.updateHUD();
          }

          // ── KEYBOARD CONTROL ───────────────────────────────────────────
          cycleTile(dir) {
            const free = this.tiles.filter((t) => !t.seatedIn);
            if (!free.length) return;
            this.kbIndex = (this.kbIndex + dir + free.length) % free.length;
            // The prime-round number block is draggable but has no `_box`
            // outline, so guard before styling to keep TAB from throwing.
            free.forEach((t, i) => {
              if (!t._box) return;
              t._box.setStrokeStyle(
                i === this.kbIndex ? 4 : 3,
                i === this.kbIndex ? C.gold : 0x000000,
                i === this.kbIndex ? 1 : 0.35,
              );
            });
            this.kbTile = free[this.kbIndex];
            sfxClick();
          }
          currentKbTile() {
            const free = this.tiles.filter((t) => !t.seatedIn);
            if (!free.length) return null;
            if (!this.kbTile || this.kbTile.seatedIn) this.kbTile = free[0];
            return this.kbTile;
          }
          nudgeTile(dir) {
            const t = this.currentKbTile();
            if (t) t.x = Phaser.Math.Clamp(t.x + dir * 40, 40, W - 40);
          }
          nudgeTileV(dir) {
            const t = this.currentKbTile();
            if (t) t.y = Phaser.Math.Clamp(t.y + dir * 40, 120, H - 30);
          }
          seatKbTile() {
            const t = this.currentKbTile();
            if (!t) return;
            this.onDragEnd(t);
          }

          // ── LIVE RESULT (product of seated tiles) ──────────────────────
          refreshResult() {
            const r = this.round;
            if (r.type === "prime") {
              const z = this.zones.find((z2) => z2.seated.length);
              this.resultText.setText(
                z ? "" : "Drop the number on the correct tray.",
              );
              if (this.rowsHint) {
                // show whether equal rows exist (concrete, not the answer label)
                const rows = [];
                for (let k = 2; k <= Math.floor(r.n / 2); k++)
                  if (r.n % k === 0) rows.push(`${k}×${r.n / k}`);
                this.rowsHint.setText(
                  rows.length
                    ? "Equal rows possible: " + rows.slice(0, 4).join("  ")
                    : "No equal rows of 2+ work for this number.",
                );
              }
              return;
            }
            if (r.type === "gcf") {
              const ring = this.zones[0];
              const list = ring.seated.map((t) => t.prime);
              const prod = product(list);
              this.resultText.setText(
                list.length
                  ? `Shared product: ${list.join(" × ")} = ${prod}`
                  : "Drag shared primes into the ring.",
              );
              return;
            }
            // lcm — multiply across all towers
            let prod = 1;
            const parts = [];
            Object.keys(this.lcmZones).forEach((p) => {
              const z = this.lcmZones[p];
              if (z.seated.length) {
                prod *= Math.pow(+p, z.seated.length);
                parts.push(`${p}^${z.seated.length}`);
              }
            });
            this.resultText.setText(
              parts.length
                ? `Tower product: ${parts.join(" × ")} = ${prod}`
                : "Build each prime tower to the needed height.",
            );
          }

          // ── CHECK / SOLVE ──────────────────────────────────────────────
          check() {
            const r = this.round;
            this.attempted++;
            let ok = false,
              why = "";

            if (r.type === "prime") {
              const composite = this.zones[0]; // first zone = COMPOSITE
              const primeZone = this.zones[1];
              const inComposite = composite.seated.length > 0;
              const inPrime = primeZone.seated.length > 0;
              if (!inComposite && !inPrime) {
                why = "Drop the number on a tray first.";
              } else if (r.isPrime && inPrime) ok = true;
              else if (!r.isPrime && inComposite) ok = true;
              else
                why = r.isPrime
                  ? `${r.n} has no equal rows of 2+, so it can't be composite.`
                  : `${r.n} DOES split into equal rows, so it isn't prime.`;
            } else if (r.type === "gcf") {
              const ring = this.zones[0];
              const prod = product(ring.seated.map((t) => t.prime));
              if (prod === r.gcf) ok = true;
              else if (prod < r.gcf)
                why = `Your shared product is ${prod}. Are there more primes that divide BOTH ${r.a} and ${r.b}?`;
              else
                why = `Your product ${prod} doesn't divide both numbers — remove a prime that isn't truly shared.`;
            } else {
              // lcm: every tower must equal its needed height
              let prod = 1,
                complete = true,
                short = null;
              Object.keys(this.lcmZones).forEach((p) => {
                const z = this.lcmZones[p];
                if (z.seated.length !== z.need) {
                  complete = false;
                  if (z.seated.length < z.need) short = p;
                }
                prod *= Math.pow(+p, z.seated.length);
              });
              if (complete && prod === r.lcm) ok = true;
              else if (short)
                why = `The ${short}-tower isn't tall enough yet. It must match the most ${short}'s in either number.`;
              else
                why = `A tower is too tall — no prime should appear more than its max in either number.`;
            }

            if (ok) this.onSolved();
            else {
              sfxWrong();
              this.faults++;
              this.cameras.main.shake(140, 0.005);
              this.flash(this.feedback, "❌ " + why, "#ffb4b4");
              this.maybeLoseLife();
            }
          }

          onSolved() {
            sfxSolve();
            this.correct++;
            this.solved++;
            this.streak++;
            if (this.streak > this.bestStreak) this.bestStreak = this.streak;
            const combo = Math.min(4, 1 + Math.floor(this.streak / 3));
            const clean = this.faults === 0 ? 60 : 0;
            const pts = (100 + clean + this.streak * 8) * combo;
            this.score += pts;
            this.celebrate();
            this.flash(
              this.feedback,
              `✅ Vault opened!  +${pts}${combo > 1 ? " x" + combo : ""}`,
              "#bff7cf",
            );
            if (this.solved % 3 === 0) {
              this.level++;
              sfxLevel();
            }
            this.updateHUD();
            const done = this.solved >= this.goal;
            this.time.delayedCall(1100, () => {
              if (done) this.endGame();
              else {
                this.roundIx++;
                this.loadRound();
              }
            });
          }

          celebrate() {
            // Honor reduced-motion: no canvas confetti, no DOM spark burst.
            if (REDUCE_MOTION) return;
            // Mirror the win with the shared GameFX spark burst over the canvas
            // (DOM-level, so it also obeys the kit's own reduced-motion guard).
            try {
              const cv =
                this.game &&
                this.game.canvas &&
                this.game.canvas.getBoundingClientRect();
              if (window.GameFX && cv)
                window.GameFX.burst(
                  cv.left + cv.width / 2,
                  cv.top + cv.height * 0.42,
                );
            } catch (e) {}
            // capped canvas confetti (smooth on a Chromebook)
            for (let i = 0; i < 22; i++) {
              const col = pick([C.gold, C.green, 0x0072b2, 0xd55e00, 0x56b4e9]);
              const p = this.add.circle(W / 2, 300, 3 + Math.random() * 3, col);
              this.tweens.add({
                targets: p,
                x: W / 2 + (Math.random() - 0.5) * 420,
                y: 300 + (Math.random() - 0.5) * 280,
                alpha: 0,
                scale: 0,
                duration: 700 + Math.random() * 400,
                onComplete: () => p.destroy(),
              });
            }
          }

          resetTiles() {
            sfxClick();
            this.zones.forEach((z) => {
              z.seated.slice().forEach((t) => {
                t.seatedIn = null;
                this.returnHome(t);
              });
              z.seated = [];
              z.rect.setStrokeStyle(3, C.stroke);
            });
            if (this.gcfSeatedCount)
              Object.keys(this.gcfSeatedCount).forEach(
                (k) => (this.gcfSeatedCount[k] = 0),
              );
            this.feedback.setText("");
            this.refreshResult();
          }

          showHint() {
            sfxClick();
            const r = this.round;
            let h;
            if (r.type === "prime")
              h = `\u{1F4A1} Try splitting ${r.n} into equal rows: 2 rows? 3 rows? If NO whole-number split works, it's prime.`;
            else if (r.type === "gcf")
              h = `\u{1F4A1} List the primes of ${r.a} (${primeList(r.a).join("·")}) and ${r.b} (${primeList(r.b).join("·")}). Seat only the primes that appear in BOTH lists — that many times.`;
            else
              h = `\u{1F4A1} For each prime, build the tower as tall as the MOST that prime appears in either ${r.a} or ${r.b}. Multiply the towers for the LCM.`;
            this.flash(this.feedback, h, "#ffe9a8", 3600);
          }

          flash(obj, msg, color = "#ffffff", hold = 2400) {
            obj.setText(msg).setColor(color).setAlpha(1);
            this.tweens.killTweensOf(obj);
            this.time.delayedCall(hold, () => {
              if (obj.text === msg)
                this.tweens.add({ targets: obj, alpha: 0, duration: 400 });
            });
          }

          updateHUD() {
            this.hScore.setText(this.score.toLocaleString());
            this.hLevel.setText("Round " + (this.solved + 1));
            this.hSolved.setText("Solved " + this.solved + " / " + this.goal);
            this.hLives.setText("❤️".repeat(Math.max(0, this.lives)));
            this.hStreak.setText(
              this.streak >= 3 ? "\u{1F525} streak " + this.streak : "",
            );
          }

          endGame() {
            this.cameras.main.fadeOut(450, 0, 0, 0);
            this.time.delayedCall(450, () =>
              this.scene.start("ResultScene", {
                tier: this.tier,
                score: this.score,
                correct: this.correct,
                attempted: this.attempted,
                goal: this.goal,
                bestStreak: this.bestStreak,
                level: this.level,
              }),
            );
          }
        }

        // ════════════════════════════════════════════════════════════════
        //  RESULT SCENE
        // ════════════════════════════════════════════════════════════════
        class ResultScene extends Phaser.Scene {
          constructor() {
            super("ResultScene");
          }
          init(d) {
            Object.assign(this, d);
          }
          create() {
            this.cameras.main.setBackgroundColor(C.bg);
            this.cameras.main.fadeIn(450);
            const goal = this.goal || 1;
            const pct = goal > 0 ? Math.round((this.correct / goal) * 100) : 0;

            try {
              window.EduPulse &&
                EduPulse.record({
                  activityTitle: document.title,
                  score: this.correct,
                  maxScore: goal,
                  problemsCorrect: this.correct,
                  problemsAttempted: this.attempted,
                  percent: pct,
                  standard: "6.NS.B.4",
                });
            } catch (e) {}

            let rank, emoji;
            if (pct >= 90) {
              rank = "MASTER FACTORER!";
              emoji = "\u{1F451}";
            } else if (pct >= 75) {
              rank = "FACTORY FOREMAN!";
              emoji = "\u{1F3C6}";
            } else if (pct >= 50) {
              rank = "APPRENTICE";
              emoji = "⭐";
            } else {
              rank = "KEEP PRACTICING!";
              emoji = "\u{1F4DA}";
            }

            this.add
              .text(W / 2, 110, emoji, { fontSize: "76px" })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 196, "FACTORY CLOSED", {
                fontSize: "46px",
                fontFamily: "Arial Black",
                color: "#ffd23f",
                stroke: "#000",
                strokeThickness: 4,
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 250, rank, {
                fontSize: "24px",
                fontFamily: "Arial",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 312, this.score.toLocaleString(), {
                fontSize: "58px",
                fontFamily: "Arial Black",
                color: "#ffd23f",
              })
              .setOrigin(0.5);
            this.add
              .text(W / 2, 352, "POINTS", {
                fontSize: "13px",
                color: "#7f8fc5",
              })
              .setOrigin(0.5);

            const stats = [
              { l: "Vaults opened", v: `${this.correct}/${goal}` },
              { l: "Best streak", v: this.bestStreak },
              { l: "Level reached", v: this.level },
            ];
            stats.forEach((s, i) => {
              const x = W / 2 - 240 + i * 240,
                y = 440;
              this.add
                .rectangle(x, y, 210, 96, C.panel)
                .setStrokeStyle(2, C.stroke);
              this.add
                .text(x, y - 12, String(s.v), {
                  fontSize: "30px",
                  fontFamily: "Arial Black",
                  color: "#ffd23f",
                })
                .setOrigin(0.5);
              this.add
                .text(x, y + 26, s.l, { fontSize: "13px", color: "#c9d4f5" })
                .setOrigin(0.5);
            });

            const again = this.add
              .rectangle(W / 2 - 130, 580, 240, 58, C.gold)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2 - 130, 580, "FACTOR AGAIN", {
                fontSize: "22px",
                fontFamily: "Arial Black",
                color: "#1a1a40",
              })
              .setOrigin(0.5);
            again.on("pointerdown", () => {
              ensureAudio();
              sfxClick();
              this.scene.start("GameScene", { tier: this.tier });
            });
            again.on("pointerover", () => again.setScale(1.05));
            again.on("pointerout", () => again.setScale(1));

            const menu = this.add
              .rectangle(W / 2 + 130, 580, 240, 58, C.panel)
              .setStrokeStyle(2, C.stroke)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(W / 2 + 130, 580, "CHANGE LEVEL", {
                fontSize: "20px",
                fontFamily: "Arial Black",
                color: "#fff",
              })
              .setOrigin(0.5);
            menu.on("pointerdown", () => {
              ensureAudio();
              sfxClick();
              this.scene.start("TitleScene");
            });
            menu.on("pointerover", () => menu.setScale(1.05));
            menu.on("pointerout", () => menu.setScale(1));

            // ambient rising motes — skipped entirely under reduced-motion
            if (!REDUCE_MOTION) {
              for (let i = 0; i < 28; i++) {
                const p = this.add
                  .circle(
                    Math.random() * W,
                    Math.random() * H,
                    2 + Math.random() * 3,
                    pick([C.gold, 0x0072b2, 0xd55e00, C.green]),
                  )
                  .setAlpha(0.7);
                this.tweens.add({
                  targets: p,
                  y: p.y - 200 - Math.random() * 300,
                  alpha: 0,
                  duration: 2000 + Math.random() * 2000,
                  delay: Math.random() * 1000,
                  repeat: -1,
                  ease: "Power1",
                });
              }
            }
          }
        }

        // ─── BOOT ───
        var ffGame = new Phaser.Game({
          type: Phaser.AUTO,
          parent: "game-container",
          width: W,
          height: H,
          backgroundColor: "#0a0a2e",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          scene: [TitleScene, GameScene, ResultScene],
        });
        // Keyboard accessibility: make the game canvas focusable.
        ffGame.events.once("ready", function () {
          var c = ffGame.canvas;
          if (c) {
            c.setAttribute("role", "application");
            c.setAttribute(
              "aria-label",
              "Factor Frenzy: a prime, composite, GCF, and LCM arcade game. Use the on-screen controls or keyboard to play.",
            );
            c.setAttribute("tabindex", "0");
            c.addEventListener("pointerdown", function () {
              c.focus();
            });
          }
        });
      })();
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>

    <script src="/shared/save-resume/save-resume-engine.js" defer></script>
    <!-- nsr-injected:end -->
    <!-- gfx-injected:begin (shared game polish — tools/inject-game-fx.js) -->
    <script src="/assets/game-fx.js" defer></script>
    <!-- gfx-injected:end -->
  </body>
