    <script>
      (() => {
        "use strict";

        /* =========================================================
   DETECTIVE INVESTIGATION — 6.SP.A.1
   Recognize statistical vs non-statistical questions.

   THE MATH IS THE MECHANIC — "Evidence Board / Poll for Variability":
   A statistical question is one whose answer VARIES across a
   population. The detective walks to each witness case, then POLLS
   the respondents: every tap interviews one witness and their
   answer lands as a dot on a live dot-plot (the evidence board).
   - If answers come back IDENTICAL (a single tall stack, no spread)
     the question is NON-statistical.
   - If answers SCATTER across the number line (spread) the question
     is STATISTICAL.
   The player must collect enough responses to SEE the spread, then
   file the case into the Statistical / Non-statistical bin. The
   dot-plot's spread literally proves the classification, and the
   poll deterministically spreads iff the question truly varies —
   so variability is something the player produces and reads, never
   a YES/NO guess made after walking to a clue.
   Misfiling a wide-spread question scatters the board (real failure).
   Phaser 3 single-file game.
   ========================================================= */

        // ── Sound synthesizer ──
        const SFX = {
          ctx: null,
          init() {
            if (!this.ctx) {
              const A = window.AudioContext || window.webkitAudioContext;
              if (A) this.ctx = new A();
            }
          },
          play(type) {
            this.init();
            if (!this.ctx) return;
            if (this.ctx.state === "suspended") this.ctx.resume();
            const o = this.ctx.createOscillator(),
              g = this.ctx.createGain(),
              t = this.ctx.currentTime;
            const presets = {
              correct: { wave: "sine", f: [520, 780], dur: 0.18, vol: 0.06 },
              wrong: { wave: "sawtooth", f: [300, 180], dur: 0.22, vol: 0.05 },
              click: { wave: "sine", f: [440, 480], dur: 0.08, vol: 0.04 },
              poll: { wave: "sine", f: [500, 560], dur: 0.07, vol: 0.04 },
              combo: { wave: "sine", f: [600, 900], dur: 0.25, vol: 0.06 },
              badge: { wave: "triangle", f: [660, 990], dur: 0.3, vol: 0.06 },
              whoosh: { wave: "sine", f: [200, 600], dur: 0.15, vol: 0.03 },
              alarm: { wave: "square", f: [380, 420], dur: 0.12, vol: 0.03 },
              levelup: {
                wave: "sine",
                f: [440, 660, 880],
                dur: 0.35,
                vol: 0.06,
              },
            };
            const p = presets[type] || presets.click;
            o.type = p.wave;
            o.frequency.setValueAtTime(p.f[0], t);
            if (p.f.length === 3) {
              o.frequency.linearRampToValueAtTime(p.f[1], t + p.dur * 0.5);
              o.frequency.linearRampToValueAtTime(p.f[2], t + p.dur);
            } else {
              o.frequency.linearRampToValueAtTime(p.f[1], t + p.dur);
            }
            g.gain.setValueAtTime(0.001, t);
            g.gain.linearRampToValueAtTime(p.vol, t + 0.02);
            g.gain.exponentialRampToValueAtTime(0.001, t + p.dur);
            o.connect(g).connect(this.ctx.destination);
            o.start(t);
            o.stop(t + p.dur + 0.01);
          },
        };

        // ── Questions bank: 6.SP.A.1 ──
        // Each case carries a TRUE "varies?" model so the simulated poll
        // deterministically spreads (statistical) or collapses (non-statistical).
        //   stat        : the correct classification (answers vary across people?)
        //   unit        : label for the dot-plot number line
        //   ticks       : the value buckets the dot-plot shows (left→right)
        //   model.center: which bucket index identical answers stack on (non-stat)
        //                 OR the middle of the spread (stat)
        //   model.spread: how many buckets the responses scatter across.
        //                 spread === 0  ⇒ identical (NON-statistical)
        //                 spread >= 2   ⇒ scattered (STATISTICAL)
        //   weights     : optional relative likelihood per offset for realism
        // A poll draw = center + a random offset within ±spread (clamped to ticks).

            tier: 2,
            unit: "°F",
            ticks: ["60", "65", "70", "75", "80"],

            tier: 2,
            unit: "start time",

              "The schedule gives ONE start time — every answer matches, NON-statistical.",

          {

            stat: false,
            tier: 2,
            unit: "# of students",

        const CASE_THEMES = [
          { name: "Cafeteria Mystery", icon: "🍕", color: 0xf77f00 },
          { name: "Sports Arena Case", icon: "🏀", color: 0x2d6cdf },
          { name: "Weather Bureau File", icon: "🌧️", color: 0x1b998b },
          { name: "Tech Lab Incident", icon: "📱", color: 0x7b4cc2 },
          { name: "Wildlife Case", icon: "🐾", color: 0xe63946 },
        ];

        const W = 960,
          H = 640;

        function shuffle(a) {
          const b = [...a];
          for (let i = b.length - 1; i > 0; i--) {
            const j = (Math.random() * (i + 1)) | 0;
            [b[i], b[j]] = [b[j], b[i]];
          }
          return b;
        }

        // ── Deterministic poll model ──
        // Draw one witness response = a bucket index on the dot-plot's number line.
        // spread === 0 ⇒ always the same bucket (collapses). spread > 0 ⇒ scatters.
        function pollResponse(clue) {
          const n = clue.ticks.length;
          const c = clue.model.center;
          const s = clue.model.spread;
          if (s <= 0) return c; // identical → no variability
          // Triangular-ish draw centred on `center`, scatter up to ±spread.
          const r1 = Math.random(),
            r2 = Math.random();
          const off = Math.round((r1 + r2 - 1) * s); // peak at 0, range ±s
          let idx = c + off;
          if (idx < 0) idx = 0;
          if (idx > n - 1) idx = n - 1;
          return idx;
        }

        class BootScene extends Phaser.Scene {

            g.clear();
            g.fillStyle(0xf77f00, 1);
            g.fillRoundedRect(0, 0, 260, 56, 16);
            g.generateTexture("btn_orange", 260, 56);
            g.clear();
            g.fillStyle(0x1b998b, 1);
            g.fillRoundedRect(0, 0, 260, 56, 16);
            g.generateTexture("btn_teal", 260, 56);
            g.clear();
            g.fillStyle(0x14213d, 1);
            g.fillRoundedRect(0, 0, 260, 56, 16);
            g.generateTexture("btn_dark", 260, 56);
            g.clear();
            // Detective body (top-down disc with hat brim + magnifier vibe)
            g.fillStyle(0x14213d, 1);

        // ═══════════════════════════════════════════════════
        class TitleScene extends Phaser.Scene {

        // ═══════════════════════════════════════════════════
        // Play-field bounds (area where the detective roams). HUD up top,
        // evidence board on the right.
        const FIELD = { x: 30, y: 110, w: 560, h: H - 150 };
        const BOARD = { x: 610, y: 110, w: 320, h: H - 150 };

        class GameScene extends Phaser.Scene {
          constructor() {
            super("Game");
          }
          init(data) {
            this.tier = data.tier || 1;
            this.totalCases = data.totalCases || 8;
            this.witnessGoal = data.witnesses || 6;
            this.scaffold = data.scaffold !== false;
            this.moveSpeed = this.tier === 1 ? 200 : 240;
            this.score = 0;
            this.combo = 0;
            this.maxCombo = 0;
            this.lives = this.tier === 1 ? 4 : 3;
            this.filed = 0; // cases correctly filed
            this.solved = 0; // cases resolved (right or wrong)
            this.correct = 0;
            this.wrong = 0;
            this.caseIndex = 0;
            this.cases = shuffle(
              CLUE_BANK.filter((c) => (this.tier === 1 ? true : c.tier === 2)),
            ).slice(0, this.totalCases);
            // ensure a balanced-ish mix; if filter left too few, top up from full bank
            if (this.cases.length < this.totalCases) {
              const extra = shuffle(CLUE_BANK).filter(
                (c) => !this.cases.includes(c),
              );
              this.cases = this.cases.concat(extra).slice(0, this.totalCases);
            }
            this.activeCaseIx = 0;
            this.phase = "investigate"; // investigate → poll → file
          }

          create() {
            this.cameras.main.setBackgroundColor(0x0c1529);
            const bg = this.add.graphics();
            bg.fillGradientStyle(0x14213d, 0x14213d, 0x1a2744, 0x1a2744, 1);
            bg.fillRect(0, 0, W, H);

            // Crime-scene floor (left) with grid + boundary tape
            const floor = this.add.graphics();
            floor.fillStyle(0x0f1b33, 0.6);
            floor.fillRoundedRect(FIELD.x, FIELD.y, FIELD.w, FIELD.h, 18);
            floor.lineStyle(1, 0x2d6cdf, 0.12);
            for (let gx = FIELD.x; gx <= FIELD.x + FIELD.w; gx += 48)
              floor.lineBetween(gx, FIELD.y, gx, FIELD.y + FIELD.h);
            for (let gy = FIELD.y; gy <= FIELD.y + FIELD.h; gy += 48)
              floor.lineBetween(FIELD.x, gy, FIELD.x + FIELD.w, gy);
            floor.lineStyle(3, 0xfbbf24, 0.55);
            floor.strokeRoundedRect(FIELD.x, FIELD.y, FIELD.w, FIELD.h, 18);

            this.createHUD();
            this.buildBoard();

            this.caseText = this.add
              .text(FIELD.x + FIELD.w / 2, 88, "", {
                fontSize: "17px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#fbbf24",
                stroke: "#14213d",
                strokeThickness: 3,
              })
              .setOrigin(0.5);

            this.hint = this.add
              .text(
                FIELD.x + FIELD.w / 2,
                H - 24,
                "Move to a 👤 witness and press SPACE / tap to poll them.",
                {
                  fontSize: "12px",
                  fontFamily: "sans-serif",
                  color: "#8aa0c6",
                  align: "center",
                  wordWrap: { width: FIELD.w - 20 },
                },
              )
              .setOrigin(0.5);

            // Particle emitters
            this.correctEmitter = this.add.particles(0, 0, "dot", {
              speed: { min: 80, max: 250 },
              scale: { start: 0.8, end: 0 },
              alpha: { start: 1, end: 0 },
              lifespan: 600,
              tint: [0xfbbf24, 0x2a9d5c, 0x1b998b],
              blendMode: "ADD",
              emitting: false,
              quantity: 20,
            });
            this.wrongEmitter = this.add.particles(0, 0, "dot", {
              speed: { min: 60, max: 180 },
              scale: { start: 0.6, end: 0 },
              alpha: { start: 0.8, end: 0 },
              lifespan: 500,
              tint: [0xe63946, 0xfb7185],
              blendMode: "ADD",
              emitting: false,
              quantity: 12,
            });

            // Detective sprite
            this.player = this.physics.add
              .sprite(
                FIELD.x + FIELD.w / 2,
                FIELD.y + FIELD.h - 60,
                "detective",
              )
              .setCircle(24);
            this.physics.world.setBounds(
              FIELD.x + 4,
              FIELD.y + 4,
              FIELD.w - 8,
              FIELD.h - 8,
            );
            this.player.setCollideWorldBounds(true);
            this.playerHat = this.add
              .text(0, 0, "🕵️", { fontSize: "28px" })
              .setOrigin(0.5)
              .setDepth(5);

            // Input: keyboard
            this.keys = this.input.keyboard.addKeys({
              up: "W",
              down: "S",
              left: "A",
              right: "D",
              up2: "UP",
              down2: "DOWN",
              left2: "LEFT",
              right2: "RIGHT",
            });
            this.keyPoll = this.input.keyboard.addKey("SPACE");
            this.keyStat = this.input.keyboard.addKey("F");
            this.keyNon = this.input.keyboard.addKey("G");
            this.keyPoll.on("down", () => this.tryPollNearest());
            this.keyStat.on("down", () => this.fileCase(true));
            this.keyNon.on("down", () => this.fileCase(false));

            // Input: touch / pointer drag steering on the field
            this.dragTarget = null;
            this.input.on("pointerdown", (p) => {
              if (this.isInField(p.worldX, p.worldY))
                this.dragTarget = { x: p.worldX, y: p.worldY };
            });
            this.input.on("pointermove", (p) => {
              if (this.dragTarget && p.isDown)
                this.dragTarget = { x: p.worldX, y: p.worldY };
            });
            this.input.on("pointerup", () => {
              this.dragTarget = null;
            });

            this.cameras.main.fadeIn(500);
            this.startCase();
            this.updateHUD();
          }

          isInField(x, y) {
            return (
              x >= FIELD.x &&
              x <= FIELD.x + FIELD.w &&
              y >= FIELD.y &&
              y <= FIELD.y + FIELD.h
            );
          }

          // ── Evidence board (right panel: question + dot-plot + file bins) ──
          buildBoard() {
            const g = this.add.graphics();
            g.fillStyle(0x0c1529, 0.85);
            g.fillRoundedRect(BOARD.x, BOARD.y, BOARD.w, BOARD.h, 16);
            g.lineStyle(3, 0xfbbf24, 0.7);
            g.strokeRoundedRect(BOARD.x, BOARD.y, BOARD.w, BOARD.h, 16);
            this.add
              .text(BOARD.x + BOARD.w / 2, BOARD.y + 18, "📋 EVIDENCE BOARD", {
                fontSize: "13px",
                fontFamily: "sans-serif",
                fontStyle: "bold",
                color: "#fbbf24",
                letterSpacing: 2,
              })
              .setOrigin(0.5);

            this.boardQ = this.add
              .text(BOARD.x + BOARD.w / 2, BOARD.y + 56, "", {
                fontSize: "15px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#ffffff",
                align: "center",
                wordWrap: { width: BOARD.w - 36 },
                lineSpacing: 3,
              })
              .setOrigin(0.5, 0);

            // Dot-plot area
            this.plotTop = BOARD.y + 150;
            this.plotBottom = BOARD.y + 300;
            this.plotLeft = BOARD.x + 36;
            this.plotRight = BOARD.x + BOARD.w - 24;
            this.plotGfx = this.add.graphics();
            this.dotLayer = this.add.container();
            this.tickLabels = [];

            this.responseCount = this.add
              .text(BOARD.x + BOARD.w / 2, BOARD.y + 118, "", {
                fontSize: "13px",
                fontFamily: "sans-serif",
                fontStyle: "bold",
                color: "#f9d98a",
              })
              .setOrigin(0.5);

            this.spreadReadout = this.add
              .text(BOARD.x + BOARD.w / 2, BOARD.y + 312, "", {
                fontSize: "13px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#8aa0c6",
                align: "center",
                wordWrap: { width: BOARD.w - 30 },
              })
              .setOrigin(0.5, 0);

            // File bins
            this.statBin = this.makeBin(
              BOARD.x + 16,
              BOARD.y + BOARD.h - 96,
              "📊 STATISTICAL",
              "answers VARY (F)",
              0x2a9d5c,
              true,
            );
            this.nonBin = this.makeBin(
              BOARD.x + 16 + (BOARD.w - 32) / 2 + 6,
              BOARD.y + BOARD.h - 96,
              "📌 NON-STAT",
              "one exact answer (G)",
              0xe63946,
              false,
            );
          }

          makeBin(x, y, title, sub, tint, said) {
            const w = (BOARD.w - 32) / 2 - 6;
            const c = this.add.container(x + w / 2, y + 40);
            const bg = this.add.graphics();
            bg.fillStyle(tint, 0.16);
            bg.fillRoundedRect(-w / 2, -40, w, 80, 12);
            bg.lineStyle(3, tint, 0.85);
            bg.strokeRoundedRect(-w / 2, -40, w, 80, 12);
            const t = this.add
              .text(0, -16, title, {
                fontSize: "14px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#ffffff",
                align: "center",
              })
              .setOrigin(0.5);
            const s = this.add
              .text(0, 12, sub, {
                fontSize: "10px",
                fontFamily: "sans-serif",
                color: "#f9d98a",
                align: "center",
                wordWrap: { width: w - 12 },
              })
              .setOrigin(0.5);
            c.add([bg, t, s]);
            c.setSize(w, 80).setInteractive({ useHandCursor: true });
            c.setAlpha(0.5);
            c.on("pointerover", () => {
              if (c.input.enabled) c.setScale(1.04);
            });
            c.on("pointerout", () => c.setScale(1));
            c.on("pointerdown", () => this.fileCase(said));
            c._bg = bg;
            c._tint = tint;
            return c;
          }

          createHUD() {
            this.add.text(28, 16, "🏆 SCORE", {
              fontSize: "10px",
              fontFamily: "sans-serif",
              fontStyle: "bold",
              color: "#fbbf24",
              letterSpacing: 2,
            });
            this.scoreText = this.add.text(28, 31, "0", {
              fontSize: "24px",
              fontFamily: "Trebuchet MS",
              fontStyle: "bold",
              color: "#ffffff",
            });
            this.add.text(140, 16, "🔥 COMBO", {
              fontSize: "10px",
              fontFamily: "sans-serif",
              fontStyle: "bold",
              color: "#f77f00",
              letterSpacing: 2,
            });
            this.comboText = this.add.text(140, 31, "0x", {
              fontSize: "24px",
              fontFamily: "Trebuchet MS",
              fontStyle: "bold",
              color: "#f77f00",
            });
            this.add.text(258, 16, "📁 FILED", {
              fontSize: "10px",
              fontFamily: "sans-serif",
              fontStyle: "bold",
              color: "#1b998b",
              letterSpacing: 2,
            });
            this.fileText = this.add.text(258, 31, "0", {
              fontSize: "24px",
              fontFamily: "Trebuchet MS",
              fontStyle: "bold",
              color: "#1b998b",
            });
            this.add.text(W - 250, 16, "❤️ STRIKES", {
              fontSize: "10px",
              fontFamily: "sans-serif",
              fontStyle: "bold",
              color: "#fb7185",
              letterSpacing: 2,
            });
            this.livesText = this.add.text(W - 250, 31, "", {
              fontSize: "20px",
            });
            this.add.text(W - 96, 16, "CASE", {
              fontSize: "10px",
              fontFamily: "sans-serif",
              fontStyle: "bold",
              color: "#f9d98a",
              letterSpacing: 2,
            });
            this.caseCountText = this.add
              .text(W - 72, 31, "0", {
                fontSize: "18px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#f9d98a",
              })
              .setOrigin(0, 0);
          }

          updateHUD() {
            this.scoreText.setText(this.score.toString());
            this.comboText
              .setText(this.combo + "x")
              .setColor(this.combo >= 3 ? "#fbbf24" : "#f77f00");
            this.fileText.setText(this.filed.toString());
            let h = "";
            const maxLives = this.tier === 1 ? 4 : 3;
            for (let i = 0; i < maxLives; i++)
              h += i < this.lives ? "❤️" : "🖤";
            this.livesText.setText(h);
            this.caseCountText.setText(this.solved + "/" + this.totalCases);
            const idx = Math.min(
              Math.floor(
                this.solved / Math.ceil(this.totalCases / CASE_THEMES.length),
              ),
              CASE_THEMES.length - 1,
            );
            this.caseIndex = idx;
          }

          // ── Start a case: clear board, scatter fresh witnesses ──
          startCase() {
            this.phase = "investigate";
            this.responses = []; // bucket indices collected so far
            this.activeClue = this.cases[this.activeCaseIx];
            const theme = CASE_THEMES[this.caseIndex % CASE_THEMES.length];
            this.caseText.setText(
              theme.icon +
                "  " +
                theme.name +
                "  —  Case " +
                (this.activeCaseIx + 1),
            );
            this.boardQ.setText('"' + this.activeClue.q + '"');
            this.responseCount.setText(
              "Polled 0 / " + this.witnessGoal + " witnesses",
            );
            this.spreadReadout.setText(
              this.scaffold
                ? "Poll the witnesses. Spread of dots = variability."
                : "",
            );
            this.setBinsEnabled(false);
            this.drawPlot();
            this.spawnWitnesses();
          }

          spawnWitnesses() {
            if (this.witnesses) this.witnesses.forEach((w) => w.cont.destroy());
            this.witnesses = [];
            const pts = [];
            for (let i = 0; i < this.witnessGoal; i++) {
              let x,
                y,
                tries = 0;
              do {
                x = FIELD.x + 60 + Math.random() * (FIELD.w - 120);
                y = FIELD.y + 60 + Math.random() * (FIELD.h - 120);
                tries++;
              } while (
                tries < 30 &&
                pts.some(
                  (p) => Phaser.Math.Distance.Between(p.x, p.y, x, y) < 76,
                )
              );
              pts.push({ x, y });
              const cont = this.add.container(x, y);
              const glow = this.add
                .image(0, 0, "glow")
                .setScale(0.8)
                .setTint(0x2d6cdf)
                .setAlpha(0.25)
                .setBlendMode(Phaser.BlendModes.ADD);
              const disc = this.add.graphics();
              disc.fillStyle(0x14213d, 1);
              disc.fillCircle(0, 0, 20);
              disc.lineStyle(3, 0x2d6cdf, 0.9);
              disc.strokeCircle(0, 0, 20);
              const icon = this.add
                .text(0, 0, "👤", { fontSize: "22px" })
                .setOrigin(0.5);
              cont.add([glow, disc, icon]);
              this.tweens.add({
                targets: glow,
                scale: 1.0,
                alpha: 0.45,
                duration: 900,
                yoyo: true,
                repeat: -1,
                ease: "Sine.easeInOut",
              });
              this.tweens.add({
                targets: cont,
                y: y - 5,
                duration: 1100 + Math.random() * 600,
                yoyo: true,
                repeat: -1,
                ease: "Sine.easeInOut",
              });
              this.witnesses.push({ cont, icon, polled: false });
            }
          }

          // ── Draw the dot-plot from this.responses ──
          drawPlot() {
            const clue = this.activeClue;
            const g = this.plotGfx;
            g.clear();
            this.dotLayer.removeAll(true);
            this.tickLabels.forEach((t) => t.destroy());
            this.tickLabels = [];

            const n = clue.ticks.length;
            const axisY = this.plotBottom;
            // axis line
            g.lineStyle(3, 0xfbbf24, 0.85);
            g.lineBetween(this.plotLeft - 6, axisY, this.plotRight + 6, axisY);
            // unit label
            const unit = this.add
              .text(
                (this.plotLeft + this.plotRight) / 2,
                axisY + 30,
                clue.unit + " →",
                {
                  fontSize: "11px",
                  fontFamily: "sans-serif",
                  fontStyle: "bold",
                  color: "#f9d98a",
                },
              )
              .setOrigin(0.5);
            this.tickLabels.push(unit);

            const span = this.plotRight - this.plotLeft;
            const colX = (i) =>
              this.plotLeft + (n === 1 ? span / 2 : (span * i) / (n - 1));
            // ticks + labels
            for (let i = 0; i < n; i++) {
              const x = colX(i);
              g.lineStyle(2, 0xfbbf24, 0.6);
              g.lineBetween(x, axisY - 4, x, axisY + 4);
              const lbl = this.add
                .text(x, axisY + 12, clue.ticks[i], {
                  fontSize: "11px",
                  fontFamily: "sans-serif",
                  color: "#cdd9ef",
                })
                .setOrigin(0.5);
              this.tickLabels.push(lbl);
            }
            // stacked dots
            const counts = new Array(n).fill(0);
            this.responses.forEach((b) => counts[b]++);
            const dotR = 7,
              gap = 16;
            for (let i = 0; i < n; i++) {
              const x = colX(i);
              for (let s = 0; s < counts[i]; s++) {
                const y = axisY - 12 - s * gap;
                const dot = this.add.circle(x, y, dotR, 0x2a9d5c);
                dot.setStrokeStyle(2, 0xffffff, 0.9);
                this.dotLayer.add(dot);
              }
            }
          }

          // ── Live spread metric the player reads ──
          observedSpread() {
            if (this.responses.length === 0) return 0;
            const mn = Math.min(...this.responses);
            const mx = Math.max(...this.responses);
            return mx - mn; // range in buckets
          }

          tryPollNearest() {
            if (this.phase !== "investigate") return;
            let best = null,
              bestD = 1e9;
            for (const w of this.witnesses) {
              if (w.polled) continue;
              const d = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                w.cont.x,
                w.cont.y,
              );
              if (d < bestD) {
                bestD = d;
                best = w;
              }
            }
            if (best && bestD < 48) this.pollWitness(best);
            else if (best)
              this.flashHint("Walk closer to a 👤 witness, then poll.");
          }

          pollWitness(w) {
            w.polled = true;
            SFX.play("poll");
            // Deterministic response from the case's true varies-model.
            const bucket = pollResponse(this.activeClue);
            this.responses.push(bucket);
            this.tweens.killTweensOf(w.cont);
            w.icon.setText("🗣️");
            this.tweens.add({
              targets: w.cont,
              scale: 1.3,
              alpha: 0,
              duration: 320,
              ease: "Back.easeIn",
              onComplete: () => w.cont.destroy(),
            });
            this.drawPlot();
            // animate a dot dropping onto the board
            this.spawnResponseDot(w.cont.x, w.cont.y, bucket);

            const polled = this.responses.length;
            this.responseCount.setText(
              "Polled " + polled + " / " + this.witnessGoal + " witnesses",
            );
            this.updateSpreadReadout();

            if (polled >= this.witnessGoal) this.enterFilePhase();
          }

          spawnResponseDot(fromX, fromY, bucket) {
            const n = this.activeClue.ticks.length;
            const span = this.plotRight - this.plotLeft;
            const tx =
              this.plotLeft + (n === 1 ? span / 2 : (span * bucket) / (n - 1));
            const ty = this.plotTop - 10;
            const p = this.add.circle(fromX, fromY, 7, 0x2a9d5c);
            p.setStrokeStyle(2, 0xffffff, 0.9).setDepth(12);
            this.tweens.add({
              targets: p,
              x: tx,
              y: ty,
              duration: 360,
              ease: "Cubic.easeIn",
              onComplete: () => {
                p.destroy();
                this.drawPlot();
              },
            });
          }

          updateSpreadReadout() {
            const spread = this.observedSpread();
            const polled = this.responses.length;
            if (polled < 2) {
              this.spreadReadout
                .setColor("#8aa0c6")
                .setText(
                  "Keep polling — you need more responses to judge spread.",
                );
              return;
            }
            if (spread === 0) {
              this.spreadReadout
                .setColor("#fb7185")
                .setText(
                  "No spread yet — every answer landed on the SAME value.",
                );
            } else {
              this.spreadReadout
                .setColor("#7ee0a8")
                .setText(
                  "Spread = " +
                    spread +
                    " step" +
                    (spread === 1 ? "" : "s") +
                    " — the answers VARY.",
                );
            }
          }

          enterFilePhase() {
            this.phase = "file";
            this.player.setVelocity(0, 0);
            this.dragTarget = null;
            this.setBinsEnabled(true);
            const spread = this.observedSpread();
            this.spreadReadout
              .setColor(spread > 0 ? "#7ee0a8" : "#fb7185")
              .setText(
                spread > 0
                  ? "The dots SPREAD across " +
                      (spread + 1) +
                      " values. File this case in the right bin."
                  : "The dots all STACK on one value. File this case in the right bin.",
              );
            this.flashHint("All witnesses polled — file the case (F or G).");
          }

          setBinsEnabled(on) {
            [this.statBin, this.nonBin].forEach((bin) => {
              bin.input.enabled = on;
              bin.setAlpha(on ? 1 : 0.5);
              bin._bg.clear();
              const w = (BOARD.w - 32) / 2 - 6;
              bin._bg.fillStyle(bin._tint, on ? 0.28 : 0.16);
              bin._bg.fillRoundedRect(-w / 2, -40, w, 80, 12);
              bin._bg.lineStyle(3, bin._tint, on ? 1 : 0.7);
              bin._bg.strokeRoundedRect(-w / 2, -40, w, 80, 12);
            });
          }

          fileCase(saidStatistical) {
            if (this.phase !== "file") {
              if (this.phase === "investigate")
                this.flashHint(
                  "Poll all " +
                    this.witnessGoal +
                    " witnesses first — you can't file what you haven't measured.",
                );
              return;
            }
            const clue = this.activeClue;
            const correct = saidStatistical === clue.stat;
            const spread = this.observedSpread();
            this.solved++;
            this.phase = "resolved";
            this.setBinsEnabled(false);

            if (correct) {
              SFX.play("correct");
              this.combo++;
              this.maxCombo = Math.max(this.maxCombo, this.combo);
              const bonus = this.combo >= 5 ? 50 : this.combo >= 3 ? 25 : 0;
              const pts = 100 + bonus;
              this.score += pts;
              this.correct++;
              this.filed++;
              this.correctEmitter.explode(
                20,
                BOARD.x + BOARD.w / 2,
                this.plotBottom,
              );
              if (this.combo >= 3) {
                SFX.play("combo");
                this.cameras.main.shake(80, 0.003);
              }
              const why = clue.stat
                ? "Correct — the spread proves answers VARY. " + clue.explain
                : "Correct — no spread, one exact answer. " + clue.explain;
              this.banner("📁 FILED!", "#7ee0a8");
              this.flashExplain(why, "#7ee0a8");
            } else {
              SFX.play("wrong");
              this.combo = 0;
              this.lives--;
              this.wrong++;
              this.wrongEmitter.explode(
                14,
                BOARD.x + BOARD.w / 2,
                this.plotBottom,
              );
              this.cameras.main.shake(160, 0.008);
              // Misfiling a wide-spread question visibly scatters the board.
              this.scatterBoard();
              const why = clue.stat
                ? "Misfiled. Look again: the dots SPREAD across the line — that variability means STATISTICAL. " +
                  clue.explain
                : "Misfiled. Look again: every dot STACKED on one value — no variability means NON-statistical. " +
                  clue.explain;
              this.banner("✖ MISFILED", "#fb7185");
              this.flashExplain(why, "#fb7185");
            }
            this.updateHUD();

            if (this.lives <= 0) {
              this.time.delayedCall(1500, () => this.endGame());
              return;
            }
            this.time.delayedCall(1700, () => {
              this.activeCaseIx++;
              if (
                this.activeCaseIx >= this.totalCases ||
                this.activeCaseIx >= this.cases.length
              ) {
                this.endGame();
              } else {
                this.startCase();
                this.updateHUD();
              }
            });
          }

          // Meaningful failure: dots fly off the board when a spread is misjudged.
          scatterBoard() {
            this.dotLayer.list.slice().forEach((dot) => {
              this.tweens.add({
                targets: dot,
                x: dot.x + (Math.random() - 0.5) * 320,
                y: dot.y + (Math.random() - 0.5) * 240,
                alpha: 0,
                duration: 700,
                ease: "Cubic.easeOut",
                onComplete: () => dot.destroy(),
              });
            });
          }

          flashExplain(msg, color) {
            if (this.explainText) this.explainText.destroy();
            this.explainText = this.add
              .text(BOARD.x + BOARD.w / 2, BOARD.y + 312, msg, {
                fontSize: "12px",
                fontFamily: "Trebuchet MS",
                color,
                align: "center",
                wordWrap: { width: BOARD.w - 30 },
                lineSpacing: 3,
              })
              .setOrigin(0.5, 0)
              .setDepth(14);
            this.time.delayedCall(1600, () => {
              if (this.explainText) {
                this.tweens.add({
                  targets: this.explainText,
                  alpha: 0,
                  duration: 300,
                  onComplete: () => {
                    if (this.explainText) this.explainText.destroy();
                    this.explainText = null;
                  },
                });
              }
            });
          }

          flashHint(msg) {
            this.hint.setText(msg).setColor("#fbbf24");
            this.time.delayedCall(1600, () => {
              if (this.hint.active)
                this.hint
                  .setColor("#8aa0c6")
                  .setText(
                    "Move to a 👤 witness and press SPACE / tap to poll them.",
                  );
            });
          }

          banner(text, color) {
            const b = this.add
              .text(FIELD.x + FIELD.w / 2, FIELD.y + FIELD.h / 2, text, {
                fontSize: "32px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color,
                stroke: "#14213d",
                strokeThickness: 5,
              })
              .setOrigin(0.5)
              .setDepth(18)
              .setAlpha(0);
            this.tweens.add({
              targets: b,
              alpha: 1,
              scaleX: 1.2,
              scaleY: 1.2,
              duration: 320,
              yoyo: true,
              hold: 500,
              onComplete: () => b.destroy(),
            });
          }

          update() {
            if (!this.player) return;
            if (this.phase !== "investigate") {
              this.player.setVelocity(0, 0);
              this.playerHat.setPosition(this.player.x, this.player.y - 2);
              return;
            }
            const k = this.keys;
            let vx = 0,
              vy = 0;
            if (k.left.isDown || k.left2.isDown) vx -= 1;
            if (k.right.isDown || k.right2.isDown) vx += 1;
            if (k.up.isDown || k.up2.isDown) vy -= 1;
            if (k.down.isDown || k.down2.isDown) vy += 1;

            if (vx === 0 && vy === 0 && this.dragTarget) {
              const dx = this.dragTarget.x - this.player.x;
              const dy = this.dragTarget.y - this.player.y;
              if (Math.abs(dx) > 6 || Math.abs(dy) > 6) {
                vx = dx;
                vy = dy;
              }
            }
            const len = Math.hypot(vx, vy);
            if (len > 0)
              this.player.setVelocity(
                (vx / len) * this.moveSpeed,
                (vy / len) * this.moveSpeed,
              );
            else this.player.setVelocity(0, 0);
            this.playerHat.setPosition(this.player.x, this.player.y - 2);

            // Auto-poll when standing on a witness (touch-friendly), but SPACE/tap also work.
            for (const w of this.witnesses) {
              if (w.polled) continue;
              const d = Phaser.Math.Distance.Between(
                this.player.x,
                this.player.y,
                w.cont.x,
                w.cont.y,
              );
              if (d < 34) {
                this.pollWitness(w);
                break;
              }
            }
          }

          endGame() {
            this.cameras.main.fade(500);
            this.time.delayedCall(500, () =>
              this.scene.start("Results", {
                tier: this.tier,
                score: this.score,
                correct: this.correct,
                wrong: this.wrong,
                total: this.totalCases,
                combo: this.maxCombo,
                lives: this.lives,
              }),
            );
          }
        }

        // ═══════════════════════════════════════════════════
        class ResultsScene extends Phaser.Scene {
          constructor() {
            super("Results");
          }
          init(data) {
            this.d = data;
          }
          create() {
            const d = this.d,
              cx = W / 2;
            this.cameras.main.setBackgroundColor(0x0c1529);
            const bg = this.add.graphics();
            bg.fillGradientStyle(0x14213d, 0x14213d, 0x0c1529, 0x0c1529, 1);
            bg.fillRect(0, 0, W, H);
            const pct = Math.round((d.correct / d.total) * 100);

            try {
              window.EduPulse &&
                EduPulse.record({
                  activityTitle: document.title,
                  score: d.correct,
                  maxScore: d.total,
                  problemsCorrect: d.correct,
                  problemsAttempted: d.correct + d.wrong,
                  standard: "6.SP.A.1",
                });
            } catch (e) {}

            if (pct >= 70)
              this.add.particles(W / 2, -10, "dot", {
                x: { min: -W / 2, max: W / 2 },
                speed: { min: 50, max: 200 },
                angle: { min: 80, max: 100 },
                scale: { start: 0.6, end: 0 },
                lifespan: 3000,
                tint: [0xfbbf24, 0xf77f00, 0x2a9d5c, 0x1b998b, 0x7b4cc2],
                frequency: 100,
                quantity: 3,
                blendMode: "ADD",
              });
            let rank = "Rookie",
              emoji = "🧭";
            if (pct >= 90) {
              rank = "Master Detective";
              emoji = "🏆";
            } else if (pct >= 75) {
              rank = "Senior Detective";
              emoji = "🔍";
            } else if (pct >= 60) {
              rank = "Junior Detective";
              emoji = "🧩";
            }
            this.add.text(cx, 50, emoji, { fontSize: "60px" }).setOrigin(0.5);
            this.add
              .text(cx, 110, "CASE FILE CLOSED", {
                fontSize: "36px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#fbbf24",
                stroke: "#14213d",
                strokeThickness: 4,
              })
              .setOrigin(0.5);
            this.add
              .text(
                cx,
                155,
                rank + "  ·  Level " + (d.tier === 2 ? "2" : "1"),
                {
                  fontSize: "20px",
                  fontFamily: "Trebuchet MS",
                  fontStyle: "bold",
                  color: "#f9d98a",
                },
              )
              .setOrigin(0.5);
            this.add
              .text(cx, 200, d.score.toString(), {
                fontSize: "54px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            this.add
              .text(cx, 240, "POINTS", {
                fontSize: "12px",
                fontFamily: "sans-serif",
                fontStyle: "bold",
                color: "#f9d98a",
                letterSpacing: 3,
              })
              .setOrigin(0.5);
            [
              {
                label: "Cases Solved",
                val: d.correct + "/" + d.total,
                x: cx - 200,
              },
              { label: "Accuracy", val: pct + "%", x: cx },
              { label: "Best Combo", val: d.combo + "x", x: cx + 200 },
            ].forEach((s) => {
              const g = this.add.graphics();
              g.fillStyle(0xffffff, 0.06);
              g.fillRoundedRect(s.x - 80, 270, 160, 80, 16);
              this.add
                .text(s.x, 295, s.val, {
                  fontSize: "28px",
                  fontFamily: "Trebuchet MS",
                  fontStyle: "bold",
                  color: "#fff",
                })
                .setOrigin(0.5);
              this.add
                .text(s.x, 328, s.label, {
                  fontSize: "11px",
                  fontFamily: "sans-serif",
                  fontStyle: "bold",
                  color: "#f9d98a",
                  letterSpacing: 2,
                })
                .setOrigin(0.5);
            });
            const sc =
              pct >= 90 ? 5 : pct >= 75 ? 4 : pct >= 60 ? 3 : pct >= 40 ? 2 : 1;
            let ss = "";
            for (let i = 0; i < 5; i++) ss += i < sc ? "⭐" : "☆";
            this.add.text(cx, 380, ss, { fontSize: "32px" }).setOrigin(0.5);
            const g2 = this.add.graphics();
            g2.fillStyle(0xfbbf24, 0.1);
            g2.fillRoundedRect(80, 420, W - 160, 100, 18);
            g2.lineStyle(2, 0xfbbf24, 0.4);
            g2.strokeRoundedRect(80, 420, W - 160, 100, 18);
            this.add
              .text(cx, 440, "💡 REMEMBER", {
                fontSize: "13px",
                fontFamily: "sans-serif",
                fontStyle: "bold",
                color: "#fbbf24",
                letterSpacing: 2,
              })
              .setOrigin(0.5);
            this.add
              .text(
                cx,
                475,
                "A STATISTICAL question makes the data SPREAD — different people, different answers.\nA NON-statistical question collapses to ONE exact value — no spread.",
                {
                  fontSize: "15px",
                  fontFamily: "Trebuchet MS",
                  color: "#f9d98a",
                  align: "center",
                  lineSpacing: 4,
                },
              )
              .setOrigin(0.5);
            const btn = this.add
              .image(cx, 570, "btn_orange")
              .setScale(0.85)
              .setInteractive({ useHandCursor: true });
            this.add
              .text(cx, 570, "🔄 New Investigation", {
                fontSize: "18px",
                fontFamily: "Trebuchet MS",
                fontStyle: "bold",
                color: "#fff",
              })
              .setOrigin(0.5);
            btn.on("pointerover", () => btn.setScale(0.89));
            btn.on("pointerout", () => btn.setScale(0.85));
            btn.on("pointerdown", () => {
              SFX.play("whoosh");
              this.cameras.main.fade(400);
              this.time.delayedCall(400, () => this.scene.start("Title"));
            });
            this.cameras.main.fadeIn(600);
            if (pct >= 70) SFX.play("levelup");
          }
        }

        // ═══════════════════════════════════════════════════
        new Phaser.Game({
          type: Phaser.AUTO,
          width: W,
          height: H,
          parent: document.body,
          backgroundColor: "#0c1529",
          scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH,
          },
          physics: {
            default: "arcade",
            arcade: { debug: false },
          },
          scene: [BootScene, TitleScene, GameScene, ResultsScene],
          input: { touch: true },
        });
      })();
    </script>
    <script src="/assets/nt-page-enhance.js" defer></script>
    <script src="/assets/edupulse-config.js"></script>
    <script src="/assets/edupulse-bridge.js"></script>
    <!-- nsr-injected:begin (multi-day save/resume — tools/inject-save-resume.js) -->
    <script src="/shared/save-resume/save-resume-engine.js" defer></script>
